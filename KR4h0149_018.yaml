body:
  text: 記宗學記果毅親王允禮粤稽唐虞以元徳顯功埀光奕世號稱元愷者皆髙陽髙辛之世胄及周文武謨烈光昭左右承弼之臣勲在王室紀於太常半岀宗姓成康之際以六卿上兼三公者僅六人而姬姓居其五見於春秋内外傳者若子臧若國僑若羊舌肹若季札髙世之賢大抵多周裔也盖世運之隆賢者多生於上豈惟隂陽五行之秀氣所藴鍾者異哉其觀感於皇極漸摩於教化牖廸於師友者既非士庶所得同且憑託世業俯仰寛然無衣食之計以累其心無樷細之事以分其日力其務學也專其成材也易故性資傑出者所蓄尤深閎而博逺也我皇上聖徳天縱通貫三才躬履至道以為大小臣工中外士民之表儀敷天之下莫不翕然從化重念我宗室子弟尤教育所宜先特諭立東西二學於禁城之左右自王公庶位以及凡有屬籍者其子弟願學則入焉即周官立學於虎門之外以教國子弟之義也伏讀聖制以勸學興行諄諄戒勉務明於禮義廉恥之根源即洪範所稱皇極之敷言是彝是訓于帝其訓也立教之方以逺惡從善為本而稽經諏史以及學書習射具有程式即師氏保氏所掌三徳三行六藝之遺教也日有講授月有課春秋有試五年大比髙等量材授官下者申教三年歴十有一年再試而無改焉然後屏之學而歸其家使族長保受之即鄉大夫興賢興能簡不帥教者之法也典教之官其正其貳皆取諸宗室非學優行敦者不與分局而教者亦如之或選於羣士或擇於諸司復董之以翰林侍從即大司樂所掌之學政必有道者有徳者乃任以教事是也我國家受天休命自太祖太宗世祖聖祖以來本支繁衍至千有五百餘人係籍宗學者凡二百餘人而能自擇師肄業於家塾者弗計焉兹非世徳綿洪積厚而流光之驗與凡我子弟幸生重熙累洽之餘蘟藾先業俯仰寛然身心無累羣萃於髙軒廣厦之中請業有師講習得朋書冊紙墨之需食飲膏火之費皆取足於官中不索而自得之於斯時也尚不能㳟承聖主敦敘宗親陶冶曲成之至意而玩日愒時自安於㳺惰尚何以歸對其父兄而自託於朋齒乎歳秋八月余䝉恩領宗正事凡春秋校試及五年大比實主其高下黜陟故列序科條而究宣其義使學正以下與聞教事者具知所法守而我子弟益興感於祖宗積累之深聖主教思之切是訓是行日有孜孜茍非下材皆可謹身寡過以自効于百司庶府之間而資性傑出者材達徳成将有如古人之可紀者焉俾海内嚮慕以為近天子之光而㑹其有極歸其有極以為中外臣民倡者自我宗室子弟始則余亦得藉手以仰答我皇上委任責成之重也夫刈麥記誠隱郡王允祉國以民為本民以食為天故無逸首稱先知稼穡之艱難乃逸也百榖俱於秋成惟麥熟於仲夏而自江以北賴以為生者猶江南之重稻也皇父避暑塞北山莊逰豫之暇寓目農功每種榖麥稻黍於亭榭之旁或引山溪以溉田或因地勢而為洫一耕一耨皆親臨觀焉乙未之嵗自春入夏㴻雨應時祥風協律况兼山川衍沃土脉肥饒所藝諸田日見豐茂而隴麥日至之時皆成熟矣於是命駕中田躬臨刈穫視其本則實苞實褎足徵人事之具脩觀其實則兩岐三穗益信天休之滋至天顔樂之蓋樂天下之豐亨皆如此麥也天下臣民之樂惟在飽食煖衣而皇父之樂以天下臣民皆得飽煖為樂是合天下之樂而樂抑何大焉書曰嗣爾股肱純其藝黍稷奔走事厥考厥長用孝養厥父母詩曰十月穫稻為此春酒以介眉夀此皆古人服勞奉飬家庭歡樂之謂也臣等幸際昇平位叨屏翰每序天倫之樂時聆庭訓之傳正宜勵志詩書怡情翰墨逢吉日佳時而優游於熙皥之域是又臣等之樂也今覩君父之樂而知此樂之大惟願仰蒙君父之樂而樂則樂亦共永於無窮焉爾讀書齋記葉方藹予以癸夘十月復補國史院編脩僦居順城門外老屋三楹稍葺治之以其西一楹貯書數千巻而名之曰讀書齋予官號無事平時上直辰入已出既性疎拙酬應俱絶因得偃仰休息手披口誦乎其間意忻忻也嘗念皇清興二十載武功之被薄海内外罔不震疊矞乎盛矣而禮樂制度在廷之臣尚未有所稱述以恢𢎞國家之規模又慮天子一旦開明堂臨辟雝搜三代之文訪六藝之㫖或令羣臣論撰祖宗功徳與詩書相並作為歌頌薦之郊廟而圜顧中外無有起而應詔者此亦學士大夫之羞而吾徒之憂也昔人謂漢承秦之後以文帝之恭儉謙讓武帝之雄才大畧皆不能因時改創以更化善俗成郅隆之治獨幸其臣賈誼董仲舒劉向揚雄之徒前後崛起稱先王道古昔雖其言不盡施行然至今誦其書想見其時以為商周而下言文明者莫與漢比吾於是知開代之主崇文右儒非粉飾太平之具也盖褎衣博帶之士不可一日不立於朝久矣夫士束髮就傅即思讀書纘言卓然有以自見矧予早竊國恩叨列侍從官以文學為名其又將何以自諉耶然則予之盡心於此匪獨從吾所好庶㡬他日僥倖有成竭其駑鈍少備興朝之驅使俾後之傳儒林者獲挂名其中而不使聖代有無一士之誚此區區之志也嗟乎賢公卿在上比肩賢士在下比肩皆不之憂而予獨鰓鰓焉憂之斯言也予即不自以為謾世其眞以為謾焉爾矣潼闗樓刻詩記湯斌潼闗古桃林地也太華峙其西崤凾踞其東秦山迴合萬峯刺天河渭屈盤千壑奔㑹崖谷崗嶺環抱叢倚道路狹峻車馬如束眞天造奇險為秦閫閾且南控武闗之隘北扼蒲津之阻握函夏之樞紐鏁川隴於堂奥漢唐以來莫不倚為巨鎮以資藩屏兵火之後城垣圯傾樓櫓半缺廢址荒煙過者為之躊躇而悽愴順治十三年斌奉命飭兵兹土自顧庸菲不足當斯重寄恒惴惴自恐仰賴朝廷徳威遐被數千里外如在輦轂之下故承乏三年兵强吏馴士習民安乃謀寮屬重建城樓貲皆蠲俸役罔妨農工既成集古人過闗題詠之詞自唐明皇以下凡一帝十有八人為詩二十九首刻於東門樓壁鳴呼當明皇停鑾闗上與侍從唱和其時君臣樂豫海㝢清寧登嵩躡岱勒石銘功可謂極盛未㡬而漁陽變起雄師告潰闗塞失守六龍西幸豈山河之險不足恃與抑成敗之故皆自於人也孟子曰地利不如人和呉起曰在徳不在險有國家者脩徳以懐逺和人以守國則雍容樽俎偃戈休甲彼放牛歸馬之盛此非其故墟哉後之君子登斯樓也眺山川之雄勝覽昔人之詠歌古今興衰之感制治保邦之要亦可以慨然而思矣重脩蘇州府儒學碑記湯斌康熙二十三年歳在甲子天予以治定功成行古廵狩之禮冬十月車駕至蘇州詢問民俗告誡有司還至曲阜祭先聖廟拜獻之儀視前代有加親灑宸翰題其廟額詔天下脩葺學宫頒賜御書海内蒸蒸罔不從乂斌時奉命撫呉祇謁廟學見殿廡門垣日就頽弛明倫堂岌岌欲傾慮無以仰承聖天子興學重道之意受事方新未遑興作明年二月蠲俸倡始藩臬庶僚飭材鳩工黾勉襄事杗棟櫨桷楹礎之殘缺者易之丹艧髹漆之漫漶者新之祠齋庖庫之久廢者興之締構堅貞典制具備泮水疏通逺接太湖松檜椅桐之屬種植千本閲十月而訖工於是躬率僚屬行釋菜禮定期講學於堂諸生執經問業逺近咸集又明年三月斌奉輔導東宮之命瀕行進諸生而告之曰此地自范文正公建學胡安定立教於今六百餘年矣名卿巨儒項背相望諸生肄業於斯其所以紹述先哲仰答天子作人雅意者果安在乎國家興治化在正人心而正人心在崇經術漢儒專門名家師説相承當詩書煨燼之餘儀文器數之目刪定傳授之㫖猶存十一於千百且其時選舉不以詞章通經學古之士皆得上聞朝廷定大議㫁大疑博士據經以對故其時士大夫勇於自立無茍簡之心孝弟廉讓之行更衰亂而不變此重經術之効也其後虛無寂滅之説盛聲律駢儷之習工而經學荒矣宋濂洛闗閩諸大儒出闡天人性道之源流故天下知性不外乎仁義禮智而虚無寂滅非性也道不外乎人倫日用而功利詞章非道也所謂得六經之精微而繼孔孟之絶學又豈漢以後諸儒所可及歟宋史學道儒林釐為二傳盖以周程張朱繼往開來其師友淵源不可與諸儒等耳而道學經學自此分矣夫所謂道學者六經四書之㫖體驗於心躬行而有得之謂也非經書之外更有不傳之遺學也故離經書而言道此異端之所謂道也外身心而言經此俗儒之所謂經也宗洙泗而禰洛閩人心之所以正也家柱史而戸天竺世道之所以衰也今聖朝尊禮先聖表章正學士子宜知所趨向矣吾恐朝廷以實求而士子終以名應也茍無騖乎其名而致力於其實則亦曰躬行而已矣故學者必先明義利之界謹誠偽之闗則貧富貴賤之非道不處不去必劃然也造次顛沛生死禍福之間不可移易者必確然也母為枉尺直尋之事毋作㨗徑茍得之謀寧拙毋巧寧朴毋華寧方毋圎戒懼慎獨之功無時可間子臣弟友之職不敢不勉不愧於大廷亦不愧於屋漏如此則發為議論自能息邪距詖而鄉愿楊墨之教不得騁也出為政事自能尊王黜霸而管商申韓之政不得施也其斯為眞經學其斯為眞道學也已否則剽竊浮華茍為譁世取寵之具講論踐履析為二事即誦説先儒世道亦何賴乎當文正公時中庸猶雜戴記中公獨舉以授横渠則公之深於經學可知矣安定之教以經義為本當時太學取以為法宋世人才之盛實基於此諸生為鄉邦後進來逰來觀其亦有所興起乎蘇郡人文實四方所則效也所以佐成聖朝之治化者予實有厚望焉諸生請書其言為記斯役也江蘇布政使章欽文蘇松督糧道副使劉鼎蘇州知府胡世威或總理工費或分司督察而心計指授巨細不遺者鼎之力為多司學事者教授呉世恒訓導張杰也例並書睢州移建廟學碑記湯斌睢州儒學舊在北城濯錦池上明末黃河决城遂淪於水有司權奉先師主於南城民舍地甚湫隘殿廡之制不備堂齋皆缺諸生無所肄業屢議改建以財用匱乏莫有毅然任其事者康熙十年知州事程公始至慮無以興學育材仰承朝廷徳意期年政通事簡乃相廟東有地據岡面陽水環如璧羣情咸合州之薦紳諸生量力捐助先建大殿次及兩廡㦸門櫺星門各如制明倫有堂啟聖名宦鄉賢有祠樹以崇坊繚以周垣位序丹雘應圖合禮其相規制稽出納久而不懈者學正魏君也既訖工公率鄉大夫士行釋菜禮而屬余為記余不獲辭乃言曰脩學有司職也諸生之逰於斯者亦思所以為學而求進於古人之道乎抑徒飾文辭溺訓詁冀茍得利禄以夸耀一時已乎夫朝廷廟學並建固期學者以聖賢為宗也夫聖賢之學其要存心而已存心者存天理而已微而不睹不聞顯而人倫日用皆天理所在也堯舜禹之相授受必致辨於人心道心之危微孔子十五志學至七十始從心所欲不踰矩然則聖人之異於人者惟在朝乾夕惕自強不息遂至與天為一耳成湯文武之為君臯陶伊傅周召之為臣以及顔曾思孟諸大賢時至事起功業各不相同而其深憂大懼不得已之心則千古一揆也是以行無轍迹言無倣效總以此心純一粹白相證於於穆之表而非從勲業文章一一較論也濓洛闗閩以來大儒相繼輩出風㑹所值指授各殊而道本於心先後若一學者不體驗於性情踐履與古人相見於精神心術之間則為已功疎屋漏難慊即著書滿家於道無當也惟知道之大原出於天而體用具於吾心存飬省察交致其功信顯微之無間悟知行之合一喜怒哀樂必求中節視聼言動必求合禮子臣弟友必求盡分藴之為天徳發之為王道此學問之極功而尊信聖人之實事也然有難言者正學不講俗痼日深利慾之根難㫁巧偽之術益工茍非乗本體之偶露急加體認擴充之力如火始然泉始達悠悠玩愒歳月㡬何轉眼遲暮蹻跖同歸大禹之所以惜寸隂而尚書有取於若藥瞑眩豈不以此歟若曰吾志在於科名惟事揣摩帖括他不暇計焉是視聖賢六經祇為富貴利達之資異日備朝廷任使安能秉道絶欺憂國奉公不㡬負朝廷建學立廟之意乎余鄉人也誠願與鄉之後進互相砥礪使賢才輩出以報君恩敢述所聞以告之遂為記公名正性鄉貢士四川萬縣人魏君名湛順治戊子舉人河南孟津縣人嵩陽書院記湯斌嵩陽書院在登封縣城北建自五代宋初與睢陽白鹿岳麓號四大書院其地負嵩面潁左右少室箕山諸峯秀矗雲表中天清淑之氣於是焉萃至道中賜九經子史置校官生徒至數百人稱最盛二程子嘗講學於此後人因為建祠明末兵亂傾圯殆盡國朝崇儒右文知縣事黄州葉侯封建堂三楹祀二程朱子而以地隣崇福宮凡宋臣之帯崇福宮銜者皆祀之葉侯既遷京職邑人大名兵備副使逸菴耿先生介家居講學以程朱為道統所宗不當與諸賢列復蠲貲建堂三楹遷主崇祀又作講堂三楹顔曰麗澤旁署兩齋曰博約曰敬義書舍若干楹庖湢門垣具備自康熙十八年春至次年秋訖工知縣事長洲張侯壎以興起斯文為任月吉講學課藝其中多士彬彬向風逸菴作書屬余為記余適承乏史局方恨不得從事几席與聞緒論其何敢辭然逸菴之意豈欲余記營建歳月而已乎或欲有言以告多士也竊以孔子教人之書莫詳於論語當時及門稱顔子為好學嘗與終日言而不違者今所記不過問仁問為邦二章而已然天徳王道備矣顔子謂夫子循循善誘博文約禮今他無可考即二章思之意者虞夏商周之禮樂制度即所謂博文而克已復禮之訓即所謂約禮與特學有體用問有先後耳中庸言明善誠身而列其目亦自博學審問始孔子言知不廢多聞多見而語子貢以一貫則又以多學而識之者為非其所以一貫之㫖終隱而不發即與門弟子言求仁之方為仁之要多矣而仁之體則罕言也豈聖人之過為隱與及讀易乾卦彖傳與中庸首章而後知道之大原莫明於斯也盖道之大原出於天而仁者天道之元也知天人同原則知吾心與天地流通而往來無間民胞物與之念油然而生而戒慎恐懼自不容已故程子謂學者湏先識仁以此也然仁之為體非可口傳耳授也在人之黙識耳孔子自十五志學至能立不惑五十而後知天命也以大聖人而若此則知命亦難矣今之講學者聚數十百人於堂而語之曰天命云何心性云何將大本大原皆為口耳影響之談學者於俄頃之間與聞性道之祕其不至作光景玩弄視詩書為糟粕禮儀三百威儀三千為粗迹也㡬希矣斯亦講學者之過也夫道無所謂髙逺也其形而下者具於飲食器服之用形而上者極於無聲無臭之微精粗本末無二致也孔子語顔子曰非禮勿視非禮勿聼非禮勿言非禮勿動而語樊遲曰居處恭執事敬與人忠聖人與上智中材所言皆不越是盖以天命流行不外動容周旋而子臣弟友即可上達天徳所謂無行不與者此也所謂知我其天者此也今功利詞章舉業技藝之習䧟溺人心士子窮年矻矻志在利祿名譽而天之所與我者茫然也是其學迥非聖人之學矣夫中庸之博學將以篤行也顔子之博文將以約禮也大易之窮理將以盡性而至命也大學之格物將以脩齊治平也今滯事物以為窮理未免沉溺迹象既支離而無本離事物以言致知又近於墮聰黜明亦虚空而鮮實學路久迷習染日深偶爾虚見未為真得非黙識本體誠敬存之綿綿密密不貳不息前聖心傳何能㑹通無間故曰茍不至徳至道不凝焉嗚呼豈易言哉逸菴之學以主敬為宗以體天理為要可謂得程朱正㫖矣吾懼學者之易視之也故因記書院而詳言之欲其深思而自得之焉張侯明經起家治行多可紀於逸菴相與有成尤足嘉也吾又懼來者之不能繼故備書之以告後之君子遊遼陽千頂山記張玉書康熙二十一年歳在壬戌海寓削平慶典具舉春三月車駕至盛京告成功於列祖三陵畢謁廵涖邊塞特敕扈蹕部院諸臣留都祇候臣玉書叨與侍從自興京奉命返轡時日休暇將徧歴州邑諏訪舊聞㑹積雨中阻不獲逺渉遼陽城南五十里為千頂山迤邐盤互夙擅奇勝望後十日持襆被杖筞以行比過遼城獲覩太祖高皇帝駐師築壘據河克敵之遺蹟又延問故老得年八十以上者二人指述舊事尤詳越宿冒雨入山既至風日開霽恣覽縱陟往返凡八日山多奇峯巑岏稠疊不可指屈故名千頂僧寺最著者五曰祖越龍泉中㑹大安香巖志無紀載或曰唐貞觀中征髙麗曾駐軍於此語多附㑹據元皇慶中直學士陳景元撰僧雪庵塔記言僧自毉巫閭駐錫大安後移居鴨綠江復還香巖具有異蹟今香巖寺西有雪庵塔而諸山所傳名勝亦往往以雪庵著則五寺舊址雖不可考而其創建在元以前興起在皇慶以後亦可信已夫遼陽為國家肇基重地陵宮相望百有餘里此山蟺蜒瑰異嫓之往代當在東都瀍澗西京霸杜之間而闗塞遼逺輪蹄罕及致使靈峯鷲嶺鬱而不彰臣玉書來逰來觀欣嘆希覯隨即所至用志梗概山不勝紀仍以五寺繫焉循遼城而南里許山色凝碧籬落類江左至八里村有棃數百株雨後吹白如雪踰石門度七嶺東南行為湯泉泉近濁可滌不可飲也入山經邢崖徑路逼仄萬峯回互鳥鳴樹底雜卉蓊翳梨最盛彌漫溪谷七八里不絶過南塔有官亭遺址勝國時將吏宴游休暇之地又數武至祖越寺寺環山而搆面俯背倚左右拱揖髙輙數百仞巒岩洞石各各肖形有神人仙佛蓮月盂鉢螺髻獅象之屬惜無髙人勝流持擇評品雖稱名近鄙仍而不變也由寺東緣磴而上脱㡌杖藜盤礴沙磔數百歩得巨石石形如丸圍徑以丈許兀踞峯頂凌虚聳特不欹不仄石上為松坡為石佛崖為羅漢洞洞對峙曰振衣岡磨崖大書蒼潤可愛名氏已蕪蝕畧見彷彿而已又里許歴危磴數百級至巔鑿壁為斗室顔曰無梁昔有老僧精梵律者常棲宿其地他僧處之或觸鬼物或虎嘯於側中夜惴慄輒㩦軍持而下僧浩然云自祖越折而西可五百歩兩崖夾峙劃然如門既入泉流潨激泠泠如撡石琴溯流而上一徑盤紆古木間植達龍泉寺聞粥鼓聲與泉聲應而軥輈鳥語雜㳫其中泉出寺後彌勒峯峯左有石洞方幅數尺珠光噴湧穿澗而溢寺僧截木承之刳腹類竹引入牖下有若懸溜凡祖越所見西北諸峯皆在寺東峯勢詭異險幻正側殊狀逰者心目駭蕩不諦視不能辨也寺延袤僅數畝其築室架壑皆依山偃仰有清越環映之致故山徑峭窄而取境特奇寺為故相國范文肅公舊逰地其子忠貞公所書字存藏經閣中寺僧寳而藏之出以示客結搆嚴冷如見其人龍泉距中㑹不十里山徑曠衍林隩暢蔚虎跡交錯竟日無行人晨興循龍泉東麓折而南有牝鹿十數注坂徐下僧曰此鹿就飲溪澗水耳畋獵罕至故與人狎然時墮虎口至中㑹寺寺前為水閣方廣半畝夏秋之交霪潦演溢九峪之水滙注於下閣因是得名其盛時水石交映禽鳴漁沫頗極登臨瞻眺之勝今閣久廢僅存石址而水勢亦湮塞尋所謂九峪水故道無識其源流者可為太息中㑹在五寺為簡寂禪宇剥落無復舊觀僧恥若遼陽人有學行築室數楹書史盈案龍泉西南諸山皆倚室東隅而松苔峯西峙與粥魚庵故址相望嵐氣環匝視靜而聼逺坐移時窅然深也出中㑹行十里許草樹藂密溪流鏘然水穿石中時露時伏是為大安寺山址又里許徑路盤紆下馬拾級而上行五百餘歩徑漸平復騎距寺半里許奇峯疊嶂聳出雲表如立如踞如拱如戴孤挺峭厲率去地數千尺寺枕山之中前俯後仰萬象盤鬱入寺憇五峯丈室閣鈴松韻時發異響坐久之邀兩僧導游人授一藤杖循百佛堂過薛菴至瓔珞峯峯突兀無梯膝行而上有泉出石旁如盎既下入萬松林逶迤里許隱蔽日月野卉數十本色丹而妍錯互於古松之隂幽麗特甚自此山益奇徑益偪沙礫雜糅積葉盈數尺怪石怒攫下視無際心􅋏然而危乃令兩僧前挈後掖䇿杖其中同行七人穿叢莽排株朽纍纍然趾背之相錯也行十餘里至羅漢洞洞深五六丈懸崖後阻蘚壁對峙有明嘉靖中華學士察題石出洞口折而西遥望石穴如牖為雲封洞背雲封過馬蹄㠗當衆山之中南面通明北俯中㑹若襟帶然又百餘歩經石門渡嶺天風乍起山木盡號仰睇仙人臺一峯斗絶空際疑不可即循磴道徐上約數十尋至臺趾左深潭右絶壁環顧諸山盡在肘腋之下臺距趾二丈許上布石枰栁栁州記仙奕山庶㡬似之而其矗立萬仞之巔崚􅡲奇詭飛鳥垂翼虎豹却顧海内諸山所罕覯也此峯居大安中㑹香巖之間山脈之所薈萃故逰大安者指為盡境折而下則去香巖為近於時夕陽在山隂氣慘肅不及還大安遂尋香巖而西距仙人臺二百歩有徑東南行孤峯旁突為觀音閣閣久廢而其地特勝衆山環列蒼靄畢㑹蔚然巨觀又東為夾峯元僧雪庵棲息之地峯下為洞洞口正黒傾亞不能措手足捫一穴僅容膝兩石離立横木其中背石履木下見深塹側身而入攀穴而出極山行之險甫出穴復對立一峯架木為梁濶僅踰尺引絙乃度夾峯之名以此峯頂有巨石有古屋有㫁碑峯外道絶仍觸險出洞口歴鸚鵡石雨花臺循錦繡坡至香巖日已暝矣僧言深夜常聞虎嘯繞佛閣數匝而去遂墐戸就宿曉起捫石碑得元直學士陳景元撰雪庵塔記碑覆土中百餘年掘土得之苔蘚瘢胝雜以塵垢字畫漫漶不可辨强起衆僧鉤剔滌除纖翳盡去所刓缺者纔七八字文載雪庵始末甚詳字體亦遒潤諸寺碑版之文此居第一由山後循舊徑度嶺又尋别峯東過雙井撫朝陽寺碣折入松林經大安而返千頂勝概以大安為最而山徑奇特實在香巖大安交㑹之介以道出諸山之背䆳奥深隱故多見側勢登覽者憚其僻逺往往避險而就夷皆未能窮極兹山之勝者也重脩東林書院記熊賜履東林宋儒楊龜山先生論學處也明神廟時梁谿高景逸顧涇陽二先生倡道東南遂因其舊址構為書院偕同志講肄其中四方之士多歸之於是東林之名滿天下天啟中魏璫煽虐大誅戮海内正人特指東林為黨籍書院以燬及璫敗有㫖脩復而喪亂之餘傾圯如故僅道南一祠頽然凉烟衰草間而已今天子隆重師儒崇奬道術近特允言官請詔各直省營建書院為士子觀摩地於是景逸先生之從孫節培集里中戚友申請於有司庀材鳩工廣行購募越期月而落成講堂學舍規制悉備諸生以時誦習不異曩時節培乃走書至金陵屬予為文以紀其事予盖俯仰今昔而不勝世道升降之感也從來書院之設本與學校相表裏晚近以來往往以講學之故致干時君時相之怒鳴呼此何為者也夫學也者學為聖學為賢也講也者講明所以為聖為賢之理俾知所從事也因其迹以考其心豈非宇宙之常經人生之切務而君師天下者之所樂聞而亟許之者乎乃或者從而嫉惡之至設為厲禁焉禁之不已遂不憚誅夷殛竄之加以流毒於當世嗚呼此果何為者也粤自削跡伐木而後吾黨之禍一見於宋紹聖再見於慶元嘉泰之間迨至前代熹宗之世而其禍彌烈矣世道淪喪國事隨之覆轍相尋曾莫之悟是可不為之寒心乎哉雖然撫今追昔反而内求吾黨亦當有分任其咎者矣盖小人之忌害君子也非必有深怨積恨誓不可竝生於天地間者也惟是平居立身制行殊途背馳不啻若薫蕕氷炭之不相入而所為君子其人者則又待之甚嚴絶之太過致若輩無地以自容又不幸吾黨之聲譽日隆交遊日衆一時標榜附和之子或未免名實乖違首尾横决遂未足以服若輩之心而適予以可攻可議之釁此同文黨錮之獄小人每悍然為之而畧無所顧也然則講學一事顧可以終廢乎是盖有道矣方今泰運方亨宇内壇席之盛蒸蒸蔚起嗚呼此誠斯道昌眀之一大機㑹也則願吾黨有志之士以嘿識為真脩以篤行為至教勿口舌軋擊以矜能勿意見紛拏以長傲尊賢容衆嘉善矜愚偕逰於大道為公之世而絶無所為怙已凌人之弊開當世以雌黄我輩之端此則國家化民移俗之至意而亦從古聖賢開物成務之極功也操斯術也以往將講學二字永為千古美談東林名勝直與天壤竝存可矣予生也晚嘗從先世遺書與聞梁谿之緒論兹幸逢是役之竣也為之盱衡往事不禁感慨係之因著為反躬刻責之言以自勉勵且為吾黨勸也吾黨其亦有以許之否是為記賜金園記張英予以康熙二十一年壬戌二月請急於朝為先大夫謀邱壠天子念十年講幄之勞特降手敕褒以敬慎勤勞賜以白金文綺甚渥予以賜金之半置墓田庋其半將以謀山林數畝之地為憇息樹藝之區避煩囂休晚暮誌恩澤也龍眠山去城郭五六里許巗巒層折谿壑深秀過石馬潭媚筆泉則益増水石之勝疊嶂盤互一徑而入中忽平衍田廬散布予二十年來欲卜居其中形於篇詠者數矣壬戌之歸此願益廹故人左子橘亭遂成予志畀以斯壤有池可漁有山可樵有田可以耕穫有圃可以藝植有堂可以燕息有松竹梅栗桃杏之屬可以資其䕃而攬其華爰因舊廬葺而新之堂向西山為西軒梅花下屋在堂之稍東為東軒别搆南軒北軒盖夙昔有四軒之志今粗備其製則香山所謂具體而微也古屋素題石堦土壁無丹漆之飾無臺榭之觀門且觸額徑不容軌獨其掩映於嘉樹美箭之中曲折於翠巘芳池之側平疇如繡村落環向皆憑軒檻可得而矚昔賀季真投老歸山隂賜以鑑湖一曲心艶其事而尚惜其去之晚也予遭逢恩遇出入禁闥為侍從親臣且得捧天子之賜金歸而營優㳺燕閒之地以朝夕寢處其中雖自顧文采風流不足以髣髴昔人而揆其所遇豈得謂古今人不相及耶予齒未衰而多疾性畏喧躭寂經歳之閒居城市者十之一二當風雨寒暑則掩闗讀書時和氣暄則散歩畦隴眺覽雲物延賞卉木衣粗茹淡識分知足期以終老於斯因以賜金名園濡筆而為之記所以誌聖主之恩述良友之誼示子孫於不忘耳賜遊西苑記陳廷敬康熙二十五年秋七月九日上在西苑召左都御史臣廷敬侍郎臣乾學學士臣英侍讀學士臣士奇編脩臣杜訥賜設於苑中近侍導臣廷敬臣乾學入自勤政殿左門殿門皆北嚮闢以順時宣令上親題額自警御以聼政事非猶夫避暑之宮追凉之殿也盖雖駐蹕所在未嘗一日不與羣臣相接見炎景仄而方食曙星在而求衣惟勤惟專由輔弼暨百司丞令之屬承寵問被清光亦無一日不得至於斯殿也自殿角趨南陟横廊徑小軒以西上講藝論思㳺息深嚴之地稀有得至者軒裁廣一楹顔曰知稼出知稼軒疎籬草花被徑周阿蕭然有閭井林野之思迤西數武秋禾方畝望之如雲前有亭曰秋雲英士奇杜訥三臣者先在焉階而升鵠立以眺維北之院曰豐澤維西之軒曰嘉頴自知稼至嘉頴盖皆取諸農事為義或采椽斥題不斵不枅或白屋版扉不施黝丹無綺寮重廡文鎞鏤檻之飾盛矣哉堯之土階文王之栝柱大禹之菲薄衛文之節儉也后稷公劉之所樹藝而無逸豳風之所書載也臣顧諸臣而言曰於戲上聖徳至矣吾屬慶遭逢辱恩禮其何力之能報諸臣皆相與讃歎皇恐稽首即亭中秩坐時久雨新晴激波映空動植遂暢魚鳥欣悦頃之芳筵載列而臣等凌兢震越就匕箸如不勝滋懼素餐食已中使就賜御書及内製法瑯塗金香爐瓶合各一玉軸寳題雲章爛然爐烟尚溫合有香實顧惟恩出非常心魂慙悸中使既復命臣等九叩首以謝既退竊自念曰古者人主推食加籩或寵以翰製或錫以御飾器物所以勸勞能待賢彦也臣田野窮賤才質璅微擢歴臺司日侍禁闥飫賜便蕃歳時霑被未有寸尺禆補而上意疊至如此此臣所捐糜難報之恩也已又念賢聖之君必恭儉勤民恭儉故親賢禮士勤民故重本興化而飬賢及民維古志之臣嘗誦詩而通其義焉觧詩者言由庚人君調隂陽育品彚萬物得由其道也南有嘉魚樂與賢也崇邱萬物得極其高大也南山有臺樂得賢者由儀萬物之所生各得其宜也詩之更相互見明得賢所以飬物也既天下無事澤及四海故次以蓼蕭湛露而燕賜之盛興焉以見夫得賢之效至此為極而為天下之所歌樂矣故又終以菁菁者莪也此非賢聖之君其曷能之兹者上恭儉勤民聖徳之至巍巍無極不以臣等之非賢而過禮遇之如此則夫巖穴道徳之士孰不思接迹王廷效忠竭智以䇿功名而顯當世哉此又臣之所深慶者也故竊附詩人之義既為詩五章以詠歌盛事又謹記之如此云皇清文頴巻十八
