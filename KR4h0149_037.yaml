body:
  text: 頌日月合璧五星聫珠頌有序張廷玉臣聞太平垂象萬年開昌熾之休至德召祥八表錫清寧之福察璿璣以齊七政治協人時握金鏡而式九圍道孚帝載是以兩儀順序綿景祐于皇家五緯成文燭榮光于盛世連珠合璧焜耀唐虞聚井會奎輝煌漢宋考鴻編之紀瑞傳奕葉以流芳欽惟我皇上表正建中重華復旦功深化育配兩大以成能道濟隂陽兼三才而立極備修已安人之學百度維新本敬天法祖之誠一元敦化顯懿昭于寰海纘聖祖六十一載之隆徽禮教賁于中天啓熙朝億萬斯年之景祚瞻雲就日合東西南朔以觀光航海梯山遍侯甸要荒而輯瑞揆文則髙懸珠斗五色霞騰奮武則一掃欃槍三台氣肅應時而出香飄甘露和風有感遂通秀擢竒葩異穎天心篤佑嘉瑞頻徵爾乃節屆中和日臨庚午八絃如鏡玉宇澄清七曜同躔烟霄霽朗周天三百六十五度當營室以交輝去地九萬一千餘程環京畿而拱極芒寒色正銀河映清淺之波玉潤珠圓碧落散斑斕之采固已五風十雨天下皆春兹且萬户千門人間不夜瓊華錯落雕几陳圖玉管玲瓏瑶臺測影仰一人之有慶識萬類之咸亨乃皇上聖敬日躋允恭克讓永思不匱謂有開之必先執德彌𢎞念方興之未艾堅辭賀典弗尚虛文祇告景陵用揚前烈然而作述濟美先後同符在聖祖貽謀衍慶之餘為皇上受祜迎禧之始所以鴻濛一氣帝座之呼吸可通宇宙重熙璿室之休徵畢至況值清廟告祫之會合萬國之歡心又近天田耕藉之期煥三辰之麗景精純上格積厚流光大孝神通誠中形外臣生逢泰運躬際昌時圗書領玉府之班版籍忝地卿之長日照月臨之下心切瞻依乾施坤載之中恩承陶鑄五事修而皇極建越四千餘嵗迓此𢎞庥三光正而泰階平統億兆黎民受兹介福由是文眀久照瑶樞永握以彌昌經緯孔彰玉燭長調而廣運于斯為盛自古無倫洵惇史之宜書以標珍貺叨近臣而作頌竊效賡歌聖人御宇德炳日星效天法地合撰清寧三才之義萬世之經璿圗凝祉大化流形一章日兮月兮合軌同輪五星爛兮環共北辰惟德動天惟誠感神貞符上瑞鍾于一人二章吉日惟午瑞應景命積厚流光天人叶慶五氣既和四序咸正端拱垂衣以齊七政三章皇帝曰咨肇祥有由聖祖懋德上下同流膺兹天眷申命用休薦馨祇告式昭貽謀四章於惟聖祖久道化成聖復承聖天下文眀大觀在上燦燦璣衡洪鈞一氣六宇澄清五章大孝備矣神眀幽贊善繼善述勵精宵旰道濟天下光華復旦乃賡載歌昭回雲漢六章粵稽世紀歷嵗屢千放勳盛軌七曜同躔𢎞開泰運直接中天駕彼漢宋焜耀簡編七章巍巍昊天惟帝則之聖德神功作君作師仁風愷澤浹髓淪肌純嘏天錫法象昭垂八章大哉皇帝謙德彌光照臨下土經緯煌煌四方來賀山海梯航撫于五辰受福無疆九章日月合璧五星聫珠頌有序勵廷儀臣聞哲皇建極兩大共其無私聖德升聞三辰為之叶應蓋天行本有常度而上瑞必際昌期彼夫懸象著眀莫大乎日月分精布氣莫重於五星粵稽上古之時肇始髙陽之代森八元之在列朗七曜以同躔復旦興歌仰重華於舜世首山憑眺紀五老於堯天三代以還斯祥罕覯彼漢帝入關之嵗與宋祖建隆之年雖東井奎躔曾並書於往牒而五星日月非告瑞於同時蓋恭遇我皇上體上聖之資值中天之運紹聞衣德炳謨烈於千秋敬天勤民懋緝熙於寸晷大孝通神眀而無外深仁合覆載以同符是以至治馨香格於上帝天庥滋至驗在陽春乃雍正三年二月初二日庚午欽天監奏日月合璧以同眀五星連珠而共貫宿躔營室之次位當娵訾之宫臣謹按易坤靈圗曰至德之萌日月若連璧尚書考靈曜曰五星若遍珠則風雨時又按天官所載營室為天子之宫娵訾乃天門之象旁連奎壁兆啓文眀總因我皇上孝德光昭貞眀感㑹以一身備仁義禮智信之全體故五緯聫木火土金水之淳精此誠羲軒以後所希聞奚止漢宋之時為莫逮於時陽靈初上素魄偕升垂寶珞於雲間絢榮光於天外重輪輝映雙呈趙氏之連城五曜齊眀錯列魏侯之照乘八方共仰僉頌有道之長百辟騰歡願上無疆之夀而聖天子彌深退讓歸美先皇謂上天今日之垂庥皆聖祖當年之昭格純熙嘉瑞願與天下共之敦實矢誠更敕諸臣交勉臣鞠跪丹庭恭聆寶訓敢再拜稽首而揚言曰大哉王言功成不有匪崇推讓之虛文善必歸親益表孝思之純篤是宜垂諸史册永昭大德受命之符被以聲詩用繼天保卷阿之後但念臣職慚窺管才匪探淵劒珮趨朝忝預星辰之列丹青蘸筆難繪日月之容敬上頌言十二章恭祝鴻圗千萬嵗其辭曰皇矣上帝鑒觀維德德之休眀以引以翼報以休徵表兹皇極三辰順行宿離不忒一章容成司象羲和授時土圭正景渾器著儀七政運行或速或遲同躔並舍厥待昌期二章亹亹我皇受天休命丕纘鴻基重熙纍慶睿知聰眀文武神聖繼序其皇靈承維敬三章至誠感召誕降庥祥三年二月春日載陽二曜同度五緯齊光連珠合璧炳朗輝煌四章合璧維何化成麗正若木初升清輝交映玉金烏雙圓並瑩隂陽和同天人叶應五章連珠維何五色相宣嵗為春木紀一周天先居亥宫四星從焉晶熒的皪繩貫絲聫六章和璧隋珠會於營室清廟肅雍天門蕩詄前列羽林旁羅奎壁赫赫眀眀天文堯則七章繼眀以照日月在躬水火金木土德居中五事敬用厥類從同我皇仁孝執德彌沖八章曰余一人纘承大統夙夜兢兢萬幾是總敢曰德馨荷天之寵瑞本先皇太平垂拱九章純禧駢集錫祚垂光綿綿善慶百世其昌致兹嘉瑞七曜同行肅告陵寢陳時福祥十章維此福祥錫厥臣庶上下交欣中外純嘏六府孔修五行順布百榖用成庶草蕃廡十一章三靈既奠萬福斯來臣司喉舌拜舞蓬萊敬頌萬年日星昭回美矣盛矣唐哉皇哉十二章日月合璧五星聫珠頌有序田從典臣聞惟德動天有孚斯應惟天祚德列象攸彰互照重輝之盛上紀昌時聚房居翼之祥逺稽帝代皆由至道充備而綏祉聿臻元氣𢎞敷而嘉徵丕著然未有二儀寧謐三辰表式序之期萬類咸亨七曜煥連編之彩昭然上瑞皎若合符如今日者也欽惟我皇上治邁唐虞仁同覆載禀知臨之宜德備乎有容有執有敬有别具廣運之量詣極乎乃聖乃神乃武乃文泰交洽而咨警臣鄰巽命申而敷陳彛訓臨雍講學攬金聲玉振之大成耕藉觀農親黛耜朱紘之盛典廣虛受之益聖不自聖而猶勤𢎞好生之心刑期無刑而彌慎四海梯航重譯貢越裳之鳥萬方玉帛南車消涿鹿之兵神蓍翠菂之生雲霏霧集瑞麥嘉禾之慶嵗見月彰兹御極之三年屆仲陽之吉月葭管候氣而律應夾鍾蓂莢依時而榮舒二葉表祥符於峻極式元象於髙穹珠聫五緯之光璧合雙輪之麗輝煌瑞色上映丹霄炳耀澄暉遙瞻碧漢位當營室翼清廟之巍巍宫在娵訾肅天門之靄靄一隂一陽之道鼓舞以盡神合眀合序之機黍纍而不爽協氣周夫八極祥光入於九重粵自顓頊歷元以來推夫羲和嵗成之後於今尤盛自古為難乃聖治極於光華皇衷肅於臨保惟知敬以作所豈止謙而彌光旦眀則昭事惟嚴陟降而丕承無斁載瞻嘉貺篤念貽謀爰考典儀展忱孝享馨香俎豆用偕至德以升聞璀璨絲綸聿俾普天而同佑夫神雀甘露尚紀編年寶鼎芝房猶聞樂府垂諸史冊奉為美談何况握金鏡而照六虛斡璇衡而齊七政聚而成象昭寶運之昌隆煥乎其文協至人之光被臣愧參調鼎未識挈壺荷遭際於聖朝飲和最渥幸躬逢乎福祐志慶宜先瞻天彌峻無假稱美之文就日增榮願效賡揚之義誠惶誠恐稽首頓首而獻頌曰皇自敬德協於太清光宅大寶茂育羣生湛恩汪濊萬化順成攝提有紀分野是經璣璇衡應擢曜抒英眀眀象緯歸我章程一章月在夾鍾春陽載始五星並躔二曜合軌天漢光華閣道迤邐營室之次兩兩相比康阜告徵文眀志喜聖主垂裳乾坤儲祉二章歷宗肇紀實自髙陽盛德而應厥惟陶唐東井奎壁千載相望合璧抱彩連珠耀芒順合其則動而有章式昭聖瑞神應無方三章於穆天命宅中有孚發揚景運握持昌符麗天久照拱極華敷環回輻輳黍纍不渝心通帝載功齊化樞元吉在上光被海隅四章乘乾撫運履泰臨宸祥風淑氣厚澤深仁蟠際上下協和人神三五隆軌繁祉薦臻眷念鴻烈肅爾眀禋顯顯令德福祿天申五章皇極有建錫我民極纍洽重熙休光允塞天地清寧三辰受職郅隆既登敬修彌飭履厚戴髙賡歌帝德夀域𢎞開於萬斯億六章日月合璧五星聫珠頌有序福敏維聖天子御極之三年大化旁流仁風翔洽上天嘉應昭示休祥乃仲春二月庚午之旦日月會於營室五星聫絡晨見占象者曰是謂日月合璧五星聫珠上古聖世嘗一見之曠千百年不可得遘我皇上至德格天適逢斯會慶莫大焉一時在廷諸臣合詞稱賀請御殿受朝皇帝抑而弗居曰此聖祖仁皇帝六十餘年福善積慶之餘也其薦告景陵以昭嘉祥所自朕惟兢兢業業嘉與大小臣工矢誠心敦實政仰答上天之眷祐祇承皇考之𢎞猷若張大崇飾侈陳賀典朕無取焉羣臣懇請至再皇帝再沛德音堅讓弗允於是羣臣相與言曰乾象之昭眀若彼而聖意之謙冲若此臣等既不獲拜舞殿陛抒歡欣之情茍緘默遂已無以示後如虛逢景運何乃相率為頌歌以獻冀昭兹簡編揚厲萬一臣叨沐恩光最近且久幸覩嘉瑞恭繹眀綸仰見我皇上聖德廣逺有昭事上帝之誠心焉有善則歸親之孝思焉有遇祥而警不侈符瑞度越百王之卓識焉以此三德欽若昊天靈貺所臻必且崇衍鴻龎錫美無極臣不勝歡忭謹拜手稽首獻頌曰倬彼七曜為章於天次舍有度其儀不忒不期而聚亘數千年昔髙陽氏定為歷元精英旁薄轉斡璣璇我皇神聖建極乘乾適膺景運兆符於前夾鍾應律􅜈鳥翩翾日月所會營室是躔五緯同次娵訾之垣陽精宵朗華晷晨鮮璧影交映珠輝駢聫杲杲晧晧熒熒麟麟瑞色映靄祥光清妍二氣欣合萬靈同歡嘉貺炳煥帝德廣淵天眷有自豫何敢專修德弗懈展孝益䖍禮官承命祇告寢園榮光奕奕松柏丸丸陟降帝右錫福孔蕃安阜殷盛昌熾綿延協和上下洋溢寰埏超軼萬古焜煌史編日月合璧五星聫珠頌有序蔡世逺臣聞天開景歷表儀象以垂庥德協乾行彚祥符而昭應惟神眀之默契自經緯之潛孚凡當極盛之朝必顯非常之瑞然而司天入奏惟是星輝雲爛之文太史登書無非日麗風和之兆乃若三光聚舍七曜同躔合星辰日月以聫暉應元會運世而罕見溯休徵於上古傳盛美於伊耆欣承隆運於中天快覩嘉祥於聖世欽惟我皇上堯天復旦舜日重華行健勵精贊兩儀而成化體元廣運乘六位以當陽時維御極之三年令值春眀之二月仁風普洽陽德方亨慶兩曜之重光瞻五星之聚彩恍天衢之輯瑞琮璧煒煌儼玉殿之齊衡璿璣璀璨海天濤湧雙丸如夾鏡齊飛斗極雲開五緯似編珠並綴祥光繚繞遍八表以騰輝瑞靄繽紛近三垣而拱極而况日維吉午恰符景命之辰時正清晨實際升恆之始舍在娵訾之度位屬乾宫次當營室之躔星名清廟將行吉禮示至仁大孝之徵特顯苞符昭峻德鴻功之應雖曰聚奎聚井曾標漢宋之書至若且合且聫逺嫓唐虞之代百寮競覩一時嵩祝喧天萬姓均瞻四野歡呼動地而乃乾𠂻益懋巽命謙承辭大美而不居表䝉庥於聖祖却賀箋而弗受謹告瑞於景陵是天意凝禧洵獨超於萬古而聖心躋敬更逺邁於百王矣臣世逺猥以庸愚備員禁近瞻雲就日慙握管之難窺紀月編年喜簪毫之多慶謹拜手稽首而作頌曰太極渾淪兩儀肇分五行順布遞嬗絪緼其氣在天斯成七曜其理在聖斯成王道王道之成會其有極惟純乃備無非天德惟天之德聖祖肖之聖祖之德皇帝紹之皇帝膺籙放勳嗣嚳天心默佑錫兹祉福錫之維何猗歟孔多山川清晏風雨休和詩咏降康史書大有穟穟嘉禾盈於千畝祈榖圜丘同雲沛澤先天弗違應念斯獲惟兹庶徵至治之輝乃瞻上瑞純德之歸紀年當三嵗次在已朝野升平賡歌喜起時維卯月萬彚句芒和風翔洽淡蕩春陽吉日庚午天齊七政燦燦旋樞何徵非應其應維何淺莫測之管窺一二若或得之曉籌初報曙色曈曨咸池騰旭焜耀珠宫曰若聖祖合體乾剛皇帝敬承健行有常緝熙於爍周於八埏是用會合為章於天粵有太隂同度齊行儼如雙璧異彩晶瑩曰若聖祖中和參贊皇帝敬承剛柔合撰以位以育繼照重光是用會合如圭如璋木德之精厥名維嵗其位東方豐登之瑞曰若聖祖仁育黎首皇帝敬承恩敷九有年榖順成恱豫且康是用來聚降福穰穰南方有爛伊維火德居丙位離文眀是宅曰若聖祖丕承禮教皇帝敬承於昭大孝聲律身度經曲燦列是用來聚有文有節位中央者厥名曰鎮土德所鍾光眀黃潤曰若聖祖秉信立極皇帝敬承至誠無息格於上下神人以愈是用來聚萬邦作孚西有長庚德旺於金齊其躔度光彩森森曰若聖祖精義入神皇帝敬承裁制洪鈞惟精惟一執中以運是用來聚宣昭義問辰星在北清影澤澤是惟水德淵涵澄徹曰若聖祖睿智首出皇帝敬承亶聰若一普天坐照如日方中是用來聚昭眀有融惟兹日月協於隂陽惟兹五星應於五常若龍之圗爻象顯設若龜之書九疇燦列是昭至德廣大精微爰標竒瑞集福承祺伊惟上古陶唐之世璧合珠聫遙遙盛事道統冶統堯始眀之四千餘載皇帝成之丕顯丕承其道大光欽眀恭讓光彼平章昊天垂象符兆顯然二儀叶度億萬斯年日月合璧五星聫珠頌有序張廷璐臣聞感應莫捷於天人嘉祥必彰於神聖故精誠孚格則七政均平至治光昭則三辰式序升扶桑之赤馭抱珥流輝映仙桂於銀蟾重輪叠彩分躔次舍五行之秀氣凝精同色順方列宿之庥徵著兆是皆表光華於象緯所以昭運會之昌眀然而時不易逢美難兼備惟治化當郅隆之世斯天文標萃聚之竒欽惟我皇上大孝綏猷至仁御極敬天法祖深宫嚴對越之誠育物諴民寰宇戴彌綸之澤撫五辰而凝庶績道合乾坤調二氣以敘九功業隆參贊教崇四術鸞旗蒞而璧水香浮禮重三推鳯輦臨而青疇色潤昭武功之赫濯逺域來庭煥文治之光輝遐方入學維聖祖六十餘年之怙冒既纍洽而重熙我皇上一日萬幾之精勤更繼志而述事洵德化之昌隆已極故蒼穹之篤愛彌殷祈年而甘雨應辰秉耒而祥禾被野寢園鍾慶靈草叢生內殿迎熏嘉蓮並實瑞方頻見史不勝書今者節屆中春度推營室日月同躔而璧合五星聚舍以珠聫當乾宫集曜之辰正吉祫告䖍之會層霄朗霽耀精彩於微垣淑氣冲和燦榮光於北極逺稽盛事直接唐堯載考陳編更逾顓頊漢初聚井未足擬此嘉符宋室會奎豈能方兹珍貺蓋誠孚一氣皇上惟以繼聖祖者繼昊天則慶協三光昊天即以眷聖祖者眷皇上誕膺多福洵有感之必通特著竒祥信於兹而極盛乃皇上孝思不匱謙德彌光歸至善於貽謀肅將禋祀遍羣黎而錫福爰布德音却稱賀之虛文勵交修之實意黼扆之欽承倍切瀛寰之歡忭同深惇史摛豪輝騰汗簡小臣獻頌敬附衢歌頌曰維皇御宇體元建極以聖繼聖重華懋德敕天之命寅恭嚴翼惟時惟幾宵衣旰食心周八表明昭九區德威遐暢聲教覃敷文經武緯天苞地符澤洋恩溥海澨山陬庶績咸熙一人有道作述同揆猗歟大孝通於神眀天心感召繁祉純禧惟德是報隂陽以序風雨以時雙岐九穗嘉穎紛彼豐年穰穰民物恬熙賁若草木咸著靈竒二月初吉司天告瑞娵訾之宫營室之次二曜同躔五緯咸萃規璧雙符寶珠聫綴瓊霄澄湛麗彩繽紛祥光布濩瑞氣氤氲煥乎垂象蔚矣成文沖融晨靄絢爛晴雲位屬乾宫曰當景命陽德方宣春和布令天廟熒煌三垣輝映萬福之符萬方之慶中天瑞應粵在陶唐四千餘年上元相望欣逢泰運重覩嘉祥史臣載筆焜耀縑緗聖心彌謙聖孝彌篤推本前徽慶鍾詒榖嘉與黎元共兹介福大美不居皇衷淵穆惟天眷德惟德動天聖祖積慶有開必先我皇紹統景祜綿綿升恆臨照億萬斯年萬年頌有序徐本臣聞德協清寧永建億年之景運勳函宇宙式膺萬載之貞符穆穆淳風仰溯循蜚疏仡彰彰鴻業遐稽鳥紀雲官從來神聖之挺生必得岡陵之上夀乃自陶唐之後幹支之承敘昭然載陳無逸之書殷周之歷年可數始知寶籙瑶圗之篤慶至今日而加隆三辰五嶽之迓祥冠中天而首出欽惟我皇上廣運齊堯光華軼舜心參化育宏陶鑄於三才道貫苞符煥經綸於四府格穹答昊勤宥密之緝熙纘緒承謨凜儀型之夙夜薄海厪尊親之戴普天䝉仁夀之庥史冊之所絶無古今之所僅有爾其德由天縱道積淵修集金聲玉振之大成一中允執綜東壁西清之祕要萬卷森羅濬洙泗之長源師表尊夫萬世揭紫陽之正學俎豆列於四科天藻輝煌制作逈髙百代御書炳耀榮光上燭九霄經筵勤典學之規岸先登而弗懈律歷顯探微之論鏡屢照而常澄文柄宜嚴慎選提衡之任賢關既敞益𢎞登俊之途聖人之誕敷文德也乃若削平藩鎮跨唐時雪夜之功掃蕩海氛軼漢世樓船之績永清漠北殊方服威德而奉天朝逺震西陲絶域荷生成而編屬國或六軍親總行間瞻神武之布昭或一將宣威閫外賴宸謨之指授祁連積石俱傳振旅之銘崑崙析支益謹織皮之貢聖人之耆定武功也至於深籌疏瀹北河垂永定之名仰賴平成髙堰障清淮之瀆使畿輔咸為沃壤東南胥慶安瀾而且修問俗之文舉省方之典廣勵臣工勤施政事小亷大法內外無不飭之官方綱舉目張巨細無不熙之庶績聖人之開物成務也及夫環九州之域遞賜田租酌太倉之儲并蠲漕運計數輒踰於千萬施恩不啻於再三况嘉石風清祝網而頻加寬釋圜扉春盎按律而屢減重條治期底於無刑仁每加於法外聖人之行慶施惠也由是道隆而福備德盛而化神受小共大共受小球大球梯航畢至莫敢不來享莫敢不來王冠帶駢羅天馬狻猊悉歸苑囿華平朱草紛秀階墀而皇上以民安俗阜為嘉祥以嵗稔時和為上瑞屏封禪而弗事辭鴻號而弗居操持主敬之心周浹好生之德動靜咸歸於至正謨謀必計夫萬全極剛健中正而粹精配博厚髙眀而悠久惟至誠之無息信久道之化成兹者嵗紀重光甲子周而復始歷開萬葉純嘏引而彌長八紘騰華祝之聲六幕會嵩呼之響三垣拱北璿璣映南極之輝萬派朝東嶰竹叶西池之琯天人洽慶海宇同春臣世沐恩波深叨覆露矢心感激竭志賡揚謹按小雅天保之章詒福而稱萬夀大雅江漢之什錫祉而頌萬年昔為祈祝之詞今驗綿長之實謹拜手稽首而獻頌曰皇帝御極恭已垂裳仁育義正德洽萬方保定孔固長發其祥堯眉益夀軒歷彌昌睿知聰眀上達天德聖性安安聖修翼翼聲律身度不聞亦式緝熙光眀繄敬之力造我區夏山川砥平道兼創業光啓守成櫛風沐雨嵗時巡行自强不息乾健是程南郊告䖍眀堂宗祀必躬必親齊心敬止對越馨香精嚴祝史萬國駿奔錫福受祉九重典學乙夜加勤經經緯史旁羅藝文奎章揮灑焜耀卿雲羣臣雒誦億載揚芬夀考作人譽髦斯士於論鼓鐘傳於璧水載歌鹿鳴載宴聞喜人文化成彬彬遐邇帝揚武烈睿算如神掃除三蘖海島悉臣天山掛弓屬國歸仁奠安荒服玉關無塵帝念民依恩敷禹甸綏萬屢豐蠲租嵗遍桁楊久卧和風永扇闓澤大來海隅清晏地平天成以水為端北河南堰底績回瀾六龍屢幸圗民乂安功髙姒氏敷土隨刋帝勤萬幾尤敦儉朴日是不遑衣存浣濯崇政邇英日親講幄咸五登三皇猷卓犖祥符瑞應溢於簡編帝心所向孝弟力田嚴恭寅畏勿懈益䖍堂堂夀域光被八埏玉歷無疆昌辰欣覯閶闔洞開簫韶迭奏大小臣工奉觴輻輳天子萬年與天齊夀河清頌有序朱軾欽惟皇上御極之四年嵗丙午十二月黃河自龍門迄徐沛淮宿二千餘里湛然澄清歷有數旬河臣齊蘇勒等次第奏聞廷臣再疏恭請皇上升殿受賀聖德謙冲誡勉羣臣交相警惕惟念聖祖仁皇帝在天默佑之靈䖍告景陵并祀河神以答靈貺仰見皇上祇承天休敬之至也善則歸親孝之至也臣軾以菲才猥䝉恩眷日侍內廷瞻仰穆穆之光皇上學貫天人道符易簡奧㫖微言時形於講論臣敬誦而服膺者素矣今景福駢集諸祥備應成於聖治之感孚尤本於聖心之昭格竊願推眀其理以為揚頌之實焉自古論治者以天心仁愛為言而宋儒又云天地無心而成化此兩言者皆善言天者也天本無心而謙則福惠則吉其應如響人君受福於天亦人君自有致福之道焉爾臣恭聆皇上之訓曰天心何在即在君臣之身而已大哉聖訓天人之道備於此矣蓋聖人以中和之德成位育之功天地之位即天地之中也萬物之育即萬物之和也天地之中萬物之和即聖人之致中致和也是故天地清寧而寶道呈非髙逺也乃聖人之自茂其栽培萬物亨嘉而靈竒出非神異也乃聖人之自勤其篤祜景星慶雲猶根心而生色川珍嶽貢猶睟面而盎背麟郊鳯藪器車銀甕之屬猶之施於四體四體不言而喻也皇上繼天出治聿懷多福日月五星珠聫璧合嘉禾疊産至有九穗十三穗之竒其餘休應不可勝紀今復有河清上瑞皆皇上盛德大業之所自有非天之所得而操其柄者也程子定性書有云天地之常以其心普萬物而無心聖人之常以其情順萬事而無情廓然而大公物來而順應夫能廓然大公則此心極其清眀而與天相似矣要惟至聖達天德者能之皇上秉天縱之資而勤於典學擇精守一左右逢原嘗於周易及四子書中訓示數條開發䝉瞶謂無極而太極太極即無極也太極生兩儀兩儀即無極太極也太極之外無兩儀兩儀之外無無極太極中庸言誠者物之終始物即誠也體物而不可遺者即物而體具非物在而别有以體之也孟子言惻隱之心仁也羞惡之心義也人心清眀之體湛若太虛無所謂仁無所謂義時而惻隱而仁之端見時而羞惡而義之端見若先安排一仁義於胸中恐仁非仁義非義矣臣學識淺陋不能窺測萬一然恭繹至論探本窮源徹上徹下較定性書所言誠有深切著眀者仰見聖天子洗心藏密一理渾然純粹以精而淵泉時出發見當可以是事天事親自郊廟對越以至出入起居至誠至敬不顯亦臨無射亦保推之用人行政之間黜陟命討協於大中因革損益歸於盡善斯所謂廓然大公物來順應皇上之心與天之心實有相似而不違者昔羲皇之心與天合河出龍圗則而畫之為八卦孔子贊之曰無思無為感而逐通蓋八卦之理如是羲皇之心體亦如是大禹之心與天合洛出龜書法而陳之為九疇箕子衍之曰是彛是訓於帝其訓蓋九疇之理如是大禹之心體亦如是今河清之瑞與河洛苞符同一感召八卦九疇之理會通於聖心而發皇於萬象乾元之聖作物覩先天弗違皇極之錫福庶民會歸有極無有逾於今日者矣率土臣民莫不舞蹈踴躍歡聲雷動而皇上謙讓弗居詔示中外謂此祖德也神貺也朕何有焉又進廷臣而命之曰弼贊盛治以輔豫一人惟諸臣是賴其益加警惕以迓天庥從此豐年穰穰家給人足化行俗美斯為郅隆之治斯為莫大之祥也猗歟盛哉皇上以愛育元元為心而廣大髙眀敷於四海百爾臣工以皇上之心為心而靖共正直公爾忘私日月照臨之區凡有血氣之倫亦莫不以皇上之心為心而從欲風動於變時雍合君臣上下之心以契合乎天心太和洋溢協氣旁流保佑申命曷其有極臣不勝誠歡誠忭拜手稽首作頌以獻其辭曰天得一清地得一寧顯仁藏用並育並行在天成象在地成形聖人首出範圍曲成格於上下四表光被寶道疊呈貞符備至遐福無疆不可數計惟兹黃流復獻嘉瑞吕梁之湍龍門之駛瀠風澄徹蕩滌渣滓鳬鷖蕩漾遊鱗可紀纍旬如斯二千餘里時維嘉平陽德方亨吹豳飲蠟􅎆鼓和鳴衢巷歌祝喜起盈廷歡呼雷動躋堂稱觥皇心廣運德盛禮恭曰兹休應匪惟朕躬欽我聖祖默啓天衷䖍修祀事崇德報功受天之祜惕若彌堅用誡羣臣尚其勉旃緝熙敬止廣大配天兆民永賴於萬斯年河清頌有序張廷玉皇帝御宇之四年冬十二月初九日黃河澄清自陜州至于桃源二千餘里瀕河之民白叟黃童踴躍趨視以為竒瑞至五年正月尚澄徹如前河撫諸臣相繼奏聞于是諸王文武大小臣工歡欣抃舞合詞而稱曰此聖治之祥符也表請御殿受賀皇上渙發德音訓諭羣臣却頌美之儀文眀感應之至理推嘉貺之所自仰聖祖之垂庥特命祭告景陵以展孝敬復以隄工甫竣瑞應適彰致祭河神以崇報享又以天祖錫福皇躬爰推恩澤溥及臣下聖德謙冲恩施浩蕩誠自古所未有也維時文學侍從之臣作為歌詩紀述盛事恭進宸覽臣叨掌院篆職宜敷揚美盛為羣臣先臣聞傳紀所載黃河水清聖人之應然稽之往代千載一覯且為地甚近又暫時偶見而已今則境連四省期邁三旬史冊所傳莫能嫓美况我皇上御極以來海宇清寧太和翔洽天休滋至上瑞駢臻在天則有日月合璧五星連珠甘露瑞雪之應在地則藉田嵗産嘉榖多至九穗直省所在見告乃至十有三穗他若山川寶玉上林草木之祥不可勝紀今兹河清之瑞復超越前古蓋我皇上以至誠之心至敬之德孝事聖祖欽若昊天以及敷政宣猷建官察吏振綱肅紀激濁揚清四海之廣九州之大民生之所以厚民德之所以正仁漸義摩禮陶樂淑宵衣旰食日理萬幾眀目達聰惠周六合無非本至誠至敬以運之是以上帝鑒觀休嘉疊見昭升平之大瑞為載籍所未聞而我皇上聖不自聖益以至誠至敬承之天祖之申錫方隆黼宸之寅恭倍切其在書曰至諴感神又曰敕天之命惟時惟幾詩曰小心翼翼昭事上帝聿懷多福蓋古帝王所以凝承景貺基命宥密者胥在于此臣日侍內廷伏覩我皇上誠敬之心洵有如詩書所云者固宜迎善氣以迓鴻庥綏福履而綿寶祚矣而且聖慈溥被謙德彌光念百職之微勞沛恩綸於中外昌符嘉應我皇上以至誠至敬之心致之者而歸美于臣工之襄贊則內外諸臣叨沐恩榮黽勉夙夜其所以仰體皇上誠敬之心以自殫其誠敬之道者又當何如也且夫躬盛德者召嘉祥嘉祥既集而盛德益崇則福應亦必愈盛天人感召其理灼然著眀我皇上當福應蕃昌嘉祥畢集之時益懋聖德存誠主敬日進無疆覩已往之休徵驗將來之福慶將見純嘏繁禧單厚多益振古希逢之瑞悉見于今詩云如川之方至以莫不增河清其先兆矣臣恭聆眀訓亦不敢襲頌揚侈大之詞干瀆清聼謹敷陳聖德拜手稽首而獻頌曰巍巍聖皇德合天地兢業為心勵精圗治維誠維敬孝思不匱監于成憲格于上帝萬邦咸和百嘉鬯遂川瀆呈祥於昭上瑞瞻彼黃河源于天上星海騰波崑崙疊浪積石瀠洄龍門激蕩橫亘坤維百川所向九曲逶迤秋濤春漲快覩澄清實為神貺爰當聖世陽侯效靈素波浩浩碧漪泠泠光連銀漢滉漾渟泓日星輝映冰鑑晶瑩以彰至治以應太平圗籙所紀咸曰休徵昔聞其言今果覯此自豫及徐二千餘里期越三旬湛然徹底兆姓歡呼萬目共視臣工欣慶瀛寰忭喜瑞超往牒光騰青史欽惟聖祖陟降在天我皇大孝思慕彌䖍善繼善述夕惕朝乾誠敬感孚鑒觀昭然上蒼眷佑錫福綿綿天符地産嘉應駢蕃聖治益隆綸言申戒咨警倍加精勤弗懈昭告景陵恭承嘉賚錫慶臣僚湛恩汪濊祇若天心諸福來會保佑申重於萬千載皇清文頴卷三十七
