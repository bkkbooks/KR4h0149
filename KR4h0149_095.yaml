body:
  text: 詩七言排律讀性理有感理密親王允礽自啓苞符河洛川日星垂曜麗中天溯從洙泗源流逺遞接濂閩統系傳薪盡一燈時可續月隨萬𣲖總成圓盛朝道法崇前聖正學昌明炳昔年經訓菑畬勤講殿儒宗闡繹表遺編潛心擬向針芒析觀理還期閫奧穿桂苑凉生風拂座蘭堂晝靜影移磚寸蠡響滴銅壺㸃睡鴨香飄寶鼎烟棐几每陳緗帙滿牙籤徐展縹囊鮮存誠爰識乾坤始立極能開象數先直取圖疇包二五俄看禮樂備三千功兼敬義須交朂候别知行貴不偏銘列東西皆要旨篇分內外悉真詮偉哉槖籥含元化宛爾羹牆對昔賢盥手丹鉛恆矻矻服膺指趣特拳拳浮華漸覺巵詞淺窅突憑將勝諦研細味如抽絲繭緒旁搜似燭蕊珠淵玉盤綴露晨常浥蓮炬騰輝晚更然鞶帨豈云資誦說鑽摩庶用弼仔肩就將夙夜求無忝探賾鈎深尚勉旃御苑恭賦慎郡王允禧蓬萊别館鬱蒼蒼簾幕薰風日正長自有清機生水苑更無煩暑到山莊窗前密竹添晴翠池面新荷度逺香落落星巖飛瀑布隂陰輦路夾垂楊銜恩好鳥迎仙仗戲藻文魚近彩航嵐氣祗疑臨户牖苔花似欲染衣裳平臺雨過同秋爽髙閣雲歸起夕凉最是萬幾方暇晷援琴早識兆民康奉命統師北路示諸幕僚平郡王福彭萬里專征著戰袍微材私愧特恩邀親承睿算辭丹禁獨領王師出絳霄熙代武功垂逺略潢池小醜㺯天驕旌麾耀日龍鱗動翡翠凌雲豹尾飄虎旅三驅連鐵騎熊羆千合接銀鑣廟謨久巳膺戎狄文德今將格有苗作頌情欽周吉甫收邊事異霍嫖姚令嚴笳鼓威儀肅營列旗常部伍招精鋭六軍功易建往還萬里路非遙至仁耆定知無敵好畫凌烟答聖朝南苑大閲恭紀張英翠輦乘時駐翠微六軍講武近南畿禮嫺搜狩遵王制夢叶熊羆合御圍七校騰驤誇虎旅三驅指顧視龍旗弓彎明月垂金勒人度春風動鐵衣鎧甲光疑林雪滿驊騮色鬭嶺雲飛普天雷動鉦聲出捲地風鳴獵騎歸翡翠旌麾翻曉日珊瑚鞭影入斜暉玉盤晚進黃羊熟金彈新開白肥盛代豐岐皆宿將清時頗牧在彤闈選徒自昔聞搜乘治外當今賦采薇常藉羽干昭聖德還將戈楯耀天威儒臣載筆慙謳誦緯武經文歷代稀賜宴瀛臺迎薰亭紀恩陳廷敬右掖南薰水殿凉宸逰此日命瑶觴宜春小苑通平樂太液神池接建章金瑣北連馳道合銀河西繞禁垣長依稀晝漏傳鳷鵲宛轉霓旌下鳳凰映曉紅蕖難辨影回風碧落只聞香巳同葵葉傾朝日不與春華競艷芳山雜夏雲峰四起林含時雨樹千行仙查逈拂滄溟外錦石曽支日月傍雁沼芙蓉開别館龍樓花蕚集諸王公卿渥澤來丹陛侍從殊榮值玉堂宵旰至今勞聖主拜揚從此見明良移將綵仗趨長樂不待簫韶出上陽翠渚張筵雲幕濕雕盤列爼繡綃黃天杯泛露承仙掌寶鼎調蘭飫尚方深重皇情同海嶽逍遙睿賞在林塘蓬萊嵗月春何限魚水君臣興未央會見賜酺歡父老巳看燕樂遍巖廊詩成宴鎬如周后曲奏橫汾陋漢皇御藻昭回騰紫極詞曹翰墨侍明光清時不獻長楊賦此日謳歌國步康瀛臺賜宴紀恩詩有序彭孫遹皇帝踐阼之二十年七月二十一日召滿漢諸臣五品以上及翰林科道官賜宴於瀛臺侑幣既頒上尊是錫溫綸叠布慰藉有加禮成復有蓮實菱藕之賜羣臣咸醉飽而出稇載而歸感戴皇仁淪浹肌髓臣小臣也猥以備員史官䝉被恩澤優渥踰涯罄竭涓埃髙深莫報敢循官司之掌竊申頌禱之情敬上七言詩一首凡千有四百字為一百韻具述聖天子所以勸勉臣下德意至深至厚庶宣美於今兹益揚休於來葉詩曰瀛臺仙衛展皇儀瑞靄氤氲曙色披方切怔營瞻紫極忽聞宣喚出彤墀濫竽執簡慚官守錫宴承筐荷主慈是日山河殊爽塏神州景物正恬熙飛葭玉琯仙飈應聼竹金門素律移殘暑回凉晞湛露薄雲籠曉漏朝曦共欣下濟光明會並命來游陟覽時西極嵯峩銀作榜北溟漭沆璧為池麗城逈接朱霞表復道斜縈淥水湄太液中開波浩蕩繚垣遙屬路逶迤芳荃橈傍圓沙駐彩鷁舟從曲岸檥歘爾乘槎疑近斗偶然泛海欲排崎雙丸吐納隂陽剖萬象溟濛宇宙彌似有河源千里注更無地軸九垠垂稍窮津涘舒孤眺漸近川原辨四維輕櫂隨流㳂復泝清暉入抱憺相怡白蘋嫋嫋瀟湘渚翠荇叢叢雁鶩陂百尺修緡搴玳瑁一奩明鏡拭琉璃練江不動纎蘿影珠浦長涵片月姿鼓枻重教緣菼薍疏渠别為貯瀾漪頗饒菰蔣紛漂泳最好芙蕖靜旖旎嫮質雅堪香霧耀靚粧微向午風欹瑶翰競㺯沈浮態瓊翮留棲婀娜枝戲葉喁喁騰錦鬛巢莖往往躍蒼龜舊傳閬苑應非幻親到鈞天却自疑便擬凌霄聽廣樂妄希刷羽漸髙逵丹梯黛壁環相映紺宇紅亭恍在斯鉤盾田塍原綺錯建章宫觀恰星摛樓迎灝氣融銅掌殿倚晴空敞繡楣緹幔徐褰翔鳳咮畫橋平偃宛虹鬐槐隂結蓋苕苕立蘭氣生襟細細吹佳卉芊綿青羃䍥層嵐縹眇碧厜㕒景移栝柏娛澄旭籟發松篁韻逺颸是處祥烟浮藻井數行緑樹隱罘罳當軒始爇煎螺篆遣仗初收拂霓旗文囿何妨來雉兔堯階仍未剪茅茨因無闕政封章少為有元音刻漏遲倚佩尚思求共理揮絃猶復致疇咨聖朝不隔堂廉義天語猶申慰勉詞鎔埴由來歸大冶恪恭咸此賴洪施合樽旋召華裾集束帛驚看寵賚隨八繭新繅三就采七襄舊紝五總絲比聞王化追覃葛盡斥穠裝曵薄絁况遇至尊凝黈纊僅教致美在宗彝弋綈自御班朝服織貝偏充好用資彌覺皇仁被體重敢渝臣節上衡持席衣遂得䝉安燠旅食還當示等衰坐接孤卿交履舄人偕伯仲和塤箎蕙纕暫解何容裔艾綬爭懸倍陸離小藉柔苮羅席几半拈弱錫就盤匜宰夫飭具羞鉶豆酒正程材薦醴酏炊出雕胡光可鑑溲來粔籹滑於飴饌行鵝炙薌薰品羮芼蓴菹草木滋糝入茱茰名上醬齊成芍藥作凝脂泄宣辛烈需椒桂雕鏤廉深視鼎鼒自是烹人調水火非關肉吏别澠淄再逄列籞供蕡實適值司罍授縹瓷會見繁昌徴物産并將恭儉訓官師赤心先餉重針棗雅操誰當飣座梨的爍珍苞噴秀液繽紛碩果挹寒澌分甘乍喜身多幸佐飲真令樂不支蒲阪桑醪攢琥珀酃湖芝醖潑酴醿漫勞膳士酬加觶特遣親臣勸媵巵執法詎須憂豸史屬車寧必羡鴟夷滌煩頓釋相如渴沈陸堪忘曼倩饑欲對酒鎗成蜾螺劇憐茗碗瑩蛟螭龍團乳暖春盈握雀舌香濃雪滿匙酣洽可無吟蟋蟀低徊又見薄崦嵫侵尋執燭防情溢傴僂循墻厪職思卜晝禮成皆醉飽自公辭退又將貽析酲薯蔗徒虛語消食檳榔亦謾辭荷本貞萋芬未沫薏尤清苦涅難緇咀餐菱藕能蘇肺凛冽氷霜直沁脾豈意枯腸嘗禁臠他年饑吻厭園葵樵蘇不㸑應休璉鮭菜長貧庾杲之說餅曽聞思糗餌獻鮮空詫想腴鰭賓筵幸覩壬林盛俊味還探丙穴竒折俎也知恩獨厚加籩竊恐分非宜祗慚菅蒯孤生賤猥受圭璋特達知歸院幾經花底度戴天私作管中窺德逾軒昊猶謙抑澤覆垓埏益滲漓勒岱銘嵩升懿烈覲文揚武際昌期兩宫尊養無疆慶二體元良有穀貽夙夜常存惟道岸暄寒不輟是經帷躬修渾器符乾曜手纂輿圖奠地祗巡幸只緣親稼穯搜苗端為肄熊羆象鞮早巳輸琛賮卭筰俄看下杖箠嵗值雞竿疏訟獄時懸豹簴採針規商霖每應桑林禱淇竹奚煩瓠子祠蠲賦恩稠仍賑廪賜酺詔下更行糜勤民喜見豐年屢招隱欣將好爵縻上相謀謨咸緝亮無司擕僕各委蛇璇穹恍惚來儲祉宣室從容坐受釐景况昭回神合契宸居肅穆治無為太平時節多閒暇交泰君臣有燕私靈沼笙鏞同樂豈卷阿車馬盡間馳惠沾翔泳初何限潤及區萌詎有涯絶勝壺觴修洛禊陋他簫鼓祀汾脽嘉魚賦叶崇邱詠鳴鹿重賡小雅詩願被六英揚盛事長歌七德鞏洪基恭頌萬夀詩宋犖萬年天子太平春大衍欣逄協洽辰表裏山河真孔固升恆日月自常新虹流華渚先徵兆電繞樞星早降神有命自天皇建極無為而治俗還醇從來十有歌君子自古三多祝聖人虞夏商周開夀域東南西朔轉洪鈞赤符握後雍熙奏青簡書來美善陳歷服無疆能纘祖孝思不匱在尊親寢門綵舞龍樓夕閬苑萱舒鳳輦晨慈聖貽謀傳永永元良垂裕慶振振桂宫言動聞詩禮鶴禁溫恭慎笑顰丕顯丕承師不逺重輝重潤瑞相因克昌厥後金枝衍則百斯男寶訓諄親睦平章光上下疇咨吁咈敬臣鄰春秋絃誦敦庠序郊廟馨香潔祀禋刑省三千執法簡條頒十六教民淳官方考績徵龔遂輿論優賢借寇恂無黨無偏遵路直有馮有翼弼謨詵緬思三蘖干天紀遂發千騶動地塵迅轉秦車馳暢轂大鳴越鼓扣金錞王師聲罪清淵藪大將臨戎掃棘榛韎韐未曽瞻至洛黍苗先巳慰來郇星旗耀日全吞蜀霜㦸凌風直到閩箭射六麋飛電刷軍摧九虎疾雷震西開僰道綏蠻徼南闢梨關奠海漘銅柱珠崖齊向化龍湖象郡悉來賓鐵橋巳立韋臯壘玉斧還通莊蹻津紫蓋黃旗降巳晚青絲白馬悔何悛走林盡竄昆陽象營窟全除東郭㕙况附臺灣收島嶼也隨職貢逹江岷敷天共服皇猷壯羣帥能欽廟略遵何意狼烟明絶塞又煩鸞輅出重闉桃花露拂朱旗染楊栁風牽翠葆紉三駕隂山奔駿虎一臨瀚海伏窮鱗詎裒荆旅淹三載祗格苗頑逮七旬西賮南琛紛蹻蹻梯山航海互踆踆象胥誰敢不來享龍德方知自有真天不階升髙莫並地非尺度逺無垠堂廉雖肅猶三接衽席能安及八夤有此武功何赫赫矢其文德更彬彬日新學問居無逸天縱聰明聖莫倫火照青藜宵不夜珠探赤水旦方寅左繩右矩禔躬密玉振金聲履道純六藝精微尊曲阜五經同異析成均每嘉文學如游夏更飭儒修判孟荀孝秀書升羅俊髦圭璋特達黜囂嚚乾乾終日宵衣屢矻矻窮年旰食頻赤縣有儲常豫積蒼生無告輒周詢省方裒對臨吳越輯瑞懷柔蒞晉秦賜復普天恩蕩蕩蠲租率土室溱溱眚寬棘木春鷹化仁沛桑田野雉馴己貯常平供大賚復留轉漕勸吹豳連年徐泗衝波亟五載淮揚賑廩勻南畝百千羣貸粟西江十萬逺輸囷澤飛鴻雁人安堵吏牧牛羊農樂畇寅畏治民齊太戊普施利物嫓髙辛關譏末作通平凖稅恤商車不算緡采菲受言因止輦懸鞀聞善即書紳萬幾多暇奎章煥二酉餘閒睿製伸雲漢昭回文濯錦蛟龍飛舞筆鈎銀詩如雅頌饒溫厚書使鍾王失寶珍更切隨刋乘橇檋常勤咨警渙絲綸桑乾齧岸狂瀾橫瓠子衝隄故道堙鐵鎖支祁齊下竹璧沈河伯捷楗薪渠成燕趙神為助水滙淮黃績不泯草木知春先望幸梅花如雪又時巡汾隂寶鼎輕沙礫成紀黃龍比蛭蚓豈若皇心安海宇轉忘帝力奠河濵去年全免江東賦今嵗除征皖右民應見虞廷儀鸑鷟會覘文囿舞麒麟南山翠色長蟠嶽北極瑶光自照旻四十二年恩愈渥千三百載美誰臻俯慙門胄叨餘䕃竊附青雲早致身鼎定乾坤歸一統任參調燮寵先臣螭頭交㦸鵷班侍豹尾隨車虬漏逡報國愚忠䝉鑒拔居官曲謹仰陶甄濫竽旄節躋榮膴攬轡封疆事拊循未及鄭莊能薦士僅如庾亮不私姻深慚懷抱褒清朗實愧諴民奬惠仁巳際時雍收棫朴尚圖嵗晚勵松筠都忘栁質因霜悴惟矢葵心向日申駑鈍豈追千里馬品題空負九方歅幸逄春日歌魚藻敢托秋風想鱠蓴但以鄉行堪授杖或邀國典許懸輪天髙地厚銘丹悃海晏河清頌紫宸三萬二千成一嵗微臣長願戴靈椿聖武逺揚青海平定詩徐葆光皇威逺播八荒遙青海微塵巳盡銷舉族就擒惟一戰飛章奏捷只崇朝睿謀制勝成功速英武安邊振古超式纘皇圖臨萬國丕承祖烈被三苗煌煌逺略恢西藏赫赫雄師截外徼葱嶺懸車行冒雪鹽池飛渡索為橋保全善類收餘燼掃淨逰氛絶細么御碣鴻文長鎮國安床佛子乍垂髫邉開遞頓連星海火報平安上泬寥蕞爾蟻封猶內屬蠢兹蠆尾乃輕搖恩加先世非常渥爵授新封越次邀月賜朱提增廪秩嵗加章服纍金貂韝邊飽後鷹先掣轅下鞭稀駑亦驕隱匿屢彰容洗濯微勞不棄録芻蕘竟忘聖德如天覆忽騁窮邊作犬猋醜類鴟張徒取戮流言簧鼓遽成訞八家狐黨原同惡餘部株連却被要何物蜣螂偏㺯雹無端羊角驟揚飈盜兵寸壤橫藏險蠶食鄰封幾見剽石峽一門通屬國金城五郡領嫖姚湟中早練防秋卒塞外尤嚴擊夜刁士養三年皆宿飽騎團萬隊盡成驍前鋒技勇能擒豹都尉頭銜總落鵰八陳整來停似嶽六花變處湧成潮明駝嗅地知泉脉牧馬歸營識夜標耕作連屯均讓畔薪茭棲畝共分樵枕戈待釁心咸奮超距爭先氣更趫推轂元戎親按部誓師新令更頒條逺巡斥堠排亭鄣近固邊陲壯麗譙堅壁制人常重閉羸形示敵不輕佻狡焉思逞惟爭利倐爾來侵若就梟鎮海堡邊池鴨警青唐城外寇塵囂天兵欲合旌旗閃神炮將轟砂礫飄金鼓一鳴齊耀甲鈎環萬馬互連鑣懼誅抱首憐窮鼠吞刃號空慘沸蜩既在圍中徒决驟巳逰釡底尚驚跳蜂屯只與三驅盡莽伏咸憑一炬燒黑水岸傍雲漠漠白龍堆下草蕭蕭六師聲討惟誅宛一箭飛書便下聊面縛軍門形䠞蹜膽寒釁鼓語啁噍指天悔過心難剖刑馬重盟福再憿都護尚需留鄭吉援兵誓不借張喬迫從黨羽心皆革敗北渠魁罪更昭有惡務須除類盡不疑何待卜龜燋軍中羆虎推韓范閫內韜鈐運賈鼂冦穴須尋虛處搗敵形貴向勝前料宸謨素秉先幾斷將略常稱馭衆調遂選鋭師專用勦徑申天討不須招一朝遍慰雲霓望萬帳將成風雨漂虎跡可尋巢易即氷城欲壞水難澆積薪鼾臥將然火危卵嬉安未折苕鐵騎星馳旗半捲潛軍晦合月方朓暗中搖足投機穽夢裡驚雷觸電熛讋伏受擒收一一窮奔走嶮逐儦儦雲中矯翼皆遭網木末飛猱亦見撩俘及二毛梟有母誅無噍類孽方齠比肩戢戢將膏斧纓項纍纍盡曵彯元惡自知終授首逋誅敢望尚全腰普天逃罪原無地白日羞形且遁宵自比四凶投昊北竟成一腳走䕫魈焚巢窮鳥歸無所乞食遊魂鬼亦枵殘胔飢烏來啄啄荒庭呌雁去嘹嘹虺除餘落皆安枕彗掃長空永絶妖耕遍草青時澤澤風行日入處迢迢天開神井膏常溢地過王師木不凋磧上收軍同浩瀚山邊卸甲並嶕嶢矢無遺鏃班師樂鐃有新聲載路遙旗外白翎驚鼓吹軍中朱鷺叶笳簫專車檻載魑兼魅歸騎鞍捎鵝與鷂絶幕輕齎還纍纍浹旬振旅尚麃麃畜量谷後分千足酒湧泉中酌萬瓢栁塞馬歸青乍放天山弓掛雪初消山陵方謁聞三捷露布遙傳示百僚吉語恰逄宣祝版馨聞正值奠蘭椒蕩平朔漠揚前烈昭告西藩復舊徭謙德難名還覆載功成歸美獻宗祧勞還有禮恩斯遍慶澤無私賞更饒草萬帑金開內藏上公爵命走輕軺榮親厚錫頒天錦賜答溫綸滿御綃咨汝莫辭優寵異知卿能保令名劭功從采芑詩中叙畫待凌烟閣上描警戒無虞惟稷契修和有夏在顛夭止戈大武除三蘖伐罪餘威振八遼伊里黠酋雖逺伏玉關欵使巳來朝側窺雲日顔先汗駭看魚龍舌盡嬌九陌香衢迷錦樹三層阿閣眴疏寮井蛙到海方知大螳臂當車敢再憍定向條支求甕卵佇從弱水貢文鰩七旬干羽同虞舜四表光華協帝堯志廣職方編澤藪圖成王會列僬僥虎賁帶下龍泉脫神臂􅌢中玉靶弨誕告武成追版涿久宣文德象咸韶官針並飭工無曠聖訓重宣民不佻在野白茅連茹拔中田維莠帶根穮賓興大典𢎞開榜耕藉三推親把銚龍窟雲油隨卤簿竹宫神火應燔燎孔門溯本先尊聖魯頌懷音巳集梟果見獻囚歸泮璧旋聞燕捷踰昆瑶八方環拱瞻辰極萬古衡平正斗杓此日禮成齊拜舞天顔有喜仰重霄賦得山雞舞鏡七言排律十二韻得山字劉綸山禽自是饒珍致舞入銀華意更閒乍啓雕籠驚的爍旋開寶匣訝璘斒空明仿佛寒潭上來往依稀夕照間顧影未須憐刷羽窺奩何計憶棲山風翻錦翼才飄袂日映花冠却整鬟赴節婆娑矜獨立回身綽約喜雙攀空花蹴處簷枝亞虛翠交時砌蘚斑似擬投林齊戢戢可能對語便關關雲回雉尾還呈態月轉螭頭尚照顔如許攬輝依鳳闕定教接翅起鵷班山梁縱說棲遲好畫檻寧辭飲啄慳氷鑑倘容長耀采微翎雖倦豈知還賦得山雞舞鏡七言排律十二韵得山字于振明眸翠羽出荆山影入菱花借好顔似逐驚鴻來復去却疑翔燕往仍還娉婷回雪誠多態綽約凌雲本夙嫻璧月正圓增皎潔錦衣乍展更斒斕光分漢殿如垂手照比秦庭欲擁鬟黃鳥隔林徒睍睆青禽拂樹自綿蠻能言鸚鵡容為伴息翼鷦鷯未許攀倘為酬恩聊顧印若緣報德願銜環微軀敢側鴛凰隊陋質羞隨鸞鳳班不愛稻粱謀既拙止依枳棘分寧慳心懷故里思空切擬沐新容意亦閒聖世露濃霑庶類來儀猶得覲天關賦得山雞舞鏡七言排律十二韻得山字汪士鍠焜煌文羽澤深山照映髙堂明鏡間五色翠光搖碧檻雙飛綵翅出仙寰菱花開處霞章麗鸞架張來繡紱環溪上誰為圖錦綺臺前自愛好容顔揚翹赴節髙隨下舒翼周規往復還日映盤龍依絳幘風回舞鳳妥青綸形分一水盈盈隔隊憶層岡渺渺灣整暇原同鵷鷺序翶翔不共鶴鷗閒雲移宫扇臨丹地華繪天衣射紫關振迅芳崖曽照耀葳蕤雕砌更斒斕空中藻並登場艷象外文騰滿目班物色總歸宸鑒逺九苞騫采願追攀賦得山雞舞鏡七言排律十二韵得山字齊召南虞羅逺致珍禽集羈客難窺舞態嫻明鏡巧懸光照灼麗容驚睹錦斑斕似臨曲澗澄空翠却忘雕籠認故山文耀彩鸞歡並翥冷嫌獨鶴興偏慳凝眸顧步軒仍輊妬貌舒襟往復還莭應桑林呈合變工同榆曲度悠閒銅臺曉日翔觚爵洛浦凌波響佩環嘯侣命儔猜孰是分軀共景繪應艱閨人袨服休垂手座客華裾笑解顔共訝回風生羽翮早傳竒采動江關形圖月殿清虛界影入銀河碧落間好趁賓鴻來聖代髙攀儀鳳出塵寰賦得山雞舞鏡七言排律十二韵得山字杭世駿誰將翠羽出花關朗對青銅意態閒寶匣舊含輝皎潔雕籠新照翅回環錦衣未必輸文綬金爪何勞罥玉環閬苑不棲春晏樹蒼苔猶印雨餘斑乍窺宛轉霓裳拂作對蹁躚紫燕翾翹尾影疑宫扇合舉頭光訝翠裘彎晴舒繡臆空中見風刷疏翎望裏還啼處祗憐交頸好看場誰惜折腰艱劇知意愜關生動直愛身輕似轉圜飲啄久甘依麥隴飛翔何幸近蓬山已歸朗曜初呈技豈假清溪始照顔紫禁若容聆雅奏九苞隨仗願躋攀賦得山雞舞鏡七言排律十二韻得山字沈廷芳文禽振羽出名山喜對菱花妙舞嫻皓魄乍開光熠耀綺霞初映色斑斕標竒蓬集兼雲繞動影風來復雨還火齊承冠分角睞錦帷張翼鬭花鬘姱姿長煥文明會逸態橫生意象間五采彰施呈瑞質雙翹璪耀啓朱顔妍超靈鵲乘圓月捷異馴鷗傍碧灣漫憶林泉矜耿介自知毛羽最鮮殷鸞臺漸近休回步鷺序非遙欲就班得接清輝明炯炯詎偕凡鳥囀關關越裳翡翠應相並衮服山龍擬共攀見說彤廷時飲啄更看儀鳳遍瀛寰賦得良玉比君子七言排律十二韵得來字萬松齡聖代欣逄人瑞出逺方仍貢物華來昆岡靈質千年藴瀚海榮光萬里開炯炯氷心偏皎潔熊熊虹氣更昭回懷中璞已經雕琢席上珍方待鑒裁自信圭璋宜特達爭傳瑚璉是良材晶熒瑜采潛生暖的皪瓊姿逈辟埃清廟聲堪諧磬管齊房食可佐鹽梅秦風比德思君子陸圃儲文屬俊才憶釣周璜從渭水寧藏燕石在梧臺帝廷琮璧朝羣后王會共球輯九垓地湧璇源通太液天滋琪樹繞蓬萊鏘鳴鳳闕冠裳集百道祥光護上台賦得良玉比君子七言排律十二韵得來字朱荃美質由來羞自衒荆山良璞為誰開湮埋詎屑同珉石剖琢何妨出草萊祗有純儒堪比德但須巧匠與呈材磨礱不遣留餘纇拂拭從教絶㸃埃性禀堅貞凌水碧姿含溫潤勝瓊瑰加功每得他山助待價時憑賈客猜將命登朝先束帛薦馨告廟並樽罍年深楮葉雕初就品重連城換未來藏處定應函黼匣賜時元合在金臺如虹氣蚤縈霄漢照夜光看燭上台自信持身同拱璧也知考器似掄才玉工若向明廷獻願作南山萬夀杯賦得良玉比君子七言排律十二韵得來字張漢昆侖縣圃積崔嵬抱璞人看出草萊比玉原知君子貴執圭喜覲帝廷來精神共指山川見追琢還需匠石裁要使光輝常照耀能消瑕玷未嫌猜不貪有道歸吾寶欲賈無端恥自媒信與琮璜徵瑞應潔同氷雪淨塵埃價髙本是豐年物品重旋登聖世才赤檢封泥供璽印黃流煮鬯注蠵杯德成溫潤兼能栗質許堅貞定不回青瑣佩搖蒼水動白虹影貫碧天開衡齊星象資璿飾樂止金聲作磬材席上有珍嘗待聘賜環感荷遂趨陪賦得薰風自南來七言排律十二韵得來字陳大受晝景舒長仁宇廣薰風披拂日邊來垂衣南面開清韵解愠中天仰睿裁但覺冲融彌大地最宜煦嫗被羣材悠揚玉殿聲初起蕩漾氷簾影乍開倐度青蘋看綺縠俄經緑蕙繞芳荄爐煙細細飄羅幕宫樹隂陰颭緑苔共向離明資發育頻申巽命荷滋培銅烏漫轉龍墀靜羽幬紛從鳳扇回指上絲桐歸長養望中雲漢共昭回詎關箕伯能宣滯自是重華為阜財暖氣襲人期五日庥徵應律協三台太和宇宙今親見願扇祥風遍九垓賦得薰風自南來七言排律十二韻得來字趙大鯨日月光華泰運開南訛應律協恢台正逄永晝瑶階肅恰喜薰風玉殿來爽氣乍從朱網度微凉潛拂綺疏回飛飛靜覺銅烏轉隱隱遙隨蓮漏催長養自能滋庶彚暄和應得逹芳荄清音向午傳丹籞嘉䕃凌空散緑槐花影入簾浮淑靄墨香縈几絶纎埃虞琴雅奏期從欲帝治時雍叶阜財暗起青蘋敷偃草還呼澍雨殷輕雷離明煦嫗飄三島巽位流行被八垓五日聖時調玉燭九重佳氣繞蓬萊微臣竊幸依光近樂育均叨聖澤培賦得薰風自南來七言排律十二韵得來字張映辰炎精應候方司令無限祥飈紫禁開位列祝融居火宅星標鶉首自南來微傳林杪紛披至細逐爐煙次第催著物如熏真煦嫗時風曰聖好栽培鳴條共覺千家靜從律應教五日回髙轉金莖何縹眇虛飄玉砌尚低徊遙從天上分清籟吹落人寰絶㸃埃最喜雲生當户牖有時雨過長莓苔歌賡帝世徵交泰化洽虞弦樂阜財鈴索宵懸聞閬苑觚稜曉起拂銅臺由來淡蕩恩如許未必吹噓棄不才侍從竊叨長自愧敢言流韻繼鄒枚皇清文頴卷九十五
