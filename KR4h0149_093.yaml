body:
  text: 詩五言排律瀛臺賜宴恭紀孫在豐皇建咸歸極時乗用御天龍飛春二十鷺序俊三千作覩風雲際光華日月邉衣裳垂治理廊廟重材賢懸象輝雙闕敷文盖八埏當陽陳玉醴惟月麗星躔燕喜趨朝列鴻恩布廣筵帝心惟懋賞臣職作恭先休沐時無暇訏謨定有年羣氛經滌盪率土正陶甄萬國車書㑹三農稼穡㕓經旬馳羽檄是處静戈鋋閩海鯨鯢息炎州翡翠鮮昆明收水戰南詔渡瀘船雨洗桄榔樹風清卭笮烟來庭誠恐後决勝氣無前捲甲標銅柱持衡在玉璿安邉思永輯修内實維䖍易繫雲天象詩歌湛露篇西池三島曲北斗五雲連縹緲蓬山上空濛瀛水漩彩虹橋作帯青雀棹鳴舷映旭雕菰秀因風翠荇牽緑盈依岸葦紅露早秋蓮魚沫潛遊泳鷗波覺静便劍蒲分翠鍔盤芡簇花鈿靈沼容投釣丹邱可得荃那居歌在藻於牣躍于淵狎餌紅鰓鯽吞鈎縮項鯿汀蘆風颯颯沙草碧芊芊拂地垂絲繞圍塘匝樹圓梧應棲鳯鳥叢合待鷹鸇爽氣吹竽籟芳聲弄管絃悠揚看舞蝶空濶見飛鳶矯矯晴雲翼潺潺碧澗泉依枝思翽羽抱葉薄寒蟬緑樹紅樓見銀河綺構縣䑓迎積翠色亭結望雲椽似水臣心切如綸帝語傳無欺身可致匪懈志同堅庶績咸熈載羣工尚勉旃鵷行齊拜舞魚貫就班聨宣勸飛觴急排當列鼎駢八珍充綺席六膳溢嘉籩瀹鳯行庖爼烹鮮有鮪鱣鹽梅羮入口蘭蕙氣流涎既飽天顔喜無歸玉㫖宣百壺留燕笑四座少拘攣鵲尾樽重泛龍團茗載煎青磁含雪瑩官果作花鑴成禮威儀肅忘形逸興遄上闌珠斗直午夜玉䋲偏一吸川方至交酬坐屢遷徳将情燕衎儀一褏褊􅝆當世逢尭舜前身豈偓佺駑非天上駟臣是酒中仙逐隊隨珠轡無能受玉鞭嘗羮知異味在笥省多愆枉掃三錢筆虛摹十様箋步隨青瑣出身向紫霄旋賜綺逾華衰承筐壓錦韉恩常叨叠被忠欲效微涓報國文章爾循躬職分然眷隆心耿耿才薄意戔戔青瀚弢弓矢黄圖廣幅􅊷精微成典誥法象得坤乾白璧休悲楚黄金巳築燕化馳神若駿道重直如弦無逸思求瘼豳風繹獻豜野應多滯穗民用即康田疾苦時為軫租庸半賜蠲猗歟賁草木沃若潤山川馮翼巻阿什貞元河洛詮明良欣一徳王道自平平乾清宫御試紀恩彭孫遹軒后垂裳日姬王脫劍年貞符彌宇宙廣澤浹垓埏問俗因廵岱勤民為濬川自然成帶礪仍此沛雲天租調頻寛復煩苛盡滌蠲崇儒還釋奠重道必興賢萬里漸文教羣材入化甄克知需藻鏡並命集花甎共仰氷衡朗重䝉玉勅宣入門徒踧踖俟屨敢遷延授簡螭㘭上摛毫鳯扆前繽紛披彩仗清切近彤筵繡槭承蒿柱文榱拂蕙櫋玲瓏珠綴遶錯落綺疏圓聖徳覘恭儉宸居挹静便詎湏同禹室終未改堯椽太素規模逺初春氣候先韶光空際轉淑景午餘妍寒色銷蘭路晴暉散桞躔瑞雲叢捧日芳樹淡籠烟細靄霑衣重流霞染案鮮筆牀紅窈窕硯沼碧淪漣百和研香麝雙番擘粉牋移時宫漏下薄暝禁鐘傳殿隠鴛鴦甃簾垂翡翠錢露浮棲爵外風定相烏邊紫篆春長潤丹蕖夕更然從容天語懌稠疊主恩偏瓊茗教承飲珍肴出賜籩屬厭情自飫消渇病應痊祇愧㣲才劣難窺睿學全讀書窮閫奥論史破拘牽華黍吹笙遍青壇薦璧䖍未能探海嶽空自守蹄筌霄漢三宸麗璿璣七曜懸人人垂眷渥一一别丹鉛細似抽絲繭明如燭蕊淵大鈞無枉互朽質有雕鑴叨被誠深矣鑽摩庶勉旃葵心雖荏苒匪石亦長堅乾清宫御試紀恩喬萊咫尺瞻丹扆深嚴歴紫宫網軒迎麗日複道屬長虹瑞結階前菌香飄仗外楓綺疏廻窈窕珠户照玲瓏寒逐千門斂春還萬象融堯蓂生次第漢桞隔溟濛寳鴨晴烟度銀虬晝刻通特教連佩入更許劈箋同注硯金莖露披襟玉座風千秋開學府三策佇文雄虎觀讐今古龍門冠始終探搜殊草草敷奏敢匆匆棐几移窗緑蘭燈吐壁紅從容聞睿語優禮出宸𠂻拜手螭頭下銜恩豹尾中香茶神鼎沸法膳大官充梓杞宜清廟駑駘亦錦幪㡬年慙刻鵠今日進雕蟲甲乙天題濕雲霞寳翰籠願言文報國珥筆贊成功西域貢獅子紀事秦松齡絶域來王㑹竒毛獻鳯城上林生氣色薄海兆昇平扶㧞原同類後猊只異名含章資土徳受性本金精隅目懸雙鏡修毫利五兵力堪摧猛兕心欲掣長鯨歕欱千山氣梯航萬里情藏鋒隨綵仗斂吼望丹楹漢代聞修貢姬王紀逺行來從烏弋重養傍玉津榮表瑞遊東海乗風下太清形標林邑戰樂譜教坊聲舊史寧頻見興朝自逺呈賜觀開禁苑圖畫滿神京跡比郊麟美名羞越雉輕象犀方懾服狐兎敢崢嶸秘殿揮毫麗盈廷作賦成非珍難得物直鍳小邦誠聖徳真無外皇威尚有征西鶼與東鰈指顧入蓬瀛乾清宫御試紀恩彭定求乾曜瓊霄麗奎文紺宇明賡颺依聖藻陶鑄切皇情秘殿初分牘璇宫又秉衡恩同宣室召寵倍上林行瑞靄開中禁祥烟儼太清凝神瞻肅穆垂拱仰昇平松棟雲方縵虹梁景正晴丹書呈有象銅漏聴無聲緗帙窮三篋瑶函富百城隃糜供内府象管給延英硯滴蟾蜍潤箋披錦縠生賜餐皆玉饌啜茗是金莖喜接天顔霽深叨禮數榮夕香聞麝液宵燭見蓮檠積雪消鴛瓦春星轉繡甍十年曽釋屩兹日勝登瀛每愧雕蟲技真慚倚馬名菲葑寧有棄葵藿亦知傾式序隨仙露傳歌和早鶯願言勤砥礪長此荷裁成康熈十七年三月皇上遣侍臣封祀長白山恭紀吳兆騫配極神山峻修封帝命崇金函新建岳玉檢此升中咸秩遵虞典昌期答漢功星軺瞻二使雲燎視三公戴斗原承北苞袛獨峙東千年今值聖萬嵗昔聞嵩地接興龍近天開翥鳯雄嵯峨分氣象䆗窱闢鴻濛五畤儀還陋三祠禮自同宗禋通肸蠁展宷契昭融圭璧陳緹帟辛駒豁錦幪日華遥合扇雲氣迥成宫列嶂輝瓊雪雙流亘玉虹壯哉符寳域赫矣麗璇穹仙靄凝巖紫高霞鏡野紅何湏傳縱雉巳見永垂鴻芝术祥侔岱枌榆祀比豐紫壇三望徧綘節百神通運喜逢文命書慙獻所忠聖皇長有道靈秩慶無窮喜雨顔光斆一氣天人際三時宵旰中精誠原不隔呼吸自相通雲暗宫城樹塵清輦道風恩流雙闕近澤被四郊同甘液傾盆速隂膏潤物融黍苗光薿薿麥穗勢芃芃動植多含態高低各占樷是誰司造化真見發羣䝉浩蕩沾敷土蒼茫仰太空可能忘帝力端合慰皇𠂻良耜歌周室靈星紀漢宫歡聲畿輔外瑞景日華東國計時方泰農書嵗屢豐村村歸餉婦戸戸走樵童共享盈寧樂難窺發育功小臣慚獻頌拜舞效呼嵩嘉禾頒示羣臣恭紀謝陳常綵仗廵方日嘉苗表瑞年地靈從土沃榖熟得天全玉穗縱横發金莖左右駢芃芃垂廣陌彧彧布平田彩逐雲霞起恩承雨露偏香多迎翠輦頴秀拂金鞭行殿禎祥睹康衢歌誦傳㑹因田畯喜合使從臣宣共訝龍枝異齊聲鳯蘂聨豫遊同夏諺觧阜合虞絃賜酺逾三日蠲租到八埏歸禾應有頌拜舞共堯天咏葵湯右曾少室初分種西川舊得名疏曽傳草木植每傍堦楹霜後龍珠實春前鴨脚萌四時皆備氣五色競敷榮膩欲調金粉繁看㸃綘英勻施朱的的文暎玉晶晶蜀錦俄裁出吳綾細織成檀心能百結翠蕚觧雙擎宻謝多岐葉疎縁獨立莖露承深淺盞月映短長檠本自齊姚魏從教擬杜蘅乍添梅雨潤㣲颭葛風輕比艾迎門緑如榴照眼明含薰酬淑序蓄味芼香羮顧此邱園質惟應筐筥盛所懐丹一寸只向太陽傾栽竹湯右曾碧篠生孤徑幽姿抱一樷春移膏旋動晴種雪初融低小茆簷稱葱青蘚砌同枝疎常得月葉宻暗尘風羅户森相束窺窓影欲籠静揺金瑣碎㣲戞玉玲瓏引蔓朝縈翠欹花晚亞紅每疑烟羃羃時見雨濛濛底用論千畝惟湏拓半弓不凋思古節特立愛虛中宫徴徐流韻檀欒漸拂空觧苞攢石隙抽笋短墻東粉洗娟娟静香流細細通瑯玕雲肆植箘簵貢包充長養資元化栽培仰嵗功龍吟栽嶰谷鳯實下樊桐無暑清涼行宫即事法海漢苑傳三殿唐宫說九成誰知臨紫塞别自有蓬瀛太谷羣山合高原一水瀠地形鍾秀異氣候得和平榛峪新開館山莊舊賜名峰竒分向背泉淨俯澄泓就下湖開鏡因高石作城苑中多釣檻湖外有松棚圖史仍天禄論經邇集英軒開晴亦潤樓敞雨還明簾幙熏風静長林赤日清朱明如素律夏卉似春榮裌服還湏試蒲葵不用擎三庚先降露六月始聞鶯舟比􅔓艚小車逾歩輦輕蜿蜒石徑轉蝃蝀板橋横太液來鴻雁芝田馴鹿麖瑶臺蘭蕙發靈沼芰荷生曲渚遵温洛嘉魚陋石鯨覆椽惟素瓦結宇不雕甍座拱巖嵐色窗飛瀑布聲茅茨曽示儉渾樸想持盈濫擬風人頌慚陪避暑行但欣調玉燭遊豫際時亨恩賜筆墨恭紀張廷玉職忝文林貴身依黼座親懐鉛春復夏吮墨暮還晨盡覩瑯嬛秘還分御案珍彩毫光燦爛烏玉色玢璘栗尾雙枝重松烟萬杵勻濯宜秋水潔製按歙川真毛頴為秦令陳元本綘人夢花開五色問價值千緍錦繡圅先啟珊瑚架早陳逺勝雞距健常覺麝香新簮去趨華省磨時選結隣照形如可鑑運腕若通神青縷何堪數元霜未足倫紀恩書鳯簡稽古愧龍賔敢說臨池好無勞畫荻頻碩隨惇史後嵗嵗侍楓宸恭頌萬夀無疆詩四首勵廷儀皇恩敷率土聖徳儷高天儀象璣衡設齋壇圭璧䖍欽承昭秘義奉若肅真傳七政齊經緯三辰協後先隂陽咸順序寒燠永無愆玉燭調元化金甌鞏大千麟洲佳氣滿鳯闕瑞雲聨九域歡情洽霞觴祝億年列聖留家法皇𠂻奉典常顕承功自懋創守道兼長邁古經綸羙垂庥歴數昌鴻圖元鞏固駿業益輝光堂構𢎞模振羮牆世徳章聲施傳奕禩賮貢徧遐荒禮樂貽謀逺和鈞製作良時雍開景運聖夀慶無疆寰宇恩膏普深宫儉徳光履豐心自約守樸道彌彰每念中人産寧思午夜羊茆茨洵嫓羙澣濯足傳芳物力偏深惜民勞詎少忘化原留美利本務重農桑天地開成大朝廷品節詳盈寧遍四海額手祝仁皇九重勤問夜六合仰垂衣拯溺勞頻駕臨河理萬㡬親征窮朔漠問俗徧邦畿行健通元命乗乾運化機旦明澄睿慮宵旰念民依奏對遲宫漏經筵辨曙暉圖疇陳左右象緯晰精微無逸天同夀稱觥上禁闈恭賦千林葉正肥勵廷儀夏木千章合葳蓁滿禁林光翻犀甲厚濃罩翠烟深不畏三庚日能藏百囀禽静疑聽夜雨高始出遥岑葉展蒲葵扇條抽碧玉簪望中常欝欝行處自隂隂萬畝垂嘉䕃長林帶逺音滋培含帝澤時有向榮心勅修萬夀寺告成恭紀蒋廷錫淨土長生境天神䕶衛成俯臨春澗濶遥接御街平殿閣重霄出旗旛緑樹迎寺傳天萬夀鐘鑄佛千名細雨紅塵逈春陽碧瓦晴獅猊装寳座龍鳯畫丹楹拜處飄香氣齋時有磬聲桞堤看繫馬竹院坐聞鶯遊賞皆真趣登臨逺俗情深廊朝日映古木暮烟横西去通山徑東來拱帝京億年燈火盛長向佛前明十二日上親射金錢豹恭紀蒋廷錫朔塞雲深候南山霧隠年韜文藏白草煥采發寒烟爪利騰張猛身輕跳躍便志貪全鹿飽路值六龍旋木葉千林矗塵飛一騎先出房金鏃疾彎月寳弓圓鷙性思拏肉天威易縳綿奔逃已股慄僵仆見腢穿置負明駝背攜歸行殿前驚看人聚堵環立衆摩肩鬚勁垂霜潔毫斑帶血鮮舊曾聞艾葉今始識金錢雪㸃胷間色風腥口上涎真堪雄並虎寧止倍於豜孔武羔裘句長楊射獵篇幸隨豹尾後窺管頌秋田賦得時雨引和風吕謙恒和氣滋寰宇皇心恊化工渙居承觧澤巽命鼓隨風殊異鳴條烈旋看潤葉功飄來蓂草偃膏向黍苗芃沾灑屏翳御輕颺少女宫遥天吹習習廣陌望濛濛漸滿三農碩欣占五稼同涓能添太液清可扇芳叢林逈絲猶颺簾踈響易通朱明方改律素顥正流空披拂如開霧霏㣲似發䝉因知交㤗象萬寳慶年豊乾隆二年夏四月五月乆不雨風霾間作麰麥失收自惟奉職無狀致此愆陽重貽主上憂日夕負疚内熱如焚皇帝深慮預防貶食散利蠲租赦罪責巳求言一誠所召嘉霔普應六月十三四等日大雨滂沱連綿霑足畿輔逺近亦疊報甘霖髙下周徧病中霍然喜賦三十韻用代吾民擊壤云爾鄂爾㤗聖徳先民瘼天心轉嵗功鳴簷春布濩浹壤晝溟濛氣合桑林外膏回麥隴中人方書當暑農且望滋豐冉冉朱陽近蚩蚩赤子懵朅來杲日甚旋與宻雲同龍井源猶伏雷泉潤不通明星瞻有嘒倬漢亘長空田坼龜隣䑕林烘貉引熊旱魃一名貉熊字能火又熱也黍苗堪堪何堪也萎翳鶉首正隆蟲巫率雩為禮傷聞痛在躬懸鞀無逸殿減膳未央宫疎網温綸下蠲符厚澤隆媕娿姿老􅉸慚愧切瘝恫先是九上誡卿曽引韓愈中朝大官老於事詎肯感激徒媕娿之句慚愧蒼生愛戴心御製夏日書懐詩也别勅留鴉舳中倉出玉穜算應防餒在憂似及飢窮象甲迎仁術占辰叶道冲誠求基夙夜昭格際蒼穹倐忽隂霞斂霏㣲曉霧䝉樹飈飛繞電池溜薄奔虹接夕鳩呼雨連晨馬滴騣滂洋看緑縟優渥佇青葱始識徴皇極端湏簡帝𠂻八荒歸内宅萬寳本精充列職虛調化叅衡負代工猥承恩袞袞祇是慮忡忡薦璧沾湯雨和絃被舜風維魚殷牧夢多稌洽龎鴻未克安愚分何能效大忠天人呼吸裏悃欵月華東月華門東偏即南書房直所雍正二年聖駕詣太學恭紀徐本聖主垂裳日崇儒禮最先敷文光普被建極道無偏泗水源流逺尼山統緒綿褒封隆爵秩追祀備紘綖首善風聲樹成均雅化宣尊師勞法駕視學列班聨東魯諸生集陽春吉日蠲瑞開蓂一葉暖趁桞初眠銀闕千門曉璿霄萬騎闐卿雲晴䕶輦朝旭彩浮旃丹鳯城迢逓青槐市欝芊上公容振鷺扈從冕髙蟬簮佩迎鑾肅圭璋執事䖍兩楹陳法器八佾應宫懸緹盎金莖露瓊罏寳篆烟􅡒蕭通肸蠁酹鬯達淵泉盥薦孚顒若羮牆恍見焉講堂黄幄啟御座紫微連咫尺垂清問敷揚闡妙詮儀曹持案進祭酒執經前縹笈緗文錦瑶函白玉編治平功有序精一理徐研徳是新民本中為作聖傳庶僚咸陛立羣俊盡橋圜士氣歡無地緼綸降自天大官傳賜食太府出頒錢俎豆升前哲冠裳逮後賢賔興歌簉跡論秀慶隨肩兩序增唐舎三雍廣漢員凡材䝉雨露舉世荷陶甄帝範丹青炳皇言琬琰鑴儒風𢎞海宇徳教浹垓埏象協三階正時成六位全璣衡調鳯歴奎壁映龍躔拜舞陪鵷列賡揚拂彩箋攄辭忱莫罄惟頌萬斯年入直南書房恭紀張廷璐秘閣深嚴地文窗接御墀侍臣趨直後中使下簾時釦砌朝烟散金莖曉露滋薫罏珍鵲尾棐几淨烏皮緗帙光浮動瑶函錦陸離閬瀛仙侣集宛委異書窺珠箔香雲繞銅壺漏㸃遲調蘭分法膳膾鯉出蓬池細果金盤飣香秔玉粒吹魚依靈沼荇鳥借上林枝自顧駑駘質深慚山澤姿一門恩愈渥兩世遇尤竒守拙承先訓懐迂荷主知簮毫慚視草向日願傾葵鉛槧當清晝編摩矢寸私叨陪鵷鷺後拜首頌皇慈皇清文頴巻九十三
