body:
  text: 賦夏雲賦張廷瓉青陽既餞絺衣漸成徴音恊律火徳司衡繼長増高啟明堂而布令含桃嘗麥薦清廟以将誠隂陽所結雲氣初呈炳陸離之異色任巻舒於太清既從龍以徐作亦觸石而旋生風動影移㸃綴鳳鸞之彩山蒸川潤飄揚珠玉之精助函關之紫氣鬭霞標於赤城示文章之竒麗比巖岫之崢嶸若乃萬象熙熈一陽杲杲丹心傾乎素葵晴暉照乎碧草始焉迥抱映皎日以増華漸覺紛綸亘長空而布藻衆峰之斷續相參孤嶠之稜嶒欲倒入宻林而如織紛出岫以高搴若澹若濃雨絲隨之而飛灑乍離乍合雷聲乘是以迴旋散輕隂於大地沛汪濊於高天覆平疇而増緑冒逺樹而生烟迨乎天光欲霽簷溜旋乾夕陽㣲照晝漏将殘蘋末之風拂輕衫而漸起冰輪之月掛碧落而初團望横空之漠漠忽片影之漫漫輕如染黛白若飄紈傍踈星而繚繞依銀漢而盤桓數朶參差莫辨羣山之何屬浮空變幻乃知造化之無端爾其為状也輪囷氤氲天章纂組散兮若升歛兮若俯緩兮若錦幄之方張疾兮若翬翼之輕舉浮沉兮若滄溟之驚濤攢簇兮若天朝之繡黼恍天孫之夜織兮濯七襄之錦於明河儼海若之春遊兮吹蜃氣之樓於孤嶼况復聚散徐徐徘徊自如雖垂天之足覽豈定在之能拘本無心之變化不留滓於清虚夏非雲則炎蒸曷潤雲非夏則瑰麗安舒順自然之時序乃盡態而無餘是以黄帝紀官師之名穆滿有瑶池之賦䕶汾陰之寶鼎綴栢梁之甘露擁王母之坐則香散樓臺望沛公之營則氣成龍虎凡史策之所載固更僕而難數恭逄泰運帝徳承乾兩儀定位七政相宣解愠阜財薄海洽南薫之奏光華復旦羣臣颺糺縵之篇值土氣之方潤正離火之欲燃騰清輝之靉靆浮積氣之蜿蜒秀色連蜷驅虹霓而直上竒姿惝恍應箕畢以開先瞻榮光之干呂與景星而並懸豈不足以發乾象之煒耀而侔睿藻之聯翩哉喜雨賦有序張延瓉臣聞國家根本在農必藉雨膏之澤帝王稼穡為寶時深水旱之憂蓋統天下於一身視民間若外府為農請命自天降康隨感能通如響斯答我皇上道握乾符恩流豊蔀捐珠抵璧維勤黛耜于西疇賜粟蠲租屢出朱提于左藏時當春日念切田功東作方興甘霖宜霈特遣天潢之胄致祠西嶽之神齋祓精誠輒減官庖供億儀文簡質無勞驛騎馳驅豈同望祀之恒規實屬明禋之曠典更頒丹詔分命禮官各勵精心肅将祀事務使誠在幽而必格勿謂天為逺而難知果爾至徳濳孚重蒼恊應旋召離星之月忽移貫斗之雲樹色烟籠逺望西山飛瀑栁絲風織平添太液新波雖降澤于紫霄實流膏於清禁蓋山靈河伯皆奉天子之威靈而甘雨和風咸本聖心之仁愛臣幸居史職敬誌天庥謹作賦曰節迎首夏時届朱明祝融秉歴赤帝司晨炎曛自始火徳方新攬溝塍之繡錯布原隰之龍鱗青苖吐秀嘉頴垂芬需茲甘㴻黍稷生春田父瞻雲于桑隴一人旰食於楓宸于是發徳音下明詔陋巫史之紛紜殫精誠而感召遣帝室之親賢肅華隂之昭告務期揮霖雨于仙掌之峯洒甘露於蓮花之嶠更命宗伯秩太常修雩祀考彞章蠲慮靜志叩於天閶扇㣲風兮瀰隂壑翳輕雲兮韜陽光乃宸𠂻之甫動已上逹于穹蒼是日也天光亭午日影乍收氣滃靄而如暮聲颯灑而兼秋雷闐闐而皷急雨霡霡而絲稠濺珠光于綺綴掛玉屑于龍樓已足掃紅塵而清六合滋黄茂而卜有秋矣越翼日之晨澗隱晴霓林鳴隂鳥始攢團于天際終縈洄於林表其縁鴛瓦而注也若匹練之高懸其浮碧落而來也若銀河之欲倒紅沾上苑之花翠濕玉階之草香糅寳鼎之烟波溢昆明之沼天子乃坐廣厦啟珠扉歌有渰之萋萋咏興雨之祁祁聽銅龍之響急望金掌之雲飛忘玉衣之沾濕樂民願之無違若乃觀彼禹疆眺茲堯宇空濛逺岫周流平楚含爽氣而迎凉廻炎曦而却暑吐歕薄于珠泉散紛披于氷縷走急潦于横塘滙奔流於洲渚羣致慶于神庥共騰歡於華黍是以土膏資其霡霂嘉禾蔚其繁昌迎金風而薦秀挹玉露而含芳垂頴歌夫比櫛落實樍夫倉箱結緑懸黎充牣乎里閈隋侯明月錯落于綺疆夫孰非聖天子無逸以崇稼穡一徳以薦馨香而致此哉都邑父老荷鋤饋饁之儔沐膏澤而咏太平者為之歌曰聖人在宇兮臨萬方恭黙潜孚兮格九光走神龍兮舞商羊驅雲車兮灑天漿同莖異穗兮迎青霜蕋珠金粟兮盈秋場盤中粒粒兮君恩長耕田鑿井兮無相忘飲且樂兮夀而康於萬斯年兮戴帝徳之無疆玉河新栁賦曹鑑倫爾其標瑞莢於彤墀植華平於瑶圃比漢世而芝發齋房對堯天而松生棟戸君遷古度蘭成之所臚陳玉樹青蔥馬卿之所纂組榆垂天上之光桂長月中之樹靈鳳之所棲遲祥烏於焉翔舞縱摛藻以搴華非見聞之所能譜若乃九門日朗萬雉雲輝玉河如帶碧水生霏何以拂靈雨弄晴輝罨紅樓而婀娜臨紫陌而芳菲於是殷檉始栽朱陽乍滿穉態迎風柔條颺暖惟日月照臨之地在鵷鸞披拂之中分瓊島之韶華重城不隔借液波之沾潤流水時通拂面依依便疑張緒逢人濯濯旋類王恭葉葉輕黄染檀痕而新畫枝枝淺緑蘸黛影以初融則有貂蟬小隊來繋花驄誇命中於百歩貫楊葉於雕弓亦有詞客停車流觴迢遞歌上已之風光贈栁圏而修禊乃其金絲旖旎翠帶翩􅗁仿賦筆於華林春旗一色繪風流於漢苑弱體三眠或朝囘而走馬或公退而垂鞭出春明而掩暎過宣武而便娟栁宿重光照城南之尺五栁枝一白陋東府之三千豈與夫亞夫營裏京兆街前金城路側㶚水橋邉但攀條以寄興託風物而流連想江南之萬樹爭罥水而飛綿何限藏鶯之縷徒牽載酒之船望雲霄之列植羡雨露於九天長樂之鐘聲不盡麗譙之漏㸃遥傳銷春光兮嵗歲被化日兮年年春省賦沈朝初若夫三農百榖七陌九阡式觀食貨繄實民天望杏瞻蒲之候祁寒暑雨之占于耜舉趾菑畝新田藨蔉勤於力作與翼頌於豊年聖王所以戒農官而勤民事廵郊遂而惜春暄枉千乘於隴首示萬國以帥先者也爾廼北斗朝天東風拂地太皥司辰勾芒定位曦輪乍暖陽隨彭澤之禽淑景初舒谷滿析温之氣池開青荇之波花染黄鶯之翅絳雲作片杏一笑以烘霞碧玉為條栁三眠而曵翠芳林蒸日燦燦英華香草緑隄毶毶委被値上苑之青蔥正耕耘之始事當夫田畯至喜家室相歡揮鎡去莠築堰澆蘭饁餉紛於士女畚鍤荷於林巒葵腰鎌而乍采秧䇿杖而時看風笠糾舉烟簑滅漫引甘泉於逺澮浮翠梢於清湍願嵗時之無易思種植之維艱於時天子勤民事重農疇務穡勸耕顧勞心於稷契授時度地彌急務於殷周循先農之貽榘恢駿發之逺猶駕金根於玉軫䇿驪駟於蒼虬啟鳳扉於鸞閣開雉扇於龍樓千官星列萬騎雲稠歴東郊之駘蕩經南郭之廣袤隄畔王孫之草花前珠勒之騮染輪蹄於瑞靄和鈴響於鳴鳩遵紫陌而乍轉度青門而歴遊巻芳塵於林薄動神光於旌斿遂攸介而周咨蒸髦而慰語考俗觀風量時較雨視畦徑之如繩覩新苖之若縷旣深漑而疾耕爰濕稌而燥黍㣲飈漾於青蘋輕靄留於赤杜駢肩隴上之銚聨袂桑間之筥白叟含哺黄童翔舞然而聖心軫念天懐噢喣一夫未澤九廻靡巳慮蔀屋之無資倘窮簷之失所倉庚拂而凄其布榖鳴而延佇徒畝澮之星羅何手足之胼胝既東作之艱辛奚西成之億秭散財發粟家盈戸瀰非櫟陽而雨金似陳留之下黍襏襫用勤桔橰斯舉東塍西陌簇保介而咨茹上隴下畦悉曽孫之秬秠從此無荒畛而遺隰無珠粟而桂薪甸原野而思夏徳覩穎栗而念周仁蹔奉宸軒冀春王之再至小留仙蹕寛寸晷之行廵遂使比舍駢鄽荷耰鉏而載忭九州六宇合主伯以克勤非聖主之重農賜恤何恩膏之髓浹肌淪是以騶虞麟趾之獸羣遊苑山䨇岐百穗之禾挺生畎壑芝房輪囷而玉英景雲璀璨而金萼祥麟遊乎湍瀨丹鳥吟於觀閣覽庶績其洪凝嗣賡歌之浩作櫻桃賦有序楊大鶴時惟朱夏百果含榮而櫻桃獨以先時而熟稱為嘉植故古者徃徃樹於芳林薦之寝廟其見珍也宜矣竊效昔賢體物之意裁為小賦以寫其致其辭曰緬時物之應候有朱實之離離方辭春而吐秀乃迎夏以標竒陋成隂之桃李效傾陽之露葵圓瑛綴顆宻葉成帷非徙植於西京之園即移根於含章之殿乍抽條以似藍俄凝實而若茜銜來御苑之鶯棲共上林之燕自大官之採擷供寝園之春薦染懸黎以垂樹琢珊瑚以成丸盛有金絲之籠供惟赤瑛之盤映日而繁星不散研朱而清露猶團廼其圓勻質美酸甜味足比若木則多滴歴之珠擬紅蓮詎遜玲瓏之玉信飽食其不妨有蔗漿之可欲夫物以應候為榮非時則失冬何取乎枇杷夏何思乎盧橘沉碧李而情怡浮翠𤓰而美溢彼朱柰與安榴各逄時而不一況當清和而曜采先百榖而揚英就丹宫而早熟出筠籠而見擎若茲櫻之爛漫固竒葩之挺生既羅羞於王公亦待聘於席珍惟嘗新之足貴洵夏淺之勝春顧樗櫟之陋質徒負愧於良辰撫嘉果而體物敢繼響於昔人玉河新栁賦李孚青皇都春早紫甸寒輕苑花穿蝶宫樹流鶯披玉河之新栁裊弱質以盈盈夫其芽㸃嫩黄稊抽淺緑好風之管領無邊皓露之沾濡才足紅墻東側匼匝一灣碧沼西頭迷離幾曲曉烟捲去分明春水㣲波夜月含來亦似秋天初沐纖穠骨格忍被亞夫營裏之名婉潤丰標不作何妥巷邊之族踠地金縷瀰空麴塵歇小侯之寳馬䕃華胄之雕輪揺颺龍池十里之亭臺隱隠休㣲鳳闕千門之篝瓦鱗鱗江北江南梁苑之花似雪三眠三起漢宫之樹名人原夫如線如絲宜晴宜雨等腰最削賞眉偏嫌攢青兩岸中淹蘭葉之舟濃黛一堆旁罨桃花之塢評量才質雲堦月地之品流檢校風情騷客詞壇之宗主旣種性之殊恒宜結根之得所乃有漢南抛擲㶚上攀牽關山何處洛中可憐溧陽酒樓無端三月武昌堠館重來幾年此則短葉披塵凄心䍡􅝹長條拂路摧意纏綿者矣至若中散門前柴桑宅裏桐分䕃以滿齋槐夾植而成市栁刺史桂林江上嵗嵗栽培杜拾遺秦州道中連朝徙倚金城揺落擁腫十圍板渚棲遲綿延千里雖邀顧盻之歡未極遭逢之美别有上林池館樂游綺羅坊名永豊殿號靈和毬場晝躤舞榭晨搓帯蟬正好翻燕如何映酒欹枝全身似舞隔簾吹絮逸韻疑歌然而京兆街心章臺樓角縱極目以延緣究殊情於今昨睹此日之芳菲羃御溝而綽約先禁籞之朱櫻壓堦墀之紅藥停寸晷以徘徊記千株之約畧神州沃壌帝里醲膏甘泉浹潤太液分饒綴景瀛洲肯藏鴉於宻葉飛華露掌寕繫馬於柔條一桁西山嵐翠淋侵乎御陌八星南曜光芒騰射乎魁杓歸院曽迷揷門亦可子城隂處零殘雪以猶霏東面風過擺長衢而倍嚲王恭濯濯對月爭妍張緒依依臨風獨坐一夜緑縧新剪能忘疇昔之染衫五更寳炬如城却憶清明之賜火南郊瑞雪賦有序王沛思葢聞萬物本天運化機於北極一陽動地肅祀典於南郊風飄黍稷之馨爐烟馥馥氣散雲和之響竹管鏘鏘祀日至以迎初陽隆鼎烹而享上帝掃壇為祭昭事在潔籩肅豆之中積敬以将凝休於薦幣陳牲之外心和則神錫之福徳盛而天且不違以故明禋上升雲興霧起因而霏㣲下逮物潤土滋瑞協三冬被野而千林輝映花飛六瓣彌川而萬頃玲瓏隴麥資生搃沾濡乎禹甸農民誌慶爭忭舞於堯衢仰元化之紛綸識太和之感召非能占騐時逄量日之初幸在趨蹌義竊書雲之比爰濡筆而賦曰維黄鐘之應律睹景色之呈祥授時而土圭測影占候則宫線添長於卦觀其來復於氣騐其生陽水泉動於子月天心見於微茫王者所以配天而崇郊社報本而肅享将也我皇於是修祀事迎陽日或列黄琮或陳蒼璧或用陶匏或肆繭栗彛尊寳鼎肅肅薦馨玉戚朱干雍雍舞佾匪云邀福有感必通用以告䖍亦文而質於斯時也柴方燔而氣欲成霧齋既致而誠可動天同雲倐布瑞靄爭妍初猶㣲霰之乍集旣廼宻雪之廻旋隨風則忽飛忽舞落英則若絮若綿迷離乎壇丘之上淅瀝乎輦路之前乃霑濡既紛氣象愈淨喻其朗潔色與玉鬯爭明擬其飛揚氣與葭灰相應樹葉重而栢枝盡垂積輝凝而燎烟不勝已而地将盈尺花飛蔽空映陪祀之千官皎如鷺序照饗壇之萬瓦燦若瑶宫片片晶鹽疑造物為之調劑霏霏玉屑似化工為之磨礱惟聖天子之積誠對越肅志升中斯能應時和以承靈貺召嘉瑞而利農功猗與盛哉葢雪之為義也隂氣上蒸陽氣下濺融於夏則為雨為霖結於冬則為冰為霰數成地六故花六出而翻飛水生天一故本一元以貫串於以順時解滯利物厚生舒兩間之欝結鼓庶彚之勾萌潤枯泉而不竭消旱蝗於無形縱使雨玉遍乎郊原雨珠盈於邱壑號寒不可以衣被啼飢不可以咀嚼孰若此之膏澤旁流天人交格為豊嵗之先資而欣陽春之有脚也哉乃作歌曰帝徳精誠兮感穹蒼瀌瀌湙湙兮瑞雪颺逺阡邇陌兮麥苖昌預占大有兮慶穣穣民氣胥樂兮聖澤長荔枝賦佘志貞伊圓穹之瑞精煥星景與雲卿濡灝氣於草木遇品物以流形隨墳壌之攸産挺嘉卉之蔥菁鍾嶺南之奥區蔚荔枝之叢生長嬴節届鶉火星移浮𤓰沉李暑雨凉颸縁岸圃兮寓目結朱實之離離爾乃團團布宻状如車葢羃澗蔽虧轇轕晻藹緗英黛葉同虬松之不凋紺理紫文入閬苑而曜綵綴之瓊幹纍纍明月之珠薦之琱盤灼灼玳筵之貝况復實駢火雲味酌天漿潤侔和璧竒踰五黄逺而望之粲若繁星麗碧落迫而玩之皎若朝霞映太陽雖有側生之誚終無忝上國之光至如珍族博傳淑類不一陳紫宋香方紅江碧鳳爪龍牙變態百出承甘液之零露凝如水精飲豊潤於醴泉融如絳雪香肌膩肉髣乎姑射之姿寒玉冰紈穆矣琅玕之色則有侯家甲第梓澤芳園穿池岸曲蓄水河源千株畢植萬顆俱圓火齊照耀滴乳凝鮮觧煩已相如之渇辟榖得留侯之仙又有期門公子澤宫弱冠修景納凉乘間縱翫税龍馬於金隄命鳬舟於江畔憐樹端之陸離愛懸黎之璀燦更有東都幽人西園嘉客珍果新嘗清香欲絶紅綃玉膚寫入海上之詩絳嚢晶丸載在風騷之籍美芙哉向使獨秀上清之境不落人間之世同蟠桃之結實與鶼鶼而並至足使蓬島増輝塵寰延佇豈非超衆果而獨貴嫓羣彚而尤麗者乎歌曰迤邐海嶠荔子丹兮萋萋馥馥烟霧翻兮外朗内潔匹明璫兮芳心甘氣沆瀣寒兮欲繪名品媿陸潘兮賜宴瀛臺賦倪燦辛酉孟秋皇上駐蹕瀛臺讌賚羣臣昭異數也於時江海不波山澤並晏泰階既平昭華爰獻天瑞降而銀甕呈地符升而器車薦調五緯於靈臺靖八維於赤縣飛聲騰實禮傳布政之宫直暢旁施樂奏總章之觀吹鱗没羽之族稽首來王赤蛇青馬之區望風請吏豈止狎素游赬團膏潄醴半景青赤孳歴虧盈而已哉於是天子乃陬吉日命良時啓西苑俯瑶池張廣筵受天禧羣工百職濟濟師師聽金鑰而戒旦警銀漢而趨墀於斯時也玉露方降少皥司秋眺嘉林之緑蔚睇菡蓞之紅浮後先繼至拜舞攸同爵引躬桓之五等班隨劍履之三公碧磴紅泉識蒼龍之過雨螭頭雉尾見朱雀之凌風其為殿也層臺妙迹仙署宸居學茅茨之不翦直清禁之宵餘寫冲襟於月峽昭太素於烟墟撫檐楹而論道對水鏡而披書既而旁觀逺嶠斜瞻黛壑複道烟廻攢溪霧錯叠輦路於盤龍響奔濤於控鶴萍徙楚江之蒂花轉崐墟之萼蘭飄君子之香松比大夫之爵栁墜露而魚驚浦含珠而鳥落前臨太液彌望廣淵灌注靈沼發源玉泉彚羣流之浩淼凌萬頃之波瀾龍口仰而噴沬虹梁亘以造天瞰金鰲之鬐鬛羡玉蝀之嬋娟紫菌前媚朱柯耀鮮渚浮杜若堤被香荃更有承光秘殿瑶華别島古栢挺幹而蜿蜒廣寒散彩以窈窕峯深夜久潭静秋新荷抽水蓋薜引山茵雪芝獻液紫卉傾津乍棲神於窅𣺌恍游目於太清其旁則有叢竹之亭藏舟之浦鸞鶴之羣龍鳳之舸蓬壺再覲於寰瀛溟渤若移於庭戸長風激而奔雷飛瀑下而成雨若夫崇智臨猗政和樂成亭臺交錯殿閣縱横樹竒抱石枝新吐茸鵁鶄鴻鵠叢集平其中至於香分太乙之壇圃種優曇之樹掌擢䨇立之金莖盤結三危之瓊露遇松喬於廣軒揖羡門於天路屑玉英以長存豈膏梁之足慕時而葆翟交垂羽旗斜指水嬉泛其沙棠銀塘廻其蘭艤揚帆北渚放纜南涯鳬驚鷗動雲起雪飛湘娥聞而隱現河伯見而躨跜何輕舟之徃返猶寸晷之未移然後釣魴鯉攫鰋􅀈拾紫貝取文魚網開荇藻鏡映琉璃庻石華之可掇似海月之堪携斯誠闕庭之勝概而宇内之奥區也於是雲䍐載臨羽林清曠風傳警蹕日輝天仗乃有簮筆從官文昌上相詞賦則東馬嚴徐勲業則臯䕫尹望畫省之儔惟兩尚書之班獨上簮裾奕奕頌鵷鷺之具瞻劍佩鏘鏘傍瑶階而相向位次既齊大賚爰沃出内府之竒珍頒天家之霧縠懸機巧緤雲不去而恒飛變䌰新絲蘂雖寒而不落於是太師合奏司正論功雲開甲帳苑繞璇宫豹胎割翠虬脯燔紅煮丹穴之雛鳳膳越嶺之珍熊梨稱縹蔕李字黄中揮虞絃於九陛醉堯酒以千鍾咸感恩於湛露願揚藻於雄風我皇上安不忘危樂猶致戒旣耀徳以觀兵復同箴乎交泰洵太平之盛事揚休聲於千載爰作頌曰穆穆我后萬齡作聖武定元基文清寶命波恬四海明宣七政息衆以寧綏荒以令飛龍繼迹鳴鳳重光乂安寰夏迭用柔剛戈船泛月劍騎横霜風驅海石電掃黔陽我后崇儉深戒侈靡力役罕用疾苦是咨朝堂肅穆簮紱委蛇勤政豊豫廣覽遐披禁籞西偏内廷右掖複道紆廻長林蓊欝平楚流青逺峯聳碧遊晏神臯仙靈室宅乃踵舊制乃創新模乃䟽幽壑乃引清渠瀛臺既啓穹表雲衢匪崇雕飾取法唐虞賜宴羣臣長筵是撫玉觴分賜周規折矩不借鳴琴無勞㑹舞上和下悦情怡神聚我后之徳偹致嘉祥八風從律朱草豊唐惠流蔀屋澤曁遐方㣲臣作頌蠡測難量賜宴瀛臺賦有序陸葇皇上勵政之二十年文徳誕敷武功遐暢一日二日萬幾不自暇逸百爾臣工罔敢弗欽承我后之意以靖共乃位猗歟夐哉明良喜起參唐虞而鼎盛矣當夫徂暑之月駐蹕乎西苑層臺凌霄緑波縈之望若員嶠然非以樂遊觀安逸豫也葢極尊親之孝養以秪奉璇宫問寝視膳既朝夕靡間而且侍鳳輦於琪林泛龍艫於蓬沼薫風生凉甘雨灑澤天人懽協禎符衍祥乃復昧爽而興進三公九卿百職事於雲牖之下考政治之得失辨論人材而進退之不啻延英之召對也聖慮所周俯念臣庻顧茲臺沼将與羣工偕樂其有爰居肇秋吉日惟申召宰相以下暨六曹員外郎以上入瀛臺而燕饗之先布綸音錫以表裏既飽之餘申命醉止莫不感悦舞蹈殫量畢懽肅肅雍雍成禮而退誠泰交之氣象亘古所未有也臣不職以史館㣲員忝預班末杯杓不勝如蠡測海欣忭之下謹拜手稽首而獻賦曰粤惟帝清之誕膺景命也維玉繩而建極廓析木以立京法太㣲而臨座象輦道以經營統乾徳之廣大奠八埏以永貞於時三階昌明重庥累洽體天時而出政順物情以作哲諧簫韶之九成解六服之炎暍蒞庶事以率興御講幄而不輟乃瞻赫曦麗天中揮五琴歌南風天子於是乗夏令應林鐘思以居高明而定心氣處臺榭而合昭融則惟西華之近苑為紫垣之右輔實宻邇於宸居作坤維之禁籞中有昆明濯龍之池太液唐中之渚綺散霞夕鏡瑩星曙晴泓一碧飈蕩鱗聚纎霂漂絲驟澍籠霧浩浩泱泱瀠洄灌注爾其緑楊漲煙斷岸若連菡蓞約秀芙蕖逞妍紅白相屬金碧相宣低光夜舒分枝合歡之美繡錯乎其間下有厥􅀈稜峭雞翔蝦股蝟苞雁頭纍纍珠裹伊凉燠之性殊聿參差而結緒鳬茨藉姑鵠瀉劍蒲葭蘆交叢以蓊薈菰蒋轇轕而紛披荇牽并帶藻漾雞蘓屬玉連拳而雪映升蕖唼露而茵鋪象扶桑與濛汜列瀛洲與蓬壺其上則崇樓飛閣金鳳銅爵丹艧虹垂罘罳珠絡花萼之氣常通太華之峯如削洵蘂宫之莫睹恍乎窺綘霄而仰碧落茲乃於臨御之偶暇奏對之既休相月孟爽大火西流言集羣臣來豫來遊列鵷行於苑路秩雁序以登舟乗仙槎而汎銀漢附彩鷁而問牽牛榜師鼓楫銜尾南浮溯流沫之響牐泊凝碧之芳洲遂升橋亭仰象闕聆皇言之藹如儼天威於咫尺出含章之繒綵頒未央之通帛示章采之有差均多寡以沾澤於是扶疏覆帟張冪承雲魚魫燕尾妙香氤氲肆筵設席穆然以欣籩人實籩醢人實豆分玉粒於堯厨登珍膳以維偶膾炙美而處外殽胾列於左右鑒簠簋之必飭矧異數以命宥歌飽徳以樂胥普受福之孔厚旣陳饋以倍八復烹鮮而薦副沐在藻之恩膏嗤一割其何陋爰撤餘俎罷初筵䕃倚萬年之樹側聽靈芝之泉望水亭之太素想茅茨之在前並鼓腹於天衢而軒舞之翩躚於斯時也日之方中清颸初起鳴蝉嘒嘒聲曳層翳爰旅殽核爰錫酒醴則有綏山絢紅融峰結紫纂棗撰栗赤心黄理馬乳移種於西凉驪珠貢珍於越篚羅嘉果以維馨紛黄帕之斯啓跪受金爵琥珀其光繼以縹甆再覆再揚内卿宣勸洗爵飛觴不醉勿歸湛露洋洋疇不春融眼纈赭渥顔酡玉山峙而弗頽雲冠切而不俄雖燕衎之式忭矢温恭而靡他曰既醉止油然旅退薄晚靄於林暉凝秋容於嵐翠栁徑轉而欲迷虹梁渉而思憇則又有緑房含菂氷絲纏臂輕身延年除煩益氣方采沚而堆雲咸荷貺以錫類臣思夫盛典之希覯也昔夏姒饗鈞臺之上炎劉宴洛陽之宫貞觀慶善之洽禮開寳㑹節之從龍秪以循殿陛之故事介壽豈以雍容快於田而張樂恩自近而非公至若幸金明以選勝集芳林而燕喜惟宰貳與宗姓廼得邀賞賚而沃嘉旨豈有處清讌而軫念股肱合小大而永膺多祉若斯際之懽洽爲曠代之軼軌者乎臣摛詞未贍宫錦在膺積愧素飱貺重朱櫻負荷綿隕醉飫缶盈仰惟我聖皇之垂拱握璿璣而叶咸英屆有苖之格化宥品物以含𢎞佇見九苞集蒼虬迎醴泉涌神芝榮眞麟在藪洛甲效靈慶賜酺與擊壌萃萬國之歡情紀隆遇而靡罄曽何廻波于蒍之足稱賜宴瀛臺賦有序毛奇齡皇帝御極之二十年六幕既熈萬象咸晳内有輯綏之治外宣揆奮之文講筵陳允執時見羹墻授閫播懐柔重敷撻伐将奏要荒之耆定進觀華甸之清寧然猶處治思危萬幾克毖居高善下一徳相期緬茲九重宵旰之勞翻以百職後先為念君無忘幾康臣無忘喜起同有賡揚大臣為坎舞小臣為衎歌共相礲礪因借巻阿之釃酒暫臨曲水以浮桮鴻酺合樂偕來興慶宫前文喜開筵不在長春殿裡當此金昊乗秋之際玉衡指兌之時九龍門外梧樹常隂百子池頭荷花初落蓬臺萬頃淡波與帳殿俱開閬苑千重紫水共樓船並轉畫橈齊舉還看水面鳬鷖錦纜同牽原是班中鵷鷺掛長綃於汾水不待為歌汎碧琖於昆明非關習戰乃以黼藻華裳之錫展茲吹笙鼓瑟之情龜甲青羅傳於㡛氏麟文繡錦出自宫中依然束帛之承筐儼發衣裳於在笥纈袍未覆漫教韋綬裁成霞綺難名苐遣封敖領去草頭鋪紫罽就瑶漿林下蓋青油判将銀埒夏屋設公家之鼎秋蘭發王者之香乳中分䗶烹為龍鳳團花茶内加蘇散作琉璃細眼朱虬堪入脯需賚同昌縹玉可當醪曽呈裴令爾乃敕酒正掌頒醪之禮詔大官習錫膳之儀鵝􅀈䴏脾排從錦帶羹前玉鱠金虀褁在紅綾餅内雖漢南之鶉雀不入腥肴而􅒾海之蠵螺乆淹葅醢肉泥流翠釡恒誇朔塞明駝肌雪落霜刀幾化秋林飛蝶况復大梁供米舊號金鎗太液登鱻新批玉鬛炊彫亨豆擷露稗之通莖聶鱠加鉶瀹河魴於在藻匪獨侍餕饗天倉之粟将使從官饜蓬島之魚爾且醴設六清無煩監史飲過三爵尚授催籌謂堯仁之浩蕩一日非狂而舜澤之澶洄千鍾猶淺縱曰有偕其飲謹聞之大射筵前其如不醉無歸亦載在朝元詩裏然猶藕船十丈玉井留甘蓮露三危金盤獻乳簇蜂房於繖下洗象骨於波間擘圓繭則清瀣俱流嚥壺氷而沉疴頓減種同鴈實頒之覲鴈歸時窠覆馬蹄捧向馬頭載出固上林之寶植罕到人間亦惟聖世有金莖長貽天際在昔鎬京燕飲詩誦嘉賓洛汭觥觩史傳盛事遡軒皇之張樂紀績於容成即陶后之斟膏授籙於籛子是以鄴舘著抽詞之美栢梁誇儷句之能如澠有唱候服尚興廻波作詞後王不鄙豈有珪璋韎韐同在遊歌嚴樂淵雲並叨讌賞而不矢音於高岡稱詩於華薄将使袞裳筐筥無須採菽為吟陳饋分饎未見其桐作頌南國鮮鱨鯋之可麗北山乏杞李以相歡則是式金式玉在形民無醉飽之心而如阜如山疑天保缺岡陵之祝亦何以俾匡時之佐負鼎爼而說王功嚮化之民援土桴而歌帝力是用捃摭荒蕪對揚優渥借東頭之賸管紀西囿之鴻恩臣奇齡不勝踴躍歡忭稽首頓首而為之賦夫以台室冲嬴之㑹天街晃朗之辰六合八荒受治九州四海稱臣侯甸有同文之俗遐荒無抗徳之倫詩歌江漢之紀誥傳彭濮之賓顥土之媪輿旣闢明堂之王㑹維新爾乃君儆無虞臣歌訪落上法天行下導民瘼昕切求衣宵戒聚􅝵利在必興疑則廢格喜豢鵷鸞怒剪鯨鰐田董甾畬室務丹艧在宫在府一以振作聖心乾乾既勤且恪翻謂臣工勞者惟若從來官師規用木鐸温綸諄殷有如砥錯将藉遊豫庶幾酬酢爰設酒醴相予宴樂時則攝提初指乎金方夷則乍轉乎銅律清露徐塗乎階除凉風時起乎天末皇帝御少皥之宫臨蓐收之館将以理白藏調素節司秋起駕顥正按法時惟秩成道在相月霜柯澄鮮清景渙發瞻上林之􅕜㙷兮睹太液之滄茫迤三州之藻薄兮涵萬頃之波光石鯨偃而低棹兮湖鴈飛而南翔顧隰荷之赩翕兮喜臯蘭之正芳嫓千葉於華井兮滋九畹於江湘佳人掩其翠蓋兮君子發乎幽香雜鳬淡而映蔚兮㧞藏茛而獨存於是俯拾虹梁傍依璚樹彫航嵯峨紼纚廻互汎漭沆之流波向蓬萊而問度旌銜鳳艦之乗竿有龍綃之布駕雲母以迎風輯榜人而擊素拂出水之菰蒲起前汀之鷗鷺林間敞殿齊明雲缺危樓微露仿祈年之在前盻函徳而難泝總蒿宫之既成猶采椽之故歩渚雖轉乎滄浪石無分於灔澦任錦䌫之所牽望瑶臺而不知處爾乃蔥綾雪麗貝錦雲明天孫剪就鮫人織成八蠶並澣百䌰齊縈團花間綴繁繐相生繢或朱而或黒絲一縱而一横絢布龍鱗之彩纎如鴻翼之輕覆黄羅於玉篋開畫袱於金籝揭尚衣之紀印罥長籖而署名禭以表乎素貞綺乃發其崢嶸温比毳旃之荷榮來華袞之嬰較翠錦而自失何盤雕之可營若夫掌和受齊大官捧膳鬴有鉶芼之羹案設楚苗之饌割東海之鮮蠡斮南園之斥鷃煎惟芍葯能和腊以萱蘇為薦按雲鴻於罼羅驚霧豹之芻豢象膏白以瑩霜猩唇紅而染茜矧鳳液之嘉魚為靈沼所僅見分腮襍蘆筍之枝切鱠落桃花之片爾廼採江陵之藟以為虀淅梁山之黍以作飯玉菽星攢金麩霧散𢷬罌葅於紫海之泥濯龍餅若春江之練馬􅀈羊酪覺甘露之俱生鳳餅龍圑雖沃水而無患况夫珠林窈窕布以氍毺銀塘宛轉青幢是舒太清之酒釃如珍珠瑶漿玉醴瀼瀼露濡金盤甫繼雜出雕觚比之大斗以燕以娛監正屢勸仰傳聖謨謂此㫖酒好樂不渝有即醑我無亦可酤不聞晚近猶有賜酺金門下士幸非淳于張昭雖醉容止自如起拜稽首不掎不扶含芬咀滑拊躬而思聖恩浩蕩直如江湖獨憐小臣何徳當諸廼企淵淪之深廣兮歎滄波之不測被翠幔與碧衣兮想瑶池之所植𣺌秋風之䬀䬟兮澹曉露之霡霂上有蓮房之戢戢兮下有藕枝之濯濯外備七星之羅胸兮内含衆竅之在臆詔其衆賚此臣庻兮匪止為佐是酒食一片固足消疴厲兮三漿可以解鄙嗇獨是菂藶之週通兮即汚泥亦不費拂拭宛高節之多梗刺兮亦素絲之能直雖其心苦之自知兮乃根柢而見牙角第湛恩之當矢報兮兼大惠之不宿謹捆載而親捧持兮漫縮滋而破薏念此涓滴之難嗛嗛兮於眇忽乎何力乃錫予之有加而靡已兮望滄瀛而末極皇清文頴巻四十三
