body:
  text: 策問戊辰會試策問五道徐乾學問孝經為孝治天下者述也分五孝而以天子至尊標居其首教化之主也故天子之孝曰就言德被天下澤及萬物始終成就也然則五孝並須天子而成審矣乃于諸侯卿大夫士庶人各有訓辭豈非盡力隨分人各自勉者與抑天子既極愛敬必臣下能奉行其教乃成也我皇上躬行大孝竭誠備物孺慕同於虞舜三朝過於文王可謂通神明光四海者矣為臣下者幸生聖世其勉思夫立身事君宜何如與孔子以孝為至德要道又曰教之所由生又曰天地之性人為貴然則孝經性道教之書也中庸亦舉大孝逹孝然則曽子子思之傳皆本於孝與天子之孝以愛敬為綱其目可得而臚舉與五孝自致養而後尤莫重於致哀致嚴曽子所謂民德歸厚者固必本於此與其何以不愧於天經地義而自奮於至順之治多士研精孔鄭有日矣願統論其條貫樞要將敬聽焉問國家當務之急在知人安民百官得職斯萬姓蒙利古者咨於四嶽謀及卿士庶言同則繹罔弗羅衆人之耳目為明逹之用然如臯陶謨言載采采蓋覆其事以求其人而人固有所以所由所安之不同若何而果得其真與書又言慎簡乃僚蓋朝廷擇長官長官擇其屬擇之之法云何唐之陸贄宋之曽鞏言之詳矣抑更有敷佐其説者否也夫文王之朝士讓為大夫大夫讓為卿古者讓而挽近世乃趨於競矣競端一開舉者與為所舉者交私焉古今人絶相殊者曷故毋乃亷耻不興清議或缺以至斯極與唐制常參官上後三日舉一人自代猶有讓道焉然特具文爾欲收實效何道之從我皇上念安民之要在擇大吏故嘗疇咨在廷訪求俊乂而諸臣往往所舉失實彌厪宵旰之勞今欲洗心滌慮破除錮習何以去推諉之弊絶偏黨之萌何以立其誠使勿欺灼其知使必當試言之無隱問興賢育才古今異道論者謂三代以後淳漓朴散鄉里選舉或未出於至公不若一歸於學校科舉將聽言可以信行因文可以見道然與否與東漢以後策試孝亷有不中科而刺史太守免官者夫以實行取之而以空文試之得乎抑亦孝秀自名而未之學何以解於閔馬父之譏也書言學古入官議事以制記曰學士冬讀書典書者詔之然則興亷舉孝與夫讀書窮理豈異人任乎自教術多闕人材呰窳朝廷郡國有一事咨問愕眙不知所出識者病之熙寧中程子嘗建議革末流之弊朱子師其意作學校貢舉議設德行之科以齊其本又立分年試諸經子史時務之法使士無不通之經史而皆可用於世議未上聞而天下誦之今我皇上崇儒右文終始典學而士之占一經以試於有司者往往未足以對揚休問今若仿朱子之議而行之意人才必鼓舞振作試條舉其説以對問孔孟既逺道在遺經漢初以來諸家專門墨守師説而未皆合於道千餘年間僅稱董楊王韓然亦尚多訾議要其傳經之功果可盡泯與至有宋濓溪特起二程承之橫渠太高正蒙太虛不如周子太極龜山則並疑西銘其説何與共城之學貫徹天人或又以為象數而岐之何也宋史道學傳備載程朱高弟其行義可詳舉與朱子同時敬夫伯恭其羽翼也至於金溪陸氏論太極無極之旨則抵牾特甚其同異之故可得而悉數與元時金華諸子得朱子之傳明初理學未墜河津澠池特為正宗而餘干繼之讀書存疑居業三録造詣何如與其後新會姚江獨崇象山之學泰和高陵無錫起而闢之皆名儒巨擘其源流可詳論與我皇上纘堯舜之心傳𢎞周孔之至道士生今日必有能明諸儒體要者其分析言之將為黼座獻問仰觀俯察為帝王經世之大法司馬作天官河渠班氏益以五行地理自後或闕或詳何也古者以土圭測景其推歷本於章蔀紀元今里差嵗差或有不合何與占候分野其説不同唐一行以山河兩戒雲漢中分其果至當與宋元占天之家孰優孰劣今所用泰西之法詎不勝於曩代與至於冀州黃帝所都京師之地上應紫微邱濬謂地之勢以北為極其可得而揚厲與五嶽之名古今不一四瀆之流分合不常桑欽酈道元之説亦有可言者與國家設占天之官推驗災祥歷象其備員者率多庸瑣至於都會邉徼山川厄塞之數士大夫能心識口述者寡矣夫古者南正司天北正司地皆聖哲流亞用能絶地天通無蓋鰥寡今奚以無其人也將無儒者肄其文有司守其器道實不相謀與抑當飭海內髦士專心講習與夫崇效卑法儒者事也好學深思厥有源委便攄胸臆言其梗概己丑會試策問四道李光地問先儒論學之旨一曰主敬二曰窮理三曰踐行此三者為學入德之方亦即尊主庇民之道是故其敬純則所以不欺幽獨靖共夙夜者在此矣其理明則所以通逹治本周悉世務者在此矣其行粹則所以潔已奉公憂國體民者亦在此矣我皇上學貫天人道符堯舜於近代程朱之書尤惓惓表章焉良以其標持敬以為宗揭知行以為要有默契於聖神之心者也夫義理不窮則於聖賢精微古今事變不能知也踐履不篤則於特立獨行遺大投艱不足賴也然必先之以敬者何與敬為知行根柢朱子論之詳矣而或者以析知行為支離提主敬為增添然則朱子之意其亦可尋源極委而親切言之與唐虞命臣必曰欽哉傳曰君臣主敬則敬之一言於事君尤所重易之乾三言誠坤二言敬程子又曰誠則無不敬無乃存誠者即居敬之實與二字所以分合之旨又何謂也夫修身致主同條共貫多士涵濡聖澤數十年於兹所以講於儒先而為自獻之資者必有在矣其抒所學以對問周官之法溝洫以防旱潦委積以備凶荒蓋統天行人事之消息而為之計意至周也我皇上於河渠水利之要窮極精微曰者南北二河悉經聖謨指授濬渠修堤環千里水澤荒區淤為沃壤矣又推之江浙列郡使大吏巡行相度因地勢高下建閘啓閉潦有所泄旱有所資詩所稱原隰既平泉流既清者何以加焉復以積貯為生民大命常平之外又推行社倉之法無非所以責成有司加惠元元廣蓄儲而豫賑救也夫河渠之大者患其潰溢則隄防宜急小者慮其填淤則疏濬宜勤常平之管於官者則主守之出納宜嚴社倉之貯於民者則鄉正之選擇宜慎將無講畫之詳者存乎法行法之善者存乎人歟我皇上宵旰民瘼慮周萬世而有司奉行良法未能盡著成效者何歟漢召信臣之水利耿壽昌之常平所以使民稱便者其要安在朱子之社倉行之數十年而一縣無憂荒歉者何道之遵也諸士異日皆有民社之責者其矢心竭慮以對問經道汙隆與世盛衰故漢唐宋明之興莫不敦尚經術所關可謂重矣我皇上所以尊經崇道者獨至而且篤信周程張朱之書以統一諸儒之説經學之盛千載一時也夫經者天下之公理非一家之私言故有後人發明之功不可誣者亦有前人傳述之勞不可泯者考五經傳注朱子手定易詩二者而已夫京焦卦氣孰與邵圖王弼清虛何似程傳朱子宗程邵以作本義其視前儒淺深醇疵之致可以約略指歟齊魯韓嬰之詩不傳而毛氏孤行其説果盡孔門之舊歟考亭東萊之辨孰為得失也餘三經者朱子未有成書而或者盛詆尚書古文以為贋作訾議春秋三傳以為謬於聖人之意至於黜儀禮疑周官莫不推之為漢儒之過也夫禹謨伊訓説命傳道之書可得而詆與春秋三傳去聖最近可得盡訾與儀禮周禮周公經世大法可得疑且黜與漢儒守先待後之勤朱子蓋屢稱之後學紛紛之論其果有當歟夫溯聖經之源流辨先儒之同異信而好古以仰贊尊經崇道之化學者事也其敷陳所見於篇問歷代史書多有律歷一志所以授人時而興王道也論者謂二事相為表裏則然矣然其立法紛紛從來靡定至我皇上歷數在躬聲律身度以故天官之職超邁古今其於律吕隔八之法圍徑之數莫不審究根源考定密率誠千古疑誤至今日而始明者也夫歷法古稱地平今則曰地圓古立嵗差今則曰恆星行古推贏縮今則曰高卑度古紀五緯順逆伏留今則曰星輪非今之故為異實測則然也其所以然之故可縷而指歟黃鐘律管司馬遷曰八寸一分班固曰九寸吕覽又曰三寸九分三家果不同與抑未嘗不同而其説各有當與胡瑗蔡元定知蔡雍圍徑之非其所定律管則仍徑一圍三之疏率也不遇聖神孰審其真與夫律歷二者皆生於算古算術有勾股有弦矢於以割圜測弧亦綦密矣今則有勾股直角又有鋭鈍二角而三角之形始全有弦線矢線在圜之中又有切線割線在圜之外而八線之用始盡二者之算又皆歸於四率而比例以得之其理精微豈無能明言其致者與夫禮樂歷象儒者宜知九章之名列於六藝多士或言其理或陳其數以仰佐制作之盛焉乙卯順天鄉試策問五道韓菼問古之治天下者莫不以學為先務學也者所以學為治也二典言堯舜之德而所詳者皆其政事親睦九族平章百姓協和萬邦堯之所以治即堯之學與輯瑞覲牧巡守考績封山濬川命德討罪舜之所以治即舜之學與傅説之告高宗也曰斆學半曰事事乃其有備豳風無逸之誡成王也皆使之知稼穡之艱難意者帝王之學誠與韋布異必急所當務而措諸實用斯內外本末合一之道與我皇上躬神聖之資孜孜問學講習勿替一日萬幾措之宜也真所謂聖性得之又加聖心行之以實而不以文者四海之內即無由知聖學之高深而躬被德化固知足以上接堯舜之心傳而嫓美於高宗成王者矣顧聖不自聖猶若望道而未之見者則夫可以仰禆萬一者云何其可約略指與洪範九疇列五皇極而承之以乂用三德正直之用一剛柔之用四蓋聖人撫世酬物因時制宜陽舒隂斂之妙用所以獨攬天下之威福者也而先儒以惜紀綱謹法度重典刑戒姑息為人主之正直勇於救天下之弊果以斷天下之疑為人主之剛不驕不侈虛心訪道任用賢傑為人主之柔其義果足發明乎否與書曰稽於衆舍已從人又曰豫違汝弼汝無面從求言納諌固人君之先務也而以次召對羣臣咨謀善道其故事亦有可以舉行而無弊者與先儒又謂人主讀經則師其意讀史則師其迹讀經尚書為先讀史唐書為首夫書以道政事固萬世不易也而讀史則于今可以佐聖天子從容清燕之覽觀者宜先何書與諸士講聞治道之要久矣其熟之復之各殫其所聞問古之治國用分掌於三府而統之以太府經之以太宰以九賦斂財以九式節用而軍食不與蓋井田之民皆兵井田之賦皆餉兵食咸足之道也自漢有水衡少府司農之職暨唐設轉運使宋置條例財用司言財愈急而用愈絀矣乃蕭何在關中寇恂在河內當征伐四方而餉運相繼即唐之劉晏於用兵之時而能轉輸不竭者其斟酌盈虛固有道與抑其遺意猶有可踵行者與我皇上慈惠元元不忍一夫失所間者軍旅數興日費大司農金錢而一不以及民恩澤甚厚惟是捐不急省浮費酌俸入核經制而嵗登之額猶不償出也將何策以濟或以為宿兵太多則浮冒宜核比者亦嘗清軍伍矣芻茭糗糧以次核減而猶多煩費也得無節之之道已無可復講又或節者已至而生者猶未盡與歷代贍兵之法咸資屯田議者多以為迂以其利積於嵗月之久難旦夕效也然趙充國之屯金城諸葛亮之屯渭濵鄧艾之屯夀春羊祜之屯襄陽皆烽火相望枕戈帶甲之區也且戰且耕卒以制勝豈昔人行之固别有道與抑今古勢異容有難行者與騎兵慓徑誠不可以耕若步兵若守兵若所汰之老弱月廩縣官而無事也去其伍籍又無以生也果可授地以屯與至夫中原曠衍之區誠多未闢之土或以為師行供億蓋勞苦矣其猶有遊間者可勸之耕與議者又謂冶礦之利不加賦而用足得毋利一弊百徒煩擾百姓與夫利析秋毫誠非所以恤民生而崇大體若夫庚癸之慮亦所當未雨而綢繆也意必有不傷民不絀用可以生財之大道試條其可者問致治之本首在安民安民之要莫先擇吏蓋以守令之職布上德而逹民隱至重也漢宣帝加意吏治嘗曰與我共此民者惟良二千石乎有冶效者輒以璽書勉勵或爵至列侯猗與何風之隆也其致治良以此與我皇上撫臨宇縣子惠庶民凡縣令治行聞者得擢補臺諫而郡守之良者亦輒躋顯位所以重司牧而大激勸者尤非挽近世所能幾矣往者尤簡慎其官非正途不與非待次不與非保舉不與所以恤民生而謹致治清濁之源也間以軍興聼督撫大臣選授惟其才不惟資格尤見鼓舞人才登進無方之至意顧何道而使舉皆得人人皆稱職與夫安民之吏悃愊無華日計不足月計有餘而矯虔者則以苛為察以刻為明一切取辦而民生重困得毋牧民之道誠在此而不在彼與古良吏皆良將才也如龔遂刺渤海張綱守廣陵虞詡長朝歌一時盜賊衰止潢池肅清論者謂其才勇過人迹其行事惟循循然勸耕作崇教化一循吏之所為將禦冦之策即寓於撫民之內與今者瘡殘初起流散初集如秦楚江閩之交藩鎮所恢復督撫所招徠户口不下數十萬我皇上如天好生既出諸水火而賜以矜全噢咻而雨露之惟守令焉是賴督撫所補誠才也賢也即不以次何害萬一少有未當其别有司察之方與昔唐之盛時縣令皆命廷臣推擇又妙選京朝官為刺史賦詩勞遣以寵其行今或者倣薦舉之法以嚴其官行召見慰勞之禮以作其氣明賞罰以必其效寬文法以盡其才其果有禆於吏治民生否與抑倡率者果有在而未可獨責守令與多士試昌言之以為國家愛養斯民之一助問古者道德一而風俗同雖世異人殊作者之衆其相為發明表裏如一家由虞夏以來可考而知也聖人既往諸子各以説亂其宗而人心之禍亟矣夫學術之異同繫世道人心之邪正試窮源溯流與諸士商質焉可乎蓋百家言黃老黃帝之書儒者不道顧今世所傳其旨絶類老氏其諸老之徒為之耶抑固其真與楊墨無老子同時楊又師老墨蓋宗師大禹先儒謂孔子悖德悖禮之訓已是闢墨潔身亂倫已是闢楊然與老子而後有法家名家旁出為縱橫家然寖不顯獨莊子一出挾老氏駕楊墨竟為崇尚虛無所自起其放何與莊老之言莫盛於晉佛書亦于時滋多特其言鄙陋為莊老者不以助其師説而盡竄入釋氏之書以立之幟又所未解也佛之講義既盛尋又掃而為禪學要亦清談之餘習則莊老已盡亡而併於禪而儒與佛猶二也自宋蘇氏以儒佛為同南渡後張子韶又陽儒而隂佛朱子斥之為邪徑為陷溺為甚於洪水之酷然則陸之學固亦有所自與子靜不言禪而禪機最深其離合出入之際能使人入其中而不知亦可直窮其根柢與明之儒者如敬軒敬齋循循然一於下學也自江門之學一倡儼然釋氏靜坐體究之説此固宋室之子韶而姚江特更揚其波與晚年定論一書謂朱陸始異晚同今考其年月絶相反其舛戾之故可得而知與名法家久不傳然如申商者豈不足濟一時非禪學比而朱子於永康之言事功又深闢之得毋王霸誼利之辨有在幾微者與我皇上表章正學罷黜百家扶道統而正人心度越千古也諸士必擇守之有素其著之篇將以知所嚮方問史有六家尚書春秋左傳國語史記漢書是已其後則歸之二家左傳史記是巳編年左氏家也紀傳子長家也各有優劣前賢評之詳矣抑有可得而推論者與編年之書自漢迄隋作者四十一家餘失名者尚多有然則唐以前之史編年者衆耶涑水通鑑編年之總也而紫陽又别為義例增損櫽括為綱目表嵗以首年因年以著統大書以提要分注以備言一筆一削皆春秋之遺緒也後之儒者取宋元之史依倣其例則不逮逺甚且此固遊夏之徒所慎也而楊維楨著宋遼金正統辨甚惜當時修史者不能舉綱目之大義則其傳誠不可無續與或者又謂其書未易成姑如李燾之續長編者以待後之君子其可與世所稱二十一史皆史記家也而莫難於表志昔賢謂司馬遷功在十表班氏尚不通旁行邪上何與志之大原起於爾雅司馬氏曰書蔡雍曰意華嶠曰典張勃曰録何法盛曰説皆志也而夾漈鄭氏謂盡爾雅之義者蓋鮮何與昔劉知幾欲削天文藝文而增都邑氏族方物志夾漈又參以十五略得毋時異俗殊固可以意為沿革增加而由今論之其不可闕如者又何也正史之外古者必有雜史參行如偏記小録瑣言逸事之類作史者靡不獵其繁蕪要歸正道然則逸書之徴誠不可不廣與煩簡取裁自昔非一歐陽氏新唐書自謂文減於舊事詳於昔史通則謂宜隨世事之厚薄不必限篇第以多少又孰當與聖天子操制作之權為萬世法程憫勝國之事絶而弗傳將勒成書以示於後則講聞切究正在兹時故略舉所聞冀篤學嗜古心知其意者有三隅之發焉戊午科順天武鄉試策問一道韓菼問司馬九伐之法所以聲有罪彰天討故征之為言正也自黃帝以來先正而後竒先仁義而後權譎然世傳黃帝有握竒文而孫子亦云兵以正合以竒勝豈王者有征無戰之師亦不廢兵家權謀之用與間者凶渠肆逆天兵所指底定可期而蜂結蟻聚之衆猶稽旦夕之誅則奮揚我武握竒決勝固亦貞正之藉也新書云已二而敵一則一術為正一術為竒已五而敵一則三術為正二術為竒此竒正素分也然有謂大君所命為正將所自出為竒者有以合戰為正後出為竒者有以步為正騎為竒者其説果孰長與抑亦臨時制宜而後可以變化如環無端乎夫竒正者所以制敵之虛實虛實之不知無以得其情而制其命兵家以五間為神紀其方略可得而言與古者軍中必有地利三人主逺近險易水涸山阻故兵法言地生度度生量量生數數生稱稱生勝孫子有地形篇又有九地篇今果何厄何易其要害之處云何深入宜何嚮何以攻其所不守何以使吾與戰之地不可知以多方誤之若此者皆避實搗虛竒正相變之大要也諸士試條若指掌畫若聚米以為國家凱歌示喜偃武修文之一助皇清文頴卷二十四
