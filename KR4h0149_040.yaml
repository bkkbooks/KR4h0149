body:
  text: 賦璿璣玉衡賦有序葉方藹夫乾苞闡祕襲氣母於羲皇神䇿迎長占斗綱於軒后南正司天之載五緯同躔東嵎迓日之年四時成嵗乃肇渾天之制爰垂歷象之名邈矣悠哉敻乎尚矣若其靈承帝眷敬授民時基命夙夜之心效法聰明之德先聖後聖其揆一也我皇上凝休紫極昭受璇穹上治而協健行下交以成泰運珍符霧集聚房會井之精景貺雲臻合璧編珠之瑞猶且單心不懈奉若加虔推玉律以調八風授靈臺而占五候星球乍啓不踰分至之司圭表初懸無爽隂陽之景緹宮吹管即應黃鐘嶰谷鳴筒奚煩黑黍此惟清寧同撰日月合明故仰昊瞻天久在淵衷己裕勑幾觀象不越反躬而求矣若稽勳華之代首崇平秩之規是有璣衡用資測驗以之考憲而七政攸齊以之亮工而五辰斯撫固稱隆於曩昔實合契於今兹敢竭疏庸敬陳斯賦天德健行聖躬時憲懸象昭回泰階巍煥並明照以升恆握神機而清晏攬貞觀之同符美勳華之再見審厯象之儀型考璣衡之舊撰爾其乾文中列坤質外包機緘畢設網紐斜交既轄之以圎軸又管之以橫簫飾蠙珠之的皪琢崑玉之英瑶輸激水以自運旋靈樞而不撓三重之儀而六合莫之外一寸之管而萬象不能淆其為體也規如彈丸其為用也捷如轉圜其為象也三百六十有五度之廣其為數也一百七萬一千里之寬黃道赤道界其內南極北極持其端日月回環於其際星辰縈帶於其間東遊而蒼龍晨駕西遊而玉露宵溥景長而朱曦送燠景短而清風戒寒辨早晚之異候察盈縮之殊觀雖渾涵於一氣實森布於周垣智非同於窺牖情寧等於扣槃彼夫洛下初摹鮮于爰度測靈憲於張衡營銅儀於錢樂承天淳風之改造一行郭公之制作莫不研渺慮於毫釐覃巧思於冥漠法加密於前人理終資於先覺縱能析夫天象之至微猶未喻乎聖心之所託也蓋璿璣之所紀者名玉衡之所窺者形形非道之妙名非理之精道則剛健而中正理則元亨而利貞是天體之所以宰乎化育而至德之所以合乎穆清故乃上瞻峻極仰則髙明旁規二曜疏觀列星占以五事驗以庶徴以言乎日太陽之精純離之質聖人法之以施剛德負丹扆以答陽臨彤軒而辨色洞萬物於幽遐統羣工而祖識煥昭明乎四方布暉光於九域以言乎月內政之修隂教之協聖人法之以安柔節循晏晦以有時慎紏虔而罔忒致少采以修刑謹後宮而辨列起風化於關雎絶燕私於女謁至夫五緯行天日月之餘彼遲留而伏匿即消息與盈虛雖疾徐之各異及次舍之懸殊要觀祲而禳災必修德以臨諸惟嵗星之為木主東方之甲乙年浹辰而一終揆進退而罕失適春陽之始舒聿體仁而播德發倉廩以振乏絶飭田事而定凖直睇東作以瓜見土膏待下流而承大澤熒惑司火其日丙丁周天行以二載主夏令之暢盈乃有遂良贊俊之典勞民勸相之行斷薄眚而出輕繫嗜欲靜而晏隂成養壯佼以順時定心氣而永寧若填星之位乎中央其日戊巳而寄王乎季久居之國福厚薄焉者反是所以統四時而合度總五行而成位會隂陽風雨之和收稼穡作甘之利節火耕水耨之勤紓金毁木飢之弊爰有太白之曜庚辛是主嵗一周天附日而處惟金行之秋令肅天地於區宇詰暴而來逺方勑法而繕囹圄建都邑以備囷倉易關市以柔商旅辰星水德壬癸司衡環陽麗日至隂之精乃迎寒於北郊時閉塞而冬成爰恤羽林之孤寡審龜策之吉凶命百官而視蓋藏考工師而按度程是曰三辰亦名七政惟在下者召其和乃在上者彰其應匪天心之偶違從實人事之多逆順皇皇乎不聞亦式穆穆乎非言而令必敬凛夫旦明若儼承其提命斯軌順而階平庶璣明而衡正為象緯之貞符昭皇王之景運非甘石之能窺詎羲和之足問繄我上聖端拱垂旒倣天體之廣覆嚮明堂而爥幽喜怒形乎寒燠刑賞協乎春秋貌言視聽以咸飭工虞水火之交修肖乾坤易簡之易演皇極斂錫之疇是故天不愛夫寶道神永獻以嘉庥德有動而必叶感無美而勿遒定永年之歷數荷帝錫之共球眺榮光於德水産蓂莢於皇州受昭華龍敘之器賡卿雲復旦之謳嫓陶唐之茂烈方虞后之徽猷又何假乎玉儀銅渾之製與夫保章馮相之儔璿璣玉衡賦張玉書仰乾象之昭融周寰宇而默運成嵗功於靈樞燭人事以垂訓遐覽古初隂陽軌順五精呈符三光朗潤誕受圖於榮河爰協筒於時令嗣在髙陽八風叶應載洎帝嚳五官司正中星辨於伊耆七曜齊於帝舜於稽虞制曰璣曰衡璣設象以環映衡窺機而中橫眷密緯之粲列雖銖黍之畢程飾夜光以測度既規圓而體精琢良玉以為管亦外澤而中瑩古厯云亡星官失術越有渾儀是纂是述凖尺寸以經營傳璣衡之髣佛其為體也六合外圍辰遊內設指二軸以直距燭低昻於毫末其為用也分天脊以立極跨地平而定隅持南北之兩端激機輪如轉樞若夫日躔黃道與赤為界半入其中半出其外晷長至而牽牛是經景短至而東井斯在辨婁角於春秋實二分之交會此日行之軌陽舒而隂殺者也月行九道黃道則一周列四維隨方易色經其南為朱經其西為白經其東為青經其北為黑分內外而錯居并中道為九則此月行之軌陽消而隂息者也至於驗五緯之凌厯分嬴縮於步躔惟金水之附日常一嵗而周天火再嵗而秉令木一終而司權填中央以主福閲二十八嵗而一遷其間順逆留伏循環無端伏行最急留行則延順厯而東行則合逆軌而西行則偏此五星之度有常道亦有變愆者也大抵日月之行以天為輻星緯之道以日為轂天左旋而常嬴日麗天而差縮天視日為有餘日規天為不足積經嵗以為期斯日會天而來復繄太隂之行緩按躔次而可推計一日之所退常十三度而有竒月一周而交會實日速而月遲惟星官之步厯謂進度為難稽指逆數以握算若右旋其易窺倘折衷於至當實左旋其不移夫天度有常觀象斯在天命難諶惟德克配昔者聖人之答幽明序五行也晝考乎日氣協純陽象以修政積精於剛垂離照於庶事振遐覽於八荒夕考乎月體含純隂象以修德退密洗心既內庭之式序亦宵衣之是針爾乃啓春令於東陸屬重華而為木溥仁澤以噓枯配青陽之覆育秩夏令於南訛屬熒惑而為火敷禮教以牖民範羣蒙之偏頗涼風既至太白司金象秋令以義正肆賞善而罰淫嚴霜乍隕辰星司水象冬令以智臨爰植綱而置紀令行季夏中德為土四星迭運填不易矩堅大信如金石捷令甲於風雨於是乎有治溝洫設瀦防疏川谷謹關梁之水政有司烜爟頒禁律改國火救時疾之火政有戢淫邪嚴五刑誅暴慢厲五兵之金政有掌薪蒸禁林麓司器用慎儲蓄之木政有辨物産課樹藝定土圭度地勢之土政凡以觀文察變協序撫辰或災沴之偶告即修救以薦馨雖禮詳於三代實道啓於虞廷觀於命九官分庶職警天工協羣力罔非察惠逆於神人相璣衡而因革此所謂欽若之淵源厯千聖而同德也天祚聖皇丕膺休命衍箕疇行夏正格神明盡物性握苞符以建極召箕畢而環應惟睿慮之璣衡不假器而垂鏡於時天門肅穆泰階清平儼衆星環共而仰紫極之威神焉百職受成四海陶冶譬二十八宿之森列而司九州之分野焉朝視政以勤民夜考經而省憲兩曜之旁矚無垠而宰之以至健也軫旱潦以渙號宣幽滯而逹情五緯之代更遞旺而總之以好生也繼自今以協氣旁流嘉生蕃殖大澤沾濡聲靈允塞固不必連珠合璧之祥五福庶徴之集然後知郅隆臻於三五而天人接於呼吸也己璿璣玉衡賦王鴻緒維天運之無垠仰蒼蒼於終古秉乾健以立德普覆幬於六宇殫智慮而難窺藉法天之聖主粵稽軒轅受命披圗作覩大撓占斗綱𨽻首立算數容成作蓋天臾蓲推莢蔀羌星官之羅列順四時而步天武傳自陶唐彤車白馬爰造璣衡分經凖含欽若勿違授時函夏揖讓有虞祗承玉厯仰觀俯察朝乾夕惕碧漢髙低星辰的皪目營心維斯程是適爾其為璣也如輪如轂象天之圓繽紛合沓碁布星躔煌煌煜煜璀璨編連攬夜光之徑寸綴瓊宇之澄鮮爾其為衡也取質荆山是琢是雕中空外堅美麗瓊瑤似截琅玕之竹如橫鳯閣之簫用以斜窺夫列宿睨視乎層霄至南極北極作天樞紐出地入地或昻或否衆星分羅如臣拱后天穹窿而旋左日月星辰錯落而旋右總度數之棼如皆於是焉觀其休咎若夫曜靈東浴玉兔西生拂扶桑而沈細栁揚素娥而瀉銀瀛一則乍嬴乍縮一則半虧半盈時而重光重潤時而或犯或凌茍按器以潛思洵燭照而有徴乃熒惑處南重華居東太白西而辰星北填為土德宅乎其中既稟性之各異亦徐疾之不同月隂精而具陽日陽精而秉隂金水受光於火日木土資生於水金他若羣星之隱見盈萬羅寥廓而森森無不挈靈機而知數倚玉管而探尋於考中星實辨昏曉秋虛冬昴夏火春鳥譬循環之無端猶翔龍之旋繞定四序於代更割隂陽於忽杪至稽行道之黃赤分內隂與外陽蟾魄之青朱黑白羲御之冬短夏長一南而百物雕朽一北而萬彚輝煌等瑶梭之交織傃七襄而成章皆璣衡之妙用察天道於微茫何三代永守以為寶遭函關一炬而消亡逮經營始於洛下鑄象肇於夀昌錢樂造為銅渾猗尺度而寸量更若儀名六合制起三辰側立斜倚分其位黃環白環運其輪儼四遊之在內凖直距而維均恃衡管之俯仰占晷刻於冬春洎仰儀簡儀之迭變候極立運之紛綸師古帝之遺法曠千載而同論茍厥德其不回何妨乎創制之維新我皇上文武聖神誕膺景命體天行而作則順民時而立政合二氣以相宣調萬年之金鏡念乾符下孚於君德必皇衷上契乎穆清故前民而開務謹時憲於元正離光騰而物照氷輪現而景澄則宸躬之日月常升恆也視為目而主明貌為水而主恭聽為金而王聰思為土而主睿言為火而主從則君心之五行恆肅雍也無形之七政運行罔息在中之璣衡不聞亦式雖上極夫皇王之盛治疇得以纍崔巍之至德將使日月循緯五星同色比重華之逰河入昴同放勳之睹景出翼相與遊乎卿雲之縵縵暢九垓而彌萬國璿璣玉衡賦有序湯斌臣聞蓂莢初生古帝識明時之義澤火成象大易垂治厯之文朝廷之政令未施奉若之儀規先備蓋敬天即勤民之本而法天實凝命之原自容成定握算而六術已昭黃帝聽合宮而五行較著南正司天北正司地重黎釐職於隂陽暘谷候春昧谷候秋羲和致嚴於分至莫不仰觀俯察上律旁羅然存其理而缺其儀未盡觀占之哲有其數而無其器難成察稽之功尚考虞書聿垂偉製躔度窺於寸管文星運於圜機聚山澤之精華極人工之賁飾誠授時之要術步厯之宏規也然而至德難聞成模漸斁精思罕遇不無章會之訛參驗或淆遂有統元之誤以建申為建亥魯人之月令無憑以食卯併食辰齊廷之度數何舛太初厯稱邃密夀王猶議其非乾象術號精深韓翊尚指其短固由天行之難定實亦制度之未精觀會通於古今應彰明於昭代恭惟皇上履端建極麗正凝神日就月將光華協于天地朝乾夕惕奮迅象乎風雷道在欽崇凜曰明而曰旦功深宥密謹亦保而亦臨時憲之厯久頒永年之法新勒合元會運世之終始辨五十二家之殘叢將見合璧聨珠嵗書太史大章含譽日紀靈臺乃復尚稽典謨究明遺憲旁招庶士敷奏鴻詞將假翰藻而明三才藉筆泉而協五紀臣罔窺理數素昧天人幸際昌辰敢辭蕪陋謹獻賦曰緬鴻蒙之初闢邈莫知其紀極仰寥廓而無垠識蒼蒼之正色渺終古而左旋疇轉輪而不息羅萬象於周回建極紐於南北三垣表內外之宫庭列宿畫中原之邦域圜九重兮誰營里九萬兮孰測維邃古之神靈肇觀天而作則揆茫茫之元化總睿聖之範圍粵重華之膺籙紹放勳之巍巍初受終於文祖乃躬覽夫萬幾方類禋之未舉首申命於衡璣蓋執中以體會於淵穆自觀察而效法其精微亦猶七十載之光被四表其功用惟本天治人而不違若夫魁衡招搖之密運隂陽寒暑之潛移非參稽之不爽何庶績之咸熙矧乃天雞曉唱羲馭晝踆朝浴滄海夕耀崑崙景近極而炎暑景逺極而易昏居牽牛而一陽來復舍降婁而春風自溫燭龍未足誇其光彩夸父無由效其駿奔至夫繼離宵曜夜光融融朒朓警闕朏魄示沖應潮汐之消長從箕畢而澤風日退度於十三遂置閠而成功再如木德行仁太白秉義熒惑主禮辰緯藏智惟填司信位王四季或期嵗而周天或纍年而遷次或方進而復留或既分而忽會信薄蝕之有常乃伏見之難泥初偶乖於絫黍久漸易其機樞何以測算不失於晦朔氣數罔愆於盈虛惟至人德合蒼昊制凖乾圖璣運外而規圜衡當軸而虛中兩極相望於直距九行環繞夫紫宫大梁實沈之周列鶉首鶉尾之麗空四遊兩環定經緯表裏之凖三辰六合挈卯酉子午之針運躔離於晷刻轉造化於尺尋東作南訛畢協於節序攝提孟陬宛肖夫天心隨波降升似昭回之銀漢與日環繞象靈烏之迅飛晝晦重隂而儀度不愆烈風雷雨而僭忒不譏飾以鴻寶綴以美璣瓊璧精瑩雲霞之色可挹夜光璀璨星宿之芒依稀雖曰以管窺天何能持小而測大要之因衡察象實可殊途而同歸後若萇𢎞子韋之探賾索隱梓慎禆竈之極渺窮工殷周之巫咸史佚魏齊之石氏甘公王朔唐昧之觀星候氣尹臯吳範之視日覘風漢唐則夀昌一行之術密宋元則沈括守敬之業崇其用器也踵事而增華敷衍而不窮或造輪扇而刻木或倚渾儀而鑄銅或削蓮花以傳箭或斫觚稜以盤龍誰能不祖奧旨而述成規遂可察氣數而合蒼穹豈若倚蓋彈丸蟻旋磨轉術家之微渺無聞法象之探索猶淺彼張衡之藻翰稱工洛下之經畫推善靈憲之圗書猶存嵗差之考稽難舛損益適宜縮嬴合撰足以驗同氣於天人通至誠於幽顯是以帝王俯察人事仰觀天則時幾必勑視聽母惑常扶陽而抑隂更緩刑而尚德雨暘寒燠若其序嵗月日星順其職皇猷玉潤而東壁聨輝帝典金清而左角不忒煌煌乎執大象而撫地中面稽天若卜年萬億敬抽毫而作賦若身隨臯夔之班而逰唐虞之世璿璣玉衡賦梅文鼎至哉渾儀之為器也體天地之撰類經緯之情極深窮高闡微致精殆更僕莫殫其藴纍牘難悉其形者矣粵自道生宇宙肇為大圜健運無息東西斡旋七政錯行宿離紏紛交光羅絡終始相嬗雖有離朱孰窺其端聖哲挺生繼天立極開物成務敘疇作易俯察仰觀賾探隱索諗六虛之曠邈詎目營兮可獲乃範金兮為儀縱若衡兮八尺厯以之治兮象以之核堯命羲和四隅分宅制閏成嵗釐工熙績匪有器以御之孰所憑而推䇿虞帝受之璣衡以設敬天勤民兩聖一轍嗣三統兮迭更兹重器兮罔褻陳東序兮天球惟河圗兮為列蓋先聖之法物豈司天之可闕嬴秦力政蔑棄天常遷周九鼎焚燬舊章球圗湮沒莫知其鄉厯紀乖次伏隂愆陽及夫漢造太初渾天初置惟意匠兮經營莫詳徴乎昔制曽黃赤兮未分矧嵗差兮能治厯唐逾宋代有討論小異大同踵事增新説存諸史約略可陳外周六合八觚三輪平圎象地以域昏晨子午雙環樞紐中尊卯酉交加日月之門是立郛郭以挈三辰黃倚赤而相結剖二至與二兮判發斂兮南北距紫極兮為言小環四海又居其內左右周窺兩簫更代低昻斜側折旋唯意儀三重兮共樞亶推步兮精義亦有銅球實惟渾象列星綴離三家殊狀或附益之兩曜類蟻行兮磨上遲速行兮一機或水轉兮磨蕩非不研精覃思窮神盡智象重大兮易膠每機關兮弗利儀重環兮掩映或未宜兮窺視加以代易人湮乍成旋廢造之也綦難用之也匪易若乃元祖初服廣徴碩儒有美魯齋王郭之徒既作授時備纍與書髙表四丈承以景符簡儀候極離立扶疏二線代管分杪乘除庋百刻兮天腹旋立運兮四虛窺几兮測月蓮花兮挈壺正方有案兮定南北懸正坐正兮九服之須仰儀兮虛而似金度斜絡兮南極攸居可謂酌古凖今洵美且都者矣厯年逾百有明膺命雖大統兮殊稱實授時兮為政屬作都兮石城旋京邑兮北定既觀臺兮屢遷地更置兮乖應豈儀器兮多忤抑疇人兮弗敬寧弗善厥初兮嵗薦更兮滋病經生既非所習兮又圉之以禁令占測算各分科兮或承訛而罕正設官司厯幾為文具交食或乖誰知其故爾乃海西之士萬里來賔奉其師説備其咨詢如禮失兮求野似問郯兮識官實暗符兮周髀此久缺兮彼傳於是吳淞太史仁和水部夜譯晨鈔心追手步亦得請而開局集歐邏與儒素擷西土兮精英入中算兮爐鑄屢清臺兮雜候多密合兮可據怵巧拙兮相形新術良兮羣妬歷既成兮弗用書十年兮徒著何人事兮多違或有待兮天意兹遇隆時體乾出治頒朔正時上符古帝洞新法之合天可永遵為定制既測驗之無差豈中西之有異哂陋儒兮泥古騁小辨兮譏評若盲不杖兮聾别竽笙斯術之無弊兮經指摘兮益明乃詔大史乃咨在廷謂新厯兮允臧顧儀器兮未成式采銅兮名山鳩哲匠兮上京備製兮六儀各錫兮嘉名赤道兮法動天之西轉黃道兮順七曜之東行古二道為一器兮聊倣佛其斜橫今别其用兮法以簡而倍精黃既麗赤而左旋兮復右還以計程緯度之各異兮亦異其經黃自有極以運兮測距度以為徴日心正對兮逰表是承時時可驗節候兮若響於聲地平之儀辨方正位轉線參直三光所至出沒之度漸升之意秒忽微茫具可别識象限平轉兮測髙與庳割圎八線兮於是焉施合四為一兮周天在兹度惟九十兮厥數已全紀限六十兮於以參焉正反隅角兮靡幽弗宣用稽距度兮兩星之間弧三角之法兮推其所然五者相資多人分測片晷之餘各盡目力假變行之迅速蓋須臾之罔忒别有渾球全賦星躔循黃之極碁罫珠聨列曜逺近南北入度小輪之限凖斯無捂亦依赤極出地有恆或正升兮斜降或正降兮斜升晰伏見之先後信里差之足憑黃緯之列兮百世無改宮分迤差兮恆星東滙以度計年兮六十六載下設旋輪兮應時周動刻漏罔僭兮機發於踵爰有髙弧繫之天頂地平經緯相為形影或象限兮平觀或紀限兮斜距或黃赤儀之所窺潔之球而參遇爛若軒轅之寶鏡兮縮圜形而周布衆儀得其散兮球徴其聚正求兮反映宛轉兮回互測量有書兮或不能句摩挲斯器兮曠如揭霧更旋宮兮十二隨道里兮攸殊際地之極南北兮以為之樞子午及平環兮以限四隅隅各三宮兮東方為初次第右環兮大權以區三合六合之照兮凶吉分途惟斯球而可睹兮考步笇之密疏致用萬端未克枚舉洵天府兮竒珍昭大法兮來許若其鎔金有術棄滓取精磨礱砥礪光輝熒熒旋之中規直之中繩擘劃勻細大半畸零重心巧測銖兩無嬴惟置儀兮合度雖久逺兮無傾趺交之以銅龍兮或海獸以相擎為水凖與螺柱兮常消息焉取平天矯兮騰踔攫拏兮狰獰詎美觀兮一時永奠定兮千齡乃至崇臺百步回出闤闠周以儲胥纎埃不至上列六臺方圎式異相依兮交讓旋觀兮罔閡施窺筒之竒巧盻千里兮如對晝候兮日面之星夜占兮句已之態折照浮光兮氣水水氣清濛厚薄兮地心相配交食淺深兮起虧進退地景厚薄兮青緑明昧視差有多少兮命天九重月有弦望兮太白攸同抱日為輪兮互入相容超西法之舊兮信天能之弗窮登斯臺也軒豁洞逹耳目開通揮斥兮八極廣攬兮無終意氣兮飛揚凌虛兮御風習其器也陸離瀟灑繽紛容與爛縵兮卿雲昭回兮星野照曜兮焜煌周流兮軒翥戄臨汝兮旦明逰吾心兮太古帝載之於穆兮陟降其所垓埏之遼絶兮斂之一黍匪重黎之遺迹兮曷其臻兹要眇邈祁姚之不作兮疇復探斯奧窔伊崇效而卑法兮協至德於太灝定百代之猶豫兮踵惟精於帝道畢逺臣之巧思兮備前王之所少璿璣玉衡之不傳兮乃今而獲聖人之大寶亂曰巍巍穹窿帝所則兮小心昭事惟合德兮寫以良金如肖像兮父乾母坤斯瞻仰兮子之於親視無形兮對越在兹曷敢以寧兮兢兢業業承天休兮奉若不違升大猷兮祈天永命從兹始兮億萬斯年昊天其子之兮瀛臺賦葉方藹惟皇清受命混一海宇建邦設都開疆啓土煥紫宫之矞皇輝丹闕之耀麗五雲鬱其上浮九重屹其雄峙固己運中央設萬國奠六鼇鞏四極樹無外之宏模立不騫之遐則者矣爾乃皇上聽政之暇思以鬯睿情洽宸歡頌匪日咏斯干爰循故國之遺址聿起新朝之壯觀巋乎其所謂瀛臺者是臺也聳金墉之西隅環玉河之四滙矗鴻濛而建標映觚稜而交彩俯雲霧以檻楯捫星辰以户椳廓遐覽於九州迓景福於千載寧良工之役其鬼神直上宰之移其蓬海觀夫紫戺霏微碧基深窅層櫨揭蘖飛梁夭矯陽馬驤騰於四榮隂虬躨跜於八表芝栭煥其戢孴桂柱挺而踔蹻爛朱緑之璘㻞繢仙靈之縹眇金鼇玉蝀連閣道以紆回雕碧文珉緣御墀而窈窕中復藏溫室理曲房蘭牖藻井螭梠鳳窗瓊寮珠户玉陛瑶璫青璅葳蕤夫綺疏丹雘歙赩乎雕梁既岧峩而霐窲亦蜒蜿而軒翔瞻矚周旁俯仰上下其翼然者為亭其曠然者為榭其幽然者為淵其呀然者為罅鸞簫象管奏天樂於芳朝雲錦霓裳奉宸遊於清夜山則林麓深䨹岡巒參差嶮巇岞峪嶢屼嵬嶷玉女捧盆而上睨仙人引掌而下垂湧寶地而傑立非神變其誰為水則發源西山泝流渤海泛濫洄瀠砰􅀈奔駭走碧沙以油沺激白石其磊磊似弱水之蕩潏乎神居望瓊樓珠閣而靉靆則有珍樹敷榮瑶草含秀迷榖洊開華平長茂肅慎貢夫雒常拘彌獻其變晝紛沓蒼鬱左右前後畜九真之祥麟圉林氏之騶虞馴條峯之倉鹿間大宛之赤駒鴻鵠鵷鸞互頡頏於霄漢鵁鶄鸂鶒爭喋唼于菰蒲青鯈裔與而遂其羣育白魚跳躍而應其貞符時維春也勾芒司令太皥乘權萬木紛其向榮百彚呈而鬬妍條風披拂淑氣回旋天子於是御蒼玉之輦載青帛之旃望籧筐於桑野省錢鎛於農田襭菁華以敷賁逹幽滯而昭宣或賞花而作賦或垂釣而摛萹時維夏也長嬴序臨祝融炎煽平疇麥登凌室氷薦美嘉木之留隂賞芳蓮之發絢天子於是彈五弦之琴揮七華之扇驅浮壒於太空引神飈於綺殿既解愠而阜財亦覽時而察變豈繡嶺之能方而甘泉之可羡若夫白帝改候青女戒時百物告瑞萬寶薦釐天子乃復出重霤降層墀驂大丙擁羣祗講獮狩之典習戰陳之儀八旗雷動七校雲移曜霆掣電搏熊射羆弧彎而蒼隼落劍舞而白猿馳凡以順金令之肅殺而代造物之威施至於北陸迎暉南方見昴虹影既藏雲物斯考天子乃復扄神紫微棲心元皓爰燕息而深居用恭默而思道牙籖錦軸朱文緑字之竒玉匣金縢大貝赤刀之寶周廬環護夫百靈宥密靜通乎萬肇於戲斯真所謂斟元化順亭毒攬金鏡調玉燭酌兩儀之節宣統億萬於掌握爰窮髙而極深自膺福而綏祿故能奢未及侈儉而不陋規遵王度動中得趣搆成靈闕結為神宇擬玉虛之清都恍太乙之紫府觀者目眯而精搖聞者神動而色沮斯固侍從之方朔不能馳辨而逞詞待詔之相如毋庸掞藻而抒麗者也爾乃下里之士負書珥筆挾策周京觀光上國躑躅鵷班之後徘徊象魏之側喟然興曰夫詩書所陳史册所紀唐堯茅階虞舜蒿柱混沌淳悶不可久處若夫周有靈臺而興秦以阿房而廢未央建章臨春結綺神仙長年艮嶽瓊宇或藉之昌或荒以圯惟居業之不同斯處室之各異今我皇上端而虛儼而佇髙拱九元洞矚萬里咨臯夔訪伊呂解網縱禽吹律回黍貌言視聽祓其思嵗月日星符其序雨暘寒燠四時若其官食貨賔師八政修其紀是以庶徴應百福綏逺為和風近為朝曦及物物解被人人怡練太和於神明動歡欣於四支雖一遊而一豫亦可咏而可思夫臺之以瀛稱也唐有瀛洲之榮宋有瀛館之選皆以處夫石渠之英而集彼金門之彥顧何草茅末品蓬蔂微賤亦得翺翔碧霄眺瞻清殿繞龍鱗而識聖顔移雉尾而窺宮扇深荷髙厚之神施敢矢涓滴之微願請為作歌以志舞抃歌曰維皇有道無反無側維皇有路蕩平正直皇在靈囿熙熙長旦景星紛陳卿雲是爛皇在靈沼澤沛恩浹海水無波江濤有截皇之出兮百神駿奔雨師灑道風伯清塵皇之入兮元一守户以翼以于是篤是祜惟圎錫蓋惟方獻輿惟嶽輸固惟溟效濡億萬斯年我皇樂胥懋勤殿秋蘭賦有序葉方藹臣方藹於七月二十四日入直南書房臣英臣士竒示臣懋勤殿秋蘭賦二篇竊念蘭微卉爾得沐禁近之清光荷天顔之一笑何其幸也臣又聞十室之邑必有忠信十步之內必有芳草山陬海澨含英孕竒者何限物倘有知欣欣向榮之情曷能已乎於是廣此意而為賦曰覽大鈞之播化察卉木之殊類庶土所滋繽紛薈萃或品下而栽榮或質幽而地悴惟懷芳兮處崇斯揚蕤兮呈瑞相彼幽蘭精英淑粹當其萌茁於山陂也靈根所託不髙不卑陋下澤之沮洳厭層巖之嶮巇倚翠微之徑曲緣碧澗之水湄含華吐秀芬敷色披背􅀢葹與薋蒻映杜蘅與江蘺夫其抱馥雖殊應候自若冬索春敷夏茂秋落乃有類同稟異貞姿晚萼勾芒升而緗葉始抽蓐收御而朱英方折衆皆黃落以萎摧此獨流馨而綽約貞潔兮似抱德以待時晶英兮類協期而知托依赤墀入紫閣長結蔭於玉除永棲影於金谷且夫懋勤之為殿聖主於是乎寧神端拱怡情典學擷先哲之菁華藻圗書而丹雘綺疏日上兮鉛槧纍纍櫺檻風來兮藝香漠漠延載筆之儒臣褰穆清之淵幕於時松牖始秋梧宮未霜蓮潭變彩竹院生涼蒼苔縈砌瑶草拂廊開琅函而氣爽抽鳳藻而思揚爾乃綺窗之下綈几之旁翠枝縹蒂紫莖緑穰天香流兮拂拂幽藴發兮揚揚至如陽暉早曙露濯清宵鶴羽初警蛩吟乍撩蚪簷晚靜蛛網晝寥挹孤芳兮若逺若近玩貞姿兮永夕永朝遏青裳之薰鬱黜將離之艷妖亭亨兮如謇諤之臣矢氷心以環列左右纚纚兮如潔修之士敷玉藻以掩映宸霄彼夫度索之桃實三千扶荔之甘蕉十二陵邱蟬聨臯澤搖裔者不可勝紀皆擯置而不陳獨此蘭之繞砌於以見崇質而斥華尚德而賤藝栽培乎素履之林掇採乎晚成之蒂根深而其膏必沃植厚斯其功弗替豈無緣山被阿枝叢葉岐怨空谷之莫采經霜霰之凄其則與麋鹿偕處腐草同萎空寄生於野人之圃或分蒔於山谷之坻雖煙霞之賞愛奚崇髙之見知臣聞去蕭艾惟虞未盡藝蒲蘭常憂不榮何難羅三湘之秀攬七澤之英盡九畹之種空百畝之羣上窮嵯峨之顛下徹清泠之漬拂之拭之兮咸登有道聖人之側俾流徽於宣化之闥崇禮之廷而且林總兮萬品之蓊鬱扶疏兮千世之蔥菁會同館賦盛符升若夫風雨之交河山之固帝王所以宅京也車書之會道里之均遐邇所以來庭也故北鎮始封流沙西被而東矢既貢駢乘南行惟八荒之在宥斯九譯之咸臻服紈牛而馴露犬供珠樹而獻素禽以至飛車乘毳沒羽浮金賮虞周所未賮臣軒頊所未臣莫非太平之盛事因為一統之常經至於懷方有氏象胥有官治其委積致其饔飱皆昔王所以崇禮數重郵傳也我朝肇域東方親附莫先於蒙古自白鶴之夢應于秫田玉璽之祥收於察部而相率來歸者或義屬一家或恩周萬户即今四十九旗之衆奉貢請安者嵗時踵武所以理藩有院特為開府他若賔服之三方則會同館為之主也原夫共球肇啓東自朝鮮節貢者三年貢者一其臣事為最先赤螢朱提比于三品蘭千罽㲲擬於絺纎豹獺取織皮之備紙米當􅖽秷之全而其仰被恩施者特厚賜金印賜裘馬免鷹免弓減粟減綿所加禮者己六十年西有吐魯番則回族也地本車師關通嘉峪昔爭哈密而搆難於前朝今合五城而入貢於甘肅所進者西馬羚羊金剛玉璞亦有駝鷹蒲萄旃罽刀弓之屬朝廷念其荒逺貢為遞減而賞從優渥由粵西而入者安南黎氏也龍編雉贄數欵祥州玉莭星軺時臨富水期兩貢之並進定六年以為紀厥貢南金博爐燭銀縷簋加以薰陸沈箋犀角象齒因其君臣能慕義以獻功仰承宸翰有忠孝保邦之褒美至於粵東之貢道非一其南而西者為暹羅地多犀象俗貴香茶翠毛雀尾紫梗椒花紛織文與白氎兼藥石之繁多其西南之絶逺者為西洋舊有古里鎖里三十餘國散居海疆若今之波而都瓦為前代所未詳數其庭實亦有珊瑚琥珀哆囉伽備象齒犀角油露諸香後以貢獅復至義更重於來王今其人之向慕華風者多留處嶴門之陽而十萬里外更有異士星歷擅長生在拂覽勞績尤彰其由閩而入者為東南之琉球也居馬山而依黿嶼厯彭島而入湄州二年一貢臣職克修封使再遣禮節殊優復軫念其地瘠自銅琉海螺而外槩謝却而弗收而中山世土之題榜天章炳炳於遐陬兼許其陪臣子弟雍序來逰斯文教之逺被足司契於懷柔其昔道粵東而今由南閩者為荷蘭地居險逺貢以八年充庭之盛過於諸邉如珊瑚琥珀玻璃玳瑁皆珍錯之駢闐及哆囉嗶吱洋布矮縀復紈綺之斑斕雜以刀劍鞍馬檀椒香露番花番蔻毛毯毛氊而海氛未靖之日又能移兵助勦功成夾板之船所以彤弓載錫嘉其至而勞其還他若西陲之有番寺乃土番故地也元為郡縣倘尚浮屠明初因之改立僧寺今之在洮岷者二十六在西寧者九來則各加恩賜其烏斯藏為稍大或稱王或稱法王或稱國師或稱禪師厥號各異地由滇蜀以逮秦隴義取外扞而兼內衛此又效順坤維甘肅以南之屏蔽也方今海水恬波扶桑銜日商舶環通泉流外溢將銀甕竹杖之咸臻亦鳳穴麟洲之可陟則又有四譯之館以待殊方之遙集雖吳客之稱大歸西賔之談無外安足以罄其頌述哉臣職次禮官預聞南館有通事以待朝鮮有司賔以通四逺致饔致餼之俱詳掌環掌訝之是典更有三館二厰聚其馬駝收之牧苑雖析為有司之職守無一非聖澤之流衍也頌曰環館開卉袵來趾相錯兮玉虎鳴銀麞入增式廓兮越火枝浮瑶水窮禹鑿兮或冠帶或椎結紛戍削兮梯航會筐篚陳竒珍爍兮六節通九牢具恩優渥兮守四裔家六合綿地絡兮東戶啓南薰奏長宴樂兮皇清文頴卷四十
