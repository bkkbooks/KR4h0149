body:
  text: 詩七言絶句滇南凱旋歌六首王士禎鈞天樂動五城樓玉輅前行十二斿親見萬方頻送喜翠華三度幸盧溝湖南福建雲南大軍振旅皆駐蹕盧溝郊勞將軍收取舊山河飲馬瀾滄萬里波珍味天厨人不識禁中特遣一封駝升中大禮視圜丘黃幄天清宿霧收朝罷將軍先受賞尚方催進紫貂裘都人夾道看旌旄萬里歸來血洗刀鞲上竒鷹皆帶角仗前天馬盡拳毛原廟衣冠二十春太平今見上陵辰象犀玳瑁新供祭巧使安南備九賔上將謁安南孝陵適國請至京封表清時王㑹遍諸方絶調升平嗣柏梁從此漢家新樂府白狼添詠又三章今年上元賦賜朝臣宴於效柏梁體升平嘉宴詩乾清宮御書頒賜瀛臺賜宴恭紀六首王士禎朝來敕賜宴淋池桂楫蘭舟待水嬉度盡雲沙回首望緑楊風外颭黃旗越羅吳錦尚方來黃紙書名繡作堆次第鵷行齊拜賜凉蟬聲裏謝恩回御舟往往艤沙汀瓊島中流日幾經不是華林樂魚鳥慈顔近在五龍亭中㫖頻傳內大臣龍眠學士命重申捧觴跪起華裀上蘋末風來散酒鱗唐詩玉船風動酒鱗紅崇蘭風泛共徘徊九畹揚揚取次開鄭重天香擕滿袖移從𢎞德殿中來太液池中百子蓮花開十丈藕如船酒闌宣賜歸鞍重錯認滄洲太乙仙賜貢茶二首王士禎朝來八餅賜頭綱魚眼徐翻晝漏長青篛紅籤休比並黃羅猶帶御前香兩府當年拜賜回龍團金縷詫竒哉聖朝事事寬民力騎火無勞驛騎來賜櫻桃漿恭紀王士禎色映琉璃得未曾凉風長日拂觚稜人間不識嵰山雪天上相逄玉井冰上陵歌三首王士禎令支回合萬重山閃日旌旗虎豹間東望風雲過沛上西來車騎出蕭關遼水東回北鎮斜龍盤虎踞帝王家依依最是關門桞十二年前拂翠華辛亥今大駕謁年陵於盛京年十二矣艱難王業本岐豐扶杖來觀父老同詔賜大酺還給復一時歌舞遍遼東扈從紀事四首勵杜訥獻歲才過命駕行不緣佳序緩期程省方問俗乘農暇瓠子桃花趂浪平勾陳羽衛臨畿甸帶郭連村抃舞迎野老自言蠲賦後家家餘粟足春耕麥滿田疇望雨時欣傳甘㴻迓龍旗觀風錫宴新晴報德合天心事事冝花箋分列榜髙張選句摛辭效頌揚一路春風蓬户外爭書聖壽祝無疆懋勤殿芍藥春前盛開恭賦二首勵杜訥艷陽才許鬭芳菲何事衝寒蕚巳肥松棟自來多湛露不須欄畔待春暉漫誇魏紫與姚黃幾見春先入建章早綻丹樓饒正色得隨瓊蕊侍君王御製咏杜鵑花詩賜臣士竒恭紀三首髙士竒滿院薰風拂絳跗亭亭孤幹托仙鋪吟成寶墨流香瀋散作重霄雨露濡鶴林移到自何年一片朱霞玉檻前弱植己甘巗畔老翻因野逸得天憐龍焰堆成火齊盤光搖扣砌晃瓊闌噓培難答陽和澤捧日惟舒一寸丹扈蹕登景山恭紀二首髙士竒細草新莎生碧甃古槐高栁映朱楹薰風才過端陽後聽得鳴蟬第一聲蘢葱仙境九成臺石磴螭文暗緑苔聖主朝朝勤聽政看山一月幾回來夏日扈從聖駕幸西山南苑恭紀十首高士竒懸崖百尺俯高稜捫葛攀蘿最上層跨馬不愁登陟險身依日月氣憑陵自黑龍潭乘馬度峻嶺至五華閣荒山古寺夕陽邊萬木清隂一澗泉啼鳥嚶嚶迎綵仗野花灼灼㸃金韀廣泉寺緑隂夾路門繞流泉鳥語花香山容太古帳殿風微暑氣凉夜深清籟發幽篁亭臺影裏人聲靜皎月新懸滿壁光上於山亭夜坐對月賦詩一首深深古洞絶躋攀灑翰題詩碧漢間返照入林添氣色半天幡影揚青山御聖感寺照耀山谷是日書寶幡上登寶珠洞賦詩賦詩一首贈寺僧海岫命臣英臣士竒各行殿虛明月似銀髙張絳蠟坐華裀夜分獨自披章奏內㫖連催召輔臣上於行宫詳覽章奏必至夜分有時召閣臣面議或至三鼓問安近侍頻馳馬視膳中官每進鮮心戀慈寧天性切朝朝遙憶繡闈前太上於南苑射鮮麅進絶於路皇太后中使往來不巍巍高殿入雲孤寶地琉璃翠色鋪得附六龍巡上界此身早巳到清都上幸南苑元靈宮諸勝特命臣士竒遍觀雨濕宫槐曉霧開今朝傳幸晾鷹臺爐烟香繞龍牀淨猶待詞臣進講來上於南苑仍行日講未嘗稍輟風送蟬聲直到門空庭寂寂見苔痕緑隂一片方亭午半晌清凉造物恩上真武廟門前古槐蒼鬱命遊憩其下駿騎嘶風寶轡明蒼麋射得早歸營年豐還講三驅禮時有安危繫聖情上嘗言人君當安不忘危故於幾暇時勞餘聖躬是日合圍麋鹿成羣上親射一巨鹿俱釋之賜金盤時果恭紀三首高士竒新香拂拂摘芳林淡碧微紅藴素心故事休傳王逸少青囊何用乞來禽蘋果蓮菂新收太液池黃金盤裏玉參差幾回細嚼寒漿迸想像紅衣裛露時蓮子紫角青包水府鮮中官初進御筵前野人那識瀛洲味翻憶西湖過雨天鮮菱瀛臺賜宴詩十二首尤侗君王消夏蘂珠宮垂柳垂楊面面風緑水青山繞殿閣千官影立畫圖中新秋零露乍濃濃曉啓天門照燭龍十里香風吹不散遙知蘭澤採芙蓉玉泉一𣲖注流淙太液池邊隱畫艭自有恩波成五色浣花不羡錦名江並泛蘭橈度玉墀分明閬苑接瑶池大官預辦鈞天宴內殿先頒金屈巵御林深處綺筵開轟飲無煩黃紙催挹酒頻從北斗望五雲千朵起蓬萊吳綾越綺望如雲捧手疑沾百和薰正值銀河初渡後天孫織錦就回文夢到瑶京弄紫鸞紅樓十二碧欄杆多因挾纊君恩厚一夜西風不覺寒靈囿分齊鵷鷺班雲階月地許躋攀登高試上瓊華島看盡齊州萬㸃山休沐初聞罷早朝長楊五柞暫逍遙外人若問吹笙曲先是彤弓後蓼蕭水殿風微翠幄凉叢蘭九畹揚芬芳離騷紉作幽人佩今日方稱王者香豈樂曾聞宴鎬京羣工獨飽雉頭羮小臣願借金莖露還獻吾皇萬壽觥河漢宸章彩鳳銜盈廷歌咢勝韶咸短才本乏凌雲賦欲報慙無五色函聖駕南巡視河吳越歡迎曲八首徐倬淮黃合注幾千春璧馬臨河感聖仁天錫九疇開禹貢時逄二月協虞巡歲歲田收畝一鍾雞豚醴酒足三冬南村北舍欣相告天子親來為勸農太平時節盛鶯花碧水丹山貢物華遙識天顔還有喜江南無地不桑麻菖蒲新緑杏花紅雞犬桑麻輦路中陌上吳歌真夏諺民間細事繪豳風軋軋機聲繞緑蕪插秧時節水禽呼農家作苦官家曉盡在新頒耕織圖南郊士女踏陽春手執豚蹄祝社神粒粟寸絲皆帝力五風十雨盡皇仁桃李今年故放遲鳬鷖共樂太平時休誇湖水三千頃可比天家太液池錦纜牙檣接絳霄江神河伯盡來朝山呼萬歲逾千里聲奪錢塘夜半潮恭紀聖恩詩八首有序徐倬伏惟在位之靖共維一侍從尤親立朝之報稱雖同投閒倍切光依日月曾到雲霄影戢江湖不忘廊廟况恩施于父子先後拜揚且澤及于妻孥家庭順聚斯誠遭逄所希有而詠歌之莫罄者也洪惟皇帝陛下功宏幬載德邁生成𢎞錫類之仁孝稱不匱體羣臣之隱道在無私雖枯木朽株盡沐陽春之澤凡黃童白叟胥逰化日之中臣倬學慙朴遫年及耄荒簡擢清班曾上花甎之直矜全末路得安草野之生燕雀春風相將婦子雞豚社日共樂升平但念十載潛踪自分浮沉于下澤猶幸一經授子希圖報效于涓埃臣子翰林院侍講學士臣元正者屢荷榮遷兩頒寶翰職斯有忝恩巳無涯而猶越分陳情妄干天聽以臣倬同臣妻年躋八十路隔三千猥緣烏鳥之私乞從鑾輿之便特恩俯允溫諭有加且令鼓棹前驅軫及于脂車秣馬遂得擔囊早至歡生于送臘迎春回淑氣于窮檐色縈寸草起祥光而開篋賦寫高松一室團圞如登極樂之國貧兒拜舞還疑春夢之中臣倬何人膺斯隆遇謹率妻子孫曾恭排香案望闕叩頭謝恩訖擬欲涓誠繕疏披瀝愚𠂻復因畎畝間身不得拜陳奏牘幸遇六飛之南下得隨萬姓而歡迎瞻仰之餘敬呈蕪句其詞曰虞巡四十二年春就日瞻雲萬萬人誰獨感恩情最切青衫白髮老儒臣仙凡逈隔是蓬瀛身到三山近太清長憶通明香案下玉皇親自㸃微名萬國觀瞻屬四門圜橋禮樂有淵源三千弟子橫經侍再擁臯比是特恩傳家慙愧鳳池毛兩世深恩歷史曹身在江湖心在闕夢魂飛入五雲高十年身隔鳳凰池一夜銜恩介酒巵誰道八旬眉案下重添半百老萊兒驛路三千道里深驊騮未度意沉吟乘船騎馬尋常事也費天王俯恤心圍爐如晝燭如銀兒捧辛盤獻老親絳縣漫誇堯甲子今宵恩抵八千春晝靜真如對紫庭夜深呵護草堂靈平添奎壁光多少牛斗中間見幾星聖駕南巡詩二首楊瑄春風輦路草芊綿望幸輿情又十年聽得南巡宣諭到家家引領五雲邊路入京華繡壤平翠華巡歷為春耕時禽也識勤民意桑壠隂隂布穀聲恩賜玻璃眼鏡一副恭紀三首楊瑄珍逾照乘勝懸黎妙製新傳自海西親向九重宣賜出人間何用刮金鎞并州快剪剖輕冰碾得如規碧月澄從此紙窗燈火夜長箋小字寫秋蠅摩挲雙纈感年華蕙圃春風似隔紗一片空明塵翳淨今朝真見上林花暢春園書堂春日即事二首徐元夢春光浩蕩是天家五色迷離處處花探討自應忘歲月雲窗卷帙足生涯花光栁色䕃晴川諷詠何期此地偏黃鳥也知人意樂朝朝啼向艷陽天蒙恩賜新笋數枝名鴈來笋恭紀二首張廷瓚春林鴈筍露華滋驛使封題貢御時自昔京華曾未識分頒塞北遇尤竒解籜香生緑玉痕得嘗珍味荷君恩宵來清夢留人處家在江南水竹村南巡扈從恭紀四首張廷瓚春流如縠片帆開晚浦明霞錦作堆錯落紅燈浮水面直疑龍獻夜珠來赭黃華蓋軟風吹童叟爭看鷁首移羽衛不教傳警蹕天顔豈獨近臣知棐几珊瑚架筆牀吳舠清晝擁書囊藝箋五色頻揮灑春浪長流翰墨香桑麻四野散和風父老謳歌擊壤同天詔猶言民力竭如傷只在聖心中觀河布德詩十二首王九齡升平聖主坐埀裳萬國共球集廟堂治至神堯無一事尚煩帝念是懷襄省方古帝有成謨奧壤如今說五湖此去觀河兼問俗望中風物入吳都三農元后重春畦愛聽山村布穀啼佇見杏花菖葉裏躬乘青輅問鋤犁乘流彩鷁向江關縹眇鸞旗霄漢間白叟黃童咸拜手春風三度識龍顔躬視河流日幾回欲將沈竈作春臺任教白水黃茅地龍馬衝泥盡到來烟波何處植桑麻六馬欣瞻駕日車天子自行沈璧玉寧愁春浪漲桃花車駕乘春省俗時秋毫無擾肅諸司漁莊酒肆渾如故萬乘雷行總不知四民辛苦首農功春省吟成睿藻工自是宸𠂻崇稼穡陳詩不待獻豳風望幸雲霓渴九霄地連吳越豈迢遙太陽自識傾葵志早見恩光遍六橋桞營校閲集熊羆挾矢爭看射㦸枝盛治揆文兼奮武觀兵冝在太平時金山千丈削芙蓉翠輦經時駐碧峯笑指長江魚競躍妙髙臺上有真龍春藹龍翔鷁首東天回絳闕正薰風請磨千仞吳山石䖍勒南巡萬世功皇清文頴卷九十八
