body:
  text: 頌升平頌有序張英臣竊惟自昔國家席纍葉之鴻庥撫守成之大業承平既久類必有非常之功以蕩滌瑕穢而鎮撫生民然後皇威遐鬯社稷奠安有泰山四維磐石苞桑之固焉在詩有之曰薄言震之莫不震疊在書有之曰其克詰爾戎兵以陟禹之迹方行天下至於海表夫以成康之郅隆猶以張皇六師為大訓載於詩書信有徴矣漢以兵力定七國文景之業彌光尤已事之最明者哉蓋國家之有師旅征伐猶天地之有霜雪雷霆也非霜雪則萬物煩囂之氣不肅非雷霆則四時堙鬱之氣不宣非師旅征伐則亂臣賊子無所讋服懲創而不敢肆故霜雪所以開陽春也雷霆所以啓晴霽也師旅征伐所以靖祲氛致太平也天地仁愛萬物之心與聖人仁愛萬物之心皆不得已而託之乎此者也我國家自世祖皇帝戡定大統皇上撫御區夏以來待藩臣之恩良渥矣處之以重鎮視之以心膂睦之以懿親極之以髙爵顯秩豢之以膏腴腆祿乃物太甘則自蠧獸久畜則思觸富貴極而驕悍生驕悍生而反噬起平居則怙勢席寵以荼毒朝廷逺方之赤子及下尺一之詔則環視而起一方作俑諸方應之以盜弄天子之戈於潢池舉平日朝廷所付之疆土所屬之將士所簡閲之器械所賚豫之金錢悉藉以抗天子之命據固阻險伏莽跳梁是非大奮我武以芟刈而剃獮之何以昭臣子萬世之經而彰我國家四征不庭之罰乃自始亂以來授鉞天潢分馳禁旅虎臣四出鷹揚奮興以漸次削平迄於今八載海內蕩定昭明無纖芥根株之遺可謂盛矣臣竊念身依闕廷趨承講幄者五年簡侍近密者又四年其逺方兵威克捷之竒戰勝攻取之略戈甲組練之華折衝陵轢之勢臣雖未得而聞且見也若我皇上八年來宵衣旰食之心則臣知之最深念赤子罹於湯火急欲一旦出而登之袵席之上每復一城一邑必嚴諭以無擾百姓至仁也武臣進止皆恭請廟算以行萬里之外視如眉睫之間凡一經聖慮則險者平難者易成功奏績刻日而應至神也簡任將帥以武勇智略為經以持重寬愛為緯疇咨而舉推轂而行至慎也減膳撤懸力崇簡約以佐天下兵食之需故軍興歲久常賦不益至儉也閫外將帥時賜手敕申誡其有能靖寇撫民者則灑宸翰製詩篇解御服以褒異之至厚也數年來屢避正殿朝賀一方底定宫中必焚香親告天祖至敬也未明求衣昧爽聼政日昃不遑暇食夜分省覽章奏不輟以籌畫天下至勞也捷書至必敬告兩宫親承色笑歡聲溢於殿陛之間至孝也殲渠魁而舍脅從逆命者誅之歸命者撫之赦過宥罪布大誥於天下至信也天下之人但見八年之內殄滅羣冦綏靖地方震古躒今武功若此之盛而能盡知我皇上深宫之中神武勝算焦心勞思如此之不易易哉今者十月克復雲南賊渠授首十一月十三日夜露布至皇上時御乾清宫覽奏臣等叩頭稱賀御榻前天顔悅甚顧謂臣等曰朕今日為天下萬姓喜追思逆亂以來官民咸被荼苦更復惻然於懷臣等謹合詞對曰皇上仁愛之心通於天地斯所以為萬世開太平也聖衷之一念不忘百姓者舉類此臣因伏念古者雅頌之作以昭德紀功周宣王平淮北而江漢興歌唐憲宗平蔡州而淮西有頌若以方今日之功力不足以當百之一當時之臣猶能撰述詩頌鋪揚國美垂布金石焜耀史册况我國家數年中東戡閩粵西定隴蜀北平察哈南靖滇黔竒功茂烈炳炳麟麟不可勝紀臣職居惇史載筆左右其敢以固陋自覆而不勉綴賡揚之末班乎謹撰頌八章曰平閩平粵平察哈平隴平蜀平滇各指一事言之也曰泰階平歸功廟謨也曰武功偃樂成功重休養也統名之曰升平為萬世無疆慶也詩曰吉甫作誦穆如清風則臣滋愧也平閩閩嶠峨峨閩海泱泱灘石劍立篁叢弩張狂童逆命爰阻我疆勢連長鯨濁亂海邦王師奮武載斾皇皇東由姑蔑西經豫章如霆擊枯如髮攖鋩繫頸以組俘於明光厦門逋寇歸我帆檣一民不殲神武孔將平粵古稱百粵象郡羊城昔建南藩以奠東溟乃生猰貐怙勢憑陵不孝不弟為亂之萌天戈所指遊魂載驚既歸而命既抒而誠狼子反覆黃鉞斯行梟巢盡毁瘴海彌清毒潭鱷掃合浦珠明五嶺煙蠻南拱神京平察哈北嶽為鎮東海為垠部落環衛繡錯魚鱗中有察哈舊我育民居我肘腋為我藩臣蠢兹負德忽煽烽塵元老秉鉞我馬侁侁師惟一戰命不重申殲彼強寇不返隻輪魁渠函首獻於紫宸太宗戡伐前烈維新平隴隴西涇陽俗剽民徑亂臣反戈河北咸震我師既出逐北乘勝頓於堅城歲靡有定帝曰元老往敷朕訓示之以威懷之以信矢不遺鏃兵不折刃崇墉夜開俯首歸命投戈而呼悔罪思順秦隴千祀惟以歌詠平蜀古維西蜀國號魚鳬劍閣嶙峋雲棧﨑嶇一夫扼險萬夫歎吁况峙糗糧千里沃腴賊實藉之稽我天誅將軍憑陵蠶叢坦塗既克保寧遂入成都孤雛咸殪腐鼠莫逋夔門巫峽重釐版圖德威赫赫時聽巴歈平滇誕惟滇寇倡亂之先攘臂昆池竊踞湘川王師萃止如雲蔽天威武撻伐聲震八埏巨凶既殄餘燼猶燃寄命孤城析骸經年元戎奮武伐鼓淵淵鐵橋失險滇城摧堅翦彼鯨鯢膏我戈鋋亂源禍始藁街特懸泰階平六軍振旅九服來同桃林歸馬扶桑挂弓星輝雲縵嶽朗川融休哉鴻烈誰其始終輔弼之英貔虎之雄祇受成命謨由聖衷智勇天錫濬哲亶聰握機鏡要神運樞中仁慈恭儉昭格蒼穹鞏萬世業定此膚功武功偃我有弓矢願言櫜之我有戈矛載釁藏之膏澤萬物雲行雨施譬彼稂莠翦伐無遺今此良苖滋溉攸宜仰承帝祜俯恤民疲崇文敦教返於恬熙仁風愷政浹髓淪肌至德𢎞仁頌有序張英稽古稱幅􅊷之廣曰東漸於海西被於流沙朔南暨聲教訖於四海可謂盛矣然東南以海為域西曰流沙則猶在今甘肅之境朔方亦未嘗明言所至之地三代以來歷漢唐宋元明求其王化之所及車書之所通梯航重譯之所至皆未有如我國家今日之無逺弗屆者也皇上視荒逺之人無異於畿甸之赤子凡跂行喙息者皆欲令其生養安全而納之軌物之中盡兩間之所覆載不忍一方一人不獲其所書所謂光天之下至於海隅蒼生萬邦黎獻共為帝臣豈非聖人之心前後古今一轍哉曩時喀爾喀君長僻處遐陬雖屢通職貢未盡躬修臣節今者嚮慕德威傾心內附願列藩臣皇上鑒彼精忱厚加存恤給地安置豢以牲畜芻粟以資其生恩至渥矣爰以康熙三十年孟夏之月車駕親自拊循期門羽林之士雲衛景從五月初吉至於邊徼之地七旗喀爾喀君長率其衆數十萬人歸誠效命於龍旗鸞斾之前莫不扶老挈幼稽顙流涕感頌呼籲朝見伏謁如儀皇上育以至仁涵以至德錫宴頒賞咸從優渥發德音下明詔嘉其嚮化之誠豫以世守之爵其宗族皆賜秩有差復為之申法禁布規條曉以禍福迪以幹年俾與四十九旗同沾恩澤永逺生養猗歟盛哉皇上之德怙冒此天地照臨並日月會合如風雲濡澤若雨露昭明法紀如三辰之麗天底定方隅如四維之奠地恩賚禮成羣心欣悅普天率土莫不謳頌前史紀載罕覯斯盛臣忝居惇史之班敢對揚休美恭獻頌曰維彼逺人雖處漠北自天覆之豈有方域罔克奠居聖心憫惻好生之仁惟帝時則一章靡憚暑雨跋履山川安人是亟懷逺宜先滌其荼苦賚以生全稽顙至止歡動八埏二章何以宴之旨酒維清何以錫之庭實百朋龎眉皓首扶杖來聽天膏所沛萬類皆榮三章自古仁人繼絶舉廢存其名號勿殄厥世永為北藩版圖是隸帶礪之封爰及苖裔四章聖慈藹藹申令煌煌維仁是育維義是匡教以親遜爾毋胥戕食我茅土率我典常五章我德既敷我武孔揚如雲如電戈甲騰驤如虎如貔騎官蹶張天威赫濯震肅遐荒六章自兹逺人保聚生息如溺斯拯如稿斯植耕田鑿井維帝之力錫爵分圭維帝之德七章駕轉六龍雲生九陌甘雨載塗澤我疆埸人和致祥敷天悅懌盛舉永光昭於簡册八章聖武三臨絶塞蕩寇功成頌有序張英皇帝承天景命臨御宇內勞九重之宵旰謀萬姓之乂安所以撫綏而教養之者至矣備矣蠲柤之詔嵗必數下史不絶書嘉惠元元動以數百萬計積貯之令行於豐稔遍於州邑所在有數十年之儲凡此無非為百姓計也曩時三逆盤結為天下蠧必致荼毒生民於是大奮威武翦除而廓清之蓋聖人之心欲使薄海內外戴髮含齒之氓咸遂安養共樂生成同登仁夀之風永底時雍之化深宫睿慮之所孜孜圖維自朝至於日中昃不遑暇食者惟在乎此也乂安中土之心切則不得不安邊徼欲安邊徼則不得不除冦賊荒逺之區脫有梗我王化伏莽跳梁之人則將來必益為邊患為邊患則必調發轉輸以逺煩禁旅勞頓九州之民聖心所以惓惓焉為國家計久逺為生民謀休息為萬世立太平必欲蕩滌此狡寇厄魯特噶爾丹者所以安邉塞也威逺人也實所以乂安中土也維丙子季春聖躬親御六飛逺度瀚海戈甲耀日旌旗蔽空風馳雲集俯瞰賊壘如自天而下為狡寇之所不及料披靡奔潰獸駭鳥散徑旅堵截一鼓而草剃禽獮之賊雖遁迹荒逺而部曲盡矣牧畜空矣奄奄之息何能久存庸衆之識似更不煩車駕之再臨王師之久駐乃宸算制敵逈出尋常留將軍於塞上以困蹙震悚之聖躬以丙子冬復臨邉塞渡河至鄂爾多斯之地經畫布置丁丑春又親至寧夏駐蹕於狼居胥山遣師搜勦車駕逼臨彼之部曲惶駭離畔振如雷如霆之威凶渠自褫其魄沛如雨如露之澤黨與咸二其心所以俘其子而來獻者彼之鄰國也遣使而輸誠納款者彼之腹心也賊雖狡悍斯時四顧無親入地無路以膏斧之軀為飲鴆之計惟有自即殄戮爾安能出聖謨成算之外哉總由我皇上躬親指示竒正兼施恩威并用視絶域於掌上羅獷獸於阱中故成功若斯之盛也蓋非至明無以審機而不惑非至誠無以歷久而不倦非至斷無以成功而不疑而總歸於聖心之至仁視邊方為一體而不忍數罹其災也登寰宇於袵席而不忍以一事煩苦吾民也是以三臨絶域跋涉山川冒觸寒暑親舉玉趾恆飲濁泉風雪則屏除帳殿減餐則俯同士卒揮黃鉞以先驅擐甲胄而逹旦指麾形勢則極在巘在原之勞籌畫機宜則窮九地九天之祕焦勞煩苦不可殫述聖躬皆親歷之仁天下子萬民之心至矣蔑以加矣今者逋寇悉平荒逺無不臣之國邉烽盡息諸蕃皆樂利之年大功告成盛典斯舉以副我皇上乂安中外之心成我國家太和熙皥之化永永萬年至於無極臣竊惟聖武三臨絶塞殄寇寧民焜耀史册上下千古無與比隆謹撰頌九章以述盛烈頌曰維丙子春神武丕揚組練十萬氣吞朔荒帝親率之沙磧騰驤殲此猰㺄膏我斧斨一章維朐臚河逺帶荒服自天臨之泉甘草緑立覆其巢揮戈西逐萬古不磨聖人之躅二章寇方奔突西遇我軍風掃霆擊狐兔披紛飽我卒伍殄厥醜羣神謀指授耆定大勳三章維丙子冬雨雪在塗黃河曲岸鑾輅馳驅除惡務本宜絶根株時哉勿失洋洋聖謨四章河流浩浩虎旅雲屯震之以武綏之以恩風馳青塜化洽烏孫呼韓接踵稽顙至尊五章天與不取昔人所嗤張我精鋭燼彼飢疲乘機維哲扼要乃竒聖人之智匪衆所窺六章維丁丑春經武西偏狼居胥山古史所傳天子韎韐威暢八埏逺陋西漢勒銘燕然七章都邑聚觀孽子成俘鴟張巨寇一夕殄誅彼脅從者咸輸爾孚巍功駿烈振古所無八章玉關萬里靡塵不清覆載之內咸震天聲外安中乂億載功成金函玉檢永頌升平九章平滇頌有序孫在豐皇上聖神文武德蓋八紘功函九有薄海內外罔不暨訖御極二十年繼序集勳恢宏煌煒躋升平遏亂略奄甸海表蕩滌南疆自西自東剗刮羣姦天戈所指既翦既除惟兹滇南孽醜竄穴孤城延喘噓息王師三十萬既集雲南城下九月辛未詔諭諸將督趣攻拔睿算指授至斷至悉於是大將軍臣章泰臣賴塔等既受方略率師賈勇登銀定山扼上遊環布四面列樹雲梯乘埤入隘矢鋒雨集炮聲雷鍧十月丁未拔其城逆渠吳世璠自盡傳首京師獲其醜類殲之軍中降其衆五千餘弗殺軍民悉定雲南平十一月丁卯露布至京午門宣捷臣民歡躍咸仰皇上天威遐暢妙運在心坐照萬里之外瞭如目中指諸掌上俾諸將得受成畫奏膚功肆靖八荒永清四海成功若此之燀赫也臣稽前古漢武拓地置郡唐蒙治僰道浮船牂牁而不下王然于輩分道四出莫能逹厥後昆明習戰以為美談唐開六詔武德貞觀間韋仁夀檢校南寧寄治越巂顔師古以諸州內附遂圖王會宋藝祖玉斧畫圖置大渡以西不問蓋自二千年間英主間出於西南徼外猶難之我皇上神武布昭靡逺弗屆駿烈無前卓冠百王遠軼千古已臣竊惟嚮者滇南閩粵諸土分置藩翰垂三十年久將滋蔓皇上睿謨神智至深且遠收其部衆詔許乞還待以恩禮且以省供億寬民力至仁也乃滇逆首禍自取天討搆及閩粵以速誅戮帝用赫怒大張撻伐六師四出次第削平閩寇盜弄者三年繫頸而致之闕下平南克終臣節厥子逞狂者伏誅兩粵草竊悉就殄滅滇逆所犯秦隴以西楚疆以南黔蜀諸地一時呌歡大軍整旅而前逆氛鳥獸駭散賊桂先殪嘬鋒礪鍔掇衡嶽披辰沅南定黔中跨雲棧擘劍閣西踣蜀道又以一軍略梧桂而西長驅滇界諸軍畢會盡薄城下覆其穴巢孽豎授首八載用兵會朝奏績天地神人篤其慶山川河嶽效其靈昆蟲草木罔不蒙休而被澤猗歟盛哉聖天子有大而謙乃曰惟天惟祖宗之靈實佑庇之爰告郊廟昭事惟虔頒詔中外湛恩霈澍車書萬國悉庭悉臣四海晏如民用休息帝德丕冒嘉惠元元遐陬荒澨莫不涵泳至化皥皥熙熙羣仰幬載以蒙億萬世無疆之休永永無極臣恭遇昌期歡欣舞蹈發於聲歌不敢以猥陋闕職頌曰帝德廣運撫兹萬方天威肆靖聖武維揚窮域極邊西南之荒四征不庭曰安曰攘風嘷虎嘯雲擁龍驤人三十萬整我戎行決䇿如神九重制勝誕告師中能以衆正維師武臣咸克用命滅此朝食一鼓而奮江擘金沙山搖銀定覆巢壓卵以莫不順逆渠自仆刃取頭顱獻馘於京懸首於衢黨惡就殲已伏厥辜倒戈不殺歸命其蘇滇人帖然頓顙歡呼坐籌萬里實惟帝謨赫赫聲靈西南逺徼自古為難前史所道水戰昆明風煙南詔畫斧披圖解貂用勞孰與神武明威並昭一舉風清蠻天海嶠在昔逆醜實違於天帝念兆民謀其幹年坐糜餽粻莫甚於滇次之閩粵詔可其還蔓草之圖猶其後焉奚乃逆命是惟就殲六師及之行天之罰逆伺沅湘旁煽閩粵騃豎猖狂閩天鼠竊降走傳車以承鈇鉞維彼平南終亮其節鋤其不類殄其不率初征滇逆於嶽於衡天之明威首誅不寧既干赫怒莫逭天刑是翦是刈率湖之濵迅捲而南楚疆以平既抵貴陽亦越武陵雲棧西連蠶叢鳥道劍閣天開玉壘風掃拾蜀如遺偃黔猶草粵西一軍五嶺之表惟堅是攻惟虛是搗會取滇池馬騰士飽諸軍雲合萬旐星飛月中三捷天外重圍潛狐何窟潰蟻何歸烽消煙滅旌旗一麾獻功郊廟布詔天陲建櫜釁甲萬邦以綏惟帝之德諴和有衆稼穡民依車書賓貢功敘九歌道尊三重苖以雨膏物以風動囿茁騶虞郊遊麟鳯天子萬年式歌且頌平滇頌有序徐乾學肇自聖人首出握乾符俯坤軸函括宇縣車書混一海內無事惟二三藩臣猶擁兵重鎮糜大司農金錢嵗巨萬皇上欲以脫劍建櫜加之恩禮賦杕杜勞還之詩然後輯干歸馬蠲租給復施近古未有之寬政以故俞諸鎮之請使使宣慰皆還諸朝嘉與祚嗣共保吉康何圖賊臣狡焉思逞滇為首逆二隅效尤爾乃宗賢授鉞宿將建牙肅將天威徂征厥罪皇上親授方略分道飇馳神殛鬼謀渠魁自斃蟻屯蜂聚跳梁傅會之徒送欵通章絡繹而至閩粵諸路以次底平稜威遐厲掃蕩黔蜀於是黨與㩦離脅從解散惟滇遺孽負隅嬰城我皇赫怒責攻益急令諸將分道並進焚巢踣穴殲厥醜徒爰以康熙二十年冬十月進逼其城圍之數重逆孽吳世璠暨偽將郭壯圖窮蹙自殺餘衆悉降滇南以平先是至尊進羣臣命之曰自軍興以來未忍加賦以重困元元顧一切用權宜集事豫一人繹思未有攸濟惟欲永清耆定以無宿兵於三方夙夜弗遑於兹數稔今尚刻期戡定其所以休養斯民者罔或後時至是捷書聞皇上告祭郊壇太廟發政施仁示天下更始湛恩渥澤與赫聲濯靈俱遍逺邇普天率土歌咏升平匪直巂谷之中方吹暖律昆明之上始消兵氣而已臣嘗逖覽載籍於古今治忽之故察其源流本末蓋非沈幾不足以圖功非果斷不足以集業傳曰末大必折尾大不掉理勢所至可燭照數計唐時藩鎮根柢纒結雖以子儀光弼訴燧之徒名將馳驟究不能剷滅蕩滌禍且與唐終始此無他無大有為之主恢謀遠算以作之於上也我皇上睿謀神運制勝堂皇選將征討七八年間諸叛削平如吹稿葉版圖尺土罔不肅清自今億萬斯年太平玉燭詔秩宗審定典禮樂正宣播金石貞符洊至洪庥無疆臣之職司乃兼載筆竊以易言髙宗伐鬼方三年克之其在於詩則有殷武一篇宣王之伐淮徐則雅有江漢常武唐憲宗之平淮西不過一州之地而韓碑柳雅崒然聳觀當時臣子所為揚厲鋪宣以美盛德告成功者著之於經垂之於史其揆一也臣不勝葵藿之忱謹作頌以獻凡十有六章皆指事實録以明彰皇上聰明睿智神聖文武邁古髙宗宣王非唐宗之儔所可企仰萬一至仁厚德蕩蕩巍巍嫓美炎黃比隆堯舜於以流傳奕祀垂則無極頌曰維帝元祚文軌既同盤江洱海版𨽻驛通填壓維藩敢貪天功宿兵麋餉未復於農一章假竊威靈張官置吏物産豐積潛為姦利腹忮貌恭噢咻為惠聖哲幾先帷幄謀祕二章宸衷獨運衆慮或殊宣厥旋歸寧棘毋徐彼戢其翼其究將舒寢謀則暫革心則無三章幾不可需事不可狃養癰終潰其毒孔厚天語溫然恤其勞久有弗共命雷霆在後四章彼昏神昧恃力猖獗敢行稱亂干我黃鉞蠢爾狂且聽彼誘脅一時蝟起姦宄草竊五章於赫皇威整我禁旅攻車同馬震疊荆楚么麼小蟲奮臂我拒我奪其壁冞入其阻六章貫盈於髦天奪其魄釡魚檻獸技窮能索天監趣罰畀於鬼伯裂肩分髀以俟刑磔七章維兹關隴維兹邊庭維兹兩粵維兹甌閩維黔維蜀咸曰底平折首獲醜王師有征八章王師有征殄彼凶豎曀曀滇方如暗斯曙如熱斯濯如暵斯雨如渴斯漿如餒斯飫九章四時代謝亦有金行民用五材誰能去兵帝纘武功既克告成武功告成帝曰息民十章息民伊何民力殫矣輸將告困惟師之以矧師所處實多轉徙中田有棘不見秬秠十一章帝曰施仁給復賜租斥關去禁養老字孤滌瑕洗垢咸在赦除登賢進良載廣厥途十二章小大之吏必以亷善允釐百工各守爾典武功爵級不參銓選貴遊執經論秀藝苑十三章羣工咸曰丕休萬年登三咸五鴻號光前聖情固讓於祖於天郊壇都宫禋祀告虔十四章如天之仁覆幬八荒受福王母有慶元良在廷肅敬濟濟巖廊夀域日躋純固敦龎十五章猗與醇風臻於刑措昔陳原野惟滇之故滇功既奏天下大酺於昭頌聲來許垂裕十六章平滇頌有序尤侗皇帝御極二十年命大將軍貝子章泰綏逺將軍總督蔡育榮等進兵逼雲南詔若曰此窮寇不足膏齊斧兵法攻城為下勿肉薄傷士卒殄及平民其築長圍困之必自斃自二月至於十月城中食盡畔衆皆譁我師進克子城逆孽吳世璠蹙自剄偽黨開門降迎王師以入百姓前歌後舞壺簞載道或相與垂涕曰不圖今日復為王人見太平也幕府上露布至京宣捷午門外羣臣咸拜手揚言曰於鑠哉此非師武臣力繄一人如天之福無疆惟休蓋自三桂倡亂八載於兹踞滇為窟狡焉啓疆竊我黔陽陷我巴蜀封豕長蛇薦食三楚波及豫章之界蹂躪我城郭瘡痍我人民不寧惟是又招八閩勾兩粵誘我蟊賊以蕩搖我邊疆東南蠢動靡有寧宇於是天子赫怒禡牙誓師大發禁旅并良家彍騎連營百萬度支轉餉半天下舳艫牛馬終夜有聲鉦人伐鼓一月三捷大憝稔惡天用勦絶其命賊徒駭潰閩粵之人震懾流汗匍匐乞命朝廷下制書賜尚之信死以尺組縳耿精忠致闕下二方底定璠猶不悛收合餘燼自竄叢棘孤雛腐鼠保首領之不暇卒取覆亡為萬世僇其伏罪亦已晚矣夫以堂堂天朝踴躍用兵殲厥小醜摧枯振稿何憂弗克然當其始也一夫抗命三蘖連衡若火之燎於原不可撲滅矣以皇上天威率其股肱心膂之臣熊羆虓虎之佐運籌帷幄折衝樽俎一戰而舉荆襄再戰而收衡永西師絶連雲之棧跨劍閣搗成都東師破辰龍關席捲貴竹直抵苴蘭城下摩旗點蒼之壘飲馬盤龍之津風馳電掃谷靜山空自征伐以來未有驅除若斯之速者也且滇雖一隅僭始莊蹻閉巂昆明不通中國蒙社并有六詔蠶食滋大鄭趙楊干號令三嬗終歸段氏逮元始入版圖明遂郡縣其地然以世祖之雄略潁涼西平之壯謀加以十一總管三宣六慰而伯忽舍利畏造變於前阿資思任搆釁於後蠻爭觸鬬日尋干戈何者夜郎不知漢大聲教阻絶嗜殺怙亂其習俗然也況叛臣教之嘯其凶族逆我顏行驅市人於鋒鏑朝箕暮斂糜爛其室家此邦之人水深火熱若枯旱之望雨今陛下義征不庭提赤子出沸湯之中使登袵席髳人濮人回首面內胥沾闓澤甚盛德也雖虞帝之格苖民殷宗之克鬼方何以加焉然後振旅而還告廟獻俘班朝飲至勳庸銘於鼎鐘名號昭於史册不其敻乎於是天子沛然改容曰豫一人敢不荷天之寵承祖宗三后之慶顧自軍興宵旰不遑諸大夫勤勞於內諸將士暴露於外烽燧所至毋乃驚懼子弟憂患長老其他飛茭挽粟疲於奔命者不可勝數朕心憫焉賴社稷之靈以遏亂略罪人斯得庶幾息平兵革與海內更始其頒爵賞蠲賦役赦殊死以下天下聞之僉謂皇上武功赫赫既如彼文命洋洋又若此博恩廣施逺撫長駕車書混一符瑞響臻道侔乎乾坤業隆乎三五雖鳴和鑾奏雅樂封泰山禪梁父夫何恧哉小臣侗備員珥筆退而作頌一篇爰揚至尊之光烈用告太師歌以舞萬頌曰皇淸受命歷無疆上暢九垓下八荒大共小球皆來王北至肅慎南越裳天子穆穆坐明堂載櫜弓矢秉圭璋蠢爾強藩何跳梁射天逐日肆披猖二豎從之同顛狂彭彭大車拒螳蜋吾皇一怒威神張天戈下指開天閶鑿門推轂授斧斨礪乃鋒刃峙糗糧雷輜星駟啓戎行勢如猛虎驅跛羊大首既隕羣奔亡遂挽彭蠡回瀟湘蠶叢鳥道闢康莊木瓜金築歸疆場競牽鐵索渡瀾滄井蛙遺息走且僵藐然山鬼伏箐篁銅鼓一鳴魂魄喪長鯨就戮短狐戕前徒倒戈爭投降君子小人篚壺漿竹王祠下迎三郎六軍齊轡臨城隍鞭指卭笮揮冉駹牂牁㽛町遙相望碧雞晝啼金馬驤彩雲飄颻昆池旁平滇洱海成田桑市㕓不改耰鋤長僰僮唱歌傳白狼翠毛象齒貢梯航捷書飛羽奏明光天顔有喜夜未央百工來賀舞且揚帝曰嗟咨心如傷賊臣不道犯天綱良民何辜罹其殃居者裹負行羈韁哀我人斯亦孔將刑獄幾何念桁楊錢榖幾何問倉箱亟放赦令覃恩章后以誥命施四方乃開石室紀太常彤弓盧矢間珮璫龍旗和鈴鞗革鶬朱鷺鐃次登廟廊職方會同統萬邦王道蕩蕩臻平康大武止戈佳兵藏逝將歸馬華山陽功成治定禮樂彰秩宗黼黻夔笙簧龍圖龜書出低昂郊遊麒麟苑鳯凰黑秬黃􅓿兆豐穰青芝赤箭呈禎祥仰觀玉燭俯金湯美哉丕基亘皇唐宜升介丘答穹蒼云云亭亭風雨翔金泥玉檢書輝煌探䇿占之夀永昌皇清受命歷無疆平滇頌有序陳維嵩恭惟我皇帝陛下履泰承乾繼離出震春溫秋肅德符蒼昊以俱穹西被東漸績比黃輿而並博巍巍蕩蕩帝德難名祇祇威威皇靈有赫卿雲似蓋晨團姚后之鄉甘露如珠曉湛姬王之甕聲教訖九圍之內典章邁百辟而前固巳遐陬異域獻狀鴻臚絶徼殊邦編名屬國驗東風而受隸碧弩充庭測海水以來王赤車集闕者矣獨此狡焉忘其蕞爾凶踰射月久倔強於九隆六詔之間惡甚詛天漸咆哮於㽛町哀牢之國始也兔惟營窟俄焉虎乃負嵎加之羣藩逞犄角之圖因而三蘖鼓連雞之勢杜韜之衆不過流民馬騰之軍無非乞活髦牛作馬遘此淪胥靡莫苴蘭遭斯荼酷此則普天率土咸切同仇負氣含靈要為共憤三辰之所不祐九伐之所必懲然而帝曰無庸王惟不怒彎雄弧而誓將首殱蛇豕聲援倚長劍以興師先揃蚍蜉種類蒼頭長鬛叱吒風雲戰艦戈船憑陵霄漢蜂旗西指則崤函之千嶂都開犀角南征則甌越之百城俱下一揮青兕交廣歸誠再濯黃龍巴巫效命屬渠凶之稔惡尋巨憝之逋珠王敦跋扈詎漏天殃蘇峻梟雄先嬰鬼僇爰是梯衝亂舞以蹙危疆鼓角狂吟而追枉矢霆轟電砉影翻鐵索之橋海走山飛聲震銅標之柱母波雜種立致土崩莊蹻何人終於獸駭遂以康熙二十年十月二十八日恢我邊疆入其郛郭蚩尤肩髀狼籍於深蹊密箐之間袁尚頭顱顛踣於邃谷殘崖之次惸惸狂稚赴此灰釘孑孑童騃隨為葅醢僰僮萬指歡呼於葛相祠邊蒟醬千罌大酺於㸑王碑下山川重秀天地再清蓋逆賊吳三桂者勝國微員前朝末將嚮者跖穿膝暴原無勃蘇報主之誠當時擊楫臨風寧同祖逖勤王之志徒以耽情優笑蠱惑妖淫石崇之嬖幸辱在兵間羊侃之侍人歸於幢主窮而投我飢則附人魯國豎牛之惡肇始童牙魏時司馬之心彰於行路且夫圈牢小物祇工鳴吠之長縧鏇微姿僅備驅除之用本朝坦懷覆幬大度優容本無疑忌啓漢皇信越之嫌并鮮雄猜召明室胡藍之釁是郡處之冗散猶當銜感如天秩以寬間尚足蒙羞入地況非親非懿寵被河山爾公爾侯勳侔帶礪爵冠樊酈而上名參寇賈之班毛郕魯衛視彼親藩羽葆旌旄升於大國湛恩巳甚寵眷原奢而乃妄矜螳臂濫干赤族之誅恣效鴟張自作湛宗之孽假僭竊以肆其無聊作披猖以益其老悖危亡相續糜爛為期能無刋之九鼎凖檮杌以同姦鑒在千秋與共吺而比慝者歟臣嵩欣逄盛事敢矢雅音頌曰於爍皇清孚於函夏爟火升禋焫蕭奏嘏鳬人縵樂笙師吹雅萬邦棣棣執籩侑斚一章臘祭而膢旱祭而雩隴多馴雉澤有騶虞誓釁爾甲誓卧而枹曰靡有蘖苞庶用奠厥家二章逖彼蠻髳竄於炎荒梗我聲教侮我彞章弗賓弗庭為蟊為癢曰爾居維何昆池瀾滄三章昆池浩浩育此鯨鯢瀾滄漼漼舞此醯雞糜我芻茭哀我旄倪誰生厲階八年於斯四章帝赫斯怒爰奮厥武虔劉貙豕張皇虓虎蹙蹈巴巫騰驤荆楚百萬紏桓屯於城下五章匪堅曷攻弗攻而摧匪峻曷踰弗踰而開降其脅從殲彼渠魁㸑舞渝歌山呼子來六章捷書宵奏敬告山陵類於上帝時我嘗蒸焰紫噓呵隨風而升瀆鬼嶽祇戃恍凌兢七章乃赦天下俾大歡喜復租賜爵刷磨垢滓氓蠟於郊商歌於市皇清有祜於萬千祀八章平朔頌有序尤侗恭惟皇帝陛下御極以來揆文奮武德化威神既平三孽下臺灣定俄羅斯收復七旗喀爾喀東西南北無思不服矣獨厄魯特噶爾丹者蠢爾么髍大邦為讐辱我使臣誘我屬國以蕩搖我邊疆侵及烏闌布通之地王赫斯怒召問廷臣僉曰此小醜不足誅但當頒尺一諭之或曰遣將出師彼必懾伏天子曰吁此而不治後將滋蔓遂飭禁旅朕其親征丙子二月車駕從中路出命大將軍費揚古等西路並進由巴顏烏闌追至台木多敗之噶爾丹望見黃幄布城大驚遁去委棄輜重器械無算降其衆逹木巴哈什等二百餘口王師凱旋留大將軍駐兵喀倫將軍博濟都統烏南逹提督孫思克等駐兵蘭州皇上復於是冬渡河至鄂爾多斯噶爾丹台吉丹濟劫糧為官軍所敗其黨寨桑人等先後來歸噶爾丹亦遣格壘姑英齎奏乞降皇上以此寇不滅終貽後患仍留兵於大同俟明年進勦丁丑二月自京出塞次雲中直抵寧夏大集將士禡牙誓師指授方略銜枚疾趨登狼居胥山一望沙漠幕南無王庭焉哈密回人爭先自效生擒噶爾丹子色不騰巴爾朱俘獻行在諦巴亦遣使謝罪噶爾丹同族瑚瑚腦台吉濟農親臣丹濟喇阿喇布難丹津汪布等並來投誠願朝貢如舊噶爾丹自顧勢窮逃竄無所遂於閏三月十三日仰藥自殺丹濟喇携其遺骸及男女人口三百戶稽顙關下軍中皆呼萬歲天子曰此逋寇不足膏斧鉞天用勦絶其命令其子若臣悔禍來庭姑舍之以勸其後庶幾息兵革邊境靖安與天下百姓更始樂業不亦休乎於是振旅而還飲至告廟望祭天地山川頒詔肆赦四海萬民深山窮谷黃童白叟無不欣欣然把酒相賀者以為聖天子戡亂致治重覩太平雖唐虞三代之盛蔑以加也臣伏處田間不勝大慶雖老且病不敢辭拙謹撰平朔頌一篇獻於左右以備史䇿之末簡稽首頓首無任惶恐之至其辭曰於穆維清受天子命東西朔南暨九圍底定肆於時夏覃及遐方四十八部莫敢不來王辟彼大田蠕生蟊賊匪我族類曰厄魯特惟厄魯特有噶爾丹狡焉啓疆始階僭亂天子有詔俾汝來歸賜汝酒漿畀汝裳衣丹曰者者忽去忽來來則諾去則否叶驕即跳梁窮乃逋逃叶帝謂爾丹是不可羈縻舍豫斧斤荆棘將日滋乃召卿士大閲車馬我車彭彭我馬白赭峙我糗糧芻茭盈野鐵甲如墨石炮如火彤弓千斯盧矢萬斯青幟朱常間以緑旗赫赫業業繄天子之六師既占吉日遂鑿凶門肇發京畿直逹塞垣天子出征營在中央載命諸將分徂西方曰汝揚古總領三軍汝濟汝南達率滿兵自秦汝思克兼用漢人左犄右角前茅後徑叶爰由圖喇至克魯倫鳴鉦伐鼓爾丹震驚一戰而敗豕突狼奔遙望黃幄御寨臨城倉皇鼠竄匍伏荒原衆曰往哉急追勿失帝曰還歸豫其少息汝揚古等暫駐蘭州背秋涉冬朕復來搜朔風凄凄雨雪霏霏駕言行狩田車四圍渡河蒞止鄂爾多斯天寒草枯爾丹告飢劫我餘糧官軍逐之台吉寨桑角奔來歸爾丹亦云願為屬國其言雖甘其心叵測帝曰舍之歲云暮矣以待來年必剪滅此偃戈歇馬收於大同春日載陽大師克攻軍行塞外駕入雲中次於寧夏以修我戎狼居胥山漢家所封天子登之壯氣凌空亦城歸化以為受降滿人漢人哈密回人貔貅百萬踴躍用兵生擒王子名色不騰獻於行宫用幹不庭諦巴聞之遣使謝罪瑚瑙濟農朝貢受吏親戚叛之丹津丹濟嗟爾獨夫進退無計𠢐面慟哭仰藥自斃嗚呼噫嘻豈非天耶天討有罪用祚我邦家頭目獸散郎主載豝生不朝帝闕沒歸我中華及其三百户牛羊馬駝悉從入關羣唱凱歌湯湯瀚海漠漠龍沙萬里無人暴骨如麻廬帳閴其棄甲則那誰騎野馬誰捲蘆笳由是厄魯特國屏之地角天涯蒙古部落實繁有徒巴林奈曼敖漢烏朱無小無大咸𨽻版圖烽煙永息邊鄙無虞室家相慶道路歡呼天子燕喜歸而振旅爰治壇圻爰修籩俎爰釐圭瓚爰錫筐筥以答我皇天以衎我烈祖以勞我將師以榖我士女飲我旨酒饗我鐘鼓九敘惟歌七德是舞羣臣百姓上尊號者叶皆曰陛下登三咸五大德廣運聖神文武吾皇謙讓固辭弗許滿而不溢超絶前古我聞在昔七旬禹伐商髙三年周宣六月漢服呼韓唐臣突厥雖奏膚功尚留遺孽皇王蒸哉於今為烈粵稽是役乘輿三駕起前仲春迄今孟夏楊栁方華黍稷既稼憂在朕躬不自逸暇我行迤北其程數千周遊城郭跋涉山川征夫勞止豫敢晏然不憚險阻豈敢遷延詩亦有言一月三捷斬將搴旗伏尸流血吾皇大威神武不殺摧枯拉朽不戰而屈一夫作難殃及子孫崑岡火炎玉石俱焚吾聖慈祥放麑示仁獲此小醜盡作王人凡斯韜略一人所授以戰則克以守則久豐草在前流泉在後風雨以時自天之佑帝命虎臣虎拜稽首四海永清天子萬夀彼師武臣何力之有帝曰俞哉朕行天誅三后在天尚克相豫社稷馨香降福寰區百年逋寇一朝掃除亦賴臣工同力馳驅嘉與庶民耕鑿田廬巳清沙漠寧忘海隅朕將南巡採風軒車父老子弟偕樂大酺上帝降鑒嶽瀆獻符太平玉燭金石典謨云云亭亭成封禪書平蜀頌有序翁叔元康熙十九年正月將軍臣良棟臣進寶等分道入蜀收復成都保寧等處報至宣捷午門臣不勝踴躍慶快稽首頓首臣聞天之所棄雖據險而必亡人之共讐即在逺而終戮況以順討逆應天順人不得已而用兵自有征而無戰欽惟我皇帝陛下天縱聖德神授英謀闡文德以臣八荒崇武功以定六合自古在昔不庭之族及我先世未臣之人莫不稽首來王奉朔請吏方當挽長河而洗甲飲瀚海以休兵乃逆臣三桂槃瓠為妖沈黎作慝衆惡咸具輒用憑陵庶僇不辜罹其凶害金鈴大戟縱橫六詔之山明月朱旗瀰滿三湘之浦負其地險亂我天常惟三巴庸蜀之郊實兩戒河山之首銅梁斗絶外控諸蕃玉壘天開內屏中夏既依以為固則藩籬有可守之形未克其所爭則腹心無必潰之勢方欲煽移七部蠢動三秦置陳關東妄擬鴻門之會窺兵隴右隂圖亟谷之封惟天佑我皇家惟神褫其姦魄文籬武落電掃颷馳募壯士於三河選良家於六郡恭行天罰誕加靈誅遂乃乘間設伏分道致師澆沙聚石之營浴鐵噴金之騎始通流於資溆旋奪險於岷峨諸軍背水而攻百道緣崖而上於是窮川叛邑髙城夜開涸水遊魂隂山晝哭平填隍塹踰越闉闍獻圖歸細桞之營繫組入長楊之館民歸復業安市肆而不驚户解倒懸捧壺漿而在道錦江過楚舟楫安波劍閣通秦車徒接迹皇帝念征人之久役痛赤子之無辜幸鳥道之已開喜梟音之既革捷聞中外宣示臣民務與物以安恬登斯人於袵席億兆之衆共戴一天海隅蒼生咸呼萬嵗銅柱建標為界越裳重譯而來武功懋焉仁聞彰矣臣惟軒有青邱之誓堯有丹浦之師姬發難於三監漢樹威於七國罔不傳諸琬琰播在管絃薦郊廟以格鬼神侈雅頌以光史册蓋醜莫大於犯順凶莫甚於阻兵仁莫溥於除殘武莫威於禁暴政莫急於柔遠德莫厚於招携是以書載征苖詩稱伐密天山既定壯士長歌淮蔡削平昌黎奮筆我皇帝陛下負不世之資建無前之烈而謡誦闕然樂章未布記言之史載筆何辭臣仰窺廟算俯察輿圖睹進止之機宜知神武之獨運蓋自軍興以來六年宵旰百戰經營控天水之衝塞陳倉之口戍彞陵之道扼潭嶽之津玉牒親藩建牙楚澤鹽梅上將開府秦關訪金牛之舊蹤按隂平之故壘以建瓴之勢成破竹之功臣三千而一心戰一月而三捷若斯勝算豈曰人謀臣自惟謭劣莫贊髙深謹託不文之辭用志無窮之烈謹拜手稽首而作頌曰於惟烈祖誕迹神荒河圖受籙昌期告祥造設天地開闢混茫功髙初耜道冠始裳太宗繼之隨流而攘雷轟電擊龍起雲翔逮我世祖聰明時乂削平僭亂光宅宇內山輸海納日升月隊含牙載髮重譯欵塞功德巍巍湛恩濊濊綿歷無疆與天地配皇帝臨御全受所覆萬國歸仁羣生在宥不廢懿親不遺故舊羣臣奉法同軌輻輳內除關梁外弛斥堠同我太平畢來恐後蠢兹小醜逆節萌生作為不靖負險阻兵跨荆據益出岷窺秦泛舟湖湘據守天彭并包百粵倡率齊盟一呼衆和萬夫同聲維時皇帝端拱穆清神謀獨運羣公仰成指授方略剪刈鯢鯨三方犄角四面憑城窮獸排突檻猿駭奔帝有成言耀德不兵哀我人斯困於軍興杼空不織軍屯不耕約我將士母踐稻粳解散脅從鎮撫獠氓中夜倣徨廢書太息作為詩歌淋漓御墨賜我元老佩兹無斁無勳不酬靡罰不公以天之靈如日方中士卒用命將帥和衷白斾央央蒼兕戎戎冒刃陷敵徒手仰攻劍閣峩峩羣峰插天白鹽赤甲鐡鎖沉淵我舁臨衝往造崖巔或入隂平或經閬川曾不崇朝規其幅員降其奔師塹山盈原農不輟耕市不易㕓將吏表聞歸功於天惟帝不有憫念惻怛曰桂負恩遺孽亂略其民何辜死生契濶曰豫受成鬼神協贊尚賴同德克平餘難計功賦賞行慶施惠母淹旬日毋格吏議六師熊熊萬邦熙熙民不知役惟帝緩之天山之歌淮蔡之碑金石刻畫臣何能為全蜀既定百粵歸心越裳獻雉銅柱標岑炎風朔雪暗昧阻深毋亂天綱毋長氛祲曷其來思我有好音平蜀頌有序彭孫遹臣聞仁聲淪洽德以覆物為𢎞義問宣昭功以安民為大所以舞干羽於兩階尚有徂征之命執玉帛者萬國猶行後至之誅由來神武之朝不廢驅除之略況乎八荒在宥六合為家尉置東南廣斥朱鳶之境候通西北逺包元莵之亭皇帝握寶策而拜圖履泰符而凝命紫微帝座獨運機衡赤縣神州咸歸户闥靡不躋之仁夀煦以陽和山棲谷飲之民喁于而嚮化歲貢終王之后拱揖以從風而乃卭榖既王聚兵肆毒且蘭被發距命興戎上負國恩下滋民害脅驅我吏士搖蕩我疆陲於是張九伐之威鼓同仇之氣先平關隴旋定甌閩青海來歸蒼梧內附金戈西指則洋鳯風靡鐵騎南馳則衡湘草偃制勝廟堂之上成功俄頃之間若乃蕞爾蠶叢狡焉兔窟園名橘柚未修貢於職方舞號巴渝莫覲容於樂府懸巢之燕自矜堂奧之安蹈井之蛙妄詫江湖之大豈不以雙流漭沆五屼巑岏逋我刑誅寬其嵗月者乎然而幅員萬里何論黑子之偏隅天下一家忍見蒼生之塗炭爰申天討用播皇仁將軍臣王進寶躬自先登志無後顧度金牛之峽力不假於五丁據石燕之峰坂無虞其九折長驅劍閣進克閬中偽將盡殲渠魁就縳提督臣趙良棟氣吞狂寇身啓戎行褁犀革以攀崖遂開棧道浮木罌而絶渡竟涉嘉陵截白水之上流百濮襟喉盡扼克錦官之要郡三川版籍全收遂乃卧矢櫜弓擊牛釃酒芋區不擾花市無驚右粥左飱玉壘之秋毫靡犯前歌後舞錦江之春色依然從此破竹先聲建瓴直下揚旌洱海弭節牂牁二十八宿張天維於井鬼之躔一十二州綿地絡於筰卭之域在昔臨衝之舉因壘而崇降常武之勳陳兵而徐服以今方古曽何讓焉夫庸蜀之區夙稱險逺公孫因而躍馬劉牧於以閉關峻阻自防剪除不易今則壺漿迎道枕席行師衝飇擊鴝鵲之巢齊斧抉蛛蝥之綱三巴殄定曾不淹旬雖曰師武之功實則聖天子之威靈所致也臣侍從闕廷獲觀斯盛謹稽首頓首而獻頌曰於昭有赫祚我皇清天人協贊河嶽呈貞柔逺能邇修文偃兵攝綱九有振維八紘蠢爾西陲蔑常亂紀乃姦王略以煩疆吏矯矯虎臣授兹雄劍鞠旅陳師有征無戰一收閬郡再舉蜀都渠帥受戮逆臣就俘波激山摧飈馳電駛底定三川揚威萬里至仁𢎞貸舊染咸新民歸如水聖澤如春彼溺斯援彼飢斯哺王師之至式歌且舞夔巫東略卭雅南來人皆樂土田不汙萊釋甲投戈義風逺扇絶徼輸心好音革面昔在殷武用伐鬼方四方式辟亦美宣王矧兹梁益非云荒服清問下民其何不速出師獻馘後不淹時國無刓印人不知罷書同軌一垂拱以治千秋萬祀式鞏皇基皇清文頴卷三十三
