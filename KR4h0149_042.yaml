body:
  text: 賦有事於南郊賦有序韓菼皇帝即位十有二載天休洊至治化既洽夙夜祗畏不皇康寧勤民奉天百度庀飭祀事孔眀必敬必時冬十有一月日長至以其日有事于南郊禮也先是詔禮臣集議致祭所宜辰及齊戒處所禮臣以周人祭日以朝及暗及歷代齊於别殿之禮以請詔可先期有三日皇帝齊於別殿凝精淡慮穆若天通戒百官有司於其署宿散秩金水橋禮臣治祀事皆豫及期未眀皇帝出宫百官皆從大臣陪位掌次導至氊案臨皇邸有司親事益䖍暨厥眀升柴告天禮秩備舉既卒事越翼日皇帝朝兩宫還御太和殿羣臣畢賀則禮美而文志敬以和神眀之感通上下之交泰迎天祜協庶徴具此時也臣菼豎儒次羣臣後伏覩皇上恭天成命著存先烈恪盡於禮本天本祖之義實萬於昔之展采錯事者豈以國之常典曠而不書顧既已備諸史氏恐猶未鋪揚極慮為後世觀輒不自量搜極愚憊述而賦之其詞曰於皇維清列聖相繼底定四方以櫛以剃五十餘載內外罔一不譓庶績咸秩靡大與細禮備樂和風移若捩凌殷鑠周曽不芥蒂固已膺皇矣之眷顧奠萬年之統系揚配天之𢎞庥薦告功德之顯懿者矣肆維吾皇嗣服無疆日監於命之不易神饗之弗克有常視聽惟民日寧而親之弗敢怠遑立政以簡選賢無方典學維勤緝熙用光爰除秕莠以起羸尫以産以假或揫而藏仁覆如天厥德孔眀帝其用嘉祚以降康不盥而孚時克用享於維仲冬律應黃鍾貞元相嬗槖籥無窮烟煴權輿昭報維崇禮迎長至以逹昊穹皇上乃先時而戒事集禮官而折衷吉蠲何所辰良何從既酌隂陽而定朝暗復即别殿而擬齊宫是時猶未底夫郊祀也游心儲精無垠無極淵蜎蠖濩孔靜幽墨七日三日散致神眀之德施薜荔以為席兮郤紅鸞之重叠曠碧綃以為幬兮屏寶帳之甲乙盛顔失其清盧曼聲辭其觱栗奚蟬翼而翠珍將蘇黃而茹白獨沆瀣之精英與清音之吸吸洞洞乎肅肅乎禮神之囿頌祗之室有聞乎其聲若接乎其色百官以次聽庫門之戒受澤宫之敕往慎乃司各䖍厥職爾乃元籥氣應葭管灰飛香草初榮水泉俄滋惟冬實中惟子是孶雞人傳警夜如何其天子乃叶靈辰命鑾輿登翠鳯翳華芝六素蚪四蒼螭靡奔星之旃翻眀月之旗伏鈎陳以翼衛召顔倫以驅馳揮蚩尢以秉戚趣王良以屬車馴天狼以彏弧捎夔魖而低垂摧靡蕤綏綷縩旖旎翕赫幓纚駍應陸離泛金波之穆穆襲玉露之霏霏肅靈壇而蒞止惟敬將於天威質眀乃薦圭璧延祝嘏升玉牲酌翠斚奏雲門舞大夏詄蕩蕩神之來風習習神之下儼裴回神之右忽焱逝神之左神之留光逐星神之馳籋若馬既乃芳薪上徹焫膋肅光東燭滄海西照扶桑南矅丹崖北熠大荒於時帝心饗答㞕然式憑仙雲五色旭日重輪和風雥集協氣歊蒸維三后之在天軼下武而並配乃孝思之維則允神孫之克對坐紺席以居歆儼祖帷而謦咳寂玉衣其翻飛慰大風之慷慨洗鐡嶺之風烟湧珠河之流抹枯泉注其香潔芳草忽其薆薱姚鄉之蓋旋浮原寢之珠重墜既禮䖍而告成肆玉軑而旋反紫烟縈蓋而霏微羣靈扈蹕而蝘蜒磕雷鼓兮駢闐眇天樂兮逺近博臨行淡乎下房景光彌燭乎長坂膺百福之穰穰敬展謁於兩宫㳙詰朝而進觴祝聖母兮恆嵩告大慶於履長嫓孝養於南風上食則進靈瓜於絳實獻夀則添長線於女紅乃御太極而受朝集車書之大同於時間平諸王郕霍宗室通侯小侯天揖時揖或進羔鴈或奉圭璧肅肅習習各以其秩期門羽林佽飛執㦸梐枑設衛戈楯夾立勇踰貔虎旗拂雲墨樅樅裔裔各以其色四方計吏二公牧伯來自屏藩獻贄天闕巍巍栗栗各以其績雕題鑿齒烏皮黃弋丈夫女子左言侮食來享來王不維不縶紛紛籍籍各自其國禮儀既備仙樂斯徹逺陋秦儀近邁漢蕝長跪者三應山中萬嵗之聲叩頭以九赴虞廷簫韶之節緬神貺嘉答其若彼洎羣情忭舞其如此奠萬邦燕谷之溫熙百姓春臺之始豫元正兮太和布天下兮大喜寧獨示一人之慶私奉郊之縣而已於是懷鉛握槧之臣簮筆持槖之士眩耀暉光味飫嘉㫖偉盛德蕩蕩其寡儔竭愚瞀毣毣之微指旅進而稱曰陛下紹五三之逸緒綿億萬之大業孝弟昭格於神眀王享咸來乎有截陋赤熛靈威之非經哂玉女仙人之尤悖謝郊畤之煩興斥謳巫之相接絃五十息其悲思樓十二失其岌嶪五星之次如珠斯編八神之樹測晷斯協咸願歌功鏤德不啻於書雲鋪張揚厲比伎於獻襪蓋際乎時之盛而忘其詞之拙也天子乃穆然而思曰吁朕其可以或泰惟天其眷我祖考之洪烈顯德尚克相豫豫其庶幾蒙賚豫夙夜祗懼罔或不戒於盤匜罔攸敢弛於祮禬豫熟復古訓窮討制作調元氣於相嫗開治化之曶昧七日之復用是觀心初九之乾敢不若厲於是屏煩營飭齊精謹陽生審謙盈肅眀眀歸乾清南苑賦王鴻緒猗燕畿之雄服據九土之奧區直尾箕而畫野控渤澥以定都侯綏仰止而和㑹聖人御焉而膺圖爰有南海鬱鬱國陽帶以灤易滹衛之水襟以玉泉翠微之岡繞以薊邱督亢之饒沃重以千秋勝國之遺疆其外則銍總藁秸稱三輔之腴土焉聚落碁置列灌絳之别墅焉原隰鱗次編羽林之園囿焉繚以長垣搆以崇墉塗以西蜀之丹潤以赤堇之銅象營室之絶乎天漢似天田之屬乎紫宫逺而望之爍乎如初升之璧月爛兮如春霽之修虹其內則廣皋狹畦直塗曲畛千頃鱗鱗羣動蠢蠢鬱嘉木之披離挺喬柯之輪囷峩修阜之逶迤歷窪谷之蔽隱儼重扃之軒豁羅奇珍而淵藴其水則陂髙梁之流液涵素波而澒洞待太液之遊鵠嫓樂池之集鳯浪雲浮錦波霞浸凍氷泉凝沍玉濤回動中則紫茭緑蘀碧蒲翠萍澤芝玉蕊雞頭紫莖田田似蓋齒齒若鯨文魚媵婢珠蛤含星上則鳬鷖春舞鴛鸂晴宿虞蓼披紅芙蓉垂緑其樹則有長生交讓連理合歡靈松菌桂神梓木蘭絳桃素奈青柳紫檀夏侯之所賦嵇含之所歎漢帝之所移植魏王之所遊觀莫不菁葱鱗耀樛結蚪蟠其草則有杜若卷施縹蘭紫蕙慎火離離迷迭穟穟或潤露而朝陽或迎風而藉地其鳥獸則有蒼鶴千嵗文翬五色鵁鶄唼乎靈沼孔雀貢於南域濯濯白銀之麕龎然黃金之鹿鷹隼之所摧搏獹㹱之所騰逐珍禽奇獸或充牣而擾畜山虞不能録其名獸人不能殫其族於是層樓蔚起柘館參差籠榱耀日鳯桷侵霓周廬交列帷幕密施宮則眀光建章之制殿則九成興慶之規凌瑶光而捫太乙橫赤道而掩黃旗蓋六龍巡幸之暇而爰居爰處者實在乎斯若夫景暄妍兮有曜風習習兮自南鳥睍睆兮和囀林隂鬱而毿毿覯芳辰其韶淑景河洛之美談寫宸情兮懌豫命龍駕而戒鸞驂爾乃建翡翠之旗鳴靈鼉之鼓繕招搖而指河魁面朱雀而背元武容容與與千乘萬騎而戾乎其所乃命八校之長七萃之士騁渠黃騰騄耳張越棘釋盧矢􅗤素鷴戈白雉一發兼豵三驅殪兕核命中之上下而課其能否既而室弓服羽軍事攸畢神武遹皇山海寧一羣臣於是蹌蹌躋躋而上萬年之觴陳貙劉之禮歌吉日之章召揚雄於甘泉命司馬於長楊賡武功以文德易肅殺而惠以吉康蓋其冬狩夏苗以警軍實而非以遊翺也春巡秋省以物土宜而非以驅騁也隂殺陽生以若時紀而非以軼情也獻賦歌詩以賁太平而非以敖嬉也欹歟皇哉並西陲之靈臺駕東京之甫草陋漢后之遊汾樂姬宗之在鎬故能使七澤遜其勝九藪讓其奇華林芳樂愧其德椘賔齊客失其詞惟鴻恩之翔洽畀萬族以熙熙爰合符於軒虙遂垂拱而治之西山賦顧祖榮維神京之鼎峙聳碧嶂於西隅接太行而綿亘拱紫禁而環趨峯回川抱雲密烟疏既春花之若錦亦秋實之如珠境以幽而林靜地以曠而天虛瞻茲山之秀色實平皋之畫圖爾其石徑迢迢溪流曲曲碧雲之寺則絶璧盤空香山之臺則奇峯削玉來青之雲氣常留松盤之嵐光新沐裂泉之潭影臨虛卧佛之泉聲相逐呂洞之奇石璘璘石景之嶄巖簇簇平波閣畔暗茂樹以當窗祕魔崖前冠雲峯而架屋或盤曲磴於林端或敞琳宫於平麓響鐘磬兮隨長風晃金碧兮迎朝旭其山之為狀也嶔崎竦削曲互崇隆丹青插漢蒼翠浮空峯腰雲蔽石色苔封直如挺笏橫若游龍草織地而鋪纈柯穿澗而飛虹削芙蓉於天半秀螺髻於雲中其水則湍激空眀玉泉成沼浦散青萍洲垂紅蓼嫩緑引而荇葉方長殘紅謝而荷香欲老繞幽谷而潺湲注平湖而浩渺浮逰魚於鏡中挂飛泉於樹杪朝移漁艇若槎客之泛銀河夜照螢光若繁星之垂瓊島至於時當春夏灌木䓤蘢繁花擢秀老幹凌空霞映水而成綺雲出岫而藏峯碧粘天而無際翠貼地而焉窮芳草發兮山路仄繁英落兮溪流紅送禽聲之髙下兮晨風裊裊含嵐影之氤氲兮春雨濛濛又若時届秋冬景物澄徹木落峯眀天空露白林翳山而丹染石凝寒而氷結葉蕭蕭兮影踈蟲淒淒兮聲咽萬疊隂雲千峯飛雪渺滄海之驚濤混長空之一色隨四時以改觀歎茲山之敻絶緬巨靈之開鑿偉造物之孕奇三山隔於弱水五嶽奠夫坤維或峻極則攀藤力弱或幽逺則䇿杖難窺孰若茲山之效靈獨拱衛於亰洛快覽眺之非遙實登臨之足樂敢濡墨而含毫效天台於孫綽芍藥賦顧祖榮青陽弛令離火乘權繁紅銷影新緑鬬妍花事過荼蘼以後風信到芍藥之前於時紫陌塵輕翠郊雨過連塍接壠分籬別路目迷五色香成百和逺而望之郁郁紛紛濃如錦綺淺如爛銀碎如剪綃厚如疊茵如火如荼如比如鄰倣佛兮朱草金芝燦爛兮景星慶雲近而接之或分或聚或火齊之堆盤或金莖之承露或霓裳起舞胭脂之雪微飄或緑葉爭扶翡翠之風自護非一狀之可名亦鏤心而難賦是時也則有侍臣休沐上客開筵酒徒挈榼詞人劈箋香車繹絡驕馬聨翩日欲落而未落逰將旋而難旋三枝兩枝插帽沙際水際回鞭爾乃壓擔盈車辭根入市或融蠟而封蒂或連泥而剩蕊或棐几之作供或瑤階之位置初來則價重朱門漸出則香殘野寺此固春色之最奢奇葩之居殿者也考之往古偏靳濡毫咏黃花於晚節譜香草於離騷即舒李文成共數牡丹之名種歐陽品就亦推洛邑之奇苞何將離之佳卉乃棄等於鴻毛豈知載在風詩嘉名最古羣芳可冠小草莫伍况夫托根帝里儼上苑之芳菲得氣栽培沐九天之雨露宜其名譜之所採録凡卉之所却顧者乎鄧尉梅花賦有序彭定求姑蘇西山梅花勝處鄧尉為最近自鑾馭南巡臨幸茲山被聖澤之鴻龎沐天章之藻耀益令香林濯彩芳卉晞榮臣式聽輿歌謹為小賦維青陽之育粹見玉樹之含芳風臺橫繞月觀輕揚一枝兮春暉早逗幾樹兮凡卉莫當靡不攄逺韻挹清光孰與夫千巖搖曳萬谷回翔離離乎如逰衆香之窟霏霏乎如探羣玉之藏吳㑹江鄉姑胥山郭縹眇烟巒青葱林壑過石鼓之嶙峋接銅嶺之磅礴波間眀鏡空澄橋畔彩虹雙落迤邐崇岡嵳峩傑閣歷鄧尉之周遭梅英遍於叢薄爾乃韶光乍啓暖律初回南枝潜發東風暗催則有連村盈塢漫嶺延隈璚姿交映仙蕾爭開深雪扄寒姑射之神忽降橫參耿碧霓裳之舞爭來蓋地本膏腴花宜林麓繁植同千畝之禾叢生倍萬竿之竹先杏蕊以舒榮掩蘭皋而藴馥攬勝萬峯之巔眺逺太湖之曲漁洋疊嶂晨迷烏鉢層巒曉沐疑素練之盈波訝白雲之滿谷若其皓容倚月冷蘂當風欲霽而眀暉千文其雨則暗霧萬重繞屋而枝枝連卷嵌石而樹樹摩空磴道窈折澗戶潜通氤氲百和之香真是娑羅樹下汗漫恆沙之數非惟薝蔔林中是以精藍遞興化城作供霽旭融和流漸解凍騷人攀樹而神怡烟客投林而色動聞笛裏之孤吹和琴中之三弄何殊官閣之珍不减羅浮之夢然而氷霜淅瀝山澤清癯非同上林之植誰邀帝澤之敷縱輪囷於林谷止飄落於江湖何幸蒼龍夙駕翠葆前驅爰訪崆峝之蹟方探河洛之圖遂令山靈延佇品彚昭蘇樵牧騰歌齊聞華祝鼓鐘鳴豫競說嵩呼迓天顔於芳樹邀睿賞於仙跗信貞心其有托知皓質之不孤於是御座雲凝奎章日麗珠離玉綴羣疑閬苑之逰柏影松聲尚想勾陳之衛疊巘龍盤飛泉鶴唳鼎盈三實之資枝獻萬年之瑞緬懷景物恬熙默企聖心仁知山中踏雪奚誇金谷之榮樹下咏花還作隴頭之寄宸翰天章賦有序胡㑹恩臣聞日星絢采咸瞻法象之垂河洛升禎肇啓苞符之祕聖人乃章為經緯斯世用迪夫昭眀建極敷言則萬祀循夫彝則觀文造契亦四表沐夫光華蓋哲皇發越之精英皆造化同流之元氣也恭遇我皇上睿握羲圖神澄軒鏡泰階叶兆盛德覩其日新離照當陽多藝由於天縱合帝皇王而貞運五位攸崇統天地人以綏猷三才首出顧乃萬幾在御黼筵不輟夫牙籖乙夜懋勤寶墨時霏於玉檢殷盤禹鼎發金匱以流徽岣嶁岐陽較銀鈎而集美宸章焕發天藻時頒雲漢流暉既宣四庫七略之奧奎圜叶象復究三蒼八體之源皇哉振古之鴻文偉矣無前之聖則也小臣久厠詞苑夙侍起居親瞻雲日之輝莫罄管蠡之測謹頌揚盛美而獻賦曰猗聖皇之凝命當人文之化成賡廟堂之喜起際海宇之升平允教訖而恩洽洵禮備而樂眀奎璧布其躔曜河嶽羅其精英法乾符之得一含協氣於穆清乃輝光之下燭森萬象其畢呈洪惟聖學精深皇衷睿哲曠識天開英詞飈發接道脉於勳華藴文思於羲頡博綜圖籍以無遺挹注江海而不竭是以機務之暇覃精文翰黼藻紛披龍章絢爛碧落昭融卿雲糾縵小臣愚魯未足以窺所撰也仰觀寶畫之昭垂固已莫知所讃歎矣聖兮神兮管天鈞兮煒兮煌兮倬天章兮譬上蟠而成象亦下際而呈形何鳯翥鸞騫之足喻匪龍跳虎卧之能評運神眀於體製集書學之大成波磔雄兮金鐡屈斧鑿化兮真宰驚於時宫硯沉碧山爐泛清瑶管抽兮春葩麗金壺漬兮瑞露凝遊淵悟兮入渾穆灑神翰兮暢皇情竊覩夫表章六經闡發列史剖千聖之奧藏一萬古之聽視揭日月兮提𢎞綱析微茫兮抽祕㫖焕乎鐘鼎長垂郁乎球圖並美神動天隨雲蒸霞蔚皆精一之心傳詎鉛槧之能擬洎夫崇儒重道宣教眀彛神山聖域繡榜豐碑燭星垣而振耀鐫琬琰以流徽以至研歷數之精微訂鐘吕之訛謬甘石所不能窺夔倫所未及究經元后之亶聰迪羣蒙而啓牖皆乾文之發舒駕百王以馳驟乃若寓奎章於麗賦發睿詠於瑶箋金聲玉振璧合珠聨韻叶虞庭之紫鳯辭髙解愠之薰絃翠輦時巡逺邁橫汾之作紫宸端拱時揮復旦之篇莫不鏗鍧韶濩噴薄雲烟元音奏而和風應律麗則敷而霽旭呈鮮臣工拜賜而榮渥靡弗蹈舞於堯天繄聖製之矞皇兼御書之精妙理無隱而不宣法無微而不到真足冠邱墳跨典誥掩五緯耀二曜是以榮光奕奕德音秩秩銀繩啓而草木敷榮翠軸展而河山潤色諦觀虞夏以還歷數漢唐誼辟雖復逸思雕華清才迅發卓爍乎詞章研精於翰墨又烏足以仰厥清光而臻斯極則者哉是以東際扶桑西盡昧谷南橫炎海之表北踰祝栗之族被聖人之文教覲光華而沐浴盡一道以同風遂無思而不服是雖日侍琅函時親玉局固未能測至道之根源而窺天心之所藴蓄者也乃再拜稽首而系之曰濬哲惟皇發神祕兮披文相質衆美備兮偃波垂露㑹寶意兮體含飛動協符瑞兮摛掇菁華攄淵懿兮永勒丹筒垂緑笥兮教化笙鏞振大地兮光昭於天被萬類兮萬夀無疆賦彭㑹淇維天心之純佑兮爰篤生夫我皇亶聰眀以首出兮綿歷服於無疆秉常新之離照兮體不息之乾綱信久道之化成兮閲五紀而彌昌當大衍之全䇿兮符皇極之中央居青陽之右個兮回鑾馭於東方屬春和之普暢兮迎麗景之舒長日扶輪而耀彩兮風拂斾而悠揚川嶽貢其珍符兮雲物紀其嘉祥草木效其華滋兮鳥獸獻其文章矧含生而負性兮靈萬物而近光羣飲和而食德兮能不忭舞而趨蹌則有天潢華胄宗盟懿親鳯毛翽翽麟趾振振彤襜翠幄碧幰朱輪金羈玉勒繡韀錦茵貴剖桐封之瑞榮敷花萼之春繁弱密須屢分天物鳬鷖行葦時醉犧樽聽雞鳴而趨長樂隨龍輅而朝寢門挹霞觴之㶑灔斟瓊液之氤氲齊班行而上夀樂笑語之繽紛亦有元凱名家伊巫望族豐沛馳驅豳岐櫛沐十葉貂蟬一門華轂爵承世秩之庸俸仰天庾之祿姻連帝室似蘿蔦之依松職侍禁廷儼繁星之麗旭榮施祖父之勳勞庇及子孫之齒録身依日月思髙厚而知慙運際風雲望龍光而敬祝若夫通籍官寮登朝膴仕周室六卿漢家羣吏委珮蹌蹌彈冠濟濟或黃髮而備公孤或方剛而膺任使或登槐棘之班或受封疆之寄或分職於巖廊或效能於都鄙秩有崇卑情無遐邇享鼎烹之奉固切懷忠叨升斗之糈亦圖報禮幸聖節之方臨識天顔之有喜葵思向日敢忘愛戴之忱管欲窺天莫罄揄揚之美若乃辟雍士子膠庠生徒鴻都詞客虎觀通儒衣猶縫掖座接簮裾席珍待聘被褐懷瑜觀光而逰上國挾䇿而赴京都望清塵而獻賦擁輦道而陳書懷樂育之仁夙知忠孝仰文明之化倍切歌歈聨袂褰裳首四民而踴躍擔簦負笈輕千里而翹趨銀甕移來鏤出萬夀之字芝函捧去裝成五嶽之圖至若村夫巷豎白叟黃童江湖賈客里井耕農生依闤闠跡逐西東巖栖谷汲夜宿朝饔忘帝力於何有瞻天表而無從咸欣在宥永荷帡幪樂春臺之皥皥愛夀域之融融指長安於日下識紫氣於雲中莫不塵飛增嶽草偃從風環區稱慶比戶呼嵩繄含哺而鼓腹擬頌禱於華封别有異域冠裳殊方幅舄鑿齒雕題洞胸刺額衣毛茹血之倫穴處巢居之國亦皆望氣歸誠聞風奉職庭設九賔道通重譯大一統之車書㑹萬方之玉帛獻琛貢雉慶寶歷之悠長航海梯山凛天威之咫尺信中外之同心合天人而交格蓋由仁周六㝢誰忘覆載之恩澤被八荒肯負生成之德岡陵之願不介而孚芹曝之私經時彌積敷天喜氣即是祥烟瑞霧之蘢䓤匝地歡聲不啻琅瑟雲璈之考擊豈若嵗星金馬十洲勞武帝之求王母瑶池八駿騁穆王之跡者哉頌曰春日暉兮淑景眀和風扇兮海宇清天垂象兮地效靈含譽垂芒兮耀玉衡沆瀣為漿兮滴金莖躋公堂稱兕觥願吾皇兮常康寧億萬載兮樂太平重曰穆穆我皇承休命兮垂裳四紀天保定兮萬幾時敕三辰正兮百度維貞八方靖兮臣民戴德騰歌詠兮欣逢聖節朝野相慶兮誕受多福日新而月盛兮吾皇之夀並天地而無竟兮浙江潮賦沈三曽惟太極之端倪肇一元之翕闢天得氣而循環水隨天而潮汐陽舒而為日精隂斂而為月魄惟日往而月來應靈潮之出入觀其俯陽燧而抽光臨方諸而吐液魚腦凖其盈虧蚌胎資其潤澤驗物理於自然豈一氣之偏隔考氷池焦釡之論搜海志山經之輯徒驚化鯤之濤孰覩斷鰲之極王充䑛筆而多遺盧肇和鉛而莫識爾其至神也震不測以為靈至信也秉不爽以為德方氣升而地沉固乘時而洋溢暨氣降而地浮亦應期而不失當卯酉之日則隂陽之交也氣以交而盛故潮之大也勢以鼓而彌徑當朔望之後則隂陽之壯也氣以壯而升故潮之至也機以激而愈騰應乎乾則天一之所生效乎坤則地六之所成習乎坎故洊至而不爭說乎兌故得秋而自盈然而䢴濤未睹瓊海莫經百盈百涸曽傳漏汋三溢三竭但述安寧要不若錢塘之閎覽足懾魄而移情爰考錢塘之為江也逺接瀛壖遙通碧落束島嶼之濚洄互扶輿之磅礴赴天目之蜿蜒緯富春之繹絡扼婺歙之咽喉襟宣饒之根角上流披嚴子之裘旁邑採桐君之藥名傳越絶之書地控句吳之索樟亭四望面面峥􅗆龕赭兩山朝朝激搏燦玉礫之光明曝銀砂之閃爍滙窟宅於龍螭壯盤渦于鮫鰐故其包含品物釀郁菁英珊瑚眀月紫貝瑶瑛丹虬采介神鯉華鯨殊形詭體萬彚千名固編蒲之所不能載亦然犀之所不能明惟夫天吳先導海若駿奔龍伯起舞蛟宫欲吞狂雷隱隱噴雪紛紛走百里於瞬息飛一線于海門逺而望之乍如玉虹之橫銀漢徐而俟之飈如鐡騎之驟中原朗朗乎排瑶圃開瓊岑洞靈合㳫幢節蕭森駕閬風之縹眇驅貟嶠而來臨姢姢乎如馳玉女揚素娥明珠翠羽皓齒修蛾見生塵之羅襪悵微步于凌波浩浩乎如長矛利㦸鞭弭櫜鞬貔貅萬幕組練千屯厲前茅與後徑儼玉帳于龍幡隆隆兮如洪鐘疾撞大吕爭鳴聞韶魯國張樂洞庭總八音之並舉肆戞玉而樅金但見砰磕奔騰激揚浩蕩挾鯷壑以俱來貫牛斗而直上跳沫則重城欲浮驚湍則衆峯皆讓波撼石而吸三靈勢極天而浴萬象勇士見而囁嚅猛將立而惝恍擊電轟霆之下笑人語之不聞排山倒海之前喜輕舟之無恙徒觀其水力之所到蓋不知其幾千萬丈于是乎起子迄午呐景納光尹公叱而地吼陽侯怒而風狂素鎧當前識靈胥之旗影銀花鎮後疑霸佐之鋒鋩維錢王之萬弩獨犀利而莫當射濤頭使東向乃築堤而捍塘儼天門與碣石峙狂瀾之隄防紹禹功于千載共山髙而水長乃有弄潮之夫迎潮之子舴艋飄搖鳬鷗容與蔡襄戒而不應馮夷見而竊喜疑木心與石腸習騎鯨與跨鯉更有寶馬千羣鈿車十里集江滸而來觀列茶棚與酒市簾窺吳嶺之青座對越山之紫指雪浪而笑語喧望銀濤而䦨干倚乍日暮以歸城覔遺香于墮珥此觀潮者之勝槩也亦以見潮之神奇而莫比要而言之方其噫氣交作蜃勢憑陵日月浮動山川鬱蒸足以增壯夫之氣而振俠客之膺洎乎駭浪就平洪波舍次曠天宇之澄清靜江花與岸芷亦足以使躁人怡情而貪夫知止是其消息參乎四氣進退運乎六時滿而能抑謙為之持動而不括靜立其基淵凝澄徹往復張弛久矣斟酌元氣而為萬物之滋矣况乎六飛時御萬乘前驅南巡越甸東瞰吳趨表章功德混一車書河清海晏雲行雨濡澤溉扶桑之國恩流若木之墟軼陶唐之刻玉邁溈汭之披圖小臣登瀛忝竊學海徒虛矢濟川于說命慚作楫于商書論水羡蒙莊之有識觀濤知枚乘之非誣幸生長乎澤國曽流覽於海隅極滄溟之偉覯乏潘陸之陳敷敢臨池而染翰有望洋以踟蹰太液新荷賦方韓序維仲夏律中㽔賔薰風初拂時雨方新樹緑隂而冉冉水碧浪而粼粼乳燕穿花而上下逰魚唼藻而浮沉上林則葱菁交䕃御堤則清逈無塵蓋天下之平久矣人物皆熙熙而自得卉木亦欣欣而向榮浩浩玉泉滙為太液斜繞宫墻遙連禁掖練光萬頃天宇一色平開曉鏡之晶熒靜映晴空之澄碧泛瘡海于襟帶瀉銀河于几席環臺榭以濚洄漾蕖荷之的皪方其茒蔤既植菡蓞初生田田剪翠片片雕瓊出淥波而霞照搖綺浪而雲蒸回風蕩沫似弄珠之夜出映日澄鮮儼濯錦之晨興洸朝暉兮瀲灔裛夕露兮清泠晴與雨兮俱滌華並葉兮齊馨芳香可贈咏菱江之初月方舟共採結錦纜于長汀但見晴鳬出浴纎鱗吹萍神龜逰于葉上文鴛宿乎花隂感萬物之得所想茂育之生成今夫蓮皭然不滓淵然內泓根有節以自固莖中虛而不盈辭烟蘅兮澤畔振華藻兮蓬瀛葉著如規之目花稱君子之名蓋以根植靈治跡連梧岡浥九重之湛露沐聖人之波光宜其香薰水殿藻溢銀塘並金莖兮吐秀與芝草兮呈祥齊木禾為上瑞偕幽蘭為國香詎同夫折之葺袂搴以為裳羣薜蘿而為伍昧葵藿之傾陽也哉皇清文頴卷四十二
