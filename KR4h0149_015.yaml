body:
  text: 序癸丑武㑹試録後序陳廷敬嵗癸丑九月天下貢材武士於京中樞臣請舉㑹試奉命拔騎步射及格者七千有竒上曰爾廷敬其副卿馮溥徃衡其文前此未有以詞臣副執政大臣典㑹試者葢異數也臣謭劣聞命戰栗黽勉祗役既取數如額録當獻臣得綴言末簡臣惟國家取士文武殊科然革前代武學師太公之陋學統於儒師統於孔子文不兼騎射武顧兼䇿論何也此非難武士也誠重之也夫武而不文其人任卒伍而不足任偏裨任偏裨而不足任大將者也兵家者言毋逾孫吳吕李司馬尉繚諸書今武士合而治之闈中發䇿則漢唐宋諸名將已然之迹與夫天下塞障耕屯保伍諸事旁及莫遺又明示以七書之外之書無不當肆力矣士茍雅能明習得其要領發為文辭具有倫貫異日干城貔虎之選取諸此不已裕哉且夫麤獷桀驁者武士之習也一變其習使人不得以﨣桓目之而庶幾於古之雅歌投壺羽扇綸巾者非沐浴書䇿漸摩師儒不為功若此者非皆論䇿宜重之明驗乎葢自古承平既久勢漸輕武不惟文士輕武武亦自厭其武馴至盡隳武備而不可振今重武兼重文正所以常重武而不至於輕也草莾鄙生妄謂先之騎射武士所事也重之也至於論䇿則已略允若兹當其罄控縱送無不及格盡收之奚不可而乃决去留於操觚不亦可以已乎臣於棘闈中從臣溥後慎簡諸士所作登其可者冀或可仰佐得人以無孤任使至意復著其説喻天下繼起諸士使皆知國家文武無畸重决拾之暇即咿唔而不敢有略文之心昔周之盛也左之而文無不宜右之而武無不有方其奉璋峩峩髦士攸宜皆卿大夫之材及其淠彼涇舟烝徒檝之皆將帥之選臣知自今以始人材蔚起克文克武雖成周之盛無多讓矣癸未㑹試録序陳廷敬欽惟我皇上統天建極治定功成於今四十有二年嵗在癸未春二月當大比天下士禮臣請典試事者臣自陳昏瞀既列狀上奏上弗允命臣廷敬偕臣賜履臣涵臣汝霖典厥事臣廷敬聞命仿偟震悚移日伏念臣備官銓曹侍直内殿恐滋隕越常懷氷兢兹當校士之重寄敢弛夙夜之初心且多士來自草澤山陬海涯皆知聖人在上道濟羣生文明之化光昭下土夫既人思淬礪俗嚮陶甄臣又何敢不益自鞭䇿以上思答夫聖恩下不愧於多士乎今鎖闈畢事録文以獻例得颺言篇端臣不敢為枝言蕪辭謹識其大者仰冀省覽焉葢臣今奉命而論者文也夫文以載道道命於天傳於人知天之所以命知人之所以傳夫然後道尊而學正學正而文興則今日道統之傳文運繫焉此其大者也臣謹識焉惟天隂隲下民篤生神聖作之君作之師自伏羲神農黄帝堯舜禹湯文武皆以聖人之德居君師之位以行其政教道統之傳常在上而不在下也若有其德而無其位則不得君師之位以行其政教之實故自孔子以來道統之傳常在於下揆之天降生民之意豈適如此哉且夫天道貞觀無徃不復故知今日者道統之傳果在上而不在下矣在下者傳之師儒僅寄於語言文字而在上者則見諸行事之實我皇上以聖德而居天位天下大治生民乂安故知道統之傳果在上而不在下也昔孟子謂五百年必有王者興歴叙其傳亦大率以五百年為斷以今考之在上者莫不皆然而在下者則或不盡然也然而其始之自上以及下其後之由下以歸上者亦莫不皆然也孟子謂由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之所謂在上者莫不皆然也又謂由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之此所謂始之自上以及下者莫不皆然也又謂由孔子而來至於今百有餘嵗自是以降或千有餘嵗或百餘嵗或不必百餘嵗若周子若二程子若朱子此所謂在下者或不盡然也若是者何也天之鄭重夫在上者之傳故以五百年為斷其不必五百年者葢僅寄之語言文字以衍斯道於絶續之交特在下者之事耳惟是師儒之統轉而屬之帝王則五百年之期斷然其不爽者將復合焉此所謂後之由下以歸於上者莫不皆然也葢自周子二程子朱子而來至於今五百年矣我皇上論世知人崇朱子之學頌其詩讀其書存諸德行見於文章舉而措諸天下之民使堯舜禹湯文武之道常在上而不在下故道統之傳由下以歸於上者此正其時也此乃天之所以降生下民之意也臣嘗伏而思之天下之士涵濡於雅化鼓舞於皇風者亦已久矣而聖人之道傳之在我皇上者天下之人將皆知之而其所以朝斯夕斯實用其力者天下之人或未能窺其詳也臣日侍内廷因得臚舉焉皇上總攬八紘日有萬幾舉凡立綱陳紀制治綏猷諸大政事發於聖𠂻行於天下者既莫不與古先聖王之道異世而同符矣而勤思至道博極羣書燕閒之頃躭情六籍慈誨青宫訓督皇子詩書講誦殿陛之地儼若鄒魯之鄉作為文章巍巍乎與典誥同風至於帖括之文百家之藝盡在聖明之鑒豈非道統所歸實有本末兼該源流共貫者與今日者親得聖人而為君師雖不敢與於大道之傳而亦幸在見知之列將見由文王以來濟濟之多士藹藹之吉人復生於王國以上佐夀考作人之雅化而時雍風動萬邦黎獻共惟帝臣馴至於矢謨賡歌亮采惠廸之風以幾乎唐虞郅治之盛則道之在上而下被其政教者將永永焉傳之千萬嵗而無窮又豈五百年之可以數計者哉謹以告多士者為黼扆獻焉御選古文淵鑒後序徐乾學皇上萬幾餘暇稽古右文選定古文淵鑒既成命臣編注别為三集上之御製序文冠諸篇首範圍羣籍彌綸道要煥乎之章蔑以加矣今年春臣乾學以䝉恩賜假奉辭便殿皇上面諭臣譔為後序以進祇命屏營退自循省臣本下里末儒學術淺狹遭逢際㑹備員禁林得縱觀四庫六閣之秘恢廓聞見猶恐無當聖心隕越成命而猥以爝火之光仰附星日涓滴之流助潤江河臣雖愚昧猶自知其不可也然臣觀自古之有選本始於西晉摯虞文章流别一集自後作者繼軌於今所傳若蕭統姚鉉吕祖謙諸家而外孔逭為文苑之選謝沈有名文之集唐志楚辭别集總集著録者八百一十八家莫不上禀朝命彚成鉅典至考其刪緝之㫖其出於宸衷之裁定者十無一二矣我皇上神明天縱尤殫心於致知格物之學本源而及流體道以盡器多識畜德衡量在心故以之討論今古洞若觀火自臣之緝此書也每篇奏御必親加評隲指示瑕瑜大抵近道則雖拙猶存悖理則雖工必斥臣備䝉提誨始悟讀書為文具有體要資以去取藉之成書私念古人著錄之本今巻帙零落所存不多其存者又未必盡傳而臣決是書之必傳者以悉經聖鑒之裁定足為後法故也臣以微末獲操鉛槧以從事斯局者六年於兹敢敬述所自竊附於見知之末云進易論序李光地臣惟易之為書也大而言之則六經之原天地鬼神之奥也切而言之則動息語黙酬物應事修之吉而悖之凶蓋有不可斯湏去者然其為書始於卜筮之教而根於隂陽之道故玩辭必本於觀象而不為茍言占事必由於極數而不為茍用非徒以象數為先也象數而理義在焉於戲易豈易學也哉欽惟皇上講學勤政孳孳不息則應乾之行厚德深仁視民如傷則配坤之道進君子退小人則察乎否泰之幾憂盛危明則協乎日中之戒皇上之體易者可謂至矣神武不殺固已見諸施行自天祐之吉无不利又已受其顯報皇上之用易者可謂神矣乃者特命儒臣以此經逐日進講仰見聖智之黙運上符三古之心傳歴數近代以來未有留心於性命之原研慮於天人之際如我皇上者也臣學易將二十年幽居潛玩之餘不無一得然生質愚蔽不足以窺絶學之全閒或劄記所知繫之每卦每爻以為異日精思明辨之地中遭寇亂未究厥業僅有易論數篇大抵皆理義象數之淵源易之所由作者也恭逢聖世不敢自匿譬則螢燭之微照太陽雖不為之增光然而積草加膏之勤亦將以之炯炯自秘此臣今日獻書之喻也伏惟皇上裁其可否而進退之臣又觀夫序卦雜卦皆以未濟終篇非欲其終於未濟也謂夫雖當己濟之時而常存未濟之心此則所謂懼以終始易之道也故六十四卦三百八十四爻而一言以蔽之終日乾乾是也伏惟皇上垂意焉進讀書筆録及論説序記雜文序李光地康熙十有九年閏八月之五日皇上退朝御乾清門顧問臣光地家居所作文字若干臣不勝惶懼歸而收拾舊業大抵皆經生家言不足以塵乙夜之覽又不敢以虛清問謹以讀書筆録數十條及論説序記之闗於學者十篇繕寫為一巻進呈而恭為之序曰臣惟學之於天下大矣自古未有言學者言之自殷髙宗與傅説始彼其所謂多聞學古時敏遜志與夫教學之相半終始之克念又曰非知之艱行之維艱此皆自後世聰明才智之士所不屑留意於其間者而彼以天縱之君帝賚之佐孳孳相勉若將不及是以君則繼成湯嘉靖于殷國臣則與阿衡嫓羙于有商學之闗于治道有如此蓋古今之言學者莫不曰帝王之學與儒生異臣以為不然夫溺於技藝滯於章句以華藻自娛以涉獵相髙豈獨帝王哉雖儒生非所尚也若夫窮性命之源研精微之歸究六經之㫖周當世之務則豈特儒者之所用心帝王之學何以加此葢髙宗所謂恭黙以思者性命之源精微之歸也其所謂學而有獲者經訓之㫖也其所謂監而罔愆者當世之務也此古今言學之宗亦古今為學之準也肆我皇上天挺其姿神授之識生知乃復好古將聖而又多能然皆習焉而不留過焉而遂化詩文字畫歴算工巧莫不精其道焉而無所滯於心其所以潛思實體朝講夕誦積年累月而不懈寒暑風雨而不休則非堯舜之道不使陳於前也非天人性命之書不以遊於意也臣愚無知竊謂皇上非漢唐以下之學唐虞三代之學也臣窮海末儒蔽於聰明之不足局於聞見之孤陋四十無聞歿身為恥今太陽之下燭火益微抱巻趦趄隕越無地然臣之學則仰體皇上之學也近不敢背於程朱逺不敢違於孔孟誦師説而守章句佩服儒者屏棄異端則一巻之中或可以見區區之志焉臣又觀道統之與治統古者出於一後世出於二孟子序堯舜以來至於文王率五百年而統一續此道與治之出於一者也自孔子後五百年而至建武建武五百年而至貞觀貞觀五百年而至南渡夫東漢風俗一變至道貞觀治效幾於成康然律以純王不能無愧孔子之生東遷朱子之在南渡天葢付以斯道而時不逢此道與治之出於二者也自朱子而來至我皇上又五百嵗應王者之期躬聖賢之學天其殆將復啟堯舜之運而道與治之統復合乎伏惟皇上承天之命任斯道之統以升于大猷臣雖無知或者猶得依附末光而聞大道之要臣不勝拳拳進大司樂釋義及樂律論辨序李光地臣惟古之王者治定功成則必有作葢非茍為彌文以飾觀聽而已禮樂不可斯須去身亦不可以一日不行於天下是故尊卑上下截然有制民志定而遜讓之風行者禮之實也君臣父子藹然相親人心和而敦厚之俗成者樂之意也篤其實而舉其文厚其意而修其節則禮樂之用所以著因其節文而求其實意則禮樂之道所以存自漢以來禮樂崩壞不合于三代之意者二千餘年而樂為尤甚葢自諸經所載節奏篇章器數律吕之昭然者而紛紛之説終不能以相一又况乎精微之㫖所謂與天地同其和者哉臣逃亂空山之中僅以十三經自隨閒以暇日叅取經文之及於樂者㑹萃成編深思極索追求古人作樂之本與夫羣言㫖趣之同葢有互相發明者自大舜后䕫以至武王周公若合一契信乎大樂之必易而今之樂由古之樂者斯言不我欺也居嘗别為樂理樂節樂章樂舞樂器樂律六篇以諸經之文為主以史記漢書淮南以下諸説為輔將以下成一家之言上備有司之采條貫已具潤色未完其已脱稿者則周官大司樂釋義及論説數篇竊不自量繕寫為一巻進呈伏惟皇上純誠至孝舜之所以感神也於鑠王師武之所以求定也文德武功巍然煥然今四方粗靖稽古禮文之事勢當相沿而起昔魯兩生謂禮樂百年乃可興也臣竊疑之葢兩生知髙祖之輕儒術故為是言以避召命耳若夫禮樂則豈可一日不行於天下而必待百年不可知之化哉今四海靡靡風聲頽敝等威無辨而奢僭不可止聯屬無法而鬭争不可禁奢僭者犯上之階也鬭争者作亂之本也由此言之辨上下以定其志教親愛以導其和此誠禮樂之實之意其講之豈可一日緩哉記曰無本不立無文不行神而明之者本也舉而措之者文也為宜搜召名儒以至淹洽古今之士上監於夏商近稽自漢唐以降考定斟酌成一代之大典以淑天下而範萬世臣雖區區末學猶將執持所見與諸儒上下其議論焉至于建中和之極者一人之事專其業精其藝者世官之守非微臣所能知也詩所序李光地古者學校四術及孔門之教皆以詩首為其近在性情察於倫理而及其至也光四海通神明率由是也言志之義始於虞典夏商之間詩不槩見豈其代逺篇殘抑忠質之世發於文者希與周自文王有作周公繼之郁郁乎文哉於斯為盛矣今攷三百之篇出自文武成康者百二南風之自也小雅治之經也大雅德之本命之符周頌功之成教之至也其篇皆以文王冠惟周公之詩自為國風篤世業勤王家葢周室之所以安危上配文王者也邶鄘以下之為風六月民勞以下之為雅王德降焉政俗衰焉然下則有撫已言傷之音上則有憂國陳善之作葢性情之不可遏文武之教在乎人心故皆可以興可以觀可以羣可以怨邇之事父逺之事君而其究歸於思無邪者此也朱子鄭衞之説諸儒以為不然今獨信之者謂非是不足以見亂之所生為二南之左契抑雖其流至此猶有秉禮知義無文王而興者夫然後可以極無邪之變矣惟節南山以下為東遷楚茨以下為豳雅載芟以下為豳頌乃前儒所未定而今創説者夫子曰吾自衞反魯然後雅頌各得其所今觀大雅時世明矣小雅之亂而無緒殆不可詰如毛氏傳三百年間為篇纔七十餘而出於幽者將三之二是豈足信乎孟子言頌其詩者必論其世今失其世則又賴有詩存而可以推而知旁引而得也既知得所之義然後章求其次句逆其情稱名賾而不可厭也疊文複而不可亂也始於夫婦之細而察乎天地之髙深發于人情之恒而極乎天載之微妙夫如是則三百之繁言四始之宏綱小大兼舉矣夫子教人學詩近則在於牆面逺則使於四方要其指則曰可以興責其效則曰可以言嗚呼反之於身而可哉孝經天子五章衍義序韓菼臣按孝經古無章第篇名自皇侃標天子已下五孝之目而五等之序截然以明葢孝為王道之本萬化之原故曰夫孝置之而塞乎天地溥之而横乎四海施之後世而無朝夕推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準然而無所不包者其體施之有方達之有漸能足乎其量而無以加者其用其體則足乎赤子之心無憾於匹夫之賤蔬粟飲水與尊養四海其致一也其用則各有其地之所得為與其分之所不可過諸侯不敢擬於天子卿大夫不敢擬於諸侯士庶人不敢擬於卿大夫其勢然也夫惟天子之尊足以立乎其體而稱乎其量推一念之愛達之於無不愛無不愛斯能愛其親推一念之敬達之於無不敬無不敬斯能敬其親斯湏之不愛為刻覈為殘忍為法令繁宻為賦歛無藝將不勝兵刑之禍而天下有重足之憂斯湏之不敬為傲慢為逸樂為侈靡無度日泰然於上而天命人心去之矣故天子之孝非特謹小節勤細行已也在天下安社稷固否耳此愛敬之實也古之聖王如大舜之䕫䕫齋慄禹之勤勞湯之立愛立敬文王之日昃不遑暇食皆本孝道以光大業致盛治至於武王郊祀后稷以配天宗祀文王於明堂以配上帝制禮作樂文章備具凡其禮百神和民人而御萬物者乃至纎悉具舉而皆可法然夫子要而贊之曰武王周公其達孝矣乎言愛之至敬之至也自聖王不作人倫廢壞即勤於為治之主不過以政教刑罰整齊天下而内治缺然葢教化之意微矣夫子舉先王之至德要道切著之為經而三復其文於天子之孝本之以愛敬二人而推之通神明光四海興禮樂移風俗納諫諍羙政教其於事親之儀節葢畧焉而至於諸侯以降則第勉以奉宗廟承祭祀為言行無過服勞奉養而已矣葢其所施固有廣狹大小之殊而丁寧之意亦少殺矣書曰一人有慶兆民賴之夫天子盡孝於上則諸侯卿大夫士庶人莫不盡孝於下而治化成矣此自然之序也雖然由天子而諸侯而卿大夫而士庶人此治之有其序也由親親而仁民而愛物此序之又有其序也而或者騖於汎愛博施之説托於一視同仁之大則與異端之所謂無差等無人我者意豈異哉夫子固曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮且夫不愛其親者亦必不能愛人不敬其親者亦必不能敬人譬諸水然溝澮者可立涸也如草木然根撥則枝葉必害也人君誠鑒乎此而專以孝親為心久之仁心漸熟義理精明不敢惡人不敢慢人之一念油然自生發之不禦而充之不窮於天下也何有不然千㝷之木旦夕而長有是理哉若夫諸儒所定十八篇前後次第多異同臣按開元間題章名及正義所云皆以三才章以下為廣叙前六七章之意則朱子刋誤定為經文者為不易臣今一以是為宗衍經不衍傳者傳從經也不衍傳故傳之章第但各存之不復論而傳文之義固已悉具云平定三逆方畧序韓菼皇帝御極以來政教覃敷恩澤翔洽薄海内外㒺不率俾方偃戈衅甲以文德懷柔四方煦嫗生息休養萬姓兼容并覆銷弭孽芽時二三藩臣久分閫於外便蕃錫予異數有加慮或怙寵而驕盈深欲保全其終始因其乞骸之陳請爰有勞還之簡書處其田廬豐其廪餼道里芻秣之費悉戒於有司俾歸故鄉長享茀禄生民無餽餉之艱士卒無逺戍之苦如天之德甚深甚厚乃滇逆吳三桂背恩反叛閩逆耿精忠粤逆尚之信相繼煽亂生民荼毒奄及八年當是時兇渠陸梁䲭張豕突醜類蔓延蜂結蟻聚仰荷天威赫濯六師四征戰守機宜悉從指授三方竊踞次第削平三桂窮蹙首伏冥殛精忠之信既降復謀叛先後皆伏誅獨三桂孽孫世璠猶困守一隅逋誅逆命至康熙二十年冬十月大兵平雲南世璠授首十一月露布至京師上命宣捷午門擇日告郊廟社稷復躬謁列祖山陵念中外軍民勞苦德音誕敷洪恩湛被諸王貝勒大臣暨外藩王等咸謂功德隆盛恭請上尊號上謙讓至於再三未之聽許御史臣戴王縉因疏言聖武布昭削平禍亂宵旰經營永清大定耿光盛烈曠古罕有請彚纂成書昭示無極疏上下内閣翰林院集議以聞禮部尚書武英殿大學士臣覺羅勒德洪等謹議臣聞歴代紀載功烈俱有成書迄今可考者唐興元間有紀功述元和間有平蔡録平淮記㑹昌間有伐叛記宋建隆間有龍飛日歴天禧間有聖政記熙寧間有經武要畧明洪武間彚征伐次第為日歴藏之金匱彼或借箸臣下不皆獨斷之功亦或蠢兹小醜有如摧枯之易猶揭之簡䇿炳耀可觀豈若我皇上神機獨運掃除大憝廸屢弗靖多方之衆降滅無遺孽告厥成功八載之間纎毫無遺算師不宿老方内乂安至仁大勇巍巍超越前代文之一怒武之七德罔不攸兼於兹兹事體大顧闕而不書雖聖德髙深不自居而覲揚於奕禩者或無以得其詳且何以使夫萬世之為亂臣賊子者懼御史言良是臣等昩死以請制曰可於是宣付史館歴次用兵以來平定方畧自康熙癸丑十二年三月始訖於辛酉二十年皇清文頴巻十五
