front:
  text: 欽定四庫全書皇清文頴卷五十三
  hash: sha256:f74e1deb4748ad1e0284f070fc5b071103eb302aba3ab45d992b5f9585642914
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_053-1a, image: WYG1450/WYG1450-0006a.png}
body:
  text: 詩樂府平北雅王士正於昭上帝眷德申祉穆穆聖皇緝熙敬止文德觀成武功纘始藩之屛之磐石之似芟之刈之四郊以無壘眷彼滄溟波恬其島眷彼昆池魚咏于藻自東徂西同風偃草蠢爾荒裔干天之道式遏寇虐肅將天討鴥彼飛隼矰繳射之躍彼毚兔韓盧獲之狡彼凶逆天方蹶之矯矯虎臣薄言伐之皇網則寬縱乃活之有梟有梟集于桑林食我桑椹猶懷好音彼梟不若為梗至今匪殱其醜孰革其心天子于征六飛駸駸臣哉鄰哉發言盈庭僉謀止輦帝鑒汝誠維天僤怒彼毒貫盈天欲殛之敢憚徂征肆其靖矣率土攸寧歲維丙子仲春辰良類之禡之神祇告祥我馬騤騤我車彭彭戎旅嘽嘽旟旐央央如雷如霆于彼之疆帝介六馬亦簡元戎或軍以西或軍以東左之右之黃鉞秉中謀夫孔多帝斷之𠂻師壓其境以折其衝熊羆林林貔虎虓吼既掎其足又角其首鼓之擊之如枯如朽僇之俘之十剃八九一鹿鋌險暍將安走帝曰還歸彼逆將順奚狡而頑覬收餘燼炎炎不息燎原將焮龍旗載揚雷鼓冬震肅肅其威雪戈霜刃陽和布德鷹己為鳩彼眼不化將鷙于秋畢之羅之逮此春搜耀我組練鍛我戈矛三駕乘輿西搗窮陬彼巢覆矣又失其雛彼翼折矣云何不孤天壅其盈遂降之誅靡逺不服靡惡不鋤疆宇式奠卧鼓韜弧象輅回鑾敬報天祖饗祀升歌亦韶亦武王猷允塞仁義干櫓功成謙益為函夏主億萬斯年受天之祜聖武神功蕩平漠北鐃歌鼓吹曲十二章有序杜臻皇上御極之三十五年春聖駕既親統六師跋履沙磧震揚天威出奇制勝夏五月大敗厄魯特噶爾丹於召磨多之地於是蜂屯蟻聚之衆斬馘執俘乞降而外所存無幾不可復支噶爾丹竄伏窮荒茍延殘喘皇上仍命大將軍費揚古等駐軍喀倫將軍博濟孫思克副都統阿南達提督李林隆等駐軍肅州遏其奔竄其秋九月車駕復親臨塞外濟河而西渡堅氷凌霜雪至鄂爾多斯經畫軍務既密且周其黨丹濟喇劫我餘糧我師奮擊敗之厄魯特台吉寨桑等先後望風歸順皇上厚加撫恤並授官職待以不疑噶爾丹齎奏乞降聖明洞照姦狡一無所施嘉平之月車駕還京於是賊黨散賊勢困賊計窮今年春二月丁亥車駕發京師歷雲中榆林察吏治詢民隱大小將辨閲其能否而黜陟之沿塞垣行西抵寧夏駐蹕狼居胥山數軍實整戎行轉輸糗糧靡不豐給指授諸將方略分道搜剿哈密回人生擒其子色不騰巴爾朱爾俘送闕下諦巴奏請謝罪瑚瑚腦爾台吉濟農奏請朝貢即其親信之丹濟喇及阿喇布灘丹津汪布等咸輸誠歸命於是賊黨益散賊勢益困賊計益窮噶爾丹驚聞車駕復臨朔塞自知罪惡貫盈人神共憤雷霆所擊計無復之遂於閏三月十三日仰藥自殺厄魯特部落盡蕩平萬里之外無不納欵天朝稟聲教焉伏念皇上至聖至仁量同怙冒無念不以愛民為心無日不以安民為事蠲租賑恤平獄緩刑好生之德洽於民心普天率土固已湛恩汪濊矣乃躬擐甲胄踰險阻不憚萬乘之勞大張天討者誠以稂莠不除無以培嘉禾暴逆不翦無以安良善凶冦滅則外藩安邊民安中國愈安宵旰籌之熟矣且噶爾丹非尋常寇盜比其國習於戰鬪昔年蠶食土魯番哈密諸國凌弱暴寡吞噬無厭喀爾喀以七旗數十萬之衆喪亡略盡皇上屢頒敕諭令其和好噶爾丹不念聖恩之浩蕩不遵睿旨之諄詳憑凌我屬國侵犯我邊界烏瀾布通之役賊雖敗遁宸𠂻未嘗一日忘武備也用是大奮乾斷鋭意親征出塞三千餘里臨赫魯倫土喇之地賊出於不意望見天子旌旗大軍雲集乃喪膽奪魄晝夜西奔西道諳將邀其歸路克奏膚功固由祗承廟略實懾於天威也匝歲之內乘輿三臨塞外從天而下至神至速乘其潰敗之時即用勦絶其命毋使滋蔓務盡根株聖謨卓見為民生除害至深逺也元凶既除邊塵永息戢矢櫜弓宇內之民莫不鑿井耕田含哺鼓腹共享升平之樂武有七德禁暴戢兵保大定功安民和衆豐財於斯備矣臣竊觀史册逺莫盛於三代近莫隆於漢唐然郅支斬頡利擒皆遣將出征而非天子自行鬼方之伐淮戎之平又九州之內非疆索之外且必俟用兵數年勞師動衆角力爭雄而後克成厥勳若皇上睿謀獨運勝算如神掃積年之逋寇不踰崇朝安絶塞之殘黎登之袵席方之上古軒后之擒蚩尤有虞之伐三苖先聖後聖其揆一矣五月乙未振旅凱還大駕自居庸關入京文武大小臣工以下士庶軍民耆老數十萬人夾道擁觀咸呼萬歲歡聲雷動伏闕上書請加尊號而聖德謙光三上不允在廷諸臣及文學侍從之官莫不抽毫染翰作為歌詩思以抒歡抃之忱潤金石而咏太平臣臻忝列中樞受恩深重愧無報稱目覩聖武神功之盛謹拜手稽首獻鐃歌鼓吹曲辭十二篇庶幾永昭皇猷盛美於無窮焉睿謀乾斷親征至黑魯倫靈泉湧庶草蕃天威逺震噶爾丹驚魂潰遁為揚聖武第一聖武布大義扶討不庭張威弧豫順動萬靈趨蒼兕躍朱鷺娛平沙彌望后來蘇濎濙瀺灂甘冽膴芊眠鋪芬變荒塗德馨暢皇謨訏申九伐用三驅墮挺險栗負嵎巴顔空土喇枯驚風鶴宵逺逋仁無敵亶匪誣右揚聖武二十六句師出三路宸𠂻預料寇必由西路逃遁遣將堵截果遇於召磨多大敗噶爾丹斬獲無算為神幾捷第二神惟幾疇與通惟至聖協於中萬幾裕應無窮誅小醜貔虎雄四甄布七翼罿九伏攫八門籠躪三窟羅獷猣料西路寇懵懵張我軍氣如虹脫厥角摧枯叢批亢捷搗虛工召磨多銘皇功右神幾捷二十四句賊既潰遁仍命將駐旅喀倫肅州指臂聨絡睿算深逺萬非常識所測為峙金湯第三占敵遁幕烏鳴聽吹角知潰聲載古籍美厥明千載我皇定玉衡鯨鯢已截彌布紘前茅踔後徑喤橫雲却月遙峥嶸丈人吉叶師貞掎角勢賊聞驚釜魚息螳臂橫維神武掃天狼賀蘭髙拂雲晴閲細栁廓旃旌欽睿謀密且精右峙金湯二十五句丹濟喇盜劫餘糧復為我軍追逐奮擊敗之為踣猘獸第四逆天誡萬古垂况餘燼曷能支戮溫禺釁鼓糜斬谷蠡膏長鈹期門奮天䇿竒黃纛蒞中權曦翠蓋臨絶漠祗餓梟喙徒妄窺彼遊魂墮釜錡雖回斾留熊羆殘必斃寧久為告脅從毋自底右踣猘獸二十四句聖駕丙子冬復親臨邊方渡河至鄂爾多斯經畫詳密恩威並用賊黨盡歸命為天駟煌第五星鋋輝月羽賁鉤陳繞動天駟載斾師凌朔吹河氷堅鳥章織皇之威嚴霜同惴皇之恩挾纊共被寨桑輩接踵至膏大澤樂生遂悔從前如夢寐寒者衣飢者飼仰皇仁消偏陂右天駟煌二十二句今春聖駕復臨邊方西踰寧夏駐蹕狼居胥山震揚天威分布禁旅為天行健第六豫雷奮嵩呼齊解澤敷塞卉萋韎韐有奭震路鼙王旅嘽嘽六蟻何迷轉天鍵含天倪塞草被光潤春溪驊騮嘶六鈞剡木七屬函犀靈銔三舉金僕共觹耀紫熖太白西殱封豕若醯雞抶巨魖類稚麛望黼座厥角稽叩旌路厥首泥睹天顔雲日躋右天行健二十八句睿算如神指授諸將方略擒賊子檻車械送瑚瑚腦兒輩又率衆來降為穽孤雛第七睿作聖伐謀遙握勝算指招搖盧矢授彤弓弨諸將遣罟醜么狼河堵雁塞剽欲逃死何方趫覆巢罄毁卵凋自貽戚共灰熛大雕隕况鷦鷯語逆漠歸天朝歸朝咸樂土仁天同戴堯右穽孤雛二十二句天威四布賊氣竭途窮噶爾丹仰藥自殺餘黨來歸厄魯特盡平為伏天誅第八牙璋燦羽葆悠槍櫐布儲胥遒彼狡獷命焉留梟噪絶狐鳴蹂凡敗類盡虔劉仰藥死墮鬼幽盡殄滅等散漚蔚嘉禾去賊蟊旗影隂山靜笳聲落照浮日月髙曜永照金甌突梯鼠首遙懸竿鉤荒煙朔雪萬載清瀏右伏天誅二十四句聖駕三次臨邊調兵籌餉冒暑衝寒備極煩勞功成回鑾百官萬民感刻夾道歡呼為衢歌繁第九六飛遄往三駕徊翔羽林十二昭回生光桓桓將士電掣龍驤仰華蓋耀紫芒廟謨密陳堂堂飛菽粟千斯箱統虎賁殿中黃歷炎曦冒雪霜惠我人斯春風春雨帝車之回夾道抃舞黃童白叟名香頂炷恩斯勤斯敢忘復顧右衢歌繁二十四句神武覃敷逋寇絶滅黨與盡皆歸順普天胥慶永樂升平舉行典禮昭示中外為武功成第十揚休光滌棼􅙟遍垓埏昭無外歡呼山欲動歌舞路靄靄億兆同心氣結鸞輿蓋羣靈助順祥籠羽儀淠榮光沕穆呈佳氣鬱律會緑甲三階融紫膏萬頃泰軒罌露結瑞葩雲生棟神貺嘉典禮盛景福遐右武功成二十句耆定大勳實為千古帝王所不及行健如天度幾如神編輯平定北寇方略昭示無極為光芝檢第十一秬鬱馨格皇天雲亭石昭萬年澤馬獻路車連金泥焕玊檢宣命太乙昭瑶篇烈火熾鴻毛然疾風飈秋籜捐鐡山碎擴幅員亘神武日月懸倚劍埪洞外巍峩貞珉鐫右光芝檢二十句絶塞數萬里外自此更無不臣之國不服之人太平盛業益增太平為陳王會第十二共球盛萬國歌干羽舞兩階和旅獒貢歷山河越雉獻重譯過䊵牛露犬珍異四羅茲白乘黃庭實孔多睢盱嗢咿睹天顔霽天馬蒲梢極天無際環海十洲如帶如礪來享來王及其苖裔雙觡共抵同柯連理億萬年王會麗右陳王會二十四句皇清文頴卷五十三
