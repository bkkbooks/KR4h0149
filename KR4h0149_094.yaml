body:
  text: 詩五言排律乾隆三年聖主躬耕藉田恭紀敷文聖主勤民切躬耕典禮優神倉占沃壤御耤敞皇州吉亥千官集元辰百度脩既郊除近甸于耜遍遐陬華蹕祥光繞方壇淑氣浮明農隆祀典敦本裕深謀曉發驂青輅晨興駕玉虯嗇夫陳播植太史備諮諏時雨霑仙仗油雲擁翠斿東㕓行駐輦南畝佇停騶穜稑繁多種耰鋤遍列侯霞旌明繡野芝盖覆營疇京兆紛趨事司空早預籌三農齊抃手千耦盡凝眸隴畔馴蔥犗林間喚乳鳩紺轅行復止縹軛去還留膏澤連宵沛甘泉匝地流三推瞻祗敬一墢見勤求農正祈多穫天官祝有秋粢盛知必飭醴酪咏思柔大武陳天上思文頌道周省風胥協吉勞酒互相酬發趾青旂展回鑾翠幕稠小臣叨侍從賡拜荅宏庥聖主躬耕藉田恭紀有序孫灝臣聞帝廷敷治垂六府以厚生王政勤民重三農而頒職春居左个千畝之甸斯開地税南郊三推之儀肇舉姬周則禮隆躬秉炎漢則詔下親耕洪縻頌太始之年清甽炳永明之䇿莫不命陽官而戒典按春扈以諏辰代著鴻章事昭往牒欽惟皇上日麗堯衢風熏虞陛湛恩汪濊本人情以為田至治馨香用民和而降福乃紹基之三載將展事於六飛寅賓當羲仲之春舉趾屆豳風之日青壇大啟畮畫東南縹軛初廻推分五九時則至誠黙運禋祀潛孚昭大順於隂陽協休徵於感召芳塍習習輕吹應律之風綺陌芊芊潤灑知時之雨敞四塗而引矚逺翠俱流邀五輅以停輪纎塵不動萬絲斜㸃杏花偕菖葉分妍千耦勻沾青笠與緑蓑交映載芟載柞周知稼穡之艱難于豆于登早卜粢盛之豐潔臣質均糠粃學愧菑畬欣逄親載之䖍衷思紀勸農之令典涓埃㣲細難形山海之崇深雲日瞻依莫罄乾坤之繪畵庶同歌於撃壤擬效祝於呼嵩肅獻葵誠懽聫雀舞詩曰堯朔當平秩周郊撫載陽春深資木徳星正協農祥帝耤開畿甸親耕莅廣場元辰先事擇吉亥上儀詳知稼陳無逸求衣問未央嵯峩丹闕曉縹緲瑞烟翔緩聽虬鐘啟勻排羽仗長芳原華輦駐沙路錦帷張衮冕山龍燦旌旂日月光齋壇臨穆穆雅奏韻鏘鏘修祀蕭茅潔歌豐灌獻荘陌阡紆黛耜穜稑疊青箱一墢咨成式三推過昔王公卿緣序徧亞旅沐榮襄逺目崇臺逈休徴庶彚昌重巒蒸霡霂甘澍灑蒼茫㸃散農人笠絲飄饁婦筐乍驚榆莢雨徐看稻苗香潤喜沾犂足濃逾浥露瀼至誠昭黙感上嵗卜神倉致孝粢盛告登新黍麥甞翠畦珠作穂沃壤繡連疆力本邦基厚勤民聖澤彰嵩呼交四野虎拜肅千行慶洽邀清蹕恩覃考舊章綸言宣勞酒黼座仰垂裳玉食膺諸福金甌鞏萬方儉惟師大禹仁已頌陶唐蕆事隆文偹班朝鉅典臧小臣慙珥筆紀盛附賡颺聖主躬耕藉田恭紀郭肇鐄淑氣彌芳甸皇州轉化鈞農祥闗睿慮帝耤荷躬親享醴齋宫毖明禋祝史申祈年先覛土卜日得元辰七校雲麾𨽻千門榆火新青箱儲玉粒翠葆度香闉地敞宜晴旭風和静麴塵龍旗看渒渒虎旅正駪駪綺陌花迎幕平原草似茵預占嘉禮洽行識化工春縵縵仙班集森森稼器陳町畦紆若繡原隰次如鱗一墢紺轅舉三推縹軛馴腴田膏欲發香稻布来勻率作先卿士陳修逮庻人扶犂耕澤澤喜雨甸畇畇允矣農夫慶俞哉聖意純迎鑾簫鼓合勞酒象尊廵盛典從今肅隆儀奕代振謳吟来父老鼓舞遍臣鄰瑞靄依黄幄祥光護紫宸八垠胥撃壤七月待吹豳享帝神倉富勤民御廩均作詩歌有嵗長此荷皇仁乾隆三年聖主臨雍禮成恭紀劉藻聖世文明啟敷天教澤宣虞廷垂舊典闕里溯薪傳觀化人文盛當陽雨露便三雍欽矩矱萬國荷陶甄仰止心彌切崇儒道必先丹青新結搆金碧映堂筵殿廡罘罳麗宫牆棟宇連赤螭分糾結青鳳鬱聫翩瓦燦黄雲色池流翠藻鮮松筠含古澤絲竹發真詮仰見乾衷惕頻聞巽命專先期嚴飭備屆日事明蠲旭景浮金闕晴光起玉泉爐香仙仗外扇影禁城邊上巳良辰近三春淑氣妍穠花輕著雨細栁淡籠烟燕剪當風掠鶯梭拂露穿戒塗森羽衞在廟列宫懸執鬯皇情肅凝旒睿志䖍馨香流碧荇疏越發朱絃分奠公卿逮趨陪鴛鷺聫觀光州十二習禮衆三千祭酒横經地論鐘造士年朱衣開絳帳紫幄對青編顧問龍顔喜颺言虎拜拳欽明稽古帝性道紹前賢大義昭如日神機啟自天恩波方浩爾治象益巍然一徳明良會三階福履駢聞風思鼓舞名藝就雕鐫典制垂千載車書被八埏小臣叨侍從擬上辟雍篇聖主臨雍禮成恭紀何其睿運際文明會人游教育中心傳懸日月思服遍西東華宁榮光被熙臺淑氣冲花環青𤨏外菜釋素王宫伊昔圜觀盛於今念典隆芝蘭春馥馥棫樸雨芃芃造士恩誠溥尊師禮更崇肅將先日致顒若至誠通入廟翔仙仗乘橋躡彩虹矞皇昭氣象綺麗照玲瓏璧水新漪浄槐街宿霧空香雲承露湛文杏倚雲紅喜聽鸞聲噦旋聞鼉鼓逄翬飛黄瓦煥鼎設紫烟籠百爾趨蹌謹諸生磬折同升堂書授簡登席珮鳴璁事以敷陳切㡬由講析融危㣲徵懋學位育著純功大道承悠乆精言契折衷乾坤標六籍今古振羣䝉翰海沿江漢文山仰岱嵩式瞻心不二移易道為公鳳徳輝千仞龍飛動八風小臣慙吉甫獻頌達宸聰聖主臨雍禮成恭紀王會汾接統千齡合雝宫萬化先神扶文思運徳邁永平年乙夜探瑶牒鴻都燦玉編會應興禮讓更用表陶甄雲擁金根麗天廻璧水圓翠隂槐市近茜綬鶴紋聫爼豆森成列鐘匏儼在懸儒臣同拜手髦彦亦随肩振振靈鼉響愔愔玉琯傳告䖍行釋菜命講即開筵章甫人三代淹中士八千材官都挾䇿侍子解紬箋景曜髙辰動洪源百谷連霑濡遍榛楛鼓舞及魚鳶舊憲㽞惇史精心啟道詮永惟鄒魯業直纂姒姚篇絶學今方懋從風物自遷絃歌聲匝地杞梓䕃垂天曉日橋門路非烟紫盖邊於論爭獻頌周雅並昭宣乾隆四年聖駕南苑大閲恭紀張廷玉聖世文明煥清時武略全習勤非校戰崇典為承先古禮中冬閲前期大號傳九重方念雪六出巳盈阡恵澤膏農畝光風齊野田耎鳴鉦齊部曲列幕按星躔斾展雲隨散旌颺日正懸金輿瞻涖止貝胄各森然瑞靄凝芳苑明霞耀錦韉百靈随寶騎八校捧瑶鞭御箭星穿葉雕弓月滿弦歡聲呼萬嵗講事重三田虎旅神皆竦鷹揚奮欲前登臺旗肅肅引隊鼓淵淵浴鐵光繚繞轟雷響接連軍容觀整暇陣勢布方圓但使嫻魚復何須折獸骿喜融春似海暄覺日如年誰道三冬景都成二月妍回鑾仙仗逈挾纊羽林旋衆志和而樂皇心静且專敬邀天祖貺益展廟壇䖍仁孝開千禩恩威徧八埏經綸敷盛化贊畫愧前賢敢侈長楊賦欣賡甫草篇大成君子徳寧僅邁周宣聖駕南苑大閲恭紀鄂爾泰方夏敷文會中冬教閲期璇宫親考典萊野肅乘時吉戊諏三日先庚飭六師沙龍承御輦翠鳳引鑾蕤列仗勾陳轉籠霄寶盖移鉦鼙轟順動校萃燦紛緌飈静鳴鐃振霜清畫角知貝装旌析羽玉埒㦸交枝映水吳鈎淬摛霞楚練垂射堋圍暈的犀革貢黄支都尉身輕鳥材官笑却羆縱横分雁翼偏伍合魚麗地奮雷霆軸天曛日月旗碧紛翻獵獵金鎻爛披披爪士嫻鈐略神謨妙握竒何須誇駿足真欲陋昆池辨曉沈雲豁彌原霽雪遲嚴尊増豫悦韎韐緩驅馳次舎躔中道周廵挈四維烟髙臨䍐畢露散走南箕挾纊成暄景推心洽睿慈聞聲思宿將䋲武溯前基往者經綸始猗歟帷幄規傳炊曽露沐擐甲亦風纚一自收羣䇿無煩折尺箠百年深濯浴萬國乆恬熈斥堠埋烽燧期門卧虎貔彯纓仍齒胄講藝及牙禆兆是觀成賁占當繼照離徳威原廣運法駕儼隆儀返斾歡聲沸韜戈闓澤施上樞陪祕鉞令史飾華覊行殿瞻雲近濡郊湛露滋精神喬嶽聳氣象瀆川麾鼓潤皆鴻造弛張豈異宜一陽初屆候萬彚己和吹羽舞懐虞贊車攻譜籀詩情田培脉厚禮囿澹神怡鐵甲皆農具笙鏞典樂司八荒昭聖武端拱受重釐聖駕南苑大閲恭紀王安國帝徳兼文武軍容邁漢唐仲冬修狩禮大閲簡戎行鳳闕排仙仗鸞輿出建章雷霆開道路日月動旂常雪映郊原秀川環壁壘長和門收積霰幕伍麗晴暘列隊魚鱗集周廬雁翅翔翹材歡踴躍宛馬飽騰驤征伐惟天子神威仰聖王赭袍雲爛縵金甲鎖輝煌九節詩篇奏三侯畫的張琱弓䧺貫革羽箭直穿楊衞士鳴鼙鼓圉人駕驌驦坐懸蔥玉轡御鞚紫絲韁躬覽師徒健廵行器械良五兵咸整飭七萃總軒昻部曲分牙帳馳驅復上襄酋矛伸鶴膝寶劒帶干將勁挽千鈞弩堅持百鍊鋼招揺朱雀幟銛利緑沈槍叱撥追風雨兜鍪耀雪霜八門旗正正萬騎陣堂堂歩伐嫻規矩奔趨類頡頏交綏成犄角接靷試鋒芒越石身材捷超車旅力剛呼聲濤沸海礟燄火焚岡将帥饒謀略貔貅競武揚指麾身使臂統領網從綱少長登髙辨偏縫按次詳膽由忠作胄心以智為囊猛鋭前無敵縱横勢莫當匪惟強本榦實可鎮邊防甫草攻車地長楊校獵場驊騮齊蹀躞鷹隼驟飛颺纉祖昭英烈承宗覲耿光方行齊禹跡裒對識周疆蒐狩詳司馬師田自古皇玉璜傳渭水石鼓勒岐陽國是勤宵旰兵機握廟廊屏藩環北極畿甸制中央六合烽烟静三朝軌物彰采薇宣偉績天保佐垂裳元首先羣䇿聲靈震四方一人親閫幄萬載固金湯聖駕南苑大閲恭紀䨇慶地接神臯重時逄嵗務閒有年豐巳兆冬狩令初頒舊制遵文囿前驅肅禁闤霓旌飄析羽鸞輅振游環雲集森嚴簿星聫扈從班晴郊開禹甸别苑渺瀛寰徑轉臨丹阜橋横跨碧灣出林臺崒峛遶郭水洄澴帝則崇無逸宸遊念克艱陳師營梐枑講武闢榛菅虎拜来都閫龍驤列上閑戈鋋明若雪壁壘峻如山畫鼓霆轟激琱弓月抱彎合圍皆擐甲角技悉翹闗霜潔雕翎影塵清豹尾斑千廬廵衛密八校止齊嫻翕赫昭軍實從容悦聖顔詰戎咸震疉耀徳孰追攀命賞嵩呼會承恩歌吹間太平惟載筆恭紀頌聲還聖駕南苑大閱恭紀張鵬翀天衢龍在御靈囿鳳髙翔圍合乾坤大兵銷日月光順時循獮狩命駕控驪黄雪映金支麗花迎玉輅香明禋申肅穆曉景逗清凉貔虎森周旅黿鼉静禹梁三驅非尚武九譯自来王類禡依風雅畋虞法聖皇網開施澤逺獵卜得賢昌藉以綏黎赤因兹答昊蒼綢繆真有具險阻願無忘乾豆承千祀威弧靖八荒黄圖増赫奕翠氣滿悠颺備豫人䝉福時和帝降祥珠囊昭順則玉燭兆靈長燕坐鷹臺上軍聲樂愷康威鳳岐陽集神鷹夢澤翔中冬行狩獵南苑歘輝光海子凝澄碧都人候赭黄弓刀方欲奮翰墨早流香纊挾如回煖氷纒未覺凉平沙連翠幕積水度紅梁七萃䧺多士三田邁古王隊分旗繹絡環合陣堂皇效獲天顔喜求寧帝業昌垂精思漠漠降鑒色蒼蒼磐石安彌永苞桑備弗忘膺期鍾下武控馭極遐荒弭節旌杠巻迎鑾鐃吹颺元符端獻瑞雲物復呈祥燕賜恩胥洽賡歌韻更長聖心宵旰切申命勅幾康聖駕南苑大閱恭紀劉綸鑾輅勤時閱鯨鐘動曉晴三驅来鳳苑七萃繞龍城塗是孅阿啟塵從屏翳清熊羆森入隊鵞鸛互連營衞列鈎陳象軍分太乙名崇臺捫尺五大纛繪重明披練雪初霽彎弧月始生天容方粹穆士奮尚縱横百萬胸羅壯三千膽錬精登麾雙㦸闔蹴部一騶鳴摐罷金音肅桴餘鼓氣盈因兹占廟勝且以叶師貞聿自星杓轉行看日御迎諏辰當出甲夙事已先庚駐蹕摛宸藻賡歌洽睿情從禽今有戒率狩古攸行奕奕恢文囿輝輝建徳旌九賓陳貝賮六羃静欃槍鞠旅徵司馬頒緡詔水衡行間真挾纊農隙好稱觥信矣師無戰休哉御不驚舞干仍在陛獵鼓亦充楹甫草稽周甸長楊軼漢京小臣随載筆永紀泰階平聖駕南苑大閱恭紀何其睿萬乘臨畿甸三驅率典常代當文教洽禮載武功揚廣漠風行肅中冬月令詳五音諧羽奏六琯紀雲翔平樂開南苑華林闢廣塲陳師時應律别墠位因方日炫蒼虬動霜清翠鳳颺琱弓披月影寶鉞映星芒雁翼營連壘鵰盤技截楊騰驤看正合變化識竒藏法從威儀盛元戎節制強敦詩賡雅什束帛拜瑶筐海宇欣無外齋宫念不忘詰戎恢禹跡立政發姬祥勝算收羣力承謨覲耿光總干原大定輯瑞各来王縹緲天花璨絪緼御藻香仰惟徴不息猶自戒無荒兢業歸神武修和在廟堂柔能懐逺邇長與奉垂裳聖駕南苑大閱恭紀吳嗣富芳甸南原敞熈朝武備詳三餘農事暇九伐國威彰物候方含肅天時乍轉陽龍旂飄細栁鸞輅駐長楊星列營初合雲屯幕徧張萬靈齊擁護百辟總趨蹌晴麗旌旗色寒生組練光音從清角逺聲續鼓鼙長山嶽遥相峙風雷迅莫當轉移俱應律坐作儼分行結陣成荼火揚矛耀雪霜虎牙依北極豹尾鎮中央節制嚴三表威儀整八方撫循如挾纊恩誼比同裳珍膳官厨供金錢内府藏匪頒周逺邇拜荷異尋常競捧朱提貴同沾緑醑香載言多侍從簪筆附賡颺欲識天顔喜還看士氣揚武功知備豫文治樂平康聖駕東廵盛京恭謁祖陵大禮慶成詩葉酉槖籥三辰正車書四海澄發祥知有自積慶豈無慿忠厚垂光逺艱難創業𢎞垣墉豐邑作弓劒鼎湖升邰室𤓰綿瓞橋山樹繞藤竒氛連太乙彩霧耀諸陵往聖珍符啟今皇寶籙膺遂蠲庚午吉爰卜戊辰烝報本情偏切廵方禮足徴仗移星北拱輦動震東乘日閃干旌曵雷輷萬騎輘名王効琛賮屬國競鞲縢七校軍聲壯三驅士氣騰蹄輕五花馬眼疾九秋鷹起弦開月狐驚箭釋掤戈矛森獻伎盧鵲各呈能甫草差堪擬長楊詎足矜戎兵真克詰堂構看丕承不用云亭禪何煩泰華登渾河波滉瀁銕嶺勢崚嶒正位元宫閟崇岡禁籞層守祧嚴象設駐蹕擁觚棱登降百靈衞幽明一氣凝精誠通㝠漠水木仰髙曽肹蠁巵盈酒馨香鼎實脀或燔兼或炙于豆復于登肅肅金鏞奏鏘鏘玉瑟縆宸容欽盥薦睿慮凛氷兢禮樂明還備天人感必應豐穰康屢降保定榖駢増率土謳吟遍當年締造稱徇齊生不世盪滌力能勝旄鉞乗時奮乾坤一怒馮詩歌皇矣赫史紀勃焉興繼體傳恭儉蜚聲播簡繒架懸聽政鼓帷集上書幐稼穡終須念觀游夙所懲勲華隆作述謨烈裕雲仍幸荷孫謀永欣將祖武䋲洪惟陛下聖日月共升恒聖駕東廵盛京恭謁祖陵大禮慶成詩胡寶瑔展謁心䋲祖精禋孝格天殷祥從啟後周祚溯開先寶命三才合瓊源一氣連辨方符出震配極協基乾式廓由仁累維新在徳延流虹將毓聖長白預徴仙武履吞朱果星臨貫紫躔篤生風表異乘運日華懸丕搆初桓撥羣䧺盡伏跧十三推勁甲百萬却飛鋋拓土聲威壯瞻原本實堅舟瑶勤相度襟帶勢洄沿再卜今遼瀋千秋古澗瀍亶聰能纘緒列聖念稽田大統兼函夏神都乃定燕經營光宙合撫御跨嵩滇乆道甌長固重熈㦸改煎我皇懐肇迹繼志重仔肩松柏瞻依切羹牆對越專先期詢帝典諏日應虞璿清廟申䖍告隆儀考實詮爰移雉尾扇逺颺魚鬚旃奉侍慈寧慶馳行福履駢霱雲隨羽葆香靄䕶珠軿雨霽塵氛淨風和景物妍潔齊心翼翼定省意􅚳􅚳北口千盤拱南天一線緣嚴闗通虎氣髙塞靖狼烟行殿依層障離宫仰舊椽憑軒先澤逈染翰睿情牽不為廵遊至非因逸興遄覲揚時惕若陟降每兢然大獮徴徒盛脩戎振旅闐雙鞬攢韎韐萬騎接連錢陣整花團槊塲寛栁拂韀秦成爭執㦸許少逞銜弦絡野馳偏挺罘山逐更翾將藏仍觸蹶欲縱又聫猭扼猛僵生兕追奔挫巨狿青骹騰白鵲素練㩳蒼鸇自覺皆闗輻何曽待步鋗疊雙穿繡羽羣友散腥涎月滿乘飛接星流帶走搴共驚天智勇齊慶日充填甫草詩徒侈長楊賦苦研何如勤講武不比樂遊畋祖制宜常守遺風莫暫捐諸蕃羣引領候駕㡬佪儃永念懐柔徳均歸統馭權壺漿看簇簇芻糗効惓惓厥角還輸馬雕題亦獻豜晨車循水曲夜帳結山巔咸戴天家澤俱稱衆部賢名王邀眷遇國戚重姻聫鰜鰈同胞與梯航總幅􅊷昔無私覆載今豈薄虛孱盡在生成内寧令雨露偏凡兹皆世徳長以固䧺邊聲教訖如此恩威詎偶焉御題標勝地睿藻賁懸泉雷若山陽殷虯疑水窟眠巖腰梳靉靆石齒濾潺湲喜氣勻寒燠時光賴節宣草青秋露潤林絢晚霞褰輦路依原隰沙程讓陌阡天和駢玉穗嵗稔穫霜私處處吹豳樂家家鼓腹便昇平思締造恬養本鈞甄到此皆疆理行来異毳氊塞門随撃轂遼水復牽船櫛沐聞堯腊風塵記禹胼遥睎形駊騀顒企氣蜿蜒景彼松楸茂從茲𤓰瓞綿千峯朝啟運四祖慶光前肸蠁陳登豆翹襟潔几筵先河尊自出卜洛溯營遷峻業垂無極鴻基永不騫矗如雲鬱蓊亘若霓連蜷既仰龍東護還欽鳳北翩金銀隆地軸星宿耀河壖文祖方昭格神宗復吉蠲栢城藏劒舄琳殿奉杯棬書謂材宜雘詩聞桷有梴瑶光騰釦砌瑞色擁珠櫋鼇戴三山柱螭盤四寶磚祠官嚴辨省宗伯戒愉綖執事鴛鸞肅陳牲繭栗巻觀孚咸有秩萃假洵無愆履位昭中正凝神表滌湔洪歆誠巳達介福德加䖍僾愾通心結形聲㝠意筌焫膋蕭燿燿灌鬱鬯涓㳙禮畢華芝動風行翠䍐旋餘香烟羃䍥夾道樹蔥芊雉堞分樓櫓蜂房富市㕓莊馗平似砥列隊宻於緶象闕規模舊臯門體制全即看霞繚繞並暎日炎燀圭地黄輿正儀天紫盖圓一尊聫海甸萬類統垓埏舜簋惟和土堯題喜不枅衣裳猶什襲圖訓尚連編示儉捐紈綺垂型却玉磌依依欽手澤聖聖共心傳閶闔迎晨啟旌旗拂曙鮮早朝銀箭仗待漏赤墀鞭忭舞聞宣詔嵩呼敬上箋維城鏘劒珮列陛肅貂蟬錫類蠲千庾流恩注百川絹頒仁共煦竿植過容悛枌社均霑被雲臺最繋攣厥初爭附鳳應運翊鳴鳶銘鼎推同體援旍念控咽三勲親奠斚諸佐使加籩鎮岳横青壁靈源匯碧漣惟神將璧帛承命薦牲牷廼令熊羆會旋觀組練挻軍容齊郅偈武節集鮮扁後距成山立前茅擬水漩電馳戈閃閃雷動鼓鼘鼘莫訝輈能挾兼誇札盡穿鸛鵞風欲巻荼火錦初纒慶勞鐃聲奏呼騰凱唱還於焉開大酺是用宴華顛豐沛興歌日邠岐望幸年駢羅肴盡蕙照耀燭皆蓮眷顧容酬酢言情任笑嘕後人猶食舊先志並垂憐所遇咸欣躍無誰更結悁餐和春以嫗交讓性寧顓耕鑿安淳樸漸摩異巧儇培深徴皥皥化洽近蹎蹎但覺心恒習都緣目乆擩深叢繁果實沃壤秀禾弮蘇子靈槎接松花寶石濺三椏珍玉茁萬顆璨珠蠙是水成甘醴其材悉杞楩射熊馳躡影釀鹿護長鬈肪截摛冠雉銀翻縮項鯿土饒嘉産錯人厚古風扇自昔能時保奚煩慮月脧無名誠蕩蕩有道信平平逖聽常翹首騰歡㡬曲拳文濤涵渤澥筆露漬蘭荃賦就瞻羲畫歌成叶舜絃惟馨光典冊至治握樞鍵用述前謨大兼窺聖德淵盤杅期日儆金鑑願心鐫紹衣符三五綿長紀萬千回鑾咸有慶敬獻上陵篇皇清文頴巻九十四
