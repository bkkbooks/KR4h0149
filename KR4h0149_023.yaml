body:
  text: 策問山西鄉試策問三道魏裔介問世有聖智之君則有賢良之臣相得而彰功業以𢎞乃臯陶氏歌曰元首明哉股肱良哉庶事康哉而舜之歌曰股肱喜哉元首起哉百工熙哉若是乎致治之道固有以交相成歟在易乾下坤上為泰坤下乾上則為否上下交不交由於志之通不通其相通之義何居漢文帝止輦受言夜半前席貞觀之政諄諄勉勉無非告其臣下以直言極諫並著之史冊為世艷稱明之大誥亦以君臣同遊為開卷第一義古之敷化一時餘烈千古者豈有異術耶我皇上冲齡天縱內外臣工嘉謨入告無不立見施行但以焦勞萬幾未暇賜清燕之閒從容講論羣臣循法守職封皂囊伏青蒲者罕得親炙龍光豈九重明見萬里髙居恭默自可致熙隆之上理乎抑兼聽並觀尚有資於忠讜之論歟夫𢎞奬虛受上擴山藪之度獻替啓沃下抒媚兹之忱聮堂陛之誼奏升平之化果何道而可也易曰納約自牖又曰有孚盈缶格心之學或在於積誠自致而不關儀文之繁口舌之數歟爾多士望金馬而作賔行且司喉舌調鼎鉉其極言之無隱問帝王受天之命臨御天下其間相與有機昔武王克商下車訪道箕子陳洪範九疇初一曰五行次二曰敬用五事庶徵之應較然不奕然則先王克謹天戒自古記之矣說者曰聖王之世天不愛道地不愛寶諸福之物可致之祥無不畢致然堯水湯旱皆曠世未有之災而卒康奠羣黎他如太戊武丁漢文帝宋仁宗災異叠見顧何以正位凝命克盡人以回天歟春秋二百四十二年之間日食地震隕星雨雹李梅冬實鸜鵒來巢之類無不備書或謂說天者莫辨於春秋其大指亦可敷陳與易曰震來虩虩笑言啞啞是遇災而懼乃所以致福也然與否與我皇上纘緒宅夏仰承天命無不克謹桂海氷天咸躋熙圃五事無愆則五福協應謂宜天和畢集乃邇者四月五月日月薄食飛蝗雨雹六月大水數十年所僅見秋禾淪沒百姓昏墊果適然之數無因而致與抑恐懼修省有資於人事之補救也太史公曰精祲之交太上修德其次修政修救修禳其實亦有可言者與爾多士學博天人豈無董仲舒其人者盍詳著其理藉以獻之當寧問致治莫先於養民養民莫先於足食古帝王知稼穡之艱難故三壤九賦取以什一為制蓋重民故輕賦輕賦故民生樂而國家亨治安之盛也後世竭澤而漁當國用不足或以加賦為長計乃賦愈加而用或愈不足豈國計與民生有二體與漢初最為近古唐宋賢君斂亦自輕然則加賦起何代也桑孔言利析秋毫然平凖均輸算商告緡其於經費之宜果有禆與明之國初正賦屢蠲民受其福末年邉餉加增至二千萬有竒敲脂拷髓遂至土崩瓦解前事不逺其得失亦可指陳者與我皇上巽風解澤仁恩洋溢盡除明季額外之徵深山窮谷莫不鼓舞聖德頃以軍興旁午賞賚頻頒乃復徵加增之餉呼荒逋之糧豈度支紛紜非此莫應與書曰民為邦本本固邦寧易曰損上益下其道大光自上下下民恱無疆何損之乃所以益之耶兵燹之後彌望草菅西北尤甚流移未復瘡痍未起民力竭矣後將安繼國家誠欲登太平之業要必以農桑為本圗或嚴驅末作或優恤力田或設勸農之官或興水利之政其亦有藏富於天下而朝廷自收豐亨豫大之效者與諸生蒿目民隱久矣借箸以籌其盡抒所懷以占爾康濟之謨武闈策士第二問魏裔介問軒轅制井田以寓兵法故七十戰而常勝三代因之未嘗有改也其後惟宇文周氏仿古創立府兵深得三代之遺唐因之以削平海內暨唐兵三變而國勢弱不可振矣明之初年設屯田萬户府所在建衛有事則戰無事則耕欲使養兵百萬不費民間一錢乃招募用而衛所僅為空名源流因革之故亦可得而縷陳與我國家以八旗治兵即古六軍之制也計口授田而賦以甲即古軒轅之法也以故將帥之命於朝者有敦禮說詩之風士卒之奮於伍者有敵愾同仇之氣過於前代甚逺然此法惟行於滿兵而漢兵實未之講豈果古制之不可復歟連歲以來添設興屯道以招徠失業之民而生榖之土未盡墾甚者强割民田揑報虛數言者以為詬病豈軍屯與民屯原不可膠柱而鼓歟五代周世宗時亦常設專司以督民矣而旋設旋罷者何也議者欲盡裁衛所歸併州縣然江淮之挽輸方急邉徼之沿襲已久豈通變之要有宜於此而不宜於彼與今將欲一滿漢之制復農戰之宜俾屯政有興復之實行伍無坐食之弊於以壯一代之軍威鞏千年之金甌顧安得坐而言之起而可見之施行以不虛借箸之殷殷也多士其敷陳無隱將以覘治安之略浙江鄉試策問二道熊伯龍問三代後非郡縣不足以為治治天下而不察郡縣之吏求其致太平難矣置御史監諸郡自秦始然吏治近古莫如漢既設部刺史以六條問事又専遣繡衣直指可獨曰秦用法嚴與漢刺史居部九載稱職者舉為守相其初固以下大夫臨二千石也中間或謂輕重不相凖更為州牧卒從朱博之議以為秩卑加賞咸樂功勸進而置刺史如故及八使分巡刺史有罪亦得奏聞權更重矣此八人者何官與明之各省按察比古刺史而秩過之其舉劾専逹終不敢望御史而御史考滿則或參于藩臬或出為太守蓋猶然舉為守相之遺意焉凡此者分非勳舊職則激揚朝廷信之天下安之其故何與古之以遣使為下策者惟蘇文忠言最痛意者有激於當時四十餘輩興利之使而非今之察吏者比與我皇上以察吏付巡方而奉職無狀罷之誠便矣然猶不得已而别議遣又不得已而暫議緩皇上念惻民生熟思審處如此向者之罷豈非惡其人而不惡其官與夫惡其人而非終可廢之官將無官可存與不惡其官而非盡可信之人將無人可擇與抑官方淆雜由來者漸每念古人無失名譽之言問遣洛中之事竊歎為吏之難也意者吏信紀綱察吏者信誅賞則雖仍是官仍是人而未嘗不效而不然者人心風俗如故胥吏格例如故而堂上易一大吏遂大異於前者之為與願諸士熟計其便率臆以對一行作吏不敢言矣問古之治天下者何為而出於刑也將以生人何用重典與將以殺人何用輕典與宋葉適有云人誠君子則議刑必輕人誠小人則議刑必重乃劉向曰自古眀聖未有無誅而治者諸葛武侯以蜀刑不肅為戒而欲威之以法獨非君子之言與肉刑始於蚩尤歷數代聖人因之不能廢至漢乃除彼所稱有虞氏畫衣冠異章服以為戮而民不犯者非與一律令也劉向引古之議事以制則以鑄書譏僑鄭昌懼後之政衰聽怠則以刪定啓漢一贖金也唐虞好生而施之鞭朴何其慎穆王耄悔而並及五刑何其寬一赦宥也肆赦著於典文不以為惠姦而賊良委轡喻於管子則憂其小利而大害豈古今異宜輕重殊勢有不可以一定論者與路溫舒之上書緩刑也惟於治獄之吏歎息痛恨者三焉無亦有定者法無定者人峻深故之誅厚雪寃之賞則五刑雖設而不用與夫朝廷者治獄之吏之耳目也史稱廷尉之賢者至民自以為不寃趙蓋韓楊固不在一民之數與貞觀刑措幾比成康盧張延頸就戮果求其生而不得與晉劉頌有云君臣之分各有所司主者守文大臣釋滯人主權斷三者可詳其說與方今恤刑使者四出矣湯之解網禹之泣罪視我皇上何加乎而議者竊謂本原之地恐未盡乎此也諸士其深思所以下民遷善大夫無刑者以開廣德心粹然王道斷獄數百斷囚數百何足云江南鄉試策問三道朱彜尊問聖人之學莫備乎經漢世専一經者立博士而兼長經義者莫若鄭康成然多以漢法解經又採䜟緯之說為後儒所憎唐孔頴逹等撰五經正義儀禮周禮則賈公彥成之至宋邢昺疏其未備而經義始完歐陽修謂所載既博所擇不精異乎正義之名請悉刪䜟緯之文使無駁雜今五經取士一本宋儒之傳注可謂醇矣考之明洪武中科舉程式春秋不遺三傳書主蔡傳而不遺注疏禮則專主注疏是漢唐諸儒之說仍多兼習今注疏雖頒學官而士之肄習者鮮矣或如歐陽氏之說刪其駁雜飭經師講習而兼通之不更愈與餘若易初主程朱傳義其後本義單行而習程傳者漸寡春秋初主胡傳及張洽集注其後胡氏傳單行而治張注者無聞亦宜酌其舊俾兩家互為發明可與且宋元之說經者多矣孰同孰異孰繁孰簡孰無悖於傳注孰能發明傳注所不及其概可得而言與五經大全論者謂惟春秋最善蓋本於汪克寬之纂疏其餘諸經所采羣儒之說果其大備而一無剩義與抑尚有待於補緝與我皇上聖學懋勤蚤夜孜孜與儒臣講繹羣經既以四書尚書講義頒示天下文武大臣兹者易義又將刋布其於詩禮春秋當次第編纂夫儒生誦習經義其首務也探其淵源必能舉其條目其詳言之毋隱問江南田賦較他省獨多賦額既多逋課不少下江諸郡積缺動盈萬億說者謂害釀於賈似道經界推排之法或謂明太祖憾吳民為張士誠固守籍沒豪族田按私入之簿以為徵額故賦特重其後因巡撫周忱之請蘇松等府官田凖民田起科行之二百餘年矣今舊額未增而民力日敝何與意者有司之催科未盡善與往時歲額不完疑為巨室豪右抗緩不納自奏銷處分一案所以懲創者至矣江南紳士惟恐輸將之後而歲額不完如故何與或謂西北大郡賦額不過數萬而江南一邑有多至四十餘萬者宜其日事催徵不足夫松江之華亭不嘗析為婁縣乎既析之後未見徵輸之如額則又何也比者旱溢頻仍不得不以荒歲之逋賦請帶徵於嗣歲然田壤之收獲止有此數嗣歲未必屢豐則舊逋未完而新課又缺矣將何術而使國用民力交無絀與至若大江以北邳徐鳳泗蒿萊彌望隸之軍而軍不屯歸之民而民不墾招徠開墾之法又何策而可稍幾於江以南諸郡與多士見聞所習利弊必洞然於心盍具陳之是籌時者所欲亟聞也問黃河之患前代山東河南或有時衝决今則江南獨被其害矣明永樂中陳瑄轉漕東南欲避遮洋之險鑿清河縣南之淮與河㑹而淮黃遂為運道之咽喉國家漕運仍明之舊而頻年河患傾堤潰防歲費帑金纍數百萬明代河溢於淮則病在運河溢於泗則患在陵今治河者無陵寢之虞惟運是亟則力所專司宜其事半功倍矣顧工力之煩歲月之久反有艱於昔者何與隆萬間潘季馴凡四治河河無不治惟守固隄束水藉水刷沙之法今其說具在惟是河挾沁汴泗沂諸水其勢易强而淮水源獨流長其勢易弱然則藉淮刷河之說誠不足恃欲河之治必循季馴故智而後可與抑分黃導淮别自有策與往時盜決河防者罪止杖與徒而已後以法輕易犯改從充軍今之法較昔愈嚴矣乃衝潰日告且新堤方築而故堤旋決綢繆何法而使新舊交固與淮揚之田半為波臣所汨此江南之大患也淮流何以遏歸仁髙堰何以護雲梯之關何以通河之害何以去諸生其悉陳利害以為當寧獻順天鄉試策問四道徐乾學問古者帝王置敢諫之鼓植告善之旌垂戒慎之鞀立司過之士求言納諫如此其亟豈非以致治之要莫此為先者歟然自古抗顔以諍虛已以聽者何其少也夫公卿列士獻詩瞽獻典史獻書矇誦工諫庶人傳語有可以匡君德而禆治道者蓋無不可言之人洎乎後世直言極諫列於取士之科拾遺補闕有専司之任而效不逮古亦可見矣明時不専設諫員而寓其責於科道邱濬謂國家不以諫諍名官欲使人人得盡其言也然歟否歟皇上勵精求治黎明聽政百官以次奏事又不時引見召詢雖虞舜之好問察大禹之求善言無以過矣而尚或敷陳有未盡者豈鼓舞招徠之道猶有所未至歟漢文帝唐太宗求言納諫可謂至矣然賈山謂用其言而顯其身士猶恐懼而不敢自盡劉洎謂面加窮詰非奬進言者之路其說果有合歟夫言之繁瑣雜進者固未必皆當因其不當而設為科條若制防之即其以言為職者不過寥寥數十官而凡有論列多沮於所司之議致使臺諫稱緘默為老成而諸不在言路者益以納忠為戒自古政治之得失未必不由此矣昔人嘗云諫者多表上之能好諫者直示上之能容故謂言者沽名必其可以取名者也謂言者市恩其言必非刻薄傷治體者也一再思之必然省繹然則為臣下者得無有習為故事而不思其要格於成憲而不盡其用者歟何以作骨鯁之氣而廣聽受之益其詳言之無諱問先王之制天下也為之禮樂刑政以統一之天下莫不回心而嚮道及乎後世詩書六藝之文朝廷刑賞之典非不粲然備也而風俗之漓起於有位人心之變積於無形始以貪冒相髙而卒成禍亂豈漸漬於失教被服於成俗廉恥之道不講而至於是歟聖天子恭已於上凡欲與百爾在位砥節礪行以與天下更始所以講求之者唯恐不及焉顧今日中外臣工果可謂無負歟傳曰上與讓則下不爭又曰士君子寧處其厚母處其薄厚薄爭讓較若黑白然而世之趨者常在彼而不在此何歟漢有崇厚論晉有崇讓論史稱其感時澆薄廉遜道缺乃著論以示風然卒不能砥頽俗而挽積習則何說也荀子曰堯舜不能去民之欲利而能使欲利之不克其好義也吏道雜則志不一志不一則廉恥不興今欲使之敦廉重恥返厚而明讓其本安在則激勵不可無術歟或謂崇尚簡默亡補經術雖規言而矩行亦昔人所云刻木而官之者耳國家奚賴焉夫奬節操抑浮囂固非欲得迂疏無當斤斤盜虛聲鮮實效者也三代以後唯西漢治稱近古寬仁長厚如孝文使朝廷之間恥言人過而其時政事未嘗有廢墜綜核名實如孝宣使文理之士咸精其能而其時人才未嘗有幸進何修何營而克臻是意者法制明肅清議盛行然後士大夫爭引廉恥為重而風俗可幾於厚讓歟抑敦禮以教忠重祿以養廉在今日亦當亟議者歟願深明所以然之故而悉陳其所當務毋有所隱問歷代國史之作其所由來尚矣春秋左氏以後司馬遷班固綜其體要後世因之粲然並列原夫三國以上猶作者自為及晉宋而還則鮮不被詔唐太宗天縱之才留心史籍自晉迄隋中更南北而史之成於貞觀者五斯固英主之為也石晉用兵之時宰相劉昫猶纂唐書宋太祖開寶六年即命薛居正等修五代史明洪武元年十二月命宋濂等修元史明年二月開局八月書成又續修庚申君事洪武三年二月開局七月書成蓋以前代之興廢即本朝之勸戒故歷代以來既有天下無不亟亟於勝國之紀載我國家定鼎燕京混一區宇已三十年則纂輯明史非今日所至急者歟宋濂之修十三朝紀也發所收金匱之藏而聘汪克寬胡翰髙啓趙汸等十四人為之其修庚申君事也則遣使采之北方而聘趙塤朱右貝瓊等十五人為之總裁必任宏博之儒則事詞核纂修兼用遺逸之士則議論公故任不可以不專而用不可以不廣今自史館而外故老遺賢豈無熟知前代掌故如汪克寬趙塤諸人者乎洪永纍朝一代大綱備在實録惟啓禎獨缺然實録所載或有粉飾之詞而雜志野乘衆說如林參稽必備惟是諱忌之疑莫能自釋歲月既久散軼亦多作者既自託於名山之藏守者或誤比於挾書之律何以網羅舊聞無有遺憾亦當如洪武時専官搜采以資財擇歟茍不及時圗之得無耆舊凋零遺聞放逸久而愈失其傳歟多士其明言之問盜賊之興起於不察故周禮野廬司厲之屬其法每加詳焉蓋其關於治亂之數豈不大哉顧去盜如去疾從其本則自己徇其末則雜出而成結轖之患我皇上宵衣旰食飭司牧以靖盜安民可謂勤且至矣而內自畿輔迄於各省督撫諸臣以盜告者歲無虛日其故何歟民雖至愚無故而為盜孰不知法所必誅乃甘以父母妻子所賴之身至於嬰禁網而猶不可遏彼獨非編户之民好生而惡死者哉抑固有驅之使然者也今者弭盜之術謹戍防嚴捕治而猶懼其慢也復重考成之格以督之一涉盜案有司積歲不遷而降革隨之斯亦至密矣得毋弭盜尚有本源深思其故而先事求之之為得歟昔龔遂之治渤海願便宜從事至則先罷屬部逐捕吏而卒收止息之效孝武時遣繡衣發虎符之兵以擊盜又作沉命之條盜不發覺及發覺而捕不滿品者罪二千石以下至小吏主者然而盜乃寖多此其故亦有可得而推言者歟向使用龔遂於孝武之世亦將有成績否歟胠篋之子始以一捕尉逐之而有餘有司習而安焉往往合而不可散此法輕之弊人之為國與民常不如其自為罪將及已則上下相䝉或匿多以為少或文彼以掩此而盜之脫者亦多術矣是以窮之者縱之則又法重之弊何道而使輕重各得雈苻晏然歟或謂兵以禦盜而兵即為盜巡撫宜治兵則其令下也臂指相應或謂餉缺而兵饑驕悍之卒瞋目攘臂持主將之短長有將領不能詰者何以核兵理餉使兵民相安歟其並著以備採擇焉皇清文頴卷二十三
