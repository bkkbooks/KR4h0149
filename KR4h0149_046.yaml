body:
  text: 賦豐澤園修竹賦陳元龍猗歟修竹幸託青穹根盤閬苑葉覆琳宮風煙獨厚雨露偏濃影搖金而掩冉聲戞玊而玲瓏爾其裊裊紫筠娟娟青綺矗立涼館之前森標崇臺之際或蔭林臯或臨水涘一抹淡煙萬竿新霽扇輕颸以流暢含明月以秀峙節亭亭而霄上隂靄靄而雲翳翠色紛披幽叢深窈笋破紫苔籜辭緑篠橫斜漾靈沼之遊鯈羅列隱周原之香稻青陽至而暈碧朱炎升而凝縹經素商而徑質彌堅凛元冥而霜姿含峭洵體元以儀天亦虛中而象道故夫易著蒼筤書稱職貢衛風詠於淇澳楚材美夫雲夢渭川則千畝翠連梁園則數林黛重投葛水以化龍栽丹山而巢鳳長笛寫嶰谷之音炙簡有汗青之用别有緣崇嶺嫓長松循原隰竦層峯圍繡闥晃簾櫳呈蔥蒨結蓊茸莫不參差掩映搖曵琤琮然未若兹竹之閟景清都抗迹天中香吹細細氣鬱蔥蔥映青蘋與緑荑雜淺紺於微紅潤滋密徑之莎響吟曲檻之風當此休辰麗景衆芳芬馥砌草若茵井桐如沐上下熙恬羣生樂育惟我聖皇乘乾御六澤覃八紘仁敷九服普堯日於蒼黎噓舜風於林麓而兹園也雲軒旁睇月殿遙臨松棟不飾茅茨兩層非考室於輪奐實示儉於蓬瀛隱轔則奧區篠簜曠望則廣衍溝塍桑麻繡錯疆場綺分夏至而嘉禾垂頴秋登而玊粒告成清渠渺渺以皺縠水田漠漠以鋪芬是乃天家農圃神臯穜稑文囿之所極觀豳風之所頌祝羡托根之得地斯企心於兹竹想其檀欒滴翠陸海搖寒拂金楹以振響和珠泉以鳴湍動豫遊於雕輦邀宸幸於彤軒涼生碝磩色間旌旃蕭森珍館映帶瑶壇漾水紋而澄練襯霞片而飛丹韻悠揚兮寶瑟光皎潔兮琅玕挂枝而難尋么鳳戢羽而莫辨祥鸞美哉斯竹實維嘉植擢秀瓊宇之旁布濩仙垣之側歷氷霰而莫改不扶持而自直蓋有取乎堅貞之性匪徒尚其青蒼之色以是知陂池泉石之開苑囿園林之設乃聖主所以務本宣風淳朴厚澤寧樂太素無煩雕飾每寓意於栽培亦寄情於阡陌惟是民依之不忘終俾農用之滋植故夫人知所本士知所勵薰陶於大和之中樂利於時雍之世此見聖人育物之心茂對之意小臣幸際昌期欣兹榮遇休寵曲錫沛澤下暨飽飫嘉羞沾濡芳醴得賜矚乎清英乃􅌓𣅿乎禁籞敢繼蕪詞於清風以揚至德於萬祀經筵賦有序宋大業皇上體備生知聖由天縱嫓軒皇之敦敏邁岐后之誕登勤政諴民親賢好學千聖百王之統悉滙於心傳五經六藝之文咸通於神解牙籖夜擁窮甲乙而忘疲彤幄晨開歷春秋而靡間歲當作噩月在夾鐘爰啓經筵特陳講義闡中和之性理探河洛之微言罔不敷揚用資啓沃雖藴函髙厚非蠡管之能窺而運際文明實頌揚之莫罄微臣幸列仙班覩天顔之有喜欣逄聖典仰帝德之日新敬獻賦曰猗聖王之受命接道統於羲軒發珍符而祕啓究寶策而苞宣紹唐虞之曩烈抉周孔之遺編道下濟而交泰德健行而協乾殫就將於夙夜勤學問於經筵於時麗景垂天青陽應律獻節初開仲春始吉命宗伯以諏儀咨靈臺而撰日立銅史以司聲候玉繩而辨色開閶闔於彤扉拱雲霄於紫極瞻鳳蓋之晨飛見鸞輿之曉出乃以千行鹵簿三署嚴更翔鵷列陛振鷺充庭曵棽離之虹旄飄狎獵之霓旌繖如雲而五色扇似月而重輪建九斿之仙仗會千官之火城丹墀兮綘闕綺疏兮交錯瑞靄兮絪緼祥光兮景爍宫漏裊兮出花遲爐煙縈兮垂栁弱煥奎壁兮旭日華奏簫韶兮鈞天樂皇帝乃御文華之殿陳九擯之儀發琳琅之祕吐珠玉之輝上公執簡名卿侍帷微言析奧深心剖疑搜羲文之精藴窮性道之淵微既海深而嶽峻亦天髙而聽卑雖鞀鐸之有採詎塵露之能禆冀芻蕘之可擇庶葑菲之不遺乃傾葵心乃攄竹素仰企淵𠂻昭兹王度披玊宇之祥風挹天章之調露矢一德以揚言戴九重而抒愫抗古迹而為昭荷雲衢而生慕若乃琅函玊軸錦帙藝編夜分循覽日昃流連掇仙葩之璀璨掞睿藻之芳妍灑十行之珠翰染七襄之寶箋洽文德於四國被風聲於八埏學既隆而加殖心善下而彌虔儲精沖穆宅思優遊考庸世室受䇿介邱定三統之建稽五德之疇明堂辟雍之化洽升中巡狩之典修翺翔於仁義之林藪沉酣於道德之源流含咀於藝文之英萃斟酌於儒雅之咨諏扇芳烈以屆遠貺貞符而闡幽被光華於四表鞏歷服於千秋末臣簪筆乎盛世用敢作頌以揚休頌曰於鑠我皇德茂隆兮勵精夙夜昭有融兮作君作師亶明聰兮允恭克讓心謙沖兮講幄時開亮天工兮思以作睿懋聖功兮化被六合流醇風兮一人有慶萬方同兮喜雨賦有序徐元正歲當癸酉月在清和皇上殷念麥秋爰祈甘雨法宮盡齋祓之誠郊野獲土膏之潤豐隆列缺若奉令而爭馳風伯雨師似徵符而即至是非精神之默契呼吸之遙通孰能洽靈貺於滂沱兆豐年於穎碩也哉用是盥手濡毫敬作賦曰彼夫薄霧濛濛微風習習細非破塊亦潤物而無聲密比散絲徒沾衣而不濕用欲逮乎滋培氣尚鬱於原隰未若夫萋祁有象先徵礎潤之竒飛灑將來忽徙蟻封之急雷霆激而常鳴蛟龍怒而不蟄陂渠水足徐抽麥隴之針倉廩雲髙預作蒸民之粒是皆歲星之在酉幸逢聖王之當陽並穗連莖極頌聲於鼓腹三年九蓄每厪念於垂裳謂陌上亷纎但滋花栁天邊霡霂未溉農桑甫下刑鵝之令立瞻石燕之翔豈管輅之占風智煩推測若欒巴之噀酒事屬荒唐惟誠格乎天斯德孚於帝重農寶榖遙通冥漠之間沛雨油雲立召嘉祥之瑞垂簷百道似巖頭瀑布之形濺瓦千聲想水面跳珠之勢拾遺遊處詩被涼催刺史來時亭因喜記從此與與翼翼知黍稷之咸登薿薿陳陳獲坻京之大利方快覩夫豐年共娛遊於盛世斯時也簾櫳濕透殿角涼生玉女空中衣飄搖而欲舉阿香去後車歷碌而常驚撫檻外之花枝新沾潤澤聽梁間之燕子亦賀生成世守硯田時有含哺之樂頻遊書圃惟將負曝之誠嘉禾賦有序王之樞康熙三十有一年皇上省方古北口外鑾輿所道百穀蕃殖中有嘉禾叢生一莖數穗實穎實栗聨疇被畝爰命驛致闕下昭示羣工臣伏念書所記惟德動天茍非聖德淵粹通於神明豈能使日星霜露之精暢被草木以成竒瑞矧兹粒食蒸民所天非若萐蒲蓂莢朱草華平徒稱瓌瑋蓋天所以慰聖人之憂勤而垂恩儲祉也臣昧學少文詎克美盛德之形容揚英聲以騰茂實徒以躬逢盛事願效衢歌亦猶測量天地繪畫日月云爾謹拜手稽首而為之賦曰惟我后之神靈實超邁於古先心亶仁以濊義躬闡坤而握乾烈龎鴻以巍峻恩布濩而綿連膏潤滋乎后土協氣奮於山川無一夫之失所暨萬物而皆然和三靈與百福暢九垓與八埏以宵旰之靡寧思民隱之弗宣藉省方以為觀遂時行而應天當秋氣之清朗披金風之淅瀝轥碧草之萋萋閲丹楓之歷歷望關雲之曉舒聽河流之夜激澤馬鑣連山車轂擊旄建雄虹斿橫雌霓飛芝蓋於隰原轉風烏於亭壁道穰隴以停驂聞豳歌而控靮澗復林長阡紆陌逖塍疆刻鏤菽荏縷績風布葉以離披露垂條而涓滴則有嘉禾呈異侍從傳譁挺生上腴族類竒葩每一莖而數頴蓋本合而岐斜根密蒙以攢立枝重纍而交加沃夜瀣以凝實迎朝陽而吐華真太平之竒瑞鐫史册而爭誇爾乃皇情斂抑睿慮𢎞圖不矜千里之駿罔珍照乘之珠却貢則氷紈火罽免輸則玳瑁珊瑚謂雙岐之特出視九穗以無殊勿張皇而失實勿揚厲以加誣偶因從官之采擷命載輕軺之逶迤集鵷班之濟濟開雉門之峨峨朱宮翠靄紫禁香多離離綴蕾采采含科歡騰有位喜溢鳴珂知符應之不虛信嘉祥之有以彼夫蒿宮譜經芝房歌史孝竹之頌有聲瑞木之文如綺縱表異以示竒皆浮夸而譎詭又若種異不周符稱北里九熟四熟之竒元山玉山之旨雖信美而無徵何嘉名之足侈惟我聖皇敬天之命合契剖符內霑外潤省夏甸以為度操南風而解愠幾有開而必先德無倡而不應異穱為陶虞之祥同穎乃成周之慶歷百世而同軌洵後先而比聖伊微物之托生亦遭時而得舉日月播精雨露資茹含英則噓吸山川練質則經過寒暑偶衆穟以叢生獨亭亭而自處兹乃拔起田間輝煌天府近帝都之光儀承九重之笑語排金門而入玉堂雜圭璧而親袞黼典司則什襲為珍拜舞則千官如組皆以聖人有道念切無逸和氣凝祥惠風迪吉即讓美而弗居終騰光於有飶載牒府以書年被宮商而應律昭靈契於來兹貽休聲於罔極宸翰賦有序汪灝歲在甲戍閠五月十八日臣於起居館隨諸詞臣之後恭瞻御書題嵩山嵩髙峻極題禹廟功存河洛題淮瀆靈瀆安瀾題孟子遊梁祠昌明仁義大字四紙煥若神明莫可倫比臣維篆𨽻以後楷法斯興歷代帝王翰墨所留載在諸帖者粲然可紀要皆行草數行大不盈幅求其縱橫排宕流傳榜額者未之前聞我皇上天縱聰明萬幾之餘間臨楮墨金生玊潤體備法完不第駕鍾軼王凌顔轢栁即從古英君工於臨池者未有與頡頏者也至題額十六字格搆森嚴興象飄逸造化生心雲煙在手骨理天成毫無潤飾聖詣所及更創闢前代所未有照耀萬古而不磨者矣臣不揣蕪詞樂紀其盛爰拜手稽首而成賦文開日月德被山川展瑶箋之璀璨覩寶翰之盤旋龍奮鱗而騰趠鳳鼓翼而凌鶱光搖銀海喜動鵷班原夫鎮地配天維嶽之德疏河導洛維禹之績奠四瀆以安流徵百神之受職惟仁義之道明斯楊墨之風息允功業之皆崇宜表揚之孔亟爾其選言既定繭紙待題染毫雖衆搦管難齊擘窠未審題署猶迷或指巧而臂拙或寸合而尺暌氣臨池而索莫筆落紙而灕澌紛塗鴉與墨豕誰渴驥而怒猊於是臣工稽首載求明賜維聖藻之昭垂既天文之廣被照濼水而蛟騰輝尼山而鸞峙濓洛則雲漢昭回關閩則宸章閎麗非揮灑於一人何照耀乎百世於是萬幾之暇俯答羣僚拂玊几鋪金綃探裘鐘選鹿毛滌鳳咮之硯磨麟髓之膏舒硬黃之古楮濡錯寶之秋毫乍兔起而鶻落旋煙靄而電熛香繞金爐之外光騰珠斗之髙其為狀也山嶽巍峩風雲結聚圓轉銀鈎森標玊柱頓則山安導則泉注奮則龍拿立則虎踞氣舉千鈞力穿七屬端如古聖兮劔佩嚴逸若仙人兮丰神裕驟觀飛舞驚一氣之渾成徐視停勻欽四時之分布匪惟超乎人工若有得乎神助蓋緣悟通一畫理窮萬象善審低昻妙分背向或鋭而爭或隱而讓洞八體之精微創六點之逸宕小懷素之如斗陋宜官之徑丈乃知得神契於毫端亦如運天下於掌上若乃遙頒汝洛分榜階廊斐亹暗曖熠耀輝煌峯巒星煥棟宇翬揚壯淮瀆風雲之色生亞聖俎豆之香民所瞻兮歡萬國神所依兮降百祥默扶世泰共翊時康豈止一十六字之炳蔚留千百萬祀之矞皇華山仙掌賦劉涵維西嶽之嶙峋鎮漢畤而嵣㟿眺天半之髙峯見雲間之仙掌振險固於金方覆培嶁於赤壤原夫巨靈初擘仙迹微捫仿柱擎天輔鰲立坤依崇巖而設象據峭壁而留䀶排紅霞於夕照接紫氣於朝暄爾乃壯壓關門髙連天漢拓終南之蜿蜒障黃河之浩瀚渺千仭而巍巍亘終古而旦旦翠入握而常凝嵐盈掬而不散若夫山光靉靆煙雨繽紛發聲為霆鼓氣成雲草舞輕羅之袖風吹彩纈之紋諒宇宙之在手隨轉運而絪緼亦或靄散天青雲開日霽仰操持兮森嚴欲攀緣兮迢遞孤標承露之形奮蓄拔山之勢五丁受其指揮百神歸其節制蓋華峯者峙九霄之外據萬象之巔靈竒詭祕狀貌精虔車箱入谷箭括通天徒仰岧嶤之色誰尋玉井之蓮是以天示仙蹤山成懸度常抒捧日之心直指登天之路扶兩儀而屭贔摶九州而鎔鑄豈止握關輔之形勝壯秦封之鞏固方今寰區混一海甸升平山川奠定表瑞呈禎屹崔巍而相向拱翼戴於神京况茲掌之神竒尤下土所瞻視靈居五嶽之先秩比三公之位備指臂於天家效膂力於巽地行將引懷柔之神只導宸遊之天駟喜雨賦有序魯瑗月維首夏序屬恢台麥浪翻風巳改青童之節桑田零雨宜行赤帝之符偶杲杲之經旬致祁祁之失候揚晴絲於綺陌雲轂常遲懸朗鏡於瑶天雷門未啓雖不比暵暘之歲亦恐妨稼穡之功爰厪念於九重特戒期於三日陳牲贊幣雩壇之禮未行倒井翻河郊圻之澤巳遍歡騰緑野喜溢黃輿仰聖德之潛孚頌甘霖之立沛臣職居東觀望切西成早簪筆而記年豐特拜手而占國瑞賦曰維和氣之上應識景運之遐昌考鴻猷於姚姒溯盛業於軒黃稱明良之有慶頌覆載之無疆均調兮六氣焜耀兮三光伊歲時之豫順亦民物之豐穰歲當作噩月維仲呂太皥解符長嬴司序桐井兮微薰槐庭兮初暑維兹燕薊之都偶浹旬之未雨日焰焰兮青郊霞飛飛兮紫籞宵瞻玉免兮徘徊曉望彩虹兮延佇雖未妨於農疇巳軫情於當寧於是敕僚采諭職司掃社稷治壇壝禮官擇吉祝史諏儀樂正修鞀鞞之器舞童習雲漢之詩將致齋於三日竭禱祀於靈祇乃宸念之精誠早合符於冥漠壇中之圭幣未陳天上之油雲巳作石燕應候而將飛土龍乘時而欲躍聽鳴鼓於天門觸揚飈於林壑挽碧漢以如傾挹天漿而共酌挂長足兮郊原織斜文兮帷幕初灑屋而絲飛旋垂簷而溜落即畿輔之滂沱諒八方之優渥若夫澗湧新流山攢積翠九陌潤兮煙凝六街濕兮霧漬居人無沉竈之虞行客有墊巾之致滋草色兮澄鮮霑花光兮嫵媚魚迎浪兮揚鱗鳥投林兮垂翅灑變化兮墨池播珠玉兮荷芰儼雪浪之翻天忽銀河之瀉地於時良苖誕種秀麥將登披神漿之霡霂散驕陽之鬱蒸既葉潤而枝濯遂澮溢而川增洵天心之仁愛實盛世之休徵吾皇德被方區慮周疆理對此甘霖天顔有喜膏露降兮同傳慶雲見兮並紀惟聖人念切於民依斯上帝恆錫之嘉祉歡騰庶采慶溢羣生陳風詩於殿陛聆謡頌於寰瀛欣彼蒼之沛澤卜品物之咸亨畇畇原隰穰穰春耕五風十雨共樂升平微臣沗東觀之列謹載筆而慶西成瑞禾賦湯右曾維聖主之膺圖體乾坤而合撰調六氣於虬床叶三辰於芝簡開九戶而揖禎符環四瀛而絶垠限榮光燭兮駟津瑞靄凝兮豹産髙廪無際明星有皖洛水瀠紆嵩山􅑬嵼地屆隂陽之會課入田歌天開宇宙之和移來穀板普靈貺之為昭樂駢枝其並綰彼夫連塍被陌修畛曲隅一日二日而黛耜舉四月五月而紫芒敷蔥翠弱葉疏遫圓株亭亭而抽芳實蒨蒨而牽蔓于花吐月魄房含露珠隴分上下土别墳壚黍稷其馨既稂莠之不害稼穡惟寶倐忭舞之載途謂歲功之有序乃天休之默符秀擢三丫滋銜一本噓吸槖籥絪緼根苑影參差而日華態纎靡而風偃方於同心之義頴合離離比諸連理之祥枝排䔿䔿終呈竒於䆉稏始挺質於藨蓘仙人珠樹豈並施於絲蘿海上蓬山或同根於芝菌慶儷三秀榮開九畹望北里兮玉禾植西山兮瓊巘於是田畯色喜甸人致詞當白藏之履節值青要之屆期萬寶告成功還貞於品物百穀皆熟靈乃效於神祇喜氣臨而平疇動色祥煙拂而厥土惟宜淑氣肇於互根本由無而得有嘉名擬諸並蒂還自偶而之竒沐雨膏兮殊形合體挺沃衍兮默宰潛移豈不以生為上瑞出應昌時惟一人之穆穆繄百僚之師師爾乃賽彼田祖卜兹吉日同漆枲於貢包進琅玕於天室靈種析而分條神用符而聳質照九阿兮繞霏霏齊萬頃兮搖瑟瑟良仁感於彼蒼故精通於我穡覆鱗隰兮欹垂動星田兮牙出匭函獻而畫史翻圖雅頌成而詞人擁筆占歲取之畝千信交孚之德一考自上古乃見旅生香分瓊粒色耀華莖朱草繁而景風應靈芽發而泰階平多稌斯詠雙米載賡九穟升而雀銜炎帝三苖穫而雉獻周成元秬黃􅓿漢臣頌其靈寵銀縚金縷唐世賦其休禎孕神膏於木王溢盛氣於刀耕將輝前而映後洵齊芬而共榮於焉銅鋪肅衛銀榜端簪九賔之儀偹萬國之恩覃頌帝力兮侯甸采衛解民愠兮東西朔南衍乾元而用九會皇極以居三賜復蠲租子惠之澤溥履慈止孝中和之德涵兆乃形於終畝功偶效於作甘仙淹華而嘉彚殖卿雲護而休氣含識動植之情協悟神人之道參豈止茅稱三脊麥傳兩穗謂乾慶之有歸乃神符之所萃穫之秷秷有飶爼豆之香蒸之浮浮用光瑚璉之器肅几筵之將享潔粢盛以昭事美時和而年豐維天工其人治五雲抽潤而紫鵷調六琯同和而朱鳳至殊徽狎臻祥圖莫記斯則欣九熟而謡歌綿萬年而昌熾者也瀛洲亭補種新槐賦湯右曾清切曹司澄鮮省署繡栱霞皴黃簾月濾卓亭子於中心是玉堂之佳處森羅桃杏凌百卉以非宜雜置蘅蕪計十年而何與爰封殖夫新槐作蓬瀛之嘉樹彼夫髙柯矗縮密葉蘢蔥鐵石堅骨冰霜錬容皮鱗質黝條毿隂濃道周夾栁殿角環楓比榆檀而挺節偶松柏以摩穹礧砢十圍崖蟠谷跨隂森百尺霧鎖飈衝此則梁棟待構山川借雄者也稟粹星虛吐芽春尾當百五日節的的免睛經二十番風茸茸鼠耳兼兩旬而成葉閲三時而結子黃中黛表品流非金縷之儔晝聶宵炕種性豈青裳所擬葩紛南陸離明之晴朗相輝翠匝東都溽暑之熇蒸盡洗華滋湛實功先氷澗之雪腴寶液凝丹味壓雲房之石髓則有漢宫香馥秦里隂連承華門外御史臺前江東則千株攢秀洛陽則一樹單妍殷仲文典午風流低徊寄慨庾肩吾蕭梁才子服食幾仙垂管氏之遺制録莊生之內篇憶曩歲之觀光入橋門而負笈三十區之學舍樹樹煙含十二街之帝城行行雨濕靜坊鍵戶屋頭之影晨遮精舍鈎簾簷額之隂午入眷老根之盤鬱勵志幽貞睇修幹之崢嶸矯心植立冷淘逸味每延客以同清鑽火芳辰或望古而遙集屆溫飈之扇序花破蕚以舒黃糝離離之金粉飄漠漠之暗香帶夕陽之一塢點亂書之半牀麗景絢空郁烈因之助暖生衣被體芬菲轉為招涼正縈懷於夏課每緣花而益忙荷遭逢於紫禁尚追摹而不忘升儼雅之石渠界逶迤之金水煥丹碧之榱題枕縹緗之圖史覩扶踈之緑槐列朱廊而若市又益之以新栽更回環而徙倚嫩於初栁猗若女桑俊穎才擢柔莖未蒼參差八九樹疏密兩三行湛露方承適俗之姿巳遠祥飈漸拂參霄之勢難量碧檻青疏擅風情於藕渚蘭塘之上宫壺法酒迎歡宴於柯亭劉井之旁三島煙霞涼宵掩映十洲鸞鳳清晝回翔天上白榆相將碧落苑中盧橘各自紅牆滋息因材栽培得地芳馨種類只傍瑶墀華貴丰標定依文陛院廳祕邃看風舞以自如瑣闥崇閎覩雲屯之方始向堂階而種植有人占奕世之祥奏笙磬之聲音正面辨三公之位梧桐賦劉灝伊梧桐之靈材蔚疏林以擢秀幹鬱律而孤生枝婀娜而遠覆發風韻於幽階動雲光於晴晝當朱夏而隂濃拂丹霄而勢茂爾其秉姿髙潔結體貞堅不繩而直匪規而圓中以虛而能響外雖朴而彌妍映蒼松與修竹絶蘿附與藤緣蓋其族出於嶧山根生於南嶽朝陽之所煦臨沃土之所旁薄依峻岸而生滋據蒼岑而棲托故能表異於龍門蓄榮於鳳閣至於華陽春季葉落秋初素芬徐吐繁影微疏按消長於時節驚往復於居諸亦或剪偶成圭績能為布昔開唐叔之封曾入牂牁之賦馮翊獻以九枚華林栽以三樹至若選材作瑟截尾名琴含山水之趣叶宮徵之音托朱絃以送目揚白雪而平心則有甪里幽人衡門髙士屋北窗前臺邊欄裏傍玊井而成帷蓋銀床而如綺晨露滴而尤涼夜雨洗而增美爰朝玩而夕吟每情恬而意喜乃其修柯峭蒨古質輪菌淨如緑玉老似蒼鱗足令夫塵氛斂息鳥雀逡巡若夫移根上苑之旁布影彤庭之側峙菶菶之偉標垂離離之嘉實應虞舜之雅歌集祥鸞之彩翼斯其效黼黻於清時豈肯等葳蕤於凡植瓊島春雲賦黃叔琳試仰望兮春雲溶溶搖曵乎瓊島之中逐煙巒而不定駕晴嶺以浮空連殘雪兮近北借微風兮從東維時栁揚輕絲草縈長帶識島嶼之春生見雲容之堪繪雜五色兮含煙入三山兮張蓋氤氲宮殿之旁縹眇蓬萊之外島假勢於斷雲雲橫陳於層巔垂鵬􅢅以近海象魚鱗而在天自無心而能化洵有態以增妍櫓十洲與三島曽不離海上之神仙爾其來也不疾不徐其少進也若密若踈減竒峯之兀突類餘霞之卷舒或灼灼兮曜流或皓皓兮素積覆春樹兮縈青映春水兮凝碧樹瑶影於上林水涵光於太液與斯雲乎往還共朝昏兮晨夕既而叢彩不散竒狀難名髣佛瓊樓之重疊依稀金闕之充盈非綺羅之繡出即丹青之染成帶晴煙兮疑重披薄霧兮猶輕陟帝鄉兮不遠起封中兮預結光隱隱而彌沉影綿綿而不絶有山光之掩映無蜃氣之出沒故能觸石於膚寸不崇朝遍九州而自合而未知靄靄之春雲時往來於閶闔刻漏賦揆敘原夫天地之形雖昭融而易見隂陽之理實悠遠而難明時忽忽其代序歲冉冉而遞更茍無七政之考辨安知二曜之期程爰稽考於往古固茫昧而無憑自軒轅之初造創神器於邈冥逮成周而始備窮制作而研精分挈壺以命氏勞推測而經營倚玊衡以定制鑄銅壺而聽聲運竒功於水火審晷度之虛盈規模雖著於周禮制度則盛於張衡精思變幻握算竒零既有分乎昏旦夫何礙乎隂晴雖儀形巳因其草就而精巧未臻於大成若其律呂偶殊錙銖或異儻不辨於髙卑便貽差於躔次徒悵恨於曩時幸遭逢於盛世薰琴應候何殊虞帝之隆瑞莢生階遠軼陶唐之治見玊燭之均調仰黃雲之畢萃乃咨保章之官命靈臺之司考異同於寶歷成斯器之恢竒金徒抱箭銅史候時量方圓以立體因吐納而成規視三光之出沒察四氣之推移算竒嬴而無乖纍黍辨晷刻而不失毫釐果出神而入化本杳冥而難窺爾其回波激射顧影參差隂蟲夭矯而直上靈虬蜿蜒而倒垂信律呂之不爽如圭撮之無疑不出軒楹而涼暄易曉恆居室宇而晨昏可知何前賢之所不得及而後世之所莫能為者與若夫推測之精詳位置之整密流傳久絶於東方神妙逈超於西極雖丁緩莫得逞其材班輸無所試其力誠天上之靈機可通而人間之能事巳畢矣至於獻賦甘泉校書東壁滄海非蠡酌可窮碧落豈管窺可識銘殊孫綽悲玉馬之無功賦愧陸機笑金舟之何益徒伸紙以濡毫實汗顔而赧色况復五行適時八歲順德鳳凰翔於軒閣之旁麒麟遊於大囿之側願比義於華封頌洪庥於萬億塞上觀穫賦揆敘維聖主之勤民法行健而巡幸運萬象於辰樞駐六龍於邊境擴八荒在闥之模昭四海為家之盛關嚴虎豹迎黃屋而區脫春回塞接蠮螉臨丹蹕而兜鈴撤警時則金逢庚伏鶴露未零火向西流鷹風先冷白藏應候迓朔吹乎三陲黃茂連雲兆樂歲乎萬井爰符夏諺之一遊遂乘秋斂而再省徒觀夫松漠之野榆塞之旁咸載芟而載柞成我理而我疆性則兼乎墳壚埴壤種乃糞以狐鹿牛羊方其春耕正及土膏之滲漉及其夏耨益以甘澍之汪洋乃有唐稷所播農帝所嘗赤穈白芑黑秬黃粱天竺四熟之米日南再種之糧融臯則一旬自植長沙則五里聞香莫不接畛畦而擢頴被疆場以垂芒衍農政於箕疇一曰食兮二曰貨奏田功於豳雅千斯倉兮萬斯箱我稼既同田畯至喜侯主侯伯侯疆侯以爭樂事而赴功猶波注而雲委遊惰罔見於閭閻拮據不遺於婦子携來錢鎛耦駿發以十千盛用篝車數且溢夫倍蓰豐登幸際乎金穰勸相况勞乎玉趾水耕火耨得邀萬室之盈焉出作入息咸荷一人之賜矣皇上乃弭雲罕曵紅旃歷南陌履東阡喜邊氓之勤穡遵聖化以力田能使改沙漠之區並成樂土抑且編寰宇之廣共慶豐年黍稷稻梁處處沐和風甘雨東西南朔人人戴舜日堯天擊壤衢謡競進天子萬年之祝歌功頌德永傳豳風七月之篇賜觀瀚海石賦錢名世上林荷槖清暑磨丹宣玉音而共諭頒文石以同觀囊甫開於錦匣光先射於玉盤細才雀卵輕侔彈丸百枚珠琲一寸琅玕含雲氣而欲吐裛露華而未乾珊瑚凝采水晶透寒瑩如朗月初照簇若繁星互攢分南宮袖裏之數片點北苑毫端之萬巒帝傳命曰此瀚海之石採諸紫塞而携自雕鞍者也爾諸臣侍彤墀趨扣砌其可勿操觚染翰乎哉臣名世拜手稽首伏而言曰事有小而徵大物有微而關巨慶兹石之呈華頌我皇之文武蓋統百萬之貔貅涉龍沙而入阻此軒轅氏之武定羣方而以師兵為居處也抑睹竒彩於幽遐停鑾輅而攬取此有虞氏之文光八表而以衣裳施藻黼也至於旁收廣厲之盛意更有逈超乎千古者焉想夫黃鉞親征三犂朔庭萬隊浴鐵九霄震霆鴛鴦之濼飲馬雞鹿之塞揚兵臨絶漠而徑度騁荒沙而不停運神謨以殄封豕展廟略而斫長鯨乃小石之微瑣忽仰動乎聖情按寶鞭而笑指遣虎旅而爭録散漫兮無涯披尋兮滿谷犖確兮半襟塊壘兮盈掬淘沙內而得金披巖璞而知玉夜光剖於蚌胎鍾乳流於石腹詎若兹掇拾之不勞而取携之至速雨雪侵而質性彌堅塵埃撲而光芒轉蓄凌追風躡電之馬蹄帶繡澀斑斕之箭鏃緬太湖與仇池諒岝崱其同族繄閬州之錦石庶比形而齊躅磊落晶熒輪囷歷碌前驅挾而神邱勒銘歸騎挈而鐃歌奏曲聖天子武功大定文德誕敷唱舜歌而垂謨典彰羲畫以闡苞符萬幾暇則羣經搜討寸晷間則六藝遊娛爐清麝氣簾捲蝦鬚瓌寶盡羅乎册府纎塵不到乎蓬壺琉璃硯匣之旁翡翠筆牀之側置此石以相輝絢陸離之五色或通體瓊明或半邊瑶碧或散點嵐黛或斜霏雲白或過雨天青或臨池水黑雕一物於沉檀耿七星於北極盤螭夭矯旋螺明晳秋葉煙含春花露滴雲龍交映而彩飛人物在中而影隔莓苔駁小築之山珌琫賁容刀之飾芝英吐以煌煌榴實垂而的的摘丹荔於閩天擷紅豆於南國他如靺鞨頗梨瑪瑙琥珀五雲之潤咸滋七寶之光遍射莫不極嫭盡妍涵津清液畫史無從繪摹巧匠不能刻畫蓋由我皇上有才輒擢無竒不搜礧砢每邀夫鑒賞堅頑勿吝夫雕鎪勵臣節必共盟鐵石效衆長則不棄遐陬稟貞心與徑骨既克副乎敷求况含英而吐曜更恩寵之最優縱巖棲而穴處定賞雋而拔尤懷璧者無韜光之慮獻珍者無刖足之羞昔則泥沙委置今則崑閬優遊飾萬釘之寶帶濯三島之清流懼碔砆之陋質難混迹乎琳球矢愚忱之匪石長共奉乎瀛州御賜砥石硯賦查慎行維聖主之右文當中天之盛際朝有善而畢登野無賢之或棄於是地不愛寶物胥呈瑞凡抱質與懷材咸手額而踵跂思樂育於昌時冀效能於聖世竊聞盛京奧壤峯回海環藴扶輿之清淑標峻極之瑋觀孕秀於松花之江鍾靈於砥石之山爰有佳石出乎其間其為質也溫兮如玉滋液清泉含姿邃谷表堅貞而外彰斂精華而內蓄其為色也雲蒸霞郁分吉光於翡翠燦目彩於鸜鵒貯秋水而痕清浮春巒而眉緑維時萬乘東巡周覽神臯采彼美産用礪容刀發芙蓉之鍔瑩鸊鵜之膏覘良材於歷試遂寵被以榮褒乃召良工斫以為硯雅製斯成文茵斯薦既特逹而受知爰輝煌於臺殿洵大智之創物同擢微而舉賤爾其同材異狀羅列琳琅刻以雲雷之紋映以奎璧之光或圜規而方矩或全圭而半璋滑不拒夫隃糜膩不留夫毫芒固巳剔厥瑕而萃其精良聖天子方壽考作人澄懷有主賜以銘詞載諸册府惟以靜而永年標大義而綱舉配二典與三謨垂日星於萬古首頒元輔聖訓是欽再及宮僚麗澤彌深以至供奉文昌之署圖書翰墨之林如雨露之霑濩儼象緯之照臨於是乎拜自瑶階捧出琳宮丹霄之梯千尺紅雲之殿九重下以誇示於子孫上以炳耀乎祖宗孰不感有生之榮幸慶兹石之遭逢蓋自書契以來下逮宋元之季硯之為品譜不勝紀鳳咮以山擅竒龍尾以溪表異紅絲與眉子殊稱紫玉與青花並儷彼後來而居上推端州為最貴然皆産自遐陬出於荒澨詎若發迹之竒近在興王之地甫離巖穴便親廊陛磨礱告竣於文房銘贊式承乎御製一人崇儒而遍賚百爾山呼而拜賜夫豈尋常之匠石所可嫓其位置者哉臣材同礫棄質愧瓦全膺千載之殊遇實僅覯於簡編抃舞於諸臣之後拜恩於黼座之前竭微忱於揚頌非筆墨之能宣惟仁者之必壽象有取乎樂山託磐石之鞏固祝天子之萬年聖駕三巡塞北蕩平賦有序吳襄皇上御極以來八垓春麗六幕風清聖帝有真玉鏡曜垂裳之宇王師無敵銀河揚洗甲之波三蘖氷消九邊烽熄杜鵑啼去鳥道煙空精衛填來蜃宮浪靜金甌永奠玉斗長暉既衆往以成王自止戈而為武前者噶爾丹狼心莫洗螳臂空張騷萬里之歸藩勞六師之駐驆仁人不殺無非拯此一方大造好生未必寬其三面頻臨紫塞永淨黃沙日斧斯揮星旄頓落降幡一片俘來搗穴之兒銅組千蟠擊得專車之骨功成漠北慶溢天南露布遙飛鐃歌競奏謹拜手稽首而為之賦其詞曰將欲規天蓋以為畿矩地輿以作宅代日月以曜靈助雷霆以殄逆車書通崑汜之垠玉帛遍綖紘之陌畫成禹甸無彈丸偶漏之星補盡堯天鮮粒黍不周之石則必瑞應河清膏同海溥致治而囿蓄祥麟戡亂而庭驅虓虎同歸玉版難容小醜之跳梁一奮金戈遂衛羣生而安堵臣嘗稽麟牒考龍圖三錫蓄衆七政行誅版泉門蟻涿鹿鳴狐青邱擐甲白浦援枹東越則防風就戮南郊則有扈旋俘維彼五帝三王之馳驟亦藉四征九伐而驅除赫矣熙朝蒸哉清宴紫逹叢花華平發箭玉馬集而銷兵騶牙來而息戰天子方揮緑綺於蘭宮披丹書於楓殿臨百子以和汾歌啓九成而開鎬燕而乃蠟丸告警羽檄交馳塵迷北戒煙起西陲幾陳銅焦吹來紫塞一軍觱篥響近龜兹白馬如風類成蛾賊青袍似草恰肖鴉兒蠢爾相殘鷸蚌交持而起釁狡哉犯順鵲鳩互逐以支辭乃猶三軍未誓一紙先遺示皇疆以有截申天語而無私豈有潢池一任么麼之好弄非無斧鑕姑憐小子之無知詎意鷹飽思揚猿亡拒捕邊霧仍屯戍雲復布凶罪既盈天威斯怒義激蘭錡聲騰甲庫徵嫖姚檄都護告九廟以興師駕六飛而遠駐臣未遑述孔武之軍容也而先對揚如神之睿慮念兹寇也鼠首藏姦鴟張肆虐擔魯橫蹂固麻縱掠稍容烏合必致連雞不奮鷹揚終成犄角絶肩臂而援孤扼咽喉而魄落黃沙白草無堅守之嚴疆騂酪羱醐有難填之飢壑竒竒正正腹受敵而背已攻實實虛虛進攖危而退復郤衆才萬甲縱銅脛鐵額其奚強士有億心雖虎箭貒弓而亦弱網無三窟任脫兔之斯奔釜豈西江笑遊魚之自若乃若天邊破斧地角飛輪傳餐雷動列甑星屯寧塞外之黃茅偏生聖米何關中之白粲立轉勞薪威斗鏗鏘萬竈之燒雲不夜留犁鞺􅝅千軍之浴鐵如春至若駒騰赤水驥産烏孫金羈久控玉勒遙奔蘭筋則朝疲沙磧血汗則夜滴荒原歷百戰而追風預憩桃花之足衝千羣而掣電時豐苜蓿之飱而且玉壘棋羅鐵騎雲織站設燉煌泉飛疏勒縱雉尾而火蛾翔張蜃弧而飢鴟集捲地蛇蟠之陳日照旗紅橫空雁子之都風號箭黑狼居胥峯堪刺日積甲還低火敦腦浪欲黏天投鞭可塞凡兹金城百勝之威莫非玉趾三巡之力當聖駕之初巡也斾揚牧野瓦震昆陽開巖關以禦寇涉天塹以平羌裂前鋒若敝竹堵歸路如銅墻靺鞨翻紅萬頃之龍沙似血刀鋒畢白六月之塞草猶霜然而師出窮邊軍方一捷賀蘭剩壘尚卷零旄嘉峪殘營仍藏敗甲搜牢緩則豕突難防撲剿神則狼奔自蹶此則以天低玉帳重臨馬邑之城月滿雕弧再射龍堆之堞也爾其衝氷夜渡褁鐵晨征寒花淬劍瑞葉縈旌雪密如綿壓紫貂而作鎧雲濃似墨團繡縵以成城萬騎刀橫怒雹擊蠮螉之塞三更弩吼驚風亂鵝鴨之聲於時秃髮茅靡朱眉粒絶欲掠飛芻徒蹈覆轍望雨粟而呼天嗟倒戈而嚙雪彼幕南之屬國莫不勤王豈朔漠之餘逋尚容苞蘖縱復表乞全軀詞哀飲血亦安能少緩壓境之師而免繫降車之絏也哉爰屆初春急趍寧夏虎賁外環龍驤中駕鐵山則八校星馳玉泉則九斿電射漢雲五色爭籠帳殿之髙秦月重輪恰補邊牆之罅因而崇臺閲將絶堡籌邊剖銀菟於後徑標銅虎於中堅扛鼎雄夫張八旗以斫陳翹關健旅撾六鼓以分甄傅介子氣吞樓蘭奮夏箭唐弓於塞月衛仲卿誓掃冒頓壯鄂刀褒羽於蠻煙維彼封豨窮同鼯鼠獍歎亡羣梟悲失侶勢隨風蘀以相摧罪擬邱山而莫舉天誅賊子以報思明人憤凶渠先擒慶緒誰云肝腦難汙輦下之灰釘料彼頭顱自列軍中之鼎俎知銜璧以無生嗟離罦而莫拒狐思正首漏鸞刀百磔之刑鴆自屠腸應清酒一壺之詛從此霾天乍霽瘴雨全飛牽獒致貢捧雉爭歸綘帕當胸山呼動地頳羅蔽膝虎拜成圍奏普梨而黃鍾答響舞回紇而白鵲同揮風馬雲車夾鸞旗而回玉闕銅標鐵峽鏤鳥篆以銘金微紫紺分來酬躍馬平淮之績銀章鑄就壯從龍分陜之輝布木鳳以沛甘霖恢八荒之法網息金笳而舒化日覆九有以戎衣計自陳師以迄飲至捷告惟三時周未四鄙五十二戰之偏勞哂二十七征之失利無煩鐵筯以前籌免約白衣而並轡闐顔縱捷豈盡空玉塞之廬髙麗雖征寧立拔銀城之幟積百王之舊憤至此方平建千古之膚功應推無二維豫鳴夫大武正咸臨夫太和鰲撑地軸龍繞天戈垂綸音而開朱鳥御黼座以獻金鵝四阿則星斗聨珠象天朝之畛界八闥則雲霞散綺繪絶域之山河武偃文修乘白騾而發太平之笑風和日麗彈紫電而吟大捷之歌歌曰景星爛兮紫孛消天風鼓兮參旗搖翠華北指兮南有杓展神謨兮廓四郊膏流中外兮無淳澆又曰六龍駕兮環九鴻氛祲淨兮戢武功雲和鳴兮開羣聾帝基鞏兮垂無窮聖萬祀兮天之中皇清文穎卷四十六
