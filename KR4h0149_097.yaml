body:
  text: 詩五言絶句秋月恒溫親王允祺秋月漾清輝溶溶映薄幃堦前聞蟋蟀冷露滿裳衣白雲寺恒溫親王允祺山髙每出雲有寺在山上誰向寺中遊白雲自來往西照寺恒溫親王允祺流水自淙淙山深䕃古松斜陽回照處古刹一聲鐘咏桂應教怡親王𢎞曉桂樹生南國移根傍畫欄芳香披拂處疑向月中看憇田家愼郡王允禧田家雞黍情坐愛牛羊返柴門風動聲殘陽四山滿山居鎭國公德普雲抱萬重山橋横半溪水紅樹接茅檐掩映斜陽裏喬木輔國将軍博爾都喬木緣溪水踈籬隔草庵門前停畫舫風景似江南清池輔國将軍博爾都清池映皎月沉沉素波靜遊魚亦悠然况兼竹栢影夜坐輔國将軍博爾都抱琴花下坐對月竟忘機曲終萬籟寂花影上人衣題王石谷畫輔國将軍博爾都濕雲遮遠山急水喧横石有客臥草堂閉門讀周易山荘四時應制詩四首徐元夢回蹕無多日山荘春已深依依芳草色似望翠華臨翠華一臨幸觸處得清凉雨過千山碧風廻百草香風雨欣時若端居倐復秋聖心閒適處麋鹿總優游霽色遍遙峰凝寒又逼冬九重心目近不忘後彫松北征大捷鐃歌八首狄億開天文武績首出是軒皇弧矢兼書契垂為萬載光海波流太液滇水注昆池只剩燕然石君王更勒碑朔漠寒難釋欣鋪綠草茵詎因吹律轉皇世本如春江河流兩戒直北少源泉指顧飛甘醴坤輿亦轉旋屢頒天廐馬頻賜御厨餐宸渥何由報惟将寶劔看刁斗三更夜征笳萬障秋聖人親按壘雪㸃紫貂裘負固荒沙外﨑嶇萬里程雕戈霄漢落始信是天兵南望回杓斗春風度玉門至尊停輦處時有瑞雲屯七言絶句白牡丹理密親王允礽鹿紫鵝黄自昔傳天然本色倍鮮妍瓊為樓閣層層現玉作盤盂朶朶圓綠牡丹理密親王允礽雕鎪蒼玉起樓臺紅紫叢中巧樣裁碧葉承花花似葉綠圖還有鳳銜來賜荔枝五株恭紀理密親王允礽叢生丹實綴瓊枝鶴頂殷紅逈異姿移植不教違物性清芬如在海南時紅葉理密親王允礽數株槲葉間丹楓一抹秋山入畫中縱使霜風能㸃染也教都傍日邊紅夜坐恒溫親王允祺風撼簾衣月照床人聲靜處漏聲長此間趺坐清如水一巻楞嚴一篆香中和節恒溫親王允祺三分春色二分初又見階蓂一葉舒聞道中和推令節唐人曾進勸農書西爽閣晚眺恒溫親王允祺因登小閣對斜曛匝地春光遠近分更喜西山供眺望數峯如畫復如雲有懷恒溫親王允祺雨過苔深絶㸃塵鳥啣桑黮過西隣麥黄秧綠柴門靜獨立斜陽憶故人日觀峯恒溫親王允祺巍峯突兀接雲霄二月春融雪未消夜半鷄鳴紅日出海門千尺湧金潮䝉恩賜聯句心作良田百世耕恭賦淳度親王允祐靈臺方寸卽良田家法新從聖主傳貽向本支千百世耕耘歲歲是豐年山翁奉和兄雍親王怡賢親王允祥山翁家在白雲中鶴髮蕭疎坐晚風門徑掃時幽蘚碧杖藜扶處落花紅漁翁奉和兄雍親王怡賢親王允祥漁翁常占蓼花灣俯仰心同白鷺閒放艇有溪皆入畫得魚無日不開顔奉懷兄雍親王隨駕熱河避暑四首怡賢親王允祥清暑山荘近塞垣年年扈蹕羡承恩林亭水殿雲霞裏日侍天顔笑語溫沙隄雨過淨無埃深柳陰中輦路開風動葛衣香滿袖行宮侵曉問安迴墨池香霧湧波濤落紙雲烟格總髙指授親承應更進彤軒長晝侍揮毫磬峯髙聳片雲留萬木蕭森白露秋屈指迴鑾期已近趨陪欣喜話前遊泛舟呈兄雍親王二首怡賢親王允祥曲嶼平橋掩映重蘭舟蕩漾意從容花香午送和風暖草色朝含瑞露濃輕舟容與碧溪潯㶑灔清波幾許深塵念到來消已盡始知山水有清音月夜怡賢親王允祥虛廊晏坐夜沉沉偶得新詩喜獨吟萬籟無聲風不動一輪明月印波心西郊怡賢親王允祥夾道千行御柳斜青青芳草襯晴沙春風十里西郊路開遍墻頭處處花圓明園讌集呈兄雍親王四首怡賢親王允祥綠水名園倚綘霄歡聯華蕚應嘉招躋攀不盡登臨興閬苑蓬壺路未遙西山泉水入池新池上松篁翠色勻瑤島靜涵千頃綠瓊林長䕶一園春芝榜髙題御墨鮮陽春烟景浩無邊圓通妙諦誰能會一片光明照大千路入仙源逈不同披襟面面受和風向榮花木欣欣意同在堯天長養中題畫六首怡賢親王允祥參差遠勢望難分筆底烟嵐逈不羣千澗泉聲千澗雨萬重山色萬重雲赤欄橋外柳毶毶千樹桃花一草庵正是春光三月裏依稀風景似江南片月啣山出遠天笛聲悠颺晚風前白鷗浩蕩春波濶安穩輕舟淺水邊碧海三山入望賒金銀宮闕映丹霞生身只合蓬萊住桃實千年又著花前村後舍意相親社飮團圞雜笑嗔此是昇平眞景色收來畫裏更精神瑤圃瓊臺玉作田髙人策蹇㶚橋邊詩成自為豐年喜沽酒尋梅亦偶然咏荷花怡賢親王允祥銀塘珠露月三更風靜荷香遠益清為是出塵心不染亭亭獨立逈含情薔薇果毅親王允禮寂歴幽香透綺疏日晴風暖蝶來初從君乞取花間露浣手臨牕讀道書書牕夜雨怡親王𢎞曉片片雲凝壓鳳城苔階細雨潤無聲欄前只有芭蕉葉一夜蕭蕭直到明送家兄奉使出塞怡親王𢎞曉花蕚樓前兩弟兄每從擕手問安行詩歌折柳頻相送一在龍沙一鳳城凝香齋怡親王𢎞曉紫白花開鬭粉粧簷前輕燕繞迴廊清幽眞覺塵難到只有香風送畫堂賦得秋露如珠怡親王𢎞曉東方漸啟滿庭秋仙掌髙擎露未收自是湛恩天上足明珠萬斛不湏求咏萬年青怡親王𢎞曉蘢葱嫩葉最宜人薄植能留天地春移向案頭常作伴不凋應得比松筠題畫四首愼郡王允禧杉皮屋子枕溪頭燕尾春波碧玉流一片輕雲作微雨隨風流出下灘舟林邊一徑傍巖隈水閣風亭掩映開應是此中無暑到瀑泉髙自半天來古樹連踡帶石坡夕烟山靄兩相和老僧拄杖踏黄葉秋在白雲深處多玉水瑤山一抹同六花飄墜晚烟空地爐茶鼎幽人屋夜半牕間宿火紅山荘清曉圖愼郡王允禧落落長松滴清露㶁㶁流泉穿塢去數聲山鳥喚人醒飛下空青不知處題王石谷松牕讀書圖小幅愼郡王允禧鸛啄參差覆綠苔長松陰裏坐書臺山人只合山中老爭似閒雲出岫來桃花寺輔國将軍博爾都山寺憑欄對夕曛寒烟暮靄互氤氳數間茆屋圍紅樹一曲清溪出白雲東臯泛舟輔國将軍博爾都乘興蘭橈泛碧溪漁歌驚散水禽啼白蘋渡口烟初暝紅蓼灘前日漸低南苑應制吳偉業綠楊春繞栢梁臺羽蓋梢雲甲帳開知是至尊親講武日邊萬馬射生來車駕親征朔漠鐃歌六首張玉書鐃吹聲髙朔氣融凱歌人仰廟謨功宵衣决策深宮裡萬里軍情指顧中春風曾不度龍沙罽帳常霑六出花却喜雪融催草綠馬嘶聲壮隱邊笳鷹揚環擁御營傍刻漏聲嚴夜未央北斗當頭天似水亂山迎面月如霜萬里眞同咫尺看嘽嘽鐵騎耐霜寒沙塲競唱從軍樂瀚海何憂行路難去日枯條未放春歸來榆柳綠初勻平沙草燠行圍蚤獵得黄羊賜從臣近邊六月曉風和紅藥金英匝路多應為關門春蚤謝穠華留待屬車過武功告成鐃歌十首張玉書靈泉匝地浸春蕪縱目連營日正晡紅柳萬株新月吐一輪冰鏡挂珊瑚銀麟古鎭閱沙陀千里軍容靜鸛鵝無定河邊孤戍冷受降城外屬藩多漢唐渠水繞青畦烟火千家板屋齊統萬城頭天一顧永銷兵革事耕犂鐡駟明駝列廐陳輕舠擊檝大河濵官家纎悉皆儲峙閭左何煩算一緍萬里邊情等察眉九重宸斷折羣疑早從玉帳籌兵日預决樓蘭授首期河經幾曲鏡波平御座中流水自清到處魚鱗衘尾集總隨龍影負舟行豐郡山圍古樹稠黄河水帶黑河流舊屯邊戍連秦塞好灌腴田似夏州三經脱脱城邊路此度風清解鐵衣飛鳥向人疑舊識亂山隨馬送将歸鳴鳩羽拂桑田雨布穀聲催麥浪風父老杖藜遮道望太平天子五雲中鳳詔同瞻天北極雕弓長挂海西垂千秋汗簡神功紀百丈磨崕聖武碑知稼軒暑中侍直紀事四首張英稻畦𤓰隴翠芃芃移入城西御苑中靜聽桔橰深柳外不湏丹藻繪豳風秋雲亭北谿如帶嘉穎軒南柳作屏陌上新逄時雨過秧鍼菜甲一齊新數叢葭葦接芳汀作隊鴐鵝泛雪翎清淺波中金碧影小橋斜過狎鷗亭五月溫風過雨時田田初見綠參差驚看蘸水紅蕖艷百朶先開太液池奉命泛舟西苑觀取魚并䝉頒賜恭紀六首張英興慶池蓮照水紅恩分青雀御微風幾人曾到甘泉舘來往波光㶑灔中好雨連朝長暮潮輕舠緩轉木蘭橈西山指㸃青如黛不覺經過玉蝀橋秋早凉從水殿生魚罾收處柳風輕縱横藻荇流船滑時聽鮮鱗潑剌聲新蟬乍喜報秋清靈沼風和見物情綠樹陰中啼翡翠白蓮花底宿鵁鶄空明䨇槳擊澄潭烟水菰蒲性所躭怪底夜來凉雨後魚荘蟹舍夢江南錦鬛銀腮滿泛船盈筐拜賜荷恩偏謾言玉鱠東南美親割華林第一鮮恩賜新貢龍井天池珍茗二瓶恭紀三首張英春山雷莢綠參差驛使南來供御時千片月團天上味清芬先許近臣知披雲和露出層巒雀舌名芽欲購難家住江南曾未識得分珍味在長安晚窻自煑石泉清靜聽松風第一聲喜沐君恩分玉液不将仙露羡金莖扈蹕西山至南苑紀事十二首張英遙望飛塵一綫輕平郊歴歴引䨇旌皇情最愛田疇好萬騎傳呼逐隊行上諭衞士勿踐民田擊壤歌衢樂自如不教雞犬避皇輿山僧出定閒披衲野老來看勌倚鋤寺僧不擾觀者不令廻避古潭石碣蘚㾗斑常迓鑾輿到碧山只為蛟龍留窟宅能将霖雨遍人間扈從幸黑龍潭隂崕盡日掩芳叢退谷亭幽曲徑通單騎不教傳警蹕山泉聲繞玉花驄退谷曲徑清流與御驄相繞空濛雲氣生虛壁遠近嵐光入小亭幾度凭䦨看不厭山容野色總青㝠來青軒髙敞最宜遠眺凴虛髙閣俯松端千頃平疇入望寛山色自青雲自白河流蒼莾古桑乾石景山晚眺翠竹烟梢碧玉姿傍崖臨水綠參差皇心珍重凌霜節題作篔簹第一枝潭柘有竹最茂御製詩詠之寶翰偏宜洞壑藏山光雲影入天章一經洗筆溪頭水清澗長流御墨香西山諸勝地皆有御製題詠上林迴繞是清渠北渡平橋映碧虛聖澤長同靈沼樂柳風生處看逰魚流上臨看魚落照西山獵騎催長風駕雨自東來玉鞭動處雲隨馬十里離宮頃刻回獵回遇風雨宮使頻看驛騎催遙從長樂問安回寶弓親射林中鹿為進慈寧御饌來太上親射鹿進皇太后靈境招提御柳邊紫金爐製本天然細看翡翠龍紋裏猶記先皇鑄鼎年世德壽寺有寶鼎乃常祖時所鑄工巧異講筵紀事五首陳廷敬縹帶紅籖鈿軸齊御書房在殿廊西五經同異諸儒别一一重瞳自品題玉几丹霄晝漏長講章纔罷即封章芙蓉别殿秋将晚新補歌風奏栢梁閣門鑰入進書來紅蠟光中對御開知是至尊勤夜讀三更燕寝月徘徊第二螭頭㸃筆時起居親切近臣知年來神藻光青簡日歴長編御製詩蛾眉供奉别東頭銅鴨香深䟦燭留下直玉階天漢上金明門外月如鉤賜櫻桃恭紀陳廷敬清曉朱櫻進内園每從丹禁飫頻繁雲霞百子池頭色風露三霄殿上恩賜觀人葠植本應制陳廷敬三稏玉蘂三珠樹五葉銅池五色雲不是乍從天上見多應空向世間聞三月二十六日賜折枝牡丹恭紀三首陳廷敬八方風雨長靈芽朶朶紅雲散綵霞天意未曾私一物上陽花勝洛陽花樂天三度見花開曾惜花開老暗催卅載芸香香案吏白頭驚捧賜花回鞓紅魏紫總天香蘭佩還宜薜荔裳歸去輕紗籠暖日濳溪緋襯御袍黄北征大捷功成振旅凱歌有序陳廷敬日者皇上北顧邊陲永惟戡定聖心獨斷决䇿親征羣臣震悚陳表請遣命将士毋煩車駕遠行䝉詔制開喻弗允臣廷敬伏念皇上為天下勤勞歴涉沙磧躬莅戰陣而臣下顧乃晏然安處其何以自寧於是謹詣宮門奏乞扈從䝉天心矜憐謂臣年力就老恩㫖下頒臣恭聽之頃不覺涕零伏念臣以衰薄不克備戎行効職役今者天戈一指兇醜破滅朝至暮捷功成漏刻敷天率土罔不懽忻臣受恩髙厚無所報稱思惟撰述文句以導揚盛美於萬一而臣愧非其才惶恐踰時復不能自己臣伏見皇上覆育四海撫有萬邦東西朔南懷仁歸義聲教所通遐荒異域侯王君長稽顙闕廷至若聖畧天威武功丕顯御極以來平察哈爾定三逆取臺灣服倭羅斯收喀爾喀掃蕩邊塵廓清疆宇固巳烜赫炳耀亘古今而昭天壤緜歴服而奠生民矣迺厄魯特噶爾丹者違我德化自絶生成梟獍猖狂侵陵屬國洵法所必討師出有名皇上躬御六龍親䕶諸将驅鷹揚螭虎之士臨大荒盡窮幕風行電激聲振雷霆而天申顯佑百靈効順風雨不驚水草應候時日吉良士馬利賴殱廿年逋誅之寇建萬世不㧞之功此誠開闢迄今簡冊所宣布宇宙所流傳聖績神猷曠古無匹者也臣雖不能侍行幄歴營壘親見翦獯屠戎之盛猶欲形之篇翰製為詠歌以敬颺我神武之光明亦臣之至幸也謹按王師大獻奏愷樂周禮始著其義釋者曰愷兵樂也司馬法云得意則愷樂所以示喜也漢有短簫鐃歌魏克官渡晋征遼東皆製歌曲被之聲樂凡以諷道戰伐之事而申寫三軍凱樂之情柳宗元有鐃歌鼓吹曲宋有姜䕫聖宋鐃歌曲皆其所自作以進之朝廷此皆古體詩也然自岑參劉禹錫諸人巳自以今體為凱歌聲調具有風雅之遺臣今竊取宗元䕫進詩之義詩用參禹錫之體作北征大捷功成振旅凱歌臣目雖昏眵勉自繕寫字畫蕪穢仰塵慈鍳臣不任榮忭不任兢惕之至蕭蕭龍笛出關聲雲斾晴翻朔吹輕十萬羽林眠夜月廻看北斗挂南營月上旌門映細旃旄頭影落斷狼烟尚衣髙鎻黄金甲長記龍韜决勝年漠漠雲隨露布生青宮送喜拜天行朝衣半濕蒼龍雨㸃㸃分明為洗兵廻軍吹角罷連營疊鼓風多破陣聲寫入天朝新樂府流傳神武見昇平武功文德並崔嵬聖藻篇章每獨裁萬古燕然留片石磨崖親與勒銘廻春歸苑樹别長安六月龍沙草露漙邊柳千條花萬朶一時留取待回鑾今來楊柳正依依昔去關河雨雪霏魚海輕隂猶未散五雲常繞六龍飛天廐驍騰汗血斑嘶風别去籋雲還𤓰時不遣黄龍戍苜蓿青青意自閒劍花弓月拂雲還歸路邊庭障塞閒數首新詩翻鼓吹凱歌聲裏舊關山九邊萬里抱神京地盡遙荒戍不驚夜夜關門開曉月天家本不用長城鐃歌田雯千峯送雨塞雷鳴天賜流泉繞御營豹尾遠連山翠濕龍旗斜轉海雲平平滇凱歌四首孫在豐十月王師靖遠邊将軍馬上奏平滇九天日照三危地萬里風清六詔烟帶甲蠻天十萬師洗兵雲海羽林兒盤龍江外關山曲楊柳歌殘雨雪時雲津橋度碧雞關鐡馬金戈巻甲還玉案山頭塵一掃圖披王會㸃蒼山白帝雲連玉壘浮雪山烽照錦江流直教蜀道平如地踏破蠶叢劒外收大凌河孫在豐一碧清流飲馬過沙明水白大凌河千年泣血張兵備風起猶聞不二歌故明寧前兵備道張春有不二歌一篇十三山孫在豐羣峯㸃㸃碧雲間削出連城玉一般只是簪來無綵筆珊瑚一架十三山凱歌六首有序王鴻緖周禮大司樂王師大獻則令奏愷樂大司馬若師有功則左執律右秉鉞以先愷樂獻于社古者討不服征不庭武功旣成飮至告廟必奏獻功之樂所以娛神格祖而禁暴戢兵安民和衆讙訢鼓舞導豫達順之意胥於是具焉樂詩逸不傳疑不離雅頌者近是漢魏以來代有鐃歌鼓吹詞備載樂府句調長短鏗鏘激昂卽愷樂變製唐開元岑參始用七言絶句作凱歌六首音節中和克諧律呂遞相祖述蔚然藝林我皇上聖武神功討平絶漠邊鄙無警民生永寧戢矢櫜弓陳常藝極鴻庥景運與天並久臣鴻緒愚不敏謹倣周愷樂漢魏鐃吹之遺用岑參體式撰上凱歌明紀功德冀備筦絃之末而巍巍蕩蕩不能鋪揚萬一拜手虔奏惟滋惶悚其詞曰天王三将羽林兵紫塞黄沙萬里行雷電共看騰虎旅風雲常自䕶龍旌蒸土城邊鳳輦行恩波浩蕩溢天聲左餐右粥降蕃騎後舞前歌出塞兵九重六甲裕戎韜千載昇平一日勞禡纛早曾輪指算䇿勲初不爽秋毫氐𦍑盡樂太平年天子神功靖九邊試看龍沙千萬里秋風何處有狼烟萬隊齊歌破陣歸金河玉塞遍春暉關門老将無征戰閒話耕耘捲鐡衣親臨雁塞擁星旄久握雕弧御戰袍却為萬方頻送喜凱旋猶使聖躬勞時廵歌十首有序王鴻緖臣聞詩有六義頌者美盛德之形容以告成功而風者民間之歌謠以見治化之旁洽然則歌與頌固不可遺一也臣謹述頌辭鋪敘聖澤矣兹復採諸民情騐諸輿慕事皆徵實文無虛美恭撰時廵歌十章用被管絃之末極知弇陋聊以託里巷風謠之遺云爾銘功瀚海靖烽烟膏雨和風被八埏澤國桃花偏軫慮更勞荒度奠山川親乘四載閱洪河沉璧寧煩瓠子歌渠雨臿雲周睿筭金隄竹楗佇恬波孝治雍和萬國安璇宮色養日承懽為觀一統山河盛躬奉慈寧御玉鑾敷天尊養答慈恩孝德三朝侍寝門玉趾步行扶寶輦移風不待渙王言羽衛森森豹尾旁扈行嚴蹕勸農桑引車輟馬頻宣勅不使春疇一草傷周官自昔貢形鹽漢𣙜唐征取次添今日熬波寛算額海濵飛雪裕窮簷重關水陸肇羲皇特免竒贏較槖装霧渚烟津帆似織曉風安穩度千航弭棹金閶駐黼帷東南民隱細周咨吳謳徹晚聲相接盡是華封祝聖詞石頭盤鬱勢嵯峨二水三山勝賞多極目長江天萬里一時都化作恩波問俗從容睿藻摛言泉墨海浩無涯争傳大雅巻阿什盡繪豳風七月詩瀛洲亭補種新槐紀事四首顧祖榮天上分明應列星陰陰密葉接柯亭也知不比閒桃李曾見三株綠滿㕔綠㾗先上最髙枝得地纔知雨露宜巳卜他年鑽火候好分餘影當青藜托根何幸傍瑤京好護枝條待長成想到濃陰凉似水晚風吹過讀書聲長養多歸尺五天春城無際是晴烟扶踈亦抱凌雲意擬向文昌殿裏傳聖武功成凱歌六首胡會恩流沙瀚海静無波大漠頻傳奏凱歌巳掃北庭回斗柄更臨西極挽天河制勝訏謨燭古今鵷行誰喻九重心直從治定功成後始識宵衣握算深桓桓禁旅駐河濆刁斗聲嚴静夜聞邊樹周遭如列仗齊看帳殿起松雲仁威遠布拓堯封異域咸收列附庸浩蕩玉關西望遠河源九曲本朝宗龍堆北去地形髙猶記凌寒度不毛斷磧青青肥苜蓿隨鑾春雨潤如膏乘時迅速便安邊四序纔周振旅旋却笑詩人歌撻伐鬼方小醜待三年鐃歌六首顧藻君王韎韐御戎衣虎騎龍驤激電飛越險不辭親陟遠先聲萬里過金微繡旗翠葆接行臺肅肅鈎陳翊衛開共望除兇同望歲邊民歌舞六龍來紫塞歡迎過赫連平沙漠漠列戎旃緣知聖武勤綏遠黄鉞親提萬里天飛斾遙臨海色青鳴鑣萬馬黑河腥試看指顧排狼窟駐蹕居胥待勒銘鼓疊城頭玉壘清欃槍頓落陣雲平鐵山風静看歸馬武德歌翻入塞聲廟畧乘時出萬全威行絶域握幾先吾皇神武功成日不數金城舊拓邊皇清文頴巻九十七
