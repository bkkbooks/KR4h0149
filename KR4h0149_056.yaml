front:
  text: 欽定四庫全書皇清文頴卷五十六
  hash: sha256:32ff9c2ff238d63e34cd68b968c1172e5c6795d1d58e2ddafbefe0f1e4391360
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_056-1a, image: WYG1450/WYG1450-0032c.png}
body:
  text: 詩樂府聖駕恭謁祖陵大禮慶成敬賦樂府十章有序沈德潛我皇上臨御之八年懋建皇極天人協應萬物由庚禮樂明備念國家創業開基起於遼陽祖宗功德艱難積纍報本追遠敢忘昭事園陵在盛京者禮應展謁爰召宗伯諏吉日奉皇太后於孟秋初旬乃發乘輿百靈呵護羣工景從道途所經萬方縱觀千里如堵城邑連歡川嶽生色既至盛京祗祓齋宮潔清壇壝時維質明肅將祀事豆籩鼎鼐牲牢壺濯莫不陳列五等六服羌戎蠻貊咸來助祭皇上愈愈勿勿洞洞屬屬俯興稽拜穆乎有容祝以孝告嘏以慈告列聖在天之神來饗禋祀儼若相接水源木本一氣感通由曽孫仁孝之心著存於秉圭執鬯間也三陵既周燕喜受祉諸蕃來朝共球並集海隅日出俯首享王既已文治溥浹矣皇上復振作武功宣威中外進退憑旗鼓變化備陳法同岐陽之大搜寓于敖之講武而又推仁錫類覃被遠邇大禮告成六飛乃回以逹孝暨天下以惠澤利萬人祖考寵綏天地明察祭則受福永膺純嘏聖人所謂通於神明光於四海者乃於今日遇之也小臣備員史職弗獲扈從乘輿敬擬樂府十章以備瞽矇歌誦辭曰聖人大孝繼繩世德世德伊何發祥長白天造鴻業乃眷與宅列聖在天園寢孔安橋山汾陰守以祠官地維鞏厚王氣鬱盤報本崇先溯源自古幽明可通孝思為主遙遙瀋遼言巡東土志繼乎世宗事述乎聖祖右聖大孝一章二十句練時日吉且良奉慈仁啓天閶發鑾輅隨龍驤帝問省侍鳯輦心齋栗容愈婉馳蒼虬揚雲罕大丙衛勾陳肅嶽引旌川隨轂過都邑省風俗垂白老擕兒女歡雷動民歌舞手加額親堯禹天顔喜慈語溫出關隘回陽春望園陵蒸祥雲右發鑾輅一章三十句盛京樂民風厚畝盈黍稌窖積紅朽四民鱗集既蕃既阜盛京樂慣田獵從狼發豵弓彎馬捷割鮮烹肥家餽户饁盛京樂樂雍熙衢尊春臺登之酌之昔聞聖祖之報本今覲聖孫之受釐吾民何幸得生聖人之時盛京樂樂不可支右盛京樂一章二十二句朝鮮挾陵之左山海控陵之右龍鳯拱而盤翼精靈朝而趨走孝孫秉禮告虔陳設豆登尊卣焚蕭膋兮升香薦嘉德兮圭璋三后饗兮明堂垂邃延兮袞裳神欣欣兮樂康僾然愾然聞見儼恪不遺餘奠報曽孫以百福昭式禮於孔熯監孝思之蒸蒸卜昊天之眷眷右謁三陵一章一十七句敬瞻永陵始祖所式憑薑嫄履武后稷乃篤生敬瞻福陵太祖此永寧太王居岐肇基乃勃興敬瞻昭陵太宗之佳塋文王勤止養晦逾光明我皇昭報對越以精誠躬膺圖籙翼翼而兢兢締造艱難繼序在守成勤恤匪解天命以永凝右懷祖烈一章二十句鬷假通神明禮成萬舞備頒胙遍寵錫肆筵設高會天厨稠疊出大官牲牢既饗紛炮膾飽德醉酒聨華戎六合一家無內外皇澤浹羣臣拜盈廷歡娛萬方寧泰高臺置酒歌大風漢高區區樂豐沛右禮成宴一章一十四句建中朝堂我皇當陽撫臨下方樂浪東陬椎髻氊裘咸和咸柔雲合龍趨水航陸驅競來陪都貢賮獻琛兜離佅任鴟梟好音追隨鵷鸞拜舞稱藩同漢呼韓助祭辟公來朝輸忠肅肅匑匑讋義服神蹈德詠仁萬年主臣右羣蕃朝一章二十一句文德貴綏懷武備戒休燕一人韎韐作六師獮狩合圍還教戰鳥蛇翔赴箕翼舒張霧連雲散陳分圓方止齊兮堵墻跳蕩兮飛揚弓滿月兮戈雪霜剽禽狡獸難遁藏荼火日月威疆場下大綏收壁壘四校呼七萃喜悉率左右燕天子海隅清晏纘武功祖宗王業由此起右大狩閲一章一十九句錫類者必廣乎仁孝推恩者不遺乎民人頒賚賞而沛乎德惠速置郵而布乎絲綸滋液滲灑潤物者雨漸摩噢咻育物者君居聖人之大寶曰位普天心之愛物曰仁觀百族之沐膏浴澤由天子之尊祖敬親右永錫類一章一十二句六龍發兮涼露金風之蕭爽六龍回兮清霜玉雪之飄零歷唐山過灤河抵神京臣民俯首顒顒拜迎乃奉聖母歸慈寧御太和殿千官朝賀彤廷謂聖皇孝治天下凡有血氣修孝德於環瀛東鶼西鰈不足貴紫芝銀甕何足稱雨暘時若家給人足奏上治於隆平右六龍回一章二十一句聖駕東巡盛京恭謁祖陵大禮慶成詩有序萬承蒼臣聞聖人之德無以加於孝宗廟之禮所以祀其先夫孝置之而塞乎天地溥之而橫乎四海惟聖人而在天子之位者氣盛而化神情深而文明為能極其量焉因心致愛由近逹遠中庸不曰祀其祖而曰祀其先明不可以世數限也漢儒議祀禮者皆謂藏魄于墓迎精於廟故宗祧之制特詳而陵寢之儀不著臣竊疑之夫聖王之于其先也無所不用其敬雖一裳衣一器皿猶必世世奉之况形體之所在乎史記稱武王九年上祭於畢斯即謁陵之明證楚茨諸詩言成王之能奉祭也有曰潔爾牛羊以往蒸嘗古者廟在王宮之左不當言往意即祀文武於杜中而經傳未明言之耳漢高帝有天下于先世所居之國若秦晉梁荆皆設祠祀官長陵特建原廟至明帝永平二年幸長安祠高廟遂有事于十一陵三年奉光烈太后祠章陵自時厥後兹禮遂顯蔡雍以為天子事亡如存用心周密其禮雖煩而不可省者是也我朝肇基東極奄有萬邦聖德神功彪炳宇宙邠岐之境三陵在焉世祖章皇帝定鼎燕都駕發盛京恭申祭告聖祖仁皇帝在位六十餘年三謁祖陵禮儀大備親製碑頌光勒貞珉世宗憲皇帝昔在藩邸奉命代祀列祖來假報本追遠奕世孔虔我皇上纘承洪緒祗肅明禋禮樂蔚興治化翔洽緬思先烈夙夜無忘爰以八年之秋戒百官具鸞輅恭奉皇太后而往謁焉於時兆庶歡騰神靈悅豫微雲斂翳天高日晶從者溢塗瞻者夾路以興京開運山直盛京東北水源木本先後有倫乃由熱河取道邊塞覽其風土耀我聲靈蒙古諸藩趨迎列侍昔也用武之地今則豫遊之郊所過山川如在户牖九月乙未至于永陵升自東階九􅉔三奠王公陪位百爾駿奔翼日丙申大祀志潔儀豐苾苾芬芬神保是格工祝致告福祿來崇壬寅恭祀福陵癸卯恭祀昭陵行禮如初致慤彌著僾乎愾然若有見聞乃􅊩盛京啓清寧之宮升崇政之殿宴王大臣及諸藩君長延問宗室耆舊慶賜遂行湛恩汪濊黃髮之叟白屋之氓莫不欣喜相謂我儕生長留都幸得見太平天子不圖禮文之盛德意之周至於如此也皇上思開創之艱難樂民物之殷阜歡留信宿賦詠盈編眷念萬幾星言回蹕于是祗告列祖循山海關經永平以至京師謁太廟而告成事焉是行也往返四千餘里皇上誠敬積中忘其勞勩侍奉聖母起居以時每日御行幄聽政如常車駕所經省方觀民勸農講武有司無供億之煩而民胥受澤蓋聖天子一舉事而萬善咸備焉猗歟盛哉臣偹員史館侍直講幃恭遇盛典焜煌宜有紀述伏讀元鳥長發皇矣生民諸詩皆因所祭而歌其先祖勳德其他篇于湯孫之將孝孫有慶尤三致意焉臣竊取斯義撰古詩十章恭呈睿覽蠡測管窺未罄萬一不敢自擬于頌第欲敷陳其事云爾詩曰上帝鑒觀四方孰德發揚積厚流長將全畀所覆俾億萬世有常我肇祖克當之興祖荒之景祖康之至於顯祖彌熾而昌則鍾其祥則衍其慶佑啓無疆一章天眷佑我清太祖蹶厥生仁武且明恢拓八紘躪鵝渾城鏖九國之兵明將來犯衆四十七萬一鼓殱之四路煙散遂都盛京皇猷炳煥建官定制萬世為憲二章於赫太宗至誠至仁敷教以文任官惟賢西柔蒙古東奠朝鮮明政不綱興師于燕燕城垂克帝命勿棘并冀兗青所向無敵神武不殺於戲帝德三章順治初載盜入明籞帝命師旅救民水火誅其盜首明之遺老率彼士女前歌後舞迎我世祖作神人主億萬斯年六合同宇二祖績用有成上帝則寧四章維清受命世有聖人皇帝仁孝聖祖之孫聖祖之孫世宗之子奉時辰牡明粢清醴至於東海以享以祀列聖在天實歆且喜五章誕我祀孔誠有碩其牲或剝或亨黍稷斯馨匪黍稷之馨維德克明穆穆在上濟濟在下精意周普假于列祖報以純嘏萬年受祜六章帝出乎震受天景命聖祖製頌斯言攸定三才奠位聖以繼聖我皇承序乾道中正維二祖之德綿於無極維二祖之功昭於無窮七章巍巍盛京昔二祖攸宅宮殿覺覺城墉嶽嶽百禮既洽于宴于樂鐘鼓爰作獻酬交錯維此臣工威儀有恪維彼兆人胥受渥澤八章帝顧陪都民風淳朴地大物豐亦孔之樂郊祀屆期駕言還歸小大稽首載瞻載依帝謂汝民守高曾之遺庶績咸熙翠華數來九章大禮既成告於太廟肅奉明禋維皇祖是效乃御正殿德音播告錫類施仁視民興孝四海歡欣羣工舞蹈於萬斯年典章焜耀十章右帝鑒十章一章十三句三章章十四句六章章十二句皇清文頴卷五十六
