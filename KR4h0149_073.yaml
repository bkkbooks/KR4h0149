body:
  text: 詩七言律詩南苑扈蹕恭紀四首張玉書離宮落日駐和鑾槖筆驚聞召講官匹馬頻嘶沙路軟千林遥拂暮烟殘天低翠幔星疑曙月轉朱旗漏未䦨最是宵衣勤訪道經函常向夜深看長槐夾陛捧瑶編入對分班拱細旃簾捲朱絲風自靜函開金殿日初懸身依咫尺龍顏近字叶宮商玉㫖宣空愧管窺無寸補朝朝香案染爐烟平沙玉勒擁龍媒豹尾風清萬乘來羽㦸連雲花外立琱弓如月栁邊開佇看露布馳三㨗遥播天威下九垓寄語征南諸將士甘泉早奏凱歌囘晨裝警蹕苑風清大纛飛文射日明繡衮遥瞻霄漢逈牙籖還向御筵横罏香肅穆飄輕幄鑾輅從容出幔城却訝從官分隊列三千犀甲一儒生孝陵陪祀恭紀三首張玉書鼎湖春斷廿年餘幾度朝陵動玉輿此日寢園申裸享遥天風木重欷歔詞官禮肅犧尊薦侍從班齊雁翼舒謁罷攀號紛雨泣野烏啼咽夕陽初豐碑突兀御階傍玉軸丹青石室藏令甲自高唐六典規模直陋漢三章南金東箭輸天府垂矢和弓列尚方締造恩深貽燕逺宵衣大業付今皇迢遞周垣隧道崇削成雙闕表幽宮龍依奥宅千峰繞神擁諸天一氣通石馬夜嘶銀海月朱旗朝閃碧䑓風徘徊曲磴松楸路咫尺音容想像中南書房賜膳恭紀張玉書寒星拂曙漏聲徐清切天門候起居温㫖召趨丹禁闥御香同展錦函書珠盤六膳晨餐渥雪椀三漿旰食餘臣朔飽恩翻自愧廿年槖簡術全疎耕耤禮成恭紀三首張英東郊淑景轉和風穜稑朝來獻六宮禹甸三千開穡事姬年八百肇農功雲依鑾輅金根外春满龍旗黛耜中自古惟陳無逸訓君王親與萬方同乘時秉耒踐堯封九扈齊飛擁六龍隴畔授鞭京兆尹壇邊進耜大司農青旗千畆公卿集縹軛三推父老從儉德由來兼孝德迎神此日撤歌鐘以國忌停用樂協風遥迓翠華新正是農祥應律辰粟薦神倉親享帝恩流御廪重勤民祀農壇畔三時慶觀耤䑓邊萬寳陳華黍登歌書大有遍將勞酒賜諸臣南苑講筵恭紀三首張英行宮清閟曉垂裳棐几先陳黼座傍聖主勤民兼講誦儒生報國藉文章乍含雞舌瞻天表近傍龍鱗識御香况是土階崇儉德圖書道已接羲皇細旃廣厦集簪裾正是甘泉避暑初閣啓邇英朝進講筵開崇政早陳書栁風細拂爐烟外鶯囀稀聞晝漏餘喜見孝經通衛士誦聲常聼满星廬聖主崇文軼古今縹囊隨輦入華林春秋不輟符天健寒暑無分見帝心千樹周廬青入座五雲垂葢結成隂虞廷蓂莢初開遍好迓薫風鼓舜琴南苑扈從講武恭紀二首張英平時講武近岐陽甲胄春蒐出建章洛水旌旗周甫草面京詞賦漢長楊御圍雲氣成龍虎天廐星精本驌驦畫㦸雕弓森羽衛射生羣與奉君王畿南地曠接滹沱宸蹕來遊淑景和馬散平原春草緑幕連芳樹晚烟多雲邊影疾韝鷹落栁外風鳴獵騎過日暮天清西嶺出居庸層嶂逺嵯峨賜櫻桃恭紀張英講筵人退五雲端分得含桃出禁䦨薦廟祗因先百果承恩舊許賜千官錦林初傍宮雲摘翠籠猶沾曉露漙飽食盈筐叨聖澤火珠光映水晶盤賜白櫻桃恭紀張英朱果頻經賜上方忽看素質满瑶筐堆從玉椀初難識瀉向銀盤但有香鳥未敢銜疑雪片冰堪相映總珠光水晶簾下初擎出風味宜含曉露甞賦良馬二首張英天閑龍種本星精一片桃花萬里行金勒乍銜疑電繞玉鞭初動覺雲生逺隨日馭過青海遥逐霞光度赤城幸傍鑾輿稱上駟調良獨擅渥洼名顧影天街燦錦韉驊騮得傍聖人前華山歸馬修文日冀野登䑓市駿年芳草每銜仙仗裏紅泉常飲禁雲邊從來騏驥如君子伯樂欣逢與共傳康熈十二年十月十二日特賜講官紫貂白金文綺時同賜者學士臣賜履侍讀學士臣正中臣臻臣廷敬侍講臣在豐編修臣方藹臣鶴齡臣英八人張英霜華曉日映龍樓講幄簾開玉殿頭温語九天傳鳯詔輕寒十日賜貂裘頒從御府香雲繞衣傍爐烟紫氣浮冰雪頓㤀皆聖澤陽春偏荷主恩優清班日侍禁廷隂温飽無求本素心珥筆方慚糜重禄承恩况復賜南金九齡曾上千秋鑑藴古還陳大寳箴自愧涓埃全未答但鏤銀管効謳吟紫殿披香帶曉開青縑内府出新裁山龍幸際垂裳盛縫掖慚無濯錦才宮繡繽紛雲外捲天章璀璨日邊來願將俯念諸臣意衣被蒼生遍九垓扈從南苑䝉賜直廬飲饌恭紀二首上於先是諭學士傅逹禮曰翰林官清苦廵行扈從所講筵以備顧問資講勸也無令艱於資裝嗣後帳幙飲食馬匹器具皆令給於内府永著為令張英侍從晨趨御苑東直廬特賜傍行宮頓㤀野色風霜急眞覺皇仁覆載同捲幔正逢明月满攤書相對夜燈紅儒生何幸分帷幄常在鸞旗豹尾中丹地年年愧素餐躬承渥澤海天寛侍朝每得分仙饌扈蹕還教領大官賜粟恩光沾玉粒調蘭香氣出金盤毎從退食公門後覆餗常憂欲報難除夕養心殿侍宴張英深殿宵沉寳炬然歲除欣侍五雲邊歩隨仙仗陪鵷鷺坐近天香聼管絃栢葉分行傳玉琖椒花送暖入瓊筵漸知温律陽春早拜手君恩又一年元日養心殿侍宴張英暖日和風漾鳯城履端清讌在承明樓前晴雪消金掌璣上春星轉玉衡三殿班聨同愷樂萬方歌舞祝昇平欣沾元日恩輝早聼奏鈞天第一聲上元侍宴恭紀二首張英干羽虞階海澨清傳柑時節宴承明檐低星月千燈繞庭舞魚龍百戯呈天保頌颺因樂愷皇情歡豫在昇平請看此夕同民處九陌笙歌满鳯城宵臨别殿敞瓊筵畫鼓聲催火樹然碧落烟消雙月映紫瀾風定萬珠圓千枝忽涌金波桂十丈頻開玉井蓮疊賜竒觀眞異數浮槎星漢憶當年五臺山新貢天花至特頒手勅分賜恭賦張英靈嶽珍蔬貢尚方欣從紫禁沐恩光清芬逺帶山嵐色鮮潔猶含石髓香聖藻温綸深雨露仙厨異味重琳瑯同時寵賚成佳事千禩流輝照玉堂恩賜高麗人參恭紀張英紫團名重舊神京紫團參名東坡有紫團參詩瓊液金枝色最瑩山澤常看雲氣䕶海天朝映日華生俯憐弱質宜仙草特賜靈芽荷聖情時飫甘香同湛露勝含雞舌在西清恩賜御筆臨蘇軾詩一巻草書唐詩二幅恭賦二首張英君王清燕侍臣知棐几常臨白玉墀披巻愛當明月夜揮毫多在晚凉時湘簾香繞書千帙春殿雲生墨一池地近九霄饒雨露名箋新賜曲江詩御筆書唐詩有曲江烟栁之句坡仙楷法今猶在草聖新題墨未乾秀色松筠千嶺上竒姿鸞鶴五雲端臣叨寳翰重頒渥人比瑶光一見難自幸此身依日月拂牋常奉萬年歡恩賜内府綵絲藥物恭紀張英節近天中景物和瓊琚沾賜出鸞坡繽紛色映臨風佩飄𣺌香侵疊雪羅聖澤豈需靈藥䕶君恩還較綵絲多玲瓏宫樣人爭識似曵雲霄紫玉珂侍從西苑進講恭紀四首張英清時避暑駐離宮竹塢花溪輦路通水殿凉分蘆荻雨山亭香满芰荷風坐臨空翠鳴絃裏靜聼飛泉講幄中聖主一編猶在手乾行不息與天同雲影天光自窈㝠蓬萊宮闕俯滄溟緑槐枝覆鴛鴦瓦碧澗光揺翡翠亭乳燕掠波穿繡户水禽接翅過芳汀微臣竊侍迎凉殿拜手甘泉敢勒銘龍旗飄拂照盤渦芳景來遊御畫舸雲度石橋微雨歇波生蓮渚晚凉多嘉魚喜傍蘭橈躍溪鳥歡迎翠輦過水木清華幽賞地仙源端可接銀河陪輦行宮講誦餘隔溪欣得傍宸居垂楊影裏攤書巻流水聲中掩直廬曉露新荷開沆瀣夕陽高樹對扶疎傳呼小艇花間泊觀稼亭西近玉除䝉恩命供奉臣周道寫臣小像裝潢成軸特賜恭紀二首張英十載清曹近玉墀經幃秘閣許追隨忽聞恩澤傳宮使為寫儀容遣畫師香近御爐薫絹素墨和仙露㸃鬚眉三毫頬上頻添取多在天顔指顧時潘岳中年髩有星自將疎野歎儀形披裘只合棲山澤鳴玉何堪著殿庭麟閣勲名慚竹帛瀛洲文學媿丹青惟驚蒲栁沾恩渥敢傚丰裁問九齡䝉恩賜内廐鞍馬恭紀張英中夜房星降紫霄長鳴顧影獨蕭蕭花驄逺自西川貢金勒新從内廐調嘶入宮雲看攬轡光生衢路羡聫鑣朝朝栁下青驪穏蹀躞春風玉蝀橋平滇南詩六首有序張英皇帝御極之二十年滇南既平俘馘來獻寰海内外截然寧謐盖自屢年以來經營四方上厪宵旰至此底厥成事羣臣颺頌神武比於無競之烈皇帝謙冲弗居臨軒申命以謂天心眷祐祖宗靈承以克臻斯耆定又念四方赤子瘡痍初起袵席未安將士荷戈八載勞勩待澤籲恩並在今日於是展告郊廟崇號兩宮發德音下明詔沛維新之大澤布休飬之深仁所以鞏固丕基嘉惠元元者至矣盖武功之後煥以文德戡亂之餘繼以致治聖心未甞以天下既安而稍自暇逸也臣既祗獻昇平頌以揚廓清之盛復敬撰律詩六章叙捷聞之懽忭美慶典之矞皇鋪事紀實昭鴻駿焉君王指顧定滇中絶徼炎荒聖澤通益部火雲天際掃昆池鯨浪日南空投戈喜惬休兵志因壘眞成不戰功步輦早趨長樂苑慈懷先與慰深宮次第讙傳遍九逵侍臣先許賀彤墀丹屏方見天顔喜赤子還縈聖慮慈萬户芻茭輸驛路八年戈甲頓王師親聆倍覺愚衷感拜手仁言百代垂帝德如天本好生惟教貔虎瞰孤城釡魚自見鯨鯢滅簞食仍聞士女迎六詔何曽驚夜柝百蠻猶不廢春耕烏䝉烏撒咸歸化洱海波澄看洗兵昇平大典慶如林底定還勞睿慮深肅藉明禋揚祖德勤將肆類答天心恩周九服光圖史孝逹重闈冠古今舞勺歌雝追盛事功成一代紀元音遥聼鳯詔萬方同温律吹從玉殿風獄縱赭衣求訟簡賦蠲赤縣恤民窮花村鵲報茅檐喜棘寺鸞棲犴户空兵氣盡銷佳氣满普天甘雨慶雲中盈庭喜氣集臣工經緯訏謨仰聖聰雲合羣方歸舊服星羅宿將定元功羽干載舞期同樂華黍登歌願屢豐手建太平千萬禩無疆寳祚慶龎鴻皇清文頴巻七十三
