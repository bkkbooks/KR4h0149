  text: 欽定四庫金書皇清文頴卷七十二
  hash: sha256:91a71c1b7c2c807ba7eeb3840efb8a39d94df020679f8f4cf2d81e8e392ff31a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_072-1a, image: WYG1450/WYG1450-0185c.png}
body:
  text: 詩七言律詩重陽乾清宮侍宴賦詩恭紀和親王𢎞晝九日筵開煥彩霓承恩叨侍未央西韻分祕册親臣送序灑天章御筆題獻瑞金英凝雨露傳觴玉液浸玻瓈載賡既醉歌無極捧日紅雲繞殿低栁絮和親王𢎞晝垂楊千樹翠成圍踠地柔絲拂落暉春晚漸催花信去絮輕還傍緑隂飛隨風蕩漾侵簾近度水飄搖㸃石稀幾度餘寒還料峭可堪供緝薄綿衣賦得柴門臨水稻花香和親王𢎞晝隱隱江村有數家柴門向處稻初花隴頭經雨香才透塍畔迎風穗欲斜溪水一灣臨曉鏡笙歌千部聼鳴蛙今年彌望平疇好祝滿篝車願未奢十月朔頒時憲書和親王𢎞晝正朔頒來瑞氣新仙蓂一莢長楓宸垂衣拱手瀛寰治欽昊勤民節序均九有山川歸禹服萬邦時月協虞巡在廷稽拜齊賡祝寶祚長綿萬歲春晴雪早朝和親王𢎞晝積素凝輝繞禁林丹墀濟濟列冠簪天邊輕散初陽彩殿上遙傳雅樂音佩玉聲傳殘漏度爐烟暖辟曉寒侵九重德意如春普虎拜同傾向日心燕山八景和親王𢎞晝巃嵸瓊島矗層空㸃綴春隂勝畫工瑞氣繽紛瑶草緑祥光繚繞玉芝紅露華不墜高峰濕煙翠輕披茂樹籠最是宸遊佳麗處時聞簫管五雲中瓊島春隂西風凉入景澄鮮太液波搖散曙烟亂颭荷珠驚白鷺斜催雁字沒遙天岸傍蟬咽疏林響水面魚吹翠帶牽無限遐心何處著蒹葭玉露思悠然太液秋風凌空瀉處玉龍飛靄靄晴雲掩映宜似練逺從千澗落如虹直向九天垂停泓原有盈科勢濺沫非無潤物時坐對更添吟賞趣斜陽紅抹影參差玉泉垂虹千岫參差帝闕西銀屏一𣲖素輝齊樹枝盡是瓊葩綴樵路都為玉屑迷淡抹晴霞渾似綺暗融朝日未成泥豐亨來歲端堪卜靉靆祥雲入望低西山晴雪迢遞郊原古薊門森濃樹色帶烟昏長空低接迷濃淡逺郭平拖互吐吞渺渺緑蕪連帝里重重翠黛映山村南樓極目渾難辨一幅青山渲染㾗薊門烟樹晨鐘初動曉蒼蒼月照蘆溝白似霜車馬縱橫連倒影星河踈淡黯清光往來人跡長橋上斷續雞鳴曲岸傍指顧帝城佳氣繞千村燈色已輝煌蘆溝曉月居庸萬仞勢崢嶸地設天開鞏帝京樹影籠葱烟乍散山光紫翠日初生古原近帶溪流急碧落遙看雁陳橫形勝何須誇百二好憑渥澤被寰瀛居庸叠翠崔嵬遺跡仰金臺燕趙山河一望開閒挂斜陽催晚去還看暮影逐烟來餘霞片片浮紅綺歸鳥聲聲度緑槐厚禮招賢成已事樂生端的不凡才金臺夕照賜柑恭紀和親王𢎞晝千頭封蠟自江南異味新嘗齒頰甘皮燦朱囊香細細瓤分瓊片數三三頒來祗覺清芬滿擘處還看翠液含自是聖恩常廣洽上元未到便傳柑賜哈密瓜恭紀和親王𢎞晝聖澤旁敷豈有涯西藩土物獻皇家禁中薦處初呈味盤裏分來並拜嘉香霧霏霏清撲鼻甘泉䔩䔩冷侵牙舊聞五色傳佳種從此東陵未足誇賦得青山長對卷簾時和親王𢎞晝院落無塵愜素心蒼苔緑樹映森森門迎黛色層峰近簾卷春風列嶂深橫繞嵐烟三面畫暗分巒影一階隂閒來書簡披吟處字裏長疑翠色侵雍正七年十一月某日闕里文廟上梁前二日慶雲見上躬詣太學致祭用答鴻庥恭紀二首和親王𢎞晝鑾輿夙駕瑞烟披華蓋繽紛映彩旗天賜祥雲輝闕里帝陳盛典饗先師隆文萬古瞻昭代釋奠三雍仰令儀自此儒風光日月欽崇不數漢唐時廟貌新崇煥棟梁慶雲五色麗祥光非徒糾縵呈佳瑞可識離明動上蒼聖主欽儒隆典制英才際㑹合騰驤只今釋奠成均日爐靄紛披禮樂彰古柏和親王𢎞晝古柏橫斜布翠隂卧龍盤鳯欎森森髙枝百尺凌寒壑黛色千重映碧潯翠傲風霜知徑節紋纒苔蘚見貞心孤高未許尋常友只有庭前緑玉篸喜雨二首和親王𢎞晝雲氣冥濛欲潤衣及時靈雨灑霏微香衢輕壓紅塵靜麥坂齊翻翠浪肥巧燕戀巢飛屋角牧童袖笛向柴扉濯枝潤葉饒生趣聖德通天天不違精誠何用禱西宮默感穹蒼慰聖𠂻萬頃平疇搖碧浪一天霖雨降鴻濛無風却喜今朝足不卜應知此歲豐流澤如膏堪載筆南山翠黛瑞烟籠海潮應月和親王𢎞晝錢江渺渺夜蕭寥看到輪圓識早潮浪叠直如堆白雪月盈真欲透清霄桂宮蟾兔浮蒼色碧海蛟龍逐怒濤千古竒觀勞羡想何時登覽越山椒雨中山翠和親王𢎞晝西山聳峭列屏風雨後看來逈不同高岫半藏朝霧裏翠螺遙㸃碧霄中數重樹色蒼蒼繞幾朵雲峯淡淡籠那得生綃長十丈臨窗潑墨倩顛翁賜讀御製冬至齊宮詩第二章奉命恭擬敬呈御覽和親王𢎞晝乾乾惕若宿齊宮默貫天人夙夜中祗以寸心通上帝總因萬姓禱蒼穹律回葭管豐年兆氣轉鴻鈞大地融崇祀精誠昭感格躬膺福禔永無窮乾清門侍直怡親王𢎞曉五更斜月見鴉飛旭日將升啓曙暉金闕向明鐘乍動玉墀待旦漏初稀瑞雲繞處開黃道湛露凝時近紫微鴛鷺班齊承詔㫖御香偏染侍臣衣暮春即事次韻怡親王𢎞曉園中小築似農家十里舟行看落花夾岸千條楊栁線繞階一簇牡丹芽軒開北牖飛春雨門對西山映暮霞待到夜䦨人靜後蓼灘深處聼鳴蛙元日早朝口號誠隱郡王允祉太平景物樂春光元日趨朝拜聖皇銀燭輝煌開萬户金爐縹眇轉千廊和風微動簪纓隊曙影徐分鴛鷺行玉帛來同齊獻祝樽傾北斗慶年芳秋日乾清宮應制誠隱郡王允祉九重宮殿秋初屆瑟瑟凉風徹禁林暑向西山全斂退雲飛北闕半晴隂玉階澄淨浮塵逺丹陛輝煌瑞靄深自愧庸才承詔命拜揚何幸抒微吟中秋扈蹕塞外校獵誠隱郡王允祉塞垣紅葉曉霜催櫜鞬嚴裝扈蹕來滿月雕弓飛鷺羽嘶風鐡騎震龍堆曉峰雲影千旗合夜火星連萬帳開秋獮聖朝循故事飛熊還載後車回聖駕南巡䝉恩以途間御製詩文賜示恭紀二首誠隱郡王允祉帝歌瓠子即平成宵旰精勤更省耕物在春臺皆自樂野張行殿見輿情民瞻彩舸花前拜馬避嘉禾栁外行過沛橫汾徒羡美宸章全是為蒼生時邁乘陽輦路遙宸遊非為物華饒河沉璧馬波濤靜詔下金雞貫索消萬國冠裳迎聖禹四方雲日覲神堯篇章訓誥皆師古徒解敷詞笑六朝隨鑾駐蹕於樺榆溝行宮恭紀時五月朔二日誠隱郡王允祉山林佳趣自然生塞外離宮選勝成灤水東流琴韻切嶤峰西上梵音清野花含笑新霑露茂樹乘時正向榮扈蹕初來逢午日願將蒲酒賀文明賦得禁城春色曉蒼蒼應制誠隱郡王允祉率土同歡大地春車書人物共維新金門早布陽和令玉宇均沾造化仁淑氣晴光開曉日祥風麗景慶佳辰御園繞賀三元節寶殿還歌萬壽椿癸已歲皇上六十萬壽大慶恭祝二首誠隱郡王允祉華渚虹流景運開中天雲物正昭回北辰環見諸星拱南極光連帝座來品類歡心歸壽域乾坤佳氣滿春臺萬年枝上宮鶯囀惠日和風遍九垓日新乾健慶皇躬垂拱無為致郅隆萬物生成資厚德一人天地讓全功六旬花甲循環轉五紀恩波逺近同不用廷臣金鏡進共知宵旰在深宮元日早朝愼郡王允禧斗柄先回帝座春喜逢黃道㑹元辰氣融海嶽乾坤曉光滿樓臺日月新雉扇徐開瞻紫極鵷行拜舞覲楓宸聖皇有道生為德早共陽和布澤勻漁人愼郡王允禧平鋪春水碧粼粼好在浮家泛宅人楊栁風輕晴曬網杏花雨細晚投綸棹歌互答青山近鐵笛閒橫白月新自是此身無繫戀一帆何處不通津雪後早朝愼郡王允禧積雪清消紫陌塵銀杯逐馬帶隨輪光分明月千門曉枝綴瓊花萬樹春九鼎香烟飄彩仗五雲晴色擁楓宸太平預卜豐年瑞早識垂衣聖治淳丁未四月十二日恩賜御園避暑讀書恭紀二首有序愼郡王允禧朱明應令暑氣方殷遽被溫綸仰䝉天眷恩深太液在堯天舜日之中居近清都挹瑶島蓬池之勝竹埤避暑寧知赤日當天藻砌招凉不斷清風入戶揮毫藝閣花香與墨氣俱浮肄業紗窗松籟共書聲逺叶乃賞歡之未已忽惶愧之曷加凡以三夏之嬉遊俱係九重之愛護爰疏短引敬賦七言非圖擅文藻於當時只欲矢涓埃於他日已耳承恩直擬上清虛瑶島頻年賜起居夭矯蒼松眠古鶴連牽文藻趁嘉魚一簾花雨催吟筆十畝濃隂䕃讀書到處莓苔皆可坐不須灑掃到籧篨雕梁乳燕學呢喃池靣荷抽緑漸添深樹籠雲湘簟冷閒階過雨石苔纎披書靜喜山當牖琢句清看水隔簾竟日炎威飛不到晚凉庭院玩新蟾上元夜愼郡王允禧九陌祥烟夜景賖通宵寶馬度香車月明銀漢三千界燈艷春城十萬家星焰别飛天半彩荷開不作水中花遊人共道升平樂處處笙歌笑語譁送僧住西山愼郡王允禧寥天孤鶴任鶱飛一錫年來卓翠微入定自鋪黃葉坐閒行應伴白雲歸林間素侶經行慣物外心知見靣稀擬向杼山問詩法擕笻蠟屐叩禪扉桐露堂十月望後夜集愼郡王允禧松火爐紅玉漏遲輕霜剪剪撲簾帷人來月白風清夜酒熟橙黃橘緑時共許談詩留欵洽何妨說劔騁雄竒重煨芋栗開殘酌星斗䦨干坐莫辭元日陪駕叩覲慈寧宮崇慶皇太后禮成恭紀長句愼郡王允禧太平天子拜慈顏虎衛鵷行趨百官日麗萱階籠瑞靄風回蘭禁掃春寒寰中共覩千年勝膝下新承萬國歡何幸兩宮清切地追隨長在五雲端盛京四首平郡王福彭王氣葱蘢擁鳯城開天景運在陪京山環水繞雄關立虎踞龍盤帝業成瀍澗卜居垂大統邠豐啓宇著先聲至今竹帛傳無敵一旅師當百萬兵龍盤鳯翥拱三陵長白山綿瑞靄凝天授神明真主出家承謨烈聖人興烟霞塞外嵐光逈樓閣雲端海氣騰咫尺寶城䖍告祀巍峩仙闕歷階升宮殿重重紫禁端維皇建極肇三韓櫛風沐雨規模大闢莾披榛社稷安論定禮儀崇七廟分頒功賞㑹千官歌風沛邑增遐思奕祀長承創業難營州東與冀州連往代相承有革沿箕子益封新版宇公孫分𨽻舊山川煙塵秦漢紛爭苦城郭金遼割據偏此日車書成一統太平風化被無邊途中中秋䝉驛賜御果恭紀平郡王福彭見說清秋節令佳月明銀漢浩無涯九天捧詔雲程逺列馬騰風驛騎賒湛露淋漓嘗御果深恩委曲念皇華一時異數傳營幕感激三軍不憶家甲寅元旦是歲戊寅朔立春合年月得三寅歲德勝於東方為兵占佳兆平郡王福彭亦有遐荒獻歲杯和風可共斗杓回占時歲德三寅聚稽首單于萬里來翠色遙臨仙仗栁清香應發上林梅堯天澤沛朝元日塞草都因淑氣催庚戍元旦得新字貝子𢎞普節啓三陽歲籥新東皇佳氣布芳辰錦城瑞靄千門麗大地韶華萬户春隔牖鳥聲初睍睆傍簷花色已精神朝來六宇沾恩澤何限龍光接紫宸九日登香山來青軒步杜工部九日藍田崔氏莊韻鎮國公德普豁目層巒宇宙寬登臨九日有餘歡泛瓢共浥茱茰酒探菊同簪桑葉冠落日淺銜紅樹晚橫溪深鎖白雲寒飄然忽動烟霞想石屋山房次第看早朝輔國將軍博爾都洞門曉啓接天安劍佩琳琅擁百官北極晴雲連樹暝西山落月上衣寒疏星影動明金闕殘漏聲沉度玉欄獨愧無才兼歲晚聖恩回首報應難小至日齊宿天安門曉望輔國將軍博爾都律轉陽回祀泰壇禁門清漏肅千官星河欲落神宮靜劍佩無聲曉帳寒樹隱殘霞標露柱烏驚明月繞仙盤五雲闕下遙相屬佳氣登臺次第看喜長沙嶽州捷音踵至輔國將軍博爾都驚濤疾下恢三戶竹破長沙與嶽州嶽麓毒嵐三箭定洞庭風浪一帆收江通蜀道原輸錦海隔珠崖本貢球早晚成功報天子好擕圖籍載輕舟南苑輔國將軍博爾都城南御氣動昭回羽葆參差帳殿開落日歸來盤馬埒春風吹上晾鷹臺長楊苑側金笳發細草原頭畫鼓催自有詞人誇羽獵眼中多少上林材萬栁堂輔國將軍博爾都高堂翠繞栁千條振䇿登臨入絳霄日影漸移雲覆檻泉聲不散雨過橋山盤曲徑看人小花布重隂隔市遙莫怨章臺攀折手月明還有客吹蕭喜晴輔國將軍博爾都緩步園林愛晚晴雲開斜日襲衣清高天乳燕迎風語老樹寒蟬帶濕鳴門靜塵隨車轍減階閒苔逐履㾗生銜杯幽獨無餘事賴有殘花照眼明皇清文頴卷七十二
