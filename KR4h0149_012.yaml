body:
  text: 解禋于六宗解葉方藹六宗之說何其紛然未有定也歐陽及大小夏侯言所祭者六上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六者其說茫昧而無據孔光劉歆以為乾坤之六子水火雷風山澤然山水澤即山川之屬其說又拘硋而難通賈逵以為天宗三日月星也地宗三河海岱也既望于山川矣何為復有地宗之祭乎馬融以為萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此為六宗既類于上帝矣何為復有祀天之舉乎鄭康成以為星辰司中司命風師雨師則不應所祭惟星辰張廸以為六代帝王則不知已該於羣神之徧張髦以為三昭三穆則不當獨指為宗廟之祭杜佑作通典以為昊天上帝合五帝而為六要於上帝之類終為重複似皆非篤論也惟蔡沈本孔安國引祭法之說曰埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也以是為六宗則庶得之矣竊猶有疑焉何則坎壇雩宗非所當祭也坎壇以祈禳為事言寒暑之有過不及則禳却而祈求之而已雩宗以嗟禱為義言水旱之為民患則吁嗟而請禱之而已是寒暑宜祭於愆期之時水旱宜祭於為災之日舜之攝位而禮百神也何用乎無故而禳祈嗟禱哉曰如是則六宗者何舜之咨四岳曰有能典朕三禮謂祀天神祭地祗享人鬼也地祗莫尊於后土人鬼莫先於宗廟今言望於山川而不云后土徧於羣神而未及宗廟夫后土其母而山川其子宗廟其主而羣神其賔舍母而祭子舍主而祭賔有是理乎六宗者曰時曰日曰月曰星辰曰社稷曰宗廟爾既類上帝而祭時日月星辰則天神之屬無不祀矣有社則有稷當時徐州貢土五色以供大社之用是社稷者帝世之所重也既禋以祭后土而又望於山川則地祇之屬無不祭矣既告文祖之廟而其餘諸廟相次祭告以至徧於羣神則人鬼之屬無不享矣意者三禮皆備而無遺乎學者以禋望皆為合祭則時日月星辰社稷宗廟一時並舉似非所宜不知禋望各於其所泰昭祭時不可兼祭乎日王宮祭日不可兼祭乎時東望而祭泰山無庸兼望乎西西望而祭華嶽無庸兼望乎東而何獨怪於社稷宗廟也哉㦯謂祭法出於禮記乃姬公之定典今反以臆說明其不然可乎曰古者一代有一代之禮凖乎情酌乎義則同而其制度則不必盡同殷因於夏禮所損益可知也周因於殷禮所損益可知也夏殷周且不同而何唐虞之有必舍有虞氏之三禮而別取祭法以為斷此誠不能無惑也春秋謹嚴解李光地韓子云春秋謹嚴深與孟子懼亂賊荘周辨名分之㫖合然他日詩云春秋書王法不誅其人身無乃謂聖人猶有所含隐如答張籍書所謂深其文辭以避咎者而與謹嚴之意異與曰答籍之書有為言之也若夫書王法而不誅其人身則正所以為謹嚴之至也且如弑君之賊州吁華督以下莫不大書而斥言之宗國有諱禮然而不地不葬之類義例亦已明矣羽父共仲之絶罪人亦既得矣不斥言之者稱國弑稱人弑說者因謂罪累上而聖人之有恕辭嗚呼是可恕也孰不可恕也盖春秋之為信史也從乎告訃而伸大義焉彼亂臣賊子之戕其君父肯顯然聞於諸侯哉弑不可掩也必將有所詭其辭諉其罪者矣幸而國有南史董狐之直則已非然未有不以微賤愚豎當之者也孔子於此將求其實與非從訃之體也將從其訃與其為失賊大矣今州縣之中有殺人者而適為貴族桀大其力足自解脱因而委罪於微賤愚豎官吏甘為之掩覆者多矣将得其大憝則無徴直以微賤愚豎充之則廢法於是立疑案曰某州某縣有殺人者庶幾大憝有時得而王法未嘗廢稱國弑稱人弑春秋之疑案也疎而不漏之義也故書王法而不誅其人身乃所以為謹嚴之至騶虞解李紱以獸訓騶虞者註疏之誤也毛傳云騶虞義獸也白虎黑文不食生物有至信之德則應之後世因以騶虞為西方白虎以配蒼龍朱鳥元武然毛傳又謂虞人翼五豝以待公之發鄭氏箋云君射一發而翼五豝者戰禽獸之命仁心之至既以騶虞為義獸矣又以比君心之仁仁與義究安屬乎孔疏稱鄭志張逸問傳曰白虎黑文又禮記曰樂官備何謂答曰白虎黑文周史王㑹云備者取其一發五豝言多賢也射義注及答志皆言得賢多引詩斷章也一發而得五豝猶一求而得五賢賢多則官備按騶虞之詩別未有引用者惟見於節射戴記謂武王散軍而郊射左射貍首右射騶虞又曰天子以騶虞為節騶虞者樂官備也此自是騶虞本義若以騶虞為義獸仁獸於官備之意何涉乎以其不相渉遂目為斷章盖孔疏傅㑹毛鄭未可以為定解也歐陽公作詩本義引賈誼新書曰騶者文王之囿名虞者囿之司獸也陳氏據射義樂官備之說以証之朱子詩敘辨亦並存其說夫以虞為司獸於官字之義合矣然未見其為備也且文王之囿曰靈囿以騶為囿名他書無所攷竊意騶虞皆官名耳周禮夏官有趣馬掌王之馬政詩所謂蹶惟趣馬者也趣亦作騶戴記季秋之月天子乃教於田獵以習五戎班馬政命僕及七騶咸駕注云七騶謂趨馬主為諸官駕說者也疏云天子馬有六種種別有騶則六騶也又有總主之人併六騶為七故為七騶春秋左氏傳晋悼公即位使程鄭為乗馬御六騶屬焉使訓羣騶知禮是騶為官名審矣其官至漢猶存後漢書梁冀傳桓帝使黄門令具瑗將左右廐騶虎賁羽林㦸士合千餘人與司𨽻校尉張彪共圍冀第注云騶騎士也淮南子云喜武非侠也喜文非儒也好方非醫也好馬非騶也盖自三代至漢以騶為主馬之官未之或改田獵之事虞人則翼獸而七騶則差馬文王之政對時育物故葭蓬茁而豝豵五騶與虞皆得其人詩人因賦其事以羙君不言文王而言騶虞者不敢稱君而指其侍從之臣如後世稱執事左右之義小雅軍士怨王而呼祈父亦此意也若虞之為官名則尤不一而足自益列九官己見唐虞之世周禮太宰九曰藪以富得民注云藪上有虞掌其政令地官澤虞掌國澤之政令禮記天子之六府一曰司木注曰司木山虞也月令季春之月命野虞毋伐桑柘孟夏之月命虞人入山林毋有斬伐魯語云大寒降土蟄發水虞於是乎講罟罶鳥獸孕水蟲成獸虞於是乎禁罝羅晋語云叔向退召舟虞與司馬盖山林川澤園囿之官無不以虞名者故曰騶與虞皆官名也齊詩章句則直以騶虞為天子掌鳥獸之官然未若分為二為得官備之意若以騶虞為獸自漢以後始有其說最前者為山海經稱林氏之國有珍獸名騶虞司馬相如封禪文云囿騶虞之珍羣亦似本於山海經然山海經所記皆神仙鬼怪荒忽之事始見於東方朔對異鳥及劉向對貳負之臣至新莽時劉歆始上其書於朝方朔事武帝好言神仙鬼怪之事安知非朔軰所偽撰如神異經十洲記諸書乎古来箋釋之書備五經之觧釋鳥獸之名無若爾雅而釋獸一篇若貘白豹甝白虎俱己備著不應騶虞為西方白虎而獨遺之也吾故一言以㫁之曰以獸訓騶虞者註疏之誤也經解劉綸臣聞述經於漢以上者以宣聖之表章為斷窮經於漢以下者以考亭之訂正為歸按經之名經不見於經大約秦焰之餘為諸儒叙列各家所系㦯云荘周天運篇已有治經之目要未可為確佐也昔者孔子刪定贊修六經始著其稱五經者以周末樂亡故至分二禮於戴記為七經則漢文翁遣相如東受七經者是増孝經論語為九經則後唐鏤九經本於國子監者是他如五經五緯為十經六經六緯為十二經而十一經有孝孫之問對其分十三經者盖亦自唐始此厯代相傳之大略也蔵經之家則有孔氏顔氏諸人上經之家則有共王獻王諸人註經之家則有安國康成諸人疏經之家則有頴達公彦諸人此又諸經顯晦之大凢也易以卜筮不廢於秦矣而神農連山以首艮得名夏用之黄帝歸蔵以首坤得名殷用之若周人之易雖主宓犧小成而太卜所掌二易盖並列焉漢世施孟梁邱京之學始焉或分或合繼焉或盛或微要以論易於四家之前則文王卦詞周公爻詞至孔子而大備論易於四家之後則周子太極邵子皇極至朱子而兼賅也伏生授尚書三十三篇晁錯寫以漢𨽻是為今文歐陽大小夏侯傳之安國得孔壁古文多伏氏二十五篇皆科斗字傳之者梁栁臧曺而梅賾上之今天寳定本則衛衡所合定而朱子命蔡沈為傳者也轅固齊詩亡於魏矣申培魯詩亡於晋矣韓嬰韓詩僅存外傳矣就三家而論雖魯詩較優合毛傳而言惟鄭箋為當朱子駁序後世亦有疑之者然其考衷固不可易也春秋三傳漢儒好尚不一惟范寗去其所滯擇善而從之說至為無弊他若鄒氏則無師夾氏則未有書鐸氏虞氏則離合互異其得麟經遺意者非朱子綱目弗善也后倉說禮於曲臺殿凡一百八十篇大戴刪為八十五小戴刪為四十六先儒謂大戴旨趣短淺不及小戴此說良然至漢末馬融則補以明堂月令樂記而為四十九篇矣考工一記陳氏以為不足補冬官之缺而俞廷椿王次㸃則又剜取地官數職以補之豈不悖哉若夫古禮經五十六篇獻王得之魯淹中矣而二戴黜之遂至亡逸今獨存髙堂生士禮十七篇亦復未稱完善朱子所以有請修通解之奏也傳齊論者曰王陽傳魯論者曰張禹自孔氏為傳鄭氏為註而齊論亡自何晏集之邢昺疏之而魯論顯然非朱子則無與集其成也大學古本通體本自啣貫自朱子章分節解之而今本一變孝經上於顔貞凡十八章名曰今本隋王劭於亰市得古文則又多閨門一章而庶人分為二曾子敢問分為三共二十二章至元宗採輯舊註仍以十八章為定從司馬正議也張揖以爾雅為周公作矣今按本文有瑟僴美衛武猗嗟刺魯荘之句先後失倫似非周公之制揚子雲曰孔門子夏之徒所記以訓詁六藝者不為無見也馮休刪孟温公疑孟固近不經而陸筠翼之虞允文尊之其說亦未甚備也至學庸二篇禮記中獨為精粹其列諸四子則又自程朱詮釋經傳始也我國家列聖相承崇經學以廣教化服古之士蒸蒸喁喁盖百年於斯矣而皇上復申命開館纂輯羣書折衷萬世所以闡尼山之奥窔揚徽國之清芬者曷以加兹臣恭讀聖訓孜孜下詢無任戰慄隕越之至謹攄管窺之見以對經解于振自書契肇興而文眀日唘三墳五典八索九邱楚之良史猶能傳之說者曰墳大也三皇之書也典常也五帝之書也八索求其義也九邱九州之志也此載籍之最古者然聖人刪書斷自唐虞豈非以其荒逺而不可稽歟連山首艮歸蔵首坤周易首乾不相襲也乃古三墳一書所云山墳氣墳形墳亦有八卦之說盖出於偽作而夾漈信之陋矣當秦之燔籍也易以卜筮獨全詩亡其六篇或以為笙詩未嘗亡也春秋間有闕文然三家傳錄已多齟齬非秦之咎惟書百篇殆失其半至禮記成於曲臺多後儒所為秦焰之所未及也然則聖人之經如日月麗天江河行地雖經焚爇而其光輝炳燿千古不磨至醫藥卜筮諸書雖秦所特㽞而傳於後者曽有㡬耶經也者常也聖人之典也五經分而樂經亡或加以周禮儀禮或益以論語孝經孟子爾雅或析一經而為三或合兩經而為一自漢至唐代有増損要期於昌明經學非有所軒輊也漢興懸金以購圗籍而河間獻王所得獨多善本以獻諸朝魯共王壊孔子宅聞金石絲竹之音得古文焉兩亰四百年間醇儒軰出如董仲舒劉向劉歆賈逵鄭興鄭衆馬融鄭元之屬及唐之賈公彦孔頴達等皆有傳道解惑之任訓註箋疏之功至於宣帝令諸儒講五經同異於石渠閣増置梁邱易夏侯尚書穀梁春秋博士一時以為榮然梁邱乃䜟緯之學以符應得幸圖形麒麟閣則漢之失也易始於商瞿子木傳橋庇子庸再傳馯臂子弓三傳周醜子家四傳孫虞子乗以至田何子装是謂田何之易何授丁寛寛授田王孫以授施讐孟喜梁邱賀由是有施孟梁邱之學又焦贑長於災變分六十四卦更值日用事而京房習之非聖人之指費直之易取文言大小象分入諸卦中王肅王弼等註之由是大行費氏行而諸家遂熄然易有聖人之道四焉而輔嗣等崇尚清言矜名理而遺象数則偏而不全非程朱後出何以正其失乎書之今文傳自伏生古文得自孔壁然伏生口授女子而其書反多艱澁孔安國𨽻古定本之蝌蚪而其文反多平易殆不可曉歐陽大小夏侯傳今文梅賾姚方興等傳古文朱子屬之九峯蔡氏而古今合轍矣齊詩始於轅固而翼奉匡衡等傳之魯詩始於申培而韋賢暨子元成習之韓嬰之詩則王食長孫承其流毛萇之詩則馬融鄭元大其緒然毛詩出而三家並微非以其傳自子夏故源逺而流長歟夫公穀春秋亦傳之子夏者也左氏㝡晚出而有三長然不得立賈逵言非左氏無足證圖讖明劉氏為堯後者乃卒立焉立左氏是也所以立者非其道矣公有嚴顔穀有范寗而杜預為左氏功臣康成之發墨守針膏盲起廢疾猶未免書生之習鄒夾𤨏𤨏又何足云周禮亦晚出五家之儒皆不得見至劉歆而始顯冬官殘缺河間獻王以考工記補之雖不類然唐太宗知其為聖人之作程子以為有闗雎麟趾之意朱子謂周公運用天理爛熟之書雖其間不無可疑何至如何休蘇轍軰所詬耶俞庭椿乃取五官之屬近於冬官者輯為一卷截鵠添鳬削足適履是向之周禮雖缺而五官尚存俞之冬官雖具而五官並缺矣鄭氏曰周禮為本聖人體之儀禮為末聖人履之賈公彦又曰周禮為末儀禮為本本則難明末則易曉之二說者宜焉從也朱子以儀禮為本經禮記為義疏乃作經傳通解以儀禮為綱而附禮記於後其說㝡當至於后倉所授慶普所傳小戴所刪則大戴之書耳若夫齊論魯論本非迳庭而傳之者張禹為優大學即戴記之篇時有錯簡朱子正之孝經古文出於孔壁今文傳自顔芝爾雅創於周公成於子夏昔人以為九流之奥㫖孟子之聖亞於顔淵又豈馮休之所能刪而又何待於虞允文之尊之也哉漢唐以来雖尚經學而其取士時有醇疵我朝以四子書試士而又昌眀經籍洪惟聖祖仁皇帝御纂四經以為千秋鴻寳至世宗憲皇帝繼志述事時賜近臣我皇上道叶羲圖心涵奎璧紹聞衣徳稽古右文分頒各直省學宫俾得敬謹摹刻以便編摩又纂三禮以納天下斯民於軌物從此四海九州家絃尸誦以澡其身以浴其徳以一道而同風莫不由此是我國家經學之盛千古未有也臣等依日月而覲龍光敢不勉陳固陋以副對颺之盛典乎經解杭世駿自漢以前有六學六藝之目而不立經名唐陸龜蒙謂經解之篇句名出於戴聖王輔嗣因之以易為經杜元凱因之以春秋為經孔子曰學詩乎學禮乎易之為書也原始要終知我以春秋罪我以春秋未嘗稱經稱經非聖人㫖不知志在春秋行在孝經孔子嘗自稱經矣六經陳迹之語見於荘子天運篇澤於四經之語見於管子戒篇房元齡注四經謂詩書禮樂始乎誦經終乎讀禮之語見於荀子勸學篇楊倞注經謂詩書是纂修刪定以後已立經之名矣六經始扵經解易詩書禮樂春秋是也漢興制氏善為樂世世掌太樂官但能紀其鏗鏘鼔舞而不能言其義故立博士祗於五經至蜀文翁使相如東受七經見蜀志秦宓傳華陽國志云遣雋士張叔等十八人東詣博士受七經盖斯時孔壁之論語孝經已出故也唐初號谷那律為九經庫似九經之名至唐始定而沈約志宋書之百官則云周易尚書毛詩禮記周官儀禮春秋左氏傳公羊穀梁各為一經論語孝經為一經合為十經洎唐劉孝孫作為問對而十一經之名定矣陸徳眀撰經典序錄祗稱九經而亦為孝經論語孟子爾雅撰音是十三經已萌芽於此但其末附以老荘二子則經之名反隐故開成刻石長興鏤板亦祗有九經斯時孝經以石臺别行爾雅為書學専習故不兼及耳孟蜀廣政毋昭裔等漸次刋布逮宋淳化始得畢功然孟子尚闕宣和間席旦刻於成都學宮而後備李至判國子監五經之外請修七經之疏以備刋刻仍未及於孟子也明嘉靖萬厯間南北兩雍前後幷刻而十三經之名遂徧海宇矣此諸經分合之大略也秦政焚書易以卜筮獨存書禮晚出㝡為殘缺孔恵蔵古文尚書於屋壁至孫臨淮太守安國為之傳遭巫蠱事未獻東晋豫章内史梅賾得而上之齊建武四年有姚方興者又得舜典二十八字合之河内李氏所獻泰誓書之古今文備矣禮出淹中劉向父子所校有眀堂陰陽王史氏惟士禮以后倉周官以河間獻王傳平帝時又有獻逸禮毛詩左氏春秋者而諸經畢出矣經之有章句者詩則齊之杜撫趙之毛萇禮記則馬融盧植春秋則服䖍論語則包氏周氏孟子則趙岐是也其以注稱者鄭元王弼韓康伯之於易鄭元之於三禮鄭興鄭衆之於周官犍為文學劉歆樊光李廵孫炎郭璞之於爾雅唐眀皇之於孝經是也其以疏稱者孔穎達之於五經楊士勛之於穀梁徐彦之於公羊賈公彦之於周禮黄孟悊之於儀禮元行冲之於孝經皇侃之於論語孫奭之於孟子邢昺之於爾雅是也其以傳稱者孔安國之於書毛萇之於詩是也其以解稱者杜預之於左氏范寗之於穀梁何晏之於論語是也惟鄭康成解詩稱箋魯申培趙毛公說詩稱詁張華云聖人制作謂之經賢者著述謂之傳劉勰云傳者轉也轉受經㫖以授於後又云傳者轉師注者主解宅情曰章位言曰句劉知㡬云傳者轉也轉授於無窮注者流也流通而靡絶孔頴達云詁者古也古今異言通之使人知也呂忱字林曰箋者表也識也鄭以毛學審備遵暢厥㫖所以表眀毛意記識其事故特稱箋六經奥論云箋之為言魏晋間所以致辭於皇太子諸王者也鄭嘗以君師之禮待毛公而不擅改聖人之經眀矣邢昺云章句者訓解科段之名惟疏定於唐初其名無所詮解或以為後儒觧釋之書名曰正義今通謂之疏也說本亭林頋氏論其列於學官者漢初書惟有歐陽禮惟有后倉易楊何春秋公羊而己至孝宣復立大小夏侯尚書大小戴禮施孟梁邱易穀梁春秋元帝時復立京氏易平帝時又立左氏春秋毛詩逸禮古文尚書旋罷不用東漢建元時増至十四博士而罷穀梁立李封為左氏博士魏黃初中設五經課試之法又為穀梁立博士典午受命増十九人至江左復減為九因荀崧之議増至十二曰周易鄭氏王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官儀禮禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏以穀梁淺俗不足置㑹王敦之難不行宋又增至十六人不復分掌五經而謂之太學博士齊置鄭王易杜服春秋何氏公羊麋氏穀梁鄭注孝經沿及魏梁皆置五經博士唐開元間歸崇敬請以禮記左傳為大經周禮毛詩為中經尚書周易為小經各置博士一貟其公羊穀梁文疏少請共凖一中經通置博士一員開成元年判國子祭酒宰臣鄭覃奏太學新置五經博士各一人宋有九經五經三禮三傳諸科元祐時以詩禮記周禮左氏春秋為大經周易公羊穀梁儀禮為中經紹聖元年復立春秋博士崇寧又罷之元皇慶中始制經問大學論語孟子中庸内出題設問並用朱子章句集注詩以朱子為主尚書以蔡氏為主周易以程朱為主兼用古注疏春秋用三傳及胡氏禮記用古注疏明仍其制而注疏少衰矣三易掌於周官太卜連山宓戲歸蔵黄帝山海經云伏羲氏得河圖夏后因之曰連山黃帝氏得河圖商人因之曰歸蔵列山氏得河圖周人因之曰周易吴姚信曰連山氏得河圖夏人因之歸蔵氏得河圖商人因之伏羲氏得河圖周人因之三者之說皆合第信以夏易為出於神農周易為出於伏羲與山海經不同皇甫謐帝王世紀云夏人因炎帝曰連山殷人因黃帝曰歸蔵與信說同鄭康成注周禮連山似山出内氣也歸蔵者萬物莫不歸而蔵於其中賈公彦疏云連山易其卦以純艮為首艮為山山上山下是名連山孔頴達作易正義引鄭云夏曰連山象山之出雲連連不絶鄭鍔解周禮則云連山言如山之相連或以為雲㦯以為山說者未嘗衷一而歸蔵則無異同易正義解周易云言易道周普無所不􅊀賈公彦云以義名易則周非地號周易以純乾為首乾為天天能周布於四方故名易為周也鄭鍔則兼疏二義言如天覆無不周而變易無窮是周之義與孔賈合而以變易言易脫康成易簡不易之義正義又按世譜等書神農一曰連山氏黄帝一曰歸蔵氏並是代號周易以文王所衍故謂之周易猶周書周禮題周以別餘代沙隨程氏晦庵朱氏本其說遂有周為代名之解三易稱名不同如此易自商瞿五傳而至田何何授王同周王孫丁寛服生四人王同授淄川楊何齊即墨成廣川孟但魯周霸莒衡胡臨淄主父偃皆以易至大官要言易者本之田何丁寛復從周王孫授周氏古義傳授同郡田王孫王孫授施讐孟喜梁邱賀由是易有施孟梁邱之學張禹彭宣之學本於施而施氏之學多言隂陽災變之說梁邱之學又本於京房迨後費直又合文言十翼於是遂有費氏之學今文尚書者出於伏生口授以𨽻書寫之故也古文尚書者出於孔壁以竹簡寫蝌蚪文朱子疑其較今文易讀又晚出而獨無譌損故吴棫羅璧陳振孫王柏吴澄歸有光羅喻義等紛然皆著辨焉詩分四家於魯則申培公於齊則轅固生燕趙間言詩者本之韓嬰頗與齊魯間殊要之一也魯國毛亨趙國毛萇皆為詩作訓詁傳毛氏行而魯詩亡於西晋齊詩亡於魏韓詩雖存無傳之者鄭樵以為亡於五代也春秋漢初有四家之學鄒氏無師夾氏有錄無書鐸椒虞卿之微見於劉歆七略盖為左氏而作漢興不立博士故不果傳禮有五傳高堂生授蕭奮奮授孟卿卿授后倉倉說禮數萬言號后氏曲臺記授沛聞人通漢梁戴德戴聖沛慶普曲臺記凡二百一十四篇戴德刪之為八十五篇戴聖刪之為四十六篇明堂位樂記月令三篇則馬融所益也禮記正義云孝文時求得周官不見冬官一篇乃使博士作考工記補之馬融云孝武開獻書之路周官出於山巖屋壁漢書謂河間獻王得之非孝文時也宋王安石黃度皆不之信闕而不觧俞廷椿王與之邱葵陳友仁舒芬等五家皆謂周禮得於秦火之後官宜少不宜羡今天官及春夏二官之羡者九地官之羡者十有六秋官之羡者五從其羡而求之冬官皆不亡於是割五官以補之而周官復裂而不完矣儀禮孔壁古文多三十九篇存者十七篇外有天子廵狩禮朝貢禮王居眀堂禮烝嘗禮朝事儀見三禮注學禮見賈誼新書古大明堂之禮見蔡邕論元吴澄嘗取二戴禮為禮經補逸其實與古所逸之禮𣺌不相合漢初論語三家魯人所傳曰魯論語常山都尉龔奮長信少府夏侯勝丞相韋賢父子魯扶卿太子太傅夏侯建前將軍蕭望之並傳之名家齊人所傳曰齊論語視魯多問王知道二篇其二十篇中章句頗多於魯少府朱畸瑯琊王卿御史大夫貢禹尚書令五鹿充宗膠東庸生並傳之惟吉名家又魯共王壊孔子宅於壁中得古文論語凡二十一篇有兩子張篇次不與齊魯同博士孔安國為傳後漢南郡太守馬融注之安昌侯張禹授魯論於夏侯建又從庸生王吉受齊論擇善而従號張侯論㝡後行為世所貴大學在小戴禮第四十二篇原無經傳之分二程子始以已意更之而朱子為之章句董槐葉夢鼎王栢則謂致知格物章未嘗亡欲還知止物有本末於聽訟之上王守仁尊信其說為旁釋一巻以發明之其實注疏之本字句脫簡石經之本又出譌撰不若朱子所分節次為易曉而可習也今文孝經出於顔貞古文孝經蔵於孔恵而古文有二有長孫氏所傳有鄭氏所注顔本十八章長孫氏多閨門一章又衍出三章凡二十二章鄭氏得於王劭定於劉炫分庶人章為二曾子敢問章為三亦多閨門一章而先儒所記傳聞互異孔安國為之傳者長孫氏之本也以為亡於梁亂矣隋書經籍志至唐劉知㡬曷為有行孔廢鄭之說宋司馬光曷為有指解之書元行冲為之疏者劉炫所校之本也曷為歴五代及宋待日本僧進獻而始著自晦廣刋誤出而古今文之不同者定矣茂陵郭威以爾雅為周公所制然猗嗟刺魯荘淇澳羙衛武皆在周公之後揚雄以為孔子門徒游夏之儔所記以觧釋六藝者劉向以為張仲孝友之文後人所足張揖以釋詁為周公所作釋言以下或言仲尼所増㦯言子夏所益或言叔孫通所補或言沛郡梁文所考邢昺疏云皆解家所說先師口傳疑莫能明也馮休刪孟司馬光疑孟繼荀卿之非王充之刺而加甚者也陸筠翼孟虞允文尊孟仍劉軻之舊闢李覯鄭原蘇軾之論而辨之者也中庸自漢儒己有為之說者藝文志所列二巻是也梁武帝制㫖作中庸講義故其理較大學獨著宋天聖八年始以大學賜新進士王拱辰元豐中紬出列於四書朱子為之章句或問輔廣饒魯為之發明章㫖以暨元明諸儒析文約理何啻百家我皇上接道統於唐虞闡微言於洙泗由脩齊以致治平西山眞德秀瓊臺邱濬兩家之正論其必有所取也夫皇清文頴巻十二
