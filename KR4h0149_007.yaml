body:
  text: 論春秋論趙盾一汪琬春秋魯宣公二年秋九月晉趙盾弒其君夷臯於是左丘明公羊髙榖梁赤三子以為弒君者趙穿也經之與傳其説宜何從汪子曰三子者之説非有大悖於孔子也當是之時使穿不得盾必不敢行其事使盾不得穿必不能遂其謀何以言之豫嘗略考史書所載篡國之臣若趙髙之弒二世也使閻樂司馬昭之弒髙貴鄉公也使成濟成倅劉裕之弒晉安帝也使王韶之其弒恭帝也使褚淡之兄弟朱全忠之弒昭宗也使朱友恭氏叔琮夫是數人者欲為篡逆必先授意於其黨其黨亦樂為之用此與趙盾之事何異辟之於盜羣盜行劫其一雖不行而實隂主其謀是則劫之魁也反不謂之盜乎故三子者之説非有大悖於孔子也孔子誅其心三子者舉其事也然則三傳果無失乎曰有之左榖皆取董狐之言以反不討賊為盾罪吾謂盾雖討賊亦不免於書弒何也豫更考魏唐之事司馬昭既弒髙貴鄉公遂收濟倅兄弟殺之朱全忠既弒昭宗已而朝於京師亦殺友恭叔琮夫二人之心甚譎謀甚狡其殺濟倅友恭叔琮者豈非欲自解於篡逆哉然天下後世卒不以此薄兩人之罪故使人臣無弒君之心雖力不能討賊亦必不以惡名加之茍有其心雖狡譎如司馬昭與朱全忠者亟除其黨以自解猶無益也吾故有感於歐陽子之論而為之廣其説如此春秋論趙盾二汪琬按左氏晉趙盾救焦遂自隂地及諸侯之師侵鄭楚鬭椒救之遂次於鄭以待晉師趙盾曰彼殆將斃矣姑益其疾乃去之汪子曰此弒其君夷臯之嵗也觀於侵鄭而盾不臣之謀見矣何也鷹隼之將擊也必伏其翼虎豹之將搏也必匿其形此無足怪也惟其不輕發於此是以大逞其毒於彼而莫之制也以盾率晉國之衆而合宋衛陳三諸侯之人成師以出惟敵是求何有於鬭椒之偏師哉然且不戰而去之者非形弱勢詘也當此之時內難將作既不暇相持於外而又以為戰而勝則橫挑強楚之怒戰而不勝則無以懾服國人之心如是而欲行大事其誰與同惡者盾於其中固有深謀在焉故寧稍斂其鋒強抑其隂鷙之氣而不欲輕用之於楚也不然豈文公襄公之烈猶存而盾遽畏楚乎哉齊崔杼伐魯北鄙魯公患之孟公綽曰君何患焉崔子將有大志不在病我必速歸既而果不為冦齊師徒歸夫崔杼所用蓋即盾之餘智也特杼親射其主而盾則假手乎人耳三傳不察遂欲以不討賊者原盾罪抑知盾之造謀也久矣與崔杼同罪而異其罰豈足為春秋之法邪吾嘗論之自古悖亂之臣未有不合一轍者也劉裕既入關中可以速得志於西北矣而自謂根本未固遽引兵東歸是時逆迹猶未形也然崔浩則先知之以告魏主浩之善料事亦何減於公綽之料崔氏哉今夫功利之在目前也是下愚之所昧而中智之所爭也有人於此不貪近功不邀厚利其人茍非大美則必為大惡若趙盾侵鄭而不戰崔杼伐魯而不寇劉裕至關中而不復西略此皆大惡無疑也蓋其所欲者益深所圖者益狡則凡目前之功利舉不足以入其心而動搖其志惜乎侵鄭之時列國卿士大夫無一人如魯之孟公綽魏之崔浩能逆窺盾之本謀者可歎也然而邲之役荀林父不欲戰則先縠不從鄢陵之役士燮不欲戰則欒武子不從顧盾將去楚而其衆莫敢與之抗此又盾之積威足以劫之也夫河圖論李光地昔者聖人之作易也明於隂陽之運察乎日月之紀窮乎鬼神禍福之徴究乎人事吉凶之兆故立象以盡意衍蓍以極變使夫知其道者則知神之所為而玩其占者亦足以獲天之祐而動無不利然則聖人之於易雖微河圖其可無作乎蓋圖者天之所以啓聖人之心易者聖人所以承天之意天人之際未有不相符而可以有作者也自孔子大傳所列十數五位若指諸掌又曰河出圖洛出書聖人則之而究其藴則曰所以成變化而行鬼神也嗚呼可謂盡矣變化日行於天地之間凡夫動靜明晦開闔出入枯菀存化之雜然於吾前者皆是也而其所以然之機則謂之鬼神夫天地之所以為天地者以有鬼神變化也而河圖具焉然則作易之精意亦舍圖奚取哉仲尼既殁易道湮廢自卦爻之辭昭然具存固已盡失其義又况乎天人授受之祕有在於語言文字之表者無惑乎其不傳也漢之儒者雖不能曉暢精微而守之未失至於有宋經學為盛而異言轉多劉牧以九為河圖十為洛書比之舊傳正為顛倒歐陽修不信大傳遂與河圖洛書皆以為贋而并棄之惟朱子表章發明而圖書始顯然自元以來挾異見而滋羣疑者尚不勝其紛拏故四千餘年理義象數之宗書契文字之祖以至於今昧昧也愚學易十餘載既知返之圖書以求其端而竊疑夫為之説者何紛然其擾也於是盡去五行生克之論獨以隂陽竒耦之數縱橫而推之逆順而播之然後始得不疑於圖書之理與夫聖人所以則之之由蓋河圖之半竒半耦者兩儀之分也四方者四象之判也一二三四六七八九互為內外者八卦之交也中宫五十者太極元氣之所居也此其大致也以其分限言之則陽始於北而盛於東消於南而終於西故在圖之竒數則北東居內而南西居外也隂始於南而盛於西消於北而終於東故在圖之耦數則南西居內而北東居外也內者主之位也外者賔之位也得位為主而用事則日進而盈失位為賔而不用事則日退而虛夫自寒暑二氣之所以升降日月明魄之所以死生大而元會之所以循環細而呼吸之所以出入無一非盈虛之變也無一非內外之交也君子小人之進退天理人欲之消長學術之所以邪正世道之所以汙隆無一非盈虛之變也無一非內外之交也甘苦之相生憂樂之相因禍福之倚伏吉凶之反覆無一非盈虛之變也無一非內外之交也以易而言之則乾龍之潛藏而天地之心見矣姤豕之躑躅而氷霜之勢成矣內陽而外隂則為泰交之盛矣大往而小來則為斂德之時矣是故內外之位賔主之分進退之勢盈虛之理圖者圖此者也卦者畫此者也以邵堯夫八卦之位觀之則自震之一陽歷離兌之二陽以至於乾是左方之卦皆陽內而隂外無異夫河圖之左方也自巽之一隂歷坎艮之二隂以至於坤是右方之卦皆隂內而陽外無異夫河圖之右方也然則所謂則圖而作易誠如合符而比節非天地不能開其先非聖人不能承其繼也若夫五行之義四象之文生克之變老少之交得乎此者其於衆説統之矣欲歸夫易卦之本指其無先以衆説亂之而可哉先天圖論李光地自秦而後易圖象之學不傳其在傳文可考者則出震一章頗列八卦之位而終不究其説是故學者鮮用心焉而但緣文生義以穿鑿於文字之間蓋易之迷所從來也尚矣其偏為象數之學者又皆有單傳别授非易之正如京焦卦氣之法有侯辟公卿之位推易配氣始於中孚此則揚子草元之所因歷家之所用其在漢世以象數言易者莫此為盛然終莫知其所自來也獨後漢方士魏伯陽作參同契之書言養生之要其首章納甲之法以震為朔旦兌為上弦乾為正望巽為既望艮為下弦坤為晦日其隂陽進退之候似頗與邵氏先天之旨相契蓋朱子所謂方外之流隂相付受以為丹灶之術者其指此與然以愚考之納甲之説蓋以十干始終之位推而得之如乾為甲壬坤為乙癸蓋甲乙壬癸者十干之始終乾坤者八卦之始終也凡畫卦者自下而上故庚辛為震巽戊巳為坎離丙丁為艮兌也伯陽又因月之朔晦弦望之方以配合其説如生明之月在庚上弦之月在丙正望之月在甲皆以初昏言之震兌乾之位也既望之月在辛下弦之月在丁晦日之月在乙皆以平明言之巽坤艮之位也其與先天所以得圖之法迥然不類然則自堯夫以前先天之圖其不傳於世也審矣朱子又謂授受出自希夷其必有考然而邵氏再造之功則實與伏羲始作相配自邵氏歿後此圖稍出聞者皆創獲而莫之信楊龜山曰八卦有定位而先天以乾巽居南坤艮居北卦氣首中孚而先天以復為冬至凡若此類皆莫能曉也陸象山曰先天圖非聖人本意有據之以説易者陋矣夫以龜山象山之賢而其疑若此况其下者林栗袁樞攻先天尤急蓋當是時尊信而表章之者朱子一人而已自朱子而來至於今翕然無復異議矣然往往新學小生以為自孔子後真有是圖而不知邵氏之功如此其大朱子之傳如彼其艱也可勝歎哉或曰先天之圖果伏羲之本也與曰何為其不然也大傳稱易有太極是生兩儀兩儀生四象四象生八卦又曰因而重之爻在其中矣夫如是則一每生二者自然之理也隂陽交錯者變化之妙也其方位布列則雖古未之見然説卦所謂天地定位山澤通氣雷風相薄水火不相射者則其對待之體也雷以動之風以散之雨以潤之日以暄之艮以止之兌以説之乾以君之坤以藏之則其流行之用也其位與序昭然亦不可謂於古無初也以其數而論之則左右二方者寒暑之運也隂陽太少者四時之交也八卦者八節之分也二十四畫者二十四氣之判也三百八十四爻陽爻為晝隂爻為夜二分之晝夜平故積爻之算至於臨遁之間陽四十八隂四十八猶春秋分之晝夜各四十八刻也二至之晝夜偏故自乾以前積爻之算陽五十六分隂四十分猶夏至之晝五十六刻夜四十刻也自坤以前積爻之算陽四十分隂五十六分猶冬至之晝四十刻夜五十六刻也此其自然之象自然之數不待牽合而自無不應以視後世規天紀日之繁增除裁補之贅其相去不亦逺乎况乎其道之彌綸天地者不可以象數求也故君子之於先天歿身焉已矣後天圖論李光地易有八卦因有八象其實則天地水火而已何則天地定位則行乎其間皆水火也水火之精則為日月水火之氣則為寒暑水火之象則為晦明水火之變則為風電雷霆雨露霜雪凡夫騰降上下往來聚散皆是物也以易論之則天地水火之外為象者四風雷山澤也然風則天氣之行下交於地者山則地形之隆上交於天者雷則火為隂所壓奮而起者澤則水為陽所驅散而下者此四象者蓋亦天地水火之交而已矣以卦畫推之乾之下爻變隂則巽也坤之上爻變陽則艮也離之上爻變隂則震也坎之下爻變陽則兌也此造化之妙八卦之精也是故易首乾坤中坎離而終以既未濟或曰邵氏所謂先天之圖者乾坤定上下之位坎離列左右之門固也而其有始震終艮之圖何也曰先天體也後天用也體則以天地為尊用則以水火為主所謂雷者火之方升者而已所謂澤者水之始降者而已隂陽始於春秋而極於冬夏故雷澤者水火之交也水火者雷澤之極也天地以水火之氣行乎四時涼燠寒暑惟其所司焉風與雷相薄火之勢所以行也山與澤通氣水之潤所以升也風之氣本乎天山之形本乎地天地之用寓於二物而天地無功焉故一在坎之後一在離之前所以佐發生於東方而乾坤退處於西成之地也或曰南北隂陽之正位也乾坤在焉尊也黜居偏也烏乎可曰黜乾坤以尊乾坤夫辨方正位者分也分則不可易也若夫受事任勞者時也時則有少而出長之先卑而踞尊之位於是乎乾坤有避而弗居者矣必也其受成之時乎夫受乎其成者則必處乎其後也又何害於尊乎哉然則大傳言神妙萬物敘六卦而不及乾坤何與曰此所以為尊之至也前言其位故列之此言其用故去之是則乾坤之在後天雖有位焉而無用也無用之用用之主也聞樂知德論李光地禮樂二者皆聖人所以治天下之具然禮先而樂後禮以制治而樂以象成故曰於樂觀其深矣言其本於性情流乎德化其效至於淪肌浹髓而不自知故孝經曰安上治民莫善於禮移風易俗莫善於樂此知政知德之説也且夫政與德固相為表裏之謂非政則德無所施非德則政無所本德者人君所躬行而心得而禮樂則皆政之屬也今以政歸禮以德歸樂何哉蓋本德以敷政則禮於是行而民以節矣以其先也故言政者歸之禮也政成而德洽則樂於是興而民以和矣以其後也故言德者歸之樂也雖然樂之所自作者非一有陳祖宗之功德者則如商之元王相土成湯武丁周之后稷公劉古公王季后嗣述而歌之者是也有象已之功德者則如韶樂作於舜大武作於武九成以象代堯六成以象滅商聽其歌觀其舞則知其當日之事與志者是也若乃朝會燕饗征行凱還則敘其交歡之心致其勸勉之誠道其閔勞盡下之意於以被之絃歌用之朝廷學校至於民間鄉黨閭巷之樂則多采之謡俗之所得如周有二南邶鄘以下十五國之什漢有趙代秦楚之謳而擇其辭之美志之善可以語可以道古於以用之黎庶而以感民心以淑民身此則樂之大致然也然此四者源流之所自不同而皆謂可以觀德則又何哉蓋祖宗之德德也已之德亦德也上下交而志同德之行也感人心而天下和平德之至也故曰聞其樂而知其德也漢氏以還四者之迹僅存而其意微矣故郊廟宫庭閭巷之所用猶是也然班固謂漢郊廟詩歌未有祖宗之事則所謂陳祖宗之功德者無矣武帝天馬之歌汲黯之所不恱秦王破陳之樂魏徴之所不觀則所以象已之功德者悖矣君臣賡答之詩固多有之然頌美相恱之辭多而忠愛交勉之誠寡且又未嘗叶管絃示臣庶也則朝廷學校之聲衰民間沉湎鄭衛之俗千年不變而鄉黨閭巷之音歇所以然者其立國根本既無積德纍仁之事而又禮法之不制教化之不修三綱之不正九疇之不敘太和之俗不成故雅頌之聲不興使其樂猶在也吾知不必季札子貢而知其德之涼矣然則樂之道其終不可復乎曰亦視其德而已矣孟氏有言今之樂由古之樂也祖宗功德不可強矣誠能制禮法修教化正三綱敘九疇其本正矣然後取郊廟朝廷之樂潤色其聲音略論其律呂務使學士大夫皆能習其文而知其意拊其節而通其道至民間之樂雖未可以驟變然所謂默成於風俗而潛移於人心者其理不可誣也風俗既成人心既移則即今俗樂而頗采姚江王氏之論取其有孝弟忠貞節烈之行而歌舞之以興善志以助淳風以為復古樂之漸禮樂之道夫豈逺乎哉此之不務而列代修文之主好古之儒方且役智弊神於黍尺鍾律之間似乎伶倫之筒不得而樂卒不可興者此劉向臯陶之刑之論可為三復而歎息也太極論陸隴其論太極者不在乎明天地之太極而在乎明人身之太極明人身之太極則天地之太極在是矣先儒之論太極所以必從隂陽五行天地生物之初言之者惟恐人不知此理之原故遡其始而言之使知此理之無物不有無時不然雖欲頃刻離之而不可得也學者徒見先儒之言隂陽言五行言天地萬物廣大精微而不從我身切實求之則豈前賢示人之意哉夫太極者萬理之總名也在天則為命在人則為性在天則為元亨利貞在人則為仁義禮智以其有條而不紊則謂之理以其為人所共由則謂之道以其不偏不倚無過不及則謂之中以其真實無妄則謂之誠以其純粹而精則謂之至善以其至極而無以加則謂之太極名異而實同也學者誠有志乎太極惟於日用之間時時存養時時省察不使一念之越乎理不使一事之悖乎理不使一言一動之踰乎理斯太極存焉矣其寂然不動是即太極之隂靜也感而遂通是即太極之陽動也感而復寂寂而復感是即太極之動靜無端隂陽無始也寂然之中而感通之理已具感通之際而寂然之體常在是即太極之體用一原顯微無間也分而為五常發而為五事布而為五倫是即太極之陽變隂合而生水火木金土也以之處家則家齊以之處國則國治以之處天下則天下平是即太極之成男成女而萬物化生也合吾身之萬念萬事而無一非理是萬物統體一太極也即吾身之一念一事而無之非理是一物各具一太極也不越乎日用常行之中而卓然超絶乎流俗是太極之不離乎隂陽而亦不雜乎隂陽也若是者豈必逺而求之天地萬物而太極之全體已備於吾身矣由是以觀天地則太極之在天地亦若是而已由是以觀萬物則太極之在萬物亦若是而已天地萬物浩浩茫茫測之不見其端窮之莫究其量而莫非是理之發見也莫非是理之流行也莫非是理之循環而不窮也髙明博厚不同而是理無不同也飛潛動植有異而是理無異也是理散於萬物而萃於吾身原於天地而賦於吾身是故善言太極者求之逺不若求之近求之虛而難據不若求之實而可循故周子太極圖説雖從隂陽五行言之而終之曰聖人定之以中正仁義而主靜立人極焉其示人之意亦深切矣又恐聖人之立極非學者可驟及也而繼之曰君子修之吉修之為言擇善固執之謂也而朱子解之又推本於敬以為能敬然後能靜虛動直而太極在我嗚呼至矣先儒之言雖窮髙極深而推其旨不過欲人修其身以治天下國家焉耳學者慎無騖太極之名而不知近求之身也賈董優劣論陸隴其天下之士惟才學兼至者為上不幸而有所偏勝與其才勝於學也母寧學勝於才何則才勝之人明於事而熟於勢人君用之則國體立焉國勢安焉然其失也純駁兼施義利雜用有可見之功而未必無可憂之慮學勝之人守於理而秉於義人君用之或迂而罕效焉或拘而難達焉然其得也道足以格主而操足以範俗無一時可著之效而有積久可恃之功明乎此者可以辨賈董之優劣矣賈生者漢之名臣也董生者亦漢之名臣也當文帝之時諸侯強於內中行説之徒謀於外而朝廷所以厲風俗厚德澤固根本正體統者又皆未有其具上下恬然不知憂戚乃賈生獨為痛哭流涕於其間考其所陳皆鑿鑿可行此固絳灌之所不能言而鼂錯袁盎之所不能知也則賈生者豈非一時之傑哉武帝之時主驕而臣諛所事者征伐所尚者聚斂所用者嚴刑峻法見其利不見其誼計其功不計其道而董生獨持正議於其間觀其廷對之言於禮樂教化之際未嘗不反覆而陳之也於公私義利之辨未嘗不正色而道之也於傷肌膚斷支體之習未嘗不咨嗟而戒之也此固公孫𢎞石奮之所不敢陳而張湯孔僅之所不欲聞也則董生者豈非一時之傑哉使賈生之䇿用於前則漢有久安長治之業董生之䇿行於後則漢有更化善治之休是二子者固未容優劣也然嘗試以其言考之賈之言多及於利害而董則主於義理也賈之言多至於激烈而董則穆然和平也激烈者其中猶有浮躁不平之意而和平者其源本於莊敬誠恪之餘涉於利害者與世運爭勝負而一害去未必無一害興主於義理者與性情為流通而義中自有利義中自無害賈之言其最精者在審取舍定經制而已所謂道之大原出於天者有之乎所謂正心以正朝廷者有之乎所謂正其誼不謀其利明其道不計其功者有之乎董之所蔽者獨隂陽災異之説耳使并此而去之雖與關閩濓洛比肩可也董豈賈之所及乎蓋賈生者以才勝而董生者以學勝才學之分優劣之辨也鼂錯之才近於賈生然其才益露而其敗立見其學賈生而不得者乎貢禹匡衡之學近於董生然其學益拘而其業益卑其學董生而不得者乎學董生而不得猶不失為迂濶之儒學賈生而不得則功利誇詐而已末流之弊又優劣之辨也要之賈生亦何可及也以聖門言之董生狷者也賈生狂者也夫子思狂者而不得然後欲得狷者而見之蓋狂而不學則不如狷狂而學焉則固出狷之上也嗚呼使賈生之才而加之以學又豈董生之可及也哉論姚崇十事陸隴其大臣之事君也必先有以堅君意而後天下之治可成也君意未堅而欲與之圖治則吾以寬仁進而君且流於殘薄矣吾以弭兵進而君且溺於好大矣吾以防微杜漸輕賦節用之説進而君且不勝其牽引矣吾以尊賢敬士開誠布公之説進而君且目為迂濶矣是故始乎堅而終乎怠者有之矣始之不堅而能成其終者未之有也三代以來如伊尹傅説之於商管仲之於齊商鞅之於秦雖其王伯異趨純駁異致莫不於其始進之日有以得之其君是故功成而不勞彼唐之姚崇其亦知之矣考崇所陳十事不過因當時所急者而言之彼見夫垂拱以來用法刻深羅鉗吉網紛紛於時也而曰政先仁恕見夫邊隅未靖突厥吐蕃未可力臣也而曰不幸邊功見夫武韋之禍幾危宗社而俳優宦寺乘寵恣肆也而曰監祿莽閻梁之禍曰戚屬不任臺省曰閹人不得與政曰佞幸犯法無寬見夫神龍之世賦斂無度奢侈淫泆公主媫妤多營佛寺也而曰絶田賦外貢獻曰絶佛道營造見夫五王被戮蕭岑繼誅而王魏直諫之風日逺也而曰接臣下以禮曰使諫官無忌諱凡此皆因當時所急言之治天下之事固不止此而人臣之效於君亦不盡於此獨其能以十者要説於上使人主之意既堅而後徐起而圖之嗚呼此其所以成開元之治也歟君志既定於寬仁則張湯趙禹之徒不得以嚴刑惑矣君志既在於弭兵則大宛月支之使不得以開邊誘矣君有防微杜漸之志則外庭之事必不決於宮闈尚書之柄必不屬於外戚𢎞恭石顯不得主樞密張放李明不得侍遊宴君有輕賦節用之志則雉頭之裘不以入內府湘宫之役不以煩將作君有尊賢敬士開誠布公之志則黥劓之罪不上於大夫放逐之禍不及於臺諫極天下之治皆始於吾君一念之堅而實始於大臣之有以堅之也是道也固伊尹傅説之所以成其王而管仲商鞅之所以成其伯也是故開元之時宋璟韓休張九齡皆稱賢相而吾必以崇為首何也堅帝意者崇也使崇無以堅之則明皇之荒宴不待天寶而九齡之徒又何所施其力歟雖然崇能必之於開元而不能必之於天寶何也曰崇知有以堅之而未知所以養之也君志固不可不堅而又不可不養堅之者存乎一日而養之者在乎平居古之為大臣者日以道德仁義進其君而又多選天下端人正士為其左右使其君日就月將而不貢於非幾凡此所以養之也夫是以堅者愈堅雖有姦邪不能惑之故曰惟大人為能格君心之非明皇之惑於李林甫楊貴妃也是其養之者未至也不然豈其二十年憂勤之主而一女子一小人能使之顛倒回惑而不可收拾也耶君子是以不滿於姚崇也崇讓論上韓菼行一物而衆善皆得者其惟讓乎讓德之基也禮之端也亦即禮之實也孟子以無辭讓之心為非人然而赤子之時間有而汨於利欲誘於習俗此心至於迷溺澌滅而不自知豈特不能充而已古有能讓千乘之國而不能不見色於簞食豆羮者忽其所輕也挽近世直視簞食豆羮皆千乘耳豈待千乘哉且夫千乘固吾所應有所以云讓若夫本非吾所必當有去之不顧乃其當然惟妄據以為已有遂不甘於讓而乃敝敝焉與人爭嗟夫爭之途一開而五倫蓋多故矣而仕路為尤甚故見於朋友間為多詩曰人之無良相怨一方受爵不讓至於已斯亡不讓求得也曷云亡也窮求之心逞忮之毒巧中敵我者以不及防因以得吾志而不知他人亦將挾吾之俯以伺其後也蟬得美蔭而忘其身螳螂方欲捕之異鵲又從而利之類相召也寧有既乎終亦必亡而已矣即間有固寵以自存而位愈髙則望愈減任愈重則補愈難君子不以沒身為幸而以後世為憂奈何湛濁水而迷清淵也斯其故在祇知有已不知有人尤在祇知有官不知有已夫不知有已莫如反已士莫重乎有已也已而受官當實盡乎其在官者古人所以貴致身也如其不能或量力或知幾三揖一辭吾去官而已故在矣蓋委吏乘田亦有不容輕處者而又何競焉徒知有已莫如平情人者已之推也我必欲勝人人亦將勝我如人猶此情也兩情必當相平萬一人無此情則俯視我為何等且夫君子欿然常若不足即薄技微長亦事事有不如人之恐而敢必加乎其上哉反已忠之屬也平情恕之屬也故欲正士大夫之心自能讓始欲興士大夫之讓自忠恕始崇讓論下韓菼孔子曰能以禮讓為國乎何有言教之本風之自也夫上之所倡下之趨也上以官為髙則官重上以讓官為髙則官輕人情莫不趨於所極重者久之則官愈輕人皆思所以自重而讓道成矣自然之勢也嘗檢晉庾峻敦禮讓表及劉實崇讓論皆推本於為國者以倡何有之化其言咸有補於當世峻之言曰聖王御世因人之性或出或處故有朝廷之士又有山林之士山林之士清劭足以抑貪汙退讓足以息鄙事先王嘉之臣愚以為古者大夫七十懸車今自非元功國老三司上才可聽七十致仕其父母八十可聽終養其有孝如王陽臨九折而去官潔如貢禹冠一免而不著及知止如王孫知足如疏廣莫若聽時時從志實之言曰人臣初除皆通表上聞名之謝章唐虞之時衆官初除莫不皆讓也謝章之義蓋取於此夫三司有缺擇三司所讓最多者而用之此為一公缺三公已豫選之矣四征缺擇四征所讓最多者而用之此為一征缺四征預選之矣尚書缺擇尚書所讓最多者而用之此為八尚書共選一尚書也余嘗韙斯二説夫古者七十致仕固也然四十方仕計用其力三十年爾今有二十而已通籍者矣其亦可以六十為斷乎至如王陽貢禹之流於今為不世出之士又不可以六十為限也父母八十聽終養吁嗟晚矣父母不必皆八十也其有疾病又不論年也今令甲不以年限誠善竊聞諸道路或八十猶不以終養請此為無人道之尤者豈止不能讓而已哉謝章得薦賢自代唐宋猶然今其法已蕩然無存即間有徒費簡紙者不過外任之大僚而京朝三品以上官皆聞命而即受事如召一吏何以勸讓如實言誠可勵世雖然蒙有懼焉懼夫除官而許之薦官薦者之意尚未決而求者已盈門矣不得則怨是爭之府也且使薦者而不公耶有識者固將唾之其公耶必從而效之如實言所讓最多者其必然也而彼欲爭之者苐中以朋黨之一言即一網盡矣故此法尚未可遽行嗚呼孰使夫古賢臣之嘉言讜議而有所不可行其非人心之憂也與皇清文頴卷七
