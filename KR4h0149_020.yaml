body:
  text: 記御試乾清宮讀書記韓菼粵稽古聖恭天成命嗣無疆大歷服皆擅神靈之資生知安行允臻厥道必孜孜于典學稽古以多聞集事施於有政治績大彰然自堯舜以來性之之質既鮮而厥修未純亦或勤而罔繼即有令辟治不古若過此以往尤蔑有聞天啓聖人斯道攸托我皇上躬堯舜之資允執大中即位以來惟敬天法祖用布諴和於四方知千餘年不傳之緒罔不在於遺經既得之自性尤加以聖心闡圖書之祕溯濂洛之宗日慎一日緝熙光明以蒞萬幾細大具舉間者小醜亂略四征弗庭敷文德於堂階之上昭神武於敷天之下用濟大師之克以成萬世之功夫湛恩普被至渥也鴻猷駿烈至偉也載稽往策彰文治者或詘于武功而大業成者或弛其初服故舜之德至矣臯陶祗稱之曰罔愆禹之功至矣孔子祗稱之曰無間文武之謨烈彰矣而詩歌之曰無缺夫數聖人乃振古之所未能幾而僅免乎人情之所時有蓋若斯之難也小雅六月諸詩多歎美宣王然至沔水鶴鳴而微辭見矣我皇上兢兢于大命之不假易成功之不居以不已之誠行不息之健時未闓明御乾清宮延接儒臣陳說古訓四子五經將以次闡繹天言往復靡奧不窮及視朝之暇深宮淵默研精味道松雲棟牖酬對先聖相悅以解常夜分忘寐以至于挈壺告時雞人司旦猶弗輟也夫接見儒臣暫也而夙寤晨興之弗皇寧者韋帶之士所猶難也披尋往牒迹也而精微之獨授受者大賢以上所弗能窺也蓋聖心惟恐有愆有間有缺或如宣王令德之不終用是退省以質諸數聖人云爾微臣陪法從之末無能仰測髙深之萬一顧記言記動其職也形容盛德以期于永永勿替亦臣之分也謹拜手稽首略次其所及知而恭為之記以偹左右史之餘篇寶翰堂記汪琬前禮部尚書臣王崇簡偕其子今工部尚書臣熙延臣琬過其私第第有堂三楹顔曰寶翰蓋臣熙構之以敬櫝世祖章皇帝所賜御札及書若畫之所也於是導臣琬俾與觀焉軸以象犀襲以文錦發函啓帙爛焉盈目琬既畢觀則臣崇簡又命之曰女其記之臣嘗逮事孝陵不敢用固陋辭謹拜手稽首為之記竊惟我世祖章皇帝以天縱之姿神武之烈受天成命西剪巨寇南平小蠢十餘年之間薄海內外罔不賔服天下既定然後躬屈至尊數引見左右侍從通今好古之士講譯詩書修明禮樂舉郊祀之典考求籍田幸學之儀以肇興文治當此之時日不暇給矣及其萬幾稍閒則又能屏絶他好遊戲翰墨之林揮灑淋漓渲染生動竒葩異藻間見層出訖於今日其藏弆天府者固不知凡幾而寸縑尺素流傳人間公卿大夫之家皆裝潢而寶惜之夫亦不為少矣臣熙起家禁苑既用文學才望受知於上於是出典制書入備顧問遊獵巡幸未嘗不在交㦸扈䟆之次如此者凡十有四年而尤以恪恭勤慎獨為天子所親信故數蒙書若畫之賜視他侍從所得殆有加焉然後知君臣相得蓋自晚近數百年以來未有及臣熙所遘之盛者周書君牙之誥曰惟豫小子嗣守文武遺緒亦惟先正之臣克左右亂四方古王者所期望於大臣如此若我世祖之在御也功崇德懋亦既措天下於乂安而又慎擇一二腹心心膂之佐如臣熙輩者用輔毗我後人其知人不可謂不明詒謨不可謂不逺且大矣然則竭股肱之力奉揚嗣天子丕顯休命以無忘先皇帝之知遇而侈寵錫於無窮是皆臣熙之責也書又曰世篤忠貞服勞王家臣於王氏父子見之矣臺灣載舉賔興記陸葇疆宇貴於日闢者非僅籍户口府山澤計也不忍其人之不並育將取鱗介而衣履之且以詩書馴彼獷悍之性也歲庚午奉天子命主校九閩惟臺灣每科額中至字號一卷始於康熙二十六年丁卯迄今四年獲雋者二人矣臣於是伏見我朝立法之善聲教所被𢎞以深而遐邇勿間也既撤棘詢臺灣之風土於諸父老父老踴躍而前曰微太史問固將藉輶軒以入告其謂此一方民日漸漬於聲教而全閩百姓得以含哺鼓腹無雞犬驚戴聖朝之日月世世罔有紀極蓋其地在彭湖嶼之東延袤約二千八百餘里古稱雞籠淡水者其一也其人依山聚族以居名為土番無官長徭賦丁多者雄椎髻裸逐男子穿耳婦人束皮布裙蔽體婚娶不以媒妁遇長者於途則背立俟其過以展敬有事集議亦使長者居上宴㑹則團坐以竹筒酌酒跳舞而歌烏烏無歷日文字視草青為歲首性好勇裹藤善走履棘刺如平地村落相仇則以兵詰旦解嫌和好如初不習舟楫故畏海捕魚僅緣溪澗而善用鏢鏢長五尺有咫竹桿鐵鏃銛甚鏢鹿必中冬日無不飽鹿者射雉則拔尾以為幟棄去不食地多産竹巨者數拱長十餘丈伐以構屋恃鹿耳門九曲水以為險土宜五榖不以水耕硫磺富于巖壑之下兼以曝鹽爇炭利其生估客流氓廛居列肆珠璣布帛錢刀之屬恆以時聚亦有鬭雞走狗簫鼓琵琶之嬉而讀書識文義者無一人焉蓋自古以來聲教不相及也我皇上德威所播正朔所頒西洋荷蘭暹羅琉球以迄海外諸國咸不待諭而自至歲貢罔有闕顧兹彈丸黑子奚裨職方氏之版圖而逋寇未靖往往乘隙以擾海濵隴陌又立法苛猛虐用其民臺人吾人寧袵席外棄之乎自康熙二十二年癸亥敕鎮臣率一旅降其將卒收其土地上之于朝爰立監司分長吏設學校重師儒一切規畫與內地等八年之間生聚教訓島俗丕變皆知有品遜愛敬之道爼豆揖讓之禮每科輒舉鄉貢士一人以應賔興受天子恩至渥也父老之言如此猗歟盛哉聲教無外亘古所未有也抑聞之內固者必有外蔽樹藩戢籬所以綢繆牖戶也閩之有臺灣猶甬東之螺峰吳之姚劉沙粵之黎母山也崇明建則崑虞安堵瓊管置則番禺息烽定海設則四明箙矢此封守之明效大驗也臺灣鼎立郡邑而金厦銅鰲間疇昔之邊防外汛恬然拊諸户庭之內矣可以奠金湯可以遂耕鑿然則一隅所繫不綦重哉書云海隅蒼生萬邦黎獻共惟帝臣此之謂也謹記大同府威逺衛重修學記朱彝尊庠序學校之設非王政之本與三代盛時其地自黨遂達國都莫不有學其人自天子之元子以及士庶人子莫不入於學其典禮政令則自釋奠釋菜習鄉習射執醬執酳以至獻馘獻囚莫不備舉于學又擇君子之儒仁義忠信樂善不倦者以為之師士之入乎學者爼豆筐篚象勺干籥有其器鞉鼓椌楬笙鏞琴瑟有其音屈伸俯仰盤躃綴兆有其度藏修息游有其所而師氏以三德三行教國子司徒以六德六行六藝賔興之上無私師下無私學此三代之學所以盛美而大備也後世學日以弛典禮政令聽州郡吏專制之于上不必盡舉于學其僅存不廢者春秋上丁廟祀孔子釋奠釋菜而已為之師者未必盡擇君子之儒徒塊然自處學宮使之不由其誠教之不盡其才士亦隱其學而疾其師視學校為不急之務由是學宮坐以傾圯至有終歲不游于學者嗚呼學校王政之本至視為不急之務而聽其傾圯此君子之儒為人師者所甚憂也威逺衛當大同關塞之衝士之習于文事者蓋寡自邊隅晏安士始以絃誦相勵而教諭王君復能以仁義忠信之說善諭之衛故有學歲久將圯王君率諸生某等新之諸生咸樂趣事堂廡寢筵欂櫨榱桷㦸門璧池莫不具飾不侈不陋工既竣向豫請記嗚呼三代之學其得存于今者僅矣自夫師之不嚴而道不尊士于是失端本之學不知順行以事師長則無良師為之也若王君者樂善不倦可謂知本之君子矣昔魯侯既作泮宮詩人頌之有曰無小無大從公于邁又曰濟濟多士克廣德心至學校之廢鄭人刺之則曰縱我不往子寧不來諸生能廣王君之心日相與藏修息游於是講其德行習其文藝孰謂三代之學不可幾于今日也哉杜尚書疆理閩粵記朱彝尊皇帝受寶命一十九年海波不揚金門厦門以次列戍於時總督福建軍務都御史臣啓聖上言今投誠之衆率前遷徙界外之民勒歸農則無田可給勢將復去為盜莫若以界外田地按籍給還并弛海禁收魚鹽之利給軍食疏下廷臣議僉持不可二十二年夏靖海將軍臣琅克彭湖島秋臺灣平捷書至皇帝嘉悅解衣賜琅并製詩褒美焉誕諏吉日告祀孝陵冬十月戊寅皇帝若曰海壖之弗靖權畫地以民遷民之蕩析朕䀌傷于心久矣兹海澨永清界外田畝宜給還耕垡咨汝工部侍郎世鑑副都御史呀思哈偕往江浙吏部侍郎臻內閣學士石柱偕往閩粵欽哉其善體朕意定軍之制圖民之艱於是杜公拜命出是月己丑發京師明年正月踰大庾嶺皇帝申命進公工部尚書公乃諏日展界自欽州之防城始遵海以東歷府七州三縣二十九衛六所一十七巡檢司一十六臺城堡寨二十一給還民地二萬八千一百九十二頃復業丁口三萬一千三百定懸軍之營二十八而廣東之疆理復矣自福寧州西分水關始遵海以東歷府四州一縣二十四衛四所五巡檢司三關城鎮寨五十五給還民地二萬一千一十八頃復業丁口四萬八百定懸軍之營三十三而福建之疆理復矣是役也公往還嶺海舟車之跋涉不啻三萬里蠻烟瘴雨毒霧之交侵蛇蛟之屢舞公與傔僕六七臥起油幕虎觸其藩不懾鬼嘯于林不驚僉謂公之大勇賁􅀈莫及行則射麋以為粻縫蕉以被體安于惡衣食而不求溫飽忘一身之辛劬勞來安集俾氓反其宅商趂其墟苖秀于田水歸于壑牛宮豕圈雞栖鴨䦨各得其所甫終歲告成于闕下公雖不自言功而功已蓋于南國矣當周盛時召康公以重臣克親民事詩人懷之曰昔先王受命有如召公日辟國百里其後穆公繼之詩人又詠之曰式辟四方徹我疆土于疆于理至于南海夫以二公之奏績于先後者公以一人兼之宜為至尊注意而六卿掌其四也公既歸田考終特未邀易名之典彝尊公之里人也慮公巡視本末未上諸國史因追憶聞于公者鹿舉其大綱作記焉瀛臺御試記徐元正瀛臺在外朝之西碧水搖空林巒隱約類瀛洲之勝故以瀛臺名中為勤政殿皇帝嘗聽治其中左圖右史大朴不雕存茅茨土階之舊焉甲戌閠月上召詞臣及部臣之曾在翰林者賜食於殿前蓋異數也是日也旭日澄鮮曉風和霽鑾輿將至羣臣跪迎道左上為垂顧諸臣遂附清塵入苑門而左屏息以俟既而方舟翼然自烟林中出攝衣而登望浮橋曲折時隱時現於蒼葭緑葦間如遊龍蜿蜒水面朝霞映入波光皆成五色舟至勤政殿前分左右班上命列坐丹墀下柳翠拂衣槐陰蔭席塵土小臣得奉主恩側身瑤島真肺腑皆濯冰雪矣已而六膳三漿絡繹以至中使復傳天語體恤周渥如太和之鼓萬物人皆向榮宴畢謝恩訖復導至豐澤園園無丹雘雕鎪之制一望田疇土疏水灌塍畦繡錯緑苖搖偃縱者為阡橫者為陌髙者為場圃深者為溝洫麥隴陰陰馴雉鳴也水田漠漠白鷺飛也藻荇披紛游魚樂也渚浦蒙密鳬鷖集也井落之制宛然樹藝之規咸備仰見我皇上首重民事宵旰不忘奚待繪豳風而始知稼穡也至於繚垣修廡之間碧篠叢篁檀欒橚矗既滴露而迎風或拂雲而映日清嚴禁籞之中逺過淇泉渭川之勝蓋惟我皇上涵濡茂育德無不至故草木暢遂百物咸若東南竹箭盡獻瑞於帝苑耳於是遐覽既周設席陳几隨地布列或蔭竹林或依茂樹或倚廣榭或遵曲沼細至赫蹄湘管睿慮無不詳盡御題宣後復人賜酒果粔餌沆瀣瓊珍皆出自大官異製或有懷之而歸者以為榮寵羣臣感激惶悚各奮乃志抽管搆思上為訓定日未移晷隨所呈而甲乙之不爽銖黍是日德意隆洽恩禮兼優不特近今所希遘抑且往古所未聞禮容以接泰交之象也式燕以譽在鎬之義也矢音以陳卷阿之盛也微末咸周逮下之仁也不但此也知稼名軒所無逸矣耕穫有省敬天時矣階茨無華重民力矣一舉事而超軼古今類如此臣感被隆遇莫報涓埃天顔咫尺之下瞻視惟謹不敢備覽謹以所見退而敬為之記皇清進士題名碑記吳苑自唐制以進士取人相沿百千年至於今不廢其為法也益密其為途也益嚴天下莫不種學績文延頸企踵輻輳並進以庶幾一遇蓋朝廷之人才由是以升者十居八九而士大夫之所尚亦恆在於是焉唐李肇國史補云進士為時所尚既捷列名於慈恩寺塔謂之題名竊意諸進士曲江宴游聨鑣接席飛文鬬酒時聊以志其同授身名朋友相與之樂事而已然士子之所尚如是而上人所以風厲其下者亦遂因之以示意焉故國家有進士題名之碑雖不知始於何日要其從來舊矣蘇文公曰治天下者審所尚范文正公曰三代以下士惟恐不好名聖王之取材也兼收並蓄無擇於胥靡管庫然其所尚者可知已庠序學校以董之詩書禮樂以習之師儒父兄以督課之賢卿相大夫以鑒裁之大農水衡之錢耗於舉子者無算其重如此而及其既第之後無所别異泛泛然萍浮於仕宦之途其身雖貴而其名亦已湮矣則何以示所尚而勸天下士乎夫士人抑首雒誦屏户外弗事箋疏傳注穿穴蠧腐如此其勤且勞也升於鄉者百不得一焉雋於禮部者十不得一焉或白首窮經或少年盛氣幸而一遇則其精神文采流露而表暴雖不足幾於古之立言者而其所業亦不朽之一端也為之大書深刻列其姓名以傳之於世則其遇者可以自榮而不遇者亦未嘗不可以共勸此礪世磨鈍之道也然則是碑也其專為士而設乎且夫朝廷之所取材者多矣非其上之所尚則其賢固可録而不肖者亦可忘也今有人焉董之庠序學校之中習於詩書禮樂之事督課於師儒父兄者久鑒裁於賢卿相大夫者精而又嘗耗大農水衡之錢如是以進者則上之所以望其竭忠效能首公砥節孳孳矻矻以圖利於國家者為何如哉則下之所以竭忠效能首公砥節孳孳矻矻以圖利於國家者為何如哉茍可聽其沒沒而無聞則其人亦竟可沒沒而遂已也今亦既大書深刻列其姓名以傳於世矣其賢不肖方為天下所指名孰敢不淬礪鼓舞鋭營職業以蘄不辱乎其名不辱乎其名則國家之事固已集矣然則是碑也其抑為國家而設乎我世祖章皇帝廓清海宇文明煥開十八年間握鉛持槧之士由科第取卿相者殆不可以數計今天子欽明文思聖學邃深邁唐軼虞比隆三五菁莪之所樂育鹿鳴之所薦送雲集輦下射策中程者其名氏籍於禮部烺然可稽蓋自順治丙戌訖康熙辛未為科十有八矣然惟丙戌為龍飛首科碑亭巋然壯麗繼此未及踵行康熙二十六年御史疏言請令本科進士見為京官或其子孫在朝者立石並刻殿試榜文制書一道於碑額以彰國恩上俞已久迄今數載未及鳩工苑叨典成均誼當董倡因算石料工價書丹篆額之費凡需白金若干兩告之在朝諸君子莫不薦貨以集事經始於康熙壬申落成於康熙癸酉其碑用青白石髙八尺二寸濶三尺厚七寸五分座髙二尺濶四尺厚一尺五寸皆與前制相準已事而竣既整且堅觀覽之餘肅然生敬因為叙其係於士與國家之大者如此以見非若唐進士宴遊題識無關輕重云爾國子監題名碑記陸肯堂康熙二十四年春皇帝策試禮部貢士臣肯堂等一百五十人賜臣肯堂等及第出身有差例得詳其甲第名次姓字屬籍書石而鑱諸太學夫太學乃天下士之所聚而遊而制科為朝廷取士之大法以朝廷之大法而立石於天下士屬耳目之地蓋有作興勸戒之義存焉非徒偹舊典而已也我國家以制科取士久矣天子聖神文武禮樂修明自黨庠孰序以上達於王都辟雍鐘鼓之盛洋溢海內而天下之士皆靡然嚮風故三年則興其賢者于鄉又聚直省所貢士數千人試之於禮部而拔其尤者以進於天子之廷然後天子臨軒策之而定其甲乙蓋朝廷所以取士之法一聽諸有司進退之公而儲以為天下國家之用其制數十年循之而未有以異也逮乙丑春舉行㑹試上既擇左右大臣總領厥事乃獨頒御題者再欽定榜名賜敕者一多士風簷帖括皆得上邀睿鑒而後復臨軒策之而定其甲乙蓋是科取士更不同有司進退之常而聖天子慎審精詳以光大棫朴菁莪之治者為自有制科以來所未曾覯五月朔日上御保和殿選庶吉士畢復命大學士等宣諸士而誠之曰士子平日讀書稽古原欲窮經致用乃一登仕籍往往營求干進喪厥懷來今爾多士宜守其初心勿渝素履凡受內外職任當益加黽勉清操自矢恬靜寡營循分盡職潔已愛民以副朕造就人材至意煌煌天語聞之者無不聳惕震栗感激奮興退而相與歎聖天子之所以取士者慎審精詳而臣等以一介之微受朝廷知遇之恩誠曠世所未有也蓋上之所以求材者惟其法而下之所以應上之法者惟其材然人之材有非法之所能周則必有以鼓舞振勵乎其心然後天下皆欣欣然樂就於所趨而不倦惟聖天子愷悌作人而敻然出於常法之外故有司之所相循為故事者親舉而撡之譬諸天以剛健不息之心而流行發育乎萬物也鼓之以雷霆潤之以風雨而物無精粗巨細莫不各成其材聖天子以至誠懇惻之意畢貫乎至纖至悉之間操之以至精取之以至慎而又申之以誥誡之嚴於是草茅新進之士一旦拜手於天子之廷而赫然見上之所以期之者如此其深而求之者如此其重也則天下之能者孰不思以材自見其不能者孰不奮發砥礪而惟恐自棄於不材其受知遇之恩而仰承休命者孰不相勸為賢相戒為不肖此亦如天之曲成萬物而不遺而非有司之奉行常法者所能操其尺度而收之也且夫太學固天下之人材所聚而遊者也其立石於兹不徒使士之釋奠釋菜其中者覽遭逢聖世之隆而慨然以慕且將使後之人數其名而刻責以求之以較其立心行事之實孰為材與不材而於上之恩孰能稱與孰不能稱也此所以聳惕震栗感激奮興而兢兢懼不克負荷也故書石鑱之以示作興勸戒之義臣肯堂謹珥筆而為之記諸羅縣學記蔡世遠諸羅縣學原在善化里之西茅茨數椽康熙四十三年甲申鳳山令宋君永清署篆諸羅因縣署移歸諸羅山始就羅山議建丙戌郡丞孫君元衡攝縣事建大成殿櫺星門戊子宋君復來署篆建啓聖祠乙未遭颶風屋瓦門墻皆圯今令君貴陽周侯憮然曰是吾責也是歲十月興工修庀破壞大成殿啓聖祠則易故而新之又建東西兩廡以祀先賢先儒東有名宦祠西有鄉賢祠啓聖祠之東建明倫堂西建文昌祠迤西為學舍以便肄業櫺星門之外周以墻榜曰禮門義路墻之外為泮池皆前所未有也靡白金千五百有竒侯獨肩之不擾民丙申六月告成世逺時應中丞雷陽陳公之招主鼇峯書院吾友陳君夢林客遊臺灣周侯介陳君以書來求記且曰諸羅僻居海外諸生觀化聿新願有以教之也世逺寡陋何知爰即鼇峯諸友相與砥礪者而告之曰君子之學主於誠而已矣誠者五常之本百行之原純粹至善者也人之不誠者無志者也人之無志者由不能盡其誠者也誠以立其志則舜可法而文王可師其原必自不欺始程子曰無妄之謂誠不欺其次也其功由主敬以馴致之程子曰未至於誠則敬然後誠也敬也者主一無適以涵養其本然之謂由是而謹幾以審於將發慎動以持於已發則合動靜無一之不誠也雖然由明以求誠之方惟讀書為最要朱子曰讀書之法當循序而有常致一而不懈從容於句讀文義之間而體驗乎操存踐履之實學者率此以讀天下之書則義理浸灌致用宏裕雖然非必有出位之謀也盡倫而已矣孔子曰愛親者不敢惡於人敬親者不敢慢於人吾父子兄弟肫然藹然盡吾愛敬之忱也克伐怨欲之心何自而生哉始於家邦終於四海皆是物也庸近之士不能返其本思其終但以為讀書得科名而吾名成矣榮閭里利身家而吾事畢矣其幸者得一第其不幸者則老死於布褐而已矣其天資厚而習染輕者居是官也猶可以寡過其天資薄而習染重者則貪墨焉而已矣夫此身父母之身也天地之身也民物所胞與之身也以父母之身天地之身民物所胞與之身顧可不返其本思其終以貽父母羞以自外於天地以為民物所詬病哉諸羅雖僻處海外聖天子治化之所覃敷三十餘年於此矣巨公名人相繼為監司守令其間風俗日上今若萃一邑之秀於明倫堂相與講經書之要㫖體宋儒之微言告之以立誠之方讀書之要倫理之修經正理明則善人多為國為民胥於是乎賴非徒科名之盛也陳君為我言周侯清修幹固百廢具興引人於善惟恐不及吾知所以長育人材化民成俗者必有道矣敕修夏禹王陵廟碑記李紱虞書有乃聖乃神之頌故帝王之德曰聖德功曰神功然自古帝王之興皆得稱聖人其以神稱者則帝惟炎帝稱神農王惟夏后氏稱神禹意其所重在功德非思慮所及所謂聖不可知者耶刪書斷自唐虞神農氏或疑荒逺禹則虞帝所稱萬世永賴而孔子所謂無間然者蓋聖人之功之盛未有過於神禹者也禹葬㑹稽始見於越絶書吳越春秋然司馬遷自敘已稱上㑹稽探禹穴劉向亦言禹葬㑹稽不改其列而史記正義引㑹稽舊記以窆石證葬處故纍朝祀典凡祭禹陵必於㑹稽宋乾德四年始詔吳越立禹廟置守陵五户紹熙三年重修明洪武三年復大加修葺五百步內禁樵採有司督近陵人看守蓋帝王代興並致尊崇然未有若我朝之盛者也康熙二十八年聖祖仁皇帝南巡閲視黃河慨然念神禹功德特幸㑹稽致祭發帑金二百兩賜其後裔增守祠二人復御書地平天成四大字懸殿額又書江淮河漢思明德精一危微見道心十四字榜於柱大哉聖言百世以俟聖人不能易一辭矣舊廟像設修偉殿陛嵯峨龍尾螭坳輦道齊宮咸偹歲久漸就陊剝雍正十一年世宗憲皇帝詔所在防護歷代帝王陵寢浙江大吏始謀修葺經費未定十三年總督臣郝玉麟因修海神廟成欲以餘金助修布政使臣張若震料量修費需白金一萬二千兩有竒是冬大學士臣嵇曾筠奉今上特㫖至浙江監修海塘即兼管巡撫事遂繕疏入告下部臣覆准以乾隆元年三月鳩工庀材明年告成恭遇世宗皇帝袝廟配天分遣卿二祭告歷代帝王陵寢而詹事臣李紱適奉命祭告夏禹王陵八月朔昧爽恪將祀事敬瞻新廟佳氣鬱鬱葱葱黝含煙雲丹耀日星神燈􅀈睒明威歆享百靈欲欻閟宮有侐咸有助焉禮既成臣若震述臣曾筠言屬臣紱為修廟記臣紱才薄識暗不足以鋪張國家盛典因以對揚聖天子尊崇古帝王之休命惟是廟始落成而臣紱首奉祭告之命趨蹌灌獻於殿陛之間蓋不易得之遭逢不敢以不敏辭謹敘重修端末繫之詩以示後之任封疆者得取法焉詩曰天位乎上地位乎下人參其中三才乃著繼天立極是惟聖人聖不可知乃進於神惟夏后氏開王之始繼帝之緒獨稱神禹玉帛萬國㑹於塗山㑹稽陟方乃葬斯原代致奠禮國朝益備新廟奕奕祗薦祀事窆石發左菲泉濫前麗牲之碑紀以兹篇萬世明禋陵寢是恃後有作者念兹勿替駕幸翰林院記裘曰修國家儲材之地厥惟翰林長安門東南隅院署斯在歲久且圯今兹甲子春上命發太府金錢重葺之冬十月既竣事上手書顔其堂曰稽古論思曰集賢清祕是時掌院事者大學士臣鄂爾泰臣張廷玉上詔所司卜吉送入院日庚午具鼓吹揚旌斿駕發自乾清宮由午門出至則先詣祀孔子祠肅穆如禮爰升座羣臣次第上謁畢各就位樂作錫宴用唐張說麗正書院詩分韻上得東音韻二首以倡坐於堂上者惟三十有六人咸和又為柏梁體聨句凡籍翰林及嘗為是官者與焉蓋百有六十五人酒三行樂闋上因舉十八學士登瀛洲事謂臣爾泰臣廷玉曰卿等庶幾無愧房杜矣顧朕弗及唐太宗耳又曰翰林之職非特文章已也因文可以見道爾諸臣當明體此意臣爾泰臣廷玉惶恐謹避席奏陛下過唐太宗逺甚臣等謭薄亦思上佐堯舜興中天之治然材分不逮竊自愧出房杜下羣臣皆頓首謝復賜樂善堂文集性理精義各一部又名茶文綺及他物有差上起如清祕堂羣臣趨出候駕於沙隄之東未移晷吏部尚書公臣訥親捧御製七言長句四首宣示則上又于更衣次所援筆立成者也羣臣跽誦之餘歡喜讚歎以為此自古帝王所未有須臾駕出欽承天語更鄭重于末章戒諛崇實之意唐哉皇哉一堂咨警直比隆于賡歌揚拜之庥風焉我國家定鼎百有一年于此矣聖聖相繼歷于四朝禮樂之興宜在今日夫翰林者文章道德之府而學校之本風俗之原也說者謂自百辟卿士下逮一命之吏皆有所應盡之職而翰林一官獨從容瑣闥間若無所事事者而朝廷待之又最近且優以為是蓋清華之選此豈無故茍以榮其身歟人臣幼學壯行遇合嘗不可必而今得遭逢昭代親炙聖人此古人所畢世不能酬之願乃幸親得之然則思所以仰稱德意者非特分所應爾亦後世史冊中無窮之責望也臣官翰林又偹員講幄記動記言兹為臣職執簡志之豈以詫詞臣稽古之榮哉來牛石城記常安都江古州之徑流也由諸葛營而西為上江其源出都勻獨山州由諸葛營而東為下江其流通粵之柳州沿江盡苖藪也下江多峝苖上江多山苖而山苖尤悍上江山重箐密地極險阻雍正七年勦撫叛服不常亦上江為甚底定後議置營汛於上江設一協鎮轄兵二千二百名駐水陸扼要之區曰來牛辛亥撤師題建土城豫聞其地土疏易圯土城恐不足資扞蔽癸丑以改建石城入告䝉俞㫖允行爰飭新設通判鄧瀾董其事且諭之曰苖新嚮化慎勿以鼛鼓滋擾而附近居民苦苖蹂藉凋殘之餘不堪重役務厚其值以徠傭者庶工成速而苖與民皆無傷甲寅春二月工竣計髙一丈女墻髙四尺下廣八尺上六尺周圍六百三十九丈有竒城門四東曰陽和西曰慶和南曰薰和北曰化和於是都勻之父老子弟欣欣然來告曰來牛石城成矣官兵永駐於此以控制諸苖而今而後誰復敢入我村落掠我子女牛羊者乎誰復敢張毒機奮長矛伺我於林莽奪我財而戕我命乎入安枕席出履康莊吾儕小人何其幸哉且崇墉仡仡不特為吾一方萬年之利即逺近鄰邑皆可恃為犄角以無恐兹城之功不其偉乎曷可忘其所自始也請記之余因思來牛為上江扼要之區向無城垣故崇山湍水皆為苖險今石城既成天造之山為我屏障激蕩之水為我塹壕由是上江固而下江亦固下江固而丹江清江靡不固聖天子南顧之憂不藉是少攄乎孟子曰地利不如人和傳曰衆志成城是城可恃而尤有可恃者在守其可恃者而更無忽其尤可恃者余能無望於後之君子哉時余有撫江右之命不敢以行速辭遂記之皇清文頴卷二十
