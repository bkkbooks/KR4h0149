front:
  text: 欽定四庫全書皇清文頴卷六十九
  hash: sha256:db15ac130c4315b621c47220c06b545da00fe911b1be5ce5d3de9bdfb78d3967
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_069-1a, image: WYG1450/WYG1450-0160c.png}
body:
  text: 詩五言律詩恩賜御書詩扇和家學士夸岱遙念頒宫扇君恩正及時炎涼隨手變寵渥但心知月展庖羲畫風生大舜詩應憐披拂好秋意尚遲遲大凌河應制夸岱大凌河上水猶自起悲聲曾以三千衆來摧百萬兵明洪承疇統十三萬兵號百萬破於此地指揮欽聖略駕馭盡羣英吾祖擒明將奇勳一箭成南苑晚雪應制法海文囿停鑾日同雲簇暮天銀花符瑞臘玉粒兆豐年睿藻歌宜麥天心重力田由來勤恤意憂樂萬民先從幸揚州天寧寺應制法海彩仗臨仙梵香帆引鳳舸由來竹自好况復雨中過春日鶯花盛詩人禪衲多扈遊分賦日天籟發高歌聖駕南巡閲河省方布德詩四首陳璋仙仗出神京春風拂斾旌河氷正月泮輦路百花迎下采臣工議遙知父老情恩膏萬方洽先到闔閭城黃河天上落淮水地中分雪浪翻紅日風濤卷白雲疇咨堯慮切荒度禹功勤萬世平成績安瀾荷聖君帝燭窮簷隱真同日月高繹騷防吏卒供億恤秋毫天語聞㕓市民情望羽旄官針須共恪莫負聖心勞舊日繁華俗甄陶藉化工服疇敦本計師儉返淳風聖德如天大陽春與物同九州齊擊壤帝力洵無窮恭擬初夏新晴較射汪士鋐較射及新晴風清畫鼓聲弸雲近日麗的暈入花明飲羽三聯妙鳴弓疊中驚聖朝方教讓決拾敢誰爭春日侍直暢春園即事四首張廷玉侍值蓬山側春光又一年緑蕪酣宿雨紅杏破輕煙燕羽穿簾幕禽聲答管絃攤書忘晝永鐘漏隔花傳靈臺風物好和氣自成春在藻魚吹浪銜芝鹿近人繁花迎翠輦芳草藉雕輪最愛尋芳蝶蹁躚趂釣綸錦石橋邊路簪毫日日過柳陰春水曲花外暮山多雨洗檀欒竹風流窈窕蘿銀河天上瀉下界沐宏波間階容小立露草有餘芬松影團成幄花光散作雲遠霞高處見清籟靜中聞徙倚窗前石衣沾紫蘚紋乾隆三年聖主躬耕藉田詩六首有序張廷玉欽惟我皇上治應璇圖功調玉燭紹重熙之統緒昭廣運之精神學耨仁耕法乾行而不息春生夏長符厚載以無疆德意滂流恩膏淪浹萬方在宥彌深宵旰之憂勤六府孔修惟冀雨暘之時若頒來綸綍疇咨何啻於再三賜出金錢賑恤已逾於萬億薄海戴解推之德敷天蒙樂育之休猶復厪念田功經心穡事卜上辛而祈榖諏吉亥以躬耕常伯陳儀甸師贊事爐煙夜泛方回扇影於齋宫漏箭晨催蚤聽鑾鳴於御路和風卷斾林靄光浮澍雨隨車土膏脈起千官劍珮掩映於煙村露墅之間七校驊騮蹀躞於麥壠桑畦之畔言循紫陌載涖靑壇修祀事於先農致齋心於后稷香飄寶篆瞻淑氣之氤氳樂按雲琅聽仙音之縹眇潔粢盛而告偹神降康年陳酒醴以居歆帝膺福祉遂乃更衣大次秉耒中田服蒼犗以遄來隨紺轅而遞進杏花旖旎遍拂珠旒菖葉紛敷親承玉趾靑箱啓處播嘉種以蕃昌黛耜移時敷上腴之沃衍皇心無已數寧限於三推禮制有經功更勤於一墢爰停縹軛旋陟丹臺觀禹甸之畇畇樂周原之膴膴載芟載柞公卿班爵以服疇曰畬曰災兆庶赴功而終畝恍見煙蓑雨笠繪無逸以成圖如親蔀屋茅簷譜豳風而入頌宸𠂻用豫衆志咸孚乃瞻北闕以言旋猶顧東郊而在目靑圻赤壤均沾帝澤無私白叟黃童共識天顏有喜自此膏流御廩屢豐占婦子之寧行看粟滿神倉繁祉錫曾孫之嘏臣廷玉情深望歲功愧為霖授耒當年親睹艱難之業扶輪此日欣瞻繼述之隆敬獻蕪詞用揚休美五日風十日雨長符有道之昌期千斯倉萬斯箱永卜太平之景運詩曰宣室勤民事春郊駕六龍占辰周太史撰器漢司農翠幕連雲布靑壇列陛重下方頻送喜耕鑿盡堯封給復頻年詔敷天雨露滋農方儲九稔帝更念三時警蹕傳宫正催耕掌甸師紺轅行漸近春意滿東災縹眇雲韶曲朱衣引就班公卿隨鳳蓋父老拜龍顏繡壤扶犂去芳疇布種還太和彌宇宙宵旰尚思艱瑞雨飄林際千村極望同西山嵐翠合南畝土膏融笠影秧田水歌聲柳岸風皇情多悅豫秀麥倍靑蔥終畝方旋斾如繩砥道平草䀶抽紺甲禽語囀倉庚帝德崇無逸天心鑒至誠雨暘看應候歲歲咏坻京勞酒先霑賜觴行近御筵調羮慚燮理珥筆幸承宣世已登三五人欣取十千願將神保惠敷錫遍垓埏恭和御製咏竹元韻鄂爾泰萬竿蔽千畝深翠纈繁陰自有鳳鸞集曾無苔蘚侵虛中涵妙理疏節動高吟日月移寒暑終年祗此心敬和御製六月十八日初霽恭侍皇太后園中遊賞元韻鄂爾泰蘭殿慈暉永龍池霽景多一人崇色養六月紀歡歌花笑鳥爭舞荷香魚戲過驪珠四十顆手捧樂云何熱河紀事八首勵廷儀蜿蜒環翠嶺高下建宫垣拱極千山伏朝宗萬壑尊邊陲天廣大民物日孳蕃總被陽和澤冬泉水自溫地占佳山水離宫闢一隅花繁憐溜暖榖稔喜田腴宵旰只民事官曹必汝俞孰云萬方遠呼吸念肥癯風土敦龎地天教界兩京湖山據勝景圖繢錫嘉名花比蜀中錦禽欺隴上鸚幾回登島嶼不復羡崑瀛好景帝開先從遊踰十年鹿鳴窺舞鶴魚躍狎飛鳶船舫回蘭棹驊騮立錦韉會邀天一盻萬象解登仙屋斜無定向隨意築林邱城市千峯逼山村萬井稠有居仍逆旅無客是間遊伏暑崇朝雨凄然敵九秋清切依山殿𢎞文啓别廬溪雲霑硯席巖翠滴衣裾既愜煙霞性重棲鸞鳳居自慚還自喜故舊得應徐數來山厭熟屢僦愛居新行闕羅英彥晨星數舊臣合圍窺苑樹刺眼嘆花身珥筆人垂老重番扈北巡雲歸山雨足風泛藥苗香退食從容後時鮮次第嘗南榮施翠箔北戶展書牀一卷真消受翛然六月涼恩賜砥石山緑硯一方勵廷儀良硯頒詞館殊榮滿藝林雅能隨珥筆時復伴淸吟質潤神逾靜光凝涅不侵千秋資利用從此礪臣心萬壽詩六首蔣廷錫帝德超千古斯文邁百王典謨同睿製雲漢仰宸章麗日輝堯殿薰風集舜廊萬年調玉燭擊壤咏時康覆載同天地皇心本至公法寬皆樂土租免屢年豐戶戶陽春裡人人化日中聖恩無以報三祝效呼嵩上苑鶯啼日宫墻柳緑時燭花翻壽字階草結神芝北闕迎仙馭南山進玉巵祥雲開雉扇端拱美無為初日曈曈曉龍樓曙色開景星明北極紫氣滿東來玉帛陳閶闔冠裳列上台萬方齊拜舞歡忭動春雷春色蓬萊闕金爐起瑞煙瑶光十四月椿樹八千年舞鳳歌瓊席輕花拂御筵從臣皆飲德相與醉鈞天聖代禎祥集山川報太平碧桃迎日艷垂柳揚波晴紫霧金門靄紅雲玉殿明無疆歌萬壽功德大難名恭和聖製初夏新晴較射蔣廷錫緑草射場平西山乍雨晴角弓開月影飛羽徑風聲手敏頻穿鵠心和不失正雍容揖讓意觀德協皇情湯泉蔣廷錫白石丹砂水延年並菊泉陽從天性發暖得地功全氣蘊千山雨膏流萬頃田湯盤有述作聖德日乾乾恩頒御苑各色牡丹敬讀聖製恭賦蔣廷錫選取名花種移將御苑栽萬枝雲錦合五色畫屏開深淺隨風見高低映月來皇情吟咏處草木感恩培聖壽萬年詩八首查愼行瑞靄凝丹陛祥煙護紫宸萬年三月節四海一家春禮樂調元化謳歌屬聖人敷天多望幸特為舉時巡睿慮周遐邇皇猷冠古今堯階三尺土舜樂五絃琴德自重熙洽恩因壽愷深萬方均雨露造物本無心見説山東叟欣觀德化成蠲租憐嵗儉賜粟惠春耕不息天行健無私帝好生活人踰百萬軫恤荷皇情翠岫三千丈崔嵬上岱宗金泥除漢策玉檢陋秦封旗拂天門樹雲開日觀峯仙山留五老擁蓋候飛龍川嶽懷柔後乾坤奠麗中安流歸聖算平土奏神功桑柘連村遠來牟接畛同不教傳警蹕到處聽呼嵩一覽江天濶長流聖澤深晴霞開海面塔火照波心御墨蛟龍勢仙韶鸞鶴音扶桑占喜氣來往快登臨千頃玻璃色重為明聖開奎章懸日月睿藻煥樓臺桃柳乘時放煙波拂棹來湖山真有幸直似小蓬萊秦淮民望切歸路又重經二水春波緑三山爽氣靑香煙迎不斷翠輦過還停愛戴心如一爭看萬壽屏五月五日侍直暢春園蒙恩賜饌恭紀二首錢名世榴火朱明節蓬山紫府天膏分仙鼎味香帶御厨煙蒸暑消淸籞恩波湛玊泉侍臣俱飽德異數一時傳别苑塵氛外靈池嶺翠旁有花皆向日無樹不招涼綵縷千絲細蒲根九節香天中開午運霽景正舒長皇清文頴卷六十九
