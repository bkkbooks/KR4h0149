body:
  text: 詩七言律詩聖武遠揚靑海平定詩六首有序徐元夢維我國家受天眷命版圖式廓遠過漢唐九服寧一萬姓恬熙絶島窮徼罔不慕義嚮風爭為臣僕我皇上膺圖立極纘承列聖之緒仁孝光昭湛恩汪濊凡有血氣之倫胥戴生成之徳誠哉天下歸仁四方以無拂也羅卜藏丹津者靑海部落偪近甘凉自其先世内附有年聖祖仁皇帝嘉其歸誠寵以王號兄弟數人皆膺顯爵詎乃陰懷狡黠敢肆跳梁潛通逆寇策妄阿拉蒲坦首䑕兩端悖徳滅義同氣自戕皇上矜乃㝠頑不忍加誅遣使開諭至再至三小醜執迷帝赫斯怒指授方畧命將出師雷轟電掣所向摧靡越今年二月我師乘機深入晝夜兼行勝氣兆於風雲威聲震於原野批空擣堅犁庭掃穴生致羅卜藏丹津之母同惡之貝勒台吉等先後就擒所得輜重人畜不可計算賊窘廹無歸易衣宵遁是役也兵不過數千人為時僅十有五日較之高宗之伐鬼方不需三載方之虞舜之格有苖未及七旬廟畧遠頒膚功立奏洵亘古之所未有也捷書上聞聖意嘉悅晉封加秩推奬元戎輦賜帑金均勞將士普天臣庶舞蹈歡呼請御殿受賀皇帝謙讓不居曰是惟皇考簡用之將豢養之兵克宣乃力用奏膚功朕何有焉但朕躬即皇考之躬俟祭告諸陵勉從所請伏惟我皇上亶聰首出睿算周詳神機獨運動合天心聖祖仁皇帝陟降在天呼吸罔間豐功駿烈於是益光赫濯聲靈無遠弗震由此邊塵掃蕩氛祲廓淸櫜不戰之弓造可封之俗申有截之威受無疆之福薄海承休永永無極臣等叨侍禁廷受恩深重愧無江漢常武之作揚厲神功謹各賦近體詩六章拜手稽首以獻熙朝文軌庶邦同靑海從來候尉通早列屏藩承正朔久安沙磧沐皇風跳梁忽軼生成外負固難容覆載中萬里驅除非得已神機宻運付元戎醜類寧敎恣蔓延師中錫命睿謀全韜鈐宻授元臣畧節制遙伸大將權刁斗森嚴開玉帳羽書徴調簇金鞭聖皇本不矜神武為掃塵氛靖九邊紛紛馳騎近西凉螳臂攖車不自量猛虎怒來無豕突神鷹搏處失鴟張氣凌山岳人爭奮陣列風雲勢莫當何地尚能容假息追奔威已震遐荒正是層氷積雪中熊羆百隊勢排空長驅直入軍聲壯分道窮搜士氣雄組練有光寒映月驊騮得路夜嘶風總因豢愛恩難報刻日能成不世功朔吹驚沙撲面迎犂庭搗穴駭神兵牛羊徧野隨征纛甲仗如山雜去旌塵外趨風爭附欵馬前羅拜乞更生應知此日收殊績制勝神謨頼聖明寢園躬薦正春深行殿欣傳報捷音大烈允昭先世烈皇心即是在天心殊方自此無傳箭重譯於今盡獻琛共仰懷柔文德遠還陳干羽玉階陰聖武遠揚靑海平定詩六首朱軾萬國輸忱戴至尊仁風披拂滿乾坤諸藩久沐生成德小醜偏忘覆載恩纔見師中天討赫俄聞閫外凱歌喧九霄溫律囘寒磧春色融融滿玉門車書一統會冠裳何事么麽敢陸梁命將專征乗豫順居中制勝仰乾剛朱旗煥爛雲霞色紫塞昭囘日月光輦下歡呼聲動地捷書昨夜報飛章七旬一月溯奇功奚似平邊半月中虎旅分行揚武衞龍韜萬里授元戎全銷兵氣霜降日盡惕天威草偃風正値辟雍光大典蓼蕭方奏又彤弓皇仁浩蕩播休和聖武丕昭慶止戈雲擁旌旄淸朔漠霜嚴刁斗靖闗河齊歸風敎天無外盡稟聲靈海不波從此九邊閒將吏軍中惟唱太平歌寵賚遙頒自九天千軍拜命錫金錢芙蓉小隊閒排甲楊栁新堤緩着鞭上澣受成中澣至鐵衣出塞錦衣旋王師十萬無遺鏃簫管悠揚入酒泉脫劍櫜弓憇六軍百官齊賀靖塵氛神謨奮斷承先志至德謙尊表大勲天地助靈彰赫濯山陵昭告薦淸芬巍巍駿烈光千載鳯闕長凝五色雲聖武遠揚靑海平定詩六首福敏波澄靑海淨氛塵遙聽軍書送喜頻反側早憐輕自絶指揮共仰捷如神建牙錫號推名將授鉞持權倚重臣不是開邊勤遠畧須知王化本無垠藩封奕葉聖恩長昧義無端忽啟疆不謂執迷勞命使尚甘跋扈阻來王潛通遠寇依聲勢近擾隣封恣陸梁一物豈容遺覆載長驅鐵騎掃欃槍底用横行十萬師前軍一戰定邊陲士縁宿飽能深入將為酬恩屢出奇干羽七旬聞帝典戎軒六月記周詩何如指日膚功奏不見闗山雨雪時白草黄沙壓陣雲名王面縛已紛紛受降喜氣連營動奏凱歌聲徧野聞革笥蝥弧看滿載明駞駿馬勒成羣若非廟畧神無敵那得元戎第一勲寒食朝陵孝祀䖍翠華行處玉音宣飛來羽騎傳三捷信是王師出萬全紫塞已看沾雨露金方從此靖烽烟非闗克敵龍顔喜喜薦豐功慰在天告廟升中大禮成晉封加秩荷殊榮勲名合上麒麟閣恩賚還均驃騎營閶闔衣冠齊獻頌明堂琛賮競輸誠皇威本與天無際億載謳歌樂太平甲寅元旦立春雪竟日明朝晴霽王大臣稱賀時祈榖齋期召入西暖閣愷切訓示恭賦長律一章用誌忻忭鄂爾㤗元日迎春春便雪囘寅恰復會三寅豐登有象天顔喜符兆初陳睿㫖諄直剖災祥闗政事重申敬怠朂臣隣辛盤賜出齋宮肅大瑞何須紀鳯麟賜遊西苑恭紀有序鄂爾㤗乾隆三年春上初幸圓明園率同莊親王和親王寧郡王平郡王暨張相國廷玉大司馬果毅公訥親領侍衞内大臣常明大司農海望大司空來保泛舟看花徧遊内所臣爾㤗觸景傷懷悲喜駢集不覺涕之沾巾也退直賦詩用誌悚仄仙館蓬洲早入門宴遊重許侍嚴尊驚看故我憐今我慚謝新恩感舊恩萬樹桃花紅在眼一湖春水碧無㾗問津何處思前席囘首山村淚欲捫問津屋兩間居河北岸前養疴内地住六所相離咫尺每召對輙就此沿河而南不半里許即樂志山村先帝寢宮在焉今不可復覩矣甘霖普降特召大學士内廷翰林圓明園泛舟賦詩恭紀鄂爾㤗溟濛已布次瀧涷告足微愆早勅躬伏奏既霑時節雨讌遊初領芰荷風恩隨畫舸流光遠波及平田惠澤通益信天心感誠德作霖有愧祝年豐恭讀御製面賦詩敬依元韻鄂爾㤗蓬萊洲許侍流觀一櫂玻璃海様寛色笑中筵頒玉管珠璣滿斛寫緗紈川舟朂望於今切魚水遭逄自古難豈獨近臣忻幸極岸花林鳥亦淸歡已未新正二日乾淸宮侍宴賦栢梁體詩恭和御製元韻鄂爾㤗栢梁春宴領班聨睿藻新裁墨尚鮮忭舞爭看擎玉盞頌歌應與被丹弦昌年重賀元正雪小會同登聖主筵喜起一堂眞盛事願將寶訓記圖編恭和御製詠瓶中新荷元韻鄂爾㤗翠蓋輕欹露㸃粗玻璃滿注育靈株疎櫺香細聞猶遠錦樣花多看似無淨妙睿襟延玉井淸凉仙骨濯氷壺芙蓉别殿承恩久靜挹容華敢自娛容華芙蓉草花見淮南子注已未六月六日上賜玻璃瓶荷恭紀一章敬依元韻鄂爾㤗會於圖畫見猶粗愛出天然供幾株好相不殊空裏色眞香恰似有中無用老子妙有語妙蓮華注琉璃界太液波分藻鏡壺捧賜歸來心似水書窓漏永頌康娛恭和御製登盤山天成寺江山一覽閣元韻鄂爾㤗纓巒叠巘天成境翠輦纔臨氣象分四正盤山一名四正山莊嚴呈色相三盤山有三盤分上中下烟靄入聲聞叢霄路近塵寰小洞壑風來玉籟紛知有仙靈羣從在蒲團石名箬笠松名總如雲敬讀御製幸盤山寺閣詩囘憶舊遊如夢如覺用抒鄙懷仍依元韻鄂爾㤗廿年希到田盤路天眼糢糊地角分忽捧奎章忻見見却從法界注聞聞烟迷孤巘横尤出風攪空林靜不紛何日亭然風頂上白雲滿䄂瞰靑雲夏日侍諸皇子瀛臺讀書偶成長句一首用以示勸福敏高栁修篁四面陰纎塵不到講筵深細旃廣厦無煩暑要道微言須會心物我相闗方是學驕矜偶見便非欽子臣交責非容易莫為嬉遊廢討尋已未正月二日乾淸宮侍宴賦栢梁體詩恭和御製元韻福敏開年嘉會集班聯㤗運忻逄雲日鮮遐邇蒸黎登壽域融和淑氣應鳴絃靑陽令節方三始黄耉耆英在四筵一德從來能致瑞好將大有紀芸編多年踪跡厠班聯玉案親承睿藻鮮黽勉共期崇聖學優游未敢奏繁絃研求經史探精義貫徹天人御講筵今日仁恩徧寰宇持盈更進十思編已未冬至前三日病中䝉恩特賜七言近體詩一章謹用元韻恭紀二首福敏羅雀門庭過客稀忽傳天語到林扉宸章巨麗驚殊寵聖意高深敢重違人笑龍鍾趨殿陛自憐顚倒着裳衣病身正似寒松色煦嫗端須旭日暉知遇由來帷幄重林泉何處勝朱扉精勤夙學衰年廢卓犖初心老病違懷舊懼生經過夢感恩泪灑解餘衣可憐遲暮今如此病草難邀春日暉淸潭應制阿克敦宿雨全收拂曉晴碧泓新漲更涵淸波分天外雲光淡影帶洲邊草色明傍水亭臺炎暑却隔溪荷芰遠香生翠華臨處塵埃淨自有淵淵愜聖情過他爾氣嶺噶爾旦徹零之巢穴在伊里是嶺乃其門户也阿克敦雪滿陰山勢自横中通一嶺類闗城飛泉百道從雲落亂木千重繞澗生巖仄有時難並轡石欹無處不遮行蠢頑恃此成巢穴化洽行看險亦平擬館試為愛寒花晚節香限香字韻德齡葳㽔翠葉擁花黄燦映晨霞冷帶霜故向高秋標正色不妨孤賞後羣芳餐英人瘦神俱淡透月籬疎影亦香古盎移栽深䕶養要看歲暮鬬梅粧自武闗至留壩道中德齡果熟紅黄棧路香征鞍高與雁南翔巖花淰淰縁雲濕澗樹沉沉壓水蒼一線林光深見日千尋山骨迥含霜馬蹄縮澀羊腸險猿鳥秋淸引興長初夏登樓有懷德齡雪盡河湟水漫流緑楊枝外有高樓欲為登眺消長晝却對雲山動旅愁通德門依天北極䕶羌人在海西頭一家兄弟三年别偏倚長風憶少游供職内廷寄呈伯兄時任西寧遊擊高斌夙夜兢兢侍禁闈凌晨趨入戴星歸樓頭每憚更催漏馬上常愁露濕衣意興懶隨庭鶴舞夢魂勞逐塞鴻飛遙憐萬里同明月兄弟相思兩地違秋日奉差樂亭偕同人夜行四十里至海邊觀日出高斌乘興探奇渤澥旁馳看紅日出扶桑霞光彩徹連霄漢雲淨秋空接大荒靑鳥不來仙跡杳蓬瀛何處海天長魂驚沙㟁濤聲急極目徒勞歎望洋雍正十二年春䝉恩補授倉場侍郎再赴潞河官署舟中恭紀塞爾赫襲袂和風起白蘋荻芽蒲葉逐時新掉頭踪跡成閒夢到眼鷗波即故人草色平鋪堤上路栁花飛送鏡中春恩波湛與長河永浩浩流來自玉津恭和聖製已未元旦韻應制塞爾赫糺縵卿雲瑞葉聯曈曨初日曙光鮮掞將玉藻輝三殿播作熏風入五絃白雪陽春歌聖澤紫宸淸閟侍恩筵小臣遭遇隆如此願傚康衢載簡編瀋陽塞爾赫鬱葱佳氣望中浮沃野膏腴萬落稠向闕羣峰皆北拱朝宗諸水盡西流高連長白標天柱山名俯瞰滄溟敞鳯樓宮中起三層鳯凰樓城郭崢嶸民俗古巍巍形勢帝王州恭賦御製東作勤耕勞衆力張廷璐乗春力作向東菑穡事方興未敢遲麥隴荷鋤烟雨外栁陰驅犢夕陽時催耕鳥喚平疇迥饁餉人歸穉子隨最是田家辛苦意閔農深荷聖人知恭賦御製風枝欲動不聞聲張廷璐渭川千畝碧蔥蘢誰寫烟梢尺幅中疑有㣲風來几席似㸔清影拂簾櫳墨㾗澹處湘雲動香篆縈時宿霧籠漫說化工能肖物可知生意滿宸衷恭賦御製田田荷葉雨聲齊張廷璐葉葉新荷貼水平輕風拂處晚凉生銀塘忽過霏微雨翠蓋遙傳淅瀝聲金掌露凝擎沆瀣玉盤珠落聽琮琤應添太液恩波渥霡霂還知慰聖情恭和聖製三月三日得雨詩徐本芳時百穀茁根荄甘雨新霑遠近皆迸玉跳珠千頃合扶犂荷笠萬民諧風飄繡陌紅香潤雲覆春疇碧色佳法駕不嫌旌旆濕宸章揮灑一舒懷雍正二年躬耕耤田詩四首徐本萬户千門聽曉鐘六龍飛處五雲從靑壇莅止䖍崇祀玉趾親臨首重農九扈職分瞻肅穆三推禮具仰從容我皇宵旰原無逸稼穡心勞事益恭旭日旌旗輦路分肇開東作邁思文燃蕭黙祝千村雨秉黛深鋤一片雲栁漸鳴鳩春意滿杏初飛燕午風薰衮衣成禮臨黄幄次第公卿致力勤鳯城環繞緑疇多羣仰躬耕駐玉珂兆姓盡知敦本意老農齊唱得年歌兩岐定見舒新麥同頴欣㸔長瑞禾帝德天心相契合豐登寰宇共諴和春臺昨夜察農祥播種偏宜黍稷良補助恩波民廣被辛勤穡事帝先嘗周原膴膴盈千畝夏甸靑靑裕萬箱不待滌場田畯喜歡聲早己祝無疆靑海平定詩四首徐本運際勲華仰化成如天覆露福蒼生八紘敷敎都懷德九域宣誠一舉兵靑海風驅隂霧淨紫垣星耀㤗階平旋師聽唱鐃歌徹桴鼔聲停沙漠淸王師撻伐似摧枯命將平羌握虎符兵接前鋒方勝策窟搜深箐已全俘敵情狡獪經宸斷軍令分明出廟謨去歲今年頻報㨗聖朝神武古來無幾姓羌渾未合圍出奇制勝得先幾黄雲滿塞横金槊皓月臨邊掛鐵衣陣設疑兵驚鶴唳幕殱殘寇見烏飛三軍憑仗天威遠共慶功成振旅歸曈曈日麗九重門宣示邊功詔語溫仗下獻俘呈斧鉞殿前行賞脫櫜鞬元戎秩晉三公貴上將封崇五等尊萬里烽烟從此息雷霆雨露總天恩河清應瑞詩四首徐本洪河迢遞自天來清晏欣逄景運開星渚似移銀漢近榮光疑並玉繩廻澄波蕩漾逾千里佳氣氤氲遍九垓治協勲華多上瑞安流更慶淨纎埃聖世懷柔及百川祥呈四瀆仰乘乾長占海宇澄淸象共沐恩波浩蕩天瑞雪三冬爭皎潔卿雲五色映淪漣從敎率土沾濡遍愷澤同流億萬年平地成天府事釐源淸流潔應昌期瑞逾太皥披圖日德邁伊耆刻玉時波靜定知塵不染光瑩直比鑑無私由來史冊稱稀有鳯舞麟遊未及斯一片澄泓萬象呈舟航如在鏡中行流從砥柱三門遠氣浹扶輿九曲淸協應苞符天眷厚敬承謨烈帝心誠鵷班此日傳丹詔晉秩千官荷寵榮甘霖普降特召大學士内廷翰林圓明園泛舟賦詩恭紀徐本甘霖乍喜遍郊畿詔許新晴覽翠微萬井膏腴方被澤一園草木已含暉波隨櫂影初生縠凉沁荷香暗襲衣幸奉良遊瞻聖藻疇咨念念切民依皇清文頴巻八十一
