body:
  text: 頌河清頌有序勵廷儀臣聞至誠盡性清寧昭贊化之符大孝格天保佑協栽培之理故書美堯勳首頌欽眀格被史稱姬德爭傳河洛榮光凡以乾坤一氣天人一心至治流通上蟠天而下復際地休徴洋溢乾獻瑞而坤必效珍我皇上纘緒當陽膺圖御宇聖以繼聖邁中天復旦之光華安愈求安厪日昃諴和之隱念大綱小紀庶績咸熙逺至邇安百昌皆遂本開誠布公而服物由孝思錫類以推恩是以仁義淪浹於肌膚聲教𢎞敷於寰海諸祥疊至萬福來同七曜則合璧連珠嘉禾則一莖數穗寶玉特呈其光彩草木悉獻其珍竒固已備盛代之嘉徴極史書所未覯矣兹雍正四年十有二月河清獻瑞為地則二千餘里為時則一月有竒綿亘四省湛然澄清猗與盛哉斯尤曠代所難逢必待昌期而後見者也謹按水居五行之先河為四瀆之首上通霄漢光啓圖書易乾鑿度云天降嘉應河水先清拾遺記曰黃河千年一清至聖之君以為上瑞臣遐稽史牒上考天心乃知物以類從祥由德致我皇上盛德光天逹聰眀目緝熙居敬宥密單心主德清矣百工布化承流穆眀交勉官方澄敘精白一心政本清矣直省仰承聖訓砥節素絲滌慮洗心奉公守法吏治清矣四方幸際升平共逰熙皥沐膏詠澤食德飲和民風清矣是以河伯輸忠陽侯表慶轉黃流之渾濁顯碧水之澄鮮千年一覯之竒適逢此日天苞地符之盛併在兩年上以答我皇上御極以來宵衣旰食勤求上理之純心下以開我國家億萬斯年纍洽重熙之景運詎非誠孝之感孚神眀之默貺哉爾乃聖心沖穆睿慮淵深既遣専官敬酬神貺因虔齋袚昭告景陵念先皇啓佑之謨實貽繁祉示盛世持盈之道彌切寅恭却朝賀之文廣推仁之澤既朂以盡心奉職旋錫以加級殊榮大哉皇恩至哉天德法乾行而不息叶謙吉以常亨因坎水之呈祥施巽風而申命誠孝所格上下同流矣臣快覩殊祥欣霑渥澤拜揚有願思同擊壤以鳴歡受寵無功彌覺素餐之滋愧敬上河清之頌少申衢祝之私頌曰於赫我皇參天兩地誠孝作基中和既致內外寧謐羣生咸遂和氣攸蒸休嘉疊至日星河嶽一氣陶鈞維皇建極輔相裁成馨香上格七曜光晶愷澤下漉洪流載清載清維何河身允翕二千餘里表裏澄徹竹箭金波桃花玉液似鏡斯眀如泉斯潔臨淵俯矚貝闕珠宫色侔清濟光耀吳淞已周月莢不改昭融殊祥異瑞特表堯封遍彼河源來從西極沙石交流易淤難洌沈玉搴茭桑乾或齧清宴嘉符必待有德上善若水廣大涵濡含生負氣是育是噓陶之汰之是瀹是疏朝廷清眀燕及方輿大鈞無私維德是相神之悅之致兹靈貺昔指崑崙今觀蓬閬振古希聞八方同仰父天母地嶽瀆公侯皇猷允塞靡逺不周崇效卑法敦化川流誠孝所格躋此有由乃遣幣牲乃嚴齋袚昭告景陵永懷眀發履盛思謙宸𠂻彌惕錫福臣工幾康交敕允矣聖德邁周超唐清寧永奠億世其昌臣司喉舌志切對揚拜手敬頌萬夀無疆河清頌有序蔡世逺臣聞聖人在上天不愛道地不愛寶是故河出圖包羲則之以畫卦洛出書大禹則之以敘疇蓋天地一元之氣分而為隂陽播而為五行五行之生以水為先而四瀆之水以河為大嘉祥駢臻兆自河洛理固然也欽惟我皇上四德根心五氣順布孝以事親本愛敬之心以推暨乎百姓誠以事天體元善之長以涵濡乎羣生澄敘官方揚清激濁而百官以治心周蔀屋愷澤旁敷而萬民以察乃雍正四年十二月自陜州至徐邳淮揚等處黃河清二千餘里歷有數旬臣聞陽氣生于冬至而盛于春清於十二月者陽氣浸盛歲功方成貞元會合之時也清於豫徐揚兖間者宅土中央萬𣲖同流四方之所和會也經數旬如一日者皇上中天之治日新月盛光被彌極也惟誠則眀故湛然澄清惟主靜以立人極故廓然至清仰惟聖祖仁皇帝深仁厚澤涵育天下六十餘年皇上丕承而光大之以言乎心則清眀在躬以言乎治則清和咸理觀乎人文以化成故日月五星徴其應人情以為田故嘉禾瑞麥發其祥兹又見黃河之聿清昭聖人之大瑞天氣感動而地氣應之地氣寧謐而河伯效靈此三才合撰之至理一德感孚之眀驗也乃天眷彌隆聖敬日躋羣臣請升殿受賀皇上謙讓弗居謂事天如事親受寵若驚敬畏匪懈善則歸親虔告景陵恩推臣下交警懋修詩曰昭事上帝聿懷多福孔子繫大易之卦曰履信思順是以自天佑之我皇上乾惕益深位育益𢎞翼翼謙謙巍巍煌煌所謂多福而天佑者莫大乎此臣叨侍禁廷珥筆起居領訓周詳受恩深重欣逢道寶之昭彰竊慕賡歌之盛事謹拜手稽首而獻頌曰巍巍帝德上通穹昊髙眀博厚誕膺大寶惟德之徴五行順布川媚嶽輝昭回呈露百神受職四靈來逰五緯垂象萬派安流惟河之清千年罕覯上瑞聿彰光啓宇宙皇心緝熙雍雍穆穆江漢秋陽以濯以曝至化所孚洪瀾渟泓清且漣漪正在嘉平河從西來星宿濯波既踰蔥嶺積石攸過北繞河湟亘於地軸龍門磊砢澔涆洄洑元氣和會誕降嘉祺白魚赤鯉朗映鱗鬐一碧長空素練成綺陽亨歲成榮光在此貝闕何眀珠宫有爛晶潔瑩輝爽徹霄漢豫徐兖揚歷二千里越有數旬其清未已凡兹臣工歡忭盈廷曰惟我皇蕩蕩難名自建極來嘉徵懿鑠是宜致慶聿懷多福惟帝曰俞天實貺豫豫加抑畏永念前謨皇考陟降在帝左右乃眷既渥申以保佑虔告皇考以彰瑞應篤敘眀昭丕承有慶維時臣工肅然敬聽謙尊而光聖不自聖孝思維則歸善於親推恩錫類交警臣鄰昔在包羲寶圖聿獻亦越軒轅魚人來見黃龍蚓蜿當舜之時德水現靈禹則覿之我皇首出邁帝軼王有開必先以有斯祥誰則澄之河伯呈之河伯則辭匪克為之曷為不滓洪鈞是使洪鈞不居伊誰之司究厥淵微惟聖成能太極在心即物即誠廓然太虛靜正靈瑩孰先感召天一所生四瀆之長爰效其靈功峻崑岡澤浹寰瀛稼穡惟寶眀德惟馨三事允治萬象光亨於千萬年永奠清寧河清頌有序鄂爾竒皇帝御極之四載德無不被恩無不周萬類熙熙百靈效順休嘉之應史不勝書乃睿慮廣淵宸修益謹至誠無息宵旰乾乾于是復有河清之瑞紀日則逾三旬紀地則接四省考諸載籍振古希聞百爾臣工莫不歡欣抃舞咸碩稽首闕庭恭申慶賀我皇上執德彌謙宅心加謹却朝賀而弗受普錫福於臣工大哉雨露之仁涵濡無外矣臣欣逢上瑞躬被殊恩洪惟致瑞之由有源有本實由我皇上鴻圖丕紹以來敷政寧人立綱陳紀無事不以繼述纘承光大先猷為念無刻不以嚴恭寅畏奉若天道為心建極即斂福之原大孝乃格天之本感應之理自然而然是以聖祖仁皇帝鑒此精誠啓迪蒼昊錫兹祉福惠我無疆且以福佑一人者並福我臣民於無既也臣以史册所未聞者身親見之慶幸之情不能自己是以忘其蕪陋拜手揚言謹作頌辭以獻頌曰惟昔帝世地平天成修和府事德潤羣生溯彼河源崑崙是出維禹之功安瀾底績榮光四照紀在周年自兹以後瑞牒希傳上天降祐篤生聖祖乃聖乃神光昭萬古我皇嗣之紹聞繼志聖德純全誠孝並至上帝曰俞錫之嘉祥誕膺多福俾熾而昌猗歟上瑞惟德是符日月五星合璧連珠瑞玉嘉禾竒徴疊告雨雪孔時豐年屢兆上帝曰俞德修益懋宜申命之以昭篤祜丙午之歲月在嘉平綿延四省匝月河清皤皤黃髮逮於童幼載道歡呼從前未有雲則縵矣星則燦矣濯彼中流光其爛矣何其潔歟似雪之瑩何其皎歟似鏡之眀凡兹臣庶僉曰嘉徴乃忭乃舞翔於帝庭維皇曰俞來汝臣庶益謹厥修保兹純嘏煌煌聖訓光於典謨上超周漢逺邁唐虞微臣作頌敬效嵩呼億萬斯年式鞏皇圖河清頌有序任蘭枝皇上御極之四年海宇升平治功洋溢至誠感召景貺時昭維十有二月河清告瑞地越數省之遙時歷三旬之久在廷諸臣踴躍歡忭咸以聖德崇隆蟠天際地致兹繁祉邁古超今合辭恭請皇上升殿受賀聖心沖穆辭而弗居永念上天眷佑優崇錫以非常之瑞皆以聖祖仁皇帝功德隆盛致斯積慶之詒爰舉眀禋虔申昭告訓諭股肱耳目一德一心夙夜祇承愈深寅畏闡微言於天人感應之理揚奧義於賞罰曲成之間大哉皇言典謨同煥矣更以一人凝庥之至德大布維皇錫福之𢎞仁內外臣工普加爵秩殊恩覃被百爾騰歡孚舒寸管以揚言敬祝無疆之聖夀臣夙直內廷尤霑渥澤近緣使事之竣旋軫趨朝路出潼關之東澄波入望民居商賈載道歌呼計臣目擊之區更在陜州之上則知河流澄徹所至呈祥實合普天率土以同昭並非道理疆界所能限洵屬生民未有而曠古希聞者也臣竊惟天人之際呼吸可通我皇上以睿聖之躬建中和之極諸祥悉致衆善咸臻前此星辰著應於奎躔嘉榖叢生於御藉苞符疊啓既有眀徴矣兹復河伯效靈澄清告祉德洋恩普源逺流長上瑞也羣臣願伸賀悃聖天子讓善弗居昭告景陵永懷眀發至孝也保泰持盈有加弗替幾康交敕廣勵羣工至敬也錫福臣僚無間中外堂亷一氣和樂歡欣至仁也純之不外一誠合之實兼萬善五行順序百榖豐登億萬斯年清寧永奠蓋誠無心祈福而福應彌隆大德格天而天庥滋至者矣臣欣逢泰運叨被洪恩敢不勉竭愚忱導揚盛美以自附於天保卷阿之義衢謡封祝之倫乎用拜手稽首而陳頌八章其辭曰於昭上帝厥命有赫誠感誠應所眷惟德我皇聖神建其有極用致嘉祥表兹迪吉嘉祥維何降福孔多七政炳耀寶玉瑞禾竒徴疊至復驗洪河渾流萬頃忽覯澄波澄波維何逺近同色鏡納天光泉流玉潔涉彼潼津目覩瑩徹道里孔長萬民欣悅渥哉天貺答我太平八方寧謐四海永清福以類從厥象昭眀皇心默感惟秉一誠誠於奉天欽崇時憲誠於事親愾聞僾見宵旰勤勞如傷在念翼翼小心懋膺天眷惟兼衆善乃集衆祥至誠不息悠久無疆乾行曰健謙尊而光慶歸聖祖祀典輝煌大孝深仁永錫爾類雨露涵濡湛恩汪濊兑以説之普天同戴共咏九如嵩呼萬歲自兹以往福至如川雨暘時若大有書年金甌永固寶歷綿延微臣揚拜敬頌堯天河清頌有序李徽皇帝御極之四年冬十有二月九日陜豫徐淮河清二千里越五年上月澄徹如前斯久道化成之瑞徴也用拜手稽首而獻頌曰聖人在上地平天成五風十雨百瑞俱呈凡此百瑞維道之貞元氣之會盛德之亨珠聫璧合七政同行坤輿萬里長河載清昔在包犧道開龍馬性命源流爛然一寫五位生成至誠不假獸文鳥迹誰與並者九疇之傳水德而下水德攸宗長河是也倬彼雲漢為天之經星源萬里地緯斯形西南分派道本坤靈行成九折得一其寧下通溟海上貫天星激濁揚清視我帝庭先儒有言清濁之理清其本然濁為後起當其濁時清亦在只及其既清濁非他徙過化存神釋回增美於變時雍昭兹河水自陜入豫天地之中自徐及淮仁德在東道起於中萬國之通德漸於中四海其同自西自東鏡徹水融轉移造化天子之功自復而臨天地之心自臨而泰內陽外隂天地會同道化之深隂陽合德和樂且湛三陽浸長五色其簮浹辰洊歲以迄于今天以象告地以情宣銀河在望白玉為川運符千載義屬先天因其固有復其自然崑崙伊始邃古而前還淳返朴億萬斯年道德仁義王化之原無為清靜異論之門相彼異論黃流自吞仰惟聖學直返靈源陽開隂闔秋肅春溫化濁為清旋乾轉坤一人首出作君作師推誠御宇蕩滌澆漓佑兹一德振彼四維官方澄序世教潛移道宗元古化浹清時盛德大業日新是期河清頌有序周學健皇帝嗣位四年德協上下天心克若于時百靈效順乾符坤寶超圖溢牒粵十有二月黃河清自陜迄徐餘二千里河臣以告僉謂此萬年瑞宜慶皇帝乃深原祖德上崇天道下懋臣工神眀之貺讓勿居也臣謹按乾鑿度天降嘉應河水先清三日又拾遺記黃河千年一清至治之世以為上瑞傳稱堯舜榮光燭河舜受命設壇河側榮光起亦如之逮成王時河清兹皆至德光昭太和會合天地交應若符契國家大澤汪濊逺邁虞周間者七曜九穗嘉祥屢仍天瑞既兆地應復出博稽今古卓哉曷克方兹夫平成績奏夔樂是作允猷翕河周人興頌美盛德詠泰階史臣職之臣不文謹揆斯義乃獻頌曰浩浩河流四國之紀振古於斯繄德之俟祗我皇德如天斯穹自北自南自西自東四海會同天子之功穆穆天子上帝右之四聖之緒皇誕受之惟曰懿我後嗣仁考之似陟降帝庭用錫繁祉大河汸汸載流載黃嘉平之月有司入告厥波惟宅厥色惟碧如鑑如氷如練如拭柱䇿所聞千年適獲匪適獲只惟天降厥美匪降自天皇實啓之時維嘉哉顧瞻渭汭粵瞻有淮逾二千里亦孔之皆有鱣有鮪鬐鬛泚泚有藻有荇白石齒齒士曰猗歟綏爰衆居民曰樂且康我室廬衆惟綏矣澤之舒矣民胥樂矣澤之博矣亹亹我皇為民之則揚清激濁惠此方國天錫皇帝璿圖玉䇿億萬萬年九圍是式官臣拜手天子聖神皇曰俞哉先后德之純施及朕身暨三事大夫莫敢弗欽懋哉惟勤乃蠲以禋格於仁考逮兹臣鄰用錫純嘏俾惠我民俾而安而敦俾而和而平四海永清受天之成聖駕東巡盛京恭謁祖陵大禮慶成頌有序鄂爾泰皇帝御極之八載歲在癸亥月紀孟秋諏吉日飭乘輿奉皇太后東幸盛京展謁祖陵禮也先時雨師灑道浹旬優渥從官侍臣虎賁羽林七萃八校之士畢罕旄頭鉤陳壁壘千乘萬騎之衆夙裝以俟比大駕行雲開天霽和飈拂旗皇帝曰惟天惟祖宗佑豫一人耿耿祉哉乃循畿甸出北口抵熱河遂巡省外藩諸部度白狼踰烏桓橋潢水徑龍沙諸部君長名王下洎且渠當户千百為羣治道供帳奉迎厥角行負弩矢前驅居環黃幄宿衛奉觴上夀進膳獻琛賜賚所加舞蹈呼嵩之聲殷地徹天聞乎數千里之外皇帝曰於我祖宗盛德大業至矣哉自祁姚化所弗暨漢唐威所未讋我疆我索一尉一候謐如也乃入栁邉乃沿混同瞻長白之峻極度納緑之蜿蜒谷邃山髙水深土厚扶輿鬱積王氣攸鍾神臯奧區上應析木形勢龍蟠虎踞揭八荒而包六合我太祖太宗櫛沐風雨規矩乾坤披荆棘刈豺狼畫井里搜軍實所為創業垂統作則萬世者山川城邑悉載赫聲濯靈土俗儉勤室居朴素有陶唐氏遺風焉皇帝周覽遐觀喟然動容曰此我朝景亳邠岐也猗那濬哲之頌生民瓜瓞之歌欽念哉齋心凝神愾聞僾見乃以九月丙申有事于永陵越六日壬寅有事於福陵翼日癸卯有事於昭陵祠官掌儀太常奉引皇帝穆穆躬執玉瓚酌秬鬯以灌顯相辟公翼翼陪列庶司百職蹡蹡濟濟咸駿奔走執豆籩窮天産與陸珍緣博施而備物揚燎斯光炳玉燭升香遂瑞蔚慶雲乘龍在天髣佛肸嚮九獻具舉百禮是洽乃御崇政之殿清寧之宫以朝以宴遂下詔書頒中外湛恩鴻龎愷澤汪濊留都皤皤黃髮之老扶杖而觀擊壤歌衢異口同辭贊歎曰盛哉乎斯世自聖祖東巡以還又數十年而載睹屬車之清塵也皇帝曰豫一人承丕丕基覲揚祖宗耿光大烈惟祀與戎國之大事可勿毖乃修祀典神示羣望暨功宗元祀書太常者若廟若祠若墓牲幣酒醴咸秩無文乃纘武功教大閲申以三驅勒以八陳如山如川有嚴有翼乃整旌斾鳴和鸞度遼河循山海熙熙融融肅肅雍雍以旋乎紫微之宫告至太廟蓋自有簡䇿可紀以來未有祀事光顯合萬國之之歡心極兩間之悅豫如今日者也臣以奉命留京不獲與于扈從際此大禮慶成繁禧總至天章燦爛日星為昭臣不敢以弇陋不文黯無紀述臣惟上天眷佑我大清聖聖相繼纍洽重熙薄海內外罔勿率俾自肇造以迄于兹百二十有餘載矣積厚基崇謨烈既超邁往古皇帝以大孝鴻仁作求成孚尤非自古守文之君所能及即今恭謁陵寢至誠至敬上眀下察無所不通往來兩京時踰三月之久天晴日煦氣藹如春和風舒徐榮光煜爚醴泉膏露隨地滋涌天心之感格協應既如此其昭彰臣工景從士馬踴躍父老欣欣望幸屬國喁喁傾心自輦轂以至海澨山陬飲和食德若逰華胥人情之愛戴悅服又如此其廣逺然則致治隆盛固已駕商戊軼周成追羲軒嫓顓昊彼漢代侈言眀章過沛幸宛曽何足以比擬萬一乎哉孝經有言聖人之德無以加于孝大學有言為人君止于仁大雅有言繩其祖武於萬斯年受天之祜皇帝孝通神眀仁被草木太和洋溢萬福攸同臣敬以卜我大清億萬年無疆之休也謹稽首頓首而獻頌曰天作髙山曰維長白三江濬源地軸之脊天眷大清此維與宅殷土周原是墾是闢乃疆乃場建邦有奕天命太祖載斾秉鉞既掃輝發爰拔哈逹吳喇斯滅葉赫斯伐莫我敢遏聿造帝業蕩蕩遼瀋峩峩宫闕允文太宗武烈是承東征北討莫我敢膺松杏麾戈如日泮氷詒謀宏逺大猷允升京邑相望曰盛曰興赫矣一統普幬八埏駿德鴻功三后在天皇帝纘緒昭格有虔曰維舊京山陵在焉駕言徂東王道平平乃謁永陵開運蔥蔥乃謁福陵天柱嶐嶐乃謁昭陵隆業崇崇武庫之劍橋山之弓于穆清廟有侐閟宫蕭合羶薌清尊大房以格以享綏我思成叶工祝致告祀事孔眀叶天錫皇帝萬夀無疆時雨時暘豐年穰穰乃坐眀堂以臨下土禮儀既備恩澤周溥內自州郡外及蕃部黃童白叟式歌且舞曰皇帝孝光紹列祖至諴感神自天祐之川祇嶽靈助我孝思皇帝所居景福維祺自秋徂東周遍兩畿麗日和風春臺是躋春臺是躋普天胥樂順德之孚覃被廣博東鰈西鶼南交北漠式化從風入息出作曰孝曰仁福祿攸酢皇帝之孝萬邦是式皇帝之仁四海秉德皇帝之福與天無極咸五登三嘉瑞畢集卜祚綿綿時萬時億聖駕東巡盛京恭謁祖陵大禮慶成頌有序史貽直臣聞物本乎天人本乎祖故孝子之事親也致愛則存致慤則著而聖王之御宇也以義率祖以仁率親其在廟也有日祭有月祭有時享有歲祫其祭於陵寢也近者或閲歲一舉逺者或間世一行至於朔望節序上食之禮則掌之祠官引而近之親親之誼也書缺有間矣若夫漢唐諸君謁陵上食諸儀載在史編可考而知也前代諸儒泥於章句不能緣情制儀以垂于後或是古非今或穿鑿傅會名為聚訟無所取材洪惟我朝鍾祥長白源逺流長列祖列宗積德纍仁經營締造暨乎世祖受天眀命遂朝六合撫綏萬邦中外一家繼繼承承于今百年懿休乎史册所書未之有也伏見我皇上臨御以來敷政寧人無時不以敬天法祖為心無日不以紹聞衣德為念善繼善述丕顯丕承邇者恭謁園陵特修祀事鼎湖弓劍厪僾聞愾見之思原廟衣冠動春露秋霜之慕追維世德仰溯先猷用以見纍朝創業之艱難列聖貽謀之光大萃萬國之歡心以肅雍顯相至孝也霈敷天之膏澤以覃及中外至仁也周覽盡桑麻雞犬之俗有以知邠岐之勤儉王業所由興享王及氊裘毳服之倫有以知鎬洛之聲靈皇威所由被以視夫揚雄之誇羽獵相如之賦上林安足以方斯駿烈嫓此鴻休也哉臣承乏銓衡兼司秋部不獲躬隨鹵簿厠奉璋虎拜之列葵藿之愛無由自展不揆菲陋爰拜手稽首而獻頌曰癸亥之秋七月初吉皇帝時巡六龍扈蹕豈曰盤遊大禮是秩巍巍瀋遼日華雲霱長發其祥有邰家室鑾輿未發零雨其濛屬車既駕皎日麗空油油縉雲習習祥風塞垣迢遞塞草丰茸先天弗違帝眷皇躬於爍列祖肇基俄朵天錫嘉符鵲銜靈果惟天降命敢不負荷北倚長白南控遼左豈不懷安四方徯我洪惟太祖積德纍仁清雖舊邦其命維新躬擐甲胄漠北無塵維時中原既否且屯帝曰念哉吾矝其民太宗嗣服輿圖式廓崇政當陽髙山荒作旗列八方雲屯萬幕其時中原愈削以弱帝曰時哉惟德勝虐肆我世祖一著戎衣矢無亡鏃天命有歸聖祖受之夀考維祺世宗纘緒海宇恬熙亦越我皇百祿是宜伊誰之為列祖之貽我皇大孝孝思維則東望鼎湖聿懷祖德杯棬既陳膋膟既敕春露秋霜豈惟怵惕繩其祖武庶幾不忒自朝至昃不遑暇食興京翼翼閶闔岧嶤乃陳法駕乃集百僚乃設九賔乃奏雲韶中外一家莫不來朝傾誠仰化豐毳輕貂歌風比舜就日如堯在昔聖祖三謁園陵我皇法之是遵是承念兹神器業業兢兢亰邑相望王業所興列聖在天靈爽式憑桑麻被畎禾稼盈塍億萬斯年大猷允升中天之盛喜起賡歌際兹景福是曰太和林無伏莽海不揚波在廷獻頌雲委肩摩微臣蒙眷九列婆娑豈不抽思非才則那彤墀拜手但愧卷阿右十章五章章十句三章章十二句二章章十四句聖駕東巡盛京恭謁祖陵大禮慶成頌有序彭維新臣聞德惟仁孝能饗帝而饗親治有本原務盡倫而盡制故愛存慤著已致於礿禘嘗蒸而僾見愾聞更求諸陵園寢廟自昔纍朝謁祀有舉雖書至若萬國尊親惟今特盛欽惟我皇上道隆繼述德洽神人值百年禮樂之興膺一統車書之盛無逸作所時切民依主善為師永懷祖德以列聖為皇天所祐樹億世之規模而盛亰為王迹所基繫八方之樞紐協靈辰而告廟諏吉日以啓行日霽秋旻塵清御路恭承慈聖勤定省於行幃深愜皇情驗豐登于繡甸周巡紫塞虎衛駢闐簇捧紅雲鵷行絡繹邉庭之徑部咸稽顙以瞻天屬國之名王並獻觴而上夀凡夫所覆所載罔不悉主悉臣遞近神臯勝彼周原膴膴頻紆天賞邁於殷土芒芒洵山川氣脈之英靈為風雨隂陽所和會顒趨寢廟恭謁鼎湖儼蓬島之三山融鴻鈞之一氣王公卿士駿奔走以執豆籩綏甸要荒聆笙鏞而從拜跪禮超漢制樂協虞韶我聖祖巡方展祀以還復睹曽孫繩武我憲皇奉命薦馨而後兹來孝子升禋巨典告成榮光遍溥推恩錫類留亰集王會之圖行慶施仁寰宇躋春臺之樂孝思標物則覺白山滄海非遙睿藻煥天章視研都練亰為陋今值一陽來復咸欽萬乘言旋臣民皆歡忭靡涯懿美詎名言可罄臣恭逢盛舉深愧菲才爰集詩書之辭用效升恆之頌謹拜手稽首以獻曰皇天上帝祐我烈祖丕冒海隅出日綏厥士女用集大命地平天成表正萬邦永底蒸民之生丕承基緒惟皇作極亶聰眀作元后兆民允殖敕天之命動惟厥時庶績其凝百志惟熙帝德廣運無逺弗屆聲教訖于四海安民則惠克寬克仁惟精惟一兢兢業業所其無逸眀德慎罰亮采惠疇敬授人時水火金木土榖惟修四海之內平康正直各設中于乃心歸其有極政在養民惟民從乂惟德動天天休滋至帝曰欽哉惟時惟幾紹聞衣德言豫思日孜孜三后成功在兹東土若日月之照臨多歷年所戒爾卿士克慎厥猷用奉若于先王往哉惟休祗見厥祖怵惕惟厲邦伯師長百執事之人惟恭奉幣八音克諧簫韶九成懋昭大德至諴感神紀于太常則亦有熊羆之士不二心之臣同力王室其克有勳人惟求舊惇宗將禮惟忠惟孝以功作元祀眚災肆赦宥過無大保釐東郊鰥寡無蓋時庸展親始于家邦乃曰覲四嶽羣牧誕告萬方侯甸男邦采衛罔不承德奉先思孝萬邦作式一人有慶格于皇天天惟純佑命惟曰欲至於萬年右集書辭十章昊天有成命受言載之維清緝熙福履綏之有命既集正域彼四方昭兹來許長發其祥本支百世以似以續燕及皇天受天百祿世德作求昭哉嗣服念兹皇祖錫兹祉福七月流火零露瀼瀼卜云其吉爰方啓行六轡耳耳八鸞瑲瑲百辟卿士蒸蒸皇皇山川悠逺幅貟既長無此疆爾界自西徂東畇畇原隰我稼既同黍稷彧彧麻麥幪幪洽此四國時邁其邦莫不震疊莫不率從來獻其琛受小共大共裒時之對不吳不揚會同有繹弓矢斯張一發五豝是用孝享夙興夜寐式遄其行三后在天繼序思不忘乃覯于京既庶既繁相彼泉水瞻彼溥原此維與宅大啓爾宇景員維河奄有九有詒厥孫謀繩其祖武克昌厥後有秩斯祜自古在昔天作髙山髙山仰止峻極于天作廟翼翼松柏丸丸穆穆厥聲濯濯厥靈陟降庭止赫赫眀眀於穆清廟克配彼天天子穆穆鬷假無言享祀芬芬百辟為憲式禮莫愆樂具入奏崇牙樹羽籥舞笙鼓既和且平衎我烈祖既優既渥德音不已在公載燕孔燕豈弟言旋言歸既多受祉孝孫有慶上帝是祇於萬斯年自今以始右集詩辭十章聖駕東巡盛亰恭謁祖陵大禮慶成頌有序裘曰修乾隆紀元之八年上侍皇太后自京師出古北口詣興都謁我列祖陵寢猗歟盛哉斯誠巨典粵維我皇帝陛下臨御海宇凡所施設為萬世矩念尊祖敬宗帝者首事夙夜東顧凛乎不敢康兹奉皇太后旨諏吉啓行肅將祀事遵聖祖遺軌承世宗憲皇帝志也三陵翼然神其攸宅上乃升壇薦馨以次告祭備儀備物弗懈益虔灌鬯既畢褒功勸忠旁逮于從龍之佐維時諸外藩王子部落駢集踵至臣民億萬萬皆跽瞻聖容同增感慕禮成駕興霓旌翠麾日華雲燦鱗次關僥之上蜿蜒邐迤駐清蹕于東都上益周覽從容景與神會穆然遐思睪乎髙矚我祖宗經營締造之迹咸在心目御正殿受朝錫升平之嘉宴恩綸載馳中外和會回鑾道山海關旋亰師是行也逾秋涉冬風日清朗上召問耆老咨訪土俗輦路所經普賜膏澤在行之人均荷惠賚農樂於野師忘其勞往還數千里如在户闥臣仰維我朝起自東土肇造區夏發祥之始實同邠岐自永清大定以來又百年於此薄海內外都為一家聖聖相承依古無匹皇帝臨一統車書之會當百年禮樂之期揚烈覲光合萬國之歡心以事我皇祖典盛禮崇神人胥慶是宜播之賦詠傳於無窮臣頃者既歌詩以獻又竊以固陋之詞不足揚扢聖德伏惟皇帝陛下述作協于隂陽動靜侔乎天地與詩書雅頌所稱美同符合節臣謹掇輯五經成語為頌十六章陳之黼座文章報國臣何敢云顧濡筆屬詞誠歡誠忭臣亦且自慶其遭逢焉頌曰帝德廣運繩其祖武至治馨香承天之祜禮樂眀備惟帝時舉以致其禋祀俾緝熙於純嘏念兹皇祖乃疆乃理東至於海邦畿千里肇十有二州罔不率俾繼自令文子文孫介以繁祉皇建其有極萬國咸寧纂乃祖服與時偕行霜露既降可以升山陵旗十有二旒錫鸞和鈴時乘六龍亦右文母視寒暖之節悉率左右徽柔懿恭德音是茂內平外成克開厥後奠髙山大川建無窮之基路寢孔碩神所憑依至於寢門外如將見之有孚顒若永言孝思誕我祀如何直哉惟清薦用玉豆雕纂潔粢豐盛既備乃奏簫韶九成用能協于上下以為禮之大經帝省其山駿極于天原田每每王道平平盛德大業有開必先美哉泱泱乎君子萬年禮行于祖廟濟濟翔翔侯甸男邦采衛具飭衣裳辨色始入觀國之光載篤其慶俾爾熾而昌雲上于天零露泥泥燕以示慈惠飲酒樂愷乃命有司大賚于四海崇德報功貴親而尚齒渙汗其大號慶賜遂行百辟卿士公侯干城行爵出祿以莫不增省囹圄止獄訟刑期于無刑帝光天之下受小球大球四夷咸賔匪紹匪逰皆再拜稽首以承天庥民大和會如川之流乃武乃文克篤前烈歲云秋矣習射御角力三驅之餘以數軍實展也大成天威不違顔咫尺帝庸作歌吐詞為經對越在天遹駿有聲文物以紀之與日月合其眀丕顯哉丕承哉永底蒸民之生祭則受福入而振旅其道大光昭兹來許以化成天下有秩斯祜煦嫗覆育萬物爰得我所山川出雲雨雪霏霏兆於南郊自天祜之聖人至德而風雨節寒暑時冬大有年大君之宜順氣成象福祿來為繼序思不忘聖敬日躋乃賡載歌無疆之詞天子當陽上帝是依聖駕東巡盛亰恭謁祖陵大禮慶成頌有序王太嶽臣竊惟禘祫之義同於聖揆山原之儀踈于曩作妥帖藏魄嘉愈降靈焉矣然錫圭授啓魚雅而下璿階刻璧稽堯泮渙而臨雒汜升中柴望則膋焫張皇展義來蘇則邱陵津逮天衢地輔森景柏之丸丸星畢雲捎曠原荼之膴膴雖邁邦有赫而造禰無勤非以率見克配裒敷來孝疏接下武之祺恢通周監之軌至乃桐闈闢曙飲酎計寮繐幰披寒薦鞠禁媛簫鐃猋發憩鄠杜而夷猶廄府雲闐拜陽平而局縮蓋春華賁縟殊非下鳯之輝澥棗騰鮮劇爽餐鸞之實皆不足以比附丕朝永世之經依約我后篤惠之略伏惟皇帝陛下升熙握樞受丕出震纘列聖之釐成造千齡之樂闓純蕰經地艮趾欽其凝承光道馭天神鱗協其控送進反百代之度絫黍而察黃鍾紆餘後昆之謨中尊而待衢酌荒臣庶妾洞閎闥以􅂒瞻賢戚楙親徹夤埏而並樹禹金在鑄往無溪麓之迷舜璧衆蠲求有水火之贍譬之桑林一注燥濕驟均簡珠肆縣元白各映抑揚萬吹協于八飌之鳴經緯千流洪于四溟之滙皇乎敻哉可以躞蹀軒庖之場欱吐姚姒之響者矣顧乃挈器維沖凝旒若慕遊神旁周銜慮孤竦曰余不敢遐談紹衣博騖荒古也含醇履素咸中遂􅛱懿維我祖厥有成締降在孠人式畀鴻址瞻念朽索緬言荷薪皇天后土置余局蹐之躬髙山大川環以飢溺之抱憢憢翹翹栗栗如也洎夫堯閏三題姬朔八授黃裳朝委素徽大調謳歈之歸莫辭盂帶之契已察恭已何象但有晝日之紓百昌遂登亦覺元造之樂宸儀外睟淵思內邈攬茂緒之所垂慨靈風于既衍眷兹淪化豈非宗祏之靈迓其純錫彌儼庭止之陟且夫軒鼚萬品之用基藻末以揚芳衡從五緯之文澡璇源而啓瑩是故少典作而髙辛昌窮蟬衍而重華兆嵞山祖頊元王勤商􅉨牒鋪觀左符若合國家膺五百之景休乘四七之前會華胥神母初定祥于俔天白水真人即叶靈于啖月肇祖首出三聖紹興太祖太宗丕承丕顯筌宰寄矣馨業綏矣方夫截所裁基規員展域憯淡人鬼之謀從容戈馬之烈素鱗未躍連山之噴海重波丹翨初投接地之垂雲五葉麾斥八極淑清日月之光奔走千靈豁逹風靁之氣既而大龜告契光宅斯皇疈肪玉而召鷹揚漂雨珠而錫粒食蝥弧卓地揭蛇虎以羣翔圖契開天進魚龍而合負五禮六樂聲光銜燭之門厚利龎仁根蒂文衢之蔭然後隮景若華之顛重規穹幕之表襲正陽而號四履廓墋黷而回六幽砥屬蒸徒共揖羣辟三千長邁鏗鍧不戰之征八百如歸汗漫不期之會蓋以暢元春之茂施受偃草之羣順迄我世祖一戎衣而有之吁其久也然則設都來辟勤懷旅楹胥宇生民必邍自土良繇禮不忘本樂樂自生仁祖六十年之三駕憲考十三祀之匪康規勢雖判在懇罔殊矣故曰麗正之運戴抱而輪重運掌之紀事述而志繼夫進可以接降原陟巘之逺躅退可以協嶞嶽翕河之邇猶比于在廟而憑依為親舉之間歲而大禮不瀆斯宣哲之所憴憴孝理之所亟亟故乃進禮官按恆式太卜諏吉冏伯選徒使者先驅名物式序天子揚鑾太紫之庭指斾中黃之宅皇皇三陵具禮容而眀祀事蓋在昭陽次歲而邠風授衣芒乎鑠哉夫其靈鼉迅發珥象威夷梯罼罕以髙摩駟虬螭而遐運辰旒乍舉九霄之列缺千撝祫輅方歡十地之靊隆一簇葳蕤豹尾覘景附于樊山蠼略雞翹應雄鳴于陳寶醇流鬯溉涷未灑而埃蠲協氣鴹英漢無章而景湛鉤躔轉衛帷宫敞無外之家羲御襄征帳殿肅嚮眀之理魚𦐄鳥頡秩宿序于三階嶽運川回走雲駢于七萃斯則陽開隂閉不窮􅋵軑之靈鼻飲頭蜚莫極扶輪之旅爾乃戾舊都攬荒作百雉巋然千畇如舊桑麻㥯㥯出湛濊之精神雞犬依依共熙怡之血氣繞雲髫于若綬歌咢迎釐進霜耉于修幡嗟咨送韙于是齋袚孔虔質眀皆作容衛肆具幽宫靜嘉三祇奉引八神左右盥奉溪后之盤香擲祝融之焰觩䚧鱗次傾皇澗之溫波泔淡珠隳合甫田之仁粒金支晃夜緝魚火于重幽玉豆馨晨匹樵蒸于大昊宏排詄蕩納合體之馨香大聳熛訛下靡爭之鬷假夤儀選而鴛鸖䟴穆羽調而龜麟舞用能襲鴻眀于朔拱接雲氣于西徂混江錯綺載思樂以浺瀠白嶽撑霄疊禎氛而嵂崒羽綴解華樹輟祝嘏既備彛憲載張坐眀堂而渙祥綸輯伍符而建蕭鉞十倫緝化大澤下于輝胞三表徴規都肄敶其荼火鳯銜七色散蒼陸之陽暅魚麗千屯按元娥之隂籙露蕭鬱鬱罄一草一木之歡日羽芒芒總九地九天之烈閬風寫慶簸太液而波頽大介揚稜指欃槍而氣讋南陽之賚既博司馬之儀既間五材並用盛德貞金木之符六位時乘妙有體陽秋之總抑又所以式撻武而鞏皇維藉臚歡而甄靈貺于斯時也畨禺歌椒塗舞月竁納光日際屬爌橫汾頌義荐麟玉以鐫芳擊築歌風協龍鈴而布􅞗矣然後方神轉轂嶽將送旌回塗乎蕩平憩襟乎仁夀殊徽自擾驂澤馬以揚鑣神運不勞夾山輿而結轍珍叢瑰族不加于域大之靈璧月華星匪震于乾元之色至仁簡簡宫府小大具僚進止之常至樂夷夷婦子倉箱里閭宴衎之事所謂神規齊俗妙宰宅虛錘爐萬有而無憂磐石億祀而莫紀然後知反本敦憲不叓云云之封烈照重芬厥由翼翼之顯夫揄揚上德以昭聲實于崇今綜纂見聞以永繩表于遐葉此臣下之義不可損之情臣誠薄劣生長于懋俗蹈舞于懿則意者廣曜所被翰豪之纎采皆攄惠凱所宣柯杪之零音並扇忘其戅愚輒有擬議庶幾堯衢之風比于美芹之愫裒列丹藻狀乾坤而末由欽挹淵崇顧涓塵而滋恧臣不任區區吟咏之極敢昧死再拜而獻頌曰地無歇流天無孑曜聖人之生綿輝衍浩皇矣上帝駿惠有清我皇時保念祖兢兢九極疏扃萬域砥道穴蟄淵遊諧津罄照于化既豐在工載熙我皇南面綏珮迎釐天之無為七曜旋蟻淳理楙經五季展義周邦時邁厥考維天曽我列祖莫造莫虔於皇我祖造邦東瀛黃鉉下奠紫宇髙清道扇風芳氣馳雷霍人去載胥天推式廓穨祥之址霩霩陪都蒼精下緯玉電撝樞寶胄綿千蘿啚闡萬惟此烈光重規沓憲我皇念祖恪止瑄薌神祐時饗既夀永昌大舄朱弓天函地襲念此孔修心焉如攝伐鼓既坎和鸞既鶬鉤膺翼翼夙駕洋洋霛杲烜秋協風珥御帝邁舊邦百靈相語灝瀚龍趨綿嶽鳯翼神眷佳闉宅斯無極我皇戾止有愾其心席芳視履問晷凝襟羲和振鑣廣輪肅穆芬樹仙仙金房彧彧梯霄架栱控極排櫋祥熏裂燠藹照麾寒衝牙轇轕列羽飄蕭籠姬辨禮跨媯鏗㲈牲牡既省鬯瓉既滌享薦一人息屏百辟都荔遂芳芳以眀德輯賮同琛乃荐嘉璧浚照璚源夤蔚璇條龍光時荷孠服斯昭皇之對越栗矣夔夔洞幽屬顯日躍雲綏􅞗兮我聞色兮我覩匪上斯旁匪堂斯武神之宴娭聲薌北迓陳寶球圖繽綸來下霛斿乍僑神去夷猶元璣遺耀垂貺靈修蒸哉皇孝蔚矣懋儀本天敷造罄地攽釐乾冒有端坤受有域我皇篤祜孰究以極桓桓虎旅作屏舊亰三樞晏謐八表聲靈黑齒闐庭黃支契軌撢澥思航占飌知頍震鱗題朔般足巡坰攝提從紀玉燭文眀海截丹繩日隮翠籙有清兆祀同斯景福皇清文頴卷三十八
