body:
  text: 詩七言律詩萬夀省方詩二首韓菼四載親乘繼禹謨盈廷咨訪屢吁俞白雲篇裏河渠志起居注記河工甚詳黃鵠舟中玉笥符先是賜南巡製圖河臣已導狂瀾歸渤澥還分餘潤及江湖功成不待宣房築自有黃龍洛水圖香街十字篆烟青祝聖歡迎户不扃野老壺漿爭上食所至獻萬民宴諸生皇極誦傳經祝甚聖道場盛秋毫輒禁民咸便供帳緣攀駕少停陛下從今千萬嵗畫烏處處有旗亭聖駕幸闕里恭紀八首韓菼朝看閶闔影曈曨萬乘東臨御六龍不用金泥崇泰畤獨來魯壁撫秦松宫懸叠奏聲髙下罍齊親調禮肅雍今日巡逰因釋奠陋他雲起漢皇封唐人封禪詩千年泰山頂雲起漢皇封一代堂亷論道時天章雲漢肅昭垂傳心直接千秋統翼聖遙尊萬世師德契周情兼孔思人瞻舜目與堯眉龍旓玉輅光東魯爭頌神明禮樂姿奎文閣下日華生承聖門前御輦行翠蓋紅雲迎雉尾瑶函寶冊擁霓旌罘罳璀璨簷前色絲竹鏗鏘壁後聲有喜天顔剛一笑和風進講魯諸生九成樂奏倍光昌犧象雲靁列兩行訪道肅然瞻禮器披帷宛爾遇羹牆鬚眉默契存金石上周覽聖蹟慿几行教小影立像行像諸石刻鹵簿親留重廟廊特留曲柄黃傘以示尊崇殿上聖人躬贊拜不須太祝與齊郎堂廡崇髙碧漢齊太初遺石想端倪石在詩禮堂下杏壇檜影垂璿製柏葉槐枝煥御題承聖門內有唐槐漢柏二株十丈豐碑青染黛一泓聖水碧無泥孔廟遺井之上命汲水嘗壁書想像曽留處故宅金絲蹟未迷聖林門外鬱崔嵬氣象峥嶸壯八垓雲木秋髙敷碧草宫牆日麗淨蒿萊楷林亭畔閒瞻眺洙水橋西足溯洄起輦齊聲呼萬夀聖人陵上聖人來晚出思堂步輦過愾然餘慕沛恩多祭田增後豐珠粒詔增孔林地十一頃文幣頒時耀綺羅賜衍聖公蟒服賜額中閨旌節操節並松筠扁額拜官哲嗣永山河官周公及諸賢後裔世襲勿替吾皇重道踰前典萬嵗千秋澤未磨早從洙泗證心源過魯追從永不諼東郡推恩增鳳詔上駐蹕兖州恩綸屢沛西山采石劚雲根特命采碑石於西山郊壇肅祀賢王禮命皇子祭告廟貌巍峩聖主恩化日兩楹陳爼豆素王萬古道逾尊戊午二月保和殿侍宴恭紀王鴻緒瓊筵日午上蓬萊金殿平臨五鳯開雲近衮龍當北繞春隨天馬自西來條風入檻先飄栁香氣沾衣併放梅盛世蕃王俱欵塞千秋漢武漫雄才戊午二月保和殿侍宴賜玉案紅棗一金盤恭紀王鴻緒筵開紫殿俯晴空絶塞梯航玉帛通花傍蓂階初濯露香浮蒲萐正含風擎來火棗心同赤拜捧金盤日映紅莫羡安期嘗海外侍臣飽食未央宫秋日早朝王鴻緒燎光晨起禁城烏閶闔秋聲下碧梧樂奏瓊樓傳鳯吹雲開丹陛徹嵩呼龍媒珠勒排天仗仙液金莖引帝壺聞道雄藩移節鉞宵衣頻按九邊圖駕幸西苑觀荷賜近臣宴恭紀四首王鴻緒芙蕖一片飲龍川此日身逰銀漢邊繞岸峰巒雲外出傍流樓殿鏡中懸青青田葉迎仙珮宛宛池香入綺筵何幸小臣叨侍從愧無詞藻奏甘泉從官抃舞拜殊恩紺幄傳來帝語溫自是太和流玉陛不須天樂奏雲門尚方重整芙蓉宴中使還添琥珀樽幸仰宸襟歌在鎬碩將雨露滿乾坤已沐君恩等賜酺却催龍舸泛芳湖薰風徐動牙檣轉曉日晴懸水榭孤拜捧樽罍皆玉醴坐來雲浪是蓬壺臨流還詠嘉魚什聖澤知應水旱無昆明重泛靄晴暉潭影巖光入紫微傍艦魚龍潜復見近人鳬雁浴還飛花間風起飄朱斾波上雲生繞御衣萬國雄圖同愷樂更看宸藻倍芳菲乙亥六月二十六日臣廷敬臣士竒偕臣鴻緒恭詣暢春園謝恩臣英臣杜訥暨內閣學士臣藻兵部督捕理事官臣㑹恩翰林院侍講學士臣廷瓉臣䕫右春坊右庶子臣嶽頒並宣召同至韻松軒賜饌饌畢命登舟溯山澗至淵鑑齊觀荷列席賜名酒時果復令內侍引至齊後遍觀嘉卉遂命至佩文齊恭閲御書數百幅各賜千葉荷花一瓶恭紀六首王鴻緒中涓引土木蘭舟御苑風光結伴逰兩岸栁垂青嶂密一川花泛碧泉幽雲開似入桃源徑棹轉猶迷杜若洲應勝乘槎浮漢渚更瞻仙仗列蓬邱瑶齊髙瞰玉河平百頃波光似鏡明西嶺翠微連檻合東瀛雲氣拂簾生何須牛女留銀漢謾說風雷動石鯨聖主臨淵惟鑒古泠泠山水舜琴清淵穆宸襟契太虛翛然塵外水雲居經營靈囿勤民暇歌詠卷阿聽政餘案上緑沉三代物床頭黃素六朝書回翔閬苑真何幸枚馬雄才愧不如向陽黼座對烟嵐座後軒亭碧樹龕滿院藤隂炎暑散一簾香霧午風含嘉禽雪羽來天外珍果丹葩自日南學士總饒花鳥興上林竒種未曽諳機務清閒翰墨研牙籖玉軸滿瑶編蓬萊山作藏書館太液池為洗硯川八體縱橫參造化六文揮灑入雲烟因知睿筆超神聖曽寫鸞龍九萬箋捧閲奎章到日斜更從浦溆挹明霞蓮房細展千重瓣水殿分頒五色花翠管摘來同嶽井銀罌擎出賜天家聖朝異數何優渥留作瀛洲盛事誇賦得百籟坐自吟徐元夢兀坐髙齊晝漏沉于喁忩外發清吟千般靈籟俱堪聽一派天機何處尋起滅漫馳空際想悠揚忽動靜中心老聃章句分明在誰識無聲是大音賦得凝冰結重澗徐元夢宵來颯颯起天風凍結川冰頃刻中浩影千尋開匹練清光一道卧長虹印沙鴻爪看何在殷地濤聲聼已空下馬徘徊詩興發恍如身到水晶宫已未正月二日召聨柏梁體詩與宴內廷䝉示御製瑞雪近體詩恭和元韻徐元夢內朝扶杖入班聨新霽逾看萬象鮮髙倡正宜方白雪餘音併欲繞朱絃耄齡忝預頒金管春晝欣逢敞玳筵揚拜總知交警意非誇勝事倣陳編朔漠蕩平恭頌四首彭定求睿略宣揚致太平萬方送喜集神京鸞旗絶塞書三捷鳳管中天奏九成禹跡𢎞恢謀獨斷堯封廣闢德難名微臣逺伏滄江外慙悚無能效請纓乾行豫動協天時瑞應祥徴御氣隨草向沙場青處少泉從陸地湧來竒隂隂瀚海臨旄鉞漠漠天山集羽旗聞道師征原不戰銀河洗甲幾曽遲紫塞金河欵聖朝枕戈擐甲帝營遙飽均戰士裁天膳寒恤將軍解御貂穴蟻欲逃那可得鼎魚餘息故難邀降幡竪處俘苞蘖湯網𢎞開武倍昭狼居胥頂幕烏飛百萬貔貅受指揮豈謂嫖姚弓早賜便如細栁轡徐歸縱擒互用推神策竒正交攻握祕機瞻仰聖躬勞獨甚升平何以報恩暉䝉賜御書恭紀胡㑹恩文治光昌庶績熙萬幾清暇每臨池發揮神藻山河耀沾被深仁草木知元氣淋漓風格徑中鋒含蓄露華垂聖人書學還躋聖天縱吾皇百世師書家歷代漫縱橫聖筆琳琅美莫京衆體咸精知法備毫芒無憾信天成萬鈞神力行間運百道榮光象外明誰向晉唐誇絶藝千秋琬琰獨峥嶸淵鑒齊中㳤氣新至尊染翰對芳春花朝洛水流觴日草聖蘭亭縱筆辰寶幄爐香凝睿思璇題墨妙注清神驪珠四百光華爛渥典何當逮小臣卷幅末褉御題三十三年春三月修日臨于淵鑑齊中天馬篇垂寶字多風雲變化總駢羅文傳雄駿思唐牧名叶嘉祥憶漢歌巨麗天葩真創闢謙冲聖德示臨摹吳興承㫖何堪數滄渤能涵萬壑波聖德神功詩六首翁叔元聖皇文武太平年至德如天服九埏禹貢白狼來玉帛堯封赤壤隸山川西方逺戍雄千騎北府神兵訓十連每聼鼓鼙思將帥治安曽不忘戎旃金城蛇豕擾臣藩告急軍書入玉門荒服只因鄰大宛至尊親欲救烏孫五花誰許窺神算萬國惟知感聖恩自是天心西顧切宵衣清問日臨軒春寒太白壓蕭關玉帳牙旗指顧間羽檄晨馳光祿塞傳烽夜照伯顔山地先春草三千帳天供靈泉十二間司馬大書軍府上長留勝蹟在人寰翠輦行宫召佽飛龍韜指授敢輕違雲橋青海驚橫渡鐵騎天山已合圍狐兔穴焚難假息牛羊日暮竟無歸獻俘博望齊三捷好答升平頌德威金笳兵氣入黃雲傳箭邊聲和馬羣趙信城前呼萬嵗李陵臺畔響三軍風搖玉靶龍頭轉日閃雕弓豹尾分從此域中銷戰甲好乘春雨事耕耘上林嘉樹翠玲瓏天騎西歸甲仗雄曉月斜臨九華帳春風猶繫六鈞弓南山誰比龍城跡北幕還輕馬邑功幸際升平何以報萬年稱夀未央宫太學紀事詩四首彭㑹淇謁廟夙昔蓬山展拜䖍移官喜近聖人前雍容導引羅襟佩親切趨承到几筵末學愧分新綘座儒臣榮溢舊青氊回思釋褐春風日叨被恩光十七年釋菜曈曨殿角唘朝暾月吉親師古禮存肅若朝儀齊虎拜頒來法醖獻犧尊教先鼓篋歌鳴鹿潔薦溪毛賦采蘩樺燭影搖羣吏散緑隂深鎖映朱垣齊宿初擕襆被入西廂半榻琴書靜夜張聖主齊宫親祝冊小臣清署自焚香鈴聲到枕風吹閣柏影橫階月轉廊隱隱晨雞才動聼橋門劒履已成行陪祀春秋秩祀重雍宫庭燎光齊鹵簿同鴛鷺隨班先九列牲牢將事盡三公欣從爼豆趨承下得厠冠裳拜舞中分胙携歸叨聖澤也登鼎實薦宗工駕幸瀛臺宴賚羣臣詩五首張榕端皇家别館屬瀛洲藻井梧飄爽氣流琪樹千章依鳳閣澄湖一帶抱龍樓遙天嵐岫浮空翠近水芙蓉照素秋瞻望無殊蓬嶠勝乾坤寧復有丹邱簮裾曉集鳳城隈魚貫登舟擊汰開彩鷁乘風排荇渡錦帆截浦蕩荷回松林如蓋衣霑翠莎岸成茵佩映苔佳氣逈浮仙仗外六龍早御九重臺拜恩班退入鴛行綺席𢎞開太液旁照水繁花明劒舄含風雜樹奏笙簧茗傳尚食瓊漿飲饌出天庖異味嘗翹首丹霞深鎖處九重應進萬年觴瑶池列幕帶回塘午宴重霑栁䕃凉果腹已叨銀縷膾酡顔盡覆紫霞觴暫舒笑語情方暢終秩威儀樂未央虎拜當筵歌既醉隆恩早已下明光叠捧溫綸擬飲醇泰交盛事恰臣鄰幾年載筆蓬瀛署此日乘槎牛斗津已見戈鋋清戍壘還看禮樂慶昌辰莫言近御偏承寵佇沛恩波四海均暢春園引見恭紀張廷瓉西山蒼翠護宸居簮佩趨承到玉除地接平疇觀稼穡窗迎深緑擁圖書栁絲細織春烟外鶯囀初調晝漏餘身入上林深閟境揮毫獻賦愧相如太液池張廷瓉御苑清流唘巨川沿隄樹色逺含烟曉風細織氷綃薄夜月晴浮玉鏡圓菱葉平分雙槳出藕花低覆白鷗眠移家太液池頭住得沐恩波十五年召試豐澤園紀恩四首張廷瓉曉日曈曨啓建章六龍迎處錦成行鏘鏘劒珮羅丹闕渺渺煙波渡綵航黃鳥啼殘新栁岸輕鷗浮過白蘋鄉行來蘿薜清隂徑三夏炎曦漸欲忘十畝桑隂覆竹門離離嘉穎繞華軒誰知紫闥宜春苑别有青疇布榖村蠶室絲紛氷縷色稻畦風捲碧波痕聖人無逸崇民事羅列豳風在禁園澄徹池開一鏡圎流紋如縠到階前千竿修竹森蒼玉幾㸃新荷貼翠鈿蝶翅幽花紅雨潤蟬聲髙栁緑雲偏長廊邃館無雕飾風景清芬本自然列坐濡毫滿禁林御題含義總淵深薪傳真僞敦儒術農事艱難軫聖心尚膳榮頒文陛側天漿香散百花隂皇仁樂育真無極拜獻徒慙瓦缶音聖駕南巡詩六首張廷瓉青陽吹律入春遲聖主東巡正此時事重省方符舜典制遵時邁叶周詩層霄早看勾陳轉薄海欣逢化雨滋夾道肩摩齊下拜天顔豈獨近臣知仙樂遙聞落九天金輿來自五雲邊春回芳草圍行幄風送微波放畫船一路鸞聲花外出五湖旌影鏡中懸不教警蹕先除道童稚還依鳳輦前黃河春浪拍天浮伊闕龍門控上頭千里鯨波歸大海萬方玉粒達神洲隄防紛獻盈廷議疏鑿深煩聖主憂不似漢皇誇盛事宣房瓠子盡安流禹陵迢遞越山中龍衮親臨祀典崇此日黃流勞駐蹕當年洚水荷成功天香細結丹楹霧仙仗清含翠柏風千載空山巡幸少一時邱壑盡春融和風甘雨應時看儉德深宫減大官比戶久知歌樂利天心猶自憫艱難租蠲喜溢蒼生望詔下聲騰萬姓歡作息總忘辛苦意君恩常在野人餐六師輕束羽林裝天上旌旗掣電光父老遮留還暫住壺漿爭獻亦親嘗九重駕出梅初緑三月鑾回栁乍黃端拱山龍溫室裏升平佳氣照巖廊西苑御試恭紀聖恩詩二首曹鑑倫薰風太液自逶迤重見仙蓂第四枝文鷁真從天上坐緗筵遙向鏡中窺明窗但覺雲霞潤髙棟無勞彩繢施仰止帝心崇儉德堯階物色帶茅茨上林筆札幾回頒委珮趨承侍從間寶饌遙分鸚鵡粒金爐添爇鷓鴣斑身偕彩鳯巢阿閣恩重靈鼇戴巨山拜手屏營思砥礪叨聞宸訓訂愚頑聖武北征大功告成詩六首曹鑑倫豹尾雞翹出玉京凉州大閲振威聲半天鼓動河流却萬竈軍歡屋瓦驚鵰鶚堡前朱斾繞鴛鴦泊上綵雲橫太平天子真神武止殺還須用五兵風雷隱隱護周廬五綵龍文擁帝車泉出旌門珠瀑卷草迎行殿緑雲舒九盤夜渡黃河水三略朝提玉帳書漢將莫誇臨瀚海聖人親已到狼胥聖武臨戎賊膽寒威驚鷙鳥避旌竿樓蘭西去關門逈姑衍南來地軸寬朝發尺書降贊普暮馳單使服呼韓畨戎頓顙軍麾下盡荷生成載道歡欃槍既掃沛皇仁羣醜投戈盡束身湯網恩深三面解軒臺威聳百蠻馴蕃歌人踏關前月鐃曲風傳塞上春直畫青邱為北户不須戒鼓節金錞鑾輿三駕建霓旌總為蒼生致太平欵塞已看來萬國受降何用築三城晨回雁磧雲迎馬夜度龍沙雨洗兵從此殊方歸化域年年爭路貢瑶京鷺鼓前驅振旅還告功祖廟渙恩頒千羣龍馬來西極萬里天山鎖北關播穀繅絲農事競擊轅鼓腹野人閒普天齊享升平樂炳耀神功史冊間聖武北征蕩平詩四首李孚青黃麾繡蓋出天家仙氅春風引翠華切玉昆刀裝玳瑁連錢金鎧護桃花月明嚴壁傳刁斗雲罨髙壇擁纛牙盛事軍容干氣象先聲早晚到龍沙殊方神異啓威靈天為王師掃朔庭列竈泉供花乳白連營莎接栁牙青椎牛享士傳餐遍駐馬勞軍按部聼虎旅銜恩爭淬劒欲屠鯨鱷靖滄溟鐃歌千匝氣鷹揚聖慮猶勞設重防漆甲已開銅柱路繡旗重拂玉門霜何難兵氣銷金虎尚賜天書赦白狼收盡銜刀諸黨部臯蘭直北列降王百萬明光耀羽林風傳畫角陳雲深牽羊豈解彌天罪飲鴆猶非戰士心命合燃臍膏白草賞懸函首賜黃金黑山青海歌堯日照徹龍荒大漠隂聖駕南巡恭紀二首李孚青頻籌疏瀹每軒臨特詔頒來內府金萬里安瀾知帝力九川底績見天心功同星宿源俱逺恩比滄溟水更深不用秋風歌瓠子六龍到處起謳吟自有祥風送鷁鳬挽牽豈必待蒸徒安流不覺周千里厚賚偏教及萬夫仗引歡聲盈道路棹傳謳咏滿江湖從今煙雨垂楊岸童叟年年望舳艫出郭望西山彭寧求終年挾䇲事吟哦偶向城西側帽過漠漠晚烟橫石磴泠泠朝梵出雲蘿千尋碧嶂棲真近百轉清溪入夢多帝里自饒林壑勝幾人蠟屐到巖阿皇清文頴卷七十七
