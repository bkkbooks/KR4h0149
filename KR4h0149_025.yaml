body:
  text: 策對殿試對策馬世俊臣對臣聞治天下者當全盛之時而為善建不拔之計非破庸俗之論以鼓豪傑之心則其道無由昔唐太宗與房魏論創業守成之難易而曰與我取天下者知創業之難與我安天下者知守成之難周書曰若昔大猷制治於未亂保邦於未危今天下正所謂兼創垂之盛而持危亂之防者也人才不可謂不盛而未盡所以取才之方吏治不可謂不肅而未盡所以馭吏之道懲貪不可謂不嚴而未盡所以止貪之術俗尚亦數變矣而未盡所以靖俗之謀兵制亦甚精矣而未盡所以弭兵之要故有謂今天下為已安已治遂可晏然無事者皆庸俗人之論也臣竊嘗見夫古來全盛之時不可以數遇而往往弊之所伏即伏於其盛而又竊嘗慕夫賈誼之策陸贄之議蘇軾之對皆能舉一代之治而斷其何以治何以亂何以治而不亂何以亂而復治蓋有一代之治必有一代之才以應之臣有志焉而欲陳久矣今當拜獻之始豈可自誣其所學乎欽惟皇帝陛下翠媯承符紫微正象協運而興辛壬肇四日之祥矣擬乎敬承之世豈止四百載而頌吾君之嗣實賴啓賢體元以御子丑正三才之統矣嫓乎中乂之朝何啻三十世而考昭子之刑咸稱誦聖克艱厥后敦茂質於冲齡汝翼汝為汝明汝聽濟濟然見安止弼直之休無競惟人樹𢎞規於首出有輔有弼有疑有丞秩秩然成無為至正之範今且晉此多士詢以綸言豈非已治而益求其治已安而益求其安者歟禮記曰文王以文德武王以武功漢書曰功莫大於髙德莫大於文周之興也先文漢之興也先武我國家文武並濟以有天下太祖之肇基啓祚太宗之積功纍仁至於世祖以沉毅之姿而兼以明斷之識以恢廓之度而兼以綏輯之才一年而平兖豫一年而下江淮一年而定荆襄一年而檄巴蜀不數年而五嶺望風滇南稽顙此開闢以來所未有之盛也天下文武之臣莫不願畢志竭忠以待用人才亦已輻輳矣而臣獨謂未盡所以取才之方者何也古者人才既用而嘗有末用者存於既用之外故尚書曰有三宅有三俊而詩曰赳赳武夫公侯干城今天下岩野川澤之中其隱然備公輔之器者誰耶泛然而取之泛然而應之又泛然而任之取之者不知其何以取應之者不知其何以應任之者不知其何以任欲兵則兵欲刑則刑欲錢榖則錢榖古之聖人一人止任一事者今則以一庸人兼之而有餘古之聖人終身不易其官者今則一旦應之而亦無不足是亦理之所難信也今即不必用九品四科之制而州郡之薦舉將帥之徵辟似亦不可少也若乃掣籖而使按資而升賢愚同科茫然無據彼論而後官量而後入獨不可稍存其萬一乎程才莫先於計吏而臣謂未盡所以馭吏之道者何也古者親民之官莫重於二千石有以公卿而為之者唐宰相出為刺史李泌常衮皆然若夫守令尤為親民不可不擇今之郡縣官大抵如傳舍與民情漠不相接監臨使者顧盻威動所薦未必賢所紏未必不肖其趨謁勤者即為才其應對捷者即為敏則何若專重郡縣之責外聽責成於督撫內聽考核於銓部而用唐虞三載之法以黜陟之彼監臨之所薦所紏不亦可以已乎且今天下可汰之吏亦甚多矣勢有不能盡汰者慮庸人之無所容耳夫不慮庸人之無所見而反慮庸人之無所容此從來之積弊也即以今日之計吏言之亦莫亟於懲貪矣而臣謂未盡所以止貪之術者又何也凡人之溺於賕賂而不能脫者太抵有田園妻子之見以惑其中也故有昔居環堵而今則擁甲宅昔泣牛衣而今則列姬姜昔無半頃而今則連阡陌詰其所從來不貪何以有是耶誠能稍限其田宅媵妾之數而為之禁其有敢於踰禁者即坐以僭肆不敬之罪彼有私金於筐篋而受貪墨無耻之名雖愚者亦必自笑其所為矣臣嘗見敗壞風俗之事必自卿大夫開之而後愚民從而效之此臣所謂靖俗之謀猶有未盡者巫風淫風有一於身家必喪今之卿大夫多為淫靡無益之事煽惑愚民而後侲兒舞女之裝寶馬畫船之飾探丸跳劍之俠刺猴刻楮之巧靡所不至甚且富者必有術以求其貴貴者必有術以求其富而聖人馭富馭貴之權皆何所施乎今富者之必貴既有嚴譴以禁之而貴者之必富獨相習而以為固然如是而欲風俗朴厚教化興起不可得也且夫天下馴服於教化而不能變者無事則賴文有事則賴武今日師武臣之力亦可謂膚功畢奏矣而臣獨謂用兵雖精未盡所以弭兵之要此又非無說也處今日而欲如古者遂人治野之法酇長旗鼓之節藏兵於民則誠迂然必使兵與民習民與兵習一旦有事毋論兵勇於鬪而民亦有各護其田疇廬井之心此不戰而自勝者也今則兵之所輕者民而民之所畏者兵一旦有事則民自為民兵自為兵天下未有民自為民兵自為兵而能久安長治者也宋藝祖留意賞罰平蜀之役賞曹彬而罰全斌夫亦賞其與民相安罰其與民相擾者而已矣行間之功罪即以此定之可也凡此者皆臣所謂當已安已治而亟亟焉為善建不拔之計者也雖然治天下有本有末得其本而治之則無不治矣所謂本者何即制策所云紀綱法度是也司馬相如曰風軌簡易易遵也湛恩龎鴻易豐也垂統理順易則也憲度著明易繼也嘗取歷代之典章而考之其可得而損益者不過質文之異其尚耳不過隆殺之異其制耳不過寬猛競絿之異其用耳若夫紀綱法度者不可得而損益者也紀綱法度治則吏治以肅民俗以淳文德於焉誕敷武功於焉赫濯創之有其基而守之亦有其漸者也紀綱法度亂則吏治以乖民俗以壞文德傷於優游武功失於爭競創不可以憲後而守亦不可以承前者也故曰紀綱法度者不可得而損益者也我國家之典章至簡便而至精詳至嚴明而至仁厚似無以加矣而臣尤有進者唐貞觀時天子問山東關中之同異而其大臣曰王者以天下為家不宜示同異於天下裴度既平蔡即用蔡人為牙兵而曰蔡人即吾人今天下遐邇傾心車書同軌而猶分滿人漢人之名恐亦非全盛之世所宜也誠能盡捐滿漢之形迹莫不精白一心以成至治則贊贊者皆臯益之選也桓桓者皆方召之儔也將見江南靜橫海之戈而冀北息桃林之乘即以躋於唐虞三代之盛亦何難乎臣草茅新進罔識忌諱干冒宸嚴不勝戰栗隕越之至臣謹對殿試對策繆彤臣對臣聞帝王之統御天下而綿歷服於無疆也必有其為治之本焉必有其致治之要焉夫用人不可以不慎吏治不可以不清賦稅不可以不均此三者固治天下之大端也而猶非其本也抑猶非其要也蓋所謂本者何也人主之一心是也所謂要者何也人主之以一心行仁者是也故仁以舉賢而愛惜人才則收用人之效矣仁以擇吏而澄清吏治則成廉潔之風矣仁以理財而撫循百姓則致豐亨之象而臻樂利之休矣唐虞三代之盛所以庶政畢修民生克遂而登上理者此道得也故善治天下者不恃有馭天下之術而恃有治吾心之道不徒有愛百姓之名而貴有愛百姓之實以是內之百僚有師濟之盛外之羣吏有廉法之操上之府庫有充盈之積下之閭閻有康阜之風是堯舜三代之豐功茂烈不難再見於今日者也欽惟皇帝陛下鴻圖克懋龍德方升孝思永言隆祖任母姜之尊飬惠澤普被備文謨武烈之顯承文教著日出之區武功及海隅之表四方皆巳底定天下皆巳治安而猶聖不自聖進臣等於廷而咨以用人擇吏之道足國裕民之方雖帝咨王訪寧有過歟以臣之愚陋非有藻鑑羣流之識何敢言人材之用舍非有封疆牧民之責何敢言百官之短長非有錢榖大農之計何敢言財賦之充詘然臣嘗聞桞宗元曰思惟報國獨有文章又聞歐陽修曰士患不見用及用也又曰彼非吾職不敢言是終無可言之日也今煌煌清問實式加之其敢不竭千慮之一得以對揚休命乎臣嘗緬懷上理追念先猷而知古帝王為治之本無過內治之心而治心之要無過吾心之仁何也蓋有純王之心斯有純王之政言政之必本乎心也有關雎麟趾之風斯可以行周官之法言心之可以立法故欲求國用之足未有不由民生之遂而可得也欲求民生之遂未有不由吏治之賢而可得也欲求吏治之賢未有不由用人之慎而可得也欲求用人之慎未有不由皇上之仁以立心而可得也惟我皇上夙夜氷兢期於俊乂充廷亷能著績以裕國計而慰民生者誠莫踰於此矣伏讀制策有曰國家簡任賢良以共襄治化必如何用當其才人稱其職此我皇上闢門籲俊之盛心也朝廷選用人才非茍慕其才而富貴其身也殆將用其能以理不能用其明以理不明者耳其在詩曰菁菁者莪在彼中阿言所以長育人才之道也故方其未用也嘗患其多及其既用也恆患其少與其用不足而後取何如多取以待用凡有人而不用與用之而不當皆可惜也故賢能不可不惜也以內而言之臺省之內升本以賢能而升者反逸之山林之內升而候缺不如遇缺後升久置之拾遺補過之列非無益也外而言之監司郡縣之轉遷亦以賢能而升者又留以未竟之案有功而升者仍以有過而留苛求於錢榖刑名之間亦巳甚也總之知人則哲惟帝其難必得知人之佐而行以保任之法然後真才輩出矣臣每見今之在位者見一賢焉若親與邇不敢舉也見一不善焉若疏與逺不敢去也問其故曰避嫌也避嫌之念生而積行之君子壅於上聞矣臣故曰仁以舉賢則愛惜人才而可以收用人之效者此也伏讀制策有曰貪風未息誅求下吏以奉上官遂至不肖有司私𣲖橫徵民生益困何法而可革其夙弊興言及此真百姓之福也夫今日之百姓誠苦矣苦於有司之剝削也今之下吏亦苦矣苦於大吏之誅求也大吏之取於小吏必飾其名曰公費不知藏之私槖之中者為公乎為私乎有司之取於百姓者飾其名曰樂輸不知得之敲撲之下者為樂乎為怨乎臣恐雖文致其辭而終無以掩人之耳目也於是一田之入而有兩田之出使吾民曽不得賣絲而糶榖焉一定之稅而有無定之徵使吾民曾不得聚廬而托處焉耒耜方思東作而輸將不待西成使吾民曾不得水耕而火耨焉貪吏之弊一至於此民生安得不日困乎以臣計之懲貪之法不可不嚴也懲其吏之小者不若懲其吏之大者夫大吏之貪不止賦斂無度巳也其位愈尊其害愈大其害愈大而人愈不敢言即有不畏强禦之臣出力而排之不過舉其大槩而不能悉其實也莫如訪其貪之最者而懲之彼貪冒無耻止為室家妻子計耳以今日居官之所得為後日平居之所樂何憚而不為之惟行漢世懲貪之法宋人禁錮貪吏之制彼又何利而為此耶此非過於刻核也蓋除吏之蠧也去民之害也殺一二人而天下皆生也是天下之至仁也臣故曰仁以擇吏則澄清吏治而可以致廉潔之風者此也伏讀制策有曰國用浩繁繄惟正之供是賴乃催科不善者每昧於撫字兹欲使草野免追呼之苦而度支恆足此以見愛民裕國之𢎞模也夫今之賦猶古之賦也今之民猶古之民也何以古則上有餘而下無不足今則上未嘗有餘而民又患不足豈非撫字催科之道得則俱得失則俱失者乎故善催科者必為民治農桑焉必為民廣畜牧焉必為民緩刑罰焉必為民通有無焉如是而民力裕矣民力裕而上之所求無不應矣不善催科者惟日夜取民之財窮民之力日削月朘寖以大窮將元元安所歸命哉臣嘗觀小民之家其初牛羊果蔬熙熙然若為子孫百年之計也者一往過焉則為墟矣再過三過焉則又為墟矣問之其鄰或曰逃亡也或曰賦重而不能守也是非催科之所迫而然耶故撫字之道不可不講也惟皇上𢎞豈弟之恩立慈惠之師使天下之為吏者寓催科於撫字之中則上有倉盈庾億之慶兼撫字於催科之內則下有家給人足之風臣故曰仁以理財則撫循百姓而可以致豐亨之象臻樂利之休者此也然臣反覆深思欲為皇上更進一籌而終無易於仁以存心之為要也書曰皇天無親惟仁實親又曰民罔常懷懷於有仁此之謂也臣草茅新進罔識忌諱干冒宸嚴不勝戰栗隕越之至臣謹對殿試對策韓菼臣對臣聞帝王欲舉治天下之大法必先有以倡天下之人心夫心者萬事之權輿至治之根柢也世有百年必敝之法而有萬世可以無敝之心為政而不本之以心雖舉唐虞三代之法施之而無一可古之聖王不能以身勞天下而惟以心勞天下其分猷布化則寄之百官有司其兼總條貫則付之紀綱法度而其子愛元元忠厚惻怛之實心必有餘於用人立政之外者以勸其羣臣之遞相倡也以率其下漸磨陶冶淬厲鼓舞務盡出其精白不欺之心以為天子拊循斯民之具何者當興何者當革若何而可若何而否張弛寬猛休飬生息君臣相與早作夜思無往而不得其當由是衣食足而積貯充教化行而獄訟息暴民不作兵革不試即有水旱不時之虞無改乎閭閻樂利之舊馴至四方從欲協和風動人事修於下天休應於上隂陽以和風雨以時則惟聖王能帥其臣以實心行實事之所致而非徒法嚴令具一切隨事補救潤飾吏治之所可幾也欽惟皇帝陛下得一居貞兼三出震定黜陟而澄吏治逺嫓雲師龍紀之遺因燠暘而念民依務協畢雨箕風之好覃敷文教而益講於道德仁藝常使史誦詩士獻針底定武功而不忘乎獮狩搜苗共美右騶虞左狸首淑問既己揚於疆外湛恩既巳普於羣生庶績既巳受成百神既巳順職乃猶進臣等親策之以府事未盡修和治道末臻醇備而欲䆒於仁讓之化休飬之澤審幾度務設誠致行之源此真公聽並觀懸鞀設鐸之盛心也臣請得而備陳之臣惟獄者天下之大命和氣之所由致災沴之所由生也我皇上深矜庶民之不辜時沛更新之恩屢下停刑之令而且寬失出之罰重矜疑之典禁慘酷之刑所以戒枉濫者至矣而民猶或多寃者何也制策曰引律多煩駁察誣良時見參奏臣以為今日刑獄之刻正在於駁察苛於前而參奏隨其後也古之治獄者蓋使之議論輕重慎測淺深寬然得盡其心焉今自臬司上讞毋論或重或輕而必以駁察為例有司苦於其上之苛刻繳繞也乃逆窺意指之所向而文致罪人之辭以求一當究之出於罪人之供者實非出諸其人之口者也而上下文移公名為妥招夫招而曰妥是徒幸免駁察而不顧生民之命者矣臣謂宜少寬假臬司之參駁而第慎擇其人焉以寄一方之民命則庶乎其可也而臣尤有請者在减例而一從律古者律一成而不可變而復有疑有比是律之中已不勝其權衡變化而不必增例以預擬之也今常例之外條例日增徒使輕重上下得易以為奸而巳矣且夫法亦顧用之若何耳劓刖椓黥蚩尤之刑而唐虞仍之不聞其或濫五刑三千法莫詳焉而周之中葉不聞其召祥刑之當否果不在法之詳略也又況今之律所謂以准皆各其及即若八字之義亦巳盡乎小大之比豈猶不足而復議例乎恭惟制策念積貯之當務而洞晰夫常平之設多屬虛文賑濟之恩奉行不實臣以為今日欲行古者遺人委積之法則迂如近者頻下賑濟之令亦難為繼欲倣古者平糴之制又恐有結糴俵糴括糴之弊若欲一恃於常平則出納斂散之不時蓄積之不實今亦既見之矣而臣竊以為今日惟社倉之法猶可行也誠各委一方之守令俾請其鄉之耆宿有才德者勸民量輸其粟而時斂之而時出之少加其息以償腐耗其行之也以酇鄙而不以縣其主之也以鄉人士君子而不以官其勸之也以忠厚憯怛而不以督責苛急於以禦凶荒也其庶幾乎若夫制策所云耕九餘三即有災祲而民不饑者此則足民之本計也臣謂今日足民之道有三曰減賦曰緩征曰減餉今賦稅既有定額似不可復減然古者十而稅一又或十五稅一三十稅一則今他省之額最輕者猶為重也而江南一省之入至六百餘萬缺釐毫以上輒罪之及上計簿而缺者亦數百萬也此數百萬者民不敢缺而官不能有也則安歸乎夫徵發急則奸欺易生條目多則侵蝕難詰勢不得不議停亦不得不議蠲則曷若少留有餘於民之為利乎臣請即一省以例其餘權其輕重茍有可少寬減者減之藏富於民即餘富於官此時務也緩征之說諸臣請之數矣言之切矣皇上亦欲行之再三矣而格而不遽行者以協餉之故則臣請言減餉之說古者一州之入必足當一州之出姑以戰國時言之飬兵百萬而不仰給於他國今天下大定而餽餉不絶如歲歲用兵竭中原民力之供輦輸於嶺海之濱絶逺不毛之地而所在雄藩大鎮外挾一二竄伏山澨之餘孽以自重而內以邀於朝廷日耗司農不生不息之財以厭其子女玉帛無窮之欲此豈可為繼而輒因循而不變乎臣請於兵之可撤者撤之其必不可撤者則留屯田古者常且戰且屯今正當飬兵不用之時其力尤可用且往者兵在湟中則屯湟中在淮則屯淮在許則屯許在振武則屯振武在烏孫伊吾則屯烏孫伊吾安得藉口無可耕之田乎或猶有不足則姑以近省之餉量給之俟行之數年佃作盛而軍實充乃盡舉協餉而罷之協餉停而征可緩賦可減矣緩征減賦而民有餘財則可以耕九餘三遇災祲而無菜色矣凡此數條臣敢因聖策而盡其愚雖然為政有本致治有要則臣以為必先於倡天下之人心以實心行實政而後可也宋儒朱熹有言世有二敝有法敝有時敝法敝可救之以法時敝必變之以心今百僚師師庶事具舉然諸臣或畏罪之念重而踴躍之意輕功名之慮深而忠愛之誼薄推委瞻狥之情多而公忠任事之氣少則或者御臣之道亦有未至也臣謂宜推忠信以結之寬文法以優之破資格以異之豐祿餼以勸之崇尚聖賢之實學以砥其禮義廉耻之防試以當世之要務以觀其經理才幹之實漸磨陶冶淬厲鼓舞而向之數條者可以付之其人有餘矣然其本要在皇上之一心誠夙夜講學一本於戒謹畏懼之至意則德業益充矣恭已出治而一將以吁咈咨警之實心則萬幾益敕矣側身修省齊居淵默而一出於敬天之誠則嘉祥致矣冬寒夏暑祈福請命而實格以愛民之心則生飬遂矣此所謂以仁心行仁政而政成化洽無一物不得其所以進於古帝王協和風動之治者也臣草茅新進罔識忌諱干冒宸嚴不勝戰栗隕越之至臣謹對第一問萬松齡通經所以致用治不本於經術非治之至者也虞舜咨牧曰食哉維時洪範八政首食與貨豳詩言治田尤詳蓋農事之於治綦重矣先王體國經野其制備在周官太宰以九職任萬民一曰三農生九榖鄭司農謂三農者山澤平地固以地為别矣然山澤之中難以種榖惟康成云原隰平地農民可於三處營種其說殆不可易而或謂上中下農夫三等以人為别則非也禹貢則三壤以定賦雍州黃壤得土正色厥田上上冀州白壤厥田中中揚州塗泥故列下下而他州胥凖此矣孔頴達謂九州之內視地之肥瘠為上中下三等以成貢賦之法其實一州之內亦有三等周禮一易再易之别雖雍冀間亦然而所授一夫百畝之田要惟以不易者為凖爾雅之三田自一嵗以至三嵗曰菑曰新田曰畬所耕愈熟則得榖愈多上農夫可食九人遞減而至食五人勤惰既殊則收效亦異故及時趨澤農民亟焉若夫井田之法一夫百畝夫三為屋屋三為井遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿九州之廣起於六尺經界正而爵祿可平三代以上之治所以迪斯民於康樂也至魯宣公履畝而稅春秋譏之何休注公羊謂井田之義在無泄地氣無費一家同風俗合巧拙通財貨五者具備年豐裕阜民樂其業而頌聲作焉井田存而先王之澤未湮也周禮大司徒以土㑹之法辨五地之物生山林川澤邱陵墳衍原隰物各有所宜生分别五土視其髙下因地之利以為樹植也以土宜之法辨十有二土之名物分野十二邦上繫十二次相民宅而知其利害也以土均之法辨五物九等五物者五地之物九等者騂剛赤緹之類是也至載師所掌六鄉之外有九等之田廛里場圃之類是也他若九土見於左氏九地見於太元名目雖殊而要不離乎五地九等者近是是載在經籍者固班班可考而班固之志藝文也農凡九家書百一十四篇雖出一家言而亦與經並列誠以農者民生日用之常經所關為至巨也今觀於管子呂氏春秋淮南子等書言農事甚悉皆原本周官而多託於神農后稷之言以伸其說顧其法之最善者莫過於代田區田代田之法始於后稷甽長終畝一畝三甽一夫三百甽而播種於甽中嵗代處故曰代田畝欲廣以平甽欲小以深正其行通其風凡苗其弱也欲孤其長也欲相與居其熟也欲相扶故三以為族苗乃多粟苗生稍長每耨輒隤土以附根比暑盛隴盡根深能風與旱其在詩曰或藝或芓黍稷薿薿藝以除草芓以附根故薿薿而盛也漢武帝時搜粟都尉趙過行其法嵗收過縵田畝一斛以上善者倍之區田之法始於伊尹田長十有八丈分十有五町中間十四道其法有三等以上農中農下農為别漢成帝時議郎泛勝之奏曰昔成湯時伊尹善區田教民糞種嵗收粟畝百石勝之試為之得四十石此見於諸子史傳以佐經之所未逮者又班班可考也自是而後有賈思協之齊民要術李淳風又演之唐中和節有進農書之例宋景德有農田敕之頒胥以農事為兢兢我皇上宵旰勤勞無刻不以田功為念而又特命儒臣編輯農書昭示天下為閭閻久逺計是則井田雖不可復惟取代田區田之法隨地相宜審量而善用之以經術為治術上追周官周禮遺意使民務本樂業衣食滋豐由是導之以禮義澤之以詩書雖唐虞三代之隆不是過也臣幸遭逢聖世敢不抒所見以為黼座獻乎第二問萬松齡自古名臣之進說於君者其大指所在要惟欲其君涵飬德性以為出治之本詳平政體以為致治之方而巳古之君天下者堯舜禹三聖相繼同一執中湯以義制事以禮制心文王敬止武王執競而其時臯䕫稷契為之臣伊萊周召為之相上下之間交相警戒者胥以懋修厥德為要故風動時雍之盛太和大順之徵非後世所可及誠以治天下有本焉本者何在端其心而巳三代而降急於言事功而緩於言性道此孔子所以小管仲之器而荀孟不得並稱也雖然管子之言三本曰德當位功當祿能當官猶有古官人之意焉而其言六務必以節用為先亦不謬於食時用禮之指荀子之言三具仁義是矣而必繼之以威是假仁義之說以行其督責固王者所深惡也而曰欲王則王吾不信巳宜其所謂四齊一因任乎法而望民願俗美詎可得哉孟氏既沒董仲舒三策為能獨見其大而其立說謂王者所為宜求其端於天天任德不任刑王者奉天以從事亦宜任德教而不任刑其言粹然一本於王道而矯戰國功利之習故後世醇儒必以江都為稱首若夫鼂錯本學申商刑名故其上書以知術數為先及選賢良所對三策以五帝三王五霸並論而其意指所向惟欲以霸術輔其君此則董子之所羞稱也嚴安徐樂皆上書言世務樂之意在於修德瓦解土崩之喻足為千古炯戒安之意在於救弊而制度以防淫使貧富不相耀以和其心猶有一道德同風俗之意焉至崔實所著政論指切時要而仲長統稱之荀悅作申鑒五篇有曰道之本仁義而巳五典以經之羣籍以緯之又曰為政先屏四患乃崇五政皆淺學所弗能道誠有足採者焉自後貞觀之治號為極盛一時房杜諸賢而外直言極諫有致君於堯舜之心者莫如魏徵十思之疏首曰見可欲則思知足夫君能窒欲則思過半矣太宗行其言不數年間時和嵗穰此仁義之明效大驗也司馬光五規之論終之以務實而致警於忘逺元祐之政不竟其用良可慨矣其以十事入告者唐宋諸臣多有之如姚崇所論在先仁恕元微之所論在廣聰明范仲淹所論始於明黜陟終於重命令程明道所論始於朝廷終於鄉里因時擇術言各有所當非茍而巳也而惟呂公著之十事曰畏天愛民修身講學任賢納諫薄斂省刑去奢無逸其義至純其詞至備可為千古人君之凖則焉伊川有言曰當世之務所尤先者三立志也責任也求賢也而三者之中復以立志為本紫陽封事有曰天下之大本心也其說雖平易無竒而臯䕫稷契之臣伊萊周召之相所以致君於堯舜禹湯文武者舉不越此而惟董江都正心以正朝廷之一言深有合焉此程朱所以直接孔孟之傳也彼管荀者霸佐才耳何足語於此哉歐陽子云三代而上禮樂政治合於一知禮樂之外無政治亦可知德性之外無事功矣我皇上天亶聰明日躋聖敬躬體堯舜之道而猶朝乾夕惕望臣鄰之弼直德性日益醇政治日益洽風動時雍之盛太和大順之徵不難復見於今也生逢斯世者何敢以三代以下之治上塵天聽乎第一問朱荃臣聞致治之君首以農事為重欲興農事先勤勸課欲勤勸課先辨土宜蓋土宜辨而後樹藝成樹藝成而後民財裕先王體國經野之規莫大乎是然而陵谷遞遷古今異勢經書所載雖詳至於物土之宜而布其利則又在乎變而通之者矣粵考周禮九職自三農以迄閒民各職其業而農為之首三農云者前鄭與後鄭說各不同一以為山農澤農平地農也一以為原農隰農平地農也按司徒掌葛以時收絺綌之材於山農徵草貢之材於澤農援此以證則前鄭之說可信要皆以地别非人别矣禹貢之三壤蓋因水土既平取九州榖土而品節之定為上中下三等周禮之不易一易再易則以田之肥磽定授田多寡之數既以均其賦稅亦以休其地力若爾雅之曰菑田畬田新田又以一嵗再嵗三嵗之異而命之者耳孟子王制皆言上農夫食九人下至五人蓋糞多而力勤者為上農其次以是為差與小司徒之上地家七人中地家六人下地家五人此為人功彼為地力各為一義而其說正可兩存至於井田五義何休言之蓋詳曰無泄地氣無費一家同風俗合巧拙通財貨以漢唐後地勢考之其法巳不可復行然善學古者不必泥其迹而未始不可師其意蓋泥其迹則雖先王之制適足以滋紛擾師其意則雖異同之論皆可以備參稽也五地見於周禮所稱山林川澤邱陵墳衍原隰者是而管子又有五粟五沃五位五蘟諸名九土辨於禹貢所稱白壤黑墳赤埴泥塗之類是而淮南子又有農土沃土滔土并土肥土中土成土隱土申土諸名九地詳於左傳異義所稱山林之地九度當一井藪澤之地八鳩當一井京陵之地七辨當一井淳鹵之地六表當一井疆潦之地五藪當一井偃瀦之地四規當一井原防之地三町當一井隰臯之地二牧當一井衍沃之地九夫為井者是而揚雄太元經又有泥沙澤地沚崖下田中田上田下山中山上山諸名九等者上中下各三等即据五地之內分為九等而漢書叙傳亦有髙下九則十二土者即十二分野之土而後漢書注亦云地有十二分按之於今正不必其盡合要皆辨方物土者所宜博考而詳究者也我皇上情殷九扈念切三農勸課之詔遍及閭閻然幅員既廣五方之土性不齊是宜酌古證今辨其剛柔燥濕之宜勒成一書垂諸永久俾斯民鑿井耕田而共忘帝力豈不休哉第二問朱荃百家之論政尚巳大抵言之得失視乎識之淺深而識之淺深又視乎學之純雜其以功利起見者才臣之言也以民社起見者忠臣之言也以義理起見者純儒之言也自古在昔不乏嘉謨嘉猷而惟六經之辭有純無疵此無他其本端耳管子以德當位功當祿能當官為三本以節用賢佐法度必誅天時地宜為六務荀卿以仁義威為三具以治法佐賢民願俗美為四齊其言純雜互見而均有俾於治術要亦經之支流餘裔也漢儒以董子為最非鼂錯比錯之論兵事及言守邊備塞勸農力本剴切詳明皆合經世之務然所論列惟於利害加詳則猶是才臣而巳至其賢良對策頗近貢諛董子則於經術獨深天人之理見之真而言之切觀其敷陳教化推本王心道之大原出於天一語實開宋儒理學之先三代而還未易多覯若嚴徐之陳世務則等輩耳嚴安之論多本賈誼徐較警切亦駁而不純未足置優劣也仲長統稱崔實政論特以矯一時之弊荀悅申鑒五篇於政體為詳今採入後漢紀及資治通鑑者乃其尤精要者耳唐室諫臣魏徵最著十思之疏尤切格心如云思知足以自戒思知止以安人思謙冲而自牧思江海下百川思三驅以為度思慎始以敬終思虛心以納下思正身以黜惡思無因喜以謬賞思無因怒以濫刑卓乎讜論與聖賢省克之功何殊太宗虛巳聽納以成貞觀之業實徵之力也宋則司馬光之五規分著保業惜時逺謀重微務實其議論詞意正與魏徵相埒責難陳善二子可無愧焉至於十事陳說則唐姚崇宋范仲淹吕公著李綱皆有之而范吕之言為最著若夫明黜陟抑僥幸精貢舉擇長官均公田厚農桑修武備推恩信重命令減徭役此范所陳也畏天愛民修身講學任賢納諫薄斂省刑去奢無逸此吕所陳也論各不同要皆致治之模立德之本若王安石亦嘗以十事入告則意在要君雖經術紛綸可無取矣逮乎理學昌程朱出伊川言先務在立志責任求賢朱子戊申封事言急務者六而曰天下之事千變萬化其端無窮皆本以人主之心此則大儒之言體用兼備明德新民一以貫之可與六經並傳豈漢唐諸子之所能及哉小臣愚昧不能盡䆒羣言得失之故祗承清問撮其大略以對無任戰懼隕越之至皇清文頴卷二十五
