body:
  text: 詩五言排律瞻仰盛京宫闕念祖宗創業艱難恭賦理密親王允礽祗命趨遼海崔巍仰舊宫嚴凝天氣肅盤踞地圖雄念昔開王業乘時奏武功師征方自葛城域又遷豐一劍風塵際三陲指顧中神威宣率土求莫協蒼穹式廓彌增壯維垣遂克崇八門連閫域雙闕拄髙空曵珮千官入輸琛百國同兵農旋定制禮樂漸移風爰及純熙介逾看景歷融中原欣奠鼎故里抱遺弓陶復追家室舂陵望鬱葱星辰咸拱北王氣本從東幸是餘休渥還令後裔䝉聖慈垂闓澤敕遣諭微躬逺歷關山峻來親祀典隆丕基勞櫛沐奕葉荷帡幪松檟靈祗護枌榆社飲通有懷長不寐明發惕淵衷賦得萬壑泉消夏千峰翠作秋應制莊親王允祿萬水回環集千峯次第連披襟實樂矣縱目更悠然翠寫秋容出清將夏暑捐涼風生密樹爽氣滿遙天仁智情應洽生成道巳宣隨鑾行幸日俯仰興無邊鶴果毅親王允禮舊號仙人騎蓬山路未岐九臯通碧落一舉到華池宛轉青鸞舞雍容白鳯儀在隂聲可和警露夜先知入帳非無術銜珠會有時緇衣誰製作縞袂想風姿食有芝田粟棲應若木枝鵷凰頻接羽丹穴許同窺驪山溫泉果毅親王允禮西郵來奉使經此古溫泉沸訝陽氷渙潛疑隂火然海賦陽氷不冶隂火潛然濺波千㸃雪徹底一泓天可使纎埃淨能教積滯捐庾信溫湯碑略醴泉消疾神水蠲疴神功元一氣靈蹟儼雙仙蕩滌洪罏翕滄涵銀漢連虛無來素女倣佛遇丁芊藝林伐山丁芊祝融女嫁元冥子為溫泉之神風珮搖聲細雲鬟照影妍鴻濛浮玉海㶑灔泛珠淵下上華清月唐溫泉宫又名華清宫東西繡嶺烟東繡嶺在驪山右西繡嶺在驪山左寶針張道濟綺語杜樊川宫憶初唐建名垂貞觀年扈駕省農果毅親王允禮洛水披圖日弇山紀石時八荒歸雅化九域奠丕基拓地過隆古觀風舉盛儀金輿彰順動玉琯叶昌期負弩趨疏勒飛書召郅支塞雲縈紫蓋邊月映紅旗北陸風霜潔西郊秉穗遺翠華還上苑玉輅過東菑止輦求民瘼回鑾問土宜雲鋤紛似織露積簇如坻曠野逢耕耦中田見秉犂草零藏雉葉桑翳宿鳩枝遂仿三推禮長歌七月詩鸞鑣花外駐玉趾隴邊移照以春臺景暄之黍谷曦何勞先甲戒不減上辛祈嘉榖來牟布恩膏土脉滋歡呼田叟列忭舞從臣隨國寶尊農業民天托甸師艱難三古繼訓誡百齡垂實栗應連畝方苞定兩岐有年賡雅頌無逸著針規翠釡羮長滿紅蓮飯可炊蒼黎惟擊壤黃髮喜含飴蠟臘民無缺羔豚嵗有資漫誇封泰嶽却勝宴瑶池德比神農教功超保介咨微臣陪扈從濡筆奏雍熙勵志果毅親王允禮若木分枝近銀潢衍派殊清宵螭陛侍長日鯉庭趨月露飄紅桂天星種白榆含光希玉璞揚彩羡鵷雛少小惟耽學生平不貴諛惜隂思逺道愛日勵修途遂恐檀為榖終期石有瑜劬勞思朴斫誦習在盤盂奧理探心性天倫敬髮膚優游為善樂珍重不資軀拂几心偏適調琴意亦愈相期惟傳癖所鄙只錢愚分陜周公旦裁桐晋叔虞未能同尺寸何敢較錙銖制作窺神搆儀型仰聖模談經秦博士挾䇿魯諸儒繡虎雖才俊雕蟲豈壯夫拈詩頻即席問字或趨隅燕翼欽詒厥鴒原重友于蘿纎依柏直蓬弱賴麻扶天上恩波濶寰中政教敷皇仁頻洽浹帝澤久霑濡德被尋常地風行百億區華萍開舜沼翠萐長堯厨海甸頒王瑞河圖告帝符春風人樂愷化雨物昭蘇殿閣摳衣入郊園攬轡紆曉風楊桞眼晴旭杏花鬚腷膊碁鳴墅琤鋐矢插壺林亭饒逸興硯几得清娛蓬島曽遊未仙源得似無竹留餐雪個松挺傲霜株扈蹕千軍動陪輿七萃呼邊風調冀馬塞月挽燕弧雲路三千里天街十二衢野雲連草樹寒日淡烟蕪秋盡從禽樂時平教戰須解縧摶健鶻舉網截奔狐事偶陪搜狩心常寄典謨臨書先起草㸃筆試研朱接要提文柄探元握道樞不煎氷作水肯買櫝還珠極口篇章共殫心竹素俱情緣涉世淡貌以苦吟癯直道青松在閒心白鳥孤英賢如不棄欲縶食場駒和題西湖韻和親王𢎞晝覽卷懷佳勝名區未許同平湖開㶑灔精舍倚巃嵸九夏晴光泛三春瑞氣融雲山浮秀色景物奪天工暮靄添烘染朝烟倍鬱葱有花皆爛熳無雨亦空濛却勝宜春苑還過避暑宫中流凌浩渺絶頂歎穹窿波共長天白霞連夕照紅萬松排嶺面千堞繞湖東孤嶼寒香發虛亭翠黛籠招提凌碧落岩壁引飛虹鳥噪斜陽外鐘鳴古木叢葛翁留故跡丹叟有遺風玩月乘輕艇尋芳跨玉驄往來無俗客傳說到村童白傅長堤上蘇公往蹟中披圖如巳到吟眺興無窮題西湖畫扇慎郡王允禧今識西湖面丹青顧陸同移山來筆底决水入毫中深處行難盡髙原望去通峯頭含暮色林表見春工洲渚形廽抱樓臺氣鬱葱野雲皆靉靆晴靄半空濛緑桂詩人宅青蓮釋氏宫長橋羅近逺古塔起穹窿烟亘三潭白霞分萬嶺紅星龕松羃䍥雪竇石玲瓏塢有燒丹叟亭遲放鶴翁藥窗苔蘚合樵徑薜蘿豐城郭清輝遍村墟碧樹籠隱聞鐘起寺恍見澗垂虹岫合猿藏壑花深鳥在叢遊船邀落日客袖得清風嫩草隨芒履長堤引玉驄椰瓢分蠟酒蠻榼從山童勝跡神能領竒觀意自融從來詩畫興對此轉無窮賦得龍池春草平郡王福彭上苑陽和早龍池百卉鮮萋萋青匝地冉冉碧連天濃染花梢露輕霏樹杪烟細叢依曲岸踈影落清泉色映金階靜隂隨翠荇牽香塵棲嫩緑芳草鬭新妍奉命督修福陵水法恭紀平郡王福彭自天申泰運卜地肇王基佳氣東京壯祥光北極垂皇圖原鎬洛大業遡豳岐堂構經綸逺勳華建立竒一成開草昧尺劍定邊陲景命天興漢乾符籙受姬作求綿世德紹述際昌期長嶺蟠龍脉渾河繞鳯池鼎湖攀不及弓劍鎮於斯閶闔通霄漢蒸嘗峙鼎彛烟霞呈瑞靄草樹育靈芝逺岫青羅列遙峰碧逶迤紛紛排彩仗奕奕擁旌麾瀰渺江兼海蒼茫派與支㑹歸俱有極環抱更無涯但覺霛源漲微嫌故道移菲材膺巨任寵命被恩私奉詔臣初至鳩工力漸施增髙雲路繞培薄土膏滋曲岸金堤固圓流璧月窺淪漣澄藻鑑㶑灔淨琉璃羣瀆朝宗日千條一貫時涵泓生厚澤廣大擴宏規垣禁諸星拱明堂萬馬馳寶城瞻帝闕喬嶽奠坤維磴道連層級松林接茂枝典謨鐫緑字功德矗豐碑黎庶騰歡頌君王格孝思恪恭承聖訓摳謁肅朝儀萬世無疆福庥哉燕翼貽香山輔國將軍博爾都萬木鬱蒼蒼回巒碧照堂雲來山寺暝花覆石門香攀樹登峯逺穿崖引澗長傍簷藤作壁近水竹為牀清嘯臨芳甸髙吟向大荒彈琴魚解聼拂席鳥爭翔塵世渾相隔身名竟兩忘醉餘幽興劇歸路滿斜陽福陵陪祀恭紀張玉書大漠龍興日邊庭虎步辰白山浮王氣黑水渡真人一旅璇圖廓千秋景運臻宅都森拱衛卜域湧嶙峋拜手瞻丹馭攀髯憶紫宸禡旗師應律籌幄動如神塞北收俄頃河東定浹旬射鴽遼海岸獵兕嫩江漘駿馬諸藩贄編珠絶島珍莠鋤張聖武嘉植飲皇仁書契文初炳耕桑詔屢申英雄來草澤廟社闢荆榛綿蕞儀追古豳風俗舊淳地寒銀磧雪人燠翠華春肇迹垂鴻永開基翼燕新衣冠藏石隧弓劍護霜筠殷享祠官肅成功祝史陳雙峰窺日月虛殿拱麒麟蓋代規模濶敷天翊戴均痛餘趨磴下想像屬車塵昭陵陪祀恭紀張玉書玉歷歸真主禎符際盛期丕承髙廟烈式廓太平基仙馭追應杳神游儼在兹山河垂睿略日月仰天儀開國經綸密當陽雨露滋聲華陳羽衛儉德示茅茨獻納龍墀引圖書鳯閣披愛賢通燕笑拊卒問瘡痍訓切投醪事恩深挾纊時兩勤南漢駕頻趨北庭師水劃熊津濶山廽雁磧竒旌門羅貢賮毳幕擁降旗環島收唇齒緣邊戍虎羆雕弓臨塞徑鐵馬度遼馳指顧中原計艱難締造規令模傳寶籙遺範鏤豐碑先帝羮牆慕今皇陟降思薦馨浮酎醴展苾溢松脂芝草周垣茁春隂匝殿移五雲回望渺霑灑有餘悲長至日上躬祀南郊恭紀張英至日躔南極初陽紀仲冬繡裳添綵線玉琯應黃鐘慶典同函夏明禋掌秩宗齊宫香霧繞泰畤碧雲封視版臨深殿親郊出九重霜華迎翠輦爟火照寒松登降聞天語堂皇仰帝容瑶臺三后配黼帳百神從繭栗燔柴犢星辰護燭龍祠官調寶瑟舞羽間金鏞一德符穹昊羣僚秉肅雍遙瞻蒼璧薦共覩紫烟濃䝉賜觀聖製詩集恭紀張英聖藻盈緗帙髙吟祕殿清端居因感物幾暇偶怡情字掩三辰麗詞探六義精含毫當紫闥結念在蒼生瑞雪歌銀甕華星詠玉衡艱難憐荷鍤辛苦憶從征句每臨軒得篇多駐輦成烟霞邀盻賞巗壑記巡行氣溢河山壯思翻海嶽平規模凌雅頌律吕叶韶韺寶樹千尋直珠光萬斛傾幸容依黼席竊許聼金聲日映丹霄近奎懸碧漢明賜觀恩數重捧讀寸心驚仙露臣同渥卿雲帝載賡願偕藝閣侣常紀柏梁名扈從謁孝陵恭紀張英鼎湖龍久去冠劍託幽官地接東溟日山藏大漠風入雲浮寶幄跨澗落銀虹寢殿周廬繞園林輦路通關城花自發溫谷水常融松棟思堯德龍門頌禹功千峯爭侍蹕萬嶺儼呼嵩典禮遵前制經營殫聖衷望陵廽玉仗瞻宇却花驄宗伯陳犧象祠官獻稑穜懿親陪奠斚故老慟遺弓石馬嘶何處寒山夕照中閲農應制陳廷敬聖作勤三事天行啓四聰有年惟帝力無逸即田功桑柘扶鑾輅茅茨駐玉驄野花穿仗發山翠拂旗空壤繡紛交錯川長引鬱葱嘉禾方剡剡瑞麥巳芃芃鶯度濯枝雨桞眠吹絮風周原千畝緑漢粟萬箱紅下濟光明逺髙居造化工年華丹禁裏烟景幔城中粒食增堯匕薰絃倚舜桐九農應送喜歌舞海隅同五月十二日賜觀聖製南巡詩卷恭紀陳廷敬鳯紀天長久龍飛日正中萬年三月序九叙兩河功典禮虞巡重江山禹甸雄帝歌垂睿想民俗入王風翕闢乾坤共罏錘造化同詞源方浩瀚元氣益冲融丹笈廽雲篆滄溟散彩虹璧連還縹眇珠綴自玲瓏香影瑶編動鉛分寶字工鶯花供御藻雨雪志年豐玉律飄陽管金聲韵嶧桐衢謡歡故老巷舞走兒童恩與留題遍榮逾錫命崇道周神理貴物感至和通謨烈超千古文章逹四聰祥雲盈卷帙瑞色上書筒雅頌恢皇統英華發聖衷石渠春㶑灔藜火曉曈曨髙厚思隆遇迂踈愧匪躬併將揚拜意稽首祝蒼穹禮闈校士得十四韻陳廷敬數到掄才地承恩自禁林才移經席仗猶殷屬車音白首冰銜晚青春鎖院深昔遊思短褐榮路愧華簪銀燭三條盡銅壺午夜侵苑花應冉冉闈棘自森森簾下經過斷風前語笑沉樓明金榜月臺轉玉衡參地鄰觀象臺屢輟中宵夢回憐儤直心香凝新繡網寒戀舊綾衾忝竊繁文字蹉跎細討尋池邊蹲豈鳯書裏穴成蟫典職堪遲暮登賢鬱滯淫不辭鉤校切有暇得微吟正月二十七日聞大軍收復成都保寧午門宣捷恭紀徐乾學禁城寒律轉仙闕斗杓東蓂落過元夕星廽驗八風疲民勞睿慮荒服厪宸衷妙算三軍稟飛書萬里通威行梁益部捷奏建章宫九陌歡呼遍千官舞蹈同憶初騷貴筑未久沸羌髳賊隊紛於蟻妖氛黯似雺威弧元灼爍晴旭正曈曨閩粵旋歸命涇原敢怙終遊魂餘絶徼逆孽剩狂童王應猶蟣蝨劉稹本蠛蠓兩川形最險六載寇方訌鎖斷巴江碧燒殘閣道紅一夫為猰㺄七姓作沙蟲井絡天懸縋彭門地鑿谼鼎魚驕圉圉窟兔走憧憧頓甲環三輔飛芻過九嵕折衝多燕頷制勝在重瞳廟略神批亢天威迅發䝉鋒車馳學士密敕授元戎鳯紙裝縑袠龍文襲錦幪恩踰操玉斧寵勝錫彤弓乍聼鳴笳鼓俄看掃螮蝀先聲拔栅猛竒計裹氊雄鐵騎重關㑹金鉦兩道攻葭萌趨閬郡平武向資中江過嘉陵曲山臨玉壘崇青川開厄塞白水失艨艟一鼓收綿雒崇朝定梓潼鋒驅突陳豕鞭截飲江虹槁葉迎風墜春冰見晛融前茅排鸛鶴禁旅接羆熊精甲從天降凶渠入地窮長蛇膏劍鍔困獸縛車釭馬服真名將龍驤屬上公同時資羽翼一瞬轉飛翀不數岑吳績休論會艾功壺漿來僰婦歌舞雜巴童晝柝安廬舍春耕播稑穜閭閻應衎衎禾黍漸芃芃此地遭青犢當年劇亂蓬人家葵井在城邑芋田空荆棘封磐石狐狸嘯射洪哀絃聼杜宇廋語覓芎藭三紀勞生聚千村稍鬱葱那堪重躪藉何計慰疲癃驅迫偏荼酷瘡痍切慘恫生涯愁駭鹿物力歎枯棕泛泛巢林燕嗷嗷呌澤鴻及兹濡雨露多幸脫樊籠再覩雲中日重蘇㸑下桐輶軒將李郃轓蓋擁文翁亂定欣徭息時平祝嵗豐支機披蜀錦釀酒醉郫筒惠化停車鄧威名坐樹馮徑須開鶴甸不獨剖蠶叢破竹鋒迎刃磨崖柱勒銅仁聲漸洱海武略震崆峒玉燭調時序金泥告岱嵩普天沾潤澤渙號走靊霳受賮咨重譯垂裳逹四聰格苗虞化溥征扈夏勳隆拜手陳詩頌含生仰化工官軍收復成都午門宣捷恭紀有序陸葇臣聞滇賊弗庭迄兹五稔幽譴既伏顯戮尚稽我皇上旋轉在中張弛並用六師所臨罔不從風區區西南徼外之地形同黑子以兵取之易於反掌而猶竄跡鬼方閉關拒命祗以兩川之險向為賊守也今斷自宸衷簡書申勵爪牙之士奉揚國威分路前驅一乃心力漢中甫下直趨保寧龍安納欵成都底定軍鋒若飈彼蘀盡卷雖漢帝之滅公孫宋祖之禽孟昶未能如此神速克奏膚功者矣由是通道西羌順流三峽犄角此寇腹背夾攻料其游魂惶駭莫遁倘不肉袒歸罪則內變將作必有梟逆豎之首以獻者臣材質最陋忝竊史官歌咏之事固其所職也恭聞捷音喜而不寐羣工作頌何敢後焉敬賦斯篇以紀其盛黼黻光乾德樞機握㢲權金甌完鎖鑰玉斧闢垓埏奪險軍威振恢紘廟算全俄聞三戰捷驟解一方懸靄淨春霄逈風廽露布宣火城如待旦丹詔恍從天咫尺龍顔喜東西虎拜䖍鵷行欣緩步鳩杖慰華顛漏下闉鐶啓珂鳴陌炬闐輝輝含譽粲縵縵慶雲鮮欲紀旗常績須操翰墨研營初屯大散寇或踞飛仙呼癸輸頻繹開丁峽乍穿因糧多得助轉鬭更無前士巳歡騰飽民猶效餼牽壺漿斜谷遍屝屨棧江沿合勢謀猷壯分兵著數先崇牙踰白水别隊繞紅川驍騎排鵝鸛腥波斫鮪鱣與峯齊積械逐鳥共揚鞭􅎆縛凌寒度枚銜取勝偏在和師必克以律閫誠專夾擊雞踪後長驅鹿嶺巔七盤愁實據八堵疾攻堅不泝岑侯艦還推鄧尉氊轞車來重霸枝柵碎任圜飈發潼南屋冰漂灌口船刃由鐵檻接旗至錦屏搴叠雁摧嘹嚦潛龍斷蜿蜒馬勳終受戮譙縱枉同捐蓂吐陶階十榆收陜地千非憑聲赫赫誰履道平平往者羌偕叛盈時罪罔悛賨人隨李特米賊附劉焉節使甘䝉面書生忍負肩犍佳何弗拒賴簡總堪憐莫灑璩瑗血都沾蠻觸涎柘黃驕躍轡黥黑亂披鬈鍵户封箕斗棲巢倚劍綿但思嬰阻隘那肯慮回旋泥坂丸徒守蠶叢繭自纒碉􅠼籠上住匼匝甑中眠鑄幣空銅穴徴緡困麴錢酢醅荷葉裹粔籹蜜香煎醉賞遨床宴高援樹閣椽處貪堂燕樂命冀釜魚延瓜鋪沉沉霧松州寂寂烟花蜂銷億囷估客嘆虛淵杼軸應停織郫筒也廢傳販樵刪桂種宿莽宅畬田赤岸霞成縷朱提石似拳遺風渾索寞疲俗倍愚顓裙屐持犀柄潢池弄棘鋋吠晴紛市犬啼夜滿林鵑逆黨奚難罄洪流未可湔撓膚殊癬疥惻念此饑癲幹止將寧汝奸凶詎舍㫋固云除惡盡亦謂救焚然折匕申嚴約囊書載短韀夏侯鼙鼓靜諸葛陳圖圓旱切雲霓望名驚瘧癘痊垂簾人坐肆走輦貨充㕓甲枕巴文洗銘梯盛字鐫置郵歸版籍授鉞選材賢馭聽危崖叱帷經曉郭褰趣裝携瘦鶴到部飲亷泉扶荔新疏圃蹲鴟舊越阡裁芙圍繪繡造粉縠清漣溉遠資耕鑿祠荒復豆籩蔗畦苗漸茁鹽井脉相連涪扇澄藍紙橦花換翠鈿竹枝歌婉婉渝舞足躚躚貢罷璆兼磬神浮杞與楩閭閻馴鼠雀亭長耻鷹鸇庶矣蘇殘燼期於戒削朘元戎能輯衆左相善籌邊近拊牂牁背遙批僰㸑咽燈檠謡易驗篆板䜟宜詮篳路通荆蹻秋槎泛漢騫及鋒當賈勇扞圉絶攀緣計日誅䝉詔環星拱薊燕職方王㑹月瑞木太平年感遇羞糜祿趨蹌忝具員朝班裘豹飾俊彥珮蟬聯互搦湘筠管僉題側理箋韓詩音逼古桞雅句爭妍仗立容疲蹇麻生挹蕙荃請纓懷嚮往磨盾力拘攣引領依宸極抒忱憶廣筵逡巡承暖曝博厚納埃涓采藻蓬萊苑賡揚謨典篇宓疇宗象畫薰吹拂韶弦始覺寬宵旰行知即凱還股肱咨爾弼胼胝問于畋聖武昭桓撥皇仁溥恤蠲心雖矜僕固法不宥髙駢悉剪鴟張翼窮追豕突跧指碑遑祓過繫組諒懲愆干羽苗頑格商奄洛邑遷竚看馳檄去亟為定昆滇御試省耕詩朱彛尊長樂虬鐘啓端門羽仗排良辰元巳近暄景暮春佳帝念勤民切羣情望幸皆蘋風吹近逺蘭澤洗氛霾銜尾中流鷁拳毛內廄騧農輿沾雨露俞騎束鞞靫沙桞津亭岸山松驛路牌西疇一以望東作此時偕于耜分原上提筐饁水涯杏花殷似火菖葉小於叉巷靜餳簫市烟低土銼柴倉庚飛習習布榖語喈喈樂事紆乾顧豐年協睿懷歌時成夏諺行處即堯階帳殿開黃屋人家繞翠崖定知先稼穡力為減徭差吉日宣王禱空同軒后齊星躔齊北拱聲教巳南諧曲渚宜浮洛芳樽逈勝淮宸逰多悅豫振旅入天街大駕重幸直北校獵時冬祭後三日恭紀施閠章九廟明禋重初冬爽氣髙停鑾才盥薦出狩又旌旄組轡王良馭珠弓羿氏韜六龍真逸足三輔舊神臯問寢紆宸幄于田佩寶刀共知勤部勒豈謂騁遊敖霽日迎仙仗朱霞照御袍合圍熊館破決中虎賁豪野獲窮山谷弦鳴落羽毛皂雕雲外盡赤豹檻中嘷齒革資軍實豺狼念賊壕是時求俊乂侍衛繼英髦五柞離宫盛甘泉彩筆操計禽分勇怯講武寓甄陶虞甸爭除道郊圻待獻醪省方天藻發涉逺聖躬勞帳殿霜生劍騎營夜屬櫜鐃歌簫鼓競宴賞羽林叨漢主誇宛馬姬書訓旅獒興朝誰諫獵蓄意忝含毫湯泉應制有序明珠湯泉在遵化州西北四十里福泉山下寬平半畝泉水沸出傍有冷泉均其氣候誠養德和神之用也上以地近孝陵頻經臨幸兼奉太皇太后嵗時遊賞建宫其上朴而不華康熙辛酉三月駐蹕馬蘭峪召扈從諸臣觀於溫泉命臣宣示上意使得周歷遊眺諸臣歡欣鼓舞咸頌皇上之孝思儉德規模𢎞逺足為千百世法乃各賦詩應制臣以愚陋不獲賡揚萬一然身際聖時私願託附不朽勉成二十四韻復序述其事以志幸焉御天來鳯輦浴日啓龍池淑景黃圖早朝暉紫幄披落花縈綵仗初桞拂珠旗野逈紆皇覽鑾停擁地祇翠巖深䆗窱瓊搆鬱參差蘿磴時留蹕松門不剪茨方塘含皎鏡文甃淨漣漪却望陵園近彌深弓劍思山川開麗矚草木得華滋豫悅千秋洽陽和庶物宜每勤長樂養獨奏廣微詩溜暖春頻駐波暄律罷吹逾涯㴠帝澤曲逮被臣私並命觀溫渚相將陟澗湄氣凝漿五色味絶露三危凛節何由度恩光實在斯赤鱗遊自異錦雁飾奚為瑞巳徴靈液祥應頌玉芝逺侔堯德儉只法禹宫卑孝理能馴鹿仁風遂化鴟撫躬多竊幸好爵久相縻喜共清泉挹如從丹洞窺濯磨欣有賜調燮愧無竒願託潺湲水年年奉聖慈湯泉應制有序杜臻臣聞水火者隂陽之精陽得質而隂得氣為凉為焰隂得質而陽得氣為泉為湯則湯泉者實炎潤之相資為坎離之既濟包含元氣保合太和由來尚矣遵化州西北四十里福泉之山湯泉出焉甃石為池方平如鑑不火而燠遇寒而溫色白鉛溪泛珍珠而成串烟青銅浦注甘露以揚芬噴薄則魚目虎鬚流膏則醴泉玉液蠲疴益夀厥功茂焉皇上問安視膳既無間於宫闈養志承顔更時深於巡幸以兹泉之潤可以致遐齡兹土之宜可以適聖體乃營别館特繕瑶池暄波回繞於曲阿淑氣充周乎清禁爰游爰止攸躋攸寧洵尊養之獨至者矣且也山連昌瑞地接寢園冀北漁陽則神京之左輔焉石門蘭峪則孝陵之近郊焉皇上感霜露之凄清肅蒸嘗於祼獻松楸在望經隧道以愴懷弓劍當年憶龍髯而雪涕齊明盛服沐浴華池又孝思之獨切者也况制崇淳朴境遠塵囂不剪茅茨仿唐堯之儉德無煩輪奐儼夏禹之卑宫豈比夫曲水昆明侈陳宴飲華清興慶徒事遊觀巳哉嵗次重光月臨姑洗臣等恭承嘉命仰黍谷而生春跪聼溫綸挹恩波於在藻徘徊青駛盥潄芳馨濡毫乏庾信之文授簡愧傅咸之句不揣蕪陋莫罄揄揚有詔賦詩凡二十有二人臣臻敬賦五言排體一章其辭云勝蹟開溫谷名山滙福泉坤輿畿輔拱王氣寢園連溜暖春常在波暄火似然琉璃圍石甃蛺蝶落金錢鏡徹空明月珠浮淡濘淵丹砂中藴地赤道上經天難老宜眉夀長生駐偓佺延齡功獨盛濟物理仍全聖主晨昏切慈闈定省專有時移鳯輦别館下雲旃神女調香液瑶階繞瑞烟鶯歌臨水處花笑舞觴前帝孝真無極皇情更自牽瞻依橋嶺近悽愴玉衣懸裛露懷松柏惟馨肅豆籩宸遊非逸豫孺慕幾廽旋不改宫垣舊還除粉繪妍芳規誠卓越儉德永流傳竊愧清班忝俄承睿㫖宣彈冠齊祓濯晞髮愛潺湲快覩氤氲色欣逢景慶年滇池安鼎沸瘴海罷樓船澤潤垂千葉風和被八埏湛恩霑既渥染翰效微涓湯泉應制沈荃紫塞風雲壯黃圖禁籞長鑾輿臨薊甸羽衛警漁陽蘭峪嚴關矗湯泉逺岫蒼神臯原峻拔瑞靄自回翔特詔觀仙液連鑣度碧岡遙瞻烟靉靉近聼玉鏘鏘鑑入千峯翠霞蒸五色光噴珠紛上下舞蝶宛中央焦釡流波灼丹砂著體香甘宜頻盥潄潔可坐徜徉古院棲幽勝穹碑仰焜煌有懷探岣嶁無句續琳琅載繹天言重彌欽聖孝彰晨昏勤定省左右適溫凉暖谷疑調鼎瑶池儼奉觴延齡輕玉醴却病勝神漿允矣重闈慶休哉景祚昌林巒森並列陵寢鬱相望黯黯松楸逈依依弓劍藏豈因供眺望庶以肅蒸嘗甃石渾仍舊繚垣不改常茨階昭朴質館宇誡雕牆儉德超三古仁心訖萬方如天真協帝又日更師湯祓濯蠲民慝涵濡裕物康洗兵蛟海外染翰鳯池傍下濟簪裾洽來歌采藻揚豫游行補助賡拜繼明良汾水寧誇漢驪山直陋唐靈源叨寓目盛事耿難忘皇清文頴卷九十二
