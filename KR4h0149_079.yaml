body:
  text: 詩七言律詩聖德神功詩四首孫致彌聖朝宵旰重勤民特展時巡出紫宸薊北柳絲初欲放淮南花蘂已爭春龍舟乍發層氷泮錦纜遙添淑景新驛路三千齊望幸歡呼扶杖太平人永定河邊倚棹看橫流非復舊桑乾白魚躍處波濤靜黃鵠歌中士女歡上䇿九重親指授神功兩月勝隨刋勿言水患元難息得沐君恩便不難法宫圖繪舊曾頒稔悉農家稼穡難一自聖人過陌上頓教春色遍田間瞻蒲望杏應須早鋤雨耕煙莫放間從此年年書大有黍徐長載滿車還吳風越俗漸還淳敢忘天王巽命申鑿井耕田皆帝力條桑布榖樂天真頻逢稔嵗人人喜已過花朝處處春北望五雲爭引領翠華今日又南巡康熙己卯春二月二十三日濟寧迎鑾蒙賜召對恭紀聖恩詩四首孫致彌翠華臨幸遍陽春異數何期及小臣十載重瞻天咫尺九霄親拜帝絲綸和風乍拂垂楊軟好雨旋滋細草新自幸生當明盛世難將高厚頌洪鈞敕使傳呼近御前泥塗忽訝上青天草茅名姓重瞳識蒲柳容顔聖主憐獻賦得依龍艦側承恩轉憶鳳池邊休官尚沐非常寵何異金門侍從年鸞輿曾發玉虹光聖代崇儒冠百王九拜特隆新典禮兩楹重煥舊宫墻庸材濫備金壺選盛事應歸石室藏帝德如天書不盡十年珥筆杏壇旁一統文明海外通詔隨龍節下天東遍收圖籍歸書庫兼采歌謠補國風特許決科溫素業難忘將母厪宸衷皇恩深重知何似直比滄溟與華嵩暢春苑侍直王原三月春光醉上林晨趨儤直立花陰鳥矜新霽流黃小柳耐寒煙貯碧深劍佩下時仙樂近樓臺逈處水雲侵侍臣忝綴文螭陛謦咳親承識聖心詠硯池氷王原月銜片石曉凝寒香斂縹囊古墨丸影合蛟龍雷未動眼明鸜鵒鏡同看慿添玉册千行白與照氷心一寸丹取次鳳池春有信天葩五色吐雕翰恭紀聖恩詩四首沈宗敬素業相承有一經當時端尹侍彤廷文章報國邀宸眷翰墨開函傍御屏曠典至今猶鄭重陳編留篋總清泠寸箋獨進天顔喜溫語褒嘉翠輦停天章何幸及儒林中使宣傳寵賚深願挹清風歌聖德敢將蘭雪滌臣心六經廣孝真彝則千字成文有座針玉軸㩦歸驚異數涓埃莫報倍沉吟紈扇輝煌出尚方許將末藝進巖廊難描帝室山河壯漫寫江南煙水蒼巖為宸逰凝曉碧林隨輦路發天香三吳擊壤歌衢意圖繪慙無六法良偶將筆墨逹微名詔撫絲桐理正聲行漏鳴時相和答繁音指下自澄清九成功德天朝奏四海絃歌大化行南幸年年臣望切薰風從此祝升平癸卯正月五日奉命之秦中祭軒轅氏以下諸陵恭請聖訓紀事錢以塏泰運乘乾禮百神恭承聖訓侍楓宸螭頭日麗銅龍曉雉尾香浮祕殿春萬里明禋金節重尚方祝册寶函新微臣奉命趨原隰天府山河特向秦祀黃帝軒轅氏陵錢以塏橋山拔翠路盤紆沮水回環衆壑趨近郭高原三百里繞陵柏樹一千株升仙臺古存遺迹問道宫遙失舊途問道宫今在崆洞山聖代明禋崇巨典雲旗絳節耀天衢北鎮即醫巫閭山吕履恆營州作鎮肇封疆恆岱遙同祀冀方北極星光分野濶東京王氣亘天長迢迢松響聞空際漠漠山形入大荒盛代精禋邁三古靈風甘雨祝農祥大駕南巡詩八首劉灝東南民事軫皇情巡守還依舜典行自昔九重無暇逸况今四海久升平減裁羽衛隨雲罕儲偫金錢出水衡文鷁輕帆從簡易緑楊煙裏省春耕宫扇雲旓下玉除恭隨文母奉宸輿時調寢膳依行在日按晨昏問起居江岸雨晴煙樹渺春風波暖畫帆徐慈顔豫後天顔喜孝思真同孺慕初駐蹕淮黃緬禹功雲帆水靜正春風幾年疏瀹煩人力此日訏謨出聖衷佇看千艘銜鷁尾已知百丈徙鮫宫金堤玉斗榮光滿長載恩波萬里中欣欣老稚日相偕匍匐山根與水隈自訝此生田野裏何緣親見聖人來更無嚴禁當儀衛時有歡聲出草萊盛世太平真景色丹青如對畫圖開江城巖邑遞經過闤闠熙然陌巷和碧樹青煙村外市緑秧紫穟隴頭禾笙簫處處迎鑾曲桴鼓家家擊壤歌古史傳聞猶羡慕於今真見更如何詔書宥過及微臣祝網兼聞赦小民黍向寒時還就暖木經枯後復知春簪纓同日皆生色耕鑿從今得此身臣勵亷隅民向善相期同作報恩人已沾行在主恩深更仰慈航聖母臨自是一人崇孝治遂教萬國被徽音臣民爭效岡陵頌草木難酬天地心檢點從來青史內幾聞盛事似如今銀管生香玉版新船窗翰墨動如神披雲向日宣天語帶露含煙賜近臣共喜開緘光奕奕還驚垂訓意諄諄漫將鵠跱鸞停擬比較王謨帝典真龍池春草劉灝暖積回塘碧草勻萋萋匝岸及芳晨迎風低接宫花露向日平鋪輦路茵色映御溝光自逺根滋靈沼澤常新年年感激陽和力散質容隨上苑春漁樵耕牧詩四首劉灝漁生涯老向五湖過風挂蘆篷雨著蓑孤棹隨時移浦溆全家終日在煙波晨炊近折秋菰便夜火遙驚宿雁多盤有白魚尊有酒滿灘明月一聲歌樵家依山下本長貧山上﨑嶇獨採薪細路攀緣常畏虎空林來往不逢人行經老樹緣衣慣坐向清磯礪斧頻偶看圍棋臨玉局一聲鶴唳出松筠耕又是春郊播種天帶耝荷耜出村前雨昏布穀鳴深樹風過烏犍遍野田饋餉每諳中婦苦勸農更喜長官賢隴頭聚坐還相賀豐稔今年似去年牧平郊漠漠雨昏昏逺近長㩦笛一根盡日夢依芳草地三春路熟杏花村簑衣著得偏能稱牛背騎來未覺喧滿眼間雲林木外歸從小徑認蓬門早春出西郊顔光斆岸梅溪柳鬱交橫暖霧霏煙著處輕乍聽村農喧社鼓遙看山畔試春耕解氷野水穿塍過報餉鄰雞上樹鳴為語康衢諸父老秋糧有詔更蠲征萬壽詩二首黃叔琳運應昌期轉玉璿光分南極仰星躔堯階氣象成雍睦禹甸山川廣幅􅊷日麗九重多瑞草春融萬井入祥煙垓埏久已歌豐豫行健天心正體乾蠲租詔發未央宫鼓腹興歌德化隆秉穗尚餘場圃外雞豚堪入畫圖中時和每浥騰軒露氣暖全薰解愠風雲表翠華開雉尾迎塵稽首共呼嵩聖武平北詩六首高其倬星輝雲爛際時昌聖主尊居卜歷長至德九天明日月神威萬里肅風霜版圖已見昭無外聲教何容阻一方三御六飛欣底定從兹海嶽盡梯航歌傳笳鼓擁回軍三月犂庭昔未聞銘勒燕支彰大武謀成犄角靖餘氛一鞭已近長安日萬騎猶屯朔漠雲大沛仁恩寬黨羽招徠遣使日殷殷為民總不憚艱難十月重臨朔塞寒毳帳千羣來化外降幡一片入雲端從前空恃山川險此日方知雨露寬遂自雲中回警蹕不教壯士困征鞍飛馳露布奏行營極北烽煙萬里清佳氣連雲浮豹尾祥光散綵護龍旌華峯指日看歸馬青海無波待洗兵濯濯聲靈咸震疊防邊不用築三城和風甘雨淨飛塵凱入千靈擁畫輪事出萬全非用武師行九伐為安民冠裳夾道天顔近鐃吹連雲法曲新野老壺漿咸鼓舞呼嵩無限太平人廟謨斷決自宸衷匝歲欣看異域通塞外有天皆舜日寰中無地不堯風雲霄大業千年事竹帛鴻名百代功歌詠終慙同白雪願隨率土樂年豐聖武平北詩四首汪漋行營萬竈擁貔貅三路分兵獨運籌天子自提軒后劍將軍欲飲月支頭彌山瑞草連雲翠匝地神泉傍馬流川嶽百靈齊效順鑾輿到處協天庥才見天兵奏凱旋軍營重列玉關前貂裘禦臘衝邊雪寶劍經寒入塞煙逆部已全歸壁壘遊魂何日脫戈鋋指揮四面無遺䇿定戮蚩尤馬首懸闐闐振旅入重關警蹕清塵萬乘還遮道壺漿迎羽衛盈城父老拜天顔三軍鼓吹鐃歌發四海歡呼露布傳共慶皇威宣絶域金戈一指定天山紫塞兵聲永不聞磨崖萬古勒竒勳寧同竇憲燕然碣逺勝周宣石鼓文御墨昭回懸日月豐碑嶻嶪起風雲邊城比戶安耕鑿南畝新看五德耘萬夀詩八首周起渭太平天子夀如天天帝高居不計年日月總行黃道裏星辰常護紫微前梯航接踵朝金闕花柳長春傍御煙閶闔雲中歌吹滿遙同萬里祝增川百疊祥煙繞帝宫玉階仙仗曉曈曨銅池芝草年年長仙圃桃花歲歲紅夏屋連雲千里合春臺送暖八方同還看天意如人意十日甘霖五日風正朔遙頒十二樓九州之外又神州地通香海環流處人到蓬山最上頭蓂葉莫窮天甲子蟠桃長記帝春秋紅雲歲歲依香案嶽瀆朝宗拜冕旒光風冉冉鳳城隈山色濃如獻夀杯金埓幾程過閬苑玉泉三匝繞蓬萊崆洞山向青天入太液波從碧漢來聖祚綿延春日永百花齊傍御筵開宫柳含煙百子池仙花簇錦萬年枝金莖雨露山河潤玉藻衣裳日月垂羲畫開天龍馬出虞琴解愠鳳凰儀從今十屋添籌算甲子千回總盛時減賦蠲租歲未停深宫子夜尚談經禹糧堯韭俱登饌周鼎湯盤總勒銘天上七星持斗柄人間五嶽繪真形華胥世界春何極日日東風百草青高樓大艑鬱嵳峩銜尾千帆次第過九曲安瀾天作塹百神受職海無波風飄楊柳牽絲纜水泛桃花淨綺羅但使江河同聖夀永教千載奠江河雍雍禮樂更桑麻王會衣冠道路賖喬嶽已看船是藕海山新貢棗如瓜千秋歲月同春書萬國河山總帝家從此八荒開夀域年年今日醉流霞奉使朝鮮雜詩五首揆敘初出都門風薰燕市雨初收近郭村村緑樹稠戀闕回瞻天北極計程直向海東頭碑傳箕子遺封在地訪檀君舊迹留行遍淵波江畔路歸途迢遞指清秋中前所石佛寺芍藥郊園紅藥已紛披意外禪扉見數枝此地遲開如有待他年重玩與誰期最憐野月當頭映莫遣邊風掠面吹為語山僧須割愛臨分真合贈將離過摩天嶺炎官火繖正當空峻嶺摩天地勢雄曲磴回環青靄外亂山高下緑陰中沉沉雲合渾忘暑栩栩身輕想御風却笑白衣勞轉戰只今異域盡來同立秋日平壤作浿江雲斂萬峯青亦有梧桐一葉零還往山川諳異域遷移時序驗虛星蟬鳴漸較秋前切蟲語初從夜半聽便覺微涼侵枕席不須重上快哉亭肅州肅寧館觀荷花石徑無塵暑氣清水花齊放趂秋晴香吹翠蓋含風細粉濕紅衣墜露輕短䇿馳驅明日路小亭延佇暫時情金塘玉溆多幽賞不負丸都嶺外行夏五月恭聞上因旱減膳至八日時雨大沛適下直於西山别墅推窗望雨喜而有作夸岱精誠信可與天符逰豫歡從萬姓呼雲壑空濛山意逺原田膏雨稼苗蘇自公退食間瀟灑與客慿軒興有無不用丹黃能繪手天然一幅米家圖瀋陽夸岱鬱蔥城郭信佳哉尚見當年王業開絶塞屏藩皆北向二陵山水自東來餘荒作洫猶堪畝即社為倉可備災海上魚鹽邊上牧經營須仗濟時才春日駕幸南苑四首法海鑾輿曉日肅鈎陳羽衛驂驔扈近臣嫩柳韶光新有色春膏和氣淨無塵飛芝細傍重城轉獵騎遙連六轡勻鎮國寺前回首望草橋齊渡小河津逈野連空入望賖春氷初泮印平沙雲移仁網開三面風逐霜蹄散五花金勒控弦持鄭重玉鞭連騎逺周遮千旗獵罷平林外駐馬南莊日欲斜鷹師狗監列行圍獵獵霓旌趁早暉東郭草間遮脫兔南山雲外落飛翬重環共説韓盧俊鷙鳥曾歌尚父威今日君王多霽色歡聲齊逐馬蹄歸春日靈臺駐玉鑾羽旄鐘鼓萬人歡芻蕘雉兔原無禁監令丞司各有官畿內更嫌文囿小編氓深喜聖恩寬詞臣亦有金門賦莫作揚雄羽獵看恭和御賜山莊避暑詩扇二首覺羅滿保萬幾清暇駐山莊民莫關心睿慮長十雨五風周甸服千巖萬壑繞岩廊自天湛露螭頭渥當暑微颷殿角涼珍重驪珠五十六擎來御墨尚留香太和元氣聚山莊石磴松筠輦道長軒棟呈祥雲入牖堯階崇儉竹為廊研硃點韻丹文麗挹露揮毫玉宇涼猶記往時陪法從經函長傍御爐香恭隨聖駕北巡自暢春園駐蹕湯山恭紀覺羅滿保羽林遙映翠微峯繡野雲開奉六龍溫液香浮煙正暖熏風晴拂瑞初濃村連幕影雲千疊陌散林光翠萬重紫塞招涼叨珥筆恩波浩蕩此先逢春分即事應制覺羅滿保晴臨古淀講春搜整頓軍容睿算周千鷁齊飛鴻雁陳雙旌圍繞杜蘭洲平分玉漏當春永共仰恩波並海流日覲天顔瞻聖武祝衢願進萬年謳聖駕親視河淮巡行江浙恭頌八首薑宸英十年輿望切前旌咨警長留聖主情祗為神謀存北伐故教天意緩南行竒探虎穴狂氛靜怪鎖蛟宫濁浪平今日雙龍趨翼衛春風搖曵出皇城舳艫南指路非賖楫擁蒸徒靜不譁行漏曉供長信膳回帆初放紫宸衙漁樵得意瞻容衛鷗鷺無心避鼓笳中道時聞寬大詔歡聲雷動萬人家塗泥自古記淮揚已束洪流似帶長緑字朱文窮宛曲隤林楗石陋宣房精誠感動鮫人泣方略潛驅罔象藏會有靈圖符聖瑞波心泛瀲發榮光瀕河猶自愁艱食詔截東南十萬艘更免舊逋紓郡邑同霑新惠出波濤家家秋潦成堤堰處處春田響桔橰比量皇恩真似海百川奔赴不辭勞祥颷吹送大江流一望南天瑞靄浮蓬島侍書羣學士塗山輯玉萬諸侯同瞻日角歌岡阜喜覲旌門拜冕旒誰是旬宣多政績內傳新賜黑貂裘東吳佳麗巡逰處風景微傷不似前秋穫未經開百室天恩重與賜三千宏恢帝網金雞舞廣厲儒宫木鐸傳試看六龍新幸後明湖草木倍鮮妍三山凝望日光輝講武臺前翠幕圍細草平沙開馬埓黃雲紫氣護龍旗將軍命中誇猿臂校尉登場號佽飛次第千官同拜賞回鑾爭獻萬人衣天章絢爛動星辰灑落銀鈎氣象新煙火萬家才極目登臨半晌已縈神江山迢遞歸淵宇人物熙和浹大春樗散無由叨扈從陳詩聊和壤歌民聖駕南巡紀德詩張元臣柳舒金縷拂龍旌畫槳蘭橈趁曉行千里和風吹浪暖一天麗日映江清巖花處處增春色蔀屋家家識聖明至德彌綸疇與並神功萬載慶平成皇清文頴卷七十九
