body:
  text: 説八音樂器説誠隱郡王允祉八音之樂各從其類而制器尤宜探其體要書曰詩言志歌永言聲依永律和聲八音克諧無相奪倫蓋生於人聲成於樂器而宮調運於其中所以節人聲而裁樂器也古聖人初制律吕以和五聲然後被之八音金石有厚薄重輕之差匏竹有空竅短長之别絲音則徽柱散實以分聲調土樂則中空容積以較度分革木雖止一聲亦皆有所由起要之莫不以律吕五音之倍半凖其損益蓋絲與金石為一類假人力以生聲者也竹與匏土為一類假人氣以生聲者也革與木為一類所以為樂之節奏者也然八音之中偹律吕隂陽之體叶宫調聲字之全惟絲竹為最要何也金石之器以律呂實積容受分量較其厚薄重輕古有特鐘特磬編鐘編磬又有鏞鐘鎛鐘金錞金鐲金鐃金鐸後世變為方響雲鑼之類其為體也雖各不同而為用則一器獨限一聲而已匏之器曰笙曰簧大者為巢小者為和又曰竽蓋古者皆以匏攢衆管而近世不用匏以木代之月令曰調竽笙箎簧則與竹音並列久矣土之器惟塤有頌塤雅塤之異樂記所謂德音之音也其聲生於空竅其分定於容積與竹音同革木之器雖不以律呂之法為凖則而其度分亦皆依黃鐘而得數記曰鼓無當於五聲五聲弗得不和其大者為雷鼓靈鼓路鼓鼖鼓鼛鼓晉鼓小者為鼗鼓應鞞相鼓􅉧鼓又變為要鼓杖鼓羯鼓銅鼓國語曰木以節之上古惟柷敔後世增為舂牘又變為拍板要之革與木皆所以應和樂之始終節奏耳夫六經所載八音偹具然堂上之樂貴人聲而以絲音為主虞書戞擊鳴球搏拊琴瑟以詠樂記清廟之瑟朱絃而疏越一唱而三歎是也堂下之樂貴人氣而以竹音為主商頌所謂嘒嘒管聲戴記所謂下管象舞夏籥序興是也凡升歌笙入間歌合樂未有不以絲竹為要領者竹之聲在虛虛之多者聲濁少者聲清而多少之數定於中空之圍徑短長絲之聲在實實之多者聲濁少者聲清而多少之數定於絲綸之巨細分度所以然者竹音之樂十二律呂為之本相與比例推求而取其聲由於比例推求而得其數其圍徑長短加分減分總不越乎十二律呂之範圍大者用其大體本形之度分小者用其小體本形之度分而後竹音諸樂之聲字各歸於律呂之位而各應於律呂之宮調焉其器之最古者惟排簫具十二律呂之正加以二倍律二倍呂共為一十有六管各一聲備聲字清濁之二均合於鐘磬而為諸樂之主宰其餘為簫為笛為箎為管之屬而匏之器同施於竹其制為笙要之其體皆自黃鐘之倍半而生其設孔也則又自律呂相和而成故備聲字清濁於器而得適於用焉蓋竹音諸樂依人之氣而生聲故本之中空容積之多寡而無與乎形體厚薄之度分也絲音之樂五聲二變為之本相與比例折取而察其聲由於比例折取而得其分其絲綸巨細徽柱逺近總不越乎五聲二變之範圍大者用其大體本絃之度分小者用其小體本絃之度分而後絲音諸樂之聲字各得五聲二變之位而各應於律呂之宮調焉其器之最古者惟琴與瑟後變而為筝為築為琵琶為月琴之屬而琴瑟最正記有大琴大瑟中琴小瑟三禮圖又有雅琴雅瑟頌琴頌瑟之類所言體制雖殊而大絃則皆起於下徴之分取音必合於三分損益之法其聲位始正蓋絲音諸樂依人之力而生聲故本之絲綸之巨細長短而無與乎形質之大小也今列諸樂器所得之度分所應之聲字而辨其體用必使絲竹之器一皆協於十二律呂五聲二變之正而衆音之器所應宮調聲字又皆協於絲竹之音然後諸樂之大本可得而論焉古之樂器不得其實即今之樂器而索之律呂宮調其聲字無不符合者正由三分損益之理為之體而隔八相生之義為之用故也至於諸樂之器數形體孔徑度分古今稍有更變者蓋緣古者一律一呂各為一聲而後世備衆聲於一器當其一律為一聲則合七律為一均而不見有餘及乎備衆聲於一器則一器名為一均且或一均而該衆調而不見不足今古雖殊其器一也器即不同其理一也是以聲音之微妙全在虛實之分虛者氣之所發而實者體之所存氣與體鼓動之間而天地之和應焉在氣數或閲因革而有變更聲氣之元則亘古今而無新故寓諸八音而氣以行焉體以成焉推之六合之內四海之外此音同此理同也推之百世之上百世之下此理同此音同也是故不知古樂而溺於今非特不知古并不知今也必復古樂而不屑於今非特不知今終亦無從復古也爰考古今諸樂之異同詳其制於各篇之內因取八音之大綱約於一篇而總序之云爾古今易説陳廷敬易於六經最古遭秦燒書以卜筮獨得存最為完書最古而完而今所傳者特為淆亂視他經為甚焉樂既散亡二禮經晚出雖闕然幸不為後人所亂書得之孔子屋壁詩賴諷誦以存雖不無殘脫然考詩書之序或皆繫於篇末或自合為一篇其始皆不亂於正經書自孔安國詩自毛公始别序入經冠之篇首朱子除其序各合為一編以置經外而復詩書之舊焉春秋一經三傳初皆别行漢以來儒者欲省學者兩讀至以公榖配經左氏分傳附經之年朱子雖未及詳定而亦别出左氏經文蓋將以復春秋之舊也經之存者五惟易最古而最先亂已而幸正之卒又亂焉藝文志云易經十二篇顔師古謂上下經及十翼蓋古經也漢費直以彖象釋經附於卦後今乾卦起大哉乾元至用九天德不可為首是其例也雖其初加一傳字以别於經然十二篇之經直已亂之矣漢鄭康成注易合彖象於經而所謂彖象不連經文者猶在也至魏王弼注易用康成本又增入乾坤文言雖加彖曰象曰文言曰以别於經然直之所既亂者弼又從而亂之若説卦等篇仍其舊總曰繫辭自是世儒知有弼易而不知有古經矣程子作易傳因弼本未暇更正嵩山朝説之考訂古今釐為八卷卦爻一彖二象三文言四繫辭五説卦六序卦七雜卦八而呂氏大防周易古經上經一下經二上彖三下彖四上象五下象六繫辭上七繫辭下八文言九説卦十序卦十一雜卦十二王氏原叔家古易本卦辭一彖辭二大象三小象四文言五繫辭上六繫辭下七説卦八序卦九雜卦十東萊呂祖謙則定為經二卷傳十卷上經一下經二彖上傳一彖下傳二象上傳三象下傳四繫辭上傳五繫辭下傳六文言傳七説卦傳八序卦傳九雜卦傳十朱子本義從之故朱子曰經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂近世朝氏始正其失而未能盡合古文呂氏又更定著為經二卷傳十卷乃復孔氏之舊云按朱子之言幸古經之復正也明永樂時修五經大全易則從程傳元本而本義則以類從夫以程子未及更正之經取朱子從古經説易之辭割裂參錯於其間使古經已正而復亂而最繆戾者簡首仍載朱子幸古經復正之説而又不言其不從古經之故是則所謂復孔氏之舊者果安在乎至使前賢之意乖剌不明至今三百年餘未有能正之者也成化間奉化學教諭成矩謂世之讀易者先本義而後傳遂獨刻本義行於世今家傳户誦者成矩之書也夫朱子因古經作本義明初諸人以本義參附於傳而一之已失朱子之意矣然猶日此集諸儒之説非專朱子之書也今矩所訂之書儼然朱子之書世之學者遵信之而不復知其舛訛之若此也蓋易之最古而完者及今猶可考見故與世諗焉春秋為史法説陳廷敬春秋聖人之史也非經也後世謂之經也有史官之史未經筆削之春秋是也有聖人之史既經筆削之春秋是也聖人之史古無此體乃夫子斷自聖心創為義例為萬世不刋之史法也杜預曰遵周公之遺制又曰明周公之志以為明周公之志則可以為遵周公之制則不可桞宗元言杜預謂例為周公之常法曽不知侵伐入滅周公之盛時不應預立其法栁子可謂知言矣故春秋者由周公以來未有此體也聖人為史法以詔萬世曰其文則史而後之人名之曰經名之經者其意主於尊聖人而後世遂專以經尊春秋而不知為聖人之史於是聖人之史法遂亡春秋有達例有特筆達例者史官之史也特筆者聖人之史也聖人之特筆如化工之生物不必駢枝儷葉節節而生之而全體已具史官之達例欲圖日月而繪天地不已難乎曰聖人為史法以詔萬世後之為史者以春秋為法可乎曰奚為而不可有聖人之才則可無聖人之才則妄也曰然則如之何曰姑為史官之史焉烏知後世不有聖人者出與勤政説徐乾學臣伏讀月令明堂十二室天子以時適居所以法天之行順時之紀勤民事而出治道非獨侈隆其制已也蓋古者皇居取象辰極義取自強不息之意焉今皇帝景昊天之成命法祖宗之恭儉凡宮室制度自非國本所關政事所出無替於前無侈於後兹勤政殿在西苑以嵗之夏日聽政於其中每旦接對羣臣批覽章奏少暇則紬繹經典翻閲圗史臣某起家侍從待罪公卿之後常因奏事殿中得奉清燕流覽寓目殿不甚閎敞視正殿絶差前為長廊中闢層軒體製朴略羣臣仰頌聖德以為唐堯土階大禹卑宮殆無以過臣深惟天行無息之義以為人主惟能勤而後能儉勤則清明之氣勝物莫投其所好故不與儉期而儉至不勤則晏逸之志勝物得進為之主故不與奢期而奢至由此觀之相因之理必至之幾也臣竊覩皇上深宫問夜未明求衣至於日昃不遑上自宮府下逮黎庶外及山陬海澨日入月出之所惟恐一事之未理一物之未安即位二十五年兢業常如一日間者鯨鯢蕩定兵革偃息海宇乂安民生樂業羣工體宵旰之勤詞人進太平之頌願怡神暇景間日視朝皇帝赫然震動竦然吁咈益勵憂勞無敢怠惰功業已盛而常懼其荒民庶已安而獨居其瘁是以侈心遏絶儉德益光漢臣有言古之王者未有不始於憂勤而終於逸樂竊觀詩書所載雅異於此周公進陳無逸文王日昃終身未聞其以逸樂繼也然則虔始之道方自今日載筆之臣豈能紀其萬一昔華林有清暑之賦驪山著九成之碑並鋪張巨麗有乖典則臣躬述聖德上窺大易自強之義逺覽尚書無逸之訓推陳堯禹不與之衷發明文王小心之德雖未能編之詩書亦庶幾垂示來者謹拜手而為之説周禮三德六德説李光地大司徒以鄉三物教萬民而賔興之一曰六德知仁聖義中和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數至師氏以三德教國子則一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行則一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長保氏則養國子以道而教之六藝又大司樂以樂德教國子曰中和祗庸孝友夫其名之若是其不同何也曰此正成周之盛育材造士之方小大有品而先後有倫不可不察也夫鄉三物之教者鄉學也所謂小學也師氏保氏之教國子者國學也所謂大學也若夫大司樂掌成均之法而合國之子弟則正典樂教胄之司皆所謂大學也小學之教則先行而後文孔子謂行有餘力則以學文是也大學之教則先知而後行孔子所謂博學於文約之以禮是也然皆以身心性情為之本故又有養之於文行之先者所謂德也此則不以小大之學而有殊者也鄉三物之教先之以德次之以行次之以道藝其序明矣若師氏之教大司樂之教則不離乎三物而有深於是者其曰至德即修其知仁聖義中和之謂也德修則有以進乎道藝矣故曰以為道本其曰敏德即勤於禮樂射御書數之謂也學明則有以措諸躬行矣故曰以為行本其曰孝德即篤於六行之謂但自民間言之則有姻睦任恤之事自國子言之則以取友親師為要故彼六行與此三行為不同也行篤則有以治人之悖亂矣故曰以知逆惡然則三德即三物之事也以其皆欲得之於心故皆貫之以德以其欲修德明道而不徒為匹夫之行也故先道於行也凡經言道者即謂六藝故每以德行道藝並稱而保氏教之藝者即其養之道之實也至於大司樂之六德則正與師氏相表裏蓋知仁聖義必以中和為極故中和即至德也六藝之業在敬而有常故祗庸即敏德也六行三行皆以孝友為先故孝友即孝德也由此言之名雖有異豈不同條而共貫哉孔門之教文行忠信文即六藝也行即六行也忠信即中和而所謂至德者是也異日又曰德之不修學之不講聞義不能徙不善不能改是吾憂也又曰君子不重則不威學則不固主忠信毋友不如已者過則勿憚改是皆以德為道本而以學為行地周公孔子之道其揆一而已矣或曰聖之道大矣列為六德以教鄉民何也曰六德而充其至皆聖人之事也不獨聖之一字然也然愚嘗疑聖字乃禮字之誤蓋不應四德俱全而獨闕一焉且循貞元之序求之亦當作禮字四德俱備而貫之以中和中庸之蘊也敬義説李光地自古聖賢相傳心法之要大率不外乎兩端虞書欽明欽其體也明其用也安汝止體之靜而正惟幾惟康用之動而宜也禹作洪範九疇其要在敬用五事蓋自一身貌言視聽之則以至萬物萬事之理無非事者然必以敬為體而後五事之用可以各盡其職湯武因之是以有以義制事以禮制心之誥有敬勝怠義勝欲之書太甲成王反乎此而自訟故曰欲敗度無義也縱敗禮無敬也維豫小子不聰敬止亦此意也以及中宗之嚴恭寅畏天命自度髙宗之恭默思道皆是堯舜禹相傳心法夫子特著其旨於易曰敬以直內義以方外敬義立而德不孤不孤云者體用兼流其德不偏也曽子之學獨得其宗其述大學主於誠意以明明德於天下為善去惡謹獨之説雖若專以義言者然非敬則不能謹非有本體之誠則亦不能隨事而致其誠矣蓋自養之小學已教以恭謹之道既入大學復進以窮究之功庶幾心存理明則遂使之謹獨以誠其身蓋包乎敬與知而並進非截然而有彼此先後之殊也子思之作中庸自戒謹恐懼以致其中自誠明而尊德性以至大德敷化而同乎至誠之歸皆由敬而造之之事也自謹獨以致其和自明誠而道問學以至小德川流而極乎聖人之盛皆由義而充之之功也孟子七篇多示人體驗擴充之要然非其心惕然而存則不能察仁義之端而充廣之必矣故其所謂操存得養求放心立大體存心養性云者以為專以持敬言固不是以為有義無敬有察識擴充而無操持涵養亦非也就其對舉言之者則存其心以操持其心言也養其性以充長其仁義言也亦敬義之説也周子通書首言存誠敬之事也下言謹幾慎動義之事也故後又合而言之曰君子乾乾不息於誠然必懲忿窒欲遷善改過而後至程子謂涵養須用敬進學則在致知又曰敬則天理明又曰未有致知而不在敬者又曰佛氏敬以直內則有之義以方外則無也既無義則其直內豈有是處其論孟子之養氣也以為必先有事於敬然非集義則亦無事皆此意也朱子之言尤極剖晰蓋曰致知不以敬則昏昧紛擾而無以察理義之歸力行不以敬則頽墜放肆而無以踐理義之實則敬與知行渾然合一相須並進亦可見矣今人以為敬自敬知行自知行而不知其相為表裏而未始相離也其以中庸戒懼慎獨兩節俱言持敬而未及知行者此固拘牽文義不通之説其或知省察之兼乎克治矣亦未敢訟言謹獨之即為行又復不知其中即有窮理之功也且以首節屬之靜次節屬之動靜則用敬動則用謹自古聖賢相傳夾持心法皆支離割裂而不可尋矣原夫道不可須臾離之意則敬蓋為義而存不然則是異學之操其心不足尚也故不特念慮之起事物之交義於是乎在而必敬以察之由之當乎萬感不至百慮未萌而此心昭然坐立必端舉止必謹固即敬與知行夾持之效而為應用之根歷考朱子平日用功之要及其章句或問之言微指精義可以推見惟其講貫詳密而聽問之下鮮能好學深思以意逆志者故語類所記時多出入使覽者莫知一是之歸而各以意為説章句既常戒懼而於此尤加謹焉兩語驟觀之似略分晰然其意則以為既常存其心矣而凡善惡之幾尤必省之治之以致其謹正如周子所謂不息於誠又必懲忿窒欲遷善改過而後至者得其意而讀之其説固無弊也或問之言讀之亦如章句之指無不可通惟大學謹獨章句以意為心之所發學者不能無偏於動之疑殊不知誠身工夫日用之間一動一靜無有欠闕非專就發處言也蓋方其寂然未感之先而惺然之念自在當此之時動容整貌而不使有惰慢邪僻之干亦即所謂謹其獨而誠其意者若必待其念之有所著於事而後謹之則工夫有所脫漏而誠之本反失矣蓋意者心之用而主於心貫乎動靜而常存非必其應事酬物義利鬭進之時而後有也觀章句言欲自修者知為善以去其惡則當實用其力而禁止其自欺則直以知為善去惡之念當意字矣固不專就發處言也其以心之所發為訓者蓋即所謂心之用而主於心者耳以是而推中庸兩節知其皆包動靜以立言蓋自覩聞以至於不覩聞無不敬自隱微以至於顯見無不謹也或曰子以敬義分屬中和且以後章誠眀尊德性道問學言之矣今言一動一靜敬義合一而不可分則中和者未發已發子思子固分之矣曰敬以直內而主心敬非中敬而無失所以中也義以方外而主事義非和精義流行所以和也且靜之中非無義而主於心言則以敬為體故可屬乎致中也動之時非無敬而主於事言則以義為用故可屬乎致和也誠明與尊德性道問學之説亦如是而已矣蓋凡聖賢之言兩端者如誠明敬義知行之屬若隂陽在天地間雖一息未嘗相無而亦各有迭王之候默而識之無以執一而廢百焉則其若相反者正其所以相為發明而又何悖乎河圖洛書説施閏章道渾渾而無形也而或見諸象象頥而不可紀也而或該之以數象數既形而道存乎其中故道之大原出乎天而天不能祕道散見乎物又或假物之尤異者以呈象數而聖人者仰觀俯察逺取近思於是河圖洛書之説著焉其事至神竒其理則至平也何也天地之道盡乎隂陽有隂陽則有竒偶有竒偶則有相生相代錯綜變化循環於不已皆天地自然之數也自河出圖而兩儀四象八卦之象皆出其中故庖犧因之作易自洛出書而範之初一以至次九之數悉出其中故神禹因之敘疇其理皆以數見數有多寡之不同理未嘗不一也圖以五生數統五成數書以五竒數統四偶數似異矣而自一六以至五十其相配則無不同圖之生成同方書之竒偶異位似異矣而同方者分內外異位者同比肩則無不同圖得數之全書得數之九似異矣然圖之有十以五得五而為十初未嘗有十也書雖無十而一九二八之對皆含十亦未嘗無十也天地之數皆五而圖書皆以五居中其文之所謂七前六後戴九履一者環繞於其外則隂陽竒偶配合以生成南北東西運行以參互者位次若有定而變化無終窮其數皆始於五之居中也虛五之中即太極也圖主生數其中五即具五生數之象書主竒數其中五即具五竒數之象則所謂五十有五與四十有五者皆具乎五數之中雖書之為數似縮其十然河圖而虛其十即為書之四十有五洛書而積五與十即為圖之五十有五圖之一六為水二七為火即範之五行範之九疇之目又即河圖之總數也數之盈乏或殊虛其中之十五與五則隂陽又各得二十而均也劉歆所謂河洛圖書相經緯八卦九章相表裏者是也宋儒辨之尤詳至九峯蔡氏謂圖經四聖而象已著範錫神禹而數不傳於是覃思極變作範數八十一章而其義理殫盡雖更僕不能數也安俟一一而剿説之哉歐陽氏又起而疑之則吾所不敢知也要之隂陽一理乾坤一畫羲不待洛書而畫易禹不祖河圖而衍疇程子以謂即無圖書八卦亦須作蓋言天地隂陽之理已具於聖人之心也若夫易範既成則其通變化而行鬼神者昭然若日星即不言圖書亦所謂善易者不言易也改過説汪琬魏環極先生教豫以讀書改過豫故為是説昔者聖人之作易也有竒有偶其用則為剛為柔剛柔互居其位而後吉亨利無咎凶厲悔吝之象生焉蓋教人趨避之道至矣而又於頤卦之後系之以大過其在頤曰山下有雷君子以慎言語節飲食聖人以為言語飲食特細故耳及其不慎不節則必為過之大者故以大過繼之孔子為易繫辭曰顔氏之子其庶幾乎有不善未嘗不知知之未嘗復行夫知而不行此即改過之道也吾謂善改過者始乎悔而成乎勇晝之所為夜而思焉少盛之所為壯老而思焉舉凡言語之不慎飲食之不節以失其身取怨尤於人者不可謂不多矣自非剛愎之士思之其有不悔者哉然悔之未幾而因循掩護之念復作不曰姑俟諸異日必曰此不足以纍我及其甚也至於敗名裂檢而不顧豈有他哉患在於不勇耳吾嘗辟之此其執若江河然當其將潰也不過一簣之土數尺之隄足以維持而控禦之釋此不為則將汜濫四出而無所底止天下之人嘗忽之於未潰之時而欲救之於無可如何之後孰知藝之所至固有一敗而不可復返者也過之不改何以異是吾故曰必乘其悔而以勇承之其斯為善改過者矣忠恕説汪琬子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曰夫子之道忠恕而已矣蘇子曰一唯之外口耳俱喪而門人方欲問其所謂此繫風捕影之流何足實告哉汪子曰此非子瞻之言也洵如此言則是疑曽子為妄語也而可乎子思曰天下之達道五所以行之者一也朱子釋之以為一則誠而已矣蓋古之聖賢微而斂諸身心性命廣而放諸天下國家無不根柢於誠者惟誠故能通惟通故能久曽子之學傳於子思子思之後則孟子所得為尤深其曰萬物皆備於我矣反身而誠樂莫大焉是即一以貫之之説也強恕而行求仁莫近焉是即忠恕而已矣之説也故聖人之所謂一者惟誠學者之所謂一者惟忠恕由忠恕以為誠也是猶取穀而舂之而簸之而炊之以為食取絲而繅之而織之而紉之以為衣日積月纍未有不至者蓋始乎勉然而終乎自然是亦聖人之學也已故曰誠者天之道也誠之者人之道也忠恕違道不逺惜隂説陳遷鶴讀史得晉陶侃之言未嘗不肅然興起也大禹之惜寸隂也緝熙光眀於道德陶侃之惜分隂也踴躍奮迅於功名要其不自暇逸之心聖人豪傑之所同而已矣夫天與日月循環運行閲晦朔歷嵗時統而為元會莫可紀極自其微而察之欲求須臾瞬息之間而不得則皆寸隂分隂之積也古君子之為學也七年而為小成九年而為大成其功非可以旦夕至然而致知力行強立不返摩厲其心志調習其氣血觀天察地考證萬物以自通於性命之原者未嘗一日不恪恭震動而或出於玩時愒日之為故其學日以勤而其德日以進自其微而察之豈惟日進而已哉朝而考業晝之所得則有異焉晝而講貫夕之所得則又異焉蓋至一語一默一視聽一出入之間新故不相襲而變化生於心矣自其為士而至於為聖賢日新月盛不自知其所以成則皆寸隂分隂之積也其出而為國家之用也事無大小務竭其力而盡其材前無所諉後無所待不敢有頃刻之偷惰是以所行則必至所向則有功古之人所以不可及者豈徒才德過人哉亦恃夫惟日不足之精神迫於中而奮於外也孔子曰學如不及猶恐失之又曰後生可畏皆善言惜隂者也夫禹大聖人也然其與臯陶相警戒也禹曰思日孜孜臯陶曰思日贊贊則寸隂之惜未嘗一息忘也以陶侃之才而皇然淬厲有事則木屑竹頭經其擘畫無事則運甓以自勞分隂之惜可謂得聖人之意矣然則為學而不知惜隂必不能困知勉行而成人一已百之功服官而不知惜隂必不能負重致逺而成趨事赴功之效易曰天行健君子以自強不息記曰君子莊敬日強安肆日偷君子不以一日使其躬儳焉如不終日詩曰我日斯邁爾月斯征言乎時難得而易失也茍或稍自寬假而謂一晷刻之懈初何所損遂至因循漸積日就於荒落而不自知逮其後也即一旦覺悟而茫茫嵗月已不可追矣可勝悔哉因為惜隂之説銘之座以自警焉仁義字説李紱仁字從人義字從我仁之為言人也義之為言我也惻隱之心嘗厚於已而薄於人故必克乎己而後可以及乎人仁者知有人者也羞惡之心嘗責人明而恕已昏故必不屈乎人而後可以伸乎我義者知有我者也知有人而後為仁知有我而後為義故曰仁之為言人也義之為言我也仁之字從二從人能兼乎人而後為仁也義之字從養省從我能養乎我而後為義也故説文義字從我部至正字通始改歸羊部不知字意者也雖然仁之為人中庸言之孟子又言之天下共知之而共信之矣董子謂宜在我者而後可以稱義故言義者合我與宜以為一言以此推之義之言我也又曰愛在人謂之仁宜在我謂之義仁主人義主我也故曰仁者人也義者我也春秋繁露之言未必天下共知之而共信之也且不獨義之解從我義之音亦從我也書云無偏無頗遵王之義表記云仁者右也道者左也仁者人也道者義也蓋仁之於人義之於我六書之制會意與諧聲兼而用之也或謂仁義字並諧聲則中庸謂仁者人也義者宜也豈宜亦諧聲乎曰宜亦有我音也詩云左之左之君子宜之是也發明本心説李紱朱子因陸子教人有發明本心之説遂以頓悟目之而其實非也陸子全集二十八卷余家所藏宋本與明朝荆門州儒學藏本撫州家祠本並相同無片言增減嘗翻閲數十過絶無頓悟二字其生平教人好舉木升川至專以循序為主積小以髙大盈科而後進即鵝湖之詩必曰涓流積至滄溟海卷石崇成泰華岑此天下所共見共聞者其不為頓悟之説也明矣至於發明本心並非頓悟孟子論乍見孺子入井即所以發明惻隱之心論呼蹴之與不受即所以發明羞惡之心而不辨禮義而受萬鍾者則謂之失其本心陸子發明之意不過如此非如朱子所謂一旦豁然貫通而衆物之表裏精粗無不到也故嘗因楊敬仲扇訟一事謂是者知其為是非者知其為非即敬仲是非之本心此即發明之一證也其所以必欲發明人之本心者蓋專以效法先覺言學則中材以下必且以資性諉為不能惟知仁義禮智皆本心固有非由外鑠然後夫婦之愚不肖者皆可以與知可以能行而人皆可以為堯舜無庸自諉亦無可自棄此發明本心之教所為不可以已也自聖賢之學變而為科舉之業剽竊口耳不復以身心體認陸子之書未嘗經目而道聽塗説隨聲附和咸曰陸氏為頓悟之禪學不知陸子全書具在絶無此説而循序之教則無時不然無人不然正與尚頓悟者相反學者試取陸子全書讀之則知娶寡女者不可誣以撾婦翁矣或謂陸子既非頓悟之教其弟子慈湖楊氏何以專言覺悟曰覺非聖學之所諱也先知覺後知先覺覺後覺孟子不嘗言之乎惟覺悟之後功夫正多既察識必存養必擴充以四端保四海以親長達天下終身之憂俯然日有孳孳而敬仲一覺之後純任自然故有過髙之論梨州黃氏云象山以覺為入門而慈湖以覺為究竟此慈湖之失其傳也以慈湖為失傳則知陸子之傳不如是矣天下之人試即吾説求之其於陸子頓悟之誣庶幾釋然已夫皇清文頴卷十一
