body:
  text: 記乾清宮讀書記康熙二十四年正月二十七日乾清宫御試徐乾學我皇上膺圖受命德盛化神文軌齊於勳華至治協於軒昊正朔頒八荒禮教遍六合自開闢以來所未嘗有矣而皇上所以致天下之極治若此之盛者惟是勤學好古極圖疇精微之奧通天地渾淪之理窮古今之紛賾觀萬物之屈伸禮樂貫於百王運數探於元始因革損益燦然備陳制度文為犂然具舉自書契之後簡編煙海深宮禁籞廣厦細旃之間昕夕披覽亹亹忘倦是以內聖外王之道無所不該文經武緯之宜無所不裕合乎天而孚乎人發諸邇而見諸逺舉而措之易易也臣伏讀尚書至説命乃始言學曰王人求多聞時惟建事學於古訓乃有獲蓋王者之多聞欲以見之事業也非徒資閎覽稱博洽而已三代誼辟罔不皆然顧後世人主或厭棄詩書或初勤終輟以是治功亦遜前古若漢武帝表章六經東漢顯肅二宗臨雍親講唐太宗留情典墳意悟沖邁宋真宗仁宗手親經史丙夜不輟史册流傳以為美事而治不臻於極盛者以其所學之道非二帝三王之道也孰有如我皇上之合道法以出治與天合撰自強不息者哉臣惟乾至健也天得一以清乾之象也解者謂一者專一而不撓純與不已之謂也穆清宰乎上而日月星辰經緯錯列氣化流行循環不已夫天豈有息時哉亦豈有強之使然者哉惟自強不息故健之用為至神一息即非健矣孔頴達正義云天體之行晝夜不息周而復始無時虧退君子以人事法天亦如天之至健而自然不息無幾微之或間是以仰觀俯察窮搜博覽彌綸宇宙酬酢神人雖功用莫之能測而範圍不外於一心蓋皇上之心即二帝三王純亦不已之心也皇上之學即二帝三王惟精惟一之學也無一時不典於學即無一事不合於道由是而致治之盛逺邁往古豈偶然哉臣謹承命為乾清宫讀書記云瀛臺恩宴記徐乾學聖天子御極之二十年九敘歌七德鬯雈苻銷聲鯨鯢潛伏遺孽就殄諸方底平威弧將韔靈旗欲偃雨暘時若歲其大有天子以秋七月壬申燕羣臣於瀛臺蓋異數也羣臣入自西苑門乘船渡至石橋側序立以俟天子遣重臣傳諭曰惟兹在廷諸臣宣力有年恩數未遍今朕駐蹕於兹召諸臣合會為歡以永今日魚藕菱芡之屬出苑中所有無費犬官又念秋露始零各賜文綺表裏用製時服非比法筵大賚其共悉朕意諸臣以次拜賜伏而奏曰臣等備員多過無有毫末勞勩方懼隕越於下今天子加恩便蕃在廷沾洽跪聆溫綸益用悚栗涓埃之忱難禆海嶽臣等無任惶愧者奏已謝恩就席天子復有命曰古者君臣有獻酬也今者之飲朕不及遍勸羣臣其暢情極歡無或不醉諸臣再拜稽首就坐飯訖改席設肴核賜上尊人一巵又命勳舊大臣學士勸飲無算爵於時天氣爽澄樹色茂鬱秋蘭香發谷鳥聲和諸臣既醉謝恩各擎所賜以出臣既點承華之署獲與斯榮又以執筆侍立螭坳誼當有所撰述臣伏考儀禮有燕禮於五禮屬嘉其一為君臣無事而燕其一為卿大夫有勤勞而燕也今諸臣幸邀天子之寵靈而際太平無事廟堂之上璣衡神運使萬物得所四海蒙澤諸臣方奉職不逮其何勤勞之有此所以大小臣工受恩感激踧踖不自寧者也臣又讀小雅鹿鳴之篇小序以為燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意故燕禮歌鹿鳴而鄭康成注以為君臣講道修政之樂章賈公彥疏魯頌振振鷺鼓咽咽醉言舞于胥樂兮之詩亦以為君臣相與明義明德而燕也飲有酬賔送酒之幣食有侑賔勸飽之幣三代盛時上下和樂君臣之間如家人父子論者以為泰交之盛致治之本在是自秦漢以後此風邈不可覩矣然則天子所以施恩臣下飲食之而侑以筐篚令其不醉無歸者恩至周浹禮至隆厚與雅頌所云先後一揆矣自三事以及庶司有不戴聖德之髙深淪肌浹髓以圗報於萬分之一者乎臣故述兹榮遇系以五言古詩四章以為瀛臺恩宴記云御賜書記徐乾學皇上以侍講學士臣尹泰有問學操行俾在內庭供事不數月以其勤也賜之內府祕本秦漢文一帙臣泰既受賜纍日喜見顔色則向學士臣乾學言曰泰少而讀書僅通記籍長而粗知大義未嘗窺聖言之窔奧自侍禁庭見皇上聰明時憲孜孜亹亹聼政之暇研精覃思於六經之要妙與夫前史得失之林每召臣泰面加訓諭凡古人文章一字一句稍有疑端天語發明洞若觀火臣泰側而聼焉伏而思焉如是數月而心有所開今之泰非昔之泰也皇上以泰為可進於學而賜以是書又重之以宸翰泰雖不敏將終身焉紬之繹之以益其神智傳之子孫世世寶藏焉子為我記之臣乾學竊惟自古人主留心藝文者多矣未有如我皇上好學深思精微廣大者説命之言時敏周頌之言緝熙無以過之也臣乾學薄劣無比遭逢際會得侍講幄及造內庭仰見細旃廣厦夙夜有密之聖心而泰朝夕供奉式克欽承揚休近光密邇咫尺宜其涵濡於帝德之廣運而自淑於厥躬也臣又伏念人臣受君父之賜尺寸莫不以為榮惟賜書最為優渥車服有時而敝金貝有時而罄惟書則貽之永久是訓是行不啻天球河圖之璀璨而世世守之若河山帶礪之綿長也宜泰之感激之深而愛重之至與東宮將出閣上特擢泰為詹事眷倚益厚泰益思進德修業以報非常之恩他日洊登三事寵賜便蕃尚當為君記之勉旃自愛賜遊西苑記徐乾學康熙二十有五年秋七月初九日平明羣臣奏事畢奉詔賜臣廷敬臣乾學逰西苑環衛導行由勤政殿之左歷小徑入門為知稼軒軒之外疏豁爽塏心目開朗數武至秋雲亭臣英臣士奇臣杜訥拱立亭外以待其西則嘉頴軒上披閲章奏及進膳之所南則狎鷗亭平臨太液闌檻鮮澄如畫可望而得也其際則泱漭蕩漾極視無涯清流環引被以荷芰青紅掩映泛景翩風鴛鴦鸕鷀飛鳴自若池之隂植稷禾果蓏數畦方秋頴苕秀色成攬有轆轤髙井膏液潛通清泉不竭迤西朱牆以內為豐澤園上退朝讀書之室水瀠廽階下規制朴雅總無雕飾臣等仰見皇上於政事學問日昃不遑念民依勤稼穡所其無逸之心雖在清宴未嘗頃刻少輟侍衛宣傳溫諭賜上方珍饌二筵未幾賜臣廷敬臣乾學御書各一幅天章炳煥龍翔鳯舉又賜臣等五人法琅香罏瓶合各一製作工巧五色絢爛香煙裊然臣等咸稽首頓首謝恩乃出臣竊惟前代楊士奇李賢諸臣皆有賜逰西苑記比於周之宴鎬漢之橫汾唐之興慶播為美談流傳簡牘往者嘗心慕焉以為遭逢之幸何意躬事堯舜之主得以持槖簮筆出入殿廷親見天子恭儉仁聖勤政講學功德巍巍而又荷被眷遇至深且厚臣一介豎儒才學不逮曩代諸臣加孤蹤薄植與世寡諧猥蒙聖主特達之知實逺出前人萬萬臣所為捫心知愧戴恩罔極者也深惟遊覽所見禽魚飛躍草木蔚茂雖一物之微皆以地近日月顧戀恩私矧臣粗知誦讀厠列侍從寵踰涯分日夜思惟才短識暗無以稱塞方諸物類命賤恩深徒娛暇景無益明時然臣區區之心何能但已每思古人雖處儔匹之中一飯之德誼無相負况於荷天之寵隆施稠疊雖小雅鹿鳴所稱承篚式燕以待嘉賓者殆過之焉臣顧何人惜此頂踵若使臣之自矢稍渝一節便為虛此遭逢辜負聖恩為世大僇至於經術材器臣於朝右最為後人但犬馬惟知戀主葵藿亦能向陽抱此區區冀報效萬一而已臣既以自勵且與諸臣共朂焉翰林院題名碑記徐乾學翰林院設於唐開元中自諸曹尚書下至校書郎均得與選入院者概稱為學士有待詔供奉之名憲宗時置學士承旨在學士之上至宋始定制資淺者為直院暫行者為權直而學士之職始貴為院長明初又設講讀學士講讀修撰編檢諸員其制大備時入院者不專進士科至天順間李賢建議始盡用進士我朝因明之舊間損益唐宋明初之制辟薦者得入翰林天子加意文學才士蔚興儒林文苑之官多至不可勝數夫翰林為朝廷文學侍從之臣居禁近掌制誥公輔之望由此其選非可以雕蟲篆刻之才當之也豫自庚戌釋褐先後官翰林垂二十年自信朴僿無他長惟是一言一議亦欲溯其原究其用本經術以經世務期不愧於自古在昔立言不朽之義方力焉而未有逮也其敢以虛名譁世乎嘗論有明館閣文章之盛莫如洪武太祖搜羅元世文獻之遺徵辟在列如髙青邱陶主敬宋景濂王子充張志道方希直及練黃諸公淵源相禪不特文章爾雅亦多以節義表見者永洪之際則有三楊二王南陳北李勳業政績卓然可傳至於成𢎞之世久享隆平風流𢎞長於時懷麓滄洲張其赤幟白沙定山分道揚鑣熊峯圭峯振之東江輩世人比之蘇門六子者大半在詞林他如柴墟鶴灘儼山升菴二汪皆以讀書為能事導揚風雅表儀詞垣降至隆萬東阿臨朐猶能學有根柢詞知體要不失前人矩度自是而後才雋輩出競以浮華相矜詡枝葉愈繁流趨愈下言文章者至以詞林相訾謷則政事可知已豫在史館論次有明一代文章政事升降之故不禁概焉歎息嘗怪文學如道思應德熙甫功名理學如廷益伯安德溫諸公皆不與館閣之選其在館閣者巨儒偉人又或不出於科目胡仲申趙子常徐大年王常宗以布衣預修國史名爛天壤其由進士為詞林者二百七十年中何止數千人其傳者可指而數故知人能重官官不能重人也天官家謂柱史一星在勾陳帝座之側為翰林之象豫幸遭際休明兄弟踵武入翰林為希世之遇顧豫老將知而耄及無能報稱其在列諸公當必有逺勝曩代者上應昌期而舉臣職抑尤有望於後來者也故敢援據舊聞錞于申之以文題名之石告後之君子翰林院教習堂題名碑記徐乾學古之造就人才如周禮大司徒鄉大夫賓興之法戴記文王世子大樂正之教國子其制備矣其後考亭西山分年讀書法講求尤詳然皆未仕以前也其教於士既出身以後則莫如翰林院教習之法初明洪武時選天下舉人年少質美者張唯等十人擢翰林院編修入文華堂肄業詔宋濂桂彥良為其師帝政暇輒臨幸考業親第高下光祿給饌太子諸王迭為之主賜白金鞍馬冬夏衣裘及永樂二年遂選進士二十八人復益以周忱一人就文淵閣進學給筆札分鈔賜第隆禮過之時榮其選謂之二十八宿其中如王文端直李忠文時勉陳文定敬宗周文襄忱後皆為名臣德業文辭照耀一代稱極盛已自此每科庶吉士皆教習以學士為師然沿襲既久學堂程課僅同村孰師生相習為軟熟套爛之文今所傳館課文字是已以是士氣奄奄卒於不振然其害猶未甚也自正嘉間姚江立教以象山之心學兼永康之功利徐文貞當國私便其説至張江陵為館師令庶常日見上計吏咨訪利病接引賓客漸事招搖而士氣一變矣趙大洲之為教習也則導士子以講誦楞嚴經引釋入儒滅裂名教此得罪吾道之大者流風牽引不知底止其禍至今未艾矣我皇上道德沖備益之聖學欲復天下之人心一歸之於古以為翰林侍從官備啓沃顧問尤不可以無加意於是常賜考試親第甲乙如舊制時召對便殿講説義理良久乃罷乙丑春既賜進士及第出身選入庶常有差所司以教習請上特命豫以內閣學士與院長共涖其事明年夏遷禮部去有司請更代上命之如故自惟孤陋洊膺異數循省悚惶憶豫之入翰林也館師孝感公痛闢異端昌明考亭之絶學於既晦之後斯文賴以無墜乃本其意撰為條例十餘則進庶士而告之大抵以立志希聖力崇正學為第一義季有程月有課所以磨厲而董率之者不敢蹈常習故茍且塞責也務使其見於言者一以六經四子為歸而立德立功皆足以儲為天下國家之用以無負皇上惓惓作人之意而已而數年以來豫所見一館之人才亦既彬彬足觀矣然而前人之為此者其才其學皆足以十倍於豫而缺然未有題名則孰知其教之所自也因略稽開國以來姓名鑱石壁間若以豫之偶嘗盡心於此而汲汲於後之視今則意之所不敢出矣刑部題名記徐乾學外自提刑按察司所定三流以上罪內自八旗五城御史諸案牘統歸於刑部十四司每歲報聞而輕重決之至於新舊條例宜歸畫一非時矜恤務廣德意天下督撫之所帥以奉行者惟視刑部之所頒下而已蓋易之取象刑獄者有五明在上威在下曰噬嗑威在上明在下曰豐噬嗑象曰明罰敕法先儒以明罰者所以示民而使之知避敕法者所以防民而使之知畏此皆設於未用刑之前故明在上威在下正今刑部職也若威在上明在下則曰折獄致刑特奉上之法以致之民良有司之職而已故刑者人命所繫而天下人命尤繫於刑部之一官可不慎哉我皇上御極兢兢惟刑之恤每歲論囚多所寬赦臨決之際涕泣減膳猶時諭三法司以無枉濫失入好生之德洽於人心宜乎致刑措不難矣然豫觀自古臯陶為士終身不遷其官若漢之于定國陳寵何比干皆家世治律明習法比故吏不得因緣為欺今部掾史長子孫其中輕重之例惟意所擬居官者對案茫然但徼幸無事速去而已豫兄弟先後蒙恩迭掌邦禁雖稍欲有所施設亦以遷除之急未盡展布也以是求刑之無寃以仰稱聖天子清問之至意豈不難哉雖然不可不盡心也一案之誤動纍多人一例之差貽害數世不惟其時之久暫也梁統以重刑一疏而禍湛門族路溫舒求尚德緩刑子孫顯宦殃慶之積不待其久也且身有去留名姓不滅百世而下悠悠之口誰復相借乎觀此題者庶亦懼而知警刑部題名碑記徐乾學先王之治天下豈不欲胥一世而歸諸禮樂之中優遊涵濡以共躋仁夀之域然而五刑之制唐虞不能廢帝之命臯陶曰惟兹臣庶罔或干豫正汝作士明於五刑以弼五教期於豫治刑期於無刑民協於中時乃功此可以見五教之敷刑其不率而後人心可正風俗可成也刑者先王不得已而用之雖用之期於終措而不用也豫嘗讀刑書而歎古人制律之深意猶存先王之舊非明於禮教講於心學辨燭毫芒者不能議民之麗刑各有其質援律以定名一獄吏事爾然而此非其情有操刀剚人胠篋探囊而不必為首惡者有斂手安坐從容指揮則重科之有寇盜姦宄犯同而罪異犯異而罪同者有一人而區前後一事而區彼此則異科之此過故之分而誅意之法也惟文理密察哀矜審克乃以得其情周官五聲之聼兩辭單辭而外至於色聼氣聼可謂微矣而又有耳聼目聼之法不第用已耳而察人耳不第用已目而察人目先王以為不如是而下有遁情者矣人藏其心至不易知刑之施視其心以為輕重而外之所犯抑末矣故刑書所著皆治心之法而非僅以治其身也儒者猥以名法家言而忽之一旦親吏事決疑獄焉定其能不失入哉豫以憲長遷西曹每舉是以告其屬臨決之際多所平反而要之上體我皇上如天好生之德罪疑惟輕無殺不辜故於此加兢兢焉皇上臨御以來屢渙慎獄之德音恆歲讞決奏上必反復詳審求以生之求之不得而後刑之歲不過一二十人而又屢歲肆赦與以維新其矜哀惻怛仁民愛物之意至矣備矣雖堯舜之惟克天德作命配享蔑以加矣豫雖未學斷獄然先王敬獄之道刺宥之方自少習聞漢儒引經決獄最為近古今所沿唐律皆本於經旨豫兄弟居平尚論每嘆古人無不以經術為吏治顧後世知之者少也豫解部務未久吾弟立齋亦以憲長遷西曹豫兄弟洊受國恩先後司風紀掌邦禁其職可謂重矣豫受事日淺未竟施設吾弟與諸君子尚勉旃哉仰佐我皇上無刑之化舊政必告豫敢申其旨於題名碑石禮部題名碑記徐乾學朝廷有大制作大辭命天子不以乾學為不肖常被咨詢俾與參詳而各館編纂教習庶常諸務又總領如故私惟荒陋之質一切埤益逾溢涯分僨敗是虞是用未明而興夜分而寐屏絶人事專國家之任使期月以來庶政稍稍就理凡部中沿襲弊法如直省鄉試歲科試磨勘解卷及內外關白文移異時官吏賂遺掊取諸陋例悉奏除之又奏免歲貢赴京廷試及改正科場條例人以為是諸如此者不一是豈乾學一人之能亦賴同事諸君子一乃心德重相諈諉肆得爬梳其積習經畫其新規也逮豫遷憲長解部務之日諸君子畢至無不揮涕相送依戀不忍遽釋於乎此亦足以徴諸君子之賢而豫之多幸矣方豫在部時天子親灑宸翰書博學明辨四字如斗大特以寵賜捧拜恩榮惶恐無地竊念生平無他才能學問又極弇淺惟於古人修辭立誠之道義利之防不敢不以自勉此學辨之一端臣子立身事主之大節區區之誠明旦自矢不虞上蒙聖知褎寵過甚嘗考宗伯之官非道藝德行備具者不稱兹任學之不博辨之不明何以彰厥儀章綜兹同異而其要統之以善其本歸之於誠愧豫之不克副也書以貽後之人以為題名碑記詹事題名記徐乾學考官制東宫官屬置詹事府以統衆務置左右二春坊以領諸局三代以後莫備於唐歷紀相沿逮我世祖皇帝御極初載有仍弗替惟時儲位未立官屬虛冗始議裁去比皇上繼統之十有五年建立皇儲乃仿舊制復設是署澤州陳公來掌詹事豫為贊善規畫制度一切草創陳公命豫實經理之二十三年冬豫以侍講學士蒙恩特賜擢用以十一月受事復修陳公之政明年遷閣學以去豫居是職雖未久顧其始也際復設之初得從賢端尹後創制條綱張舉節目非同他時祗以優遊坐受成事逮於其後皇太子睿質日昭敬修時敏豫又幸得備位宫僚仰見皇上所以訓迪皇太子者至詳至備遭逢盛隆屬有厚幸欽惟皇上萬幾之暇究覽經史未明而興漏下不輟凡皇太子一言一動必皆皇上躬為之表率昕夕課程親加校勘祁寒溽暑不少間自古儲教之嚴未有如我皇上者也嘗伏思之古者教太子之法太傅在前少傅在後入則有保出則有師傅以傳之德義保以保其身體師以道之教訓而又選天下孝弟博聞有道術者以與居處是以教習審而言行見聞無一不正居斯位者甚不易也今世詹事春坊之官即當時保傅之任今且諭教之責在御總攬為臣子者咸得稟受成規贊翼於下較之古昔難易判矣然古時宫僚人受厥事賦厥功其職分今惟詹事得以進講其職一古時出入宴逰與太子偕為時久今惟進講得以陳説為時暫前代人主之學明於大或略於小治其粗或遺其精若我皇上聖學隆懋大小兼舉精粗悉備巍乎若瞻天者之莫窮其高浩乎若觀海者之莫測其深為臣子者即稟受成規而欲以堪贊翼之寄視諸前古蓋有獨難者矣思其難以副其職竊願居斯位者之同有是心也皇帝親耕處恭記李光地皇上御極之四十有一年春省耕畿南巡視宿麥勞勉農人巡撫臣光地及境內文武諸臣扈從以行維二月壬申聖駕次于博野因東作之興念稼穡艱難躬秉犂器即功竟畝臣令知縣臣開銓即按其疆場表識聖迹追維自古盛帝顯王皆以農為興德之本周禮王籍掌之甸師月令孟春天子親載耒耜參置保介御者之間其在成王親與世子出觀農事又為饎以饁之嘗其旨否不以命之從行之臣雅頌矢歌聲傳至今洪惟我皇上聖德神功度越有周克勤小物為億萬年子孫之貽謀其作典常播聲詩者非一邑所得私也然聖迹所存則博野小邑其名一旦遂望於寰內非常之幸蓋自建置所未有又近在郊甸臣光地適為長吏帥屬耕耨攝官承乏與際寵榮焉爰立貞石具紀其盛以垂無窮臣又竊惟受事之日即得內府耕織圖之賜今兹扈從特被殊錫復得臨唐太宗書勸農詔天章一軸仰窺我皇上宵衣晏食必以務本力穡是先庶幾益求庶民所急竭誠謀度時請聖謨訓敕以釐於成則教農趨時方由博野而始臣光地既躬送聖駕遣歸郡邑諸臣皆以此申戒之用并銘勒以自朂御書太極圖説西銘恭紀李光地恭惟皇上道與堯舜禹湯而相紹學則洙泗關濂而同歸政撫萬方之煩心傳千古之祕而且窮象數之賾隱訂唐都洛下以無訛攬文藝之菁華裁漢魏江東而還雅顧天縱之睿智實兼多能而聖作之文章悉源性道以是萬幾一日之暇獨宗六籍諸儒之書雖遊戲於墨池必翺翔乎學海御書太極圖説西銘前後凡數百本歲二月南巡守臣光地扈駕涉天津屢蒙召見因出御舟中所書二軸以賜臣謹拜手稽首秪受而寶藏之伏惟二編為近世學術淵源比之上古之圖書中天之易範也歷代雖經儒者之表章然必百世以俟聖人而大著昔者朱子為圖説首句國史誤增兩字纍欲請之於朝刋改而終弗獲及其論西銘則為林栗彈劾以去道之難明書之難傳也如是今我皇上篤嗜深契興絶表微宸翰所揮天章所賁昭兹來許千古有光在皇上則為以聖而下學於賢將天下皆知沿河而東至於海斯文之幸千載一時儒先復生不知何如其忭慶也愧臣凡陋弗克欽承恭紀恩遇勒之貞珉以惠天下學者皇清文頴卷十九
