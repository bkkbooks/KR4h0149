body:
  text: 賦日月合璧五星連珠賦以題為韻有序鄂爾泰雍正三年二月庚午司天氏奏稱日月合璧以同眀五星連珠而共貫宿躔營室之次位當娵訾之宫為從來未有之瑞諸王大臣請升殿慶賀上辭弗許惟念臨御二載遽覩此嘉祥皆由聖祖仁皇帝所致爰遣各官祭告景陵并付史館頒示中外與臣民共慶之臣乃聞而稽首揚言為序其事曰日月五星者天之光華也人君德動天鑒則日月五星各效其靈傳曰至德之明日月若連璧又曰至德之萌五星若貫珠五星所聚有德受慶四海昭理中國安寧子孫蕃昌此其占也而營室之宿其位在亥主乎宫廟星眀則昌娵訾者則日月所會之辰在亥曰娵訾爾雅所謂娵訾之口營室東壁是也考其分野則司馬遷以為在兾并之域班固以為在燕代之間今我皇上聖德光輝瑞應所徵上之格乎祖宗宫廟之地而下之周乎畿輔逺近之區臣謹博稽典籍凡經史所載以逮諸子百家天文讖緯之書衆矣其言歷代五星之瑞者蓋詳至若合璧連珠同聚一方雖知其為非常之應而三皇既邈後世無聞惟宋書有之曰帝堯在位七十載經星出翼日月若合璧五星如連珠乃歸功於舜由此觀之豈非以二帝相繼光華所萃若合若連與天同符之眀驗哉顧其事不見於虞書而紀於二千餘年之後此必得之孔子刪書之餘信而可徵然後載之正史豈諸家雜説比乎我皇上以聖繼聖正如舜之紹堯此重華復旦再見今兹矣聖祖仁皇帝在位六十餘年即帝堯之七十載也我皇上御極以來於今三載正舜之格於文祖之日也聖祖仁皇帝神聖文武廣運無方成功文章巍煥已極是千古以來又一堯也我皇上眀目達聰庶績咸凝光天之下及於海隅是千古以來又一舜也是以太和之氣上應天心而徵乎天象豈偶然者哉夫自古帝王雖眀君賢主凡於祈祥符瑞之事苟獲一事一物如白麟寶鼎神雀五鳳草露黃龍之屬方且登泰山禪梁父大赦改元賜爵紀勳甚至作書以示瑞矧夫日月五星之光昭昭離離為四海九州之所同照而共仰者乎我皇上乃恬淡無為謙讓弗居皆以功德上之聖祖仁皇帝而已不與豈不巍巍乎大哉臣於是伏而思之德動天鑒至誠也頌揚先烈至孝也景陵告祥至敬也宣示史館至信也敷錫臣民至仁也慶賞不行至謙也登封不事至眀也不矜不伐修德不怠至健也即此一舉我皇上深沈之德其足比美於舜者固已至矣况乎萬幾之敕其所以承天命而永天休者又將奚極也為臣子者幸生堯舜之世得以依日月之光華覩星辰之爛縵其何以孜孜贊贊黼黻休眀以覆冒於照臨之中也哉不揆膚陋敬援筆而為之賦云龍飛御極之三載鳳歷司春之初吉二月朔為初吉用告瑞於今宵遂呈祥於翼日夜未半而鶉火之象方昭天將旦而娵訾之光忽霱聖德上矗乎紫霄嘉祥畢聚於營室二曜同明而共麗宛如合璧之雙懸五緯共貫以偕躋儼似連珠之並繂遡自三皇聿闢七政煥發雖符瑞之多端欲徵信而咸闕逮及顓頊之時爰有歷宗可核亦僅紀異於五星未聞效靈於日月稽諸正史惟一見於堯舜之迭興譜其休祥又豈獨為漢唐之莫越若夫五星之瑞歷代鮮合或井婁之次同躔或奎壁之垣共踏上自殷周而徵驗多淆下迄宋元而傳聞亦雜欲如珠璧之共炫曽不能倣佛其二三但若星宿之薦禧何難綜核其草卅爾乃帝德誕敷王心無斁紹世祖之丕基纘仁皇之懿迹大業更美於先朝鴻休增光於在昔播膏澤於荒陬洋湛恩於遐僻無一夫之顛連登九有於袵席思王度而仰式玉式金覘聖學而頌如圭如璧比欽明於唐代洵莫測其髙深擬精一於虞廷無由窺其罅隙於是超帝邁王登三咸五至德協乎天心仁風翔乎下土瑞靄盎溢於層霄光輝照徹於寰宇金烏玉感二氣之華而同升太嵗長庚率五行之精而駢聚見夫璇璣告吉儀象呈靈天樞啓其鑰清都闢其扃開祥光於閶闔覩瑞色於蒼冥九閡顯其昭灼萬彚仰其晶熒非僅兩珥重輪之異逺勝三台五老之星映於萬川如圭璋之可握燭乎四嶽似球琳之作屏誠以諴能感神德可動天以氤以氲非霧非煙萃光華於二五現氣象之萬千或離離而並照或纍纍而如連挹其澄鮮溥天為之加麗瞻彼璀璨大地於以生妍於戲非甚盛德曷致嘉符中天而外亘古所無方之勳華而寧讓號曰雍熙而非誣賡揚莫罄其形容衢謡難喻其歡呼求諸千聖百王而罕儔誰能嫓美其巍煥垂之億齡萬祀而彌耀得不上續夫典謨日月合璧五星連珠賦徐本財成天地驅馭陰陽德動三光之鑒兆開七政之祥位直乾宫是號娵訾之地象占清廟正躔營室之鄉徵一人之有慶應元會之光昌原夫二曜之進退有常五星之遲速異候運行則一暑而一寒循環則為夜而為晝中道回旋九行紛輳長庚每前鎮星彌後求躔次之適符歷古今而罕遘緬彼顓頊瑞叶履端攝提有紀是為歷元聚東井則漢髙乙未之嵗聨奎宿則宋祖丁卯之年言乎數數際休明之運考乎時時逄交泰之天茲惟我皇勳華為偶文武聖神髙眀博厚物喜阜昌民多仁夀致有道兮麗層穹奉無私兮光九有宜天道之下濟與人事而相維靈臺察候馮相占時已卯之月庚午之期雙輪重重而表異五緯纍纍而呈竒萬里風清九霄雲霽繫連城於天中懸照乘於海裔睹黃琮之煙暖蔚矣錦章仰紫貝之光寒煥然綺麗璧惟兩而合則同眀珠有五而連之並照荆山之産未足比其清輝合浦之珍詎能方其朗耀宜乎兆庶雀躍道途卿士鳬趨廊廟皇上迓天休而多讓辭大美而不居溯感召之有自實積纍之所餘善繼善述兮保乂寰宇有倫有則兮憲章典謨惟天降祥於元后惟后錫福於八區頌升恆於萬嵗驗正平於六符臣幸依日月欣瞻星斗際大觀之在上垂史册而不朽擬繢事以成文愧鄒枚之賦手日月合璧五星連珠賦徐杞維皇御極至德合天召休徵於日月呈瑞應於星躔或層疊以摩蕩或錯落以鉤連集於崇朝二曜著明而仰止會於營室五緯次苐而燦然亥子之方仲春之月不盈不縮度適合以無愆有敘有倫舍相依而罔越時也景氣開霽天宇清虛用稽躔次爰驗居諸黃道並行兩兩連城之寶輝光相映纍纍照乘之珠浮雲莫翳瑞靄恆舒郁郁紛紛藍田之煙鬱若煌煌煜煜合浦之産駢如倬彼天文煥兹珠璧楚山遙映和氏驚而莫知洛水如臨衆靈採而難獲宜同雲物以書無俟土圭以測卑哉漢宋僅傳聚於井奎邈矣黃顓庶無殊於今昔惟一德感通斯嘉祥洊答五行順布匪疾匪徐二氣推遷乍離乍合天子乃聖乃神乃文乃武齊七政而贊兩儀奉三無而修六府文明以止治已發其光華純粹以精道更超於三五兩瑞同呈萬物咸覩仰麗景兮燦中天布德輝兮光下土彼夫嵗星居心黃雲捧日瑞露成文東風入律偶鍾靈於一物尚珍異而誇竒視效祉於三光自比擬其難匹而乃孝思純篤聖度淵泓溯降祥之有自更朂勉於在廷洋洋訓謨渙如綸綍巍巍功德炳若日星將見醴泉出蓂莢生玉衡正泰階平靈囿麟遊丹山鳳鳴可致之祥畢至諸福之物咸呈臣身厠藝林學慚武庫仰普照之清光際昌期之休遇敢蠡測而管窺謹濡毫而為賦日月合璧五星連珠賦許王猷德動三辰祥呈七曜瞻天章之璀璨欽皇𠂻之誠孝真無響而不應知有感之必召遐稽符瑞上訖髙陽授時成敘徵厥嘉祥唐帝昭其至治周道慶其遐昌漢書東井之應宋紀奎璧之光若夫二曜同躔五緯齊軌輝煌四照榮光並美應景運之獨隆亘古今而誰擬我皇上功崇位育德備中和萬幾是敕九敘惟歌耕藉則民勤稼穡臨雍則化洽菁莪固已祥徵靈蓍瑞應嘉禾民氣之歡騰無已天心之錫福彌多惟時律應夾鍾日惟庚午司歷呈圖率土咸覩儼乎琢荆璞而成雙燦乎探驪頷而得五爾乃聨形宛轉疊彩逡巡金烏蹲璧玉含珍懸中天之夾鏡碾厚地之重輪雙丸之影交輝兮五德之精畢集晶晶熒熒彬彬熠熠惟鎮星之為吉曜兮偕金水而輔日木火亦同其次舍兮紛光芒而並出散之則錯而為五兮貫之則聨而為一均不盈而不縮兮又何遲而何疾繞重明而效異兮燦娵訾與營室煥瓊樹以增輝兮映瑶臺而添色於是藍田減耀照乘韜鮮夜光失麗連城輸妍非刻畫所可致豈編綴而能然覩此純禧之協應實由帝德之合天黃童白叟咸頌一人之有道山陬海澨羣歌聖化之遐宣矧簪筆於螭蚴覩昌運於堯年敢不志普天之慶以陳頌揚之言爰拜手稽首而作頌曰聖人御宇至德矞皇敬天勤民惟幾惟康時雍風動治化孔彰天惟鑒斯七曜徵祥歸美聖祖謙尊而光臣民胥慶錫福無疆日月合璧五星連珠賦于振人能𢎞道造化無私誠至則形故在天而成象志一則動故先天而弗違此天人之一理蓋振古以如斯我皇上御極以來敷政寧民存誠主敬九有仰其照臨萬物正其性命紫微北拱煥瑞氣於句陳華蓋中懸耿祥光於斗柄覩鉤鈐之明潤知為大孝之徵察斗斛之平量識是屢豐之慶文昌半月綴七宿以聨輝帝座平衡履三階而居正壁是圖書之府天下同文昴為耳目之官百司從令俄聞太史用奏殊祥惟月之吉惟日之良登雲臺而觀物測土圭以分疆爾乃七政齊輝三光並煥如璧斯連如珠斯貫才離海嶠儼雙鏡以晶熒漸拂扶桑比列碁之璀璨實史牒之所罕聞亦名言之所莫贊於是相如珥筆枚叟摛文奏宫商於嚴樂戞金石於淵雲共咨嗟於異數竊纂紀於邱墳原夫二曜之垂象也日為陽德月乃陰精日有中道月有九行三百六十五乃周天之度九萬一千里為去地之程至夫五緯之經天也風伯之師則乍前而乍後蒼帝之子亦時縮而時盈或出於東或出於西時惟大白或候之晨或候之夕命曰辰星中央為土主靜斯寧亦稱之曰地候常作鎮於天庭若夫詩美升恆書稱復旦重光重輪貞眀貞觀星聚於房於以興姬及周之季復聚於箕漢祚初開遂駢羅於東井宋圖乍建爰環集於文奎然而南北殊途春秋異晷考之於漢二曜會於營室而星象不隨稽之於唐五緯集於尾垣而著明易軌豈若熊熊旦旦耿耿離離貞攝提而晃朗歷娵次以參差曙色澄鮮訝雙懸於琥玦晨光眣麗紛燦列乎璿璣加以天酒凝甘卿雲似繡紫氣浮河榮光列宿山龍黼黻蔚為天漢之章土鼓簣桴譜入薰風之奏自非符乾之健得聖之時一以清而一以寧表清寧之合撰二為經而五為緯著經緯之咸宜安得際兹禔福慶此昭回也哉小臣不敏柱下是司挈壺窺管歌以揚之歌曰聖人作覩時惟日兮貞恆作配時惟月兮仁以育之木道光兮嘉會合禮火德昌兮金曰從革萬寶告成水曰潤下春意乃生穡稼惟土周原膴膴斂時五福受天之祜眀明日馭穆穆金波斒斕珠斗歷落星河莫大惟天則天惟聖糾縵光華萬方有慶日月合璧五星連珠賦尹繼善一人建極四海永康道隆首出化洽胥匡至治感通乎天地大德合撰乎陰陽其時百靈效順庶類繁昌山河奠麗麟鳳呈祥星辰昭其景慶日月發其輝光固以見太平之驗亦以開有道之長昔營室聚星髙陽正位七政攸齊陶唐御世漢書紀東井之文宋代應奎垣之瑞自亘古為希逄迄於今而悉備欽惟我皇上膺圖出震秉籙乘乾仁民愛物法祖敬天崇儒重道籲俊興賢夙夜凛克艱之戒宵旰誦無逸之篇體信達順福祉綿綿生蓍草産佳蓮一莖數穗遍滿農田五風十雨屢告豐年而且安益求安聖不自聖克儉克寬必誠必敬一德洽於羣工孝思本乎至性祈穀則瑞雪繽紛勤民而甘霖立應既已綏來動和化神德盛嵗功敘而玉燭調庶績凝而璇璣正兹者夾鐘應律候屆春生百昌發育萬彚敷榮惠風和暢天朗氣清日逄庚午嘉祥畢呈五星連珠以成象日月合璧以齊明奕奕同躔纍纍若貫位依斗極體昭雲漢九道順行六符炳煥聚奎聚井未足擬其光華重珥重輪總難比其璀璨兆泰運之升平歌中天之復旦是宜合下土以嵩呼協盈廷以交贊爾乃憲憲令德秩秩宸𠂻正以作則謙以居躬謂休徵之協應賴聖祖之神功眀禋昭告陟降潛通宣付史館垂之無窮聲教四訖南朔西東遵一道播淳風仰廣運戴帡幪五行以敘萬福攸同此誠軼後超前為生民未有之盛卜年卜世綿億萬歷數之隆也臣樂戴堯天幸依舜日謹稽首以陳辭未頌揚於萬一日月合璧五星連珠賦帥念祖陟靈臺以周覽倬哉雲漢之天章涵一元而羃䍥運六氣於混茫擎八山而立柱分九野以畫疆則有兩曜列序五緯成行昭宣七政炳耀三光蓋周九萬八千里而共仰行三百六十度而有常繄惟聖人在上御陰調陽朝日夕月五氣回翔敻哉隆哉曜靈呈彩蟾魄舒芒黃旗紫蓋武庫文昌燦宫中之柱史煥座後之諸郎時則箕風畢雨春露秋霜既順時以成化爰垂象而徵祥爾乃旃蒙紀年四陽應序月屬夾鐘日惟庚午張表吐丸吳剛執斧羲和扶輪望舒按部金烏接影而髙翔玉聨輝而對舞水權火衡木規金矩中央執繩厥惟后土引元龜兮起朱鳥招蒼龍兮奮白虎會軒轅而五之躔娵訾兮以相聚煒兮煌兮合雙璧於藍田玓兮瓅兮貫羣珠於合浦晶光兩映金縷交纒璣璇攢簇經緯盤旋始則瑶環相摩以乍接繼則寶鏡互照而雙圓枰上新碁暖玉數枚鋪歷落盤邊櫻實赤瑛一色映天然夫祥麟威鳳靈芝醴泉形諸曩昔尚著簡編孰與夫陽暢隂純精氣相宣五德五事融貫醇全布太和之有象昭瑞應於在天蓋自髙陽氏以來未之見焉於是保障陳圖羣工稱瑞天子謙沖咨警有位歸先德之靈承永孝思於不匱夫功原所自繼述之誠也德盛而謙惕厲之情也瑞至弗貴基命之精也天體虛而行健故象緯明聖孝昭而日新故化育成巍巍乎蕩蕩乎又何可得而名也重曰曜則七兮極則一兮感之召之迪其吉兮既迪吉兮心無逸於萬斯年如一日河清賦以聖治光昭河清獻瑞為韻凌如煥帝眷下土篤生至聖天清地寧民諴物順百度惟貞一人有慶嶽瀆於以職方神祇為之召應緬厥黃流根源積石自天而來得人以治歷雍兗而經豫徐闢三門而分九𣲖壯大陸之竒觀鬱巨川之勝槩粵稽典册長發其祥圖呈羲昊昴化陶唐朱文煥采玉簡騰光書紀八年告成功於元后清逾千載呈瑞應於哲王惟聖祖仁皇帝神謨繼禹道法宗堯六十年平成底績千百世日月為昭時陳法駕巡視長河駐龍旌兮沙渚舉玉趾兮陵阿睇黃淮之交會勞指授之功多於是陽侯效命河伯呈靈水安其宅民樂其生欽我皇之嗣服善繼述以凝承用中建極主敬存誠宵衣旰食工釐績凝爰型方而訓俗亦激濁以揚清藴中孚之美備召福祿而來并則見夫瑞麥呈嘉禾獻蓍草生卿雲現連珠合璧萃聚在一時者乃曠古所未聞蘇祿荷蘭梯航來萬里者實於今而創見爾其嵗歷三餘月逾長至陽和肇啓之辰萬寶畢登之會馳驛使於東南奏河清之上瑞銀濤㵼潤迎臘雪以交輝玉鏡融波映寒蟾而共冽稽其地則跨吳疆而界秦甸分野同規考其時則舉八蠟而獻五辛連旬浹月可大兼可久清光與雲漢俱長無極復無疆清風合朝野為一蓋惟聖心包涵太極故水為動象而靜虛之本體湛然常凝聖功保合太和故黃為中德而通理之長流瑩然位列遊麟儀鳳洵足嫓美光華神雀仙芝未許方斯盛烈若夫至治彌崇皇圖益固祇承上帝之寵綏篤念先皇之垂裕福緣善慶惟持兢業以迓天庥樂與人同特薦馨香而昭國祚煌煌訓諭撝謙弗尚隆儀濟濟臣工晉秩羣霑異數小臣運際升平恩承雨露謹希喜起之休風共效賡揚而獻賦河清賦有序留保皇上御極之四年盛德覃敷治化翔洽布經綸於睿慮錫十五國之甘雨和風運造化於宸衷成億萬年之民安物阜休嘉之氣蒸為太和豫順之徵疊呈上瑞凡史册之所罕載曠古之所僅聞者莫不羣臻畢赴孕秀育竒故駢枝九穗地獻嘉禾璧合珠連天開景運萃千載難逄之慶為一人有道之祥於嘉平月中該臣奏表恭報河清自陜州境至江南凡二千餘里小臣才識謭劣詞句庸俚願效賡揚之盛敬抒歡忭之忱謹為河清賦以志瑞焉維大河之發源亘崑崙而洄洑環坤軸而如帶每千里而一曲桃花散漫百川之波浪同歸竹箭奔流數斗之泥沙常濁位先四瀆色占中央星海分來道己通於赤壤蛟宫映去光長借夫朝陽歷龍門而滉漾下積石而汪洋爾乃瑞雪初晴圓蟾正朗晶晶銀波溶溶翠浪陽侯拜舞開氷鏡於清流河伯奔趨寫魚龍之竒狀天光雲影兩旬之湍瀨胥澄水碧沙眀千里之渟泓極望龍馬負圖之日遜此休徵流星入昴之年未逄瑞象惟我皇上至聖法天紹精一之心傳眀同日月廣裁成於默運量並坤乾集千聖之大成學深如海裕萬年之純嘏福至如川雨潤露滋遍羣生而霑濡占風望水來百國而駢闐然猶兢業為懷時幾是敇獨運經綸尤勤繼述飭官方而植楩楠軫民依而親稼穡百萬之賦恆蠲三章之條屢釋杜朋比以正人心屏浮囂以端士習發太倉之紅粟盡飽閭閻支太府之金錢宏開溝洫是以時呈豐稔家慶升平小亷大法俗美風清喜溢八埏正元會離眀之世祥凝庶物極髙卑協應之形惟河清之瑞應豈往牒所曽經天不愛道地不愛寶水面雲霞波間荇藻清洄熊耳之山潔映鍾吾之道源從天上歷逺境而逾澄行自地中值隆冬而彌皎昔傳至聖之殊祥果見千年而應兆誠哉氣類之感通允矣天心之燭照臣觀瀾無術望若徒羞幸沾千頃之潤莫辨細涓之投覩頻臻之上瑞喜疊至之鴻庥識金隄之孔固知玉檢之應留燦燦榮光映恩波而共煥綿綿德水沛聖澤以同流敢獻蕪詞竊效歌衢之義敬攄忭悃願同擊壤之儔河清賦以黃河清天下平為韻有序錢陳羣皇帝御極之四年冬十有二月河臣及近河所在守土大吏各奏言由豫之陜虞等州邑至邳徐等州及淮上綿亘二千餘里黃河清至今湛然澄徹臣讀京房易傳云河水清天下平易坤靈圖曰聖人受命瑞應於河衆説所稱咸推上瑞蓋由我皇上德備生安治登隆郅萬善薈萃諸福咸臻膏澤同於雨露照臨並乎日月用是天不愛道地不愛寶凡三見卿雲連珠合璧禾九穗麥雙岐嘉祥疊至普天率土人人歡喜自幸生逄聖世得覩太平有象即重洋逺島遐陬極域莫不重譯梯航接踵恐後臣伏思三才一理有感必通平成者參贊之實功也嘉祥者位育之徵驗也乃聖德謙沖復申命自天告成於祖垂履泰持盈之戒廣行慶敷錫之仁堯之允恭禹之祗承何以加兹臣遭際昌期歌咏盛事以眀符瑞之由乃拜手稽首而作賦曰鴻濛既啓瀆源孔長路折於陽紆之峊𣲖分於陵門之岡出崑崙而蹄涔露白見積石而土色同黃三門逈兮浩浩九曲繚兮浪浪授圖應籙芝檢榮光洵諸瑞於以徵集瑰異之所窟藏也爾其綿綿亘亘逶逶迤迤冒石門而箭激包砥柱而風過抱秦絡晉襟豫帶魯南會乎淮泗北入乎滹沱潤物長族振稿起枯既廣濟乎舟楫還分液於田禾受明禋而效順爰後海而先河其為流也直者不滯伏者不停羣鱗之類棲託而出沒萬年之河揉雜而包并笑寸膠之餘技曽何足以窺其一萍惟聖德之感召乃湛然而澄清似眀鏡之鑒物非滄浪而濯纓扶杖而觀者萬衆應期而至者千齡則見夫迅而不駭徐而不遷波恬兮湜湜流緩兮涓涓河伯受命於蒼昊令百神之我先大魚折溜而隱見黃龍䠠水而潔蠲氷夷握帚兮騰騫於後琴髙秉扇兮蕩滌於前折則眀玉潤回則孕珠圓洵亘古之罕覯昭聖治於中天維時澤腹方堅吹豳飲社際此嘉平降兹福嘏湮渭一色納濟水而同清日星朗照映銀漢而如寫覩漣漪之可愛悟晝夜之不舍維黃輿之獻瑞播大喜於天下倣元會之盛事乃升歌而進雅歌曰聖人在上敘五行兮懷柔允翕感至誠兮河水湛然應文明兮萬物得理激濁揚清兮家用平康百穀用成兮五風十雨泰階平兮庶可歌兮不能名兮河清賦尹繼善聰明惟天時憲惟聖覆冒無私旦明必敬德澤周乎羣生孝思本乎至性和四序而平八風順五行而齊七政惟誠必通有感斯應覩萬物之咸寧昭一人之有慶蓋由精一遙傳中和交致建極作則以綏猷秉道乘乾而出治成位育之鴻功盡聖神之能事逺宗近守既邁帝而超王合撰同流復參天而兩地是以庥徵疊見品彚咸昌民躋夀域嵗樂豐穰山川呈其秀靈經瀆獻其嘉祥萬象淵涵早淨桃花之浪一泓澄徹影連銀漢之光爾乃馬圖復出龍采全昭率土上平成之頌普天來清晏之謡皎潔則遍二千餘里綿延則袤四省而遙稽從前之瑞牒誠獨盛於聖朝底定逺過於夏禹放勳嫓美乎唐堯若夫梯航入貢滄海無波清同甘露瑞勝嘉禾光添玉珮美潤菁莪溥博淵泉而聲名洋溢咏歌沐浴而治化漸摩抑且金沙皆潔歷久猶清波恬日朗水淨沙眀當奏疏之入告益保泰而持盈答鑒兹於求莫副貽謀於觀成蠲吉眀禋永篤率由之念晉階錫福欽聞咨警之聲臣中祕叨榮寸長未擅共慶天庥渥承主眷以瑞應之光昌卜歷年之億萬效康衢之謳吟望彤庭而拜獻乃敬作歌曰景運方隆兮聖人在位百神懷柔兮羣流和會河澄清兮民物泰諸福駢臻兮歡騰中外河清賦張廷瑑聖王御極四海永清恩澤周乎六宇休養遍乎羣生揚武威兮逺徼矢文德兮太平慶著穹蒼燦光華於七曜祥徵大地産嘉穀之九莖爾乃月在嘉平河流獻瑞看清水之淪漪喜碧波之無際岡巒逺映沙禽髙舉以雙飛藻荇叢生錦鯉浮遊而作隊粵稽往昔之載籍四瀆首重夫黃河溯發源於星宿歷積石兮揚波過龍門而澎湃千里經底柱而激湍偏多禹乘四載始奏安瀾之績漢勤萬乘徒吟瓠子之歌自昔河防未易濬治惟期疏導以安流罕見澄清之克致今者上下天光更無纖翳歷久而微波不興三旬而湛明未艾大吕表嵗功之成洛邑為中州之會綿長道路欣看二千里之遙直注東南蜿蜒十數郡之地水連淮瀆以晶瑩早識恩波之汪濊於是羣工拜手競上龍章嘉瑞曠千年而始遇竒祥著歷數之遐昌咫尺是傳乎史册矧兹綿亘而久長海不揚波尚頌成周之盛治河流澄徹益表帝德之輝光天子乃道積彌謙聖不自聖宵衣旰食惟勤宇內乂安夕惕朝乾共見修已以敬不事箋賀之繁文務廣覆載之實政載敕班聨而共勉用答昊天之瑞應爰舉祀典宿戒儀曹瞻景陵兮肅籩豆陳芬苾兮奏簫韶維我聖祖靈爽匪遙相上帝而錫兹繁祉實陟降之神眀孔昭敷湛恩於臣庶沛大澤於九霄百爾咸荷進爵之榮靖共益勵志乎盛朝聖德彌綸乾行以健繼志述事羹墻時見維重熙之纍洽爰上瑞之疊現景運共慶夫升平寵命更承乎恩眷小臣握管以揚休用伸微𠂻之欣忭不揣謭陋之文敢效衢歌之獻河清賦有序趙大鯨皇帝御極之四年冬十二月黃河澄清自陜州至徐邳淮宿二千餘里地連四省時歷數旬誠太平之嘉瑞自開闢以來所未有也謹拜手稽首而獻賦曰時當泰運瑞見河清湛洪源而皎徹涵萬象以澄眀治協修和聿著聖朝之嘉應祥徵清晏益昭天下之隆平爾其天一滋生坤元涌溢尊為瀆宗號稱水伯出自崑崙導從積石既遙引乎星精亦下縈乎地脈分兩源而積勢逶迤疏九𣲖而旁流潤澤三門逺注徒聞濁浪之黃六斗曽量未見春波之碧若乃川祇效順河伯呈祥澄瀾浩浩素液湯湯拂祥風而漣漪渺瀰臨瑞日而清泚汪洋一望空明映氷壺而見底千尋朗徹湛玉水之流方涵碧落而鏡光如洗繞金隄而練影偏長星斗輝澄恍三秋之銀漢雲霞彩漾疑五色之榮光息巨浪於桃花晶瑩一片照翠川之蘭葉洞晰毫芒誠以凝兩間之協氣而表帝治之光昌爾乃世際文眀時登至治值寰宇之澄清仰勳華之格被調寒暑於四時普蕃鮮於庶類璣衡朗潤象緯既見於中天經瀆安瀾濬滌復彰於厚地惟景厯之方隆正嘉祥之疊至粵考靈源之神應屢著符命於瑶編玉檢金繩三公臨觀於舜世飛星入昴五老呈瑞於堯年緑字授而禹功方告白魚躍而姬籙開先惟帝王之誕畀呈河洛而相傳乃溯洪流歷四千餘年而底定欣聞清駛亘二千餘里而連延斯天地太和之氣周流而洋溢亦宇宙郅隆之運軼後而超前樂九州之熙皥撫萬國而陶甄敕幾康於業業荷福佑之綿綿薦明禋而昭格沛渥澤於班聨鞏金甌於寶歷調玉燭於薰絃敬咏懷柔於周頌而歌景慶於堯天河清賦以聖治光昭河清獻瑞為韻有序李清植臣聞河清者聖人之大瑞其説見於易緯諸書蓋河為雲漢之精川瀆之長故其休徵與聖神相應也我皇上御極以來儀象咸熙苞符駢集兹於敦牂之年嘉平之月自陜州及淮揚二千餘里河清纍旬臣載稽輿志河之泙湃底柱為最陜州即其境也陜以上渭會河於潼陜以下洛會河於鞏濟會河於成臯則此二千餘里間正滉漾溭淢之區而乃激濁為清易渾為練由我皇上道演羲圖功崇禹迹實躬上聖之德以成千年之運用能臻斯上瑞時羣臣表請受賀聖諭謙沖虔告景陵以答嘉貺顧荷恩旨羣臣咸晉一階臣竊惟以善歸親孝之至也以恩逮下義之隆也謙尊而光禮之柄也受寵若驚智之符也皇上所以迓庥於無疆者四德備矣臣目覩殊祥躬逄慶典誠歡誠忭謹稽首而獻賦曰眷德自天凝休惟聖千祥雲集值運會之方亨九曲波澄普寰瀛而同慶溯其靈𣲖西來洪瀾東暨澤濡九里本資天稷之精秩長百川實視諸侯之位能啓昌符以光郅治惟夫祚逄軒昊政嫓虞唐升氤氲之佳氣耀煒煜之榮光玉檢金繩龍負圖以蜿蚓陽參陰兩馬呈數以騰驤則絳潦收而晶涵明鏡紺流徹而色漾澄霄皓月來時湧潭心之麗彩雲華映處燦波面之瓊瑶蓋經千年而希覯亘萬古而為昭者也我皇恩覃海表治軼衢歌敷文則奎光炳象揚武則蔥嶺止戈既風行於星宿之海遂祥生於牛女之河維時日躔星紀月是嘉平方欣階泰乃慶河清𣲖别縈流恍似滄浪之水槎通天上依然天漢之精况復上自洛川下連淮甸祥開伊闕稔周歷之常綿瑞見泗濱應虞懸之入獻遂使萬頃桃花三門竹箭湛爾而瑩悠然若練二千里之珠液一泓億萬年之金隄永奠於是四表騰歡百僚表瑞自幸遭逄之盛願效山呼用彰揚拜之休長占川至我皇猶秉謙衷永懷孝思溯丕顯丕承之烈善則歸親推至愛至敬之心恩能錫類本德馨而致告煥乎文章敕寅亮以凝禧敻哉睿智聖敬日躋天庥滋至遍埏垓以歸嚮航海梯山盡覆載以尊親髙天厚地河清賦有序吳兆雯臣聞水先五德通一氣於清寧河滙九州被兩間之潤澤圖書而後神應遙傳紀載以來澄清罕覯欽惟我皇上功隆位育道備中和溥浩蕩之恩膏澤沾兆姓集崇鴻之景福瑞應萬年合璧連珠仰髙蒼之垂象兩岐九穗覩大地之呈竒至德感孚嘉祥洊至惟此河清之應尤彰聖治之隆臣幸列班行欣逄上瑞墨池得氣蒙大造之涵濡雲漢為章藉鴻鈞之陶鑄謹拜手稽首而獻賦曰靈區綿亘河水迢遙瀾飛東注波合南條達崑崙之衆𣲖接星宿於層霄度龍門而漭漾經積石之岧嶤迤髙陵以逞勢滙滄海以來朝洪惟我皇上膺景運撫寰瀛天地合德日月同眀八方寧謐六宇升平恆緝熙以承祖德益乾惕以法天行精神昭格善氣來迎帝用申錫河效澄清爾乃數郡如環兩都若練歷雍豫以瀠洄接黃淮而麗奠當四方之會極於地尤靈涵萬象以清輝維天所眷時逄永日序近陽春射曉光而森森澄夜氣以逡逡星耀丹砂而有點月開玉鑑以無塵萬頃平潮經數州而一色千層碧浪浹纍月而如新於是河臣馳奏於金門史筆特書於玉署咸志喜而矢音倍洗心而滌慮維時天子旰食未遑宵衣在御謂上帝之寵綏賴先皇之默助察休咎於微茫敢須叟而暇豫沛恩澤於臣工騰歡聲於朝寧乃知光大業集鴻庥功髙而心愈下德峻而福彌遒四靈效順百神懷柔考榮河之所自蓋晏清之有由是宜與鳳舞麟遊並紀太平之象醴泉膏露同昭至治之休小臣不揣固陋敢載拜而作歌曰猗歟我皇孝德全聖祖鑒察籲昊天載錫繁祉如源泉河水立見清且漣遣官祭告心倍虔從兹億萬寶祚延臣衷竊願效微涓抽毫進獻河清篇皇清文頴卷四十七
