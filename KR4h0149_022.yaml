body:
  text: 辨三老五更辨平郡王福彭戴記天子視學釋奠於先老遂設三老五更羣老之席位焉鄭注三老五更各一人乃年老更事而致仕者也蔡雍則以三老三人五更五人且以更作叟按古者養老之禮外饔掌割烹酒正共酒稿人共食羅氏共鳩方其養也登歌清廟下管象武天子袒而割牲執醬而饋執爵而酳冕而總干其節文為甚繁使老更不止一人則天子所饋所酳者亦不勝其勞矣蓋嘗觀鄉飲酒禮以年之最尊者一人為賓其次為介又其次為衆賓則天子養老亦必以年之最尊者一人為三老次者為五更又次者為羣老無疑使一堂之上杖履雜遝祝哽祝噎前後紛如則禮無特尊心無専敬豈所以稱教孝弟之意乎考漢明帝時以李躬為三老桓榮為五更安帝時魯丕李充靈帝時袁逢皆嘗為三老魏髙貴鄉公時以王祥為三老鄭小同為五更後魏孝文時以尉元為三老遊明根為五更後周武帝時亦嘗以于謹為三老雖其禮未必盡合乎古而歷代相沿老更之各一人彰彰明矣至陳氏禮書又謂建國必立三卿養老必立三老故禮曰三公在朝三老在學三公非一人則三老五更不當為各一人矣按禮運三公在朝句上尚有宗祝在廟句老必有三豈宗祝亦有三乎今以三公三老對舉其說似可據試連宗祝句讀之則三公自三三老自一不得以彼而例此也然則其以三五為名者何也據鄭注云取象三辰五星或曰三老知天地人之事五更知五行更代之事蓋皆不足深究云春王正月辨湯斌聖人之書明白簡易而後儒推求過甚遂成不决之疑者如春王正月之類是也注春秋者不下數十家置春王正月四字不論者固有之其以周改月兼改時者則漢孔安國鄭康成至明趙子常王陽眀賀景瞻也以周改月不改時者則宋程伊川胡康侯至明劉文成也以周不改時兼不改月者則宋蔡仲默魏華父至明章本清也諸家引經據傳自以為確不可易而余則直以春秋本文斷之而已矣春秋桓公八年冬十月雨雪十月者以周正為建酉月故雨雪為非時若夏之十月建亥雨雪亦常耳何足書成公元年二月無冰此建丑月也若建卯月無冰又何異焉莊公七年秋大水無麥苗如周不改月不改時麥苗何得至秋定公元年冬十月隕霜殺菽若夏之十月菽己穫矣隕霜亦非失時如此之類甚衆更有可證者僖公五年左氏傳曰春王正月辛亥朔日南至日南至者子月也此又改月改時之的據也夫子特書曰王正月而左傳亦釋曰王周正月者蓋明其為周天子之正月非夏之正月殷之正月也而又於二月三月亦繫之王見丑月為周之二月寅月為周之三月非同於殷正同於夏正也過此前代無以之為正者則亦不必書王以别之矣或曰四時之序夏正為善周公大聖人也以冬為春可乎曰陽明言之矣陽生於子而極於已午隂生於午而極於亥子陽生而春始隂生而秋始自一陽之復以極於六陽之乾而為春夏自一隂之姤以極於六隂之坤而為秋冬此文王之所演而周公之所繫何不可之有胡氏泥於冬之不可為春也故有夏時冠周月之說以為孔子告顔淵以行夏之時此為見於行事之驗則又謬甚如胡氏之說周改月不改時是雖以子月為歲首而四時之序猶夫夏也以冬為春乃自孔子始以夏時冠周月非所以尊周以仲冬為孟春豈可謂行夏之時乎不夏不周之間孔子何以自處焉夫行夏時者師友平日論道之言所謂損益百王垂訓萬世者也春秋者聖人尊周室明王制之書也王制固未有大於正朔者孔子為當時諸侯强橫大夫陪臣僭亂而作春秋乃首改周天子之正朔也恐聖人亦有所不敢矣或曰孟子不云乎春秋天子之事也庸何傷曰所謂天子之事者謂賞功討罪以明天子之法使諸侯不敢悖天子大夫不敢悖諸侯耳非必變易四時之序改本朝正朔而後為天子之事也胡氏以此為垂法後世吾恐法未可垂而先犯為下不倍之戒矣且此亦空言耳烏在其為見諸行事之驗乎故周不改月則孔子必不敢以十一月為正月以十一月為正月則周之必改月可知也周不改時則孔子必不敢以周正月為春以周正月為春則周之必改時可知也曰豳風亦周詩也何以用夏正曰周之先世以農事開國后稷公劉以來固虞夏商之諸侯也為虞夏商之諸侯必用虞夏商之正朔且豳風述民事夏正為切而春秋明一王之大法尊周為重未可以為例也曰諸家引商書元祀十有二月以為商不改月之證何歟曰書缺有間矣商之時制固無從得而考要之不可以例周與其雜引他書以釋春秋固不若即春秋以釋春秋也左氏公羊榖梁皆周人也於此獨不加論焉亦以為不必論也使當時以正月為冬而孔子獨書曰春三子能已於言哉儒吏廉吏辨魏象樞吏有辨乎曰有有之斯可為吏凖矣凖乎儒與廉而步之趨之於是指峩冠博帶稱說先王者曰此儒也指矯情鎮物飾名勵節者曰此廉也噫名所貴也而士所標也貴其名以立之標又安能禁天下之不依似而竊附哉夫辨吏者辨其心而已矣鳴琴單父絃歌武城者著矣自博士具官待問斌斌多文學之選於是通經學古之吏出焉拔葵燔機妻子不免饑寒者著矣自廉吏歲計有餘食祿者不得與下民爭利於是奉法循理之吏出焉儒吏嘗見為廉遷史稱臨淮守十餘人皆曰廉節稱轅固曰廉直稱倪寬曰廉智有以簠簋不飭坐者豈儒哉廉吏嘗學為儒范史稱魯恭清平曰化行稱卓茂恬淡曰樂道稱楊震清白曰好學有以簿書俗吏嗤者豈廉哉雖然儒以循為能而廉以才為用吏而循患不儒不患其不廉也吏而才患不廉不患其不儒也京兆桴鼓不鳴渤海劍刀自解循吏事耳是豈盡失名譽者潁川先教後罰零陵興利教儉才吏事耳是豈全暗經術者問其名則異考其實則同以絶不相䝉之跡求之絶不相戾之心所由異政而同治異治而同功也既其實不既其名則李斯之徒有吳公不亦廉乎張湯之後有安世不亦儒乎胡質父子之清異而廉有異乎桞公綽逺近之治殊而儒豈殊乎既其名不既其實則儒之名寬寬則近於通廉之名嚴嚴則疑於刻於是有儒而不廉者矣趙綰馬融以賄敗躬行安在乎有廉而不儒者矣尹翁歸趙廣漢以强毅聞蘊藉安有乎有儒而僞廉者矣公孫𢎞之布被以為詐發䝉不已有議乎有廉而僞儒者矣倪千乘之引經以為長者束濕不已有譏乎真則既其實僞則冒其名既其實儒與廉真也儒而廉廉而儒亦真也冒其名儒與廉僞也儒而廉廉而儒亦僞也綰墨綬效花城則庸可冒儒循不可冒儒飲貪泉垂介石則墨可冒廉才不可冒廉然而儒與廉之名實終亦不可冒大約儒可兼廉而廉不可兼儒其兼之者既其實不既其名也何也儒者使人兩得者也平日淡泊寧靜洞悉乎天人之分際君民之大義皎然以廉隅自持求為上不負君下不負民中不負所學其於取舍得失經權是非之道見之也極明則守之也亦極固守之也極固則發之也必極從容而暇裕是故分一邑守一郡施一治著一書當時奉為蓍蔡後世誦為典章區區埋羊還魚之節終不可與儒等蓋儒者使人兩得者也漢儒曰盛名之下其實難副黃允史叔賔皆有盛名郭泰覘其非真以為必敗王衍口不言錢而營三穴遂為天下蒼生之禍故數百年來以老莊冒儒者多矣若夫身列薦紳口談氣節薰心於利欲而道喪其廉恥名之不存安問其實此又在老莊之下不可以冒廉顧可以冒儒耶然則儒吏廉吏之辨亦辨其心而已矣學術辨陸隴其陽明以禪之實而託於儒其流害固不可勝言矣然其所以為禪者如之何曰明乎心性之辨則知禪矣知禪則知陽明矣今夫人之生也氣聚而成形而氣之精英又聚而為心是心也神明不測變化無方要之亦氣也其中所具之理則性也故程子曰性即理也邵子曰心者性之郛郭朱子曰靈處是心不是性是心也者性之所寓而非即性也性也者寓于心而非即心也先儒辨之亦至明矣若夫禪也者則以知覺為性而以知覺之發動者為心故彼之所謂性則吾之所謂心也彼之所謂心則吾之所謂意也其所以滅彜倫離仁義張皇詭怪而自放於凖繩之外者皆由不知有性而以知覺當之耳何則既以知覺為性則其所欲保養而勿失者惟是而已一切人倫庶物之理皆足以為我之障而惟恐其或纍宜其盡舉而棄之也陽明言性無善無惡蓋亦指知覺為性也其所謂良知所謂天理所謂至善莫非指此而已故其言曰佛氏本來面目即我門所謂良知又曰良知即天理又曰無善無惡乃所謂至善雖其縱橫變幻不可究詰而其大㫖亦可睹矣充其說則人倫庶物固於我何有而特以束縛于聖人之教未敢肆然决裂也則又為之說曰良知茍存自能酬酢萬變非若禪家之遺棄事物也其為說則然然學者茍無格物窮理之功而欲持此心之知覺以自試於萬變其所見為是者果是而見為非者果非乎又况其心本以為人倫庶物初無與於我不得已而應之以不得已而應之心而處夫未嘗窮究之事其不至於顛倒錯謬者幾希其倡之者雖不敢自居於禪隂合而陽離其繼起者則直以禪自任不復有所忌憚此陽明之學所以為禍於天下也涇陽景逸深懲其弊知夫知覺之非性而無善無惡不可以言性其所以排擊陽明者亦可謂得其本矣然其學也專以靜坐為主則其所重仍在知覺雖云事物之理乃吾性所固有而亦當窮究然既偏重於靜則窮之未必能盡其精微而不免於過不及是故以理為外而欲以心籠罩之者陽明之學也以理為內而欲以心籠罩之者髙顧之學也陽明之病在認心為性髙顧之病在惡動求靜我觀髙子之論學也言一貫則以為是入門之學言盡心則以為盡心然後知性言格物則曰知本之謂物格與程朱之論往往齟齬而不合者無他蓋欲以靜坐為主則凡先儒致知窮理存心養性之法不得不為之變易夫靜坐之說雖程朱亦有之不過欲使學者動靜交養無頃刻之離耳非如髙子困學記中所言必欲澄神默坐使呈露面目然後有以為下手之地也由是觀之則髙顧之學雖針砭陽明多切中其病至於本源之地仍不能出其範圍豈非陽明之說浸淫於人心雖有大賢不免猶蹈其弊乎吾嘗推求其故天下學者所以樂趨於陽明而不可遏者有二一則為其學者可以縱肆自適非若程朱之履繩蹈矩不可假借也一則其學専以知覺為主謂人身有生死而知覺無生死故其視天下一切皆幻而惟此為真故不賢者既樂其縱肆而賢者又思求其無生死者此所以羣趨而不能舍嗚呼縱肆之不可易明也至於無生死之說則真禪家之妄耳學者取程朱隂陽屈伸往來之論潛心熟玩焉其理亦彰彰矣奈何不此之學而彼之是惑乎班馬異同辨徐乾學臣聞史之為書體閎而義密事核而辭逹采之博而擇之精如是之謂良史不繫乎文與質繁與簡也司馬遷之學本於父太史公談又負氣好竒登龍門探禹穴網羅異聞雜采六經世本國語國策諸書及諸子百家之說以成史記其文恣肆廣博綜括百代誠曠世杰出者也後漢蘭臺令史班固亦承父彪家學倣史遷為漢書發凡起例或芟或益華縟整贍爛乎一代之書此范蔚宗陳夀以下所不能逮者矣然其間同異得失學者乘間抵隙指瑕攻堅紛紜未已宋倪思為班馬異同一書標其字句而臚列焉劉辰翁加以論斷至有明許相卿本其意作史漢方駕為之衡量而調劑其言皆有條理粲然備矣臣請得而辨之司馬遷項羽本紀載起兵時及鴻門事千載以下歷歷如見班固多從裁省似少脫略矣髙祖本紀亦然垓下之戰孔將軍居左費將軍居右諸語勃勃氣色而班固刪之如此類甚多此班之不逮馬者一也表者興亡理亂之大略而固之表則猶譜牒也遷諸侯年表以下以地為主故年經而國緯以觀天下之大勢髙祖功臣年表以下以時為主故國經而年緯以觀一時之得失漢興以來將相名臣年表以下事為主以觀君臣之職分而固皆變其例此班之不逮馬者一也班固欲以整齊勝遷之詼譎如魯國諸生裒衣博帶言動規矩而彼大人者方逰埃壒之表其不同可知矣且其所謂整齊者亦有可論劉知幾謂神璽在握火德猶存而居攝建年不編平紀之末孺子主祭咸書莽傳之中此何以云也張湯之後有大司空純固以純故不以湯為酷吏并杜周皆從末减歟此班之不逮馬者一也更河渠曰溝洫夫溝洫非漢制而班以表其書名實不相當矣易封禪曰郊祀而不載原廟薦享之事宗廟迭毁之議毋乃太簡乎易平凖曰食貨以𢎞羊均輸罔民之術而比成周泉府之法毋乃刺謬乎此班之不逮馬者一也更天官曰天文兩曜之運行羣星之錯布非關漢朝一代之事古今人表自伏羲以來分為九品非係漢一代之人而八表中姓氏多荒唐悠謬或一人名字分列兩處此司馬氏所無也班之不逮馬者又一也昔者鄭樵為通志極斥班孟堅失於過刻劉知幾互有褒貶稍右班氏以為言皆精練可為史家祖述王充論衡則又確奉蘭臺以為作史之繩尺臣以為班之不逮司馬亦既較然矣而後代之史求如固者寥寥未之有聞蓋遷采諸書而自成遷之史固襲龍門而自成固之書文質繁簡隨世遷流而千載作者之精神炯炯在簡冊者讀者深思而自得之不俟詞費也我皇上右文治洽𢎞開史局臣之固陋欲竭涓埃以報萬分之一每覽前人之著作隨手之變難以辭逮枉承明問流汗浹踵敬述其梗槩以獻春王正月辨李光地春秋夏周正之事自朱子不能决雖然此四字者不明則全經不可得而讀也釋而不思置而不講可乎哉蓋程子之說曰建子非春也假天時以立義耳意謂三代不改時而改正周之正月冬也而孔子系之春以寓行夏之志云爾胡文定祖其說而又引商秦之書以謂月亦不改此則朱子疑而辨之矣愚切思之則朱子所謂並行者是也不獨十二月數為周夏並行蓋四時之序亦周夏並行也行周者以改正朔示革命故書時事頒列國則用之行夏者以殷天時存古制故作禮樂垂憲章則用之豳風一詩有一日二日矣是周正也有七月九月矣又夏正也小雅之詩四月維夏六月徂暑是夏正也孟子之書十一月成杠十二月成梁又周正也此其月數並行之徵也周官冬日至圜丘夏日至方丘是夏時也泰誓十三年春大㑹孟津又周時也此其時序並行之徵也金縢秋大熟未穫說者以謂是夏之秋然熟於酉戌者獨今南方稻田然耳若北地之黍稷則大熟未穫正在未申之月又何嫌其為周之秋乎由此觀之則與大㑹盟津者又一證也蓋泰誓金縢所謂書時事者也孔子春秋所書所謂頒列國者也用周制焉所以示革命而一正朔也周官祭祀所謂作禮樂者也豳風農桑所謂垂憲章者也兼夏制焉所以存古法而殷天時也吕氏月令固非經比然所述者多周典也此又周人之禮樂憲章不改乎夏之一證也孔子作春秋以尊王而大一統故不獨月數不敢改乎周時序亦不敢改乎周也蓋自周先王之頒列國者則然而孔子從而因之若曰周不以建子為春而孔子春之以寓吾行夏之志則不獨與尊王之意從周之語相悖且以建子為春是變夏時自夫子始也又何志之寓乎然則孔子之書此也遂無意乎哉曰有之夫月王之月也則時亦王之時也今於月而系以王明乎王朔可得而改也於時而不系以王明乎天時不可得而移也王朔可得而改則從周之義可見天時不可得而移則行夏之志又可知以王正正天下此一經之名分所以定也以天道正王道此一經之大義所以起也故孔子之言曰殷因於夏周因於殷及其所損益可知也其或繼周者雖百世可知也子思之贊孔子曰吾從周曰憲章文武又曰祖述堯舜考諸三王而不謬周子亦曰春秋正王道明大法也孔子為後世王者而修也然其志雖寓而事則不可亂其實其義雖明而詞則不可失其體其道雖為天下萬世之所折中而其分則為昭代臣子之所遵守故通此四字而全經始可得而讀矣風雅頌辨陳遷鶴詩三百篇曰風曰雅曰頌其部分區别由來久矣然而著訓既殊彰義亦别有示人以可疑者衛武公一人之身而傳詩有三淇澳美於風賓之初筵載於小雅抑登於大雅公劉興王之什而别類有二七月之詩豳風詠之篤公劉之詩大雅歌之二雅及頌皆揚先王之功德也雖其文辭或重而繁或奧以簡而小之大之雅之頌之亦安見其所以然也哉曰其說先儒嘗辨之蓋有事有體有聲而三者分焉何謂事言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅言成功而告神明謂之頌故先儒曰雅者正也言王政也政有大小故有小雅焉有大雅焉頌者美功德之形容也此其以事而分者也何謂體風者諷也援物剴事而不直言之也雅則直言之而有典有則者也頌則直而不逼曲而不屈如季札所述且以為節有度守有序者也先儒曰詩體既定後有作者各從其舊依小雅體而作者附小雅之末為變小雅焉依大雅體而作者附大雅之末為變大雅焉邶鄘衛以下之為風魯之為頌猶是也此其因體而分者也何謂聲詩各有體體各有聲太師辨體以叶聲故可以聽聲得情而知其本意周南為王者之風召南為諸侯之風聽聲而知之也鹿鳴之三以燕賓客文王之三以享元侯升歌清廟以舞大武不獨取其詞義蓋聲各有攸宜也雅不係周而頌係周者孔子加之以别商魯更以明周之聲與商不同此又因聲而分者也夫詩之教宏矣先王以正人倫成教化美風俗極而至於動天地感鬼神皆於詩乎取之夫其取之必有以合之也記云寬而靜柔而正者宜歌頌廣大而靜疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風人之歌詩必問所宜况乎格神祗安賓客來逺人致動物而有不從其類哉昔孔子云吾自衛反魯然後樂正雅頌各得其所夫未得所者事違而體紊體紊而聲乖而風雅頌無辨也得其所者詩協乎事事協乎體體協乎聲而雅與風頌與雅皆有分也三百篇具存依類以求次第可見不然部分區别之不辨而何以悟其意逹其教耶皇清文頴卷二十二
