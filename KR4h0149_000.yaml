顔雲翼罷梳還獨立星眸回盼許雙攀一奩水月平分影幾隊鵷鸞共接班只為空眀矜矯翅便教飲啄忘棲山風翻翠帶簷枝亞春暖重茵砌蘚斑欲擬當前誇綽約可知箇裏本舒閒謁陵禮畢車駕入盛京得七言排律十四韻羣山萬壑總朝東王氣為龍鎮鬱蔥白水壽邱名不减作豐遷鎬事應同當時提劍安黔首此日垂衣逮藐躬延佇關山千里外每懷瞻拜八年中商颸送爽清馳道疊嶂排青列逺空上將隨車金䍡􅟞名王執轡玉璁瓏行宫視膳邀慈豫故國旋輿仰祖功只為上陵思馬鬛豈緣校獵賦車攻六飛因幸興王里百辟咸朝慶善宫訝許稱觴來故老不教警蹕駭新豐葛燈綃帳猶餘儉執豕酌匏許獻衷華曜景中鸞扇動若非烟裏鴨香融孕虞育夏天心眷篤祜依京帝謂通萬祀皇清綿寶祚扶桑初日海門紅五言絶句裁衣寄從軍者四首玉關天氣凉六月已飛霜驚理篋中素寄與逺行郎長短尚如初寬窄想非舊那堪孤燈下縫紉聽寒漏中庭度金風緘刀著手冷歎息厚裝綿行將寄雪嶺裁衣何所願願郎早樹勳郎為萬戶侯妾作郡夫人平湖雨渡四首一堤楊桞樹數里白蓮花細雨霏霏處輕舟泛若耶烟雲暗逺天獨坐孤篷裏颯然風滿湖衣履皆寒水細雨滿湖秋扁舟泛碧流平分詩景去恰有一羣鷗掛帆風力健不須蕩雙櫓遙望翠微峰濛濛亂烟雨古意四首春老金條脫塵生玉鏡臺分明陌頭望不自陌頭來明月入髙樓上有綽約人只見樓中秋誰知樓外春熏爐炷水沉拜月衣裳冷拜起步階隂桂香弄寒影青青楊桞枝淡淡和風吹忽見一枝折無情復阿誰問春風藉爾催春蕊無勞妬艷枝入園應檢㸃莫使一般吹春風答吹萬本無心更番豈有意一需一疾間為風誠不易鳴玉瀨四首無風松謖謖有月金摐摐玉女洗頭盆瀉作芙蓉江林麓自瀟灑烟嵐多變態飛流下十尋砉然玉珠碎長虹飲素練圓潭澄見底時來聽清泠塵念一以洗澗壑誠泬㵳松篁復蕭颯把筆坐石頭林泉相問答常山峪行宫八景八首緑樾徑灌木盤山腰濃隂日蓊翳豁開壺中天逈異人間世虛白軒虛室能生白一氣常函三閒情空外寄妙道箇中參青雲梯青雲信有梯丹崖暫延佇鹿豕出翠微逢迎務光侶楓香阪清吟步修阪衣袂泛秋凉金風颯然過微聞山楓香蔚藻堂花木暢生意大地蔚菁藻忘言入靜觀欣然愜懷抱如是室如是如是室坐對清秋山遊山室中人不費往與還翠風埭野木不知名雨後增新翠誰云塞北山却有江南致凌霞亭危亭搆峰頂靣靣青㟏岈踏石片雲飛去作天邉霞玉泉六首玉泉此為源泉源豈即此試問所從來只此一勺水玉名玉豈真泉名玉尤幻而我對玉泉如是幻真玩石髓澄堪潄烟蘿緑可捫雨後溪流急山根帶漲痕暴漲退亦急垂桞絲餘濕惟兹有本泉終古長潗潗潺溪愜靜聆清泚供幽眺心與境俱適何必蘇門嘯趵突聲猶狀匡廬匪當對垂虹舊傳名吁嗟耳食輩玉泉蓋趵突也非如香爐瀑布可以垂虹比擬舊為八景之一蓋昔人未至此地想像名之者然靈源獨涌瀍澗攸資則信帝京佳勝也六言絶句恭題鳯仙石竹畫册二首冷露暗滋秋草著花紅紫成堆小鳯貪餐竹實合教一處同開絡緯送秋聲至蜻蜓弄影風凉幽卉一叢舒艷都來石畔尋香七言絶句將獵南苑檢㸃所携書籍天髙秋氣肅郊坰南苑將除信宿停檢㸃行幐整書籍不因郊獵廢談經三月十三日隨皇父駕幸圓明園五首春園初見百花開日午欣隨御輦來纈錦蒸霞呈麗景東皇雨露好栽培最是蓬萊浩蕩春東風如剪物華新裙腰草合平於毯滑笏溪流色似銀邇來甘雨潤苖新走馬天街絶㸃塵試策金鞭回望處翠條如染拂行人黃繖當中映午暾太平天子幸春園靈臺靈沼同民樂夾道齊呼萬歲尊御爐香暖惠風晴日映墀頭喚上卿不是物華供玩少殿顔勤政意分明桞溪垂釣傍岸青青一帶遙玻璃鏡净拂烟條持竿不為貪鱸鱠天水空明萬慮消從軍行五首三邉烽火照軍營十萬丁男夜練兵但使腰間懸寶劍丈夫何處不成名辭家萬里路迢遙龍虎軍中夜擊刁底事成功如約早將軍聞是霍嫖姚夜戰洮河馬不嘶無邉殺氣與雲齊偷閒一枕金戈卧半是人膏半是泥二十三番月缺盈君王恩重致身輕轅門試射誰穿的十萬軍中最有名戍兒約計看刀環對鏡新驚髮半斑不是親擒生頡利何顔復進玉門關冒雨尋菊二首秋雨霏霏碧蘚滋閒情今日步東籬不知冷夜寒朝裏開到西風第幾枝我愛秋來菊蕊開天工偏為洗塵埃倚欄閒咏衣衫濕應是才從籬畔回村墟夜舂二首霜落園林時届冬稻粱全穫罷三農田家作苦無休息更聽村墟半夜舂萬籟全收夜已分寒舂聲急隔窗聞髙齊識得豐年景篆裊爐香獨自焚盆魚二首圓池蓄水不須寬依藻文魚自覺安待到夜深微雨滴跳波還似躍層瀾緑荇青萍可避隂一泓滿貯足浮沉箇中也有相忘樂不羡滄浪萬丈深題元祐黨人碑元祐清流號濁流黨人鐫石石遺羞祗今欲補名臣傳猶喜殘碑姓氏留過淋河憑催詩思客途過得得輕蹄踏嫩莎拂靣春風三十里一灣新碧小淋河夏日書懷宮桞隂濃殿閣深氷㡡不受暑來侵南風未解吾民愠慙愧蒼生愛戴心秋日奉皇太后駕幸南苑即事六首虞人建幟甸人隨南苑秋清好獵時閲武此來兼省斂香風餅餌拂旌旗萬物熙和大造中郊原輝映苑門紅承歡仰識慈顔豫祗為天恩錫屢豐羽衛森翹出帝城順時清蹕此巡行金吾底事頻傳警便欲周知閭巷情扈從長承愛日暉五雲髙捧鳯輿翬問安戶外親調膳手射郊原鹿正肥離宫月影透書窗法曲時聞畫鼓摐題柱吟餘思往事不知絳蠟灺銀釭從來稽古戒禽荒宵旰勤勞敢刻忘歡樂正饒還止輦屬車侍從有東方郊外即事三首三秋野景寥天逈一抹斜陽晚照明最是豐年饒氣象村村社鼓慶西成霜落平原好合圍無心從獸玉鞭揮愛觀富有千村景兩字探原食與衣郊圻犬吠雜雞號䇿馬霜華㸃素袍收穫才完仍播麥田家四季總勤勞山田三首禾黍芃芃遍嶺巔停鞭欣看有秋年版圖可識同遐邇塞外荒山盡闢田髙原宜黍稻宜低物土耕桑塞外齊茶幔酒旗山抱塢軟沙濕草水鳴溪舊代長愁烽火驚於今此地有人耕混同中外皆天澤倍切乾乾保泰情灤河捕魚二首野灘片片起駕鵝蕩槳中流樂意多髣佛江鄉三月景西風紅葉小灤河灤河水自上都流順水行如風送舟最是關同得意筆蒼山野渡正初秋出塞雜咏九首雕輿繡羽颯金風曉發都城旭影紅十部簫韶翻似海三千車騎氣如虹邉關峰色翠芙蓉萬古隄防笑祖龍守德由來勝守險金湯禮義是提封靜夜離宮月在窗獨裁章奏灺金釭鴈鳴逺浦傳霜信人過孤村引吠尨極北山髙近紫微片雲常作雪霏霏黃羊白鹿鋪平野好試今秋第一圍龍沙八月似冬初獻賦長楊滿屬車最愛楓林新似染折來題句手親書鐵騎番兒鴈字排霜鋒掌樣净磨揩新豐空有如澠酒辜負當年白鼻騧平明雨洗屬車塵蹀躞驊騮稱意馴濯濯烟鬟看黛重萋萋麥壠愛青新青兕黃牛滿澤原欣看天餉助歸轅戍兒夜半吹羌笛此日春風度玉門時巡詎止閲邉關喜見年豐一解顔搖揚翠華佳氣滿都中爭道六龍還北郊禮畢回圓明園道中作四首薰風應律調元化膏雨知時利夏耕不獨公田霑渥澤一花一木總敷榮繒燎光中葆吹聞回瞻黃幄瑞氤氲棕街步出仙韶引槐桞隂濃緑似雲黃繖朱斿鳯甸隈屬車劍佩有鄒枚天公賜與迎梅景繡陌青蔥絶㸃埃垂楊十里窣青絲警蹕聲中駕六飛最愛霑衣朝氣潤輕雲猶作雨霏霏射獵南苑即事六首靺鞈櫜鞬列羽林當秋文囿偶經臨承平詎肯忘戎事萬戶饑寒更惕心翼翼堆場皆早稑纍纍懸架足秋壺豳風底用丹青筆十里煙郊入畫圖北紅門裏仲秋天爽氣遊絲拂錦韉行過鴈橋人似畫踏來芳甸草如煙南苑宜秋宜獵時禾香風滿赤鸞旗少年熟讀相如疏每至歡娛鑒在兹榆槐黃染野花殷策渡時過水一灣千朵青蓮萬章錦却教人憶塞中山省耕省斂古曽聞望處西成意亦欣漫把豐年容易看幾多憂慮厪宵分春水泛舟緑浸樓臺水底明春湖初試一舠輕誰云鷗鳥無心者也向汀洲續舊盟清明後一日漫作二首湖山佳致暖烟饒稚緑嫣紅態鬭嬌看罷紙鳶嘗過酪閒吟准偹送春朝東風吹綻含胎蕊喜攬芳華入吟裏溪畔刺舟還悵然已有落花貼流水郊行三首蕎尚青青黍欲黃金風時送粥饘香翠華搖曵纎塵净歡切郊行十里强野老扶兒望六飛停鞭問處話依依金吾莫謾頻呼蹕一向籌伊凍與飢滑笏溪流曲抱村遊絲白日靜秋原村翁不識鑾輿過跣足科頭倚蓽門塞上行五首昔年今日此龍沙中外情聨久一家幾處荒荆餘敗壘千秋興廢繫懷賖露浥烟蕪欲作霜午衣猶熱曉衣凉皇州此際殘蟬咽已見南飛鴈一行馬足駝􅀈踏馬鞍回看天外矗槍竿山靈有問如何答前歲詩盟未敢寒丹楓翠柏妙山容野墅溪村也間逢最是牧羊估馬客于今都識重良農葆吹聲聲傍晚摐氊廬倚咏剪銀釭春風己度榆關外漫唱凉州水調腔臘月二十一日立春擬春帖子三首臘鼓摐摐奏雅寅不須人日始成人盧同人日立春詩今朝方始覺成人金屏玉帖迎青令甲子中元第一春銅渾欽驗八風調喜綻宮梅白玉條更進詞臣春帖子筆花飛處總含韶圓蓋推遷信有靈璇杓德晷已移星今年詩卷增顔色兩度紅箋咏始青春日郊行雜咏八首易水東頭淶水西寒蕪逺樹總凄迷馬知人意歸蹄懶一片白雲山與齊山村水郭灑然清不必前途借問程古寺閉門無客叩春田經雨有人耕逺峰層疊矗新螺㸃㸃牛羊恣寢訛扶杖老翁中社酒東阡歸路醉顔酡桞色遙黃近尚無拂春著意幾株株溪橋一帶房山路最似詩中西子湖花朝前後景可憐花心桞眼爭新鮮兒童底把春光趲未至清明放紙鳶我聞潭柘祗園美初到原如久住人却笑暗黎無好句頻翻貝葉說根塵韶麗風光二月時新晴最可雨尤宜看耕不覺遲歸轡西日銅鉦拂綵旗掩映耕雲種雨家金吾行處不教譁豳風圖畫誰傳得海子門西十里斜雲罩寺留題三首訝底層雲不蕩胸山靈為我闢雲封開窗四靣延竒趣萬叠屏風削玉蓉髙入天風顑萬尋登臨信可散幽襟常時畫裏遙觀處獨據匡牀自在吟林霧溪嵐眼底浮風鈴語我少淹留非關勝處誇新句祗恐荒唐負此遊皇清文頴卷首二十四
