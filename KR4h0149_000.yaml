避雉雀惶有驈有驈自在名叶朝騖蜀越夕齊梁徒傳魯牧駉有皇奔霄荏䥫駛異常不須鞭䇿追星芒赤花鷹來大宛鄉磊落獨步驥子英叶翩翩鸞鳳雲中翔籋雲之駃馴且剛百里底用宿舂糧嗟豫無德御萬邦肯學八駿窮八荒凛乎朽馭刻敢忘來賓用志祖澤長金輅玉仗開闔閶田車弗駕坐明堂驅馳樂圃遊禮場六龍時乘受天慶神木行黃木厰有巨木長六十尺其圍臥地蔽騎者弗相見也土人稱曰神木相傳明初建北京時自南方輿致之以其不中繩墨故弗用其皮膚因年久剝蝕視昔為猶減云孱顔穹谷羌天宇冥靈大椿生是所天地精英神鬼輔化為鄧林疑夸父燕京創建明成祖搜索室奉為楹往托之不中雷霆妬叶虎狼怒齧蛟噩雨千夫舁走日里許夷山堙壑壞屋廡難依繩尺梓弗取橫岡偃臥安厥處閲歷嵗月殊今古徑類修蛇圍若堵騎人去來蔽弗覩之篆剝蝕蟲與鼠謂云神木神其下叶我聞樗不天斤斧胡遭大斫辭嶇峿視之柍桭差猶愈材不材間應見汝雨中焚香泛臥遊書室霏霏細雨千絲懸滄波萬頃含輕烟沚蒲岸桞濯新緑棠舟偶泛空濛川浮波野鷗梳濕羽亞堤山卉垂幽娟臥遊奚必披圖畫翛然清絶消萬緣宣銅乳爐烏卿熾深深隔火安古錢不須都梁五木品水沉細炷清芬便細參鼻觀滌塵想却憶書室曽忘筌油雲忽來天宇暝灑逈如聞飛瀑泉無色聲香原即此笑伊兀坐求逃禪素絲行陌桑椹落成枯杈蓬屋咿軋鳴繅車繅絲縷縷長且白為織吳綾與越紗吳綾越紗薄似霧美人中裙裁紵布殷勤尉貼臨溪浣惟恐纎塵或沾汚素絲素絲如君子太初之色通表裏云胡黃黑任人為墨子悲之良有以觀敖漢瀑布水我聞奧區天所祕疑信向半今信然浩浩萬里沙漠塞乃有瀑水崇岡懸車塵方苦紛堨壒豁開壺裏别有天侵尋峰岫羅嘉樹漸潤澗谷無埃烟是時仲秋曝晶日忽聞雷聲殷前川坐令林巒失輕籟朗吟清眺萬慮蠲大者明珠小者璣如傾栲栳投深淵虎狼駭走不敢飲下疑千載蒼龍眠巨石橫斷無土壤粵生美箭竒而堅山葉紅緑如錯繡無名野卉相新鮮鸛鵠徘徊不忍去鼪鼯時向虬枝穿禹鑿龍門未至此胡乃三級限鱅鰱蒙古相傳瀑水以下鱗類甚夥而以上絶無亦甚竒云吁嘻泉石誠觀止賞咏自我羌誰先匡廬香爐無足喻山靈占此永不遷設置飛觴搦管地混沌竅鑿應難全射虎行鬱蔥萬木森虧蔽豁開大澤天無際朝嵐忽捲崿峰烟樹色山光鬪蒼翠初來沛里拜橋山便途較獵遵先制鴈行兩翼圍密合貔旅八旗各標幟太平久經息兵革進退號令習軍事日未移時肩已倦他他饒獲麋麅類乍見白額出林叢鼻頭出火人思刺期門佽飛驟驊騮驅之草淺平川地四圍重排雪鋒鎗負嵎空憶難回避唐弓夏箭出櫜鞬命中已決耽耽眥詎與漢將思爭勇歷艱祖訓期無愧耳食書生未目覩橫議涉險鮮防備我笑羽林備過多一發於菟却先斃昭陵石馬歌在昔穆王八駿追雲霞耄荒忘返天之涯太乙况漢天馬來樂府曾聞産渥窪勤勞血汗事何有雌黃徒惹詩人口不如漢文却受千里駒吉行五十符陽九周家岐渭始勤農我朝三韓奮跡實彎弓由來受命雖有異艱難創業多齊蹤太宗馬上得天下房駟星輝天錫嘏叶大白小白協安吉故老云白一昭陵前石馬一名大名小白蓋乘文皇帝所御也乘大文皇帝體豐而鎧重小白日行百里白祗能行五十里云至今立仗昭陵貽石馬遐思我祖如唐宗陵園廟號先後同汗趨嘗傳杜甫句闡揚光烈千秋隆六御今年來故里貞觀遺跡餘荒壘唐壘在廣寧縣城東南相傳唐太宗征髙麗駐兵之所文皇曾亦討寒盟謹按以朝昭陵神功聖德碑云天聰二年鮮毁盟討之拔其都載飛舸於車凌江華島李倧自縳請為臣釋之還并歸其俘獲乘此雙龍渡浿水文綏武服為藩屏萬年正朔奉永清不似李唐東征悔失計仆碑重建思魏徵所過連山塔山皆我太宗文皇帝用武之地而吕翁山則生擒洪承疇處也蓋有明末季驟加遼餉至八百餘萬竭天下之力奉東南一隅未收片甲之用而兵食兩詘人民離畔我太祖髙皇帝一舉薩爾滸而遼左之業成太宗文皇帝再舉吕翁山而關西之勢定今因叩謁祖陵親履其地思經營草昧之艱難爰恭紀其事以示來許俾念祖宗得天下之不易益勵守成之志亦以舉其殷鑒明之鹿亡其必有所以失之之故也連山相接塔山峰溝濠壁塹凡幾重以守則固以戰勝將以勇氣吞遼東增募戍卒號百萬重臣經略操鐵劵朝拜恩命暮縲紲舉棋不定曾無算監軍意氣壯且豪凌駕朝士如兒曹綿山亘海排鐵騎謂當唾手成勳勞太宗從容處以暇精兵已伏杏山下金支五色雲上蟠明卒望見魂驚怕奔走禦侮多英賢投石超距衆閒閒君臣一德功乃建人心既單必格天彼志離兮我志合如枯易摧朽易拉不數唐帝美良川祇今戰氣猶森颯陸血漂杵海尸浮乘潮雁鶩隨波鷗一時破竹十三萬傷我十人厮卒儔清流關側擒皇甫煌煌大業開疆土河山帶礪酬勳庸於爍雲龍與風虎乃知皇天惟德親桓桓謨烈告後人從來守成事不易殷鑒應思鹿失秦交則為泰塞則否九重宴安豈宜恃不見吕翁山畔上將降猶設椒漿莫忠鬼聞黃鸝輕棉飛盡池塘清緑陰檻外紛縱橫繁絲急竹俱無賴忽聞倉庚三兩鳴時至而鳴過則止萬物生成各天理偏生分别是人心愁者聽愁喜者喜愁兮喜兮兩不知葉底關關殊未已霹靂驤歌霹靂驤者超勇親王額駙策凌所進十駿中之傑出者也服御多年今病垂斃感物傷懷而作是詩天間十二龍為侣驥不多得聞自古不稱其力稱其德德力雙兼更難覩汝為驥子亶其然久冠驪黃在吾圉北窮鴈塞範馳驅東巡遼海周每膴資汝之力惜汝軀肯教下與駑胎伍騰驤猶具昔年心芻秣頓減瘏其跙耳竹離披目星落向我長鳴不能語嗚呼自今秋郊之獸免陀他惟有弊帷留待汝松花玉石屏歌鬼工磨刀劚山骨女媧乏材補天窟琉璃罘罳失顔色光奪青銅凛毛髮不圎而方崒且屼都尉戅直絳侯訥勤思負扆其可忽蟠龍引山名前建行宫偶來駐蹕而作是詩我聞金陵自昔稱龍蟠千秋形勝想像間奕奕瑶光照薊野蟠龍亦得名兹山江南江北不異地天龍逰戲同歸禪獅峰鷲嶺詎獅鷲何如九二見在田南陽臥客吾心企敢誇乘六以御天青松行􅡹髻山行宫內搆書室數楹青松七株森翠當户留連撫吟興在徂徠之麓矣冬來萬木辭芳華暗撫時序驚逝波有翁矯矯異凡他不與桃李爭嫮姱乃今本色露些些幾楹書室架嵯峨適看虬影當窗紗怒濤謖起青雲霞岩楓坂榆禁不譁或側而立或坐跏竹林賢者一來過比秦大夫猶為多我來徘徊撫且摩汝誠逸民為我羅會心有在理則那皎皎白駒詩人歌皇清文頴卷首二十一欽定四庫全書皇清文頴卷首二十二御製詩五言律詩春日雨後海子外行圍二首雨後觀新桞垂絲帶玉珠村村生意足處處早春殊馬健方堪騁鷹雛未解呼萬家烟火裏簔笠快何如繡陌連芳嶼韶光十里繁緑深楊桞岸紅暗杏花村時雨占年稔新晴愛日睻遊觀回勒晚殘照落柴門東作東作三春始滋生萬物稠公田平似掌新水緑如油蟲捲柔桑葉針抽嫩穎頭乘時功力備多稼定今秋恭和御製詠竹原韵藻砌紛青籜芳園滿緑隂最宜時雨洗不礙嵗寒侵宸暇方遊豫皇情暢詠吟年年常近日清節與虛心花信風欲識春來處先看花信風未搖枝上緑已綻蕊頭紅長養元功普吹噓大造同何須催羯鼓列繡杏園東鶴跡曲徑苔迷路幽棲鶴作鄰舞階猶惜影步月不生塵印出留深跡翻將叠軟茵松門未曾掩幸得接嘉賔春湖㴠碧碧水漾平湖空明一鏡鋪鬚眉應可鑑塵壒杳然無㸃㸃浮青荇雙雙下白鳬春風浴沂水視此意何殊鏡水荷香半夜芙蓉雨三間水月樓清香隨處度風景一時收幹密妨魚躍花深隱鷺遊詩情頻入座不必問漁舟板橋霜跡隔溪亭子逈為駕板橋通秋老碧天白寒流楓葉紅捲簾吟夜月著履步霜風愛此雙雙跡扶笻過水東萬年松徑幹挺森森窗前滴翠深依然臨水石即此是山林香氣濛春霧華枝覆午隂瓶梅與盆竹聊結嵗寒心轆轤聲緑水漲平湖春田轉轆轤耳根鳴斷續眼界樂霑濡漫厭繁音急從觀生意蘇機心緣力稼不與漢隂殊瀛臺觀木變石異質傳何代天然挺一峰誰知三徑石本是六朝松苔㸃猶疑葉雲生欲化龍當年吟賞處借爾撫遐蹤清簟看棋松枰消夏日竹簟納涼颸任爾機心密皆吾靜賞時鼎鳴濤泛峽香灺篆縈絲黑白分明看疏簾月漸移夏日園居即事四首園有山為郭齊因樹作墻開軒惟欲敞引徑不嫌長淡月梧桐影輕風蘿薜香無心瀟灑客勝地足徜徉宿雨潤新葩紅蒸一片霞看雲間藉草愛客緩烹茶坐弄流泉潔眠當皓月斜子西得意句分付與山家緑竹令人逺青松逈出羣山眀眉乍畫溪暗帶如分古帖閒來搨名香手自焚晚凉急雨過星漢淡微雲為有披襟者林風拂面來芙蓉碧治麗楊桞夏亭開愛鶴間移榻呼僮淨洗杯往來依石徑半為愛蒼苔萬夀寺方丈小憩庭有參天柏階饒匝地花鳥棲喧皓月鶴立對晴霞寥寂鐘魚靜蕭間山水嘉闍黎公案熟讓客趙州茶六月七日率王貝勒等泛舟即景勝地尋幽賞天倫樂事並舟回芳甸轉雲淡逺山橫新霽田疇潤微風景物清水禽飛上下總是樂生生己未夏六月恭進皇太后字扇一柄謹成玉漏林間度遲遲日正長問安承色笑撫景願清凉氷簟堪袪暑薰風恐拂裳寸忱託輕箑長此效黃香六月十八日初霽恭侍皇太后園中遊賞謹成一律膏雨公田足歡遊禁苑多欣陪文母御不數漢王歌山向雲中隱舟從畫裏過慈顔添豫色至樂復如何月夜泛舟泛月開輕舫微風送棹歌一輪懸玉鏡千叠湧金波魚躍蘋花動螢流燭影過猶聞簫鼓急别殿按雲和雨二首細雨落還止油雲斷復行當秋著物冷灑逈織絲明溪口添新漲簷牙續舊鳴來朝直北望天净五雲城麥壠緑菲菲秋苖潤更肥因風鳴淅瀝入夜聼霏微此際方增冷何人未授衣先民憂樂切詎隔九重扉登賞遇樓叠前韵為有松為蓋因依石作齊雲烟生砌潤山翠入窗佳緑野咸供望丹梯即此階拈毫舒逸興至樂傲無懷秋日御園即景臺館含秋爽衣衫切曉凉亂荷紅帶紫疏柳緑兼黃砌草藏蛩語池波印㕍行憑欄無限喜千頃稻風香清河道中始發清河道將為塞上行看山青覺近問路景如迎風爽催征轡雲光獵綵旌所思明舊制豈為騁遊情秋日奉皇太后口外行圍六首列塞騰千騎三秋駕六飛校搜遵祖制問寢奉慈闈纚纚田車好祁祁原獸肥金風如有意爽氣襲征衣代是熙和候秋當獮狩時風雲森羽衛物象擁旌旗皎日曈曨照凉颸左右吹近光多父老前𨗳莫驅馳秋原零白露羣鹿應時鳴駭野車徒勝彌川草木平祗期軍律整無取大庖盈誰獻長楊賦臨風憶客卿暮色滿平川行宫景物姸砌蛩喧此夕梧月照當年皇祖曾停蹕孫臣獲侍筵幾多承雨露追想倍悽然行漏催寒夜銀檠虎帳懸霜笳鳴塞上星斗掛天邊牧馬聞呼聚飛鴻列陳旋禽荒曾有戒無逸誦終篇當秋鷹羽疾度塞馬蹄輕目極山川秀詩含草木清天髙雲帶影風徑壑傳聲更值西成好沿途喜氣迎避暑山莊行宫懷舊二首離宫對碧岑峭石聳成林壁有曽題字庭餘獨樹隂簾帷秋日靜彛鼎篆烟沉況是承恩地能無憶舊心幻塵同夢鹿佳境似遊仙帆影留雲在江聲共月懸雲帆月舫月色江聲皆宫中别院名也緑窗蛛織網粉壁鳥銜鈿回首驚心處流隂忽草年除夕立春餞年兼餞臘迎嵗却迎春勝綵裝屏麗盤椒獻座新餘寒退殘夜韶景入元辰應律敷陽德還思與物均夏日遊玉泉山羅漢洞叠前韵宿具遊山興因來避暑頻月光瞻古佛笙韻聼新筠空色原無二林泉自有真寄言塵俗客到此悟迷津螢雨後飛螢出因風散碎光梧階流熠耀蘆岸照蒼茫裁句吟清夜攤書卧晚凉那堪當夏半秋意到南塘望桃花寺疏山通鳥道間樹出精藍殿閣凝秋靄川原靜曉嵐鐘聲天半叩塔影鏡中㴠尚憶十年事孤吟古柏南曉月茅店雞鳴曉烟溪客渡津無須珠照乘博得影隨身旅况饒千樣長空祗一輪纎阿曾有約萬古助行人草色軟茵才叠砌細毯漸周阿旭照初含燠春回久孕和帶烟青罥絮無水緑生波彳亍彳亍出潘嶽射雉賦彳丑石反亍耻録反胎仙過雙雙印隸科來青軒二首松棟久邅徊遐心一暢哉禽言留客住山色送青來宿雨滴岩樹輕嵐拂砌苔緑疇千頃浪是我放愁才屏風背逺山畫障面平野邱壑靜入吟松篁翠堪把間雲認岫歸薄霧出楹寫倚檻眄蒼茫遼天孤鶴下過玉泉輕籟蕩平林晨烏隱曉隂山葩看野色樹鳥聼幽吟初地因相訪陳題此重尋渟泓俯靈沚藉以滌塵心恭謁永陵追王傳前籍遺庥逮後昆髙山瞻彼作德水溯兹源疆理興家室星辰衛廟垣幾多瓜瓞感揮淚灑寒原恭謁福陵草昧起英雄維皇乃眷東風雲龍虎㑹日月海天中帝業千年鞏山陵萬古崇永維無競烈繼序矢深衷恭謁昭陵早是天歆漢何曾鹿逐秦百年經五世一壘豈三旬太室蒸嘗永元宫松柏新紹庭懷積悃展拜此時申敬觀太宗所御鹿角椅天然鹿角椅合拱不傾欹製朴身常泰形端道可思奢懲珊枕伴儉似葛燈遺却憶艱難際曾無偃息時除夕送故與迎新東皇轉化均良宵堪惜惜淑氣始礥礥嵗裏餘三鼓春歸已一旬流年何以餞思居倍增寅遊潭柘岫雲寺即事雜詠得詩六首攀雲尋淨地間樹出祗園息我幻塵念遊兹法海門靈潭徴自古老柘鬱生孫欲擬留詩去詩中無可言春山緑如洗四面作佳鄰默對如如相慙為汲汲人天香凝篆細空樂韻松頻古衲瓶盂淨將無隱者倫乳竇淙淙注天窗小小懸千松排障外一水到齊前逺印雲中岫平臨谷口烟瞿曇無說說鉢裏茁青蓮憶在天成寺禪房有句留山川原並美嵗月幾遷流龍卧深潭底鳥吟髙樹頭間雲知我意到處分相投小軒臨絶澗朝暮寫烟霞近席挹清籟虗窗碎白紗聖蹤餘想像題字走龍蛇松竹清泉宫皇祖御筆題行名也誰演楞伽法能聼倩緑芭簇簇玉芙蓉嶟嶟當户濃豈因供攬結聊可蕩心胸柏子窗間落石泉階下淙徘徊遲去騎徑轉尚聞鐘二月二十七日耕藉禮成得詩四首昭蘇春氣濃千畝正南縱勸穡倡羣辟明禋考秩宗輕雲籠旭日殷禮享先農佇望甘膏沛微衷益致恭皇考勤農本年年盛典修春郊方淡蕩穡事敢遲留野老披簔笠青壇覲冕旒頒恩勞終畝㫖酒美思柔綵棚周沃壤葱犗服青犂京兆種方布皇州草未萋九三分位次黍稷按東西釀雨雲容好應霑覛起泥祥風扇盎融金翼影方中閶闔千門啓逶迤一路通心因繩武恪禮以重農隆蠶館初諏吉勤民此意同是年初命皇后舉親蠶禮雨後玉泉山三首宿潤罨林顛澄心對玉泉山花皆喜色薜徑絶塵緣藻底窺潛鯉枝頭聼午蟬慿欄無限意緑壠正回鮮行漏隔花稀山亭坐翠微湖光梳石髮峰色潤苔衣薄爽林間度濃隂澗外肥對時思解阜不藉五絃揮西山濯碧螺積翠一窗羅於此賞心遇所欣即事多汀葩紅爛漫壁蘚緑婆娑詩思今何許剛如雨後波頒朔二首閟宫蒸祀罷象魏授時頒舊嵗行將盡新年去復還時和詎可恃日久倍知艱所願周寰宇官清民自閒試問司天史羲娥移不移璿璣誰可度珠斗若為推六合車書㑹千秋道法垂去年重入想崇政涖朝時恭奉皇太后幸湯泉翠輦駐雲莊春暉載小陽靈波暄不凍勝地景偏長數八稱功德齡千益夀康不須分别見是水一如湯韻松軒三首是松山林中物而書室適建此暮把朝吟且以名軒誠得遇矣夫不有瑰竒卓犖之材君門萬里不能自進者乎觸目警心非有愛於是松也拏空露逺岑蒼翠復隂森靜是有聲畫動為無操琴何須泉咽石自有鶴棲林悟對寥天一悠然獲我心讓竹稱君子無松不大夫豈隨春作態直與古為徒徑幹天邊倚真聲靜裏輸不因人作止信矣德充符書齊結搆新黛色罨窗頻每顧消塵念興言得好鄰伊誰知樹性為我種龍鱗寄語如松者林中漫隱淪七言律詩賦得卧聼村村打麥聲二首夏雨初過已有秋黃雲片片擁來牟暖畦錢刈青莖亂晴圃耞翻紫穗稠舍隔西東聲拍拍户饒餅餌樂油油髙齊亦識豐年景夢蝶窗頭酒一甌雉母呼雛隔野塘北窗初啓學羲皇田間錦疊千重皺壠上濤翻四月凉場圃地喧耞板響鄰家風送午炊香從容鼓腹堯天裡為愧農人鎮日忙雍正九年十二月二十日皇祖實録御訓告成皇父升殿恭受禮成羣臣慶賀恭紀三首寶袱金輿瑞靄盈恭迎帝輦出乾清起居本是當年注紀載欣看此日成佑啓萬年隆國祚繼承四海仰皇情告成應受千官賀金殿曈曨旭影明史館修成聖典垂一畨歡喜一畨悲提携舊憶音容在愾慕今驚嵗月移光發瓊囊臨殿陛祥開玉帙煥罘罳幾回拱手丹墀立感事沉吟七字詩薄海霑濡雨露勻九重咨警煥絲綸典謨從識唐虞聖功叙還同覆載仁憶昔追隨宸極久祇今瞻仰史書新光天黎獻歌思永况復躬承渥澤人海潮應月海亹初見一痕生突兀俄看雪嶺橫勢狀百千雷鼓震信符三五月輪明濤頭逐馬漫天湧浪尾歸舟向海行偶現色形還寂靜方諸看取水盈盈玻璃盤棐几無塵罽毯平玻璃盤子伴髙清一般皎潔羞雲母四射光芒突水精巧質非緣周玉府周禮天官玉府合諸侯則供珠盤玉敦嘉名詎數漢金莖幾回拂拭澄如鏡靜對氷心一片明恭讀皇祖御製避暑山莊三十六景詩并閲圖感成長句五首天開勝境比卷阿浩蕩春熙萬物和祗為養親溫凊備非關奉已豫遊過迎涼臺榭依山逈延爽軒窗傍水多頷領孫曾難數計扈遊何幸沐恩波猶憶壬寅三月春隨鑾方始奉恩綸天顔近接承歡久日角時臨賜喜頻在耳德音猶似昨開函御筆鎮如新祗緣深眷吾皇意愛育餘波及小臣金泉避暑闢離宫行樂還期兆庶同書史研求遵古訓桑麻藝植愛豳風追陪六膳分銀鱠趨侍三驅躍玉驄指㸃圖中當日事鼎湖何處可攀龍靈臺不見文王御仁夀空傳唐帝宫樓閣簾櫳虗夜月殿堂松柏老秋風當年遊賞疑天上此日酸辛對畫中賸有宸章恭洛誦幾回青睞憶重瞳鼓響舂音夢裏遷披圖不覺淚澘然詩侔風雅傳千載畫聚烟霞扄一編爽籟秋風噓大塊雲章星彩麗髙天冷窗課罷頻吟諷回首光隂已八年題隨安室壁淨心無礙所居安丈室爭强拓地寬數軸牙籖懸座側一窗風月入毫端壺中有水閒來㸃琴上無絃靜裏彈入夜跏趺還結坐宣爐火活炷沉檀洗硯搨罷蘭亭日影移好將龍尾浴清池波漂雲片隨流急手洗烟痕欲去遲湖上翻沙驚燕子汀邊吞墨飽魚兒精心拂拭消餘暇還憶齊頭把筆時聞軍營大捷志喜二首旭日揚輝氛沴消光天雨露九瀛朝行間效命嫖姚霍斗畔推車相國蕭沙漠忽聞收戰馬泮林佇見集飛梟勒功一片留何處更過燕山萬里遙轅門鼓角萬軍鳴執訊連連繫大營日照三山光四壘風回千隊動雙旌已聞魚海全消燧更看天河淨洗兵最是王師征不戰金甌永固萬方清遊蕉園氷牀聲裏過長湖逺岸人行似畫圖雪覆蕉園松突兀雲生古殿路虛無南臨太液風鈴語北望瓊華塔影孤屐齒幾畨遊歷處寒林己聼噪歸烏賦得自鋤明月種梅花溪畔梅花欲放遲數株分種傍階墀鍤翻夜月和香動手握寒根帶影移花信漫愁催落蕊畫楹初有照來枝何須秉燭尋幽趣舉首氷蟾未墮時題米襄陽畫雲氣濛濛暗逺天人家微辨水村邊渡頭風靜帆無力溪尾春歸浪有烟塔影平臨千畝外城樓髙踞兩峰前瀟湘雨意憑誰識座上猶疑對老顛雪消皓素漫空映綺寮春回大地凍全消光凝玉樹寒深淺水潤蘭階影動搖梅已過時添舊蕊桞將應節放新條朝來最喜霑濡足指日芳畦透麥苖冬夜焚香空林寒噪慕鴉還靄靄沉烟裊博山一縷自來參鼻觀三千原不出塵寰味餘火冷灰殘處興在藤床月牖間莫漫丁東催漏箭髙齊消得暫時閒甲寅冬至上躬祀南郊恭紀二首馳道曈曨散曙光祥凝玉輅煥龍章精誠聖德通乾貺肅穆皇儀紀奉常黍谷灰飛方應律雲門樂奏正迎陽微風不動柴烟直遙望天門闢九閶一線陽和何處生重重瑞靄映層城曉光彩映霜花動韶律春回朔氣清百福均隨長日至九瀛並奉泰階平上林已先東皇令殿桞宫梅欲向榮我皇考遐棄臣民遽易節序追思髙厚再觀無期子小子夙承庭訓懋學書齊用是苫塊之次述哀痛之忱中心迫切不能自已敬成長律以志終天之慕云勤勞宵旰一人心痛念前徽淚滿襟顧復深恩難可報纘承丕業敢忘欽堪嗟時序秋冬異竟抱悲哀嵗月深望斷白雲仙馭遠還思仙馭式來臨夢裏雞鳴驚問寢曉瞻帷幕頓生悲劬勞漫說終身慕德澤誠留萬古思聆訓庭前猶憶昔承歡膝下更何時蓼莪讀罷增沉痛繼序艱難只自知十月三十日皇考聖誕辰也嵗嵗稱觴獻夀今忽於雍和宫縞素將事痛何如之敬成長律用志哀忱率土呼嵩慶六旬歡聲頓歇哭聲頻誰知拜舞稱觴日忽作悲哀致奠辰化普寰區咸遏密心傾黎庶共尊親皇靈陟降瞻霄漢尚懇餘波惠子臣覽舊作志懷藝帷書史昔留連今日拈毫屬偶然剩有憂懷披奏牘那餘逸興賦詩篇漏聲滴盡銀壺箭香縷飄殘寶篆烟輸與昨年瀟灑甚緑窗愛月正遲眠咏禁中紅葉賦得霜葉紅於二月花寥天爽氣到楓宸恰有霜枝㸃綴新色借花欄紅乍染影依玉砌冷初勻鬱森未許遊蜂集絢爛還教宿鳥馴更喜西成逄稔嵗萬家雨露沐陽春丙辰十月十六日恭送皇考梓宫至泰陵奉安隆恩殿告祭還京悲慕如疑呼搶欲絶途次敬成長律四首以志深痛過隙光隂嵗已周龍輿朝駕痛難留纘承任重何由報顧復恩深未少酬雍邸回看宫闕寂橋山空對几筵愁尊親寰宇傾心久夾道蒸黎總淚流兩行衰桞羃寒烟一路悲風拂綵旃易水如添愁脉脉燕山不斷恨綿綿未過虞帝巡方載猶少成王享國年夢裏瞻依仍似昨問安常在寢門邊楓葉初丹槲葉黃當前觸目助悲傷鼎湖冉冉寒空靜蘆殿凄凄夜月凉憶斷白雲還杳渺望窮碧落轉蒼茫悲懷長此增沉痛忍别山陵路阻長雖是元宫未閉時可堪無處覩牀帷鬱蔥巒岫千靈護颯㳫松楸萬籟吹仙馭漸離心未逺歸鞍將去意多遲言旋正值稱觴日皇十月三十日是考聖誕辰也空向慈容獻夀巵十月二十五日得雪同雲四野望漫漫瑞雪霏微失遠巒麥壠乍欣占稔嵗茒檐還慮怨祁寒飄颻桞岸飛輕絮㸃綴梅村剪薄紈最是上林饒景色小春時節玉花攢冬至南郊黃鐘應律兆千祥喜見天心復一陽子夜灰飛旋淑氣泰壇日麗散晴光明禋盛禮稽三代御世鴻猷愧百王祗祝精誠通帝載眷子寰海樂倉箱皇清文頴卷首二十二欽定四庫全書皇清文頴卷首二十三御製詩七言律詩雨夜詠懷欹枕城烏喚曙時雨聲漸急漏聲遲廉纎細潤應含麥料峭輕凉欲透帷治理每慙先哲訓憂懷未許侍臣知更䦨㸃滴難成寐萬户饑寒靜裏思恭題松竹梅畫譜并跋埭畔凌冬傲雪株濡毫渲染發清娛松枝翠拂蒼鸞尾竹實紅垂火齊珠香散檀心欺蠟淡花懸磬口帶寒敷作朋三夀微忱切生意長含看此圖潛邸時讀書之暇間亦旁涉繪事嘗供􅀢此圖進呈聖母清玩者松竹取其經冬而不凋梅蕚取其凌寒而益茂舒華耀實愛日暄妍蓋用以獻祝也今荷䝉聖母宣付裝潢仍命題句於右爰敬述前意並綴韻言藉昔人三友之名為子臣九如之頌聊以效稽拜之忱悃云爾栁色嫩緑柔黃取次添勾留韶色細眉尖池塘日暖初臨水庭院烟濃半映簾綺句只愁歌謝韞銷魂誰解賦江淹禁烟巳近頒新火好向村傍拂酒帘詠牡丹擬禁體不用富貴爛熳並姚黃魏紫等字葉概花姿天與