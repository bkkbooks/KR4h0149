body:
  text: 欽定四庫全書皇清文頴序我大清受命百有餘年列祖德教涵濡光被海宇右文之盛炳焉與三代同風朕紹聞遜志以是為學亦以是為治矢其文德一紀於茲易曰觀乎人文以化成天下蓋自有天地而人經緯乎其間士君子之一言一行國家之制度文為禮樂刑政布之為教化措之為事功無非文也乃其菁英所萃蔚為國華詞以殽之聲以永之律以和之諧協六同彰施五色典謨作焉雅頌興焉詩不云乎追琢其章金玉其相文之盛也而賡之曰勉勉我王綱紀四方則所謂其風自上也曩我皇祖命大學士陳廷敬選輯皇清文頴儲之延閣未及刋布皇考復允廷臣之請開館編輯隨時附益久之未竣朕因命自乾隆甲子以前先為編次凡御製詩文草四卷臣工賦頌及諸體詩文一百卷録成序其首簡昔之論文以代為次者於漢則有西漢文類唐則有文苑英華唐文粹宋則有文海文鑑元則有文類眀則有文衡皆博綜一代著作之林無體不備今是編惟取經進之作朝廷館閣之篇與諸書小異然以觀斯文風尚當有取焉在易渙之象曰風行水上善立言者以為天地自然之文而序卦受之以節言文之不可過也繼之以中孚言有實也節而不流徴之以信有典有則可久之道其在斯乎朕孜孜典學求所以善持之者因以為摛文者鵠俾共勉云乾隆丁卯孟冬月御筆字位過密無法顯示臣張廷玉等奉敕編輯皇清文頴告竣恭呈睿覽臣等謹奉表恭進者伏以皇謨載道瑶編回學海之瀾帝治同文錦贉擷辭林之實麗三辰之珠璧光被無涯調六藝之笙簧化成有象集腋之功甫就含章之意斯昭冊府宏開書城永峙臣等誠惶誠恐稽首頓首上言竊惟結繩以降代有篇章斷竹而還人多述作演靈書於八會啓妙理於三墳帝曰典而臣曰謨虞史肇彚編之體聖為經而賢為傳孔門垂著録之規撰詞賦於西都上自宣武而下周枚馬校藝文於東觀大如詔令而旁及針銘沿波討源晉摯虞始為詮敘類分代次梁蕭統實開選樓從茲四庫並稱丁籖即隨乎甲乙夫且萬川爭滙海若悉納夫江河而唐而宋而元縹囊益富為粹為鑑為類緗帙彌增凡兹㡨軸之紛綸悉是休眀之鼓吹顧言期貫道非徒藻繪之資而文可經天必待聖神之世故簡冊雖繁於往古而英華獨盛於本朝欽惟皇帝陛下聰眀建極聖哲敷文性本生安裕多能於天縱功崇問學昭盛德以日新奎雯集三古之大成金聲玉振睿藻騰九霄之異采鳳翥龍翔耀薄海以光華觀萬國車書之盛登淳風於渾穆纘纍朝謨烈之遺仰惟聖祖仁皇帝德合欽眀六十一年嫓堯天之廣運世宗憲皇帝道符濬哲一十三載同舜日之重熙元首眀而股肱良敕幾時勤賡載教化行而風俗美籲俊更切旁求鹽梅舟楫之司詞成霖雨棫朴菁莪之澤氣蔚雲霞在祖宗丕顯丕承盛美遞宣為雅頌我皇上善繼善述大文逺邁乎夏商不有編摩曷稱揚扢爰發九重之眀詔令輯一代之鴻文館開劉井柯亭編始石渠金匱禹鼎湯盤之制皆達化而窮神周情孔思之章總旋規而折矩志九官之職命直繼都俞紀八伯之拜稽重歌糾縵率土共傳彞訓信巍煥以難名鈞天髙奏英咸豈言思所能擬首登御製若乾坤之統六爻次列宗親如藩垣之共辰極三雍雅樂陋淮王叢桂之篇七略鴻文藐子建浮萍之咏遂分卷帙下逮臣工擇其爛然可觀亦復裒然成集嘉謨嘉猷之入告吉人吉士之敷陳或魚藻鹿蘋義存諷諭或星雲梧鳳志切賡揚或薛易匡詩每依經以著論或董醇賈茂因對策以建言縷析條分博觀約取倣劉舍人評古先辨體裁效鍾記室品詩特崇雅正雖合前後羣僚之才思難上配乎髙深而萃山川大地之瓌竒實愈彰夫廣厚譬諸嘉禾擢秀俱含湛露以濃瀼又如瑞木敷榮遙映卿雲而璀璨美矣善矣帝王之制作疇可比倫唐哉皇哉宇宙之文章孰大於是臣等才非夢鳥技止雕蟲粗知數墨尋行敢謂禀經酌雅扣槃測日空求燭末之光執管窺天終局井中之識幸侍垂裳之座時瞻聖藻之雷動風行欣隨珥筆之班得睹羣言之鯨鏗春麗伏願珠囊朗揭金鏡常懸學冠環瀛彌求政本於緝熙敬止文髙振古益溯心源於精一執中無怠無荒操議禮考文之柄有恆有物取銜華佩實之儒則河自出圖洛自出書再覯苞符於盛世且天不愛道地不愛寶重瞻景慶於昌時矣臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞乾隆十二年七月日字位過密無法顯示臣張廷玉經筵講官户部尚書加一級紀録二次臣梁詩正經筵講官刑部尚書教習庶吉士加二級紀録四次臣汪由敦欽定四庫全書皇清文頴凡例一我朝文治光昌超越百代聖祖仁皇帝宸章宏富地負海涵勒為三編傳於冊府世宗憲皇帝御製文集炳蔚今古昭垂奕祀皇上聖學淵深文思格被風行泉湧奎藻日新煥乎文章於斯為至敬録首簡以著化成所自但限於卷帙所登才百分之一二然由容光以觀羲御溯回瀾以測谷王聞韶觀止無待九成卿雲在霄均賁五色郁郁彬彬美矣大矣御製自樂善堂全集已刻外按年裒録遵㫖甲子年以後者統俟續入一柏梁宴啓梁孝先賡花蕚樓開申岐競爽我朝宗英懿屬大雅不羣服訓飱和富有篇藻今編録各體謹以宗室諸王列羣臣之冠其文學諸臣起逢掖而登蓬瀛列承眀而參槐棘盈廷師濟莫不涵泳聖涯摛詞染翰綜其大概以備昭代人文至山林韋布未望清光擊壤歌衢採風難遍與夫方外屬國偈頌樂歌間或仰達宸聰究乃無關風雅概無取焉一聖朝襲慶延光寰宇沐德休眀鼓吹競獻葵忱或繞電流虹效封人之致祝或觀河狩嶽聼游童之歡謡或豐功盛烈譜朱鷺於軍中或上瑞嘉祥對白麟於隴首鋪張揚厲篇軸紛陳以及應制紀恩考試館課一時多至數十百人一題多至千有餘首兹集或節取於連章或别裁於儕偶甄録綦嚴所存從略一館閣之體原以宣揚德意黼藻文明必風雅無乖方可津梁後學臣等編緝之初面奉世宗憲皇帝諭旨選録務在謹嚴即御製亦不必多載仰見聖衷詳慎昭示來茲之至意今所選若干篇皆取音律和平詞義正大者其波瀾雖富而音調未諧繪藻雖華而體裁未合概不濫入一唐文粹文苑英華宋文鑑元文類諸書自詩賦以及碑志各體具備是集原奏惟取進呈應制之作先據大內交出冊頁及名人文集刻本現為內府所收與康熙年間遵㫖以平日著作進呈繕本進御者方行甄録其尋常酬應之萹雖著作如林裒然成集而未經乙覽概不入選是以諸體未能悉備與文粹諸編體裁小異武英殿監理和碩和親王臣𢎞晝皇清文頴館總裁官銜名字位過密無法顯示臣張廷玉經筵講官戶部尚書加一級紀録二次臣梁詩正經筵講官刑部尚書教習庶吉士加一級紀録三次臣汪由敦提調校閲官銜名內閣學士兼禮部侍郎紀録三次臣劉綸內閣學士兼禮部侍郎紀録六次臣董邦達都察院左副都御史丁憂候補臣趙大鯨詹事府詹事兼翰林院侍讀學士紀録三次臣徐以烜日講官起居注翰林院侍讀學士加二級紀録四次臣于振日講官起居注翰林院侍講學士臣周長發字位過密無法顯示臣林蒲封翰林院侍讀加一級臣雙慶翰林院侍讀紀録五次臣周玉章左春坊左諭德兼翰林院修撰臣羅源漢左春坊左贊善臣宋楠國子監司業紀録四次臣鶴年翰林院檢討加二級臣阮學浩翰林院編修紀録四次臣阮學濬翰林院編修臣朱荃署日講官起居注翰林院檢討加三級紀録五次臣郭肇鐄翰林院編修加二級紀録五次臣錢琦翰林院編修加一級臣經聞收掌官銜名翰林院典簿已未科進士候選知縣加一級臣遲逢元翰林院孔目加一級紀録三次臣熊志契翰林院八品筆帖式臣郎曉翰林院九品筆帖式臣伍秀謄録官銜名舉人候選知縣臣徐文煐候選州同臣劉若洙候選州同臣胡其治候選州同臣程眀勳候選州同臣徐傳韓候選州同臣蔣韶年候選州判臣吳廷仕候選縣丞臣沈德祖候選縣丞臣羅國錦候選縣丞臣陳孝泳候選主簿臣汪化龍候選吏目臣鍾秉和候選吏目臣陳欽候選吏目臣周桓武英殿監造內務府南苑郎中兼佐領加七級紀録二十二次臣雅爾岱內務府錢糧衙門郎中兼佐領加六級紀録十六次臣永保內務府錢糧衙門員外郎兼佐領加一級紀録四次臣永忠內務府廣儲司司庫加一級紀録五次臣三格監造加一級臣李保監造加二級臣姚文彬庫掌臣虎什泰庫掌臣髙永仁欽定四庫全書集部八皇清文頴總目録總集類卷首一聖祖仁皇帝御製文論愼幾微論學校論慎刑論王道近民論業廣惟勤論廉靜論說為學如鍊金說操舟說製硯說解鄉舉里選解四維解卷首二序日講四書解義序日講書經解義序日講詩經解義序日講禮記解義序孝經衍義序日講通鑑解義序文獻通考序幸魯盛典序南巡詩序耕織圗序御選唐詩序記泉林記暢春園記碑文至聖先師孔子廟碑平定朔漠告成太學碑東嶽廟碑文彚宗寺碑文卷首三雜著讀大學讀周禮書後七詢卷首四連珠連珠六首頌二典頌禹陵頌贊至聖先師孔子贊石鼓贊針講官針臺省針督撫針守令針銘淵鑑齊銘佩文齊銘知稼軒銘賦梧桐賦夜亮木賦玉泉賦行殿讀書賦闕里古檜賦木棉賦卷首五聖祖仁皇帝御製詩四言古詩長至日祀天圜丘有述四章五言古詩覽貞觀政要時巡近郊憫農事有作懋勤殿讀尚書至無逸篇有作咏觀天儀器秋日出郊觀稼端寧殿齊居詠史四首二月三十日親統六軍徂征漠北經眀成祖勒銘處指示扈從諸臣行殿示諸皇子厄魯特之衆相繼來歸咸詢其父母兄弟妻子為陳前所獲者覓令完聚黃河噶爾丹平後示諸臣凱旋言懷口外設屯耕植聚落漸成七言古詩收復嶽州作自寧夏出塞濵河行至白塔乘舟順流而下抵湖灘河朔作長安行松花江放船歌望焦山念已巳曾登其上海東青松花江網魚最多頒賜從臣再遊盤山卷首六五言律詩詠蟬入喜峰口夏日迎薰亭曉發古北口望霧靈山塞外省覽風俗過闕里闕里古檜出居庸關賜將士食瀚海外藩諸部落絡繹來賀宴賚之十一月三日泛舟黃河流凌始下舟行之頃河水瑩潔波浪忽平入沙虎口保德州渡黃河晚眺過密雲作興京曉發嘉興花山仲子廟大城文安等處堤修完舟中駐蹕王家口七言律詩塞上宴諸藩瀛臺滇平吕翁山是聖祖太宗文皇帝擒洪承疇處駐蹕大凌河回鑾抵古北口玉河春水後苑漫興登岱泛舟西湖春寒軫念將士入關見雨膏潤澤禾苗茂遂喜而有作入京見百官及耆民童稚歡迎道周出塞經泰山之麓入居庸關舟行野望五言排律臺灣平告祀孝陵有述南苑元靈宫是世祖皇考建三月初六日告祭福陵恭述十韻五言絶句野望次楊嶺北湖心亭自過江至常州府雜詠第一首六言絶句水淀雜詩四首平原七言絶句由廣泉寺至臥佛寺初寒尖峰山谷口作巡歷塞北雜詠第一首曉發虛谷飛來峰惠泉春晴舟中作克魯倫河上流雨後草生班師次拖陵南口登雞鳴山山行曉寒念將士經喀爾沁菜畦支硎山江行春行未開新荷卷首七世宗憲皇帝御製文論怨不在大亦不在小惠不惠懋不懋論序大清會典序書經傳說彚纂序詩經傳說彚纂序聖祖仁皇帝庭訓格言序聖諭廣訓序數理精藴序音韻闡微序子史精華序古今圗書集成序雍邸詩集序九日燕羣臣擬柏梁體詩序悅心集序卷首八記圓眀園記七曜會聚記黃河澄清碑記跋耕織圖跋跋淳化閣帖後碑文修建闕里聖廟碑文惠濟廟碑文朝陽門至通州石道碑文髙家堰碑文普陀山普濟寺碑文普陀山法雨寺碑文祭文追封孔子五代祭文聖廟告成祭文卷首九世宗憲皇帝御製詩五言古詩墨竹七言古詩題墨竹墨