泛湖賦唐文皇爽氣澄蘭沼之句得詩五首依韻為次七月二十八日恭奉皇太后進宫路旁禾黍與與入覽欣此西成稍紓望歲賦詩志喜亦歌其事也南紅門池上咏盆菊順義縣行宫作卷首二十一七言古詩銅鼓歌讀司馬溫公諫院題名記自鳴鐘題宋宣和清眀上河圖用駱賓王帝亰篇韻德夀寺古鼎歌望雪行春蔬雨前茶有鳥二十章觀刈麥擬杜工部洗兵馬行夜臥聽雨憶平郡王豐碑行見桃樹下栽松感而有作同五弟月下舟歸秋浦泛舟法海寺題壁題秋山行旅圖題王諤豐年農慶圖初夏日聞鶯瀛臺木變石歌效李長吉體蓼花紅關山月熱望法海寺耘田者神仙引閶闔篇題郭河陽雪山行旅圖秋夕南紅門行宫對月鑿氷放舟花朝無花之作十駿圖歌神木行雨中焚香泛臥逰書室素絲行觀敖漢瀑布水射虎行昭陵石馬歌所過連山塔山皆我太宗文皇帝用武之地而吕翁山則生擒洪承疇處也蓋有眀末季驟加遼餉至八百餘萬竭天下之力奉東北一隅未收片甲之用而兵食兩詘人民離叛我太祖髙皇帝一舉薩爾滸而遼左之業成太宗文皇帝再舉吕翁山而關西之勢定今因叩謁祖陵親履其地思經營草昧之艱難爰恭紀其事以示來許俾念祖宗得天下之不易益勵守成之志亦以舉其􅎋鑒眀之鹿亡其必有所以失之之故也聞黃鸝霹靂驤歎松花玉石屏歌蟠龍引青松行卷首二十二五言律詩春日雨後海子外行圍二首東作恭和御製詠竹元韻花信風鶴跡春湖涵碧鏡水荷香板橋霜跡萬年松轆轤聲瀛臺觀木變石清簟看棋夏日園居即事四首萬夀寺方丈小憩六月七日率王貝勒等泛舟即景已未夏六月恭進皇太后字扇一柄謹成六月十八日初霽恭侍皇太后園中逰賞謹成一律月夜泛舟雨二首登賞遇樓叠前韻秋日御園即景清河道中秋日奉皇太后口外行圍六首避暑山莊行宫懷舊二首除夕立春夏日逰玊泉山羅漢洞叠前韻螢望桃花寺曉月草色來青軒二首過玉泉恭謁永陵恭謁福陵恭謁昭陵敬觀太宗所御鹿角倚除夕逰潭柘岫雲寺即事雜咏得詩六首二月二十七日耕藉禮成得詩四首雨後玊泉山三首頒朔二首恭奉皇太后幸湯泉韻松軒三首七言律詩賦得臥聽村村打麥聲二首雍正九年十二月二十日皇祖實録御訓告成皇父升殿恭受禮成羣臣慶賀恭紀三首海潮應月玻璃盤恭讀皇祖御製避暑山莊三十六景詩并閲圖感成長句五首題隨安室壁洗硯聞軍營大捷志喜二首逰蕉園賦得自鋤眀月種梅花題米襄陽畫雪消冬夜焚香甲寅冬至上躬祀南郊恭紀二首我皇考遐棄臣民遽易節序追思髙厚再覲無期豫小子夙承庭訓懋學書齊用是苫塊之次述哀痛之忱中心迫切不能自已敬成長律以志終天之慕云十月三十日皇考聖誕辰也歲歲稱觴獻夀今忽於雍和宫縞素將事痛何如之敬成長律用志哀忱覽舊作志懷咏禁中紅葉賦得霜葉紅於二月花丙辰十月十六日恭送皇考梓宫至泰陵奉安隆恩殿告祭還亰悲慕如疑呼搶欲絶途次敬成長律以志深痛十月二十五日得雪冬至南郊卷首二十三雨夜咏懷恭題松竹梅畫幅栁色詠牡丹擬禁體甘霖普降特召大學士內廷翰林圓眀園泛舟逰覽即事成詩同諸臣面賦以志一時勝賞時乾隆三年六月六日也新秋泛湖秋夜南苑行宫懷舊偶作冬至齊居偶閲舊稿志懷新正二日召集羣臣於乾清宫賦柏梁體詩朕既首倡又成七言一章九日登盤山天成寺江山一覽閣作南苑新衙門行宫即事四月望後雨澤未足朕憂心如㷊臣工頗有以春雨既足尚可無憂者然而無以釋朕懷也越五月丙寅雨澤既霑命駕進宫見路旁如雲而有秋者麥田也如油而茂夏者晚稼也乃快然以喜則知朕前此之憂不徒憂矣既以成詩爰命臣工和之夏日奉皇太后幸靜眀園登靜眀園古華嚴寺雨後翦園中新蔬敬獻皇太后謹成一律初秋偶閒皇考實録聖訓告成恭紀長律四首秋日侍皇太后幸靜眀園奉聖母命敬成長律得佳字春池泛舟細雨靜眀園即事途次見西成有象喜而有作要亭行宫晚坐秋山重陽日喀喇河屯行宫侍皇太后登逍遙樓曉日題瀛臺隨安室曉行夜雨寄興恭瞻泰陵聖德神功碑告成感成長句二月六日夏日御園閒詠八首喜晴曝書食荔支有感七夕後一日立秋青龍橋曉行二首野景心逺閣秋眺今年直隸秋收倍常慿輿有喜因示接駕衆官曉行落葉詩六首登盤山作冬日瀛臺即事二首正月初十日立春建福宫新春二首御園仲春二首詣暢春園問安春日泛舟過北逺山村二首春日同諴親王和親王遊宴御園作聼唐侃彈琴初夏靜眀園栁絮五首立夏讀資治通鑑綱目御門日雨二首香山示青崖和尚棲雲樓二首題瀛臺舊書舍六月十九日立秋七月初八日因往盛京叩謁祖陵恭奉皇太后始發圓眀園作關外山田楓二首詠楓再叠前韻二首野村二首秋搜雜記詩五首望葉赫舊墟敬惟我太祖髙皇帝以十三戎甲奮跡於此復讐服衆遂成王業謹賦其事以示來許御崇政殿十月朔日宴宗室羣臣於故宫夷齊廟將至京作咏爆竹新春恭奉皇太后駕幸圓眀園二首春曉二月二十二日清眀午日詣暢春園問安甘霖既霑詣暢春園問安仰慰聖母望歲之誠并成長句恭志盛德清音齊荔支至頒賜朝臣因而有感九日登髙天成寺撫觀乾隆七年逰盤山記因而有作幸翰林院錫宴賦詩復得七律四首并示諸臣清祕堂偶題十月二十七日幸翰林院賜大學士及翰林等宴因便閲貢院乃知雲路鵬程誠不易易也得詩四首雪卷首二十四五言排律御賜書經傳說彚纂恭紀二十二韻九日講武恭紀闕里祭器新成賜觀簠簋鉶登豆爵六色恭紀八韻石髮恭奉皇太后恭謁孝陵景陵敬成長律南苑大閲謁元靈宫宫是皇曾祖世祖章皇帝建也敬依皇祖聖祖仁皇帝韻以