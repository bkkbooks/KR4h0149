展軨峯標木葉鬱崔嵬水漲松花淨沱洄萬騎雲屯隨豹尾三秋風景異龍堆周詩底用誇麋友晉賦無勞藉雉媒更剪銀檠吟七字屬車賡和有鄒枚連雲峯影自婆娑雨後新看矗黛螺黃幄背風依樹障朱旄面日出巖阿合圍麋鹿愁飛羽出隊狐貍駭獵猧薄暮旌門鐃吹奏海青雲裏捉天鵝曲名旌門鼓吹常奏此虎韔騂弓越徑秋平岡草淺騁驊騮雁行狗監牽絲鞚馬上鷹師臂繡鞲風漾鈴聲金替戾雪開峯面玉雕鎪批麻丙夜斟民事距為從禽暫解憂望葉赫舊墟敬惟我太祖髙皇帝以十三戎甲奮迹於此復讐服衆遂成王業謹賦其事以示來許寒盟由彼義何甘甲士當時祗十三自是天心歆日角幾曽虎旅藉犀函折衝底用稱韓信决策無須聽耿弇創業艱辛千古獨垂衣敢恃面臨南御崇政殿碧海曈曨曉日升金猊風靜瑞烟騰元孫黼扆兹重御列祖威靈實式憑六世繼繩惟敬畏百年含煦被藜蒸守成開創何難易只有憂勤與日增十月朔日宴宗室羣臣於故宫曈曨海旭麗銀鋪宴擬橫汾湛露濡舞馬不須誇紫燕剪沉常自裊金鳬有椒共慶如兹盛無酒何妨謂我酤更喜皇州頒嵗朔小陽春律正昭蘇夷齊廟盧龍孤竹城夷齊廟在焉史稱夷齊恥食周粟餓死首陽詩云采苓采苓首陽之顛疏謂在河南蒲坂而莊子則曰首陽山在岐山西北曺大家云在隴西元和郡國志謂首陽山在河南偃師說文又謂在遼西則是首陽凡五各有證據而其為夷齊餓死之處則一也將孰之從惟遼史所載營州鄰海軍下刺史本商之孤竹今之盧龍即遼營州地也爾雅所舉孤竹北户注謂孤竹在北周時幅員不廣其以此處為極北固宜然則說文所謂首陽山在遼西者此為近之殆以詩在唐風而叩馬而諌當武王伐紂之時由是岐隴蒲偃皆附㑹其說耳夫夷齊清風在天下何處非首陽豈爭疆域乎冕旒而墨胎以祀者尤非其志因係以詩而考其說如此軒冕泥塗是本腸肯容儒雅汚冠裳薇苓依舊西山岵頑懦羞登夫子堂只為心慙蹤異武敢將口實罪歸湯豈爭隴右還蒲左天下清風盡首陽將至京作曈曨晴旭麗華旗展謁回鑾奉聖慈樂奏上回多喜意禮將長至肅親祠田逢秋有酬農苦人覺途遙嫌馬遲三月徂東異三載孔嘉新舊乃如之詠爆竹軋軋平原凍草萌却教非夏以雷鳴春從和朗聲中報人在吉祥煙裏行仙木駢羅增氣色飛霙借助散瑶瓊東皇鼓吹連宵發百福昌昌入鳳城新春恭奉皇太后駕幸圓明園作二首栁眼花心各待春傳言青帝駕青輪香霏寒圃飄金粉色轉晴絲惹麴塵最愛風光迎午夜却離宫闕未由旬廋信詩注支僧載外國事由旬者晉言四十里也玉溝凍解琉璃滑恰與陽和布澤勻誰道仙家别有京依依愛日永蓬瀛鳴春鳥擇昌條語畫水魚穿嫩藻行炬為迎蟾蓮萬朵梅因餞臘玉千莖芳年合有新詩咏物物春臺總向榮春曉輕寒覺透薄羅緯寂寂琴齊春曉時半榻清閒聊復爾一天韶麗付伊誰禽聲不辨間關語花色才添四五枝我是宵衣籌治者那能髙枕鎮吟詩二月二十二日清明花昌鳥聒日逡巡誰寫韶光一例勻二月已過三月節三分却判二分春緑雲罨栁斜臨岸紅雨霏桃暗洗塵嫩酪新煙都負也只餘幽緒入懷頻午日詣暢春園問安蒲岸荷洲泛玉津銅龍雙闢問安晨祗因憫雨遵慈訓未敢稱觴答令辰自春徂夏尚未得霑足雨澤廟皇太后步禱於園內龍神朕恐懼惴栗莫知所措夫以朕之不德上纍節乎聖母憂勞遑敢以節序酒食之饌盡承歡之小黃帽龍舟閒浦漵緑枝虎艾綴楣振分眀舊嵗端陽景饒有新愁薄念頻甘霖既霑詣暢春園問安仰慰聖母望嵗之誠并成長句恭志盛德自古祈年厪陛廷幾曽步禱見慈寧承歡滋愧心無那破悶真知雨有靈膝下先承多黍潤階前更喜散萱馨稱觴始得申衷悃遙指南山入座青清音齊曠宇徘徊獨暢情耳謀目觀兩無營山如净體無餘净泉是清音中最清竹裏數篇依籟讀溪邉孤艇破煙撑近來稍得愁眉解露色風光卜順成荔支至頒賜朝臣因而有感閩中佳實秋前到相對年年有所思酬節祗供原廟薦承恩非復寢門時飛來嶺外炎風送斜倚欄邉揭露垂料得擎歸舊鴛侣幾多歡喜幾多悲九日登髙性與秋光自覺諳登髙此日暢幽探荷衣巳破無從補楓頰才紅尚未酣恰好得詩教鴈寫不須摘菊倩人簪晚來靜坐寒窗下即景頻頻惕九三是日為乾隆九年九月九日云天成寺撫觀乾隆七年遊盤山記因而有作虛窗四啓曉霞流人在層巖最上頭詩句偶拈今日暇風光宛似昔年秋泉淙澗底琴音寫峯倚天邉畫景收獨撫穹碑參結習轉教心恧重來遊幸翰林院錫宴賦詩復得七律四首并示諸臣歡騰藝署小陽春此日崇文引席珍顧我慚為房杜主豈伊獨數馬鄒臣石渠典故應增舊壁宿光華更覩新影麗花磚爭到八儘教霑醉酒三巡瑞旭曈曨靄扇鸞筵開翰墨㑹衣冠五車四庫從來紀劉井柯亭取次看玉版揮毫盈鳳沼花瓷賜茗擘龍團濟川自古資舟楫便欲因尋學海瀾昌辰天祿集鵷聫欣詠斯干小雅篇鳥革翬飛躋君子誦詩講易共髙賢光凝黼座垂華藻篆繞猊爐散瑞烟咫尺玉堂清切地底誇瀛島說登仙百年禮樂慶昭融保泰常持惕若衷漫以新詩鳴豫大誰將忠告贊欽崇傅巖夢賚應無藉唐室賡歌訝許同心喜百僚知我意不將髙議詡升中按唐書張說倡封禪議帝召說與禮官學士置酒集仙殿云云故其時諸臣詩中有髙議待升中及將陪玉檢泥之句夫以崇儒之雅舉隱遂滿盈之私志非朕所取惟有競兢業業與日俱長頌不如規我君臣其共勉之清祕堂偶題崇文稽古豈虛名翰苑維新此落成羣彥數過十八㑹小春暖凑一天晴冬池淡沱猶澄鑑夏屋徘徊獨暢情盆菊無言應有意自慙疏散也登瀛十月二十七日幸翰林院賜大學士及翰林等宴因便閲貢院乃知雲路鵬程誠不易易也得詩四首翰