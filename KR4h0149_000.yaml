六首尹繼善聖主臨雍禮成恭紀十首徐本聖主臨雍禮成恭紀八首尹繼善聖主南苑大閲恭撰鐃吹歌辭三十首勵宗萬聖駕南苑大閲恭紀十首陳大受聖駕南苑大閲恭紀八首蔣漙聖駕東巡盛京恭謁祖陵大禮慶成詩十六首宋楠臣等謹按皇清文頴一百二十四卷康煕中聖祖仁皇帝詔大學士陳廷敬編録未竟世宗憲皇帝復詔續輯以卷帙浩博亦未即蕆功我皇上申命廷臣乃斷自乾隆甲子以前排纂成帙冠以列聖宸章皇上御製二十四卷次為諸臣之作一百卷伏考總集之興逺從西晉其以當代帝王詔輯當代之文者不少槩見今世所傳惟唐令狐楚御覽詩奉憲宗之命宋吕祖謙文鑑奉孝宗之命爾然楚所録者佳篇多所漏略祖謙所略者衆論頗有異同固由時代太近别擇為難亦由其時之為君者不足以折衷羣言故或獨任一人之偏見或莫决衆口之交譁也我國家定鼎之初人心返朴已盡變前朝纎仄之體故順治以來渾渾噩噩皆開國元音康熙六十一年中太和翔洽經術昌明士大夫文采風流交相照映作者大都沉博絶麗馳驟古人雍正十三年中纍洽重熙和聲鳴盛作者率舂容大雅渢渢乎治世之音我皇上御極之初肇舉詞科人文蔚起治經者多以考證之功研求古義摛文者亦多以根抵之學抒發鴻裁佩實銜華迄今尚蒸蒸日上一代之著作本足凌轢古人恭逢我世祖章皇帝聖祖仁皇帝世宗憲皇帝聰明天亶制作日新我皇上復游心藻府煥著堯文足以陶鑄羣才權衡多藝譬諸伏羲端䇿而演卦則纎緯小術不敢侈其談虞舜拊石而鳴韶則絃管繁聲不敢奏于側故司事之臣其難其慎幾三十載而後能排纂奏御上請睿裁迄今披檢鴻篇仰見國家文治之盛與皇上聖鑒之明均軼千古俯視令狐楚吕祖謙書不猶日月之于爝火哉乾隆四十三年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書皇清文頴卷首一聖祖仁皇帝御製文論慎幾微論易曰幾者動之微吉之先見者也夫天下之廣事物之衆其接於中而散見於外者至紛綸而莫可紀極然當其寂焉獨處萬感不交自人窺之罔測端倪而心之隱躍欲動者已灼然其不能遏此所謂幾也幾動而理與欲遂分是以古之聖賢於一念之發必審之於中曰此為理乎為欲乎理則擴充之欲則禁止之不待其滋長顯露而後為補救也以故理日長而欲日消昔大禹嘗以慎乃在位告舜而復推其㫖於安止幾康舜之庸作歌也亦曰敕天之命惟時惟幾夫不言事而言幾何哉蓋事顯而幾微也微則幽而難辨危而難持茍非察之於早而謹之於終則天命之在人者必漓心之安於止者必蕩軼而踰檢矣朕兢兢業業一日二日萬幾惟恐隱微之地有一端未善故日講求於先儒性命之學以務盡其誠意正心之功而猶恐未得其要也孜孜焉從事於惇頤之所謂思張載之所謂豫朱熹之所謂敬劼毖罔懈庶幾慎獨之方可企而全歟由斯以觀易與書之言幾猶大學之言獨中庸之言微顯也其道總不外於一慎而已矣然朕勉焉而未能自信也蓋人心道心消長靡定勢不中立或縱於一時而貽於久遠或疏於一事而誤及多端則其失非淺鮮也其何以無歉於聖賢性命之學乎哉學校論治天下者莫亟於正人心厚風俗其道在尚教化以先之學校者教化所從出將以納民於軌物者也是以古者家有孰黨有庠術有序國有學人生八歲自王以下至於庶人之子弟皆入小學及其十有五年則自元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學蓋自家至於國莫不有學自天子至於庶人莫不學自幼至於長莫不皆學凡學有詩書禮樂以為之本干戈羽籥以為之文父子君臣長幼之道於是焉觀之六德六行之教於是焉取之所以淑其耳目手足之舉措而養其心以復其性以為修已治人之大者可謂備至矣是以當時之君子履信思順以事其上小人亦皆樂循禮而恥犯法侯撻不事而至治以興後世學校寖廣博士之途寖繁所以立教之方失先王之遺意士之遊其中者直以為利祿之階欲期道德之一詎不難哉且夫今之所謂教者誦讀焉而已爾而又弗實致其力以防其放僻邪侈之心使氣之充而識之明以漸求復其性其何以為修已治人之道哉故曰教隆於上化成於下教不明於上而欲化成於下猶却行而求前也教化者為治之本學校者教化之原欲敦隆教化而興起學校者其道安在在務其本而不求其末尚其實而不務其華以內行為先不汲汲於聲譽以經術為要不屑屑於文辭如是則於聖人化民成俗之道庶乎其有當也夫慎刑論聖人之治天下有禮有刑禮也者所以勸民之為善也刑也者所以禁民之為非也五倫以為凖三物以為坊漸而摩之優游而自化之邪慝不作比户可封聖人之心豈不甚愜而勢有不能於是制為刑罰以驅之於後使天下之人􅋏然有所畏而不入於非彜是刑之設也聖人之所不得已也其輕者傷肌膚重者戕性命天下之慘痛至刑罰極矣聖人在上不能使天下無刑人而政平訟理一民一物卒無顛連困苦之虞者則惟此慎刑之道得也夫生人之性有善而無不善陷溺既久匪僻乃生一旦麗於郵罰雖欲悔之固無及已故聖人之慎刑所以全民衷也雨露雷霆天之所以成歲功也而一歲之中雨露時行雷霆之用不數數見焉故聖人之慎刑所以順天道也在易之噬嗑其象為明罰敕法而即繼之以賁曰無敢折獄豐之象為折獄致刑而即繼之以旅曰明慎用刑噬嗑上離下震豐上震下離於義為明為斷而賁與旅皆有艮體於義為止聖人之意以為用刑之道貴乎明斷相資而必本之於至慎聖人之心如此其昭然而可覩也然則慎刑者所以止刑也書曰刑期無刑其謂是歟朕嘗謂欲天下之治必使刑獄清簡者誠有見於此也蓋惟刑慎則不濫善人無誤罹文網之懼刑慎則必當不善者無僥幸茍免之心天下雖大天下之民雖衆使為善必䝉福澤為不善必不可幸免則是非别白大道昭明㑹極歸極是訓是行而刑措不用矣王道近民論嘗讀史至魯伯禽報政之事而深歎古聖人致治無他道也惟在因民之心而已矣周公之言曰政不簡不易民不有近平易近民民必歸之㫖矣哉非聖人何能語此夫民雖至愚且弱莫不各懷所欲順之則易與為治拂之則日趨於非此必至之勢也聖王知其然故因民之欲遂其生也豫之以田里樹畜之資導之以農桑衣食之術公旬有限而勿奪其時補助頻行而常惜其力然又念民心莫不好善而惡惡於是因其父子兄弟之愛發其孝友姻睦之良習之於黨孰申之於庠序俾愚者安其身於襏襫而婦饁夫耘晝茅宵索終歲勤動而不以為勞其秀者則釋耒耜而敦詩書被服儒雅日莘莘於爼豆鐘鼓之間而不覺或有不率者設為法制以整齊之立為刑辟以董戒之要皆示之以不得不然而非專恃此以為遷善去惡之具也唐虞之世敬敷五教而外服就流宅之刑大率有其名而不用者爾故臯陶之稱帝德曰臨下以簡御衆以寬又曰好生之德洽於民心兹用不犯於有司夫民至不犯其治蔑以加矣而實感格於好生之主德斯豈非用簡與寬之效哉降自三代漢之文帝唐之太宗咸遵斯道故一時幾於刑措其他英察者或流為束濕綜核者或入於煩苛法令滋章馴致衰亂此皆未明於易簡近民之道者也易曰易則易知簡則易從易知則有親易從則有功而大學之言潔矩本之以所好所惡孟子之原得民心亦歸之於與聚勿施合聖賢諸說推之總不外因民之心以為凖然則易簡者近民之實而近民者王道之㫖歟業廣惟勤論蓋聞天運於上則四時不忒而歲功成故自開闢以來陽變隂合屈伸往來無一息之或停而後氣化周流亭毒萬物髙下散殊俾之各得其所行健故也代天工以理萬物者亦若是而已矣周官之戒卿士曰業廣惟勤即虞帝之廷賡歌交贊亦曰率作興事屢省乃成書又曰弗謀胡獲弗為胡成聖賢之言固先後同揆也國家稽古建官雖職有繁簡秩有崇卑而設一官則必有一官之事規條待其整理吏胥式其言動百姓視其董率要未有不以黽勉奮迅而成惰窳偷安而敗者也古之官針曰卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安豈不在於能勤哉惟勤則能豫豫則臨事有寬裕之體而不困於煩劇惟勤則能審審則事機有坐照之明而不至於暗汶惟勤則志氣日新而可以振闒冗之習惟勤則心思日用而可以生智勇之才以之治事則官無廢事以之臨民則民無失職業之廣也斷在乎是此固庶司百職所同然而况卿士為振綱挈領之人尤所當自勵者哉推而廣之凡士農工賈皆各有當勤之業士而不勤則學殖落而日即於荒陋矣農而不勤則耕穫失其時八口不能飽矣工賈而不勤則居肆之業荒懋遷之功弛無以牽車牛而致洗腆矣尚何以望其業之成哉朕嘗覽古人之言曰自朝至於日中昃不遑暇食又曰不寶尺璧而寶寸隂實惟勤之一言通貴賤上下而一之者也故因而論列之廉靜論嘗讀漢詔有曰吏不廉平則治道衰又曰俗吏矯飾外貌似是而非安靜之吏悃愊無華日計不足歲計有餘善哉廉靜之言立身行已之大端制事理物之要道凡為學者皆宜然也况人臣之䇿名委贄任職臨民者乎蓋禮義廉恥管子所謂國之四維夫廉者四維之一而已矣然未有秉禮守義知恥而不廉者也自為吏者有貪私之實而後重廉潔之名故尤以廉為貴何則廉則有所不取有所不取則有所不為凡無禮無義無恥者皆所不為者也吏茍廉矣則奉法以利民不枉法以侵民守官以勤民不敗官以殘民民安而吏稱其職矣吏稱其職而天下治矣故吏尤以廉為貴也夫有所不取之謂廉有所不為之謂靜惟廉故靜未有不廉而能靜者也既能廉而靜矣則有所不為也而後可以有為舉凡利於民者行之必力病於民者除之亦必力事治而民安無非靜也夫豈優游自私保利祿而不恤民事之謂靜乎故凡博安靜之名不可謂之真能安靜猶之博廉平之名者不可謂之真能廉平者也昔人有言曰古之清勤為國修政今之清勤為身修名夫為國修政者忠於君為身修名者私於已臣之事君與君之待臣貴其忠於君乎貴其私於已乎故願天下為真廉吏斯能為真安靜之吏蓋久矣厪於懷也因讀漢詔故遂論之如此說為學如鍊金說伊尹之告太甲曰德無常師主善為師善無常主協於克一先儒釋之以為學未有得不可執一定之見德無常師泛觀而博取也學既有得不可無一貫之理協於克一反觀而約求也昔人有云聖人之取善如冶人之鍊金或取於沙或取於水初無定在所謂德無常師也逮既鍊焉沙者忘其為沙水者忘其為水但見其為精純之金所謂協於克一也其喻可謂至明切矣而猶惜其㫖之未暢也蓋金之在礦也其為沙礫者恆多其為金者恆少此猶繼善成性之後天事漸漓人心危而道心微也及夫金之在冶其質判矣然必汰其非金者而存其是金者此猶人之氣禀不能無殊善不善之數常雜揉而互勝而研辨之功則在乎去不善以存其善也至於就冶之後則所見無非金者然金猶有上下之品必淬之鑠之以務底於精然後為鏐為鐐者出焉此猶衆善會歸之後吾以一心統其全於萬事萬物之理一以貫之是純粹之至一之極也昔揚雄之言因鑄金而得鑄人久矣金之說之通於道也然自非深於學者其孰能知之哉操舟說器之利用而致逺者陸行莫如車水行莫如舟舟之為用也逸於車而險或過之若享其逸而不入於險則恃乎操舟者之有其道也當夫水石擊撞波濤怒飛回帆如騖驟合若離此非其巧之為乎至如浮滄溟駕虞淵歷艨艟如袵席泛浩瀚以洄沿此非其習之然乎若或凌萬頃之中流驚颶風之四集檣楫欹傾徒侶失色巧者不及施習者不及試斯時也惴惴然有胥溺之憂自非備之以至豫而持之以至慎殆鮮克濟事焉蓋其所為巧與習者藝也而其所為豫且慎者道也易曰濡有衣袽終日戒詩曰紼纚維之言其豫也言其慎也朕南巡江淮間見操舟者茍備之豫而持之慎矣雖大舟罔弗如其意之所欲為焉茍備之不豫而持之不慎舟雖小亦不能勝任而愈快也夫舟一器操舟一藝耳猶必有道持之以不至於敗况居天下之大器者哉揚子有言乘國者其如乘航乎航安則民安矣此物此志也製硯說盛京之東砥石山麓有石礧礧質堅而溫色緑而瑩文理燦然握之則潤液欲滴有取作礪具者朕見之以為此良硯材也命工度其小大方圓悉凖古式製硯若干方磨隃糜試之逺勝緑端即舊坑諸名産亦弗能出其右爰裝以錦匣臚之棐几俾日親文墨寒山磊石洵厚幸矣顧天地之生材甚夥未必盡見收於世若此石終埋沒於荒烟蔓草而不一遇豈不大可惜哉朕御極以來恆念山林藪澤必有隱伏沉淪之士屢詔徵求多方甄録用期野無遺佚庶愜愛育人材之意於製硯成而適有會也故濡筆為之說解鄉舉里選解取士之途古今異制得失之數可考而知也古者大司徒以三物教萬民而賓興之德行居其二而藝居其一五禮六樂之文不先於知仁聖義孝友睦姻也春秋衰世齊桓霸主而國語所載正月之朝親問鄉長猶必以慈孝賢仁為選首此古人鄉舉里選之法惇本而崇實得人所以盛也自科舉之法行上之所以求士與士之所以自見相率而趨於記誦之學文辭之末由是古制大變而得人之效衰矣夫十步之間必有茂草十室之邑必有俊士天之生材豈以世為厚薄而後世之人材寖不及古者法使之然也然欲盡廢貢舉而復鄉舉之舊又有所不可蓋古之風俗純茂人心質朴故匹夫有善可得而舉有不善可得而誅選舉一出於至公而無狥名失實之患後世文巧日勝澆競滋多徵賁者或由於勢利之交簡斥者或出於愛憎之口此九品中正之法所以終不可行也雖然貢舉之不可廢者勢也非法之盡善也必也慎簡有司嚴立程品取實學而汰勦說崇雅正而削浮夸矯鑒其前違而課責其後效以無失乎聼言觀行之意則庶乎其可以得人矣四維解管子曰國有四維一曰禮二曰義三曰廉四曰恥又申言之曰禮不踰節義不自進廉不蔽惡恥不從枉柳宗元著四維論以為彼所謂廉者不蔽惡也世之所謂廉者不茍得也彼所謂恥者不從枉也世之所謂恥者羞為非也不蔽惡者豈不以蔽惡為不義而去之乎不茍得者豈不以茍得為不義而不為乎至於不從枉與羞為非皆然則廉與恥義之小節不得與義抗而為維嘗求其說而為之解曰論其統體人茍能以禮義自守未有不能以廉恥自防者則是廉恥即在禮義之中也而論其節目人若視廉恥為小節則已踰禮義之大間是言禮義不得不竝舉廉恥也今有人焉責人曰是無禮義者則其人之賢者不能不以動其心而不肖者亦或不以介其意矣動其心者則將勉而益進於善不以介其意者則將以為固然而安於不肖之為又或責人曰是無廉恥者則其人之强者必拂然怒於其色而弱者亦必戄然懼於其中矣怒於色與懼於中者皆動其心而勉為善者之機也是何也廉恥之名視禮義之名為尤切無廉恥之名視無禮義之名為尤不可居也故言禮義而竝言廉恥可以警動天下而興起其為善去惡之心是管子之意也皇清文頴卷首一欽定四庫全書皇清文頴卷首二聖祖仁皇帝御製文序日講四書解義序朕惟天生聖賢作君作師萬世道統之傳即萬世治統之所繫也自堯舜禹湯文武之後而有孔子曽子子思孟子自易書詩禮春秋而外而有論語大學中庸孟子之書如日月之光昭於天嶽瀆之流峙於地猗歟盛哉蓋有四子而後二帝三王之道傳有四子之書而後五經之道備四子之書得五經之精意而為言者也孔子以生民未有之聖與列國君大夫及門弟子論政與學天德王道之全修已治人之要具在論語一書學庸皆孔子之傳而曽子子思獨得其宗明新止至善家國天下之所以齊治平也性教中和天地萬物之所以位育九經達道之所以行也至於孟子繼往聖而開來學闢邪說以正人心性善仁義之㫖著明於天下此聖賢訓辭詔後皆為萬世生民而作也道統在是治統亦在是矣歷代賢哲之君創業守成莫不尊崇表章講明斯道朕紹祖宗丕基孳孳求治留心問學命儒臣撰為講義務使闡發義理禆益政治同諸經史進講經歷寒暑罔敢間輟兹已告竣思與海內臣民共臻至治特命校刋用垂永久爰製序言辨之簡首每念厚風俗必先正人心正人心必先明學術誠因此編之大義究先聖之微言則以此為化民成俗之方用期夫一道同風之治庶幾進於唐虞三代文明之盛也夫日講書經解義序天生民而立之君非特豫以崇髙富貴之具而已固將副教養之責使四海九州無一夫不獲其所也是故古之帝王奉若天道建都樹屏以立其綱設官置吏以張其紀經天緯地以盡其才親親尊賢以𢎞其業黎民阻饑而為之教稼五品不遜而為之明倫為禮樂以導其中和為兵刑以息其爭訟事未然而預為之備患已至而亟為之驅蓋治天下之法見於虞夏商周之書其詳且密如此宜其克享天心而致時雍太和之效也所以然者蓋有心法以為治法之本焉所謂敬也誠也中也敬則神明有主而物欲不能搖誠則孚信在中而僞巧不能間中則公正無偏而邪說不能移凡書中曰欽明曰寅恭曰祗懼曰迪畏皆敬之屬也曰允塞曰至諴曰一德曰惇信皆誠之屬也曰義制事禮制心曰沉潛剛克髙明柔克曰寬而有制從容以和皆中之屬也性之者為堯舜禹文身之者為湯武髙宗困而學之者為太甲成王悖而去之者為太康桀紂嗚呼心法之存亡治道之升降分焉天命之去留繫焉曷其奈何弗鍳朕萬幾餘暇讀四代之書惕若恐懼爰命儒臣取漢宋以來諸家之說薈萃折衷著為講義一十三卷逐日進講兹特加鋟梓頒示臣民俾知朕仰法前代聖王志勤道逺然夙夜兢兢思體諸身心措諸政治以母負上天立君之意夫豈敢一日忘哉是為序日講詩經解義序昔者虞廷命后䕫為典樂之官以教胄子首詔之曰詩言志則詩之為教所從來逺矣蓋人性情之發不能無所寄託而詩則兼備六藝諷誦吟咏之間足以觀感而興起者莫善於此故曰溫柔敦厚詩教也自夫子刪定而後三百篇之㫖粲然其採之里巷者則為風陳之朝廷者則為雅薦之郊廟者則為頌觀其美刺而善惡之鑒昭矣觀其正變而隆替之治判矣觀其升歌於廟朱絃象管之所唱歎而祖功宗德之具在矣千載而下猶得見江漢之遺風豳岐之故俗關雎麟趾之化矇瞍七月之針天保鹿鳴堂陛賡揚之盛清廟閟宫歌雍舞勺之章皆賴此三百篇之存安可不沉酣優渥於其間哉朕嘗思古人立訓之意既有政教典禮紀綱法度以維持之矣而感通乎上下之間鼓舞於隱微之地使人從善逺惡而不知優游順適而自得則必賴乎詩如天之生萬物也日以烜之雨以潤之露以濡之雷霆以肅之而又必宣暢八風以疏通而條達之然後萬類咸遂其生養而無促迫矯强之弊故教至於詩而微矣治至於詩而極盛矣朕志慕隆古淳穆之理崇奬詩教爰命儒臣輯成詩經講義日進於坐隅朝夕觀覽凡立說一凖於考亭而旁搜義藴兼及注疏博綜名物亦參爾雅又思夫子平日雅言之教稱引誦說惟詩最多如大學中庸孝經篇末必引詩以詠歎之亦以見古人之斯須不離乎此也朕亦欲四海臣民謹思貞度以揚風扢雅之學偕進於溫厚和平之教故序而頒之此則朕之所深望也夫日講禮記解義序朕聞六經之道同歸而禮樂之用為急孔子曰安上治民莫善於禮又曰上好禮則民莫敢不敬誠以禮者範身之具而興行起化之原也天之生人品類紛綸莫可紀極聖人起而整齊之法於天則於地順於人達於時協於鬼神斟酌損益以定其品節限制俾天下化其好逸惡勞之心而豫以從善棄惡之道蒸蒸焉日蹈履於中正而不敢越蓋非有以强之也率乎其理之所安而已其綱有三百其目有三千大者在冠昏喪祭朝聘射宴之規小者在揖讓進退飲食起居之節循之則君臣上下賴以序夫婦內外賴以辨父子兄弟婚媾姻婭賴以順而成反是則尊卑易位等殺無章家未有能齊而國未有能治者故曰動容中禮而天德備矣治定制禮而王道成矣嘗遐觀三代禹湯文武惇叙彜典以倡導天下而其時之諸侯秉禮以守其國大夫士遵禮以保其家下至工賈庶人畏法循紀以世其業嗚呼何風之隆哉朕企慕至治深惟天下歸仁原於復禮故法宫之中日陳禮經講習納繹蓋不敢斯須去也慨自嬴秦焚燒典籍禮乃滅亡漢興崇尚儒學禮經始顯傳之者十三家而戴德戴聖為尤著聖所傳四十九篇即所謂禮記者是已逮程子朱子出表章學庸遂開千古道學之統其餘四十七篇雖雜出於漢儒亦皆傳述聖門格言有切身心要㫖朕孰之復之靡間寒暑積有講義裒成全部辨以序言用以無忘斯勤然豈徒效儒生占畢云爾哉務佩服其訓詞而實體諸躬修措之邦國使百爾懷恭敬遜讓之誠兆庶凛撙節防間之則德化翔洽上嫓隆古庶乃愜朕敦崇禮教之意也夫孝經衍義序朕緬維自昔聖王以孝治天下之義而知其推之有本操之有要也夫孝者百行之原萬善之極書言奉先思孝詩言孝思維則明乎為天之經地之義人性所同然振古而不易故以之為已則順而祥以之教人則樂而易從以之化民成俗則德施溥而不匱帝王奉此以宰世御物躬行為天下先其事始於寢門視膳之節而推之於配帝饗親覲光揚烈諴萬民而光四海皆斯義也孔子教孝之言散見於冊籍而統㑹於孝經曽子以純孝親承斯訓其辭約其指逺條貫終始綜括羣論言孝之義於斯為備自顔芝藏本出於漢初考注箋釋代有其人如孔安國鄭康成皇侃邢昺輩無慮百餘家大約皆訓詁章句辨論古今文同異而求其推擴義藴達之於萬事萬物而皆莫出其範圍者則尚未之備也世祖章皇帝𢎞敷孝治懋昭人紀特命纂修孝經衍義未及成書朕纘承先志詔儒臣搜討編輯倣宋儒真德秀大學衍義體例徵引經史諸書以旁通其說竊以仲尼稱至德要道以順天下又曰教之所由生而後詳列天子諸侯卿大夫士庶人之五孝此則一經之大㫖亦猶大學之言明德新民格致誠正修齊治平也是故衍至德之義則仁義禮智信之說備矣衍要道之義則父子君臣夫婦昆弟朋友之倫備矣衍教所由生之義則禮樂刑政之屬備矣衍五孝而皆以愛敬為本明貴賤之所同也由天子之敬親推之則郊丘宗廟典禮之義備矣由天子之愛親推之則仁民育物撫綏愛養之義備矣無非敬也無非愛也即無非孝也遞而至於諸侯之不驕不溢卿大夫之法服法言法行士庶人之忠順事上謹身節用何一非愛敬之義推而極之通於神明貫乎天地夫寧有涯際乎哉書成凡一百卷鏤板頒行竝製叙言冠於簡端庶幾嘉與海內共遵斯路家修子弟之職人奉親長之訓協氣旁流休風四達以成一代敦厚鴻龎之治斯則朕繼述先烈尊經崇本之志也夫日講通鑑解義序史之有傳其體有二紀事編辭發凡起例而褒貶之意寓於言外俟觀者深思而自得此左氏之傳也涑水之資治通鑑宗之據事以斷是非原心以定功罪豫奪之不可假如折獄然此公榖之傳也崇安之春秋傳宗之二者鈌其一則史學不備朱子作通鑑綱目綱倣春秋目倣丘明羅十七代紀載之文治以二百四十年褒貶之法論者謂接統春秋不虛也朕勤求治道涵泳六經之餘樂觀前代興衰得失之蹟故通鑑一書披覽未嘗去手顧其間論斷者人各置喙間亦有當於作者之意而未能折衷於中而斷於一乃命儒臣倣胡安國之體法春秋之義撰次為文依日進講寒暑無間積嵗月而成編朕惟東周以前無史而有史蓋古史之精意已大備於尚書故春秋紀十二公之事猶然二帝三王之心法也威烈以下無春秋而有春秋蓋綱目之作上接夫麟經故雖班范諸史之文實魯史筆削之遺意也而世道之升降政治之隆汙於是乎在夫危微治忽之介判於毫芒而相懸遂至於遼絶當時或未及見而後之觀者瞭然此不可不審其幾而深究其所以然也是以論古人之行事既貴其所見之至明尤貴其居心之至公蓋善論古者如水然人毋鑑於流水而鑑於止水水無成形於中故妍媸畢見於外無成形者何公而已矣水之無成形猶人之無成心也無成心者何公而已矣夫公者三代大道之行而萬世法戒之權衡也朕讀史嘗著緒論一編實本至公之意期於至當之歸而於日講一書又以此諄諄申命儒臣既卒業將以刋於袐府頒之羣工大經大法或勸或懲燦然畢具其有裨於經世豈淺鮮也歟文獻通考序朕惟治天下之道莫詳於經治天下之事莫備於史人主總攬萬幾考證得失則經以明道史以徵事二者相為表裏而後郅隆可期經史而外編纂之書不啻百家其溯委窮源足資化理而部分類别便於覽觀者莫善於宋儒馬端臨所輯文獻通考一書以古為鍳則取諸文以人為鍳則取諸獻一展卷間而上下千餘年貢賦之贏絀人才之進退規制之沿革禮樂之廢興輿圖之險易災祥之感召是非隆替瞭如指掌可以為考鏡之林稽古之助矣間嘗披覽史冊漢唐以降代有誼辟以彼更絃易轍鮮不各有張弛然而法立弊滋罕臻盡善豈非博綜往事曲協時宜之為難歟語曰有治人無治法又曰師古者師其意不師其跡今歷代之已事具在自唐虞以迄宋季中間因時適變義例棼如詳考事理之源流參以諸儒之論說雖神而明之存乎其人然率循舊章斟酌損益端於是書有藉焉流傳嵗久版籍殘缺特命禮臣重加補訂俾成完書朕聽政之餘時勤乙覽爰製序於卷端以昭示海內凡我庶府諸司尚其共討舊聞與治同道庶稱朕表章之意也夫幸魯盛典序朕惟自古帝王聲教翔洽風俗茂美莫不由於崇儒重道典學右文用能發詩書之潤澤宣道德之閫奧推厥淵源皆本洙泗以故追崇之典歷代相仍或躬詣闕里修謁奠之儀潔志肅容盡誠備物其間禮數隨世損益至於希風服教百代式型異世同揆莫之或二猗歟盛矣朕臨御以來垂三十載溯危微之統緒念生安之聖哲恆慮凉薄未克祗承用是夙夜單心孜孜不倦惟我至聖先師孔子配天地參隂陽模範百王師表萬祀朕每研搜至道涵泳六經覺憲章祖述刪定贊修之功日星揭而江河流私心嚮往竊有願學之志焉乃者東巡踰泰岱涉泗沂遂詣闕里親行釋奠得瞻廟貌仰聖容以為德盛功隆欽崇宜極凡厥典禮有加前代又親製文辭手書以勒之貞石務用導揚至教風示來兹夫緬懷曩哲繼躅前賢猶思覩其物采接其居處况先師遺風餘烈久而彌新重以朕之寤寐羹墻僾乎如見及過杏壇相圃之間山川儼然檜楷如故髣佛金石絃誦之聲聞於千載而上流連往復不能自已也衍聖公孔育圻上疏陳謝且以禮儀隆重非直一家榮遇請修幸魯盛典一書朕既可其奏久之書成復請叙言以冠其端朕萬幾餘晷敦勉弗遑實欲默契先師尊聞行知於以阜物諴民風同道一庶幾躋世運於唐虞登治術於三古是書也豈徒使天下後世知朕於先師欽慕無已如此且愈以見聖人之道覆幬羣倫苞育萬象即凡車服禮器之遺皆足令人感發而興起也故賜之序南巡詩序朕念切民依咨詢幽隱於二十八年春再舉南巡爰自畿甸東臨齊魯沿泝江淮達於吳越曩者甲子之歲輿衛所經瞻顧閭閻觀省謡俗憫懷澤國軫恤羣黎未嘗一日忘於朕心已嘗形諸篇詠載前集中今兹重歷郡邑見民物漸殷生業就理逺勝曩時中心慰悅又不禁吟咏及之途中停警撤蹕欲以洞悉輿情數千里間百姓歡躍載路星攢雲集瞻依愛戴發於至誠朕自維化理何以克洽民情益用是欿然也乃於巡歷所至沛膏澤飭官方戒民俗修典禮經武備覽河防施諸事矣又發諸言或御帳殿或撫船窗吟咏所及性情在焉古人云詩言志凡朕篇章所寓時以民生風化倦惓為念即間於眺覽之際抒寫景物指顧河山要其寄託則自有在也因裒而集之為南巡詩一卷云耕織圖序朕早夜勤毖研求治理念生民之本以衣食為天嘗讀豳風無逸諸篇其言稼穡蠶桑纎悉具備昔人以此被之管絃列於典誥有天下國家者洵不可不留連三復於其際也西漢詔令最為近古其言曰農事傷則饑之本也女紅害則寒之原也又曰老耆以壽終幼孤得遂長欲臻斯理者舍本務其曷以哉朕每巡省風謡樂觀農事於南北土疆之性黍稌播種之宜節候早晚之殊蝗蝻捕治之法素愛咨詢知此甚晰聽政時恆與諸臣工言之於豐澤園之側治田數畦環以溪水阡陌井然在目桔橰之聲盈耳歲收嘉禾數十鍾隴畔樹桑傍列蠶舍浴繭繅絲恍然如茆簷蔀屋因構知稼軒秋雲亭以臨觀之古人有言衣帛當思織女之寒食粟當念農夫之苦朕惓倦於此至深且切也爰繪耕織圖各二十三幅朕於每幅製詩一章以吟咏其勤苦而書之於圖自始事迄終事農人胼手胝足之勞蠶女繭絲機杼之瘁咸備極其情狀復命鏤板流傳用以示子孫臣庶俾知粒食維艱授衣匪易書曰惟土物愛厥心臧庶於斯圖有所感發焉且欲令寰宇之內皆敦崇本業勤以謀之儉以積之衣食豐饒以共躋於安和富壽之域斯則朕嘉惠元元之至意也夫御選唐詩序古者六藝之事皆所以涵養性情而為道德之助也而從容諷詠感人最深者莫近於詩故虞廷典樂依永和聲帝親命焉成周時六義領在樂官而為教學之先務自三百篇降及漢魏六朝體製遞增至唐而大備故言詩者以唐為法其時選本如河嶽英靈中興間氣御覽才調諸集其所收擇各有意指而觀者每有不遍不該之歎朕萬幾餘暇留意篇什廣搜博採已刻全唐詩集而自曩昔披覽嘗取其尤者彚為一編古風近體各以類相從計三十二卷蓋討索貴於詳備而用以吟咏性情則當挹其精華而潄其芳潤每當臨朝聽政巡行獮狩之餘展卷留連未嘗不悠然而有得也因命儒臣依次編注朕親加考訂一字一句必溯其源流條分縷析其有徵引訛誤及脫漏者隨諭改定逾歲告成因付開雕以示後學孔子曰溫柔敦厚詩教也是編所取雖風格不一而皆以溫柔敦厚為宗其憂思感憤倩麗纎巧之作雖工不録使覽者得宣志達情以範於和平蓋亦用古人以正聲感人之義記有之君子在車則聞鑾和之音行則鳴珮玉是以匪辟之心無自而入也審此而朕之寄意於詩與刋布是編之指俱可得而見矣是為序記泉林記朕被服至道誦法孔子於詩書簡冊之中羮牆載見如聞其言論而接其聲容者匪伊朝夕矣嘗以不得一登闕里之堂觀其車服禮器山川風物慨然至聖之音徽每低佪於中而不能自已乃者在廷之臣咸謂古者天子巡省方嶽觀察民俗朕俞其請因念岱宗在望于邁魯郊夙昔所懷今兹可慰歲之冬月輿衛北還抵於泗水東境距其縣治五十里陪尾山之陽衆泉出焉石竇㟏岈清流蕩潏下合沂泗逺波悠然相傳為子在川上處云旁有古寺厥名泉林陂陀幽曠樹木茂密雖古今異時陵谷不改去聖人之居如此其近意者當必杖履所經周覽原泉默契道體喟然發水哉之歎者其即斯地耶於是停驂弭節瞻眺久之恍乎如有所得殆移晷而後去也夫天地無終窮流水之出於天地者亦無終窮聖人之道川流敦化萬古不息與天地流水同其無終窮焉其何能已於豫懷耶孔子之繫易其言天也曰行健言地也曰無疆孟子之言水也曰盈科而後進君子之於聖人之道也溯源窮流學水至海亦若是焉而已矣朕既幸宮牆親覿至止非遙而又喜泉源勝地聖跡所存而得游歷其處也遂為之記暢春園記都城西直門外十二里曰海淀淀有南有北自萬泉莊平地湧泉奔流㶁㶁滙於丹陵沜沜之大以百頃沃野平疇澄波逺岫綺合繡錯蓋神臯之勝區也朕臨御以來日夕萬幾罔自暇逸久積辛劬漸以滋疾偶緣暇時於兹游憩酌泉水而甘顧而賞焉清風徐引煩疴乍除爰稽前朝戚畹武清侯李偉因兹形勝構為别墅當時韋曲之壯麗歷歷可考圯廢之餘遺址周環十里雖歲逺零落故蹟堪尋瞰飛樓之鬱律循水襤之逶迤古樹蒼藤往往而在爰詔內司少加規度依高為阜即卑成池相體勢之自然取石甓夫固有計庸畀直不役一夫宮館苑籞足為寧神怡性之所永惟儉德捐泰去雕視昔亭臺丘壑林木泉石之勝潔其廣袤十僅存夫六七惟彌望漣漪水勢加勝耳當夫重巒極浦朝烟夕霏芳蕚發於四序珍禽喧於百族禾稼豐稔滿野鋪芬寓景無方㑹心斯逺其或穱稌未實暘雨非時臨陌以閔駢胝開軒而察溝澮占離畢則殷然望詠雲漢則悄然憂宛若禹甸周原在我户牖也每以春秋佳日天宇澄鮮之時或盛夏鬱蒸炎景爍金之候機務少暇則祗奉頤養游息於兹足以迓清和而滌煩暑寄逺矚而康慈顔扶輿後先承歡愛日有天倫之樂焉其軒墀爽塏以聽政事曲房邃宇以貯簡編茅屋塗茨略無藻飾於焉架以橋梁濟以舟楫間以籬落周以繚垣如是焉而已矣既成而以暢春為名非必其特宜於春日也夫三統之迭建以子為天之春丑為地之春寅為人之春而易文言稱乾元統天則四德皆元四時皆春也先王體之以對時育物使圓頂方趾之衆各得其所跂行喙息之屬咸若其生光天之下熙熙焉皥皥焉八風罔或弗宣六氣罔或弗達此其所以為暢春者也若乃秦有阿房漢有上林唐有繡嶺宋有艮嶽金釭璧帶之飾包山跨谷之廣朕固不能為亦意所弗取朕匪敢希蹤古人嫓美曩軌安土階之陋惜露臺之費亦惟是順時宣滯承顔致養期萬類之乂和思大化之周浹一民一物念兹在兹朕之心豈有已哉於是為之記而系以詩詩曰昔在夏姒克儉卑宮亦越姬文勿亟庶攻若稽古訓是欽是崇針銘户牖夙夜朕躬棟宇之興因基前代巗宿丹霞檐棲翠靄營之度之以治蕪廢有沸泉源汪濊斯在駕言西郊聊駐綵斿甘彼挹酌工築斯謀瑩徹明鏡縈帶芳流川上徘徊以泳以游因山成峻就谷斯卑咨彼將作毋曰改為松軒茅殿實惟豫宜亦有朴斫豫尚念兹撰辰經始不日落成豈曰游豫燕喜是營展事慈闈那居髙明遐矚俯瞰聊用娛情粵有圖史藏之延閣惟此大廡㑹彼朱襮鬱鬱溝塍依然耕鑿無假人工渺瀰雲壑有鷁其舟有虹其梁可帆可涉於焉徜徉文武之道一弛一張退省庶政其罔弗臧嘗聞君德莫大於仁體元出治於時為春願言物阜還使俗醇暢春之義以告臣鄰碑文至聖先師孔子廟碑朕惟道原於天𢎞之者聖自庖犧氏觀圖畫象闡乾坤之祕堯舜理析危微厥中允執禹親受其傳湯與文武周公遞承其統靡不奉若天道建極綏猷敻乎尚矣孔子生周之季韋布以老非若伏羲堯舜之聖焉而帝禹湯文武之聖焉而王周公之聖焉而相也巋然以師道作則與及門賢哲紹明絶業教思所及陶成萬世伏羲堯舜禹湯文武周公之統惟孔子繼續而光大之矣間嘗誦習詩書之所刪述大易之所演繫春秋之所筆削禮樂之所修明本末一貫根柢萬有殆與覆載合其德日月竝其明四時寒暑協其序焉故曰仲尼之道一天道也朕敬法至聖景仰宮牆嚮往之誠弗釋寤寐歲甲子十有一月時邁東魯躬詣曲阜展修祀事復謁聖墓循撫松栝儀型在望僾乎至德之親人也朕忝作君啓牖下民深惟夫子師道所建百王治理備焉舍是而圖郅隆曷所依據哉因勒文於石彰朕尊崇聖教以承天治民之意系以辭曰遐哉三五維辟之式於皇尼山師道允植天畀木鐸覺彼羣生百行以正六籍以明賢邁唐虞聖則河洛綏和動來文博禮約性天峻極倫教孔彰學昌洙泗統歸素王炎漢崇儒少牢用饗厥後賢君髙山是仰豫懷至聖蒞彼東方音徽云邈道德彌光鬱鬱塋林峩峩祠殿企慕安窮羮牆如見泰岱匪髙東海匪深敬揚懿軌終古式欽平定朔漠告成太學碑惟天盡所覆海內外日月所出入之區悉以畀豫一人自踐阼迄今蚤夜殫思休養生息冀臻熙皥以克副維皇大德好生之意庶幾疆域無事得以偃兵息民乃厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外復狡焉肆其凶逆犯我邊鄙虐我臣服人用弗寧夫蕩寇所以息民攘外所以安內邊寇不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢涉寒暑勞苦艱難與偏裨士卒共之逮彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事乃蠲釋眚災潔祀禋望為億兆祈升平之福而廷臣請紀功太學垂示來兹朕勞心於邦本嘗欲以文德化成天下顧兹武略廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宮之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽俎之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祗歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之㫖為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮墻寤寐永矢下念民瘼上承帝謂四海無外盡隸侯尉維彼凶醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼游魂險逺是怙震以德威可往而取朕志先定龜筮其依屬車萬乘建以龍旗祝融驂鸞風伯戒塗宜暘而暘利我樵蘇大野水涸川瀆效靈泉忽自涌其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣自掩五日窮追彼狂走險大殲於路波血其孥翦其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮寇昏惑不悔我編我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉歲晏來歸春與之期春風飄翩揚我斾旓我今于邁如涉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降凶罰孤雛就羈三駕三捷封狼輿尸既臘梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同採芹採藻頌興東魯車攻馬同亦鐫石鼓師在安民出非得己古人有作昭示斯㫖緬維虞廷誕敷文德聖如先師戰慎必克惟兵宜戢惟德乃綏億萬斯年視此銘詞東嶽廟碑文京師朝陽門外向有東嶽廟自元明迄今歷有年所康熙三十七年居民不戒而燬於火其明年朕發廣善庫金鳩工庀材命和碩裕親王董其事不勞一民不興一役經始於三十九年三月訖工於四十一年六月不三歲而落成殿閣廊廡視舊加飭焉夫五嶽為名山之長而泰山尤羣嶽之宗於時為春於德為仁而其神之靈又能膚寸成雲霖雨天下故諸嶽止祀於其方而泰山之祠遍宇內崇德報功所從來久矣朕即位以來殫心治理訪求民隱閲視河工屢經魯地皆命專官致祭凡以為蒼生祈福祉也兹朝陽既都城之巽位而東嶽廟又適在其地則因其方位之宜以隆望秩之典亦禮之可以義起者然則斯廟之成也神既得所憑依而民亦遂其瞻仰自兹以往風雨以節寒暑以時俾海宇得休養生息以共樂於豐穰之世庶於朕四十餘年惠愛黎元之意其稍有慰乎爰書重建之歲月以昭示來兹云爾彚宗寺碑文我國家承天順人統一寰宇薄海內外悉賓悉臣自太祖太宗握樞秉軸駕馭風雲䝉古諸部相繼效順暨於朕躬克受厥成前所未格罔不思服惟喀爾喀分部最多而又强盛朕綏德輯威薰陶漸革二十餘載七家之衆既震且豫咸來受吏乃除其頑梗扶其良弱錫之封爵卑以土疆朕親北巡以鎮撫之於康熙庚午之秋大宴賚於多倫諾羅四十八家名王君長世官貴族靡不畢集拜觴起舞稽首踴躍蓋至是而要荒混同中外一家矣酺賜既畢合詞請曰斯地川原平衍水泉清溢去天間芻牧之場甚近而諸部在瀚海龍堆之東西北者道里至此亦適相中而今日之筵賞敷錫合萬國以事一人又從古所無也願建寺以彰盛典朕為之立廟一區令各部落居一僧以住持朕或間歲一巡諸部長於此㑹同述職焉至於今又二十餘年矣殿宇廊廡鐘鼓臺閣日就新整而居民鱗比屋廬望接儼然一大都㑹也先是寺未有額兹特允寺僧之請賜名曰彚宗蓋四十八家家各一僧佛法無二統之一宗而㑹其有極歸其有極諸䝉古恪守侯度奔走來同猶江漢朝宗於海其亦有宗之義也夫是為之記以垂永久云皇清文頴卷首二欽定四庫全書皇清文頴卷首三聖祖仁皇帝御製文雜著讀大學自古治道盛於唐虞而其所以為治之道即其所以為學之功後世聖人紹眀厥緒以詔來者雖渺然千百載其大義微言豈有殊指哉大學首言眀德新民誠不異於堯典所言固可因以推論其符合之故而溯其所由致力之端矣堯典曰克眀俊德以親九族九族既睦平章百姓百姓昭眀協和萬邦黎民於變時雍大學之言眀德新民曰格物致知誠意正心修身齊家治國平天下此所謂先聖後聖若合符節者歟其言克眀俊德者統言之也猶大學言眀眀德也格物致知誠意正心修身者分言之也而堯典闕然未眀其義蓋嘗以是而求之書曰人心惟危道心惟微惟精惟一允執厥中則其所以致力之端不外是矣夫曰惟危曰惟微則辨之不可不早辨所貴致其知矣曰惟精則格物之謂也知之既極其眀則守之貴極其誠曰惟一則誠意之謂也以至正心修身皆主於一而允執厥中之義以全繼此而家齊國治天下平胥於此受裁成焉孰謂十六字之心傳不可以括大學之全書歟朕於帝王修已治人之道雖日加自勵而未之有得念大學所由致力之端而合之堯典以眀其義云讀周禮書後周禮一書先儒信者半疑者半其疑者曰周衰諸侯滅去其籍自孔子時已不具至孟子時尤殘缺莫考故曰其詳不可得而聞夫孟子當秦未燔書之前已不見周禮漢世焉得而有之且其大者莫如建官封建井田諸事然東西都為地甚狹何得王畿道里四方各距千里宫府內外官制何得比夏商遂益萬倍五等封地何所並徙而能斥大九州溝洫井田鄉遂公邑何以利害同而法制異其為後儒僞造之書而非周公之舊也其信者曰周禮寓兵農則以井田定惟正則以什一教萬民則以鄉遂飬士秀則以學校治天下則以封建其要有六典八法八則九柄九貢九式之序其次有祭祀朝覲冠昏喪紀師田行役之條無不詳備周密雖其間細瑣職事或出後人附㑹然大體要所在非聖人創建不能也朕謂二說皆儒者讀書考究之言未可偏廢若夫帝王法古致治總在師其意而不泥其迹孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也夫損益者因時制宜之謂程皓曰有關雎麟趾之意然後可行周官之法度朱熹曰周禮是聖人姑為一代之法爾到可用處聖人須别有權變之道誠哉斯言夫泥其說而用之王莽王安石遂致流毒天下若師其忠厚之意以措諸紀綱法制之中則何遂不可比隆成周朕故以孔子及程朱之言為讀周禮法七詢體元主人膺期運撫寰海紀星次者垂七十年臨雲陛者周六十載常以薰風應律梅雨戒塗駐蹕興州之域棲神無暑之區追疇昔感居諸意怫鬱乎其不舒也自冲嵗承基弱齡親政敬天眀威察民視聽夙寤晨興慮慚前聖更歷多艱無忘執競有若三藩叛命尾大必芟氛連海嶠烽起西南選熊虎鉏豺犴驅以雷掃以電神弧彎而天狼落枉矢飛而妖鳥散覩六幕之塵清費八年之廟算黃淮並溢决岸潰茭波漂百室道阻千艘翠華頻省橇檋周遭然後息桃花之怒浪平竹箭之驚濤人歸廬井帆接亭泉安知候之寒暑而躬之焦勞也西戎跳踉窺我藩籞張皇王師陵厲禁旅再嵗三征雲屯颷舉越瀚海度磧鹵忘渴饑均甘苦夫乃馘冒頓服侯㹪紫燕徐入朱鷺凱還雖守成而述事等締造之囏難也至於户口繁滋禆瀛表裏地震天災習聞前史豈有遐遺痌瘝在已晝膳弗甘宵眠屢起恩不踰晷澤必下行牂羊靡歎鴻鴈輟鳴民咸安其居而後釋然於中情也躬不遑息心不自逸於兹五紀常如一日內則畏天閔人勤身恤物外則沐雨櫛風衝霜犯雪擾靈府損精和榮衛結轖神氣消磨年芳冉冉星髮皤皤勞稍涉而輒倦步方跬而慮蹉思每短於再審事旋忘於既過來日不可期去日已苦多矢乾惕以時行恐菁華之莫繼彼曦輪之既中異東隅之初麗將息意而燕游凛鴻業之攸繫誡一簣之功虧寧始勤而終替疲形竭智永思長吟歷年久而慮愈逺閲事多而憂彌深冀家給而人足財未阜於虞琴語風移與俗易化未致夫儀禽慕視履之元吉知上佑之難諶其何以寬無窮之煩念發垂老之歡心於是左右侍臣文武有位二氏緇黃九流方伎奔走輦下負曝獻暄願言舒志錫福元元主人乃博采不遺從容顧問俾無忌諱各攄厥藴近侍之臣進曰竊聞帝王之為樂也祕苑閒宫遊宴有所班輸是營千門萬户閣通往來樓迷去住亭名臨月臺稱黏雨黃金作屋玳瑁為梁文榱繡栱漆瓦雕牆間以沉檀飾以璿璫曉日照而後庭流影微風起而數里聞香則有夏宫妹喜殷室有蘇異扇搖其丹鵲嬖人獻於赤烏龍漦褒艷驪戎晉姝修眀辭越夷光貢吳戚姬偏寵邢尹並都協律女弟謳者子夫帳中妝若月之蛤枕前分不夜之珠機絶巧工針神善製蟬飛薄鬢星熒髙髻思香競媚㸃膏逾麗羊車戀竹葉之扉馬射簇芙蓉之騎舍利穆婢小憐馮家蓮上玉兒桂邉麗華長蛾賜果憨女司花太真之鮮葩解語窅娘之新月乍斜莫不秀發穠姿橫生逸態顧影有雙當時無對别有班姑倢妤左姝修儀蘭英獻賦上官評詩采蘋樂府花蕊宫詞咸摛華以待詔或稱美於占辭爾其熊毛席緑象乎簟白時窺綺窗遙映紅壁鈿綴金蟲釧裁琥珀袍飛瓊以流翠裙纎綃而染碧時則蘭苕才露梧樹未霜紛瑶臺之窈窕度扣砌以徜徉喜方隅之晏清感節序之回換貴人生之行樂及良時而酣宴爰有龍膏始釀馬乳初來翠濤百榼紫霞千杯麒䏖麕髓猩脣豹胎雲鶬澤鵠淵鱗江鰓錯窮四海珍貢九垓蓐收動桂勾芒調梅於是衆伎俱陳八音齊舉笙鳴鳯翼筝移鴈柱酆琅折栁之笛朋肯催花之鼓篳篥則桃皮含商琵琶則檀槽促羽雜沓繁㑹激揚清謳新翻水調唱徹涼州韻細而唇朱微粲聲凄而眉黛暗愁隨紅牙之緩緩協赤玉之悠悠彩雲仙隊素霓舞列長裏吸華輕裾回雪叉潜搖以逐步珮徐鏘而應節翩鸞影以遙瞻希龍顔之豫悅及乎銀釭既爛銅漏猶遲惜餘歡之晼晚顧綵筆之葳蕤授簡尚宫歌以繫之歌曰拂巾接槃曲既揚妖姬素靣華月光上為衾幬衛風霜下為履綦願同行日車永永駐扶桑千秋萬嵗樂未央若此乎徴新聲選麗色蕩樂娛心不知所極今主人乃欽欽翼翼勤而不息富有萬國而寸陰是惜泊然無以為歡臞然類於山澤盍釋萬務擷衆芳暫取以為消憂之術怡神之方乎主人曰昔嘗覽乎沫水故墟驪山荒殿姑蘇之臺瓊花之觀金粉埃塵喟焉長歎厲階召禍敗德纍名宜鑑傾城之轍毋招伐性之兵年之少也不留聰眀今垂七十矣寧復溺志於色聲文學之臣進曰清眀在躬聲色不邇惟聖右文請陳皇始龍馬示象庖犧作圖繫辭贊翼三古同符邵演希夷程刋輔嗣朱集厥成推本占筮事濟民用理泄天祕百篇嬴燼及漢稍傳濟南則屬讀詰屈闕里則科斗聨蜷照乘猶遺連城斯得執簡皆聖人之徒嘉言實王者之式齊韓暨魯各以詩名毛受子夏鄭繼其聲序由衛宏疏緣劉焯自西晉以孤行至南宋而啓鑰春秋五家鄒夾無聞公榖口說左據舊文洛閩未遑張胡齊轡莫參筆削之功誰炳衮鉞之義郁郁周禮制自元公書成定鼎官補考工儀禮為經禮記為傳河間之逸者已多小戴之存者未半至若史家之體祖於典謨編年紀事左氏遺模遷承談基固纂彪業振古流芳將來取法范刪衆籍陳紀三方漢之仲季何其煒煌晉書天文淳風妙解沈約詞人宋志博采伯起撰魏子顯著齊自兹厥後僅而有稽梁陳齊周志皆無述隋書效宋五朝咸悉索頭島夷交相詆誣延夀後出南北部區唐書新修歐宋分庀視劉之舊最得統紀五季自鄶蕪而弗理卓哉廬陵庶追腐史司馬通鑑甲子是編搜積卷於祕閣陳炯戒於講筵猗綱目之大義揭羲娥以髙懸均左右史之舊職續書春秋之薪傳若乃南薰作歌晨露流詠池上答白雲之謡沛鄉起大風之興憂民魚而瓠子功成喜天馬而流沙道敻帝京十首雄氣無儔東堂三傑睿藻偏優太和之古調清峻大中之曲宴唱酬莫不包含黼黻敲戞琳璆溯敕幾之命意同卷阿以來游至於穗啓神農鸞徴少昊禹碑甚竒湯鼎為寶周穆紀日漢章名草宋文規模於子敬齊髙吐納夫僧䖍孝建之翰墨馳譽永眀之筆力象賢梁帝觀鍾繇之意陳王品嗣真之篇逮夫貞觀妙入羲域瞻屏風而歎草書登御牀而取飛白睿宗則五雲紛飄眀皇則八分英特是皆鴻騫鶴舞虎卧龍跳寄閒情於緗素絢殊采於珠韜今主人躬上聖勤下學體太極超先覺折中四府等量百王乙夜未嘗停於覽酉山無所祕其藏爰申石渠之論載廣虎觀之議考代葉之隆汙較簡冊之同異固理熟而神融非玩物而喪志也聖又多能道兼衆藝體工六文詞髙五際逄風􅕺之清暢矚川岫之澄幽拂宣毫之圓健試剡藤之剛柔月露吟而意逺烟雲落而勢遒韻金聲而玉振象日字與奎鉤豈不興酣情逸俾彌性而優游乎主人曰經觀大義母為華葉史貴徴信匪誇涉獵入聖之階梯具在臨人之鑑戒斯憑允平生之所好慮垂耄之弗勝未免披吟亦事楮墨不爭文士之長寧詡書家之則聊抒寫於一時何余情之可釋介胄之臣進曰文以飾治武乃申威雕蟲之技壯夫不為請論我國家軍容之赫赫戰功之巍巍也風后握竒力牧為將蛇鳥連營貔貅列仗殳執星廬戈環玉帳扛鼎誇雄翹關示壯甲胄則飾貝齒綴朱綅精皆浴鐡麗悉縲金百疊之蛇鱗護臂重鐶之鮫鎧當心劍㦸則蘭葉凝霜蓮花舞雪龍訝津騰鯢驚水截雍狐之鍔千攢湛盧之鋒萬列弩矢則燕山之角朔漠之蓬削夏箭規唐弓鯨牙耀日鶉尾迎風羽橫空而蝟黑鏑捲地而塵紅若乃驥産烏孫駒來赤水坰滿丹髦谷量緑耳六印聯珠三花散綺駕兹白於輈轅豢乘黃如鹿麂貢道通戎政理芻牧攸宜蕃庶莫紀爰分錦埒並鞚金羈珊瑚之鞭霞舉玫瑰之轡星馳左御周輿右陳殷輅樊纓則五色紛垂闟㦸則重牙畢駐於時塞樹初丹沙茅盡白彤雲籠帳殿之髙素月吐邉墻之隙八校清塗九斿照陌斾獵獵而穿林馬蕭蕭而度磧萬騎密布兩翼斜張火眀回野角轉遙岡陳合而潮聲乍捲圍圓而虹影何長車邉獒猛縧畔鷹蒼脛隨草偃爪挾風揚毛飄飄其漸下足躍躍而全僵於是武士奏能蒸徒雄發或拉豹以推斑或豢貒而磔骨哂狼顧之尾㚄喜熊掙而掌滑飲鏃而蒼鹿羣呼投罟而銀麞早蹶至若芳洲日霽春渚氷消狩南畿之廣澱按五花於輕橈舟聯鵝鸛之形浪蹙翼箕之勢弋必待飛繳無及細習水戰之神機授澤虞之節制家祕珠玉之鈐士擁戈矛之鋭既令一而力齊亦恩深而忠勵且我皇朝拓宇紘極來同羅地天之上下包日月之西東絶漠在藩籬之內荒服盡庭廡之中蠢兹孽醜恃其遐逖蛙謂井寬螳張臂力我軍乃經無皂歷不毛水名寒暑山號鏖鏊瘴烟晝密訛火夜燒然而勇思敵愾義奮同袍度危輕於飛鳥攀險捷於懸猱歡聲動油幕和氣逐星旄刀刺而甘泉涌旗展而毒氛消驚從天而忽下紛穴地以潜逃俯瑶池之浩蕩陟普陀之岧嶤渡金沙而拔幟定三危以鳴鐃是則域絶梯航名遺圖史昔阻殊方今為同軌六師告捷萬方送喜功髙涿野化嫓虞階扈征不逮殷武莫儕寧不足以鳴億代之愷樂釋一人之憂懷乎主人曰天有雷霆功同風雨聖作弧矢道濟干羽安不忘危訓兹貔虎率由周禮嵗有搜苖摶犀兕以作氣冒風雪以習勞羽林兮親率雕弓兮手操垂老兮不懈匪樂此兮遊遨感唐宗之殪豕猶技癢而自豪何雄心之欲逞而英武之難韜八荒在闥七德有征不得已而後用計萬全而謀成雖屢聞於露布長戚然其靡寧固不恃太平而弛備亦非矜逺略而佳兵釋氏之流進曰佛道崇虛不以威力常生歡喜之心必在清净之域粵自日升法界雲散梵天古來證聖今劫當賢善慧夙願羅衛因緣夢占白象胎置金蓮徒衆則降生百億光眀則遍燭大千發念四門凝神十地脫屣王城披緇林際安步而青雀環飛跏趺而火龍戢勢當眀星之出時應執月而度世其為道也戒行為本禪那為趨精進何勇忍辱如愚惟一真之自在忘色相之有無懸靈臺之澄鏡出濁水之眀珠誕先登於慧岸乃永超乎迷途離欲塵而皓潔變苦海為歡愈其為教也大拯羣生普濟萬有三乘可階六度是牖雷鼓揚聲霜鐘虛受灑甘露以息心聞妙音而稽首意樹生夫善果情田薅其害莠照暗室以芳苡擢汚池之瑞藕禆主化之淳和躋黎元於老夀爾其騰輝周室皎像漢庭蘇由識兆傅毅通靈天竺寫範石室緘經法顯於邁遍覺遐征訪雞足之故跡啓鹿苑之舊扃竹簡志其周歷松枝感其專誠則貝文自兹盛出金字於焉流行矣又有伊存初授迦羅始輯趙地宗澄秦都禮什宣譯大藏淵思祕笈跋陀棲蹤於少林難提摹影於洛邑此則法雨之東被而禪風之西入也然乃律論雖著心印未承達摩逺届爰示真乘珈梨轉付機契斯憑北宗神秀南𣲖慧能花開互葉焰發千燈是皆默悟妙圓深通聖諦受如來之法眼嗣大士之苖裔夫其超九劫而授記繼六佛而仰瞻現白毫之功德顯紫色之莊嚴天上天下其尊無對世出世間此道為貴是以帝釋皈依人王崇事元魏則一萬三千所江左亦四百八十寺莫不塔規雀離宇肖鷲峰花林靄靄蘭若叢叢須彌巍殿兜率淨宫盤承團露鐸和髙風六牙殊壯九級神功升堂則月容霄表躡梯則人語天中亦有剪綵刻檀雕銀鏤玉香剎之金翠二丈幡幢之珍寶百斛龍鱗敷席鳯毛隱褥薦瓊膏而乳融焚瑶髓而烟馥現路衢之慶雲耀坊市之華燭洵佛事其煥儼轉法輪於大覺熙萬年之鴻祚頌五位之茀祿今主人無量夀相種大福因修成億劫𢎞濟兆民隨喜法喜能仁當仁邁應聲之前迹猗感運而降神願闡真如之教永綏極樂之身主人曰釋氏之道湛然虛淨脫離六根眀心見性無惡無善豈達性命似此狂參又安能敬順動靜以循環匪偏枯於寂定包理數其紛羅何談空而作聖雖了徹乎三生亦奚禆於國政既塵芥夫山河寧存心於萬姓捨身同泰迎骨鳯翔垂鑒前史曷云其臧敬而逺之聖言孔彰道家之流進曰釋開覺路老合儒宗直窺元奧大啓仙蹤原夫有物混成冥冥窈窈先天地生字之曰道陰陽互根坎離相抱本氣祖於太虛藴谷神之至寶絳宫爣烺玉房逶迤木公金母姹女嬰兒龍虎森列昴畢交馳神資澡雪妙合希夷為導引法為飬生主樞動不蠧水流曷腐搖天柱擊天鼓熊經鷮息猿攀鳥舞戲五禽而榮昌祛三蟲而輕舉六齊清淨十戒精嚴元關自扃尺宅長緘澄空鏡皎活水波恬戕身之斧罔觸爽口之味奚沾心欲葆真鼻先視白息由意調氣緣思積抱一兮探珠守中兮栱璧存想而槖籥開內照而津梁闢爾乃納新吐故吞㬌含光絪緼太始呼吸元陽丹田鬱鬱氣海泱泱紫霧騰於上谷黃芽茁於中央乃有華池旁流璇露寶液瀠洄瓊漿布濩六府潜疏百骸畢注汲醴井而難枯灌靈根而永固若乃九三列鼎六一和沙烟浮金竈乳吐瑶葩刀圭散雪鉛汞蒸霞充糧而煮白石擲米而成丹砂别有氷園之瓜玉文之棗瀹术同調茹芝共搗籛鏗啜桂以綿齡務光哺薤而夀考偓佺食松而飛行南嶽采苓而助姣王興換骨於菖蒲鳯綱咀華於卉草餌八石而方瞳服一丸而紫腦所以至人禀二氣運三真按七候具五因保戊巳守庚申朝吸鬱儀夕采結璘內則九還育性外則寸匕回春煉形為氣化氣成神烈焰莫灼弱水難淪金玉其色日月為身緑毛不槁頳頰長新則有赤松雨師崆峒親訪作歌黃竹授書河上笙吹緱嶺袖挹浮丘竇令乘龍而上下琴髙控鯉以遨遊時而矯舉層霄遙征瀛海眺員嶠之崚嶒憩方壺之爽塏九色之鴻蹁躚三素之雲靉靆霓旌荏苒以排烟螭衣陸離而絢彩芝童導舞桂女擎觴雉羹箸膩麟脯盤香鶴奏延年之曲鸞吟益夀之章揮三千之琅簡騁十二之文凰縣圃之景光自愛蕊宫之娛樂偏長今主人體乾元握太乙凝剛健之精造冲虗之室簡幾務之焦勞導皇躬以寧謐元始道合淡穆無為飬一心之和暢致八極於雍熙固性命之真樂仁夀之良基不得謂太上道妙與聖治而兩岐也主人曰道法自然為天地根老氏之學能飬其真流而成弊刑名放蕩長生久視語益惝恍况神仙之杳渺氣歷劫而難聚縱白日兮飛升與世道乎奚補慨秦漢之往事求方藥而何愚用清净而獲效寧化美於皇初飬身夀人儒者有道保合太和何取黃老醫術之臣進曰衆家紛綸各有所宜導和釋結常守惟醫雖方技之小道誠親切而神竒自古炎農始宣藥品形色必區性味攸審亦越軒轅繼作內經運氣惟叙部候聿眀岐彭扁俞振揚輔導君臣佐使之相須神聖工巧之畢到勒諸玉版典在靈蘭遭嬴禁而無恙嫓羲易而永傳爾乃鸑鷟鳴岐姬公制禮職領天官務寧王體調和食飲滋息本根精神欲其內守政體先乎理身左氏作傳載秦和之診視馬遷述史序倉公之證治備演鴻術兼表竒事嗣是長沙賢守垂金匱之要句漏仙令集玉函之妙華陽别録太白千金遞相授學不輟披尋猶復從壺中之幽叟搜肘後之祕藏門帶杏林而霏雪宅留橘井而浮香三世之名著十全之實彰以臣愚管仰揣聖躬非有陰陽勝負侵其外喜怒嗜欲伐其中特以懷萬古之永圖鍾四表之遙情憂慮太逺則費神智計過周則耗精默識成性偶難憶於忽遺通微必睿時不屬於思維得上藥以為助自壯盛而不衰西土浮陽作甘美草式和羣品首資國老瑶光散彩人參具形恆騰紫氣亦聞呼聲彤絲上布皓苓下生松腴不朽伏莵通靈苖名小草本為逺志醒心是賴出處非異堯韭天降昌陽引年百陰感氣九節蟠根隰産惟苄地髓凝黃從下㑹意沉者尤良令應金蕊族辨苦薏齡延妙用露裛佳色薯藇修脆月盤煮糜生則膩滑乾收乃宜龍眼繁實粲若驪珠蜜脾無滓益智有餘斯皆可以開心安神填精輔志久服輕身近驗強記他若忘憂樹之丹棘合歡贈以青棠猶以力微效淺未敢貢於尚方也至於筋力小勩血氣異候樂不疲而覺強足容重而嫌後固無事於按蹻更靡假於針灸虋冬蔓茂經驗紫微日行三百有過鶱飛天精地骨枸杞還壯吠尨隱叢仙人作杖交藤如斗山翁成瑞髮重鬒黑步逾便利伊仙靈􅀈輔足最神栁詩所歌不越盈旬穗象郗蟬性著逐馬丹參曾試蕭炳非假以之湯液去患若風之吹雲醪醴取益若寒之回春凡臣所陳氣擇其平味簡其良品無迂僻用必經常屏金石之多悍捨蟲獸之微毒先嘗奚待乎九折奏御方迓乎百福煩悁渙釋動作輕安加由繹而思彌永循端末而記益全襟舒兮懷暢色澤兮體胖何必髙居深念鬱悒心顔乎主人曰古帝垂經以原其本良師立方以使之平能回氣化有禆生生止祛疾疲匪駐年齡食惟榖味滋以薑桂若服藥之過多反五藏之為纍况乎出産殊地採造愆期質同效異物是時非試不獲應久愈失宜嘗探求者歷載猶影似而未真欲綜覽以著書恐貽誤於後人思邈有逹言飬性先自慎寧以憂畏為本勿惟藥用是信於是有巖阿一老皓髯朴貌擊壤行歌韜華閟耀稽首山莊之門上獻芻蕘之言曰諸臣所論惡足以知主人哉昔者唐虞三代之治也堯德曰欽君道之大虞廷交吁動色警戒夏后克艱其政乃乂成湯栗栗臨淵是慨文王蒸哉敬止不懈武受丹書户牖銘誡謨誥雅頌歷古相傳於赫天命眀徴聖言匪四海之為富將康濟夫黎元匪九重之為貴將仰答夫蒼旻理庶官而無曠躬萬幾而必勤思艱巨之負荷雖細微而靡捐不以天下為樂惟知為君之難今主人稽正學披往牒溯百世之緒繫億年之業撫幅員之廣博覩民物之繁稠日方中而恐悚雨未至而綢繆譬朽索之馭馬喻洪波之載舟覽青史以申鑒紆黃屋之深籌何一夫之可勝何一事之不可憂乎乃若內外建官賢才是樹用牧閭閻用治軍賦廢耳目而任心豈英髦之可遇爰詢訪於羣僚曷由消夫黨附或顯名於卑秩逮位髙而改度倘審察之未精將輕信而成誤又若蠲租賙食益下之經先時峙備廪庾宜盈本常平之良規參社倉之遺軌非綱紀之得人徒名存而實詭及臨事而設施貴周密於條理茍奉行之不臧竟何禆於井里法惟禁暴德在好生律令不用道化以貞自親民之守令已莫必其得情况受讞於槐棘憑案牘之權衡罰雖薄而求當乃克慎乎祥刑每登中於嵗杪占貫索之空澄若此者自非主人離照不遺乾綱獨運則何以肅官方解民愠作元命申清問百工允釐有條而不紊乎主人曰隱者之言美矣然終奚以釋吾懷耶對曰王者之道父乾母坤嚴恭寅畏罔間晨昏維天之怒風烈雷焞側身修行言省其愆維天之喜景星慶雲婉容愈色以承其歡視無形而若見聽無聲而如聞儼精禋於二郊通志氣於兩間命變化其靡定福不可以幸干恆局蹐而齊栗敢戲豫以自寬代天治物綏御遐邇眷此蒼生實吾赤子彼鞠育之慈恩固疴癢其一體崇責任於元后曽何分乎毛裏縱遙隔於帝閽如號啼之在耳果誠心而求瘼斯致頌於樂只宜乎舉膳踰昃求衣待旦苦身勞形耄期忘倦卜天行之泰否審人情之萃渙善罔小而祥基惡罔大而禍臶履虎尾以操心涉春氷而慮患笑與頻其不假處閒燕而齊莊恐潜移夫威福杜窺伺之在旁治與亂其倚伏逮眀盛而思防炳幾先以逺照用鞏固夫苞桑信盈虛之有數修人事以為常筮艱貞以旡咎豈宴安之可嘗感晚節之易改永垂警夫怠荒期初終以如一運不已之陽剛雖齒髮之就衰尚黽勉以自強縱精力之漸耗詎惕厲之可忘是則主人之憂勤也天高地下與之偕極日往月來周而無息舉天下之人莫可與分其責而又何術以自歡何時之能釋主人曰隱者之言實獲我心有志未逮我思益深夙披誦夫尚書攬帝王之金鏡君子所其無逸裕大猷以立政又觀玩夫周易綜微言於四聖能恐懼以致福兹得中而履正殷憂勞勩習與性成學於古訓不敢荒寧前途之計後世之寄疇勤疇恤繄余是視兢兢業業不知老之將至皇清文頴卷首三欽定四庫全書皇清文頴卷首四聖祖仁皇帝御製文連珠連珠有序朕嘗觀揚雄博綜藝文叙述短章名曰連珠班固賈逵傅毅諸人相繼有作昔人所謂辭麗言約合於古詩諷興之義良不虛也效其體作數首以示侍臣雖亦假物陳義至於託寄髙逺殊讓古人爾蓋聞動靜互宅所以乘隂陽之機張弛咸宜所以體剛柔之撰是以春溫秋肅四時之玉燭常調山結川融八柱之金樞永奠蓋聞海水納其所出故浩大而無涯車輪復其所過故廣逺而不滯是以善由虛受而萬物歸懷德本健行而上天合契蓋聞仁義之性不因地而遷移貞白之姿不隨時為豐嗇是以蘭蕙生於幽谷不以居僻而損其芳松柏産於茂林不以嵗寒而凋其色蓋聞知禮樂之情者能作識禮樂之文者能述疇非聖而克開疇非明而弗失是以黃軒肇則道協隂陽姬旦承謨制參忠質蓋聞文治深則武功大恩施溥則德威揚是以秦爇詩書再世而致咸京之炬周傳官禮一戎而垂鎬室之裳蓋聞泰岱為五嶽之宗謂其居髙而不亢滄海為百川之長謂其兼容而有餘何則過剛則凌物至察則無徒是以道主敬民若馭朽索之馬心存愛物寧漏吞舟之魚頌二典頌有序粵稽伏羲始畫卦象而未有文詞倉頡造字而篆籀之傳亦多淹失上古文章之見於六經者殆無有先於二典者矣朕服習尚書景慕勳華之德業羮牆見焉竊以為包羅千古之治術無有出其範圍者朝夕涵濡用自勵朂爰作頌曰煌煌二典邃古所傳乾綱坤維嶽峙星躔如海負地如日麗天六經諸史肇開厥先欽明濬哲恭讓塞淵至德在躬光被八埏寅餞授時法創璣璿後之儀象咸取則焉巡嶽考績疇咨簡賢後之命官率循罔愆文質而奧事簡以全髙明博厚治象巋然夏商而降踵武鴻編支分派别謨誥丕宣散為萬象流為百川仰瞻帝典若陟泰巔伊豫夙夜誦習有年望洋測海弗憚精研遙遙統緒深愧仔肩永言祇頌躬自陶甄禹陵頌有序朕閲視河淮省方浙地會稽在望爰渡錢塘展拜大禹陵廟瞻眺久之敕有司嵗加修葺春秋蒞祼粢盛牲醴必豐必䖍以志崇報之意時康熙二十八年二月十五日也緬惟大禹接二帝之心傳開三代之治運昏墊既平教稼眀倫由是而起其有功於後世不淺豈特當時利賴哉朕自御宇以來軫懷饑溺留意河防講求疏濬漸見底績周行山澤益仰前徽爰作頌曰下民其咨聖人乃生危微精一允執相承克勤克儉不伐不矜隨山刋木地平天成九州始辨萬世永寧六府三事政教修眀㑹稽巨鎮五嶽嫓靈兹惟其藏陵谷式經百神守護松柏鬱貞仰止髙山時切景行贊至聖先師孔子贊有序蓋自三才建而天地不居其功一中傳而聖人代宣其藴有行道之聖得位以綏猷有明道之聖立言以垂憲此正學所以常明人心所以不泯也粵稽往緒仰溯前徽堯舜禹湯文武逹而在上兼君師之寄行道之聖人也孔子不得位窮而在下秉刪述之權明道之聖人也行道者勳業炳於一朝明道者教思周於百世堯舜文武之後不有孔子則學術紛淆仁義湮塞斯道之失傳也久矣後之人而欲探二帝三王之心法以為治國平天下之凖其奚所取衷焉然則孔子之為萬古一人也審矣朕巡省東國謁祀闕里景企滋深敬摛筆而為之贊曰清濁有氣剛柔有質聖人參之人極以立行著習察舍道莫由惟皇建極惟后綏猷作君作師垂統萬古曰惟堯舜禹湯文武五百餘嵗至聖挺生聲金振玉集厥大成序書删詩定禮正樂既窮象繫亦嚴筆削上紹往緒下示來型道不終晦秩然大經百家紛紜殊途異趣日月無踰羮牆可晤孔子之道惟中與庸此心此理千聖所同孔子之德仁義中正秉彛之好根本天性庶幾夙夜朂哉令圖溯源洙泗景躅唐虞載歷庭除式觀禮器濡毫仰贊心焉遐企百世而上以聖為歸百世而下以聖為師非師夫子惟師於道統天御世惟道為寶泰山巗巗東海泱泱牆髙萬仞夫子之堂孰窺其藩孰尋其徑道不逺人克念作聖石鼓贊有序朕釋奠先師于國學觀石鼓於廟門之兩廡緬懷周宣迄今二千餘年而中興之烈岐陽之搜俯仰如昨魯壁汲冡缺有間矣此文此石獨煥然與日月爭光是三代法物之僅存者也今列在太學實斯文之盛嘗尋繹榻夲推詳其遺義有㑹於心焉乃為贊曰猗歟周宣纘緒文武一時從臣方叔召虎搜於岐陽陳列斨弩鐫功告成伐石作鼓以歌以銘載規載矩豈備考擊致煩矇瞽鼓鼙思將義蓋有取歷二千年鑠日蝕土蝌蚪失傳剝落誰補車攻馬同麀鹿麌麌晨星缺月完句可數天門詄蕩岐山翔舞軒頡是班鍾王敢伍陳在泮宫設於廊廡是切是磋匪擊匪拊橋門觀禮如對簋簠庶幾文治再見三古針講官針豫企至道覃思簡編朝夕討習禮茂講筵詩人有云顯示德行啓沃惟賢庶幾金鏡爾列詞苑峩峩在廷細旃廣厦論史談經體之行之朕躬是力載獻載替爾職宜飭母務𠞰說母茍雷同毋繆于正毋悖厥中在昔大儒稱先則古臯䕫是師言規行矩誼貴翼勵先正其心爾茍勿欺吐詞足欽詎曰名義可以塗飾詎曰聖賢可以蠡測關閩濂洛炳矣心傳撰述大㫖庠序宗焉用昭儒修用𢎞教澤爾其勉兹尚無攸斁臺省針臺省之設言責斯専寄以耳目寧取具員通眀無滯公正無偏黨援宜化畛域宜捐洞逹政體斯曰能賢古昔諍臣風規凛然訏謨讜論垂光簡編朕每覽繹如鑑在懸居是官者表裏方直精白乃心充廣其識國計民生臧否黜陟凡所敷陳敬將悃愊風霜之任以懲奸慝摶擊之威以警貪墨毋托細務茍塞言職母紛成憲妄逞胸臆書思入告當寧對揚沽名匪正營私孔傷或藏嫌怨謬為雌黃受人指囑尤為不臧形諸奏牘有玷皂囊職司獻替亟宜審詳敬爾在公風紀巗廊針詞用朂誕告聨常督撫針芒芒方域分理需人嶽牧之選實惟重臣寄以封疆千里而逺地則星羅令猶風偃控攝文武統馭官司繩違糾慢宣德布慈廉善是旌貪黷毋宥小眚是矜吞舟毋漏彼昏而墨日削月朘或市徇縱以恣嬌䖍澤不下殫民隱罔恤政乃不和為時蟊賊曽是源濁而流則清曽是表正而景則傾職汝之由是曰曠墜軫我元元保釐奚賴天命天討我不敢私朂哉有位敬聼針詞守令針五等封建古今異宜郡縣之制百王同規壤地磐牙提封棊峙大者一州小則百里有社有稷有民有人守令何職職兹拊循勸農課桑宣條設教偃風以德從星惟好毋營筐篋毋急簿書悃愊之治嵗計有餘莫髙匪天而卑其聼莫愚匪民而智其性民不可掩天不可欺一之不慎而戚自貽稽古治效嘉禾瑞麥勉能其官紹休前迹銘淵鑑齊銘搆室藝苑匪求堂皇六籍斯列百家斯藏聿求治道攬兹舊章古人遜志歉若望洋取義于淵源深且長浩演渟泓蓄之有常既澄其體復藴其光清暉朗映無物不彰於焉鑑之洞毫晰芒以兹發政如涉津梁以兹擇人如鑑否臧我懷前哲陟降在旁見道於衡覿聖於墻實惟簡編乃獲周行披覽之餘奧義以詳擷其精英以備遺忘齊名淵鑑昭示無疆目擊道存文治永昌佩文齊銘堯紀文思舜稱文眀文以經世天地精英河洛啓祕圗書肇興典謨垂則雅頌繼聲楷模百代統歸六經乾坤樞紐民物凖繩潤如河海炳若日星簡編具在黽勉服膺如寒待衣繭絲呈能如饑待食菽粟惟馨人倫日用匪此莫勝紉蘭為佩楚辭可徵佩弦佩韋柔剛互成亦有佩玉義取溫瑩豫所佩者古訓是程朝斯夕斯孔思周情味道之腴體泰志寧縹緗炳蔚卷軸縱橫研求探討澡祓性靈揭之座右恆視斯銘知稼軒銘史書大有惟國之瑞食為民天邦夲所繫西苑有廬茅簷土砌風雨攸除桑柘蓊翳農祥乘春南榮晨蒞嵗云秋矣流火西次於焉占星以戒農事物養於䝉禾保於稚驗其勾萌在晦明際雷雨甲坼剛柔並試灌溉為仁芟剃為義二者不廢頴栗可冀嵗之歉穰人力是視儻逢其時饑寒或遺閔兹農夫終嵗勞瘁在昔有邰嘉種手藝採入豳吹咏及纖細用銘斯軒庶幾此志賦梧桐賦撫萬彚之生成攬植物之暢茂見藹藹之梧桐為良材之僅覯當綺閣而結柯臨玉階而吐秀既託根以得地亦含靈而迎候扇淑景于春陽振英華于清晝揚蕤瑤樹布葉金鑾碧滋密綴翠纈深攢散澄暉于幃幄濯鮮色于琅玕被光華于日月耀羽儀于鳳鸞乃有芝雲上覆瓊泉下浸長浥潤于丹穹永敷榮于紫禁雨滴疏聲風吹籟鳴乍響回于環珮已樂合于竽笙若夫新條始引清露初流如潔清之士邈焉而寡儔挺節無撓陵虛欲上如謇直之臣介然而不黨菶菶者其陰可以矢卷阿之頌音離離者其實可以廣湛露之雅什韻虞氏之文琴絙軒皇之素瑟信天地之嘉生非凡材之能匹彼夫桃李之佳蔭松柏之貞心甘棠蔽芾于南國玉樹青蔥於上林雖留詠于在昔詎埒美于斯今至于嶧山孤立之姿龍門百尺之幹或擢本于丘樊或漸色于巖畔豈若兹樹之曜頴朝陽植枝霄漢負聳壑之遐標增麗城之榮觀也哉夜亮木賦并序塞上古木夜視有光遇雨益明移置室中即之可以燭物嘉其有異故賦猗嘉木之逈異垂四照之華英蜿輪囷於川壤萃盤錯于柯莖外禀巽德內藴離精煥然夕皎灼爾宵眀晼瑞星之初麗炯璧月之漸生既騰輝於山谷亦揚彩於檐楹若乃靈根濯雨榮枝浥露芳澤加鮮澄暉逺布方隱之而彌耀旋即之而如晤洵昭質之無虧何冥行之是懼爾乃金膏灺蕊鶴焰韜光獨飛熛而振采長煜煜以煌煌吐瓊文于赤水懸瑤景于昆岡非朝華而夕謝殆積暗以能彰於是列之桂宫置以椒室流映金鋪近燭緗帙豈浮艷之為容亮靈竒之足述庶含章之可貞雖在野而靡失玉泉賦若夫天産瑰竒地標靈迥融則川流峙惟山靜撫風壤之清淳對玉泉之幽靚信芳甸之名區而神臯之勝境也爾其洞壑厜㕒巖阿叢復源出髙岡溜生寒麓瑶竇濺珠瓊沙噴玉控以翔螭引之鳴瀑初噴薄以飄絲旋瀠洄而曵縠既瀺灂於澗溪遂渺瀰於陵陸侔色則素纈無㾗儷質則纖塵不屬挹味則如醴如膏揣聲則為琴為筑於是長輸逺逝澶漫演迤曲之為沼渟之為池拭一泓之明鏡瀉千頃之琉璃排玲瓏之鴈齒跨蜿蜒之虹鬐拓澄湖而西滙環仙籞而東馳當其春日載陽惠風潛扇草緣初芽柳黃欲線捲百尺之湘漪拖十重之楚練䕃逺樹之芊綿泛落英之蔥倩及夫長嬴届節新漲平堤林霖夕斂嵐彩晨飛抽碧筒以徐引綴丹的以紛披展含風之翠葆搴裛露之紅衣若乃炎歊既回鮮颷疏豁泠泠桂間嫋嫋蘋末見鳬鴈之沉浮望烟雲之出沒掬皓魄于晴瀾散清暉於深樾至於凄辰中律水樹蕭騷木葉盡脫微霜始飄耿氷雪以流映擁貞萋而後凋攬六宇之曠邈寄豫懷於泬寥是其為狀也何時不妍何妍不極境近心逺目營神逸有林坰之美而無待於攀躋有亭榭之安而無勞於雕飾豈所語於入華林者擬濠濮之逰涉太液者象蓬瀛之域也耶行殿讀書賦并序東巡十有餘日矣寒夜初永行幄清肅取大易尚書及前代史籍探索披覽夜分乃休侍臣髙士竒每以過勞為請然朕勤政愛民之外惟涵泳乎詩書心契古人寤寐勿倦非此何以自樂耶乃作行殿讀書賦以示之紹三后之令緒兮撫曩代之遺蹤爰省方而設教兮言時巡乎兖東軫豫懷於蔀屋兮息豫駕于蒿宫發圖書於行笈兮窮墳典於淵通遡帝王之餘烈兮勤效法之深衷昔唐虞之詢嶽兮闢四門而眀目禹泣罪而下車兮湯解網以致祝文獵渭以求賢兮武邁邦以問俗景列聖之芳模兮希千秋之懿躅庶咸五而登三兮亦覲光而式榖惟時商秋甫謝寒律初尋風日髙肅雲物蕭森陳羽衛之清約兮憩幄宫之靜深愛三冬之暇景兮惜萬幾之餘陰於是心曠情怡氣恬神攝玉虯書嚴銅蠡宵歇望山海之崇深兮凛載登而載涉詎博洽之自矜兮何菁華之足獵鄙虞初之屬車兮陋河東之遺篋冀文教之永敷兮播風聲而四浹闕里古檜賦并序孔子手植檜在杏壇之側金貞祐間無復存矣元至元三十年再茁故處眀𢎞治間又燬于火今所遺者不枯不榮屹立霜露而秀色獨異撫摩久之乃作賦曰維槎丫之靈質實鈞化之所鍾標扶輿之竒特峙先聖之故宫涵元氣以不朽與至道而俱崇爾其黛幹蒼蒼孤柯濯濯鶴骨初扶霜鱗未作儼茁軋以方舒類鴻荒之忽鑿謝縟彩于春華完淳風于太朴天矯拂勃星臨露滴枝無取于樛樛葉全稀于摵摵夕飈度兮弗驚朝旭烘兮如滌伊間氣之潛滋惟神爽之咸集徘徊延却宛轉斷連蟠屈兮若佾羽之在列聳削兮若簨簴之待懸則有築以崇封沃以膏壤方以周䦨角以文磉足縮心歔目給神賞蘿烟奪翠松籟失響于是楷因之而擢穎蓍感之而抽莖爭葳蕤於絃誦之里齊扶疏於禮樂之庭朝菌慚兮一旦大椿讓兮千齡上泝真宰之功逺契無為之代均雲行兮雨施等乾始兮坤載疇則出混茫之中而居耳目之外與三才以並植綿歷祀其長在亦有扶桑海表若木山巔東瀛西極揭日摩天迹雖誇於神異植非出于文宣宜瞪乎其後矣邈無得而稱焉木棉賦并序木棉之為利於人溥矣衣被禦寒實有賴焉夫既紡以為布復擘以為絖卒嵗之謀出之隴畝功不在五榖下嘗稽之載籍島夷卉服注以為吉貝即其種也然止以充逺方之貢而未嘗遍植于中土故周禮婦功惟治蠶枲唐徵庸調但及絲麻至木棉之種後世由外蕃始入於關陜閩粵今則逺邇貴賤咸資其利而昔人篇什罕有及之者故為之賦曰考吉貝之佳種披丘索以窮源道伽毗而逺來由秦粵而衍蕃倣崖州之紡織製七襄而無㾗效宋人之洴澼比八綿而同溫先麥秋而播種齊壺棗而登原宿黃雲於萬蕊墮白雪於千村落秋實於露晞軋機軸於星昏暖佐耆年之帛陽回寒女之門幸卒嵗之可娛乃民力之普存若應鐘之司律正薄寒之中人月照牛衣之夜霜侵葛屨之辰家挾千箱之纊路絶百結之鶉曝茅簷而歌愛日賽田祖而洽比鄰謝履絲之靡麗免于貉之艱辛故夫八口之家九土之氓無沍寒之膚裂罕疾風之條鳴時和年豐水耨火耕嵗落三鍾之棉場登百畝之粳同彼婦子樂此太平奚羡纂組之巧與夫縞紵之輕慨風詩之未録省方問俗將以補豳什而續授衣之經皇清文頴卷首四欽定四庫全書皇清文頴卷首五聖祖仁皇帝御製詩四言古詩長至日祀天圜丘有述四章於穆天縡鍳觀維赫播物無私佑於有德髙皇受命膺符闡繹丕顯太宗廓圖登績眷我皇考九圍是式克享天心立民之極一章洪維景運集於眇躬南諧北燮君兹萬邦夙夜敬止恆惕於衷毋曰髙髙聼卑則聰毋曰盱盱視逺斯通罔敢逸豫昭事必恭二章是月仲冬維日長至爰啓泰壇肅將禋祀濟濟奉璋羣工在位牲玉既陳籥舞乃備對越有䖍百神攸暨雲旓揚揚華星晢晢三章乃辨雲物載觀載書乃占豐年多黍多稌南陸曜采𨗳我歸輿藝香始生景長以舒初陽來復相協厥居垂象是則奉若不渝四章五言古詩覽貞觀政要春陽淑以嘉流雲灑几案及此聼政餘縑緗獲披玩寥寥三古後載籍亦炳焕俯仰千年餘盛治數貞觀修德偃干戈措刑空狴犴海外奉車書臣民登燕衎事往迹尚存流風照觚翰洋洋四十篇可以一辭貫仁義有明效非由事擊斷鄙哉封倫言相去邈河漢時巡近郊憫農事有作芳郊景物麗淑氣扇暮春靈雨應良節光風薄嘉辰省耕已届候夙駕方來巡前驅列式道羽衛羅鈎陳時有田間子荷耒披車塵譏訶勿頻數疾苦當咨詢千耦幸終畝二釜猶懸囷穮蓘爾勤動痌瘝豫隱親賙賜出泉府拊循屬官臣行潦有挹器冽井無枯津所惠良未遍嗛嗛愧斯人懋勤殿讀尚書至無逸篇有作元化斡四運淑景催芳年乾乾總萬幾寸隂惜屢遷綈几散瑶帙阿閣揚爐煙澄懷求至理孔壁存遺編公旦訓無逸則古多所宣言念小民依田功稼穡先天命良匪易敬德省厥愆法戒備近王炯炯斧扆前寤寐思古人千祀精意傳端居不遑暇三復期勉旃詠觀天儀器乾象極髙逺孰者為綱維惟此貞恆理可以揆測知靈臺有儀器云自古聖貽偃蓋金粲粲飾體珠離離橫玉管其中激水相推移內挈黃赤道外互南北垂紫宸凝不動列曜如置碁制作侔造化法撰窮神竒昔在有虞氏以命和與羲七政順其軌庶績咸用熙後來代有述神明夫前規日官比申命欽哉重人時惟幾恆自勑曰旦凛在兹五緯協位序燠寒無僭差永言答靈眷長與休禎期秋日出郊觀稼秋氣日寥迥萬象皆蒼蒼朝暾被渥露草木含晶光西成方届候農事將築場於焉省斂穫令典重百王輕軒屏前置夙駕無嚴裝郊原一以眺烟樹紛成行微風𣪚深樾清流抱廽塘土脉秀且沃篝車欎相望新鐮粲如月刈此溪雲黃捃拾復何幸遺秉滿道旁鳥雀互翔集婦子咸恱康行將吹葦籥報爾千斯箱眷言三時勤艱難詎可忘茫茫視九壤豈盡歌豐穰二釜茍不充豫饑惄如傷幸兹樂有年時若雨與暘朂哉慎所麗田功庶無荒端寧殿齊居肅肅羣籟屏裊裊爐煙舒諏日躬禋祀濯祓臨齊居輝輝閣西日流影照綺疏坐久微風來泠然吹衣裾霽心觀萬象默見天地初感神在至諴寧俟灌鬯餘詠史四首鴻鈞運元氣萬彚無私恩上德貴醇悶容覆如乾坤熙熙康衢老作息循晨昏耕鑿食其力安知帝德尊在宥物自理巧歷難為言下覽商周際頌聲亦已繁其二三田嵗畢舉用以薦明禋聖王戒暴殄郊藪遊麒麟虞羅張復解原野氣已春六合豈不廣一面何逡巡亳都百里間曠如天地仁寬政逮毛羽况乃蚩蚩民其三軒皇訪后牧相道光璿樞精誠契𡨕漠在古豈有誣巍巍興王佐竟與夢寐符天意靖殷邦豈為榮一夫緬彼耕莘叟後有版築徒試觀說命篇典則追三謨其四尚父抱竒略壯齡運不偶一竿清渭濵經綸在其手志欲網九州吞舟非所取卜兆示先幾龍彲載車後白旄師既陳青社符還剖偉哉八百基肇自一釣叟二月三十日親統六軍徂征漠北惟天盡所覆眷命畀我清自豫蒞鴻祚恆願銷甲兵小醜窺北疆屬國橫相攖夙昔張撻伐凶醜皆顛傾赦之釋不誅開網全其生怙終恣跳梁邉鄙搖羣情皇皇仁義師聲討必有名春雪灑貝胄朔風捲龍旌眷兹貙虎士金革勞逺征於鑠振我武赫赫揚天聲經明成祖勒銘處指示扈從諸臣并序朕率師行四十五日至我哨界界內外髙阜坡陀大扺皆黃白沙五色石北行十一里有石瑩然獨出明成祖北伐刻銘其上時則永樂八年庚寅四月十六日朕今過此適在四月十四日山原猶昔時日同符朕謂明成祖之率師而行也與今日異其時出邊皆敵人也今蒙古悉我效力之人其時皆漢人步卒今我兵悉騎士且熟習邊外之行由此觀之明成祖深入敵中數千里縱橫若行無人之境亦誠難矣我軍若不及彼良可愧也凡聞斯語者當人人自奮焉爰紀其事而繫之以詩伊昔永樂年征馬嘶朔風磧間銘片石苔蘚磨青銅我行初拂拭夏節欣相同當時月在已今值清和中後先間兩日彼亦一代雄我武討不庭春發明光宫塞草緑微茁雨雪隂濛濛或言時尚早稍待邊花紅寧知英傑人所見良疏通迅行掩不備兵法貴折衝軍謀在帷殿士氣如虎熊豈不資羣䇿惟斷斯有功作詩紀其事聊以示臣工行殿示諸皇子師行日已逺邊馬風蕭蕭眷言靖疆宇寧憚道路遙彼寇鄰北藩譎謀聲動搖除惡必拔本稂莠隳良苗外攘內斯安務令金甲銷吾民息轉輸丁男無敝雕一勞方永逸所戒怠與驕天心鍳此誠雨暘時以調厄魯特之衆相繼來歸咸詢其父母兄弟妻子為陳前所獲者覔令完聚締宇蒞八表一視貴同仁茍有不得所此中常肫肫荒裔乃異類猘驁性頑嚚橫戈臨朔漠窟穴頓淪湮將士俘擒衆竄遁僅及身逋亡日來投稽首丹悃申念彼骨肉離咸為加撫詢廣諭命尋識使得完天倫歡聲繼感泣寒塞生和春綏柔寓大權萬物歸鴻鈞黃河并序河源發於塞外流經萬里餘始由中土入海曩曽遣使探流窮源河之為利為害莫不洞悉近以巡省邊隅駐蹕湖灘河朔一水瀠洄自西北來流不甚濁而波緩岸隘而土堅白草蕭蕭黃沙彌望其中環抱約地千二百餘里草豐水美便於畜牧明𢎞治間淪於外彛地逼秦境時相寇擾故諸臣每言不宜棄此衆議紛然人多不察恆惜其言之未用然使當日即用其言加兵塞外揆理度勢豈遂能驅而逺之亦必徒勞士馬耳朕嘗以收復河套之論謂其心忠於國則可謂其灼見事幾言之可行則未然也國家威德所布龍荒大漠與河套盡入版圖諸蒙古嵗修賮貢奉職惟謹非務德意綏柔詎兵力之所可致耶故臨流增思詩示永久洪流逺且長迢遙逾塞垣旋繞幾曲折沙雜波濤渾漸下漸開拓建瓴勢迅奔所經雖綿邈脈絡自有根東南藉挽輸疏瀹頻討論昔嵗省隄防淮濟親臨軒今兹歷大荒羽衛成雲屯崚嶒兩岸間天寒落漲痕氷澌斷更續晶晶耀朝暾此中地沃饒水草佳且繁昔人議收復斯舉誠難言觀俗撫幽遐老幼爭攀援殊方亦蒼赤咸施沐浴恩期令歸化意來者如河源晝夜入滄海包括彌乾坤噶爾丹平後示諸臣蒞㝢心無倦寧人慮每周一從沙漠擾時厪深宫憂日旰食始進未明衣先求或云小醜徒廟堂何須籌或云自往代兹類難鋤耰念我祖宗基不與古昔侔沿邊諸外藩奉職如列侯一一效驅䇿非徒貢賮修顧此豺狼種狂逞匿林丘侵欺我屬國潜入我遐陬設竟置罔聞何以示綏柔因之違羣議秉鉞麾貔貅扼塞伏偏師兼程裹糧餱事無巨與細皆為先綢繆五月入不毛破賊瀚海頭遁免僅及身資帳咸躪蹂秋冬再臨邉寒風透重裘方春更逺陟秦晉歷邑州乞降多詭詞其意本夷猶孽子已成俘族黨紛奔投未能悔厥心尚思延蜉蝣分道命禁旅夏肅氣如秋頓爾膺天誅無庸施戈矛幕南與幕北圖輿萬里收華山可歸馬桃林宜放牛息兵培元氣黎庶永安休於野樂稼穡於朝獻訏謀交泰賴臣工長與蒙天庥凱旋言懷黃輿奠四極海外皆來臣眷言漠北地㷀㷀皆吾人六載不遑息三度勤征輪邊柝自此靜亭堠無煙塵兵革方既偃風教期還淳興廉遵昔軌崇文育羣倫所用惟才俊非僅榮簮紳爾俸與爾祿脂膏出細民永念固邦本不愧王國賔口外設屯耕植聚落漸成沿邉曠地多棄置良非䇿年來設屯聚教以分阡陌春夏耕耨勤秋冬有畜積霜濃早收黍暄遲晚刈麥土固有肥磽人力變荒瘠山下出流泉屋後樹豚栅行之無倦弛定能增户籍古來王者治恐亦無以易七言古詩收復嶽州作并序逆賊吳三桂既經天誅之後不數月而嶽城恢復良由三桂背恩倡亂荼毒生靈經年以來死者相望於道路生者逃竄於四方積尸遍野民不聊生皆朕德之薄不能撫綏之故也今賴皇天之眷佑祖宗之威福羣臣盡力將士用命前後恢復閩海兩粵以至湖南嶽陽諸處擒斬賊魁殆盡望風歸正不可勝數所餘小醜勢如破竹解吾民之倒懸行有日矣特賦長歌以舒其懷聿豫凉薄蒞洪荒遂使巨慝亂天常東南黎庶苦紛擾幾年戎馬蹂疆場臨軒重簡親藩出軍威萬里風雷疾肆伐原因討不庭専征大義昭星日臥榻安容有悖狂太阿豈好弛紀律再敕元臣佩虎符戈矛剗地生寒栗鐡騎驍騰擁楚雲霓旌閃爍連江濆七澤三湘據衝要樓船壁壘屯諸軍一時將士盡忿激人人都願成功勳懸知叛逆衆所惡直須吹氣清妖氛顧此生靈負何罪流離轉徙多饑餒處處田疇蕪不耕年年桑柘無人採聞說荒榛遍野廬還傷老弱填江海每念邊陲一憮然立身天地慙主宰未忍加兵戕我民深宫宵旰勤五載五載躊蹰常恭默㑹當滅此乃朝食旗捲閩疆甲士降陳開百粵堅城尅已見懷光伏𡨕誅更看元濟成俘馘鼙鼓旌旄定嶽陽雕戈金鏃清區域指顧能收六詔煙宣恩早布招徠德書奏傳來慰兩宫乂安社稷開鴻濛翼翼小心恆敬慎敢忘繼述在朕躬期與宰司百職事共相砥礪克厥終自寧夏出塞濵河行至白塔乘舟順流而下扺湖灘河朔作黃河之源難可窮滔滔來自遐荒中既入洮蘭復西出飛濤浩瀚聲淙淙來從邊山逺跋涉遣師挽餉兼採風回鑾欲假順流便特乘艇艦浮奔洪瀠洄大野勢幾曲沙岸頽突還巃嵸亂柳排生枝幹密中有巨鹿藏榛叢遙山轉轉行莫盡忽前俄後迷西東有時塞雲催急雨晚天霽色橫長虹旌門月上夜皎潔水光直與銀漢通放櫂百里只瞬息迅於走坂馳駿驄中宵望見旄頭落幕北已奏煙塵空四月十四日夜奏報噶爾丹窮蹙自盡其下悉平兹行永得息兵革豈惜曉暮勞豫躬長河綿延古鮮歷巡閲乃與區域同自此寰海樂清晏熙恬萬國咸亨豐長安行河山天險古金湯都邑規模溯漢唐陸海膏腴本沃壤秦風慓悍稱巖疆每因眷念勞中夜忍使時巡後一方逺幸衝寒訪民隱終南太華遙相望豳岐不乏耕織業漆沮尚存搜狩場重農藏富屢詔諭雨暘時若歌豐穰雄兵超距賈餘勇野老謳吟多宿糧要令遐陬沾湛露詎以無事弛邊防大閲三軍訓甲士來朝諸部趨蕃王蠲租恤下恩未已共躋仁夀樂且康渭水氷消回暖律南山煙靄動初陽停鑾懷古還披卷宵旰勤求意不忘松花江放船歌松花江江水清夜來雨過春濤生浪花疊錦繡縠明綵帆畫鷁隨風輕簫韶小奏中流鳴蒼崖翠壁兩岸橫浮雲耀日何晶晶乘流直下蛟龍驚連檣接艦屯江城貔貅健甲皆鋭精旌旗映水翻朱纓我來問俗非觀兵松花江江水清浩浩瀚瀚衝波行雲霞萬里開澄泓望焦山念已已曽登其上大江日夜波汪洋金山焦山兩相望金山樓閣蕩丹碧焦山竹樹多鬱蒼境深流廣人罕至往年曽一登其岡頃者放舟仍北度壯哉滉漾雲低昂青巖翠壁幽且蒨圖經名著傳焦光何時瘞鶴在山足遺銘剝蝕存華陽山下有瘞鶴銘為華陽真逸撰止存六十餘字葭洲白鳥忽飛出江花𡨕𡨕江草芳是日雨餘氣清淑夏首晴晝欣舒長倚檻四顧暢襟抱好風豁達來天閶海東青羽蟲三百有六十神俊最數海東青性秉金靈含火德異材上映瑶光星軒昂時作左右顧整拂六翮披霜翎期門射生諳調習雄飛忽掣黃縧鈴徑如千鈞激砮石迅如九野鞭雷霆原頭草枯眼愈疾砉然一舉凌髙冥萬夫立馬齊注目下逐鳥雀無留形爪牙之任安可廢有若猛士清郊坰晾鷹築臺存勝蹟佳名豈獨標禽經松花江網魚最多頒賜從臣松花江水深千尺棙柂移舟網親擲溜洄水急浪花翻一手提綱任所適須臾收處激頽波兩岸奔趨人絡繹小魚沉網大魚躍紫鬛銀鱗萬千百更有巨尾壓船頭載以牛車輪欲折水寒氷結味益佳逺笑江南誇魴鯽遍令頒賜扈從臣幕下燃薪遞烹炙天下才俊𣪚四方網羅咸使登巖廊爾等觸物思比託捕魚勿謂情之常再遊盤山薊州城北黃崖前水甘土厚多平阡崇山特起矗霄漢栝柏夾路隂參天回巒復嶂倍娟秀幽林邃谷時夤緣雲藏古寺行未到樹杪先有鐘聲傳數峰突兀勢陡絶上迫箕尾雙星躔峩峩石狀獸蹲立因風搖曵如空懸深潭清泠那可測知是百尺神龍淵鉢泉恍惚有海眼潮井呼吸通百川不然泛濫亦易挹何為萬古清涓涓神工融結天巧鑿更騁逺目窮髙巔漁陽古郡最阻厄屹為左輔雄幽燕即今交河逺置候此實堂奧非臨邊太平粗喜有端緒石根沙磧皆原田偶兹登陟聊駐斾用寄襟抱題斯篇皇清文頴卷首五欽定四庫全書皇清文頴卷首六聖祖仁皇帝御製詩五言律詩咏蟬飲露當凉夜吟風向晚晴乍移深樹影又聼别枝聲與物心無競離塵翼最輕秋懷聊寄咏愛爾獨能清入喜峰口一道鳴鑾度三驅振旅還莓苔天半石松栝雨中山險設關門壯時清堠火閒孝陵佳氣近縹眇翠微間夏日迎薰亭苑啓時初夏亭陰午未䦨雨過池藻碧日綻海榴丹水木含清景禽魚得靜觀薰風能解慍試取玉琴彈曉發古北口望霧靈山流吹凌晨發長旓出塞分逺峰猶見月古木半籠雲地迥疏人跡山回簇馬羣觀風當夏景澗草自含薰塞外省覽風俗莫道巖關險要荒總一家戍樓無鼓角戰壘是桑麻野靜知民樂時清見物華林中歸徑晚旌斾滿煙霞過闕里鑾輅來東魯先登夫子堂兩楹陳俎豆數仞見宫牆道統唐虞接儒宗洙泗長入門撫松柏瞻拜肅冠裳闕里古檜幹聳朱甍外根盤碧殿阿竒文成左紐元氣挺孤柯瑞與龜龍竝傳來嵗月多徘徊看手澤不共劫灰磨出居庸關羣峰倚天半直北峙雄關古塞煙雲合清時壁壘閒軍鋒趨朔漠馬蹟度重山漸向邉城路旌旗疊翠間賜將士食萬騎擁雕弓長鳴向北風龍荒彌曠逺虎旅正驍雄戰鼓黃雲外旌門紫氣中朕躬方蓐食與爾六軍同瀚海四月天山路今朝瀚海行積沙流絶塞落日度連營戰伐因聲罪馳驅為息兵敢云黃屋重辛苦事親征外藩諸部落絡繹來賀宴賚之諸部名王集扶攜繞御營皆言清朔漠從此樂生成喜溢車書會歡騰鼓角聲朕懷勤撫恤所志在休兵十一月三日泛舟黃河流凌始下舟行之頃河水瑩潔波浪忽平黃濤何洶洶寒至始流凌解纜風猶緊移舟浪不興威行宜氣肅恩布覺陽升化理應多洽囂氛頃刻澄入沙虎口秋末巡沙塞冬深六轡還野回千澗水雲掩百重山獵獵寒風徑駸駸班馬間勤勞因國事計日對慈顔保德州渡黃河入塞河聲壯朝宗勢拱環劃疆分晋野隔岸是秦山城郭巔崖裏旌旄浩渺間橫流渡舟楫前路指蕭關晚眺軍門延夕眺雲氣淡遙天古塞千峰月平沙萬幕烟旌旗寒色壯刁斗晚風傳釁甲從今始功成靖朔邉過密雲作秋氣驅殘暑青林墮葉稀馬嘶凉籟動蟬噪夕陽微河繞遙通塞山回盡拱畿黍苖膏雨足嵗事念民依興京靄靄興王地風雲莫可攀瀠洄千曲水盤疊百重山瞻拜陵園肅凝思大業艱蘢蔥松柏茂瑞鳥滿林間曉發嘉興數里城依水千門路向田菜塍無近逺桑岸互綿連土沃勤為最年豐儉欲先雲開林野秀初日上行旃花山警蹕來初地青山鳥道深風生松澗合雲暗石苔侵靜晝飛閒蝶餘春噪晚禽空留支遁跡物外託宸襟仲子廟河口孤祠在千年祀典存當階松半偃繞碣蘚堪捫懷古題新額遺風想聖門行舟清晝永岸草採芳蓀大城文安等處堤修完舟中駐蹕王家口積水頻縈慮長堤幸已成桑麻連井邑花栁近清明漸愜勤民意還深問俗情蘭橈經過處布榖喚春耕七言律詩塞上宴諸藩龍沙張宴塞雲收帳外連營散酒籌萬里車書皆屬國一時劔珮列通侯天髙大漠圍青嶂日午微風動綵斿聲教無私疆域逺省方隨處示懷柔瀛臺紅䦨橋轉白蘋灣疊石參差積翠間畫舸分流簾下水秋花倒影鏡中山風微瑤島歸雲近日落清霄舞鶴還乘興欲成蘭沼詠偶從機務得餘閒滇平洱海昆池道路難捷書夜半到長安未矜干羽三苖格乍喜征輸六詔寬天末逺收金馬隘軍中新解鐵衣寒回思幾載焦勞意此日方同萬國歡吕翁山是聖祖太宗文皇帝擒洪承疇處旌旗直捲陳雲沉濠塹遺蹤尚可尋十萬健兒皆解甲一時大帥此成禽民情效順當年事王業維艱聖祖心遂使關西如破竹至今戰氣晝陰森駐蹕大凌河歸騎雲屯向晚過升平笳吹動鐃歌光搖幕火繁星燦影暗旗風野霧多兵氣已銷沙右所軍聲猶壯大凌河豐京老將還能說曽記前途自倒戈回鑾抵古北口黃谷清河古戍間鑾車此日省方還長林曲抱千溪水小徑斜通萬仞山地扼襟喉趨朔漠天留鎖鑰枕雄關時平不用誇形勝雲物秋澄斥堠閒玉河春水春回凍解玉河清㶑灧晴光繞鳳城翠嶺雪消新漲闊緑楊風動曉波平派分星海千重逺色映銀潢萬里眀欲挽朝宗無限水遍流膏澤慰蒼生後苑漫興佳氣青蔥繞苑牆紅泉紫岫勝雲莊雕䦨細草經春滿綺閣繁花入午香雨露生成隨品類鳶魚飛躍自低昻閒亭久坐渾無事靜對琴書覺意長登岱巖巖岱嶽髙無極攀陟遙登最上頭路轉天門青靄合峰回日觀白雲浮振衣嶻􅑖凌千仞騁目蒼茫辨九州欲與臣鄰崇實政金泥玉檢不須留泛舟西湖一片湖光㶑灧開峰巒三靣送青來輕舟櫂去波添影曲岸移時路卻回春色初搖堤上柳惠風正發寺邊梅此行不是探名勝欲使陽和遍九垓春寒軫念將士大漠春殘雪尚飛從征車馬正騑騑風回沙路迷金勒寒送冰花上鐵衣每念折衝憑士氣况從絶徼奉天威六軍同奮赳桓志佇見晴曛滿翠旗入關見雨膏潤澤禾苖茂遂喜而有作甘雨時霖為洗兵恰逄戰勝武功成軍容萬隊初旋凱婦子千村正饁耕天意要荒同職貢人歡閭井共升平征途每憶民生事喜見桑麻愜此情入京見百官及耆民童稚歡迎道周星斿葆羽禁城闉雨霽郊坰不動塵旭日薰風歸凱路黃童白叟太平人正逄師至經三月敢比苖頑格七旬從此普天無戰鬭更將休養勗臣鄰出塞并序沿邉山行岡嶺﨑嶇黃沙彌望因自榆林鎮取道塞外沙淺途平水草咸便且十二日之程減半得逹安邉堡書以記之森森萬騎歷駝城榆林鎮一名駝城沙塞風清磧路平氷泮長河堪飲馬月來大野照移營郵籖紀地旬餘驛羽轡行邉六日程天下一家無內外烽銷堠罷不論兵經泰山之麓并序曩於甲子冬日登泰山之巔覽秦漢以來故蹟俯眺寰區憑臨滄海今兹南巡復稅駕山麓因望岱宗而展禮焉聳巘髙峰記昔攀春回瀑水響潺潺萬層石級雲霄上千里烟村縹眇間暫駐猶然思往事憑陵直欲小人寰朱旗翠葆疏林外已見巍巍俯衆山入居庸關始和羽騎出重關風動南薰整斾還凱奏捷書傳朔塞歡聲喜氣滿人寰懸崖壁立垣墉固古峽流泉晝夜閒須識成城惟衆志稱雄不獨峙羣山舟行野望惠風萬頃下芳畦逺水拖烟曉狀迷河上草新才覆地林間花墮半沾泥翩翾弱燕穿船入宛轉芳鶯隔樹啼若問撫䦨端坐意默思豐裕洽羣黎五言排律臺灣平告祀孝陵有述纘武平瀛海諏辰謁寢陵翠微千嶂拱紫氣五雲凝聖德光垂裕神謨大顯承乾坤資翕闢日月象升恆奕世謳歌集多方歷數膺逺猶思燕翼盛業想龍興卉服皆來享鯨波自此澄眀禋稽舊典萬祀肅嘗蒸南苑元靈宫是世祖皇考建傑閣橫霄峻清都與漢翔規模開壯麗星宿燦輝光碧瓦浮空翠金鋪映日黃門當啼鳥靜户有異花香細草沿階發新槐拂檻凉紆回疏輦路藻彩繪雕梁警蹕臨仙境瞻依問谷王敬欽崇太昊繼述憶先皇嵗月碑文古乾坤事業昌茫茫扶大造皥皥體穹蒼恭已身無倦齊心念不忘時巡非逸豫幾暇豈逰荒衛騎驂驔列華旄宛轉揚南薰披萬物北斗啓干祥瑞氣庭前見佳辰書正長休歌白雲曲吾道在惟康三月初六日告祭福陵恭述十韻瑞靄鍾靈闕晴煙繞閟宫萬山皆拱北百水盡洄東夭矯盤峰秀紆回磴道通俯看環衆象遙睇極髙崇松柏丸丸直岡巒面面同恢𢎞思祖烈建樹本神功戰術無前略謨謀啓後衷揮蛇曽握劍定鼎有遺弓展禮威儀整申誠俎豆豐車書叨繼統藐爾愧微躬五言絶句野望嶺外茅茨小林端烟火遲田家耕鑿意一一九重知次楊嶺北半嶺黃雲合新凉畫角聞羱羊沙草外落日自為羣湖心亭水上起樓臺湖靣平如鏡春風吹柳條逺與山光映自過江至常州府雜咏第一首風平楊子渡舉棹過長江暮色林低水晴光月照窗六言絶句水淀雜詩四首輕舟十里五里垂柳千絲萬絲忽聼農歌起處滿村紅杏開時春水船行天上泠風雨過田家深樹幾聲布榖晚晴千縷明霞銜泥雙燕沙際喚雨單鳩樹頭昨夜桃花新水鯉魚躍入蘭舟為愛沙眀水逺更看柳軃花新草木禽魚咸若河山民物同春平原冬晴柳葉未落潦盡寒潭初清龍鑣千騎萬騎雁隊一聲兩聲七言絶句由廣泉寺至臥佛寺巖邉青竹低臨水雲外嵐峰半入天僧舍無人常寂寂山門洄繞是寒泉初寒灑雪凝霜正渺漫曉來朔色滿林巒何當吹遍鄒陽律盡却人間黍谷寒尖峰山谷口作寒山秀出亦娟娟細路穿林碧磴懸却為晚來飛雨過數峰橫翠入寒煙巡歷塞北雜咏第一首疊嶂層崖一線開草深徑路絶塵埃龍沙雨後灤河水日夜朝宗入塞來曉發虛谷帷宫雨後納新凉虛谷風來百草香萬里晴雲任舒卷憑髙但見碧天長飛來峰巖岫崚嶒洞壑竒懸藤古木半迷離冷泉亭子清溪上誰識源頭混混時惠泉寒雲覆樹昔年經甲子觀惠泉在十月再品山泉到此亭春水一犂農事足喜看膏雨遍郊坰春晴舟中作野水漫漫野岸長幾行嫩柳帶斜陽不知春色來多少但覺飛花處處香克魯倫河上流雨後草生晚從岸曲駐前旌雨歇行營草怒生一望青青河上色平蕪共聽馬嘶聲班師次拖陵戰馬初閒甲士歡揮戈早已破樓蘭彌天星斗銷兵氣照徹邉山五月寒南口鑾輿歷逺度龍城已近郊圻一日程時雨潤來山翠重更添髙下小溪聲登雞鳴山鳥道盤空近塞垣羊河如帶繞山根停鑾欲覽沿邊勢石上藤蘿手自捫山行古木荒山落葉稀寒流幾曲漾斜暉馬蹄行遍龍堆路總是金湯戶外扉曉寒念將士長河凍結朔風攢帶甲橫戈未即安每見霜華侵曉月最憐將士不勝寒經喀爾沁古木蒼山路不窮霜林颯㳫響秋風臨流駐蹕歸營晚坐看旌門落照紅菜畦東南農事已春深菜隴花開滿地金獨愛小民勤力作馬頭堪慰省方心支硎山龍池東北古支硎石室寒泉句可聽支遁詩云石室可蔽身寒泉濯溫手想得雨餘懸瀑布飛流界破數峰青江行風帆來往亂江流樓艫縱橫拍浪浮只在艄工持柁穩曽將為政喻操舟春行愛此融融養育多平原髙下識恩波雖然迅速春難住四季何嘗離太和未開新荷清和將盡未端陽時雨催擎珠㸃凉不染淤泥看淨植雖無花氣葉先香皇清文頴卷首六欽定四庫全書皇清文頴卷首七世宗憲皇帝御製文論怨不在大亦不在小惠不惠懋不懋論聖人以仁民愛物為心自無斂怨之理以大公至正為道亦無避怨之方斂怨者咈百姓以從已之欲者也避怨者違道以干百姓之譽者也夫已之欲必不可從而百姓之譽亦不可干何也天下之人心不同則含怨之情亦異善者之所不怨者必惡者之所怨惡者之所不怨者必善者之所怨是以為人君者不在乎權怨端之大小以為重輕而在乎辨所怨之是非以為避就惟問我之所行惠與不惠懋與不懋而已吾果惠而順於理果懋而勤於事則在已者信無可怨兆庶之廣即中有怨之之人而無可怨之實則雖怨猶不怨也不能如是則不怨猶怨也實心愛民之君臣常任怨而有所不恤即如子産古之賢臣也為政之初百姓怨之逮及三年百姓頌之同一子産也同一民情也同一子産之政也而先後之間民情迥異如此然則為政者惟凖於理而已何所用其取舍哉序大清㑹典序自昔書契肇興百官以治是知上古之代雖風氣朴略始製文字必垂典憲以昭誡有位用能允釐百工咸熙庶績觀虞書舜命九官具載訓辭宏綱畢舉則其節目之詳於簡册者可想而知也爰歷夏殷至周大備孔子言周監於二代又言殷因夏禮周因殷禮所損益可知周禮一書蓋承唐虞夏殷之緒而加以文武制作之隆上紹古先下開來葉自是厥後漢唐宋眀膺運享祚者莫不著之章程布在方策設官分職猶師虞周之成憲焉我太祖髙皇帝受天景命經綸草昧太宗文皇帝肇基王迹創制顯庸世祖章皇帝混一寰瀛禮眀樂備至我皇考聖祖仁皇帝載定太平功隆業茂是則我朝之興四聖相承兼唐虞之勳華綜豐鎬之謨烈巍乎成功煥乎文章之並盛者也康熙二十三年聖祖仁皇帝敕命閣臣纂修大清㑹典起於崇德元年迄於康熙二十五年大經大猷咸臚編載聖祖仁皇帝厯數綿長又閲三紀敬勤愈至法制增修憲古宜今至精至備可謂規型之盡善儀典之大成而散在卷牘未及彚輯以蕆全書朕纘承寶位體皇考之心以為心法皇考之政以為政其有因時制宜更加裁定者無非繼志述事之意紹聞衣德之思爰允禮臣蔣廷錫所請命閣臣開館纂修自康熙二十六年至雍正五年所定各部院衙門禮儀條例悉行檢閲照衙門分類編輯凡經九載篇帙告竣於是聖祖仁皇帝臨御六十餘年立綱陳紀之端命官敷政之要首末完具燦然如日星之炳照與虞書周禮並垂不刋夫制度之有損益隨時以處中之道也書曰惟精惟一允執厥中易曰變通者趨時也中無定體動惟厥時斯聖祖仁皇帝所以乾健日新為萬世立極也朕兢兢業業永懷紹庭陟降之義爾在廷臣工能恪遵而時繹之上之可以程功次亦不失為寡過然其所以行之者必本於至誠非徒緣飾虛文奉行故事以為盡職也其交相懋勉忠勤不懈以贊襄我國家悠久無疆之泰運追邁二帝三王之盛朕於兹有厚望焉書經傳說彚纂序朕思六經皆治世之書而帝王之大經大法昭垂萬古者惟尚書為最備蓋自繼天立極精一執中二帝三王之心法遞相授受而治法亦因之以傳今觀書所載成天平地經國造邦建官立教禮樂兵刑之𢎞綱大用與夫賡揚都俞之休風嘉謨嘉猷之陳告凡所為永膺天命而致時雍協和之效者雖相去數千年尚可於方䇿中想見其欽眀寅畏之衷敷布經綸之迹後之君臣得奉為模楷以追踪於唐虞三代之隆詎不於書是賴哉我皇考聖祖仁皇帝聖學淵深治功𢎞逺存於中者二帝三王之心發於外者二帝三王之治而稽古好學於典謨訓誥之篇沉潜研究融㑹貫通初命講官分日進講著有解義一編頒示海內復指授儒臣薈萃漢唐宋元眀諸家之說參考折中親加正定廣大悉偹於地理山川援今据古靡不精核為書經傳說彚纂凡二十有四卷兹值刋校告竣與易詩春秋諸經次第傳布敬製序文勒之卷首夫後世之天下唐虞三代之天下也而治法之垂為典章心法之原於性命者先後同揆百世之聖君賢輔未能易也故為君者必思比德於堯舜禹湯文武而後無忝乎為君為臣者必思嫓休於臯䕫伊傅周召而後無忝乎為臣朕夙夜兢兢冀克守主敬存誠之道以遂覲光揚烈之懷尤冀卿尹百執事共體元首股肱之誼殫協恭勵翼之忱寅亮天工諴和民志俾薄海內外永底乂安於以逺宗聖哲而仰承皇考尊崇經學啓牖萬世之盛心顧不美歟是為序詩經傳說彚纂序朕惟詩之為教所以成孝敬厚人倫美教化移風俗其用逺矣自說詩者各以其學行世釋解紛紜而經㫖漸晦朱子起而正之集傳一書參考衆說探求古始獨得精意而先王之詩教藉之以眀國家列在學官著之功令家有其書人人傳習四始六義曉然知所宗尚我皇考聖祖仁皇帝右文稽古表章聖經御纂周易折中既一以本義為正於春秋詩經復命儒臣次第纂輯皆以朱子之說為宗故是書首列集傳而採漢唐以來諸儒講解訓釋之與傳合者存之其義異而理長者别為附録折中同異間出已見乙夜披覽親加正定書成凡若干卷名曰詩經傳說彚纂朕惟詩三百篇先王所以眀勸懲而行黜陟蓋治世之大經而後世文人學士乃以風雲月露之辭自託風雅學經者又溺於訓詁辭章之陋習烏在其能眀先王之道也我皇考指授儒臣勒為是編期以闡先王垂教之意與孔子删詩之㫖學於是者有得於興觀羣怨之微而深眀於事父事君之道從政專對無所不能則經學之實用著而所謂用之鄉人用之邦國以化成天下者亦於是乎行焉刋校既竣敬述聖意序之簡端聖祖仁皇帝庭訓格言序欽惟皇考聖祖仁皇帝性秉生安道參化育臨御悠久宇宙清寧六十載聖德神功超越萬古凡為史臣所記注黎獻所覩聞者固已備編於實録寶訓珍藏於金匱琅函矞矞皇皇盛矣大矣朕曩者偕諸昆弟侍奉宫庭親承色笑每當視膳問安之暇天顔怡恱每切恩勤提命諄詳巨細悉舉其大者如對越天祖之精誠侍飬兩宫之純孝主敬存誠之奧義任人敷政之宏猷愼刑重榖之深仁行師治河之上略圖書經史禮樂文章之淵博天象地輿歷律步算之精深以及治內治外飬性飬身射御方藥諸家百氏之論說莫不隨時示訓遇事立言字字切於身心語語垂為模範蓋由我皇考質本生知而加以好學聖由天縱而益以多能舉天地間萬事萬物之理融㑹貫通以其得之於心者宣為至教視聼言動悉合經常飲食起居咸成矩度而聖慈篤摰啓迪周詳涵育薰陶循循善誘朕四十年來祗聆默識夙夜凛遵仰荷纘承益圖繼述追思疇日天倫之樂緬懷叮嚀告戒之言既歷歷以在心尚洋洋其盈耳謹與誠親王允祉等記録各條萃㑹成編恭名為庭訓格言於戲聖謨𢎞逺包涵無際以今所紀揆昔所聞僅存什一於千百闕略甚多實深愧悚然而是編也文辭精要意㫖深長茍能引伸而擴充之則片語能含衆義隻字可括千言雖卷帙簡約而格致誠正修齊治平之道罔弗兼該堯舜禹湯文武周孔之傳一以貫之矣爰奉祕書夀之琬琰以昭垂於億萬世書曰監于先王成憲其永無愆詩曰詒厥孫謀以燕翼子朂哉後嗣恪循祖訓念兹罔斁受益靡窮世世子孫尚其永久敬承哉謹序聖諭廣訓序書曰每嵗孟春遒人以木鐸狥於路記曰司徒修六禮以節民性眀七教以興民德此皆以敦本崇實之道為牖民覺世之模法莫良焉意莫厚焉我聖祖仁皇帝久道化成德洋恩普仁育萬物義正萬民六十年來宵衣旰食祗期薄海內外興仁講讓革薄從忠共成親遜之風永享升平之治故特頒上諭十六條曉諭八旗及直省兵民人等自綱常名教之際以至於耕桑作息之間本末精粗公私巨細凡民情之所習皆睿慮之所周視爾編氓誠如赤子聖有謨訓眀徴定保萬世守之莫能易也朕纘承大統臨御兆人以聖祖之心為心以聖祖之政為政夙夜黽勉率由舊章惟恐小民遵信奉行久而或怠用申誥誡以示提撕謹將上諭十六條尋繹其義推衍其文共得萬言名曰聖諭廣訓旁徴逺引往復周詳意取顯眀語多直朴無非奉先志以啓後人使羣黎百姓家喻而戶曉也願爾兵民等仰體聖祖正德厚生之至意勿視為條教號令之虛文共勉為謹身節用之庶人盡除夫浮薄囂凌之陋習則風俗醇厚家室和平在朝廷德化樂觀其成爾後嗣子孫並受其福積善之家必有餘慶其理豈或爽哉數理精藴序粵稽前古堯有羲和之咨舜有后䕫之命周有商髙之訪逮及厯代史書莫不志律厯備數度用以敬天授民格神和人行於邦國而周於鄉閭典至重也我皇考聖祖仁皇帝生知好學天縱多能萬幾之暇留心律厯算法積數十年博考繁賾搜抉奧微參伍錯綜一以貫之爰指授莊親王等率同詞臣於大內䝉飬齊編纂每日進呈親加改正彚緝成書總一百卷名為律厯淵源凡為三部區其編次一曰厯象考成其編有二上編曰揆天察紀論本體之象以眀理也下編曰眀時正度密致用之術列立成之表以著法也一曰律吕正義其編有三上編曰正律審音所以定尺考度求律本也下編曰和聲定樂所以因律製器審八音也續編曰協均度曲所以窮五聲二變相和相應之源也一曰數理精藴其編有二上編曰立綱眀體所以解周髀探河洛闡幾何眀比例下編曰分條致用以線面體括九章極於借衰割圜求體變化於比例規比例數借根方諸法蓋表數備矣洪惟我國家聲靈逺届文軌大同自極西歐羅巴諸國專精世業各獻其技於閶闔之下典籍圖表燦然畢具我皇考兼綜而裁定之故凡古法之嵗久失傳擇焉而不精與西洋之侏􅍣詰屈語焉而不詳者咸皆條理分眀本末昭晰其精當詳悉雖專門名家莫能窺萬一所謂惟聖者能之豈不信歟夫理與數合符而不離得其數則理不外焉此圖書所以開易範之先也以線體例絲管之别以弧角求經緯之度若此類者皆數法之精而律厯之要斯在故三書相為表裏齊七政正五音而必通乎九章之義所由試之而不忒用之而有效也書成纂修諸臣請序而傳之恭惟聖學髙深豈易鑽仰顧朕夙承庭訓於此書之大指微義提命殷勤嵗月斯久尊其所聞敬效一詞之贊蓋是書也豈惟皇考手澤之存實稽古凖今集其大成髙出前代垂千萬世不易之法將欲協時正日同律度量衡求之是書則可以建天地而不悖俟聖人而不惑矣音韻闡微序聲音之道微矣天地有自然之聲人聲有自然之節古之聖人得其節之自然者而為之依永和聲至於八音諧而神人和胥是道也文字之作無不講求音韻顧南北異其風土古今殊其轉變喉舌唇齒清濁輕重之分辨在毫釐動多訛舛樊然淆混不可究極自西域梵僧定字母為三十六分五音以總天下之聲而翻切之學興儒者若司馬光鄭樵皆宗之其法有音和類隔互用借聲類例不一後人苦其委曲繁重難以驟曉往往以類隔互用之切改從音和而終莫能得其原也我聖祖仁皇帝亶聰首出天地萬物之奧律厯象數之祕靡弗心解神㑹洞徹本原以國書合聲之法出於自然足以盡括漢文翻切之要妙也於是指授大學士李光地擬定條例節目俾諸生王蘭生纂輯之後復以尚書徐元夢董其成始自康熙五十四年迄今十載奏竣命之曰音韻闡微蓋其為法也緩讀則成二字急讀則成一音在音和中尤極其和總出於人聲之自然而無所勉強洵為簡眀易曉從來翻切家所莫及而講求音韻者習之良甚便也雖然此特就切韻言之耳嘗觀皇極經世書律感吕而聲生吕感律而音生律吕倡和相生不窮以聲音統攝萬物之變說者謂其以聲起數以數合卦而萬物之理備焉我聖祖仁皇帝獨見音韻之本原即用以審音定律作樂崇德其道舉無所不貫蓋睿智淵通更有極乎至微者夫豈羣下所能仰窺萬一哉子史精華序恭惟皇考聖祖仁皇帝天縱聰眀秉上聖之姿而垂意典籍勤於稽古御極六十餘年萬幾之暇披覽卷帙不輟寒暑巡幸所至必以緗素自隨逮於耄齡精研不倦延閣廣內之藏搜討無遺所謂好古敏求多學而一以貫之也欲以編輯成書嘉惠天下後世嗜學之士特命開書局於武英殿召集詞臣歷嵗修纂每成數卷即上呈御覽親加指示前後所成充溢冊府而子史精華之纂為最後朕纘緒之初尚未告竣敬承先志俾就厥功綜觀大凡其部三十其目二百七十有九自天文地理帝德王功禮樂兵刑之大人倫日用之常以及九邉之殊域二氏之異教方術技藝之巧草木鳥獸之蕃門分類别條理具備而采掇子史芟蕪擷秀甚有禆於學者蓋士之嚮學通經為先而博及於子史固不能若窮經之專一惟攬其精華而識之勿忘俾考古者於兹尋其緒則無慮於簡牘之繁績文者於兹取其材則有助於翰墨之富用力甚簡而成功已多是聖祖皇帝埀教無窮之至意也剞劂既畢展閲全編敬為叙引昭示久逺用綴於篇端古今圖書集成序欽惟我皇考聖祖仁皇帝聰眀睿知亶生知之質而又好古敏求孜孜不倦萬幾之暇置圖書於左右披尋玩味雖盛暑隆寒未嘗暫曠積數十載之久研綜古今搜討殆遍屢命儒臣𢎞開書局若周易折衷發四聖之微言朱子全書㑹羣儒之奧義皆禀自睿裁復躬加校定若律厯淵源推軒皇之神策叶虞代之元聲皆親行指授以天縱之能而凖於儀器凡注經考史選詩論文以及博聞多識之資所纂輯雕鐫充溢於內府刪述之功嘉惠無窮稱極盛矣而又以為未攬其全乃命廣羅羣籍分門别類統為一書成冊府之巨觀極圖書之大備而卷帙浩富任事之臣弗克祗承既多訛謬每有闕遺經歷嵗時久而未就朕紹登大寶思繼先志特命尚書蔣廷錫等董司其事督率在館諸臣重加編校窮朝夕之力閲三載之勤凡釐定三千餘卷增刪數十萬言圖繪精審考定詳悉書成進呈朕覽其大凡列為六編析為三十二典其部六千有餘其卷一萬始之以曆象觀天文也次之以方輿察地理也次之以眀倫立人極也又次之以博物理學經濟則格物致知誠意正心治國平天下之道咸具於是矣惟我皇考法天行之剛健協坤德之含𢎞察於人倫眀於庶物尊六經而禮先儒釐六官以敷大政故是書之成貫三才之道而靡所不該通萬方之略而靡所不究也我皇考金聲玉振集五帝三王孔子之大成是書亦海涵地負集經史諸子百家之大成前乎此者有所未備後有作者又何以加焉敬藏石室寶垂久逺用叙其本末綴於篇首上以彰皇考好學之聖德右文之盛治並紀朕繼志述事兢兢業業罔敢不欽若於丕訓云爾雍邸詩集序朕昔在雍邸自幸為天下第一間人然所謂間者非若箕潁遺世竹林肆志之類也朕生當國家鼎盛之時三逆蕩平四方寧謐仰䝉皇考鍾愛承歡膝下位列親藩寢門定省之餘無他事事境之所處間矣兼之賦性不樂浮華既無庸皇皇於富貴更不煩戚戚於貧賤祗期消融機巧遂覺隨處樂天情之所寄又間矣雖然究其所以優游恬適得四十餘年為一間人者莫非我皇考教育深恩有以成就之也朕素不嫻聲律每於隨從塞北扈蹕江南偶遇皇考命題屬賦勉強應制一博天顔歡笑初不計字句工拙至於宴賞登臨觸物寓感有㑹而作因詩紀事借以陶寫性情而已豈曰與文人墨客較論短長耶歲月積久裒焉成集逮壬寅冬恭承皇考付託之重臨御寰宇封章重叠機務殷繁旰食宵衣猶虞叢脞夙興夜寐莫敢求安向之優游恬適今則易而為惕厲憂勤花朝月夕之吟皆成祁寒暑雨之思矣檢閲舊作曷勝惘然緬想曩日之間境間情奚啻邈若河漢也哉爰序於雍邸集首以示朕意云九日燕羣臣擬柏梁體詩序朕繼大統惟朝乾夕惕兢兢仰法皇考期賢哲盈廷民康物阜永承郅隆之聖治嘗思古之眀良賡歌喜起君臣一德同心曠代為之欣慕今在廷臣工協𠂻以資贊理顧瞻濟濟皆為皇考數十年教育栽培之所詒也是以庶政具舉兆民樂業朕實嘉賴焉康熙二十一年春聖祖於乾清宫開升平之宴振賡揚之歌盛稱一時美冠千古今丙午九月節届重陽覽百榖之斯登欣三農之有稔光風溢目海宇澄清爰集王公卿尹用陳几筵笑言勿禁威儀不拘相恱於一堂弗限夫三爵然禮著享燕之義詩有嘉賓之詠古君臣於飲食燕㑹間即具獻納拜揚之典也唐虞文武之世休風如昨朕與諸卿宜則效之今用柏梁體朕為倡始諸卿遞成篇什今日也非徒命酒徴歌揚華摛藻蓋欲昭聖祖飬育之深恩朕廷泰交之雅㑹垂之奕世永傳斯事云爾悅心集序朕生平淡泊為懷恬靜自好樂天知命隨境飬和前居藩邸時雖身處繁華而寤寐之中自覺清逺閒曠超然塵俗之外然不好放逸身心披閲經史之餘旁及百家小集其有寄興蕭閒寓懷超脫者佳章好句散見簡編或如皓月當空或如凉風解暑或如時花照眼或如好鳥鳴林或如泉響空山或如鐘清午夜均足以消除結滯浣滌煩囂令人心曠神怡天機暢適因隨意採録若干則置諸几案間以備觀覽自總理萬幾以來宵旰不遑求如曩時之怡情恱目不可復得然寧靜之宰不因物動恬淡之致豈為境移此乃可以自信者爰取向所採録彚為一書名之曰悅心集夫心者人之神眀所以為萬化之源萬事之本而勞之則苦擾之則煩蔽之則昏窒之則滯故聖賢有存心洗心之眀訓佛祖有眀心寂心之微言無非涵飬一心之冲虛靈妙使無所纍與天地太和元氣渾然流行無入而不自得也如孔門之春風沂水仙家之吸露餐霞如來之慧雨香花以及先儒之霽月光風天根月窟其理同其㫖趣何弗同耶是編所録有莊語有逸語有清語有趣語有淺近語不名一體人有仕有隱有儒有釋有髙名有無名亦不專一家總之戒貪祛妄屏慮釋思寄清净心遊歡喜地言近指逺辭簡味長俯仰之間隨時可㑹然而喧寂在境而不喧不寂者自在心往往跡寄清廓之鄉而神思縈擾身處塵氛之地而志氣安舒則見道未見道之分也昔朗禪師以書招永嘉禪師山居師答曰未識道而先居山者但見其山不見其道未居山而先識道者但見其道必忘其山見道忘山者人間亦寂也見山忘道者山中乃喧也㫖哉斯言知此義者始可與讀恱心集皇清文頴卷首七欽定四庫全書皇清文頴卷首八世宗憲皇帝御製文記圓明園記圓明園在暢春園之北朕藩邸所居賜園也在昔皇考聖祖仁皇帝聽政餘暇遊憩於丹陵沜之涘飲泉水而甘爰就明戚廢墅節縮其址築暢春園熙春盛暑時臨幸焉朕以扈蹕拜賜一區林臯清淑陂淀渟泓因髙就深傍山依水相度地宜構結亭榭取天然之趣省工役之煩檻花堤樹不灌溉而滋榮巢鳥池魚樂飛潛而自集蓋以其地形爽塏土壤豐嘉百彚易以蕃昌宅居於兹安吉也園既成仰荷慈恩錫以園額曰圓明朕嘗恭迓鑾輿欣承色笑慶天倫之樂申愛日之誠花木林泉咸增榮寵及朕纘承大統夙夜孜孜齊居治事雖炎景鬱蒸不為避暑迎涼之計時踰三載僉謂大禮告成百務具舉宜寧神受福少屏煩喧而風土清佳惟園居為勝始命所司酌量修葺亭臺丘壑悉仍舊觀惟建設軒墀分列朝署俾侍直諸臣有視事之所構殿於園之南御以聽政晨曦初麗夏晷方長召對咨詢頻移晝漏與諸臣相接見之時為多園之中或闢田廬或營蔬圃平原膴膴嘉頴穰穰偶一眺覽則遐思區夏普祝有秋至若憑欄觀稼臨陌占雲望好雨之知時冀良苗之應候則農夫勤瘁稼事艱難其景象又恍然在苑囿間也若乃林光晴霽池影澄清淨練不波遙峰入鏡朝暉夕月映碧含虛道妙自生天懷頓朗乘機務之少暇研經史以陶情拈韻揮毫用資典學凡兹起居之有節悉由聖範之昭垂隨地恪遵罔敢越軼其采椽栝柱素甓版扉不斫不枅不施丹雘則法皇考之節儉也晝接臣僚宵披章奏校文於墀觀射於圃燕閒齊肅動作有恆則法皇考之勤勞也春秋佳日景物芳鮮禽奏和聲花凝湛露偶召諸王大臣從容遊賞濟以舟楫餉以果蔬一體宣情抒寫暢洽仰觀俯察游泳適宜萬象畢呈心神怡曠此則法皇考之親賢禮下對時育物也至若嘉名之錫以圓明意㫖深逺殊未易窺嘗稽古籍之言體認圓明之德夫圓而入神君子之時中也明而普照逹人之睿智也若舉斯義以銘户牖以朂身心䖍體天意永懷聖誨含煦品彚長養元和不求自安而期萬方之寧謐不圖自逸而冀百族之恬熙庶幾世躋春臺人遊樂國廓鴻基於孔固綏福履於方來以上答皇考垂祐之深恩而朕之心至是或可以少慰也夫爰宣示豫懷而為之記七曜會聚記天之垂象與人事相應諸經垂訓惟敬與戒無他說也後世遇嘉祥之徴多紀年加號然或不求實應而徒尚虛文適為厥德之纍昔人謂應天以實朕有取焉雍正三年春厯官奏二月二日庚午七曜會聚為難逢之天瑞繪圖以進於是廷臣援髙陽漢高宋太祖時事頻請慶賀朕不之允且諭以經緯遇合之故禎祥昭示之由推皇考至德之感及今日敬應之實再三詳諭然後在廷之臣曉然知朕之意慶議乃寢據候驗者奏稱亥子之交日月符會合之度五星列聮綴之形榮光爛然漢志所謂如合璧如連珠者昭然在目及晨則天朗以清氣和而穆見者聞者莫不歡欣傳說以為曠世稀覯太平之瑞應顧朕自繼統以來雖圖治不遑而政皆平歟吏皆賢歟民皆康歟俗皆淳歟朕實不敢自信而何以致此自信且不敢又何以當此其惟益凛日躋之敬庶保天貺於永永也既諭廷臣謹記以示夫後云黃河澄清碑記朕聞上天孚佑生民日監在兹垂示休徴警覺有位凡欲使之懋德勤政無怠無荒而修省加䖍用答嘉貺天人感應之理致不爽也我皇考聖祖仁皇帝功德隆盛臨御久長厚澤深仁洋溢於薄海內外朕寅紹鴻圖仰承盛烈䝉被福蔭民物阜安數年以來嘉祥叠見乃雍正四年十有二月河道總督齊蘇勒及副總河嵇曾筠漕運總督張大有河南巡撫田文鏡山東巡撫塞楞額陜西巡撫法敏先後馳奏黃河自陜西府谷縣歷山西河南山東以至江南之桃源冰開水清湛然澄徹其在陜西山西始見於雍正四年十有二月八日乙丑迄於雍正五年正月十三日庚子凡三十有六日其在河南山東始見於十有二月九日丙寅迄於次年正月十日丁酉凡三十有一日山東之單縣亦清於丙寅至癸酉甲戌清徹見底而是月之二十二日已卯漸復其舊凡十有四日其在江南則始於十有二月十六日癸酉迄於是月二十三日庚辰凡七日蓋其清也自上而下及其復舊則自下而上故時日之先後逺近漸次如是維時中外臣民僉以河清為千年罕見之盛事稽諸史册咸稱上瑞况橫亘三千一百餘里綿歷三旬有餘尤亘古所未覩合詞懇請御殿受賀至再至三朕維上天之錫福降災猶人君之用賞行罰感召之機分於敬肆一念甫動休咎頓殊朕祗若昊天敬慕皇考翼翼小心夙夜罔有懈怠因得仰邀皇考昭察默籲蒼穹錫兹福慶朕惟慮前此之受貺無因且恐將來之承庥不易朝乾夕惕益深謹凛特命䖍告景陵以申忱悃專遣大臣致祭河神以彰靈應至升殿受賀沿襲頌美之虛文朕所不取是以堅却不允而廣推皇考錫嘏𢎞仁施恩中外羣臣有専職者咸晉一階諄諭周詳共加敬勉爰允廷臣所請勒石以紀夫天一生水實為天地之氣所流通而河稱四瀆之宗上應雲漢澄潔安流用昭嘉瑞天和協應必有自來詩曰文王陟降在帝左右蓋言文王與天同德而子孫䝉其福澤也我皇考配天之靈於昭在上眷顧啓迪至深且厚朕祗承瑞應恐懼悚惶嘉與羣臣增修實政書曰昭受上帝天其申命用休又曰先王奉若天道君臣上下之間無忘戒警朕亦惟是嚴恭寅畏不遑康寧庶幾求無負於上天皇考錫豫嘉祥之至意濡毫紀實鐫勒貞珉用抒朕祗敬之誠永自警朂云爾跋耕織圖跋夫養生所亟莫過於衣食古者四民交能易作終嵗所入不過給於衣食而止故下士之祿亦僅比於上農夫而閭師之法不耕者祭無盛不蠶者不帛不績者不衰所以宥民於農桑以厚其本也後世之民多棄本而趨末蓋以農夫紅女終嵗勤動而或盎無斗儲身無完衣不若工商百技立致溫飽而不耕而饜膏粱者轉以胼胝為鄙不織而被綺羅者咸苦蠶績之勞不知使世之人咸捨本而趨末豈特飽與暖之不可得更將何從而得食何從而得衣耶伏讀皇父特製耕織圖序云生民之本以衣食為天又云用以示子孫臣庶俾知粒食維艱授衣匪易蓋欲令寰宇之內一皆崇本而抑末所朂誠深逺矣余昔侍豐澤園曾䝉頒示因萃衆工人之能事繪圖各二十三幅暇時展閲若身在其中不覺目曠而心怡也因思竹屋茒檐之下桑疇稻壠之間男者耕女者織明而動晦而息出無簪組之繫入無寵辱之關嵗時伏臘雞黍雜陳父母融融妻子熙熙若不識天之高地之厚也膏粱紈袴之徒烏足以知其境之泰然情之恬然而嵗月之悠然也耶余心樂之而身弗能之為是圖也蓋以敬承皇父重農桑以阜成兆民之至意而常念稼穡之艱難憫杼柚之勞瘁以檢身於禮度也豈徒以是為筆墨之玩歟跋淳化閣帖後自古帝王臨政之暇往往留意翰墨其間名臣哲士多工書法漢晉以下代有聞人後世採集勒石俾流傳永久銀鈎鐵畫照耀百世如三代彛鼎信可寶玩蓋書學為六藝之一揮毫濡墨縱筆所如而波磔意度之間結構神采徑健古秀斯為上品朱子跋韓琦與歐陽修帖云書札細事而於人之德性相關程明道亦云某寫字時甚敬只此是學栁公權心正筆正之對載諸史策以臨池之學精而論之足以通心性之淵微見學問之要㫖則書法顧可輕言哉宋太宗淳化閣嘗集歷代君臣書蹟命侍書王著摹勒為法帖十卷榻以澄心堂紙李廷圭墨歐陽修集古録所謂官法帖是也我聖祖皇帝法書雲輝星燦集古今之大成朕朝夕侍左右瞻仰天章時䝉聖訓故留心書法最久所見歷代法帖亦最多此帖乃四十年前為直隸巡撫崔澄購得以畀其壻法海計藏於佟氏者三十八年矣今以藏本進覽紙墨潤潔神氣宛然真初榻之尤佳者如張芝草書內不辨行動潛處耳他本處字作不可二字王𨗳書內酸字酉中一㸃上挑他本皆下直王獻之書內委曲字畫聮絡他本委字中斷鴨頭丸丸字中無㸃他本皆添㸃劉道士鵝羣鵝字一筆書成清真徑細他本鳥字頭微肥而不甚分曉觀此數處足信其為官本初榻無疑而再榻與别刻皆不能及也朕披閲再三心契神會如接古人於硯席益悟字學之精微見古法之嚴整書此以識企慕云碑文修建闕里聖廟碑文朕惟上帝垂佑蒸民篤生至聖先師孔子以仁義道德啓迪萬世之人心而三綱以正五倫以明後之繼天御宇兼君師之任者有所則效以敷政立教企及乎唐虞三代之隆大矣哉聖人之道其為福於羣黎也甚溥而為益於帝王也更宏宜乎尊崇之典與天地同其悠久也曲阜廟廷為孔子里宅育聖鍾靈之地神爽式憑廟貌崇閎由周而來久且加盛我皇考聖祖仁皇帝德符元化悟徹性天自羲農堯舜禹湯文武周公之道集成於孔子者一一體於身心宣為政治聖統在上應運而承康熙甲子東巡狩臨幸闕里謁奠廟林殷禮隆儀漢唐莫及朕恭膺丕緒志切羮墻即位之初加封先師五代王爵詣雍釋菜題額歌詩佩德報功之願夙夜罔釋於懷雍正二年闕里聖廟不戒於火有司奏告朕悚惕靡寧詣廟致祭旋發帑興修命大臣専董厥役殿廡規模悉凖宫闕製器備物亦令繪圖呈式裁酌協宜數年來諄諭執事臣寮經營周至纎毫無憾始愜朕衷七年冬有司具奏大成殿上梁前二日慶雲見於曲阜合詞稱瑞朕以天人感應理固不爽而誠敬微忱詎能邀上帝先師之垂鑒用是祗將祀事倍增試額俾普天率土被聖人之德化者同心感慶庶足以廣教澤而答嘉庥而撫躬警勉恆朝夕凛凛焉朕嘗謂帝王之尊聖尊其道也尊其道貴行其道居行道之位而能擴充光大逹之政令修齊治平得其要紀綱法度合其宜禮樂文章備其盛舉凡聖道之未行於當時者悉行於後世雖去聖久逺而心源相接不啻親授於一堂之上默證於千載之前如是欽崇褒顯悉由於中心之誠服而治化日盛聖道斯尊且夫聖人之道一天道也天以牖民之責屬之聖人刪定贊修代天宣教彛倫敦敘禮法彰明後之帝王奉其道以治世師承罔斁資益良多然則尊天尊聖理原合一今兹之崇禮至聖正所以欽若昊天而於修建廟庭之重典有不至誠至敬者哉朕勤求上理宵旰孜孜冀以仰述皇考之鴻謨丕揚先師之厚澤爰敬推上天篤生聖人與聖人承天立教垂憲奕世之意勒文碑石以昭示臣民於無極而系以辭曰天心覺世聖治承天治法道法聖聖相傳三五之隆以道致治峻德𢎞昭豐功逺被聞知續統至聖挺生中天復旦文教昌明經緯三才陶融萬象體具中和功侔參兩表揚六籍程式五常如會滄海若揭秋陽惟我皇考聰明睿智苞藴圖書滙宗洙泗德與聖合禮為道崇升堂容肅過里恩隆緒纘朕躬勤圖紹述至訓煌煌針銘宥密惟皇建極惟聖時中古今雖邈心理攸同作帝王師與天地配開闢一人神靈如在奕奕新廟輝映尼防金絲在御車服盈堂煥乎天文五雲示慶錫祜者天承庥者聖敢云瑞應鑒厥微誠普祈洪貺永福編氓文治光華日星晶麗木鐸揚聲垂億萬世惠濟廟碑文永定河古所稱桑乾河出太原經馬邑合雁雲諸水奔注畿南發源既髙滙流甚衆厥性激湍數徙善潰康熙三十七年我皇考聖祖仁皇帝親臨指授疏𨗳之方新河既瀦遂慶安瀾爰錫嘉名永昭底定立廟蘆溝橋北題額建碑奎文炳耀河神之封實自此始朕纘紹鴻基加意河務設官發帑深籌疏築之宜比年以來永定河安流順軌無衝蕩之虞民居樂業嵗獲有秋豈惟人事之克修實賴神功之贊佑念石景山據河上游捍禦宜亟爰命相擇善地作新廟以妥神朕弟和碩怡賢親王躬往營度得地龎村之西鼎建斯廟長河西繞而南縈峰嶺北紆而左騖控制形勝負山臨流殿宇崇嚴規制宏敞護以佛閣界以繚垣經始於雍正七年冬逾一年役竣復以蘆溝神廟皇考聖蹟所在載加崇飾丹雘維新並增建傑閣翼如煥如稱朕敬神惠民之意爰賜廟名曰惠濟勒文貞珉以紀其事詩稱懷柔百神及河喬嶽河之有神備載祀典况永定為畿輔之名川靈應夙著田疇廬舍繡錯郊圻其得安耕鑿而樂盈寧者胥仰荷皇考方略之昭垂而明神顯靈默相孚佑蒸黎邀福孔多宜加崇敬今兹十里內廟貌相望䖍修秩祀尚其妥侑歆饗俾斯民康阜乂安以𢎞我國家無疆之慶豈惟朕承兹惠貺我皇考平成之駿烈實嘉賴焉朝陽門至通州石道碑文自朝陽門至通州四十里為國東門孔道凡正供輸將匪頒詔糈由通州逹京師者悉遵是路潞河為萬國朝宗之地四海九州嵗致百貨千檣萬艘輻輳雲集商賈行旅梯山航海而至者車轂織絡相望於道蓋倉庾之都會而水陸之衝逵也雖平治之令以時舉行而輪蹄經涉嵗月滋久地勢漸窪又時雨既降積雪初融之後停注泥淖有一車之蹶需數十人之力以資牽挽者矣朕心軫念爰命所司相度鳩工起窪為髙建修石路計長五千五百八十八丈有竒寬二丈兩旁土道各寬一丈五尺長亦如之其由通州新城舊城至各倉門及東西沿河兩道亦皆建修石路共計長一千五十餘丈廣一丈二尺及一丈五尺不等費帑金三十四萬三千四百八十四兩有竒經始於雍正七年八月至雍正八年五月告竣有司請為文以紀其事嘗稽周禮地官司徒令野修道遂師巡其道修鄭鍔疏曰道路以通往來之途使賔至如歸亦修文德以來逺人之意禮月令季春之月命司空巡行國邑周視原野開通道路毋有障塞典籍所垂凡體國經野之政至備具也朕臨御以來詳求治理早夜孜孜惟恐不逮近而郊圻逺而郡邑即遐陬僻壤之區其有關於利濟民物者莫不因地制宜以次修舉是役也逺師古聖王之良法美意而斟酌久逺一勞永逸良用欣慰庶使遵是路者瞻周道之蕩平正直咸慶同軌之盛治焉爰志其嵗月而勒諸石云高家堰碑文黃河為運道民生所關而治河以𨗳淮刷沙為要髙家堰者所以束全淮之水并力北趨以入河河得清淮則沙不積而流益暢故考河道於東南以髙堰為淮黃之關鍵淮自中州挾汝潁渦汴諸水滙注於洪澤一湖蕩激瀠洄浩渺無際而淮揚兩大郡居其下流惟恃堰隄以為障禦所繫詎不重哉我皇考聖祖仁皇帝為億兆蒼生籌萬世永賴之計屢勤清蹕指示臣工方略昭垂神謨卓越全河形勢經書周詳而髙堰隄工尤厪睿慮迄今數十年來河臣遵守成規列郡得安袵席者皇考聖績神功之所賜也朕紹承鴻緒注念河防思髙家堰堤工綿逺保護維艱惟不惜多費帑金全建石工使髙厚堅固久逺可恃斯於運道民生實有禆益朕衷默定詢度僉同爰特發帑金庀材鳩役専命大臣董其事經始於雍正八年二月越雍正十年六月大工告竣仰藉神庥風濤恬靜薪石雲集工作易施增卑而髙培薄而厚易圮而新孔固孔完其增廣皆有加於舊凡六千三百四十餘丈延袤四十餘里所費帑金一百一萬餘兩於是髙堰之工屹然為淮揚巨障河臣上言大工之成不可無紀用俞所請摛文勒石以示朕宵旰疇咨之至意冀河流濟運永慶安瀾保障無虞民生安業以無忝皇考底定平成之績云爾普陀山普濟寺碑文普陀洛伽山為觀音大士示現之地歷徵靈應自梁貞明中始立佛寺宋元以來代加修葺我皇考聖祖仁皇帝巡幸浙西遣官興建殿宇上為皇太后祝禧御題賜額勒文豐碑以紀其事山靈擁護聖績丕昭朕纘紹鴻基於兹十載念兹山為古聖道場重以聖祖仁皇帝宸翰留貽尤宜敬謹崇奉爰特發帑金重加修飾専官往董其役經始於雍正九年九月雍正十一年六月告成朕惟天下名山大川皆扶輿清淑之氣磅礴而融結普陀秀峙海壖迥立於天風紫濤浩涆無際之中尤靈秀所萃聚宜其為仙真之所棲息况大士以慈悲濟物為心隨聲赴感無所往而不在其示現在一時實無時而不示現神通感應不可思議即示現與不示現舉可不論也夫佛法廣大無邊大海包涵無際億萬百千里不足以測海之廣而一勺未嘗非海也億萬百千法不足以盡佛之相而一法無適非佛也今以大海視普陀一拳石耳而菩薩現象之場善衆皈依之地泛慈航於彼岸結寶筏於迷津證普度之慈緣顯𢎞深之願力珠宫在望香界重新寧不與鷲峰鹿苑均為淨域之名區也歟用為斯記鐫諸翠珉以志靈山之勝概普陀山法雨寺碑文法雨寺者普陀山大士之别院也皇考聖祖仁皇帝既修建普濟寺上為慈聖祝禧復念兹寺為海氛所震蕩發帑重新俾僧徒得所棲止賜額立碑增輝瀛嶠歷今已數十載宜加崇飾朕特遣専官齎內帑庀材鳩工不勞民力香林梵宇丹雘煥然與普濟寺大工同時告竣督臣請摛文勒石以紀夫大士以慈緣普濟度盡衆生為願朕嘗繹法雨之義謂濟物之普遍者莫如雨當夫慈雲布濩甘􅒴滂沱髙下逺近一時霑足凌霄聳壑之喬柯勾萌甲坼之微卉華葩果蓏無不濡被潤澤發榮滋長暢茂條逹各遂其性而不自知假使物物而雨之朝朝而溉之將不勝其勤而終不足以遍給惟本大慈悲現大神力周遍一切在在具足所謂天降時雨山川出雲膚寸而合不崇朝而遍乎天下者濟物之功莫大於是神山寶剎緇侣雲集自當有被時雨之化證心印而傳法乳普利生之實用以不負大士隨緣接引之慈恩而副朕𢎞振宗風護持正覺之至意者朕深有望焉祭文追封孔子五代祭文道尊往聖宜錫類以推恩牒溯前徽乃緣情而制禮絲綸聿賁俎豆維新仰惟先師孔子撰合乾坤名髙日月纂修刪定煥六籍之文明祖述憲章樹百王之儀範朕夙承庭訓嚮往實深誕紹丕基欽崇彌切惟德全而業盛知積厚而流光爰命廷臣式稽譜系詒謀式穀洵篤慶於一門育秀鍾靈宜上追於五代並躋祀典特晉王封體皇考敬師之心𢎞先聖顯親之孝於戲金聲玉振集今古之大成木本水源享蒸嘗之美報靈其不昧尚克來歆聖廟告成祭文逹天盡性樹萬世之師模重道尊經煥千秋之廟貌肅將嘉祀用告成功仰惟先師孔子得聖之時由天所縱纂修刪定啓宇宙之文明祖述憲章綜百王之統緒升堂入室洪施樂育之恩學禮誦詩永作義方之矩比髙懸之日月亘古莫踰喻出類之鳯麟生民未有朕奉遺編而欽企儀典務極其推崇循舊址而鼎新經營必盡其誠敬頒於國帑董以大臣每繪式以先呈乃按圖而指授楩楠栝柏求大木於名山簠簋樽罍選良工於內府晶熒黃瓦凖制度於宸居璀璨玉圭儼威容於聖座懸標題之巨榜灑翰親書建屹峙之豐碑摛文恭紀工程纍嵗時深嚴恪之心棟宇宏規益備觀瞻之美華榱雕柱增輝講道之壇璆磬金鏞重振大成之殿數仭之宫墻逾竣兩楹之俎豆䖍陳特遣皇五子𢎞晝等親詣几筵敬行祭告於戲卿雲糾縵已開丹雘之祥古檜貞堅佇望青蒼之色惟祈鑒格式享苾馨皇清文頴卷首八欽定四庫全書皇清文頴卷首九世宗憲皇帝御製詩五言古詩墨竹我亦愛修竹手植滿萬竿春叢抽新碧夏葉生嫩寒更宜當素秋蕭蕭舞檐端乃至入元冬蒼然秀可餐帶露裛晨光遲月弄夕爽烟雨快逸情風雪聽幽響能備四時好永結平生賞搆屋豁軒墀面面曵風枝開窗張素琴鑿池懸釣絲為緣情好篤寤寐懷清姿寫真驚墨妙灑然涵幽芬似我園中籜緑霧凝蒼雲為詩歌此君聊以述所欣七言古詩題墨竹曾聞渭川千畝竹露梢霜節連雲緑又聞湘江竹最佳龍形鳯尾凌空矗自昔江南好事家白樓謝館分苗族竿竿碧玉戞吟窗枝枝濕翠侵書屋風晨雨夕韻堪聽月色烟痕清可掬蕭閒自不染塵氛淨掃浮華媚幽獨東坡居士曾有言不可無竹寧無肉畫師惟數湖州翁興來愛寫篔簹谷對此長莖復短莖寒碧精神光奪目葉不因風長欲動恍然有聲溢紙幅頓覺爽籟發衣襟舉觴一酌春生腹墨竹玉個個翠重重一灣流水北雙板小橋東竿短竿長皆入畫枝疏枝密總含風五言律詩大獵五校雕弓徑三秋野獸肥乘時講武事大獮振兵威狡寧藏跡封熊悉入圍獵歸數軍實落日照龍旗塞外秋興二首路出關山外秋空日漸髙清霜凝曉斾寒色透征袍風徑飛鷹捷川長獵騎豪皇威揚四逺邊徼戢弓刀其二駐蹕依林麓風多野水鳴旌旗飄暮靄鐃吹咽邊聲雞塞霜逾白龍沙月更清却看行殿外諸部盡歡迎初夏至玉泉山緑野薰風至夜來春已過撲衣飄落絮貼水出新荷浪暖魚吹沫泥香燕作窠臨泉聊命酒披拂愛烟蘿功成回鑾恭頌二首指顧靖邊烽懷生盡服從遐荒歸禹甸大漠紀堯封廟算無遺策神功邁昔蹤凱旋旌耀日光景霽天容其二翠華旋萬里即日解征袍共仰神機邃深維聖體勞鐃歌喧後隊巷舞迓前旄拓土無中外皇猷協覆幬侍從興京謁陵二首承先崇報本橋道駐龍旗萬國梯航集敷天雨露隨精誠通寢殿肅穆奉宗彞敬仰松楸古昭森盛烈垂其二龍興基景命王氣結遙岑不覩艱難迹安知啓佑心山河陵寢壯弓劍嵗時深盛典叨陪從威儀百爾欽水圍春日獵汀洲歡聲拍浪浮雲檣排八陳桂棹競中流鳴鏑摧騰羽飛烟罨綵旒昆明誇水艦豈足擬宸遊曉度杏山曙色催樵牧山崖徑鬱盤霜凝鴉背白沙印馬蹄乾海氣籠朝旭林飈送早寒鳯城清漏隔遙憶寢門安望醫巫閭山翠黛滿雲封遙看北鎮雄壯觀侔五嶽峻秩比三公葱鬱興王氣扶搖廣莫風勒銘維祖烈瞻仰萬年同再度龍泉關遨遊從淨土安穩度香城鳥亦通禪悅松如響梵聲山嵐朝夕幻關栁去來迎鳯闕慈雲近惟殷問寢情初夏扈蹕熱河行苑留仙蹕層巒儼赤城烟光濃樹色暑氣散泉聲地僻花偏艷山深夢亦清瞻依欣聖豫風物慰皇情口外山村鳥外窺烟樹微茫磧路斜地寒宜種黍坡暖好栽瓜比戶裁駝褐居人置罝誰將淳朴意傳寫入中華雨後凉雨晴偏好邊秋氣轉清虹從林杪斷月傍隴頭生落葉飄含潤回沙溜有聲仰看羣雁度寒影帖雲明過䝉陰望裏東䝉近微茫草樹遮面城峯礙日繞郭水鳴沙户盡繅桑繭人多摘茗芽曾聞魯酒薄村店一旗斜松矯矯拂雲姿能教衆木卑蒼鱗疑挾雨翠鬛靜含颸花暖飄香粉膏流結紫芝千齡待黃鶴集此最髙枝竹緑染竿竿潤青籠個個陰節髙寒愈徑氣潔暑難侵密雨驚龍起清風引鳯吟幸邀君子號為爾解虛心寓目漠漠雲無際茸茸草漸齊花繁從徑窄溪漲覺橋低捎蝶巢梁燕銜魚沒浪鵜偶來松下坐斜倚看澆畦春深閒居長日愜幽棲軒窗面小溪雲開徐自斂鳥歇又重啼愛水頻垂釣看花偶一題坐憐春已暮望裏緑陰齊池上待月水含夕籟靜余亦淡懷空星彩低穿樹花香暗度風初看幽徑白漸露小橋紅行到天心處清光更不同壺中天峯峻疑無路雲深却有扉鶴閒時獨唳花靜不輕飛洞裏春長駐壺中月更輝一潭空似鏡碧色動簾衣母后升遐一周諱辰為念慈恩重難禁涕淚懸尊榮心莫罄恍惚嵗云遷物候常如此音容獨渺焉寢門空在望一望一凄然母后二周諱辰自隔慈顔杳重臨此日悲音徽徒有慕尊養已無時恩念劬勞重心驚嵗月馳朝來益為愴撫序淚空垂母后三周諱辰鞠我恩深重違顔夢渺茫三年成逝水百感對流光黯黯慈雲在迢迢仙路長朝來又臨諱含愴仰空蒼立春晴光當户映淑氣逐人來凍草蘇先覺枯條暖自催薦新紅甲菜應候緑英梅為問迎春吏農疇幾處開耕藉無逸農功重豳風穡事先方春勤夙駕乘令為親田夾隴千官肅扶犂百辟聮禮成終畝後父老慶豐年去冬無雪今春雨未霑足朕心憂畏莫可言喻幸於前五月十八日甘霖傾注枯焦頓解不覺喜而成詠節過五月半膏雨尚愆期晝夜憂農事精䖍籲帝慈風回雲氣合澤沛野苗滋田畯須勤課耘耔正及時皇清文頴卷首九欽定四庫全書皇清文頴卷首十世宗憲皇帝御製詩七言律詩聖駕南巡自春徂夏瞻依心切恭賦斯篇春光荏苒薰風至聖駕勤民尚未還幸有塤篪隨越舸愁無羽翼赴吳關晨趨北闕螭頭上夜夢南雲豹尾間清蹕恭迎堪計日幾回翹首潞河灣謁昭陵恭頌鍾靈育秀氣佳哉宇宙從兹景運開帝統兼因文治廣聖基豈獨武功恢遼韓海永涵深澤松杏山髙接上台䖍肅奉觴恭拜畢五雲飛處久徘徊謁福陵恭頌一峰天柱象崑崙聖武開基百世尊廟貌輝煌藏劍舄塵氛蕩滌闢乾坤赤龍遐舉雲留影石馬宵趍汗漬痕赫濯聲靈通僾肅春秋霜露感長存望海樓二首凌霄雄傑聳層樓碧海蒼茫逺望收混一乾坤雲水濶濯磨日月浪花浮百川輸委盈襟帶萬類涵濡任泳游聞道此中含帝澤幾曾汪濊有停流其二朱欄畫棟最髙樓海色天容萬象收海底魚龍應變化天中雲雨每蒸浮無波不具全潮勢此日真成廣漢游仙客釣鰲非我意憑軒惟是羡安流望岱芙蓉萬仞插丹梯海上羣峰莫與齊九㸃青烟看野馬五更寒日候天雞雲封峭壁松多古蘚積殘碑字未迷冉冉嶺頭笙鶴下仙壇曾此降金泥早起寄都中諸弟曉起輕寒透薄帷風光節物暗推移正當邊塞秋臨早况是關山月落遲一雁孤鳴驚旅夢千峰攢立動詩思鳯城諸弟應相憶好對黃花泛酒巵熱河閒詠山深地僻塵囂隔斜映茅堂百尺松石壁有斑憑雨鑿柴門無鑰倩雲封盤嵓曲磴留麋跡繞砌平沙印鶴蹤夢覺南窗何所事獨吟獨酌儘從容月夜泛舟隄栁陰分舉畫橈數聲嘔軋蕩輕舠芙蓉館北香浮沼桑柘村西月滿橋雪鳥衝烟孤鷺起金鱗破浪巨魚跳溯洄一片清光裏心會南華秋水謡擬漁樵耕牧四首漁舴艋漂搖隨處家一篙緑水度年華風罾逐浪蘋溪逺雨網衝烟栁渚斜在在耽閒盟白鷺朝朝買醉饌紅蝦團圞兒女歡篷底豈羡浮名舉世誇樵一生蹤跡在烟霞不植條桑不種麻翠柏斫來青帶葉古藤擔去紫垂花歌長時引猿窺穴歸晚常乘月到家笑指雲山為活計那須巵酒祝篝車耕茅屋疏籬翠蔓牽繞籬桑柘翳平田村中斑白閒無事隴上青黃喜有年比户機梭鳴月下一家兒女聚燈前那能更羡公卿貴蟹美魚肥稻熟天牧平原淺草淡烟和指㸃牛羊下緑坡逐隊飲時泉響細偷閒卧處栁陰多長河曲岸悠揚笛斜日微風斷續歌借問道傍騎馬客何如犢背穩披簑甲辰十一月十三日霜露重驚嵗月侵撫時莫解感傷心慕思實切終身永恩德難酬罔極深那得寢門重問膳每懷聖訓更霑襟朝來回憶前年事痛抱終天自古今暮春雜詠春雲淡蕩滿平湖渺渺烟波接緑蕪芳甸雨過花競笑畫橋風起栁相扶鶯歌鳥語天然曲水秀山青自在圖勝景已超塵世界何須駕海訪蓬壺其二爐烟裊裊拂簾櫳太液波澄曉鏡融卜嵗喜看三月雨惜春深坐百花風紅塵不到黃金闕香霧時遮白玉宫對此上林光景好清平願與萬方同夏日樓前栁布濃陰覆釣磯樓前翠幃緑成圍驟過白雨長虹見㸃破青天一鳥飛閒處方知塵事擾靜中始驗道機微不煩驅暑搖團扇水面風生透葛衣山亭蔦蘿滿樹帶烟垂篩月梳風作幔帷流水似琴還似筑青山宜畫又宜詩饑鼯竊果緣枝捷乳雉呼羣出草遲獨倚石欄舒逺目亭前幽谷起雲時初夏西苑遊矚前廷午退紫宸班回輦尋幽竹石間一息不停新緑水四時相對舊青山溪烟淡蕩平臺晚林影參差夕照閒鳥識禁園棲托穩每看飛去又飛還深栁讀書堂避暑三庚節届祝融臨閒對明窗閲古針樹杪鶯喉調妙曲檻邊蝶翅舞芳襟嫩荷香逺風頻遞深栁陰重暑不侵移榻簾前何所思要賡解阜入虞琴新霽苑中秋色頗佳臨流玩賞率成一律步輦從容雨後臨湖亭景物可追尋幽花戲蝶紅芳晚密藻潛鱗碧漲深㵳泬天光空野馬潺湲澗水靜塵心閒遊不用調絲管自有松篁奏好音夏日勤政殿觀新月作勉思解愠鼓虞琴殿壁書懸大寶針獨覽萬幾憑溽暑難拋一寸是光陰絲綸日注臨軒語禾黍常期擊壤吟恰好碧天新吐月半輪為啓戒盈心秋日寓目成詠玉露金飈肅昊穹澄泓秋水映簾櫳羣峰黛染呈寒碧逺浦霞明蕩晚紅風度桂林香滿院月穿雁字影書空豫懷喜慰西成候多稼如雲處處同秋日登朗吟閣寓目縹眇遙峰帶夕曛晴光歷歷望中分橋移虹影當溪卧風度蟬聲隔岸聞數片晚霞三徑菊一潭秋水半牀雲髙亭避暑才吟罷又聽金飈送雁羣雨後郊外泛舟霧斂西巖暑氣消微風正好泛輕橈新晴燕雀低臨水積雨菰蒲密礙橋到處湖山惟竹月數家烟火盡漁樵瀛洲宛在京畿右不羡仙槎去路遙偶題舜禹傳心十六字執中一語貫精微漫從體用觀真妄不向筌蹄覔是非大地春風揚妙道碧天秋月露清機箇中密諦何人會魚自深潛鳥自飛朕因去冬未雪憂懷莫釋夙夜竭誠祈禱于驚蟄後二日荷䝉上天鑒佑春雪下降朝野同歡因成一律用志欣慶霡霂愆期憂嵗儉臨軒愁詠憫農歌三冬望雪心如渴此日飛霙氣始和蒼昊垂慈施愷澤黔黎占稔沐恩波遙思九土應同慶積素凝華知幾多蓬萊洲詠古唐家空築望仙樓秦漢何人到十洲塵外嘯歌紅樹曉壺中坐卧碧天秋廟堂待起烟霞侣泉石還看鶴鹿遊弱水三千休問渡皇家自有濟川舟朕御極七載宵旰萬幾未遑他出已酉夏因命將逺討誓師于南海子緬懷曩日侍奉皇考巡幸此地色笑儼在目前而龍馭杳然邈不可攀俯仰徘徊曷勝今昔之感爰成一律以述追思花開野甸不知名按轡依然輦路平細草當時隨駐蹕垂楊此日繞行營河山滿目音容邈風景關心嵗月更禁旅多年䝉教養畀豫戡定作干城冬至齊宫晨曦炯炯潔齊宫一縷爐烟散綺櫳暖氣潛回葭管律早梅先綻玉階風中孚默契天人理來復明彰造化功漫道書雲成故事精禋惟藉寸心通乙已仲冬恭詣景陵恭陳服御儼憑依拜奠菁茅凛不違四十年餘恩浹髓一千日裏涕沾衣寢園翠繞熊羆護陵樹霜寒鳥雀稀翹首五雲猶在望忍乘清蹕告言歸己酉夏南甸大閲陳師鞠旅卜良朝萬里餱糧備已饒習戰自能嫻紀律臨戎惟在戒矜驕劍瑩鸊鵜清光閃旗繞龍蛇赤羽飄聽徹前鋒歌六月雲臺合待姓名標雨後九洲清宴望西山蒹葭葉上雨聲過乍覺新凉颯颯多山色崔巍千叠翠湖光瀲灔萬重波遊魚避釣依寒藻翔鳥驚絃就碧蘿莫訝金風催改序秋暉偏好快晴和五言排律瞻仰盛京宫闕念祖宗創業艱難恭賦二十韻奉命趨遼海猗歟仰舊宫逶迤龍脈逺詄蕩鳯城雄念昔開洪造乘時建武功師征方自葛考卜重遷酆一劍風塵際三陲指顧中神威宣率土皇極協蒼穹式廓彌增壯維垣遂克崇八門連閫域雙闕竦髙空曵珮千官列輸琛萬國同兵農咸定制禮樂漸移風爰及純熙介覃敷景厯融寰區欣奠鼎故里抱遺弓沛邑恩優渥舂陵望鬱葱星躔爭拱北王氣本從東綿瓞鍾靈盛凝庥後裔䝉聖慈殷孝享敕諭遣微躬肅覩興京勝恭承祀典隆丕基勞櫛沐奕葉荷帡幪松檟靈祗護檐楹肹蠁通祖宗光烈在明發惕愚衷述懷眇躬臨億兆兢業凛淵深先哲羮牆見前徽手澤尋弛張遵祖訓賞罰順天心庶績勤宵旰私居慎影衾衛詩防湎酒夏訓戒從禽每喜親耕稼長懷勸織紝菽葵村落圃桑柘水邊林民乃邦之本誠為帝所歆三冬盈瑞雪九有遍甘霖嵗稔田家樂河清漁父吟羣英襄治理列士獻規針勉詠南薰曲多慚繼舜琴七言排律我皇考深恩慈愛過于髙厚一旦背棄再覲無期遙想音容彌殷哀慕苫塊之次言出痛忱非同寄情于詩文也於戲罔極之德報曷能盡終天之慕詞豈可宣此篇乃中心迫切不能自禁之詞翰林諸臣各依原韻進呈朕覽慕思君父淚千行四十餘年顧復長髙厚恩深悲罔極瞻依情切託靡方天顔咫尺忽成隔庭訓趨承難再望提命諄諄猶在耳樽彛肅肅總摧腸銜哀但覺蒼旻逺舉首惟悲白日凉展轉心增風木恨劬勞忍誦蓼莪章仙軿已返層霄上夜夢仍親御座旁海水可枯石可化終天仰戀詎能忘立秋前二日遊湖亭放情幽興付漁簑瀟灑林亭樂太和每踏芳叢尋古句閒乘小艇泛清波烟凝翠黛山疑霧風蹙斜紋水似羅深砌蛩鳴殘暑退髙梧蟬噪晚凉多炎雲漸斂秋將近霽景才看夏欲過靜聽菱歌音韻好何須簫鼓濟汾河六言詞田家四時詞春陌頭栁葉初放溪上桃花欲燃處處青鳩呼雨家家黃犢耕烟牧童羣嬉挑菜餉婦自解撑船借問浪遊城市何如樂業村田夏帶露葉盈蠶箔翻雲麥熟田家白水千塍秧馬緑陰幾戶繅車日午鳴蟬逺近風薰飛燕橫斜男女適均勞逸相逢只說桑麻秋風露微凉天氣四鄉一𣲖秋光蕎吐東阡雪白禾香南畝雲黃青刈園蔬足雨紅收林實經霜舉室欣逢樂嵗商量築圃登場冬靄靄炊烟茅舍霏霏臘雪柴門闌靜閒眠羔犢籬牢安穩雞豚夜織梭鳴啞軋朝舂杵韻喧繁賽社村撾祭鼓歌呼新釀盈盆七言絶句懷邊地將士天祿延儒方偃武長楊罷獵豈佳兵無端戍火明西塞勞我星旗向逺征月照天山玉帳髙風吹霜氣透征袍年來倦聽嘉禾頌一飯寧忘汗馬勞玉門關外草連天一騎飛馳到日邊報道單于甘就撫羽林齊唱凱歌旋將軍跨馬擁戈矛壯士驅車久未休一紙捷書期早至黃金鑄印待封侯竹月蕭蕭疏映月昏黃浥露凝烟暈素光陰轉粉牆鋪翠影湖州新寫墨篔簹宴月花月依依入暮春坐花醉月綺筵新始知蟾魄無私照瓦缶金尊各一輪池月半畝池涵天作底一番風過水流金驚看錦鯉如梭擲織就橫紋緑綺衾山月林深鳥宿夕烟暝玉鏡揚輝不受扄夜籟寂然羣動息一輪飛過萬山青皇清文頴卷首十欽定四庫全書皇清文頴卷首十一御製文論立身以至誠為本論夫誠者萬物之原萬事之本天所賦物所受之正理也故在天則為乾元坤元而萬物資始資生在人則為能盡其性參天地而贊化育然人咸具是理而鮮能全之故日蔽於私溺於習而天理幾乎失矣聖人者出作君作師修道以立教教人由誠之之道以馴致至誠之域故曰立身以至誠為本豈非實理本於生初在人之自勉乎蓋至誠聖人也誠之者擇善而固執之者也既能擇善又能固執則可進於誠矣而身立矣夫立身不外於言行而言行不可以外飾言必期於有物則言可為天下法矣行必期於有恆則行可為天下則矣誠故也立身必先於忠孝而忠孝不可以僞為視無形而聼無聲則飬志承歡可云無忝矣公忘私而國忘家則盡忠補過可稱匪懈矣誠故也其要在克已已不克則私欲潛滋何以能誠其功又在慎獨詩曰相在爾室尚不愧于屋漏先儒有言曰學始於不欺暗室良以獨不慎則發念行事終為小人之歸耳然則克已慎獨者求誠之切務也厯觀古來聖有安勉而皆本於誠書曰欽眀文思安安堯之至誠無間也又曰元德升聞舜之至誠上達也仲虺之誥曰以義制事以禮制心丹書曰敬勝怠者吉義勝欲者從此湯武之勉而誠也勉而誠與至誠無異堯舜湯武莫不稱之為大聖故曰及其成功一也然則欲誠其身當擇善固執克已慎獨以馴致於至聖之域以之參天地贊化育不難矣讀書以眀理為先論天地之間萬事萬物莫不有理理者天之經地之義民之行也是故日月星辰之朔望躔次陰陽寒暑四時之推遷往來皆天之氣也而有乾健於穆不已之理主宰乎其中山川河嶽百榖草木之麗乎地以生者亦莫不賴坤元載厚之理以為之根柢人性之仁義禮智賦乎天之正理也因之而見為惻隱羞惡辭讓是非之情及變化云為萬有不齊之事由是觀之天下事物孰有外於理哉故聖人之教人講學亦曰眀理而已矣蓋理者道也道之大原出於天其用在天下其傳在聖賢而賴學者講習討論之功以眀之六經之書言理之至要也學者用力乎眀理之功以觀六經則思過半矣所謂眀理者眀其所當然與其所以然所當然者父子當親君臣當義夫婦當别長幼當序朋友當信之謂也所以然者父之所以慈子之所以孝君之所以仁臣之所以忠夫之所以率婦之所以從長之所以愛幼之所以恭朋友之所以責善輔仁之謂也知其所當然然後信之篤而不悮於岐趨知其所以然然後喻之深而不能以自已至於一事一物亦莫不眀其表裏精粗與夫善惡是非之宜夫如是然後理眀而有所持循此大學眀眀德之功必以格物致知為先中庸擇善之目必在於博學審問慎思眀辨而先儒講論亦必以講眀為踐履之本先聖後聖豈有二道哉雖然眀理要矣而既明之後則又在於行之之功茍或知有餘而行之不足則雖精義入神亦無當實用盛德至善竟何有於我哉故致知與力行相須為用而致知則在所當先何以言之知都㑹之壯麗而欲往觀之必先悉其所由之路而後行焉悉其所由之路是眀理也身往由之是力行也茍不知之悉而往行之則有失徑迷途之譏為學之功亦如是蓋知仁為萬善之本必不逞私欲而為利已害人之事矣知義為萬事之宜必不自昧其羞惡之良而為偷安茍合之事矣此講學之必以眀理為先也故書之稱堯曰欽眀稱舜曰文眀堯舜天下之大聖也而其所以成大聖者則以眀為本焉彼不務眀理而徒以記誦辭章自耀者是猶舍璞玉而貴碔砆而彼不知而冥行者是猶去燭而夜行均為惑之甚矣雍正七年皇父駕臨上書房親灑宸翰恩賜御聯題曰立身以至誠為本讀書以眀理為先余兄弟盥手祗領謹懸座右爰以寶訓著論二首庚戌之秋手録文鈔即以此辨冕全集非敢云闡揚聖教特以紀過庭慈誨並志書紳微悃爾信而後諫論詩曰衮職有闕惟仲山甫補之夫仲山甫之補袞職也柔嘉唯則天子是若蓋其誠信素達於人君而人君鑒其誠諒其忠故諫無不從言無不聼雖宣王聼言之美亦山甫取信有素也故子夏曰君子信而後諌可謂知進言之道矣蓋君臣一德上下志通然後可繼都俞吁咈之盛而致治於熙皥故人君聼言之道固不可懈而為臣者亦當思所以善進其言之道焉夫人臣諌君非可易嘗也必能進思盡忠退思補過職業修於蒞官之後忠誠逹於未定之前然後法語不傷于猛巽語不嫌於諛是故為人臣者必無恝而不諌之理但當素盡其誠使人君信之而已若素無忠誠之心則雖激於一時犯顔强諌而于國事終無濟也雖然信而後諌理也若事至于危急一日不言則民受一日之害一日不言則天下之害甚於一日斯亦可以待其信而不言乎故魏徴之與太宗信而諌者也陸贄之與德宗不必待其信而諫者也而後之人均是之者以贄雖不能信於德宗而其忠誠天下後世自信之也修道之謂教論道之大原出於天禀乎天之命以為性而因乎性之良能以為道故率性之謂道實天地自然之理也然性無不善感於物而動則有欲欲日以引而道或有所不行上天眷命作之君師使有以節民之情而復性之善以行其道故曰修道之謂教非道之外别有所謂教也蓋人禀五行二氣之靈首萬物而具五性仁義禮智之德忠信孝弟之行皆偹於我然聖者能之而賢不肖則有過不及之差焉古昔聖王之治民也漸之以仁摩之以義節之以禮和之以樂熏陶涵養使德日進而道自修自十五入學迪以性之所固有老而靡他焉故仁讓之風周於十室而人民惇厚後世莫及蓋教之以孝友睦姻任恤之行而仁道行矣分貴賤定上下眀賞罰辨等威而義之為教行矣鄉飲社㑹以及冠婚喪祭莫不有禮而禮之為教行矣師友以解其惑學校以𨗳其趨而智之為教眀矣立此四教而使民日就月將無詭異之習詐僞之萌而信之為教得矣故君師之責修而道乃不虛三代以下致治之盛如漢之文帝唐之太宗宋之仁宗皆朝乾夕惕勤勞匪懈然不圖其本而務其末徒有惠愛之政而無教養之實方之漢唐則令主比之三代則庸君此無他教不能行則道無由眀於天下也夫天無不賦以性之人則天下無不能率道之人人君果能眀德以新民修道以立教則朝行而暮效矣何難之有哉而昏庸之君自謂不能而不行英眀之君自謂已能而不屑此三代之治不可以一日復而民之固有之道不可以一日眀也夫正身以正朝廷正朝廷以正百官正百官以正萬民因民之善以立教即因我之教以復性而古先王所為牖世而覺民者在是矣其於復三代之治乎何有上下交而其志同論夫天下安寧治登上理必賴眀良一德咨謀啓沃然後上下一心庶績允凝而萬方順則也易曰上下交而其志同可以覘治世之氣象矣蓋天髙而地下君尊而臣卑理勢之當然也君之不可下於臣猶天之不可卑於地然天地之形不可交而以氣交上下之分不可交而以心交故陰陽和而萬物順上下交而萬民化此天地之常經古今之通誼也上下一心君臣相得則治反之則亂合若符節信如應響故堯舜之於臯䕫稷契成湯之於伊尹成康之於周召皆以聖眀之君交聖眀之臣而其致治之盛也勃焉三代下如齊桓之于管仲昭烈之于孔眀苻堅之于王猛太宗之於房杜王魏雖未及上古君臣之以聖交聖然亦各以賢眀之資得賢眀之臣為之輔同舟共濟言聼計從故其治亦得小康貞觀之風後世稱盛蓋上下志交則天下乂安民受其福理不爽也至于亡國之君莫不由君尊而臣卑志驕而意滿臣之忠言不逹於朝廷國之大寶棄之於草野小人日侍左右而専事阿諛以取容雖有上下之分實無君臣之誼豈得謂之交哉故二世之寵趙髙桓靈之任趙忠張讓隋煬之用虞世基豈非交所不當交而逺所不當逺之禍乎故易之理無定而惟在於貞與君子交則謂之泰而吉與小人交則謂之否而凶書曰紂有臣億萬惟億萬心豫有臣三千惟一心夫紂之所與朝夕共處者豈無股肱心膂之寄哉然不交正人而所交皆小人故殷以之亡武王之臣皆周召呂散諸人一德一心故膺天祿而保祚無疆夫人君莫不欲得賢才以自輔然而庶事未康至治不見者蓋所謂賢非賢而才非才也然則果無賢才之可用歟曰彼所謂賢者乃善已者也所謂才者乃能以巧術奉上者也方是時草野之賢才深藏不出而已矣在位之賢才遜荒行遁而已矣間有碩果之存亦今日用之眀日黜之而已矣又何能久於其朝哉誠能舉天下之賢才登之於朝而不疑誠以接之信以待之上下一心交修罔懈則天下有何不治而隆古有何不復哉雖然此特為為君者言之耳書曰臣哉鄰哉鄰哉臣哉古之大臣一日立乎其位一日盡乎其道陳善閉邪補衮職之所闕其用與舍惟君之命耳不謂君弗用而有懈惰之心夫如是然後上下相和得交泰之道而都俞吁咈之風日見於朝廷矣家人上九有孚威如終吉論治國必始於齊家而齊家又在於修身修身之道莫若以身率之待之以誠而不使之怨臨之以莊而不使之狎則家道永昌以之治國平天下將無所不可矣易家人上九之爻曰有孚威如終吉可謂得治家久逺之道矣蓋居卦終而有剛德得威嚴之道惟卦終故以象家道之成惟有剛德故能孚威以待下治家之道當慎於其始防之不可不密故初曰間有家謂及其志未變而間之也又當善乎其終待之不可不誠御之不可不嚴在上曰孚威信與威相濟則永得治家之道矣不但父子兄弟夫婦之間必如此而後得吉也凡家之中長幼尊卑皆當率是道以行孔子曰惟女子與小人為難養也近之則不孫逺之則怨夫惟以威御之則近而不至於不孫以誠待之則逺而不至于怨雖然所謂威者豈鞭撻箠楚之加而所謂孚者豈煦煦焉徒事姑息為哉自勝其私語言可愛行止可法而不蹈非禮則人自畏其威矣自勉以仁立愛惟親立敬惟長妻子好合兄弟既翕則人自感其誠矣此又反身之要而治家者所宜先也嘉言罔攸伏論人君表正萬邦富有四海萬幾庶政日陳於前誠有所不至眀有所不周差之毫釐謬以千里古先哲王之眀目達聰咨嶽咨牧者亦期嘉言之罔攸伏而已蓋天下之智有不同而天下之理無一定故恃一人之智以為智不若兼千百人之智以為智人君雖眀足以照萬邦燭萬事然天下千百人之智又何能盡兼萬事之至賾至動參錯不齊者又何能盡眀所賴人臣陳善閉邪補衮職之所闕使嘉言讜論日聞於前然後眀微燭隱政無不通而眀無不照然人臣之能盡言者由人君有以啓之耳茍人君孜孜黽勉樂受盡言則人臣亦何惜而不言哉故大禹之祗承於帝曰后克艱厥后臣克艱厥臣帝之答禹曰允若兹嘉言罔攸伏君難其位而好聼正言臣難其位而思盡正言此野之所以無遺賢而萬邦咸寧也夫君如舜臣如禹而一時君臣之所共勉者惟在各艱其位而受盡言舜又不敢當以為惟帝時克則後世之欲圖治者舍是豈有二道哉三代以降推漢文帝唐太宗宋仁宗為令主然文帝仁厚儉約有餘而一時無大儒骨鯁之臣宋仁宗有韓范富歐諸臣而不能盡其用惟唐太宗以英武明智之資得房杜王魏為之臣終日陳言繩愆糾謬太宗屈已從之貞觀之風逺過於文帝仁宗者職此之由由是觀之納諫聼言顧不亟哉桀紂幽厲始皇之亡也其時之嘉言無聞焉豈果無嘉言之臣哉龍逢有嘉言而桀殺之比干有嘉言而紂殺之厲王設監謗之巫始皇有妖言之禁夫舜禹君臣兢兢焉惟恐嘉言之伏而此數君者方遏之絶之又從而罪之欲其不亡豈可得乎尚論者所以逰心於都俞吁咈之世也春王正月論春秋為尊王之書始自隱公不曰王春正月而曰春王正月者其意深矣蓋春者天之所為也正者王之所為也欲王者表若天時諸侯上遵王法示大始而欲正本也是故以春生之氣貫四時以王者之命正諸侯以正月之月統一嵗王者所行必上本於天不承天以制號令則無法故以春居王之首諸侯不尊天王則無正故以王居正月之首政者正也政莫先于正始故以正月為一嵗之首所以教後之王者上承天以制法度下建極以制諸侯則政行而教舉矣至於體元調元之說既失之穿鑿胡氏行夏時之說雖以伊訓證之而夫子乃從周者况春秋所書春正月無氷春二月無氷若用夏正則無氷不足為異矣冬十月隕霜殺菽若夏之冬則不應尚有菽矣周之改月改時何待論哉作三軍論周自平王東遷政令不行禮樂征伐自諸侯出於是朝覲之禮廢尊王之典衰而㑹盟征伐一歸霸主順者安之逆者伐之王綱陵夷而天下之事不可為矣魯自隱公至于襄公凡九世而襄公之世三家始専政所謂自諸侯出十世希不失者也三家之専政始于作三軍三軍者魯先公之受于天子者也魯頌曰公車千乘公徒三萬則三軍為魯之舊眀矣而云作者蓋魯已廢三軍為二軍至是忽以私家之乘補公室之伍而為三軍聖人謹書其作毁而季氏險戾無君之罪畢著矣蓋季氏専魯已數世至於宿而遂懷竊國之心故乘襄公幼弱託於增兵􅊀敵而作三軍三分魯地而十二分其民季氏得四叔氏得二孟氏得一而歸其五於公以事大國徴師承貢則季氏沛然有餘而公室用多二家力少其勢不得不毁又顯令於國中入季者無征入公室者倍征則二家之民屬公室者如陷坑阱急思自脫故一旦盡奪之公民咸順焉而公莫可如何也方作三軍時公年始十三故叔孫雖知其不可而不敢固爭至於毁之則四分魯國之地與民季子得二二子各一不獨君若贅疣而二子亦不得不屬服於季氏矣其毁中軍亦乘昭公初立叔孫身死家亂而急奪焉故余嘗謂宿之隂鷙狡譎乃萬世亂臣之渠魁而三軍之作毁則田氏篡齊三卿分晉之前轍也故特發其義以補先儒所未􅊀云動亦定靜亦定論天地之大德曰生終萬物始萬物而萬物莫不生長收藏之各得其時然其所以大生而廣生者亦曰易簡而已矣聖人體天以治其心以修其道以合體用而貫顯微然其所以聰眀而時乂者亦曰定性而已矣定性者豈不思一事不慮一物兀若槁木而已哉動亦定靜亦定乃其所以為定性也善乎易之咸九四曰貞吉悔亡憧憧往來朋從爾思貞者定也定則吉而悔亡矣憧憧往來者不定也不定則朋從爾思朋從爾思凶可知矣程子亦曰天地之常以其心普萬物而無心聖人之常以其情順萬事而無情無心無情者非無心無情也無私心無溺情也惟無私心故心普萬物無溺情故情順萬事非動亦定靜亦定之謂乎君子之學廓然而大公靜之定也物來而順應動之定也靜定故主一無適虗眀洞徹而內邪無自而生動定故順理而行措施咸當而用志不紛於外內外兼修本末俱偹入聖之功豈外是哉陸贄論治有不生於治之日亂有不生於亂之時有國家者宜正其本而辨之於早也吾讀史至唐德宗之時謂朱泚之亂不生於姚令言而生於用盧杞復唐之功不在於用李晟而在於信陸贄天下之治亂社稷之安危在於人君用一人由是觀之用人可不慎哉當奉天之難天下反者十四五藩鎮擁强兵虎視中原而朱泚兵徑將强圍城纍月其破圍解難冒矢石觸鋒刃以救帝復國者固李晟渾瑊諸將之功而經營大計調和天下使諸鎮人人思慕唐德者非陸贄之功其誰之功歟余故曰復唐之功不在於用李晟而在於信陸贄也贄為人剛方嚴正而有經世之才其奏疏皆可行可法措之於天下則有治安之效大抵以仁義為本根貨財為末務論深切於事情言不離於道德至於君子小人之分忠厚苛刻之别推誠任術之判未嘗不反覆為德宗言之故在奉天之時悉聼其言而藩鎮畏威梁州再幸道路相失號痛如失左右手及天下略平大難略定乃置於間散者數年雖命為相不能信用又聼裴延齡之讒而貶於逺州蓋君子小人之分若此其難雖贄反覆言之而身亦不免於廢黜也順宗即位復欲用之詔未至而歿惜哉黃鍾為萬事根本論史記律書曰王者制事立法物度軌則一禀於六律六律為萬事根本焉蔡沈書傳又曰黃鍾為萬事根本夫順天地通神眀類萬物之情莫善於律然雄鳴有六雌鳴有六三分損益而次第相生者其數並起於黃鍾黃鍾正則十二律正而天下之聲無不正漢志所以有律本之說也昔者黃帝使伶倫取嶰谷之竹生而空竅厚薄均者斷兩節間而吹之以為黃鍾之宮班固曰黃中色也色尚黃五色莫盛焉鍾者種也陽氣施種於黃泉孳萌萬物為六氣元也其長得九寸其圍得九分其積數得八百一十分在氣為中氣在聲為中聲豈非太極元氣函三統為一而立天施地化人事之紀者哉且夫萬事之大端有五一曰備數二曰和聲三曰審度四曰嘉量五曰權衡而要莫不本於黃鍾黃鍾之數始於一而三之三三積之歷十二辰之數而五數偹矣黃鍾之律九寸為宮緣此以定商角徴羽起十二律之周徑而五聲和矣黃鍾之長以一黍之廣為一分十分為寸積而為尺為丈為引而五度審矣黃鍾之籥容秬黍千有二百十籥為合積而為升為斗為斛而五量嘉矣黃鍾之籥重十二銖兩之為兩積而為斤為鈞為石而五權謹矣虞書所謂協時月正日同律度量衡其以此也夫蓋天下數必從其朔理必原其始乾之初九一陽始生天地之心而理數之權輿也黃鍾者於時為子其卦為復在人為喜怒哀樂未發之中是則造化之樞紐品彚之根柢得乎此以盡錯綜之數定變化之宗直一以貫之耳宜其為純粹中之純粹所由與天地同和者歟若夫定黃鍾之管者京房以凖荀朂以笛蔡雍則以銅籥和峴則以景表以至或求之於度或求之於尺或求之於黍與鐸甚至執指節以尋黃鐘紛紜龎雜究莫得其指歸惟蔡季通所云多截管而吹之以候律元者其庶幾乎夫憑器考聲者形迹之論也審聲知音者神聖之藴也善乎馬氏之言曰心之精微口不能授性所解悟筆不能書惟人心自得其中和聲為律身為度然後究極理數博考典章以合天地之元聲此則宰萬事於一心而探本窮原有存於律象之先者矣說復性說性者體也情者用也制情以從性性其情也拂性以縱情情其性也情其性則性為情矣烏在其為本性也然則如之何而後可曰有復性之道焉復之之道何居曰克已以復天命之本然使和其情以順其性而已在易復之初爻曰不逺復旡祗悔孔子解之曰不逺之復以修身也言性本無失有失而能速復則身修矣在天為一陽復見在人心為本性復明豈有悔哉孔子舉此以贊顔子劉屏山舉此以教朱子以其為修身復性之要旨也六二曰休復吉孔子解之曰休復之吉以下仁也初陽乃天心之見仁也二近初陽有下仁之美言復之之道又在好德親仁涵養薰陶以日復其性而休休然有餘裕也六三曰頻復厲旡咎頻復與不逺者殊科故厲然能復則旡咎矣六四曰中行獨復卦五隂獨四與初相應處衆小人之中獨能與一君子合志同方不言吉而吉可知故孔子以從道美之至五之敦復則曰旡悔上之迷復則曰凶以此見復性之道當謹幾察微不二其過修身以克之下仁以休之獨復以持之敦厚以居之而不使之頻復而迷復焉則所謂天命之性五常五倫之美皆在我而不為習所逺矣吾故曰復性之道在克已以復天命之本然使和其情以順其性而已皇清文頴卷首十一欽定四庫全書皇清文頴卷首十二御製文序貞觀政要序夫三代以上君眀臣良天下雍熙世登上理自東遷以降風俗日薄天下無復熙皥之美雖有質美之主望治甚切而所以屈已從諫力行善政者終不能有以震古而鑠今及唐貞觀太宗以英武之資能用賢良之士時若房元齡杜如晦魏徵王圭諸人布列左右相得益彰蓋自三代以下能用賢納諌而治天下者未有如此之盛焉史臣吳兢纂輯其書名之曰貞觀政要後之求治者或列之屏風或取以進講元至順間戈直又刋其書以行於世余嘗讀其書想其時未嘗不三復而嘆曰貞觀之治盛矣然其所以致治則又在於用此數賢而數賢之中又推魏徵禆益為多然魏徵不能自必信用於太宗以見其功業則又知太宗所以獨信魏徴言聼計從而見效若彼者固人君所當服膺書紳而勿失也書中分目目中有條條之末引先儒之言而論斷之其有望於後王也深矣人君當上法堯舜逺接湯武固不當以三代以下自畫然觀爾日君臣之所以持盈保泰行仁義薄法術太宗之虗已受言諸臣之論思啓沃亦庶幾乎都俞吁咈之風矣韓文公文集序天下之事有其藝則必有精於其術無論小大精粗能使機應於心技凝於神則外物不能紛而後之習其藝者皆奉以為師法養叔治射離婁治規矩師曠之於音聲倉公之于病匠石之斤公孫之舞皆造其堂而嚌其胾傳之後世而無窮夫文亦天下之一藝也精其術可奉為師法者周有左氏漢有賈誼董仲舒馬遷相如劉向此數子者雖非見道之文要皆卓自樹立不合流俗而其文之古朴亦非浮華澆漓者所能及逮自五代剖分文弊質窮天下之言文者務以藻繢為事娓娓如婦人言世道衰微人心由之僞薄至唐并天下蔚興文教殆百餘年而後昌黎以六經之文鳴天下由是言之文之係于世道人心亦大矣蓋昌黎之于文所謂造其堂而嚌其胾因文以見道以蘄至于古之立言者也其自用之功在于培養仁義以為立言之本而其所得之趣則氣盛而言之短長與聲之髙下皆宜至其不蹈襲前人一語不煩繩削而自合規矩不顧世人之笑譽反刓以朴剗僞以醇粹然一出於正後之習文者皆奉為師法而莫有能加焉噫亦至矣雖然公非徒長於文者其道德謨猷皆有唐一代之特出而不能大顯於憲穆之朝者氣運之遷流非人力所能挽耶抑使之少抑於一時而終揚于萬世耶將全於此則不能全於彼耶孟子距楊墨而道以之傳昌黎排老佛而道亦因文而見起衰反正始若未之信終大顯于時蘇子瞻以之上擬孟子豈過譽哉杜子美詩序夫自上古康衢有擊壤之歌虞廷有卿雲之詠帝與臯陶禹益諸臣敕命賡歌拜手揚言於一堂歌詠之興有自來矣爰逮姬周公旦公奭調宮協徴律其節族舂容乎大篇堂皇乎雅辭化自二南達於列國上自公卿下至黎庶至於變風變雅亦莫非忠臣義士攄其忠悃發為歌辭好色而不淫怨悱而不亂皆可以勸懲當時為教後世詩三百一言以蔽之曰思無邪孰謂詩僅緣情綺靡而無關於學識哉然三百篇之詩不拘格律而音響中度所謂大羮不和而有至味也漢變四言為五言間亦有七言之體至魏晉而音韻愈盛入唐而格律益精鹽梅之設大羮之害也七竅之鑿渾沌之賊也至有不言性情而華靡是務無勸懲之實有淫慝之聲於詩教之溫柔敦厚不大相剌謬乎是以言詩者必以杜氏子美為凖的子美之詩所謂道性情而有勸懲之實者也抒忠悃之心抱剛正之氣雖拘于音韻格律而言之愈暢擇之益精語之彌詳其於忠君愛國如饑之食渴之飲須臾離而不能故雖短什偶吟莫不眷顧唐祚繫心眀皇蜀中諸作尤致意焉屈原放逐離騷是作後代尊之為經子美之詩亦因其顛沛流離抱忠秉義不究其用垂於詩以自見故後世宗之參之於三百篇之列若夫較一字之長爭一韻之巧摛華藻於篇章誇博贍以耀衆者藝也非所以求子美也朱子資治通鑑綱目序孔子作春秋而亂臣賊子懼夫春秋亦一編年之書而曰亂臣賊子懼者蓋謂彰善疸惡比事屬詞誅奸諛於已往杜僭亂於將來使亂臣賊子不畏王法者讀此書而知懼豈非有功於世道人心者哉三代而下孔子之道幾乎息矣故臣叛其君者有之子背其父者有之而亂臣賊子無所忌憚子朱子生於周程之後修明絶學深痛而甚憫之祖夫子春秋之筆削因溫公通鑑之書更創義例為書曰資治通鑑綱目其自序曰表嵗以首年因年以著統大書以提要分注以備言洵哉善善惡惡是是非非具于一篇之中而無不備矣然後人知忠臣義士必獲天休也雖不用于一時而後世莫不褒歎效法之恐後也亂臣賊子必攖天誅也雖幸免于當世而千載以下公議莫逃也彰善疸惡比事屬詞雖不足以盡春秋之義抑其大略則可謂同揆矣夫三代以下傳世久逺者莫如漢唐當其盛時政教恩澤入民之深非不可稱然其易代之際死君事者可數焉自修綱目之後士知顧禮義廉恥以事二姓為辱故南宋之末忠臣義士捐軀而徇王事不肯忍恥偷生以求茍活者屢見于史策之中且元代宋明代元無分析割據如前五代後五代之亂者亦因忠奸賢佞褒嘉貶斥凛若衮鉞人知有所懲勸懼見誅於後世也如是而謂之綱目修而亂臣賊子懼其誰曰不然送五弟奉命往祭闕里文廟序雍正八年冬十月新修闕里文廟告成殿廡門陛黃瓦丹雘既宏既隆圭瓚爼豆樽罍之器頒自上方聖天子親書大成殿大成門匾額復命良工重摹聖祖御製文廟碑文孝思繼述重道崇儒兼備於此既成例宜遣官祭告皇父特重其禮命皇五子齊居潔誠治裝減從以行余與吾弟夙夜之與俱飲食之與共講習討論之日親至于今二十年兹往千里之外能無依依繫戀而不忍舍顧思人自孩提以至於老大讀孔子之書未必能志希賢聖窮理探源以至於知孔子之道也幸而知之矣而私纍之未捐精進之不勇則鮮能行之既行矣未有不心慕孔子欲登其堂而入其室者吾弟力學敦修不敢自懈於聖人之道者有年矣今奉命往祭闕里瞻宮牆之數仞則欲得其門而入以見宗廟百官之美富也對聖貌之巍巍則思溫厲恭安如在其上而自省其躬修也逰禮樂之區想見金聲玉振之氣象是行也不益以增其嚮往服行之心而為有生一大快乎皇父猶有後命命吾弟祭闕里畢即往致祭岱宗吾弟往哉昔孔子嘗登泰山而小天下孟子述之蓋謂得登聖人之堂與聞聖道之精深廣大則諸子百家羣言皆小也猶之登泰山之髙者得觀其嶔岑峻極則峛崺培塿皆不足言也吾弟既登聖人之堂又登泰山之髙誠敬之日積仰止之日深視瞻之廣濶胸次之豁然古文人學士所謂逰名山大川以助其文思筆力者又烏足云哉稽古齊文鈔序天地間有大本焉孝悌是也有大文焉詩書是也有本有文積於中而發於外有德之言是也孝悌以立其本詩書以暢其支而因發為有德之言英華暢逹而不可掩能全此三者寡矣至若生帝王之家居富貴之地子道臣道交萃于躬夙夜匪懈篤念天顯尊聞行知究極於髙眀光大之域非以道自勉者能乎哉吾弟少於吾甫三月皇父在潛邸時育吾二人於東西室及九嵗讀書同受經于傅先生至十二嵗時吾隨侍皇祖宫中不能朝夕共處者蓋半載及我皇父位登宸極妙選天下之英賢以教育吾二人凡八年于兹矣斯邁斯征日就月將以期不負皇父顧復燕貽之至意無時敢自懈也八年秋九月吾弟彚訂其序論雜文詩賦凡若干卷而屬序於余余曰吾輩所重豈止於文而已耶必若向所云三者皆克全之然後盡吾職焉吾弟在皇父膝下二十年愛敬懇摯從未有過愆與吾自孩提以至於今且孺且耽怡怡如也從諸先生敬業一堂既饜飫於詩書矣而發為文詞觀其言藹如考其意不外古聖賢名儒之旨所云三者翼翼焉亹亹焉日進而無疆豈止以文自鳴者哉余既以同氣之親相親相朂於平日晨夕之與俱筆硯之與共爾我形骸之悉化兹序其文其夷懌欣暢又當何如乎執中成憲序惟我皇考法天行健一日萬幾宵旰不遑猶以其間簡命儒臣採録經史子集所載自古帝王元德顯功訏謨大訓以及名臣奏章先儒語類深切治道者次第進呈皇考親為刪定命曰執中成憲始于雍正六年仲春成於十三年中夏未及刋布而我皇考遽遐棄臣民豫小子㷀㷀在疚未之前見也嗣統既月勉從諸臣請躬涖庶政始發而讀之既卒業然後知聖心聖學實與堯舜孔子同揆而汲汲於是編則専以啓迪我後人示之標凖也間嘗殫思大學一書竊見仲尼祖述堯舜之實義焉其所謂明德者即虞書所謂道心也所謂眀眀德者懼其為人心所蔽也所謂格物致知者嚴辨人心道心之界以盡萬事萬物之理即書所謂惟精也所謂正心誠意者力祛人心之雜以致道心之純即書所謂惟一也所謂修身齊家治國平天下而止於至善者即書所謂允執厥中也然極乎執中之量則惟堯舜為無歉而中之散見於萬事萬物者則不惟三代聖王即秦漢以後仁厚英哲之君下及中主亦必有一事二事之合焉不獨臯䕫益契伊傅周召孔曾思孟即近代羣儒文士亦必有一話一言之合焉故中庸曰舜好問而好察邇言執其兩端用其中於民蓋中之理無事無物而不具亦無人而不知是即眀德之根於性而不息者而惟舜能察之惟舜能執之惟舜能用之故善與人同合德于天地我皇考編定是書自二帝三王之事古聖賢之言下逮羣儒文士之可節取者兼收而不遺用是道也皇考之治天下無一事不審其則無一物能匿其情即書所謂惟精大學所謂格物而知至無一時之不敬無一念之不誠即書所謂惟一大學所謂心正而意誠故凡施於政教者或豫或奪或寬或嚴或抑揚遲速之稍有不同而無不立乎大中可為民極即書所謂執中大學所謂身修家齊國治天下平而明德新民皆止於至善也而所以立綱陳紀更化善治其大者皆斷自聖心而細者亦博採於衆議有其人不能皆入於善而一言之中必不廢焉即中庸所謂好問好察執兩用中也然我皇考聰眀睿智夙具於聖性而養成於聖學者已數十年故皇考之惟精乃不思而得皇考之惟一乃不勉而中皇考之執中而化成天下乃從容中道無為而成豈復有資於是書所以親為刪定者正恐在後之侗懵然無見于執中立極之道爰示之以成憲也豈惟豫小子奉以終身惟日兢兢無敢踰越哉世世子孫茍能服膺勿失而溯其淵源則於堯舜孔子之道一以貫之矣豈惟君人者舍是無以建其有極以消天下之偏陂反側哉凡百有位果能是訓是行則上之可輔理成化以著勳猷而下亦可以謹身而寡過於以謨眀弼諧共臻喜起眀良之盛無難矣日知薈說序日知薈說者取豫嚮日日課所為文刪擇編次合而録之爰定之以名也豫禀承庭訓懋學書齊留連往復於六經四子之書求其義藴精微旁搜諸史通鑑考定得失區眀法戒以至儒先緒論詞苑菁華莫不遍覽雖究心探索饜飫其中然考之古聖賢躬行實踐之學蓋恧焉而未逮自十有四嵗學屬文至於今又一紀矣其間日課詩論雜文未嘗少輟積成卷帙瑕瑜各半踐阼以來萬幾待理豈復得如曩時専志篤學日與良師友敬業樂羣於翰墨之場哉紬繹舊聞念兹弗釋因取其精去其疵録其正棄其偏合二百六十則釐為四卷而舉凡道德性命之㫖學問政治之要經傳之淵源古今之事跡莫不略見梗概夫日知之說出自子夏繼以無忘所能必所知者日新不失而賡續以極于髙明乃為學問窽要若豫嚮日所得尚非空言而無濟實用則今班朝蒞政之間豈不足自考其知行合一與否以發抒聞見遜敏敦修乎樂善堂全集序朕少讀尚書見二帝三王以及繼世之哲后君臣咨警惟是身心性命之本原其敷政命官亦惟根柢道德而不規規於事為之末及考詩易四子之言凡論政者皆與書所稱同其指歸互為表裏其後博涉諸史則雖眀盛之世所殫心竭慮者大槩詳於事功而略於本原教化之升降治象之崇卑其分岐實判于此用是日有孜孜求所以取道入德之門䝉皇考示以眀理立誠之大訓而略得其統貫又念修辭必本乎誠故凡見於古文詩辭者咸以是為宗而不敢有二焉往者嵗庚戌曾録數年中所作序論書記雜文詩賦次為十有四卷置諸几案時就所言以自檢其行嗣是所作蓋四倍前繼序以來躬理萬幾兢兢業業惟恐一事失宜負皇考付屬之重思如曩時從容文墨之娛不可復得然少有餘閒未嘗不考鏡經史以自觀省爰取庚戌文鈔所載存十之三續作未訂入者存十之七總為一編共若干卷非欲以文辭自表著蓋是集乃朕夙昔稽古典學所心得實不忍棄置自今以後雖有所著作或出詞臣之手真膺各半且朕亦不欲與文人學士爭巧以轉貽後世之譏則是集之輯有不得已者記曰本諸身徵諸庶民曩豫自檢所行以勉副所言者乃日用酬酢之常今之所行事無大小莫非政教之平陂生民之苦樂相倚不可以中立者也因此益自警惕而克艱天位顧畏民碞庶幾眀理立誠之學參前倚衡永永勿替也夫太祖高皇帝實録序粵稽自古帝王乘時建極膺天命而佑下民豐功駿烈垂諸史乘炳炳麟麟是以紀言紀事必詳且核焉况於聖人首出開物成務經緯天地奠麗河山智勇沉深謨猷訏逺布為法則著為章程將使後世子孫繼繼承承遵循罔軼詎不重歟洪惟太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝以聖神文武之姿受天眷命誕興東土爰總義旅遹求厥寧九國連兵相向一怒而討平之眀人四路來攻亦尅日盡殱于境外師出有名光明俊偉威愛並立近服逺懷當是時群部來歸英豪響附奮跡遼瀋之間而號令行於萬里帝業之興何其神也由是天人協應建國紀元修明庶政教育羣倫創國書分旗制申軍令定禮儀經營締造之際旰食宵衣不遑暇逸顧乃綱舉目張傳之億萬年而不可易心法治法與二帝三王有同揆也太宗文皇帝繼天登阼命儒臣敬輯實録規模略偹聖祖仁皇帝復加搜考修纂成書尊藏內府並貯史宬惟是山川疆土以及臣僚名氏前後間有異同清漢之文㦯簡㦯繁未經畫一我皇考世宗憲皇帝懼有舛訛特開史館重加校訂按日進呈親為閲定朕纘承丕緒仰體前徽用復潔誠披覽卷帙如舊繕録一新祇祇乎覘開國之鴻模昭垂統之大業書曰監于先王成憲其永無愆詩曰昭兹來許繩其祖武於以率攸行而保天佑其敢忘紹庭上下之思哉謹序太祖高皇帝聖訓序朕惟神聖首出濟世覺民立德立功立言三者統而有之蓋仁義中正之極定於厥躬布諸紀綱為巍巍之帝業頒諸誥令成洋洋之聖謨文教彰明覃被海宇炳乎如日月之照臨窮天地亘古今而莫不仰焉於戲盛哉洪惟太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝體肖二儀量包六合應期受命肇建丕基叶雲雷以展經綸法四時而宣教化六師順動九有輸誠拯生民於塗炭之中轉宇宙為平成之運當是時締造維新規模盡善武緯文經萬物咸覩亦既布在方策傳信億年矣乃若心通造化道綜百王吐詞成經發聲為律闡貞一之㫖明至善之宗論聖學則以正心修身為先辨君道則以求賢聼言為要昭晰乎上天降監之原無念不將之以敬畏申警乎君臣契合之誼每事必體之以公誠以至班朝治軍明刑制用靡不敷陳至理約而該復而不厭信乎有德者必有言也我聖祖嘗命儒臣編輯聖訓四卷類聚條分燦然明偹朕紹膺統緒追契徽猷口誦心維匪伊朝夕仰見義藴之淵閎典章之畫一庶政之周詳直與帝典周官同其廣大顧金匱石室之藏廷臣無由得見是用敬加剞劂宣示萬方俾我子孫臣庶率而循之世世罔斁奉之蒞政可以致治保邦凖以淑躬可以警心寡過蓋一時之制作而萬古之世道人心胥賴焉非甚盛德其孰能及此乎謹序太宗文皇帝實録序洪惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝徇齊敦敏廣大寬仁早從太祖贊襄大業才德冠世中外歸忱逮乎嗣統之年敦宗睦族戢衆安民御將行師開疆拓土軍威震疊而以不嗜殺為心武功赫濯而以善養人為務存朝鮮故土字䝉古遺氓眀政不綱天人共憤且舊與我國有隙於是應天順人率師直抵燕京聲罪致討猶念彼為中國功垂成而弗取天性仁厚大度豁如固巳超越百王包涵六合矣至若建官分職推賢舉能愷澤龎洪刑章平允設制科以崇文教開言路以重忠良隆規巨典巍乎煥乎皆一統之大猷百世之良矩也世祖章皇帝輯為實録六十有五卷聖祖仁皇帝命儒臣搜討訂正繕録成編尊藏惟慎皇考世宗憲皇帝孝切崇先敬加披覽以前後字句之未盡畫一也復令臣工校對而躬為閲定焉朕仰承遺志莊誦繹思用竣厥事緬惟帝典商盤前王之懿範也天球琬琰宗廟之重器也昔之君珍為世寶奉以無墜矧夫典章所紀謨烈所垂造邦制治之圗啓泰貽安之要煌煌簡冊世昭法守何止帝典商盤天球琬琰之寶重也耶謹序太宗文皇帝聖訓序聖人之情因辭以見易曰修辭立其誠所以居業也蓋以通天下之志以成天下之務本乎至誠施諸命令無意于辭而理臻其極厯觀堯舜禹湯文武之世典謨訓誥釐然具存後人奉之為經列在學宮為載籍首矧夫運際開天功存繼志制作侔造化教澤被生民天下之文章孰有大于此者乎欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝英姿挺出聖武布昭大智如神淵衷若谷及登寶位疆宇日增厚祿以養賢勤身而率下恩威所及大畏小懷政教所孚逺來近說皇哉何化理之神也至若敷陳治道誨諭臣民不尚虛文惟崇大體謂行善所以事天而逺利始能服衆闡伊尹一德之訓稱曾參三省之言以勸農講武為立國之大經以考古讀書為服官之要務自立綱陳紀以逮服飾器物之間或即事以宣猷或因時而定制洪纎咸偹張弛攸宜蓋察理精故見之也逺更事久故慮之也詳用能承藉丕基佑啓聖哲是誠億萬年繼往開來之極軌也順治中嘗因記注舊文纂修聖訓一書未竟厥緒聖祖仁皇帝特命儒臣詳加編輯事以類分凡二十有八言以條舉凡一百一十有一彚為六卷體要著明朕在宫中䝉皇考恩勤教育定省之時備聞祖訓嗣膺大統志切纘承晨夕披陳尋繹仰見心符道要語中機宜㫖藴閎深函蓋天地文辭昭晰彪炳日星垂裕後昆永昭法守用是勒為成書敬授剞劂頒示中外書曰聖謨洋洋嘉言孔彰又曰聖有謨訓眀徵定保我子孫臣庶其誦習遵循永敬承於世世哉謹序皇清文頴卷首十二欽定四庫全書皇清文頴卷首十三御製文序世祖章皇帝實録序我國家受天眷命統一萬邦日月所照血氣之屬咸切尊親亦惟是小心翼翼之忱有以通帝載而昭來許故乃朝廷宫府之政罔不參稽古訓溥協人心制定於一時而慮周乎萬世重煕纍洽至於今兹海隅蒼生穆然想見盛德信乎開國之規模詒謀逺而流澤長也洪惟世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝神靈天亶冲齡踐阼紹我太祖太宗丕緒懋建大猷勤思上理當是時流賊已入京師眀祚已成板蕩遂因明將吳三桂之請命將士入關定燕京殄羣寇挈斯民於水火之中而登之袵席之上爰主郊禋式頒正朔自古得天下之正未之有比也政令彰施百度具舉滌前代之煩苛沛興朝之膏澤治化翔洽達乎四表由是制禮作樂敷教眀刑虛已以尚賢推誠以納誨斟酌損益秉至中而時措之著為謨訓載在簡編皇哉唐哉子孫世世守之以成久安長治之業于是乎在康熙十一年聖祖仁皇帝特開史館纂輯實録凡一百四十六卷雍正十二年皇考世宗憲皇帝恭閲全書復令儒臣重加校訂事未竣而龍馭上賓朕哀戚之餘飭令陸續進呈敬加披覽於戲覩世祖聖祖經綸之巨典則知創業之甚難念世宗繼述之深衷則知守成之不易方策可傳者紀綱之成軌夙夜罔間者兢業之一心敢弗繹思而敬承之以迓上天無疆之庥則是書也誠致治之權輿萬年之鴻寶矣謹序世祖章皇帝聖訓序古昔帝王應運而興開物成務有君天下之規模凝命敕幾有師天下之典則故言出而成經教思所被率土歸仁歷觀往代紀載肇乎二典彞倫敘於九疇罔不播為成憲炳若日星簡籍具存可考而知也欽惟我世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝秉岐嶷首出之資建永清大定之業冲齡踐祚統一車書義問達乎梯航仁聲遍於塗巷盛德大業富有日新自唐虞三代以來史冊所傳罕有及者至若洋洋聖謨包涵萬有大之關倫教綱常之重而閭閻之日用飲食所弗遺精之在身心性命之微而宫府之制度典章所必飭巨細畢該綱維盡善要惟本精一執中之奧藴以成經世服物之鴻謨誕告多方嚴眀愷摯訓敕有位深切周詳意皆出乎至誠理尤協於克一用以光大前徽開萬年有道之長敻乎與天地為昭矣我聖祖仁皇帝躬承先訓命儒臣分類編輯計一百一十有三條彚成聖訓六卷以傳久逺我皇考念切紹衣宫庭宵旰追述先猷朕從溫凊之時聞知維謹嗣膺大統志在覲揚朝夕披陳具見開國經綸超越前古詒謀燕翼垂裕無窮是用敬為剞刻昭示臣民俾海隅出日之逺咸覩光華寶之如圖球信之如蓍蔡是訓是行欽承勿替庶幾道德一而風俗同唐之政要宋之寶訓夫豈可同年而語者哉謹序聖祖仁皇帝實録告成序皇祖聖祖仁皇帝臨御六十一年耿光大烈融爍古今積惠襲恩淪浹寰㝢功德之盛具載實録垂千萬祀我皇考世宗憲皇帝御製序文推本上天孚佑下民列祖垂裕後嗣篤生至聖開邃古以來未有之盛業煌煌乎言之廣大精密至矣蔑以加矣豫小子寅承丕緒紹聞衣德兢兢業業仰思繼述皇祖皇考成憲日於治事之先展誦列祖實録周而復始皇祖實録卷帙浩繁排日敬覽寒暑靡間至自今凡數閲矣緬維尚書史記所載古帝王治化之隆各極其至而孔子于堯曰惟天為大惟堯則之蕩蕩乎民無能名焉于舜曰無為而治孟子則曰王者之民皥皥如也豫嘗推繹其㫖想見唐虞中天之盛乃今思皇祖之世之民有以知孔孟之言信乎其能知聖人也皇祖自親政之始即手鋤三孽蕩定南疆滇黔閩粵之奧揭日月而掃氛雺海內赤子喁喁向化由是亭之毒之煦以淳風沃以甘澍浸以醲化甄以大鈞數十年之間南奠臺澎北犁沙漠命將肆征而閭左無徵發之警親臨淮河指授方略歷吳㑹陟㑹稽登岱宗謁闕里西巡關隴抵雲中三覲祖陵觀於東海嵗出塞外獮狩上都天行之健古無以加而庠序詠仁氓庶樂業市㕓殷阜卒伍服習熙熙然相忘於無所事事于焉正晷緯考律度定元聲煥為宸章灑為奎翰集古帝王文治之大成而穆清宥密凝然不見經營之迹簡任公卿百執事器使而責其成俊夀魁碩布列有位外自節鉞連帥以至守令賢否清濁立判剔侵蠧勵亷平吏治蒸蒸無綜核之煩而德意宣䆒蠲逋賑恤肆赦緩刑指揮湥宫之中風馳萬里匹夫匹婦無不浸潯涵育鼓舞德化而不能自已當其時誠所謂不識不知順帝之則者耶歷今二十餘年遺澤餘烈深入人心固結而不可解回溯鼎成之初謳思如一日夫乃恍然曰是所謂至仁如天民無能名者也無為而治恭已南面者也孟子所謂王民皥皥者也於戲四海九州之民無得而名豫小子又烏能名之憶自幼冲䝉皇祖撫愛日侍左右用人行政皆覩記所及簡冊紀載政如杓衡規天躔次測日可見者迹象而已於穆之運重離之眀終無能言其所以然者盥誦之次稽首敬為之序以志紹庭繼序之忱於罔斁云聖祖仁皇帝聖訓序自古聖人誕受天命為下民君師必亶聰眀睿智之資首出乘乾以綏猷而立極凡其經緯萬端敷之彝訓者罔不深切著眀炳日星而章雲漢典謨所載雅頌所陳唐虞三代之隆有如一轍欽惟皇祖聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖德廣運久道化成文治光昭武功赫濯薄海內外湥山窮谷之衆總淪浹於仁心仁政之中教思無窮訓詞深厚歷考熙眀之運未有躋此崇隆者也肆我皇考世宗憲皇帝以聖繼聖用人行政一一仰法前徽既纂修實録成書復分類恭輯聖訓六十卷俾皇祖六十餘年敬天尊祖經國保民農田學校禮樂兵刑之盛蹟見之都俞吁咈間者粲然常新釐然備具永貽我後嗣子孫億萬年升平矩範蓋皇祖性本生安道兼創守實集千古聖帝眀王之大成是以聖謨洋洋眀徵定保宏綱巨目有要有倫精一之心傳蕩平之王路胥不外乎此也豫小子昔在齠齡早荷聖慈賜育宫庭祗聆訓迪兹膺基緒紹聞衣德之志兢兢業業不懈益䖍昕夕尋繹惟期懋遵祖訓以無負皇考善繼善述之貽謀顧金匱石室之藏中外無得見者爰命儒臣敬謹繕寫授之剞劂庶我皇祖聖祖仁皇帝建中表正牖民覺世之言昭垂寰宇羣工士庶咸得漸摩於聖訓之崇閎而率由無斁也不亦休歟謹序世宗憲皇帝實録序國家受天眷命集慶垂光承承繼繼肆我皇考世宗憲皇帝荷三聖之洪庥祇紹聖祖仁皇帝丕緒宵衣旰食底區宇於和恆以茂衍億萬年無疆之祉厚德隆功溢於簡牒巍乎煥乎治平之盛軌未有逾兹者也皇考狥齊敦敏仁孝性成早嵗承歡聖祖友愛同氣逮膺大統一切禮儀隆備廟號尊崇莫不定自宸衷符乎典則仰惟聖祖仁皇帝臨御六十餘年濊澤洽人心醇化流方外豐亨豫大之福極盛無加皇考承郅治之餘因時制宜以善繼而善述惟是本之以誠持之以敬行之以中正要之以寬仁用能杜玩愒於熙時綿升平之泰運大經大法粲然為後世子孫法焉薦馨郊廟必躬必親旁秩祀典懷柔百神間遇水旱微愆祈禱深宫罔弗潜孚立應聖學髙深探性命之精操治平之要天德王道一以貫之隆禮先師孔子增祀先儒右文重道之典超越常制猶復表章經術廣勵士風籲俊興賢蔚有德造辟雍鐘鼓後先疏附之風殆無以過念用人為愛民之本自公孤卿尹下至庶司百職事登眀選公咸稱任使而守令之親民暨封疆大吏之司董率者尤厪聖心重撫字之方嚴貪墨之罰眀四目達四聰賜復蠲租農桑被野遂躋斯民於袵席之安刑罰者所以助政教之不逮也皇考如天好生既已刋布律令俾愚氓重於犯法復詳定貴賤服色兵民昏喪禮制更闡明聖祖諭㫖十六條細加訓注家諭戶曉翕然從風河防之關於運道民生也萬里黃流滙以百川之水兖徐而下嵗苦沮洳皇考默運神謀指示經畫加長淮之石堰闢三省之引河渙發帑金厥有成績又吳越海塘南北水利凡可以惠此蒸黎者悉因時而修舉之先是聖祖親統六師平定朔漠威靈所加青海札什巴圗兒等震讋承令因沛殊恩畀以爵秩垂三十年而羅卜藏丹津與吹拉克諾木齊等誕敢首造逆謀擾犯邉域皇考聲罪致討密授方略於閫帥戈鋋所指電掃風驅振旅獻俘勒成功於太學準噶爾蠢動西陲數肆患於喀爾喀部落南方苗蠻蔓延行旅居民苦其侵掠皇考為藩服計久逺為遐陬圖寧謐或命將興師或諭文武諸臣隨宜搜剿至逆夷悔禍輸誠傾心納土則皆宥其前愆而曲賜包答焉德威並耀無逺弗届賜安南之地減朝鮮之貢俄羅斯南掌等國阻昧幽深胥漸被於聲教他若警怠荒矯浮薄求言納諫教孝褒忠宗室天潢之胄多方造就八旗根本之地備豫綢繆頒訓諭於臣工飭官常也錫侯封於眀裔示殊典也豐盈遍萬國而服御有經見聖躬之儉焉嘉應在庶徵而憂勤益懋昭聖德之謙焉蓋我皇考誠敬之心中正之道寬仁之恩悉同符乎聖祖以綏猷而立極十三年中有如一日宜其治功之盛綱舉目張蕩蕩平平樂樂利利傳之愈逺而可法可守也歟豫小子繼序之初即命監修總裁大學士等董率儒臣稽歷年之紀載敬謹纂修次第進呈齊肅披閲迄今五載恭成世宗憲皇帝實録一百五十九卷在昔唐虞三代制治保邦之道備載於書惟我皇考際重煕纍洽之盛勵精圖治良法美意歷久彌新玉簡琅函實與典謨訓誥相輝映用是裝繕尊藏朝夕循誦以志繹思衣德之義垂裕後昆永永無極焉謹序世宗憲皇帝聖訓序自古人君有盛德大業者其規畫周詳而貽謀悠逺則必敷之彝訓以眀定保之徵紀之簡編以著經綸之蹟非徒為一時事功計也亦將以示後嗣昭法守焉我皇考世宗憲皇帝亶聰眀睿智之資建中立極茂登上理御極十有三年體聖祖之心以為心法聖祖之政以為政祇承郊廟惇睦宗親整飭官方修眀法度正人心厚風俗文經武緯禮序樂和凡宏綱巨目罔不默運於深宫乾健之精神以圖其乂安而計其久逺聖謨洋洋有典有則或因人以立教或隨事以敷言存之淵然而有條理發之煥然而無凝滯其與二帝三王都俞吁咈咨警誥誡之㫖曷以異焉允矣彪炳之綸音治平之模範也可不謂至盛者歟既命大學士等詳慎纂輯恭成世宗憲皇帝實録一百五十九卷復於編年繫日之中分類備録恭成聖訓三十六卷仰惟皇考德合天地眀竝日月序參四時躬荷聖祖仁皇帝積厚之貽善繼善述故乃保泰持盈諴民阜物寓惇大於眀作劑整肅以寬仁致治規條炳如星日豈苐豫小子朝乾夕惕之衷期於謹凛率由嗣守丕緒繼自今億萬斯年子孫臣庶沾被煕洽之澤者庶咸有以遵聖訓之光昭而頌鴻猷之允塞也謹序世宗憲皇帝硃批諭㫖後序皇考世宗憲皇帝天縱聖神精勤庶政四方文武臣僚具摺言事者日或數人人或數事緘封直達御前手自批發或立見施行或咨詢廷議善者溫綸褒豫過者訓誡諄諄隨宜指示悉出睿裁一字不假手於人御極十有三年常如一日粵雍正十年特檢歷年批發奏摺命內廷詞臣繕録校理付諸剞劂彚成數帙輒以頒賜在廷羣臣工未告竣奄遘上賓豫小子纘紹丕基敬展遺篋見所貯手批奏摺不下數萬奎畫爛然充溢巨簏然以未經皇考檢定不敢意為增益謹就檢録己定者彚著為目前後凡二百二十三人分一百一十二帙統為十八函當時隨檢隨發無先後倫次兹亦不復排類蓋摺奏浩繁不勝編録所刻僅十百中之一二略見大凡本非全覽故也既告蕆事謹綴序言於後洪惟我皇考至仁如天至眀如日至誠如神簡拔賢才任之以心膂股肱之寄開誠布公藹然家人父子無不可盡之言諸臣之才具大小短長與性質之剛柔強弱克知灼見如權衡繩尺之不爽片長足録亟登而進之有不及則激厲而開𨗳之稍肆焉則裁抑之其陷於過始則訓飭之能改則已不悛則戒警之使知悔艾終於怙惡則亦未嘗姑容然哀矜惻怛之意尚流溢於毫楮間也同一事而此或俞之彼或咈之非有所好惡於其間也蓋俞之者必有可俞之道而咈之者亦必有可咈之端同一人而始或豫之終或斥之非有所喜怒於其間也蓋始有可豫則豫之終有可斥則斥之明燭幾先坐悉情僞逺隔萬里遲閲數年睿鑒所周範圍莫越正人心厚風俗兢兢業業警戒無虞雖屢豐見告瑞應頻仍而惟是憂勤惕厲之心久而益篤記有之曰天道至教聖人至德春秋冬夏風雨霜露無非教也我皇考之為治一天道之運行教澤所被百志惟煕即萬世而下尚如日月之臨照光景常新春風之煦然被物不自知其感動奮發而興起也豫小子寅承鴻業自惟寡昧無能企逮萬一仰法皇考眀目達聰孜孜圖治之心祗紹徽猷夙夜黽勉其服教畏神警省弗怠之志詎敢以嵗月易耶謹序柏梁體詩序我皇祖聖祖仁皇帝皇考世宗憲皇帝嘗集在廷諸臣於乾清宫肆筵設席授以筆札御製首倡羣臣以次遞成效漢代柏梁之體續虞廷賡歌之義光垂奕世猗歟盛矣朕敬承丕緒惟日孜孜期與百爾羣工共圖治理言念股肱之佐卿尹之班何一非我祖考所貽以與朕寅亮天工者哉宗室屏藩之寄則又派衍天潢分所宜親也宜有以篤親親之情敘堂廉之誼乃者臘雪盈疇已兆二麥之稔光風應律初回大地之春爰集王公卿二授几賦詩一如舊制朕非欲誇詞藻以耀羣臣倡為豐亨豫大之說也思祖考遺朕以升平之業吾君臣何幸得優游以享之夫享升平匪艱而保升平為難羣臣其體朕意焉一宴㑹之樂尚思繼祖考之休祖考之良法善政布在方策吾君臣其何以立綱陳紀煕績寧人以覲揚祖考之光烈乎羣臣其體朕意焉授時通考序孟子言不違農時榖不可勝食蓋民之大事在農農之所重惟時敬授人時載於堯典周公七月一萹於日星霜露之候昆蟲草木之化詳哉其言之故先王之民莫不震動恪恭於農以修其事者懼失時也我聖祖仁皇帝勤咨民隱首重農桑率育蒸黎涵濡德澤六十餘載戶慶盈寧皇考世宗憲皇帝嵗舉耕藉之儀率先天下興水利廣儲蓄為萬世規凡兹薄海蒼生得荷鋤饁餉優游隴畝之間樂生遂性衣食滋豐者何莫非我祖宗宵旰勤勞以貽樂利於無疆耶朕纘承基緒鑒前代生深宫之中長阿保之手誠知稼穡艱難日與中外臣工為斯民籌食用至計胼胝機杼之作苦日厪於懷因檢前人農桑通訣農政全書諸編嘉其用意勤而於民事切也命內廷詞臣廣加搜輯舉物候早晚之宜南北土壤之異耕耘之節儲偫之方蠶織畜牧之利自經史子集以及農家者流凡言之關於農者彚萃成萹命之曰授時通考夫天道廣運於上而四時行萬彚生地道發育於下而庶品蕃百昌遂人事參贊其中而六府修三農殖輔相裁成固國家之大政也趨事赴功亦閭閻之本業也貴榖劭農服田力穡上下交勉弗懈於時以副朕阜成海宇之至願覽斯編者尚有取焉唐宋文醇序不朽有三立言其一言之無文行而不逺若是乎言之文者乃能立於後世也文之體不一矣語文者說亦多矣羣言淆亂衷諸聖當必以周孔之語為歸周公曰言有序孔子曰辭達而已矣無序固不可以達欲達其辭而失其序則其為言奚能雲粼波折而與天地之文相似也然使義則戔戔而言有枝葉妃青嫓白雕琢曼辭則所謂八代之衰已其咎同歸於無序而不達抑又有進焉文所以足言而言固以足志其志已荒文將奚附是以孔子又曰言有物夫序而達達而有物斯固天下之至文也已昌黎韓愈生周漢之後幾五百年逺紹古人立言之軌則其文可謂有序而能達者然必其言之又能有物如布帛之可以暖人菽粟之可以飽人則李瀚所編七百萹中猶且十未三四况昌黎而下乎甚矣文之至者不易得也眀茅坤舉唐宋兩朝中昌黎栁州廬陵三蘇曾王八大家薈萃其文各若干首行世迄今操觚者膾炙之本朝儲欣謂茅坤之選便於舉業而弊即在是乃復增損之附以李習之孫可之為十大家欲俾讀者興起於古母祗為發策决科之用意良美已顧其識之未衷而見之未當則所去取與茅坤亦未始徑庭朕讀其書嘉其意而亦未嘗不懲其失也夫十家者謂其非八代駢體云爾駢句固屬文體之病然若唐之魏鄭公陸宣公其文亦多駢句而辭達理詣足為世用則駢又奚病日月麗乎天天之文也百榖草木麗乎土地之文也化工之所為有定形乎哉化工形形而不形於形而謂文可有定形乎哉顧其言之所立者何如耳敕幾之暇偶取儲欣所選十家之文録其言之尤雅者若干首合而編之以便觀覽夫唐宋以來名儒碩士有序有物之嘉言固不苐十人已也雖然嘗鼎一臠亦足以知道腴之可味况已斟其雉膏哉協紀辨方書序粵昔帝堯命羲和敬授人時厥民知析因夷隩之節後聖有作推而彌廣至於外事用剛日內事用柔日此皆載之經典百王不易者也厥後濫觴日以訛謬術士以吉凶禍福之說震驚朕師不可方物如褚少孫補史記所稱彼家云吉此家云凶彼家云小吉此家云大凶茫乎不知其畔岸漢武以來已如聚訟而荀悅王充輩斥為理之所無棄而勿論者也雖然天以日月行四時人奉天而時若嚮眀而治嚮晦而息后王君公所以奉若天道也日出而作日入而息羣黎百姓所以奉若天道也否則不能晨夜不夙則莫詩人譏焉人人所知也然則舉大事動大衆協乎五紀辨乎五方以順天地之性豈無寸分節解以推極其至精至微之理者歟其支離䝉昧拘牽謬悠之說乃術士之過而非可因噎而廢食者也欽天監舊有選擇通書刻於康煕二十二年其書成於星官之手因訛襲謬見之施行往往舉矛刺盾皇祖聖祖仁皇帝知其荒率不可以訓曽纂為星歷考原一書刋刻頒行而未將監本改正蓋以待夫後人聖人之心慎而又慎如此也以諭監臣監臣曰通書之謬允宜改正朕因其請謂及今猶有莊親王等數人曾經皇祖指授稍眀此理使此時不加訂正恐後此益復無可任使爰命編緝成書頒布天下較之舊本謬說少除然俗所久沿則亦不能盡去便民用也命名曰協紀辨方書夫協紀辨方者敬天之紀敬地之方也一作止一語默天地實式臨之况其大乎如日如是則吉如是則凶如是則福如是則禍則眀者所弗道也雖然敬不敬之間吉凶禍福隨之矣是為序大清一統志序惟上天眷顧我大清全付所覆海隅出日罔不率俾列祖列宗德豐澤溥威鑠惠滂禹跡所奄蕃息殷阜瀛壖炎島大漠蠻陬咸𨽻版圖置郡築邑聲教風馳藩服星拱禀朔內附六合一家逺至開闢之所未賓梯航重譯歷嵗而始達者慕義獻琛圖於王㑹幅􅊷袤廣古未有過焉聖祖仁皇帝特命纂輯全書以昭大一統之盛卷帙繁重而未成世宗憲皇帝御極之初重加編纂閲今十有餘載次第告竣自京師達於四裔為省十有八統府州縣千六百有竒外藩屬國五十有七朝貢之國三十有一星野所占坤輿所載方策所紀憲古證今眉列掌示圖以臚之表以識之書成凡三百五十餘卷夫肇十有二州見於虞典禹貢一萹備列九州疆域山川土田貢賦物産實為方志之權輿周禮大司徒以天下土地之圖周知地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物土訓道地圖誦訓道方志職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人與其財用九榖六畜之數漢郡國地志與計書俱上太史厥後寰宇志記列於正史者代數十家蓋將以觀民設教體國經野表皇威之有截眀王道之無外匪徒備掌故徵博洽已也撫疆宇則念肇造之艱稽制置則念經畫之要采謡俗則念化導之方考循良人物而知治理之效念所以振興而長育之核戶口田賦而察登耗之故念所以懷保而蕃殖之書曰皇天既付中國民越厥疆土於先王肆王惟德用和懌先後迷民用懌先王受命我祖宗克眀峻德以有九有之師傳緒在豫敢不惟德之勤篤前人成烈其在我內外百職事慎固封守阜成兆民懋相豫修和有夏亦越我後嗣子孫咸敬厥德以昭受丕基萬年惟無斁覽斯編也其善體諸皇清文頴卷首十三欽定四庫全書皇清文頴卷首十四御製文記豐澤園記西苑宫室皆因元明之舊惟豐澤園為康熙間新建之所自勤政殿西行過小屋數間蓋皇祖養蠶處也復西行歷稻畦數畝折而北則為豐澤園園內殿宇制度惟朴不尚華麗園後種桑數十株聞之老監云皇祖萬幾餘暇則於此勸課農桑或親御耒耜逮我皇父纘承丕業敬天法祖世德作求數年以來屢行親耕之禮皆預演禮於此乃知聖聖同規敦本重農用躋天下於熙皥之盛若瀛臺之建於有明飛閣丹樓輝煌金碧較之此園固為美觀而極土木之功無益於國計民生識者鄙之行一事而合於天心建一園而洽於民情身率先而天下丕變吾於是乎知皇祖皇父之為首出之聖也田字房記流杯亭之西南有田字房焉丁未四月十八日皇父萬幾之暇燕接親藩遊豫於此是地也西山逺帶碧沼前流每當盛夏開忩則四面風至不復知暑其北則稻田數畝嘉禾生香藹聞於室蓋我皇父重農之心雖於燕閒遊觀之所亦未嘗頃刻忘也古昔聖王臨朝視政之暇必有怡情娛覽之地故靈臺之詩美文王也卷阿之詩頌成王也今田字房所以命意重農者豈徒怡情娛覽已哉至若黛掃山顛風來蘋末麥畦浪起桞岸烟開馴鶴從容而起舞文鴛匹偶而泳遊蝶裁五色之文蜂喧萬花之谷物華景麗則思飲和食德熙攘於光天化日之下而怡然以樂其或凉飈四起鴻㕍來賓白露如珠緑雲改赤千家之砧杵遙聞百室之倉箱盡實則思遺􅕗滯穗誰遺寡婦之利而悄然以憂時引儒臣坐而論道或率諸王公子弟修家人之禮講燕好之歡所觸目而㑹心者我皇父之同憂同樂憩息於斯較之靈臺卷阿意更深長矣謹為之記時應宫記夫天一生水坎精發祥凝靈聚液流為江海江海乃天地間物之最巨者也江海之有神自三代漢唐以來莫不祠祀惟謹有宋大觀四年詔天下五龍神並封王爵龍神之尊自是始厥後春秋犧牲之祀代有常典皇清受天命禋事上帝后土懷柔百神江淮河濟五嶽四瀆之祀載在太常犧幣之數俎豆之器既豐既隆神歆以格雍正二年天子以為龍神之位既尊宜特修宫觀以致䖍禱乃於西苑內豐澤園北建時應宫所以致誠明神俾雨暘時若稼穡以成者也夏六月霖雨彌旬幾至於潦皇父步行往禱其日即晴又明年黃河清百餘里此非神人效靈河海清晏之明驗乎夫以天子精誠通於神明以之事天饗帝罔不昭格而况於龍神乎信哉誠之能感物也是為記樂善堂記凡人之性未嘗不善仁義禮智全備於我所謂得天地之正氣而為人也然有智愚賢不肖之分者氣拘之私誘之遂日以蔽錮而昏昧有能復其性者鮮矣人能自強不息以復性為功已有善念擴而充之人有善事喜而從之則本性呈露而有馨香之德矣是故明德之馨勝於黍稷芝蘭鮑魚與之俱化未有樂善而不能修德者也余有書屋數間清爽幽靜山水之趣琴鶴之玩時呈於前菜圃數畦桃花滿林堪以寓目顔之曰樂善堂者蓋取大舜樂取於人以為善之意也夫孝弟仁義乃所謂善也人能孝以飬親弟以敬長仁以恤下義以事上樂而行之時時無怠則能因物付物以事處事而完所性之本體矣是故大舜聖人也猶存虛受之心聞一善言若決江河漢明帝嘗問東平王在國何事最樂王曰為善最樂余雖不敏然賴皇父之明訓師友之切磋於大舜之善與人同雖有志而未逮而東平王之為善最樂則不敢不勉焉是為記圓明園後記昔我皇考因皇祖之賜園修而葺之略具朝署之規以乘時行令布政親賢而軒墀亭榭凸山凹池之紛列於後者不尚其華尚其朴不稱其富稱其幽樂蕃植則有灌木叢花怒生笑迎也驗農桑則有田廬蔬圃量雨較晴也松風水月入襟懷而妙道自生也細旃廣厦時接儒臣研經史以淑情也或怡悅於斯或歌詠於斯或惕息於斯我皇考之先憂後樂一皇祖之先憂後樂周宇物而圓明也圓明之義蓋君子之時中也皇祖以是名賜皇考皇考敬受之而身心以朂戶牖以銘也不求自安而期萬方之寧謐不圖自逸而冀百族之恬熙則又我皇考綏履垂裕於無窮也豫小子敬奉先帝宫室苑囿常恐貽羞敢有所增益是以踐阼後所司以建園請郤之既釋服爰仍皇考之舊園而居焉夫帝王臨朝視政之暇必有游觀曠覽之地然得其宜適以飬性而陶情失其宜適以玩物而喪志宫室服御竒技玩好之念切則親賢納諌勤政愛民之念疏矣其害可勝言哉我皇考未就暢春園而居者以有此圓明園也而不斫不雕一皇祖淳朴之心然規模之宏敞丘壑之幽深風土草木之清佳髙樓邃室之具備亦可稱觀止實天保地靈之區帝王豫逰之地無以踰此後世子孫必不舍此而重費民財以創建苑囿斯則深契朕法皇考勤儉之心以為心矣藉曰祖考所居不忍居也則宫禁又當何如晉張老之善頌甚可味也若夫建園之始末聖人對時育物修文崇武煦萬彚保太和期躋斯世於春臺逰斯人於樂國之意則巳具皇考之前記豫小子何能贅一辭焉遊盤山記連太行拱神京放碣石距滄溟走薊野枕長城是為盤山蓋冀州之天作俯臨衆壑如星拱北而莫敢與爭者也昔魏田疇隱居於此故名田盤或曰古有田盤先生自齊來棲止焉地僻而山秀樹密而谷深韓昌黎文所稱太行之陽有盤谷者無從考其非是而其為隱者之所盤旋則一也山亦有盤谷寺自唐寶積開堂代有名宿憨山拙菴後先輝映為是山佳話然吾儒木石居而鹿豕遊者田疇之後無聞焉四顧梵宇精藍依山隱谷鏤峯磨石刻畫天真而乏桞州西山之文杜陵北征之作嗚呼是亦可慨也已乾隆七年秋因謁陵回鑾便往遊之斥警蹕減儀從輕輿朝陟搴蘿扳磴曉嵐豁開泉白山青颯然林空鬱然松翠於是停蓋駐轡怡情縱目者久之既而行漏催吟興盡夕陽在山金吾整駕雖命省騶從而近御執事者汗雨揮而塵煙騰向誚隱者之絶少翻疑隱者之避而逺去耳乃知千乘萬騎不可以遊山偶一過之山靈將毋笑其不韻也耶跋恭跋世祖章皇帝御注孝經惟上帝眷顧我皇清克馨其德太祖太宗丕顯丕承逮及世祖提仁義之師救溺拯敝奄有四海天下已定韜黃鉞捲白旄歸馬投戈討究光王之道播聖人之訓以休中外以育萬民念孝經一書為孔子明倫治世之大法而自漢以來去聖日逺古文今文之互異注疏訓釋之未精乃集古名儒嘉言懿論考訂採輯間出宸斷名曰御注孝經備一經之體要明至性所周浹俾夫搢紳之士農野之民皆有以知孝為百行之本而愛敬尊親篤摯有加雖古聖王木鐸之徇路辟雍之鼓徴曷以加兹我皇祖聖祖仁皇帝上諭十六條以敦孝悌重人倫為首及我皇父嗣登宸極迪光繼述衍聖諭廣訓之書於敦孝悌重人倫反覆開明惟恐人之弗知知之弗行而行之弗切以此見我皇清聖聖相承莫不以孝治天下依人性之本然以成淳美之俗而開宗明義則自我世祖御注孝經闡發天經地義民行之確然而不可易肫然而不容已者以昭示奕葉垂之無窮爰盥手而謹書於後云恭跋皇祖聖祖仁皇帝千叟宴詩古昔聖王誕膺天命表正萬邦建中立極漸仁摩義胥天下之民躋之仁夀之域者必其身為繼天首出之聖人然後能斂福以錫民而受非常之慶帝堯在位一百一年帝舜三十登庸三十在位履至尊者又五十載時若禹臯陶稷契夔益諸臣同心同德白首黃髮賡歌喜起於一廷之中而擊壤老人含哺鼓腹耕田鑿井於光天化日之中者莫不忘帝力於何有用登世運於郅隆而後世頌其巍巍蕩蕩三代以降淳風寖微惟殷中宗嚴恭寅畏天命自度肆享國七十有五年髙宗不敢荒寧嘉靖殷邦肆享國五十有九年周文王受命惟中身厥享國五十年然其時君若臣以至庶司百職及耕夫野叟同登壽域共宴一堂者自古無聞焉洪惟我皇祖聖祖仁皇帝久道化成深仁厚澤六十一年官稱其職民恆其業羣生霑濡德被乎方外所謂繼天首出之聖斂福以錫民而受非常之慶也康熙六十一年春皇祖於乾清宫開千叟之宴命年六十以上者乃得預惟時在位之臣自大學士以下至翰林御史凡七十人庶司百職及致仕之員近畿之民又六百六十人雅歌賦詩和樂夀愷皇祖命子姓孫枝百餘人執爵獻酬濟蹌在列逺追饋酳之義弗限三爵之儀孫臣時年十二嵗得與有事之榮覯兹盛典皇祖又作為歌詩命儒臣依韻迭和為圖以夀世傳之無窮雍正七年冬得詩與圗而披讀之竊見我皇祖如天之德如天之福與春陽秋露同其煦嫗甘雨和風同其潤澤合朝野臣民老耆期艾而錫之以寵光介之以繁祉方之帝廷賡歌之景象華封頌祝之休風規模宏且逺矣敢恭紀於後以志太平之盛事云恭跋性理精義夫欲致天下於熙皥振風俗於隆古煥禮樂於三代興孝弟於十室者必本之於崇王道而王道之崇則又在於尊儒學古昔聖王之治天下也設為庠序學校以教之每嵗孟春遒人以木鐸徇於路戴記司徒修六禮以節民性明七教以興民德凡所以重教化之道致天下於文明者也我聖祖仁皇帝崇儒重道仁民育物興學校舉孝弟勵風俗崇禮讓凡古昔聖王所以治天下之道靡不畢舉而又諄諄勉勉默契夫堯舜之授受孔孟之心傳謂有宋諸儒上繼絶學下開來裔實有功於世道人心乃因性理大全之書刪去冗雜摘取精要命儒臣斟酌損益而親為折中之乙夜披覽歷久成書勒序簡端以詔後世偉矣哉自三代以來未嘗有也雖漢明帝之幸辟雍唐太宗之講太學不過取美於一時又何能開示天下後世為儒學之宗主接堯舜之心傳實政鴻名輝燦於振古哉採羣儒之精華而去永樂大全之泛自明德以及新民格物以至平天下先其本而後其末探其源而考其實周子太極圗通書明天地鬼神之奧張子正䝉西銘發萬物一體之微至於皇極經世律吕新書皆自成一家言則總載之以成一卷而集羣儒之言分門别類又各於其類為之辨世次先後學問淺深寧純勿雜寧精勿濫讀是書者必先究心於論學之篇立志以端其本主敬以飬其中致知以窮理力行以踐實然後玩味乎治道以明治民立政之方沉潛乎全書以見天地之所以顯鬼神之所以幽造化之所以運行而無窮聖功王道之所以燦然而可循確然而不易夫如是則我聖祖仁皇帝造物育材之心化民成俗之意欲天下後世之共臻於理學之盛者不虛矣跋大學衍義有宋氏興五星聚奎實主文治鍾靈育秀而篤生周子以接歷聖之心傳深探本原闡發微奧二程子見而知之子朱子聞而知之一脉相傳聖道燦然門弟子相與講明而衍繹之其學遂益顯於天下其接五子之傳而超諸儒者則又推西山先生蓋西山之學私淑朱子者也其學雖不能盡用而立朝丰采事業表著於一時其平生所著書悉心力而為之者莫若大學衍義蓋自堯舜禹湯以至漢唐以後之君自臯夔稷契以至漢唐以後之臣表裏精粗本末巨細與夫忠奸賢侒因革得失莫不悉陳而詳辨之所謂集羣書之大成而標入道之程式也近自修身逺及治國引古證今彰善疸惡欲使人君由謹幾慎動以措之於涖官理衆明刑敷教莫不本於敬天命而畏民碞美矣哉非先生學有心得而將之以忠誠懇款其孰能與於斯乎讀是書者由其書以求其事之當否由其事以觀乎道之離合然後本之身而驗之行事則所以修已化民者不難矣書李覯袁州學記後郡縣有學所以飬士造材同風迪德正其身心性命之原示以言行政教之凖育之平居無事之時以備國家之任使其事誠不可以茍安必牧民者殫厥心力期大成而不求小得導之以誠持之以寬要之以久然後材逹行修而可濟於實用吾於李覯袁州學記蓋不能不三致意焉覯之言略於四代設學之規惟以忠孝大節進勉諸生至於慷慨激昂洞見肝膈使人有所動而有所畏其可謂明於學校之本者也禮樂百年而後興當宋仁宗承咸平景德之治用范文正公之言遂詔天下皆立學而守令猶有格不奉行絃誦不聞者獨袁州毅然行之又得覯為之記為道學校之本若是豈非袁民之幸哉雖然自宋至今幾千年矣牧民者誠能體上意盡心學校以為儲才育德之區訓忠教孝以為制行之本如覯之言各勒諸石俾士子觸目而知警以修厥身以激發其至性而為國家大有用之才亦世道之厚幸也恭跋世宗憲皇帝御書法帖敬惟我皇考世宗憲皇帝天縱聰明文思光被奎章寶翰精詣入神夙承皇祖聖祖仁皇帝指授神運天隨涉筆惟肖居潛邸時常以圗史翰墨自娛雅好臨池陶鎔晉唐宋元以來名家墨妙歷年所積充牣琅函逮繼登宸極日理萬幾手自裁答章奏訓迪臣民多至數千言少或一二字研硃灑翰運腕若神纍牘連章未嘗有一懈筆至於名山祠宇巨榜豐碑耆舊臣僚柱聯堂額寵頒殊錫照耀寰區而屏素箑頭長箋橫卷題新篇摹古蹟者復數十百種蓋惟我皇祖集書聖之大成超神入化莫可名言而我皇考以聖繼聖事事善繼善述作則垂憲貽萬世規盛德之至形於心畫是以變化隨宜不名一體雖一波一磔莫不矩矱天成神妙至於如此即以書法而言亦猶啓承夏后武紹周文羲獻専門固不足道也豫小子日侍庭闈仰瞻天藻恭䝉慈誨未涉津涘手澤留遺悲深弓劍爰出內府所藏倣皇祖淵鑑齊法帖排類編次曰朗吟閣法帖者潛邸所書凡十有六卷曰四宜堂法帖者御極以後所書凡八卷通二十四卷礱石選工命莊親王和親王董其事雙鉤入石毫髮逼真摹勒既成恭識卷末以昭聖神立極垂範墨池琬琰圗球永珍世寶云雜著讀鹿鳴至天保六詩嘗讀易之泰象曰天地交泰解之者曰隂在上而陽居下君下交臣之義也又曰天地之體不可交而以氣交君臣之分不可交而以情交古昔聖王所以維持世教平章百姓使萬邦協和黎民於變者亦賴有此情以相維繫耳故禮以節之樂以和之飲食以薦之賓主以親之歌咏以侑之使愜其情而不流焉其在詩曰我有嘉賓鼓瑟吹笙人之好我示我周行燕賓客而欲其示以大道則君臣交警之意亦寓於其中矣使臣奔走於王事故作四牡以勞之曰豈不懷歸王事靡盬所以逆探其念父母之心而恤之備也皇皇者華教使臣曰其咨事而為諏乎咨難而為謀乎咨禮而為度乎咨親而為詢乎欲其備五善而事無違行也常棣之華燕兄弟也疏其所親而親其所疏失其本心者也故其詩曰凡今之人莫如兄弟又曰兄弟既具和樂且孺猶恐人之弗喻也又曰是䆒是圖亶其然乎既樂兄弟且逮友朋焉曰相彼鳥矣猶求友聲矧伊人矣不求友生人君以情接其賔客使臣兄弟友生者如此故其臣作天保之詩以答之其詩曰羣黎百姓遍為爾德蓋既頌且規焉樂而不淫上下和穆醉以酒而飽以德吾于鹿鳴之什見之孔子曰郁郁乎文哉吾從周言其化行于關雎麟趾而施及於天下禮明樂備豈非文武周公之餘澤哉讀無逸尚書自二典三謨以至商周之誥皆古先哲王明臣良輔相與咨警一堂以為久安之圖後之言治者舍是無他求焉然取其近而切明而審天子臣民皆當奉以為規則銘之于座右者則無逸一書又為最要無逸者周公以成王初政懼其知逸而不知無逸故作是書以警之也始言稼穡艱難重務本也次言前王之所以享國長久與後王之所以罔或克夀戒怠荒也次言太王王季文王之抑畏卑服者欲其法祖也又言嗣王無淫逸遊田而以萬民惟正之供者欲其無荒寧而省賦斂也又言古之人猶胥訓誥胥保惠胥教誨者欲其納諌也又言小人怨汝詈汝則皇自敬德者欲其謹已而無責于人也終言嗣王其監於兹者言雖有盡而情則無極故丁寧反覆欲其永監也自天命之精微至畎畝之艱難無不備具豈獨成王所當奉以為龜鑑乃萬世之龜鑑也或曰蘇子瞻謂周公作無逸上不及湯下不及武王以為成湯武王非聖人此固非經㫖矣然所以不及成湯武王者抑亦有說乎曰成王守成之君也無逸為守成之君而作也與守成之君言守成之事則欲其法守成之君故殷三宗皆繼體之君文王雖維新周室亦繼王季而為諸侯也故不及成湯武王者蓋謂湯武伐夏滅殷固不可與守成之君一例耳詩咏豳風書陳無逸周公之教戒維殷成王之敬勤無怠八百之基定矣讀董江都賢良三䇿漢承秦敝文教未興髙祖撥亂返正文景休飬生息至于孝武表章六經興學校之政首舉賢良方正之士䇿之于廷而董江都以宿學碩儒實對其問首䇿陳天人相感之理二䇿言修明教化興太學以飬天下之士三䇿勸帝法天盡性知仁義重禮節安處善樂循理蓋內聖外王之道修已治人之方無不備于三䇿之中而所謂諸不在六藝之科孔子之術者皆絶其道勿使並進武帝用之以罷申韓蘇張之學尤為有功于聖教使武帝信任仲舒大究其用則將有光於文景而賢相若蕭曹輩俯出其下又豈有窮兵黷武之禍舟車緡錢之失哉而擯之江都以終其身君子讀其䇿想見其為人蓋不為江都惜抑為武帝惜也世之論者謂漢儒通曉經術宋儒深于理學夫窮經即所以明理而理學未嘗不𠂻之于經術漢之董子宋之程朱又豈可以經術理學限哉程子曰董仲舒有儒者氣象可謂的論矣擬胡安定置經義治事二齊記學校為養才之地所以淑其性情俾歸于道德明禮義亷恥之習興孝弟慈讓之行以備國家異日之用古者百官得其人萬事得其理未有不由于斯也今天子聖神宰輔賢明建中出治使天下郡各立學學有教授之員以誘迪秀民膺斯職者宜體君相牖民覺世之心彰古聖成德達材之教講明正學陶冶羣英方為無忝余承命來是邦為多士師敢不殫盡心力以佐休明謹就學中立經義治事二齊其有學識開通潛心義訓能辨同異不乖正道者入吾經義齊相與講求至是而浮泛剽竊持其偏見者不與焉農田水利會計邉防事之不可不治者也明于此者入吾治事齊相與究切實用而拘牽不通與夫俗士功利之談不與焉蓋明經所以立本治事所以達用本不固則用何由精而用之所以能達端惟本立是賴二者雖不可以分而教者當各就其性之所近多士尚體豫意窮經者必因經以明事治事者必因事以求經體用兼修本末一貫而不為空言則豈惟不負教者諄諄之苦心將見才成德立濟濟彬彬異日立朝廷之上引經執禮守正不阿贊治分猷天工能亮者皆吾黨之士也多士勉乎哉讀宋史徐積傳豫嘗讀宋史徐積傳載積孝行出于天三嵗父死旦旦求之哀母亡廬墓三年哭不絶音又稱以父名石終身不用石器行遇石則避而不踐未嘗不三歎史筆之難得而怪脫脫輩之無史識也夫叢冗秃屑華而不實俚而不文如是者皆不可以當史筆無是病矣而一字之褒貶不足誅奸回於既往發潛德之幽光則不能出沒人於千百嵗後是史筆非難史識為尤難也故大惡大善雖細行必紀反經由權雖嘉言亦黜積也孝書其生事死葬之盡誠盡禮足矣不應以其不用石器與避石不踐之細行纍孝子之大德夫積不用石器不踐石豈非以其觸父諱乎諱亦出于禮而吾直以為纍孝子之大德者其亦有說蓋禮云二名不偏諱言在不稱徴言徴不稱在是在徴二字單舉之尚在所不諱必其姓與名合斯則諱而不敢稱然亦孝之小節而已矣若以父名石而子不踐石為孝則公子地之子當舟居而不履地乎父名石而子不踐石人尚可能父名地而子不履地人所不能也詩曰孝子不匱永錫爾類大孝逹於天下必蘄人人皆如已之孝於父母孝子之心斯愈快焉今乃為人之所不能為以為已之孝過於天下人之孝豈孝子之心哉故大孝莫如舜不聞其見瞽目者輒拜而積乃今以不用石器與避不踐石稱豈非纍積之大者乎然積非有心於為此以求名也觀其讀孝經輒淚落不止雪夜伏墓側悲慟嘔血是乃本於天性之自然彼遇石則怵然傷心而思親亦其出於至性有不能自已者而為史者例當守千秋法則之正一字褒貶之公凡不合經常之行雖嘉可刪設惜其湮沒而無聞則自有稗官野史在吾故曰史筆非難史識為尤難而怪脫脫輩之無史識也摘莊子事為十二圗各題一章擬九歌體姑射神人雲巃嵸兮絙崇岡峯崎礒兮葉丹黃藐姑射兮名誰名若有人兮處其中冰雪肌兮綽約容乘雲氣兮御飛龍遊凌兢兮周八荒羌萬物兮被礴旁羡莫見兮增慨慷庖丁解牛徹胹鱉兮炮羔與安胡兮楚苖薦庖丁兮犓牛睇理解兮崇朝既踦膝兮倚肩乃奏刀兮騞然經肯綮兮未嘗况大觚兮是干繄遊刃兮有餘地曷試思兮其始難支離鼓策嗟若人兮形支離肩髙頂兮頤隱齊五管在上兮髀為脅其糊口兮以鼓策無逺戍兮免常徭以病受粟兮飬其身以不勞吾於是知神人之無用兮恆萬古而逍遙壺子示機神之子兮曰季咸期夭夀兮若神曷壺子之猶龍誕猶喻夫三淵雲出谷兮水行地彼寧知其誰何兮夫豈大塊之有意鄭人之冥冥兮第未解夫四示詎吾宗之可常兮固知之人之未深思列子食豕歸來兮列子蹇宅外兮不可以止忘糠缶兮漿觴知食人兮食豕既復朴兮紛而封馳萬物兮無窮春蘭滋兮時雨秋梧飄兮凉風吾方與天帝同遊兮寧知日月之有終倏忽鑿竅斡元縡兮造太清曰渾沌兮爰帝名何倏忽之二子獨憧憧兮屢征彼報德乃戕身兮人皆咎二子之不近情於乎倏忽兮獨非渾沌之所生孰能保此太初兮膏吾車兮吾將從象罔得珠赤水兮崑崙峯硱磳兮波沕淪君於焉兮夷猶駐芝蓋兮華軒遺元珠兮屢索異哉象罔兮乃可以得余幼寶此竒琛兮年既老而不衰恍偶遺之若失兮幸屢索而得之吁嘻象罔兮得毋余嗤輪扁斫輪君讀書兮堂上臣斫輪兮堂下君之書兮古人臣之輪兮臣者疾則苦兮徐則甘應心得手兮口不能言有數存焉於其間庸詎知臣言之非糟粕兮君幸恕臣之狂顛東施捧心有美人兮山之阿溪若耶兮村苧蘿常病心兮若思矉雙眉兮修蛾姱曼睩兮層波彼何人斯強效為富閉户兮貧去之所以美兮彼不知貌假借者盍鍳兹濠梁觀魚撰良辰兮遊濠梁盻遡波兮風回風流淡湛兮水草芳鯈魚出兮遊從容噞籌蓼兮之而張是魚樂兮爾我同聊容與兮斯徜徉吾固知之兮於濠之上痀僂承蜩爰有人兮形痀僂居楚野兮山之幽仰叢薄兮枝相繚臂若槁枝兮日承蜩天地之大有所弗知兮唯蟬翼之是求蓋有道兮不與萬物為儔吁嗟斯人兮羌得全於天者流伯昏論射觀君射兮信竒鄰至人耶然疑登髙山兮嶻嶭臨百仞兮淵漪背逡巡兮足垂外揖君進兮君辭君於中兮殆矣挾弓矢兮奚為縱余目兮青天寄余神兮九圍永泊然兮自適歷萬劫兮不知皇清文頴卷首十四欽定四庫全書皇清文頴卷首十五御製文頌九符有序粵若稽古典墳厥初生民低處者巢髙處者穴取草木皮革羅鳥獸漉水物以為衣為食君臣父子上下長幼男女夫婦莫有倫紀聖人伏羲氏作始畫卦以通神明之德類萬物之情造書契以治百官察萬民政令行民用遵約束時則有龍馬負圖之應逮黃帝軒轅氏宰制羣動垂衣以治作甲子天用錫以日月合璧五星連珠造律吕播其八音而鳯凰巢阿閣與蚩尤戰於涿鹿之野有雲氣止于帝上其後復有聖人曰堯治歷象置州牧四嶽明峻德以親九族協和萬邦時則百獸率舞廷生五色瑞芝舜承是道重華協于帝建學養老敕命賡歌卿雲復旦鳯凰來儀上下草木鳥獸魚鱉咸若暨禹湯文武祗德建中無逸執競時則有錫洛銜鈎鳴鳥流烏之瑞揆古聖帝王罔不得天嘉祥為受命之符亦罔不在德其惟時叙罔不克加抑畏用兢業于有邦以答天之眷命自時厥後由漢迄明英君誼辟天亦默相厥德視其所履以為協應其有矯誣諛佞詐作符瑞以欺中外以惑蚩蚩氓天弗與民弗信也洪惟我皇清聖聖相承宅中圖治以撫四海德威並行汪濊暨訖天用錫以洪庥敬戒不怠用培我丕丕基雍正三年三月太史奏日月合璧五星連珠皇帝曰惟豫丕顯考聖祖克聖克仁克膺天佑豫一人是賴有司其擇吉薦牲以告景陵羣臣固請升殿受賀不許嗣是嘉禾瑞繭慶雲芝草醴泉甘露河清鳯儀之瑞先後疊奏我皇上祗承天眷弗敢自居或則歸美聖祖或則不以宣示且曰朕所喜者豐年為瑞及汝諸臣宣力四方斯朕志也臣謹按王者必世而後仁天人叶應嘉祥駢臻必俟仁而後益顯故生民公劉之詩作于周召清廟明堂之什成于冲子我太祖太宗肇基新命我世祖聖祖克成先志永綏兆民功崇德溥纍洽重熙勝于成周我皇上歸功聖祖蓋本于世而後仁之義然非皇上以聖承聖覲光揚烈恩澤覃敷民飲其和天歆其治應感之符必不若是速也且周之盛時雖宅豐作洛撫有千八百國而幅員尚小孰若我皇清東至于海南盡交趾西届哈密北之七十四部籯齎槖負致誠貢獻者嵗嵗不絶自京邑大都以至山村僻壤耕鑿順則各勤所業武夫戰卒有老不識兵戈者由斯以談天之眷我皇清于周有加焉記曰聖王在上天不愛道地不愛寶人不愛情考之今時洵合其語天子猶謙謙自牧敬德弗遑修我人事撫我蒸黎方將上溯堯舜欽明文思溫恭允塞之德中考湯武表正萬邦敬勝義勝之徽以措諸政令以為萬載規敬迓天庥永永無極敢敬擇其符之顯奕者有九各繫以辭以效頌祝之忱云爾合璧連珠昊天有命眷我皇清奄有九有暨乎八紘以養以恬灝灝和寧曰維聖祖文思欽明皇帝纘之濬哲丕承天鍳孔昭厥符惟禎自古在昔黃帝握歷璧合珠聨昭哉藝極旃蒙之嵗單閼之月聿見嘉祥其祥長發宿躔營室位在娵訾雙璧輪囷五珠迆邐星臺告瑞太史書呈帝曰休哉惟皇考實膺爰陳于詞爰告于陵有謙其躬有讓其衷惟皇孝思格乎蒼穹豈惟民哉届于昆蟲黃河清銀漢焕光河精發祥九曲彌亘浩渺汪洋宿列崑崙流經積石匪澄伊黃浮天浴日曰既清止休符顯奕徐邳淮泗千里靜碧馮夷息浪河伯安瀾五老上告紫蓋繽翻滌而濯矣既清且泚漉其濁矣既迅且駛鏡流瀰瀰素波漣漣上映下徹天水相鮮疇克澄其源疇克致其然貺自蒼旻景福永綿以光我萬年孝陵神蓍景陵靈芝煌煌神蓍奕奕靈芝百莖九光神物應期帝命東皇分植兩陵無節而秀不根而榮潤以仙露燦於寶城於皇世祖開物成務逺至邇安金甌鞏固皇帝敬承羮墻見慕齊戒神明建中飭度是用産蓍以應嘉祚於皇聖祖握符夀世育之以仁正之以義皇帝敬承同歸一致乃文乃武以葆以藝是用産芝以昭上瑞芝既蒼矣蓍既長矣貞符彰矣夀而臧矣暨萬邦矣嘉禾有猗者禾在彼中田爾農來思越陌度阡芟之奕奕柞之澤澤五榖既播三時無失載甲載坼載長載褎載穟載實載碩載茂帝實顧矣稷實助矣風披擭矣雨灌注矣綏我屢豐言呈其瑞休我皇風言多其穗逺自滇南近兆帝藉匪雙伊九匪寸伊尺先民有言食為民天百榖用成自古有年瑞繭帝念民依惟農與桑孰饑莫食孰寒莫裳雕鏤必黜爰勤三農纂組是省用紓女工昊天惟顯聿降瑞繭瑞繭惟何萬蠺同簇曽不經緯曽不杼柚苑窳致力西陵效勤神功默相嘉繭乃成爾純爾素匪紅匪紫爾質爾實匪錦匪綺言徴其應言發其祥祐此蒸民成以報章太平之澤五十衣帛夏凊冬溫太和充溢甘露奕奕吳都沃壤甫甫有苖有禾有絲有紵其農于田侯王侯旅其賈于市侯笑侯語維時之泰飲帝之和含哺以嬉渥澤孔多上天錫瑞降兹甘露零我吳都祐我休祚其凝如脂其甘如飴湛湛瀼瀼如珠之垂曰既零止天下寧止曰既溥止萬邦安止以兆嘉祥降福孔穰醴泉坤元載物厚德安貞孕祉育祚乃效厥靈有醴者泉載甘載㫖莫尋其源載清載泚惟泉之功養而不窮我皇之心濬哲宏通惟泉之瀉流膏潤下我皇之澤物無遺者惟泉之源用之日新我皇基命浩浩淵淵惟泉之發挹之不竭我皇虛已聞言若决在易井六勿幕元告勞民勸相中正作繘闕里慶雲巍巍宣聖上律下襲祖述憲章斯文舄奕我皇膺命心契聖時以養以教作君作師爰新闕里慶雲式焕糾兮縵縵郁兮爛爛乃映杏壇乃覆檜幹金枝蓊欎玉葉璀璨惟帝之誠致雲之卿以彰我文明以賁我太平房山鳳凰四靈之一厥惟鳳凰感我聖化逰我帝鄉帝鄉之南聿有房山雍雍喈喈來集其巔亦集爰止惟皇之祉藹藹吉人惟君子使六象其體六府孔修九苞其文九夷來柔明明上天鍳我帝德朝陽叶應文明萬國贊四賢贊有序聖門弟子三千其賢者七十有二人史記家語各為紀其姓氏考其事迹以垂之後世而能契夫子之心傳得道統之正脉者則惟顔曽思孟四人顔子得克已復禮之說曽子與聞一貫之傳親炙一堂若堯舜禹之相授受敻乎尚矣子思師事曾子發明中庸之道而歸其功于為已謹獨孟子當戰國橫流之時私淑子思距楊墨間聖道而養氣之論為前聖所未發昌黎韓子以為其功不在禹下有以也庚戌秋偶閲有宋諸儒傳因思宋儒所宗者孔子之道也孔子之道賴顔曽思孟而傳今聖廟祀典四子升配堂上為百代之楷模因各係以贊用志景行之私云爾復聖貧也者吾不知其所惡夀也者吾不知其所慕德以潤身孰謂其貧心以傳道孰謂難老簞瓢陋巷至樂不移仰髙鑽堅三月無違夫子有言克已成性用致其功允成復聖宗聖宣聖轍環在陳興歎孰是中行授兹一貫曽子孜孜惟聖依歸唯而不疑以魯得之㑹友輔仁任重道逺十傳釋經超商軼偃念彼先子沂水春風淵源益粹篤實舂容臨深履薄得正以終三千雖多獨得其宗述聖天地儲精川嶽萃靈是生仲尼玉振金聲世德作求孝孫維則師曾傳孟誠身是力眷兹後學示我中庸位天育物致和致中夫子道法堯舜文武紹乃家聲述乃文祖亞聖戰國春秋又異其世陷溺人心豈惟功利時君爭雄處士橫議為我兼愛簧鼓樹幟魯連髙風陳仲亷士所謂英賢不過若是于此有人入孝出弟一髮千鈞道脉永繫能不動心知言養氣治世之略堯舜仁義愛君澤民惓倦餘意欲入孔門非孟何自孟丁其難顔丁其易語默故殊道無二致卓哉亞聖功在天地列代賢明妃后垂稱奕世者取繪十二繫以贊西陵教蠺在昔軒轅正妃嫘祖孕虞育唐發湯啓武得姓十二如千子乳創制蠺織窳陵為輔衣被天下功垂萬古後世文勝乃崇黻黼太姒誨子昏姻匹妃王化之始維周勃興嗣徽太姒富而能儉貴而不恃載在風詩葛覃卷耳更勤教誨有榖詒子昭哉嗣服武周濟美姜后脫簮黃裳六五以順為正子有幾諌妻寧無諍卓哉姜后宫闈之鏡金鐶進退瓜瓞衍慶彤史攸司慎儀宜令雞鳴朝盈脫珥待命樊姬諫獵先民有訓聿戒禽荒卓彼樊姬感悟椘莊有肉弗御乃止王欲一語進賢霸功以卜不謂婦人克相其君邈矣邑姜十亂稱臣燕姞夢蘭乙始啓商蘭亦徴穆吉人在宫天使詒榖國香揚揚掌夢其卜嘒彼小星三心五噣椒聊逺條爰昌七􅀈鄭多君子宣尼所録許后奉案后母天下首崇儉德坤順乘乾柔嘉維則繄維許后貴而能抑不忘寒微車服是飭日朝長樂用修婦職懿彼芳型永為後式媫妤當熊圈熊攀檻羽林驚迸得人則止誰與知命婉孌季女忠貞維性直前當之熊為戢橫六官咸怍七萃交病萬燕銜泥天旌懿行班姬辭輦王者求賢爰載後車左右前後正士與俱景仰休風三代之隆何逮漢季嬖媵輦從一言稱善如圜斯轉永鍳班姬逺彼婉孌馬后練衣十嵗持户侯家整肅母儀天下六宫欽服練裙浣衣以率戚族儉德之共綏將福祿車水馬雲明訓在牘豈伊輝漢作則椒屋徐妃直諫元成有言願為良臣流風丕振乃自宫嬪徐妃上書東征抗陳惜哉唐宗納而弗斷外事征討內營宫館頓忘初年如圜斯轉昭容評詩玉稱降天乃生女子衡才汝耶孩笑而唯昆明賦詩綵樓落紙辭華哲匠月旦自彼千載騷壇一時牛耳展如之人文亦可喜曹后重農稼穡惟寶王政所崇襏襫耒耜必親必躬維宋曹后播種于宫倣佛親蠺獻繭效功克勷內治聿著芳踪嗤彼雕鏤何事傷農銘樂善堂銘秉彛惟民氣具理存聖愚曷異善惡是分其善維何仁義忠信知誘物化遂亡其正惟危惟微人欲天理操之則存舍則己矣曷惟其操是曰樂善動靜弗違斯須弗間我既受中我則蹈之我有秉彜我則好之聞人之善我則友之非徒友之又克有之雞鳴而起孳孳不已至樂因心其味孔㫖樂正好善鄒孟稱優東平樂善厥德允修嗚呼念哉善可樂哉樂而不倦天性其培誠能好之萬福之根反是則殆衆禍之門爰作斯銘服之無斁朝斯夕斯果行育德硯銘乃潤乃堅惟淵惟默韜采含精在几之側用掩瑾瑜芳流翰墨端人與處長資畜德多福硯銘惟古有訓斂時五福敷錫庶民幽贊化育承天之序厥惟艱哉視民如傷孰釋豫懷毌曰九重之宫而安其躬念蔀屋之竊歎每憂心以忡忡毌曰八珍之膳而供其宴念糲食之尚乏嗟何能以下咽錫福謂何遑云建極期愆尤之或鮮恆小心而翼翼我心如是我志在兹視此珉石貞堅不移庶天祖之鍳佑致風雨其咸時斯蒼生之多福即豫一人之多福永與薄海而共之座右銘維月在天常缺于盈維水在器既滿則傾古之哲人業業兢兢慎彼盈滿若弗克勝意馳弗止防之若城言玷不為守之如瓶無往不復何陂匪平勿謂豫大而侈豐亨矧兹九五位莫與京何求弗得何為弗成縱欲安止凛涉春氷適口斯己那事臠鯖容膝亦安奚必雕楹勞于求賢逸于制情對天惟敬法祖惟誠憂其可恃懼其可矜我志若斯我行未能茍行弗能言何足稱嗚呼小子終始斯銘負扆銘大德曰生大寶曰位負扆答陽天以民寄天視民視天聼民聼民欲天從影隨響應何以守位曰惟求仁君止于仁繼天生民告爾小子夙夜敬止仁逺乎哉及之須跂嘉量銘皇豫聖祖建極憲天叶度律均鐘洞契元聲微顯闡幽何天衢亨小子纘緒寰區撫臨叶協時月正日同律度量衡製兹法器列于大廷匪作伊述大猷敬承遵鐘得度率度量成量為權輿律諧六英猗聖合天天心聖明七政是齊為萬世法程如衡無私如權不凝如度制節如量祗平律得環中紹天明命叶永寶用享子孫繩繩我日斯邁而月斯征中元甲子乾隆御銘針七情針喜萬類靜觀意愜斯喜神動天隨油然難已宣心之和𨗳氣之滯不極不淫歸于有制禮樂以飾百度惟熙樂以天下奉此無私怒相彼天道有溫有肅維人肖天喜怒倚伏情炎于中莫之敢觸所貴中莭雷霆亦福嗃嗃毌過悻悻勿遷和厥心性以師聖賢哀宣文有言哀而不傷感物切慮如川有防當其一往啾愴懊咿罔識止莭心悴神疲噍殺匪正毁滅匪宜間之以則庶無倚毗懼萬幾待理知懼鮮失業業兢兢一日二日馭朽為戒臨深是怵于昭上帝相在爾室式兹不聞所其無逸惟敬勝怠動獲貞吉愛人有秉彛徴于好德善善欲長賢賢易色所以孔子曰生也直疏亦不忘親亦不昵愛所當愛爵賞罔忒擴我天和容保萬國惡性本無僞情生好惡爼徹鮑魚往訓攸著毌設成心因物以付智鏡在躬先覺有素郊遂是移僉壬必錯中正和平萬流景附欲養心有要道在寡欲從之則危淡泊宜朂緬維曩哲垂訓窒欲非禮必斥奉身如玉一人居髙九有咸矚不邇不殖永保天祿五事針貌懿戒有訓抑抑威儀洪範五事始貌終思動罔或愆敬義夾持作肅惟恭非禮弗為顧諟明命日監在兹輯柔爾顔友君子時屋漏有愧差之毫釐顆卬令望夙夜是祗毌尚巖巖咫尺天威毌示訑訑右史有司溫恭允塞為德之基樹之軌範視此針辭言恢恢寰宇一人是主維命靡常有德斯祜王言如綸被乎下土無易由言惟敬作所彜訓聿昭四方是矩卓彼前王樹兹諫鼓柔亦不茹剛亦不吐進彼嘉言衮闕堪補聲為之律毌逞喜怒白圭謹言玷不在巨金人三緘非禮勿語從斯作乂敬兹九五視維目司視其德曰明明有由蔽物引欲萌伊古有訓五色目盲勿眩錦繡勤省農耕勿玩珠玉企望賢能知人則哲體察物情曰視有要視于無形如水如鑑萬象自呈靜虛動燭其本必清垂旒端冕儲神致精日月環照無幽弗瑩克艱厥后永正玉衡聼宣聖有言非禮勿聼矧維建極承天永命惟精惟一敬勝義勝何以達聰容納諫諍執兩用中旌賢表正既髙乃聼亦逺彼佞五音耳亂樂必放鄭九歌驗民八風體政亦越卷阿矢音有咏雖隔九重而知民病雖聆萬言而執一柄毌俾聼熒尚其居敬思基命宥密厥惟思哉翼翼小心為德之荄是惟弗思思則弗回勿狃宴安而遺逺懷勿侈豫大而弛心齊貌恭言從匪思曷階視明聼聰維思是裁無黨無偏惺惺靈臺勿縱其欲縱欲成災克己復禮四德具該朝斯夕斯天鍳恢恢告我後人皇圖永培文告風神文維神大元中精輔翊生成以吹以噓百昌勾萌昔我皇考作是靈宇在紫禁巽方維歷有年所側聞曩時旱魃為災彭怒漲天繼日以霾我考竭誠爰命宗枝曰帛曰牲祝史致辭遂蒙神庥駭飇為收禾黍沐澤乃亦有秋兹者雪旱于冬雨旱于春自春徂夏震雷無聞山川出雲慶散于風不惟其景乃惟其終曰豫不德小民何辜無麥無禾渺渺愁豫曰維百神各有攸職功在蒼生乃廟而食用是陳詞祈神之佑致是咎徴皆豫之咎願敕飛廉速收其暴油雲以作雨師前𨗳曰豫不誠明神之欺降罪于豫豫其敢辭屏息以待惟神之思皇清文頴卷首十五欽定四庫全書皇清文頴卷首十六御製文碑文泰陵聖德神功碑洪惟我聖祖仁皇帝統承三聖之謨烈奄奠萬方撫臨天下六十有一年實兼開創與守成之事爰自綏靖南荒翦除三孽而後惟務以深仁厚澤淪浹中外俾涵泳優游四方從欲而勵精圖治悠久無疆晚嵗之政尤欲申嚴庶務以正官方糾詰敝民以清禮俗以明作濟惇大以莭制保豐亨故我皇考嗣承丕基凡誠孝中正寬仁之大原無一不與聖祖同揆至用人行政規模則稍有變通以求繼志述事之盡善惟皇考神聖之姿默契聖祖是以膺付託之重任而宏開夫萬年有道之長惟皇考誠敬之德簡在帝心是以致嘉祥之駢臻而即驗于四海於變之盛雖十三年之憂勞無一日一時少釋于宸衷而所以貽我子孫臣庶億萬祀之樂利無窮者誠如天地之無不幬載也皇考世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝第四子也母孝恭仁皇后在妊時夢月中仙娥授以神子既覺而誕生皇考皇考幼而徇齊天性仁孝聖祖恩眷踰常八嵗時患腹疾皇祖方巡狩塞外聞之遽馳歸一晝夜而至其篤愛有如此者奉事庭闈數十年深愛慤敬無一言一動不允當皇祖之心每語衆稱為至孝先是舊皇太子贈理親王之未得罪也皇考小心承順恪盡臣弟禮而王恐聖祖眷愛日隆有妨于己遂至以非理相加皇考每順受之而剛正之氣亦不為少屈律己則篤謹有加焉及嵗戊子王以罪廢居常進諛者多背離相忌者率傾陷禍且不測皇考多方保護以悃忱惻怛感慰聖祖之心而曲為王鮮始獲矜容王乃愧悔自失東宫舊屬咸灑泣驚頌聖德方是時聖祖違和又以允禔允祀等屢作非彛以干天怒居常鬱鬱病勢增劇皇考竭心孝養凡百躬親靡晝靡夜逮四閲月聖躬乃安及理親王再廢聖祖春秋益髙諸王中私懷覬覦者往往矯飾名譽私樹黨援而皇考絶不以一事自表異友于兄弟均平如一莫不同其憂喜軫其疾痛其自取咎殃者亦不避嫌疑力為調劑自內外族姻左右大臣以及近侍宿衛無一人往來親密者聖祖用是灼知聖德淵懿大義明著無黨無偏足以膺宗社臣民之付屬也及遭大故水漿不入于口以乾清宫東廡為倚廬素服齊居養心殿三年如一日每遇朔奠殷祭及獻食夀皇殿悲不自勝哀動左右躬送梓宫安葬景陵仁夀皇太后升遐哀誠一如初禮凡太廟郊壇必躬必親致齊致慤觀者罔不肅然起敬每遇水旱之祲輒愀然曰上天譴責朕躬命直省旬月奏報雨雪茍應時則喜動顔色或過期即減常膳元年五月京畿旱䖍禱于宫中自晨至夕不膳霖雨立沛蓋皇考深念所任受皇天暨列祖者惟兹天下之蒸黎故休戚相關如保赤子而民之所以安者存乎政政之所以舉者存乎人故宵衣旰食日有孜孜尤以是為先務焉念民所苦病者莫若賦重而刑濫有司遇災祲而不恤巧法侵漁或惰侈以自耗致民俗之日偷逐姦利縱淫樂聚徒鬭狠若是者皆盜賊之源也皇考即位之元年即大免直省逋賦陕西甘肅二省以軍興運餉其所供賦稅無嵗不蒙豁免七年至九年輪蠲各省賦稅有差自元季張士誠據蘇松嘉湖陳友諒據南昌袁瑞與明太祖苦戰于江東西橫斂以給軍終明之世故籍未改特命永除數郡浮糧著為令典凡直省報災朝聞發不待夕夕聞發不待朝每語近臣朕蠲租發賑如救焚拯溺猶恐災黎之鮮有濟也彼視民之傷與巳若無與者獨何心哉常念水土為農田之本而救荒之政莫要于興工築以聚貧民遂博求海內水利修川防俾各省河渠湖澤嵗久或淤塞為連州比郡農商害者咸開濬之京畿則命怡親王大學士朱軾經理水利營田官開水田數萬頃聼民自占者不與十餘年中費數百萬貧民皆取食焉洪澤湖都受淮流廣數百里恃髙家堰為關鍵以束淮而潄黃下河七州縣民命繫焉發帑銀百萬盡改石工浙江松江海塘經潮水屢漲修築相繼費數百萬濵海之民始得安袵席無為魚之患往者封疆大吏好因事以自為功有司承迎以速進取之路凡有興作及賑災動稱捐助或曰小民樂輸皇考再三諭禁以蘇民困州縣巧取有禁門關苛索有禁而民隱之萬難上達者莫不在皇考洞鍳之中每遇重囚即深厪睿懷屢飭法司必三覆奏好生之德發于不能自己者如此念刑罰所以濟政教之窮必修禮正俗乃可清其源詳注聖祖仁皇帝諭㫖十六條親製勸農種樹之詔御書刋示四方命九卿詳定貴賤服色兵民㛰喪禮制實舉孝義貞莭分遣御史巡行直省常恐所任非人則雖有良法美意德難下䆒教不虛行故搜揚俊乂立賢無方自唐宋以後秩祿不足以贍庶官不肖者各以他途取之用此苞苴盛行不可遏止皇考于外省督撫以及州縣親民之官各賜養廉較正祿數十百倍其在京師卿二則賜雙俸司旅並給飯費雖閒曹職官亦凖俸銀之數賜之廪榖而寡廉鮮恥巧取以殃民者法亦有所必行焉左右輔弼及封疆重臣忠勤夙著猷績彰聞則推誠倚任坦然不疑俾得展盡底藴而常戒以面從責以啓沃優容寵賚十百于尋常其有恃功驕蹇植黨營私者則法立誅必而忠直善良即時有失誤屢被譴訶卒保全其終始建賢良祠崇祀纍朝碩輔其餘著勳伐效命疆場者皆録用其後人又念士者民之表儀而庶官所由備也故廣其登進之途而董之以教元年命郡州縣學官必用正途二年躬詣太學頒訓飭士子文四年命直省督學舉英才八年舉通曉性理舉人八人並賜進士各省㑹俱特建書院取之之廣恤之之周如此兵者民之衛藩而國威之所蓄也故勤其搜簡之政而曲體其情命提鎮考核將校必察其訓練拊循之實毋得徇私提鎮之優劣一以整飭將校訓練行伍和輯兵民定之士伍則正糧之外别發帑銀俾軍帥營運以恤其㛰喪蓋皇考涖官馭將勤民養士整軍恤衆使文武並勵中外相維制防曲盡如此重念八旗乃國家根本內外大小臣工士民軍吏所觀式也故所以教之養之取之任之察其情而優恤之者尤詳且備焉元年即命舉人庠生之服公事者各還家専力于學誦設八旗官學各就其方簡其士之秀異者而官教之命諸王察舉孝弟守分力學者以承平日久生齒愈繁取八旗餘丁四千八百人為教養兵嵗給十七萬有竒自五旗諸王不得以旗分人員多供差役擅治其罪下此正副都統及參領佐領不得苛索外吏財物竊嘗審䆒皇考治法之源流然後古聖王所為以天下為一家以中國為一人者其規模氣象始可得而見焉皇考自宗親戚畹勳舊以及八旗之士衆自京師畿輔以及九州四海之軍民惟恐其疾苦之蔽壅禮俗之衰惡一如一身之中毛髮有觸而必動雖外藩蒙古皆如家人父子其職官並豫俸祿兵衆咸給月糧土默特守臺站人嵗時有賞用此凡有征討外藩效命屢諭蒙古王貝勒宜愛民惠下其子弟之俊秀者或在內庭教養之賜安南以隙地減朝鮮琉球貢物厚朝鮮俄羅斯國人之賞賚給琉球來學者歸國之道齎不獨澤流方外而聲教亦漸被于遐荒十有三年之間宵衣旰食無晷刻之寧不謂天下已治萬民己安而少懈夫朝乾夕惕之皇衷故以事天之誠敬昭事百神而神無不格以法祖之仁孝錫類萬物而物無不孚至于孔子德配天地尤加崇禮王爵之封上及五世跪獻之禮首著上丁詳定配享先賢增置五經博士皆前古所未有也教養宗室而寬其拘禁者自登宸極即封理親王子𢎞晳為郡王而于理親王未降一㫖未遣一使曰吾不欲受其拜並聞感恩之言也錫賚頻仍惟命內監傳送且教以詢所從來勿令告以上賜及王甍躬臨哭奠追贈理親王命𢎞晳進襲親王爵分封供具特厚怡賢親王之喪躬臨哭奠哀慟久而不己自戊子年後允祀允禟輩莫不妄兾非分結黨樹援嘗觸怒聖祖聖祖降硃批諭皇考及諸王云朕與允祀父子之義己絶及皇考嗣位重念弟兄情且知彼明敏能任事爰命輔政加恩信用兾以感悟其心密封皇祖㫖于內閣不以宣示外人乃允祀不但不改悔且心懷怨望怙惡不悛允禟在西寧多為不法顯悖臣禮皇考雖申告中外明正其罪絶其屬籍而兩人猶得以天年終罰弗及嗣自御極以後瑞應駢至日月如合璧五星如聯珠黃河之清自陕州至邳宿二旬有五日不變鳯集麟生慶雲甘露靈芝嘉榖之祥不可勝紀皇考每見奏章必深自警惕咨戒臣工茍德政之不修雖天瑞不足恃也彰明人紀更定刑章凡繼母虐殺前子以所生子抵法無故杖殺僕婢者分别重輕治罪訪明太祖本支裔孫襲封侯爵以承其宗祀自明初紹興有惰民靖難後諸臣抗命者子女多發山西為樂户數百年相沿未革一旦去籍為良民命下之日人皆流涕自凖噶爾擾邉聖祖仁皇帝宿兵西北陲以保舊屬諸藩青海之平也彼又納我叛臣雖屢加訓告襲盜不休故定議濯征為一勞永逸計及十年大破之于喀爾喀之地邉將爭言宜乘時進𠞰皇考念彼逺處外夷武不可黷乃遣使諭告决意罷兵西南洞苖自古為附近州縣之害自平定廣烏蒙古州歸義開地三千里而時戒邉疆大吏為善後之謀敬惟皇考自始至終所以涖官勤民教士恤軍安內馭外者無不體之以誠本之以孝用之以中持之以正育之以仁撫之以寬與聖祖仁皇帝若合符莭而更化砥俗使天下遵道遵路如優恤宗室而禮度必謹于防維愛禮大臣而法禁必行于貴近搜羅才俊而甄别不漏于昏庸教育士民而捕詰獨嚴于敗類蓋非此不足以移文恬武嬉隂私交結之風革吏蠧民偷險戾奸欺之習未嘗非聖祖晚年整肅官方矯除薄俗之遺意也是以數年之後蒸然丕變外自郡州縣吏私饋不行于大府監司內而閣部院司臺垣不敢以己事干外吏倉庫侵蝕者所在充盈庠序鮮囂陵之士門關無苛索之兵蠧吏散朋奸民徙業孔子所稱善繼人之志善述人之事者我皇考實克當之皇考即位之元年八月即手書建儲事密封宫庭布告羣臣八年六月聖躬違和特召臣及莊親王果親王和親王大學士內大臣數人入見面諭遺詔大意謂朕夙夜憂勤惟體聖祖之心以為心法聖祖之政以為政因見人情澆薄官吏徇私罔知改省不得不懲治以戒將來故有從前條例本嚴而改易從寬者乃原議未協朕與廷臣悉心酌定可垂永久有從前條例本寬而改易從嚴者本欲俟諸弊革除之後酌復舊章乃知皇考聖智天縱灼見皇祖不言之意以就前功而隨時取中用建民極蓋聖祖時瘡痍初復非遍覆包涵不足以厚生養而定民志皇考繼承之初則政寬而奸伏物盛而蘖萌非廓清釐剔大為之防其流將溢漫而不可以長久兩朝聖治正如天地四時之運相推相代以成嵗功先儒所謂雖有改制之名而無變道之實者此也皇考聖意原欲大加整剔使弊絶風清人人皆知理法而後布恩施德以培國家萬年元氣昊天不弔未假之年使十有三年憊精勞神之聖心猶未釋于龍馭上賔之日而廣大欲沛之澤不及旁流汪濊以遂皇考之初志而親見黎民遍德之休也嗚呼痛哉雍正十三年八月己丑皇考崩聖夀五十有八乾隆二年三月庚寅葬泰陵小子謹拜稽首而獻頌曰惟天行健運而不息隂陽甄陶萬殊一則惟聖時憲建極宜民其用曷先曰義與仁當豐而亨蔀亦潜滋既大且豫必戒其隨皇帝繼序履盛持盈日烜雨潤雷動風行皇天所付惟此嘉師四聖容保豫承豫依曰豫作君在厚其生其災其害我躬是膺曰豫作師在正其德其薄其頑我躬之忒設監置牧惟民之安茍非其人慮為民殘心膂股肱信賢不二庶司百吏開誠以示片言必録小善必登耳提面命毋或荒寧官針之敗交以賄成賢奸可易白黑可更植黨背公譸張譎誰上下相蒙斯民曷望重增秩祿用絶苞苴私塗既閉邦經可臚旌廉擢能俾欽俾慕誅恣懲貪俾愧俾寤九官承式庶事寡愆大府整躬百城晏眠敬刑明罰亂獄無滋嵗㑹月要出納無欺救荒拯溺家沾户浹增防浚川役均廩給興禮明教以示之則禁暴詰奸以除其慝煌煌帝京政肅風清豪強屏息奸宄潜形博戲鬪囂鶉茵雞栅竒技淫聲兒童莫識近自畿甸周于海隅山行野宿刁柝無虞曷占政成官稱其職曷占民安鼓腹作息皇帝致治身為表儀由中達外誠一無私郊廟明禋洞洞屬屬闕廷涖政雍雍穆穆大孝備矣昭哉嗣服眷舊親賢久而彌篤近承德意逺樹風聲父勉其子弟祗其兄未明求衣日昃不食一日萬幾是匡是飭天現其光珠聨璧合地效其靈河清川翕畝穗叢岐陵芝結紐鳳翽麟逰近在郊棷皇帝曰咨毋安毋豫我君我臣惟戒惟懼遇災而懼災可為祥以祥為常志將日荒重道崇文德心是懋張皇六師武不敢究天衢如砥萬國朝宗開我明堂四裔來同盛德之氣生物之元于時為春在人曰仁尊嚴之氣物以凝閟于時為秋在人曰義巍巍聖皇是則是效雨露雷霆罔非至教德厚于地智崇如天儀我後昆億萬斯年文廟碑文天生蒸民若有恆性人道立焉亶生聰明神聖作之君作之師以厚其生以正其德綱常之所以不墜倫類之所以相維相保于天地間者斯焉是賴古聖皇繼天立極君師之道兼隆敻乎尚矣繼是以來雖代有君而克盡其為君之道者蓋寡若夫同天地亘古今繼往聖開來世特立為師之道于宇宙間者則惟我先師孔子一人敬維孔子集羣聖之大成祖述憲章垂教萬世使後之帝王建極綏猷得有所遵循以求道法治法之大全由之則治悖之則亂大哉孔子功參乎覆載明並乎日月生民以來未有盛焉者也我列祖撫御寰區叙彞倫明禮樂諴民阜俗一惟孔子所傳之大經大法是矩是式微言奧義悉推闡而表章之統緒相承心源符契欽敬追崇之盛典超越往代具在彛章豫小子懋學書闈景行志切逮寅承丕緒祗奉先猷夙夜兢兢繹思聖道越乾隆三年季春上日躬釋奠于先師前期飭官庀材崇飾廟貌特命大成殿大成門覆以黃瓦崇聖祠覆以緑瓦稱朕慕道崇師至意記曰禮時為大宜次之稱次之先王之制禮也順于鬼神合于人心惟其稱而己太學者帝王尊師之地盡禮備物以明尊也稱其德而不為過宜莫大焉抑非以炫耳目之觀也欽崇至道敷政教以淑羣黎法祖隆師罔敢或斁俾薄海內外無一夫不與被聖人之澤斯朕志也夫乾隆四年己未用允廷臣之請勒文紀事以垂示于奕世系以詩曰於昭道統淵源三五至聖挺生立極萬古贊修删定為帝王師天地悠久斯文在兹惟我祖宗惇崇典禮爰謁林廟爰封祖禰豫膺鴻緒彛憲是承釋奠視學大昕鼓徴萬仞宫牆圜橋首善笙鏞斯陳爼豆斯薦耽耽翼翼鳥革翬飛制符宸居金碧流輝丕焕宏模神明所宅玉振金聲永揚教澤式視兆庶式育才賢光宣文治億萬斯年重建泰山神廟碑文國家秩祀之典方望實惟最重而泰山為五嶽宗長功用顯彰為德尤盛廟貌之在山巔者歷有年所敻乎邈矣欎攸不戒宜用鼎新粵以乾隆六年特遣専官董建靈宇殿庭廊廡門序觀闕崇閎壯麗鳥斯革翬斯飛耽耽翼翼琉璃丹碧輝映日星黼座璇題像設神御穆然其容范金惟肖山半為香亭寶鼎中峙覆以重簷載陟斯憩興仰止焉鳩役庀材胥出內帑公旬不勞經費不損凡土木之工若干閲期有六旬而竣朕惟岱為方嶽昉于虞書列于禹貢紀于周官詳于春秋傳蓋河泲淮海川瀆環滙扶輿積高之氣磅礴藴結靈淑鍾萃蔚為神皋奠坤維而翊天縡方位屬震盛德在木得造化生生之元故觸石出雲不崇朝而遍雨天下功至神也澤至漙也我列祖撫一海㝢懷保蒸黎一體天地大生廣生之心為神人主明德馨香神庥昭格余一人寅承基緒夙夜兢兢事神保民罔不祗肅彼登封告成刻石紀號金泥玉檢往牒所誇矯誣侈大之事繄寡昧所不敢知而乂寧方夏阜殖羣生俾庶而富俾夀而臧尚其惠邀嘉貺錫羡介祉以篤我國家無疆之慶則所以崇禮展敬揭䖍妥靈其何敢後焉爰勒詞琬琰昭示永永系以銘曰巖巖泰山駿極于天有虞肆覲肇祀用䖍牲幣祝號秩視三公匪僣匪瀆曰以報功伊神之功霖雨萬國載生載殖食我神力春也其時仁也其德體乾之元以立坤極奕奕新廟穹峙層霄易陶以金以禦剛飈雲生桂棟雨挾松濤俯瞰榑桑日觀岹嶢雕甍珠網鋪金墄玉紫殿靚深黼衮端穆月馭星軿林霏馥郁靈貺孔時錫兹介福降神育秀賢哲克生時暘時雨百榖以成陋彼陟封七十二代成民致神往訓是佩肸蠁斯通鑑格斯在祗薦明禋于萬千載安佑宫碑文序昭穆以祀其先祖有功而宗有德建報本之義為萬古之經者宗廟之制三代以上即有之繼人之志述人之事者所當謹也設裳衣以如其生朔有酌而望有獻盡事親之禮抒不匱之思者原廟之制西漢以來始有之繼人之志述人之事者弗敢廢也後世神御殿亦猶漢原廟之義耶然漢之原廟不過月出衣冠一遊耳至宋之時乃有神御之名蓋奉安列朝御容所也上元結燈樓寒食設秋千其視漢為己備矣而崇建遍郡國奉祀或禪院識者多議其非禮焉我皇祖聖祖仁皇帝在位六十餘年恩澤旁覃僻邑窮谷圓頂方趾之衆飲其德而不知子孫臣庶躬被教育者宜其謳歌慨慕而無己思也是以雍正元年我皇考世宗憲皇帝謹就大內夀皇殿奉安御容朔望瞻禮牲新時薦而於皇祖所幸暢春園亦陳薦如禮非輕為此創舉也我皇祖有非常之澤及天下是以皇考合天下之情亦以非常之禮報之有漢宋備物備禮之誠而無宋代遍及郡國祀繁致䙝之譏也豫小子嬛嬛在疚顧諟皇考之陟降敕明旦凛紹庭良法美政布在方册者謹守而弗敢失既就夀皇殿東室䖍奉皇考御容以配皇祖念兹圓明園我皇考向日遊觀在囿在沼之地也其何忍恝視爰擇爽塏之地具殿廡之規為室九敬奉皇祖御容於中奉皇考配東一室匪惟豫小子罔極之思羮牆之慕籍以稍抒亦欲使後世子孫凛覲揚之志勤堂構之基所謂禮以義起有其舉之莫敢廢也鳩工於乾隆庚申而蕆事於癸亥所司以碑文請乃序其事如左而繫之以詩懿兹苑囿皇考所作土階茅茨遵堯之約匪誇丹雘有窅溪壑匪沸管絃有唳雲鶴詎美之求惟聖所樂我龍受之中心惕若宅是廣居九有是度祖武斯繩宏規敢略爰相其地載斟載酌爰創其模載經載落廟貌巖巖堂皇綽綽有間旅楹有梴松桷周之以郛其郛嶽嶽環之以池其池㶁㶁其水何有鳶飛魚躍其宇何有網軒珠箔神御孔安心乎莫莫來覲來齊曰望曰朔於萬斯年豫誠永託皇清文頴卷首十六欽定四庫全書皇清文穎卷首十七御製文賦耕藉賦并序皇上御宇之五年青帝司方之二月春風普扇陽德方亨天子乃耕于千畝之田禮也臣聞聖王務本耕藉以勸農功明主孝親親推以供祀事我皇上孝以事親勤以率民二載甲辰既耕加一兹乂躬行耕藉之禮急粢盛重民食致誠匪懈其典則隆洪惟我皇上道洽天人化霑草木誕敷文德廣運聖謨渥澤周于羣生至治昭乎天壤乃猶頻興重農之典時勤保介之咨追厥唐虞播種之蹤為彼率土民人之勸萬衆觀儀上農終畝逮厥秋成登于天廩薦之皇天供于祖考臣知皇天祖考鑒皇上之精誠歆皇上之大孝必錫嘏降祉永保無疆明德惟馨聿懷多福臣不勝踴躍歡忭之至謹拜手稽首而獻賦曰繄惟重華之命稷兮播榖實繼乎禹功必蒸民之粒食兮始風動而時雍親耕肇于姬籍兮意往聖之皆同我大君之首出兮屢三推以勸農豈玉食之是享兮惟簠簋之䖍供秉耒耜以率先兮符澤物之元功于是春陽初布青帝司方嘉萬物之昭蘇值千卉之勾萌農祥既見土脈方昌協風應律陽氣滋彰皇帝乃順月令撫嘉辰念民力飭甸人當前期而致敬用有事于青春于焉載師清畿封人淨路常伯獻儀掌舍設枑爾乃青壇蔚其聳立華蓽森其崔巍雲移翠幕栁拂青幃啓千畦之平壤欣四塗之腴肥逮夫元辰既屆曉色方鮮天子則御藻冕佩蒼瑌被龍衮鳴和鸞載青旗揚朱旃接游車之轔轔施梁輈之戔戔爾乃稷宫將近樂具班陳天子乃降御輦饗農神祈嘉榖焚燎薪禮成而退有事藉田衣被襏襫趾履陌阡王侯衛後虎賁導前太僕秉轡牽牛奉鞭乃歷廣場撫御耦執縻手底不辭瘁乎三推載耒御間試躬親乎千畝王公卿二或五或九白叟黃童歌呼奔走維誠敬之聿昭知樂愷之孔厚于是黛耜方輟紺轅遂旋雨廉纖以灑潤風縹眇而淨天侍從偕來睹天顔之有喜馨香上達卜慶兆于豐年夫元鳳下親耕之詔永平垂開藉之萹魏主望公田而發趾晉帝帥羣后以祀先尚傳為古今之盛事並書之史冊而爛然况乎我皇至仁大知既事治而府修亦成天而平地修稼穡以勤民謹神倉而蕆事所無逸以知艱重明粢而將祭三春暖兮播百榖四野寧兮進雙穗也哉乃為之歌曰田之興兮稷之功澤萬物兮助鴻濛我皇展事兮千耦其同和協天人兮一哉皇衷既耕既耨兮我稼其豐爰播爰植兮麻麥幪幪又歌曰思樂甸畿千頃其耦鸞輅載臨躬耕其畝登于秋廪斯箱斯倉薦之宗廟供之明堂神之格思綏祉無疆一人冇慶永奠萬邦四時勤政賦惟聖人之建極兮法天運以自强歷四時以勤政兮亦日就而月將堯兢兢而舜業業兮萃芳軌于我皇禹惜隂而湯浴德兮繄日進以無疆道既立而化淳兮美光天之遍育如雲日之為瞻兮統要荒而臣服大哉帝德輝光被乎八埏允矣皇風恩波沃乎四瀆爾其一日萬幾宵衣旰食誦抑戒陳無逸昧爽丕顯夜以繼日既勞謙而匪懈亦健行而不息勤問夜于未央雖寸晷而猶惜若乃春居東以首嵗夏居南而執衡秋居西而司藏冬居北而主成春動也物以之起夏任也物以之生秋收也物以之結冬凍也物以之貞聖人推本萬物之理而欽象四時之行政刑準之以有度治教由是而皆平燠寒應候而時若雨暘順序而咸亨此吾皇四時之勤政而用致九有之和寧者也又若政要書屏針規刻珮日移崇政之餐汗浹延英之背彼古事之云逺覩今兹之盛代厪夕愓與朝乾用持盈而保泰信日昃而弗遑豈臣鄰之可貸聖主圖治以勵精庶政分司而用乂于是喜而歌曰九鼎奠兮泰階平皇風普兮庶物亨萬邦惟懷兮歌永清皇心猶戒兮無荒寧朝夕兢惕兮象天行錫極敷言兮惟至誠拜手稽首兮于王庭萬壽無疆兮久道成東郊迎春賦震宫初動兮青帝司辰勾芒節屆兮木德惟仁條風入律兮鳥厯紀新展東郊之盛禮兮觀畿甸之迎春既備禮而備儀兮亦有則而有倫蓋欽承上帝而敬授于下民者也爾乃迎春東郊既著于月令青圭禮神亦載于周禮斗柄東指而萬物生地氣上騰而蟄蟲啓出土牛以示農駕玉輅而䖍祀于是服蒼玉載青旗宗伯前導王公後隨有嚴有翼不疾不遲樂奏而凝寒頓减舞進而陽和自滋于是歡迎白叟笑舞黃童夾道霏微而灑雨平林縹眇而搖風喜鴻鈞之氣㳤知大有之年豐自南自北自西自東此皇都迎春之令典而萬國莫敢不來同者也于是敕庶司決獄訟非終必赦惟祥是用象暖律之發生乃省刑而寬衆又若降制詔勞三農助萌陽勸田功法恩光之普扇布仁政以胥融于斯時也戶裊綵幡簷飛輕燕栁緑綺宫梅榮芳殿和風拂兮簾惹遊絲暖日長兮鶯啼睍睆金屏麗而帖寫宜春寶扇開而漏傳玉箭溥禁裏之春光煦閭閻而皆遍乃為之歌曰迎東郊兮肅以將舞雲翹兮歌青陽乘時布令兮德施長億萬斯年兮紀春王喜雨賦客有駕輶軒乘雲軺展軨乎南畝縱轡于東郊遨遊容與徘徊逍遙爾乃白雲起乎空谷甘霖降于崇朝震雷㸌㸌飛電熛熛乃往田舍而息焉有二三老人逡巡而前曰斯雨之降時則時矣膏澤之濡普而施矣抑誰之功乎請吾子明言以告之客奮袂而起曰猗歟休哉盛世之民也飲其德而不知其力坐吾明語子方今龍飛九五聖人在位德配乾坤功參天地精誠通于神明政教化乎萬類故上天眷命俾雨暘時若而萬方以治乃至含哺鼓腹耕田鑿井者實不知帝力之賜也老人曰聖人之德某既知之矣請吾子賦雨之澤及蒼生者可乎客曰若夫金烏收景層隂蔽空雷殷殷以振響電灼灼以搖紅鼓河伯之驚濤涌海若之幽宫瀉天池之巨浸走萬里之長虹逺迷三島近失千峰回生意于衆卉消渴望于三農此則雨之方作而其勢最雄也乃其雲開雨止霽景澄鮮山宛宛其染翠木蓊蓊其逞妍鳥嚶嚶其鳴樹草芊芊其含烟栁暗歸鴉簷喧乾鵲槐影濃兮庭宇清花隂轉兮簾櫳薄纖歌動兮髙樓紅紬飄兮綺閣緗帙開兮藝編博山焚兮繡幕莫不欣膏澤之滂澍喜霤聲之頻落此又雨之既足而萬方共樂者也至若烏犍耕白水之涯黔黎藝緑野之畝白叟歡呼黃童奔走土脈既滋兮禾麥如雲灌溉不勞兮田疇以阜爾倉爾京爾荷爾負此又二三子所終日服事而知利我之孔厚也于是老人倚杖而歌曰雨玉不可食兮曷若嘉苗滿目屯黃雲雨金不可衣兮曷若五風十雨利耕耘惟天降康兮稽首蒼旻惟皇感天兮永眷日勤千秋萬嵗兮樂吾之君燈花賦夫何三冬之夜永兮聽玉漏之丁丁耿宵寒之不寐兮羌讀史而論經對銀燈之熠爍兮何用夫隨月與囊螢松風蕭蕭於户外兮爰閉窗而掩櫺獨兀坐于幽齊兮賴詩書之是娛引短檠而置前兮瑤篇卷而復舒注膏油以續餘燼兮光燦爛而晃如何生意之忽發兮開花朵于斯須曽不根而自華兮焰炯炯而扶疏蕚蓓蕾而金輝兮葩晶熒而錦敷丹艷灼灼兮火蕊煌煌離精發瑞兮內隱外光飛蛾嬉其來往兮恍如蛺蝶探擷乎春芳乍蔽乍虧兮若續若離匪青匪緑兮參錯葳蕤可逺觀而不可近玩兮花無葉而有枝歷四時而皆榮兮又如火蓮冬秀乎雪池爾乃叉綴玉蟲兮枝堆寶粟光炫縑緗兮影搖帷幕度長夜之迢迢兮喜銀釭之續續靜對而意蕊欲生閒吟而筆花交錯方作伴于形影兮信有佐于誦讀若夫庭燎通晨九華逹旦雞踏蓮花之巧龍銜火樹之艷麗乎未央之宫燦乎承明之殿斯金闕之壯觀豈書齊之清玩又若帝城三五上元佳時鼇峰千仞金蓮萬枝縟綵與繁光共絢銀花與寶炬爭奇固遊觀之雜遝非靜賞之所宜乃為之歌曰幻非幻兮色可親實非實兮報先春朗瑤室兮席上珍照藝編兮日日新鳳凰來儀賦以聖化感孚泰平瑞應為韻惟聖皇之建極兮膺九五之寶命沛仁恩于四海兮教化洋溢乎萬姓天不愛道而地不愛寶兮百福畢致而延慶乃威鳳之翔集兮符一人之神聖嘉彼休徴應我王化向畿輔而髙鶱覽德輝而載下惟羽族之三百實超羣而莫亞聖德惟純祥禽潛感禀鶉火之靈曜資和氣之融暖信鹿後而麟前亦雞喙而燕頷必梧桐之是棲非琳琅而不噉爾其九苞六象兮五色紛敷戴仁纓義兮蹈信惟孚負禮向智兮順德不渝晨鳴賀世兮飛鳴郎都行鳴歸嬉兮止鳴提扶是皆斯禽之神異掩餘瑞于瑤圖者也若夫黃帝阿閣之巢雍雍喈喈帝嚳六英之舞萋萋翽翽虞廷來儀而神人格岐山和鳴而聖道泰孰若當郅治之休明集王畿而逺邁曠千古而一覩昭德感于聖代是以六府治九功成金甌固泰階平上瑞駢臻歡聲遍乎閭里嘉祥疊奏喜氣達于寰瀛乃為之歌曰鳳凰來兮皇之瑞集天畿兮拱帝位帝德光被兮靈祥萃聖心彌寅兮勤自治敬天貺兮罔或肆又歌曰吉士藹藹鳴鳥協應曷由臻兹我后德盛萬有千載遐荒安定重修闕里文廟告成賦丕鑠惟清聖祖神宗既承顯之式榖允精一而執中欽明文思克讓允恭洋溢潏沕萬國來同皇上御極是法是則煥天下于文明登九有于袵席重道而先聖是欽崇儒而素王惟式天鑒孔昭佑我一人謂闕里之經營既久斯尼山之廟貌宜新藉締造于昭代貽制作于聖君天子乃命司空敕匠作爾經爾營乃量乃度走羣靈而驅八神鳩工徒而咨衆略劚無閭不注之巉巗伐泰嶠嵩髙之參錯良材川委大木神輸授模定式審方辨隅陶埴鍛厲之俱備丹青圬冶之咸臚凡工倕與匠石莫不奏伎而待須爾乃日嘉時良爰動鼛聲鍤徒奮力􅚽人充盈既陾陾而薨薨亦登登而馮馮大冶耀兮金烟霏屑噴兮瓊英斧斤丁丁兮觀救度之胥法繩墨綿綿兮看約椓之咸平矯枉兮既直削腐兮用貞曉畚槖槖晝杵訇訇俄而確輝玉磶杗煥雲楣豐融曼衍揭嶪陸離祕殿聳兮盤鳳傑閣矗兮卧螭何巨麗之方建乃卿矞之呈奇曜藻流光兮鬱蓊而承日麗懸華曳紫兮糾縵以布天垂斯固天文與人文並燦聖居與聖澤偕丕者也若乃級層階于東西拱修廡于左右大成殿大成門實御筆之親書聖時門𢎞道門更睿思之口授圭瓚俎豆之式新犧牲幣帛之加舊添配祀之羣賢增執事之奔走色瓦頒自尚方御碑摹以重鏤丹楹列乎瓌材采桷揭乎纖繡則其為狀也邈穹嶐以宏壯亘砰磷而窅冥殖殖兮其庭噲噲兮其正宏卓爍以輝赫兮若燭龍蜿蜒而鬇鬡紛攢羅以崴磈兮若巨鼇贔屭而崢嶸斯翼斯棘兮屬閣道之駊騀如松如竹兮衛鉤陳之縱橫倣巖廊而布象準魏闕以為程磢磑既堅知為髙之基下綺疏交映悟立誠之牖明至夫既落既成乃祭乃饗命王子而徂征昭一人之敬仰牲牷肥腯黍稷豐穰衣冠肅恭進退雍容籩豆既旅樽罍斯崇以間兮笙鏞於論兮鼓鐘神既妥兮和冲降多福兮隆隆蓋尊聖之典無以尚統前後而莫有或同者也于是為之歌曰堂皇靈宇天子是新既輪既奂乃㻞乃璘杏壇葱鬱檜幹繽紛宣聖是安佑我後人歷億萬祀丕煥斯文萬夀日慶雲見苗疆賦惟皇清肇三韓而定業鞏盛京以立基既應天而昌運亦撫民而順時世祖白旄黃鉞仁義興師于是乎撫有四海宅燕京而嚮離於皇聖祖作則生知正義育仁以馭世制禮作樂以定規六十一年之湛恩渥澤逮我皇而克享其雍熙丕鑠皇德聖祖是式精神通于神明聲色允其恭默勤政亶乎八年至仁敷乎萬國擊壤者歌何有之帝力含哺者順無為之帝則昊天曰明鑒我皇情何祥勿應有瑞畢呈乃僞謙而自牧更持虛而若盈或歸親而不居或讓美而弗稱斯固一人之大德巍巍蕩蕩而難名者也嵗在上章月惟淵獻帝澤均施皇風普扇坤輿載闢紅苗允致其共球版籍初登六里亦安其服甸乃宣布化誨之初辰實誕降吾皇之聖旦鴨保寨之大吏初臨地良坡之苗民同忭池河營之猺獞咸臻萬榮江之老幼共見異地而王命頒陳同時而卿雲燦爛歸誠之愚民稽首何異華封之祝三宣意之將吏傾心允似嵩髙之呼萬氤氲捧日擘碎錦之千重縹眇麗天幻榮光于萬變為樓為閣拱黃道以旁敷非霧非烟被清風而不散五文絢彩于璇霄十色流虹於碧漢此重譯之來不聞奏于越裳七旬之格不聞歌其糾縵者也况于嘉時正午恰當景命之辰歷未及申允愜綿長之願彼夫升堂于黃帝之時起河于伊耆之代入房于殷湯之宫浮洛于周成之載穆天子之王母為謡漢武帝之泰山紀再或一色而無文或旋聚而忽分豈如歷三時之久當聖夀之辰現新附之地昭歸化之民又何足稱函關紫氣帝鄉白雲哉乃為之歌曰於赫聖治兮格于蒼天嘉瑞聿昭兮于彼苗田格愚孚頑兮王化普宣祝我聖壽兮億萬斯年指佞草賦銅龍曉啓玉漏初傳氤氲曙色縹眇祥烟朝萬國之球璧列百辟之班聫爰有靈苗曰指佞草非時不見實天地之無私應候而生允皇王之有道則見夫峙丹陛而葱菁秀彤墀而縹眇金莖露灑潤貞幹之稜稜玉殿香凝靄斜枝而裊裊無心而應獬冠之觸何殊有佞則知金鏡之洞已早至若元愷登而僉壬化明良慶而庶績熙雖間生于堯代實藏用于明時對右平兮左墄承日照兮風披千官劍珮三殿威儀則屈軼亦呈其瑞而己矣又安得夫邪佞而指之六藝賦居髙齊以逺紹娛情志于典墳藉義府之息游望宫墻其聿新伊六藝之為懿雖宿儒而必親豫下學其何知敢玩愒而不遵矧夫禮緣情以制物樂平情而返初射必先乎正直御必範乎馳驅書貴六文之不忒數窮大衍而有餘于身為終始之伴于道為行邁之輿請為言其美備俾達者其聽諸原夫禮儀三百威儀三千既安上而治民亦緯地而經天其制之也必傳道之聖其行之也必守道之賢郊廟有饗祀之典朝寧有聘㑹之䖍尊尊則衣冠拜舞親親則酬酢蕃駢尊卑賴以等殺進退恃以周旋是蓋禮之大者而其細尤莫能以盡焉粵自軒轅雲門定樂溯原必本于中和相濟必分其清濁以歌則管聲噦噦以舞則鷺羽翯翯五音六律之交宣八風九歌之相續審音兮既換羽而移官吹律兮復度商而揣角入耳兮躁心以釋傾聽兮欲心以平雖宜觀于韶舞必先放乎鄭聲以宣民志以和民情惟樂舞之至正斯風俗其可成若夫敦弓既堅四侯既均可緣此而觀德亦因之而序賔在澤在宫必有一定之制少算多算難紊不易之倫騶虞之節兮天子所用貍首之風兮諸侯是陳慎其所舉取制于中聖王合射以明教男子蓬矢而桑弓在昔宣尼曰執御矣平心正體兮在兹自下奉上兮以此四黃既駕兮總轡分鑣兩驂不倚兮過都越鄙追電兮逐風發豝兮殪兕鄙組舞于東野羡辭乘之王良愛蘧瑗之過闕馳造父于康莊孰謂御為賤役非君子之所方哉至若畫始羲皇字肇蒼頡史載觀于蹄迒易稱代乎繩結百官以治兮宣猷萬民以察兮仰哲逮書契之大明快苞符之盡泄于焉籀斯造乎前驅羲獻繼乎後乘文皇飛白張顛草聖顔栁法嚴蘇黃筆徑雖歷代有作者要悉歸乎心正若乃司天之職推步萬端黃鍾定其分至玉律辨其暑寒既參天而兩地亦稽坤而考乾下至內府外府之嵗㑹郊人廛人之定田無一則何以成十有百則至于纍千參伍而其法備錯綜而其數全豈若商鞅近功始按人而立稅𢎞羊心計算舟車與緡錢蓋所以裕國計敬昊天惟損上而益下乃自古而云然懿兹六藝用藉尋求若行逺兮駕車若溯川兮泛舟嗟不學兮面墻期佩服兮優游庶不忒兮我心用黽勉兮前修日方升賦伊蒼旻之懸象兮煥二曜之重明麗中天以臨照兮終萬古而健行分宵旦之行藏兮仰瑞應于升恆維光華之烜爛兮百昌欣以向榮偉魄淵之繼照兮請仰觀旭日之方升明萬彚其伊始兮符天心之生生方其玉繩罷繫斗杓收指望舒隱曜以西馳啓明藏輝而逺徙覽東方其生白眄海水而煥紫滄溟罷浴駕羲御以遄征火馭載臨邁天衢其自此璇圖不忒兮正羲仲之寅賔玉律無差兮合容成之步晷銀虯渴兮燭龍翔陽烏飛兮曜靈揚出渤澥兮經若木歷暘谷兮拂扶桑瀛海燐燐洗寶輪而皎潔咸池炳炳拱神鏡以汪洋玉衡隱約兮低度瑶華烜赫兮含章照彼鮫宫添輕綃之晃朗射兹龍窟增寶藏之輝煌則見金門初啓玉漏停傳天雞喚兮報曙寶鼎列兮生烟陽侯執轡兮炫彤墀之璀璨后羿揚麾兮催青瑣之班聫雲旗縹眇兮映百川之㑹海霞車陸離兮靄萬國之朝天此出震一人之有慶向離敷治以無偏者也至若六街香霧九陌紅塵曙色方升晉謁之驄駉駉晨光乍爛計偕之車轔轔瞻祥光之錯落覩瑞靄之氤氲此王路馳驅之士鸞翔鵲起而欣欣者也又若幽人曠逸竿甫逾三學士清嚴甎未倍四梳翻雲髻兮曉景透乎香閨經開貝葉兮晨鐘鳴乎古寺舟橫野渡兮驚月落而烏啼獵合平原兮喜黃牽而蒼臂草木向曙以敷榮飛走和鳴而得意此又臨照無私恩光遍及于萬類者也斯時也後天一度而輝燭于大荒出地咫尺而宣耀于無疆夜光無所施其用火齊無可耀其光杖何為兮誇夸父戈何為兮稱魯陽蔀何用兮其豐繩何施兮其長考盈虧兮何與驗中昃兮無妨若太極兮始判而將分如元㑹兮方流而未央又何必紀合璧于伊耆之代舉抱戴于晉帝之堂侈談王字之瑞徒稱五色之光哉客有興寄泰山之嶠神游日觀之峰睹初陽之煒煜攬皓氣之冲融開懷抱暢心胸鄙熊曜琅琊之迹追青蓮登眺之蹤將游心乎太始觀造物之元功水輪賦削竹為管揉木為輪假廣川之利潤代膏雨之洪恩因時制宜奚必資乎匠伯澤民利物乃有待于梓人爾其東作云興西成在望大田多稼或懷旱魃之憂密雲不雨每厪旻天之貺雖抱甕之勤奚為即挈瓶之利亦讓于是轉岸上之飛輪汲江中之巨浪方來旋去詫機軸之周環己納而吐欣洪波之奔放劃如雷鼓之聲翩若飛鳬之狀揚清激濁兮大澤旁通救患分災兮連畦滋暢鄙桔橰之小惠殊轆轤以致功匪疾匪徐兮運旋而不竭突如來如兮灌注而莫窮盈科而進兮施有次第轉轂而輸兮用無始終流洋洋兮比潤甘霖苗薿薿兮同舒律暖垂稻穗兮壠畝勻黃築場圃兮篝車載滿是知輪者木之體既㢲順而有功水者坎之盈亦剛中而有信相資以濟引重之象何殊因物而施救暵之功以迅敬陳澤物之奇勳用備風人之雅訓文戰賦甚矣人之好爭也軒尤鼓怒于凶器羿浞鬭技于霜鋒賁育逞力于舉重般婁恃巧于雕蟲良增騖智于劉項儀秦馳辨于橫從是蓋所居者髙則惡人之我並所操者異則嫉人之我同未有解搆釋紛齊天地于一指和光同塵歸大化之元宗者也吾意文人學士知命樂天謙卑自牧慎重為先其游心于淡也若太羮之味其麗澤相滋也若共濟之船宜其煦煦為儒魚魚為賢不恧我之或後不憎人之或前而孰知所謂文戰者更有甚于前言當其屬詞鋒排筆陳萬夫之雄莫擬六籍之奧並進徹札之鏃必期乎中堅露穎之囊何妨于游刃鶚視而張弛咸宜虎變而雷霆用震于是緗帙繽紛盡作鼓鼙之響絳帷掩映俄興旌斾之思呼十二之龍賔發攄奇䇿揮五千之文字奮迅偏師臨局早分其勝負當場疊用其正奇弟子降心而斂手先生談笑而解圍是蓋厲兵于學海藏甲于文山請纓同弱冠之子投筆似定逺之班硯石如砥兮紀功莫盡霜毫飛白兮露布爰頒齊物子見而笑之曰是蓋以文為戰者夫文以載道而又何戰乎請與子解干戈之擾而歸洪荒之都景陵瑞芝賦蓋聞王者孝慈則芝茂又曰君有至德則芝生仁恩覃敷于率土草木爰叶夫嘉禎考夫瑞應之圖稽乎符命之經未有治功允協乎郅理而祥應不驗于山靈者也欽惟聖皇御世敬天法祖煦嫗之澤比陽春汪濊之恩如膏雨亮工則克諧三事歌敘則允治六府凡溥大化于雍熙悉循聖祖之遺矩上帝是鑒靈瑞斯頻河清海晏之紀麟遊鳳集之文與夫嘉禾甘露之迭見蓋不可以指數陳是皆一人格天之元功而厚澤永逮夫生民者也乃若瑤光發辰象之精金色吐隂陽之秀衍鼎湖兮億載休徵鞏福地兮萬年鴻祐繽紛芝采表聖祖盛德之常新煥爛芝房驗吾皇孝思之孔厚金枝瓊葉浥瑞露于寶城十色九光燦祥霞于仙囿鏤珊瑚而作幹葩蓋髙擎肖龍鳳以呈形卿雲低覆氤氲並日月以爭華蔚靄與松楸而並茂豈與夫生于石室産自珠宮王母之臺虛紀宓妃之館成空秀甘泉之庭而傳誇晉帝産延英之座而稱美唐宗也哉聖聖同揆德惟其至既丕顯而丕承信格天而格地嘉祉效乎百靈景運凝乎二氣謹拜手而揚言賦太平之至瑞春搜賦文武之道一弛一張政以則乎四季令如煥乎三光其禮則備其文則詳雖寓意乎簡卒亦致戒乎禽荒故當春氣之始和行搜禮而如常蓋所以開三面儀萬方豈云魚必殱其鯤鮞獸必索其􅀈羊者哉于斯時也東作未興猶是三農之隙孳尾未接豈妨百獸之生春蠢也爰宣威以象動搜求也乃法古以考成進退疾徐固將明其紀律勾擊搏刺亦莫過乎縱橫藉以整軍豈惟逐獸六軍之節制可觀三畋之儀文斯究安不忘危兮經國之典斯存用而有節兮胞與之仁在宥乃足賓筵用供乾豆此以見國家之大體可以比先王之搜狩不然者茍非黷武即屬從禽于是乎有風人之刺禹甸之針子雲所以賦羽獵相如所以諷上林又豈君人者之以天地之心為心者哉皇清文頴卷首十七欽定四庫全書皇清文頴卷首十八御製文賦書同文賦偉哉書契之盛也麗光天而有耀敷海宇而無垠掌之保氏而肇夫小學觀乎人文而成彼大勳代結繩而為治因載道以稱神洋溢之風普扇光華之治聿新書紀遵道遵路記稱同軌同倫固草野咸欽其法式抑巖廊用布其絲綸繄夫庖犧造書倉頡創字蝌蚪成形魚鳥志瑞原所始作不一其類逮後八體漸分六書遂製或篆隸而殊科或殳戈之異制或偃露湧泉而稱工或離星垂珠以布勢或揭象魏之條或質嵗成之計或遊元圃之麟或折蟾宫之桂莫不依乎典則遵我王章錯綜以盡其術採托以備其詳藻耀乎典冊之府輝煌乎翰墨之場指事象形之中則協聲轉注之允臧潤太平而有色宣文治於重光於是靖萬慮之紛拏布一人之大化金殿春永而閣帖臨餘玉筆龍飛而黃麻草罷欲加㸃而無有詎一畫之可假昭萬里之同風自一人而逮下明廷敷奏曽無馬字之訛在野遵從何有魚書之詐則知聖人有作書文大同自南自北自西自東光如日月之燭遐屆舟車所通布章程於畫一闡治理於鴻濛豈操觚而濡墨者徒工技雕蟲也哉聖德合天地賦聖人膺寶籙握靈圖躋含生於富壽致萬類之昭蘇澤允覃乎九有道克奉乎三無欽明文思帝堯無以踰也溫恭允塞虞舜曷以加乎紀巍巍與蕩蕩信一揆而同符天無不覆地無不載蒼蒼者昭丕冒之宏混混者順發生之大窺博厚而難名測包容而無外是亘古此天地也而誰與為對待哉王者中和位育並立為三規模既同乎幬載對越尤致其精嚴故升中於天而鬼神格告成於地而恩澤覃茂以對時而行無妄卑以自牧而體福謙於是歌一德之允若與二儀而吻合布政則溫如春融育物則量同海納明如日也麗九華以昭宣散如風也紀八節於閶闔然而髙明既被朝夕彌䖍昭事則幾康是飭行健則元㑹永綿小心翼翼是曰法天若夫廣大咸亨品物必遂既柔順而利貞亦履仁而行義安土能敦是曰則地於是乎乾坤合德君師並修海宇仰崇髙之象羣靈樂靜謐之休遍尊親於血氣成參贊之謨謀豈非與清寧而永奠合上下而同流者哉麥秋賦繄鶉火之司令疑商金之屆期影度朱明始散芳於榴圃律侵白帝獨抽穗於麥畦愛芃芃之連纈亦離離之下垂南畝正勤於此日西成偏紀乎兹時披梅風而含顆潤榖雨而雙岐是蓋四時之代序而萬物各遂其繁滋者也乃其隄上鶯啼隴間雉雊芳草未歇而猶菲緑樹成隂而始就何銍艾之奄觀兮當隆曦之永晝覩黃雲之滿野兮驚白藏之應候溽寒露而朝濡兮潛隂吕而夕秀雜收斂於長養兮參結實於紛茂炎炎當令碩碩成行紫莖兮韞爽青穗兮含凉大有占而豐登肇象兮中和順而隴畝飛香對銀縚而偶穗兮散珠顆而分芒豈非化工之獨運而為盛世之嘉祥也哉學問至芻蕘賦原夫泰岱之髙不讓土壤而尊五嶽河海之廣不擇細流而納百川載萬物而不盈者曰地覆羣有而不居者唯天是以有大而能謙必豫見善而能遷始賢固至理之如此豈入道而不然蓋自先民有言詢于芻蕘既下問之不恥乃大德之孔昭野無遺才英俊彈冠夫廊廟政皆丕應庶人罷議於市朝固己五風順十雨調集濟濟之多士覩師師於百僚然而謙謙君子延訪不遺夫草莽穆穆元后諏咨乃逮夫薪樵是以禹下昌言之拜湯勤有莘之招髙宗恭默而得左右於巖野周公勤思而傳吐握於崇朝凡其守謙以受益用是居上而不驕爾乃設鐸設鞀而蒿萊亦及爰咨爰度而草澤無餘道至廣也豈必備乎垂衣之主心之虛也乃旁求於戴笠之夫邇言不棄良材必選大度於是乎彰隆業因此而顯戒損用以持盈得師期乎主善此聖王樂取之誠心而非徒規倣乎先民之舊典五六天地之中合賦以敬授民時聖人所先為韻繄鴻濛之坱圠兮肇兩儀而互應昭法象之崇卑兮紛萬物其繁盛羌孰體夫天心兮伊誰契乎地柄揭造化之元樞兮示羣生以金鏡粵若宓羲畫卦而知一元之廣運亦越周文繫彖而明三才之有正於焉定嵗序乎星辰總以握綱維於祗敬爾其渾淪初分經緯斯究奇全偶半地天恰配乎朔南兼兩函三剛柔各居其左右積五位以相乘合六爻而互就置閏則道在歸奇積策則法惟用九載在周禮屬大卜之攸同稽乃虞書實羲和之所授孰云一三二四之當前與夫七九八十之應後此蓋隂陽定位其運乃神至聖觀象用以前民來復而知履端於子交泰而識建統於寅覘氣候於十有二月驗嵗差於三百六旬彼夫土圭銅渾之是製保章馮相之所陳或北陸而成嵗或東嵎以紀春豈能外大衍之名數總萬有之紛綸若乃衍母衍子各殊其用大餘小餘不紊其時雖月窟天根眇忽難窮其象罔而乾維坤絡翕闢自著其端倪天五得其中也地六從而合之五挈陽樞五五二十五數而不忒六維隂紐六六三十六宫而咸宜於以協大中之運於以定保合之規乃其變化相尋權輿斯定天數六為用而五為體倍其五兮天干盈地數五為君而六為臣重其六兮地支竟氣降為味兮聿觀大化之所由敷民受以生兮乃識萬彚之所從孕圖呈龍馬兮妙用協造化之奇象著龜書兮至瑞應憲天之聖辨方辨卦定至定分六甲為日五子維辰十一而道畢六十而數均極其數兮遂定天下之象通其變兮遂成天地之文陽奇隂偶兮合而言之曰易天圓地方兮中而處者惟人兹五六之迭乘兮實形生之槖籥惟中合之妙搆兮顯天地之絪緼於是順布五行修和六府言乎理兮健順統㑹乎苞符言乎器兮權度不差夫絫黍用布令於提陬遂紀元於章蔀占鳥火虛昴而定嵗功乘震兌坎離以致時序豈其事事而為之則物物而為之所哉重曰居寰中以御極兮道在節宣察璣衡以齊政兮聖人我先愧參贊之靡易兮凛若氷淵顧民事之綦重兮時罔或愆敷五典與六職兮取法自然期無逸以勤恤兮欽若昊天恭祝聖母皇太后萬壽無疆賦有序伏聞纍洽重熙光啓壽昌之運垂恩儲祉慶延慈訓之隆惟懿德在躬以至仁為茂育斯降年有永自諸福之駢臻我聖母崇慶慈宣皇太后化協乾樞恩周坤絡興媯佐嚳申錫久而長發其祥明德宣仁垂裕深而並受其福兹值仲冬之月欣逢萬夀之期禹甸春回堯封慶洽集衣冠於萬國率拜舞於千官共稱北斗之觴竊擬南山之頌謹拜手稽首而獻賦曰惟坤德之無疆乃自天而凝命既體順以承乾遹鍾祥而衍慶王母受介福逺垂羲易之文京室紀徽音載詠周詩之盛禮崇尊養㑹下國之共球律轉陽和運中天之璣鏡桃熟三千之候愛日舒長山呼萬嵗之聲慈雲髙映占南極之光華奉東朝之溫凊擁佳氣於蓬萊共欽瞻於慈聖徽號極域中之尊至仁為天下之母配天而䖍奉三無應地則含𢎞九有永彌性以優游介繁禧而昌後竊欣膝下之承歡就養無方於左右黃裳中正開長信而禮洽宫庭彤幄輝光出甘泉而瑞盈郊棷挹天酒以潤芳萱回鳳輦而縈宫栁臨華渚以逍遙邁斗維之悠久於時律中黃鍾日臨婺女驗添線於金針候吹葭於玉吕恭逢誕聖之辰正協履長之序聲傳絳幘尚衣初進雲裘光映朱霞列樹猶然彩炬引璇宫之法駕盛儀衛於鉤陳振丹陛之元音應鏗鏘於鍾虡雲開扇影瞻寶座而奏瑤箋香裊爐烟啓芳筵而斟桂醑躬舞蹈以奉觴循玉除而容與歡騰薄海慶溢敷天曠代之苞符輻輳殊方之寶賮駢闐九葉金芝吐榮華於天秀萬年玉冊銘琬琰以神鐫雲綃呈織女之機七襄錦麗寶鬘綴仙人之珥四寸珠圓饌龍根而待御擘麟脯以烹鮮紫府之瓊漿若醴華封之碧萬如船盡入充庭之貢並登介壽之筵若乃車書南北尉候西東競厠身於朝列隨稽拜於臣工共晉九如之祝羣欽萬福之同聽仙韶之應節覘瑞靄之浮空鳳舞鸞歌奏鈞天而陳廣樂雲蒸霞蔚揖金母而拜木公花滿瑤池之上籌添海屋之中信上元之資福綿景祚於無窮臣祗奉母儀儼同天覆幸當清晏之期喜值文明之晝遊觀上苑效扶侍於鑾輿瞻望春暉煥斑斕於舞袖天開有道之祥星紀長庚之宿仰純嘏之緝熙兮荷貽謀之孔厚愧頌揚而莫罄兮願福祿之永茂自今以始兮八千春長祝慈幃兮無量壽建福宫賦居寰中以御物凛天命兮難諶懼大業之弗勝恆乾惕兮小心戒峻宇與雕牆鑒酒池兮肉林愧饑溺其未解遑安逸兮是尋乃者新宫落初玉戺金鋪創名建福義何居乎蓋是地也圍於宫牆而弗加擴卑於路寢而弗增華畏炎歊之相逼乃託興於清嘉儉不至陋幽而匪遐况在重華之右重華宫朕舊居也在新宫之左比之興慶之宫未費司農之帑何勞庶民之攻經之營之募千夫而齊力如松如竹閲數月而成功於是殿方馺娑宫比駘蕩長春長樂披青簡而空傳太和保和憑朱欄而相望千門萬户兮想漢制之太奢茅茨土階兮欽堯儉之堪尚軒號靜怡兮期成性之常存齊名敬勝兮恐舉念之或妄亭顔惠風兮欲膏澤之旁敷閣扁延春兮與羣生而咸暢觸目警心兮守此志而始終居安思危兮常厪懷而籌量爾其文石矗立嘉木叢生羅芝田兮蕙畹來燕賀兮鶯鳴披薰風兮思解愠對時雨兮樂向榮觀太宇兮調元化育萬物兮驗農耕又何必焚隋廷之甲煎樹漢苑之金莖歌陳宫之玉樹聽唐曲之新聲而始稱悅情也哉於時而春覽生意而欣欣於時而夏逺煩暑而灑灑乃其秋也偉西成之可慶乃其冬也體貞元之凝命載色載笑奉慈闈而承歡來游來歌與艮臣而交警於以承先厪肯構而勿忘於以示後庶斯言之是聽重曰洪範有言斂時五福敷錫庶民與時茂育豫宅是居心乎肅肅受天之祜匪藉田燭建民之極匪侈華屋繼繩光烈對越於穆進賢納諫懲惡旌淑志茍懷安是謂不榖尚慎旃哉永膺天祿盛京賦有序嘗聞以父母之心為心者天下無不友之兄弟以祖宗之心為心者天下無不睦之族人以天地之心為心者天下無不愛之民物斯言也人盡宜勉而所繫於為人君者尤重然三語之中又惟以祖宗之心為心居其要焉蓋以祖宗之心為心則必思開創之維艱知守成之不易兢兢業業畏天愛人於是刑兄弟而御家邦斯以父母之心為心也民同胞而物吾與斯以天地之心為心也孔子曰明乎郊社之禮禘嘗之義治國其如示諸掌乎宗廟禘嘗之典固先王繼志述事之大經也然自聖人象大過肇封樹以來上陵之制漢代己然我國家肇興盛京邠岐之地橋山在焉昔皇祖六十一年之間三謁丹陵用展孝敬皇考在位百度維新日不暇給適西鄙有事徴役己勞又藩邸時曽奉皇祖命往謁祖陵是以十有三年中未舉是典豫小子纘承丕基懼德弗嗣深惟祖宗締搆之勤日有孜孜敬奉神器言念盛京為天作之基永陵福陵昭陵巍然在望不躬親祀事其奚以攄慤忱而示來許爰以乾隆癸亥秋恭奉皇太后發軔京師屆我陪都孝思以申祖武是仰因周覽山川之渾厚民物之朴淳榖土之沃肥百昌之繁廡洵乎天府之國興王之㑹也昔豳居相度召頌公劉岐宅作屏周歌太王莫不於上帝之監觀下民之君宗三致意焉故物以賦顯事以頌宣既見於斯豈默於言乎遂作賦曰歲大淵獻時旦栁中協律無射辨方庚辛歷吉日以建旗駕應龍之和鸞紛灕呼蕤蜿蜒旌雄虹橦鳴鳶周乎神臯之壤屆乎箕尾之躔循我留都殺禋珠丘懷精氣仰德流既備既申乃御黼座而覲臣寮維締造之彌艱撫草創之鴻圖曰於休哉是蓋突載亳之子殷躐宅鎬之姬周憑虛致譏於東約安處薦誚於西踰下此離為十二之國合為六七之侯鼎立瓜分者益瑣纎旁魄不足以殫攄而孟堅平子太冲者倫方且豔陳崤函隴坻之隘鹽池墨井之腴枍詣天梁之麗三條五劇之區極鋪張以詭辨彼何辭乃稱諸奚侔夫天作之皇宅又何藉萇𢎞與魏舒於是咨文獻考圖冊不恧不文爰賦其略聚精搆思挂一漏百粵我清初肇長白山扶輿所鍾不顯不靈周八十里潭曰闥門鴨緑混同愛滹三江出焉帝女天妹朱果是吞爰生聖子帝用錫以姓曰覺羅而徽其稱曰愛新是剪是除匪安匪康乃有葉赫輝發界藩撫順遂築城於遼陽以為東國之宗天篤其祜載恢厥功天命十年相險宅中謂瀋陽為王氣所聚乃建盛京而俯關西故言其封域則雖始自秦漢歷隋唐以迄遼金歟而舉其規模則維新皇運膺靈佑之獨深也仰符十度之尾實臨析木之津得雲漢之所垂維北極之所鄰亦何異乎召伯相宅卜惟洛食奉春建策留侯演成哉於是乎左挾朝鮮右據山海北屏白山南帶遼水滄溟為池澎湃㵽偎流湯湯赴瀰瀰撇􅪋訇回渾渼浴日沃星莫測其始東盡使犬之部朔連牧羊之鄙啓我漠惠之原擴我俄朵之址髙燥埤溼原田每每走大野而拱太室者萬有餘里其山則鐵嶺繡嶺平頂降龍木查石門東水南雙矗嵑􅙙聚嵏􅀈兮屴崱嵌兮􅭆峒􅀢兮嵃嵂兮嵣嵡蔽虧日月源流湖江既孕奇而盤鬱亦含秀而隆崇故夫四蹄雙羽之族長林豐草之衆無不博産乎其中蹄類則虎豹熊羆野馬野騾鹿麞麅麅狼豺封駝狐貍貛貉跳婆娑蚡鼯艾虎貂鼠輕嘉其他牛馬羊豕之資以日用者蓋填閭巷而蒸寢訛羽類則野雞沙雞鵝鴨青􅝄鸛鶴禿鶖維鵜在梁縮脖鳩燕啄木鵲鶬鷹鷂鵰鶻紅牙商倉黃鵪鼠化白鴈霜橫曰海東青出黑龍江林擊則天鵝褫魄甸搏則窟走僵其他鴿雀銅嘴桃蟲鴛鴦雜㳫紛泊騰軼翶翔其草則蒿艾香蒲蘆葦蕭荻章茅水葱紅藍綬虉馬藺知時木槿紀節厥惟人參三丫五葉氣禀地靈功符隂隲商陸茵蔯萹蓄葶藶蠡實絲均能巳疾其林則五針之松萬年之柏重障隱天幽林蔽澤挺崇槐之曽青䕃櫃栁之濃碧大椿以八千為春壽櫟以不材為德爛紅杏與緋桃紛白棟與黃蘗山藤柔韌是資鞭䇿雞桑落黃可供蠶織陸珍既牣海錯亦繁鯉魴鱒鱖鯼鯽鱅鰱鰷鯝鱧鱤鮠鰌鮎鱓比目分合重唇浮湛劍飾鮫翅栁炙細鱗牛魚之長丈計帶魚之白韋編烏鰂之鬚粘石渡父之喙矴船他如䖳馬驢狗豚獺豹貛出沒乎洶涌潛躍乎游淵蒼龍揵鬐而雲作赤螭掉尾而波開老蚌含珠九光燭天神奇是韞瓌瑰是生雖山經與地志羌莫得而詳焉懿兹奧區原隰畇畇厥田上中厥壤惟平抱海負蓋跨遼欱宣渾河為帶興京為襟袤復陸而坦坦黋拓落而藝藝偉嘉禎之萃薈信槖籥之絪緼帝眷東顧用畀皇清而為萬載之沛豐若其測圭臬度廣輪依繩尺疏渠川歌經始詠攸寧又可略聞矣天命天聰丕顯丕繼因其舊瀋拓我新制規天矩地嚮明授時增八門之詄蕩脅九逵之邐迤翼翼俾倪岧岧堞雉起圜丘於郊南單埢垣之潔祕欽柴揚槱陳玉薦幣鼓雲和升繭栗以邀肸蠁而昭祀事霜露在履春秋聿遷愾乎僾乎肇禋閟宫滌濯毛炮元酒太羮文祖神宗爰歆於斯符帝車之太乙正王宫於未央重三殿之實枚表雙闕於闔閶闕名維何文德武功殿名維何崇政建中髙樓望氛厥題鳳凰後宫紫極交泰清寧關雎麟趾化洽家邦維朴而安乃鞏而臧豈其工㮰檻之刻鏤豈其飾榱橑之焜煌豈其疏龍首之嵔嶪豈其叛鳳翼之昂藏匪有心於儉約乃潛揆夫陶唐大政當陽十亭雁行爰諏爰度日贊日襄吉君臣之一德而擴我闥於八荒正號紀元以受天慶於是定兩翼之位列八旗之方黃白紅藍有正有鑲法其象於河鼓則其數於羲經神其變於三五握其奇於九宫大聖創制動協天象是猶易之書契乃觀蹄迒焉樹以屏翰馭輕居重本支百世昌我宗潢佐命之勳曰費英東額都希福績茂蕭張曰有坐謀曰有折衝既彬彬而濟濟亦赳赳而彭彭其餘附鳳而攀龍者蓋車載與斗量爰制國書聿興文教演義譯音物取其肖允維大海克稱檢校雖絶域其必通即纎故其亦貌若夫人自為戰王者無敵角嚴則百墉失憑旌揮則三邉定檄義不返顧勇不重壁是以敉四海而莫攖亘千古而鮮匹故班録於纍世用以酬夫勞績及其斗杓北指涉冬背秋爰狩中原我戎是修靡虹采裊霓斿拖霧纛建雲旗後屬車前導游乘我良産屏彼雕輈右忘歸之箭徑左繁弱之弓柔倩浰而雷動鴻絧而星流又何必王良執轡纎阿御軥也哉於是帶甲之士百萬盡發鷹犬而驟驊驑卑泰山之為櫓跨渤海以張罘林林裔裔列列裒裒命地而後中應聲而先掊散壄麋之羣友剔穴狸之伏留駭巘麢之儦俟讋郊之佻偷既肩惰指倦而麌麌之羣猶緣陵蔽野比夏草之稠焉爰用三驅示無盡劉更命羽林佽飛之士手豹尾踞虎頭搏洞熊殱澤䝏觀壯夫之鶴躍快猛獸之貙膢乃獻我成禽舍彼踐毛擇其上殺允惟左膘以奉宗廟乾豆亨炮次充賔客乃薦君庖班獲行賞訖乎輿僚是蓋因天地之利習軍旅之勞戰則克而祭受福古者搜苗獮狩之禮所為昭詎其害三時之土榖奪百姓之腴膏蹂桑柘之地廣虞獵之郊如子虛上林之所嘲也哉將將蕃后夔夔列君奉贄來朝齊遫侍宸或稽首而請聘或傾心而納姻於是樂以九奏饗以八珍邁呼韓之朝天踰頡利之舞庭合內外為一家自我祖而巳然坰牧之宜曰大凌河亘肥壤之博衍茁靈草之敷披夏蚊避境春泉漾波是以駉駉之牡蕃孳孔多爾其驪驈騅駓騂騏駱驒騮馰驔騧馯䭵駰騢或眠而馾或行而􅀈惟致逺之有賴亦揚威之無過畿甸既闢農桑是咨爰飭田畯爰勵甸師物早晚之種辨髙下之宜男則耕耘是務女則織絍是謀抑工賈之末業勤衣食之本圖故深耕易耨榖用滋也九夏三耘免汙菜也雨我公田遂及私也庤我錢鎛銍艾時也我簋斯盛實佳粢也我倉如陵庾如坻也服尚布棉奚纎美也器用陶匏戒奢靡也土物是愛神降嘉生黍維秬秠稻維糯粳粟維穈芑粱維赤黃解蠡胡麻來牟鈴鐺蘇分紫赤豆有豌豇蔬則蕓薹薤蒜蘿蔔韭蔥蔞蒿蒲筍紫莖茴香壺盧蔓菁萵苣葵䕬鮮不斾斾穟穟唪唪幪幪驛驛厭厭綿綿穰穰惟脈土之獨純斯穡事之孔良農隙教戰守禦相望國以殷富兵以盛彊鬱葱佳氣盤礴無垠民風噩噩伾侁自然休有烈光格于皇天上帝其子之維有歷年是以我世祖因人心之歸清順天意之厭明掃驅除之閏位統子弟之精兵無亡矢遺鏃之費而膺圖正位乎燕京蓋嘗考千古之興替稽百代之歷數拒符瑞之難諶信仁義之堪守斥逐鹿之蠱說審神器之有授乃知帝命不時眷清孔厚也不有開之何以培之不有作之何以得之夫其披荆棘冒氛霾歷艱辛躬利害無嬗代之迹而受車書之來者蓋書所謂于湯有光詩所謂民之攸歸矣皇矣陪都實惟帝鄉乃命秉鉞之帥乃置五部之卿民安郡縣旗樂屯莊春秋耕斂我倉我箱朝㑹朔望躋躋蹡蹡昭萬年之有道卜百世之靈長乃作頌曰於鑠盛京維瀋之陽大山廣川作觀萬方虎踞龍蟠紫縣浩穰爰浚周池爰築長墉法天則地陽耀隂藏貨别隧分旗亭五重神基崇峻帝系綿昌周曰邠岐漢惟豐沛白水慶善興王之㑹長白隆隆滄溟濊濊形勝之選奕世永賴俯臨區夏襟控中外休養百年既豐而泰溯其始謀繼序敢懈昔我聖祖三至斯土棽麗六飛森沉萬旅孔碩九重不遑安處祗謁山陵亦臨朝寧置酒故宫用酬父老乃霈恩施逮乎編户匪勤於巡良慕乎古閔豫弗德實纘丕基嵗時太廟陟降格思緬仰鼎湖惟瞻惟依荷天之龍際時之和駕言徂東絡繹羽儀風舉雲搖鱗萃魚麗我賔我臣我行是隨載至神鄉載覲園寢靈鬱崇輝祥凝巨瀋原廟衣冠霸陵食枕松柏雲縵溪池流淰蕩滌洪爐陶甄羣品石馬悲風淚泉沾袵豈必羮牆一氣是禀聿造故宫故宫赫赫聿升太階太階奕奕無彩之飾惟厚之積皓曜䨲照歙赩烏赤左墄右平坤闔乾闢土壁葛燈遐哉儉德詒我孫謀萬年之宅乃開南端設席肆筵爰爵周親及彼鴛鸞南陽故舊灑如言言惟此嘉師列祖之臣是噢是咻是貽我躬敬之敬之翼翼惴惴於億萬嵗皇圖永綿皇清文頴卷首十八欽定四庫全書皇清文頴卷首十九御製詩樂府倣雲漢詩體敬製雩祭樂章以申誠懇八章瞻彼朱鳥爰居實沉協紀辨律羽蟲徵音萬物藝生有壬有林有事南郊陟降維欽瞻仰昊天生物為心一章維國有本匪民伊何維民有天匪食則那螻蟈鳴矣平秩南訛我祀敢後我樂維和鼉鼓淵淵童舞娑娑二章自古在昔春郊夏雩曰惟龍見田燭朝趨盛禮既陳神留以愈雷師闐闐飛廉衙衙曰時雨暘利我新畬三章於穆穹宇在郊之南對越嚴恭上帝是臨繭栗量幣用將悃忱惴惴我躬肅肅我心六事自責仰彼桑林四章權輿粒食實維后稷百王承之永奠邦極惟豫小子臨民無德敢懈祈年潔衷翼翼命彼秩宗古禮是式五章古禮是式值兹吉辰玉磬金鐘大羮維醇元衣八列舞羽繽紛既侑上帝亦右從神尚鑒我衷錫我康年六章惟天可感曰惟誠格惟農可稔曰惟力作恃天慢人弗刈弗穫尚勤農哉服田孔樂咨爾保介庤乃錢鏄七章我禮既畢我誠已將風馬電車旋駕九閶山川出雲為霖澤滂雨公及私興鋤利氓億萬斯年農夫之慶八章乾隆八年秋朕奉皇太后恭謁祖陵還至盛京受朝錫宴夫漢髙過沛而歌大風情至斯動直已陳德况豫小子覲揚光烈能無言之不足而長言之哉爰作世德舞辭十章章八句粵昔造清匪人伊天天女降思長白闥門叶是生我祖我弗敢名叶乃繼乃承逮我元孫叶一章元孫纍葉維祖之思我西云來我心東依歷兹故土仰溯始謀叶皇澗過澗締此丕基二章於赫太祖肇命興京哈達輝發數渝厥盟如龍田見有虎風生戎甲十三王業以興三章爰度爰遷拓此瀋陽方城周池太室明堂不寧不靈匪居匪康事異放桀何心底商四章丕承太宗允揚前烈倬彼松山眀戈耀雪以寡敵衆杵漂流血惜無故老為余詳說五章余來故邦瞻仰橋山慰我追思夢寐之間崇政清寧載啓南軒華而不侈鞏哉孔安六章維我祖宗欽天敬神執豕酌匏咸秩無文帷幔再張樽俎重陳弗渝弗替遵我先民七章先民宅茲載色載笑今我來思聖日俯照爵我周親藎臣竝召亦有嘉賓歡言同樂叶八章懿兹東土允惟天府土厚水深周原膴膴南陽父老於是道古有登其歌有升其舞九章我歌既奏我舞亦陳故家遺俗曷敢弗因渾灝淳休被于無垠勿替引之告我後人十章雉將雛行行麥壠邊見一雉將雛雛兒才長成啞啞學母呼一解翅軟未解飛嘴嫩未能食飲啄與遊翔皆賴顧復力二解兒兮依其母母兮愛其兒一朝羽翼全那料南北飛三解有童持長竿捕雛何遽遽老雉雖善飛繞匝不忍去四鮮雛兒頗有智藏伏荆棘間棘密難探取頑童悵空還五解須臾童去逺老雉還來視母子得全活鼓翼心倍喜六解爾童一何忍爾雉一何慈孰謂天良心人禽乃倒之七解觀物可會心撫古常自鏡今朝忽見此大愧中牟令八解夜夜曲明月照我室清風拂我牀我思在何所伊人水一方清風拂我牀明月照我室肯尋長夜歡支枕誦無逸無逸支枕誦展轉念民依孰饑兮缺食孰寒兮鮮衣饑寒切中人何事不可有頽風日以滋吁嗟誰之咎君子有所思行六章君子有所思所思悠且遐叶休哉渾噩風軒轅一夢餘嗚呼斯世兮何日成華胥君子有所思所思閭閻間耕九而餘三有備乃無患嗚呼斯民兮安得免饑寒君子有所思所思久以長猗歟至治世殷序周有庠嗚呼斯道兮何以被黎氓叶君子有所思所思惄未已宛然水一方蒹葭徒采采叶嗚呼斯人兮孰共緇衣美君子有所思所思秋復春望道而未見簡編良具陳嗚呼斯後兮何以淑其身君子有所思所思切衷獨羲經居玩辭曰旡往不復嗚呼斯義兮保泰責誰屬四言古詩冬至有事於南郊敬成八章章八句於昭天鑒眷於有德佑我太祖東土是式帝命不顯皇清不靈明德惟馨以畀萬邦其一赫赫太祖天篤其祜穆穆太宗丕顯丕承駿德光昭爰受鴻名建國紀元肇定大清其二暨我世祖混一區夏聖祖紹之容民厚下民安於耕物適於野六十一年惟天降嘏其三皇考翼翼思為君難立綱陳紀祗承克艱授位渺躬受命自天敬念紹庭敢忘寅䖍其四日惟長至爰卜南郊三齊五戒將事吉朝式瞻百辟玉佩金貂式䖍爾心無或逍遙其五爰升燔柴燔柴惟烈爰陳俎豆俎豆維潔惟豫小子敬捧蒼璧明明帝神尚其來格其六神之格思降福穰穰敢曰豫小子誠通昊蒼自我祖宗受嘏惟純景命綿綿逮我後人其七伐鼓淵淵建斾翩翩祀事用成福祿來駢匪以祭而專匪以燕而遷對越昊天豈敢間兮乾乾其八萬竿烟雨有猗者竹在彼渭川乃含宿雨乃帶朝烟其色維何非媸非妍其音維何非管非絃有客坐對羌民之先其屋何有四壁蕭然其手何持道德一編逸民也歟吾何得而致焉五言古詩古風四首泰山不讓土河海不擇流為學亦如此取益在廣求見惡當自戒見善期自修三人有吾師近取乃日休孟山何岧嶤有獸曰騶虞賦性本仁慈舉趾惜蘼蕪終為王者瑞見乃盛世符南山有猛虎食肉如食芻饞嗜飽腹腸何論有無辜一朝獵者至咄嗟喪其軀仁殘天道顯視此何所殊郭公解布榖王孫能促織區區禽與蟲因時亦有識人生性本靈充然備五德私利一薰蒸靈臺因窒塞譬彼瑶臺月忽被蟾蜍蝕克已萬理明處事乃不惑春風二三月花嶼爭芬芳出門踏青人車馬沸如狂芳甸布綺席繡陌遺琳琅幽蘭在空谷詎肯生道旁地僻人莫賞誰識王者香我來採盈把歸植讀書堂同遊不同趣對爾聊徜徉讀西山先生大學衍義晴忩披典墳望古興遐想眷惟希元翁體道粹涵養著有衍義書妙藴資尋倣大含亦細入渟泓包萬象孔曾緒不墜千載揭昭朗讀書思其人髙山欣景仰冬夜偶作三首天寒鴉歸早月上人語靜融融地爐暖紙窗散清影白日雖苦短迢遙愛夜永敲句和殘更惕然發深省簾幕重重下獸炭旋旋然猶恐寒侵肌向火爭趨前懸知玉關外雪積層冰堅出征衆軍士皸瘃實可憐况當嵗云暮家室情更牽所恃雨露厚兼賴主帥賢凱旋應指日永不戍窮邊梅月忩外橫漏滴響未了心閒吟思生境靜俗情掃每從物理中略識清心道撥火且烹茶一杯供軟飽催耕鳥條風天宇布百昌欣韶熙村原趣已佳緑水明千畦秉耒耕南畝提壺餉東菑郭公何丁寧催耕田畔啼髙棲嫩栁梢低喚柔桑枝分明為一言東作當及時田老閒之喜胼胝非所辭田婦聞之喜饋饁職所司但願嵗豐穰辛苦甘共之幾度聞此聲蚤起竭力為那似香閨中驚眠翻怪伊相馬吟知人固非易知己良獨難譬彼駕鹽車太行阻且岏惜哉騏驥良徒共駑駘餐一朝遇伯樂三鳴感多端秣甘飲清水飾之錦繡鞍西極崑崙墟東窮渤海漫追風四蹄輕飄飄如羽翰聊藉酬知音不顧汗血殫伯樂不世出騏驥空自殘誰憐伏櫪者執䇿一長嘆灌麥大麥五寸長小麥三寸半地乾苗欲枯離披壠畝畔猶幸灌溉便近傍河之岸清晨課僮僕轆轤轉雙腕初看土濕濕漸覺流漫漫頒臾苗盡起生意良可玩爾僕聽我言莫怨體流汗不見萬頃田農夫遍澆灌讀范文正公神道碑用宋陳傅良原詠韻入夏南風薰花木圍我廬我廬何所有插架古人書希文古大臣不與伊葛殊特逹圭璋器心跡天日如今讀神道碑更識為名儒中庸賴公顯程朱繼其餘廟堂而江湖憂樂與民俱天章十條陳忠懇豈區區仁宗稱賢主郅理亦可期參政僅九月不及大有為徒令范老子聲名播荒陲古風七首堯舜傳心學危微十六字禹湯繼其傳執中與禮義文王躬亹亹不已功常粹唐虞三代初大道中天麗比屋皆可封無煩别義利詩亡春秋作風薄俗亦僞惟時王道衰人人騁私智天生我仲尼金聲振洙泗刪詩定禮樂堯舜功不啻一自泰山頽彌天布妖彗楊墨逞邪說申韓建私議鄒嶧乃揚徽奮然闢險詖戰國逮嬴秦道蝕斯文墜祖龍輕狂兒輒敢燔典志劉季提三尺儒風豈云熾武帝始求賢董子明正誼三䇿醇乎醇天人理咸備昌黎稱聞道猶未嚌其胾自漢迄宋初道昏人如醉偉哉無極翁粹然秉道氣學不由師傳理已臻極致二程實見知主敬標赤幟朱子集其成經天復行地緬維千載心授受本同契絶續遞相衍斯文統緒寄午運數恰中自協唐虞治作君兼作師吉士踵相繼巢由避堯舜遁世心自安嚴光繼其蹤隱約富春灘光武曲成之髙節難躋攀東漢尚名義廉立懦與頑奸雄且顧忌千古一釣竿中天秋月皎四野秋風生庭梧一葉落隂蟲相和鳴鴻鴈橫逺塞音響一何清蟬嘒忽已寂又催刀尺聲物理皆如此隨時有枯榮東海有瀛洲仙人居其間安期羡門子九轉成金丹自謂得長生飛升如羽翰倫物茍遺棄孤生亦何歡濂溪惟愛蓮淵明惟愛菊吾於羣卉中特愛渭川竹嚴冬草木枯依然挺青緑扶疏繞屋栽朔風鳴寒玉直哉君子節所守貞且篤秦王失其鹿英雄爭逐之沛公入關中三章法令施偉哉蕭相國䇿力咸會時鴻門宴諸侯端坐衮冕垂一增不能用勇力徒爾為矧乃恣殘暴衆志均乖離用賢兼愛民斯為王道基淵明既歸田門前種五栁心與世俗隔讀書快飲酒惟結山水緣那復戀五斗微意殊可風亮節不掛口過曲澗花香遊流杯亭日知閣諸勝西苑曠且奧肇自明代作瓊華萬玉堆太液千夫鑿平地起蓬瀛城市而林壑松篁幾百年參天秀崕崿秋深鴻雁鳴春暖桃李灼世廟求神仙林亭更開拓方士朝扶鸞虛皇夜飛鶴丞相冠蓮花將軍赤符縳雞犬倐已升殿宇還如昨盛朝建邦畿舊制因城郭何獨廢西苑姑亦存其略髙居非昔比偶幸行宮若雍正二年夏承恩開講幕避暑供游息勝迹頻探索湛湛芳草青潑潑遊魚躍蔥蔥梧桐枝爛爛蓮花蕚或宴水雲榭佳景開芳酌或賦迎薰亭妙句隨興落師友得從容昆弟善笑謔是秋獵塞北竒峯峭天削回思此間山宛似日出爝因緣不復至撫景懷佳約時過玉蝀橋波光含漠漠烟際辨樓臺松竹紛竽籥彈指十年間何異風鳴鐸前日重來遊未能窮其樂遙矚淑清苑凍岸不可泊今朝好風景遲日中天爚步自瀛臺橋踏冰行蹻蹻乾蘆尋曲徑虛殿開金鑰穿雲洞户深步石川梁迮乃知洞裡天自與尋常各冬深景寂寞翠剩琅玕籜閒坐流杯亭更登日知閣會心濠濮間呼朋嗒然噱其北乃假山巉巖何磊硌攀援徑絶處深澗戲騰踔時我徑過之我童猶畏却其上掛瀑布結搆儼廬霍飛沫雜氷流玉牙排齗㗁其池乃不凍疑有馮夷托當年觀魚亭塵土生珠箔歸鞍適然返聊爾何住著我聞山水緣好者不為惡何必買山錢底須蠟芒屩前居水中萍茲遊林裡雀異日得清暇還教度略彴海子外行圍朝霧斂秋空遙天白如水獵騎出郭門寒郊行邐迤箭逐雙鵰飛鷹伺羣雉起相逢倚杖翁農話斜陽裏悠揚墟里烟淡掛疏林紫歸鞍拂晚風獵罷心猶喜茅檐曉曝烏啼霜月落朝旭才三竿寂寂寒村景參差入遐觀茅檐晴趣佳野老方負暄那知嚴風凄但覺愛日溫是時罷三農繞膝圍童孫快哉黃棉襖普被無卑尊熙熙太和世大哉天地恩至樂矜新得擬欲獻金門冬夜偶作四首風簾送竹音月窗散梅影稍喜萬幾暇敲句寒更永棲鴉寂不鳴漏滴銀壺靜遙想謀利人夜半喧市井設非為衣食肯冒清霜冷饑溺聖人心撫躬常三省曩吾詩興豪即景抒清思非云誇别裁藉以道已意茲偶拂吟箋捉筆聊且置豈嫌推敲苦為恐雜心志吾志在何所望道猶慚未曾聞聖賢語躬行實匪易盆卉吐芳葩氣轉陽和新匼匝屏風開嶙峋獸炭焚縷縷篆文斜一室藹如春却憶閭閻間比户窶且貧龍堆雖罷戰尚有長戍人譬彼嬰兒啼父母寧忍聞念此展轉愁丙夜憂思頻昔愛冬夜長隨意消清福今苦冬日短剪檠批奏牘稍暇兀然坐詩興亦局速豈無玩好資足娛耳與目開編對聖賢祗覺增慙恧暮春圎明園即景二首夜來膏雨足曉起倚前楹芳園景已佳百卉爭鮮榮迷離栁絲重間關鳥和鳴逺峯螺髻翠新漲鏡面平依依陌上花向人如有情維我值幾暇裁詩聊品評品評何所樂所樂足春耕心閒境自幽樹老園更古况復近西山雲氣時吞吐結茅為屋宇欲識農家苦俯仰覺安和何必誇瑶圃時巡近郊見西成有象喜而賦此緬懷春之暮彼蒼有旱意憂心惄如焚中夜望天賜賑恤發太倉綢繆無不備賦彼雲漢詩展轉詎能寐好生天之心一雨蘇萬類苗者日以秀秀者日以穗時巡屇初冬夙駕催六轡眄兹埸圃間頗覺倉箱積千畝幸有穫二釜猶未遂稍足慰吾心尚未愜吾志吾志伊如何教養非二事即今比户間豈盡知孝義披褐者農子前驅莫訶避疾苦當咨詢痌瘝豫增愧汝饑誰之由汝寒吾所致賙賜出泉府旬宣屬官吏猶恐億兆民未盡沾實惠際此薄有收聊可酬望嵗寄語為政者豐年實為瑞初晴晚照落景掛平林初晴景倍好霞連天際山風動枝頭鳥閒心遊物外逸興託雲表兹焉足自適何必尋蓬島十一月初七日得雪時大雪節也喜而有作小雪雪霏霏小雪節亦有雪大雪霏霏雪今年三白早喜復應時節朝來眄庭除皚皚堆玉屑上林冬欲半滿樹瓊英纈曩余饒逸興玩賞吟清絶值此六出飛豈不中心悅所樂在田疇望嵗念彌切裁詩為志慶那更論工拙華嚴洞勒壁别院駐鑾輿瞻禮招提境清曉趂風凉捫蘿登絶頂嵌石老松蒼滴乳寒湫净初上若無路漸入多佳景豁然雲木開古寺橫山嶺石龕月相閒簷鐸風聲靜朱欄俯帝畿烟火富閭井旋憩華嚴洞颯然衣袂冷深窺潛竇黑微聽幽泉泂何須一指參自覺萬慮屏飼魚臨流坐石磯忘機魚不避投餌試飼之引類紛然至却知非釣竿在藻心無忌清漣漾鏡光一一堪數計因之識魚樂長歌發幽思遐想天地間人物理不二有心鷗乃去去實人所致吁嗟庸衆流勞勞為名利有時喪其良反不如魚智若令貪釣鈎早作盤中味每有吟詠輒以示大學士並南書房翰林等或命依韻迭和非以辭藻相誇尚幾暇之餘相與優游翰墨亦可以陶性情驗政事比之徵歌選舞不猶愈乎因書以示之宣尼曾有訓羣居不及義况在君臣間尤貴同兹志譬彼舟楫具大川方堪濟彼民有隱情孰為逹其意或政有偏頗孰為防其弊三百一言蔽曰惟無邪思可知詩教正其葩乃餘事惟豫忝民上奉三而出治所愧理未純因之政多戾皤皤二三臣咸具經邦智濟濟翰苑英亦有責難誼因言匡不逮所益良匪細若徒獻頌詞恐滋後來議觀穫白露湛郊原西成候已至緑野滿黃雲紫莖垂絳穟銍艾茲其時錢鎛良具庤幾餘臨别院農務觀次第值此嵗云稔實感天所賜念豫恤民艱常凛祈年意積以三時憂今朝乃大慰讀杜子美集有感男子妬名祿女子妬顔色古今坐此病幾喪人家國不惟庸衆流英才每被惑卓哉少陵翁獨能秉謙德當時言詩者非甫則云白觀其寄李詩自謂如不及其實菽粟言何用誇竒特兹人嗟已往誰得其正胍獨嘉不伐心永言以為式心逺閣秋眺示大學士及南書房翰林等一指當人前不見泰山髙離婁閉目時詎可察秋毫至人用心鏡萬物不能逃王者明四目智燭良獨操兹閣名心逺寓意豈在遙結搆山之巔俯仰近雲霄况值三秋深天氣髙泬寥葉落萬林踈憑眺心神超伊余有逺思匪戀物華撩或情有壅蔽或民嗟苦勞或賢當登進轉令在下僚或時雖小安遽益志氣驕見理有不周愆尤自此招辨言有未當是非致混淆心逺之謂何豈謂盼荒郊即事因自警此樂非遊敖昔聞昔聞盤山側有谷名虎里白額任縱橫居民皆逺徙有一雲水僧結菴山之屺夜坐悟無生曉起擔柴水忽然一虎至是僧瞋目視孽畜胡為來速去斯可矣虎果掉尾去如聽彼指使自此衆鄉民號之為佛子僧亦自謂神其實無他技無何虎復來咤之厲且訾逐逐行近前僧葸乃拜跪四鄰爭赴救虎去僧早死方知浪得名前畨幸偶爾有名無實人可以鍳諸此寒雀驅車淶水道野曠風蕭蕭日出嵐霧斂村木森寒條凍雀三五羣依依棲霜朝晚穗收穫盡饑寒苦無聊啾唧如鳴悲春陽愁正遙野鶴翔髙空清唳響雲韶霜翎耐嚴冬稻粱不可招或時斂翮下千尺長松梢俯視衆寒雀嗟哉爾徒勞夜靜觀書看書如看山其境日日殊隨境不會心多聞不如無况乎辨治亂因以别賢愚豈徒誇英華言行須相符念豫志學時所慕君子儒詩亦尊李杜文亦宗韓蘇要歸踐履實聖言非我誣即今持治柄豈不慕唐虞措行始知艱慮為空言徒裁詩銘座右庶幾日警吾春日載陽土膏滋潤努力東作正宜其時既命各省督撫勤宣朕意其有籽種不足者量借豫之又成此詩以示重農務本之意去年冬雪少厪懷殊未置入春稍釋憂霑足叨天賜更喜逺近同優渥遍大地東作此其時可不盡人事因命嶽牧臣共朂勤宣意督耕䇿其惰借種施以惠惟此重農心匪慕歡虞治讀朱子全書少時慕才華研精味辭藻微言探月窟逸興橫雲表措思每廢餐兀兀忘昏曉雖云俗慮無却被詩魔擾至理在目前棄而求深窈曠蕩無所歸悵悵盈懷抱近讀文公書習氣從兹掃因知九仞山一簣功不少作此聊自訟詎足云見道書法中最喜黃庭堅筆意因而有作羲之稱書聖諸體無不有齊梁作者無李唐推顔栁惜哉世已逺贋者十之九宋元差可尋翰墨出親手幾暇戒宴安時或遊藝藪就中名蹟夥惟愛魯直叟倜儻無安排瀟灑絶塵垢譬如百尺松孤髙少羣偶信筆一規摹運腕忘妍醜所師在神徑詎論形肖否伊余有深意筆諫曾謹守好尚茍不端喪德良已厚所愛汲黯戅裁詩銘座右燈騰輝照綺席散彩當珠殿馥馥博山香遲遲玉漏箭影射桃笙流華映蝦鬚絢九枝非所貴分隂誠可羡方勵焚膏志敢卜通宵宴剪檠閲奏章毋使目光眩南天門觀音寺遙望古剎禮大士虛堂息勞身旋起憑欄望舊徑還如新谷轉見行騎山髙截片雲是時秋始孟緑樹猶繁紛兩山闢仙境一路無纎塵裊裊旌斾影隱見出嶙峋逸興一以暢轉益憂懷頻念彼隨從者跋涉良苦辛塞上秋景盧龍風日寒况復臨素節藝黃帶露稀峯翠經霜潔宇空雲影淡流冷泉聲咽夙志慕髙清對此聊怡悅皇清文頴卷首十九欽定四庫全書皇清文頴卷首二十御製詩五言古詩古風三首建極撫五辰執中御八埏望道而末由朝夕增惕乾曩余佩古訓治理頗能言行之扞格多乃悟實踐難克已茍未至其失已大焉如木斯有本如水斯有源源本或有乖設施亦徒然觸目堪警心小子其慎旃重華協帝治闢門延英俊如茅斯拔茹賢才乃奮迅其源茍不清所用安可信求者為虛聲應者為干進譬珠在深淵魚目難容混譬玉在完璞瑕瑜慎所遴履信而尚賢庶乎天助順天道有循環培栽而覆傾人道有損益好謙而惡盈君子審厥幾處夷乃若驚况乎持大寶驕滿毋或生人君惟一心干者萬計迎紀綱茍稍紊調劑安可憑憂其所可恃懼其所可矜善醫善計者其道良足稱路旁路旁一野老呻吟一何苦鳩面步履艱單衣百衲補試問何方人云籍𨽻齊魯猶憶少年時逃荒離故土傭佃聊度嵗又復病雙股問翁業何有囊無一粒黍問翁室何有妻沒絶男女㷀㷀只此身知死何處所我聞凄然悲所悲非野父曾記周詩云君子民父母教養違其方黎民失恃怙命醫施針砭或可離痛楚白金賙其窘屋居免露處固知煦嫗仁所愧澤未溥鳩小軒夏云半嘉䕃誠清絶踈簾隔塵囂翠簟含氷雪何來鳴鳩聲得得出林樾拂雨過春時喚霖當夏月物各有天性人自生分别何喜噪簷鵲何愁杜鵑血何勞布穀催何悲烏夜咽而我聞鳩鳴亦復怡然悅卜雨愜我情稍解中心結曉起曉起憑軒楹林泉供靜怡假山凝宿潤新花濯故枝灑然衣袂凉九夏如秋時俯仰足適興何必登崇臺叶是時甘雨足膏澤遍草萊叶念彼壠畝間新秧正含滋撫景厪重農豈以恣遊嬉恭已奉三無澄心待萬幾學字長夏清且閒朝回憩池館蕙風拂桃笙鵝溪揮玉管淡淡墨池雲叠叠來禽版羲獻去已遙顔栁真蹟罕追摹消永晝徘徊作清伴學敬語堪味筆正規尤善集晉陶淵明歸去來辭字即效其體良辰春將及萬物欣得時吾生亦幾何遑遑欲安之巾車晨出遊去留不自期丘壑聊流憩琴書心獨怡壺觴羡有酒親戚相問遺扶老而携幼東疇命耘耔無心雲出岫知還鳥倦飛寄傲天宇內行樂復奚疑秋日普覺寺金颸颭華蓋露氣逗曉寒西山景色佳駕言兹遊盤羽騎度林樾和鑾駐禪關兩峰闢仙路其背衆嶺環蘭若百年餘勝景非塵寰是時新秋霽黛色滌逺巒一川禾黍風西成誠可觀金吾莫喧呼恐妨僧坐禪屏營禮大士而無心可䖍卧佛伸其足萬劫常安眠菩薩羣擁立垂埀寶髮鬗旋憩方丈幽敲火烹山泉泠泠來牖下流為清鏡瀾雜英紛砌旁鳯仙與雞冠塵心一以灑回蹕傳林間比丘漫凝睇爭如上方閒淮揚一帶連嵗被水黎民阽危用遣髙斌周學健前往賑恤兼求疏濬之方瀕行詩以賜之負扆奉三無垂衣御四陲殷殷何所念所念惟蒼黎祈年厪宵旰惟願晴雨時安得海宇間比户足食衣百姓敦親睦農桑樂雍熙圓蓋䕃仁恩邇來無征鼙若獲嵗屢豐教化或可期乃者淮揚郡澤國古若斯年來多水災黎民困阻饑旬宣敕大吏補救賴有司瘡痍尚未起賑恤宜早施蠲租並截漕疏流兼護隄凡百區畫方實藉衆力為吾恩汝其布吾民汝之兒何以瀹異漲化為粳稻畦何以拯蒼黔免彼溝壑危豫憂爾其釋爾勞豫應知勉爾經綸策慰豫饑渴思兩廣總督慶復奏報廣西太平府地湧泉水灌溉田禾喜而有作粵西火畬地尤厪時雨暘曾聞夏仲月旱魃稍為殃企望佳音報殷憂殊未央乃者荷天賜湧泉山之旁灌溉數千畝源逺流澤長潺潺敷廣野决决活新秧豐稔欣有兆大吏馳封章有年願率土况在魚稻鄉依稀寸楮間而聞餅糜香所樂在田疇非為誇嘉祥石門驛午過石門驛秋風吹廣陌廣陌正西成場圃地無隙與與帶穗禾青青盈壠麥最喜秋雨足緑野含渥澤老幼無菜色倉箱頗有積四顧生歡心青驄不須䇿路旁一農父倚杖愁默默豈伊憂喜殊其言鄙而得前年夏無收所種供蟊賊去嵗薄有穫僅供半冬食今秋倍去嵗銍刈殊費力租吏下鄉來欵接完賦額吏去業主至逋缺坐求責吾農三時勞曾無一日適我聞凄然悲執政無良畫井田與均田制頗垂簡冊行之時勢異得寸還失尺罔民焉可為恆産䆒安則翁其善保軀展轉增嘆息再題盤谷寺盤谷無定名太行亦有之是處兩山環不知名者誰我來正清秋萬樹丹黃姿間以蒼崖松尤比春林竒石磴溜鳴泉峭崿雲四垂佳景面面殊圖畫行行披依山闢新徑掃苔看古碑塵心一以灑不覺歸轡遲初冬北逺山村亭臯淡寒林坂原餘殘菊山村學溪莊竹籬圍茅屋欲驗農功勤時寓幾餘目值此三冬初樂彼五穀熟雞犬靜塒扉􅕗穗堆囷簏稍慰心中憂未釋眉間蹙維揚尚阻饑秋來漲淮瀆風冷棚居民幾多向隅哭雖覃賑濟恩豈能遍煢獨小稔何足侈緬懷增怍恧讀薛文清讀書録孔孟既云沒邪說浸昌熾祖龍焚坑之吾道益失墜漢唐千載間孰為傳道器宋氏正學明乃能闢邪詖周程與張朱前後緒相繼卓哉薛文清為學知取棄獨宗五子語可謂得大意兹讀讀書録聿見平生志自云心所開取以相劄記如香象度河步步皆實地淡泊味有餘中庸行多愧所欽道聖賢文章乃餘事春日泛卧遊書室閒雲縷逺空新水漲中沚幾餘弄桂舟盎然風物美書室何必室汲古探幽㫖時或眺西山卧遊足萬里魚知春欲跳平聲鷗為人驚起青青栁罥絲嫣嫣桃孕蕊篷窗踈密櫺倐忽移電晷古人惜分隂固知良有以移花脈土滋春膏嘉種無不宜偶因省耕暇移花課花師園卉日以夥位置殊參差或芳隱岩下或醜露阿垂或以蘭蕙質荆棘乃蔽之隱者出諸藪蔽者植之逵叢生醜露條斤斧稍剪治遵彼除莠訓詎為傷仁慈須臾各得所而吾心乃怡霏霏甘雨沾淡淡和風披不枉大造恩對之有所思所思知花易人兮豈易知玉巵謡如脂白玉巵既琢復磨之成器擅工巧恢恢圓中規豈以盛醇醪眠花醉月飛擬以薦明水玩䙝非所宜更笑博古家空爾什襲為永惟無當戒三復實我師風園林當首夏暖風日日吹拂雲似席卷飄絮如雪飛繁蕊將辭條摧殘胡疾為對之惄焉愁不為惜芳菲年來春雨艱多賦雲漢詩去冬三白佳膏潤被郊畿滿擬二麥豐慰我三農飢亢旱雖未形待澤正此時先憂理則然後樂非所期隂釀澤雲布空收威風返壑氛氲暗林巒黯淡靜簾箔豐隆馳素馭金烏稍斂爚佇待靈雨零普蘇甫田涸憶昨三白積滿擬有秋樂春杪缺甘霖入夏驕陽熇縱遲五日期蘇東坡喜雨亭記云五日不雨則廡麥望潤心如灼覽古企休徵泰階調六幕連年憂旱潦信矣余德薄倣徨立階除翹首天衣腳晴閒雲歸逺峰髙空淨如洗亭臯清且淑紗牖玲瓏啓憂心此稍釋暫覽風物美青青帶潤針馥馥含香蕊平林泛輕籟别渚漲新水湖山弄霽光靄靄吟望裏念豫經旬愁兹喜良有以猶慮澤未普天恩詎宜恃吾民衣食謀巨任將誰委以此數年來樂日堪屈指披圖欽古哲兢兢惜寸晷况昧康乂術遑敢懈敬止永言勵此心陟降監厥士初遊香山作西山衛帝都勝蹟由來久蘭若何紛夥永安斯為首香山寺名也我來攬景概正值新晴後朏明發御園蚤食至巖口為境清且幽苔磴篆蝌蚪逺睇見窣堵近却蔽林藪尋徑乃得入疑有山靈守豁然壺天開佳趣無不有掛一恐漏百為縮裁詩手林扃引清籟巉岏抱復陡到山息俗念窮探絶塵垢皈依禮法王如聞獅子吼旋啓來青軒天藻瞻顔栁來青軒有乾坤皇祖御筆普照四字俯望暢心神碧浪翻千畝稍憩棲雲樓嵐烟羃紗牖但聞琴筑聲泠泠滴階右桃源與北山視此應覺醜徘徊不忍去耽靜亦物誘駕言返勤政治理商臧否從無香山詩非是相辜負騁遊吾未遑兹來亦其偶讀書時雨既霑足園林清且幽麥畦含潤佳藥欄生香稠三農均豫悅而我稍解愁解愁夫何為惜此寸隂遒檐楹垂珠箔枕簟凉如秋插架富圖書義藴供探搜汲古仰前哲孜孜不肯休矧豫乃下學安敢弛厥修文武道在人德行速置郵斯民三代民胡日趨佻偷欲期教化行先裕衣食謀展轉成寢薪嵗月不我留把卷發深省懼貽空言羞西海泛舟因至玉泉山輕雲鱗碧空蕩暄朝爽凑湖山靜且嘉草木含芳秀小舠泛西海西峰如在囿招提隱岩阿金彩樹間透沿流試尋探玉泉宛相就是時新雨後活活湧銀溜拖為綺縠紋激作珠玉潄猶疑天上雲飛自石邊竇山鳥何間關林隂亦濃茂郊圻一騁望緑疇如錯繡憂旱心稍釋此焉遣清晝御門日方與大學士等慮及山東河南尚未得雨而山東報得雨之奏適至喜而有作忝繼百王後俯臨三代民民天實豫責詎以逺近分所期赤㝢內比户利耕耘耕九而餘三庶免溝壑淪幅員既以廣大造安能均澤國正思暘山田猶望雲誠哉天地大不能無憾人緬想畿輔間待㴻當杪春旱暵雖未形憂心已如熏旋得尺澤甘解豫愁緒紛麥秋轉可望良苖爭懷新爽氣來軒除几席清無塵豈其慰目前忘彼齊與陳東郊需一犁午夜縈懷頻惟兹共時亮二三休休臣負扆咨綢繆肯惜司農緡忽接方伯章降康知自旻泰山雨崇朝汶泗波粼粼乃知得禾書志喜良有因誰無望蜀念展轉生戚欣尚慮鶉火墟此日膏有屯射燕角徑而柔楚棘直且長值此萬幾暇學彼六藝良風日散清淑佳䕃含微凉虎賁三千人掄材盡鷹揚鹿正依法設繁弱亦已張觀德誠在此為仁良可方伊余有㑹心圖治思興唐文皇譬脉理栗栗懷幾康三復凛載舟數載徒望洋捕鱧鰋有懷鱧鰋之名見於小雅魚麗鱧即俗所謂黑魚鰋即鮎魚蓋鱗屬中最賤且惡之種而捕之則甚難觸目興懷亦有所託云濬沼植菱芡圍以陂與塘澄流深且濶鱗屬恣潛藏在淵日以久美惡類繁昌一朝事搜捕欲去其莠稂惟此鱧鰋種如彼獸中狼君子所不食見韓詩外傳太液安可容叶况食其比倫鯉鯽胥被戕獨恨頑惡流偏足趨避方綱罶既難獲竿絲亦弗上叶有人謂余言魚居水中央截源涸其波彼醜安逃亡依䇿試為之重施隄與防鱧鰋伏汙泥所陳鯊鰱魴是謂思去惡反為善類殃世事有如此對之增慨慷熱昔余究元理心地足清凉朱明任歊蒸一室如禪房兹余厪民瘼視民恆如傷時維暑雨候怨咨豈能忘炎氣當亭午盾日方熾昌念彼壠畝間曝背正耘秧茅簷蠶事急經緯忙吳娘藴隆非所憚勤劬實可臧豈無九重居廣厦簾垂湘氷盤與雪簟㶑灎翻寒光展轉苦煩熱心在黔黎旁日夕思其艱怵惕不敢康安能物外遊逍遙學䝉莊夏日遊香山二首逭暑思清凉暫憩招提境茂隂連窮岡回風來復嶺松篁何瀟灑石泉弄澄冷妙髙堂名真妙髙几席幽且靜窗前老虬枝童童盤碧影塵念既云歇禪心亦以屏適然何依著付與閒雲領重基占佳勝一覽富萬概雨後朝爽凑谽谺新染黛髙樓俯碧川烟雲呈變態檐樹緑婆娑砌花紅瑣碎遊心竹素園匪慕須彌芥支公價誠論白傅山今賣懷柔縣行宫對月當秋玉輪皎况將臨望夕髙空無纎雲銀河寫修白而我因上陵王路此于役行宫鄰古縣晚景歸吟托轅門息葆吹蘭錡倚畫㦸愛此清宵佳對彼凉蟾碧蒼松韻金籟徘徊泛瑶席秋英何盈盈啼螀紛唧唧泬寥良足欣襟懷增暢適誰復尋前題俯仰論今昔臨白河密雲古雄郡山川何壯哉白河襟其右圓流多洑洄野花夾岸紅中泓鏡影開是時秋漲過波聲猶喧豗豈能駕虹橋臨渡且徘徊因知投鞭言侈志禍之媒駢舟作輿梁橫陳榆栁材力作爾毋亟非為遊觀來觀荷我從御園來荷花半雕殘此地乃關外荷花正新鮮離宫憩征轡鏡浦回遊船鵁鶄時出沒逺峰入清瀾香籟拂我旁霞錦輝我前俯朵如欲訴傾珠學涕汍仰花似開靨對客呈笑顔朔塞多嚴風花事應早䦨是荷婀娜姿詎能全其天或云惜芳菲留與詩人觀或云開較遲夏仲方田田晚榮亦晚枯至理然乎然聞近京一帶得雨喜而有作行旅慮久霖跋涉沾塗泥南畝種麥人方望秋雨滋自我始于役二旬已有竒未遭滂沱苦率遇晴霽宜豈不利輜重中心有所思思彼壠畝間來牟正其時亢暘土脈乾耰鋤將安施忽覽封章奏膏澤自天垂四郊一犁雨雨公還及私良農既不誤塞路仍如兹雨暘各適可孰非大造貽懸懸差已慰芄芄猶可期回鑾歷緑疇應有喜農詩夜雨塞山能作雲峰頭幾縷布有淹始萋萋如絲肖霏霧數日苦塵壒喜此甘膏澍濕潤忽被野延綿乃入暮牧馬聲漸息啼蛩乍如訴欹枕聼淅瀝曠懷良可賦丙夜漏㸃闌微見星河露明朝發征鞍清切秋烟路對月思唐太宗遼城望月事即用其韻隴得復望蜀徴去尚存碣誰能效舜階繽紛干羽綴今月猶古月千秋何盈缺壯志想當年萋萋烟草結情因寥宇寄光向踈林滅冬夜閒吟良夜漸添長斗杓亦旋北旌門笳吹奏大野人聲息歸轡辭藩陽乘輿指京國氊廬坐閒窗可愛新月色差無塵念縈微覺輕寒逼關山巡閲多歷歷皆堪憶揚鸞和鈴中玉律忽已易悠悠今古人趁此駒過隙百年詎云久寸隂實可惜際兹清宵佳况對寒蟾碧金鴨已結篆銀檠半折堲却似去冬夜梅香遞宣席所志嗟無成所學曾何得惟餘此初心時時自兢惕再題澄海樓壁我有一勺水瀉為東滄溟無今亦無古不减亦不盈臘雪難為白秋旻差共青百川歸茹納習坎惟心亨却笑祖龍癡鞭石求蓬瀛誰能望天倪與汝共濯清見耕者揚鸞鳴和鈴芳郊經迤邐是時春將仲盎然風物美脈土既已滋于焉農舉趾烏犍耕曉烟桔橰轉新水携筐播嘉種曰穈芑秬秠徂畛侯主伯課業惟孫子有來思媚婦餉之用二簋停輿一問之所言良有以賦性質且芚難為韋帶士况彼勞青燈豈易拾金紫欲為工賈流近利吾所恥所以四民中惟農良莫比土物誠可愛世世恆守此當春南畝蘇修我耒與耜惟祈雨暘若倉箱還可擬御園親耕皇考時屢行之當春舉趾兹惟其時率循舊章並勸良農觸景興懷㸃筆成什姬周肇豳岐所勤惟穡事愛土物心臧八百基由是叶言考三代旋開國非一致豈無仁民君務農姑且置我朝得天下馬上搴旗幟創武守以文耕稼尤留意皇祖繪為圗種穫編次第皇考耕藉田嵗嵗禾雙穗謂是御園中朝暮便親視叶况匪司農掌毋庸甸人治近驗雨暘時遙為倉廩備小子承遺教深懼德弗嗣民天念在兹敢懈肯播志時云暮春初修我耒與耜叶穀種備青箱服犁曰黃牸既耕亦既種時雨仰天賜詎止勸良農子弟示勿替心逺閣作春穀未播種秋麥才抽頴食乃民命關吾宜為祈請明神靡不宗况兹妥靈境何須玉帛陳一𠂻萬營屏未瞻膚寸合轉覺吹萬猛信矣誠未孚惄如憂益炳稍憩心逺閣遙望東南頃題句憶舊年緑雲正井井春懷詩漾澨南入江豈復西為漢朱輪墜桑榆詎返東而旦四時均易逝三春更難絆九十忽云過青韶亦已晏落英紅貼波輕棉白堆案關關南來鶯遙遙北去雁萋萋草茸砌隂隂樹隱岸怦然意靡寧遑樂清閒宴繄我非傷春所慮壠畝畔枯壤久待澤終風日益扇播種惟兹時過候饑將臶何辜兮吾民凉德增靦靣那無補苴䇿濟少而漏半披衣立宵宇明星方爛爛繁慮賡長吟聊用攄三嘆進宫見路旁麥苗待澤孔亟秋禾尚未布種惄焉有憂賦以自咎聞人亦有言甲子鮮豐嵗彼媕婀者流復舉史所記云堯湯水旱匪為聖德纍此論信然乎試思君所司周官設三公尚有燮理寄矧子實元首休咎徴所致寰宇雖恢擴遐邇均在意耕九未餘三安得稱有備我自去冬半顒望三白瑞亦知時尚遙念念頻縈繫侵尋春徂夏益覺秋難置憑輿歷枯壤終風動氛翳麥苖將萎黃穀種遲布地此責竟誰諉此災皆豫戾忸怩對百工不啻陳六事短什用自咎訟語無倫次湯泉荷花暖溜饒地靈勝似逺公社芙蕖綻清和不待朱明夏女夷有私鑄相爭木奴冶裛風散芳馨照日含嬌姹却讓别浦荷盈盈秋露㵼早盛亦速零寄語附炎者詣香山禱雨叠舊作初逰香山詩韻客嵗歷招提相隔倐已久赤帝司南方清和斯夏首來牟秋已歉布穀時恐後惟民命繫兹恃以糊其口蜥蝪竟難致空復驗蝌蚪我閒神所妥率在深林藪是地有靈潭母乃蒼龍守但祈溥膏澤屈禮吾何有播之未棲田耘之安容手步禱攀烟蘿遑計磴道陡霑衣汗已淋舉袂風揚垢飛亷下元冥轟砉雷應吼大士慈悲心甘露灑楊栁須㬰遍九垓枯槁蘇東畝旋憩來青軒為啓來青牖昨夏喜農時草書懸壁右對之自忸怩不待他人醜見理既未確觸物皆成誘返已試品評臧少而多否率此致咎徵詎是明神負敢期雨必零尚㑹雲相偶秋夜泛湖賦唐文皇爽氣澄蘭沼之句得詩五首依韻為次徂雲淨碧天金颸蕩輕爽入夕幾務閒玩此虛明象棠舟穩如屋鑑浦平於掌賦詩思其人髙山豫所仰琴書樂有餘天水涵無既咽露蛩語饒橫霜鴈聲未四時皆有月獨以秋為貴歷歷翠錦堤遞遞芬陀氣鏡裏坐空澄渺然思與凝朅來青雀舫愛此玉壺氷衣袂皆無滓胸懷亦絶勝逢瀛原不逺咫尺有人登遙疑霞有腳却過蓼花灘蟬韻將辭栁荷香尚賽蘭晚山歸靜寄秋月本澄觀稍適清閒宴匪尋長夜歡讓月雲歸岫報秋波徹沼將圓未滿規歷漢常移秒此夕夫如何萬里明未了姮娥憶貞觀不改天心皎七月二十八日恭奉皇太后進宫路旁禾黍與與入覽欣此西成稍紓望嵗賦詩志喜亦歌其事也食人食於人事殊心則同較課雨與晴均此望嵗功憶我春夏交雲漢歌藴隆殷憂厪慈寧步禱誠乃通東阡霑霡霡南畝紓蟲蟲起枯而蘇槁額手感彼穹朝穟飽玉露午顆搖金風髙原與下隰一例皆芃芃有秋竟可企非余忖度中奉侍大安輿欣覽䆉稏叢一笑慈顔豫信可慰豫𠂻賦詩志農要匪為誇年豐南紅門池上咏昔來池上遊春日方載陽今來池上遊蒹葭已蒼蒼逝者誠如斯因悟往未嘗吹波鯉魚風垂垂蓼影長漁歌起烟外鷗波㶑河梁清濁誰致然有懷彼滄浪盆菊塗龜寧曵尾不慕藏廊廟山木寧棲崖青黃非所好黃華隱逸材倜儻寡同調卉譜偶傳名藝苑誰能貌花師鮮法眼視比春葩耀杯水引滋溉圓盆作幽隩枝幹受束縛猶詡人工妙杞栁為杯棬戕賊豈伊樂繩墨厥天然俯仰任其詔垂頭綻冷芳恐被柴桑笑剪翅來孤鶴引吭一相弔順義縣行宫作將為田盤行趂此秋成閒旌麾歷冀野輪蹄背湯泉朝暾散晏溫入我輿帷暄塗霜帶冷白坂花垂紫殷枯樹雀飛飛廣陌兔爰爰芻棚隱茅落罷喘牛髙眠囷鹿户有積室家幸茍完所見扶鳩翁尚鮮怨祁寒由來嵗功成降康端自天行宫建勝地樹石誠有年葺新成此日止頓因路便匪誇棟有芝詎必池茁蓮記我書室名是處欣隨安明窗受暖曦市語隔煩喧染翰藻思抒習靜道心存愜適以為佳奚必居深山皇清文頴卷首二十欽定四庫全書皇清文頴卷首二十一御製詩七言古詩銅鼓歌雍正庚戌秋九月廣西撫臣金鉷進銅鼓一云民間墾田所得名諸葛鼓相傳諸葛亮以鼓鎮蠻云因歌以紀之赤帝失御火不燔冠以苴履翻坤乾靖王後裔英且賢慨然奮義振中原南陽之藪臥龍蟠下車三顧意何䖍龍飛雲路見在田君臣相得魚水歡東使吳會騁辨言八十萬衆成灰烟西入益州奠本根鼎足峙立固且完永安宫裏龍髯攀調和宫府整而間命師南指定獞頑七擒七縱服諸蠻鑄銅成鼓永鎮旃風雨侵蝕年復年數易時代陵谷遷下巢蚯蚓鄰黃泉照臨無復資魄淵濡潤還沾雨露偏崇鼎貫鼎增斕斑獨於厚地全其天由來竒物終播宣一朝光氣騰荒阡施厥畚鍤瓦礫翻有聲鞺􅝅非絲絃宛然銅鼓形不刓洗剔苔蘚光澤鮮驚看老幼何喧闐大吏表進九重前為陳檀案撤包氊聚觀羣下充庭軒試加擊伐聲啍啍大鵬摶風長鯨噴上有四蛤猙獰蹲旁有雙耳綬色緼龜紋虬篆隱隱存覆之黃縑加束純方今舜目闢四門兩間並獻貞符繁不誇寶鼎出河汾詎數劔氣沖斗躔我聞置鼓召諫臣訪察民隱牧元元此應其兆無乃然坐見讜議日聯翩鏞鐘大叩張宫懸讀司馬溫公諫院題名記豐碑聳立髙尋尺銀鉤鐵畫生光澤纍纍若若同時榮莫混賢姦一片石天風凛烈護剛堅表列生平勝竹帛他年元祜鈎黨臣義形石工傳安民豈知後世翻寶愛幾與諫院題名鄰君不見山可礪兮河可帶桑田滄海還相代此名一留不復敗自鳴鐘扶桑日出海門紅大秦西洋揚景風懸橦度索底貢同於皇聲教敷天通梯航山海來朝宗厥獻竒物自鳴鐘銅輪鐵絃凡幾重機軸循環運其中應時滴響聲舂容挈壺無所施其功精巧絶倫疑鬼工倕班流汗難追踪異哉兹物無始終周歷晝夜春與冬懸置几上勝金鏞晚報日昳曉嵎東我聞寶賢寶物雖不同咸賓亦足效球共考時定律佐三農此鐘之利貽無窮題宋宣和清明上河圖用駱賓王帝京篇韻大禹敷水土導河過龍門漭泱萬里間卓為羣瀆尊流經積石走函谷東過洛汭繞甸服土中自古稱洛都襟帶山河雄地軸維昔宣和全盛時寒食初過一百六淡烟輕雨清明天踏青嵗嵗侈華屋華屋朱樓金闕隈千門萬户天邉開飛花香滿宜春苑稱觴獻壽柏梁臺佩響千官入山呼萬乘來簪裾艷文藻雲漢儼昭回梯航萬里至輻輳日中市綺縠揚衯裶連袂如雲起桞隂暗沙堤花光明御水寶蓋蔡京車高牙童貫里中樞甲第起崇墉相國髙堂列鼓鐘道君禮樂三千盛孱國山川百二重春入上林迎旭日雲開水殿躍飛龍龍樓鳳閣相輝映山城鼓吹春逰盛春逰處處多貴臣青驄駉駉車轔轔明月樓中邀上客紫薇花下宴嘉賓滿堂珠履珍羞錯從容欵曲金蘭親斜陽返照天欲暮汴水橋邉車馬度橋邊街市何喧闐萬貨千商夾道路路旁桃李紛芳菲逰人雜遝白馬肥朝催玉勒花間去暮拂金鞭栁岸歸頗厭錦繡服新裁白紵衣劇孟風未峻郭解力猶微平生但言憑義氣捨身許友未覺非郊畿靄靄帶晴雲稻田桑圃望中分村墟景象多幽趣㸃綴蚩蚩忘帝勳婦子嬉無節長幼略無文常樂升平烽火息霸陵閒却故將軍栁堤逰客艤船待一櫂輕移山勢改嫣紅粉白夾岸嬌蘭橈畫舫中流在中流競渡各紛馳渡口魚磯疊石為更有一川風景别身在蓬萊自不知蓬萊宫殿何繁華瑶島瓊臺入坐賒仙人爐煉長生藥羽客丹成九轉砂靈素作安期遺我棗如瓜驅山走海丹青變筆底烟雲紙上見神思妙藝出清新偶然展軸驚萬人巧贍奪天工結搆含精氣逺過顧虎頭不數陸仙尉仇子此卷何為哉燕雀嬉嬉畫裏來驅鄰自召強鄰侮繁華侈泰禍之媒牛車俯首受縳去冰天雪窖嗟徘徊即今歌舞地花發為誰開空留遺跡在憑弔費詩才德夀寺古鼎歌龍宫巍巍紫氣軒輝耀榱甍煥崇垣寺名德壽菴羅園剎竿髙掛珊瑚幡停鞭卸轡山門前一滴欲尋曹溪源東瞻紫霧明朝暾清凉頓覺隔塵喧香浮寶殿謁世尊兀然古鼎吐雲烟何人鎔冶工雕鐫金翠斑斕歷嵗年上文雷回下雲紜猙獰狀類獅子蹲籀書斯篆跡難分世次那辨癸與辛蝌蚪盤屈蛟龍奔周彞虞敦恍猶存葆精凝潤疑瓊璠寒光欲流不可捫日月照射輪朝昏洗濯全資雨露恩在昔盛事傳橫汾此鼎神異邁等倫我欲負之千蹄犍移向帝闕鎮厚坤充以大武佐魚豚萬斤木火為之燔有實大亨養聖賢望雪行今年三冬未見雪同雲苦被風吹撤夜觀望舒如鏡明曉看翔陽似冰潔秋麥全資冬雪培遙識農家望嵗切我聞三白兆豐年望霰先集心如結上帝穹窿坐玉京青女滕六分行列如何不一駕雲車試剪飛瓊噴玉屑飄飄灑灑頃刻間利我三農都喜悅春蔬春融地氣如膏滑一畦烟甲隨雷發檐前小鳥喚春眠裛露擕籃勤采掇早韭初菘紛列盤清芬細嚼冰齒寒淡泊有味取次領旦晚為爾還加餐君不見一食千金丞相府猶說區區難下箸雨前茶榖雨前春雷後色染鵝黃新上栁携籠男婦溪山走爭試采茶三昧手日烘山腰暖碧雲槍旗半吐搖酣春賣與商人博衣食徒勞曽未沾其唇伊豫品泉逸興賒啜罷還憶貧民家新絲新榖都已賣即今又賣新芽茶有鳥二十章孔子教小子曰詩可以興又曰多識於鳥獸草木之名鳥獸草木中觸我性情有興機焉若徒追琢字句強裁聲韻烏可與言詩哉唐元微之作有鳥二十章備載鴟梟老烏諸惡鳥之可憎雖疾世之憤辭然不失三百詩人之㫖豫讀而慕之倣其體亦成二十章所詠者皆鳳凰鵷鷺諸名禽微之以刺而示戒豫以美而示勸其有助於性情一也至於風格之髙錘鍊之雅豫固未能及古人觀者取其意而略其辭焉有鳥有鳥百鳥王雄為鳯兮雌為凰朝棲崑圃飲玉露夕宿蓬島餐琳琅九苞六德耀文明恢恢天宇恣翺翔厥惟聖人修至德來巢阿閣呈嘉祥藹藹吉士馳王路千秋萬載邦家光有鳥有鳥名朱鷺波靜昆明常顧步漢鼓曾標樂府聲周舞亦載詩人賦振振有序羽翮聯和鳴未許雜孤鶩玉筍班中識爾名由來博得人人慕有鳥有鳥雙鴛鴦接翼交頸遊方塘共宿蘭沼何容與同飛鏡浦相回翔若有人兮翠袖裳思夫君兮天一方春朝步兮春池旁覩佳禽兮增慨慷有鳥有鳥在水滸飛鳴行搖如相語如相語相急難相急難兮食不安逺羅網兮泛清瀾啄蘆頭兮心共閒君不見悌有鶺鴒孝有烏人禀秀靈如不如有鳥有鳥聲緡蠻遷喬求友出谷間楚楚金衣緑隂裏諧鳴玉管呌春䦨髙齊日午簾幕悄側耳徐聽音未了生平不少素心人關山迢遞豫懷渺有鳥有鳥曰靈鵲羽族本天似先覺但不告憂惟告樂惠迪則吉宜忖度憑兹作喜易舛錯鳥智人愚非見謔有鳥有鳥名布穀髙喚枝頭村桞緑村老聞聲急荷鋤趁時耕作還相朂東鄰西舍催耕遍喉吻苦乾飲水曲不似籠中雙畫眉巧言但博主人肉有鳥有鳥枝上啼啼聲風送到深閨聲聲催織當春日織女聽罷顰雙眉飽蠶方作繭那易成新絲新絲還要賣匹帛安可期我願拖綾曵錦者常念茆簷忍凍時有鳥有鳥如輕舟毛衣皓潔名沙鷗穩宿洞庭秋夜月閒泛瀟湘烟水流將雛命侣頗自得對爾還似逍遙逰有鳥有鳥名鴻鴈秋去春來期不變成羣飲宿向沙洲蘆葦蕭騷波㶑灔古人重爾信義敦嘉禮親迎用致奠如何世人轉不如糟糠富貴分欣厭有鳥有鳥雉將雛雛兒聲澀學母呼壠上風搖麥浪緑引雛拾蟲却相逐大堤年少挾金丸見雉此意不肯彈彈雉雛兒誰為哺彈雛却憐雉心寒收弓擲丸不復看有鳥有鳥慈烏鴉飛集庭樹聲啞啞聲啞啞引其雛羽毛翩翩尾畢逋尾畢逋雛亦長烏老更借其雛飬母為慈兮子為孝禽鳥亦識人之道有鳥有鳥清秋隼獨韻金風利爪吻徑氣猙獰似駿驄眼疾身輕雙翅敏晴臯一下萬山青狐兔燕雀藏伏盡有鳥有鳥名黃鵠軒軒霞舉超凡俗矯翮翩躚來玉京却向太液池邉浴隨仙去後空餘樓入琴彈罷猶思曲冥冥灝氣恣翺翔引我欲窮千里目有鳥有鳥雲錦文巴山靈禽夙所聞的的彩色映日麗煌煌繪羽翻風新竒姿藻耀欺凡鳥雕籠飲啄為君老却勝塒頭村雞鳴瘦立風霜報天曉有鳥有鳥呈符瑞援毫作歌紀其事伊昔明皇即位初貝州飛蝗害苗穗乃有白鳥凡數千一一喙啄蝗盡斃當時姚宋作相公調和變理稱郅治開元天寶易治亂玉妃擅寵昭陽殿祿山食人如食禾嗟此蝗兮可若何安得白鳥大如蓋食此蝗兮安內外有鳥有鳥志不移銜石填海無已時海却何時滿石亦何時斷但見羽毛禿兀爪喙疲咄哉汝鳥尚有志人而無志鳥所嗤有鳥有鳥雙白鷴清秋玉立菰蒲灘踏波緩舞藻文動澄流照影翩珊珊性情髙潔如其色自首至尾無㸃黑俗眼欲看看不得有鳥有鳥金翠斑厥名孔雀産巴山産巴山來帝里屏張藻耀文明起羽儀為國獻嘉祥不甘戢翼巖阿裏有鳥有鳥雲間鶴萬年枝上欣所託徑羽梳風意態孤清聲韻月響深壑常伴仙家丹鼎烟不慮虞人施矰繳有時灑翮一髙飛迢迢天路翔寥廓觀刈麥麥苗入夏結穗黃東壠西壠碩且長老農此日走田忙腰鐮遍割樂歲穰笑看黃雲各成片密莖隨手行行亂肩挑背負曬簷頭饘粥有餘他不羡呼兒莫逐飛來雀令渠亦識收成樂擬杜工部洗兵馬行長雲不隱關山月沙漠龍堆多戍卒壯士橫戈古戰場將軍飲馬長城窟長城水寒馬不嘶刀環入夢多歸思少婦樓頭咽橫笛一聲秋韻臨秋吹吹笛聲髙復聲下驚起匡牀髙臥者側身吟望興咨嗟向天長歌洗兵馬謂天蓋高聽自卑電光倐忽雷車馳雲師雨伯揚青旗陰昆水族功並施盆傾瓶注遐邇滋洗盡塵氛永息師男歸其家婦育兒九州安堵樂雍熙壯士勇力亦奚為欲挽天河安用之夜臥聽雨憶平郡王朱明屆候天方永如烘暑氣焦塵境座間揮扇手欲疲林下乘風吹不冷今朝一雨洗煩囂入夜濛濛萬緣靜楊桞陰中罷暮蟬梧桐枝上收清影時有匡牀髙卧人一杯芳潤澆苦茗夜凉霜簟好安眠芭蕉響滴殘夢醒醒後悠悠動逺思思在龍堆連雪嶺如心居士在軍營年來王事勞馳騁即此清凉夜雨秋行帳殘燈懸耿耿天心仁愛當偃師坐看絶塞狼烟靖百萬健兒歸故鄉淨洗兵戈只俄頃猶憶去年烟雨中緑簔共泛滄波艇清宵蝶夢亦偶然人生何必歎浮梗借有好風吹送詩知君應在三秋領豐碑行夕陽返照輝道周驅車古路西風秋路旁豐碑何其稠森森插笏盤龍虬誰能細考姓氏留但聞土民說所由明代貂璫威福擅司禮還兼御馬圈秉筆曽標封事題內操更教昆明戰沒後養子不掃墳羣埋此地多無算當時威焰劇熏人只今草掩流螢亂我聞此語識興亡秦漢唐宋皆殷監私昵何曽念履霜竊權頓令愁飛霰勒石猶誇爵里高千年青史誰能逃辛勤汗馬創業勞大半拋擲由若曹見桃樹下栽松感而有作園中種樹羣芳滋幾年榮長紛葳蕤或列山側或傍池同蒙雨露爭參差阿誰位置失其宜山桃下植青松枝蜿蜒未放拏空竒甘為蓊蔽嗟何辭春日抽條緑葉披勢高獨占陽和私蔥蘢待到嵗寒遲吁哉已過煦嫗時我欲借問場圃師種植顛倒意何為青松磊落龍鳯儀山桃弱質人所嗤胡居松上茂蔭垂因循坐令虬枝萎自古掄才還若兹坐對感慨抒幽思安得槖駝妙手移或棄山桃付芟夷良材俾沐三春曦他年梁棟誠堪期同五弟月夜舟歸湖波㶑灔當秋澄一輪寒浸秋月明上下清光星斗燦輕舠打槳中流行萬籟閴寂天在水蘆葦㸃㸃飛流螢長空泬寥堪妙會鴈行拈韻欣同賡詩成泊岸松忩臥還聽沿階蟋蟀鳴秋浦泛舟西風拂水烟波緑櫂過寒溪三四曲采采