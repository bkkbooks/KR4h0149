body:
  text: 詩樂府皇雅四篇有序并上表葉方藹臣方藹頓首再拜言伏惟皇帝陛下赫然一怒隴右閩南相繼底定叛者柔服復為良臣二方之民如無兵革竊謂故典所載討亂成功者有矣必右剪左屠殱其類醜芟剃而蕰崇之甚者禾苗稂莠不擇而鋤大難雖平民氣破傷征役怨咨之感未能盡息豈如今日初無鯨鯢之築京觀之封轉危為安易亂而治致效疾速捷於景響臣侍從殿廷命將出師之日親聆德音巨憝而外勿僇一人倒戈來迎許以不死勤懇諄諭至再至三以故至誠感孚豚魚知格方之古昔惟舜舞干羽而苗格文王因壘而崇下庶幾近之史官載筆宜有紀述宣示遐邇伏念臣待罪翰林以文章為職業而謭菲固僿無以稱揚德媺竊聞詩有六義在朝宜雅故有六月采芑車攻吉日江漢常武諸篇所以志武功昭文德示後人以則效俾繼序思不忘臣輒不自揣著為雅詩四篇雖不能如尹吉甫之萬一亦不敢為相如班固符命貢諛之詞因事述言多所挂漏但區區之心欲令天下萬世知皇上仁勇天錫超軼前後更祈益加勤勉載沛威恩使反側之徒旦夕殄滅以塞臣庶之徯望臣之此詩得附寵靈以不朽誠不勝大願臣方藹昧死上涇邱受降也涇邱崇崇安定龎龎叶龍我有虎臣以折以衝老羆卧矣狢子曷過矣以固我圉以靜我野叶涴矣安定洋洋涇邱攘攘我有虎臣化為豺與狼誰其飼之俾饑而噬矣誰其絛之俾揚而逝矣羣恇其凶羣餌其誘賊我主師戕我盧首民人毒痡甚爇於爐甚溺於塗以號以呼呼天無辜帝念斯庶孔顛奚釋乃命臣海惟爾作朕弼爾惟一德太清之縡實眷西顧往綏殘黎式完頸脰叶度彼携者子始心非二大敢逋播其引領望貰爾承命勿替往與之湔賊可坐而獮往與之祓衆可招而獲海拜誓師次於秦郊我馬蹻蹻我士囂囂孔武且豪搏賊以敖有凶有孽將螫將嚙我斾方設則已顛蹶乃傅其壘元臣是臨弛我武刑諭以德心往能思服其保爾族待女以不死否則孥僇侮可邀禔吝則終辱隳膽束軀惟爾之福唐子知歸崩角𠢐靣敢怙而抗爰順以巽叶霰臣罪不可赦刎頸以謝隴頭之水流聲嗚咽元臣止之女無庸自絶皇帝慈仁其度如天曰忍以一夫俾百族顛連維國有恆憲維子有殊恩叶殷洗女瑕疵濯女垢瘢女冝自圖以蓋厥愆其危既安如乳獲母戈鋋倒載釁甲卧鼓昔也衡命衆號以咷今也輸誠衆歡以嘵昔也負嵎有壘猶墟今也革心卧起于徐帝念秦隴噢之咻之綏彼携二輯之柔之非我受降叶紅為民受降應地之坤順承含𢎞叶紅非我宥慝為民宥慝雷雨之解百穀之澤薄言震之隴右肅清元臣蒞止疆場克寧我民有父母我君有臣喻彼飛梟曷懷好音上帝式臨無遐爾戎心涇邱十二章二章章八句四章章九句四章章十句二章章十二句關隴平隴右也關嶺茫茫隴流湯湯紆餘逶迤崢嶸嶮巇面蜀肘凉輔車相將狡焉啓疆震驚我一方關嶺兀兀隴流潏潏彼涇啓戎乃蠢兹蟊賊為虺為蜴為螟為螣卬首張臆助逆抗有德如蝟之集如豨之突涇原既靖乃羣賊大震睢睢盱盱延旦夕之命帝命臣海為隴民徙灾帝命臣勇師自西陲帝詔臣海女速涉阪出彼朝那為勇軍援犄之角之㳫之蹙之除民之慝俾婦子其適尚嘉乃之績海涉河涇言騰灞滻秦山矗突嶔﨑隴阪踰邠越凉飛旓揚斾扶輿猗靡雲罕綷䌨雍部阻長敢憚痡瘏式遏寇虐以寧爾室家叶歌勇自河西銜枚疾指來從酒泉轉戰天水矯矯虎臣一乃心力摧堅挫鋒蕩彼蟊賊兵車百萬洶洶雷震橫㑹方州為行為陳叶陳東西合圍賊在釡底叶低其智斯竭其魄斯奪勇率其麾崖誅谷討曰臣思克曰臣進寶赳赳奮武為王干城勇實帥之桓桓於征于征何所于鞏于臨道阻坂長蔽虧岑崟罙入其阻禽獮草剃申用三驅根株斷刈餘賊竄蜀遊魂猶悸西夏以綏賀蘭其乂脅從蚩蚩亦孔之哀寬其誅鋤豫以惠來維海與勇剛克柔克勇也帥師為闢為祓海也敉民為慰為集北地上郡稽顙歸命如旱望霓海實綏之義威戢武奠我西陲剖蜩斫蝟人畏以懷秦民噓呵化為謳吟殄熄暴悖克廣德仁經戰伐區蠲除租簿問孤弔死周匝宏溥廓我皇恩義聲先路帝德振振隴山既平隴流既清惟天子之楨隴山既伏乃黔粵滇蜀敢不讋伏如翰如飛萬里來威維臣之力維師之武長驅洋洋莫豫云拒縶縛巨憝爭刌膾脯塞神人之怒黔首喁喁式歌且舞億萬斯年篤我皇景祜關隴十二章二章章八句二章章九句一章十句一章十一句四章章十二句二章章十四句南紀平閩也閩山屹屹南紀雄藩吳越之㑹交廣之門維山嵬矣女其為礪矣維海湃矣女其為帶矣山則有羆水則有蛟其物維何工為孽與妖鼓蕩我藩臣誘為唇齒以搖我疆理誰貪其餌百世之族一朝而圯帝念藩臣女祖女父勳在盟府惟女孫子曷敢越乃武根柢之撥枝葉則病豫有肺腑臣乃不克令庶邦奚正維鉞之興翦焉斯定乃命親王視師於東金節煌煌玉矢朱弓兕甲熊旗荷天之寵叶充謀夫縱縱武士充充以翼以馮共襄厥功王師渾渾言涉於江旌斾悠悠江水不揚賊旅如林望風奔狂負固革心庸胥後㑹受彼順命殄彼衡命三軍齊作進規退矩戰不貪誅禽不濫數㑹稽南部投戈來附仙霞之關鳥道天插一士拒險萬夫莫越我師度之如履房闥師既戾止彼亦悔止乃觳乃觫乃匍乃匐泥首拔髮捶胸出血率其臣妾萃於軍茇俟龔行天罰天子曰咈叶沸繄大功之後其宥十世爾負一眚豫其忍爾治忘人之過記人之功豫為大君其敢不聰昔爾有車旗今豫再錫之昔爾有土宇今豫再闢之非常之恩不可數得夙夜省厥愆以懋乃績臣拜稽首承帝命無斁閩方為亂帝則伐之既伐來歸帝則活之閩亂既平閩方既定叶庭帝俯而思思此疲氓簡其徭征弛其眚刑代虐以貞滌穢以清閩民歌呼帝為我來叶釐出我荼苦煦我瘢痍祝帝之紀後天罔墜祝帝之壽與地同久曷徒祝之心誠篤之施我後人世世告之南紀十一章一章八句二章章九句四章章十句四章章十二句巨浸驅海寇也巨浸稽天滔滔如何天吳罔象倚以為家叶歌有鯨有鰐有鮫有鼉摧橦决帆血人於牙叶俄中國有聖人爾獨揚其波蠢彼䵷黽亦雜此處曰豫勝國後誕敢紀其緒藉瑕蹈釁窺伺肘腋知大邦有疵載逞凶慝離間我臣僕叶白盜據我家室於興於泉於汀於漳乃揚沸湯乃噪蜩螳我有城郭倐為沮洳我有民人倐為鯈鮒忍死須臾后來其蘇王承帝命建大將旗鼓我冠帶之國忍鱗介是伍我牖既綢我户既繆與子偕作與子同仇悉率左右殱此羣醜暨暨藩臣一心一德討賊自贖不即巳恤塹山堙谷馬騰舟駛親率其旅以臨濛汜陛下曲赦臣臣敢不效死將士和睦有鳬在藻既獲敵師如饑斯飽或拔其角或脫其距或斧其吭或截其膂賊窮見窘無地自處彼彊者跳我攘我逐彼溺者死我殄我戮神惎之毒鬼連其覆如探鷇殼如振槁木匪我黷武取彼殘已足前徒既奔凶渠束手知女上策惟有一走茫茫煙島為逋逃藪仁無必取義不盡殺屏諸窮髮毋汚我王鉞四州士女來迎王旅君子維何元黃在篚小人維何饔飱在筥于時言言于時語語復為王人以耕以仕叶語歌帝之德誦王之武帝德溥將涵負吐納百谷來王天與地㳫乾端坤倪太虛包括何人不綏何物不懷何戾不蠲叶基何善不嘉叶竒皇仁熙熙云何不來叶釐皇帝在位受天之籙東西朔南無思不服其有不服自膺顯戮獻馘於泮獻俘於廟武功既昭文德用紹史臣奏雅來哲是詔巨浸十一章八章章十句三章章十二句鐃歌鼓吹曲有序徐嘉炎臣聞蚩尤方破遂傳棡鼓之章有苗既來即上卿雲之頌六成八變太和之象光昭七德九功神武之靈赫濯選聲表盛寓物銘庸振古如兹由來尚矣況乎澤覆油雲征同時雨八荒四海之內共覩飈飛一元三古而還誰方雲騖桓桓之旅後舞前歌喁喁者流東征西怨謀非稽衆役僅淹時雖王者之師有征無戰而雷霆所擊不疾而馳殊猷偉伐史策之所未稱盛德大業篇章之所罕記茍非絃匏遞奏藉空桑絲竹之音金石相宣振路鼓靁鞉之響何以告成功傳後世哉夫自干戈始用書契以來賊子亂臣阻兵抗命豕心鷹眼之族弗率於古帝之朝蜂目豺聲之徒自絶於盛王之世或竊一隅之地致稽數世之誅者蓋自昔有然矣皇上仁育羣生厚載萬物軼漢髙之大度邁藝祖之淵𠂻期杯酒以銷兵用苴茅而錫福惓懷走狗懲葅醢以戢韓彭永念從龍指山河而安綘灌蠢兹逆醜肆厥凶渠玩兩朝帶礪之恩為千里逋逃之藪叢鸇忘其豢飬飽決枋榆桃蟲恣其拚飛毒成辛螫乃搆九隆之種妄噓六詔之灰俗沿盤瓠幾欲奮喙吠堯地接㽛町輒思刻木叛漢爾乃茫茫墋黷潰潰沸騰蜀黔之破獍羣狂閩粵之鳴狐洊起赤眉青犢旋開囂述之邪紅巾白蓮漸啓張陳之焰拔陵逆作杜洛周相繼稱兵侯景變生陳寶應聞風搆難皇上神謀獨運禁旅四征選士馬而如雲命公卿之惟月上公出鎮西府専牙宗子登壇東藩建閫雖彭亡歙刺將有輿尸授命之忠而張齒顔拳臣多罵賊捐生之烈於是軍威烜赫廟略深沉始平遼海北庭之叛寇身殱繼討閩山南紀之降王面縛虺蛇之衆次第削平鮫鱷之氛逡巡底定既而天厭其毒神惎之謀懷恩自伏冥誅姚萇還為鬼殛傕汜未滅先燃董卓之臍安史雖存已潰祿山之腹於時邯鄲卜者假託子輿琅琊名族間生處仲既縶肘而剪翼漸唇亡而齒寒然後躍黃龍以越洞庭驅金牛而登劍閣歌渝擊鼓西極三巴破竹倒戈南連五管顧乃窮猿無擇困獸猶驚王元擁立夫隗純高尚依慿乎慶緒方舟並濟同惡相求據大渡之河渾忘玉斧毁盤江之索便謂金甌詎知葡萄江上寒水膠舟楠木溪邊溫泉飲馬煌煌天語無遲豢寇之師翼翼宸𠂻肯緩滔天之戮北極遙頒乎廟算南人競懾夫天威百足死而就僵羽黨盡矣三驅前而不誡親戚畔之爰是臨淄旦開河中夜縊沈黎摧角獞僰傾心洗兵於洱海之傍天清日晏習戰於昆池之側霧散烟消碧雞偕金馬重輝露布與雲旗竝麗昔鬼方尺土高宗克以三年淮蔡數城唐朔隔於二紀若斯之風行草偃景逸雲馳豈不神哉未之覩矣於焉升中上帝告類明堂折馘獻俘禮琮璜於七廟振旅飲至䖍圭鬯於羣神百度惟新詔封三錢之府兆民偕樂歡騰五父之衢猗歟休哉其敢不肅聿自鐃歌鼓吹之製始於西京樂府之章其後魏有繆襲之篇吳有韋昭之作傅休奕聲稱於晋代何承天表著於宋朝代不乏人咸稱作者雖移聲换調不皆蹈襲前人而譜德象功總是顯揚時烈揚之堂上皇然郊廟之音采之閭中即是風謡之選臣嘉炎離竒蟠木空荷青黃拳曲繅絲慙施蒼赤值千秋之異數膺三載之殊恩蟲難語氷馬寧識路徒事丹鉛之役終為章句之儒既未能飛羽檄於軍中佐隂符於幕府繫纓於苴緬之域勒石於㸃蒼之山若乃歌詠鴻名昭宣盛軌揚無前之偉烈附不朽於來兹臣之志也亦臣之職也是用不揣固陋作為鐃歌鼓吹曲一十四章選詞徴事因事立名非敢播之管弦聊以遺夫翰墨云耳聖皇出皇帝受命也聖皇出披皇圖紹武烈承文謨造草昧嗣唐虞地符吐天苞舒神其格人所愈四海域八紘孚歌擊壤舞康衢邁禹跡遵堯塗蠢鑿齒蹈天誅捫參井干狼弧帝降威轟雷車斫修蛇羂猰㺄斗極拱泰階居功無加德有餘告太平樂于胥右聖皇出一章章三十句句三字遼水奠平察哈爾之亂也遼水紆流紫塞傍混同長白鬱相望有寇狡焉逞不祥罔顧懿親為國殃師行轉戰尅大荒戎首死葬之以禮陛下仁至義盡與天無疆右遼水奠一章章九句五句句七字一句三字二句句四字一句六字安隴右平王輔臣也隴頭水東西流牙旗玉帳出秦州逆臣間諜隂相投頓令部曲尋戈矛戈矛起白日晦五嶽動百川沸始不戒後乃悔天子聖仁貰汝罪罪臣愧憤頭搶地隴山永安無不利右安隴右一章章十四句六句句七字八句句三字豫章翻定江西賊也豫章翻雲驚白日昏章江與貢水駭浪騰虹奔荆楚撲餘氛竄跡吉與袁野火縱灌莾乘風思燎原煌煌我宗子赫赫崇維垣鉦鼓震地軸力若排崑崙獲醜服上刑脅從乃無論芒角漸以消拱手奏至尊右豫章翻一章章十六句一句三字十五句句五字掃七閩平耿精忠也閩山丹閩水碧東望琉球天咫尺怒濤羣飛海水立有鳥鈎喙傍距躍攫摶徒程勇唼喋思強食鼎沸三山間貪人還自賊妖氛塗炭浙東西彗星橫掃天南北㹠子瘈狗真何益徒使我民不休息降王繫組親王功督臣撑拄東甌東吁嗟范叔真純忠右掃七閩一章章十六句二句句三字十句句七字四句句五字海波平驅海寇鄭錦也海波蕩漭海水浡淈維彼蛟螭為妖為孽天吳罔象跳蕩震越二世逋誅毒痡苞蘖東南民力幾為竭帝赫斯怒駕黿鼉為梁射鬐斷鬛掃焰吞光金門厦門波不揚曈曈日出窮扶桑右海波平一章章十五句十一句句四字三句句七字一句五字平五羊討尚之信也五羊城南接朱崖西桂林香山海門蜃氣深駃騠超母行從禽梟子啄父毒氛侵坤維反側來相尋忘恩反噬昧照臨負且乘危薰心通逆書阻貢琛殱忠良寃沉沉誰烹魚溉釡鬵金戈指白日隂貫甲馳卒成擒嶺南瘴開啓版宇闐闐振旅淵淵鼓勒勳紀績銘銅柱右平五羊一章章二十二句十三句句三字九句句七字桂水深定廣西亂也湘江南連桂水深粵西瀧岡鬱沈沈鳥飛不度獸不臨黔陽溪流多毒淫嗟爾孤軍惟女子贅壻不臧身徒死國家興增如山崇說築傅巖誠國士右桂水深一章章八句句七字殱渠魁吳三桂伏天誅逆黨漸自解散也渠魁倡亂脅從多滇池夜郎阻天戈襄荆沙含毒短狐風號閩粵皆揚波念爾功微賞已過輒背信誓搖山河天用斬厲正厥辜鬼瞰神怒誅獨夫惠迪則吉從逆凶逆臣安獲邀考終天家王鈇威無窮廟謨符合聲應響先天弗違如指掌君不見王敦崔杼皆前死斫棺銼骸無漏網右殱渠魁一章章十五句十四句句七字一句十字洞庭湖平湖南郡縣也嶽陽樓洞庭水連雲蔽岡征塵起舳艫輜軿繞千里賊烽西自辰沅來渚宫徹夜驚戎壘雲旗獵獵下長沙蒲帆矗水風交加賊營平地木斯拔連山白骨真如麻元戎奉詔往直望無要遮朱旗綘天甲暗日流沙染血成紅霞廷臣拱手服廟謨阪泉丹浦威無加右洞庭湖一章章十六句二句句三字十二句句七字二句句五字收成都平全蜀也岷山之英為井絡萬里黃雲踰劒閣蠶叢魚鳬樹國久不通秦塞疆戎索後服久需聖人出先畔或因王者弱本朝教訖西南陲從駹朝冉存卭筰三窟毚兔營獨狡五丁金牛遂同惡隂平道嘉陵江桓桓將軍智略雙水行陸走羣力扛勢同決帆與摧橦錦江玉壘仍我邦桂浦金沙月照忩右收成都一章章十七句十五句句七字二句句三字克黔陽定貴州也羅施僻一隅桂竹林篁間山行雜苗箐路險叢溪蠻妖氛阻聲教相率為獷頑王師火烈烈閃斗朱旗殷雲屯紅欱野霧積雪噴山直將搏貙兕一往肯驟還水西無平沙修澗曲灣灣奢安勝國際十載師當關何如此神武俯首誰抗顔獞歌百千聲呼號相追攀趨吉悔自凶不若絶神姦右克黔陽一章章二十句句五字定昆明誅吳世璠平全滇也西南天末皆羈縻六師雲集風馳一隅穴鼠困鬬何為徒析骸易子羅棲掘蟄生無時天子明見萬里使臣詔促師期軍中發憤一鼓氣作陳雲杼軸深迷蟊賊內訌相危逆孽窮斃戚自伊貽脅從倒戈來追隨壺漿簞食迎王師奉德音赦過宥罪涣號𢎞施元戎十乘惟騏捷書露奏京畿八荒震叠天威聖皇至德如斯惟永清垂拱穆穆無為右定昆明一章章二十三句四句句七字十一句句六字六句句四字一句十二字一句五字文德舞告成功也穆穆無為照臨下土奏武功歌為文德舞敷天與率土俯首皆來庭際㑹欣六合望風仰太清二儀同造化地平而天成風雲與時感日月同其榮羣臣咸在列濟濟多頌聲聖皇惟乾乾夙夜敢荒寧孝治奉兩宫謙冲德不盈至誠感穹蒼爰以致太平祗承文命謨思日庭堅贊永懷舜日億長侍堯年萬右文德舞一章章二十四句四句句四字二十句句五字皇清文頴卷五十一
