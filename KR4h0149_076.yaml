body:
  text: 詩七言律詩滇南蕩平恭紀六首有序髙士竒康熙二十年十一月十三日夜滇南奏捷臣士竒謹同學士臣英至乾清宫御榻前叩首稱賀皇上天顔欣暢諭臣等曰朕仰邀天眷四方大定今日誠為天下社稷而喜但念用兵八年道路轉輸黎民困苦又復惻然於衷大哉王言當乾坤再造慶出非常之時尚以一夫不獲為念此皇上好生之徳上感天心式開億萬年無窮之太平也臣在光天化日之下愛戴難名既撰聖徳神武頌奉揚鴻業忭舞之私有所未盡更賦七言近體六章并呈御覽雖巍巍蕩蕩莫罄萬一而朱鷺之奏康衢之謡均有所不能已爾葭飛玉琯一陽回快聽天南捷奏来魚鑰特傳宵禁啓鳬鐘催動曙光開萬年元㑹占庥歴六宇清寜本睿裁孝慰兩宫情備洽懽生殿陛響春雷百道軍符赤羽飛同時閩粤載天威鯨山甲帳先輸欵珠水樓船又解圍破竹已知長䇿在投鞭旋報凱聲歸頻年戍鼓依楊栁六月還須奏采薇凝笳疊鼓剗孤城滿路壺漿市不驚梟獍已摧餘孽盡攙搶直掃巨妖清牂牁南去通重譯阿僰西来罷逺征野老扶藜歌帝澤熙熙皥皥樂昇平宵衣旰食切宸衷將帥無慙授鉞隆傳檄烏蠻歸正朔勒銘鐵柱紀神功藁街已見誅元濟輦下喧聞殪李雄晉李雄叛於寜州即今雲南府從此至尊南顧釋羽書不到建章宫雙龍闕下布絲綸泰運初開宇宙新頓起瘡痍恩似海𢎞敷雨露物皆春九州治績須羣吏萬姓懽多賴一人省却軍供民力緩借籌不用度支頻欣從香案侍彤雲司馬慚無諭蜀文青笮風謡時欲獻碧雞典禮意徒殷寰中鳳綍傳新詔閫外龍韜䇿上勲珥筆但將鐃吹譜賡颺常戴聖明君車駕出達希喀布齊爾口喀爾沁廓爾沁諸部落率其所属伏迎道左髙士竒直北幽崕早向誠不須更築受降城職方紀載梯航路王㑹傳呼拜舞聲紅綻邊花迎雉扇青揺巖樹轉龍旌太平遊幸非征伐豈是元封自勒兵五日西苑泛舟侍宴恭紀四首髙士竒新蒲刺刺滿瀛洲令節欣陪聖主遊日出金支明兩岸雲移玉仗向中流嘉魚已慣迎仙鷁好鳥偏能識翠虬香溢堯尊傾湛露恩深漭沆總難酬紅嶼青林閣道重凌晨霽景散千峰是日時雨初霽牙檣錦幔懸翔鳯水殿金鋪隠濯龍仗外輕隂當檻静筵前積翠入杯濃此身疑是来天上瑶島風光彷彿逢髙張廣樂播南薰寶幄樓船劍佩分玉澗鳴泉雲際落璚簫奏曲水中聞槐烟宻羃依巖障藻影紛披寫浪紋共喜昇平饒景象豈同漢武宴横汾仙艾靈絲傳五日蘭餚玉爼挹天漿荷浮小葉團青蓋榴吐新花簇綘囊自有輕舠争奪錦不須駿馬獻穿楊舊傳五日有過錦躤栁等宴含情擬進江心鏡唐時五日於江心鑄鏡呈獻多恐名慚鵷鷺行恩擢翰林院侍講恭紀二首髙士竒右銀臺路曳華裾唐時翰林院在右銀臺門内興慶池頭賜直廬羽翼難同阿閣鳯飛騰早化北溟魚花開繡嶺春随輦月滿金鑾夜著書李白特承恩遇著書金鑾殿千載微臣良際㑹漫勞詞賦比相如鶯遷碧落日初升出谷驚㸔寵命膺豈有才華千尺錦直慚名姓一條氷鳳書特降綸扉誥鶴綺新頒内殿綾此際恩波真浩汗鼇峯頂上許先登夏日直西苑恭紀四首髙士竒碧網丹甍閬苑中六龍駐輦翠微宫雲牕近處衣常潤水檻開時楫可通路接三山疑泛海臺髙百尺逈凌風周廬禁衛森嚴列隠隠仙璈下逺空輦道青莎軟作茵叢樷葭菼徧芳津蘋灣銷夏偏宜雨桂館招凉不受塵虹跨長橋排雁齒閣連飛宇次魚鱗自疑豈是登瀛侣珥筆叨為侍從臣蓬壺窈窕隔塵凡曲渚斜開錦石嵓紅蓼晚凉清竹簟緑葵晨露濕絺衫游魚得水閒依荇畫鷁迎風自引帆正喜遭逢承御幄光天未敢荷長鑱勤政樓前㡬暇時古槐夹路影參差趨朝瑶浦呼舡渡退食天閑賜馬騎出水蓮房初結子沈波菱葉細牽絲何須作記遊西苑日日螭頭一獻詩南書房侍直詠春雪二首髙士竒紫禁濃隂闢曉扉髙空黯黯雪霏霏飄来滿地梅初落吹向漫天絮亂飛阿閣餘寒迷晝影遥岑積素送清暉年豐未報三冬瑞盈尺今㸔遍帝畿乍剪輕綃灑玉塵流光淡宕總陽春潤添百草萌將坼融入千林葉未新自與氷霜同皎潔豈随波浪作沉淪欣瞻御藻歌黄竹撫景先憂及兆民恩賜御書千字文巻莱衣晝錦扁額恭紀六首髙士竒綘闕巍峩霄漢間螭頭龍尾又躋攀恩綸特自雲中沛日馭初從河上還淑景融怡開夀域晴光明媚霽天顔回翔别苑無窮勝緩歩仍随供奉班七曜奎文麗日星筆端造化藴空靈揮来千字成俄頃力轉鴻鈞作典型逺泝遭逢超載籍擬傳渥澤勒碑銘親題縑尾昭謙徳數語真宜比聖經回思少壯直彤墀矢竭驅馳答主知微效豈云勤夙夜孤踪常得託培滋蒲經秋雨摧何早稊被春風發已遲今日天言憐舊事小臣感極轉増悲三畨漠北扈龍鑣將母陳情荷聖朝皇康熙三十六年臣扈從具疏陳情䝉上親平漠北回鑾後恩俞允寒暑屢移更緑鬢山林雖逺戀丹霄傾陽葵藿心徒切抱節松筠志未銷忠孝本来無二事始終期不負唐堯十年鰥獨守荆扉母子㷀㷀曉夕依乞得閒身榮晝錦暫從野水悅春暉欣逢八表呼嵩節肅拜重瞳覲日歸自此草堂多慶豫鄉人争㸔著莱衣叩辭黼扆就征鞍欲報恩波倍覺難頭上縱教増髪白胸中猶自耿心丹再瞻龍衮嗟身逺堅守魚磯保嵗寒悵望觚稜㡬回首摛毫先已淚汍瀾恩賜杭州新貢岕茶二器恭紀髙士竒琅函嫩碧貢雲衢嘉瑞封題第一殊宋政和間命稱貢茶太平嘉瑞顧渚春生白石乳香林名重紫瓊腴浙江顧渚山香林洞産茶最佳烹来明月光初滿飲後清風暑却無嵗嵗恩霑三百片晚甘滋味勝醍醐辛酉二月引見乾清門命充日講起居注官恭紀秦松齡曈曨暁色啓天關玉陛傳呼侍從班廿載重来趨鳳沼三年今始識龍顔淵衷黙契圖書表瓊翰髙懸日月間忝拜新恩叅講席纎埃何以益邱山夏至陪祀方澤施閏章雨後仙壇碧草芳遥聞玉輅出芝房崇墉栢帶青霜氣方澤波含明月光天仗旌旗嚴咫尺精靈岳瀆走蒼茫朝来回輦西山見五色晴雲接建章曉入西苑施閏章新蒲古栢曉隂隂太液昆明接上林翡翠層樓浮樹杪芙蓉小殿出波心人歌鳬藻衣冠㑹水奏箾韶鼔吹音欲望天顔真咫尺露臺廻合彩雲深御札賜内直侍臣天花和王侍讀施閏章靈卉䝉將麗藻誇驚分珍饌出天家秀疑漢殿銅池草潔比雲霄玉樹花生摘餘香如帶露烹来仙液勝餐霞共傳藜閣承㤙重不數東陵五色瓜勑賜翰詹諸詞臣鮮藕恭紀施閏章水殿傳呼特賜榮詞臣拜舞集承明真從太液仙源出肯數蓮峰玉井生列案一藂氷共白堆盤千片雪同清楓宸魚藻恩何限葵藿長懐就日情平滇凱歌八首陸葇南詔昆明舊有池逺開幕府屬清時相期入殿朝三帛豈意當關誓六師鶉帝夙沙終受版熊皇指霧早懸旗蠻雲瘴草從風偃香栢還沾雨露施長沙反側羽書多天與風雲壯止戈箐嶺欲遮庾嶺樹盤江遥蹴晉江波已傳烏石俘王郢那許花田葬尉佗獵罷郊原三窟盡回㸔毚兎舞婆娑斾斾青旌指越嶲赦書終不宥鯨鯢開疆依舊通花馬奉使無勞祀碧雞都統印懸羅部北羽林軍返夜郎西妖氛一著戎衣定諸葛山髙息鼓鼙霜戈雪鎧渡天橋濺水梅花篴外飄石燕城邊開玉帳木蓮樹底建金標征南將令嚴無犯逐北軍鋒勝不驕僰爨彩雲重見䖏百蠻羅拜漢嫖姚渡瀘甲騎夜投鞭龍虎争如八陣堅盡道巴人驚草木肯教䝉氏領山川朱旗霧向苴蘭捲赤箭雲從石賧傳早識西南皆故郡仙槎勿復問張騫陣雲烽火徹龍關計日長楊聽凱還壁壘精嚴連白帝版圖遼濶𨽻烏蠻十行飛札標三洞一片鳴鉦響萬山挽盡銀河兵甲洗月明不用指刀環妖星一夜落寒芒共樂天朝化日長繡靣蠻丁芟紫棘花眉苗女摘青桒貢琛土俗圖王㑹授鉞勲勞冊尚方帝徳照臨原自逺雕題鑿齒盡梯航葡萄江水接金城露布星飛只㡬程鑾輅乘時當講狩鳳樓宣捷共聞鉦嵩呼劒珮来重譯樂奏簫韶合九成從此宵衣垂拱治康衢擊壤頌昇平瀛臺賜宴詩四首有序陳維崧粤以嵗次重光支逢作鄂南薫謝令西顥乗權皇帝方居清暑之崇臺御招凉之邃館用頒大賚載衎羣工若夫路入東華橋通西苑莎偏泥泥秋未露以何晞樹只騷騷夜不風而自響霏㣲殘月銀弓猶挂於髙城歷落踈星珠斗尚斜於逺岫坐平沙之似毯肅俟傳呼藉嫩卉以如羅遥憑宣喚赤烏毬躍魚鑰争鳴丹鳳書銜龍樓早闢雞人喔喔飛繡鞚以遄催虎士駪駪翼珠珂而並入紅門䆗窱水靣巳維青雀之艭紫掖逶遲栁絲先隠黄龍之舳俄傳泛艇盡許登舟斯時也太液波紅一奩靺鞨上林烟碧滿坐玻瓈黄頭擁畫檝以平揺長鬛撥蘭橈而競發千衫艾葉映水蓼以彌鮮萬綬桃花雜風荷而倍嫮鵁鶄唼呷四圍皆王母靈禽竹栢微茫一片悉姮娥寶樹中流遥矚青為好畤之田極浦凝眸黄是昭陽之瓦誰知帝室皇居之畔别自成村未審南唐北宋之間疇工此畫行到瓊樓玉宇天上晴多除將鳳艒龍艑世間秋少爰乃停綵笮弭牙檣陟陂陀沿峭蒨屢遵輦路距帳殿以非遥㡬折繚垣隔幔城而不逺山呼以拜魚貫而前時則曈曨綺旭赭袍隨繡繖交輝赩赫彤霞御榻屹花磚相向忽覩紛綸之狀陳於殿廡之間夫其叠繒成峰吹紈散霧千箱霜雪割完碧海之綃百篚雲霞販盡平陵之綵鶴頭綾織自尚方局内毬路錦漂從裂帛湖旁雙心檀暈三殿齎来五福鈿窠九重飛下􅌑瓏單複擬綺毳以逾温綷䌨縱横笑豐貂之未暖雖使量来玉尺莫罄恩長縱令負用銅山難勝貺重何期晝永月墮懐中詎信秋初春還袖底擎来水涘鴛鴦解妬以争啼捧向林皋孔雀生慚而輟舞無何而雁翅筵排魚鱗幄比沙明水浄飄颺張紕幕三千野曠秋清重叠列華茵十二紅蘭壓架恰照文廊紫蕚成叢偏揺黼帳銀罍告濯翠釡云調然而羊臑雉醢未便稱珍鴨粣雞纎何由示美即或弋来紫鵠落雋永於雲端獵得黄獐致羶薌於海上羔湘錦帶餅褁紅綾牢丸既弱似飛綿薄夜亦柔如積素抑猶未足以誇禁臠之甘而奪侯鯖之麗也繄爾臣僚夙饜江湖之味惟兹卿尹半居魚稻之鄉儻遂庖虚魴鯉曷用為歡若其爼乏鱨鯋安能取飫䱷師芳餌乍投綸於百子池頭饔宰雕盤旋斫鱠於九成宫外假之雷雨銀鬐颯爽以能飛濟以鹽梅錦鬛軒騰而欲動於是頻頒琮斚滿瀝金觥百壺急送風前之喝盞參差三雅横飛樹底之行杯絡繹酒痕縹碧都粘學士之袍釀色鵝黄齊上叅軍之袂漏沉虬箭尋日影之將斜風捲鵷班倐珮聲之欲散重申天語倍荷聖慈堯階忭舞氷藕堆空文囿趨蹌碧蓮委地盈襟菱芡平抛興慶之琲珠一握葡萄徧灑平陽之銀豆䭾裝寳馬共鵷綺以繽紛擕出銅龍滿鳳城為歡笑九衢迎問何来方朔之桃萬户傳觀不數河陽之果臣綴微班猥叨異數才慚鮑俊菖蒲賡燕鎬之詩文遜班香芍藥奏横汾之曲西苑新晴曉色開凉飈瑟瑟鳳城隈千官秋泛芙蓉舸七月春生琥珀杯碧甃紅墻臨鏡出金簫玉笛拂雲催天家殿閣清如水不信真從此地来黛幙參差紺榭通君王新幸日華宫四圍劒佩山光内一簇貂蟬水色中雪瀑釀来粘緑箬錦鱗斫䖏映丹楓筵前忽訝秋花滿冷艷霜欺葉葉紅繽紛綵幣滿朝班賜出龍紋霄漢間乍撫霜紈氷滑笏遥擎霞綺月彎環絲從濯錦江頭曬衣向穿針節後頒為聽九門鴛杵急宫袍分給侍臣還盡日天香染紫微鳯皇闕下拜恩暉才慚入雒年非少人到游仙遇總稀縹蒂㩦將菱芡重雕鞍壓得芰荷歸天南又報鐃歌競早晚彤弓勞鐵衣瀛臺賜宴二首徐釚翠輦朝臨太液池祥雲多繞萬年枝㸔花詔許鵷鸞並宴賞偏承雨露私緩放蘭橈波蕩漾驕嘶玉勒影參差侍臣擬獻長楊賦簪筆先歌在藻詩栁㟁旌旗拂曉風轆轤聲轉近離宫鳥銜魚子衝波白燕蹙蓮衣墜粉紅縹緲樓臺疑海上虚無簫管出雲中鈞天一醉渾如夢猶識憂勤感帝聰甲子元日賜宴南書房歸上復以肴果二席賜及家人恭紀朱彝尊纔承曲讌侍仙闈又撤瓊筵到北扉嵗酒更番移席勸主恩一念感心微比鄰漏下驚窺户兒女燈前笑攬衣閒向金坡說遺事全家賜食古来稀駕幸五臺山恭紀二首朱彝尊圖經曾識五臺名想見雲從帳殿生節物乍分春恰半登臨最好雪初晴林香紫鴿翻風上月黑金蓮照地明定有山靈呼萬嵗不徒龍象下方迎花宫髙下繞臺懐鐵鏁層層雁齒堦代郡雲山連朔郡北街星斗劃南街千夫試轉清凉石二月如燔泰岱柴望秩百王曾不到天教宸藻首磨崕恩賜内紵恭紀朱彝尊上闌初日映簾犀天語聽傳紫閣西織自珠宫加熨貼擎来紅紙騐封題折枝花訝臨風竝掉尾鯨㸔戱水齊端綺入春恩再洽稱詩彌愧在梁鵜恩賜御衣帽恭紀朱彝尊鶴紋初啓尚衣封藤㡌朱絲自九重日角乍辭宫様稳氷紈不散御香濃玉堂掌故傳他日清鏡衰顔話舊蹤回憶滄江六年事笋皮荷葉釣船縫賜鰣魚恭紀朱彝尊京口鰣魚二尺肥黄梅小雨水平磯乍黏越網千絲結早見燕山一騎飛翠釡鳴薑纔勅進玉河穿栁旋擕歸鄉園縦與長干近四月吳船販尚稀上御瀛臺賜翰林諸臣鮮藕恭紀四首汪楫托根靈沼自年年綠葉金房敢較先華井虚傳花十丈瀛臺真見藕三千是日賜藕計三千枝擎来只似移瓊樹踏出渾疑採玉田從此碧城添勝事肯教珠實擅芳鮮藏蔤無嫌託體卑沉淪不厭出身遲濁流那得汙清節百折終然見素絲滿目空明秋水外一庭虛白晚凉時金盤玉筯誰堪比雪椀氷甌且共持㧞出泥塗仗至尊搴芳豈必在髙原紛披五色終成碧落盡繁花始見根青玉案邊銀浪湧水晶簾外白雲屯遥㸔敕使傳呼處百道清芬出禁門鸊鵜膏與佩刀融片片寒光落腕空共擬截肪同瑩白驚㸔切玉得玲瓏西池舊種千年碧太液初銷十里紅最是承恩逢晦日只疑捧出月明中皇清文頴巻七十六
