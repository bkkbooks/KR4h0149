body:
  text: 賦秋郊大獵賦梁詩正惟聖作覩乃文乃武智勇天錫逺邁前古道洽化淳覃敷下土繼志述事遹追皇祖緬惟謨烈之垂於鑠蒐苗之舉乘農隙而詰戎兵歴周原而臨津圃時廵經五十餘年賔服曁四十八部匪徒樂乎從禽實以資乎講旅爾其寒蟲作語殘蟬咽鳴域中氣爽塞上秋清開廣野而百里聳叠嶂之千層露㸃山楓丹黄成幄潦收石澗清洌無聲草淺獸肥則儦儦而俟俟風高馬健斯龎龎而駉駉撫凉晨之方届應令典之時行天子迺簡爾卒徒卜焉允吉六師載陳萬乘以出旌幟飛揚騂騏走䭿循一逕以逶迤喜百昌之茂實雄闗瞻眺則馬上賦詩廣陌諮諏則林間駐蹕戒金吾之漫驚無害我田禾詔賦額之量蠲克知吾民恤遂乃縈紆沙磧攀陟巃嵸飈凌百谷霧隠三嵕奮一人之神武擁千衞之羆熊左右賢王負弓弩者從公於邁渥洼名産效服襄者我駕旣同行聫雁翅勢總鴻絅森鸛鵝陣之圖法嚴赤白羽之軍容綺霞耀色皜日臨空壯﨣桓於七萃訖聲敎而四通則見夫野豕連羣黄羊彌陸雉兎星流麞麅波屬始則環林箐以成圍繼乃驟岡巒而爭逐任駭獸之馳奔臨至尊而懾伏惟時我皇佩烏號挾夏服澤射麋林即鹿蹂躪封豨捎接鸑鷟鷹逞攫拏盧供呼蹴風翎掣耳霜鋒睒目灌莾叢揺飛烏頸縮看一發之威張仍三駈之恩渥受殪者流血朱殷逸圍者驚魂觳觫用循狩野之文藉供登爼之肉陋上林於漢武嗤七澤於周穆於是大綏罷抗上殺紛䭾計鮮數獸甡甡孔多兩牡之從莫比三狐之獲奚過特賞聿酬乎虎旅餘恩兼逮夫鸞坡刀割火燔鱗次駢羅厥儀以備其禮則那此聖主載覲耿光非侈雄風之賦而從臣欣傳盛事欲賡吉日之歌者也夫聖烈克善繼繩大孝尤垂永乆有事武功敬將文母黍禾低拂扶輦塍間幕殿高張問安門右升幔城而怡色笑旣豫以康視御膳而晉肥鮮維㫖且有方閲秋中冉經重九受琛呈艾納之香介夀薦菊花之酒雖大漠其偶臨徴尊飬之彌厚臣職司槖筆行効服裝數奉清塵於豹尾獲瞻偉績於龍驤力乏策鞭彌慙短馭才非作賦雅慕長楊不諳釋氏之經未嘗止殺曾讀相如之疏頗鑒垂堂竊綢繆於未雨願儆戒乎作荒凛登危之明誡懷御朽之良方永為後式廸惟前光亂曰時畋兮奉祭祀戒不虞兮習戎矢考舊典兮禮經焕新猷兮天子仰丕烈之於昭兮奉慈顔之有喜凉風戒塗兮法駕北指雲䍐兮輕移塞垣兮戾止羽林夾扈兮連鑣畨部来同兮結軌大圍兮周環沿谿谷兮邐迤屹如山兮逝如水百獸匿兮深林裏月弓星礟兮惟君之使落飛鳶兮殪大兕法湯仁兮網廼弛大庖充兮娯慈寧旌門錫兮勞將士簡軍實兮柔逺邇苞桑永固兮千萬紀聖駕東巡盛京恭謁祖陵大禮慶成賦有序張鵬翀皇帝御極之八年秋七月奉皇太后鸞輿䖍詣奉天展謁列祖陵寢逮及從龍諸勲戚一體酹奠禮成御崇政殿頒詔加恩用光祀典周廵藩落順時獮狩冬十月車駕還京帥臣備員講官軄司記注竊以我朝發祥長白創業東京中原定鼎以來丕顯丕承祖功宗徳實式憑焉我皇上治洽重熙孝隆繼序兹行也繼世宗之志述聖祖之事煌煌乎國家之鴻儀鉅典不可無述而誌也不揣謭陋竊采成周雅頌之義廣漢代上陵之辭而為兹賦謹拜手稽首颺言曰猗與禕與我皇清之受天眷命而光宅四海也蓋積功累仁乆矣黙孚於真宰值明祚之將衰猶玉步之未改旣馨聞乎上下益懋敬而無怠宜其龍飛鳯翔蔚然炤燿乎符采是知萬邦之翼戴維新列祖之詒謀斯在比有邰之肇興同后稷以無悔斯聖子神孫所繇瞻拜橋陵而永懷於億載也聖皇奉圖受玉率祖攸行孝思隆於下武濊澤洽乎羣生永思維艱旣克肩乎宏鉅陟降左右每仰瞻乎穆清單厥心而肆靖儼夙夜以儲精水千年而一色山萬歲以同聲列祖之園陵在望一人之祗謁惟誠歲在癸亥月躔庚申閶風應候蕭露零晨恭侍金輿喜映慈幃之色笑遥迎玉輦長銜聖主之恩綸萬乘啓行於北闕兆人歡躍乎東廵爾其原隰畇畇黍稷薿薿近郊則烟靄萬家逺障則晴巒千里城頭之曉月如弓塞上之晚霞若綺貔貅列帳擁星廬而刁斗森嚴虎落三嵕動金鐃而弓刀奮起時廵翠㡌瞻雲日以就聖人藩服旃裘渉風沙而從天子舟惟玉以及瑶想當年之䟦履峯明納綠翻荼火之旌旗塞接銀潢壯星辰之壁壘雕弧射鹿駐輿而先獻慈寧玉醴浮觥率舞而同賡燕喜蓋桂輪將滿適當萬夀之辰而海屋重添正應九皇之紀依聖母以承歡偕中宫而受祉是則祖宗之篤祐永綏陵寢之垂庥未己者矣旴衡列塞控馭九邊時孟冬之將届聖駕廼蒞乎奉天王迹所肇興京在焉英額之門屹若隆恩之殿巍然三百里内三陵蔥鬱而相連羣工于是駿犇走執豆籩萃萬國之懽心冠裳翕集煒五陵之佳氣鸞鳯相鮮寳劔玉衣緬英姿之颯爽金戈銕馬挺壯氣以廻旋灑落君臣至契信符乎魚水馨香爼豆精靈不隔乎重泉此聖主矌世之仁爰及苗裔而興朝無疆之恤有永萬年者也祀事孔明典禮備舉御玉殿以慶来章降絲綸而隆錫予蠲租賜復惠深京邑蒸黎進秩酬庸榮被中朝簪組是皆繼述之大端舉運量於皇𠂻而率循乎聖祖于焉周覽風土徘徊舊基燕衎而勲戚咸集賜酺而邦人宴娭樂遍五行之舞歌闋三侯之辭吾皇于是睪然而高望穆然而深思緬葛燈之舊制撫茅土之堦茨能不懼後人之增華而踵侈墜前王儉樸之留貽乎松山杏山過征戰之故壘髣髴乎躬擐甲胄櫛風浴雨而驅馳後之人其可忘創業之艱難守成之不易而隳茂世之洪規乎蓋駿命靡常天難諶斯自古聖王防險戒逸居安思危昭示來兹昔遼左之一隅聿興鼎業今金湯之萬里不限華夷雖曰旣安矣旣治矣能不終固之又固之此我聖皇所為凛若春氷不敢躭深宫之燕佚烱傳寳籙如聞夫列祖之嗟咨者也惟帝眷懷是咨是度長白峩峩高山天作四郡旣開三韓漸拓入編伍而旂分聼指揮乎部落望祀有秩懷柔是若靈爽肹蠁豊功懿爍雲雷屯險溯草昧之經綸日月光華粲隆平之禮樂是以陪京駐輦致觀風問俗之殷行殿捧觴備愛日娛親之樂揚旌駊騀而劍舄流連弭節紛綸而威儀有恪誠足以荷靈貺之綏成稱裒對而無怍豈止眺山川之雄竒玩物産之饒沃海波滉漾呈徑寸之明珠地氣華滋劚三椏之上藥而已哉彼夫漢高豐沛光武南陽太原啓聖上黨興王皆歸功于創建數疇昔而慨慷逮易世之多故每纒悲於露霜獨我朝之聖聖相授實逺邁乎漢唐吾皇嗣統之八載臨躍龍之舊鄉百年故基問遺老其旣盡雲孫累葉調玉燭以彌光豈非古今之僅事而聖代所獨彰者與矧吾皇之繩聖武而法乾行也卜歲叶吉練時孔良百靈呵䕶十駿騰驤宜雨而雨宜暘而暘軔初發而清風披拂斾將廻而瑞雪飄揚天人恊應百福千祥猗與吾皇將何以敬天庥而答神貺乎漢家猛士守四方藎臣念祖扶周邦願吾皇帝勤側席無遺忘忠言苦口利用嘗伏蒲悃欵排天閶願吾皇帝咨交儆無怠荒不矜不伐式夏王不邇不殖儀成湯憂叢脞勅幾康願吾皇日慎一日師虞唐丕休哉吾皇敬慎常若此燕皇天昌厥後萬年景運有不昭融祖徳靈長哉小臣黍列赤墀之下綴青𤨏之班雖未奉屬車在後如長依玉殿中間昔聞玉帛初歸鑄九州而作鼎今見金甌永固羅四海以為闗仿漢上陵羽衛未妨農扈法周廵狩車攻逮及禽頒願奏囬鑾之曲徐看振旅而還映日成文敢次從臣之嘉頌掞天作賦惟循聖藻以回環重曰聖皇繼軆大承乾兮仁風暢普膏露溥兮開基奠鼎溯艱難兮橋陵在東鏘八鑾兮禮隆樂備鬱封巒兮永思追孝履霜寒兮勩勤纉武儆游盤兮六龍廵幸兆人歡兮荷氊被毳仰榮觀兮震威懷徳拱堯壇兮萬年嗣服永奠安兮聖駕東廵盛京恭謁祖陵大禮慶成賦有序竇光鼐乾隆八年秋七月皇帝時廵於東祇謁三陵纘舊服也臣聞之孝經曰昔者明王以孝治天下故得萬國之歡心以事其先王王者家四海子萬姓民康物阜備腯咸有所謂馨香無讒慝也我朝肇基遼陽奄有區夏聖聖繼承肅將祀事皇上孝思惟則聿繩厥武奉皇太后而東肇禋迄用有成肹蠁周浹神人洽暢錫類推恩懽呼雷動仁孝之義備矣微臣窺天測海仰見萬一拜手稽首爰獻賦曰於皇時清祖宗濬哲欽明苞四葉之葳蕤殷二聖之光靈綿𤓰瓞於東土陶復穴而靡寧荷帝耆以啓運規方輿而作京於是我世祖乃仗大順揚天聲掃畔换蕩欃槍敷皇極以創業拯蒼顥之頽綱欽若聖祖離明重宣裒對化洽緝熙心單覲耿光於列聖識王業之開先溯鍾靈於遼瀋加崇樹於陵園薦明徳以升馨推燕及於皇天仁風所被羣生靡然窮髮以北越裳以南陸讋水慄而来賔焉有不享其贄幣者六十一年亦越世宗奉藩底績駕言徂東祭告是飭洎乎踐祚康田功而無暇逸者十三年如一日惟我皇上累熙洽於世業承顯懿於先徳瞻堂構兮依然儼羮墻兮髣髴凛陟降以保明永夙夜而祇栗者蓋八年於兹矣於是肆覲羣僚廣沛綸音宗伯議禮天官恊辰敕堪輿使䕶野兮屬方神以梁津戒飄風以清道兮召凍雨而灑塵然後建辰旒結翠蓋曵雲梢張霓斾飛九斿走七萃戢駍隠齊沛艾奉慈寧而御金較發皇輿而䇿天駟蕤綏蠖畧灕虖襂纚焱焱煜煜魚頡而鳥䀪兮雲軿華芝之旖旎也總總撙撙雷轟而電掣兮千乘萬騎之雄詭也排閶闔而啓行兮挹雲山於縹緲陟高衍之嵱嵷兮超紆譎之浩淼望舒夾轂而飛光兮羲和廻鞭而流杲水后傅警而躨跜兮山靈稱蹕而窈窕白虎右踞而軒鬐兮青龍左旋而夭矯夔魖潛形於黮􅩙兮獝狂聞聲而蹶倒於是總六校用三驅横干將仗錕鋙彎烏號發天弧妙更嬴踰蒲且捩雄虺掃封狐跨野馬蹍距虛格奔兕摕飛鼯闐雲羅震地廬淫淫裔裔轇轕轠轤指顧倐忽屬車充盈解罘開網振旅天行威讋荒徼稜憺王庭旃裘魋結之長稽首稱藩獻琛執䞇來享王於塞下者蓋数萬以二然後躡邊月御朔風緣林簿翍䝉茸渡析木而羾箕尾兮駢結轡乎天東瞻高山而履夷行兮緬荒作之神功爾廼長白崔嵬巫閭巃嵸欱歕鴨綠磅礴混同滙以天池之竒亘以地軸之靈蟠以螭龍之窟拏以虎豹之扄及乎烟雲巻舒揮霍出没霅然陽開帥爾隂閉風雨之所和㑹日月之所旁魄雷霆之所鼓盪星斗之所伾仡霞駮波沏䝉合霧集蔥蔥然鬱鬱然擁帝陵而孔固挾王氣以成霱於是大丙弭節六軍銜枚鵷班匐伏雉尾中開乾情顧矚而愉怡禮官奉御而徘徊屯虹旃於輦路排仙仗於瑶階重闥寥窲以櫛密茂樹蓊鬱而氣佳乃搜逑索偶序賢擇能相與澡心滌慮澄神歛精返聰明於蠖濩之室清徒驥於錙壇之宫靡薜荔以為席兮吸瓊芳之露英侔神明以為資兮契元符於杳㝠廼詣永陵開運穹崇包孕元氣吐納鴻濛有邠館荒度之基焉廼詣福陵天柱翠沓跨躡百貊横被六合有岐陽式廓之規焉廼詣昭陵閟宫雲竦隆業居尊蒲蓮星拱有豐垣攸同之治焉作求世徳来許昭兹元祀惟稱百禮孔時麾葩瑵舉洪頤錯白茅班黄彛潔葅醢修明粢割五牲效三犧上卿贊采太史誦詩庶官獻幣六祝陳辭揚戡定之赫奕兮溯謨烈之燕詒天子穆穆以鬷假兮顯相駿奔而宗祈爾乃尚氣尚臭於隂於陽徳產畢致神保是皇進觩䚧之圭瓚和泔淡之秬鬯嘉栗無違普淖斯饗苾芬旁融樵蒸焜上蕭薌升兮熛訛焄蒿感兮悽愴於是我皇上遊神於漠合氣於幽心存色授目想形留流水汨汨崇山矗矗禹甸畇畇周原膴膴此我列祖之所開疆而拓土也築室翼翼四方之極軒黄熊墟祈帝陶邑此我列祖之所正方而肇域也琬琰天球刀訓河圖斑陸上下光越璠璵此我列祖之所闡珍而握符也黼純席几繪繡繽紛精矅華爥如生如存此我列祖之所衣徳而紹聞也環顧百僚濟濟蹌蹌東戣西劉左右奉璋此我列祖之所譽髦而思皇也睠言萬姓林林總總耕水耨火助我粢盛此我列祖之所惠懋而敉寧也精屬屬以徃来思勿勿以微探耳返聽於閴寂兮忽愾乎其聞嘆目收精於廣莫兮羌僾乎其有見洞廣開兮帝閽紛其乘兮白雲靈皇皇兮來歆吐瑞氣兮氤氲儐暗藹兮褊􅝆殷靈風兮冲天乘太清兮降監委繁祉兮如山於是皇儀曁孝思展羣歡洽式榖戩報地靈所自鍾遡天潢所由演懷柔神祗望秩山川諸侯三公所視維䖍槱燎熛煬上致高煙碩麟含輝黄龍吐炎五精歆馨而顧徳四靈效順而攸安廼蒞盛京雲䕶日邊九市開塲萬家起烟居靡近逺人無後先黄童奔走白叟徃還士女頒斌衣冠聯翩莫不動容發聲引領駢肩詠盛徳而獻讜言歌曰帝之來兮雲飛誕我祀兮聿歸望龍旂兮裶裶懷吾人兮覲德輝天顔咫尺兮其不違天子顧而嘻曰咨爾父老兮殷子相望永言不忘兮惟梓與桑予其夙夜兮恒勤思於平康廼鳴和鈴遵通衢敞華闕啓宸居有嚴崇政有翼篤恭左冝文德右昭武功闗雎麟趾永奠清寧閣開翔鳯時乘御龍藹藹周親濟濟臣工趨丹陛而近日伏玉墀以呼嵩爾乃鼖鼓殷雷華鐘發鯨孤竹間奏空桑和鳴列八佾抗五聲盡六變齊九成韶武隠轔鈞天鏗鍧僸佅兠離并附雲英氣盛化神旣和且平於是命膳夫開瓊筵御嘉珍窮芳鮮沛宫父老把酒極驩南陽故舊載笑載言於焉歌豳稼穡艱難躋堂稱觥萬夀祝焉於焉歌雅泉原庶繁酌匏執豕君宗頌焉當斯時也雲靉靆兮雨滂沛恩鴻溶兮澤汪濊綸綍頒兮車書會謳吟同兮雷聲礚哤䀨乎寰中馺沓乎闕外羣臣醉徳揖讓而退皇上觀衆庻之説豫覽福應之繁昌仰維鴻烈雍容揄揚控天地以選義綜古今而成章萃人文以化成麗景緯而道光暢皇風於億載被金石而流長文徳旣昭武節是宣選徒大閲戎經申嚴赤羽日臨白羽月懸戈鋋星羅鎧甲霜寒次和樹表牙旗高褰鷹揚陳鉦虎虓張弮浸淫蹵部陣勢蹥踡鵞鸛魚麗箕翼鮮扁變出竒正體合方圓山苞川流地吸天旋然後收軍㑹衆翼翼綿綿若電收風舉翕赫乎數百里之間時則黑精司正律中應鐘虹藏凍地日次尾中萬乘廻簿千官扈從仰瞻雄闗嶢屼巊溟俯臨滄海烟恬波平扶桑隠映炙轂上征巨靈贔屭冠山而興神龜翕忽負圗而迎返斾揚鑣還我神京假於太廟告厥成功臨軒穆穆問寢雝雝可不謂元徳之盛而至治之隆乎而聖主猶昧旦丕顯夕惕朝乾飛聰馳明兼聽並觀撫兹兆庶祖宗之臣念兹釋兹衣食之源黄壤白墳何以奠之插雲渠雨何以勸之祈褫禳災何以先之流火授衣何以贍之惟小人之所依思無逸之所嘆審天聽之在卑知配命之維艱是以明徳慎罰宥災除𤯝常畏民生之傷也取財用物賦政任役常懼民事之荒也匹夫匹婦不獲自盡若已納之於隍迨至陶甄無遺雍熙有象老有所終㓜有所長窮有所歸廢有所養風恊五日雨依一旬牧人夢魚桑女聽禽曾孫之醴洽祖農夫之鼔御神京師之錢貫朽太倉之粟因陳守閭閻者食梁肉為吏者長子孫家滌瑕穢之俗人生亷恥之心上絶竒麗而不御下抱元化以含淳我皇上於是泊乎無為愷乎樂康譜虞弦於揮桐聽堯仁於擊壤講徳於昇平之圃登功於穆清之堂問道於崆峒之上考治於汾水之陽使君子小人奕世無疆賢賢親親樂樂利利咏歌前王於不忘者如水奔海如雲從龍如風偃草如網繫綱此真所謂我皇上合萬國之歡心以事先王也若夫登封泰山降禪梁父徒篆功而紀瑞無闗敬親與尊祖由今揆之亦猶棘林螢耀而與夫尋木龍燭也復安可以語哉臣忝預載筆之末推本孝治奉揚仁聲敢敷陳其事而美盛徳之形容頌曰天作高山啓王會兮列聖篤生信厥對兮光靈在天杳旭卉兮惟日在中司厥契兮聿追來孝承大糦兮民力普存融芬懿兮神其攸歆駢獻瑞兮仁恩滂洋渾中外兮垂衣端拱式則大兮明良賡颺熙帝載兮一人有慶兆民頼兮聖子神孫麗萬世兮皇清文頴巻五十
