body:
  text: 論禁原蠶論和親王𢎞晝且夫天下之物有異類殊形之不齊則其盈虛消長之數亦互異有異類殊形而同乎一氣者則其相為盈虛消長必有不能兩大之勢其互異者固彼此無害而生息日繁其不能兩大者要在調劑得宜使無過盈過耗之憾而物理乃以得其平矣如周禮馬質掌禁原蠶非所謂調劑得宜者乎請申論之今夫天有二十八宿而各有所屬房為天駟稱馬祖焉宣王吉日之詩曰既伯既禱是也至蠶與馬同屬氣於午又馬為龍之類蠶為龍之精故月直大火則浴其種是蠶與馬所謂異類而同氣者也夫異其類固不妨於並育而同乎氣亦不可以偏傷使蠶盛則馬衰而地用無資戎車不給將何恃以禦侮然使馬盛則蠶又衰而絲枲不供衣服不備又將何恃以禦寒二者均不可也是以馬質之禁特為原蠶而設則初蠶可以共衣服而馬亦無虧初蠶足民衣則家有挾纊之溫而老者不缺於衣帛以禁原蠶養馬氣則軍有騰驤之用而士卒不患於徒行互以相濟而無偏勝之虞各不相妨而得遂生之樂自非通乎性命之正者烏能及此哉自周以後歴世乆遠馬質之官己廢雖原蠶之禁近無明文然南方多蠶而少馬北方多馬而少蠶亦可見天地盈虛消長之理固有不期然而然者而聖王因之亦順其自然之一道也司馬不具職掌論和親王𢎞晝或有問於余曰周禮序官以下皆各言其所司獨於軍司馬輿司馬行司馬不言其事於是說者各一其見一以為先王耀德不觀兵故司馬不備載其事一以為成周六服承德刑且措而不用何况於兵一以為兵凶戰危軍法秘密是不可露是數說者竊有疑焉吾以為讀書在辨是非明曲直易於師曰能以衆正可以王矣黄帝以來誰能去兵則曰耀德不觀兵泥矣先王正已治人先使德教溢乎四海而天下歸仁然周公曰克詰戎兵召公曰張皇六師未聞武備廢弛至於失傳也則曰刑且措而不用况於兵者迂矣且周家聖君賢相繼繼承承民皆化於仁風而無作姦犯科刑㡬措而不用然而秋官之中又何言刑如彼其詳耶則以知兵即不用未嘗不可言也若夫以兵為凶器戰為危事軍法秘密不可輕露比之他說則畧近之何也四征弗庭先王不得己而用之其他職掌司戈盾司弓矢以備器委人積人以備糧馬質諸官以備馬芻秣之事營柵之事皆有一定之制既歴歴具之以待用若軍行而有軍司馬輿司馬行司馬等則要在臨時制宜審機觀變而發非可定為格式以繩之者自有所不得而詳也奕之法曰古今無同局博奕尚然况軍法乎吾故曰比之他說則畧近之筆公進規論和親王𢎞晝人君一日萬㡬庶政于是乎待理焉即宵衣旰食猶恐不及况强敵在外烽火不寜可以自娯哉魏太武納古弼之規而不以㳺田荒戒備不以徵發輕農功良有以也當時蠕蠕方强南寇未滅其畋河西也詔以肥馬給獵騎古弼留守悉以弱馬給之太武大怒欲斬之官屬惶怖古弼自若嗚呼不從君命以弱馬給獵騎而君欲斬之若夫不備不虞乏軍國之用又當何罪哉古弼為國逺慮不畏譴怒誠得古大臣風而太武輒從諫如流雖違己欲卒能自反亦賢矣哉後復畋于山北獲麋鹿數千頭欲發牛車五百乘以運之既而曰筆公必不與我未幾弼表果至吁知臣莫如君太武之謂也畜君以愛君古弼之謂也太武與古弼能相與有成如此魏雖偏安一隅居然為萬世宗宜哉或曰初畋于河西知肥馬之備不虞而下詔欲給之復畋于山北知古弼之不發而又欲詔令運之將以試古弼之為人耶抑幸其或與而快己欲耶曰二者皆非也其所行之者不勝其私也後之不果者悔巳之過也若夫存嘗試之心則太武為矯情飾詐之人而茍懐冀其幸或與之之念則必有怙過遂非之事矣讀史者平心觀之而不為之惑可也若夫刻薄居心自立主見以妄定古人之是非則無全人矣婁公盛德論和親王𢎞晝孟子曰觀近臣以其所為主觀逺臣以其所主蓋君子小人各從其類是以泰否之㧞茅連茹不同也如狄仁傑之見用以扶唐室由婁師德所薦觀仁傑之所樹立可以定師德之為人矣當武氏廢唐簒立之秋宗族誅戮殆盡正士君子隱而難仕之時也而仁傑獨能毅然自任若預知李氏之必興武氏之必敗而優㳺嵗月卒以成功嗚呼此殆非常人之所能為也仁傑可謂忠矣而當時薦仁傑者實師德也師德在河隴四十餘年恭勤不怠而秉性沉厚寛恕民夷安之論者以為師德之功于是乎在吾以為治隴之功小薦賢之功大民夷相安之功細而薦仁傑以復興唐室之功鉅也師德㧞仁傑于衆人之中未嘗少露其意于仁傑仁傑與之同僚而不以知人目之至太后言之而仁傑乃曰婁公盛德我為其所包容乆矣吾不得窺其際也吁自古薦人者多矣其薦之而望其感德引為羽翼者此下焉者也其薦之而宣揚于衆自誇推讓者此中焉者也若夫忠而忘身國而忘巳知其賢而薦之不求彼之感發于中而言之不冀人之知此上焉者也如婁公者豈後世之所能及者哉或曰武氏簒唐之際年雖衰老而仁傑亦非强壯之時也設令不幸身死而事有不成則萬世將以仁傑為何如以師德為何如也曰師德薦仁傑于朝而武氏信重之厥後張柬之姚元崇桓彦範敬暉等數十人卒成反正之功者皆由仁傑所引㧞是師德薦仁傑之功關氣數之消長盈虛係唐室之存亡興廢忠誠之人自有天助以成厥功二公之事真非偶然也白孝德攬轡安閒論和親王𢎞晝唐肅宗乾元二年史思明分軍四道㑹于汴州又使騎將劉龍僊挑戰嫚罵光弼禆將白孝德請取之光弼壯其志遣之孝德挾二矛䇿馬而進攬轡安閒吾讀書至此美孝德之處大事而不亂服僕固懐恩之能知人而料事也于是抽毫而論之曰垂紳正笏不動聲色者魏公之雅量也得㨗書圍棋談笑自若者謝安之勝槩也二公皆出入將相學識過人故其處大事也不動其心白孝德偏禆之將領將命而深入賊營在識量之淺小者戰兢罔措畏縮巳見于執鞚䇿馬間矣而孝德乃漠不動心安閒自若豈勉强矯飾中無所主而能若是哉其克敵制勝將必有成算定于前者而懐恩己真知灼見卜孝德所以必立功之故可謂能識人矣大凢自古有不勝任之人無不可成功之事逡廵退縮者適以僨事而失㡬從容坐鎮者乃以定謀而决䇿孰優孰劣當有辨之者聞孝德之風凡庸懦之夫拮据于臨事者可以知所愧矣敬輿之學真洙泗之徒論和親王𢎞晝唐德宗貞元八年秋八月四十餘州大水陸贄請遣使賑撫上曰聞所損殊少即議優恤恐生姦欺贄曰晉秦讐也秦穆公猶救晉饑况懐柔萬邦者乎寜人負我我無負人也嗚呼吾讀史至此未嘗不歎陸贄之忠誠也胡氏稱敬輿之學真洙泗之徒詎不信哉今夫負人者人恒負之出乎爾者反乎爾者也失忠恕之道也在常人且不可况堂堂天子凡在區宇者皆赤子也為人父母坐視赤子之饑而不恤何以為父母乎夫九重深邃小民之困苦難聞而代君牧民者又阿諛取悅于上揣君所悅則張大其辭度君所惡則諱匿其事君即明照四海而防察之至隱匿隨之皆此恐生姦欺一念誤之也則過于明察尚恐有欺隠之弊况夫德宗信謟諛之言以為所損殊少不慮民之饑而欲靳其澤以是而防人之負我不亦愚乎陸贄以無我負人一言格君心之非真萬世人君之龜鑑而為君盡忠讜之言如贄者亦萬世人臣之龜鑑也且非特九重而己雖常人亦庶可免負人之恨哉黄鐘理數論誠隱郡王允祉司馬遷律書曰神生于無形成于有形然後數形而成聲神者天地之元氣發于元聲者也無形者理也有形者數也此言非理則數無由生也又曰核其華道者明矣華者數也道者理也言必核其數之真理始可得而見也夫有黄鐘之聲必有黄鐘之數有黄鐘之數必有黄鐘之理若無以明其理即無以精其數無以精其數即無以得其聲蓋理者數之體數者理之用惟理與數相生故人聲與樂器相協而大樂以成焉按律呂新書黄鐘九寸空圍九分積八百一十分注曰天地之數始于一終于十其一三五七九為陽九者陽之成也其二四六八十為陰十者陰之成也黄鐘陽聲之始陽氣之動也故其數九分寸之數具于聲氣之元不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分長九寸圍九分積八百一十分是為律本度量權衡于是而受法十一律由是而損益焉朱子以謂本原第一章圍徑之數是最大節目蓋上古聖人心通造化黙㑹中聲製為黄鐘適符天地自然之數漢晉而後凡究心于律呂者因未詳考黄鐘之真度是以中聲無由而得今欲定黄鐘之管必先定黄鐘之度既得黄鐘之度乃考其周徑面羃積十之相生而較以容黍之多寡然後製以器審以音一一脗合則理之出於自然者無不歸于大同矣卦圖先後天論平郡王福彭天下之理有體必有用伏羲所畫之易乃發揮天地之所以然體之所由立也文王所演之易乃範圍天地之所當然用之所由行也體之所由立故謂之先天之學用之所由行故謂之後天之學然河圖洛書相為經緯先天後天亦相為表裏體用本不相離烏可岐而二之哉蓋嘗就先天圖而論之乾一兌二離三震四巽五坎六艮七坤八此八卦相生之次第也乾坤定上下之位坎離列左右之門震東北而兌東南巽西南而艮西北此八卦所占之方位也由太極而兩儀由兩儀而四象由四象而八卦所謂八卦者謂于四象之上各加一竒一偶而為三畫者八故曰易逆數也若所占之方位則自震之初為冬至離兌之中為春分以至乾之末為夏至皆進而得其己生之卦也故曰數往者順自巽之初為夏至坎艮之中為秋分以至坤之末為冬至皆進而得其未生之卦也故曰知來者逆觀横圖於以見畫卦之立觀圓圖于以見卦氣之行推之六十四卦其次第方位亦莫非自然之理邵子所為喫𦂳為人處也聖人豈有毫髮之私意參其間哉至後天八卦乃入用之位邵子謂王者之法盡于是者蓋乾坤由南北而交再變則乾退西北而坤退西南坎離由東西而交再變則離居正南而坎居正北巽與艮不交而當用中之偏震與兌始交而當朝夕之地此所為天地之用也觀于坤蹇觧卦之象辭皆以東北為陽方西南為陰方可知此圖之出于文王無疑矣蓋自未有畫之時漸而生之以至于六畫皆備者伏羲之易也卦成之後推演其義以為坤求于乾而得三男之卦乾求于坤而得三女之卦者文王之易也究之後天之次雖與先天不同而其理未嘗不一且非特先後天體用之不相離而巳先天之圖固以河圖為本矣而後天之圖亦自與河圖合如離得乾位適當天二地七之火坎得坤位適當天一地六之水震木也而居于東兌金也而居于西木之成為巽故次震而位乎東南金之成為乾故次兌而位乎西北艮當天五之土而居震與坎之間坤當地十之土而居兌與離之際所為寄旺于四季也其彼此符合殆有不知其然而然者學者誠反覆于此而有得焉其于三才萬物之理思過半矣京房考功課吏論平郡王福彭黜陟之典載在於虞書者甚詳周禮冢宰嵗終令百官府各正其治受其㑹聽其致事而詔王廢置三嵗則大計羣吏之治而誅賞之京房言古帝王以功舉賢則萬化成瑞應著宜令百官各試其功此其意未嘗不善乃卒病于煩碎而為衆所排者何哉蓋天下事貴持其大綱得其人以行之而衆目自不勞而治當房之時考課之法行之己久房顧獨矜為一家之學上其弟子任良姚平願以為刺史試行其法而房復通籍殿中為奏事以防壅蔽此其所陳必有異乎人者矣史文簡畧無由稽其得失然大都煩碎之病房實有之宜有以來讒慝之口也昔晉泰始初務崇理本杜預以為疑心而信耳目疑耳目而信簡書法令滋彰官方愈偽莫若去煩就簡委任達官各考所統此蘇洵所謂用力少而成功多法無便于此者也使房能因任自然勸天子綜覈名實揚清激濁雖文景武宣之治不難以漸而復乃除為郡守逺離左右遂懐憂懼汲汲以乘傳奏事為請㨿涌水為騐且自知議論為大臣所非復欲易置丞相中書令庶幾考功事得施行卒為石顯所䧟嗚呼房可謂自貽伊戚者矣且陰陽䜟緯之學儒者所弗道史稱房治易其說長于灾變分六十四卦更直日用事其本姓李推律自定為京氏由此觀之其所作課事必且假經托類溺于小數而黯于大體故必其弟子而後能行其法夫必其弟子而後能行其法此其法之所以不可行歟皇清文頴巻四
