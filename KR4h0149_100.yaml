body:
  text: 詩七言絶句雍正丙午重九日乾清宫賜宴恭紀四首徐本賡揚喜起值簪萸詔許鵷班渥大酺綽立螭頭分左右珮聲徐引上金鋪爽氣橫秋遍九垓門開閶闔映朝回百寮次第看分韻丞相親身授簡來宸章欣賞九秋佳頒示羣臣樂孔皆一氣洪鈞調四序天心原與帝心諧才看蕊榜出天門又侍彤闈詔語溫慚愧儒生叨珥筆螭頭立近最承恩乾隆三年聖主躬耕藉田恭紀十首有序徐本臣聞易稱耒耜厚生之利爰昭詩咏來牟肇祀之文斯著知稼穡之為寶民食居先念黍稷之維馨親耕特重欽惟皇上德洽堯天仁周禹甸神人交協本繼述之精誠府事聿修並清寧之燾育屢下蠲租之詔恩流海澨山陬勤修勸課之經計悉茅簷蔀屋特以重農之政惟率作以方興孝享之儀必躬親而始偹乃於嚮明出治之首式詹藉田秉耒之期節屆中春辰傳吉亥誡事既嚴於官守致齋獨豫乎宸衷於是善氣潛孚休徴立兆甫協風之應律恰好雨以知時芝蓋承花浥餘芳於南畝春旗罥柳滌新翠於西疇用涖崇壇告虔先穡冀三時之不害致百榖之咸登笙簧與葦籥同音羽佾共勾陳並列明禋已肅農器備陳天子乃履似繡之芳塍啓如膏之沃壤控引而犁星運力黃道平分驅馳而牛宿效能青陽畢逹三推具舉一垡爰周俟庶職之遞加藉子來而終畝由是乘兹霡霂播我秬秠轉斿旐以悠揚唱禾詞而絡繹識天顔之有喜知錫福以無疆而况望氣登臺乘陽行令繼省耕而省嵗欲觀象以觀民兩穗並岐固平時之習見五風十雨庶順化以迎庥從此東作西成感民情而悅豫祈年息蠟叶神聼以和平臣職忝贊襄心慚勸相荷恩榮於盛世每聼衢歌叨扈從於崇班益欽帝力五辰常撫敬抒瞻仰之忱百福來同竊附賡揚之末百度修明首重農經邦本計在田功帝廷下詔親耕藉太史先期奏協風夙夜齋心契穆清預將祝版進承明青箱黛耜都親覽總為勤民一念誠禁苑深沉玉漏催聼傳鈴索九重開翠華才駕千門曉天際濃雲送雨來平疇隊仗擁初齊環衛無譁馬不嘶振鷺衣冠趨進耒袞龍袍袖看扶犁雨後登臺看耦耕土膏胍動水泉生獻來穜稑分秧早不待催人布榖鳴緑楊枝密藏鶯羽紅杏花深引燕雛指點煙蓑敲社鼓分明繪出太平圗頻年沛澤遍遐方賜復蠲租數莫量今日三推勞帝力欲教民廩似神倉但感民心便格天萬邦綏定屢豐年直須豫擬歌豳籥報答君王首藉田覃敷美利承天眷遍召嘉祥愜聖心吹徹歡聲揚喜氣凝成瑞靄作甘霖萬幾日體乾行健千畝躬耕穡事親拜舞共欣堯舜治追陪還愧股肱臣乾隆三年聖主躬耕藉田恭紀尹繼善正嵗祈年閲上辛農祥有兆自元辰青鸞銜出躬耕詔玉琯融風滿帝闉雲罕星斿簇仗齊齋宫􅟭屹峙壇西一人親夙蒼龍駕萬戶春聲聼曉雞來牟率育頌思文薦醴升香秩祀殷一片精誠昭格處霓旌平接四山雲黍稷馨惟明德馨知時好雨驗從星清塵細灑千門逈夾道榆楊盡放青深樹鳴鳩勸荷鋤金根繹繹飭農車天田曙色分方罫正是豳風入畫初田功自古重人時暑雨祁寒軫怨咨此日朱紘親秉耒艱難稼穡是真知紺轅千畝駐輕煙已聼司農贊進鞭父老渾忘簔笠賤扶犁恭導聖人前御耦加推數更優春隂敷緑滿平疇民間作苦親嘗遍犁犢還驅未肯收布榖聲中復間歌詞成三十六嘉禾陽回寸草皆生意不獨豐年黍稌多觀耕臺畔列千官邇陌遙塍互欎盤次第青箱分獻種至尊一一霽顔看郊原風景足清嘉堆齒班成靜不譁秩秩銀潢齊載耜明農知已遍天家槐棘曽叨三九行言隨蔥犗課農桑勤勞職在分宵旰庶績惟思日贊襄畇畇終畝及農夫主伯歡趨亞旅呼共識皇心珍土物不誇玉粟與珠襦仙樂空濛近九霄咸豐有奏叶韺韶還將徴角推民事不是遊觀轉玉鑣細草回看輦路明香塵不動午風輕田家景物歸仙仗採入農書分外清萬家生命屬時幾望雨祈晴念不違莫謂深宫無耒耜痌瘝切切是民依乾隆三年聖主臨雍禮成恭紀十首有序徐本臣聞大君觀文以成化聖人明道以開天是以典重尊師秩節必隆於先聖教崇講學鼓徴致警於大昕斯成均有釋奠釋菜之文而璧水志於樂於論之咏也我皇上御極之三年綱舉目張德洋恩普聲教覃敷於六合勳華逺被於八紘當政成化洽之時正樂備禮明之日思纘承乎列聖遂丕振夫前猷二月雷行并祈年於耕藉暮春和應踵詣學於經筵維時黌序聿新廟堂增煥橋門恢廓煌哉四闢之模殿宇巍峩麗矣中央之色炳天章於紫柱字偕二十八宿以成章翔聖藻於華楣義取三百六旬而合撰爰邁六龍之駕肅瞻萬仭之墻發廣樂於金鐘如聞韶響宣嘏詞於玉册恍睹麟書景行非遙儼後先之一揆動容胥中證今古於同堂極一時致敬之忱昭曠代稀逄之典隆儀大備講席爰開聖藴精深洗羣儒之陋説天顔睟穆協多士之環觀契位育於中庸法欽明於帝典心傳洙泗治效唐虞疏經術者萬言悉睿思之一貫忭舞風生而雷動拜揚霧蔚以波騰發矇者揭朗曜以經天遵路者順長河而歸海悅服於兹極矣栽培彌有加焉觀光畀以榮光錫極因而錫福行見英才輩出教思彰道德之化神景運宏開文治並乾坤而悠久臣叨依雲日謬次鹽梅幸傳韋氏之一經未備孔門之六藝仰覩作人盛事豫聞至教精微贊助無能對揚莫罄肅將蕪咏敬矢葵忱云爾聖學淵深邁百王統傳洙泗道彌光辟雍肇舉尊崇典鑾輅親臨爼豆香天氣清和景物昌曉鐘聲動靄蒼蒼雲移鳯輦層霄路風揚鑾旗數仭墻摛詞染翰動星文鳳翥鸞翔逈不羣翹首宸章懸日月辟雍佳氣曉氤氲象尊龍勺斕斒列澗藻池芹次第陳虔奉尼山香一瓣須知昭格在明禋入廟虔修釋奠儀備陳鐘鼓列尊彛禮行逺邁千秋典道在心欽萬世師禮成樂備日方中紺幄遙開瑞靄籠君道難名師道立棠梨花下坐春風從容學圃愛三餘不數蘭臺與石渠今日袞衣升講座牙籤親展聖人書堯典欽明冠古今孔門性道闡精深從知位育平章業都在雍宫肅廟心文思天子振儒宗哲裔趨陪六館從觀聼萬人環碧沼緑槐階下拜山龍大沛恩膏渙德音恬熙氣象感羣心歸來靜坐絲綸閣默念天家教澤深乾隆三年聖主臨雍禮成恭紀八首尹繼善章天雲漢燦奎光門啓櫺星爼豆香夾道松隂新鬱翠重簷鴛瓦煥離黃才見明禋格上丁更諏吉旦薦惟馨禮修釋奠虔三獻教在親師闡六經噦噦鏘鳴建羽儀翠旌迎處見恬熙欣傳聖道昌明日正是光華格被時宸章絢爛麗銀鉤贊化功能洵莫儔不是心源相契合焉知天地與同流無言盥獻逹精誠玉豆雕籩設兩楹大樂從知臻善美始終條理太和聲數仭宫墻入望中教垂萬世仰崇隆欲觀美富門難得特許儒臣助祭同黼座親翻玉笈開一時雲物覩昭回睿思包盡圗書祕不藉崆洞訪道來駿奔執豆荷恩榮濟濟雲礽耴次行錫賚有加踰往制歡聲傳遍魯諸生乾隆四年駕幸南苑大閲恭撰鐃吹歌辭三十首有序勵宗萬臣聞弧矢用威早著羲農之世兵戎克詰爰垂謨誥之文無戰為王者之師止戈乃聖人之武是以洛水會同六師偕作岐陽搜狩十鼓猶存既櫜弓矢以息兵戎猶聼鼓鼙而思將帥况春秋著搜紅之義大易垂即鹿之占晉鼓則百二俱陳虞羅則東西並下因農隙以講事供乾豆以告虔固非若長揚羽獵誇禽獸之多子虛上林侈車騎之盛已也欽惟我皇帝陛下仁函覆育道藴苞符巍峩之事業揚烈覲光炳煥之文章經經緯史尋橦度索之國盡奉車書雕題鑿齒之鄉咸遵正朔猶以清宴既登易弛武事會同有繹始肅軍容乃命僕臣乃召司馬虞表先期而戒事虎臣簡乘以扈從時值中冬典行大閲循飛放之舊泊不事周阹按晒鷹之古臺無庸麗飾周衛祗嚴而儲偫法駕雍容以啓行日麗鳯凰之樓雪殘鳷鵲之觀和氣所蒸天人協應敬恭將事上下交孚念祖宗之創業圗維厥艱撫天地之成功健行不息既申禋而用享遂擐甲以躬巡旗分以八應八風而修荼火之容鼓作者三申三軍而肅鸛鵝之隊首尾擊而互應方圎變以無方士奮馬騰仁者之師無敵風行雷動聖人之勇如神因開網以驅禽遂張旃而數獲聖主揮毫而灑藻從臣拜手以揚言在昔王子安之頌二十四章馬相如之書七十二代皆止於粉飾太平鋪陳侈麗寧足以彰豐功之赫濯美盛德之形容小臣纍世承恩幸得身依禁近喜聽笳歌之競擬陳鐃吹之餘情有溢於長言才彌慚乎短綆不勝踴躍祗益屏營南苑晴曛朔雪融六龍遙指漢回中太平天子親師旅萬乘龍旗拂曉風待漏千官聼禁鐘鳯樓晴雪瑞煙濃天街草里鳴鞭曉五色雲開駕六龍雲闕巍峩樹寶幢靈宫禁籞肅戈鏦升平尚憶興王日紫氣浮來鴨緑江列祖英靈陟降時肄兵曽此駐龍旗曽孫有道天人助韎韐重來作六師晒鷹臺上看鷹飛金甲葳蕤照鐡衣勒馬至尊親入陳萬人歌舞拜天威海子周阹百里餘金元舊泊富供儲聖皇早切禽荒警不待詞臣諌獵書聖製有逸豫戒禽荒句旌旗如火復如荼鉦鼓初陳八陳圗擐甲六軍齊虎拜聖人神武挽雕弧步伐從容應止齊圎規方矩妙難稽連環九轉呈神技萬騎勻圎簇馬蹄千帳聫行堆齒排宛虹雙映五雲階遙瞻聖主臨黃幄御賞恩濃酒似淮燕京神駿勝龍媒飛騎初齊獵騎催不獨逸羣空冀北神鷹還自海東來三田法古合圍新絡繹遲充尚食珍御箭一時傳得鹿先飛羽騎獻慈親中冬和氣暖氤氲玉律調陽布五雲駐馬至尊親灑翰絶勝燕鎬與橫汾弓劍深藏閟寢園尚垂仁愛息黎元四朝玉燭親調日聖武長傳萬葉孫中夏揚旌駐玉鑾誓師青海肅登壇先皇大烈今如在簪筆恩深舊從官世宗憲皇帝以誓師大閲於此飛龍十二滿天間萬里奔騰瞬息間天馬歌成齊叶和侍臣有喜識天顔仁虞舊院嵗遊畋七十紅橋映水邊聖世自來遊幸少只今海子半成田舊時南苑禁漁樵靈囿年來樂采蕘此日至尊親講武祗聞嘉頌和歌謡陽回緹室近南郊縮酒先時貢脊茅多品祗應供備物三田原不為君庖侍臣優賜玉翎毛羽衛森嚴簇寶刀重譯萬方齊欵服揚兵未覺聖躬勞八方清宴久包戈弭節還同唱凱歌奬士恩濃沾飫賜銅山錦市不爭多回鑾容與士無譁歡喜都人候翠華四海英雄爭入網黃金臺築更誰誇是月試武進士四校神兵獵羽翔漢家雄武出長楊即今聖主開湯網只卜飛熊問釣璜和門晝靜禮初成班馬蕭蕭捲斾旌從此軍營超細栁萬年赫濯仰天兵策府勳名照汗青武臣搜乘在郊坰金城萬里如安枕不用燕山勒舊銘鸞輅龍鱗樂府增九如歌頌日初升山呼萬嵗人情喜鐃吹聲喧羽騎騰弭節雍容拜冕旒百神擁護盡懷柔帝城萬井吹豳暇共説頒禽遍五侯萬里梯航效獻琛鳴梟多化泮林音臯陶淑問無須奏一百年來惠愛深祖烈優遊聖澤覃文章炳耀武功戡葳蕤四葉光華滿日月經天海氣涵雲日交暉薄海瞻九功七德聖謨兼小臣身在卿雲裡三世恩濃雨露沾天鑒明昭感至諴皇猷顯爍鳯書銜升平億載鐃歌奏不似岐陽石鼓鑱聖駕南苑大閲恭紀十首有序陳大受蓋聞軒皇建斾百靈效制勝之符風后揚旌八陳闡握竒之祕揆文奮武功不後於平成天保采薇治實綜乎內外是以夏官掌政典重西京冬狩應時禮隆大閲詰戎兵而申九法裕宅中圗大之模親韎韐以作六師宏保泰持盈之計我皇上智臨萬國道濟羣生敷漸仁摩義之功紹纍洽重熙之治振笙簧於六藝雨露均華靜鼙鼓於九邊風雷順軌既已德威惟畏猶然警戒無虞緬維創業之艱難彌切深宫之宵旰櫛風沐雨祖德深長槖矢櫜弓天庥篤厚用光我武存華山歸馬之師徒世選爾勞皆遼海從龍之子弟詔糈優裕生齒殷繁律用丈人師貞長子雖時平運泰罔干九伐之皇威而士飽馬騰應討四時之軍實乃於仲冬吉日親閲八纛羣材集南苑之神臯按北辰之方位時則天髙霧豁軍用懸旌日暖風微士皆挾纊天子乃躬擐甲胄戎臣已親執鼓桴伍兩正而風雨馳步伐齊而山嶽峙麾幢四合皆熊羆之士不二心之臣號令三申觀士卒之能師武臣之力騰戈展翼平分太乙之旗飛炮連環上應鉤陳之宿陟金臺而開黃幄髙標豹尾於班心注玉矢而彀雕弓親射旄頭於空外覩君王之神武增徒御之歡呼所謂以戰則克大得民和用律惟臧實由天授者矣於是宣威既逺布德彌洪屬車分玉食之豐陪乘飫金盤之味探支芻粟較裹糧授甲而有餘特賜金繒比飲至策勳而加厚聖主先成巨製思祖功宗德之隆從臣共紀鴻猷陳赫聲濯靈之盛覲耿光而揚大烈遠過石鼓之銘勳矢文德以纘武功宣播金鐃以合樂臣叨二卿曹欣逢大典備位曽供筆札幸得追隨禁近之班承恩特畀封疆勉圗綏輯兵民之略仰瞻軍容之美盛振古無疇賡歌帝道之光華敷天共慶願繼凱歌之作用諧盛世之音體用截句七言十首深慚謭陋曷勝悚惶太平天子攬戎機號令先庚出虎闈冬狩有儀天運合六花先象陳雲飛禮隆大閲著周官禾黍全收上地寬連日雪晴陽氣逹六軍雲集不知寒桂觀靈祗實式憑緬懷祖德寶章騰我皇智勇由仁孝武烈文謨丕顯承剛日初諏協吉詹髙空霧斂出峯尖丹崖翠嶂層層合玉帳珠旗隊隊嚴日麗髙臺朔氣和虎牙龍額接陂陀天容肅穆擐金甲軍令分明按玉戈雲蒸霞蔚簇戎旃兩翼平開萬騎連龍虎鳥蛇誰辨識個中指授契先天寶纛飛揚結勢雄五兵齊奮奏膚功佽飛技擊饒餘勇廟略全歸整暇中御幄平開瑞日明騶虞樂作玉弧鳴九天彀矢連翩中海嶽齊呼萬歲聲返斾回戈佇策勳師中振旅未斜曛君王親授軒轅律華蓋重重繞吉雲緯武經文國有常承平山海自梯航欲徴鐃吹超千古説禮敦詩遍八方聖駕南苑大閲恭紀八首蔣溥南苑髙揚大纛風雪消日暖啓曈曨六飛過處天威振自握龍韜御九戎千官扈蹕擁鳴鸞萬騎雲屯試寶鞍講武太平無事日紹衣常念守成難冬仲星官告吉辰一陽初動氣如春聖人親被黃金甲策馬來巡壁壘新一塵不動靜浮埃忽候鳴笳捲斾來九進却看符九伐火光中迸萬聲雷紫煙光起接連環竒正縱橫變化間鶴翼魚麗排陳法轅門鼓響令如山龍驤虎躍陳雲橫勇氣驍騰百倍生十萬軍聲齊一震中權以律又鳴鉦將識鈐符諳禦防兵嫻紀律荷龍光皇仁錫賚恩膏遍挾纊歡騰士氣揚大典初成日未西從鑾歸騎蹴霜蹄五雲影裏龍顔豫萬嵗聲中虎拜齊聖駕東巡盛京恭謁祖陵大禮慶成詩十六首宋楠一統河山正百年開基遙遡鎬豐前龍旗十乘親承糦載咏思文后稷篇艱難王業起關中展祀欣看大駕東十日為霖天忽霽共知聖孝格元穹愛日依依翠幰開秋原玉露淨飛埃松花江水明於鏡照見紅鸞扇影來海上神山戴巨鰲橋陵劍舄彩雲髙薌蕭焫處天光合五色曈曨映柘袍真庭肅肅下靈旗縹眇雲韶奏假時干羽兩階昭世德鳯樓重見鳯來儀玉府丹書百世存河山帶礪儼新恩鸞輿親酹功臣墓又見髙皇六葉孫名山望祀百靈趨積翠中天翊聖圗應似白雲封內起山祗萬嵗效嵩呼宫殿龍眉迹已陳秋山木落自嶙峋從官一騎頒香幣異代猶蒙錫類仁行殿遙聞晝漏清龍賔十二燦芝英彩毫珠玉三千字親灑雲箋賦盛京講武還登將將壇黃旗開處五龍蟠君王神武真天授列陳先應懾可汗平沙毳帳儼分行稽首齊稱萬夀觴一自華山歸馬後百年甌脫盡耕桑需雲藹藹宴枌榆遼瀋今年並賜租鳯詔九重天上至一時歌舞遍康衢一行貢使自朝鮮詔許承恩侍廣筵歸向東瀛誇盛事堯樽親沃聖人前八年勤政攬宵衣肯為時巡廢萬幾依舊緑章躬省覽朝朝批答下綸扉元冥應候玉花攢鈴索無聲漏向闌遙憶塞垣當此夕六龍天近倍髙寒堯階蓂莢四回開日下欣聞玉輅回最羡千官隨豹尾紅雲遙捧日車來皇清文頴卷一百
