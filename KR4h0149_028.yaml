body:
  text: 疏進呈大學衍義疏熊賜履經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣熊賜履謹奏為進呈大學衍義以𢎞聖學以光聖治事蓋致治惟在力行而修身必先窮理我皇上遜志典學單心基命與商宗周成後先一揆臣濫竽禁籞備員勸講猥獻芹藿之忱少效涓埃之補竊惟大學衍義全體大用之書也宋儒真德秀書成表進辭曰使吾君之心炳如白日於天下之理洞若秋毫雖共兜雜進於堯朝豈魑魅能逃於禹鼎又曰為人君者不可以不知大學人君而不知大學無以清出治之原為人臣者不可以不知大學人臣而不知大學無以盡正君之法至哉斯言聖人弗易矣明太祖允其臣宋濂請命大書於廡壁朝夕觀覽嗣是列辟俱置之講筵奉為筮鑑誠以是書洪纖包舉法戒具備千聖授受之真百王化理之要蔑有能外焉者矣兹臣等仰遵前旨翻譯繕寫恭呈乙覽伏乞皇上邃宫之中清燕之暇注意存省留神玩閲務期洞厥微奧措諸施為則內聖外王之道修己治人之術寧俟他求焉仍請敕下臣衙門虔付剞劂廣行頒布俾八旗子弟誦習講求眀體逹務備國家異日之用則正學表彰人才熾盛君德日進於髙明而盛治丕臻於光大矣臣等不勝拳拳之至歲終彚進講義疏陳廷敬康熙十六年十二月十五日經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣陳廷敬題竊惟積日月而成嵗不巳維天合經史以為功其勤者聖蓋典學行政道本相資溫故知新事須交盡我皇上亶聰亶明之資實由天授好學好問之篤度越前王出臨正朝則躬理萬幾深居大內則潛心羣典隆寒盛暑不廢丹鉛綴衣虎賁皆通章句逮于講幄尤切皇情每當敷奏先從天語發揮凡有咨詢逈出諸臣意表兼之虛懷若谷溫語如春講畢有再拜之儀特蒙賜免頻年有便繁之錫更荷重頒此皆亘古所未聞而今兹所始覩者也臣等叨預顧問之榮班愧乏涓埃之微助嵗華欲滿舊例宜循其四書講義己于康熙十四年閏五月遵旨先期彚進今將講過通鑑講義繕寫裝潢題明進呈伏願聖心折𠂻于誦讀之餘發揮於施行之際文武之道備在一人堯舜之治永傳萬代矣臣等不任諄切之至進呈刋完日講四書解義疏陳廷敬康熙十六年十二月十八日經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣陳廷敬題臣等於康熙十六年三月十三日恭侍𢎞德殿進講蒙皇上面諭四書巳經講完講章應行刋刻欽此臣等叨塵法從日侍經幃伏覩皇上聖躬親講典學彌殷天語下詢訪道愈篤凡在六經諸史靡不極意研精至於四子之書實備百王之道比年以來次第進講歷寒暑而罔間積日月以成編固已體驗於宸表抑且發揮於政治除按日進覽年終彚呈盡在御前時厪睿照乃者思垂永久親降綸音爰令校刋宣布中外竊惟皇上聖學崇深真足超軼往古臣等經術淺陋曷克仰助涓埃顧鄒魯之大義微言炳如星日而師儒之參稽互訂著在簡編嘗慕宋臣以半部佐君先明敬信莭愛願學朱子以四字入告亦曰誠意正心即致斯世於治平不外明德新民之理而使吾君為堯舜敢忘責難陳善之思仰惟宵旰之勤勞不輟宫闈之誦讀永光典訓示則臣民臣等謬效編摩復加刪潤校鋟成帙裝潢進呈惟我皇上常垂乙夜之觀存諸几席允懷千聖之道如晤羮墻將見煥四海文命之敷𢎞萬世光華之治臣等不勝區區之意謹具題恭進以聞翰詹謝恩疏韓菼題為聖世文治光昌教思廣育儒林寵溢恭謝天恩事竊惟聖人以作君而作師合道統為治統要在文思光被教澤深長故九德采於虞廷三物興于周禮乃自詞曹之設本以儲養羣材端尹之司亦嘗遴簡妙選而寵榮徒寄訓誡罕聞要未有揭聖學之精微煥斯文之宗主天言包括如八卦之蕩摩寶墨光華倍五雲之絢爛曠乎萬古慶始聖朝恭惟我皇上德縱自天學稽于古心勤宥密靡不廣運旁通極建中和咸克兼總美備蓋性天之奧即布為萬殊故翰墨之工皆歸於一貫江山輝映已遍留碧落之題卿尹翹瞻常拜舞紫薇之字而詞臣清切宣賜尤多咸拱作堂顔珍為卷軸頃復眷念蘭臺祕省人才端在濯磨芝苑仙班大冶須加陶鑄特召大學士臣玉書臣賜履暨吏部尚書臣廷敬至乾清門出御書道德仁藝四大字賜翰林院德業仁義四大字賜詹事府更虛懷下詢商酌當否臣玉書等咸各贊歎謂渾涵足蔽夫萬言精切適宜于兩署既自然而不可易亦極至而無以加乃命頒賜臣等衙門臣等虔捧自天仰答無地竊思道與藝合而德備業隨義盡而仁全我皇上集往聖之大成以曲成萬物挺一人之先覺以𢎞覺羣迷尋又恩賜題辭闡揚厥旨字字抉可聞不聞之祕言言示此心此理之同緬昔朱熹之作針不逢聖主豈期帝歌之結契録此嘉言臣等雖列宫墻僅習章句未能知味徒為飲食之人昭若發蒙頓開日月之照從此西園東壁矢朝夕於曩編秋實春華交悚惶於岐路至若龍騫鳯舞如覩神禹絳霄之碑墨妙筆精逺過太平玉堂之額莫能名象總屬化工謹當金碧雕鎪雙懸公廨更復貞珉摹勒永寶萬年臣等不勝踴躍歡忭之至為此合詞具奏恭謝以聞禮部謝賜訓敕士子文題明頒發疏韓菼題為恭承寶訓戒飭黌宫祗領歡騰遵旨頒發事先該臣部等衙門會覆準直撫李光地疏恭請御製教條發直省學宫奉旨依議臣部尋請皇上萬幾餘暇煥發天章更求御書臣部恭行國子監及直省一體勒石各學奉旨候旨頒發各欽遵在案今月十九日吏部尚書臣陳廷敬左副都御史臣勵杜訥編修臣查升恭捧皇上親書御製訓飭士子文一道交臣經管衙門者竊惟學校乃明人倫之地士習為正風俗之關恭遇我皇上秉聖人在位之權為萬世斯文之主加養而加教作君以作師久覃恩於正人心尤倡化於端學術凡兹撫臣所請早在睿照之中恩許天言惠兹多士玉音初下率土巳切翹瞻寶翰今頒羣蒙頓開聾瞶字字若春溫而秋肅言言挾雷動而雨施大書特書逺追虞夏典謨之訓心正筆正嫓美黃炎雲穗之章煥日月之光華增宫墻之美富不特一時寓恥且格之妙用抑亦千秋立賢不肖之大防臣等伏讀不禁歡欣鼓舞之至謹遵頒發前旨恭行國子監摹勒上石辟雍之鐘鼓從兹一新圜橋之聽觀日將萬計俟拓善本上呈御覽行臣衙門轉頒各直省督撫照式酌量一體勒石學宫可也為此題知翰林院落成謝恩疏張廷玉為恭謝天恩事乾隆九年十月南書房承旨重葺翰林院落成車駕臨幸錫宴送大學士掌院事鄂爾泰張廷玉進署以張説東壁圖書府五律為韻賦東字音字二首敕諸臣各分一字賦詩又賜臣鄂爾泰臣張廷玉御書二額懸於院署閲日又奉旨朕幸翰林院既與大學士等用張説五律字分韻賦詩顧人數為字所限編檢庶常吉士皆不獲與因復為柏梁體朕倡首句俾人賦一句用聯上下之情欽此伏惟殊榮賁於册府睿藻輝煌愷澤沛于詞林恩華稠疊曠千秋而紀盛偕庶尹以騰歡欽惟皇上濬哲性成欽明光被接羲軒堯舜之統德乃日新掞星雲河嶽之文聖由天縱璿璣斡運際甲子之重開寶籙迎祥繼雍熙之纍洽丕煥右文之典用彰稽古之榮繄是詞垣素稱清秩本崇政集賢之重地沿邇英麗正之遺規朴斫宜勤棟隆惟吉爰頒巽命俾豫鼎新藻井芝栭鬱虹梁之特起璇題寶畫揭鳯榜以髙懸亭號瀛洲真成方嶠地連華蓋名稱玉堂屬廣厦之初成展鈎陳而夙駕帝車紆軫光臨奎壁之垣日晷騰輝彩徹台階之次鵷行雲擁屹黼座以中開豹尾星陳啓瓊筵而肆設雲璈錦瑟聆廣樂於鈞天翠釡金罍酌衢尊于丹地摛章寵示韻分燕國之篇染翰聯吟製仿西京之體金聲玉振集條理之大成乾端坤倪冠苞符而首出鐫諸琬琰掩八伯之咸歌逖考縹緗陋三侯之成咏斯文極盛振古希聞臣等幸遘昌期叨塵祕省仰王言之鄭重勉效論思誦睿製以驚惶多慚寅亮戴巍巍之至德莫申天保報上之忱思藹藹之吉人共志卷阿來遊之盛寵深逾分感極難名凡兹與宴諸臣共喜普沾異數在昔纈袍蓮炬尚焜耀於曩編與夫玉署金鑾苐鋪張於往載豈如今日覃被恩施尋巢猶記鳯池同荷需雲之渥釋屩甫來藝館均瞻復旦之華拜稽竊附於歌虞醉飽還逾於宴鎬波添瀛海恩重鼇山惟當共贊夫休明冀以稍酬於髙厚所有感激微忱理合公同具疏恭謝伏乞聖鑒施行劄子御製論詩發示覆奏劄子李光地臣李光地謹奏本月十六日傳示御製理學論一篇湯泉應候詩一首臣反覆奉誦切惟易曰窮理盡性以至於命蓋事物之理即吾心之性也吾之性即天地之命也然欲盡性至命者必自窮理始此大學之教所以先於格物也世儒言理者傷于繁碎故或拘牽文義托拾名物而不知會通於性命之真言性命者涉於空虛故或直指人心好言超悟而不知實驗於事理之著是皆不能合內外之道而得聖人之指也我皇上推極理之本原至於天命率性而以格物致知窮其至理之當者為盡性逹天之路蓋合大學中庸首章之義而一以貫之不但朱子宗指不為俗儒曲學所亂臣愚謂聖人復起不易斯言矣嘗觀朱子平生著書最重者大學大學之説最要者窮理百餘年來陳獻章王守仁輩破除窮理之論而易以認天理致良知之説故士無實學而世無實用闢之者又但滯於名物粗淺文義支離之間亦安能有以正之哉皇上此論宜刋示萬世以廓清洙泗洛閩之統緒現在刻朱子全書大學己將告竣臣謹請以聖諭一章特系大學之後其於道術人心誠非小補湯泉詩情意懇惻音節髙妙蓋聖心無日不與天地民物同流故觸景怡情莫非真機之所濬發非學士詞人敢望其規製也臣愚素不能詩然生逢唐虞成周之世飽聆賡歌雅頌之音勉索枯腸奉揚聖作鐘鏞之下雜以蛙黽其為顔厚何如惟冀皇上恕其老朽荒拙不勝幸甚請刋通鑑聖論劄子勵廷儀奏為御覽通鑑既蒙頒刻謹呈聖論並請發刋垂訓萬世事欽惟我皇上道貫千聖學統三才躬先覺以牖民觀人文而成化萬幾宵旰之暇猶復好古敏求於經史性理諸書無不乙夜披陳丹黃手勘尤以通鑑綱目法戒攸關凡御筆點定之處義例著明條分縷晰其間流傳謬誤或字簡錯落一經校正炳若日星真內府之祕編史家之寶籍業蒙頒付撫臣宋犖照式刋刻仰見我皇上大公垂教之聖懷至深逺也抑臣更有請者臣父勵杜訥於康熙二十四五年間恭侍皇上御點綱鑑大全及通鑑綱目全編敬聆聖論記注成書舉古今治亂之源人事得失之故忠孝節義之隱禮樂制作之微一一闡發精深品評確當為儒先所未及並謨典以不刋雖經奏準頒發史館而臣庶士民無由得見臣伏思詩書六藝折衷端在於聖人彞訓萬年敷言必本乎皇極惟聖謨之昭布斯大義之宏宣今御筆點定校正綱目全編既付棗梨請並將聖論刋列其上俾覽者觸目警心震聾發瞶上識聖天子建中立極之本下識人心天理是非善惡之公不惟一世之訓行相率於無偏無黨即萬世子孫黎庶亦咸知大中至正之則於以植綱常而厚風俗皇上之教澤與天地無疆矣回奏樂律劄子張照伏蒙天語垂問古樂今樂雅樂俗樂之變律度量衡之曷由同樂音樂字之本末同異編鐘倍律及有設而不作之故臣章句鯫生不學操縵其於律呂目剽耳食而非有真得於心承問茫昧震懼失圖切惟古樂自周而廢仲尼以前魯猶守之季札觀樂載在左氏逮師摯適齊在魯者亦遂淪墜論語所記記樂亡也魏文侯與子夏問答語在樂記時去師摯適齊未逺列國猶有吉光片玉至於七國入秦而澌滅盡矣雖然觀子夏言樂與音相近而不同則知樂之與音猶識之與性性不離識不涉識識不同性不異性樂不離音不涉音音不同樂不異樂識在則性固無所虧音在則樂亦無所闕性雖無虧而必俟空有雙融始能見樂雖無闕而必俟欲淨理純始可作縱使搏拊考擊之法笙鏞鐘鼓之制於今泯焉而宮商角徵羽出於天然非人力之所得與則豈世代今古之所可殊古樂安得而亡况黃鐘之管曽經聖祖仁皇帝考定而樂器制度散見於經史者猶可沿流以溯源哉惟在人存政舉而已樂經曰以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武臣聞之師曰體中逹和所謂至德也敬業有常所謂敏德也仁孝友悌所謂孝德也此與師氏之教同養士之本也興者於物興懷道者自述其意所謂詩言志也倍文曰諷以聲節之曰誦所謂歌永言也發端曰言答述曰語所謂君子於是語於是道古也雲門以下黃帝至周歷代之樂也蓋樂德則以理義養其心樂語則以聲音養其耳樂舞則以舞蹈養其血脈古人所謂以樂教者如此所以聲音之道與政通也後世不知樂為教之事故其職領於有司而己學士大夫鮮有知者其精微之旨不傳而徒索之鏗鏘莭奏巳不足以和神人況太常工人記其髣佛用之郊廟者存什一于千百耳其施之民間日用莫非子夏所謂及優侏儒猱雜子女則其所化之民所成之俗當何如耶此固有教養億兆之責者所為蒿目乎斯世也然則三代以下非古樂之不可復特無復之之人耳得其臣如萬寶常如蔡季通者又不用於彼時若我朝列聖相承功成治定恭遇聖祖仁皇帝心契天地之祕手握聲氣之元考定黃鐘正歷古之訛謬則又有君而無臣迄於今普天之下雅頌之聲未作而淫樂鄭聲亦未放此我皇上所為撫世而興歎也溯自列國時古樂既廢俗樂繁興桑間濮上之音流入宫掖左氏所稱撞鐘舞女吳越春秋所載越夫人教舞史記所載優旃優施之屬自朝廷以至閭巷以娛心志以恱耳目莫不用是惟郊廟所用則略存古樂之鏗鏘百姓不得而知則謂之曰古樂亡也亦宜非樂亡也樂教亡也使鏗鏘之節同於古而即可謂之古樂則孔子不當云樂云樂云鐘鼓云乎哉矣使器必蕢桴土鼓歌必鹿鳴四牡而後可謂之古樂則孟子又不當曰今之樂猶古之樂矣孔孟之言必同而無異則古樂在今匪存而匪亡斷可識矣逮漢髙祖入秦有制氏者世隸太常記其度數叔孫通因之制為漢樂髙祖好楚聲唐山夫人為安世樂實楚聲用之房中安世樂秦名夀人或曰即關雎之度數至文帝時以奉髙祖祠廟而楚聲又混入古樂矣漢武帝以謳者李延年為協律都尉造新聲制樂章述己功德陳之宗廟為太一天馬等歌汲黯諫丞相公孫氏斥黯誹謗先儒以古樂之亡斷自漢武焉嗣後俗樂音節盡入古樂如油入麵越世愈久愈不可考歷代雖欲修眀無徵不信人自為説莫能斷其是非史氏但以用之宗廟朝廷者曰古樂雅樂其雖在朝廷而本出於里巷者謂之今樂俗樂依古有雅樂部俗樂部前明以來亦有太常部教坊部其源流沿革文雖煩賾而亦具有條貫濂溪周子有言樂聲淡而不傷和而不淫入於耳感於心莫不淡且和焉淡則欲心平和則躁心釋此數語者狀古樂之音最為明盡夫目之司視也口之司味也凡悅目悅口之物未有不敗道而傷生何獨於耳而有殊故凡樂聲激烈慷慨流蕩靡曼則耳必悅之若淡且和何悅之有古之作樂於以養德後之作樂於以悅耳所以三代而下朝廷之上奮然欲正樂復古者屢矣而卒不能者蓋以反乎周子之言而未嘗於此加之意歟至於度也量也權衡也皆本於律尚矣黃鐘為聲氣之元象數之本度量權衡皆於是受法度量權衡正而人生日用萬事管焉皇上深惟事本而期四海之同誠立政之要也按漢書律者分寸尺丈引也本起黃鐘之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分十分為寸各自其十以升于引而五度審矣量者籥合升斗斛也本起黃鐘之籥用度數審其容以子穀秬黍中者千有二百實其籥以井水凖其槩合籥為合十合為升各自其十以升於斛而五量嘉矣權衡者權重也衡平也銖兩斤鈞石也本起黃鐘之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石歷代諸儒考古制者胥以此為鼻祖焉夫黃鐘元聲自在天壤而造律之尺難得其真蔡元定律吕新書所載有周尺漢劉歆銅斛尺蔡雍銅籥尺建武銅尺魏杜夔尺晉田父玉尺姑平古銅尺汲冡玉律尺劉曜土圭尺劉宋錢樂之渾儀尺後魏元延眀尺後周玉尺梁景表尺隋開皇水尺五代王朴律凖尺宋和峴尺李照尺胡瑗阮逸尺鄧保信尺大晟樂尺共二十種其同異則宋史詳之至於量周制則見考工記栗氏為量章漢制則見漢書律志至梁陳則以古升五升為一斗後周獲晉古玉升仿其制頒天下徑七寸一分深二寸八分重七斤八兩以彼時官斗較之多三合四勺隋開皇以古三升為一升大業後復古升嗣後史無其文至於權衡漢志雖詳而不知其器之何似石勒十八年造建德殿得圎石有名曰律權石重四鈞同律度量衡云又後魏景明中并州人王顯逹獻石銅權一枚具有銘二七十九字識者云皆王莽所造也梁陳以前猶依漢古稱齊以晉宋時一斤八兩為一斤開皇時以三斤為一斤大業中復古稱貞觀時鑄銅斛與古玉尺玉斗同符玉尺玉斗藏于大樂署武后時亡之宋淳化間詔以秬黍依古法較定權衡史稱其制為精備頒之天下姦弊無所措元明兩朝無聞焉我聖祖仁皇帝心通天矩學貫神樞既以斗尺稱法馬式頒之天下又凡省府州縣皆有鐵斛收糧放餉一凖諸平違則有刑又恐法久易湮且古法纍黍定度度立而量與權衡凖焉度既不齊黍數即不合躬親纍黍布算而得今尺八寸一分恰合千二百黍之分符乎天數之九九於以定黃鐘之律尺既定矣又恐不寓諸器則法不可眀乃於御定數理精蘊書內載其法以金銀製為寸方著其輕重而度與權衡之凖瞭如指掌雍正九年列之為表載入大清會典頒行天下誠百世以俟聖人而不惑也我皇上以度量權衡天下猶有未同勤惓垂問仰見平均四海之至意臣以為在今日非法度之不立在奉行之未能請命有司按表成造尺稱法馬斗斛頒行天下再為申眀違式之禁務使畫一并令直省將會典內權量表刋刻頒布使人人共曉或亦同之之一法也夫五方風氣不齊民俗所便各異然在官者有一定之程則能以我之至齊者齊彼之不齊而不齊者亦齊其所不齊亦無害臣昔聞於聖祖仁皇帝者如此今蒙聖諭虞舜巡狩同律度量衡唯其時亦有不同者是以同之若其皆同何同之有然而在我者安可不同至哉聖言信乎先聖後聖其揆一也臣又謂立法固當深講而用法自在得人度量權衡雖同而官司用之入則重而出則輕以為家肥其鄙陋更甚者轉以此為國利譬如平糶以穀貴故平其價也往者有司轉就民間貴價之數略減五分以賣官米則加以銀色法馬使費之數必轉貴於現在之貴價矣於是米價以平糶而愈貴鄙陋之見曰此乃國之利也否則曰如此乃可告無罪也豈不與平糶之意適相反耶行之在上如此百姓至愚必以為度量權衡國家本無定凖浸假而民間各自為制浸假而官司轉從民制以為便此歷代度量權衡所以不同之本也夫期民間之恪守先從官司之恪守始臣愚見如此伏候聖訓至十二律五聲工尺樂字同異臣謹會同和碩莊親王校定聲律謹按孟子曰不以六律不能正五音是知六律六呂所以為五聲之管凡物之聲有低有髙低可至於希微髙可至於霆震皆聲也而不可以為樂故以六律六呂管之去其兩端而用其中則其聲成文樂記所謂聲成文謂之音也音有清濁愈濁則亦愈低愈清則亦愈高劃髙低為五分謂之宮商角徵羽然而天數五地數五五音之間必各有半聲自然之理也爾雅云宫謂之重商謂之敏角謂之經徵謂之迭羽謂之栁即半聲也即有律之必有呂也又此五音必有餘分閏位而餘分閏位必在陰陽互易之地故必又有二變亦自然之理也合五音二變謂之七音則國語所謂以七同其數也然國語所謂七同者謂自子至午七律皆陽律也而自午至子亦有七律是故倍五為十加二變為十二則六律六呂備二變又各有陰陽則二七為十四十四位成則陽律七陰律七可以比音而樂之矣樂記所謂比音而樂之謂之樂也夫黃鐘宫也而大吕即為清宮太簇商也而夾鐘即為清商姑洗角也而仲呂即為清角至於蕤賓一陰生矣而時方五月陰盡午中而即生於午故蕤賓為變徵而林鐘即為清變徵夷則徵也而南呂即為清徵無射羽也而應鐘即為清羽十月陽氣盡矣而陽無可絶之理故應鐘至黃鐘之交又有半黃鐘半大呂之位為變宫清變宫然後聲音旋轉不窮與造化同符焉皆非人之所能為也自然之理也自黃鐘以至半黃鐘名之曰律自大呂以至半大呂名之曰呂其自宮與清宮以至變宮清變宮者則皆音之名也律以管音音以協律然論其名則異舉其實則同也樂工記數不便于用則以其聲相似之字而又筆畫少易於標識者易之為十四字其曰工者即宫黃鐘也其曰仜者即清宫大呂也其曰凡者即商太簇也其曰仇者即清商夾鐘也其曰合者即角姑洗也其曰六者即清角仲呂也其曰四者即變徵蕤賓也其曰五者即清變徵林鐘也其曰乙者即徵夷則也其曰億者即清徵南呂也其曰上者即羽無射也其曰仩者即清羽應鐘也其曰尺者即變宫半黃鐘也其曰伬者即清變宫半大呂也查􅚁字仜字億字仩字伬字五者本無其字則知其止以記數而即黃鐘等律即宫商等音非實有是字别有義例又可知也然而其來舊矣楚辭大招曰四上競氣極聲變只則周末已有之也上聲歌注曰或用一調或用無調一者乙字無者五字則梁時又有可證也但其位分雖有十四而陽七隂七陽自為陽陰自為陰不相參離則雖十四而仍止七也又七音必旋相為宮調乃可轉而又必除去二音調乃可成則七音仍止五音也然則雖加二變為七而仍止於五雖倍五為十而陽為陽陰為陰亦仍止於五也其編鐘一架上八下八上為陽律下為陰律向來考擊之莭若南郊廟祀及臨朝大典皆用黃鐘為宫若北郊月壇則用大吕為宫用黃鐘為宫則止擊上鐘不擊下鐘若用大吕為宫則止擊下鐘不擊上鐘臨期以下鐘易置上位而擊之非下八鐘不擊也掌儀司向無應擊下鐘之典是以不知下鐘亦有時而擊若太常寺樂工則知之矣然而其所以然之故則各不能知也若上八鐘內又有三鐘不擊者則以八鐘原止七音黃鐘為宫即當以倍夷則起調為上字調倍無射蕤賓夷則三鐘不入調無可考擊是以不擊將來元旦節若以太簇為宫則三鐘皆當考擊而黃鐘夷則無射三鐘又當不擊矣是上三鐘亦有不擊者因歷來俱以黃鐘為宫故為考擊之所不及而非設而不作也儒生不知音律謂黃鐘為聲氣之元萬物之母郊廟朝廷必須用黃鐘為宫否則有礙不知黃鐘為宫其第一聲便是下羽除徵不入調外商角羽聲必胥迭用若聲聲皆是黃鐘則晏子所謂琴瑟専一誰能聽之况大武之樂即是無射為宫載在國語無射乃陽律之窮而武王用之則十二月各以其律為宫無所不可亦明矣况明代及我聖祖仁皇帝未經考訂黃鐘以前並稱以黃鐘為宫及考定之後始知一向誤以太簇為宫而明代盛衰不一我朝隆盛如斯則迂儒之論不足信又甚明但自黃鐘以上音必漸髙自黃鐘以下音必漸低其八音諧和與否非歷試不能明曉容臣等詳悉查考辦理再行請旨謹先將源委具陳伏候聖訓回奏丹陛樂導引樂用鼓起音劄子張照本月初十日臣等奉上諭今按中和樂及壇廟所用之樂皆柷起而敔止鼓以節之惟丹陛樂與夫導引之樂則用鼓起音此始自何時意書云下管鼗鼓謂堂下之樂也丹陛導引皆堂下樂故樂工等誤用鼓起耶即今俗樂亦皆用鼓起可細查其顛末也欽此臣等謹按會典中和韶樂樂器圖有柷敔丹陛樂器圗無柷敔樂必有作止之節柷作之敔止之今丹陛樂無柷敔故以鼓為作止也丹陛樂所以無柷敔者明代無之今因之也明代所以無者古者堂上堂下皆柷敔至隋時以四廂樂柷敔同時並奏轉至喧雜遂廢不用唐季并廢堂上柷敔宋仁宗因王圭言下禮官議始置堂上柷敔而堂下仍無之四廂樂猶今丹陛樂所謂堂下之樂也故丹陛樂無柷敔相沿至今至夫不用柷敔即以鼓起衆音者鼓為衆音之帥其來舊矣周禮太師大祭祀帥鼓登歌令奏擊拊注云擊拊瞽乃歌也拊形如鼓以韋為之著之以粳又云下管播樂器令奏鼓􅉧注云鼓􅉧管乃作也􅉧小鼓也漢風俗通曰鼓者郭也春分之音也萬物郭皮甲而出故謂之鼓又漢白虎通曰鼓震音也萬物滿盈震動而生其本在萬物之始耶故謂之鼓是知鼓為衆音之帥也樂記曰鼓無當於五聲五聲弗得弗和以比學之於五官師之於五服然則以之為作止以之為節奏宜矣國語曰革木一聲漢宋諸儒皆謂金石絲竹匏土悉具五音若革與木則惟一聲而已故八音之序以革木為最下然而髙以下基洪由纖起質為文本一為萬之母革之器為鼓為五音之節奏木之器為柷敔為五音之作止無柷敔則鼓可代亦自然之序也若拊鼓即是古樂中之拍板以為樂句拍板木音也堂下之樂及今俗樂以拍板代古樂鼓之用猶夫以鼓代古樂柷敔之用皆原於革木一聲之理也皇清文頴卷二十八
