  text: 欽定四庫全書皇清文頴卷八十三
  hash: sha256:67942e12c025181f1ae06cd3dd7b410503a1a02c616745ab54a29139087a5b3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_083-1a, image: WYG1450/WYG1450-0303a.png}
body:
  text: 詩七言律詩乾隆三年聖主躬耕藉田恭紀二首徐以烜聖朝善政首勤民耕藉元辰問禮臣詔下扈農皆就列仗移耒耜已先陳花迎車蓋千村曉栁染旌旗一色新才出郊圻甘雨霈九重一念格蒼旻禾垂九穗麥雙岐上瑞從今可預期竟日沾濡天有意平疇長飬地無私回鑾共仰皇情豫終畝還邀麗澤施此日東郊叨待從含毫齊賦載芟詩聖主躬耕藉田恭紀四首阮學浩秉耒農祥禮肇行星羅萬井正敷榮上辛早為民祈穀吉亥還勞帝教耕好雨知時隨玉輅芳田含潤度霓旌聖人舉事孚純佑俶載功宣報順成御藉親推禮意虔青箱穜稑散朝煙千重栁緑清明後一路花濃穀雨前縹軛驅犂膏乍起紺轅周畝景無邉大常樂奏春旗颭淑氣氤氲覆廣阡庶氓終畝力耕嫻京尹徐分亞旅班最喜君王臨繡陌得令父老識宸顔杏花菖葉相將發霧笠煙簔肯放間始信為農真足樂神倉粒粒出人間皇情歡暢兆民知布靄流芬雨及期春樹人家新沐候天田雲物正佳時已占周雅千倉慶更介豳風萬壽詩長此閭閻書大有年年歲歲紀鴻禧聖主躬耕藉田恭紀四首沈慰祖上腴千畝鳳城邊無逸傳心稼穡先耒耜利興方二月馨香誠格已三年祥飄霡霂青壇雨瑞靄氤氲翠幕煙此日土膏添潤澤東皇貺答聖衷虔先期撰器戒農曹率作寧辭玉趾勞布穀聲中仙樂奏垂楊影裏羽旗高緑蓑環拱瞻青輅黛耜頻推動赭袍獻得盈箱穜稑種嘉禾應紀産神臯蹌濟班聯御耦旁許教野老覲龍光授時早叶元辰吉終畝還沾勞酒香共喜金根回繡甸懸知玉粒裕神倉豳風景物無須繪新輯農書睿慮長祈穀曾勞翠輦臨民依纖曲軫宸襟三春重命親耕駕四海應知教孝心保介咨茹宣德意明粢將享卜居歆禾詞唱徹康衢樂長飬風來拂舜琴聖主躬耕藉田恭紀四首有序吳華孫皇上御極之三年春二月辛亥有事於藉田甘雨時降大禮慶成百辟羣黎罔不歡悅臣伏惟聖王先成民而後致力於神藉田之禮綦重周語所謂上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎純固於是乎成是以聖王必躬親之皇上敬事天祖勤勞百姓膏澤洽於羣生咨警殷乎民事輯農書以垂萬世法履千畝以為天下先仰惟世宗皇帝每歲耕藉加三推禮為四爰乃再進一推所以虔明禋重民食繼序其皇兢兢勤勤之心恩德甚厚精意上通靈貺斯答澍雨之祥如期而降蓋誠敬孚而休徵之應見也昔成周盛時王道洽而頌聲作有載芟之春耕斯有良耜之秋報相繼歌咏告成功於神明鏗鍧炳耀垂之無窮然則覩聖天子盛德之符占年大有作詩歌以㜶雅頌斯其時也非載筆之臣遭逄之榮幸歟謹拜手稽首而獻詩曰雨灑春郊栁拂隄蒼龍夙駕為蒸黎堯年舜日三辰正禹甸周原萬井齊喜見麴塵清御路恰添新水潤耕犂皇心祗念民依切輦後新看耒耜擕功開一墢重躬耕隴畔欣瞻典禮成父老共扶丹耦出公卿咸御紺轅行高翻翠靄旌旗影半趂和風笑語聲嘉種乍分生意足預占大有慰皇情升臺臨眺景沖融襏襫還看共勸功三十六禾詞宛轉億千萬里畝南東早知觀稼天顔喜咸樂瞻雲衆念同一望煙蓑偕雨笠村村風景畫圗中皇仁真比海波深宵旰常勤稼穡心才見郊壇蒼璧薦又瞻帝藉翠華臨禮行勞酒沾恩澤樂奏簫韶播德音幸際升平陪法從康衢擊壤效謳吟聖主躬耕藉田恭紀四首有序宋楠臣聞辰角麗天九扈著省功之典勾萌出地三農遵秉耒之期遡平秩於伊祁首程東作繫艱難於姬籙獨切西疇粵若帝藉之親耕必涖南郊而肅事以薦明馨之德則上帝居歆以開率育之功則蒸民乃粒掌在甸師之職詳於載柞之篇有其舉之敻乎尚已我皇上陶鈞六合茂對羣生塵靜波恬保介屢咨於南畝經阡帶陌農書特輯乎西清遠惟我聖祖仁皇帝澤被閭閻晝榖宵絲悉繪豳風之歲序嗣我世宗憲皇帝恩流墳壤駢枝附穎罔非洪範之休徴我皇上繼序其皇恫瘝在抱既三年而即吉遂一垡以興民肅邁蘭場虔臨紺幄雲中布穀偕鳳管以齊鳴陌上垂楊映龍旗而一色金根車動玉笋班聯蕭煙縹眇於層城杏雨沾濡於廣隰青箱乍起流珠顆於芳田縹軛初回溢天漿於沃壤從此五百里粟五百里米備粢盛醴酪之供佇看八千歲春八千歲秋紀日月河山之壽七言恭賦四律俱成康田無逸凛深宫新展龍旗御畝中二月躬耕循典禮五朝家法重農功祁寒雪後縈宸念御製得雪詩茆簷還慮怨祁寒閔雨春來切聖衷不似漢唐依故事祗將玉輦玩芳叢禾詞宛轉彩斿輕鳳吹遙連擊壤聲萬耦犂雲環帝藉六龍飛雨過春城香飄翠甸花叢濕緑入芳郊輦路清陛楯不應嫌露立天衣霑灑為蒼生餳簫社鼓太平年薄靄輕衣長養天玉液遠滋清甽露洪縻低拂緑楊煙豳風內苑觀周稼鈎盾西京置漢田豐澤御園曾履畝宸章奕奕五雲邊紫陌春和萬象舒華滋久已溢衡廬蠲租並歲傳恩詔發粟連圻走傳車遍敕花封咨保介别開詞館輯農書親耕總為民天計珥筆真慙退食餘聖主躬耕藉田恭紀四首程鍾彥寅賔日出應璣璿盛治昭明穡事先耕鑿八絃同湛露農桑萬井樂光天膏流嘉種青箱外春藹帷宫黛耜邊聖主乘乾隆典禮民功首重協康年瑶壇嶽立藹和風禹甸周原駿發同翠輦路分煙笠外青旗影動雨犂中九重肇舉三推禮千畝先勞一墢功十萬提封齊荷鍤多魚有兆叶年豐絲鞭揚處景遲遲節鼓聲隨勸稼詞稽古首崇無逸訓陳風應繼載芟詩細轅履畝千官集玉粒盈疇九穗滋穀我生民由帝力鴻鈞雨露自無私廣陌橫阡一望開蔥蘢佳氣蔚層臺祥風遠拂青疇過好雨新隨彩仗來黍稷萬年馨帝德倉箱百室阜民財禮成還蹕傳清漏五色卿雲護輦回聖主躬耕藉田恭紀四首馮元欽青郊時雨灑芳垓保介前驅萬乘來千畝災畬華耦集九天珠玉翠疇開生民本計由多稼盛世農功定阜財明德薦馨還祝歲欣看典禮重親推望耕臺畔擁千官兆庶歡呼夾隴看帶雨蒼龍依紺幄犂雲蔥犗傍青壇膏流沃壤花村靜春滿芳田蔀屋歡共識聖人宵旰意稔知稼穡最艱難長畦雨過碧氤氲隴首依稀湧濕雲天體聖心施霡霂人因帝力重耕耘農祥協應三時順布穀頻催四野聞此日萬方同秉耒定看嘉種答辛勤重農貴粟仰皇衷大有頻書萬寶豐頴合嘉禾紅䆉稏岐分瑞麥碧玲瓏吹豳祭蠟年年事俗厚風淳處處同珥筆小臣糜歲祿慚無鴻筆紀康功聖主躬耕藉田恭紀四首有序曹秀先粵稽耕耦之由來尚矣其謂國之大事在祀民之大事在農百穀用成豐年隆禮將以大報本潔明禋煦嫗休養蕃息齊民治化胥本諸此洪惟我朝受命恪重田功世世相承禮逾古昔我皇上御極以來務本重農有加無已特命儒臣纂輯農書臣嘗恭誦睿製豐澤園有記田字房有記耕耦田有賦有詩大哉王言一哉王心天下之福也於是三年即吉之初仲春月躬耕藉田自三王九卿逮夫農官耆老各如禮報事禮成邦畿悅服萬衆歡呼僉曰天子紹述大典率作以為天下式祀事孔明孝思維則平秩東作敬授人時在此舉也臣職司載筆不揣固陋敬賦律詩四章猶夫耕田者樂康衢飽德者詠太平云爾五輅星馳駐翠壇西南郊外擁千官雞翹豹尾因風動玉帶銀魚拂曉寒縹軛乍回千畝潤青箱始播萬人歡香飄九陌春常在天子先知稼穡難盛典初成吉亥期陽和遍地總無私六龍帶雨郊原濕九扈蜚聲野老知短短桃花縈蹕路青青桞色颭春旗觀耕臺上還凝望絶勝豳風七月詩清川碧樹互晴隂二月鶯花滿上林初向郊關田祖迓即時歌舞太平音回鑾五色飛雲繞勞酒三公執爵斟齊上春臺稱萬壽萬家生命聖人心耕織嘉禾各繪圖我皇繼述啓苞符星明五穀開銀鏡露浥三危浸玉壺太史簪毫書大有老人鼓腹在康衢薦馨至治昭全盛清廟生民播遠謨聖主躬耕藉田恭紀四首張映斗金根捧日駕蒼龍聖主親耕備禮容王業開基尊后稷天田秩祀重先農青旗載道晨光麗紫陌連塍曉露濃一御洪縻登萬寶早開耕鑿遍堯封夾鐘應律日辰良芳甸初開繡錯長花拂鑾輿迎黛耜春浮穜稑出青箱旌旗互轉需雲合歌咢頻催兌澤瀼帝恤民依神貺厚正逄甘雨贊農祥觀耕臺上赭袍明千畝遙連九野平繞岸緑楊闐士女聯班紅紖敘公卿鋤雲農具隨行耦覲日耕夫拜寵榮太寢何煩重賜宴已蒸和氣作歡聲康田自古啓鴻模元氣真須御手扶豈獨民生關帝力由來髦士即農夫先春已舉祈年禮午夜猶觀無逸圖三十六禾齊合穎從今歲歲紀苞符聖主躬耕藉田恭紀四首陸嘉穎農祥韶月映春城帝念民依藉禮行黼座順時勤稼穡齋宫先日重粢盛雲開雙闕瞻鑾輅瑞溢三階引翠旌曉樹漸看翾九扈早聞擊壤頌升平青壇嶽立抱非煙佳氣絪縕繞御前樂奏屢豐神貺洽祀隆七獻聖心虔至誠自與隂陽會無逸能通造化先好雨知時工發育為迎清蹕到天田龍袞朱紘睿德昭東阡西陌序羣寮四推加禮神功溥一墢含春地力饒斾影葳蕤交衆畝禾詞宛轉徹層霄林間布穀催耕未萬井笙歌荷聖朝觀耕次第遍三農千耦應收畝一鍾地是神臯原陸海天開沃野總提封薰絃韻叶仁風遠勞酒恩霑湛露濃玉粒自今皆帝力溝塍遙護九如松聖主躬耕藉田恭紀二首劉綸帝藉春回斗柄東青壇夙事重皇躬上辛已卜升蕭鬯吉亥旋諏獻稑穜千畝桐華清蹕雨一林鳩羽畫旗風為傳太史頻時瓜見瑞靄遙連祗祓宫土脈香生御耦推南山雲物上觀臺禾詞迭譜三終奏勞酒齊斟九醞杯並使簪纓知襏襫即看菽粟等瓊瑰豐年何處占農喜萬井春聲社鼓催聖主躬耕藉田恭紀四首齊召南祈年祈穀總躬親宵旰勤勞念下民乃擇元辰當吉亥曰咨羲仲掌中春油雲自羃齋宫地絲雨全銷輦路塵知是大田深望幸杏花開處倍鮮新青壇嶽立絳霄邊禋祀先農鬱裸虔華蓋影籠芳甸霧彩旗香拂御爐煙耕開隴色移周耜唱徹禾詞叶舜絃率土臣工欽率作屢豐應覯萬斯年臺觀丹耦列東災次第公卿及甸師土脈自看田上上恩光真與日遲遲種從御廪青箱播祥卜環邱玉粒垂父老從容瞻睟穆天顔有喜兆人知鸞聲和度周原逺龍角明占曉色初搜粟行分都尉節教田新輯議郎書要令郡國千春樂不止司徒九歲儲煙火相望萬餘里於今隨處滿篝車聖主躬耕藉田恭紀四首朱荃東風吹雨滿春城太室朝來饗禮行豈以物華供睿賞祇因農事軫皇情紺轅過處煙光合芝蓋翻時翠靄迎午夜齋宫隆感召先將靈貺福蒼生青郊路近接金隄鳳輦遄來列仗齊甫陟瑶臺開宿霧旋推黛耜潤春泥堆黃早卜雲千頃皺緑新添水一犂好是勾芒方應候分來嘉種遍芳畦曲闌披拂栁條斜行近耕臺駐翠華已許農民陪御耦欣看田器出天家千門碧色間芳草一路輕隂護杏花要識太平原有象春深何處不桑麻微雲轉日逗斜暉才聽宣傳整六飛四海雨暘皆帝澤九重宵旰切民依應知介福神先享預喜祈年願不違從此農書添紀載三推加二古來稀聖主躬耕藉田恭紀三首洪世澤九衢歌舞入韶年天子青陽巽令傳共覩光華升舜日羣將耕鑿樂堯天神功允洽千倉慶王業仍陳七月篇詎乏良農供御廪為親穡事即康田祇肅粢盛巨典崇九重無逸警臣工春官是月聞吹籥太史先時奏協風千畝潛迎天氣降六飛遙履土膏融康衢此日謳吟遍萬國歡心兆屢豐肅肅青壇駐翠旌言乘春令達勾萌禮加周典三推上樂繼豳吹九奏成淑氣依遲隨玉趾祥風細轉拂朱絃神倉從此多香飶更覩豐年起頌聲聖主躬耕藉田恭紀四首王會汾太史先寅撰令儀司農陳器土膏時花迎翠幕晴光轉嶽立青壇宿露垂一墢聿昭天子孝千箱兼與萬方期誰編漢志農家説第入周王訪落詩玉扆勤民念永圖靈星曉祀設茅蒩種頒椒掖嘉生遂繡裛緹原大塊蘇勞酒自輝周典禮賜租不數漢規模桑煙柘火窮瀛海鹵澤畛沙總上腴蒼龍夙駕下天閶蔥犗遵塗引奉常清甽泠風通御氣杏花榆莢散年芳三登協應鳴銅雀九域貞符貢玉羊會見詞官陳普淖嘉未連穟隴雲黃農鳸頒春促歲功塍開秀色畝南東神倉待貯曾孫稼豳管還吹列祖風膴膴原田霑帝澤陳陳高廪接年豐火畬水耨臣能説願羾颷輪達聖聰皇清文頴卷八十三
