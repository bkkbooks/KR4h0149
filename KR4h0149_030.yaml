body:
  text: 贊易贊李光地易之為書源流己逺至於近今為説家滿衆星繁繫必辨緯曜羣言紛錯孰執其要我論聖統則折諸賢胡心是師曰余單傳折中賢者又以聖斷聖雖邈矣微辭有爛聖欲加年愚者須幾徒有日孳至斃乃已緬繹聖訓觀彖可知姬公有言文王我師故知稱名始自文考憂患有興繫辭已曉六爻之作於是取材位之凶吉時哉時哉夫子之傳莫先於彖彖意既得爻斯過半其次釋爻片言摘抉夢寐周公如合符節大象之立推類廣引或離卦意皆卦之緼載稽三傳祖文宗周又通其象使理周流復總全經通論其要易簡之精乾坤之奧河洛苞符蓍卦圓方繫辭義例學易典常廣大精微著明深切如網在綱若車有轍厥後三篇出自河內圖隱象湮千載明昧首定其類次變其通序之雜之觸長無窮朱子像贊李光地堯舜之道二典僅垂孔氏六經至秦而灰漢唐之間道墜文喪董韓王楊晨星相望宋之中葉其學大醇及乎夫子程周彌尊間聖之嚴憂世之厚頽瀾稽天獨執其咎刋去枝華務見本根菽粟麻絲至味大文肆開堂戶示我奧宅茍有能者便達天德於戲五百之運歷古而同建武貞觀一時之功天為萬代金口木舌夫子之生於湯有烈方明之初一術專師風流篤茂夫子是資詭説汨之於聖則畔夫子道微貞元亦散孰陟嵩華越彼平岡孰能涉海而棄舟航夫子之道與時屯泰婺女之墟光耿長在凡我后裔瞻仰來兹古人有言心嚮往之御書翰林院扁額贊韓菼大書特書天文發蒙序如爻繫經義昭融警覺提撕振古洪鐘聖德渾全藝事旁通乾體日強筆健飛龍得心運手元氣化工御書都察院扁額贊韓菼唐虞盛世賡歌喜起宸章垂訓中天齊軌文符二典書兼八體象乾行健臣鄰仰止欽乃言職之綱之紀晨夕對揚聖顔如咫御書詹事府扁額贊韓菼聖謨洋洋闡揚洙泗進修德業率由仁義逺邇高卑昭示所自揮毫遄賜時雨之至榮光萬丈際天蟠地夀世無極赤文緑字十駿贊志在千里吉行五十曵匹練以飛光敻玉花而屹立匼匝金支覆氤氲寶香裛閶闔獨步炯如月入斂絶材以就間宜休祥兮重襲右萬吉驦張照丹霄紫燕雲龍降精雄姿傑出猛氣橫行騰山跨壑毛羣震驚於莵之族憑險誰攖林傳風嘯薄隱星睛天駒怒突振鬛長鳴爪牙縮衄顛隕溪坑威神崇衛警蹕塵清右闞虎騮梁詩正獅子玉龍為友塵不動風來陡情萬里心一人坐文殊擁吉雲玉其色獅其力毛且物俱無匹蹄雪寒耳竹秋成地用與天遊可君意受君恩日無事冬又春右獅子玉張照龍馬華文朱兩翼軒紀來從太蒙域凌雲超忽奔虹織踠踣雲雷輸疾亟騰光瑞聖聞疇德即今服皂天間側六飛角壯看竒特一團旋風桃花色右霹靂驤梁詩正秀含月窟精降星房桃花汗赭夾鏡瞳方四蹄先鳥一座如床流水日永行雲風翔般般麟若點點雪裝滅沒䟃𧽼卬首高驤鴥彼飛隼庶幾頡頏右雪點雕張照天子之馬允資德驥在越影與超光念乘奔而謹轡比玉輦之間安懿九花之上駟騰逸足以無前婉柔心而馴致惟銜橛之不驚斯以信逍遙之能事右自在驈梁詩正地無驚煙海千里太平百年豐有芑肉騣空老天間裏九旒旗下五花美爾獨當御龍顔喜一嘶羣馬皆竦耳超光趨影去天咫足底矞雲紅黃紫右奔霄驄張照感朔思兮風蕭蕭影滅沒兮朱霞飄秋隼橫厲兮盤青霄大羽獵兮靈之囿徼輕禽兮逐狡獸飛鞚兮驚沙電掣兮前遮回靶兮縱鏑不遣霜拳兮破空擊右赤花鷹梁詩正展倜儻以權竒聊逍遙以容與橫秋風而流英撲春雲而如舞涵淑德於逸才正當年而遇主殊七十之馮唐比草四之鄧禹右英驥子張照逸景孫天馬子骨開張姿淑詭凌雲氣輕萬里上天衢追日軌顧飛龍爭尺咫秣芝田飲蒙汜環九垓歷塊耳歸有德勢風靡驂象輿步金戺太一貺匪今始右籋雲駛梁詩正三希堂圖贊梁詩正書品稱聖無過逸少家法是貽官奴特妙奕奕東亭韻流椽筆躡迹雲龍抗行齊匹鐫華永式墨本無多竟完片璧神物撝呵幾餘甲乙研精寶笈採掇菁英居然鼎立堂仍溫室顔曰三希仙毫記述妙緒雲飛厥義維何物以少貴緬企遐宗轉含道味與古為徒與天為徒進德遊藝於此焉俱心畫神營旁參筆陳却笑米家但誇寶晉琅邪羣從風流著聞披圖靜對未沫遺芬稱制評書右軍傳贊睿思淵微義超貞觀三希圖贊汪由敦皇上得王羲之獻之及王珣三人真迹因顔所貯堂曰三希御製為記復命臣董邦逹合寫為圖臣由敦敬為之贊曰古人有言文章小技區區翰墨又其餘事乃卓乎立極於千古窮神入化巧不可階而力不能至羲稱書聖獻之克嗣法護朗朗才復不易至於今二千餘年矣而一鱗片甲神物呵護者虹光寶氣猶上燭乎天閶而邀睿賞於神契蓋一善不遺故慨慕流連既揮翰以銘堂復圖形於清祕聞之達者於物寓意而不留意竊獨謂天縱淵衷本末一貫初無分於道器藝猶如此况等而上之於墻於羹孰能測神心之精邃披斯圖也將逺懷自有所寄而非徒寤想晉人之高致也耶眀史列傳贊汪由敦徐達常遇春贊眀太祖奮自滁陽戡定四方雖曰天授蓋二王之力多焉中山持重有謀功高不伐自古名世之佐無以過之開平摧鋒陷陳所向必克智勇不在中山下而公忠謙遜善持其功名允為元勳之冠身依日月剖符錫土若二王者可謂極盛矣顧中山賞延後裔世叨榮寵而開平天不假年子孫亦復衰替貴匹勳齊而食報或爽其故何也太祖嘗語諸將曰為將不妄殺人豈惟國家之利爾子孫實受其福信哉可為為將帥者鑑矣張寧等贊御史為朝廷耳目而給事中典章奏得爭是非于廷陛間皆號稱言路天順以後居其職者振風裁而恥緘默自天子大臣左右近習無不指斥極言南北交章連名列署或遭譴謫則大臣抗疏論救以為美談顧其時門户未開名節自勵未嘗有承意指于政府效搏噬于權璫如末季所為者故其言有當有不當而其心則公上者愛國次亦愛名然論國事而至于愛名則將惟其名之可取而事之得失有所不顧于匡弼之道或者其未善乎顧憲成等贊成𢎞以上學術醇而士習正其時講學未盛也正嘉之際王守仁聚徒于軍旅之中徐階講學于端揆之日流風所被傾動朝野于是搢紳之士遺佚之老聫講會立書院相望于逺近而名高速謗氣盛招尤物議橫生黨禍繼作乃至衆射之的咸指東林甘陵之部洛蜀之爭不烈于是矣憲成諸人清節姱修為士林標凖雖未嘗激揚標榜列君宗顧俊之目而負物望者引以為重獵時譽者資以梯榮附麗遊揚薰蕕猥雜豈講學初心實然哉語曰為善無近名士君子亦可以知所處矣魏允貞等贊朋黨之成也始于矜名而成于惡異名盛則附之者衆附者衆則不必皆賢而胥引之樂其與已同也名高則毁之者亦衆毁者不必不賢而怒而斥之惡其與已異也同異之見岐于中而附者毁者爭勝而不已則黨日衆而為禍熾矣魏允貞王國余懋衡皆以卓犖閎偉之概為衆望所歸李三才英邁豪雋傾動士大夫皆負重名當世黨論之盛數人者實為之魁則好同惡異之心勝也易曰渙其羣元吉知此者其惟聖人乎御繪詩經全圖贊梁詩正伊古垂訓左圖右書覽觀鑒戒如與遊居我皇稽古道存目擊無逸豳風高張殿壁娛情翰墨清燕餘間萬象天秀隨元氣還詩三百篇繪事流美惟馬和之超宋書史風雅攸寄尚有典型匪刪匪逸不見全經爰整曩規羣工待詔仿舊補遺擬追筆妙能品備矣未進於神仙毫點染飛動疑真乃眷左方御書章句逺邁思陵諸體畢具南陔以降束晳補亡周情孔思更撰篇章幾暇從容程功勿亟七載集成萟林動色生氣逺出鎔冶化爐遺文總録合璧聫珠糾縵煙雲昭回星漢萬丈光華天章縈貫神心逺邁大義載宣匪曰遊藝進德在焉五際六情條綱可述理趣環深藴涵微密寫氣呈貌屬采附聲美刺審象心開目明受詩卒業求端要止大旨所存聞子朱子斯圖重炳可興可觀開卷自得無勞仰鑽由缺得完因文見道舊迹流傳儼然師保小臣稽首大哉王言妙闡經義德成教尊形四方風繫一人本但凛陳詩何煩補衮丹青法戒矇瞍誦針此焉並舉不顯亦臨盛德形容千載一遇歌頌無文聊充傳注歷代帝王道統圖讚錢陳羣伏羲龍馬負圖道統開天遇聖而授設位成能立極惟后丹圖五五羅星錯繡蓄祕儲精神物孰寇河流渾渾龍駒昂昂赤文緑甲背負騰光考序作卦觀變隂陽文辭未立理藴已彰神農遍嘗百草帝念蒸民得生而樂教耕耒耜濟病醫藥二儀變化蕃廡聚薄鞭之以赭有長無落氣均大地數應周天五華二實性别形遷辛溫克調痟癘斯捐人心和平夀考永年黃帝畫井制畝繼神農氏黃帝垂裳因民耒耨肇域井疆披山通路省下土方四道八宅民居以康步測章亥數推隸首師兵往來原隰左右冕旒相度蓑笠奔走百度漸興經始隴畝帝堯欽若授時惟天為大惟堯則之敬觀懸象授民以時羲和既命璣衡乃窺分至中星是正是推三光揚精五氣順敘民無憂患燥濕寒暑作息食飲樂恆安處問帝之力何有於豫帝舜鳳儀麟舞玉瑞既班琴絃斯撫九成簫韶兩階干羽應律風平諧音石拊麟鳳為寶來儀率舞羣后至止虞賓在斯揚帝之華典樂唯夔敷教行賞象刑方施薰風自南恭已無為夏禹隨山刋木禹敷下土四載是乘決濬因勢力靡弗勝爰暨益稷功能克承祗台之德不伐不矜既道山川乃定貢賦錫圭告成賜姓表胙百神用饗民宗度數惟日孜孜惜隂成務后稷教民稼穡有邰之興際唐虞夏厥有相道匍匐知稼堯舉農師民力乃藉嘉種是登陳常贊化險阻既逺民居方夷奏庶艱食布物土宜粒我億兆以慰其咨肇祀嗣歲以迄於兹成湯網解三面成湯正域克寬克仁若秕惕罪視水懷民出見張網與物同屯曰為更祝溫然陽春爰釋三方用驅一面高下左右惟欲所便失禽不誡聖德始見漢南諸侯聞風歸善殷高宗夢賚良弼彼築者誰衣褐帶索芒芒虞野風雲寥廓殷王恭默景命眷亳賢臣入夢不忤而遻用作霖雨爰起骨靡天同神比孰左右之惟爾納誨庶其輔台克紹乃辟殷祀永綏周文王發政施仁聖人之仁物無不愛急先務者澤必下逮惟此無告萬狀千態我覆育之勿令終廢至哉西伯化被六州振乏宣滯敷政優優枯骨瘞矣孔邇求矣維岐之治實啓有周周武王訪箕衍疇天以一清厥朔生水禹順治之九疇是矢推衍增益實惟箕子書不盡言與圖同旨衡縱十五會于中央錫福者后建極者皇訪于商耉周祚用昌彜倫攸敘治道大光周成王卜年定鼎武登豳阜實求天保三塗嶽鄙顧瞻周道爰審雒伊天室載考公旦攝政業隆襁褓自周朝步命召經營乃卜年世兆食獻伻鼎定郟鄏和會休明二誥既成越裳是庭漢高帝大牢祀聖孔子至漢二百餘年藏器習禮魯邦世傳高祖過之太牢祀焉令諸從政肅謁必先維至聖道其大難譽後世追崇典禮彌著初隆釋奠戎器猶除馬上治之斯言殆庶光武錫封褒德漢哀平間密令卓茂舉善而教子民恐後病免歸歟鐘鼓孰右光武即位重賞首購命就太傅錫之侯封克奬循良乃靖煙烽雲臺濟濟車服酬庸兹先論德百爾益恭唐太宗屏書刺史漢二千石唐之刺史畀以化權用致上理茍非其人政亦撓骩虞廷考績黜陟臧否太宗君國實重此官屏書姓氏聿求乂安安民要矣知人則難風移俗易史艷貞觀宋太祖洞開重門既定荆潭亦克嶽朗揆日作宫民應如響營宇有制仰師詄蕩豈居是崇實心克廣爰坐寢殿令開諸門如方寸地寧莫余捫端直通豁反側以安惴惴危微千聖同源右歷代帝王道統圖讚其圖為臣母陳書所作竊臣猥以庸才叨荷聖主洪恩豢養禁廷仰見皇上典學功純於古帝哲王懿行嘉言篤嗜遙集深契精微謹將臣母畫册計十六幅幅綴以讚另製一册進呈御覽敬申獻曝之忱用志乘韋之義臣錢陳羣恭識針明善針熊賜履善本降衷是為天命體用渾全曰情曰性大本達道心為之柄動察靜存無將無迎氣拘物蔽表裏交病不鸞而梟不麟而獍舉目棘榛動趾擭穽塞義充仁生心害政何以明之知行兼併去私存公間邪養正樹德務滋除惡務屏天理既純人欲亦淨澄若止水湛如明鏡心君泰然百體從令言為法言行為懿行富有大業日新月盛一念或差遂分狂聖一事偶違亦關殃慶念哉念哉道在主敬本體工夫斯其究竟主敬針熊賜履厥敬維何曰惟主一永矢靡他庶幾弗失戰戰兢兢莊莊栗慓微顯一原初終一律曰欽曰恭功存宥密聖聖相傳惟兹的實周孔之書程朱之筆一言終身敬哉無逸銘雜銘熊賜履几二章設之安授乃佚隱而卧忘豫恤彤席栗畫純溢蟠木烏皮勝雕漆杖二章扶危定傾維汝之行輔耆翼德維汝之職藜兮青笻兮赤投九節托六尺鑑三章鑑汝形明汝性形必端性必正瑩若水朗如冰宜玉匣畏青蠅白髮日生丹衷日清鑑乎鑑乎惡知豫之幽貞盤三章頮面滌塵盥手除垢方寸點汚繄誰之咎澡身對人洗心對天功夫無間維穢之湔見水思淵懼溺也見凍思寒懼戚也帶二章橫金則慙鏤玉亦訕縞素委蛇無災無患埀紳志正書紳道存屨毋由徑毋臨壑秋露寒春冰薄枕高則安欹則憂碎琥珀賦柟榴鴻寶之書不須搜拂蠅莫近塵莫沕鄭俠當年只此物千載而下名不屈屏風立則端直處必廉方善哉李尤其言孔彰榻非其人不設非其人不下硯方圓備蒼素分清如池翠若雲是之謂天地之文墨習習蘭津融融松液萬歲千秋憑斯一擲如之何弗惜筆犀比錐鋒同矢中書君管城子班生投安世珥夢花文獲麟止毛頴傳盡之矣紙白簡見青蒲變文愈衍道益衒是以君子慎所撰文房雜銘十二首陳元龍中書勞勩載寢之牀我方腕脫爾倦朱黃俾爾小休以養毫鋩動極思靜道在善藏右筆牀墨海既瀦研山尤峻紋如波皺質同玉潤在昔米顛署之寶晉墨雲滃然橫開筆陳右研山玉蜍一勺涓滴幾許散作墨花天孫機杼古貌是式虛中是注膚寸而合為天下雨右水丞管城所都譬猶武庫麟角鼠鬚居然成聚或剛或柔亦細亦巨隨材器使綽有餘裕右筆筒楮生有文宜主以靜式金式玉抑浮戒橫如砥之平如珽之正藉爾端方以為鎮定右鎮紙光分太乙短檠毋棄玉漏初長蘭膏方膩霏霏煜煜吐焰結穗三餘所資不遑宵寐右書燈雪花打窗紫玉冰結染翰濡毫倩誰呵筆微溫始泮春盎流溢生意融和愛如冬日右研爐懸腕斯貴枕腕斯易指法既運且休吾臂即墨膺封管城晉位乃召此君作掌書記右臂閣墨去其積言去其陳滌除舊染鋒頴彌新質瑩神完體潔用醇揮毫落紙清無點塵右筆洗比之律度為天下式在易維坤六二協德烏絲紫闌縱橫若一受材不欹好是正直右界尺書貴瘦硬代筆以鐵快劍長戟繆篆糾結龜駝壓紐秦殘漢缺清閟蕭間古香郁烈右圖章盛以水玉和以瓊液流耀含英內映外覿爰佐書史如圭如璧千秋丹篆策爾勳績右印池寶座銘徐本大寶曰位底定四方聖作物覩恭已垂裳黃屋丹宸世有典則膺籙受圖懋昭令德南面而聽居高臨卑聲律身度惟敬之為曰禮制心曰義制事記動記言史左右侍雕龍飾螭追琢其章保定孔固恢廓紘綱承式百官平章百姓萬邦時雍萬年表正未央宫瓦硯銘汪由敦炎祚開紫宫新陶甓良垂千春宜毫墨壁府珍銅雀臺瓦硯銘汪由敦神雀軒舉藏歌貯舞高臺既傾驚沙宿莽萬瓦鱗鱗遺此片甲質瑩而澤什襲寶匣豈無良材龍尾鳳咮閲歲逾千曷若汝夀又汪由敦伊昔之巨麗瓦也有餘愧而今之遭逢登几席以雍容陳祕殿松華泛臺安在哉瓦為硯是可鑑未央宫瓦研銘梁詩正元雲蒸蒼璧獲未央瓦酇侯作軼甘泉藐銅爵刀筆意早相託到於今伴圖籍播清芬石渠閣溫室瓦研銘梁詩正卯金銷留瓦注鴛鴦影已分蟾蜍氣方吐猶記當年簪筆人巡簷默數庭前樹銅雀臺瓦研銘梁詩正銅雀雙鳴五穀熟幻化長留硯田宿墨池清泚星光屬依稀照影漳河曲又梁詩正建安片瓦今依然神工遣結文友緣珍逾蒼玉千秋傳何似當年燦金碧臺荒空惜參差迹皇清文頴卷三十
