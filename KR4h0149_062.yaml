body:
  text: 詩七言古詩南苑德壽寺寶鼎歌張玉書德壽寺前曉日暄紫煙穆穆吹晴幡摳衣入殿訪靈迹陸離光映珠纓繁編鐘夾案總殊絶中央寶鼎雙夔蹲竒文雕摉窮物象晶熒變現蟠肘跟琪花鏤樹凝霧濕璚臺飛棟疑雲屯忽作虬鱗騰貝闕忽搖鳯翮垂天門羽毛爪鬣自生動日精月魄時吐吞真氣淋漓不一狀隱隱欲上丹砂痕古來彞罍無此製屈指䜌餗何堪論白頭老僧諳舊事此鼎實沐先皇恩指點倕工擬般巧草年手澤今猶存小臣近前三嘆息屏氣駭目難重捫歸來幽光滿胸臆睇望異彩彌朝昏為祝寶鼎精英應星緯離宫萬載栖雲根御書恭紀張玉書淑景春融敞深殿簾捲朱絲晝清晏侍臣入對蒙殊榮拜賜雲章出天半天門曉色籠御床諸曹夾陛陳封章日高奏罷講幄啓經函史籍紛璆琅懋勤逶迤接宏德講退隨聞親翰墨玉案常栖錦筆新中官跪展牙籖直御書神妙誰嫓蹤騁態極象非人工細比秋鷹筋入骨巨如矯鳯飛凌空萬軸縹緗騰異藻榮光上燭青旻杳片羽欲覩千黃金宸翰由來宣賜少學士手捧驪龍珠徑寸芒照十乘餘纍纍一百三十五不敢逼視奎文舒親題卷尾倣蘇軾對臨不與鉤摹匹意匠結撰藏丰稜蹲鋒撥鐙具神力噫嘻軾也搖落辭江城臨岐一闋離懷傾誰意中更數百載忽枉鳯藻飛瓊文漁簔社飲甘草莽至尊撫卷動殊奬自是憐才睿慮殷豈獨清詞激天賞如今四海登亨衢堂亷膠漆昔所無為願諸臣努力佐文治直軼晚近追唐虞扈從登澄海樓觀海張玉書遙尋碣石不可見振衣直登澄海樓長城迤邐到海盡海樓橫接城東頭樓高百仞星漢逼海勢欲壓樓堞浮蒼茫皓氣幾萬里空碧回互搖雙眸乾坤震蕩浸一色日月夾鏡懸中流驚瀾捲地掣電急怒號沸鼎奔雷收熒光變幻吐飛動錯采倏忽驂龍虬巨靈惝恍杳難測精魄散豁消煩憂延頸咋舌嘆殊絶恨無羽翰凌風逰雲根隱隱見覆笠煙際渺渺疑浮鷗緱城貝闕竟誰是神人巨迹徒冥摉海風引帆帆忽去方士語怪術謬悠節食却病良至理丹砂黃金將安求盛時百川永清晏飴口飽腹娛春秋蓬瀛方丈咫尺耳何事海外窮九州一片石王師擊敗流寇處張玊書雄關嶽嶽控海隅隂風吹沙啼曉烏片石曽傅舊烽堠王師躍馬行天誅羣賊歘來等聚蟻四海糜爛嗟焚如黃巾白波騁痡毒連旗大斾紛支吾蛙聲紫氣竟干正烏合狂逞恣長驅是時六軍正西指鐡絲徑箭龍馬駒紅花野戍轉戰急青笳落日張蝥弧二十萬衆麕雉竄半膏原莽半纍俘噫嘻中原全盛力坐同巾幗輸雈蒲天戈一指賊膽迸鷦鷯片羽燎洪爐傅檄勢比飛鳥疾耆定大業曽須臾我非瞽史識天道師行不殺人徯蘇百族蠕動潤膏雨三章約法除秋荼乾坤整頓六合一作京肇宅開天衢矯首關門重慨嘆古來設險徒區區松山王師敗眀十三萬兵處張玉書古戍春深曉飛霰馬首雲低擁征傳松杏山經百戰餘舊聞厯厯眼中見坡陀隱伏雉堞頺層巒拔地何崔嵬彎弓帶甲十三萬曾此空弮委塵埃紅羅山頭歸路絶青海嶂邊戰流血角聲入雲錦水枯湘纍迎降氣嗚咽脫囚釋縳居上筵豐貂翠幕鵲印懸南冠稽首紛雨泣效死誓日旌門前開天神武渺衆慮四海英雄歸駕馭袞袞將相圖丹青奕奕驊騮競騫翥于今亭堠生蓬蕭平蕪沙軟狐兔驕往事浸尋四十載共驅耕犢來春樵想像山城仗黃鉞虎帳經營幾嵗月萬年形勝收雄關千里邊雲接溟渤朝陵兩度輦路平百靈跂翼隨行旌經過鐵馬金戈地時作瀟瀟風雨聲薩爾滸王師敗明三路兵處張玊書長河百折徑鬱盤遙山夾岸飛沙寒山隈河畔野火出落落茅舍依林端舍旁老叟辭朴䔩戰場指點猶在目荒城入夜生青磷夾路于今埋白鏃當年敵騎明鉤膺梯衝雜沓雲氣騰四部軍來躒塞草千羣甲度蹂層氷左師結陳稱王杜吉鄰山頭橫萬弩睿謀䇿勝須攻瑕轍亂旋看散如雨崖邊逐北黃雲愁戰骨揔入渾河流周麾一呼三路覆鼓聲再竭孤軍收就中上將綎居首援亡矢絶真束手耳食猶傳劍槊名輿尸竟等螻蟈朽乃知天戈所向同摧枯迅掃萬騎風雷驅自此關門拓土宇中原指顧歸乾符廢壘茫茫栖白鶻沙場脈脈照新月遙岑木葉春隂高匝地英風吹未歇試馬歌張英天間萬馬嘶新秋碧草無際黃雲流清曉翠華駐南苑下詔眀日觀驊騮晾鷹臺畔平蕪緑房星中夜光可燭金羈玊勒珊瑚鞭雲錦千羣麗朝旭國家馬政前代稀芻秣蕃息過秦非玉關蔥嶺久通道渥窪異産今來歸聖人神武六龍御黃金幄敞頻回顧王公將相各呈竒赤騮紫燕紛無數平沙夾道旌旗開千騎逺自紅門來經過長楊厯甫草勢如電激聲如雷誠哉天馬稱汗血紅塵不動影先絶驪駒蹀躞看流雲照夜奔騰類飛雪中有龍種何蹁躚神間先到高臺邊超羣致逺有餘力五花蹴地真連錢須臾數馬復奔逸飛黃騕裊皆竒質前岡影動方微茫轉盻人前鳥同疾聖人顧此天顔怡三千騋牝皆權竒就中四十更雄特吳綾蜀錦優賚之國家典禮有深意恐有鹽車困騏驥便是金臺市駿心伯樂一顧空幽冀小臣何幸從馳驅欲寫神駿增躊躇試馬由來寄軍政拜手秋原贊廟謨天府寶翰篇張英祕閣西頭古錦囊時時寶鴨薰天香雕函什襲虬龍抱玊匣標題翡翠裝君王清燕常留玩不寶珠璣寶書翰往代名箋色尚瑩千秋遺墨光猶燦學書無過王右軍天門鳯闕逈無羣蕭踈內景神仙字娟秀曹江孝女文昔人謂右軍書黃庭經飄逸有神仙之概曹娥碑婉順有孝女之儀今內景經曹娥碑真迹皆存內府懷素上人筆如鐡漏痕叉腳皆竒絶藤影盤時鶴欲栖劍鋩舞處蛟堪截平原雄徑若有神內制猶存寶篆新顔真卿書朱巨川誥敕有唐宋璽晉唐墨迹人間少由來一字堪千緡端眀學士黃州客作字還如畫竒石山谷偏餘瀟灑姿南宫獨創嶔崎格骨氣蒼嚴數晦翁偶然藻翰皆能工始信真儒自淹貫臨池原不比雕蟲子昻雅得蘭亭意江左宗風猶未墜近代華亭説劍篇落筆輕圓饒逸致周文矩畫説劍圖董其昌書説劍篇閣帖初年拓本竒玉堂手記拜恩時宋畢士安為學士淳化初年賜此帖士安自跋于後澄心舊紙廷圭墨海內流傳第一碑古人真迹良難遇一片精英凝尺素鴻寶常騰奎壁光靈物從來鬼神護聖主典學開承眀旁搜文翰佐升平譬彼珍竒貢川嶽沐日浴月光華生纍朝妙墨藏天府聖情如厯瓊瑤圃溫室臨摹敲硯氷風亭展對飛簷雨侍從詞臣許縱看驚心駭目誇雄觀泰山俯視皆雲氣滄海平臨盡紫瀾先教拂拭青玊案捧持須用薔薇盥書家今得見山隂如遡河源入星漢再拜稽首恩無疆晴窗寓目神飛揚天球河圖世世寶上與景慶同輝光溫泉歌張英蒼山層疊東方來插天萬朵芙蓉開中有幽巒自盤互溫泉觱沸靈山隈遙見白雲覆巖谷波光日暖寒松緑四時天氣總春融雙泉數武分涼燠靜如眀鏡石池平瀉入房櫳取次行蘭香瀲灧膏千斛碧色深沉玊一泓定有丹砂結泉底仙竈綿綿傾石髓陽烏浴彩咸池波燭龍銜照空潭水天生靈異豈偶然近瞻世廟橋山巔土脈精英恣磅礴鬱蒸佳氣通源泉常聽空山傳警蹕畿東勝地時巡日來逰彌切望陵思豈為臨流賞清泌慈寧聖人鶴髮垂有時鳯輦出龍墀樂逰原上溫泉畔風土清嘉聖體宜規模簡朴留陳迹半畝方塘甃文石繚垣翠巘蔭長松行殿土階沿素壁却笑華清侈費多連雲宫闕漫嵯峩何須刻石成鳬雁豈待鏤金作芰荷聖朝舉事皆有則敬愛為心儉為德寧親常願葆天和結搆恆思惜民力今年扈從碧山岑賜逰佳地荷恩深每懷袚濯塵纓志時望天波挹注心蒙賜御筆臨米芾長幅恭紀張英聖主求寧致清宴坐擁圖書千萬卷省覽機政日中昃典學稽文意靡倦微臣嵗久侍華清講席經帷燕常見避暑多在甘泉宫栁風槐露迎涼院几畔秋蘭襲袂香階下新荷映波茜聖情怡豫對清流微颸不用移宫扇日揮鳯紙恆百幅退筆為山墨為澱逺自篆籕逮晚近縹囊玉軸羅羣彥漏痕叉腳法益竒虎卧龍跳勢屢變御筆腕下集大成俯仰千秋稱獨擅臨摹最愛米與蘇古人重見開生面襄陽野老舊知名異代遭逢數稱善當年承詔入深宫落筆驚竒響春殿米顛豪放本不羈紫袍自裹端溪硯長箋流傳入內府側近龍香荷宸眄字大如碗近數百淋漓瀟灑吳淞絹鍾王顔柳各有態盡入豪端供結撰徑筆軒翥摩丹霄竒情夭矯躡飛電珠璣萬斛神采殊珊瑚百尺霞光絢念臣朝夕傍棐几特與疏恩及愚賤兹幅拜賜出明光寶翰煌煌倚深眷榮光夜燭蓬蒿廬奕世家珍共欽羡大西洋貢獅子歌應制王士禎古云狻貌日走五百里逺隔流沙生月氐康居疏勒曽一獻丹青顧陸矜神竒夙聞其名思一見玉關迢遞天西陲况復野干日鳴噪安得一吼驚􅀈咿聖人有道十七載景風海外舟車馳元龜象齒紛置驛文犀桂蠧羅庭墀大秦之西國絶域懸橦度索來數期厥有神獸修方物波濤逺迸蛟龍隨海人泉客盡避徙朱衣絳幘不敢窺形狀瓌詭氣奮迅目光睒眻毛耐耐巨髯毿㲚尾如斗徑毫柔毳相離披發聲殷其雷破壁顧盼已却千熊羆乳虎犛牛望辟易何論六駁兼文貍搏象搏虎具全力威在齒尾非毛皮上林晝開射熊館詔付象胥有職司聖朝寶德不寶物百獸率舞良所宜五風十雨兆民足騶虞在囿麟來嬉寫入職方舊圖繪二南萬古傳風詩聖駕南巡詩有序汪霦皇帝御極之三十八年武功耆定文命覃敷聲教所被無逺弗屆時則和氣翔洽年以順成太平之象書契以來所未有薄海內外僉曰休哉除天下之大害者享其利任天下之至勞者居其安聖天子以守成兼開創勞形焦思者三紀於兹治定功成物靡不得其所繼自今以往歌風而理從欲而治其無煩宵旰乎皇帝曰噫無逸者逸居休弗休維兹黃運泛決民罹其災嵗糜大農金錢無算且江淮吳會財賦所自出也十年弗省恤恤乎念之爰於中春諏吉奉聖母南邁其隆孝養也則問寢視膳靡有失節山川所經民人之繁庶風俗之茂美皆藉以怡恱聖情極尊養之至願其簡扈從也虎賁􅉏御期門羽林之士才足以給使令而已其省供頓也糗糧脯修帷帳槃匜悉出內府所有不以纎芥煩吾民也其飭河工也則開引河疏清口築堰導湖塞下流諸壩口授手麾莫不中機要合緩急河臣祗服厥事不迷於所往其重農功也所至田野輒進父老詢以天時豐嗇地利肥瘠人力勤怠委曲周詳不啻主伯亞旅之相為謀也其振文教也念東南人材藪澤再廣進取之額輶軒所貢片言隻字足備採攬者必和顔色以受之其修武備也凡禁旅之出戍者緑旗之守禦者至則搜軍實簡卒徒校其進退坐作之節以為軍帥之賞罰士伍振刷靡不供命其飭吏治也自封疆大吏以逮一命之士具悉其亷貪敏惰治行稍稱者輒寵以宸翰用示鼓勸其寬文法也凡三省之民殊死以下情罪可原者悉子蕩滌囹圄空虛民以和樂其宏蠲賜也大江以南比嵗之積逋不下數百萬悉除悉貸毋令農民困於追呼鹽策之因時量加非經制者弗征永著為令商得休息官無所侵漁是行也大駕屆道凡百有五日數千里之逺兆民之衆萬事之殷繁莫不秩然就理夏五月還京師臣竊惟我世祖章皇帝以開天之聖纘太祖太宗之丕基殷憂締造始能統一海內光宅天下逮我皇上沖齡踐祚深惟三后肇造之艱難不敢稍自暇逸消國家無形之伏莽廓振古未闢之疆圉智勇天錫莫與為比而且仁育義正惠養元元隂陽燥濕工虞水火下至日用飲食之細無一不與民相流通故民之戴之也不戒而孚不謀而合今者恭奉聖母由畿甸至於海隅窮鄉僻壤之民莫不扶老携幼喁喁穰穰環行宫而嚮慕者日以億萬計以天子之尊尊其親以天下之養養其親聖母顧之而後喜可知也至矣哉孝乎知人安民繼述之志事也文經武緯顯承之謨烈也合四海順豫之情以無忘世祖付託之重豐功偉烈舉於此尊養之一念廓之矣若夫紀定省之常儀托哲惠之善政形容盛德以為足以窺聖人之萬一此猶暗者依光而不知由於日月渴者飲河而不知發於崑崙也豈能罄其光華通其條貫哉臣浙人也以需次國門不得與農夫野老恭迎江滸瞻穆穆之清光又不獲簪筆屬櫜與從臣之列然歌詠聖德俾千萬世有所紀述者史臣之職也其敢以不文默而自已敬賡有韻之言用紀無私之德詞雖下里義等康衢云爾其詩曰我皇德邁軒與羲覆載照臨三無私揆文奮武萬國治在昔三叛兵弄池廟謨翦剃若拾遺扶桑底定波不靡羅鳯郡縣非羈縻惟北有蘖雄恣睢帝車三駕庭三犂民氣和樂遨以嬉六七十翁如小兒繼今垂拱真無為大開眀堂坐治之帝曰咈哉子其咨一夫不獲若已推宣房未築河瀰瀰淮之左右懸釡炊大農金錢嵗虛糜矧兹吳會財賦資民亦勞止愁南箕十年望幸安可辭東風解涷春日遲乃乘時令揚蒼旗御舟容與平如移龍頭豹尾紛葳蕤誰其從者丞與疑柱下之史簪筆隨進退左右各有司直沽環衛天東維滄洲瀛海為藩籬揚舲直下濟與淄地過徐兗星婁危黃水衝決楚岸庳躬自測度沿沙坻河靈效順來馮夷天清地定江漣漪蛟龍拜舞瞻天麾吳都三月春和時迎鑾馥郁蕚在枝是時正值萬夀期老弱拜跪相携持三浙父老仰聖慈夏旱望雲冬待曦天鑒誠悃臨江湄乘輿再向鍾山陲牙檣北指薰風吹維夏五月還京師史臣頌德窮於詞約略紀載昭來兹譬窺以管測以蠡皇帝至孝戀慈帷尊親繼志咸無虧山川周覽皇情怡皇帝至儉福所褆膳饈服御行者齎勿以供頓勞羣黎皇帝至眀繼重離治行殿最靡弗知亷者錫服貪夫褫玉衡金鏡手自提皇帝至勤乾健姿河工閲視忘胼胝口授方略指以撝疏瀹決排慎所宜河臣再拜膺成規皇帝至仁雨露滋空索祝網滌垢疵大德曰生民用孳俗吏期會為繭絲積逋纍纍民力疲悉豫寬貸無呼追淮民煮海謀刀錐官吏往往營姦欺減賦停𣲖蘇瘡痍皇帝文武德並垂觀風問俗陳以詩片善皆得來軒墀維吳與越多英竒生徒增置各有差小子有造佩以觽天章雲漢光紛披結體夭矯盤蛟螭千秋墨寶時一窺不二之士惟熊羆干城重寄罝在逵一朝饗之樂有儀簡閲步伐射與馳汝不供命厥罰施軍壘變色無敢戲卓哉至德淪膚肌皇心視民猶溺飢詔下百辟思復思謂天蓋髙聽以卑太平有道開鴻基樂只君子福履綏天不愛道露如飴地不愛寶靈出芝民登春臺樂不支從今八萬四千嵗普天率土歌雍熙皇清文頴卷六十二
