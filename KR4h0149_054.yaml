  text: 欽定四庫全書皇清文頴卷五十四
  hash: sha256:b126acb992dd55c734811a7ceb2db1c0cb4f797cfe445865cb05923f6ac1c26e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_054-1a, image: WYG1450/WYG1450-0013c.png}
body:
  text: 詩樂府聖武功成鐃歌鼓吹曲十章陳論皇上怙冒遐荒德威丕著肆征弗庭罔不耆定為聖武昭第一皇建極臨萬方九功敘六師張克逆藩斧其吭清海氛波不揚神謀祕略由廟堂逆節盡芟夷風雷萬里馳窮荒絶徼聲教阻天戈所指均披靡稽典籍黃虞時威四盜定三危我皇功烈烈如此以今方古何云奇海內有不順者滅亡自取之右聖武昭之曲二十二句狡冦厄魯特噶爾丹怙恃險逺擾亂西北邊屢敗屢竄未抵厥罰皇上決䇿親征為行天討第二蠢兹逆孽為塞垣賊虓虎猲獢自矜無敵我武維揚滅此朝食布告中外窮邊親涉羣工留駕彤墀搏顙帝曰汝曹所見殊爽朕無成算朕肯輕往決機制勝賊在股掌黃鉞白旄氣吞罔兩嗟爾罔兩不早釋仗右行天討之曲二十句尅期誓師遂潔誠禋祀天地宗廟社稷告以為民除害至意為虔祭告第三皇澤渥皇心仁不肯無故勞征人逆冦茍不除肆虐荼邊垠乃擇上戊乃擇上辛禱厚地籲蒼旻宗廟灌獻齊精禋惟爾有神尚克相豫以濟兆民明德惟馨通帝闉髙靈降歆錫福新迅掃逋冦如飛塵右虔祭告之曲十五句鸞馭未駕先遣大將軍費揚古及孫思克等分道四出以遏賊歸路為命將帥第四雄虺雖猖顛猘必撓如掩諸困獸先防其遁逃時皇帝坐法宫簡車乘集元戎此扼其西彼掩其東面授方略如運之掌中殱賊訖授汝鉞放賊脫唯汝罰貔虎熊羆張撻伐指揮既定六師乃發右命將帥之曲十九句聖駕一涖邊庭沙漠絶塞泉湧草茁萬象皆春為嘉祥應第五苦寒地西北邊野無草坎無泉平沙萬里空人煙六龍降臨春來自天玉珮聲泉涓涓緑羅色草芊芊馬騰士飽爭闐闐昔禎祥史册布飛卿雲灑潏露不過耳目娛何關軍國務吾皇誠感天乃顧靈泉瑞草真堪賦右嘉祥應之曲二十句上軫念邊氓亟為除害三十五年春至拖林冬至鄂爾多斯三十六年春又踰寧夏抵狼居胥山不憚殊勞克成偉績為三出塞第六昔為君坐祕殿居深宫沕穆端拱凝休隆今我皇沐塞雨櫛邊風積勞茹苦成奇功天山雲嶺再三出綿歷寒暑更春冬須識聖人心不在耀威武除稂莠以惠嘉穀要使邊氓樂安堵解衣推食激士心百萬兜鍪盡如虎吁嗟邊氓爾何知知樂太平式歌且舞右三出塞之曲十九句帝德同天宣布絶域厄魯特台吉寨桑人等慕義來歸者相屬皆厚加豢養兼授官職為廣招徠第七虺可化猱可馴矧彼含齒帶髮名為人傾耳聽感皇仁湔除舊染圖維新叩頭齊欵塞願得儕編氓帝勿汝殺悉汝祿厚其恩養加章服鷹眼化為鳩挺險胡為工走鹿傳語我長我父兄棄逆效順俱來廷光天化日過此生毋守土穴隨鼯鼪右廣招徠之曲十六句狡冦就殲西北塞數千里悉我臣妾荒徼絶塞間更無不順不附之國為大無外第八國家八荒臣一切獨此么髍偷作孽偷作孽自取滅鐡額銅頭鎔一血天兵電掃無遺孑從此率土欽皇風東西南北章亥所步盡來同譬如長天無點翳蔚藍萬里日正中譬如大海環東南江淮河漢萬派都朝宗幅員廣大振古少昌期景運興隆隆微生何幸獲躬逄右大無外之曲十五句邊烽既靖上憫將士行間况瘁下令班師為凱歌還第九南風熏淑景清班師振旅還神京鐡甲耀金戈明千乘萬騎如雲行俘纍丁壯兼孩嬰前呼後應凱歌聲至尊法駕入國門千官萬姓夾道迎山呼動地如雷鳴一人勞四海寧女安織男安耕放牛歸馬慶升平右凱歌還之曲十六句諸臣民以皇上功德敻髙崇上尊號勤懇再三上屢頒諭旨謙尊弗居為辭尊號第十皇上功德亘古得未有震虩同雷霆覆載齊髙厚羣臣萬姓黃童白首頓顙向楓宸至再至三勤懇陳巍巍蕩蕩至德難名贊天誦日罄愚誠九重幸無拒慶遍率土濱皇帝曰吁焉用之摧枯振落何云奇安愈圖安乃所期官曹飭簠簋田畝勤耘耔薄海內外保昌期古來郅治推軒羲豈有殊號傳今茲右辭尊號之曲二十二句平北雅三篇宋駿業成命篇第一天子自將出塞靖邊塵安萬民也皇受成命惠此萬方我詒黍稷我時雨暘維山乃棧維水乃杭寄鞮象譯罔或不王一章彼狂不順敢盜我邊聚頑嘯凶蜂疾蟻延帝命惠來文告往先彼狂卒迷乃絶於天二章皇奮厥武太常建羽以類以禡帥是羆虎皇誓於師親執路鼓鳴鐲振鐸繕我士怒三章皇命虎臣出車於西乃翼乃角乃鏺乃􅔊皇猷允塞袵席過師彀我天弧以射妖霓四章王旅嘽嘽踰彼沙磧小大頓顙蕃畿來格有草斯甘有泉斯溢士飽而歌同仇是索五章王旅嘽嘽如川如嶽進次於河拔其距角千夫一勇是鞣是㧻血馘以釁皇功維濯六章凶徒既訌拉如枝披竄于窮野遻我西師酋矛重弓兕甲虎旗載踣載跐載剜載劘七章師干之武神謀丕奠萬里風披有征無戰龍荒狼望視我畿甸仰父俯子式歌以宴八章威振西戎朔庭遂空邊氓燕喜上帝錫祉麻麥幪幪禾黍芃芃億萬斯年維天子功九章右成命九章章八句皇祐篇第二天子再出塞料軍實決機宜也皇祐下民亦既勞止顧茲凶醜窮荒作痏既剪既蹙靡覺靡悔震霆殷天巖處塞耳一章鳥獸之伏越有噬攫顧彼凶醜其跧或躍皇命虎臣整我疆索敬修我戎張皇武略二章爰峻爰守爰遍爰誘地紘斯張天畢斯覆王言炎炎先迷豫宥孰是赤子絶於父母三章皇有正命往巡北邊出謀發慮制勝於先朔風觱發澤腹既堅惠是黎庶乃蒞乃前四章左纛斾斾和鸞噦噦皇于修戎於塞之外振我天䇿滅此狡獪邊氓歌舞繄皇之賚五章凶醜駾矣且顛而僵遊魂或變窺我糗粻王師奮擊乾坤雷硠為獍為梟往作爾殃六章其殃孔亟部擕族倫左蠡右賢鳥伏獸蹲歸命於皇既悔既悛皇曰爾來爾維我人七章天子曰嗟豫其休士還軍於代代人咸喜或咢或鼓於塗於市旄倪駢闐媚於天子八章蠟月維吉皇乃還歸父老稽首願留毋違皇用勤民服是戎衣外靖內安維德之威九章右皇祐九章章八句天監篇第三天子三出塞凶醜窮蹙服天誅集大功也天監有赫繄德是親維皇翼翼至誠格神蠢爾小醜敢梗不馴皇三震之鼖鼓金錞一章維皇勤民於山於川匪徼匪棘天討是虔毋縱寇虐以靖我邊武車綏旌陟降連連二章皇蒞於涼格我多士桓桓多士維天子使我徒我車我行孔舒蕩其穹廬至於狼居三章維狼居胥朔野之極皇親蒞止舜禹是則贄寶請臣遍於蕃國豈伊武功上帝與德四章彼凶有子乃縻乃俘彼凶有臣莫究莫圖震我師武戎兵是袪震我德音腹心是輸五章天地大矣彼凶罔匿自戕自殘伏天之殛蠢蠢餘醜心與面革蠻夷蕃鎮遑敢作慝六章乃諭乃拊載歌載舞北荒即序允皇之武皇武既張皇風既揚區外萬里我階我堂七章皇乃振旅至於京師獻社告學於廟受釐櫜弓釁甲文德是施仁風滂洋萬邦洽熙八章皇勤於民弗遑啓處殄此凶醜邊患是紓上帝眷之富以麥黍惠我萬邦既夀永昌九章右天監九章章八句聖駕北巡鐃歌四章沈涵撫萬國頌皇上天威北指厄魯特逺遁廟算宸謀度越千古也當漢擁離天子撫萬國愛護原無私強者不得肆弱者與扶持要使宇宙含生受氣屬盡為赤子同熙熙厄魯特爾何倔強沙漠陲荒磧自跳躑爾安爾生吾不治奈何憑陵與國窺伺籓籬命大將擁熊羆直臨瀚海翦谷蠡遣使先將威德諭抗逆不譓天兵隨金鼓震戎車馳大鉞一麾妖氛靡挫彼猛噬勿窮追成湯祝網施洪慈咄爾厄魯特何不稽顙來朝同沐天子德肥牛重錦黃金羈自竄窮漠將何為惕息匍匐良可悲右撫萬國一章章二十有七句乘法駕頌皇上大駕巡邊喀爾喀等懇切抒誠願同四十九旗一例也當漢君馬黃乘法駕出紫清曵鸞旗張龍旌羽林金甲耀虎賁繡韎輕薰風滿道飄笳吹萬乘臨邊御虎城歸命侯王厥角拜感恩君長負弩迎扶老更擕幼感泣共抒誠盡言往歲苦奔竄荆棘無聊生復言今年樂牛羊蔽野馬縱橫出我湯火登袵席秋毫皆賴帝力成世世願附為編氓天子嘉乃欵大賚加恩榮醴酪千鍾賜魚龍百樂呈至尊含笑臨其營顧令按轡徐徐行大者封王小台吉佩章紆綬表忠貞推將赤心置人腹誰不鼓舞頌聖明一人輿暫駕萬里盡銷兵慶賞畢回玉京明堂端拱享升平右乘法駕一章章三十有四句紫壇髙頌皇上德合天人鑾駕還宫甘霖屢沛萬民胥悅也當漢芳樹紫壇髙結凌蒼穹靈符牒遍蛟龍宫潭中老龍不一應咨訪民莫勤丹楓須臾炎飈散煜燠白晝隱隱雷聲通雷聲漸殷雨驟至上林萬樹皆空濛詰旦郊農報霑足麥苖菜甲俱芃芃歡呼萬乘北地廽雨師風伯先驅雄乃知天心感至德特為聖主掃旱爞周王除殘雨隨至吾皇撫弱雨亦從誅殘撫弱事雖異仁心感應理則同皇衷自有千年澤不用蜿蜒潭中龍右紫壇髙一章章二十句六龍旋頌皇上敬天勤民還宫三日齋祓告虔親詣北郊行禮也當漢上陵翠旗揚暑六龍旋帝德無外中心乾撫綏事畢祀典先預修齋祓居甘泉將於地祗致精虔海日欲起曈曨鮮玊輦涖止方丘前從官燦列星麗天既灌焚燎升紫煙樂奏咸池琴瑟宣百靈翕集歆几筵介以景福屢豐年右六龍旋一章章十有二句聖駕南巡風謡十章彭會淇斗東指兮初春撰吉日兮良辰條風布兮解凍細雨霏兮灑塵吾皇來兮夙駕快盛典兮重新一章涣大號兮先庚重軫念兮民生禁供億兮費省簡騎從兮裝輕吾皇來兮不擾瞻輦路兮風清二章潞河泮兮流澌笳鼓鳴兮解維陽侯助兮斾舉羲和馭兮舟移吾皇來兮容與紛扈從兮追隨三章金根度兮芳洲鳳舸乘兮安流侍晨昏兮定省借山水兮優遊吾皇來兮有喜隆孝養兮千秋四章日遲遲兮景舒路坦坦兮道除眺浮雲兮海岱指樹色兮淮徐吾皇來兮孔邇適我願兮匪虛五章攬萬幾兮維康急先務兮河防桃花泛兮千里瓠子歌兮一方吾皇來兮相度為斯民兮慮長六章紫雲蓋兮重重碧波漾兮溶溶牽錦纜兮堤緑映畫楫兮林紅吾皇來兮樂只勤清問兮從容七章波浩渺兮江清宛中央兮浪平拋玊尺兮魚躍聳琳宫兮山迎吾皇來兮攬勝歌喜起兮載賡八章布穀鳴兮杏花菖蒲葉兮稻芽雜車騎兮耒犢倚旌斾兮桑麻吾皇來兮觀稼樂婦子兮喧譁九章龍舟停兮雲凝鑾輅舉兮日升簫管吟兮細細香煙結兮層層吾皇來兮至止滿衢路兮歡騰十章大駕南巡樂府四章有序趙執信康熙二十八年春正月大駕南巡三月至會稽而還兹行也省方問俗布惠施仁凡諸美政考之書傳實所罕覯臣以弇鄙食祿無效謹為歌詩四章隨衆録進非敢曰揄揚萬一期於紀實云爾東南春道路無擾也青帝前驅廽日輪萬乘行布東南春馬蹄初踏近郊雪龍旗半捲遙空雲岱嶽峯連會稽起鸞輅如天蓋千里金吾不警清路塵羽衛無聲映江水山川景色欣相催至尊六年一再來東風先期作供頓江南二月梅花開白叟奔迎黃口笑共指香煙辨天貌何似漢代諸老人扶杖但聽君王詔歲星謠蠲租稅也歲星熒熒行危虛東溟作帶聮三吳詔書有似應時雨一瞬萬里同霑濡齊兒飽食樂鉏耨意滿不慮明年須江淮人家遞相賀灑然宿痼新痊除門前縣吏噤不呼長官威重今蔫迂村村社鼓競春酌欲陋葛天凌黃虞田父擊壤歌作息謾道毫釐非帝力但願吾皇一歲一來遊笑語婦子何用憂江水清吏知法廉也河水何洋洋江水何湯湯誰能引北斗挹此清流長六龍行天挾雷雨雨作懷柔雷作武天吳為導靈怪潛不用然犀照牛渚二月水暖菱蒲青東風無力春江平樓船漾影入雲際飛鷺遊魚時自驚中流安穩遲蘭槳應笑橫汾意鹵莽待將百谷付陽侯千古濁泥胥滌蕩桃花然變民俗也江上桃花如火然人家染帛如桃鮮春來酒熟魚米足飽暖莫問囊無錢一朝喜迓鑾輿至錦綵成行競儇媚豈知夏后惡衣心不取吳兒竿木戲分明天語聞咨嗟唐風舉似儉可誇始信至尊惜物力肯教西北艷繁華秦淮青斾搖明月西湖白絮飛晴雪刑輕賦減家贏糧管絃壺榼嬉何妨皇清文頴卷五十四
