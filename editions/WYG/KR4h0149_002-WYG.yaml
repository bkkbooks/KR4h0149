body:
  text: 表恭進御書㸃翰堂法帖表陳廷敬臣廷敬伏䝉聖恩賜臣御書恭摹上石因賜臣㸃翰堂名弁曰賜臣㸃翰堂法帖臣廷敬謹奉表上進者伏以玉殿披書麗乾文而絢采瑤池染翰炳睿藻以騰輝寳墨長新開萬世光天之治御題載錫惬九霄捧日之心襲以縹緗珍逾璠璵之貴夀諸金石光同雲漢為昭惟銜感其彌殷實賡颺而莫罄臣廷敬誠惶誠恐稽首頓首上言竊惟自古書契之興肇始聖神之代羲皇宣龍書之妙藴軒轅窺鳥跡以成文􅒖嶁之穹碑蟲魚僅辨岐陽之獵鼔科斗猶存秦漢則篆籕居多魏晉而𨽻楷斯著貞觀致治臨池聆御府之章景祐承平飛白懸玉堂之署顧或藝池傳播未云斧藻熒煌惟聖主之建臨乃大文之巍焕兹蓋伏遇皇帝陛下徳懋乾行勲高皇古璇宫侍養特隆溫凊之儀玉輅廵行數下蠲除之詔銘豐功於瀚海備誌夫龍韜豹略虎旅鷹揚灑麗藻於杏壇逺軼乎李碣韓碑皮文楊記圖成耕織民隱悉於毫縑學究典墳微言闡於濂洛巍巍帝徳文軌通荒朔之區洋洋聖謨黼黻備典謨之載更於萬幾之暇時勤八體之工手握璣衡運星辰於楮上體符造化霏雨露於毫端字字正心不假誠懸之對行行主敬直逾明道之書固巳瓊檢牙籖蔵諸秘府抑復霞綃綺軸賚及班行何幸㣲臣得膺異數講筵宣賜勒琰琬以成編禁籞趨蹌荷琳琅之屢錫鮫人練素驚看龍爪之飛魚子牋紅蹙就鱗文之色或剡藤滿幅標赤城十丈之霞或側理横書琢崐岡盈寸之玉或布芝英於扇上仁風與甘露偕來或蔚雲氣於巻中墨彩共爐烟相繞或堂額三字晴暉映玉璽之紅或門牓䨇題晝暖耀龍紋之碧或情怡往牒唐詩宋簡紛綸璚管之餘或製自宸衷水色山光掩映采斿之外風格間臨乎米董神姿高掩乎鍾王后徳出聖而入神故心畫經天而緯地誠新月高峰之盡致而一波三折之兼工也臣廷敬䄂裏驪珠奚止蘇軾千金之賜戩邊戈法無待世南半字之成顧玉簡琅函恩霑於帝座而赤文緑字光耀於人間敢拭烏几以臨摹祗泐青珉而流播啟芸笈則奎明斗璨陋彼寳晉齋中拂螭版而璧潤珠圓不數太清樓下謹弁嘉名於巻首永傳鴻寳於寰中薖澗桑樞窺嶽峙淵渟之筆深山環海睹卿雲糺縵之輝臣廷敬柿葉空臨蕉庵未學右文典重荷囊嘗直螭㘭稽古榮深㸃翰叨頒象管堂楹瞻竦常浮菡蓞紅雲貝石飛騰時見霑濡墨雨恭綴蕪詞於後恪呈黼座之前惟勉葵藿之藎忱冀報涓埃於萬一伏願堯天永冐舜日長華夀考萬年奠金甌於孔固本支百世綿玉歴於無疆搜意象於簡編既列左圖右史勅亮工於寮署務俾大法小廉赤雀銜書彌著𢎞文之盛黄虹表瑞常徵有道之祥矣臣無任瞻天仰聖激切屏營之至謹以御書㸃翰堂法帖裝潢成帙隨表上進以聞進呈御選古文淵鑒表徐乾學管理修書總裁事務原任刑部尚書今給假回籍臣徐乾學誠惶誠恐稽首頓首上言伏以運啟文明式煥圖書之色道隆述作載垂琬琰之華維論著實繁於衆流而折衷悉由乎睿斷固足經緯天地協和邦家輝映山川光華日月者也臣誠惶誠恐稽首頓首粤稽書契之興肇自鴻濛之始羲文頡迹乃見權輿夏誥殷盤遂多制作紛綸六藝實為載道之書流衍百家彌廣立言之㫖指歸既别體製斯殊托始周秦之時以及元明之代累朝所積四庫稱多秘府所蔵千秋特盛然而中區純駮辨介毫芒酌水别其澠淄聞音察乎宫角要無乖於義理庶各暢其條流歎夫蘭陵首編雕蟲遺議逮至華林繼輯買璞䝉譏辭句亦有純疵風氣不無升降若乃陶鈞萬彚開造化之洪鑪翦截羣言提文章之玉尺自非經聖神之閎覽何由成簡䇿之偉觀伏遇皇帝陛下堯文炳煥禹律鏗鋐披緑帙之高詞萬籖並錄搜紫臺之秘典乙夜忘疲允矣敦敏之性成共仰聰明之天縱珠毫乍染同九經之不刋瑤札旋題傳百世以為寳固巳昭回雲漢輝麗星辰上耀三霄下飾庶物以故家知墳索被榮光之煒煌戸習猗那沐慶雲之葩郁乃猶於萬幾暇晷覃思藝文百氏遺編咸歸品藻務嚴决擇用法來兹盡收蘭臺石室之蔵兼採蠧簡竹書之記掎摭得失勾校錙銖手自丹黄親加甲乙金壺霏澗縈煙霧以裁縑瑤管舂容繞龍鸞而拂素盡刪瑕纇悉採菁英體或别於員方義同歸於典則網羅大備可廢九流七略之篇囊括無遺允為冊府詞林之秘復命臣等補加箋註再行校讐正故牘之乖訛先求依據增遺文之脱漏必務該詳然後各冠御評賜名淵鑒譬涵衆川之廣若照庶品之形懸日月以為昭樹津梁而永濟微言共掲奥㫖常新臣學殖庸虗性識椎魯鈎沈決滯慚經學之空疎起例發凡愧史才之融貫篇題東壁叨沐恩榮筆札西清親承商㩁伏䝉詔㫖敢不竭其編摩仰稟高深得稍窺夫條彚排理既竣次第進呈伏願瑞應疇圖祥開象緯風馳化偃八方霑稽古之榮日鏡天臨九服享同文之治臣等無任瞻天仰聖激切屏營之至謹以校過御選古文淵鑒正集八十巻别集二十六巻外集八巻隨表上進以聞恭進大清㑹典表徐乾學臣某等誠惶誠恐稽首頓首上言伏以經綸懋建八方開大治之風謨烈為昭萬世垂不刋之典維神聖之規模悉備斯臣民之法守聿新彪炳前休煒煌來範粤自太祖高皇帝開乾闢坤首定大業太宗文皇帝立綱陳紀嗣建鴻圖世祖章皇帝混合車書順九垓而同軌整齊品式釐百度以惟貞潤色奠太平之基文經武緯黼黻際休隆之㑹禮備樂明迨夫因革損益之宜一切制度云為之迹擬虞廷之亮采布在九官若周禮之分曹詳於六職允矣有倫而有脊粲然是訓而是行但法久則弊生科條期於畫一或時移則俗易規制適於變通是惟酌古以宜今庶幾逺遵而近守垂諸簡䇿播在章程當文明極盛之時正制作開先之日殷循湯典寳𢎞璧於琅函夏纘禹功奉和鈞於王府斵方員者仰規矩視曲直者資凖繩國是攸闗朝章斯屬此蓋伏遇皇帝陛下得一凝圖登三建緒調元丹扆備至徳於先天後天敷政瑤階勤萬幾於一日二日量衡律度考五服而攸同食貨賔師稽八政而咸叙聖人作而萬物覩皇極建而庶民從顧以道一風同上本列朝之積累自此披圖訪典下貽奕禩之儀刑特敕纂修用開館局編年繫事既本立而末該起例發凡亦部分而門别至於析異從同精莫分乎銖黍去非即是辨或介於毫釐每仰稟於睿裁輒受成於宸斷躬逢堯舜知二典之非空言親見羲軒有三墳以明大道載經嵗月始竣編摩允為盛世之全書用裕後昆之令軌臣等學無根柢才愧庸虛麤窺太史之遺文詎識中朝之故事懷鉛握槧分昭回雲漢之光質義摛詞仰藻麗龍鸞之采謹完巻帙莫贊高深伏願益懋升猷𢎞開泰運世綿璿歴監成憲以無愆代啓寳符學古訓而有獲臣等無任瞻天仰聖激切屏營之至謹以所修㑹典若干巻隨表上進以聞進朱子全書表李光地兹者伏䝉皇帝陛下命臣等編校御纂朱子全書總六十六巻刋刻巳竣謹裝潢成帙進呈臣等誠惶誠恐稽首頓首上言伏以道光載籍統承四子之傳徳備文明象應五星之聚非為一時而出樂有後聖之知果不虗行殆同親炙蓋繼天出治職兼總乎君師而稽古右文功乃隆夫作述五百歳之遙源斯在二千年之丕緒聿新臣等竊惟危微心法肇自伊耆終始大成集維元聖中間言天言性者則有禹臯成湯言徳言學者乃由阿衡傳説丹書垂乎敬義周禮著夫中和逮洙泗而發揮無餘歴漢唐而明昧相半直至濓溪黙契道體親授二程爰得考亭剖析精言兼綜諸子斯文頼以不墜後學由此弗迷然其道湮鬱於江沱惟其書流行於海内前代雖頒行學校知徳者稀全編則剝蝕經坊研精實寡從未有紹其道傳其心典極累朝尊異之隆文經乙夜校讐之久如今日者欽惟皇帝陛下心畫羲爻身符夏度功巍文煥猶兢兢業業以勅幾仁熟義精方矻矻孜孜而論道謂朱子為諸儒之醇粹不難以聖而下學於賢故其書為六籍之津梁將俾沿河而東至於海崇其禮秩方自廡以升堂薈其遺編乃命官而授簡發凡起例無非稟聖心之裁成提要刋繁逐一經御筆之刪定雖至微文碎義周覽甚詳轉注諧聲摩求必當沍寒蒸暑未嘗輟誦於萬幾之餘夜漏晨壺不聞停披於寸晷之暫是用規模畫一條理分明自小學大學以開端漸及四書六藝合道徳性命而一貫極於聖統王功文約而彌該義備而不複權衡取舍必得其肻綮之精次第後先一凖於施為之序歴選六百年來編朱子書者其得詳略輕重之中誠未有如我皇上者也非夫心心相繼不隔絲毫聖聖相承如合符節孰能與此哉加以親製序文冠諸書首大義㣲言之秘啟發靡遺修身覺世之方㑹歸一致於是頒諸宇内使儒林有入聖之階梯布在學宫凡來者得窮經之指要教思若風行而雨化徯志自谷應而鐘鳴臣等章句習深經籍道邈生逄堯舜尚慚比戸之民少學魯鄒誰是及門之士纂言不如韓愈惟荷訓誨以成編校書逺遜更生幸籍指偽而識字身遊道化之盛奮而忘愚名掛典冊之端榮以為愧臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞恭進大清鐃歌皷吹樂章表高士竒康熙二十年十二月二十日臣士竒誠惶誠恐稽首頓首上言臣聞一人大聖武之昭無思不服萬物被時雍之化有感必宣故蟲豸㣲吟亦助天心之豫順而芻蕘畢獻聿徵王道之蕩平懷堯徳而難名惟覩赤文成象覯虞廷之振旅敢忘朱鷺升歌㳟遇皇帝陛下下武膺圖上蒼眷命跨九州而無外乗六龍而建中文武聖神巍巍者廣運之徳狥齊敦敏亹亹者敬躋之修孝奉兩宫不異厨生蒲萐仁覃八表無慚苑有騶虞離照大於中天豫順同於萬國固巳横今絶古煌煌玉燭之調緯地經天奕奕金甌之鞏夫何封狼悖逆猘犬猖狂阻彼河山犯我顔行遂使鱷慿鯨勢風生珠海之濤蜮受鬼驅氣暗劍津之浦楚江南去徹夜烽烟蜀道西來終年羽檄肆天威之赫怒命我六師屬上帥以誕將靖兹三孽七閩迅掃旣窮狡兔之謀百粤長驅遂翦乳虎之翼於是涸車前之鮒取井底之蛙望金馬以揚旌指碧雞而命衆人蓄頻年之憤誓不與之俱生士無再舉之勞滅此而後朝食有扈之惡盈貫莫逭青萍防風之骨專車終膏黄鉞渠魁殱而衆志定羣醜罹而逺人懷露布自萬里遄飛喜動龍顔之日天道値一陽來復祥流黍谷之春百蠻稽首以來王四海傾心而慕化擴再造之堯封益覩時和道泰陟無疆之禹跡載看海宴河清洵今古之隆規為皇王之極軌臣蓬蘽賤士樗櫟庸材謬濫齊竽愧乏鷹鸇之逐徒含趙頴未知鵝鸛之形然飽徳而遊康衢難忘帝力傾誠而向化日莫罄愚衷冀鳴休豫於熙朝用布謳吟於巴里敬效前代樂府撰為大清鐃歌皷吹辭九章進呈御覽夫宣之鉦鐲豈有芑薇江漢之工而被之管絃聊隨籥雅歌豳之末於以敷揚駿烈紀述鴻猷雖瑣瑣蠅鳴無當元音之奏而鏘鏘獸舞彌懷因事之陳伏願安益知危治不忘亂聞皷鼙而思將帥時深楊栁雨雪之情當昌盛而儆無虞聿進梧桐鳳凰之咏則華平獻瑞羞稱寳鼎芝房而青鸐來鳴不數柏梁天馬矣臣無任激切屏營之至謹奉表隨進以聞謝授館職表勵杜訥臣訥叨䝉聖恩授翰林院編修謹奉表稱謝者臣誠惶誠恐稽首頓首竊以鰲禁風清宜愼端良之選龍山地逈應推博雅之林恩膏特渥於凡材拔擢遂超乎常格寵維踰分慙乃倍增臣性本顓愚資尤謭薄雞壇藝圃未探丘索之遺蠡測管窺莫抉典墳之奥是以章縫久曳興歌鳴鹿以懷慙及乎芸閣𢎞開詔試雕蟲而色喜衡茅下士儼載筆於石渠金匱之間鉛槧微勞得附名於璚冊瑤函之末已屬三生厚幸復叨一命榮施行將鞅掌以終身願矢葵誠而自効若夫甘泉供奉眞如仰企雲霄至於玉署優除豈敢形諸夢寐兹蓋伏遇皇帝陛下智協重華仁符廣運功崇典學歴寒暑以不渝志切右文遇菲葑而弗棄弓旌賁於山澤可謂野無留艮車服盛於朝堂共羡王多吉士如臣者自維陋質僅同樗櫟之材幸際昌辰敢墜蓬麻之志欽承隆眷留侍内廷奎畫宸章時仰瞻於黼座金莖玉饌長拜賜於經帷天語承宣䄂拂紅雲親鳳扆仙臺侍宴身依紫極近龍顔洵為不世之榮夫豈尋常之遇星霜數易未効尺寸之長雨露頻垂正切氷淵之慮忽頒新命實媿汗以難承更署清班益驚皇而莫措思燃藜於秘府既非視草之才擬委珮於麟臺更忝編摩之任懐鵜梁而滋懼顧蚉負以何堪縱効涓埃難酬高厚伏願旁求俊乂廣納眞儒器使因才曠觀於牝牡驪黄之外官方論辨務嚴乎燕石魚目之分庶翼為明聼之休風比隆於往古萋菶雝喈之盛事再見於今兹矣臣無任感天荷聖激切屏營之至恭進明史表張廷玉伏以瑤圖應運丹綸繙竹素之遺雒鼎凝庥玉局理汗青之業集百年之定論裒一代之舊聞歴纂輯於興朝畢校讐於兹日垂光冊府煥采書林竊惟論道首在尊經紀事必歸攬史興衰有自七十二君之蹟何稱法戒攸闗二十一史之編具在繼咸五登三之治心源不隔於邃初開萬方一統之模典制必參諸近世况乎歳時綿歴載籍叢殘執簡相先合衆長而始定含毫能斷昭公道以無私考獻徵文用備西山之祕屬辭比事上塵乙夜之觀欽惟皇帝陛下乘六御天奉三出治紹庭建極綏蕩平正直之猷典學傳心綜忠敬質文之統觀人文以化天下鑑物惟公考禮樂以等百王折衷必當惟兹明史職在儒臣紀統二百餘年傳世十有六帝創業守成之略卓乎可觀典章文物之規燦然大備迨乎繼世法弗飭於廟堂降及末流權或移於閹寺無治人以行治法既外釁而内訌因災氛以啟宼氛亦文衰而武弊朝綱不振天眷既有所歸賊燄方張明祚遂終其運我國家丕承景命肇建隆基天戈指而掃欃槍王㑹圖而陳玉帛滌中原宼盗之孽奠我民生慰前朝諸帝之心雪其國恥迄今通侯備恪俎豆相承依然守戸衞陵松楸勿翦是則擴隆恩於覆載既極優崇因之徵故籍於春秋絶無忌諱第以長編汗漫抑且雜記舛訛靖難從亡傳聞互異追尊議禮聚訟紛拏降及國本之危疑釀為要典之決裂兵符四出功罪難明黨論相尋貞邪易貿稗官野錄大都荒誕無稽家傳碑銘亦復浮夸失實欲以信今而傳後允資博考而旁參仰惟聖祖仁皇帝搜圖書於金石羅耆俊於山林創事編摩寛其歳月我世宗憲皇帝重申公愼之㫖載詳討論之功臣等於時奉勅充總裁官率同纂修諸臣開館排緝聚官私之紀載核新舊之見聞籖帙雖多牴牾互見惟舊臣王鴻緒史稿經名人三十載之用心進在彤闈頒來秘閣首尾略具事實頗詳在昔漢書取裁於馬遷唐書起本於劉昫茍是非之不謬詎因襲之為嫌爰即成編用為初稿發凡起例首尚謹嚴据事直書要歸忠厚曰紀曰志曰表曰傳悉仍前史之體裁或詳或略或合或分務覈當時之心跡文期共喻掃艱深鄙穢之言事必可稽黜荒誕竒衺之説十有五年之内㡬經同事遷流三百餘巻之書以次隨時告竣勝國君臣之靈爽實式慿之累朝興替之事端庶幾備矣臣等才謝宏通學慚淹貫幸際右文之代獲尚論於先民敢云稽古之勤逺希風於作者㳟蒙睿鑒俾授梓人伏願金鏡高懸璇樞廣運叅觀往跡考證得失之源懋建鴻猷昭示張弛之度無怠無荒而熙庶績化阜虞絃克寛克仁而信兆民時存殷鑒則冠百王而首出因革可徵百世之常邁千禩以前驅政教遠追千古而上矣謹將纂成本紀二十四巻志七十五巻表十三巻列傳二百二十巻目錄四巻共三百三十六巻刋刻告成裝成一十二函謹奉表隨進以聞皇清文頴巻二
