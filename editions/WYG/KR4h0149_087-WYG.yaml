  text: 欽定四庫全書皇清文頴巻八十七
  hash: sha256:223aca281285deb690a8386dab4630050a036943487d2b392524626a971620f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_087-1a, image: WYG1450/WYG1450-0343a.png}
body:
  text: 詩七言律詩乾隆八年聖駕東廵盛京㳟謁祖陵大禮慶成詩十首有序陳世倌洪惟我皇上御極之八年庶績咸熙禮明樂備當累洽重熙之㑹溯經營締造之初念禮隆報本合萬國以抒忱孝首尊親䖍一心以昭格况豳岐開基業之始典倍切於追崇而園陵蔵弓劍之區禮尤嚴乎禋祀於是以虞舜之大孝符周武之配京序值清秋時惟七月䖍諏吉日恭謁祖陵奉侍慈幃夙駕鑾輅於時百靈擁衞庶官景從縣㝢騰聲四野歌呼齊起川原生色萬郊禾黍俱豐出古北之䧺關詣瀋遼之重地千重嶺岫遙瞻王氣之絪緼萬樹松楸羣仰神區之蔥鬱閟宫祗祓典禮燦陳帳殿齋居質明将事孝推一本孚愛慤於僾聞愾見之餘誠徹九原通神明於陟降上下之際皇上肅然止敬穆乎無言緬祖宗創造維艱地闢天開允垂卜世卜年之久念子孫繼承不易膺符受籙敢忘克勤克儉之模禮徐遍於三陵忱每将夫一敬告成大祀乃燕明廷助祭百工均頒酒脯輸誠六服咸與几筵大官之水陸畢陳飲御之公卿既醉爾乃衮垂藻火面南離以當陽廷肅鵷鸞共北辰之居所黒齒趨蹌於王㑹雕題拜舞於天朝徳敎遐宣奮揚斯舉火荼日月黄麾動而七校齊開龍虎鳥蛇畫角鳴而八陣咸合左射右射並宣天子之威大綏小綏仍戴聖人之徳而且推恩無外錫類多方自王公以逮軍民槩沾膏雨由京邑以連荒徼普煦陽和既時邁而伸殷薦之誠乃回鑾而理垂裳之治此皆皇上徳孚蒼昊孝通神明乃與圜丘祀天方澤祀地之禮並隆千古也臣沗掌絲綸徒塵政府謬司敎習無禆吉人弗獲随從乗輿式觀典禮時逾三月未聆訓行于天言身領百寮莫效肅雍於相祀敬成七律聊抒戀主之愚忱㳟賦十章用志饗親之逹孝云爾熈朝區夏肇東瀛天作高山啓大清三后神靈時陟降一人綂御際承平祖宗文武垂先烈原廟衣冠想舊京報本不忘親享祀旋看奏假賚思成鵷班拜手送鑾輿帝侍慈闈問省餘神列勾陳随輦後時當零露届秋初閭閻共慶寧居樂稼穡羣覘大有書更喜太平真氣象出闗民物似華胥王氣蒼茫屬瀋遼陪都東去路迢遥渾河曲折環邉極鉄嶺峥嶸接斗杓龍虎萬年長拱抱精靈五夜每趨朝橋山弓劍歸蔵地時有紅雲上九霄祠官典禮疊相承列聖居歆儼式憑僾見愾聞通一氣水源木本溯三陵粢盛潔處齋心逹膋膟焚餘香靄升聖祖昔年殷薦後又看䋲武肅嘗烝履武姜嫄推聖母篤生始祖事神竒燕天高帝初光宅纉緒文皇實肇基王業艱難垂世徳皇心乾惕協靈祗閟宫盥薦抒誠恪有道曽孫對越時燕喜一堂羣受祉天厨稠疊湛恩宣漢高沛邑歌風日建武南陽置酒年長白嵐光遙對席松花江色靄浮筵君臣宛似家人㑹既醉歡欣黼座前殿名崇政肅朝紳稽拜信桓及逺人鶚立鵷翔齊舞蹈黄支烏弋並尊親八荒在闥聨中外六合為家篤主臣應遣畵師閻立本圖成王㑹獻丹宸雍容典禮敷文徳震爚川原耀武功陣合鸛鵞緣大閲軍分荼火為臨戎網留一面湯仁在禽失三驅易象同却笑揚䧺誇羽獵何如吉甫詠車攻恩詔頒來速置郵徳音汪濊徧神州聼将匝地歡呼動知是經天惠澤流錫類定能孚血氣宣威不獨鼓貔貅聖朝至治歸仁孝庸行從來即大猷告成大禮返皇畿路過灤河望六飛發駕金風方颯爽廻鑾玉雪正雰霏舞成七徳揚翬羽庭列千官拜衮衣赤鳳白麟休獻瑞太平端拱自巍巍聖駕東廵盛京㳟謁祖陵大禮慶成詩八首有序于振我皇上御極之八年泰階既平百揆時敘禮樂明備朝野熙恬於是述祖徳頌宗功有事於三陵禮也臣竊惟謁陵展孝為典最鉅載籍雖逺然漢唐以來可得而稽也漢嘗以正月上陵百官四姓公主諸大夫外國朝者侍子郡國計吏咸㑹至期晝漏初上大鴻臚設九賔於寝殿鐘鳴謁者引客就位如儀乗輿自東廂下升階展拜大官尚食太常奏文始五行之舞郡國上計吏以次前當神軒告其郡榖賈人所疾苦欲神知其動静焉唐禮朝陵之先日設黄麾仗周衞陵寝至日質明七廟子孫及諸侯百僚蕃服君長皆陪於司馬門内上至小次降輿入門再拜躬親執饌閲視先帝后服御之物引諸功臣並入執爵進俎奠訖乃復盖孝子事親曲盡愛敬之心有如此者漢唐諸君去古已逺然未嘗不緣情制禮以為法於後世故垂諸史冊以昭令式良有以也臣伏見我皇上御㝢以來盡孝盡誠善繼善述體祖宗之心以為心法祖宗之政以為政僾乎如見愾乎如聞盖未嘗一日釋也洪惟我朝發祥長白奄有中外肇萬世無疆之休實由我列祖列宗積徳累仁承天景命豐功駿業昭垂奕禩肆我聖祖六十一年之中三謁園陵恪脩祀事孝之至仁之極也我皇上敬䋲祖武諏吉日飛六龍奉慈寧備法駕百官咸㑹六師景從遂届興京舉行盛典於時天澄其氣日朗其精松楸蔚然閟宫肅穆皇上萃精神嚴對越孝敬之至通於神明洞洞然屬屬然視於無形聽於無聲念經營締造之維艱思夙夜敬承之不易籩豆既飭肸蠁如聞皇哉唐哉亦孝之至仁之極也昔周之王也定鼎郟鄏卜世卜年承承繼繼然姬公陳王業之艱難述農夫紅女衣食之事以推本風化之所由興必以始基靖民歸之后稷十五王而文始平之十八王而康克安之盖創業垂統若斯之難也故曰周家世篤忠厚以成其福禄而啓佑後人我祖宗亦世啓鴻圖以昭兹來許而垂諸萬祀皇上席重熙累洽之盛而不忘小心昭事之誠以視思文之頌后稷于邠之咏公劉惟此王季貊其徳音至於文王維新厥命光懿顯爍何以加焉彼漢之衣冠出游唐之薦衣獻服直瑣瑣耳曽何足以嫓此鴻庥光斯盛烈也哉臣沗列詞垣濫竽律館雖未獲躬随法駕預於駿奔之末而朝夕論思日月獻納抒下情以通諷諭宣上徳而盡忠孝雖學殖荒落然雍容揄揚比於雅頌亦其職也夫盛徳所孚櫪馬猶知仰秣太和感召游魚尚觧揚鬐况臣庸愚敢忘舞蹈因不揣蕪陋拜手稽首而獻詩曰萬乗東廵展孝思鳴鳶前載漾微颸濕雲頓掃開芳甸晴日平臨滿畵旗漢代歌風追鎬洛周家卜世溯豳岐起居晨夕依行殿仍似深宫定省時高山天作發祥初長白榮廻結隩區鴨濬仙源瞻王氣鵲銜靈果啓鴻圗黄麾宿設周廬仗赤伏還陳受命符載撫桮棬欽祖徳宸襟彌自斂盤盂萬峰岝㟧藹松楸鬱鬱葱葱佳氣浮寳祚無疆知地脉曽孫有道荷天庥衣冠拜處朝儀肅綸綍宣時惠澤流春露秋霜方怵惕歡聲早已動皇州雉堞峥嶸杳靄間睿謨握勝控䧺關南臨渤海兼遼海東接松山與杏山應運功成遺壘在太平日久戌樓閒即今雞犬桑麻地饗蜡吹豳自往還悠悠旌斾静無譁來享來王縂一家到處如安記里鼔遣歸不假指南車鵞黄褶麗随天仗狐白裘温扈翠華欲倩龍眠高畫手摹成王㑹示荒遐朔風凌競馬驂驔鸛鶴魚龍士所諳伏札能穿何論七前驅不誡縂開三千屯月上霜威冽萬幕雲深雪意酣日暮放罝鉦鼔卧又聞帳殿啓經函萬幾清暇富文章頃刻龍鸞天際翔賦就盛京思劒舄舞成世徳念羮墻宫懸肄業皇猷壮瓊笈鐫摹御墨香蠡管詎能窺聖學願偕儀鳳記鏗鏘冬序初迴是小春一陽來復届芳辰鸞輿過處衢歌溢鳳輦歸時巷舞頻共識盛朝隆典禮咸知純孝格天人小臣愧乏卷阿頌鼓腹聊同撃壤民聖駕東廵盛京㳟謁祖陵大禮慶成詩八首有序王㑹汾臣伏見皇上御極以來至治覃被浹于中外鴻文盛儀靡不徧舉孝思烝烝格乎天祖今年秋七月車駕幸瀋陽奉皇太后謁陵廟祗祗翼翼大禮紀成傍推典章所宜柴燎望秩羣祀山川咸享明薦爰暨開國勛勞之臣亦酹尊爵仁義嘉孚上下協應時則有屬國逺藩名王侍子翖侯貴人咸馴我聲敎憺我威靈亘塗萬里鼓舞修職皇歡載洽大號用孚湛恩滂洋幽逺胥洎廼孟冬吉日旋蹕闕庭備福受祉百官兆人懽喜歌呼共慶無疆萬年之庥謹稽古者天子有大功徳大典禮則在位者作為歌詩揚舉懿美流連勿忘所以備朝廷之彜憲逹羣下之至情不可已也况聖天子陳常立極巍巍孝治邁古有光舞之蹈之宜在今日臣以愚陋荷特逹殊恩得列近侍拜颺庥烈臣實軄之雖辭謭理薄不足仰頌聖明于萬一尚願随轅童壤翁之後抒其詠謠以羙上徳之至盛光千載於禮儀云爾東廵秋燦九重霞黄道天開引翠華父老望深豐沛地禮儀光盛帝王家龍旂紫塞懸弓月虎旅青霜拂劍花見説歡顔動文母我皇親侍彩鸞車晴色千林宿雨收望中禾黍翠盈疇香迎豹尾塍雲合影轉蜺旌穗露浮已報豐年書太史便行秋稼指神州從臣共識皇情豫駐輦時時賦滿篝漠雲如海散朝煙皎皎青霄赤日懸遙望氣䧺元菟郡更欣春照紫濛天呼嵩動地名王拜震電驚霆大號宣萬里星躔拱宸極盛朝威徳被無邊祖宗神武奠鴻功靈命長祥帝所鍾萬嵗山光榖林樹千年雲氣鼎湖龍堆明金粟曕冠劒路駐仙斿繞柏松此日精䖍奉嘉薦樂歌清廟叶黄鐘寝殿崔嵬閟九闗遺弓瞻省動龍顔青邱丹水經營地禹甸堯封氣象還星宿久澄霄漢上熊罷長守翠微間寺思孚感無窮意相照金碑玉蘚班南陽白水睹真人舊里今朝景物新天漢流精延析木醫閭修職貢玗珣大風表海明樓殿絶島浮洲帯鳳麟一自重瞳臨眺後山川全覺露精神六龍時邁煥宗周鉅典環文次第修為想丹青開駿烈已知川嶽遍懐柔露蕭車馬東都㑹香案煙雲北闕浮天上詔書銜鳳觜飛來春色滿神州太平天子上陵廻晴日千門萬户開星緯珠囊増潤處鳳儀璚管應風來金甌永固占神䇿玉燭平調仰睿才共慶孝思繩世徳蒼生流福詠康哉聖駕東廵盛京恭謁祖陵大禮慶成詩八首夏廷芝熈朝孝治久昭融緒纉前徽帝徳隆垂創艱難追駿烈聲靈赫濯溯鴻功橋山松棟千春鞏原廟椒馨一氣通翠輦親臨崇報本淵源黙契縂相同清時典禮重明禋駕擁龍旂正及辰沙磧千山森壁壘羽林萬騎肅鈎陳已看琛賮來重譯並使懐柔及百神絶徼歡闐宣徳化黄旄朱節紀東廵揷天長白聳丹霄鴨緑瀠洄江水遙州接青營䧺地軸野分箕尾煥星杓素題樸桷風猶古白馬彤車績尚昭列祖神宗貽䕃逺千年儉徳溯陶堯寳城蔥鬱䕶雲煙肹蠁初升對越䖍玉匣衮龍垂奕代寝園弓劒感當年宸衷肅穆抒三獻典禮精誠奉百籩至徳中孚能合漠仁恩從此洽垓埏祝嘏頻聞告孝慈中和雅奏啓純禧百年禮樂涵濡日九廟神靈悦豫時往事何須追灞杜永年直欲邁周姬推恩更自酬房魏寄酹長深佐命思黄花丹葉正清秋仰奉慈顔頌作求視膳終朝陪鳳輦承歡曉日近龍樓九天作賦光霄漢萬國呼嵩拜冕旒大孝由來天下養億年色笑進觥觩景物陪京衍慶長五雲開處坐明堂風清帝里黄圗㑹秋滿真人白水鄉寵渥需雲頒虎旅恩深湛露徧鵷行先時况有蠲租詔蔀屋茅簷共樂康蕃釐已降禮初成斾轉千貔野不驚十月陽春回海㝢九重孝亨洽幽明黄榆紫塞敷天澤東鰈西鶼遍頌聲光烈覲揚昭萬古小臣珥筆矢歌賡聖駕東廵盛京恭謁祖陵大禮慶成詩六首胡中藻太平開國本岐豐四海車書此㑹同天列星辰朝斗比地趨龍虎抱闗東貽孫冊府存堯字似祖輿圗尚禹功最是橋山冠劒在每逢霜露厪宸衷馨香園寝戒明粢典禮時廵䕶六師祝史剛辰蠲九月犧人牲帖報先期蕭闗北擁風雲騎沛上東開虎豹旗令節雒陽徒故事薦新朔望陋常儀艱難王業咏生民瀋水川南析木津五夜齋心符後甲六龍御輦戒初辛庖霜可補周三禮灌玉還陪漢九賔父老嵩呼齊拜舞太平天子肅明禋奏罷咸池思邈然朱華朝拂引回鞭要知侯國酎金日猶是塗山執玉年黄目光流侵月露祥雲風裊篆爐烟曽孫别有馨香處世徳尋求荅在天殷土芒芒控九州昔年麾指定諸侯高山已作天東顧瀚海無波水北流龍斾巻舒随輦輅地靈今古䕶松楸散齋行殿重回首雲氣蒼蒼五朶浮列祖精靈想像間留都周覽悦天顔歌風御筆東京賦燕鎬從官六膳頒遂有需雲同九埜先瞻觧雨下三闗回鑾奏頌多文藻染翰慙随供奉班皇清文頴卷八十七
