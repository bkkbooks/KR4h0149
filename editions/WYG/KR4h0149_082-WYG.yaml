body:
  text: 詩七言律詩乾隆三年聖主躬耕耤田恭紀八首有序史貽直乾隆三年二月辛亥皇上躬詣耤田享先農行耕耤禮臣職在農官備位百寮之末不勝欣幸竊惟平秩東作始自堯年秉耒南郊詳於周禮潔粢盛以事上帝其典特隆敦稼穡以勸民時其儀大備漢則建於乙地宋則位在辰方展祀則踵乎上辛蠲日則取乎吉亥青壇翠幄恒騫栁陌之風縹軛紺轅並借春旗之色陳於京尹掌自司徒欽惟皇上仁育羣生智周萬物奉三無私以出治行五達道以諴民蠲租賜復之詔歲逮於閭閻省耕課稼之條徧行於郡縣猶復疇咨民瘼肇舉彛章月在夾鐘日惟淵獻翠華幸而黮雲密布朱紘戒而澍雨載零肅奉明禋神聽有和平之福躬親御耦農歌皆熙皥之聲土膏潤而生意胥涵地脈融而根荄畢達從此杏花菖葉村村餅餌生香重穋䨇岐處處桑麻動色繰車不用知為多黍之徴秧馬初分早叶維魚之夢北里之禾再至鄗上之頴方來臣菽麥未分糠粃自媿欣逄盛典邁五帝而軼三王敬勵官常率百官而生九糓用矢巻阿之頌爰賡大有之年拜手陳詞不勝鳬藻禁苑春濃地脈蘇碧莎微潤緑茵鋪三農乍喜甘霖渥萬乘初臨徳意敷栁曵長條迎豹尾桐埀細乳拂魚鬚芳塍此日瞻仙仗便是豳風敎稼圖崒立崇壇陛枑重我皇陟降禮先農香煙合處知天眷雲氣凝時仰聖容升獻三成勤玉趾樂歌九奏震金鏞和平薦徳神昭慶果見千郊雨露濃錦幄高張綺陌新杏花微颭畫旗春霏霏香霧連平隰習習條風動遠塵御耦三推因勸穡王耕一墢為勤民帝心逸豫農歡樂黄髮扶鳩祝聖人韶和應律土膏融吉亥時乘卜屢豐肅肅鈎陳環禁闥迢迢華蓋御齋宮官僚儼立青壇外父老歡騰紫陌中草服荷衣咸拜手共隨京尹效呼嵩鸞旗夙駕聖心䖍遠樹經春翠幄懸風動霓旌烏細轉雲依雉尾鳯徐鶱芙蓉水泛蓮花漏榆莢錢飄栁葉韉共識宸逰非玩物由来哲后敬民天勞酒宣慈感聖恩百僚虎拜沐春温祈年頻戒蒼龍駕納諫常開白獸尊䆉稏生香敷禹甸黍苖擢穎被周原遐阡邇陌都如畫乳燕翻飛入繭園微臣備位忝農官叨與隆儀得壯觀如稼有秋千户稔似葵向日寸心丹均平九式承慈眷游豫三春奉睿歡蚉負只今懷祗懼度支無術分難安雨餘秧馬欲分窠聖主勤民感太和已見彤庭生瑞莢還看寢廟薦嘉禾隴頭漸覺閒遊少犢背惟聞笑語多幸際中天明盛日始知先陛有賡歌聖主躬耕耤田恭紀四首有序陳悳華欽惟皇上深仁浹洽至德光昭孝思肫篤於晨昏誠悃肅將乎禴祀三才叶應化被垓埏一氣涵濡榮敷草木乃猶心勤稼穡念切農桑時當御極之三年節屆陽春之二月農祥初燦土脈方融爰肅祀事於靈壇用即田功於芳甸緑疇如砥華袞躬臨葱犗引犂洪縻手試公卿並贊小大咸從勤開一墢而加推喜溢兆人而終畝維時和風徐扇細雨輕濡杏花菖葉涵紫極之恩光社鼓田歌播皇州之淑氣要使人知務本統四海以耕耘從兹户慶逄年登萬方於仁壽臣叨陪鵷序幸從鸞輿深惟教養之勤莫罄賡颺之願堯天難繪祗同擊壤以興歌周甸親游竊效載芟而奏詠敬陳七律恭紀鴻庥昇平典禮重勤民千畝欣逄玉輦廵恩澤早聞周四海田功肇即擇元辰雨暘在念殷憂切稼穡維艱勸相親正是仲春東作候青箱黛耜出楓宸靈壇籩豆禮先農鞭耒親持映袞龍芳甸乍融春雨細彩旗徐轉瑞雲重健行欲倍三推數趨贊同時百職從稽首臺前奏終畝十千亞旅洽歡悰春滿乾坤二月天桑麻樂利溥無邊愚民但願豐登繼聖主長懐率作先草印金根浮玉露林揺豹尾裊爐煙倉庚布榖知人意百囀催迎大有年霡霂如酥秉耒時孚誠直與上蒼期太平有象安耕鑿大造無私眷緝熙帝徳儉勤超漢室民風淳厚續豳詩從兹盛典年年舉不羡開元但具儀聖主躬耕耤田恭紀六首梁詩正聖人繼治重耕桑夙夜勤民問未央詔恤三農恩屢逮政儲九稔慮彌長謠衢早識流膏遍秉耒尤徵舉典詳緑野即今春已及天田星現待游場長養風披紫甸多土膏春動氣全和田功最厪君王念帝力時聞父老歌鐘徹朝陽千騎出旗翻曙影百枝過鑾輿徐向郊原駐宿潤猶霑輦路莎笙鏞旋聽奏齋宮黼座精誠㝠漠通黄幄敞來蒼璧薦青壇啟處紫煙籠典因民事陳儀肅帝鑒君心兆歲豐最是應期甘澤降馨香從識感元穹禾詞歌徹競扶犂如砥平疇播種宜花繞帷宮風乍暖樹連春野雨旋滋芳畦塵静停蔥犗繡澮萍開漾緑漪好及元辰興御耦陌頭稼器獻農師蘭場染屨拂芳烟天子親農井邑傳修耤共知千畝重加推端為萬民先喜㸔亞旅擕鋤至遞見公卿撫耜前借力不忘趨事早率耕歳歳趂春妍一尊勞酒進耕餘從此豐穰應不虛總銍詎惟供御廩京坻還見紀鄉閭祥光縹緲浮芳甸喜氣充盈動屬車億載朱紘埀令典長瞻景福萃天居聖主躬耕耤田恭紀八首呉應棻三載仁恩浹萬年一中主極紹心傳授時堯典敷平秩卜世姬宗重甫田春滿乾坤開泰運風和阡陌動祥烟為乘陽氣勤民事輕暖輕寒二月天天意君心一氣通先期灑道有神功一犂紅杏枝頭雨幾陣桃花信後風零露湑兮農具潤春泥濕處土膏融試聽仙樂聲和協先奏咸豐後屢豐郊宮祈穀禮初成又見金根載耜行后土顯然呈地寶先農黙為助春耕那知耡雨犂雲候悉載堯咨舜儆情䖍奉粢盛供孝享俱從夙夜殫精誠聖世明農遠肇基艱難穡事帝周知中宵時厪茅檐慮郊外欣傳玉趾移山野農人齊拜袞文思天子自扶犂勸畊何必三推限五度神龍䕶彩旗芳甸寧誇萬彚妍親偕襏襫下春田豐登惟望餘三九駿發争㸔耦十千民氣暢時民力阜聖心勞處聖躬先禾詞語語闗民瘼若較豳風倍恪䖍壇外輕煙濕菜花臺前風物更清嘉神臯共仰千秋舉御廩應多十倍加但見民情依日月豈知天意重桑麻殷勤肯便回鑾早白叟黄童滿道遮樗材廿載近蓬萊小草欣承雨露培楊栁陰中隨輦至簫韶聲裏勸農來平疇雨洗秧旗動綺陌風微社鼓催一幅昇平好圖畫熙然同樂上春臺春郊禮畢氣和融原隰畇畇輦路通比歳賜租過億萬今朝履畝到南東已㸔擊壤盈畿甸從此勤農遍域中惇史年年書大有永埀盛典紀皇風聖主躬耕耤田恭紀四首許希孔民事艱難我后知春和耤畝肇隆儀農星耀彩天文麗穀雨流膏地脈滋化洽高深歸主極勤先億兆仰君慈載歌三十六禾句如誦豳風七月詩日月交旗出鳯城太平天子勸深耕青壇岳立丹霄上黄幄雲開緑野平草近琱輿含露潤花依玉藻帶霞明天顔有喜農夫慶匝地懽呼嵩嶽聲上辛昔拜袞龍衣吉亥今瞻六御飛共識皇心殷稼穡時勞清蹕駐郊畿先農既醉黄流瓚保介趨隨玉節揮一墢三班成禮後知時好雨轉霏霏帝耤蘢蔥靄瑞煙明昭受賜屢豐年誠孚黍稷居歆日敬在粢盛播種先暖日花村聞鼓籥氷天桂海靖戈鋋揚庥共進思文頌紀盛還歌於樂篇聖主躬耕耤田恭紀四首鄒升恒昌期致治在勤民稼穡開先事必親祈穀己行元日禮耤田仍及土膏春風光二月連三月帳殿千人拱一人共喜乾行乘巽徳早㸔鸞輅出楓宸后稷思文配彼天齋宮淳濯倍昭䖍先時嘉種呈穜稑此日升香肅豆籩翠柏森森籠寶幄青榆歴歴蔭天田司農大尹齋心待埀栁陰中進綵鞭天子親耕一墢開兩行鵷鷺翼登臺旂翻繡幙千層錦鼓動春塘百面雷清畎泠風吹細籟緑簔微雨净纖埃良苖也解懷新澤不用村村布穀催敎孝明農鉅典彰王畿仍作四方綱民歡補助先成諺天鑒精誠屢降康春雨一犂秧水緑秋風萬里稻雲黄微臣願領瞻蒲衆酌兕同稱萬壽觴聖主躬耕耤田恭紀八首于振淑氣初囬禁苑春皇心無逸為勞民千官肅穆趨青甸萬騎雍容出紫宸栁葉細裁知令序桐花微綻識芳辰應時甘雨隨天仗父老歡歌祝聖人綺陌芳堘雨露濃青壇嶽立禮先農時和鳥喚千郊曙春麗鯨鏗萬石鐘展席乍㸔朱戚舞燔煙疑有白雲封由來降福皆神賜知是天心眷九重輦路紆廻細草縈齋宮靜閟漏壺清皇心作肅惟居敬聖徳持盈在立誠九列師師嘉禮備三公翼翼泰階平侍臣鵠立更衣殿日月昭囬袞繡明黛耜恭陳錦甸開紺轅在御百僚陪欲敎兆姓皆三鬴不惜皇躬盡五推仙仗繽紛輝綵幄農歌來徃徧春垓金鉦畫鼔聲初罷天歩旋臨視稼臺公卿秉耒土膏融漠漠輕埃剪剪風九穀允為王道始千疇還待庶人終劇憐雨後枌榆緑預卜秋來䆉稏紅雲物芊綿占太史昇平時節兆年豐鑾輅金根出建章羣黎徧徳覲龍光老農拜手隨京兆百辟趨墀引奉常朱草紫華同蓊鬰黄支烏弋盡梯航津莖潤葉眞嘉瑞萬彚昭蘇帝道昌阡陌縱横繚粉垣先皇會此撫青轅道隆繼述斯為孝澤洽蒸黎豈有諼從此巍巍歌聖徳即令膴膴頌周原嘉禾九穗尋常事要使淳風邁帝軒雍正三年臣振備位講官曾叨扈從太寢深嚴綺户張一人恭已坐明堂鳬趨欲效三多柷虎拜羣稱萬壽觴大地陽和歸几席鈞天廣奏叶笙簧鑾輿廻處聞清蹕五色卿雲扈九閶聖主躬耕耤田恭紀四首有序金相欽惟皇上御極之三年擇元辰載未耜躬耕千畝為天下先是日也靈雨霏微休徴協應皆由我皇上孝思誠敬千古無與比倫故能上格天心降兹渥澤天人感應之理尤為顯著者也臣躬逄盛事目覩嘉祥不揣謭陋謹拜手稽首而獻詩曰九重春靄曉曈曨黛耜親耕鉅典隆解雨時行䝉聖澤地雷春奮仰神功司農撰器先期告太史占書應律同最是吾皇敦稼穡好將圖畫詠豳風布穀聲喧品彚昌昇平天子重耕桑雲迎翠輦依壇近花拂青旗夾路香玉趾按行先虎旅金鞭徐舉燦龍章侍臣共覩天顔喜為卜豐年萬國康御廩神倉備耤田奉先思孝倍心䖍青箱種播春膏潤緑野雲披晝景妍三爵油油分勞酒百僚濟濟侑嘉籩須知聖主勤民意祗為蒼生祝有年細雨濛濛隴麥滋禾詞引唱最相宜靈壇煙靄方呈瑞繡壤甘霖恰應期東作西成民力普茅簷蔀屋帝心知從今不數元和事樂譜新傳賀雨詩聖主躬耕耤田恭紀四首有序嵇璜臣聞詩詠千畝禮載三推敎孝所以盡誠勸農歸於務本先時有協風之應後車有甘雨之隨惟敬洽於天人斯澤流於上下乃若元辰載耒經傳祈穀之文吉亥修儀臺有觀耕之號唐則多增壇壝宋則屢改樂章往冊所傳盛儀希覯我皇上本敬天勤民之心普府修事和之化情殷稼穡屏書無逸之篇儉著松雲座繪豳風之象固已盡力溝洫皆屬我疆我理之經猶念供奉神倉務體必躬必親之義値陽春之仲序覽景物之芳菲御玉輦於東郊駐和鸞於南畝青壇嶽立九旗飄神鼎之煙翠幙雲凝六律應鈞韶之響明禋致祭聿享先農掌次進衣廼咨保介服朱紘而身勸載黛耜以躬臨維時誠孝感於天心陰陽和於元氣爰布春雲之漠漠聿興時雨之祁祁公田藝而地脉俱融嘉穀播而土膏畢發於是登臺親閱喜千耦之同耘勞酒頻頒識普天之共慶神都湛露正羣工拜賜之辰薄海春風斯萬國被恩之日既田功之克即乃井養而不窮銅雀徴祥協三十六禾之祝鰩魚貢瑞超七十二代之編惟時行以應乾故順動而成豫新儀式煥舊典加隆臣承恩清禁喜聞大禮之慶成扈蹕靈壇思效庶人之終畝道揚仁孝愧無潘岳之詞鼓吹昇平竊附宋祁之頌云爾星見天田淑氣回青郊法駕為民來三時耒耜春和始萬井耕桑帝力開綺陌香雲連寶幄鳯城煙景䕶崇臺元辰方屆修儀肅農扈疇咨徧八垓父老扶犂夾道遮游場清蹕靜無譁青箱嘉種含雲液縹軛春旗帯露華何幸田間瞻日月遙聞天語問桑麻憫農最切祈年望竚聽豐穰祀滿家曾占好雨恰知時春野輕勻散似絲禮重加推明穡事樂和衆耦譜禾詞倉庚聲裏金鋤舉緑栁陰中碧甸滋歲歲率先勞玉趾何須七月更陳詩勞酒初行慶典新廻鞭不動屬車塵由來望杏瞻蒲候即是吹豳飲蜡辰沛澤三農勤補助薦馨九廟洽神人小臣載筆賡華黍與物同歌浩蕩春聖主躬耕耤田恭紀四首張若靄農壇佳氣接齋宮鑾輅親耕典禮崇四海久應忘帝力九重猶自念田功青旗浥露郊原近翠幙連雲閣道通簔袂笠簷紛在目不須便殿繪豳風平田漠漠䕶春陰履畝躬勞降輦臨趨事已知民樂業兆康潜卜帝居歆絲鞭拂處縈煙轉黛耜移時帶雨深一墢乍開沾灑足早㸔緑意遍芳林布穀聲中駐六騶翠華不為奉宸遊蒼生預慰篝車望黄屋常先婦子謀千畝流膏敷帝澤四時備享答神庥歸來勞酒頻宣賜新喜沾恩次小侯全家詔禄出堯厨奕世承恩朶殿趨力穡日聞天子訓耕犂親見聖人扶青箱載啟三農利縹軛加推百代模從此曾孫長介祉年年橐筆紀苞符皇清文頴巻八十二
