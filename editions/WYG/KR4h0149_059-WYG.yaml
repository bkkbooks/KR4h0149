  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_059-1a, image: WYG1450/WYG1450-0067c.png}
body:
  text: 詩五言古詩入山左境見流移歸復㝛麥被壠喜而有作理密親王允礽維皇育萬物湛恩徧嘉師飢溺若在巳幽蔀必洞知昔年齊魯境積潦民其咨老羸莫自保載道多仳離至尊惻然念明詔下所司蠲租數百萬截漕為餔糜猶恐守土吏不免侵漁私特選亷辨才俾往監涖之精鏐出内庫車乗絡繹馳大小量口給饔飱計日支其有未歸里部送罔或遺各令家室聚賜以庾廪資頓起溝中瘠白骨重生肌户版悉登復東作勤耕菑兹來侍御蹕道經衛水湄但見四境中鼓腹羣熙熙二麥被原野出土揚青蕤昔無藜可糝今有酒可釃晨驅犢向壠暮逐雞棲塒父老羅道旁感極翻涕洟億兆得再活實頼聖君慈恩深難報答泥首呼蒼祗敬祝無疆壽福履永永綏臣於問視暇獲覩天顔怡紀實無百一願賡豐年詩賦得清氣朗山壑恒溫親王允祺曦車轉西陸商颷動長林顧兹巖壑間寜有氛埃侵積翠湛虚明觸景咸蕭森良晨豁我懐爽氣盈我襟誰從黄葉中扶䇿來相尋浩歌對高山情與白雲深觀魚樂果毅親王允禮金塘縠水間碧藻文鱗躍游泳彼如如心神此落落小亭開浩渺倒影浸寥廓吟罷一憑闌宛然濠濮樂題茂林仙館圖果毅親王允禮飛流界空青天風導大窽隂森六月寒蓊鬱九冬暖兹山非人世合付眞靈管宮室何縹緲云是列仙館門外楓葉深峯頭白雲滿豈惟人蹤絶兼恐鳥跡罕欲揖浮邱公松關不可欵雖悵竒境隔頓覺塵心澣緬懐羽衣客人外寄蕭散題畫果毅親王允禮我聞吳楚間逶迤富山水巖岫不湏高平遠即可喜烟波豈用濶瀠洄斯為美青楓何鬱鬱白石何齒齒林密隠招提岸廻露墟里時見秔稻疇屢逄魚蝦市池邊畧彴横竹裏茆亭峙烏犍屋角鳴青雀門外艤樸但話桑麻秀亦課書史生計付樵漁樂事勝園綺我欲往從之雲山何處是誰窮千里目圖此盈丈紙心賞方在兹卧游從此始牕間一以玩春風香研几咏史四首果毅親王允禮叔孫道委蛇頗亦解希世緜蕞尋舊章臚句傳顯制合殿静無譁方識天子貴應笑魯兩生安能知此意濟南老伏生曾為秦博士壁藏先聖經兼復記端委九十難正言傳敎令女子屬讀詰曲間錯誤良有以仲舒經術士三年獨下帷春秋究奥窔園舍何曾窺天人三䇿對鱗甲騰之而郤嫌著繁露穿鑿非所宜匡衡始家貧分光乃鑿壁射䇿九不中傭作僅給食及其為丞相不負稽古力說詩解人頤鼎來眞莫測題畫果毅親王允禮古樹凝蒼烟菰蘆映寒碧扁舟何處來踞篷吹短篴共坐夕陽坡遠望征鴻寂落葉下蕭蕭江空𣺌無迹鳯縣果毅親王允禮寶雞巳無聲仙鳯猶鳴嶺鳯縣志鳯嶺在縣東三里之鳯凰山上閣道亘虛空木末過人影輿程記陜西棧道長四百二十里自鳯縣東草凉驛為入棧道之始天梯屈曲連捫參還歴井驂鑣歘斷續散隊如旋綆石作竒鬼猙崖露青鋒頴吼雲朔風勁潄玉飛泉冷古戍松林深驛冊松林驛在鳯縣南一百十里高隱紫栢静名勝志紫栢山在柴關嶺下山多紫栢相傳張子房曽隱於此大谷新開道斗絶武休境新開道在縣南明何景明詩塹山通大谷驛冊武關驛在鳯縣東南武休關方輿勝覽褒斜谷旁連武休關地斗入秦山勢欲斷隴水聲方哽關河忻漸諳土俗得周省惟與帝鄉遥回颷時引領勵志果毅親王允禮耕當問之奴織當問之婢古語不吾欺鑑人如鑑水朝與申穆儔夕與枚馬齒家國有常經齊治有定理尊重老成人斥遠輕薄子集思廣衆益安歩軼前軌曉發通州至燕郊鎭二十里愼郡王允禧一盞琉璃燈晚龕同彌勒去住無定因曉發通州北暗塵蕩夜氛殘星送曙色秣馬初渡河騰踏浮橋直村墟沙霧黄烟景意猶嗇日光地上動林靄紛如織豁逹野天開蒼茫望何極欲趂打包僧中飯燕郊食初夏偶成愼郡王允禧庭草日夜長堦苔日夜綠柳影散清圓幽禽更相逐有形寄大塊得時善亭毒紛華非可矜所樂在游目堂宇絶塵轍種花復種竹花自悅人性竹更醫人俗况此清和時天氣少寒燠齊紈裂團扇吳綾製單服一飯飽有餘時把舊書讀灌花慎郡王允禧堦砌羅羣芳宛然如藻繢照日相新鮮臨風各相背蓮邀茂叔賞菊受淵明愛心茍有區畫遇境生取廢何如忘憂子澹然此相對榮謝寄流轉采色看迭代園丁汲井欄時時自灌溉藤花愼郡王允禧庭前紫藤樹敷榮亦青蒼根株有所托枝蔓渾能長輕陰蔭棋局落花飄酒觴欣然樂時物日夕恣徜徉對雨愼郡王允禧青苔上牆垣細草迷行路長日客來稀倚牕時索句雨聲自東南先入高桐樹枝柯洗更青悠然足良晤不離城市喧自得幽居趣烟雲秀可餐徘徊共朝暮湯泉愼郡王允禧天地毓靈氣山川藴神漿湧此硃砂泉乃在蘭之陽方池甃白石皛皛涵日光萬斛吐珠璣源深流自長端應奉至尊一􅉽入紅牆行殿枕碧岑簡朴惟焜煌洑流任通塞膏澤何汪洋蔀屋共霑被億兆同延昌喜雨貝子𢎞普連朝苦炎蒸欲避渾無䇿户牖來温風倍覺曦光赫何當展冰簟流汗時浹脊散髪揮素紈脫帽身還赤雪藕復調冰煩襟猶未滌倐覩油然生片片遙峯擘殷殷雷作聲濕雲塞空窄沾溉頃刻間神膏發地脉草木自精神物我皆調適衢路淨纖塵池塘漲澄碧溝澮既巳盈平陸俱盈尺行看潤秋田且喜蘇麰麥農人擊壤歌負耒振襏襫市廛及道路相與手加額我時抱疲疴披襟脫然釋當此清凉境游屐忻可即好看雨後山慰我躭詩癖朗吟頌豐年披襟暑無迹賦得秋日望銀山貝子𢎞普風吹恒嶽雲薊邱峙層碧爽氣逼眉宇仰瞻何奕奕雲連秋塞黄樹帶霜巖赤飛流洗峯椒夕照烘峭壁在昔次仲隠林岫妙姽嫿斯人久巳往遺跡留落翮嶔崟石玲瓏縹緲雲絡繹壯哉此形勝屏翰帝王宅千山藐培塿萬古壯疆場思游目其顚宛披古圓籍既尠子喬鳬難躡謝公屐徙倚臨北牕眼界暫為闢山靈變氣候萬狀呈几席助我嘯咏懐慰我烟霞癖猶冀繞丹楓􅀢然短笻䇿齋中即事輔國將軍博爾都天末秋欲生微覺絺衣爽清風吹槐花飛墮書案上昨夜疎雨零塵淨天初朗僻徑無行踪虚堂發新想事罕人自閒樹静蟬逾響聊復遂幽棲一枝任偃仰松韻軒初成倣古輔國將軍博爾都愛兹林泉趣端居寡所營耕鑿皆帝力俯仰荷生成好風自南來微雲冉冉生夾溪翳深柳嘒嘒蟬初鳴偶爾乗小艇閒隨漁者行飄颻聊適意焉敢薄時榮竹塢幽篁半畆綠陰䝉翳風月佳時清影蕭瑟予之小渭川也輔國將軍博爾都抱琴竹裏坐萬籟正凄清風起竹響碎月來竹影横時復七弦上偶爾作秋聲中洲爾雅水中可居曰洲雲中君蹇誰留兮中洲參同契太乙乃召移居中洲吾室既成欣然樂之亦不知因何留而被誰召也輔國將軍博爾都草堂面綠水舟楫往來通燭明花隙月帚拂柳稍風獨坐南牕下疎散樂無窮賜遊湯泉應制有序張玉書皇上御極之二十年歲在辛酉序屬仲春車駕廵行左輔駐蹕馬蘭峪展謁孝陵典禮既秩椒宮園寢有待蕆事維時扈從大學士臣霨等十有九人列幕石門祗候進止三月六日巳未上特命大學士臣明珠召扈從諸臣暨内廷供奉學士臣英等三人偕詣福泉山麓賜遊湯泉臣玉書備員宮僚幸覯殊遇既至周循温谷環覩石池瞻近行宮徘徊殿砌臣明珠因宣述諭㫖以兹泉氣和陰陽候均寒燠太皇太后鑾輿賁止倍增慶豫爰庀館宇用洽睿懐而庭楹無崇侈之觀棟牖無金碧之飾期於仰承懿徳黙佑壽祺蓋慈孝相成華儉適度史冊所紀未有若斯之盛者也臣又竊綜載籍考鏡源流古右北平郡徐無城北庾水出焉西南流與灅水合又東南流與温泉合故魏土地志云徐無城北有温湯而水經注言温泉水源出北山溪是今福泉山疑即温源也南流百歩伏入地中又折而東南逕石門峽是即今石門口也洪惟天篤禎符孝陵叶卜山嶞谷抱龍蟠虎蹲而石門絶壁劃開如表雙闕飛流倒瀉衆􅉽同趨則兹泉靈竒瑰異亦可覩矣頻歲以來皇上屢駕朝陵致齊斯地凝神澡慮攸芋攸寜豈非聖孝格天神泉應地既密衛乎陵寢復丕協於休徴以視仁壽崢嶸華清娛燕固有不可同語者乎臣職司珥筆誼應攄辭謹賦五言古體詩四章恭紀盛事神皋結靈異温谷瀉飛泉百􅉽繞山麓纍纍殊光旋甃石滙為沼玉鑑凌空懸積靄蕩青碧蒸液浮暖烟俯瞰丹砂沸仰矚銀漢連日月遞呑吐倒景環其間勝境表殊狀幽響爭竒妍渟泓杳難測帝澤涵深淵離離灌木岡芊芊芳草址别館引暄瀾茅茨覆堦戺松雲自生牖寜假雕釦侈眷言奉重闈敦樸愜慈㫖星軒一以御淑氣紛蘭芷四序鱗次周春波常如綺濯龍侵曉闢鑾鈴時至止篤孝叶神符千秋綏福履遙岑帶長薄曲渚連西疇融風萬彚滋瑞澤孰與侔迢遞石門峽淼漾灅水流兹泉互回伏湧秀成奥邱鬱鬱望孝陵嶺接烟嵐稠翠華䖍展謁肅此駐宸斿齋祓心神瑩遐覽物象收扶輿浩旁礴王氣蟠神州竒蹟絶躋攀矯首天際隔温綸忽下逮神山欣咫尺盥滌煩疴蠲飲吸疵癘釋三巳良未遠追禊許共適宸心軫荒遐流潤及蟻蟈爰𢎞慈孝理徧濡膏雨澤載溥仁儉恩盡起溝壑瘠四海登春臺庥聲永金石恭紀駕幸闕里詩熊賜履尼山秉教鐸千秋斯道彰懸象揭中天微言復光昌表章賴哲辟載籍紀前芳漢高修牢享唐宗薦衮裳褒崇並祠祀宋制備膠庠豈無右文主沾沾循舊章至理鮮孚契儀節徒鋪張我皇天縱聖淵黙接羲黄宸衷太極涵舒巻叶陰陽以兹隆化理一一邁前王甲子貞元㑹薄海慶平康肇舉東廵典禮秩崇珪璋帝心尤重道法駕賁宮墻䖍修釋菜禮鈞奏何洋洋儒生講席開尊俎倍輝煌萬世仰師表親題御墨香天章揮藻翰貞碣亦琳瑯爰逮四氏裔恩澤施無疆隆禮兼異數宣示布周行六宇盡歡呼斯文日月光愚臣慙謭陋叨隨太液傍値兹鉅典成拜手事賡颺扈從南廵詩八首張英車駕至畿輔道上民有獻嘉禾數岐者以示從臣春風轉韶律時廵歴郊原王道廣周諮冀以康黎元衢歌撤警蹕羽衛祛殷繁萬姓趨馬首塡塞窺井垣皆言年穀好比歲豐雞豚嘉穗發數岐敢以陳至尊聖心益怡悅慈顔彌霽温民天在粒食農事古所敦稼穡允為寶珠玉安足論再拜紀惇史大哉眞王言觀趵突珍珠二泉濟水性沈勁隠見多伏流趵突歴城隅噴薄聲颼颼澄波涵曲沼玉峰對層樓雪濤涌銀甕朱檻翔白鷗或類鮫人窟百琲珠光浮參差文藻漾瀺灂纖鱗逰清寒沁心骨四時常若秋昔巳邀天歩今復駐綵斿宸章炳星日光芒射潛虯先後兩輝映特為名泉留登金山滄江浩無際乃自岷山來浮玉一拳石砥柱何崔嵬北迎𤓰歩口南接潤城隈廻波忽涌立激薄聲如雷皎若鷗鷺羣燦疑冰雪堆海氣駕奔濤閣影勢欲摧有時風日麗潮落江烟開波光類澄鏡燈火明香臺仙蹕駐上頭勝地欣追陪峰頂大字石雲漢同昭囘登虎邱虎邱一片石乃在闤闇間王珣舊時宅清沚相廻環遊人歴今古石色常自閒劍池如削玉繡澁苔痕斑中涵清淺流花底時潺湲層邱莽廻互數歩勞躋攀長廊臨大壑紫翠何其殷邨落愛平遠極目入烟鬟上有萬歲亭卓立當兹山吳人歌樂胥嘉惠頻年頒登鄧尉山泛舟出吳㑹越嶺趨香林村居接花嶼長橋跨碧潯溪憐木瀆好山愛銅坑深一徑入桂巖千樹對梅岑吹香滿高閣積雪照湖陰喬松翳古寺惟聞鐘磬音數㸃漁洋山便娟當波心㠶影時出没湖光彌綠沈鄧尉隠此山流傳空至今欣逄天仗來感激生長吟登吳山吳山俯城闉石徑登嵯峨翹首雲物麗極目河山多層巒滴幽翠晴光捲白波一片明湖影掩映隔喬柯春潮如雪岸朝夕滿江沱萬井若鱗次葱鬱知時和丹梯聳飛閣蒼磴接崇阿至尊移歩輦雨霽此經過雲霄畫圖句古調永不磨㣲臣草蟲吟敢繼大風歌渡錢塘經過雲栖虎跑泉飛來峰東風動漣漪鼓枻渡錢塘沿緣歴沙渚山徑多㣲茫林巒轉幽邃數里青篔簹映水綠娟娟戞玉聲琅琅紫蘭被山谷日暖吹微香西渡虎泉側因過鷲嶺傍竒峰削雲根凌空如飛翔澄溪廻數折灌木羅千章鐘聲度白雲閣影摩青蒼萬乘一回顧巖壑生清光登北極閣走馬登崇岡東西臨冶城萬瓦連九陌淡沲春雲生至尊憑傑閣眺覽紓皇情蒼蒼夕陽落耿耿銀河清象緯天闕近奎璧相縱横聖心羅七曜指㸃示諸卿盈縮通造化高論雲霞驚弧偃天狼息斗轉泰階平南極懸日表久為仁壽禎今夕覲天子芒角增光明瀛臺恩宴詩四首徐乾學嘉㑹屬休運泰階景昌期文軌南北際侯尉東西垂昆明適違命丹浦暫興師五材民並用廟算百不遺止戈聞自昔脫劍方及兹兩岐既書瑞六穗盈華滋皇矣降豐年膏澤無偏私聖情始悅豫宴鎬戒有司滄池多菡萏菱蔓漾清流崇臺臨水榭爽氣當新秋聖人坐迎薫巻阿欣来逰太液波泱漭容與櫂蘭舟嘉樹蔭文石碧澗通潛虬長筵一何綺尚方多珍羞雪藕纔出水錦鱗始上鈎紫苞及緑房纍纍錯觥籌靜言聖澤厚涓埃孰可酬筐篚有勸侑具僚愧嘉賔拜賜欲就席有命自天申古也無算爵宰夫為主人兹㑹尚煩縟藹藹羅朝紳但使無不醉毋為辜良辰油油三爵餘歡言共飲醇既醉無虚歸分擕席上珍顧瞻九陌上日暮紛車塵觀頤自飬賢徐乃徧里閭庻物既衆多聖人方那居紫極偶幾暇㫖酒及嘉魚今日樂相樂何當更大酺弛力且給復薄稅仍捐租萬井皆晏眠無聞吏追呼兩階舞千羽庭鳯儀有虞萐蒲知送凉蔚然生御廚滄溟為九醖大尊置堯衢慚無雅頌筆聊用陳區區出山海關三首孫在豐少年重游俠投筆論三邊居常不思越行亦不戀燕長歌出塞行而廢郊陜篇於兹奉清蹕駕言從甘泉城窟飲馬來千里出燕然豁焉盪胸臆浩浩平沙天天地一翕闢乾坤開混茫草昩起休運經綸度大荒皇哉東京邑奕奕豐沛鄉坐擁北沙漠俯臨南溟滄枌榆高社日楊柳生春光沃野千萬里可以事農桑廣莫麗神州樂土以無疆雲霞海色曙翠華正臨關羲和執轡來光彩依龍顔海若為屏息三呼響萬山悠悠巻旌斾飛揚青海灣小儒愼馳驟駸駸豹尾間長城孫在豐秦政并六王騁望何荒唐仁義乃不施收兵鑄咸陽臨洮亘遼水長城萬里長驅山廻碣石駕海凌扶桑遂令山海上雉堞連崇岡雄關天下險恃險不于常悠悠照漢月漠漠飛邊霜行者千載下驅車覽大荒始知惟衆志成城乃金湯聖武功成詩徐秉義皇帝受天命蕩蕩威徳恢玉衡齊七政金鏡懸九垓觀文煥奎璧出震施風雷南池滄海宴北牖青邱開甄陶轉一氣萬物皆成材飛走奮翼觡草木羅根荄奈何彼㐫醜阻嶮作禍胎鴞鶹聚鳴嘯貙䝟羣喧豗造化至廣大洗滌乃招來豈彼狙獷心不拜軒轅臺帝怒為安民聲罪奮撻伐路鼓振雷霆太常建日月五校勇可賈七萃氣俱發揮鋒鐡山碎踔馬瀚海越天地合我謀鬼神助我罰網野制駭竄罟山遏癡突兩甄魚麗綴中權斗杓揭重圍日逐殞連弩閼氏蹶睿算掃妖氛神威震窮髮邊氓頌來蘇霖雨救旱暍天網難屢寛神武誰敢抗奈何彼㐫醜迷惑失所向鴞逆不革音鷹飢反遠颺殄滅在此時機捩不容放睿智天所啟臨邊坐武帳兵形在目中賊勢規掌上義勇激多士圍塹勅諸將鯨鯢暴涸澤狐兔困空壙雄畧既長駕仁風亦旁暢襁負爭來歸謳歌滿亭障維春二月吉大駕發神京列缺扈後乗屏翳抗前旌雙龍翼飛蓋八驥揚丹衡清蹕蒞五凉誓師召六卿雲蛇陣百里貔虎屯千營鼓震黄流却士叱雄風生遂登狼居胥北斗東南傾龍庭一炬燎戎帳萬馬平蠻鞮獻圖至贊普頓顙迎表此姑衍山千古騰天聲兵鋒轢五山皇心綏四國渠魁既尸竄脇從皆面革贄寶湔瑕垢截髮表胸臆設穽獲小獥囚檻獻短蜮凶醜勢窮蹙作虐還自賊毒谿長鱷斃絶壑封狼踣千剸來野夫萬啄聚鳥翼明則受天討幽則伏神殛遺種悉投弓稽顙仰威徳關門夜不扄烽燧從兹息撻伐張聖武憂勤本皇仁鑾輿乃三駕絶漠凌霜晨勞此堯禹躬惠彼隴畆民斮鯨斬檮杌息鼓休金錞劍㦸鑄農器牛馬放海濵班朔跨狼望納賮來鮫人銀麞夜入貢紫玉朝旅陳功高殷武伐徳邁漢庭賔神絲藪澤遍瑞榖溝塍勻願斵巉巗石垂曜億萬春皇清文頴巻五十九
