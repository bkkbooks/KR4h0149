body:
  text: 詩七言律詩恭和御製翰林院宴畢駕幸貢院七律四首元韻鄂爾㤗萬嵗千秋記此辰棘闈寥寂比荒闉㡬聞玉趾移亭午来自詞垣論臼辛量校不收無行客奨成深許讀書人御製句云從今不薄讀書人凡見者聞者莫不感奮薔薇桃李皆含澤中候凝和豈待春政術頻煩喻鼎台科名殷望属英才南朝風月徒為耳北斗權衡有是哉欲網鳯麟希世出黙祈忠孝待天開文章報國談何易端委須從性道来御製句云志聖賢志應湏立言孔孟言大是難臣盥手荘誦頓發深省不敢作文字觀鴻翥鵰盤祗自摶底曽雲路可相干飽温無意償三試軾轍稱名匹二難國噐半為貧賤士棟材常起末㣲官恩懐甲乙惟賢俊衣鉢矜傳局巳殘試院停鑾午漏沉奎堂吟續壁堂吟樷山木羙工求大埳井泉㣲汲戒深持玉尺衡迷五色授朱衣柄譟儒林兼銜早媿知人哲臣於大學士任曽叨恩命両主春闈精白長應矢此心恭和御製翰林院宴畢駕幸貢院七律四首元韻張廷玉参差萬瓦麗霜辰鎻院森沉儼列闉禮樂重光逄甲子文章乗運化庚辛三年黄卷讐書日五夜青袍槖茟人共道聖朝深雨露菁莪同領四時春帝車五色焕中台冠劍雍容集衆才從邁魯詩賡戾止和歌虞陛詠明哉蘭臺畫㦸凌晨啟蕋榜春華計日開當代崇儒超徃牒棘闈驚喜至尊来杳靄青霄墜復摶科名曽說渃方干荆山有泣前人惜滄海無遺自古難雪案辛勤憐素士氷衡公慎賴専官宸章敬誦纒綿語忍使孤桐委㸑殘柝鈴周匝漏初沉七度龍門聽苦吟臣自通籍迄今分校禮闈者三典鄉㑹試者四鵰鶚盤雲秋翮健琳瑯堆几夜堂深敢云一頋羣空翼但願多材萃作林此日屬車叨侍從拜颺仍矢昔年心恭和御製翰林院宴畢駕幸貢院七律四首元韻福敏珠斗輝澄仰北辰城魚舒鑰啟重闉崇文共識天開甲食徳渾忘力學辛鳯舉鴻軒皆翌運玉衡金鑑定知人翠華是䖏争先睹早覺陽和徧小春百僚濟濟步三台總是中阿樂育才禮樂於斯為盛矣文章亦幸有神哉珠呈滄海榮光耀玉剖荆山朗鑑開争羡風雲多㑹合韜藏曽向霧中来九秋健翮趁風摶氣象應教彩茟干直上龍門原不易秃来兔穎亦良難懐文更望能尋道學古方無忝入官努力明時湏愛日桂林多少悵花殘返轡重城日未沉錦嚢随輦入髙吟文壇氣映風雲壮才士恩沾雨露深歡動青袍迎彩仗欣㸔丹桂倚華林興朝盛事書惇史觀感能無報稱心恭和御製翰林院宴畢駕幸貢院七律四首元韻陳世倌文明景運應昌辰鎻院巍峩接帝闉萬里風雲期際㑹十年燈火最艱辛詩書㳤世還成俗科目掄材在得人自是皇心周士類親臨盛典紀千春明明魁柄指三台珊網期收俊傑才針芥暗投非偶爾鵾鵬能化亦神哉禹門浪撃桃花暖月殿香飄桂蕋開從此士林湏努力至尊曽幸棘闈来雲程空濶待鵬摶誰道弓旌可易干文體要從心術正功名無愧主恩難特隆貢舉参羣議為待賢才設衆官敬讀宸章生感奮定無人歎㸑琴殘明遠樓高漏㸃沉撚髭欲斷費搜吟千門月色人聲静萬舍燈熒夜氣深名姓忝曽登蕋榜恩榮遂得厠瓊林回思四十年前事生植均闗造物心恭和御製翰林院宴畢駕幸貢院七律四首元韻史貽直棘圍光氣逼星辰翠葆霓旌拂綺闉聖世不忘羅俊彦儒生誰敢惮艱辛徘徊滄海探珠地惆悵荆山獻玉人桃杏花前樷桂後恩波無限逗陽春奎斗星明接曙台恩綸稠疊勵羣材誰為國士無雙者共仰王心克一哉人說登瀛仙路逈帝殷籲俊仕途開龍旂還向龍門度鳯輦㸔從鳯沼来九萬鵬程向此摶雲連矮屋月䦨干漏催蠟淚終宵易茟走蠶聲得意難校藝塲中迎黼座儒生隊裏擁從官躬逄聖主旁求切莫恨柯亭㸑竹殘分題握管暮沉沉曽向簷帷剪燭吟幸際風雲依禁近多慚雨露沐髙深聖朝㑹見麟遊囿㤗運方㸔鳯在林禮樂百年瞻至治薦賢為國有同心恭和御製翰林院宴畢駕幸貢院七律四首元韻任蘭枝翠華臨幸動星辰鎻院光輝照畫闉帳影連雲移甲乙琯聲調律换庚辛周官久重賔賢地漢典勤求射策人共仰皇情富追琢菁莪詩裡露垂春霞標千仭麗天台特敞東堂待俊才駿買金臺㸔正爾鳯鳴桐樹咏良哉粉袍鵠立秋飈爽文陣虹騰曙景開萬舍峥嵘添氣色龍旌曽駐此中来争言霧變與風摶珊網層層寳氣干鵲抵崑山論璧易蚌沉滄海覔珠難榜期龍虎皆名士事羡歐梅作考官舊忝深恩持玉尺南宫連署粉毫殘學市槐䟽花影沉風簷四璧起長吟文章報國情原切俊乂招弓道更深採徧琨瑶皆入貢收来梓杞自成林大科從此人相賀鼓舞咸知聖主心恭和御製翰林院宴畢駕幸貢院七律四首元韻彭維新盛事連綿集令辰鸞聲噦噦指東闉羣瞻日馭當亭午更向風簷恤搗辛聖意厚期天下士儒流寕譲古時人棘闈舊是興賢地玉輦經臨䖏䖏春文昌躔次近三台月露風雲祗費才不媿科名斯卓矣無求温飽詎難哉朝經暮史根源在秋桂春花接續開結網殷勤非漫爾皇家元待鳯麟来扶揺九萬積風摶根托髙山見射干登第敢言酬志易持衡當念得人難㡬多春夢耽榮路莫遣冬烘誚試官豈乏殊材涵古淡知音應惜㸑桐殘食葉蠶聲夜漏沉燒殘樺燭尚㣲吟從来雲路艱辛䖏何意天臨軫恤深翰藻榮輝垂試院縹緗勑賜徧儒林列行縫掖瞻龍衮四表歡傳樂育心恭和御製翰林院宴畢駕幸貢院七律四首元韻張照槐花落盡及氷辰龍䍐紛蕤拂綺闉何事至尊遙戾止為憐士子絶艱辛打頭屋矮風兼雨落手蛟騰天與人胥入重瞳廻注裏拈毫灑作藝林春消磨髪背作黄台猶向春卿舉茂才方寸難忘餘習耳三千斯擊亦悠哉月含清淚光如瀉茟有真花夢亦開滌慮束身歸義府未妨得得十回来蓬梗因風萬里摶雷搥何礙倒題干讀書始見民情易窮理方知帝命難棫樸小材湏就育圭璋大徳不名官文昌風月三千界莫使仙枝取次殘如鱗萬舍杳沉沉想見風前墨吻吟人樂簮花諧所願帝憐刖璞意何深欲教麟鳯遊郊藪先要琅玕溢泮林賢有司今寰海遍尚敷文徳叶皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻汪由敦三霄湑露渥昌辰仙仗重移向綺闉直為蓬山均愷澤更從棘院軫囏辛繡楹寳帖榮觀國玉版奎章懋作人試㸔和風吹長飬八紘随䖏布陽春御製詩并直御製書聨扁頒發省貢院恭奉勒石奕奕虹光燭斗台百年羅網育真才鳯凰鳴矣梧生矣元首明哉士朂哉月窟桂飄仙路逈春江杏倚上林開誰知鱗次風簷隘特荷君王玉趾来鵬背曽㸔九萬摶門高詎敢寸私干披沙不道求金易抱璞應憐獻玉難黎獻萬邦傳帝典賓興三物本周官詞源學海敷彛訓未許區區但守殘鎻闈晝静漏森沉㡬度煎茶記舊吟蘓軾有試院煎茶詩樺燭敢辭通夕倦氷衡頻忝被恩深珠璣百琲涵滄海杞梓千章蔚鄧林多少迎鑾魚雅士欣欣就日見葵心恭和御製翰林院宴畢駕幸貢院七律四首元韻劉統勲盛事喧傳共此辰一聲清蹕徹重闉詞垣巳慶新丹雘棘院還䝉念苦辛在藻依蒲辭舊侣擔簦躡屩有勞人天文朗耀懸珠斗徧燭鱗鱗萬舍春聚奎有象應星台勉爾旁求得俊才王國為楨洵羙矣臣心如水尚欽哉菁莪不向私門頌桃李偏連上苑開何幸青衿瞻黻冕至尊親到禮闈来雲鵬有路九霄摶燕雀休慿弱羽干價比連城真贋别目迷五色鑒裁難訓言剴切垂貞石典故殷勤問禮官多士㡬人能立志遺經長對短檠殘風簷想像漏聲沉䟦燭含毫入夜吟此地㡬經文思苦今朝一頋聖恩深璠璵噐重光崑圃梁棟材多􅌗鄧林三復宸章同拜手洪鈞陶鑄見天心恭和御製翰林院宴畢駕幸貢院七律四首元韻阿克敦恰逄陽月最佳辰特典傳宣遍九闉纔向花磚親翰墨更從棘院軫艱辛搜羅每下求賢詔㐮賛終期槖茟人此日翠華勞警蹕千秋文苑總含春文昌司命属三台玉尺金臺校衆才天地篤生寕偶爾國家培養亦深哉誰将羙錦心為製漫道紅紗眼未開好待春風秋露日持衡一矢潔清来養成毛羽自飛摶厚禄休将末學干海底千層收欲盡竿頭百尺進猶難曲江髙㑹題仙籍雁塔芳名重禮官次第上林花信到莫教嘉實鳥銜殘芹生玊井碧香沉海宇欣傳御茟吟下士有懐無不逹聖情能鍳一何深焦桐留韻歸宵雅秀木儲材積鄧林共識垂衣敷大化鈞陶萬類荷皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻梁詩正鑾輿臨幸及霜辰棘院深嚴傍帝闉四海早瞻文焕爛九重猶念士艱辛風簷晷促通經彦雲路梯攀射策人從此恩流登俊地陽和分取藝林春奎光煜煜燭乾台自古瑶林萃衆才三載賢能書盛矣百年禮樂運皇哉魚龍變化随春動桃李繽紛向日開金牓更垂天茟麗旁求令典式将来萬仭瓊霄鶚羽摶青雲入望盡思干漫言塲屋科名易湏識朝廷拜獻難白首一經憐下士丹鉛三復重簾官升沉祗判持衡手莫使搜芳桂獨殘冬冬院漏夜初沉猶記當年抱苦吟宫燭分来催草就句臚唱罷被恩深久咀橄㰖回初味敢侶鸞凰忘舊林他日倘教量玊尺勉承明主愛才心恭和御製翰林院宴畢駕幸貢院七律四首元韻錢陳羣燦爛文昌拱北辰垂芒下照帝城闉時清真見才師濟主聖偏知士苦辛樺燭閃風吟巻地青衫似草計偕人拜瞻天仗聞天語輦路如随有脚春人間有路接中台鎻院曽量斗石才試巳至三亦足矣㧞能得五儘佳哉晷移蝸舍千行列雲擁龍門四扇開最憶年時文戰北蹣跚六七番曽来臣陳羣曽應京兆試五南宫試三而成進士羽儀王國待扶摶不是尋常挟筞干擢秀鄧林心匠巧求珠赤水夜光難瀾翻舌本推文傑氷作頭銜属試官􅈿重至尊延佇意摩挱莫厭漏聲殘花開桂落寫升沉七字宸章萬遍吟求士何妨求驥比爱才真與爱民深華簮自昔憐初服玉筍經春戀故林寒畯一時齊忭舞敢将志業答皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻徳齡吾皇籲俊練良辰鳯斾虹旌集錦闉祗為賢能勞寤寐特於科第念艱辛虞門穆穆傳賓俊周雅芃芃賦作人十月芳華香擁座濃恩暖應小陽春昇平有象恊三台藹藹廷多黼黻才己遣旌旄問姝者更同喜起詠熈哉蒼龍彩抱宸章動若木華連睿藻開自昔驊騮矜一頋争㸔千里籋雲来直上清秋翼並摶伐檀那復置河干石多似玉分須急金必披沙揀最難郊遂己㸔移不帥賔興惟待論為官聖朝樂育同天地何況琴材㸑未殘井亭桐葉影沉沉曽記當年事苦吟奔走未酧官爵重文章詎報國恩深嘉祥久兆芙蓉鏡盛事彌誇桂樹林幸上星辰随曵履惟期不負讀書心恭和御製翰林院宴畢駕幸貢院七律四首元韻塞爾赫鑾輿臨幸趁良辰棘院崇墉接綺闉三載方窺魚變化九重先念士艱辛興賢選俊明廷典篝火聽雞皓首人愛物天心揮玉藻龍門十月暖於春三公昭徳映三台濟務湏慿選逹才進退於兹豈偶爾股肱自古重良哉春風二月夭桃發瑞露三秋丹桂開臣愧愚頑仍分淺未能此地唱名来青衿鵠立擬雲摶射策原非禄可干多士漫矜登第易昔人端底歎才難翻飛遮莫騰雙翮隕越常憂曠一官只為懐恩勉衰老肯随霜葉就凋殘聚奎堂外曉烟沉輦路簫韶龍鳯吟誥誡常聆天語切栽培益感帝恩深掄才自此澄冰鑑摛藻應㸔焕藝林千載一時期共勉莫教辜負聖君心恭和御製翰林院宴畢駕幸貢院七律四首元韻秦蕙田瀛洲雅讌洽良辰帝輦還廵鎻院闉九陛温綸垂涣汗一時寒士釋酸辛容光不隔通㣲照棘地初傳警蹕人曠典千秋書甲子龍門十月普陽春奎垣瑞氣近三台聖世賓興禮上才燒尾浪高非偶爾穿楊心苦亦㣲哉人稱冀北驊騮壮天與文昌日月開此際風簷瞻翠葆殊榮偏喜話從来培風荘叟羡飛摶直上青雲未易干下乗只今愁任重治朝從古說才難正期志莭侔三代詎以文辭貿一官寸晷厚叨勤恤意寒窓忍爱雪燈殘紫陌廻鑣日未沉光昭雲漢麗髙吟百年典寄權衡鉅七字恩同覆載深畫燭那知輝鳯藻青衫從此重雞林昇平盛事榮稽古情竭難傳報稱心恭和御製翰林院宴畢駕幸貢院七律四首元韻勵宗萬霓旌翠葆拂星辰一片非烟散綺闉特幸文塲觀整肅深憐舉子備艱辛日邉氣吐青雲客山外觀回泣玉人四首宸章勤慰勞枯桐殘桂總含春慎遴冰鑒自奎台力屏囂浮㧞異才九載旁求思切矣㡬回申命曰欽哉化承累洽滋培厚運始中原氣象開注記一時多曠典賡歌纔自玉堂来鵰鶚乗秋奮擊摶何曽老去屈方干盡除宿弊持衡易特命新題剿說難入彀文雖知有數抱才人不患無官雞窓自此都勤學書卷寕供蠧蝕殘三條燭盡漏聲沉記得風簷擁鼻吟僥倖昔年為學淺科名奕世受恩深漸㸔暖律回寒谷又聽嚶鳴滿上林萬彚均歸陶鑄裏傾陽惟有竭葵心恭和御製翰林院宴畢駕幸貢院七律四首元韻張若靄百年容易值兹辰拜聽新綸出禁闉鸞輅乍臨争舞忭雞窓回憶倍艱辛典隆獻筞明經地念軫風簷雪案人何幸天顔親指頋一時矮屋盡逄春文昌炳炳麗中台嶽降嵩生有􅌗才舉矢成驕良巧矣茹荼得蔗亦佳哉珊瑚網宻殷勤䕶桃李隂濃次苐開聖治休明儒術重觀光争向日邊来碧漢迢遥彩翼摶鵬飛誰復敢私干風雲際㑹翺翔易雨露涵濡報稱難夜永朱衣隂相士春遊紫陌待除官盛朝最慎量才尺那惜三條燭蕋殘銅壺聽徹漏沉沉廡下人還擁鼻吟得第詎忘雲路逈崇儒今荷主恩深明珠喜見来滄海小草先教托上林從此單寒依廣厦昭回雲漢答天心恭和御製翰林院宴畢駕幸貢院七律四首元韻嵩夀帝徳乗乾撫五辰制開棘院麗城闉雲程千丈真騰躍雪案三冬歴苦辛茟落風生能肖物衡懸氷鑑故由人即今上苑㸔花滿多是寒枝後試春祥雲瑞靄䕶三台天佑明時鍾異才金鼎調羮能辦矣龍門發軔信竒哉如椽鉅茟千鈞立射斗文光一道開聖念特憐多士苦棘闈欣見翠華来長風共擬學鵬摶遇合由来不可干温飽志曽除却未科名籍要克當難探香月窟推佳士揺珮金鑾拜列官漏盡清宵文思湧恬吟那計燭光殘參差雉堞影沉沉鎻院風清入夜吟駿足應圗来絶逺珊瑚啟網出重深爬羅文采絲抽繭澹蕩韶光花滿林温語數行宸瞩近春和育士聖人心恭和御製翰林院宴畢駕幸貢院七律四首元韻張鵬翀禁苑行觴燕吉辰棘圍飛斾涖嚴闉荆山玊璞呈和氏燕國金臺致劇辛健翮當風培萬里弱毫結陣掃千人昌時加意勤清問莫負紛綸井大春斗魁髙㨖接星台首善人文上國才科苐摘髭誠易耳英䧺入彀信竒哉鵠袍有淚臨風洒虎榜無私傍日開更喜觀光承御蹕歡迎夹道拜恩来光華日月聚摶摶綵茟誰将象緯干風雨魚龍相混易風塵簦屩脫離難司徒六行非空舉宵雅三終早肄官聖主旁求申命切肯教㸃額恣摧殘鯤桓雀躍意飛沉當宁咨嗟動逺吟馬勒朝銜千壁静魚鱗夜簇萬燈深珠璣詎抵賢為寳梁棟先儲士作林不薄讀書真有味皇言肫切感人心恭和御製翰林院宴畢駕幸貢院七律四首元韻劉綸堂開鳯咮際昌辰華盖遥臨望帝闉此日宸遊増物色經時文戰憶艱辛風雲並䕶三千籍雨露先霑十八人踏徧槐花秋報罷行㸔珊網結来春干將有氣叶中台黄牓齊登重􅌗才文史三冬應足矣名經千佛信佳哉祗知溟北風多便争許終南徑别開自此登龍真得地至尊親駕六飛来脩翅垂天任擊摶誰矜采茟昔遊干每懐宵旰求賢切彌覺文章報國難筞射天人推漢制書升道藝重周官扶輪大雅資真賞不獨芸忩飽蠧殘明逺樓前漏欲沉五通十帖記披吟頻年襆硯慚材拙両試持衡感遇深乾隆戊午已未鄉㑹両試臣綸並䝉恩命充同考官敢以㣲㳙量學海祗期弱草藉華林鏁闈聴譜迎鑾曲萬品鈞陶荷聖心恭和御製翰林院宴畢駕幸貢院七律四首元韻嵇璜光動魁躔紀瑞辰鑾輿新賁鎻闈闉求賢聖主如饑渇挟筞真才獨苦辛玉尺平量期獲雋金針暗度属何人龍門此日紆宸頋寒谷吹􅌵總是春黼黻文章耀鼎台朝廷立政在儲才知人則哲誠難矣觀國之光尚朂哉天茟大書珠斗焕帝歌庸作慶雲開從今郭隗臺邉路不數千金買駿来前程九萬儘扶摶忍困藩籬不上干五色賦成迷目易三條燭燼稱心難惟憑雅正師多士肯以浮華炫試官博得天顔回一笑短垣猶剰墨痕殘棘院行行景象沉廵簷凝睇想幽吟政先釐剔頽風挽澤漙滋培至意深逺溯源流澄道𣲖盡刋枝葉振詞林千秋衡鑑應相勵報國先酧造士心恭和御製翰林院宴畢駕幸貢院七律四首元韻張映辰鸞旂玉輅耀三辰萬騎喧闐溢帝闉文運宏開週再甲棘闈親幸值先辛是日庚午清班共集蓬瀛宴綺陌曽傳龍虎人糺縵光華歌復旦不徒桃李滿城春奎璧星明映斗台珊瑚鐵網試真才三條風燭偹嘗矣萬里雲鵬不易哉丹桂有香從月落碧桃和露向春開天街筞馬㸔花徧莫忘門前鵠立来雲翼乗風九萬摶豐城光氣属吳干文如翻水成偏易中擬青錢選極難自昔賢書傳盛典即今聖治重儒官右文雅意知辛苦好向芸編共抱殘銅龍水咽漏聲沉記向螭㘭珥茟吟三殿常瞻金闕逈五雲回首玉堂深追陪宴序遊文圃賡和詩才媿學林叨被殊榮何以報壺中一片矢冰心恭和御製翰林院宴畢駕幸貢院七律四首元韻于振儒風有幸際昌辰欣迓鑾輿出紫闉自是一人勤教育非闗多士歎艱辛誰知雲棟繙經日時厪風簷刻燭人拜頌天章多感泣禹門鱗鬛盡回春妙簡名臣佇鼎台三年大比為掄才試思不媿科名者此志寕惟温飽哉桃杏己随佳日種芙蓉亦向小春開三千弱水天風勁曽見飈輪㡬度来溟海天池儘控摶何曽草澤老方干果如飯顆躭吟苦不患陽春賞識難帝世四門明舜目盛朝六典重周官春風苦啖紅綾餅勿笑蟲牙老齒殘潛鱗健翮異飛沉蟋蟀經秋亦觧吟琴遇鍾期思愈切驥逄伯樂感彌深從教乳燕栖文棟兼許巢烏集上林雅意旁求羅俊彦天書昭掲聖人心皇清文頴巻九十
