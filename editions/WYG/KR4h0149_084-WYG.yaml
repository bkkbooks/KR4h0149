  text: 欽定四庫全書皇清文頴卷八十四
  hash: sha256:4d1b7999867984f2290a95095f54424bc534aabcf944a41b38eba66139074054
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_084-1a, image: WYG1450/WYG1450-0313c.png}
body:
  text: 詩七言律詩乾隆三年聖主臨雍禮成恭紀四首蔣溥鑾輿曉度傍櫺星統合君師式典型萬仭宫墻輝釋奠九天雲日照橫經先登道岸尊前聖獨契心源示在廷樂備禮明恩浩蕩春流芹藻有餘聲坦坦賢街接禮門升堂展敬帝容温虬松舞翠枝逾古鴛瓦流黃制倍尊物備兩楹車服盛爵陳三獻禮儀敦無言自有羮墻契北面親師對越存鸞旂翠葆映霄雯午夜生徒佇大昕香靄氤氲披御座霞光燦爛仰天文敷揚性命傳洙泗尚論欽明重典墳名理㑹心期共喻圜橋冠帶蔚如雲聖朝文治洽膠庠更企宸修卜運昌三殿瑶籖垂制作六堂寶架煥文章淵源早識傳心法俎豆重㸔發道光今日講幃沾教澤無私化雨徧遐方聖主臨雍禮成恭紀六首于振天子敷文首辟雍崇牙虡筍樹鐘鏞樂羣敬業尊師氏説禮敦詩在瞽宗槐市橫經皆彦俊杏壇鼓篋盡舂容欣逄乾德光昌日聖學髙深萬國顒文廟巍峩德所基春秋俎豆飭儒師庠分上下軒楹爽序列東西藻繢施自是羮墻勤寤寐俄瞻榱桷煥琉璃星躔奎壁文明盛糺縵卿雲五色埀春仲陽舒届上丁鑾輿晨蒞燭光熒虞庠再展三雍禮堯陛新開二葉蓂授几升階緣養老臨軒前席為談經圜橋鵠立知無數百濟新羅總在庭洪惟聖學溯唐虞精一危㣲敬是樞已見松雲生棟牖還銘几杖凛盤盂日知薈萃窺心奥樂善編摩仰帝圗一自彤扉䝉寵渥草茅頻得拜嘉謨臣自元年引賜見䝉堂賜日知薈説二年又䝉樂善全集帝眷儒林雨露頻不教滄海有潜鱗纔聞玉殿臚句唱又見天門蕋榜新重坐豈惟三十席授經何止八千人小臣幸得偕儀鳳兩覯元辰覲紫宸臣振於雍正元年殿試第一甲第一名乾隆元年欽試博學鴻詞䝉恩欽定一等第四名珥筆金門愧不才臨雍盛典慶趨陪懸鐘待叩聆天語琢玉成功稟睿裁仗馬有知猶振鬛游魚無翼亦揚腮㣲生未竭涓埃報虛負昌時説馬枚聖主臨雍禮成恭紀三首林令旭文明肇啟應昌期赤紱瑶光繫睿思至德千秋原契合清時三月肅威儀銅龍漏轉鑾輿動翠柏春濃彩仗移共喜昇平傳盛事聖人君拜聖人師璧水增輝黄屋新禮隆三獻重明禋笙鏞雅奏金絲叶籩豆馨香玉醴陳匝月龍輿看再至兩朝鴻訓實相因躬耕纔畢躬臨學濟濟橋門集鳳麟盥薦升堂聖敬昭旋開講幄御香飄書呈玉几開黃帕露浥金莖下碧霄位育功深原性教欽明德被繼陶姚心傳道統遥相接雲煥龍章仰盛朝聖主臨雍禮成恭紀四首徐以烜盛朝文治契儒宗重道躬先涖辟雍三殿春旗千騎擁十行丹詔五雲重宫墻東魯思車服虡業西周振鼓鐘大禮率由成憲在九天儀度正從容膠庠釋奠薦馨香禋祀尊崇邁百王睿藻髙懸庭煥采閟宫重整屋施黄包涵學海興儒行仰止高山上孔堂經術源流親印証欣瞻雲日大文章文華殿啟御經筵視學重將寶訓傳述聖首章尋孔思放勲開巻廓堯天行生并寓無言教聲振如聞大樂宣從此儒林呈瑞色菁莪歌頌滿新篇聖學由來似海寛普天樂育漲文瀾圜橋化雨沾槐舍講席春風接杏壇後裔雲仍皆受賜中朝鵷鷺盡騰歡尊師時切羮墻慕珥筆深慚紀述難聖主臨雍禮成恭紀四首有序阮學浩乾隆二年冬十二月皇帝詔曰先師孔子聖集大成教埀萬世我聖祖仁皇帝世宗憲皇帝咸詣辟廱釋奠詔講朕祗承丕緒嚮慕心殷特易聖廟以黃瓦用展崇敬其俟工竣將親詣焉於是所司廼詳據舊章諏三年春三月甲寅上視太學釋奠如儀爰御彜倫堂祭酒司業官以次講中庸虞書之首篇既宣御論環聼者數千人靡不悦服越翼日綸音煥沛錫慶有加禮也洪惟聖天子躬生知之質好古敏求實與聖祖仁皇帝世宗憲皇帝心源繼續遠紹大成統緒以故崇儒右文至誠至敬頒布聖祖御纂經籍暨御製文集於學宫多士是訓是行蔚有德造今年仲春上丁之祀親致齋禋恪行三獻復御製匾聯懸掲若星漢茲未匝月清蹕再臨猗歟盛哉揆諸雅頌薪槱中阿鸞旂泮水曷能企焉臣叨列侍從親道德之光華敢托矢歌以揚厲我國家億萬年文明之治詩曰古柏隂森翠拂空櫺星門啓瑞烟籠輝煌廟貌侔中禁璀璨天題賁學宫重道眞逄堯舜主尊師合陋漢唐風鈎陳羽衛凌晨發槐市喧闐燭影中上丁二月展明禋視學重煩秩祀申九奏元音金石備千秋法物豆籩陳大君誠敬先多士天子羮墻見聖人一脉尼山歸列祖我皇繼述右昌辰環集生徒禮數寛詩傳于邁盡騰歡上公陪祀來金闕博士觀光近玉鑾璧水鶯花三月曉橋門冠帶萬人看只緣稽古多榮遇未覺瞻雲路果難芹藻香清劍珮旋禮成稠叠聖慈宣玉壺漿泛雲霄上彩綺霞分日月邊惠溢兼金憑錫予額增蘂榜待聯翩恩暉湛露栽培普定有鴻文石鼓傳聖主臨雍禮成恭紀四首張若靄黄屋新開萬仭崇鑾輿視學出齋宫祗因百代心源合愈覺三廱典制隆鳳幄翠分庭柏影鸞旂香滿沼芹風青袍道左争迎拜一體君師教育同爐烟漠漠靄彤墀翔歩升堂盥獻時已向兩楹陳俎豆如聞四壁應金絲留連車服看猶昔對越羮墻儼在兹紅燎光中親展禮天顔肅穆侍臣知合樂聲終扇影廻儒臣先侍講堂來繡袍黃繖從天下綈几牙籖對御開共覩欽明光格被久知位育道全該尼山宗法唐虞治並列瑶編仰睿裁銅街簇仗駕飛黄仙蹕才移晝漏長萬國共欣瞻鳳藻諸生新得覲龍光統開八百車書㑹人在三千弟子行遥見金根隨化雨殿槐壇杏一時芳聖主臨雍禮成恭紀四首齊召南顯謨承烈際重熙聖主端居講藝時禮樂百年光舊典文明千載啟昌期心源自與唐虞接道脉遥從洙泗垂視學季春依月令於論鐘鼓譜歌詩虎闈燈燭集儒官聲報靈鼉夜色寒博士四門齊鼓篋諸生六館盡彈冠濃瀼露待沾槐市糺縵雲先䕶杏壇漏刻漸催天半曙分班鵠立候鳴鸞太平天子涖芹宫夾道旌旂映日紅正是芳時逄穀雨共欣清蹕引薫風典文稽古三雍備家法尊師六拜崇不盡高山瞻仰意精禋直自比升中彜倫堂繞玉爐烟論説司成賜坐氊占得飛龍乾五位肄來鳴鹿雅三篇賓興更展春官額俊造同分太府錢率海譽髦觀盛德恩波還勝永平年聖主臨雍禮成恭紀四首任端書鼉鼔聲中簇仗齊虎闈春暖燦鸞旂太平自重三雍禮天子親瞻百代師肅肅虞庠兼授䇿煌煌周雅盛歌詩東郊故事無煩説車駕從容曉詣時紫芹芳茆璧池香釋奠初成大道昌氣象雲雷光卣鼎精神絲竹動宫墻儒臣奉引陪行幄天語遥聞徹講堂喜覩薪䕴深雨露奉璋何處不輝煌聖主熙時敬典勤乞言端冕在成均一星大啓天東壁六籍重昭斗北辰柏舍日迎芸輦麗杏壇風繞翠華新共看冠帶輝文物濟濟圜橋億萬人雨潤隂輕學市槐六韺清奏露門開諸生已見重雲集侍子還從屬國來鴻業百年興禮樂靈臺千載象昭囘欲知稽古榮多少不數春郷漢代才皇清文頴卷八十四
