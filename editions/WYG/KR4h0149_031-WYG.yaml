  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_031-1a, image: WYG1449/WYG1449-0494c.png}
body:
  text: 對昊天與聖人皆有四府其道何如康熙丁卯五月十一日乾清宮應詔陳廷敬臣聞惟天盡物惟聖盡民能盡物謂之昊天能盡民謂之聖人昊天聖人一而已矣然昊天能盡物而不能盡民聖人能盡民而亦能盡物故曰惟天下至誠能盡其性能盡性則能盡人物之性可以贊化育而參天地故又曰天地位焉萬物育焉易大傳曰易簡而天下之理得矣天下之理得而成位乎其中矣昊天聖人其道詎有二哉邵子曰昊天之盡物聖人之盡民皆有四府焉臣嘗求其義春為生物之府夏為長物之府秋為收物之府冬為藏物之府謂之昊天之四府也易為生物之府書為長物之府詩為收物之府春秋為藏物之府謂之聖人之四府也昊天以時生長收藏乎萬物故能盡萬物聖人以經生長收藏乎萬民故能盡萬民是昊天之時聖人之經其道一也是以又曰昊天以時授人聖人以經法天若邵子可謂善言天人之際者矣夫天能生長收藏乎萬物而不能生長收藏乎萬民聖人能生長收藏乎萬民而亦能生長收藏乎萬物臣故曰天能盡物聖人能盡民亦能盡物若是者聖人豈有加於天哉聖人者天之所生也天生聖人以生長收藏之權委之聖人而天不與故春而生也夏而長也秋而收也冬而藏也人見其盡物焉而已聖人法天以生長收藏之權委之經而聖人不與故易以生之書以長之詩以收之春秋以藏之人見其盡民焉而已然臣何以謂聖人能盡民亦能盡物也天不言而聖人言之易書詩春秋是也春無言而易存夏無言而書存秋無言而詩存冬無言而春秋存易之言如春書之言如夏詩之言如秋春秋之言如冬春夏秋冬天之所以盡物也易詩書春秋聖人之春夏秋冬也聖人之所以盡物也故曰聖人能盡民亦能盡物聖人者一天而已矣且夫昊天與聖人既皆有四府也臣謂昊天有大府聖人亦有大府何言乎大府也蓋天有四德元亨利貞聖人有四端曰仁義禮智元之德見乎春亨之德見乎夏利之德見乎秋貞之德見乎冬仁之端見乎易義之端見乎書禮之端見乎詩智之端見乎春秋亨利貞之德統乎元義禮智之端統乎仁元亨利貞之德統乎乾仁義禮智之端統乎性元亨利貞之德不可見而見之於春夏秋冬故春夏秋冬者昊天之四府也仁義禮智之端不可見而見之於易書詩春秋故易書詩春秋者聖人之四府也元亨利貞見於春夏秋冬不能無所統而統於乾是乾者春夏秋冬之大府也仁義禮智見於易書詩春秋不能無所統而統於性是性者易書詩春秋之大府也臣故曰昊天與聖人皆有大府也惟聖人法天之乾盡人之性雖與昊天各有一大府實與昊天同有一大府也臣前所言惟天下至誠能盡其性以至於贊化育而參天地者其謂此與我皇上盡性達天仁民育物作君作師參兩天地臣等䝉清燕之餘俯賜延問臣學識荒陋不能仰副聖意不勝皇恐臣謹對昊天與聖人皆有四府其道何如徐乾學臣聞天不言而歲功成聖人法天而王道備其理一而已矣故邵子曰昊天之盡物聖人之盡民皆有四府焉四府者何在天為春夏秋冬在聖人為易書詩春秋春以生物而易以生民夏以長物而書以長民秋以收物而詩以收民冬以藏物而春秋以藏民葢昊天以時授人聖人以經法天天時人事互為經緯者也其謂之府者蓄之而無不具用之而不可窮萬物萬民莫能出之謂爾臣竊論之穆清之宰黙成神運其德剛健中正純粹以精即太極之藴於無極而二氣五行由之推遷百昌萬彚由之鬯逹自發生以至歸藏皆乾之性情也聖人體乾以為德純亦不已大中至正而範圍天地曲成萬物天下託之以為命於是順時行令温肅舒慘各協其宜東西南朔遵王之路此與天之胥生胥成也何以異哉故河洛之數天苞地符聖人畫卦演象繫辭而順性命之理發陰陽之奥生生之謂易蓋言此也農軒而後氣運方開聖人埀為典謨著為訓誥勲華之文教三代之制作禮樂聲名變蕃極盛矣其諸天地發育萬物之候歟若夫詩者夲天地自然之元聲以發其温柔敦厚之㫖六義之精微協於律呂懇惻纒綿長於諷喻要其歸極於收斂人之性情長其善而去其邪以歸於正而其妙有使人遷善逺罪而不自覺者此亦如天地之揫斂萬物落其華而收其實也春秋繼詩而作聖人尊王立訓以筆削定是非使天下凛然知王綱所在名義至重而不可犯蓋事至於成而善惡著焉善惡著而賞罰行焉春秋者聖人以是非為賞罰所謂有春秋而天道無僭忒萬國合軌者也自漢以還專經之家如王弼費直孔安國毛萇杜預何休范寗之流並以訓詁解經而經義或幾乎晦惟邵子及濓洛諸儒發揮義藴溯合淵源其理則隂陽五行其性則仁義禮智其道則五倫日用其事則禮樂刑政可以㑹諸心而體諸身見於事而示則於後而後六藝之全體大用如日月之經天江河之行地天道王道一以貫之又何疑焉抑臣聞之皇帝王伯相為循環如天之有春夏秋冬也世運之盛莫如三皇天德之盛莫如春生聖人之幽贊神明莫善於易春為四時之首易為五經之源易也者造化之樞紐而萬事萬物所從出者也自易言之元為資始自歲序言之春生萬物而要之君心之至仁足以上契天道如伏羲農軒至矣至於氣化流行周而復始質文升降聖哲迭興歴觀載籍若堯欽恤舜好生禹泣罪湯祝網文王視民如傷武王大賚四海㒺不以一念之仁與天合德當斯之時萬物已登春臺太和時在宇宙又何必畫象結繩而後為至治禪通疏仡而後為邃古也哉是知旋轉造化乃亮天工輔相裁成實資人事而聖人之所以為心帝王無殊道古今無二理以人合天欲之斯至之矣我皇上膺首出之隆際貞元之㑹睿學淵深直契造化與天同體之功用有不待擬議而自合者謹述其概以對書答李舉人論以史證經書汪琬昨足下見琬春秋諸論遽䝉手教之辱謂古人以經證史不以史證經解經諸作不當參以後世事其説甚辨然非琬所敢安也琬不能探援祕籍以相醻答試舉里塾諸䝉童所恒誦者為足下言之幸足下少降心平氣而聽焉昔子程子之傳易也於屯之九五則引魏高貴鄉公唐僖昭二宗以證之於師卦則引淮隂矦於六五則引郭子儀相州之敗以證之於否之九五則引王允李德裕以證之於遯之彖於未濟之九二則又引王允謝安子儀李晟以證之於坎之六四納約自牖則引漢四老人之定太子為之反覆其故而痛切申明之此即解經者以史證經之明驗也如其不可以為證則淮隂侯以下諸人之事豈皆不出於史乎至於楊廷秀易傳引史尤多其佗若胡康侯之傳春秋鄭伯謙之論周禮舉莫不然彼歐陽永叔蘓明允諸作偶不及史耳非其果不可以證經也如果不可以為證則易春秋傳與太平經國書決不妄引漢唐也明矣抑琬又聞春秋經中之史不當用易詩禮三經為比今之士大夫果能上下數千百年悉取春秋與漢唐宋之所以安危治亂以訖君子小人之用舍進退或同而異或異而同者無不哆口抵掌馳騁往復其間而又能著諸文章成一家言以為後世有國有家者之龜鑑此亦曠代之軼才也雖使借經立説而參之以後世之事謂之以史證經可也謂之以漢唐宋之史證春秋之史亦無不可者其殆子朱子所云解經而通世務者也惜乎今猶未見其人而琬又學識憃陋不足以任之耳足下宜早自奮勉用此倡導後生而顧為之詞曰史不可以證經然則琬尚奚望哉昌言無忌希賜裁答答問東西房書毛奇齡據禮註鄭氏謂天子諸侯有東西房大夫士則有東房無西房此不見經文原是謬註而黄梨洲主其説謂士冠禮冠者於牖西拜賓而賓即於西序答拜惟無西房故西序與牖西近有西房則西序在西房之盡相距逺難交拜矣又昏禮醴婦贊者於西階上北面拜送而婦於牖間席西東面拜受惟無西房故階得與牖西相當不礙授受有西房則西階在西房之下婦與贊背面難禮接矣推其説則竟以牖間之西西序之東為西房將廟寢三間而以楹西之右一間當之此非無西房直無西廟寢謬之謬矣顧廟制無明文可據但就其所云冠禮推之似東西房在廟寢三間之外别附一間即爾雅所云有東西廂曰廟者其近北一半名曰夾室近南一半即謂之房如冠禮將冠先陳服於房中西牗下此東房也何也以冠子於阼在東階上也然而曰西墉則房西有墻矣此一墻與寢堂間隔即爾雅所云東西墻謂之序者其在墻西謂之東序在墻東謂之西墉是東序在户東而東房則又在東序之東西序在牖西而西房則又在西序之西與梨洲所言正反也故尚書顧命位次有在牖間南面者此王朝位也在東序西面則養老燕饗之位也西序東面則聽政位也乃别有一坐在西夾南面為親屬私宴之位則正是西房以其夾一墻故謂之夾以其有夾故親屬私宴得以掩蔽向使如梨洲所言在西序東則與牖間南面一位兩坐並抗既非儀法且殿堂何地其可以親眤燕私之乎是以下文有􅏷之舞衣大貝鼖鼓在西房語孔氏謂西坐夾東蓋只此一間而北夾之坐居於正中則南房所列當在東墉此猶之冠者居東房之中而冠服所陳當在西墉可對證也但予謂大夫士亦有西房與梨洲所言又反者以喪禮推之按初喪襲斂奉尸侇於堂則男位尸東女位尸西至殯於西階則大夫䌈地士埋土皆依西墻為柩堂西無地矣故男主位在殯東而女主則不得不入於西房南面拜客所謂不下堂者惟君夫人與女賓之尊行者至夫然後下堂而拜於階下此則大夫士廟制明有西房之經證也况所證必不止此也答問笙詩樂師書毛奇齡據問笙詩有詩則鄉飲酒禮笙入三終將以笙笙詩耶抑亦别有歌詩者而僅以笙應之耶此問最善從來辨笙詩未有辨笙其詩者夫所謂笙詩謂笙必有詩非謂笙詩之必有歌也凡詩可以歌亦可以笙所謂笙詩有詩謂笙詩之必可歌非謂笙詩之必不可以笙也蓋笙與箾與籥與管四器皆主聲詩皆應歌之器皆在堂下原無徒器者但有歌而器有不歌而器總必有詩其歌而器如鄉射禮之工歌於上而堂上堂下之笙瑟皆應之即鄉飲酒禮之合樂是也此有歌之笙也不歌而器如大射禮之管新宫始奏禮之管象堂下俱不歌而俱以管笙聲其詩即鄉飲酒禮之笙入間歌是也此不歌之笙也是以春秋傳有歌鐘即頌鐘頌磬所以應歌尚書有笙鏞周禮有鐘笙即笙鐘笙磬所以應笙夫笙又有應則笙即歌矣此如漢横吹東西晉大角皆用之軍中並無歌工而曲中有詞如上之回思悲翁等則豈有笙管而反無詞者故往以不徒器折其無詞謂不如步瑟調笙之慿虚作聲無字音耳非謂其有字而不歌也若又問歌工上下多寡經無明文則漢後歌工多而授器少古則授器多而歌工少即如飲射一禮或四工則兩歌兩瑟六工則兩歌四瑟而笙管之數不與焉然而歌工必在上即笙管鐘磬皆列堂下而皆可以應其歌是以合樂之法工歌闗雎則堂上之瑟堂下之笙管皆羣起而應之其歌葛覃巻耳鵲巢采蘩采蘋皆然舊註所謂合樂者合金石絲竹以歌之金石者鐘磬絲竹者瑟與笙管也乃孔頴逹誤註鄉飲酒義謂上歌闗雎下笙鵲巢以應之則世無有以張家之聲合李家響者來問所云各詩各章長短不齊此明了之語註經之儒於此不曉宜乎六樂一經歴萬古如長夜也但世有過為分别者謂歌工必堂上堂上之瑟必不如堂下之以器器詩則又不然射禮至命射時歌工皆遷堂下而樂正命絃者曰奏騶虞則瑟工亦不歌而但瑟騶虞之詩以主鼔節所云魯鼓薛鼔者是歌工亦居下琴瑟亦器詩上下有尊卑八音無貴賤也至又問歌必在前舞必在後特不知舞曲與歌曲同終抑舞曲之餘又有歌曲則有以舞曲終者春秋傳季札觀樂見四代之舞而即觀止是也有以歌曲終者仲尼燕居序大饗之九節以獻賓樂作為一節賓酢樂作為二節升堂歌清廟詩為三節下管象武即舞也為四節夏籥序興謂以籥吹又以籥舞也為五節薦爼而樂又作為六節將行歌采齊七節賓出以雍徹以振鷺八節九節是歌後有舞舞後又有歌况燕禮有無算樂將歌舞迭更而無算數即燕饗一禮且然至於祭祀之徹饌送尸其歌雍歌夏皆在舞後更無論也若琴瑟七絃分正清向未即答以病不及也嗣後即有答書而又不能寄今見來書所録備正清之説於七條十三刌之中雖與僕説稍未合然故不礙聲律所謂汎濫言之而五六皆見斯已耳詩問詩問九夏非周頌汪琬問者曰九夏果周頌與曰南陔白華華黍由庚此笙曲也九夏此金奏之節也葢皆有聲而無詞大射禮歌鹿鳴三終奏肆夏新宫三終周禮鐘師凡樂事以鐘鼓奏九夏夫有聲有詞工所諷誦者歌也有聲無詞工所播諸笙管琴瑟鐘鼓者奏也九夏烏乎頌問者曰然則肆夏非時邁與曰非也先儒謂肆夏一名樊時邁也昭夏一名遏執競也納夏一名渠思文也又謂肆夏為一詩樊遏為一詩渠為一詩皆臆説也吾未聞一詩而三名者也且時邁有肆於時夏一語適與肆夏合猶可借之以相附㑹若昭納二夏則於執競思文奚取焉孔子子夏不言也儀禮左氏傳不言也後人亦何從知之吾亦何從信之哉詩問變變風變雅之終汪琬問者曰變風變雅之終也其亦有義例乎曰有之王道陵夷周公召公不可復作風詩之終於東山破斧諸篇也所以見天下之思周公也雅詩之終於召旻也所以見天下之思召公也考九河考平郡王福彭九河之迹著自許商商為漢成帝時河堤都尉上書曰古記九河之名有徒駭胡蘓鬲津今見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里據商所言徒駭在成平胡蘓在東光鬲津在鬲縣徒駭最北鬲津最南三河既知其處則其餘六者以爾雅九河之次推之太史馬頰覆釜必在東光之北平成之南簡潔鈎盤必在東光之南鬲縣之北無疑此其大畧可知者也若條分而縷析之一水必指一處則記載紛如可得而述孔疏徒駭河之本道東出分為八枝于欽謂漳河即古徒駭以今輿地考之漳水自鉅鹿至天津入海中間所歴皆徒駭之故道則齊乘之言似得其實太史自昔無考明一統志云在南皮縣北馬頰覆釜通典云在平原郡界平原德州也胡蘓于欽以滄州南之大連澱當之漢志云東光縣有胡蘓亭簡河正義云在貝州歴亭縣界歴亭今東昌府之恩縣是簡河反在鬲津之南謬矣金地理志云南皮縣有潔河鈎盤通典云在樂陵縣東南鬲津元和志云在安德南七十里于欽以濱州之士傷河當之自漢以來講求九河者甚詳然許商止得其三其馬頰覆釜鈎盤三河至通典始得之由宋迄明而後簡潔太史三河遂皆臚列可指以漢人所不能知者而後人考之獨詳其果可信也歟蔡註以為或新水而被以舊名或一地而互為兩説皆似是而非無所依據誠哉是言矣獨是蔡註亦有可議者簡潔本二河故考亭註孟子亦分之為二蔡註乃合之為一且議先儒不知一為經流何其疎畧之甚也徒駭為河之本道孔疏之説甚明故班固云自兹距漢已亡其八枝則其一存者即徒駭也豈别有所謂經流耶至爾雅釋水並無一曰二曰之文郭註於簡下註云水道簡易於潔下註云水多約潔則簡潔之必不可合而為一也審矣今欲自實其説遂自一而數之至八若爾雅之文有固然者誣衊古人罣誤來者多聞闕疑殆不如是至於九河之迹既不可復識而王横遂謂與碣石俱為海所漸夫許商所指三河見在之地今河間交河縣東有成平故城東光縣東有東光故城濟南德州北有鬲縣故城皆漢縣也則所謂為海所漸者王横之臆説又烏足信也哉税畆丘甲田賦考韓菼宣公十五年初税畆成公元年作丘甲哀公十二年用田賦此春秋所紀用民財力之制毎變加重而諸儒之説各有不同者也税畆有二説以為是時民患上力役懈於公田公田之所入薄是以宣公履畆而税未嘗加於什一之外但以其非古者藉民之力私田稼不善則非吏公田稼不善則非民之舊制是變法之始故譏之者左丘明公羊高糓梁赤三傳及何休范寗註皆同而胡安國本之者也以為公田之外又履其餘畆十收其一正哀公所謂二吾猶不足者始於杜預及徐邈糓梁註而朱熹論語集註哀公問有若章引此宣公税畆為説也大抵税畆以前説為是王制言古者公田藉而不税註言藉民力治公田美惡取於此不税民之所自治孟子言八家皆私百畆同養公田故朱熹亦言或但耕則通而耕收則各得其畆也今宣公自六年至此三遇螽災頻仍水旱是秋先書螽而後書税畆是通行踏勘檢校荒熟擇其善者非復收公田之租矣依糓梁之説計之古者公田為居井竈蔥韮盡取焉則公田中去廬舍二十畆田秪八十畆今履畆而税則是以八十畆而與百畆者通算已浮於十一之外而又煩瑣傷體故曰以公之與民為已悉矣以但收八十畆之入較之公於一井之中多入幾一十八畆也若謂變法之初遂至倍取於事理決不然矣丘甲有三説以為四丘為甸賦車一乘毎乘七十二人甲士三人凡二十五人為一甲本四丘共出三甲今作丘甲即一丘出一甲者諸儒之説多同而極主之者胡安國傳是也謂邱出甸賦者杜預是也謂農工各有職以事上甲非人人所能為今魯使丘民為之者公羊糓梁及何休也丘甲固當以胡傳為正而張洽以為每甲士統步卒二十四人必無增甲而不增歩之理古者於六十四井之中出長轂一乘甲士三人步卒七十二人四丘共出三甲今使一丘出一甲是於五百十二家之中而更取二十五人為兵但其或三甸而增一乘或每乘而增一甲則不得而定也若謂一丘十六井一百二十八家而使之出長轂一乘甲士步卒七十五人比甸之賦則頓加於常制四倍又必不然若公穀所謂則是使農夫造甲義無所承葢不足辨也田賦有五説以為田主出粟而賦則於商賈之里㕓本收區域之征以備牛馬車乘此賦止於里㕓而今并賦之田故譏之者胡安國傳據國語稯禾秉芻缶米之文也謂丘賦之法因其田財通出馬一匹牛三頭今别其田及家財各出此賦者杜預范寗之説也以為丘賦猶未足又以田賦之家出一人以為兵者陳傅良之説也以為井出丘賦者賈逵也謂田為一井之田賦者斂取其財物若漢家斂民錢以田為率者何休之説也五説惟胡傳以末業幸免之説為得之以周禮九賦考之益信矣據廬陵李廉以為古之甸出一乘者但出此一乘七十五人觀春秋傳所載臨事而授甲授車則知馬牛之屬亦非邱甸所出葢賦之區域官為之備臨事而授之民事已而還之官也豈以丘出一甲之後三甸當增一乘其車輦馬牛甲胄之屬里㕓之賦不足以供而又為是計田而斂取民財以充之歟蜀杜諤云别其田及家財各為此賦明是前此田財通為一而此别為二乃是平增一倍非更分别其有無而李廉但駁之以為家財之有無難均亦未也經文明言田賦正謂不當賦之於田耳如杜説則當云以財賦不當云以田賦也九夫為井四井為邑四邑為丘四丘為甸甸出一乘一乘三甲士凡四丘一甲古法本於五百一十二人中而出七十五人自丘甲之後一丘一甲於五百一十二人中而出一百人今若家出一人則是五百一十二人盡為兵於古法為七倍於成公時亦五倍也賈逵所為一井之田而欲出十六井之賦則是視邱賦又增十六倍也皆必無之事也何休言斂取民財以田為率者近之特未言此賦之當出於里㕓耳胡傳於三事皆得其觧獨於哀公所謂二吾不足者終屬游移於初税畆條則云譏宣公廢助法而用税其後作丘甲用田賦至於二猶不足是謂丘甲田賦之後未嘗謂税畆即取二也於田賦乃云二猶不足故又以田賦其説前後相違矣考之於經公即位以後未嘗有水旱螽蝝之災自十二年春用田賦而冬十有二月螽十三年十有二月螽論語所記哀公問於有若曰年饑用不足如之何明是因螽災而年饑其謂二猶不足明是田賦之後始為什二矣豈得謂二猶不足故又以田賦哉要之税畆則取民之財者廢公田助法少溢於什一之外然而變先王之制而作法於貪後世因之有加無已丘甲則用民之力者加三之一既已計丘而增兵矣田賦則又計田而出其財正縁兵既增則取之於里㕓者不給故也自此則盡民之財竭民之力一倍古制矣經於税畆之冬書蝝書饑於田賦之後叠書螽以為天道也夫子曰不度於禮而貪冒無厭則雖田賦將又不足明乎此非致足之術而必至於又不足者也故於税畆書初丘甲初也田賦亦初也然不書初者誰生厲階其末有必不可以止者也故聖人甚慎乎其初也書大傳攷李紱書傳自漢魏以來並遵今文之學無一人見所謂古文尚書矣故亦無一人見所謂孔氏傳者自梅賾二十五篇之書出唐人據以為疏頒之學官而伏氏尚書大傳遂亡不傳考漢書藝文志載伏氏勝尚書大傳四十一篇隋志尚有三巻其完缺不可知嗣後史志更不復見惟晁氏讀書記稱今本四巻首尾不倫則雖有存者已非完本而今併是而佚之矣伏生之學歴有師承其經固可信其傳亦當得經文本義不至如後人解經率慿私臆乃葉氏夢得謂伏生尚書大傳言不雅馴至以天地人四時為七政謂金縢作於周公沒後愚謂即此二端亦足徵大傳立義之精非後世訓詁所能亦非偽孔傳所及而葉氏狃於習見不能虚衷折其至是蓋成見之為害也嘗試論之政者國家所行之事即堯典欽若昊天歴象日月星辰敬授人時是也歴象欽天有天之政期三百有六旬有六日天行氣盈之數以管窺天測之即天之政也分宅四極以定日晷嵎夷南交西朔方地之政也東作西成南訛朔易人之政也殷仲春殷仲秋正仲夏正仲冬四時之政也天地人四時各有應行之事故謂之七政其事見於周官詳於月令後世猶守之至於日月五星古未聞有專理之政事堯典所謂日者日中日永日短所謂月者指閏月言之葢皆歲月日時之日月也太陽之日象雖有出日納日之文亦以正卯酉之時耳若太隂之月象則始終未嘗及之而五緯則非所用月令雖秦書實本於夏小正去唐虞政治未逺所紀四時中央各紀其日其帝其神及其蟲與音律數味臭祀祭凡五之别皆在獨未嘗及於五緯至周末石氏星經始以五緯星列於日月之次然則金木水火土五星不得列於唐虞之七政也審矣偽孔傳以後世之見釋古書不知唐虞之世未嘗有治五緯星之政也若以五行當之則既已與糓並稱六府不應又與日月同稱七政且孔傳固以五星釋之未嘗及於五行其訓釋之詞謂察天文齊七政以審已當天心與否則直啓後世禨祥讖緯矯誣上天之説尤所未安豈若伏氏之傳為得欽天授時之大也哉至於金縢一篇雖出今文然程正叔疑其文不可信而括蒼王廉熙陽作論謂金縢非聖人之書其論不為無見而實則未見大傳所解故耳古之紀者無有所祈孔子疾不禱而周公禱之故疑其不然然子路請於孔子故孔子止之若周公則自以為功未嘗告之武王且告之祖考欲以身代臣子廹切之情宜無不可惟是周公身秉國政乃令史臣記其請代之功又記風雷之異則孫膚之謂何此聖人斷乎不為者也若云公既明農然後王令史臣紀之則無端而作亦恐未然惟大傳以為成王葬周公適有風雷之變因追念前事之異叙而紀之則君有念功之美而臣無矜功之累即程與王之疑亦可釋矣伏氏大傳為後人所駁者其立義之精尚如此則其餘精義湮沒不傳者可勝惜乎偶因葉氏之説而辯之如此俾有志於通經學古之士知今日舉業所治未足以定經義慎無拘於墟而篤於時也江源攷李紱江為南條大水與北條之河並稱河自發源至積石入中國境以今方輿路程圖考之已七千餘里而歴來溯江源者悉本禹貢岷山道江之文止就岷山言之雖博奥如桑氏水經酈氏注精詳如程氏禹貢論亦無異辭余獨疑江水廣與河等深則數倍並横亘中國江尤有天塹之名而岷山在陜西廢叠州為中國境内何其源之近而小耶竊以為禹貢言岷山道江猶道河積石止就神禹施功之地言之江源不始於岷山猶河源不始於積石也昔人嘗有以北金沙江為江源者其源在西番境内莫得其詳余典試雲南以南北二金沙江發䇿問士亦莫有能言其源委者後䝉聖祖仁皇帝頒賜方輿路程圖則北金沙江源委井然既開方以計里又測極以凖度其法為古來所未有實聖人嘉惠天下之盛心使通經學古之士不出户而知天下也按圖考之岷江與金沙江㑹合於四川之叙州各自叙州逆溯其源岷江源出岷山當北三十四度西十二度行五百餘里過黄勝闗至松潘衛入四川境又南行五百里至茂州之長寧堡有黑水河來㑹又南行六百里經成都府西境至嘉定州青衣嘉定二江來㑹又二百餘里至叙州與金沙江合自發源至此僅一千八百餘里若北金沙江則發源於西畨之阿克逹毌必拉必拉者江也當北三十二度半當西二十度經毌魯斯烏蘓之拜圖都渾共南行千八百里過裏雍河屯始名金沙江又東南行九百里過塔城闗至雲南麗江府又南行四百里至陶營廵檢司又東北行千里至雪山入四川境又北行千二百里有打沖河來㑹又東行三百里至凉水井折而北行七百里又東行四百里至馬湖府又東行二百里至叙州府與岷江合自發源至此已六千九百餘里較岷江之源逺三四倍凡水以源逺者為主而源近者附之今自叙州㑹合之處逆溯二江之源修短懸殊如此乃不以行六千九百餘里者為江源而以行一千八百里者為江源此理之必不可者也按黄河發源北三十六度當西十九度與金沙江南北相距僅三度半東西則止偏西一度而河源之南金沙江源之北皆高山聳峙葢即所謂崑崙山也河源在崑崙之隂江源在崑崙之陽而特微偏西二百餘里也又有一源名雅礲江即所謂打沖河與金沙江㑹合於馬湖西境者也雅礲亦發源於西番北境與青海南境接壤當北三十四度西十八度與河源南北相距僅二度東一度中阻高山葢亦崑崙之陽而微偏東二百餘里者也其源從平地湧出源泉百十道與星宿海相同西番人名以察楚必拉䝉古人名以七察爾哈那衆泉㑹流為大川南行二千里沿途納東西大水十餘處經四川西境始名鴉礲江又南行六百里入四川境過三渡水始名打沖河又西行三百里又南行五百里與北金沙江合又一千六百里至叙州自發源計之共行五千里較岷江之源亦幾至三倍而水勢盛大亦倍於岷江以源之逺論當主金沙江以源之大論當主鴉礲江然不如金沙為確葢金沙較鴉礲又逺千九百里源逺則流無不盛者若岷江則斷斷不得指為江源也又按江河並發源於崑崙河源在其北者已東趨陜西又折而北直趨塞外鄂爾多斯又東行千餘里然後折而南由延安入陜再折而東以入於海江源在崑崙南亦東南行已與四川相近復南行直趨雲南東行千餘里然後折而北由雪山入川再折而東以入於海兩大川始而相背繼而相向有若黻文亞字亦天地之奇觀江源者亦可以無憾矣皇清文頴巻三十一
