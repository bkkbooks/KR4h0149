body:
  text: 詩七言律詩恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻鄂爾泰日麗風和宛似春詔筵清秘念儒珍才非房杜懐三徳身際唐虞愧十臣奎壁每瞻星晷近蓬瀛乍覩物華新恩叨醉酒深五字張説句難比親賜香醹重一廵辨色開晨集孔鸞摳衣槖筆盡彈冠詞林禮樂千秋㑹冊府君王一例看細草銜恩青茁茁高梧向日碧團團方塘却少源頭水魚藻欣添太液瀾文淵道脉本參聨宸睠頻宣雅頌篇葵藿心傾惟翊聖鹽梅寄重愧非賢鰲頭北面霑時雨豹尾南移拂曙烟沙路萬人齊額手東王公領玉堂仙風雲契合樂融融襄賛誰堪慰聖𠂻天自居高心益下書方出洛道逾崇崆峒逸事真無藉洙泗清源喜大同誓答恩光驚老至橘陽紀月日禺中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張廷玉太和蒸作玉堂春得近瓊筵飫鼎珍徳仰羲文今聖主心儀房杜古名臣須臾鳯藻從天降咫尺龍光映日新俯伏花磚承指顧載聆榮譽重逡廵特許瀛洲集鳯鸞簮毫雅稱進賢冠席容玉筍分行坐酒賜金罍帶笑看共聼簫韶仙樂舉近瞻黼黻瑞雲團随風咳唾皆恩澤劉井中涵太液瀾垂垂白髮首班聨拜捧虞廷喜起篇職沗三公慚論道身依上聖敢稱賢傳家富有金泥籍滿袖濃攜寳篆烟更愧攝官居秘省日趨香案領羣仙乆已乾坤協氣融日躋聖敬抱淵衷持盈每鑒登封侈鳴豫深嗤望祀崇辭貴立誠垂世則政斯行健與天同不須太史書邦瑞㑹見麟遊上苑中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻福敏木天高處占先春鎬宴榮叨席上珍一代文章開秘府千秋遭際重儒臣金鑾近接光華逈芸署偏霑雨露新歡洽鵷班歌喜起獨隆今古此親廵霜明仙仗動儀鸞廣樂調時盡振冠斑管佩攜應並記花磚座接得頻看薇垣夜燭奎光爛珠樹明浮扇影團珍重賜書留壁府詞源還許識波瀾雲漢為章玉作聨光添藜閣燦瑤編殊榮漫擬誇稽古盛事寧惟數集賢天酒濃分金掌露朝衣齊染御爐烟紫霄香案由來説咫尺瀛洲便作仙文物昭回瑞氣融持盈常自凜虗衷百年禮教皇謨洽一字心傳聖敬崇泰運休明三代上英才陶鑄兩儀同高深莫嫓何由賛祗在唐虞典誥中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻陳世倌皇仁煦嫗氣如春川澤含輝嶽效珍奎璧有光聨日月宫商協律應君臣百年禮樂規模逺一代文章運㑹新特與詞垣昭曠典受恩逾重轉逡廵上苑花開待孔鸞朝廷雅意重儒冠玉堂瑞靄千官集寳翰輝騰萬衆看風裊雀罏香細細雲開雉扇影團團瀛洲亭畔重題句似海詞源富綺瀾華簮奕奕耀班聨既醉同賡湛露篇但即文辭能見道從來聖主必求賢鳯池演漾涵晴旭雞樹蘢葱羃曉烟顧影自慚雙鬢雪頭銜猶許領羣仙陽月暄和喜氣融從容讌賞洽宸衷仰承睿澤心彌凛共勵儒修志益崇三葉尚留堯莢在五絃應與舜琴同欣逢聖世光文治交泰咸孚一徳中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻史貽直瀛海波廻浩蕩春鵷班分列御厨珍已将酒醴歡多士更以鹽梅朂近臣式燕禮成麟閣重賡颺恩入鳯池新開誠廣益皇心切不數封山紀扈廵丹地深嚴集孔鸞盍簮人盡慶彈冠隆恩層疉三山似睿藻輝煌七曜看法酒擎來仙露潤宫袍賜出錦雲團從知此後登瀛客齊向文河溯水瀾仗下清班煥璧聨木天重整荷龍篇門連青瑣宜分草閣近丹梯號集賢五色鳯書凝瑞靄三花馬鬛拂晴烟重來廻憶編摩地廿載曽叅玉局仙喜睹天顔瑞氣融慚無啟沃答宸衷細流難益洪濤壯土壤何増岱嶽崇講易今逢交泰盛賦詩還慶笑言同文明聖治隆千古兢業彌深宵旰中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻任蘭枝玉堂近接掖垣春石室圗球百代珍鳥革峥嶸動華屋工倕經緯壯虞臣槐㕔領院恩光重珠榜題楹氣象新法從迎鑾皆鵠立喜瞻飛盖引逡廵羽葆葳蕤拂鷺鸞堦除拜舞列貂冠天廻十月陽春好地帶三山瑞色看宴比傳柑璚醴滿樂和孤竹紫雲圑睿才頻見飛鴻藻不借銀河萬頃瀾南宫甲帳珮珂聫榮許同賡大雅篇文學信知平世貴論思終羡古人賢映來芸閣吹藜火攜得金爐惹䄂烟頒賜重叨天澤渥願招巗谷引儒仙聖主敷文大化融旁求英俊仰皇衷材儲卿相經綸逺道訪䕫龍事業崇自識西京清問切應看貞觀舊風同樹人已徧收麟鳯泰卦占爻日正中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻彭維新恩􅄎蓬山早得春縂敎凡品化殊珍文章詎竟儒門事遭遇欣為聖主臣丹地棟梁増絢煥木天階戺倍清新詞林望幸心咸切五夜層簷幾度廵仙仗旌旗裊鳳鸞沙隄鵷鷺肅衣冠海升日色橋邊曙署建霞標畫裏看御輦一臨光有耀玉堂是處錦成團圖書萬卷資陶冶障取文河涴演瀾環依黼座列班聨侍宴均歌湛露篇疉暏天章文載道頻煩帝訓士希賢聲和逺協虞廷奏香重平連禁苑烟即此便成蓬閬境無須海外問神仙雲爛風恬景象融帝歌喜起鬯淵衷巴詞那叶鈞天韻土壤何裨泰岱崇夕惕朝乾靡有間北門東觀豈能同禮成賞洽紆鑾輅芝蓋焜煌日正中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張照由來天笑物皆春况乃文江集妙珍禮樂百年歸吉主圖書兩序領元臣御光涵日龍成采仙筦調風鳯試新拜錫琅玕開月窟蟲魚莫問舍人廵棟間廻鳯更翔鸞五色榮光珥復冠河漢昭回如有意烟雲飛動不容看七分入木仙豪健肆筆成書垂露團賦述千秋推竇衆奚曽目渉此䧺瀾句截黄金玉刻聨瑤華札降捧宸篇詩同漢帝七言倡韻取唐臣五字賢劉長卿云五言律如四十個賢人著一個屠沽不得情有餘芬還得句筆無停趣下非烟今朝五色雲多處若個真同脉望仙騰華照宇日初融神動天行淵黙衷穆若思文還下武朂哉宋璟更姚崇泰包四徳宜惇勉坤繫三言尚克同由豫盍簮恩澤渥交咨即在讌歡中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻汪由敦氷署先吹暖律春御筵香靄荷分珍晴霞曉散蓬瀛境湛露恩均侍從臣東壁詩篇追自昔延英樂府記畨新讌次中和清樂奏玉署延英之章欣逢盛典叨殊渥芳醖親頒第八廵是日十召至臣御前八賜酒三人次第研丹㸃筆燦翔鸞高捧光騰近侍冠清秘深堂纔蹔憇矞皇宸藻已傳看九霄星彩珠為斗五色雲機錦簇團自是聖涯涵溟涬望洋何處溯文瀾玉音辰告肅班聨風雅淵源典誥篇宣諭有因文見道不専尚詞章語保泰百年欽主聖賡歌一徳勵臣賢繽紛更拜承筐賜馥郁同攜滿袖烟欲笑金鑾傳密記祗從游幸詫羣仙元氣均調聖澤融儒風遐鬯仰天衷鳳池波比滄溟濶鰲頂峯逾泰華崇廿載廻翔私感切千秋祭㑹衆心同惟将稽古孜孜意永戴堯仁業業中恭和御製駕幸翰林院賜宴分韻聫句後復得詩四首并示諸臣元韻劉統勲翠輦移來翰苑春儲材深望得殊珍付将調燮經綸手領此文章侍從臣師濟官寮周道擁廟廊鐘鼔一時新沙堤何幸承天歩豹尾雲旗匝幾廵阿閣宏開集鳳鸞六曹三省列儒冠誰知文苑英華盛便作周官典制看詩就千言波灔灔榜懸七寳月團團詞臣同此親芳矱觀海人曽見紫瀾隆恩稠疊到班聨温語如聞湛露篇錫爵豈惟明尚齒承筐兼以示求賢宫商韻叶朱絃奏鼎鼐香凝玉篆烟甘露親從天上得縱敎凡骨也登仙開霽天光旭日融葵忱傾向矢丹衷西清敢詡詞章富黄閣方齊相業崇隆禮難酬千載遇敷文已見萬方同朂哉珥筆承恩者夙夜勤思夏屋中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻阿克敦翰苑風和氣若春御筵清樂足芳珍蘭臺棟宇光雲漢鳯沼簮纓集侍臣聖藻欣瞻同日麗宫羅初啟拜恩新登瀛自昔傳佳話幾見楓宸降輦廵仙仗凌晨動彩鸞爐烟濃處進賢冠直同颺拜千秋盛莫作歌風一例看書賜瑤函春細細扇開雉尾影團團皇情到此知何極萬里澄波海上瀾清班列坐儼星聨玉署人歌湛露篇長使巗廊多俊士肻敎草野有遺賢屏開黼座留華省堂錫嘉名帶碧烟何幸身依雲路近不須蓬島問神仙天語親承淑景融好将篤棐答宸𠂻傳心不以詞章重紀盛還知禮樂崇詩誦緝熙期日進書陳兢業敢雷同自慙卅載簮毫吏姓氏重叨蕊籍中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻梁詩正日華曉賁鳯池春學海千尋彚翠珍自古崇文歸論道即今聖主得賢臣榮光上映圗書秘景運重開甲子新曠典寵驚前史罕幾畨拜舞重逡廵蓬山深處集鵷鸞槖筆争峩學士冠要識雲霄殊異數莫将科第等閒看譜傳樂府箾韶奏宴錫官厨湛露團懽洽更聆天語切聖門無涘一觀瀾榜署天題珠璧聨詩成更賦柏梁篇幸䝉此日榮稽古却勝當年號集賢玉醴斟來親御案綺文捧出帶爐烟瀛洲舊住神仙侣今更名標最上仙東觀多才道化融勤思則古厪淵衷書探宛委方稱富學貫天人信可崇月露漫誇千首麗堂亷合慶一心同幸随元老叨賡拜身在唐虞二典中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻錢陳羣瓊筵晨啟坐生春聖主親賢比握珍鴻運百年興禮樂鹿鳴初什答君臣袖中鰲禁香烟裊庭際瀛洲草色新揷架賜書千萬軸小留天歩到檐廵璇題雲構好棲鸞環侍羣仙七等冠優渥恩綸真異數琳琅新句許傳看文光直上應千尺和氣融來是一團不漏蓬壺清淺水也随學海助波瀾賡歌體製擬珠聨百六詩成第一篇歩輦初臨叅至聖頭㕔並遣謁唐賢院署有日孔子神廟韓愈祠是行禮有差曈曨日影浮雞樹澹沲風光上鶴烟不到五雲清秘地那知人世有神仙共欽聖徳日昭融提命諄諄感寸衷縱有心期思樹立慚無學殖答登崇承筐賚予恩光徧申宴叨陪茀禄同楯陛千行誰不羡幾生修到玉堂中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻徳齡暖律吹廻十月春皇恩稠疉重儒珍奎文寵賁清華地睿藻歡賡侍從臣仙掌逈開霞彩曙綺疏深網日華新史官濡筆書榮遇豹尾雞翹見特廵仙客紛來跨碧鸞峨峨盡戴切雲冠佳辰邀得鑾輿幸勝地真同蓬島看留覆錦袍憐彩纈送歸蓮炬見花團何如雨露今尤徧鳳沼光涵萬疊瀾拜手欣随鵷鷺聨抽毫載和慶雲篇信知已治仍求治况得多賢更尚賢愛日晴薫書帶草緒風輕轉愽山煙聖心黙與天心契無事升中議集仙玉署暉暉協氣融更於欽若仰宸𠂻窮簷恒入經綸切藝苑先叨禮數崇既醉堯樽榮帝錫疊霑周露媿臣同欣逢泰運觀文化藹藹堂㢘一徳中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻塞爾赫香烟榮霧暖疑春仗馬星羅雜綵珍南極曉開青瑣闥北門宵集紫微臣曈曨瑞照雲衢朗輪奐巍瞻翰苑新遙想千秋清秘地幾曽能得六龍廵隐隐層霄吹紫鸞漢庭公輔進賢冠藝林雅許千官入盛典容随萬乗看檻畔琪花香冉冉簷前寳盖影團團太平天子崇文日湛露恩深鳳沼瀾珠琲䦨干錦共聨輝煌睿藻冠鴻篇由來至聖超羣聖未必前賢邁後賢麗景三竿升秘閣沉檀萬縷篆祥烟人間信有蓬瀛路今日承恩便是仙日耀微軀暖更融殊榮踰格感皇衷即看蟲烏猶知化不是雲霄莫比崇虞夏精誠難再見漢唐高議豈能同從知聖學寛如海盡在涵濡長養中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻秦蕙田恩到蓬山别作春集賢稽古重儒珍勲華正啓文明晝雨露偏霑侍從臣芸閣畫梁虹彩煥鑾坡晴日鏡光新簮裾幸際垂裳盛異數今逢第一廵綘闕平明下玉鸞龍門鵠立進賢冠人從瀛海洲中見景向壺天畫裏看禮聖博山香篆細呼嵩霄陛朶雲團瓊筵此日瞻依切渥澤平添鳯沼瀾奎章朗照蘂珠聨落筆旋驚典誥篇直以斯文昭大訓惟将實學勵希賢九成樂播中和氣一脉薪傳鄒魯烟仰體至尊流示意莫敎空負玉堂仙旭暖風輕瑞靄融羣歡天意契宸衷名言莫賛高深量至治胥覘聖敬崇鳯噦和聲三島合雲蒸喜氣萬方同自慚寸草曽何補並荷栽培化育中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻勵宗萬文敎涵濡已百春山川貢瑞士懐珍治超貞觀年間主心慕凌烟閣裏臣史館親臨從未有玉堂佳話一畨新賡歌燕衎存咨儆不用登封續漢廵樂奏簫韶集孔鸞千行劍佩列簮冠如春温語環階聽有喜天顔侍坐看拜賜名茶烹鳯餅捧歸文綺剪花團瑶編更共雲箋錫學海均沾百尺瀾五字宸題似璧聨宴成走筆更裁篇豈将黼黻誇詞苑欲以箴規勵集賢掃去浮華空月露自然藻麗湧雲烟瀛洲珥筆人何幸一食金丹骨便仙小春風日湛恩融訓士慇懃仰聖衷所貴因文而見道須知業廣乃功崇禮隆洙泗心源合世際唐虞景運同自此菁莪看益盛連茹並進石渠中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張若靄鑾引晨風輦路春簮裾夾道列儒珍帝非游豫輕嘉讌是日有今日之宴期君臣共勉之諭恩不偏私逮衆臣御製柏梁序云編檢庶吉士皆不獲與因復為柏梁體芬馥滿庭香篆細鏗鏘兩部樂懸新析波浮醴瀛洲署柱史從容記數廵珠樹陰森集鳯鸞瑤階蹌濟侍貂冠尊前燕笑趨承切座上龍光咫尺看奎藻春生藜火艶御袍黄映菊花團轆轤轉盡淳泓水難比恩波百尺瀾賡歌百六韻初聨拜賜還陳湛露篇天眷獨鍾黄髪老臣愚深愧黒衣賢千絲心繭霞成綺八餅頭綱雪泛烟更展瑯函窺御集等閒食字已登仙陽和十月氣冲融天鑒明良一徳衷聖度不知滄海濶微塵詎益列山崇雲封芝檢從來諛鳯翽梧岡此際同履盛未忘吁咈意唐虞景運日常中㳟和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻嵩夀暖意微含十月春圗書府啓數家珍簮毫首列瀛洲客領袖還推柱石臣藜閣探竒人自昔花磚攅彩跡重新恩波覃被深如海御酒黄封又幾巡蓬瀛仙侣集鵷鸞帝闕争彈貢禹冠署啓玉堂銜命到燭移蓮炬帶恩看依天清切紅雲捧直夜深沉碧月團圗史滿床供討索潘江陸海滙波瀾明光通籍備官聨儒雅風流詩百篇東觀千年蔵秘冊西清永日集羣賢金鈴静聽増疎韻寳鼎微添裊篆烟天仗近因叨扈從含毫獻賦職應仙日照香階瑞氣融右文時復切皇衷經帷召對恩綸渥藝苑聨吟禮意崇羲畫禹書神自合周情孔思道還同萬幾餘暇揮宸翰坐見民生大化中㳟和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張鵬翀寒林花木逗芳春綺席歌䦨更賜珍列坐賦詩徴喜起承筐侑酒洽君臣雍容侍從人文盛宏整詞垣氣象新俄頃天章復垂示欲呈巴曲重逡廵仙苑朝來駐八鸞玉階環擁肅衣冠道因文顯毋岐視古作今型好諦看鳯沼新泉聲㶁㶁鼇峰老樹鬱團團論思清祕蘄無忝未許尋常㸃墨瀾鵷行黻佩影聨聨賜帙心睎學古篇倘信臯䕫書未讀可能房杜相稱賢䦨邉小鳯烹清茗閣外飛鴻散紫烟獨愧樗材䝉眷渥叨分官職是神仙曝日常思獻暖融慚無素藴答淵衷文章少日傳王勃經術中朝重戴崇醴設本縁聨上下宴酣還擬證和同日斜池上鳴歸珮猶在龍光炤燿中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻劉綸蓬島先回十月春長筵叨飽御厨珍簮紳次第随仙侣几杖從容眷老臣宿聚魁三占象逈天臨尺五拜恩新風烏細轉諧金奏鈴索聲稀報酒廵奎藻繽紛翥鳯鸞柏梁賡韻盛儒冠吟安竊媿含毫久奏進還容厀席看家有賜書分玉軸人攜宫錦剪花團齋房詔許顔清秘飛白騰光映翠瀾重申天語飭班聨見道長垂勸學篇石室遺文尋漢代金泥故事陋唐賢槐㕔静對移磚影香案濃生惹袖烟獻納殷勤關睿慮謾誇翰墨署神仙丹地新成麗景融鼇頭占籍戴葵𠂻昌黎作社儀兼備宣聖親祠典更崇部列丙丁䝉賚渥星廻甲子慶文同直敎下士觀光遍鵠立青袍候日中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻嵇璜十月陽回氷署春榮頒銀榜字懸珍丹扉降輦隆殊眷黄閣兼銜重老臣千載淵源瞻禮肅一堂清秘錫名新重逢甲子占文治元㑹初開第二廵畫檐夭矯起翔鸞雲擁仙曹肅珮冠七字柏梁臺上續九成䕫樂日邉看瑤觴暖泛松醪滿綺席香分菊蕋團晷影未移飛睿藻早傾瀛海入文瀾賡颺一徳慶班聨豈樂羣歌在藻篇稽古集成從懋學因文見道勉希賢至音雅叶鈞天奏寳篆晴霏瑞旭烟幸侍玉皇香案畔底須蓬島作詩仙清才承詔愧王融惟有陽葵一寸衷錦市移來叨賜渥彩牋捧出拜恩崇書探冊府瑯環秘茗瀹㢘泉沆瀣同簮筆堯階傳盛事康歌遥賦九衢中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張映辰駕臨藝苑儼乗春此地曽儲廊廟珍見説人才關國運從來聖主得賢臣蓬壺乆沐恩光渥臺閣重瞻氣象新錫宴從容謌既醉不敎委佩共逡廵蘭署廻翔集鳯鸞一時榮路慶彈冠璇題彩自雲中煥睿藻高從天際看詞以艱深多理障書因通貫釋疑團百川學海同歸海浩𣺌瀛洲好溯瀾奎光五緯似珠聨拜手賡颺擬漢篇報國文章期實學立身事業在希賢圗書儘許窺中秘冠珮常教惹御烟今日所䝉稽古力漫言金籙㑹羣仙黍谷春生暖氣融木天高讌暢宸衷文因見道言須立頌不忘規徳愈崇酒醴笙簧恩禮洽公孤卿尹後先同風吹僊仗鑾廻處一朶雲飄桂苑中皇清文頴巻八十八
