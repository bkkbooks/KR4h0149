body:
  text: 詩七言排律乾隆三年聖主躬耕耤田恭紀有序陳大受欽惟我皇上乾德體元泰符凝命備中和而建極合參贊以成能出十軒九舜之間攸隆郅治駕兩漢三唐而上丕著鴻規府修事和大帡幪于有截仁育義正同覆載以無私湛露灑丹霄屢下蠲租之詔薰風披紫闥頻賡解慍之章舉鉅典於上辛祈屢豐於嘉穀茅簷慶洽蔀屋春溫尤念王政不外於養民而民功莫先於教稼乘天因地務開衣食之源東作西成冀睹盈寧之盛時維二月躬率三農玉軑遙臨陟青壇而展采土膏初起秉黛耜以親耕蓋自我聖祖仁皇帝知民為邦本凡耕夫織女之胼胝作息合十二月而總繫於宸衷曁我世宗憲皇帝以食為民天尤貴粟重農而輔相裁成歴十三年罔或愆於穡事駐龍旂於一墢家法猶傳闢繡壤以加推前徽克紹薦馨清廟既以承先者奉先布令春郊即以敬事者述事被天膏之優渥好雨知時卜年穀之豐登如雲徧野歡騰隴畝咸稱我后之仁喜溢簪裾共仰吾君之孝謹拜手稽首而獻詩曰天心仁愛在斯民聖主躬耕舉上春千畝加推敦本計三農望歲慶元辰祥開曙色龍旂捲瑞靄雲光鳳輦巡候曉鵷班知有喜前驅羽騎凈無塵和風習習生輕幰協氣融融滿畫輪常伯追陪依豹尾庶寮蠲潔萃魚鱗空中桂燎氤氳合壇上瑤籩次第陳芝蓋儼臨歆肇祀蘭塲廣闢薦明禋樂鳴太簇仙音朗酌進匏樽玉醴醇繡壤膏腴環翠幕珠宮穜稑燦竒珍柳邊葱犗金為絡花底絲鞭綵作紉民力知勤歌帝力聖人作則勸農人崇臺咸仰天容肅御耦羣瞻地脈勻禮及公卿今更備畝終黎庶制仍遵津莖㴻雨乘時發待澤良苗入望新詠起甫田聞雅什感深湛露徧朝紳農祥光映青旂轉春扈陽回綠野均共識文心誠翼翼爭㸔禹甸正畇畇牧人夢叶多魚吉太史書占大有頻粟薦神倉昭聖孝恩深御廩頌皇仁先知稼穡前謨遠祗念耕桑帝德純自以太和還宇宙惟将率育答蒼旻權衡國計恒教足醞釀輿情悉尚淳朋酒躋堂欣介壽康年報蜡喜龡豳幸隨縹軛觀隆禮願捧葵心向紫宸聖主躬耕耤田恭紀梁文山熙朝繼述美重光浩蕩恩波被八荒聖德巳知同覆載宸衷尤自重耕桑九重無逸巡千畝一墢惟勤率萬方考古田功興后稷勸農歲序順勾芒烟郊雨浥芳塵静野甸風清湛露滂臺畔公卿為主伯壇邊父老待君王俄傳鳳闕華鐘發共仰龍輿翠蓋張夾道驊騮爭蹴踏屬車鵷鷺盡廻翔濃隂夜覆春城重密霧朝籠御路長北極近瞻佳氣滿東㕓遙指彩雲颺種分穜稑宮中獻色麗旌旂隴上揚祈穀告䖍通陟降捧璋致敬肅趨蹌精誠直達犧尊外率作旋來翠幕旁京兆授鞭呈縹軛司農布種執青箱花迎仙仗明於錦鳥和農歌巧若簧金耦頻移耕澤澤紺轅微動佩鏘鏘為祈九土函斯活爰效三推禮更詳在昔吹豳陳穡事於今舉趾望農祥勞先兆姓勤芟柞瑞應昌時若雨暘但願黍稌歌大有更思蠲潔薦烝嘗愛民重祀兼仁孝法古遵先凛憲章此日榮光依黼座一時喜氣溢穹蒼泥塗尚覺沾衣履樂利行看遍井疆大有頻書盈百室屢豐載咏慶千倉恭逢鉅典欣無似可許巴音誌不忘睿慮方殷俾率育颺言更欲誦幾康聖主躬耕耤田詩有序陳兆崙乾隆三年仲春之月皇帝躬耤千畝禮也維時甘澍初降晨飈颸然至誠感通信有徵矣羽衞既陳聖駕将發乃少開霽雲光溶溶若有待者天子於是歴廣塲撫御耦王公卿大夫以次從事禮成上還宮雨復降春旂露重而陛楯不濡紫陌塵清而爐烟自靄氛縕肅爽神人以和畿輔内外六鄉六遂之氓咸以為有秋之兆云夫欲綏萬邦而屢豐年必先貴五穀而賤珠玉我皇上䖍恭寅畏無時不然即事徵心具見全體以承天時至敬也以奉祭祀至孝也以勸農功至勤也以達庶政至順也凡在禮畊義種之中敢忘雲行雨施之澤臣用是踴躍歡忭拜手稽首而獻詩曰時清九陌韶光好澤潤千塍寶穡開天賜有年綏萬國聖勤無逸肇三推披圖宣室宵鐘動列仗端門曙色催豹尾䙰褷隨鳳輦虎賁蹀躞走龍媒濛濛香霧爐烟合冉冉流雲扇影廻净掃瑤壇增肅穆森瞻華蓽逈崔嵬霏微雨解偕神降宛轉風知應律來黛耜色分堤上柳紺轅聲殷澤中雷周遭綉野延宸賞取次靈苗荷帝培秧馬似飛排遠陣土膏如釀發新醅南東畝合區先後五九班應遞往回匝地歡呼環父老迎眸生意露根荄十千自是聯維耦頴栗方将勝有邰行漏漸移亭午影前旌還駐望春臺逡巡仙蹕傳歸騎詄蕩天閶絶㸃埃遶禁平林呈晻曖承恩細路長莓苔巳知優渥周三輔湏識生成徧九垓被隴何時無霡霂依山是處有臺萊萬年疆畎今咸理百族情田此悉該玉食猶然躬率作小臣尸素愧非才聖主躬耕耤田恭紀汪士鍠迎和舉趾重民天詔命陽官備禮䖍已慶上辛崇大祀旋諏吉亥履王田青壇嶽立封人掌翠幄雲張甸帥傳農正恪恭千畝始法宮齋祓百僚先層城瓊鈒來閶闔夾道霓旌過井㕓鑾輅安驅齊度隴龍旂驂乘遠臨阡佩諧蒼玉崇基上壤潤芳塍廣阼前葦籥競吹喧秉轡秧歌齊和簇鳴鞭奉宸葱犗麾肱赴導駕洪縻在手牽犁御協風楊柳外耜霑時雨杏花邊方歡霡霂膏彌渥不怯泥塗步易邅播殖早湏農器撰垂裳乍睹帝衣褰三推更進光前典一墢重加邁往編濟濟循行排鴈鶩蹌蹌按序集貂蟬紺轅縹軛開畦遠白叟黄童舉袂連翠笠從公風古樸綠蓑終事業精專烝民率育天顔喜保介來咨德意宣勞酒慶行歌擊壤衢尊恩􅄎逮摩肩鯨鐘雷動鈎陳轉豹尾星環法駕旋東作聖情期彧彧西成睿想切乾乾因儲御廩神倉積即㸔崇墉比櫛延嘉栗居歆充寶器飶香禋祀實文籩宸居端念豳風咏黼座時陳無逸篇春豫皇軒躬勸稼都人忭舞頌康年聖主躬耕耤田恭紀王錫璋二月融和物候新耕耘肇舉及良辰艱難稼穡關黎庶宵旰勤勞厪聖人甫睹經筵開殿陛旋瞻耕耤出城闉花迎鑾輅紅初綻柳拂旌旂綠乍勻麥隴新苗平織浪芳堤淺草細鋪茵三推廣闢千年業一墢祥占九野春甘雨連村神有貺暖風被物路無塵餘糧定見先登圃上瑞由來慶滿囷敬奉明粢崇報本恭承嘉德自寧民宸衷昭格時方泰帝力敷宣俗倍淳湛露普天沾渥澤韶陽遍地沐皇仁輿情此日咸歡暢紫陌年年望幸頻乾隆三年聖主臨雍禮成恭紀汪士鍠御宇綏猷撫萬方風行首善莅宮牆經筵早探文書府璧水新隆禮樂塲甫歴疆原躬耒耜更期絃誦集膠庠稽儀卜吉咨宗伯奠幣鳴球詔太常露湛桐花迎仗發春深芹葉薦筵芳鸞旂映翠臨東序雲䍐搖青出建章門闢櫺星金碧煥庭陳石鼓鼎彜光天書璀璨題銀榜殿瓦琉璃照畫廊俎豆明馨誠意格笙歌備奏德容彰三階登降瞻龍袞兩翼簪紳儼鴈行黛栢連雲祥靄護金支載道惠風揚莘莘國子隨仙蹕濟濟儒林侍講堂綷䌨巾裾循律度葳蕤劔珮謹趨蹌雲屯鱗萃班初定星共辰居幄正張御几平移丹地近琅函旋展綠綈裝微文闡發霞敷采大義昭宣斗耀芒研討千秋傳玉檢譚論六藝啓珠囊諄諄帝訓敷言遠赫赫皇謨施教詳性道淵源符往哲勲猷格被駕前王瞽宗惇祀幽光表側席旁求俊彦翔庶彚甄陶歸典則姱修調爕協柔剛圜橋觀聽槐街合夾道歡呼羽葆颺多士依依魚在藻羣英翽翽鳳鳴岡欣逢盛典鍧鐘鼓文物昭回泰運昌聖主臨雍禮成恭紀觀保景運維新燦八埏尊師曠典辟雍傳峩峩松桷丹墻近片片琉璃翼瓦連燕賀雕簷籠淑氣翬飛峻宇聳晴烟重臨聖闕從丹闕纔御經筵又講筵紫詔從容頒鳳彩素王統緖接蟬聯右文直闢詩書囿論道重開禮義田掌舍肅儀清甸路春官秩禮奏鴻篇三霄滴漏聞銀箭九陛騰聲拂玉鞭蓬島彩移仙仗近公卿衣㸃露華妍菁莪共率三千士縫掖咸瞻尺五天鈞樂六莖陳管磬鐘鏞兩序扣筳篿文章光被唐虞際位育功歸性教先薄海誦絃風永播諸生鼓篋業逾專爐烟馥郁芸香細睿藻輝煌墨彩鮮聖學巍峩尊泰岱湛恩深厚沐淵源作人巳自明經術祝鯁猶兼重養年有赫威儀真穆穆無疆壽考更綿綿豐京豈獨歌靈沼彤史于今喜並傳乾隆四年聖駕南苑大閲恭紀梁詩正奉德聖朝文化洽止戈帝世武功修覲揚不忘欽前烈繼述常思纘令猷鳳綍曉頒傳大閲鑾輿夙駕戾崇邱霞烘鳷鵲初陽麗塞拱蠮螉遠翠浮寶仗日邊排簇簇珠旟風外颺悠悠雪消南苑搖金轡塵凈西山映畫斿承㫖前期威令肅犒師行在聖恩優飽騰士馬先歡舞羅列車徒備噢咻方召莅師綜禁旅熊羆分隊耀兜鍪九旗爛熳雲屯谷三校森嚴氣食牛天子戎衣親歴陣虎臣弁服自持籌鼓行旋見龍蛇動甲擐齊将弓矢抽圍合風雲彌九地弦鳴霹靂中三侯連營哮􅗏山疑震飛礟匉訇火迅流碁布六軍新壁壘鯨奔千騎敵貔貅中權岳畤牢難撼後勁飈馳疾不留七變星門猶摝鐸五成牙帳再傳枹指揮在在符機畧進止人人協将謀緹彀申驅神獨王佽飛賈勇力常遒喜看揷羽兵容飭忽聽鳴鐃纛影收營衛散時烟鳥下干戈櫜後囿麟遊一人有喜祥和致四伐無愆賞賚稠牽去驊騮皆上駟載來金帛滿文輈﨣桓遍德戎行樂侍從陳詩主眷酧謨烈自今長煥爍聲靈從此永懷柔勾陳啓處三階泰歌頌昇平荷帝庥聖駕南苑大閲恭紀周學健乾坤清麗聖圖長日月光華帝道昌干羽兩階文德布車書一統武威揚巳櫜弓矢陳時夏猶選車徒率典章紅線牽絲将測晷綠疇納稼旣盈倉仲冬雅際三農隙大閲從知七校良詔發元戎屯細柳躬擐甲胄出長楊前期司馬申蘭表是日飛龍控錦韁徹夜鸞聲騰斗極向明劒氣聚星芒霓旌欲傍螭頭轉御仗遙瞻雉尾翔詩咏東都尋甫草駕臨南苑駐旂常雲生華蓋羣峯紫地入平原萬馬黄内府舊藏朱組甲中林新試綠沉槍虎賁森立期門側麟趾欣承輦道旁乍聽嚴威傳鼓角旋觀列騎動鉤錫犀函競騁吳江練繡轂齊停朔嶺霜左啓雕弓開後勁右和銀韔繞中央頻宣玉鐲馳驅正載擊瓊鉦步伐詳魚鳥獻形通豹畧鸛鵝附翼舞千行珊瑚未擬連錢速珠轡初迴雜寶装爰繳髙矰翔月兔更紆急箭下星狼輕飈不擾朱旂靜旭景剛浮翠幄張河岳百神俱震叠風雷一夕共低昻熊羆歡溢殊恩洽鸞鵲書成睿藻彰字嫓典謨羅筆陣音諧雅頌擅詞塲勲華事業聲明盛周孔情思翰墨香在昔會同歌有繹於今申錫正無疆赤騧北向歸靈囿丹鳳西來集尚方輯瑞乘時朝黼扆揮絃協律坐明堂自凝瑪瑙重霄露永繪龍山五色裳從此金泥呈委宛豈惟石鼓紀岐陽聖駕南苑大閲恭紀鄂容安宅中馭外謀湏豫緯武經文國有常大閱禮行蒐狩後仲冬占協日時良紫宸朝啓鑾輿駕赤甸平臨翠葆揚九伐素頒司馬法六師齊會羽林郎營穿細柳申軍政陣展長蛇試廣塲四塞山河過洛邑九天鐘鼓邁岐陽鸛鵝作隊連三駟龍虎為符出兩廂百萬貔貅明早旭十千組練壓清霜旌幢盡挾風雲氣刁斗全依日月光天子有嚴親韎韐大官無事裹餱糧黄旂至止班聲肅赤羽擎來遠勢張特啓和門趨大帥獨當馳道引親王五花並驟金騠駃八纛俱從繡裲襠宣令直教山岳動騰呼眞擬海波長縱横遙亘飛虹影會合同瞻戴斗匡風后握竒傳上古軒轅振武仰吾皇神臯形勝推南苑勁旅精嚴萃朔方薄海共應師紀律遙天本自掃欃槍威行以德幾常敕安不忘危道永昌忠信在躬為甲胄農桑遍野是金湯叨隨仙仗瞻雄武得傍行麾愧贊襄自是龍城停草檄偏宜豹尾控絲韁國恩莫報惟簪筆世業難忘學挽强長喜九邊鉦鼓靜日陳干羽慶垂裳聖駕南苑大閱恭紀于振聖主膺圖憲百王時巡郊甸法陶唐訏謨久已昭文德睿畧還應繼耿光律轉金門鴻北嚮陽回黍谷鳥南翔龍旌縹緲來平樂鑾輅雍容出建章霜意乍酣清輦路雪花微綴兆農祥雲依御鎧千官列日麗天弧萬幕張笳鼓競時鵝鸛合戈矛森處虎