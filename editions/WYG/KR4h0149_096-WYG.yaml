河瀇潒環中蒲類海萋芊神姿自控三花鬛遠畧徐搖七寶鞭照夜白翔尋影迅海東青聳入雲旋秋原莎靡驕媒雉大漠風揚縱爪鳶乍格游騏收羂結轉鈎飛豹入拘攣曰驅有令從開網命中方呼倒應弦叠獲豵豝驚縱送盈庖脯腊貯肥鱻貙膢何止嫻車馬園寝從敎執豆籩蓊薆枌榆森里社巍峩廊廟素題枅球圖玉府先瞻切劒舄橋山乍目擩帝子梧髙風往復大夫松老浪洄漩金波鳬鶴陰翔集銀海龜魚暗濯湔駊騀岡陵台座埓葱蘢林麓鼎趺聯堯塋窀穸封如斧殷武宗祊角有梴梐枑中鋪張禮館旌轅外建衞齋員蓮花漏徹晨波湧蕭葉香升曉火燀聖德欽瞻龍繡袞母儀肅整鳳文鈿太官上食承蒿柱大樂宣音繞蕙櫋清液一泓浮鬱鬯紅霞幾朶透爐烟有孚盥薦昭顒若如在精誠見僾焉風馬飛揚來晻濭雲旂搖曵下褊褼居歆玉宇含丹渥具酌金尊漾碧漣德是馨香非黍稷道能肥腯到牲牷呈祥祕殿瑤芝秀應瑞長楸玉露鮮開創規模勞想像纘承懷抱屢沉研百年禮樂方興矣一統河山豈偶然今日巡遊俄朶址當初祥發闥門淵帝生東震原居位天作髙山最上巓自闢鴻䝉成宇宙向疑窟宅住神僊姜嫄毓秀推人極亶父開基肇地偏海甸鬱盤崇體勢遼濵奥衍遠連延四圍廣漠疆寛拓三派澄江水曲踡與宅樂郊蕃藪澤建邦膏壤導䰻佃駕龍春日賔暘谷躍馬秋風戰阪泉木拔道通開草昧蹶生質訟化䝉顓威張楛矢山林啓䖍秉彤弓討伐專締造雨風經櫛沐艱難手足瘁胝胼小懷大畏仁風布邇懼遐驚武烈鐫上國舊推東海表王畿嗣涉大河遷綢繆家室從沮漆和會陰陽卜澗瀍矩地向方仁氣正規天分野尾星躔增城詄蕩飛樓櫓作廟崇閎架杙椽河鼓雙旗分羽翼陰符八陣總包纒聖神定鼎資先識文武持籌具妙詮海截東藩三箭定山連西域大旗搴神臯坱圠占昌世肇域鴻龎握治權爰拯生靈登袵席盡收品彚入陶甄貽孫翼子天無極報德崇功嵗必耑剛拜几筵前烈篤佇瞻宮闕舊章懸虎臣矯矯重呼蹕髦士峩峩共佩瓀侍奉金輿擕斗柄和調玉燭靖風祅弸彋吹幄聲徐轉婀娜揚旂態有翩城指鵝渾頻彳亍江遵鴨綠幾佪儃漫山文玉抽竒木彌水華苹透瑞蓮蘆絮烟霞朱雁集菭衣雲錦白麟眠芬菲如適羣香國璀璨疑遊萬玉田入境偕來瞻帝座升朝儼若撫天璇齊雲三殿星垣燦夾曜端門鳳翼騫大展珙球王會禮髙懸墳典帝京篇葵傾巳遍東西峽蛾伏無分大小开鶴野仙臣瞻朶殿龍沙遺老拜烏氊金罍頒下疑瓊液玉饌分來厭麥饘大酺慶成丹詔下鴻恩喜沛紫泥傳侍僚宣力俱增級秋賦經巡槪賜捐被德臣隣膺祉福漸仁士庶念桮棬承平自極文明盛保治毋忘武衞宣講旅凌河看整暇陳師渤海戒輕儇礚天髙樹靈鼉鼓拂漢遙揚彩鳳旜鵝鸛合離成隊伍墨荼竒正入弢鍵觀來似海軍容壯撼去如山陣勢堅耀雪鮮明擐鎧甲捎星浩汗擁戈鋋懸知奮武鷹鸇逐一自揚威虎豹㾓散卽飈風彌坰野巻為收電凈郊㕓花江襟帶鮫人集繡嶺屏藩雁戸編靈藥採來葠五葉豐貂羅取珥雙鬈村村家碓長腰米處處人穿縮頸鯿浪跋牛魚紅潑刺草遊蛇馬碧􅠠蜷風强壮士彎銅弩俗樸齊民衣木棉地美絶蚊還絶蝎年豐無蜚又無蝝金湯永固東京樂鼓舞歡留大駕還來日沛宮髙帳飲歸時輦路繞攀牽蒼生愛戴宸遊豫紫陌方長睿賞便一路承歡回玉勒有時迎笑傍珠韀鷄翹夾道歌連臂豹尾交衢望叠肩饒樂􅇿邊飛蓋弭婆娑州外綉帷褰含情嵐翠濃堪滴薄醉林光秀可憐城上遍圍蓉錦幄道旁齊放菊金錢百昌接輅爭呈媚萬彚迎鑾競鬥妍榆塞霜花輕㸃袖荆關紅葉薄飛箋黄童鶴躍雲成望白叟豨呼雪滿顚多效壺漿呈野簌或擕筐筥獻香荃還朝颺拜沾堯酒奏治薰時入舜絃遠近人風欣過化往還農隙莫期愆象輿乍駐三靈協雉扇重開五曜圓頌上赤蛟綏奕奕曲成朱鷺鼓鼘鼘河清海晏追三古華祝嵩呼遍八埏載筆小臣歌萬壽聖人仁孝永綿綿皇清文頴巻九十六
