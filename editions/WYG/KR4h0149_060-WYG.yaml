body:
  text: 詩五言古詩太祖高皇帝實録告竣進呈睿覽皇上淵衷獨運手敕親裁美善兼臻洪纎具悉臣萊幸叨編纂獲覩高深敬賦古詩恭紀盛事喬萊維皇御八極化理還淳熙履兹休隆運緬懷謨烈貽長白鬱嵯峨鴨緑水漫瀰三靈相環䕶篤生上聖姿太祖起海北浴日乘黄離赤手闢宇宙歴試多艱危甲士十三人復仇更勿疑所向無衆寡決勝如其期有時忽深入不遣匹馬隨横刀屹然立萬騎安能追大勇人莫敵大智人莫窺誅鋤遍九國地盡東北陲堅氷結秋仲紅雲隨征麾觀此百祥集休命良在兹時惟萬歴季謀國如累棊但恃幅員廣詎料天心移興兵分四路間道中宵馳我師徃來擊一鏃無所遺乃於五日内殄彼十萬師乗勝隳名城守者安可支遼陽瀋陽地奚啻邠與岐城堡各歸附父老壺漿持大義順天人豈曰殺伐為祁祁建都邑濟濟盈熊羆下詔集哀鴻痌瘝問瘡痍顧兹疆圉廓實肇混一基當其締造日匪徒恃鞭箠武功赫聲靈文治肅綱維國書手所製神解侔庖羲庻事任五臣軍制張八旂强者習戰鬬弱者安耕菑法嚴崇禮讓俗美戒澆漓政令若偃草愛戴如傾葵逺邇衆百萬自古難博施寧知聖人心不忍一夫饑詔禄兼授産厚薄各有差鑑古窮百代垂訓法兩儀規模何𢎞逺創守無不宜凡此神聖功一一宜為辭微臣濫史局纂述職所司妄測溟渤寛乃欲勺一蠡焚膏竣編摹爰值嵗晏時諸司各休沐至尊獨疇咨緗帙日進御披閱良孜孜遺編見祖武不匱敦孝思聖學實淵深巨細勞指撝筆削入微妙臣愚安所知況復覩寳翰燦爛蟠蛟螭遂令金石藏永與天壤垂盛羙絶形容聊復播聲詩平滇鐃歌六首汪楫聖人馭八極神智包萬年嗟哉反側子乃自絶於天螳蜋奮𤓰角草木分戈鋋當其初弄兵頗亦勞烽烟宸𠂻屹然定百職徒便便卒令叛者頭一一天街懸一鼓靖楚蜀再戰收黔滇始知大有為决㡬非目前垂統固不易光前良亦難思一勞永逸乃轉危為安露布告陵寢維時方沍寒八駿兼程馳不假鳴和鑾要使在天靈聞之生喜懽至孝成大勇一誠久鬱蟠讓善開寶冊肆赦陳鷄竿海宇慶更新錫類永不刋釜魚空復游檻虎安能鬬顧兹几上肉將烹猶望救將軍恤軍命當闗不忍叩煌煌降天語泄泄戒養寇民力今己殫合圍此其候一時士氣騰尅日膚功奏乃知審機宜不在親介冑功成書竹帛允矣頌我后古人重郵傳四牡歌騑騑師行與吉行計里常苦違請看插羽者不讓鷹隼飛軍書發六詔介馬揚天威草頭一㸃塵勢如弩發機入秦月初上踰隴露未晞遙遙萬里程何異馳郊畿所以帷幄籌瞬息隨指揮四郊盡講武九重方右文繙書領其要意若無寇氛闢門舉文學盛會稱風雲人言錢刀利毛錐安足云豈知垂裳意萬古無與羣文德格有苖誕敷建奇勲大文出神武允矣雄九軍聖謨實洋洋蠡測徒紛紛師行不裹糧騰飽仗積聚皇仁取有制大盈非所慕度支酌權宜躊躇還却顧三嘆念斯民終焉未加賦轉輸豈不勞竭蹶無怨怒方州既大定懽呼滿行路深林有窮鳥廣淵有涸鮒及兹閶闔開一天皆雨露扈從恭紀勵廷儀北河耎兒渡屢决致縈宸慮爰改疏一道以適水性舳艫利渉田舍無虞千秋奕禩永戴洪庥恭紀五言古詩一章天懷軫饑溺深居念萬方謀登之祍席不獨淮與揚繄維通惠河决口尤難防疇昔苦汎濫田畮勢汪洋流沙不易塞修築歳以常乃致勞宸衷謨畫精且詳相度經久計改鑿故渠傍較視舊水程翻近千里强堅堤耐剥蝕利渉迅帆穡並岸羅井竈比户安耕桑積患快永脫聖澤流俱長微臣曩經過村落己荒凉扈行聞歌謳羣黎樂而康戴恩擕婦子稽首慶無疆靜海地處九河故道動罹水患仰荷聖恩蠲賑頻施萬民嵩呼迎謝臣從舟繼至不獲隨諸父老後敬賦古詩一章用攄頌悃靜邑一彈丸況乃瀕斥鹵年穀屢不登民食艱二鬴何幸生熙朝愛育勞聖主宵旰憫痌瘝慈仁超邃古膏澤徧八紘軫恤先畿輔十載九賜租賤直發倉庾賑饑復煮糜恩勤難悉數荒歉雖頻仍窮檐賴安堵億兆慶更生感深鐫肺腑童叟祝萬年歡聲動河滸微臣稽從舟未及隨編户作頌慙蕪陋聊以當拜舞賦得崇文聊駐輦沈涵大君撫洪運文敎肆丕顯時乘萬幾暇遊心契墳典石渠羅羣英金殿蒞華輦日永火方中漏盡風初轉列坐排瓊几仙㕑給芳膳臨池覘素蘊擘韵抒新撰皇情既優渥天語復淳勉努力崇令名榮遇庶能踐秦中謠汪灝瑟瑟金風鳴鴻雁還故巢稻粱亦以繁故土原樂郊老農葺墻屋婦子除蓬蒿舊隣喜新聚覼縷慰劬勞各訴幸生還他鄉免萍漂向微金粟頒羸腹能久枵縱使天時轉溝壑骨己焦相彼田中禾粒粒皆天膏夐哉聖主恩華嶽不為高右農夫土焦禾不生風暵桑亦萎傷彼懿筐女食不給糠粃仳離出里門啜泣何能己一旦返圭竇杼柚仍在倚窗前有明鏡憔悴容嬾理凉月照薄帷午夜無停指豈不知苦辛竭蹶良有以向者不還鄉遠作人織婢稍待有新絲元黄成錦綺先取朱孔陽酬恩獻天子右織女貧士逄凶年怯夫遇猛虎𣺌渺將殘軀俛仰難自處負笈遠就食焉敢定齊楚中道見冠蓋帑金插飛羽媻跚返闗門春色滿遙浦得此一囊珠室家忽相聚恍疑夢中逄喜極涕如雨晚田尚可穫庶幾免冷釡剰茅補舊簷雜蔬種新圃欲報更生恩修綆勤汲古更願心同葵終身向聖主右士八水空明星九衢盡牂羊瓶罍皆己空囷簏無餘藏耗斁多癘氣道殣慘相望視息圖茍延扶擕散四方中途不相顧時或棄路傍冀闕發祥雲雷迅開天倉更齎萬餅金招呼徠流亡夜集似沙鳥朝逐如雁行遙望闗門樹鳩鵠爭翺翔莫愁耕無牛濕濕供服箱莫憂種無穀栗栗盈槖囊蠨蛸除我户耒耜入我塲感此肉骨澤何以報君王三秦百萬家化日春臺長右民讀書二首館課孫勷韶光媚晴曦百草己含緑地靜無塵囂芳菲映書屋覽古愜素心澄懷極遐矚前修渺難攀撫己良自朂淸時淑氣洽浩浩徧煦育記載藉寸觚導揚思接續努力事丹鉛優閒正休沐一雨洗輕暑凉颷颯然生披襟臨除砌雜樹搖秋聲茅齋記夙昔研北勤畬耕研神測精奥中夜心怦怦鑾坡一躡足圖史紛縱横勝賞有餘樂旁搜無佚情平生毫楮願瞻顧徒崢嶸聖武平北大功告成詩十二首彭始摶天授我聖皇無疆大歴服纘承三后烈立極綏民福甄陶合元化煦濡􅇽異族萬國洽同文比屋聯婣睦己鎔礦在冶久偃矢於箙偏隅蘖芽蕃稂莠滋遺育蠢兹噶爾丹負恩不可蓄戈鏃以止戈勝算有成竹唐帝伐靑邱軒后戰涿鹿一怒而安民無煩師久宿濁亂洒然除乾坤氣淸淑帝非輕用兵顧己維之熟惟彼昏不恭乃包藏禍衷侵陵我屬國桀驁逞兵鋒蝸爭牛之角爵為鸇驅叢遂犯我内地掠入烏瀾東狡焉恣出没時傳塞上烽我皇眷西顧長劒倚埪峒遺息留蠆尾辛螫餘拚蜂叵測煽諸部豨突騷邊農塵飛甘泉騎月照天山弓􅍀然此遺憾聖武未臨戎聖德實好生廣大與天俱猶然沛恩膏寛其後至誅謂爾居塞外孰非斯人徒市貢許其來曷忍外一隅尚冀無怙終卧桴邊氓蘇豈意禍未悔草蔓滋難除怙其獷詐習瀚海驅騊駼復寇克魯倫邊境滋覬覦天子顧之嘆赫然撫湛盧躬按金城略言尋玉闗圖刻期定撲滅親征出廟謨廟謨樽爼間制勝在萬里往者平逆藩芒刃嬰髖髀閩粤縛長蛇滇黔仆封豕咄嗟定亂略呼吸揮鞭箠聖人神武姿英略古無比南偃鯨波白比眺雁塞紫舉天之所覆均為我赤子豈容長城外别部異軍壘六月出王師采薇歌柔止特聞遣將帥不見躬鞭弭我皇親戎行韔弓而房矢韎􅞘作軍容此為三駕始初駕出塞時羣疑頗謂難窮隂入瀉鹵盛夏層氷寒蔥嶺隔雪山積沙皓漫漫狡寇號荒忽去來固無端輜重阻險巇石磔飛沙湍毒溪叢蠚霧馳馬多摧殘食糒歴三時饑渴不及餐我皇自天祐道左湧泉瀾窮荒不毛地庶草皆以繁南幕直北徙北斗向南看斾旌自悠悠駱馬復嘽嘽狼烟映飛鴻長驅鳴和鑾長驅既己入征行亦己勞至尊恤卒伍分甘復投醪諜聞黒盧倫賊壘堅且牢天子自馳之三更剷賊壕擐胄出和門雪沙擁弓刀銜枚度峻嶺士馬寂不囂是時月正黑千山風怒號萬瓦響霹靂雷聲殷鼓鼛轟傳從天下六驘驚遁逃倉皇遇西師甲齊熊耳高何如燕然㨗不數臯蘭鏖我馬肥苜蓿我士醉葡萄葡萄植漢地楊栁盈塞壤横笛入樂府鼔吹重霄朗逸者倒其戈降者稽其顙取其駝牛羊不須煩内餉回望征戰塲黄雲鬱蒼莽驚釡縱遊魚刻鼎假魍魎天子曰還師吾己扼其吭沍寒氷渡河復見臨天仗駐蹕鄂多斯經畫指諸掌務使窮根株伏莽一滌盪絶塞被光華露寒日滉瀁即見春草菲馬放天山上春菲二月初緑草縈乗輿牙枿翦旁軼蟣蝨勞爬梳斥堠嚴要害槍壘營儲胥歴三受降城河套環肥淤皆為我内地甌脫成菴廬五原出塞外直抵狼居胥立馬衆峯巔極目萬里餘蕭條無遺寇白日當空虛蕃長撓留犂上賜榮比余天子自行邊往古不得如何有爾小醜狙詐徒區區狙詐亦何為狼狽失所據羝羊自觸藩欲退不能去威稜憺西荒鞭笞到日御哈密獻其子行在俘籠笯諦巴亦悔罪俯首奉戒諭逆顔有風霆内向䝉煦嫗無與為同好誰與為同惡矢菆鳴於房蝟集相撑柱三月閏之餘雲中下露布蚩尤斷其首一旦消毒霧不使獸敗羣如令木去蠧汚染一廓清綱紀歸王度綱紀正萬方勉勉惟我皇救民拯焚溺翦伐為安攘不駭慮始難毅然建非常亦如堙洪原灑沈歸灝茫當其廹驚濤渤海翻呂梁蛟蜃喜瀾汗邑廬憂懷襄神聖立人極舉世還虞唐不見經營初垠崖擺雷硠𢎞濟於艱難巨刃摩天揚大勲今耆定氓蚩安耕桑枹鼓静海宇烽燧銷邊疆詎識撻伐勞宵衣猶不遑宵晨巻甲趨減餐止蓐食至尊三出邊辛苦征絶域峻德格上下武功燀旁魄翦伐在一隅雷動消反側邊庭千萬里無有不臣國烏弋臨弱水大爵獻安息西極馬向東南車指自北兩階干羽陳共見矢文德告成郊廟奏歌功金石勒方略出聖謨編纂史臣職煌煌冊府垂永為奕葉式奕葉頌放勲靖亂絶塵氛愷奏鳴朱雁鐃吹歌白麟尊號謝弗居大德孚蒼旻秋肅風霆行氣至雨露仁沛然流江河萬古常日新形象各昭著輝光燦星辰及其握元化槖籥原渾淪豈有大造施而居覆載恩蕩蕩乾象覆茫茫坤輿垠玊葉雲五色金波月重輪親逄堯舜世穆穆望紫宸徒幸荷帝力無能名聖神玉蝀橋望西山爽氣黄叔琳西山佳氣來萬態換日夕長經郊原望杳靄彌紫陌况從禁苑看崚嶒接宮闕玊蝀架飛梁山光互出没雲浮千峯靑波浸一天碧是時玊河邊天宇凈無迹皎若隂霾開煥若宿霧撥連延千萬重蒼翠堆咫尺傍映黄金臺斜照白獸闥如捲水晶簾錦綺儼羅列如矗珊瑚枝晃朗耀曉日晴嵐迎晚霞一一難狀述幸遊蓬萊間縹緲常不隔散歩恣遊觀曠然心目豁南廵聖德古體詩六首汪士鋐皇帝歲己卯仲春乃時廵維時平朔漠遐陬暢皇仁萬物咸熙熙中外德化均水患惟河流盪激淮之漘竹楗命水官三䇿徒紛綸皇帝曰吁哉毋乃傷吾民一物不得所是在予一人況當土膏動于耜行歌豳渙汗發明詔相度朕必親大澤待下流四海希陽春慈寧極尊養聖孝昔所無文思奉文毋方舟遡洄紆問安與視膳未覺深宮殊有時掖金根徐歩安且舒周覽庶物阜和氣涵寰區煦育歴年所緬想締造初慈顔益以慰皇帝色轉愉廵行在敎孝敎孝民不渝河流日南注淮水方平堤御舸自北來黄龍從靑蜺陽侯怵天威約束水勢低皇帝問下民猶恐妨鋤犁隨刋並神禹樏輴行山泥何煩搴長茭溝塍分町畦結念沮洳澤極目滄海西決排與疏剔異用理則齊援筆成河圖指示窮坤倪黄流行地中億載安蒸黎東南得深春履幬良無遺為憐東南民力作當春時蠲除積歲逋不異甘雨施寧惟省期會耘耔亦有資底須糶新穀且得貯舊絲無吏夜催租有兒朝哺糜耕鑿安堯天此樂不可支白頭諸父老十載長懷思扶藜輦路傍載拜歌皇慈省方為農事食乃民所天菜壠鋪黄金滿地烟芊眠微風蹙麥浪馴雉方回旋皇帝戒從官行勿侵農田引車與解騑事實邁古先親灑觀農詩琬琰還雕鐫往年寫耕織睿吟今再宣勤力事稼穡歲歲歌豐年庶政既舉行盛禮逮養老引見及百年彷彿入蓬島酳爵來天漿瓊液潤枯槁飽食拜御前華髪總皓皓聖容敷春溫惠氣展晴顥喬松海鶴姿揮毫落宸藻黄封裹朱提赤印蟠御寶厚俗與保和舉世咸壽考題賜蓮圖為同年蔣廷錫勵廷儀把君賜蓮圖撫昔感衷抱憶在嵗乙酉召入蓬萊島委珮十三人同時錫鴻寳宫窑繪龍文紅裝駕翠葆倐忽五載餘朋好如摧槁五人留館閣台席僅二老披圖懐舊恩兹義良足討維蓮能虛中離立色愈好維藕有清節處汙質逾皓於以礪臣心於以規友道君子風可掬冰壺徳堪澡眷懐爾我間百年式相保出古北口二首蔣廷錫詰旦飛雲霓連峯忽中鑿蜒蜿一線開葱青下縈薄山城據雄勢睥睨俯萬壑真同秦崤函寧異蜀劍閣聖人大無外天險非楗鑰居民儼廬井闗吏無擊柝乃知至治世元化日寥廓和風迎面來逺烟吹漠漠石路車聲髙青林深且邃重山互回抱淡日照空翠小橋架潺湲恍然闢天地夾衣生微寒頓覺氣候異書生處海濱見聞僅一二竒觀新耳目羙景豁胸次同官五六人談笑竦輕轡多幸事聖明恩波廣霑被三塲試畢檢閱從此始矣述懷三百字奉同事諸君子鄂爾泰乾隆歲壬戍二月舉賓薦再命領春闈惕息增驚憚自惟荒落姿學植無偏擅況乃衰病牽心搖目昏眩聚奎仰高堂旁求殷祕殿持此衡量才奚翅憂咎譴所願同事賢深感皇情眷巨眼推老劉汪仲並高選分校十八人一一瀛洲彦學優行尤方力充才不衒流派窮淵源元音審正變推是足經綸何有於摩研念兹復欣然手足忽欲旋從來科目塲功過常居半毷氉飾風標鹵莽矜月旦論文貎雌雄憎命形歡歎渠伊寸晷長余吾五色眴得人良獨難失者孰稱善願言體誠求有祇殫心辦中不中云何無然乘懈倦文章品類殊穢妙各眞贋拙樸合離竒穠華併孤幹或瘦而溫腴或短而精悍但令氣味存妍醜皆生面可畏非人言人言等諧諺凡百瑕與疵吹求自躬先惟虛明斯生惟明公斯現虛明兩或虧一公詎能判無心以為心見見原非見朂哉熨帖平庶以答恩盼故里夸岱奉命謁先塋回車經故里吾宗尚務實農居事耒耜村村聞我來處處要我止疎林帶遠山茅屋横烟水壯夫招田間老叟候門裏村婦盈墻頭爭看承恩使親情厚且直鄉俗朴可喜慰勞强拽臂絮語爭聒耳或採東山蕨或網遼河鯉提壺灌小麴小麴闗東酒名入牢縛大豕或苦疾無醫懇懇乞藥餌老夫豈無贈傾囊雜錦綺少長紛喧嘩天倫樂太始昔奉玊輦來羽獵鄉闗屺田園識同姓握手坐序齒頗覺尊長多少小無若己瞬息三十年驚呼半生死今朝集畎畮他日隔城市咸言會面難薄設聊足恥舉杯更屬誰坐嘆吾老矣九闗臺有序夸岱在錦州府北百四十里隸義州清和門界與䝉古查哈爾地接康熈甲寅年查哈爾布爾泥據義叛命大將軍圖海及信郡王討平之拓疆百里建闗凌阿之陽插栁為邊義州城西北㟮屼見孤峯峯下凌河水宛如飲澗龍河側土為門行旅徃來通編栁作墻垣望之亦何雄憶昔甲寅嵗首逆亂滇中九閩及兩粤路阻㸑烟空廟算神無遺殄滅誅元兇是時東北隅小醜逞頑凶據地彈丸區蜉蝣撼喬松天子命虎旅電掣奏崇功未忍戮餘黨大徳宏包容擴疆建此闗守戍森羆熊迄今七十年千里斷烟烽茅茨遂安堵擊壤等華封聖主眷邊鄙保赤厪宸衷敎養欲兼施中外鮮殊同闢地設長吏勸善儆疎慵詎用勤催科乃期臻淳風雍正十年設特設九闗臺同知立衙署所望閭閻間黽勉答九重和韋左司擬古二首館課儲在文秋氣滿郊坰白日揚清輝霽極天宇廓閒雲亦依依忽念崆峒遊蒼茫不可期開巻撫氷雪願與古人違入户風瑟瑟虛堂理瑶琴萬籟此中寂感人非聲音心定忘百喧抱膝還微吟修綆不可汲方知海未深都江道中吕耀曾星軺發平明山水轉竒峭􅀈湱聲如雷崱屴看髙嶠古洞封白雲誰能測深奥桃杏紅欲然梅雪互映照老榕大數圍時聞羣鳥噪謖謖松風生竹溪多窈窕薄暮遍蒼烟野村明晚燒佳景觀靡窮異域初難料因知天地心大徳生為要一氣洪鈞中無殊視邊徼仰荷朝廷恩安全厪廊廟本務貴力田况乃設學校沐浴古詩章小子當有造我行萬里餘重譯以相告山谷動懽呼扶老兼擕少苖人勿諠譁來日開丹詔題松吹讀書圖德齡天籟寂無聲地籟號衆竅吹萬有不同洩盡無聲妙猗彼雲端松時和蘇門嘯風濤乍作止聲聞通至道嗒然隱几仙心聽領其要非寂亦非喧於焉得深造爰築讀書堂示人以閫奥此堂不遠人門外誰能到皇清文頴巻六十
