body:
  text: 詩七言律詩聖駕南苑大閱㳟紀四首凌如煥旗門鼔吹曙光融萬乗鑾輿出絳宫霽日全融馳道雪曉烟輕泛上林風鐵衣隊隊鳴金鐙羽騎森森拓寳弓文徳久敷軍政肅太平天子秉元戎甲胄躬親按轡行黄金萬葉色晶瑩琱弓滿引穿楊技御騎遙廵細柳營氣奮貔貅雲翼展光騰組練雪花生徳威共仰天顔近将士無譁號令明帝座星臨耀九垓高張黄幄晾鷹臺登壇角吹龍驤合匝地營横雁字來一片雷聲紅日裏千竿旗影白雲堆止齊歩伐諧鉦鼓九進連環次第催囘駐營門八陣安静方動直卦圗看詰戎序應三農暇紀嵗豐騰萬井歡賜食賜金羅甲士從龍從虎列儒冠微臣身沐天恩渥簮筆從容咏大觀聖駕南苑大閱㳟紀四首錢陳羣瑞雪初晴輦路開覲揚典禮肅風雷寒凝貔虎千官集雲擁郊原萬騎來紺殿丹青思締造奎章金碧仰昭囘吾皇繼序兼䋲武袵席從知慶八垓禁旅兵樞慎所司親承指授下丹墀陣通變化終歸律法合韜鈐在出竒文徳久敷寰宇内武功敢忘太平時軍中共覩黄雲近韎韐躬臨視六師不數騶虞賦五豝禮成恩賚復頻加玉匙飽飫大官米金錯分嘗哈密𤓰聖主衞民心最切諸軍奉徳聼無譁欣曕鳳藻從天下墨色澄新映曉霞一人親握帝王符天縱多能裕睿謨玉帳開時光日月龍旂展處伏孫吴九重宵旰惟無逸八政賔師戒不虞珥筆聲詩慚吉甫為傳虎拜與山呼聖駕南苑大閲㳟紀四首張廷瑑聖武惟揚六㝢平選徒南苑駐霓旌簡稽令典崇周禮羽獵雄風陋漢京地接滹沱瞻野闊日躔星紀慶陽生順時禁旅森行蹕糺縵榮光五色明晾鷹臺敞勢穹窿肅穆天顏寳幄中組練六師心向日貔貅萬旅氣成虹令嚴鉦鐲申三略陣協星辰式九宫惇史即今書盛事文經武緯邁車攻雪霽沙平浄碧天驊騮千騎蹴寒烟森森戈甲迎霜麗爚爚旌旗暎日鮮軍肅舊嫺司馬法恩濃新賜水衡錢騶虞共咏皇仁溥雉鹿都馴繞玉鞭班聫此日侍彤闈喜見和風拂羽旗睿藻載賡䋲祖徳琱弓頻挽煥天威於今邦政基磐石自昔詩篇賦采薇盛世不忘修武事儒臣長扈六龍飛聖駕南苑大閲㳟紀四首春山晴旭天開映九重翠華南苑閱軍容露凝仙仗香烟細風送鸞旟瑞靄濃龍虎六軍随日御貔貅萬隊協雲從盛朝振武勤于邁吉日車攻喜再逢離宫昨夜道新除珮玉鳴珂奉屬車萬畆棲雲登稼後一陽應律報蓂初晶瑩積雪明金甲杳霞晴霞䕶紫虗簇簇軍屯環拱處三申令肅岳山如羽林列衞幔城開天筞中權虎豹才五色雲旗張廣幙一聲畫角動層臺彎弧徹札天威播擐甲廵師聖武恢俞騎材官争踴躍摐琤金鼓似轟雷師中有律士無譁赫奕兵威聖主嘉八部龍驤騰武庫五言鳳藻散天葩紹庭已識聲靈逺振旅還看渥澤加緯武經文瞻睿略金甌萬葉鞏皇家聖駕南苑大閲㳟紀四首鄒升恒太平天子蒞元戎十萬旌旗颭朔風雪盡馬蹄飛電影日晴犀甲耀霜空雕弓九合威儀盛畫鼓三聲歩伐同一自至尊親敎戰六軍超距氣増䧺子月剛逢大閲期和門雙㦸麗金枝三驅號令周三隊八陣風雲應八旗殪兕共傳天子武割鮮均荷聖人慈清時衅甲非忘戰看取桓桓盡虎羆講武遐思祖烈長神宫親謁肅冠裳即看似火如荼陣先睹鏘金戞玉章一徳賡歌齊虎拜兩階文武簇鵷行欣占五色凝華盖韎韐叢中寳翰光山河表裏鞏金甌赫濯聲靈遍九州樽俎折衝歸禮樂功名鼓舞出兠鍪師師久已宣文教将将仍欣仰睿謀槖筆詞臣逢盛典萬年稽首頌皇庥聖駕南苑大閲㳟紀二首沈榮仁翠輦初臨擁瑞雲廣場開處鼓鐃聞翼聫左右軍容盛隊列東西陣影分執鋭披堅輝舜日辨方定位叶羲文天家羽衞皆殊選忭舞人人奉聖君高臺黄幄正當中八面森排七校䧺霞蔚雲蒸旗煥彩星馳電掣礟飛空平時敎養恩逾渥此日驍騰藝最工更仰皇心無暇逸躬擐金甲試雕弓聖駕南苑大閲㳟紀四首徐以升天垂景慶帝垂裳文教覃敷武奮揚南北賮琛歸禹貢東西鶼鰈入堯疆亦知世治兵無用誰道時平戰可忘簡閲特行冬中典羽林千萬盡龍驤銅龍漏曉屬車行寒柳晴融樂鳥聲雲䍐高擎霞氣紫霓旌横拂日華明千條馬埓如弦直百歩萊田似砥平坱莽神臯䧺壁壘羃天錦繡五花營鼔旗十二晾鷹張天子親臨日月光九地龍虵縈曲直八門魚鳥制圓方無譁霜凜干戈氣有爛星羅劒佩行共仰中央雲一朶氤氲紅繞御爐香六軍温詔乍傳宣内府恩流百萬錢靈囿呼嵩山谷應和門挾纊鼓鐃闐風清玉輦龍顔喜露湛彤弓豹尾旋聖世觀兵原耀徳金甌長卜太平年聖駕南苑大閲㳟紀四首朱良裘閱狩乗時出建章畿南風景宛岐陽御圍乍合河山壮甲仗齊開日月光鐵騎星流青羽箭珠幡雲繞綠沈槍昇平㑹覩軍容盛睿念還期切覲揚六軍鼔吹叶歡雷天子親廵壁壘來黄鉞臨時冬日暖玉鞭指處陣雲開鉦鼙有節申師律部曲無譁辨将材獵獵旌旗風自肅翠華直上最高臺殷天動地迅霆威鏜鞳鏗鏘振鐵衣戈㦸舒芒臨雪耀驊騮逐影嶺雲飛朂哉歩伐齊三表允矣勲華被九圍慶協天人徴悦豫欣看文物有光輝時和雉兔盛原田敕許從禽御幄前虎旅張弧懸皓月龍驤試馬踏連錢漫傳貍首騶虞節寧詡車攻吉日篇聖徳經文兼緯武兩階干羽入薰絃聖駕南苑大閲㳟紀六首彭啓豐閱狩鑾輿駕六龍布昭神武控提封禮隆吉日循宵雅典重周官届仲冬偃月旌旗羅陣法凌霜組練壮軍容共瞻清蹕臨南苑饗士先垂雨露濃貔貅羽衞鸊鵜刀金甲葳蕤䕶赭袍行列森嚴廵虎旅陣圗合變仰龍韜平原雪浄驊騮騁廣澤風寒鷹隼高從此軍門超細柳指揮親見聖躬勞連天鼓角殷轟雷駊騀揚旌颯㳫回昨日隂雲凝大野今朝霽色麗高臺重光祖徳丕基固黙契天心萬象開四海銷兵長洗甲和風故遣靖繊埃靈囿方看雉肥天山早説卷戎衣網開一面敷仁澤制合三驅耀武威常以蕃昌占阜物偶因校獵肅行圍宸衷更切垂堂戒弭節從容馭六飛七校屯雲依翠䍐二虞萊野厲黃涔割鮮分賚由中禁給札揮毫出上林敎選車徒籌有備輯柔干羽化彌深武功自足昭文徳鐃吹如聞奏凱音詰旦囘鑣道再除都人額手望鸞旟岐陽萬古誇䧺駿漢苑長年頌樂胥賜重挽强榮禁旅恩深挾纊飽天儲小臣願進車攻什不學相如賦子虛聖駕南苑大閲㳟紀四首林令旭雪霽初開輦路塵翠華夙駕鳳城闉蒐苖法古軍容肅遊豫乗時武徳新七萃旌旗光耀日三驅笳鼓氣先春恩深挾纊人超乗帳殿前頭頌聖神吹角旌門列騎輕雕弓抱月鐵衣明穿楊電激圍中賞飛礟雷轟掌上聲旅萃貔貅兵甲利營連鵝鸛陣圖成金湯萬里天威播氣掃欃槍識太平龍驤虎旅晝鳴笳士馬雲屯静不譁蹀躞錦韉分内廐輝煌金甲襯明霞兩階干羽聲容盛萬國共球職貢遐玉管吟成欽睿藻長楊羽獵漫相誇不動天風雉扇移晴光旭日䕶龍旗軍聲逺振鐃歌奏御氣遙通赤羽馳應識止戈昭聖武曽聞無戰是王師韜鈐祗向閒中習四海於今自靖綏聖駕南苑大閲㳟紀三首徐以烜馳道清塵法駕移羽林排仗整鴻儀曈曨日耀黄金甲廣莫風翻赤羽旗立鵠千官瞻肅穆穿楊百歩仰神竒玉驄周視軍營遍紀律森嚴帝者師君王臨御晾鷹臺七校分行八陣開鎗試連環光掣電礟飛子母勢轟雷龍旗徐引千軍合畫角齊鳴萬騎廻洛水岐陽何足擬布昭聖武邁䧺才和門振旅禮初成正值條風應律生馬踏晴郊殘雪盡幕連寒樹暮雲平經文緯武昭隆治弭矢櫜弓慶永清才愧鄒枚叨珥筆敢将詞賦擬西京聖駕南苑大閲㳟紀四首吴華孫文教覃敷聖澤周更瞻講武頌天庥西山翠映朱旗動南苑晴輝霽雪浮陣簇羽林屯虎豹兵環神䇿肅貔貅欣逢鉅典當農隙萬國嵩呼徹帝州紅雲捧處奏韶鈞鳳輦躬臨簡閲親萬騎騰驤開曉仗六軍飛動飭勾陳排空霜㦸含鋒鋭麗日星旗繪象新節合騶虞鳴羽鏑勇欽天錫邁羣倫芳郊瑞靄氣氤氲玉帳千官鵷鷺分衞接九天依日月營開八陣合風雲驊騮色鬬金環轡鎧甲光生錦繡紋共覩虞階干羽集聖朝緯武即經文節應芳芸化日長禮遵王制樂平康龍韜獨藴歸神武鳳藻高翔仰矞皇蹕駐郊坰濡湛露鑾廻禁旅被恩光微臣幸厠清班末珥筆何能罄頌揚聖駕南苑大閲㳟紀四首梁文山翠盖金支撼碧霄順時行狩六龍調雲開北闕鑾輿動雪盡平原獵騎驕珥筆鵷鸞周柱史選徒貙虎漢嫖姚三軍擁處招揺出一路氤氲瑞靄飄華林勝地接郊圻禁旅森羅䕶紫微隊合貔貅昭聖武旗搖龍虎肅天威抨弦不使星狼逸繞仗爭看月兔肥自是於苖遵古制驊騮百道踏雲飛鎧甲光寒射曉暾翠華指顧歴旌門天臨上苑威風轉地逼宸居瑞氣屯霜仗雲麾迷日月霓旌電掣耀乾坤於今不數西京賦萬國來庭拱至尊禮重三田羽斾揚更聞天語敕幾康習戎却是崇文世勤政何分講武場不羡周王廵甫草遝輕漢主獵長楊願随豹尾鸞旗裏作頌時親黼座傍聖駕南苑大閲㳟紀二首張映斗昇平海宇慶同文講武仍關睿慮殷大閱久垂司馬法中朝特重羽林軍三冬日暖宜蒐乗七萃雲屯佇䇿勲閫外乍傳天子詔已瞻華盖應霄雯犀渠組練燦成堆鶴列平分八陣開赤羽干雲盤繡谷黄龍捧日上金臺排空鼔角從天下照海旌旗捲地廻忽聼鳴弦連破的君王親射錦標來聖駕南苑大閲㳟紀四首張為儀彤雲深䕶晾鷹臺聖主親臨閱武來萬乗旌旗明日月九天號令肅風雷陽生緹室春光早暖入紅橋霽色開最喜六花猶貼地平飛鐵騎浄無埃鳴鐃振鐸選車徒指顧龍蛇展陣圗曉日晶瑩明組甲朔風勁烈入雕弧馬嘶平野騰驤闊旗列諸方錦繡鋪更向五雲高處望太平天子握兵符城南苑囿路逶迤雷動星陳簡六師洛水裳華傳盛事車攻吉日詠新詩弭兵久遂昇平樂講武還勤暇豫時韎韐臨戎昭有奭君王福禄正如茨振旅歸來日未晡曈曈晴景照高衢軍容共識䧺三輔王㑹遙知徧八區律吕早宣天藻盛金繒重沐聖恩敷六軍喜氣通霄漢太乙鈎陳拱帝都聖駕南苑大閲㳟紀四首金徳瑛敷文懿徳載櫜弓冬狩因時閲武功吉日應占蒐卒乗期門奉詔集羆熊風雲四面儲胥合日月中臨閣道通鵲尾香飄徐按轡太平天子統元戌組練飛馳㨗羽翰城南草浄列營寛六師盡識尊尊誼萬乗親升將將壇鼓角濤喧驚野外旌旗雲合映林端正當雪積霜凝候挾纊恩深士不寒兵制深嚴仰聖朝烝徒不數霍嫖姚環生陣勢随舒卷山立軍容敢撼搖共荷皇威争自奮夙嫺師律寂無囂一人彀矢連穿札萬騎嵩呼動碧霄振旅還旌我武揚止齊歩伐自知方清時久已銷兵氣餘勇猶看騁獵場士飽馬騰襄盛典金聲玉振頌宸章昇平文敎覃無外永固鴻圗寳籙長聖駕南苑大閲㳟紀四首秦蕙田昇平大典重車攻上苑親臨吉日中龍虎作羣随寳纛貔貅列隊韔雕弓聲威逺淨千峰雪氣色高騫萬里風干羽久昭文徳盛乗時肄武耀神功六軍山立䕶神京七校星羅拱御營天廐夙調皆上駟羽林宿衞縂親兵聲騰鉦鼓河山壮光絢旌旗日月明盛世軍容彰赫濯威弧氣已靖欃槍赤羽飛揚散五花韜鈐風后重専家三申有令王先制萬隊無聲士不譁壁壘精嚴過細栁指揮倐忽走長蛇神機火器尤無敵殷地雷轟轉電車駐輦高臺翠葆翔經文緯武日重光三驅雲擁飛龍馭七札星流屬羽芒帳殿揮毫瞻聖藻和門槖筆奏長楊消兵竊有平生願五色彰施仰舜裳聖駕南苑大閲㳟紀四首胡中藻天家創業一戎衣山海梯航坐指揮寳鍔留塵封玉匣長城如米聚金扉銘勲舊有麒麟閣講武新開虎豹圍誰道承平循故事今朝草木想神威禁旅宵嚴出建章武功無事亦難忘千官捧日随天仗萬騎屯雲踏曉霜槍壘斜分沙岸濶轅門高揷玉鞭長平明試聼行軍令鐵駟風翻簇寳装玉勒徐行五壘中六軍擁䕶試䧺風且看雪羽光堪照無限霜英日漸融八陣風廻圖逺勢兩階干舞想膚公猶傳校獵揮餘勇箭簇三花野草紅天池洗馬觧花韉月偃琱弓漫挽弦緹騎八門非用武折衝千里不臨邉将軍且許傳杯酒甲士猶勞出賜錢洛水周家稱盛事微臣重咏六師篇聖駕南苑大閲㳟紀四首齊召南七萃朝嚴玉帳深九宫中位紫微臨旌旗雲䍐高龍纛壁壘天星動羽林百道長虹環劍氣八方䧺獸抱鉦金由來文徳兼神武萬里烽銷碧海潯禡牙金甲照南山軍令重瞳曉自頒三陣指揮天地合百年清晏虎貔閒笳風羽箭千雕落苑雪桃花萬馬還共説至尊雄略盛射蛟親取大弓彎雲承華盖駐旌門威控招揺壮㦸幡㑹士漢年臨渭曲衅車周月在天黿靈鉟震起冬行狩棡鼔雷騰曉卧轅千載雅詩賡獵碣不闗江漢咏鋪敦星戈月羽肅森森虎旅魚麗萬貝綅親整六師天子事長安四海聖人心禮成大閲春卿典誓在中軍夏徳深正報一陽廻玉琯盡聽鐃吹起和音聖駕南苑大閲㳟紀二首王㑹汾龍旓長引電鍠鋩講武平時挍玉堂天子䧺儀高上将帝星符彩動文昌參斿戎路岐山曉白馬朱鬃渭水陽共説西京多故事不闗鈐䇿授漁璜南苑沙平海色新天開晴雪映華林控弦赤羽風翻雹鏁甲團花日碎金都尉落雕初獻獲将軍鈹虎合頒禽至尊英略兼雄藻誰賦長楊倚劍鐔聖駕南苑大閲㳟紀二首孫宗溥農閒振旅耀南畿一帯晴峰入翠微萬騎踏雲随曉仗六軍捧日識天威旗分荼火連營壘将號熊羆聽指揮金甲躬披光燦爛鼓鼙聲裏五雲飛旌立和門左右陳琱弓畫㦸一時新狩從文囿同民樂網祝商郊與物春玉帳夜聞行漏箭珠旗曉淨屬車塵鑾回警蹕天街肅萬嵗嵩呼達紫宸聖駕南苑大閲㳟紀四首裘曰修閶闔晨開六轡閑層霄星拱太微間光生彩仗排成錦笙立天營望若山赤羽分旗森虎衞黄金擐甲覲龍顔閣門昨日傳温㫖犒賜頻仍次第頒晾鷹臺矗擁千官黄幄親臨駐馬看鋭走雷霆聲震叠捷馳風雨勢瀰漫六師奮武軍容整萬里銷烽海宇寛天下太平無一事至尊猶念守成難已占來嵗隴頭春瑞雪平鋪大地匀候應一陽稽月令禮遵九伐舉時廵兵農交重垂邦憲文武兼資識聖人信是居安常有備獨先兢業朂臣鄰高原四望喜豐年滿路歡聲振旅旋億姓有心皆向日一人每事必承天輝煌祖徳懸金鏡煥爛宸章泐寳牋此際回鑾歌飲至侍臣同進九如篇聖駕南苑大閲㳟紀四首莊有㳟堯階干羽洽重熈修武歡歌吉日詩駕出明光陳宿衞烟清平樂麗朝曦龍騋電掣騰千騎熊虎風廻動九旗即此聲名揚近逺知方有勇是仁師和門鼉鼔一聲開碁布軍容實壮哉魚陣伍縫編列隊雁行兩翼繞高臺平沙地濶轟雷馭黄幄天臨正斗魁﨣﨣干城欣有託六師俱是出羣材兆呈三白曉初晴紫氣黄雲䕶列營谷暖不知氷雪冷天澄愈覺斾旌明覲揚祖徳懐神武揆奮皇圖息逺征軍法自來遵古制從知耀徳寓觀兵聲靈赫濯邁岐陽典禮修明正萬方徳囿鳳麟來有象農田獮狩戒無荒鑣鳴自協騶虞節樂奏宜登白雉章幸厠西清傳盛事抽毫未敢效長楊皇清文頴卷八十六
