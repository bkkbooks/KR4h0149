body:
  text: 論太極圖論熊賜履上下古今一理而巳一氣而巳離理無從見氣離氣無從見理此主其合者言之也有理方有是氣有氣斯有是理此主其分者言之也理外無氣氣外無理不可謂理此而氣彼而特不可不謂理先而氣後亦不可不謂理精而氣粗此又主其分而合合而分者言之也易曰一隂一陽之謂道又曰形而上者謂之道形而下者謂之器隂陽器也即氣也所以隂陽道也即理也斯固二而一一而二不可以分合言而亦不可不以分合言者也天髙地下萬物殊散何莫非此氣之充周此氣之運行而此之所為充周而不遺運行而不息者葢莫不有是理焉為之主宰往復於其間而縱横上下過續往來無不如是而初無一隙之或缺一息之或停也然則求道者亦務明夫理而己矣自伏羲一畫洩兩間之機孔子十翼闡千古之秘斯道昭揭如日中天無何聖徂神伏異端䗬起微言大義委之草莾以董江都韓昌黎後先相望於千百餘嵗之間而曾未能力窮其奥而明正其統軻之死不得其傳焉寜虛語哉濓溪周子神契妙解不由師授為之建圖立說俾造物極至之理庶幾昭示於來兹其曰無極而太極也言本無是形而實有是理即易有太極之謂也曰太極動而生陽靜而生隂也言是理之動靜成形隂陽成象猶太極之生兩儀而一動一静互為其根一隂一陽互藏其宅也曰五氣布四時行也言是理之由一而二即由二而五猶兩儀之生四象而二老二少自成其變四方四隅各得其位也曰乾道成男坤道成女二五流行化生萬物也言是理之行生發育無際無量氣化形化形生氣生無往而非乾坤之摩盪六子之結撰六十四卦三百八十四爻之瀰漫而亭毒也合而言之萬物一太極也維天之命於穆不已大徳敦化為物不貳是也分而言之一物一太極也乾道變化各正性命小徳川流生物不測是也究之萬物一五行也五行一隂陽也隂陽一太極也太極本無極也所謂上天之載無聲無臭不可以形跡求不可以方所拘無乎然而無乎不然無乎不然而無乎然者也則試仰觀俯察原始要終凡有形有象皆氣也二五萬物是也凡所以形所以象皆理也太極是也所以形者無形所以象者無象無形者形形無象者象象形形者無形而無不形象象者無象而無不象則無極而太極太極本無極之說也理無欠缺氣安有欠缺理無歇息氣安有歇息至微至顯即顯即微至顯至微即微即顯無精無粗亦即粗即精無鉅無細亦即細即鉅其奥其妙不可以言詮不可以意解而實則凝目舉趾觸處皆是而正非有幽逺杳𣺌之難為測識者也而或者疑無極之說近於二氏以為出於陳希夷穆伯長李挺之輩之所傳嘻抑誣矣葢太極乃至無而至有亦至有而至無者也至無而至有非佛氏之所謂無至有而至無非老氏之所謂有也佛氏之所謂無非吾之所謂無老氏之所謂有非吾之所謂有也先天圖由一而二而四而八而六十四太極圖由一而二而五而萬洪範圖由一而三而九而八十一數有多寡而理無同異又何疑於周子繪圖朱子立解之指乎總而論之太極非他不過天地間極至之理而已天得之為天地得之為地人物得之為人物無有二也而就其最切於人心者言之葢是太極之理存之為五常之性發之為四端之情得之於心為徳行之於身為道推而廣之舉而措之天下之為事業放之六合用中有體巻之寸靈體中有用時時在在焉往而非是理之包涵條貫於其中哉邵子曰道為太極心為太極朱子曰心之動靜是隂陽所以動靜是太極此體道之君子存養省察明體達用其功不可湏臾之或離而周子特為諄諄致謹於君子小人修吉悖凶之戒而端有賴於聖人之主靜立極定之以中正仁義也况人主膺圖涖宇函三在宥巻舒協四氣之和動靜彚百昌之祉唯是得一以貞乘六而御清宫齋穆之中明堂敷布之際體乾行健作則建中務使宥密單心無為至正綏猷錫福協應庶徴則體全用備登三咸五求之心極而無餘事矣書曰皇建其有極斂時五福用敷錫厥庶民亦此意也夫韓愈深得春秋之㫖論張英夫春秋何為而作也聖人以順天道明王事而立萬世不易之則者也聖人憫夫王道之不明禮樂政刑之失所統而天下後世將不得與聞於先王之敎故明天道以治之以王者賞罰予奪進退之權一寄之於春秋而聖人憂天下後世之心益廹矣憂天下後世之心廹遂不得不力為之防深為之慮一言之褒一字之貶兢兢焉無敢失者非得已也韓子有曰春秋謹嚴程子以為深得春秋之㫖葢以其能識聖人不得已之心矣夫春秋繼詩而作也詩之㫖主於温厚和平美刺之間優柔不廹類多託物以流連之咏歌而長言之即其間不無憫時病俗之非亦且怨而不怒初未嘗指陳是非激切而褒刺之也而春秋之主於謹嚴也其於温柔敦厚之意何居不知詩之作也王者之政敎明於上仁義涵濡里巷之間皆有以咏歌乎聖人之澤即􅆁鄘而下稱變風矣而先王之敎未衰善惡猶未冺於人心故其思深其思深故其言長若春秋之作也王者之政敎不作於上紀綱廢墜雖桓文復作號稱尊王而先王之澤已湮善惡之機將冺故其情廹其情廹故其義不得不著此春秋之謹嚴所由繼於温厚和平之後春秋之敎一詩敎也今觀其宏綱大義之所在或抑或揚或隱或顯或屈或伸或予或奪無不凖之於天道本之於王事御之以帝王之大經大法嗚呼何其慎也葢春秋一書以防天下之肆則立說不得不謹以止天下之僭則持義不得不嚴以一言立百世之經以一事立萬事之則將以挽天命民彛於既冺使復與聞乎古先哲王之敎也則是於聖人之詞益切而聖人之心益苦矣夫先王之治天下莫嚴於禮太史公曰春秋禮義之大宗也蘇子曰春秋之所褒者禮之所與也春秋之所貶者禮之所否也聖人之作春秋一以禮為斷先儒之論春秋一以禮為歸葢將為持世之大防而不得不出於此也非即韓子謹嚴之說哉韓子識春秋之義故其於佛老竭力而排之其詞直其義正使異端不得進而與吾道爭也亦可謂能謹且嚴矣葢未有聖賢生而不為世道憂者也未有為世道憂而不凛然於人心之防者也凛然於人心世道之防而出於謹且嚴也豈得已哉知此則可與讀春秋而亦可與讀韓子原道之文矣王者以敎化為大務論張英董子之言曰王者南面而治天下莫不以敎化為大務善乎董子之言上自商周秦漢下迄三國五代唐宋以來國家所以延促之故卒未有能易其言者也人心之日流於偽如水之就下而不可止聖人以敎化為隄防堯舜禹之相禪以治繼治人心淳樸未漓董子所謂繼治世者其道同也湯承夏之敝伊尹稱之曰肇修人紀夫五典之敷久矣至湯而言肇修者救夏之衰也周承殷之敝文武成康數聖人相繼漸摩涵濡以革殷故俗書曰商俗靡靡餘風未殄又曰既歴三紀世變風移化之若斯其難也秦人承戰國之敝無一日之敎澤而加剥削焉是以再世而不振西漢之澤綿於文景東漢之治洽於明章唐之緒永於貞觀宋之祚延於眞仁此數君者類皆能興起敎化以丕變一世之人心風俗使子孫有所憑藉以為固嘗譬之天下大器也昔之人用之數百年日剥月削久而窳敝矣後之人取其器小而補苴之大而陶鑄之稱其力之厚薄以為所用歴年之多寡未有仍其窳敝謂可以無慮者或曰人心之日趨於輓近勢則然也雖聖人不能返之使淳是葢未知天道矣夫秋氣之蕭瑟隆冬之沍寒斗杓一移萬物煦煦譬如人立乎文景貞觀之間迴思嬴秦五代之世不猶樂陽春之和而幾不知栗烈之苦耶是知天道無剥而不復之理人心無往而不返之機聖人執大權於上以天地為鴻鈞以萬物為銅冶以喜怒賞罰為屈伸呼吸使天下之人訛訛焉而動蒸蒸焉而化斲華而還樸去偽而即誠風俗淳美人心敦固耻於犯法悚於為非禮義之化浹肌淪髓如治器者堅好完固而後可以貽之子孫而為百世不拔之業也且治天下之需人材人主盡知之矣天下卓立特行之士不為世俗所移百而不得一者也古人有言曰天下之人中材為多故治世之本敎化為尚敎化行引中人而升之於君子之域敎化廢推中材而納之於小人之途故敎化者推之輓之之具也廉恥之道重而後有恬澹之士義利之辨明而後有氣節之行躁競之習除而後有難進易退之節侈靡之風革而後有守約潔已之操風行六宇蒸變萬類鼓之舞之咸去故習所由風俗美而人材出以惟上所用故曰有敎化而後有人才有人才而後國有與立善乎董子之言為不可易也中和位育論張英讀中庸者勿徒謂是聖賢言理之書也夫天地至廣萬物至繁日星河嶽之奠麗飛潛動植之蕃變神竒而莫可測紛紜而莫可紀極天下之聰明才智而莫能知其所以然中庸謂以一心之中和而位之育之朱子釋之以吾之心正天地之心亦正吾之氣順天地之氣亦順要皆渾言其理而未嘗實指其事於是髙明者將遊其心於空虚杳𣺌之域顓固者習聞其說又視為迂逺而不可信以為聖賢特如是言之耳間嘗觀洪範之所謂五事以貌言視聽思而約之以肅乂哲謀聖配之以雨暘寒燠風推之於休徴咎徴極之於庶草蕃廡而後知聖賢之言有其理則必有其數理精而數亦非觕有其理則必有其事理實而事亦非虚其所以訓天下後世者該乎至大而非誇通乎至微而非不可據也夫貌言視聽思於一身備之肅乂哲謀聖於一心備之至於雨暘寒燠風皆不失其序則天地位可知矣庶草蕃廡則萬物育可知矣聖人在上以一心運乎穆清之上辨上下以定乾坤大施生以配覆載隂陽之愆伏寒暑之失次水旱之不時皆得以裁成補救洩其太過而助其不及故日月不蝕星辰不孛山陵不崩川澤不竭清者常清寜者常寜此天地位之實事也建立法度紀綱敎養生民使老耆以壽終幼孤得長遂撙節愛養草木鳥獸取之有時用之有道使各遂其性各蕃其生此萬物育之實事也故稱堯舜之功者曰地平天成稱成湯之徳者曰鳥獸魚鱉咸若上古聖人徳盛化神者皆然中庸特舉而言之耳嘗謂中庸之所謂至誠至聖必至帝王而後能極其量中庸之所謂參天地贊化育必至有天下而能顯其功葢君心即天心也萬物之託於天者有形之天萬物之託於君心者無形之天人主一念之動而萬類以為慘舒一言之發而四海以為休戚知此則知中和位育之理至近而非逺至切而非虚也如夫子居春秋之時躬備聖徳而位育之功不得加於上下疑參贊非儒者之事雖然聖人繼往訓開來學使天下後世曉然於天經地義之大仁民愛物之理雖不能位育一時之天地而其施益逺而其敎無窮葢六經者聖人參贊之事也故曰堯舜之聖功在當時仲尼之聖功在萬世格物致知論張英大學一書統明新以垂訓貫本末而立言而其說始於格物則格物之說亦誠重矣葢盈天下皆物也内而身心意外而家國天下顯而彛倫物則之際大而天地萬物之原隱而君子小人之情狀以及於一事一物莫不有其當然之理與其所以然之故如此而不能眞知灼見則善惡之數未明是非之幾未決邪正之理未判危微之機未審以之明徳則幾微疑似不能洞達而無遺以之新民則設施措置不能每舉而悉當又何以本末兼貫明新一致而號為大人之學哉大學之所以托始於格物者其學甚大而非無所統會也其學甚博而不入於馳騖也其學甚精而非流於虚𣺌也内而身心意若何而誠而正而修外而家國天下若何而齊而治而平人倫物則若阿而為恩義分合之端天地萬物若何而為位育生成之故君子小人若何而為誠偽邪正之别以及一事一物若何而為至當不易之則於此格之使之表裏内外洞達不疑格一物而一物之知以致格衆物而全體之知以致葢知者理之具於吾心者也而散見於物在吾心則為知在物則為理於物物而格之而後吾之知不入於昧不蔽於偏不流於虚而有覺之體全矣雖然格之者何格之以吾心之知也非吾心有知而何所恃以為格致之者何致之以在物之理也非在物能格而何所藉以為知故知與物非有二體格與致非有二事司馬温公以為格去外物是以物視物而不知即吾心之知所寓也王文成主於知行合一是以一格而遂無餘事亦與大學之㫖有岐格物致知正吾學與曲學之所以分途而辨之不容不早且慎也彼離物索知而自矜頓悟者虚無異端之學也既不求於物則外視物矣乂安能不舉身心意與家國天下而俱外之也哉大學之道所以統明新貫本末於一原者格物致知之說也太極圖論張英太極之說始於易易曰太極生兩儀兩儀生四象四象生八卦太極居兩儀之先則其為生天地萬物之本無疑也至周子濂溪始建圖立說於太極之上復益之以無極而太極由此而動靜互為其根以至生五行布四時成男女化生萬物而太極之義備矣先儒往往謂無極之說易所未發而周子發之或疑其說近於空虚朱子以無形而有理之言釋之葢謂其有也而初不滯於形迹謂其無也而更非渉於虚𣺌後世紛紛之議折衷於朱子之圖解而亦可無疑矣嘗論天地之所以生隂陽之所以立五行之所以變化人物之所以蕃育何以往復而不窮何以流行而不滯何以亘終古而不敝此必有為之極者是即於穆不已之原繼善成性之本乎故極中未嘗無健順之理而言仁義禮智信則分配乎五行獨此一理渾然精純而萬變生焉萬化出焉故謂之太極合而言之天地萬物共一太極一氣周流之内天地且不能外而况於人物乎此所謂合萬殊為一本者也分而言之一事一物各有一太極即纎細之物俄頃之間而此理何弗周徧而不遺此所謂散一本為萬殊者也易之所謂兩儀即圖之所謂動靜隂陽也易之所謂四象八卦即圖之所謂五行人物也易言其理圖發其藴無極一言又所以善言乎太極而使人不敢以氣化之相嬗者遂謂之太極然則周子與易有岐㫖乎而周子所以建圖之意何居人與萬物同涵此太極而惟人得其秀而最靈觀於天地位則天地隂陽之極自人立之萬物育則萬物之極自人立之故一言以斷之曰聖人定之以中正仁義而主靜以立人極焉吾人性中之一動一靜即配乎圖之隂陽也吾人性中五常之徳即配乎圖之五行也吾身之醻萬事應萬變即配乎圖之萬物也然則動靜之未分五常之所不能名萬事萬變之未接而凝然中處者非即配乎圖之太極乎君子欲使吾身之太極足以配乎天地之太極而動靜生生不窮者葢有道焉不外乎周子通書之所謂誠與圖說之所謂靜而已矣太極雖兼動靜而非靜無以立其體太極雖渾萬善而非誠無以會其原靜則常正而太極之體立矣誠則不息而太極之用周矣體立用周則天地之極與萬物之極自人立之是則周子建圖之意也豈徒言夫理而不切於人事者哉洪範五為中數而言皇建其有極五行五事莫不從之矣惟中能建極殆亦先圖而啓其義者歟不知命無以為君子論張英夫子罕言命孟子亦曰君子不謂命聖賢之意葢不欲以氣數之有定阻人進修之意啓人趨避之心孔子又嘗曰不知命無以為君子其義何居夫人之處世榮辱得喪毁譽進退之數類皆有天焉不知其為天而汲汲以求之營心於患得患失之途此小人之僥倖無足論者也知其為天而委心於因任置身於閒曠舉凡進徳修業奉職循分之事皆置焉不講一切聽之於杳𣺌不可知之數以自謂知命而可謂之君子哉非也夫子之意葢謂知此而後君子可為也天下之欲為君子而不能為者榮辱亂其中得失易其慮毁譽眩其視聽安危吉凶揺惑其素履由是沉靜者轉而為競躁矣方直者化而為突梯矣亢激卓立者變為緘黙謹愿矣以福利為必可趨以災異為必可避茍且妄營而君子於是乎不可為矣聖人告之以知命所以靜其心澹其慮一其聰明奪其智巧而後其為之也純誠敦一可以歴萬變而不渝其正入萬物而不易其識其進徳也堅其修業也勤其奉職也專其循分也恪獨居而坦坦處羣而穆穆遇事而侃侃利害乘之而磊磊落落艱大投之而孜孜勉勉中無所疑外無所懾先後左右無所瞻顧却慮凡君子所當為之事皆得而為之則由其知命者素也進以禮退以義孔子之所以為孔子非徒曰得之不得曰有命云爾也士大夫之持身渉世其亦味乎斯言而已足哉讀李文饒近倖論張英文饒論近倖之害舉桓靈元成為至鑒以為人君少欲英明者則能反是如漢文雖有鄧通趙談所信者賈誼張釋之袁盎此所謂少欲也武帝雖有韓嫣李延年而所貴者公孫𢎞卜式倪寛此所謂英明也故君聽不惑政無頗類近則開元初内有姜皎崔滌以極宫中之樂外有姚盧蘇宋以修天下之政得元成之欲享舜禹之名六合晏然千古莫及其故何也倖臣不得干政事也後代能如漢之文武及開元致理之要雖有倖臣亦何害於理哉文饒之意以謂人君誠能少欲英明則雖有近倖茍得骨鯁賢相輔理於外而亦可無傷於治理予竊以為不然人君既不能絶去聲色狗馬遊晏沉湎之樂則此輩連茹並進託處於肺腑隱深之地必不能安分循理勢且招權納賄藉僭威福以行其私此等之事又斷不能為骨鯁大臣所容使此輩小人明愬於人君之前短長大臣而非毁朝政則人君雖至暗必不以近倖小臣微豎之言遽加罪於大臣則此輩之術亦淺矣惟投間抵隙窺貌伺顔或為無意之遊談或為儕偶之傳說或因一事之短而類及其餘或因一時之疏而搆成其釁人君方以為自己明察所及中外無遁情而不知已入小人之彀中而不覺矣文饒論文帝之鄧通趙談武帝之韓嫣李延年開元之姜皎崔滌無害於治理不能有加於當時之賢士大夫余以為此特舉其小人之愿者耳如申屠嘉廷辱鄧通而文帝不之問萬一此數輩者皆狡詐奸佞之尤申屠嘉雖賢能終辱之乎江充初見被服輕靡及乎搆禍既深卒成犬臺之禍天寳末年社稷傾危卒壊於近倖之手恭顯處内蕭望之以賢傅而不免於見殺人君之明果能如漢文漢武未可必也近倖小人之稍愿果能如鄧通韓嫣輩亦未可必也以稍闇之主而近尤佞之徒幾何其不顛倒邪正變易是非竊權干紀盡驅天下正人縁引奸邪不止也而謂雖有倖臣亦何害於理果通論哉文饒又謂得元成之欲享舜禹之名六合晏然千古莫及是謂游晏非僻無傷於理子竊以為不然人君之一心天下之權衡四海九州之明鑑也衡一差則輕重失矣鑑一翳則妍媸亂矣清明在躬志氣如神以臨御之猶懼有所偏有所弊書曰内作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡非謂此數者一事遂足以亡其國謂此端一開則縁此而進者不可禁禦不可測度不可諌救以至於敗亡必然也葢游晏非僻者小人之門也小人者君子之敵也小人進君子退小人親君子疎小人衆君子寡亂亡之本也乃謂得元成之欲享舜禹之名是古帝王之兢兢業業母冒貢於非幾者皆不知樂其身而過為檢束以自苦也豈通論哉善乎蘇子之論始皇彼自謂聰明人傑視斯髙輩刀鋸之餘智何足以惑我亂我而不知其禍若斯之烈也人君而知此則視此輩如鴆酒毒脯而不敢近之矣好名論嘗進講時殿中䝉指問三代以下惟恐不好名其奏對大如此退而廣為論云陳廷敬臣嘗言三代以下惟恐不好名此衰世之論非盛世所宜有者非謂名非盛世所宜有謂好名之流弊足以為盛世之累也三代以上之帝王其名最著於世者無過堯舜禹湯文武使君人者好堯舜禹湯文武之名求堯舜禹湯文武之實而因以成其名安見名之遂不可好哉即三代以下之賢君如漢文帝唐太宗宋仁宗三君者人主誠好其名而求其實雖或不能如三代之盛時亦可謂間世之英君誼辟也然而謂好名之流弊足以為盛世之累者何也人君之好惡不可有所偏使天下漠然不見其好惡之迹而天下之眞好眞惡出焉故慶賞刑威予奪黜陟一出以虚平公正之心而百官萬民胥受裁成焉是以人君如天渾渾耳穆穆耳不言而四時成化無為而品物咸亨故曰惟天為大惟堯則之蕩蕩乎民無能名焉傳曰不識不知順帝之則又曰民日遷善而不知為之者知識且冺而况於名乎又安見其名之可用於民者乎書曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路此之謂也若人君之所好一有所偏則其流弊不可勝言上好忠直之名則下多上書告密之事上好長厚之名則下多模稜脂韋之習上好廉介之名則下多布被脫粟之偽上好恬退之名則下多處士㨗徑之巧上好眞率之名則下多囚首垢面之詐上好敏給之名則下多利口便㨗之姦人主茍一不察而貪榮嗜利之徒習為小人穿窬之行探其情而逄其欲則名實之眞亂矣故曰足為盛世之累者此也且上有好者下必甚焉傳曰好名之人能讓千乘之國茍非其人簞食豆羮見於色言好名之難信也又曰未有上好仁而下不好義者也未有好義其事不終者也又曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情自昔聖賢未有以好名為訓者故治天下亦務好其實而已矣或曰孟子不以齊宣王好貨好色為非因遂欲引之於道名之不可好孰與貨色乎昔衞靈公問陳孔子曰丘未嘗學軍旅之事孟子參乎權孔子純乎經者也參乎權而不失乎經者後之人臣能者尠矣故以孔子之對為事君之法好名論下陳廷敬人君不可有獨好其名之心不可使天下無好名之心好其實故不得獨好其名因名以責實故不得不使天下好名今夫天下善惡二端而已矣治天下使天下遷善逺惡而已矣有善無惡者人之性名為善而喜名為惡而惡者人之情今使天下渾渾焉不知名之可好則善不足以為喜惡不足以為惡喜與惡不加於其情則其為惡也與為善無以别而亦漸失其性故夫名者先王動天下之微權也先王因民之所好而采章服物以榮之爵禄慶賞以勸之表宅錫閭以奨異之若曰使人遷善而惡自逺是以不純任刑罰而任禮敎名與禮相近而逺於刑故名者所以助禮之行而操於刑之先者也孔子曰民可使由之不可使知之使天下之民日循循焉歸於吾禮敎之中則刑罰可以措而不用而天下固已大治故曰名者先王動天下之微權也然其始特不可有自好其名之心自好其名則直以為名焉已耳自好其名而或靳天下之名此其意已近於刑而逺於禮欲天下之治不可得也故王道以無欲為本皇清文頴巻六
