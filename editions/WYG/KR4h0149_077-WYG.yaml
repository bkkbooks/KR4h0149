body:
  text: 詩七言律詩萬夀省方詩二首韓菼四載親乗繼禹謨盈廷咨訪屢吁俞白雲篇裏河渠志起居注記河工甚詳黄鵠舟中玉笥符先是賜南廵製圖河臣已導狂瀾歸渤澥還分餘潤及江湖功成不待宣房築自有黄龍洛水圖香街十字篆烟青祝聖歡迎户不扃野老壺漿争上食所至獻萬民宴諸生皇極誦傳經祝甚聖道塲盛秋毫輙禁民咸便供帳縁攀駕少停陛下従今千萬嵗畵烏處處有旗亭聖駕幸􅇅里恭紀八首韓菼朝看閶闔影曈曨萬乗東臨御六龍不用金泥崇泰畤獨来魯壁撫秦松宫懸叠奏聲髙下罍齊親調禮肅雍今日廵逰因釋奠陋他雲起漢皇封唐人封禪詩千年泰山頂雲起漢皇封一代堂亷論道時天章雲漢肅昭垂傳心直接千秋統翼聖遥尊萬世師徳契周情兼孔思人瞻舜目與堯眉龍旓玉輅光東魯争頌神明禮樂姿奎文閣下日華生承聖門前御輦行翠盖紅雲迎雉尾瑶函寳冊擁霓旌罘罳璀璨簷前色絲竹鏗鏘壁後聲有喜天顔剛一笑和風進講魯諸生九成樂奏倍光昌犧象雲靁列兩行訪道肅然瞻禮器披帷宛爾遇􅃵牆鬚眉黙契存金石上周覽聖蹟慿几行教小影立像行像諸石刻鹵簿親留重廟廊特留曲柄黄傘以示尊崇殿上聖人躬贊拜不須太祝與齋郎堂廡崇髙碧漢齊太初遺石想端倪石在詩禮堂下杏壇檜影垂璿製栢葉槐枝煥御題承聖門内有唐槐漢栢二株十丈豐碑青染黛一泓聖水碧無泥孔廟遺井之上命汲水甞壁書想像曽留處故宅金絲蹟未迷聖林門外欝崔嵬氣象峥嶸壯八垓雲木秋髙敷碧草宫牆日麗浄蒿莱楷林亭畔閒瞻眺洙水橋西足溯洄起輦齊聲呼萬夀聖人陵上聖人来晚出思堂歩輦過愾然餘慕沛恩多祭田増後豐珠粒詔増孔林地十一頃文幣頒時耀綺羅賜衍聖公蟒服賜額中閨旌節操節並松筠扁額拜官哲嗣永山河官周公及諸賢後裔世襲勿替吾皇重道踰前典萬嵗千秋澤未磨早従洙泗証心源過魯追從永不諼東郡推恩増鳳詔上駐蹕兖州恩綸屢沛西山采石劚雲根特命采碑石於西山郊壇肅祀賢王禮命皇子祭告廟貌巍峩聖主恩化日兩楹陣爼豆素王萬古道逾尊戊午二月保和殿侍宴恭紀王鴻緒瓊筵日午上蓬莱金殿平臨五鳯開雲近衮龍當北繞春随天馬自西来條風入檻先飄栁香氣沾衣併放梅盛世蕃王俱欵塞千秋漢武漫雄才戊午二月保和殿侍宴賜玉案紅棗一金盤恭紀王鴻緒筵開紫殿俯晴空絶塞梯航玉帛通花傍蓂階初濯露香浮蒲萐正含風擎来火棗心同赤拜捧金盤日映紅莫羡安期嘗海外侍臣飽食未央宫秋日早朝王鴻緒燎光晨起禁城烏閶闔秋聲下碧梧樂奏瓊樓傳鳯吹雲開丹陛徹嵩呼龍媒珠勒排天仗仙液金莖引帝壺聞道雄藩移節鉞宵衣頻按九邊圖駕幸西苑觀荷賜近臣讌恭紀四首王鴻緒芙蕖一片飲龍川此日身逰銀漢邊繞岸峰巒雲外出傍流樓殿鏡中懸青青田葉迎仙珮宛宛池香入綺筵何幸小臣叨侍従愧無詞藻奏甘泉從官抃舞拜殊恩紺幄傳来帝語温自是太和流玉陛不湏天樂奏雲門尚方重整芙蓉宴中使還添琥珀樽幸仰宸襟歌在鎬􅂅將雨露滿乾坤已沐君恩等賜酺却催龍舸泛芳湖薫風徐動牙檣轉暁日晴懸水榭孤拜捧樽罍皆玉醴坐来雲浪是蓬壺臨流還詠嘉魚什聖澤知應水旱無昆明重泛靄晴暉潭影巖光入紫微傍艦魚龍潜復見近人鳬雁浴還飛花間風起飄朱斾波上雲生繞御衣萬國雄圖同愷樂更看宸藻倍芳菲乙亥六月二十六日臣廷敬臣士竒偕臣鴻緒恭詣暢春園謝恩臣英臣杜訥曁内閣學士臣藻兵部督捕理事官臣㑹恩翰林院侍講學士臣廷瓉臣䕫右春坊右庶子臣岳頒並宣召同至韻松軒賜饌饌畢命登舟溯山澗至淵鑑齋觀荷列席賜名酒時果復令内侍引至齋後遍觀嘉卉遂命至佩文齋恭閱御書數百幅各賜千葉荷花一缾恭紀六首王鴻緒中涓引土木蘭舟御苑風光結伴逰兩岸栁垂青嶂宻一川花泛碧泉幽雲開似入桃源徑棹轉猶迷杜若洲應勝乗槎浮漢渚更瞻仙仗列蓬邱瑶齋髙瞰玉河平百頃波光似鏡明西嶺翠微連檻合東瀛雲氣拂簾生何須牛女留銀漢謾說風雷動石鯨聖主臨淵惟鑒古泠泠山水舜琴清淵穆宸襟契太虚翛然塵外水雲居經營靈囿勤民暇歌詠巻阿聽政餘案上緑沉三代物床頭黄素六朝書回翔閬苑真何幸枚馬雄才愧不如向陽黼座對烟嵐座後軒亭碧樹龕滿院藤隂炎暑散一簾香霧午風含嘉禽雪羽来天外珍果丹葩自日南學士總饒花鳥興上林竒種未曽諳機務清閒翰墨研牙籖玉軸滿瑶編蓬莱山作藏書館太液池為洗硯川八體縦横叅造化六文揮灑入雲烟因知睿筆超神聖曽寫鸞龍九萬箋捧閱奎章到日斜更従浦溆挹明霞蓮房細展千重瓣水殿分頒五色花翠管摘来同嶽井銀罌擎出賜天家聖朝異數何優渥留作瀛洲盛事誇賦得百籟坐自吟徐元夢兀坐髙齋晝漏沉于喁忩外發清吟千般靈籟俱堪聽一派天機何處尋起滅漫馳空際想悠颺忽動静中心老聃章句分明在誰識無聲是大音賦得凝冰結重澗徐元夢宵来颯颯起天風凍結川冰頃刻中浩影千尋開匹練清光一道卧長虹印沙鴻爪㸔何在殷地濤聲聼已空下馬徘徊詩興發恍如身到水晶宫已未正月二日召聨栢梁體詩與宴内廷䝉示御製瑞雪近體詩恭和元韻徐元夢内朝扶杖入班聨新霽逾看萬象鮮髙倡正宜方白雪餘音併欲繞朱絃耄齡忝預頒金管春晝欣逢敞玳筵颺拜總知交儆意非誇勝事倣陳編朔漠蕩平恭頌四首彭定求睿畧宣揚致太平萬方送喜集神京鸞旂絶塞書三捷鳳管中天奏九成禹跡𢎞恢謀獨斷堯封廣闢徳難名微臣逺伏滄江外慙悚無能效請纓乾行豫動協天時瑞應祥徴御氣随草向沙場青䖏少泉従陸地湧来竒隂隂瀚海臨旄鉞漠漠天山集羽旗聞道師征原不戰銀河洗甲㡬曽遅紫塞金河欵聖朝枕戈擐甲帝營遥飽均戰士裁天膳寒恤将軍解御貂穴蟻欲逃那可得鼎魚餘息故難邀降旛竪䖏俘苞蘖湯網𢎞開武倍昭狼居胥頂幕烏飛百萬貔貅受指揮豈謂嫖姚弓早賜便如細栁轡徐歸縦擒互用推神筞竒正交攻握秘機瞻仰聖躬勞獨甚昇平何以報恩暉䝉賜御書恭紀胡㑹恩文治光昌庶績熙萬㡬清暇每臨池發揮神藻山河耀沾被深仁草木知元氣淋漓風格勁中鋒含蓄露華垂聖人書學還躋聖天縦吾皇百世師書家歴代漫縦横聖筆琳琅美莫京衆體咸精知法備毫芒無憾信天成萬鈞神力行間運百道榮光象外明誰向晉唐誇絶藝千秋琬琰獨峥嶸淵鑒齋中㳤氣新至尊染翰對芳春花朝洛水流觴日草聖蘭亭縦筆辰寳幄爐香凝睿思璇題墨妙注清神驪珠四百光華爛渥典何當逮小臣巻幅末褉御題三十三年春三月修日臨于淵鑑齋中天馬篇垂寳字多風雲變化總駢羅文傳雄駿思唐牧名叶嘉祥憶漢歌鉅麗天葩真創闢謙冲聖徳示臨摹吴興承㫖何堪數滄渤能涵萬壑波聖徳神功詩六首翁叔元聖皇文武太平年至徳如天服九埏禹貢白狼来玉帛堯封赤壤隸山川西方逺戍雄千騎北府神兵訓十連每聼鼓鼙思將帥治安曽不忘戎旃金城虵豕擾臣藩告急軍書入玉門荒服只因隣大宛至尊親欲救烏孫五花誰許窺神算萬國惟知感聖恩自是天心西頋切宵衣清問日臨軒春寒太白壓蕭關玉帳牙旗指顧間羽檄晨馳光禄塞傳烽夜照伯顔山地先春草三千帳天供靈泉十二閑司馬大書軍府上長留勝蹟在人寰翠輦行宫召佽飛龍韜指授敢輕違雲橋青海驚横渡鐵騎天山已合圍狐兔穴焚難假息牛羊日暮竟無歸獻俘博望齊三㨗好荅昇平頌徳威金笳兵氣入黄雲傳箭邊聲和馬羣趙信城前呼萬嵗李陵臺畔響三軍風揺玉靶龍頭轉日閃雕弓豹尾分従此域中銷戰甲好乘春雨事耕耘上林嘉樹翠玲瓏天騎西歸甲仗雄暁月斜臨九華帳春風猶繫六鈞弓南山誰比龍城跡北幕還輕馬邑功幸際昇平何以報萬年稱夀未央宫太學紀事詩四首彭㑹淇謁廟夙昔蓬山展拜䖍移官喜近聖人前雍容導引羅衿佩親切趨承到几筵末學愧分新綘座儒臣榮溢舊青氊回思釋褐春風日叨被恩光十七年釋菜曈曨殿角唘朝暾月吉親師古禮存肅若朝儀齊虎拜頒来法醖獻犧尊教先鼓箧歌鳴鹿潔薦溪毛賦采蘩樺燭影揺羣吏散緑隂深鎖映朱垣齋宿初擕襆被入西廂半榻琴書静夜張聖主齋宫親祝冊小臣清署自焚香鈴聲到枕風吹閣栢影横階月轉廊隠隐晨雞纔動聼橋門劒履已成行陪祀春秋秩祀重雍宫庭燎光齊鹵簿同鴛鷺随班先九列牲牢將事盡三公欣従爼豆趋承下得厠冠裳拜舞中分胙携歸叨聖澤也登鼎實薦宗工駕幸瀛臺宴賚羣臣詩五首張榕端皇家别館屬瀛洲藻井梧飄爽氣流琪樹千章依鳳閣澄湖一帶抱龍樓遥天嵐岫浮空翠近水芙蓉照素秋瞻望無殊蓬嶠勝乾坤寜復有丹邱簮裾暁集鳳城隈魚貫登舟擊汰開彩鷁乗風排荇渡錦帆截浦蕩荷廻松林如盖衣霑翠莎岸成茵佩映苔佳氣逈浮仙仗外六龍早御九重臺拜恩班退入鴛行綺席𢎞開太液旁照水繁花明劒舄含風雜樹奏笙簧茗傳尚食瓊漿飲饌出天庖異味甞翹首丹霞深鎖䖏九重應進萬年觴瑶池列幕帶廻塘午宴重霑栁䕃凉果腹已叨銀縷膾酡顔盡覆紫霞觴蹔舒笑語情方暢終秩威儀樂未央虎拜當筵歌既醉隆恩早已下明光叠捧温綸擬飲醇泰交盛事恰臣鄰㡬年載筆蓬瀛署此日乗槎牛斗津已見戈鋋清戍壘還㸔禮樂慶昌辰莫言近御偏承寵佇沛恩波四海均暢春園引見恭紀張廷瓉西山蒼翠䕶宸居簮佩趨承到玉除地接平疇觀稼穡窓迎深緑擁圖書栁絲細織春烟外鶯囀初調晝漏餘身入上林深閟境揮毫獻賦媿相如太液池張廷瓉御苑清流唘巨川沿隄樹色逺含烟曉風細織氷綃薄夜月晴浮玉鏡圓菱葉平分雙槳出藕花低覆白鷗眠移家太液池頭住得沐恩波十五年召試豐澤園紀恩四首張廷瓉暁日曈曨啓建章六龍迎䖏錦成行鏘鏘劒珮羅丹􅇅渺𣺌煙波渡綵航黄鳥啼殘新栁岸輕鷗浮過白蘋鄉行来蘿薜清隂徑三夏炎曦漸欲忘十畝桒隂覆竹門離離嘉穎繞華軒誰知紫闥宜春苑别有青疇布榖村蠶室絲紛氷縷色稻畦風捲碧波痕聖人無逸崇民事羅列􅃎風在禁園澄澈池開一鏡圎流紋如縠到階前千竿修竹森蒼玉㡬㸃新荷貼翠鈿蝶翅幽花紅雨潤蟬聲髙栁緑雲偏長廊邃館無雕飾風景清芬本自然列坐濡毫滿禁林御題含義總淵深薪傳真偽敦儒術農事艱難軫聖心尚膳榮頒文陛側天漿香散百花隂皇仁樂育真無極拜獻徒慙瓦缶音聖駕南廵詩六首張廷瓉青陽吹律入春遲聖主東廵正此時事重省方符舜典制遵時邁叶周詩層霄早看勾陳轉薄海欣逢化雨滋夹道肩摩齊下拜天顔豈獨近臣知仙樂遥聞落九天金輿来自五雲邊春回芳草圍行幄風送微波放畫船一路鸞聲花外出五湖旌影鏡中懸不教警蹕先除道童穉還依鳳輦前黄河春浪拍天浮伊闕龍門控上頭千里鯨波歸大海萬方玉粒達神洲隄防紛獻盈廷議疏鑿深煩聖主憂不似漢皇誇盛事宣房瓠子盡安流禹陵迢逓越山中龍衮親臨祀典崇此日黄流勞駐蹕當年洚水荷成功天香細結丹楹霧仙仗清含翠栢風千載空山廵幸少一時邱壑盡春融和風甘雨應時看儉徳深宫減大官比戸久知歌樂利天心猶自憫艱難租蠲喜溢蒼生望詔下聲騰萬姓歡作息總忘辛苦意君恩常在野人餐六師輕束羽林裝天上旌旗掣電光父老遮留還暫住壺漿争獻亦親甞九重駕出梅初緑三月鑾回栁乍黄端拱山龍温室裏昇平佳氣照巖廊西苑御試恭紀聖恩詩二首曹鑑倫薫風太液自逶迤重見仙蓂第四枝文鷁真従天上坐緗筵遥向鏡中窺明窓但覺雲霞潤髙棟無勞彩繢施仰止帝心崇儉徳堯階物色帶茅茨上林筆札㡬回頒委珮趨承侍従間寶饌遥分鸚鵡粒金爐添爇鷓鴣斑身偕彩鳯巢阿閣㤙重靈鼇戴巨山拜手屏營思砥礪叨聞宸訓訂愚頑聖武北征大功告成詩六首曹鑑倫豹尾雞翹出玉京凉州大閱振威聲半天鼔動河流却萬竈軍歡屋瓦驚鵰鶚堡前朱斾繞鴛鴦泊上綵雲横太平天子真神武止殺還須用五兵風雷隠隠䕶周廬五綵龍文擁帝車泉出旌門珠瀑巻草迎行殿緑雲舒九盤夜渡黄河水三略朝提玉帳書漢將莫誇臨瀚海聖人親已到狼胥聖武臨戎賊膽寒威驚鷙鳥避旌竿樓蘭西去關門逈姑衍南来地軸寛朝發尺書降賛普暮馳单使服呼韓畨戎頓顙軍麾下盡荷生成載道歡欃槍既掃沛皇仁羣醜投戈盡束身湯網恩深三面解軒臺威聳百蠻馴蕃歌人踏關前月鐃曲風傳塞上春直畫青邱為北户不湏戒鼓節金錞鑾輿三駕建霓旌總為蒼生致太平欵塞已看来萬國受降何用築三城晨廻雁磧雲迎馬夜度龍沙雨洗兵従此殊方歸化域年年争路貢瑶京鷺鼓前驅振旅還告功祖廟渙恩頒千羣龍馬来西極萬里天山鏁北關播穀繅絲農事競擊轅鼓腹野人閒普天齊享昇平樂炳燿神功史冊間聖武北征蕩平詩四首李孚青黄麾繡盖出天家仙氅春風引翠華切玉昆刀装玳瑁連錢金鎧䕶桃花月明嚴壁傳刁斗雲罨髙壇擁纛牙盛事軍容干氣象先聲早晚到龍沙殊方神異啓威靈天為王師掃朔庭列竈泉供花乳白連營莎接栁牙青椎牛享士傳餐遍駐馬勞軍按部聼虎旅銜恩争淬劒欲屠鯨鱷靖滄溟鐃歌千匝氣鷹揚聖慮猶勞設重防漆甲已開銅柱路繡旂重拂玉門霜何難兵氣銷金虎尚賜天書赦白狼收盡銜刀諸黨部臯蘭直北列降王百萬明光耀羽林風傳畫角陣雲深牽羊豈解彌天罪飲鴆猶非戰士心命合燃臍膏白草賞懸函首賜黄金黑山青海歌堯日照徹龍荒大漠隂聖駕南廵恭紀二首李孚青頻籌䟽瀹每軒臨特詔頒来内府金萬里安瀾知帝力九川底績見天心功同星宿源俱逺恩比滄溟水更深不用秋風歌瓠子六龍到䖏起謳吟自有祥風送鷁鳬挽牽豈必待烝徒安流不覺周千里厚賚偏教及萬夫仗引歡聲盈道路棹傳謳咏滿江湖従今煙雨垂楊岸童叟年年望舳艫出郭望西山彭寜求終年挟䇲事吟哦偶向城西側帽過漠漠晚烟横石磴泠泠朝梵出雲蘿千尋碧嶂棲眞近百轉清溪入夢多帝里自饒林壑勝㡬人蠟屐到巖阿皇清文頴巻七十七
