body:
  text: 賦喜雨賦有序張英康熙十有七年季夏之月經旬不雨暑氣煩蒸火雲麗空炎景爍物驕陽可畏恒燠有徴帝心􅅥然念雨澤愆則難冀豐穰之慶隂氣鬰則恐為災沴之由爰發徳音下眀詔懸鞀鐸求昌言嚴恭寅畏齋祓於宫肅穆精誠禱祠於帝致齋之次日乙酉隂雲四合電掣雷轟雨沛於中夜禱祠之次日戊子凉颸倐至烟霏霧結雨澍於亭午於以滌煩潤槁育物寧人皆聖心為之感而天心為之應也臣英近侍内庭備詳宸慮軄居惇史宜誌天庥猥以蕪詞忝茲盛美敢拜手稽首而作賦曰蒼蒼無垠者有象之天天心之所屬兮則在乎璇宫之側黼席之前盖君身所以配帝而主極所以承乾故眀作而幽賛兮若璧合而珠聨月維季夏律叶林鐘司辰者赤帝乗權者祝融覩陽景之南至仰大火之昏中維斯時也炎歊蒸欝熾日藴隆上無纎雲下無微風陽坂飛烟於火井羲輪銜耀於燭龍氣欲流金威能爍石濯寒泉而猶温對冰壺而如炙力已倦於蒲葵衣不勝夫絺絡萬戸千門六街九陌咸流汗之成漿或狂呼而動魄謂今茲之溽暑實罕遘於疇昔雖迎凉之殿寒露之臺珠簾髙巻綺窓洞開其如畏景暄赫烈日昭回但炎威之四至鮮薰風之南来列子何以御之而泠然椘王何以臨之而快哉是盖夏無時雨陽愆隂伏積此亢旱凝為煩燠胡以慰我三農長我百榖四野望之而警心萬夫因之而蒿目天子曰咨在予一人雨暘有忒矜此兆民沛王言之涣汗垂清問於絲綸爰咨卿貳民瘼悉陳輟朝撤膳興於朕身将有事乎南郊先致潔於眀禋於是端居穆清蠲慮澄志上逹穹蒼㨗如符契雲油油而被天雷隠隠而出地雨霏霏而入簾凉依依而生袂聽静夜之霑濡覩宫槐之含翠此盖睿念之方興已獲上靈之報賜致齋三日時維厥眀天子乃御輕輦聴鸞聲享圜丘禮太清薦紫壇之圭璧奏玉琯之韶韺穆穆乎皇皇乎合千官之肅而咸師一人之誠法駕載旋爰居爰處惟徳動天翼日而雨石燕雙飛商羊對舞雲興於西日之方午始而度鳯城過龍樓氣靄靄而如暮聲颯颯而兼秋既而滴瀝飄揚滂沱汪濊細珠濺於罘罳飛㸃侵乎綺綴其泛碧霄而下也若九天之瀑布髙轉於銀河其縁鴛瓦而注也如百道之飛泉下垂於玉砌天子坐廣厦啟彤扉歌有渰之凄凄詠興雨之祁祁任輕霑於瑶席従飄灑於御衣天澤無疆宸顔有喜爰命侍臣憑髙眺視優渥遍乎九垓霑足同於萬里豈止畿甸沐膏澤之施三輔獲田疇之美而已哉古稱雨金雨粟雨玉雨珠曷若靈雨澄映涵濡凉逾瓊液甘若醍醐良苖乍起酷暑潜驅登斯民於富夀之域而又奚有貧札之虞盖由我皇之徳馨香上聞故其動於中也膚寸而雨遍天下絪緼若泰山之雲更何藉乎土龍之屑屑與巫史之紛紛古人之言諒哉曰人主應天以實不以文懋勤殿秋蘭賦有序張英金風流火白露迎凉雲浄天髙秋空氣爽君王宵旰燕閒愛茲澄景御圖書之秘閣發清商之雅音乃有叢蘭獨榮秋殿芳香自發枝葉相扶植以青瓷圍以朱檻斯亦托根之至榮者也臣朝夕經幃味彼芳潔敬成蕪賦以奉宸懽其辭曰臣聞蘭之生也隠於空山被於幽谷故其守貞也雖無人而亦芳其徳馨也不因風而自續是以尼父興猗蘭之歌郢客和幽蘭之曲當其植根九畹毓秀三湘昔作騷人之佩古稱王者之香名楚臺而留賞啟漢殿而發祥養親續蘭陔之咏燕賔泛蘭渚之觴莫不惜茲嘉卉欽彼幽光慨自人誇春艶莫采秋英蔽深林而寂處偕衆草而叢生戱隂崖之翡翠侣芳洲之杜蘅惟敷華於山澤敢結想於蓬瀛一旦躋瓊階登玉宇拂珠簾迎繡戸泛上苑之風光含長秋之暮雨誠何羡乎蘭皋豈更思夫蕙圃於時秋也螢光熠熠蟬聲嘒嘒梧葉初驚飄揺文砌碧筒漸老将殘玉井之蓮金粟猶遲未發小山之桂爾獨披紛翠葉葳蕤紫莖花繁露重體弱香輕姢姢自賞既嫓美乎幽人之潔亭亭獨立復比徳於君子之清以此髙致怡我皇情内殿深嚴左圖右史久袪凡卉獨留瓊蘂枝垂宫硯色侵文几何馥馥之襲人每簾動而香起天子丙夜陳書漏沉宵永風入戸而蟲鳴月臨軒而人静繞燈開歴亂之花隔幔送㕘差之影更憐落卉藉以雕盤置綺筵而留盻惜餘芳於未殘喜君心之見珍荷遭遇之良難幸處乎朱門與紫闥永違乎長坂與層巒将寄言於薖軸敢託詠於崇蘭遂作歌曰有香草兮華且滋鄰玉樹兮與紫芝自椘澤兮来軒墀枝挺生兮花離離感君恩兮欣自持觀秋蘭之獨茂兮豈微草之無知駕幸闕里賦有序張英皇帝御極二十有三載重熙累洽區宇乂安文徳覃敷聲敎曁訖乃稽古時邁肇事岱宗謁祠闕里典禮崇重恩澤優深臣庶懽欣逺邇嘉歎夫元和盛年咸平昌世僅奏六代之樂修再拜之文猶垂式簡編流輝今古詎有逺御六龍親詘萬乗展隆儀於稽拜施殊敬於儒先聖徳顯隆如今日者焉洵足以超軼徃牒焜耀前紀也臣幸際昌時得瞻鉅典雖固陋謭劣不足以發揮鴻藻然珥筆承眀職兹紀載頌揚休媺敢曠司存謹拜手稽首而獻賦曰於爍惟皇繼序纂光本仁祖義昭憲考章奠玉衡於神軸握金鏡於天閶調四氣以通正龢八風而協祥於是西踰細栁東跨扶桑交河北徼比景南鄉靡不丹梯走傳碧海浮航輸琛太府𨽻名職方耀幽遐以日月襲鱗介而衣裳越萬里以入贄重九譯而来王是以化洽太和道隆邃古納九垠之管鑰總堪輿之扄戸參天地之清寧儷貞眀之作覩文軌合而謡俗同跂喙恬而草木廡軼埃壒而包混茫駕羲軒而凌三五焉天子迺髙拱垂裳中央運斗容與義林優游書藪河寳丕宣洛符誕受典學宏文銘楹箴牖探珠淵之秘筌陟玉山之髙阜徳蕩蕩以無名治熙熙而何有既乃沖然永念穆然深思曰儀象肇啟道法昭垂寖眀寖熾惟君惟師羣聖一揆六經同歸王澤下竭頌聲式微孕星鈐於上瑞錫麟紱於昌期毓龍蹲之至徳挺鳯跱之殊姿集大成於千古開絶學於来茲溯平鄉之懿躅景闕里之崇規庶㡬哉聞見可接羮墻在斯舉時巡之墜典秩釋奠之隆儀爾乃乗大路控金鑁搴翠羽捎文虹屬車按節繁吹鳴筩七萃鱗附千官景従馳道則五里十里旌門則一重再重集於泗水之上幸於尼山之宫斯時也清羽司音初陽應律葭管煙霏芝房露茁氣不慄以時寒序将周而朔易撫景物之澄鮮攬風雲之眀瑟旌旗捲而廣野回春帳殿開而暮山凝色遂乃肇舉吉祀肅奉精禋春卿賛采祠官眡牲朱火西藴元酒東陳嘉籩廣豆豐粢潔盛振羽籥之六舞合咸英之九成薦祝號之眀信導神紘之降迎穆穆宸容廱廱天縡殊禮展謁隆文錫賚覿靈爽之長存儼哲人之如在感神契以潜孚體道貞而昭對洋洋乎僾僾乎與珠庭月角授受於千載之間玉節金鏗醻答於一堂之内也禮度有嚴威儀告竣登堂入奥規周矩還瞻聖里之屼峍憩廣庭之靜便布兩楹以翼聳峙雙闕以星懸藉杏壇之修䕃挹璧池之素漣偃息於道徳之府遡泳於圖書之淵於是芝盖重葩龍斿曲柄貴擬一人尊侔萬乗述素王之嘉讃發五言之睿詠海嶽遜其髙深星雲並其輝映斯則聖天子藴道之淳風崇儒之殊敬也簮纓陪位衿佩圜橋長裾霧㑹仙組雲彯始横經以讐問旋拊石而吹匏嗣遺言於姬孔沐雅化於唐姚禮讓之容咸近光於黎獻豈弟之澤庻作人於譽髦斯則聖天子風聲之四訖文治之丕昭也曲阜名區魯原舊聚陪敦土田復除繇賦増講肄之常貟沛匪頒之異數推恩則徧及師儒錫爵則旁流支庶五經博士不遺凡蔣之封九命上公奚啻褒成之胙斯則聖天子崇徳之盛心興賢之宏務也於時采甸侯衛公卿大夫期門式道執㦸荷殳文學掌故之士垂髫戴白之徒縦觀典禮蹌濟天衢涵濡化澤屬猒道腴既雀躍而抃舞亦鳬􅇨而懽愉萬人一口聲滿公車惟我后之東巡修百王之令式答珍貺於三靈聽衢謠於百室郤瓊檢以勿祈屏銀繩而詎飾騶従清嚴儀文簡質吏不譏呵民無供億協時正律埓虞氏之省方納賈陳詩儷姬王之述職既陟山以裒對還翕河而問俗採晳陽之舊歌晞榮光之新燭朝宗滙江漢之波玉帛奉塗山之籙非漢日之搴茭乃堯年之刻玉若乃慶恵殷流湛恩四周給租賜帛省刑釋囚虛衷清問博延廣諏如天光之下濟如露濃之上浮始汪濊於五土旋奫淪於九州今又茂眀至道導揚正學虎炳龍章金追玉琢浴我以詩書宏我以禮樂盛徳登閎大猷輝卓幎六合而被英蕤鼓八紘而排氛濁誠振古之隆規開天之偉略也天子方且回輿亰室倚佩軒墀道岸先陟徳契自持庀政考業基命敕㡬辨色以臨黼扆視夜而啟彤帷定仁義中正之極稽因革損益之宜不懈冰淵之念彌勤鞀鐸之思所以泰階順軌乾荚迎禧上理隆洽茂化雍熙治方侔於砥屬俗已進於循蜚四海夀康恬於鶉居之代萬年鼎祚鞏於鰲極之儀朝陵賦孫在豐皇帝御極之二十一載聲敎浃乎遐陬威靈震於天宇蕩滇黔之頑兇殄閩粤之狂豎鈇鉞既施典章具舉崇徽稱於兩宫洽歡心於九土爰溯締造之鴻基修山陵之禋祀進太卜而諏嘉辰兮詔宗伯而稽禮經戒豐隆以灑塗兮敕招揺使陳鉦閣道直漢以澄輝兮天駟挟䇿而耀精羽林羅列以雲布兮鉤陳炳蔚而霞蒸時則斗柄夘指望舒景盈草芊芊以向榮麥茁茁其擢英廼駕蒼龍鳴鸞鈴馳玉軑仗霓旌宗正陪乗親藩奉較掌舍設枑虞衡庀幄芻藳儲於司農太常陳其廣樂詞臣珥筆以随鑣通侯巡徼而秉矟六卿之屬備官七萃之屯列幕焱焱煜煜披拂以轇轕兮翠盖金枝之旖旎也總總汨汨雷轟而電掣兮千乗萬騎之繁夥也啟閶闔而度郊圻兮道上谷之名區踰巉巖而徑雄闗兮循陽侯之所居靈龜負圖以獻瑞兮神龍蚴蟉而奉輿天吴躨跜以趨蹌兮燭隂熠燿以先驅爰抵豳岐以瞻荒作覛豐沛而眺枌榆其地形則連岡崔嵬峻嶺嵲屼廣岫四開平原中廓近擁巫閭巨鎮嶔岑巖髙洞深拓陽翕隂遥揖長白綿亘峭闢淵潭窈㝠動植焜碧他若華表通眀木葉紫荊蜿蜒環旋孕仙窟靈幽恠神奇不可殫形其水泉小則松花錦川鴛湖㳫渚淤為淖泥瀠為浦漵大則襟帶鴨緑磅礴混同滄溟東滙衆水歸宗驚濤浴日駭浪浮空其灌溉所滋地力所聚則沃茂稻粱磽叢蓒芋菓美榛松藥珍參附其鳥則鴐鵝鸛鶴鴻鵠鶖鶬鵜鶘睨水而聨翩鵰鶻挟飈而髙翔其獸則青䑕黄羊蛩蛩距虛獺麕貂狐野馬騊駼睹畜産之蕃滋洵山海之要都若夫洞闢八門周迴百雉麗譙天開雉堞鱗次其内則陌通巷接比舍連墉蘭錡柄植乎廣衢象闕聳構乎雲中有臨崇政有翼篤恭閣開翔鳯時乗御龍闗雎麟趾有侐其宫左宜文徳右昭武功櫟櫨錯列漢之星枌橑拖垂天之虹其外則岡阜蟠䕶欝欝蔥蔥山河繡柱風雨蚪松仰陵園之在望識王氣之所鍾則有分陕之卿陪亰之守聞翠華之莅止競率屬而趨走又有髫齔之童皤皤之叟咸輟耕以望幸紛駢闐而恐後則見夫鵷班匐伏雉尾中開乾情顧矚而愉怡龍馭弭節而徘徊屯雲䍐舒玉綏排金戺陟瑶階嘉樹威蕤以紛披重闥温清而邃俁端斧扆於辰居肅容衛於崇廡乃與臯伊之倫丙魏之侣斂精澄神齋心滌慮既吉蠲之允臧遂致覲於列祖建捎星之㫋樹歴天之旗駕踰輝之神駿翳曲莖之華芝翕赫曶霍蠖畧蕤綏卿賛采史誦詩宰割牲祝陳詞揚戡定之赫奕溯謨烈之燕貽玉帛陳神人暢薦馨香格靈貺鴛鷺駿奔以肅穆兮瑞靄氤氲而彌望進觩䚧之圭瓉和泔淡之秬鬯肸蠁旁融焄蒿在上槱燎熛灼於穹窿兮芬苾沛逹乎漭沆既通誠而感幽兮知景福之攸降於是歴神州而巡邊陲乗陽氣而講春蒐羃漫天之畢張竟野之罘罿蔚接陂罦罠掩邱列缺施鞭蚩尤挽鉤緑沉砥鋒天弧貫鍭騎躍房星之精車追造父之躅矢選夏服之簳刄淬昆吾之鍔凡藩落之所窒蹙罝羅之所絓幕义簇之所攙捔流鏑之所􅚹㩧飛無遁翮走無逸足廼因前禽而示服猛借格獸以示鋤兇捨翳薈之鷚麑縦巖藪之豜豵搜其吞噬之倫屠其牙爪之雄爰有勇逾五丁力若烏獲帶鮫函披兕革翋􅢣獷猤袒裼徒搏拉虎蹂貔屠狼蹵貘挫拗怒而遁潜改咆哮以踧踖遂頫首而革面卒讋伏而就磔爾乃前網開飛羽停宋鵲止馳韓盧不驚設纚沉罾射蛟捉鯨鱨鯋既罶鰝鰕就罟鮪鯉斯陳鯤鯢勿拒衆兆云獲觴行賞舉酤醴㩼燔炰㚌澍雨應時嘉禾斯播天子則勤思乎東作睠念乎萬㡬廼返斾揚麾旋虬縦螭赤汗追風叱撥爭蹄鐘砰雷􅐀廻蒞郊畿勞五校賚九扈課農桑詢疾苦𤯝災肆赦湛恩斯溥臣隣懽欣士女忭舞惟時小臣職忝濡毫才慚稽古熊館趨行豹尾随伍馬載錫乎天閑身長依乎輦路時瞻雲以咫光毎就日而承煦逢鉅典之矞皇沐深恩而振詡拜手稽首爰作頌曰於皇上天眷至徳兮聖武神功昭萬國兮顯承纉述馨香格兮滂沛恩膏蚑喙殖兮宣豫惟時式厥則兮垂衣端拱精寧一兮明良賡颺百憲飭兮萬齡夀昌永無極兮湯泉賦有序徐乾學古者辭賦之作所以鋪揚鴻業詠歌盛治然竊怪司馬相如揚雄之徒矜夸車馬侈陳羽獵組織雖工於主徳奚裨焉夫帝王之至徳要道無逾於孝曾子曰孝者置之而塞乎天地施之而横乎四海大哉其言之也臣備員史館伏見我皇上奉事兩宫先意承志聽微察渺可與虞舜姬文比烈矣湯泉之幸親承懿㫖鑾輿所過宜有紀載私恐後世不察以上林長楊之製相為比擬殊失厥㫖栁宗元云思報國恩惟有文章不揣弇陋敬攄蕪詞雖未足測髙深於萬一庻㡬矢報答於㳙埃云爾賦曰皇帝御極十有一載庶徴協應羣生畢遂鴻鴈来賔之候律中南呂之月霜清東野斗指北闕雲既浄而天髙潦将收而水潔天子於是坐總章戒臣工宣長樂之懿㫖問温井於無終乃駕鸞輅載龍旗千乗雷動萬騎雲馳石鎧犀衣之士連七萃而霧巻珠旃日羽之兵亘五營以星移其時旭日霽野慶雲靄天飛㢘雨師灑道馳烟宓妃嬴女奔走後先玉帳開而秋野生春寳炬列而暮川増曙香生槍壘之間綵繞枌榆之樹聖心維則意切承懽慈宫在路出入盤桓遇險道則親扶雕輦奉甘㫖則手進珠盤見玉色之愈和必柔色而問安欲坤貞之永固假炎液以除煩誠孝思之不匱非往代之遊觀故吉行而徐進爰駐蹕於温泉夫温泉者為域中之珍瑞亦天地之神靈白礬上徹丹砂下沉非神鼎而長沸異龍池而獨深五雲之漿比潤三危之露同清控湯谷於瀛洲濯日月於中營谷神不老川徳彌盈湔灑腸胃澡雪精神醴泉消疾聞乎建武之世神水蠲疴不數咸康之辰誠一沐而再浴延永算於千齡於焉停仙蹕設行宫樓枕嶺而倒影殿當川而抱虹長墉跨於障塞列岫揷於鴻濛閟邃而寒暑隔岧嶤而雲霧通繡帷四幕層城九重水澹澹而岸花紫烟微微而野樹紅鳴文鷁於波面奏龍吟於水中玉女乗車而進帨神人灼水而擎鐘已温和之恱體自茀祿之在躬慈聖既安皇情愉恱乃講蒐苖飭羽獵張竟野之罘設垂天之罼虎落三􅉄崇山作碣圍經百里羽林羅列馳朱汗之馬校黄金之埓紫燕晨風紅陽飛鵲凡有名駒無不畢集為之擢倚天之劒彎落月之弓金甲霜鳴於曠野虹旗電掣於長空羽毛揚兮九天絳獵火然兮千山紅乃有參伐之精負隅林莽喑嗚哮􅗏摩牙甜掌川谷嘯而風生林巒聞而振蕩天子為之抽金戈揮玉矢刄若星流簇如電駛南山白額應絃而斃谷振千羣山呼萬嵗謂聖武如我皇豈往代所能擬然後登九霄之臺宴八紘之圃管鳴而嬌鳥不飛簟拂而輕花自舞五蹄仁獸以扶輪九翼威禽以節鼓是皆聖孝之禎祥宜受昊蒼之福祜乗輿旋返傾都聚觀歡聲振地紅塵障天散貔貅之萬騎聚鴛鷺之千官皇上方且心存得一學務函三問寝龍樓聽政未央𢎞孝思之錫類謀寰㝢之乂安以河海為袵席脯麟鳯為瀡甘合萬國之歡心極尊養之多端彼夫漢帝之遊灞滻唐家之幸醴泉豈足以比隆聖世齊歴大年也哉西山賦有序徐乾學國家荷天休命聲敎四訖川嶽効職百神納貺芸生品物各得其所我皇上膺累洽之運宣重光之徳緝熙執競孜矻圖治萬㡬之暇嚮意文學将以揚風扢雅潤色鴻業猗歟休哉小臣職在載筆爰極愚陋作西山賦一篇其辭曰粤巍都之鼎建資作鎮以表疆環宅中以閎偉應形勝而光昌猗茲山之秀傑允卓犖乎冀方傍神京而稱奥衍控險阨而帶康荘乗兊方以定位鍾王氣而克當比金陵之牛首擁雍土之華陽夫其横據居庸之塞直接太行之尾天夀嶟崪乎其前芳湖渟毓乎其趾蜿蜒綿亘絡繹斐亹苕苕亭亭奕奕暐暐或竦或峙或立或起㦯淺或深或俯或企或嶻嶫而崱屴或盤礴而徙倚互日月而蔽虧受烟雲而揺曳融怡容與坦迤迢逓周以流水間以疏泉澄泓澹蕩瀠繞洄漩露白石之齒齒滴玉乳之㳙㳙瀺灂吞吐於谽谷硠􅐀坌湧於巉巖石磴欹斜而造嶺飛梁横跨而渡川則有珍禽異獸詭熊奇族毛羽繽紛齒革歴錄鵁鶄鴛鷺猿鼯麋鹿黄鳥飛鳴雌雉飲啄啁嘈睍睆之音狡獪奔騰之足虬姿松柏鳯林梧篠棗柿茂宻杶栝窈窕芍葯榮敷丁香繚繞春杏霏紅而倩粧秋楓鋪錦而如燒殆難得以備稽不能悉以名貌若夫寺宇之盛金碧之觀丹樓霞蔚紺殿雲寒飾錭鎪以彩畫錯珊瑚與木難耀棟榱而爍爍綴簾櫳之珊珊慨承平之物力撫陳迹而廻環睇碧雲之飄緲過香岫而流連瞻来青之題額緬翰墨之猶傳更逺懐於往古考碑碣之殘篇記金遼之軼事惟雙塔其宛然至於勝國諸陵邱墟莽互銷沉華表之隂滅沒冬青之路玉魚帝子之宫金椀茂園之墓一吟禾黍之詩永鑒興亡之故洵矣壮觀靈宅奥區我皇顧之其樂只且風物繁盛氣象麗都人民来往肩摩車驅遊人如雲而萃至行客眺聽而踟蹰伊天作之有自固指顧之憑依覽山河於襟袖識帝眷之在斯宜我皇之髙望更穆爾而逺思紹謨烈於文武享景福於神祗升陑識徳授簡稱詩笑秦始之陋刻嗤漢武之靡辭巨靈兮式歌且舞山嶽兮載懐載柔秉心抑抑布政優優燔柴望秩仁覃九州嘉祉駢臻愷澤殷流含情珥筆拜手吟謳乃為頌曰倬彼西山崇岡巨阜百里京師在帝左右紫氣常新地靈單厚欝欝蒸蒸離離黝黝於萬斯年受天之祐聖駕時巡賦有序徐乾學恭惟我皇上堯兢舜業宵旰時㡬運不息於乾樞應無疆於坤軸煥乎文思赫斯武怒敷天率土輦賮航琛俗已登於淳古世已躋於仁夀矣猶恐郊圻之外幽隠之域民有不得其所者将親拊循之於是舉正望秩之禮式遵時邁之文損益舊章皆應經義虎賁羽林簡發省約勾陳将啟渙號肆赦已逋給復湛恩布濩乃遣祠官備物典冊懐柔百神翠華所至始於東嶽岱宗爰及鍾山眀太祖陵還過先聖之鄉皆躬致祭焉經塗㡬於萬里往来曽不踰時供張弗煩有司芻茭勿費百姓商無遷肆農不輟耕恤菑患問疾苦懲貪墨奬㢘能觀民設敎省方之義備矣自虞周以来三千餘年復見今日微臣預載筆之末敢忘盛徳之形容哉謹上聖駕時巡賦一篇惟二十有三年秋九月天子時巡於東禮也帝徳廣運壹體遐邇靈旗既偃威弧既弛鯤溟啟而我疆兮卉島来其侍子廼奇祥異瑞之洊臻兮何茅黍鰈鶼之足紀聖人端拱京邑翼翼奉三無私建五有極協恭同敬守官遵職府事已底於歌敘兮聽覽猶勤於朝昃将采風而觀民兮必展義而徧徳若稽虞典載陳周詩司南行漏權輿震維職方先我於修守兮太卜習吉以告期玉輅徐動夫清塵兮金雞先降夫紫泥従官咸精騎而輕行兮縁道毎紆軫而解騑於是天行雲轉風輕日麗山祇傳警水后稱蹕梐枑再重貔貅七萃問土訓九州之圖飭形方華離之事後騎方動乎畿甸前驅已届乎齊地華注矗其削成濼源激其觱沸抵介邱而遂上屏鑾輅而歩至笑八駿之無庸嗟四載之已瘁修禮秩於視公陳祝冊而非秘爾乃訪謡俗就髙年靡幽弗耀靡隠弗宣進秀民而勉之嚮學兮召農畯而告之力田加慶讓於司牧釋怨憤於閭閻星斾曉移雲䍐晝遷笳吹引路鑾音度阡香稼岐穂而夹輪兮朱實交柯而承盖睇萬井之生烟兮眺千岑之凝靄屬車無塵而肅肅巻阿従游而藹藹或来歌而載賡以中孚而交泰也天子顧侍従而言曰翕河長瀆肇自皇初灑沉澹災相協厥居羣臣拜手稽首曰都禹之眀徳其逺矣乎天子神聖纉禹之謨爾乃親循版築周覽厮渠叶潤下於洪範兮幸徳水之歸墟桃花泛而無害兮竹箭疾而何虞皇情豫以繾綣兮天眷切以躊躇陋漢帝之負薪勞使者於河堤圖有蘭葉之瑞歌非瓠子之悲信安瀾之在望知錫圭之有期然且疇咨水利民隠是恤覩淮南之巨浸訪海陵之陳迹五湖積潦而横流六港淤沙而久塞匪疏濬以為功恐畎澮之莫洩将命冬官博謀長策庀器鳩工不愆於日俾慎始以圖終期一勞而永逸當斯際也降輦御舟維綃鼓枻萬乗飛渡六龍迅掣祥飈送颿宸衷怡恱詢井絡之濫觴念導江之往轍升盤巖兮設旌命戈船兮成列指南徐之睥睨俄北固兮截嵲昔者山頭匹練直視吴門今也扶老携幼徯望至尊九華眀燭百和然薰綵旃錦幄載路填闉威顔咫尺清問下民顧葢藏之實寡兮惟故俗之未新何風土之靡靡兮致天語之諄諄留再日而後發兮沐千載之殊恩由朱方次曲阿兮歴連岡與髙原見舊京之城闕臨前代之陵園樵蘇往而不禁寝殿巋然獨存天子曰咨有司之過繄元綱之既頺自匹夫而有天下不階成旅雜用王覇流澤既竭遷殷革夏弓劍猶蔵灑埽毋涴吉蠲為饎精意奠斚懿矣夫至聖之純一而至徳之廣大也然後揚舲捩柁還轅結軌問嶧山經泗水憩闕里修典祀想龍蹲兮如在識馬鬛兮於此溯圖書之亮章實孔繇之立制惟𢎞業之映暉歴元精而孚契灑奎藻之洋洋與卿雲而並麗儼對越乎兩楹加頒賜於四氏秩元公以嫓素王述眀光而追統紀可以知先聖後聖百世一揆者矣於是葭灰飛琯適當中冬千乗廻薄萬騎従容法駕言旋起居兩宫臨軒穆穆問寝雝雝爰申戒乎百司蠲疵癘以興庸省方之典既成痌瘝之恤靡窮已布徳而遍徳即康功與田功斯萬民之所以咸和而萬國之所以来同者乎敢作頌曰景運四葉憲章時巡無射應候農隙是因踐履凋枯行葦之仁天以順動煦然皆春省成守課勞問農畇興言禹功率彼河漘江表望幸往恤其民峩峩日觀觸石出雲英雄逐鹿聖哲獲麟昭答靈貺薦祼享禋錫我福極協於神人皇矣天保恭已撫辰不敢暇逸出為民勤陋彼封禪七十二君長白山賦吳兆騫猗茲山之峻極眇羣峯而獨尊秉青陽以出震標皓靈而爥坤掲龍鄉而作鎮頫鵬溟以為門㕘二儀兮永峙屹九成兮莫倫徒觀其大勢也則嶻嶭􅀢崟穹窿塘峡窈邈嶙􅯱壇漫莽䍚迴漠漠以横被崛嶢嶢而極上岠遼甸畷朔壖輢挹婁瞰朝鮮亘喬基於千里造曽椒於九天赫兮寡仇峭兮迥㧞嶺輪紏以争互巖巋嶬而相􅒈峯千仞兮縞曜璧萬尋兮瓊潔欝騁險兮干雰訬負髙兮螮霓洵東極之神隩詎西崑之可埓爾乃循覽四麓攷其周綴爰有蒼松巨林镺蔓黝邃羾天有極横地靡際既䝯坂而連延亦籠岡而嶊嶉根欐佹以鱗羅葉緁獵而羽翳拏莖含飈以欝蓊攅柯罥霧而叢倚䨠兮沉沉䨴兮黖黖歘隂火於空心蹙陽波於槎枿乍頓道而欹卧忽嶊壑而側植信亥歩之未跡知禹栞之莫暨於是黛凝複嶂烟暝虛嵐森梢陬互􅕜㙷嶄嵒景晻㫲兮䍐曜塗㳴􅀈兮増湍帀曽隂於遥巘髳荒徑於修巒杳慌㒺兮書含暮儵寥窲兮夏凝寒其中廼有黒鵰青鷂蒼鷹素鶻皎鵠碧􅀈迅鷣俊􅀈風騰猛腦霜披勁翮哢吭軥輖奮翰􅀈䎀或命儔於杪顛或接巢於枝格瞵金眸兮髙睇厲青骹兮下撃緇采翠輝殊材票質喧聒相驚淰躍自􅀢鼓觜距以増響毻羽毛而成積極翔羣之詭錯咸沸卉而斯集若夫甝之儔昆駼之屬伏􅕝長嘯豪豨奔觸麕麚昏髟於積岨熊彪睒瞲於叢木豺貘齗齗以猛噬豵豜驚透而紛逐般首勁角圜題従目昏嘷晨呴風馳雷䟮慄林振壑殷巖駥谷至乃青鼲黄鼬華貂文豽挺修毫之温潤含雕采之煒烈豆目睗睒麥髯狎獵棲跡曽冰罥蹤盛雪竄木末而騰趠穴巖而競㨗羌托體於寒陬疇効修於華闕伊寄類之夥够嗟難得而殫說爾廼林徑欲窮迒蹊半墤轉千盤而漸髙出九折而逾礙紆寋産竦􅡲㟋豁修渚響湍瀨縈濯龍之滄淵濯龍沽也欲納鶯之雙派大小納鶯二河殷雷地底倒景天外駭河流之凌薄劃巖坰而澎湃棧欝盤於廻溪路厜㕒於巉􅀈澗凝空兮誰渉崖踐虛兮儼對於是豁開直裂嵽嵲如憑抗術阡於鳥際超軌躅於雲層邈半漢以上躋軼隆巅而究升周歩山極肆目巖陘曠若砥原坦若廣庭纎條不竦卑枝䍐莖寒蕪莽莽石道㝠㝠何嶒崚外峙而唐壇内平爾乃羣巒結瑤以峻起千巖削玉以攅立頵砡含皓以埢垣􅠌􅤣繚素而叢集簉五石以相煥環百里而周羃類瑶臺之偃蹇宛瓊山之崱屴仰重霄兮可捫俯下方兮無極互隂晴於膚寸攬星辰於盈尺伏岑㟼而返眺訝雷雨之下黒爰有千年之冰太始之雪嵌空􅥥并凌庨岊六尺皚皚袤丈嶫嶫迎素秋而競飛渉朱炎而自冽嶰壑森凄以月鑒峐嶠炯晃而鏡徹乍消長於新故疇殫究其融結紛銜耀兮逺映何吹律兮可熱爾其混同之本鴨綠之原谺為神池以宅乎其間曽瀾廣潒靈液淪漣振以曲碕之巉崪繚以襄岸之駢田含靚如拭積眀若空乍風披以瀲灔倐霞蒸而潰渱鑿翠啟鱣湍之徑躡雲構蛟人之宫爾乃疏隘陿穴匳硿跳潜沫駴奔潨汨噴阿而滈瀑霅砅巖而澒溶徂南驟北趨浥聚谼淯靈源於千頃瀹神委於二江若其堪竇之所潜演穹㕎之所澓激漼似碓投洞若機疾並騰傾而灑珠遂奔揚而綴璧羣流既渫四派廼馳瀺灂崇岑喧豗峻岐颯㳫雨集潎洌烟霏挂流曽碧之表淪波空翠之隈倒銀潢而半瀉矯皓蜺而迥飛於是澹泞安翔䖤蟺四㑹溔溔混濤滮滮振瀨抑魚龍之餘怒集大扺而為滙㴸兮永指皛兮徐邁出乎松花之陬注乎鳥龍之外所以宣天綱之含布壮􅃋野之襟帶若攷其瓌奇之所窟宅珍瑋之所景彰則夜珠流照於素波頳玉攄采於青岡人葠抗莖於椵隂良楛挺笴於松陽靈蚑驂螭而容與羽人撫鶴而棲翔畢山經以撰異莫茲岳之靈長至其出納望曦懐吐雲霧苞隂陽以靈秘通元漠而神䕶小衆山於堥敦渺七表於指顧嶇􅋂則千市未殫縹素則萬重紛聚頓挺㧞之地軸俛嵯峩之天柱故能上當辰曜仰福帝居抗基卓犖翔勢扶輿踞蒼門而表神宅並青岱而闢仙閭赩彤雲之晝聚焯紫氣之晨敷孕造夏之玉字識臨代之寳符啟式廓於祖烈増景鑠於皇圖蔵瑶牒兮可竢涌金精兮詎誣瑞我清兮億載永作固兮不渝皇清文頴巻四十一
