body:
  text: 詩七言律詩恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻裘曰修丹地恩華釀作春階陳百戲席羅珍兕觥晉酒昇平宴鶴髪垂紳弼亮臣光賁尚方雲錦麗香分仙品露芽新便蕃異數簪毫紀义手槐㕔日㡬廵奎章舞鳯字廻鸞捧出齊峩七等冠一串珠璣天際落兩行纓紱日邊看黄金鑄額霞成彩白玉為堂雪作團任是汀洲鷗鷺侣都來瀛海泛澄瀾莫論璧合與珠聨寧獨風雲月露篇此日眞成千載遇後來還數㡬人賢探從碧落非無路歩入藍田更有烟為問三山定何許不將縹緲羡神仙一堂和氣樂融融天語欽承識聖衷當宁即今勞寤寐吾儕何以答髙崇百年恰値文明盛三接從知禮數同香案前頭齊拜手珮聲眞在五雲中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻陳邦彥詞館叨榮四十春白頭重預御筵珍因文見道承謨訓拜手賡歌契主臣亘古未逢恩數異至尊親幸物華新百年文治今逾盛甲子初開第一廵仙署虹梁集鷺鸞玳筵高啟重儒冠雕盤玉饌盈前列廣樂鈞天對御看風遞歌聲纔數轉日移扇影巳如團奎章累幅成分晷㸃筆疑傾萬丈瀾簪裾璧合與珠聨宴鎬還歌魚藻篇共勉杜房扶雅化湏知沈宋亦前賢頒來文綺榮章服分得冰綃染麝烟何幸大羅天上㑹廿年閒散復登仙寒花迎輦被春融瑞旭祥雲洽聖𠂻萬巻賜書緗帙富五行頒賚湛恩崇波添鳯沼風光麗澤滿瀛洲雨露同文物京華陳雅奏聖明聲教溢寰中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻鄂容安槐堂新構動陽春仙掌淋漓飽御珍講易漸逢來復候題詩重賜集賢臣雲霞日麗文章煥甲子天開禮樂新千載崇儒懸曠典非闗封禪咏時廵木天尺五駐儀鸞階下從容進徳冠花入小春鐘外暖日融羣玉鏡中看侍臣分韻裁宫錦内使擎香剪月團文宿七星環斗極瀛洲千頃助詩瀾宸章飛灑湛珠聨周雅靈䑓又四篇地接西清承雨露身依東觀愧材賢三竿日轉聞天樂十月風和駐御烟華葢晴暉凝不散衣冠樓閣總神仙青㝠契合動昭融乾惕彌深聖主衷信以吁俞成典誥毎於風雅見修崇星邊使節東都至日下分箋北序同泮水於論心獨切瞻依長在五雲中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻觀保景風何處不流春曠典傳為翰墨珍文運逢時歸大雅君恩破格到儒臣木天但覺三冬暖芸葉都含五露新從此蓬山添故事玉堂曾被玉鑾廵繚繞霓旌控紫鸞槐㕔羅列拜貂冠雲中樂奏從容聽天上詩成絡繹看酒泛宫壺心醉徳筵開鼎鼐錦成團欲知帝澤深何許千尺波廻太液瀾薇垣奕奕五星聨嘉宴爭歌在藻篇學海難窺天子聖師門惟淑相公賢賜來雲錦分宫綵望去銀毫篆墨烟顧影乍驚凡骨蜕瀛洲今日㑹羣仙清冰朗映玉壺融一片虛明屬聖衷聲教訖於寰海逺恩光直與斗山崇唐虞之際將母似秦漢而還未可同五色雲邊廻輦過日華恰好麗天中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻于敏中集賢初啓澤如春燦爛瓊筵列八珍豈但詞林傳盛事果然聖主得賢臣文聨東壁圖書滿詩叶南山松竹新此日天顔知有喜聽來鵲語繞簷廵高梧翽鳯竹棲鸞仗下西清集珮冠宴鎬恍同天上坐登瀛逺勝畫中看薰絃再撫卿雲爛法酒頻斟湛露團聖學淵深涵溟渤酌蠡何幸得觀瀾堂陛情敎上下聨侍臣同詠栢梁篇肯持薄技矜詞藻願凛躬行志聖賢黼座千秋思進鑑金泥五色陋升烟由來官職因人重敢説蓬萊地是仙殿頭天語似春融從此詞垣奉折𠂻百六十人恩並渥億千萬載道彌崇記言竊喜昌期遇保泰還欽一徳同試向西奎瞻北斗紫微佳氣碧霄中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻董邦逹璇霄大啓玉堂春盛世川岩並效珍恰喜乾行逢泰運從知聖主重賢臣蘭臺寵錫圖書富册府光華禮樂新法醖遍霑歌既醉不湏監史繞筵廵沙堤一帯集鵷鸞喜溢層雲日戴冠上相台階容接座鈞天法部許頻看頒來瓊笈兼文綺捧岀花箋並月團稠叠天恩眞異數只慚學海未觀瀾堂陛賡歌一徳聨雲霞絢采仰鴻篇尊師已見崇先聖朂徳從敎企昔賢讌罷金莖滋湛露歸來錦袖惹香烟詞林掌故應重紀底説坡仙與謫仙甲子瑶圖淑氣融九重乾惕切淵衷登三咸五神逾凛舜儆堯咨業倍崇華葢騰輝天意恊鰲峯忭舞衆心同小臣竊幸依瀛海長沐恩波浩蕩中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻宋楠御墨曾題閬苑春驪珠字字總兼珍重揮金薤琳琅句遍及瀛洲侍從臣天禄餘光垂照逺玉堂佳話紀聞新獨慙聖製高難和濡徧霜毫日㡬廵左安門外集鵷鸞拜賜齊峩日下冠寳紵欲尋刀尺製龍縑仍入畫圖看高麗紙砑輕雲母普洱茶分小月團秘笈琅函尤鄭重敬從學海溯波瀾華蓋星光七曜聨玉書重叠典謨篇桓榮車服由稽古張説文章在集賢乆向池頭霑雨露可無筆底走雲烟房謀杜斷千秋業未要人呼是謫仙讀書氣習漸消融想像唐賢好折衷無逸圖曾摹宋璟欽臣於乾隆元年蒙命無逸圖賦散館濟時策尚愧姚崇天根月窟階原峻道籥言筌理本同仰覩乾文常炳耀離明垂象日方中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻鶴年天臨清署乍囘春川嶽瑰姿盡獻珍共慶文明開册府頻將優禮及詞臣賜來玉軸羣書富望入璇霄湛露新待漏北扉魚鑰動森森劍佩敢逡廵日華東畔集鵷鸞翠輦過時盡整冠玉佩親承天子顧雲韶特許侍臣看龍章寳篆金為字碧網朱甍繡作團喜起一堂霑聖澤鳯池倍覺長文瀾栢梁嘉燕肅班聫侍從羣歌既醉篇賜錦巳知逾舊典登瀛實覺愧前賢日邊彩耀金蓮炬衣上香飄御鼎烟彷彿身遊閶闔上何湏蓬島始稱仙運際昇平萬象融夔龍碩輔慶和衷謙懷肯襲金泥陋睿慮彌兢寳位崇直擬醇文追典誥未湏訪道向空同欲知保泰無窮意盡在天章七字中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻吳應枚冰曹帝賚十分春蓮炬金輝豈足珍親莅蓬壺排綺讌特隆輔弼領詞臣翬飛剏見櫩楹燦架揷欣看巻軸新千古巻阿差嫓羙游歌還只為時廵夙駕遥聞噦噦鸞登瀛門外肅衣冠三霄澤較瓊林勝五色雲連藝苑看湩乳酒醪香作液新聲舊蹟錦成團笙簧奏罷丹墀靜泉湧紛飛筆底瀾雙瞻寶翰日星聨寸晷從容可百篇不獨揮毫詩入聖從敎見道士希賢硃題捧岀凝霞彩黄帕傳來帶篆烟一自近光聆至訓儒流何必豔稱仙典冊淵涵義類融精研理藴復虗衷底湏封檢詞踰侈所望箴規徳進崇三館獨叨珍賞備舉朝齊慶泰交同颺言莫罄葵忱向願溥陽和徧域中恭和御製駕幸翰林院賜宴分韻聯句後復得詩四首并示諸臣元韻徳保六龍到處即陽春宸翰高懸照夜珍奏賦漫言惟漢帝登瀛已覺愧唐臣風雲際遇賡揚古甲子昭囘禮樂新鴛鷺叨陪瑶席末他時玉輦望重廵鳯池新築迓鳴鸞典禮雍雍儼劍冠萬舞簫韶徐入聽九章衮冕近容看風和大地旗光定日麗中天扇影團擬向君王歌白雉秖今四海慶安瀾無縫天衣不屑聨俄看珠玉已成篇縁思俊彥開清秘為致英才闢集賢遲日漸移金輅影微風細裊玉爐烟擎來綠篆雲霄上菲質深疑閬苑仙乾坤瑞氣藹融融聖帝元臣喜合衷先後共由斯道覺古今初見此恩崇嘉賔醉飽無差等王制尊卑有異同宴罷羲和扶日馭仰看紫極五雲中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻秦勇均翠葢擎來滿署春欲從冊府探奇珍道光二典文明主禮重三朝館閣臣宏敞木天規自昔輝煌丹地象初新玉堂典故多傳紀曾見金根到㡬廵敢謂瀛洲集鳯鸞朝陽眞喜慶彈冠宫懸韶濩堪同聽秘府圖書許共看宴傍御筵香繞座綵連雲栱錦為團恩波深沛儲才地網底珊瑚岀海瀾昭囘雲漢五星聨大雅宜歌壽考篇聖藻流輝文見道皇情圖治寶惟賢薪槱也共芝承露巖壑還看玉吐烟一徳交孚黄閣老盛朝眞有地行仙芸閣飄香瑞靄融寵光逾分荷宸衷共知有喜天顔近願贊無疆帝業崇左右史書霑化乆古今圖籍賞心同觀文肇啟千秋運虞陛欣瞻日正中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻栢謙芸署風光早迓春延英最重廟廊珍星辰光啓圖書府雨露恩周侍從臣地接龍光雲日近聲傳鳯沼管絃新宸游信愜來歌意秘苑先邀翠輦廵翽羽聨翩集鳯鸞升階拜舞肅朝冠筵開分錫清班韻句就齊陳黼座看曉日光華張錦幔瑞霞明麗映花團天顏有喜重揮翰學海難窮萬頃瀾杯浮玉瀣錦茵聨愷樂還歌在鎬篇調鼎允宜崇舊傅登瀛何必讓前賢藏書東觀充雲棟珥筆西清引篆烟親見大羅天上事霓裳同詠聚羣仙文治光昭景象融訓詞敦切厪宸衷材如房杜名無忝理究程朱學始崇寵賚有加承澤厚感恩交勉此心同矢音欣繼巻阿咏常在和風化日中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張映斗三霄長借玉堂春燾育羣才擬國珍光映台階連壁府頌申聖主得賢臣鈞衡翊贊人惟舊户牖箴銘徳又新咫尺蓬瀛邀玉􅋴崇文式化邁時廵梧桐棲鳯竹棲鸞拜舞循牆共整冠法曲便從天上聽寳書長向月中看龍鱗偃水雲流影燕綵飛花錦作團湛露均沾恩澤厚總歸聖海拓文瀾帝歌先引韻分聨孔思周情仰睿篇契合薪傳文載道埽除稗學士希賢雲開黄幄調珠露日麗彤墀起玉烟式讌禮成頒賜渥璘㻞十賚軼眞仙康衢歌鼔逗春融保泰勤惓切聖衷官進三台增壯麗禮隆一徳備優崇天家雨露儲才廣國計綢繆作室同獨愧小臣無補報葵忱惟慶日方中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻楊述曾帝車東指藹生春册府圖書廊廟珍直以夔龍咨碩輔不將嚴樂許詞臣明良巳慶堂廉叶文物應同日月新豈似開元誇盛典祗希玉檢議時廵式燕賡歌集鳯鸞金貂此日羡儒冠簫韶九奏行雲遏龍衮三霄近日看香茗分擕甘露渥青綾拜賜麗花團玉河咫尺榮光滿蓬海何湏溯紫瀾羣玉琳瑯插架聨光躔巍牓耀鴻篇願書萬本勤稽古不愧千秋號集賢况沐恩波深雨露頻頒睿藻捧雲烟文章報國慚無補敢擬人稱閬苑仙陽和十月儼春融化入絪緼愜聖衷巳被需雲霑澤潤還期泰陛翊功崇光華代値文明晝翔洽歡徵品類同仰望日輪皇鍳逺葵心長捧五雲中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻鍾衡六龍翔馭紫微春光照儒林列異珍已勅金蓮歸鎖院還書玉署付詞臣登瀛自昔文章盛錫讌於今雨露新禮樂百年成鉅典雍雍清禁喜逡廵阿閣新巢集鳯鸞羣臣拜舞肅衣冠風吹簫管雲中聽日射旌旗樹裏看寳鼎分來流玉液琅函賜岀簇花團侍臣初試紅絲硯沾得恩波助筆瀾瑞靄文明星斗聨頒來宸翰玉為篇瀛臺典籍新承㫖冊府圖書舊集賢鳯詔九華臨日月龍章五色燦雲烟應知聖主儲才地不着蓬壺别院仙賡歌喜起色冲融業業兢兢仰聖𠂻直以泰交期道廣還將謙受致功崇周王鎬飲差堪比漢帝汾歌未足同千載一時洵曠典百僚瞻拜五雲中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻程鍾彥陽和早逗帝臺春冊府圖書啟祕珍道徳光華依聖主昇平翊贊引元臣鑾鳴上應星杓麗翬跂羣瞻夏屋新萬古貞符金簡在蓬山咫尺紀東廵桐䕃高岡集鳳鸞五雲閣下進賢冠珠躔毎効辰居拱寳籙先呈乙夜看南浦朝雲飛作棟上方春綵結成團九霄瀼露宣恩澤滙向瀛洲作紫瀾七政祥開珠璧聨賡颺稠叠和瑶篇天心獨契文為道儒品還期藝且賢國寳球圖輝日月人材臺閣接雲烟文明鼓吹由經術豈讓璈琅振列仙璇題寳翰日華融奬勵恩勤仰聖衷義篤臣鄰風自古心懷兢業徳彌崇長昭著述千秋盛且喜諴和萬國同載筆摳衣歌在藻作成還記定方中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻鄒一桂玉堂良月早囘春秘笈傳來冊府珍四庫分書榮祿閣三㕔講幄重元臣登瀛事續當年盛賜宴筵開此日新咫尺木天聞警蹕鳬趨鵠立共逡廵銅街旭日聽和鸞冰署爭彈貢禹冠鈞樂喜聆宸座奏雲章得近御屏看茗頒六詔黄金嫩錦錫三吳紫鳯團最是天書擎捧岀洗眸開帙慶觀瀾柏梁裁體比星聨七字留傳樂府篇張説詩名唐代律鄒陽才愧漢廷賢盃凝湛露承金滴筆染爐香裊篆烟十載臺垣分籍乆今朝重㑹大羅仙英英壁宿瑞光融肅肅鵷行簡帝衷疏瀹詞源儒術裕主持文教聖功崇六經鼓吹鳴庥盛萬國車書仰大同賡拜明良新甲子璣衡舜日正天中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻孫灝東觀綸宣藹若春吾皇重道引儒珍賡歌拜手逢昭代啟沃推心倚碩臣鳯羽雍容丹地密翬飛燦爛玉堂新歡同宴鎬隆儀肅執爵油油禮㡬廵曾叨侍從接翔鸞復預恩光戴法冠玉軸琳琅三殿錫奎文重疊五雲看聲鏘仙樂鈞天奏坐繞花甎旭日團縻爵亦思酬尺寸涓流何以測洪瀾華葢親臨鷺序聨龍光寵賚蓼蕭篇文闗忠愛寜無本學但詞章未即賢芸館丁冬鈴索語槐㕔縹緲玉爐烟開元豈擅論思室不取慿虛號集仙垂衣黼座日沖融頌不如規感聖衷莫侈仙班蓬島近期增微壤泰山崇升賢殿改蘇裴和高議泥封漢宋同獨仰宸章謨典合願持兢業一言中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻楊開鼎葱鬱光浮閬苑春崇儒寵遇廟廊珍中天雲日瞻明聖東觀文章重老臣祕籍只今弦誦永寳書此日墨華新一囘拜舞賡歌後詩滿霞箋酒滿廵綵仗横空起翠鸞微臣新着惠文冠蟲雕七字含毫獻鳯吐連篇搢笏看至意交孚春藹藹湛恩汪濊露團團漫言伴奐巻阿樂翰灑文波見學瀾君臣交省意綿聨不岀堯咨舜警篇春酒鎬宫傳盛事秋風汾水陋前賢玉堂鈴索揺清韻寶檻簾櫳裊素烟此日西清多樂地都人爭羡紫霞仙一徳明良瑞日融笙簧酒醴樂和衷牙籖義闡程朱祕綺繡光分黼黻崇樂奏九韶音許似詩裁二典意堪同體元天子調元相文敎昌明允執中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻周孔從六龍飛御玉堂春恩錫瓊筵盛八珍講侍金華優上相光分太乙屬詞臣賡歌雅叶宸章麗提命重頒睿藻新歡洽盈廷沾既醉蓬山好景樂周廵金鋪瑞色集鵷鸞環列華茵拜冕冠禮樂三千欣共覩畫圖十八喜重看瑶筐再捧丹霞錦碧椀新烹紫鳯團澤似玉河流浩蕩總歸瀛海壯文瀾星輝璧合與珠聨殊勝菁莪棫樸篇要識時康呈國瑞端由主聖卜臣賢摩挲石刻文垂露披拂牙籖字帶烟三島十洲何足羡長依紫禁即眞仙喜霽天顏暖日融䖍瞻黼座凛葵衷西清式燕恩波渥東壁聨吟典禮崇賀燕遷鶯今日共翔麟翥鳯萬方同聖情有眷箴無逸一徳明良景運中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻邵齊燾堂廉交泰澤如春燕喜榮分御府珍天上鏗鏘聞帝樂階前賡拜慕虞臣百年學殖栽培舊九載文思砥礪新劉井柯亭光睿筆仰承恩寵共逡廵蓬山賜宴㑹鵷鸞髦士峩峩共正冠璇命對揚稽首拜瓊章暉麗舉頭看太陽俯鑒葵心向小草均霑露彩團頃刻九重飛帝唱文河齊許導漪瀾歡迎六御肅班聨拜賜羣稱天保篇文裕經邦宣大道榮邀稽古邁前賢葳蕤秘籍餐鴻寶紛郁宸章薆慶烟葑菲濫陪香案吏登瀛人説是神仙昌期文物道光融舟楫鹽梅簡聖衷伴奐游歌歸豈弟頻蕃錫予荷珍崇臣才忝厠鄒枚後帝徳惟應堯舜同珥筆揄揚難遍述我皇經緯在時中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻竇光鼐蓬島初迎十月春聖皇崇奬廟廊珍簪毫幸際敷文代授簡榮稱博物臣金鏡光華千載耀木天堂構一番新瓊筵法酒甘於露心醉渾忘第㡬廵藝苑摛華集鳯鸞渾如新沐共彈冠北辰星聚知環拱東壁書全得飽看靜聽梁音三日繞榮分錦段百花團天恩浩蕩眞同海觀海無能但溯瀾煌煌寶訓朂班聨匪但詞追雅頌篇謙受徳崇兼志下泰交主聖望臣賢資清試酌冰甌茗氣直欣看玉鼎烟身到蓬山驚且愧凡才何以侶羣仙太和宇宙氣冲融調爕還資共濟𠂻百谷轉忘滄海大一拳也贊泰山崇松扉颺拜遥堪嫓玉檢荒唐逈不同湏識右文歸重道宸襟披豁聖謨中恭和御製駕幸翰林院賜宴分韻聨句後復得詩四首并示諸臣元韻張泰開湛露需雲藹若春蓬山式燕集儒珍遥聽噦鳯歡多士欲作和羮重老臣日到花甎猶是舊星開壁府巳催新蘭臺自古儲才地得奉鑾輿次第廵瓊林只合待棲鸞敬仰天章共整冠字軼鍾王隆錫予詩成珠玉許傳看裁身宫錦分鴛綺沁齒天香散鳯團瀛海恩波原㶑灔今朝新為注銀瀾璇牓金題壁宿聨瑶箋復又璨鴻篇王言渙汗崇稽古帝念殷勤為集賢墨瀋萬年枝上露香縈太乙殿頭烟微臣幸得陪簪筆始信人間自有仙月應陽春日正融昇平曲讌愜宸𠂻恩霑雨露由來渥身傍雲天未比崇詎有文章供潤色畧知帖括愧雷同賡颺更識王心一盡在持盈保泰中皇清文頴巻八十九
