body:
  text: 詩七言律詩聖駕北征凱旋詩四首史䕫鉤陳肅肅䕶黄麾電轉雲屯百萬師決策廟堂抒獨見運籌樽爼破羣疑靑郊選士春蒐練紫殿論兵旰食遲親總六軍深意在機宜不遣外廷知雲䍐霜旌照泬寥萬靈呵䕶百神朝春泉脉動波横溢朔雪花輕凍漸消為帶餘寒弓力勁緣滋嫩草馬蹄驕藩維部落歡呼拜聖武敷天自布昭天兵耀日震邊陲雷動星陳絶幕時王會羣矦環赤帟軍容千里閃朱旗霜笳雲火連亭戍金柝銅刁匝殿帷武節焜煌師律整祕圖誰測八門竒諸道分兵本廟謨妖星一箭落邊隅逆天豈得逃寛網背德終當受顯誅地極空桐廻北斗日臨窮髮似東嵎鞭梢一拂三千里盡仰神威曠代無賦得雲裏帝城雙鳳闕史䕫金掌銅樓直望遥鈎陳肅穆萬靈朝千門碧瓦排銀漢八表華星拂綺寮松棟煙霏衡岳柱芝楣霞繞赤城標侍臣日在紅雲裏不覺衣裾染絳綃賦得雨中春樹萬人家史䕫罨畵層嵐匝遠岑黛雲繚繞子城陰短桃巷陌紅猶濕新柳亭臺綠已深屋角墻頭流靄靄橋南溪北漲涔涔煙簑雨笠春郊路桑柘千村父老心南廵賜第恭紀聖恩詩二首孫岳頒頻年賃廡嘆蹉跎忽向人間上大羅閥閲敢期容駟馬門庭應許接鳴珂久耽樸素除丹雘仰荷榮光到薜蘿廣厦庇來歡自足帡幪世世感恩波自昔徒聞甲第榮承恩今日倍崢嶸頻施雨露庭階潤絕遠塵囂耳目淸近侍風驅傳帝命微臣雀躍感皇情有懐報稱慚無地惟願端居詠太平奉命赴暢春園寫扇䝉恩特賜筆墨恭紀四首孫岳頒别館深居西郭遥水廻山抱建霞標卿雲偏擁林巒秀佳氣中含景物饒避暑暫違靑瑣闥封章仍奏紫宸朝承恩宣召趨蹌急何意層層歴絳霄鳳舞龍飛仰御書臨池真媿奉宸輿扇分斑竹千竿秀畫展湘江八景餘放眼山林神淡遠寄情花鳥筆蕭踈恭題祗覺難相副珍重應憐腕未舒文物遥傳映日華捧持給賜出皇家松烟紋簇雙龍脊鏤管毫生五色花豈有法書邀鑒賞敢當天語重褒嘉拜恩彌覺滋慙汗優禮儒臣洵莫加誰云烏玉久如新謾説䝉恬造自秦詎似龍香調御墨寜同翠羽飾湘筠㑹磨端石承零露好寫藤箋絕㸃塵從此茅齋增氣象祥光隱隱麗三辰神武北平詩八首陳元龍祥開寳歴應璇樞翕闢神功煥帝圖九譯環裘歸正朔兩階干羽叶元符久知薄海恩皆渥豈有殊荒教未孚天末一星餘畢昴重煩玉弩振威弧借箸盈庭總未工天開祕略自宸衷靑邱丹浦書空紀洛水徐方事不同七萃有聲知禁旅五雲無際是行宫莫言萬里流沙遠只在皇綱咫尺中陣雲不散結黄埃箭落驚看候騎廻十萬蛇鱗新浴日三千鼉鼓競鳴雷峯盤束馬從天降路轉懸車鑿空來設險早從三覆在前軍已掃白雲堆雨雪遄歸又出車依依楊柳映鑾輿王庭坐待三犁後别部爭收七縱餘宛轉黑河人渡急崔嵬陰嶺馬行徐聖朝不是勤雄略只為蒼生鮮定居忽報軍書夜刺閨朱旗已過五庭西指揮俄見旄頭落談笑翻驚太白低礪盡戈矛人共怒蹋平關塞馬猶嘶拂雲祠下年年酒從此秋高罷鼓鼙振旅狼山度翠旛龍舟天外溯河源大荒自古無人渡斷岸從今有棹痕斗象南看皆奉朔流沙西去亦稱藩穹廬悚息同編戸不用黄雲塞上屯閒盡墩臺見月輪賀蘭山外斷驚塵邊關不唱從軍曲蕃長新為守土臣聲教已看周地軸威靈直欲逼天垠從來異域書難信今日輿圖遠更真倒傾銀漢洗天兵更覺乾坤氣象明不用披圖横玉斧盡收絕塞作金城山川一氣歸仁壽雲物千年紀太平陬澨有知齊擊壤好將歌頌佐咸英南廵扈從恭紀五首陳元龍康熙二十八年正月初八日駕由南苑行圍出南紅門城南膴膴是周原路轉橋通入苑門斾擁三辰環日馭營分五校列雲屯馬馳朱汗圍初合兎帶靑莖草乍翻日暮晾鷹臺下過香塵匝地不聞諠十三日立春駕駐德州斗柄初隨玉輅東春神捧日曉曈曨條風乍拂朱旗上瑞靄先回翠幄中衛水冰消微隱綠平原草暖暗生紅豫遊到處恩膏沛歡洽靑疇樂未窮十四日駕駐平原縣七里舖特發諭㫖蠲免東省明年正賦靑齊又見度金輿省俗重煩問里閭共覩民風安作息還傳天語沛蠲除推恩寜待廻鑾日草詔頻催下馬餘聞命濡毫先拜舞從今汗簡不勝書十六日駕幸濟南廵撫署内觀珍珠泉命扈從諸臣各書匾額諸臣仰請御書留題以光名泉上親灑宸翰書作霖二大字鵲峯晴雪映龍旌六馭飛臨歴下城紫氣乍從珠溜轉靑陽初向碧潭生虛能鑒物廻天眷淸可澄懐悦睿情一自亭邊排綵仗靈湫千古被榮名二月初二夜泊錫山碧山如畵是梁溪綵幔華燈處處齊百和香風隨枻轉千條銀燭隔林迷霏烟徹夜圍黄幄微雨明朝展綠荑不是江南晴日少隨鑾膏澤沛春畦南廵聖德詩有序陳元龍欽惟我皇上御極三十有八年膏澤殷流德風遐暢文思光被武烈昭宣五典慎而百度貞七政齊而九功叙懷生含氣均被太和喙息跂行並霑汪濊聲教暨訖罔不率俾囘面受吏者越漠而踰沙執贄貢琛者棧山而航海比歲肅淸甌脱迅掃欃槍剷壁壘於遐荒熄烽烟於邊徼關山萬里長無横草之驚區夏億年永絕鳴尨之擾中外禔福神人洽和惟是淮揚諸郡漕輓攸關歲委金錢時聞衝決用疏用塞徒陳賈讓之言治委治源莫定桓譚之議俯允臣僚之陳請親御玉輅以廵行更以呉會淸嘉東南奥壤兼行補助加意撫綏河嶽懷柔百神從令惸嫠歌舞萬姓慕恩而我皇上治功久洽於寰區孝德彌隆於宫寢慮省方之將出或視膳之久虛海晏河淸喜奉慈闈而養志途吟野忭敬扶寶幄以觀風維時惠風條暢淑景舒遲妍卉敷榮新荑挺秀桑鳴戴勝正虞書覲岳之辰水涌桃花值禹橇濬川之日言從淮右届乎平江乃自浙西歴於建業所至條狼之士弗唱辟除戴鶡之倫罷傳警蹕炷香夾道設綵連衢士女頒斌連槸而瞻豹尾旄倪雜遝企踵而仰龍顔正屬三春恭逄萬壽卿雲翔而捧日神光起而燭天里溢絃歌塗交酒醴我皇上布天澤宣綍音法網解而囹圄空田賦蠲而閭閻阜關征鹽筴並沐恩波耆老秀民咸霑湛露𢎞多士登進之額開長吏自新之門民事艱難無微不照田間淪棄有美必收王言如絲下應如草農蠶賔旅泛習習之凱風呉越靑齊被祁祁之甘雨三辰合慶九宇同歡惟我皇上體休戚於窮檐通寒暑於丹禁夙興宵寐念切痌瘝立政用人計安黎庶俯臨淮海親辨疏濬之宜細察黄流指示決排之策神謨廣運厚澤沾濡夏長春生顯仁藏用瞻依愛戴者真如赤子之慕庭闈蹈舞謳歌者幾忘至尊之臨愚賤自唐虞而降未覩此風即開闢以還罕聞其盛臣西淸末品東觀庸才幸叨侍從之班親覩時廵之典擬濡毫而作賦莫能名聖人之仁願搦管以攄詞詎足揚天子之孝欣逢盛事聊效衢歌謹撰七言近體拜手以獻興朝孝治被寰瀛此日廵方盛事并長樂宫開移畵扇金根車動出層城綠波晴泛牙檣遠香荇風廻鳯鷁輕養志怡顔隆聖母神厨應見萐蒲生其一黄流勢與運渠連衝決常糜太府錢禹橇昔曾行水土舜瞳今復閲山川源流一覽宸謨定修築隨宜睿算全從此河宗長效順千檣漕舸往來便其二平江一水即呉趨風會淸嘉實奥區文物總由陶鑄盛桑麻憑仗雨暘扶十年心憶鑾旂幸三度恩邀法駕紆虎士前驅除警蹕萬民齊仰睿容愉其三雞翹豹尾泛安流周覽郊原庶彚稠宫扇影揺桑日麗天衣寒上麥風柔祗循繡陌移靑雀不許雕鞍破綠疇自是聖心憐稼穡扶犁野老拜龍斿其四北溟南極壽無疆閶闔行宫淑氣翔五色日懸天上瑞萬年人進御前觴斑文錦綴交衢幕鵲尾爐焚夾道香民力從來勞軫恤不教父老費壺漿其五末作辛勤亦可憐皇心軫惜次農田關門澤逮輕軺算鹽筴恩流減籍錢商舶賈帆覊滯少水郵山驛踏歌連紅亭鼓吹諠闐處甲煎香濃結紫烟其六勾陳容衛曉駸駸比戸歡傳法駕臨檻外綠波麰穟秀馬前香錦菜畦深野人滿飽天厨味耆叟歸擕太府金更許蕃民還舊國佇聽八極徧謳吟其七沃野春深景物滋省方到處念農時杏花菖葉留宸矚桑扈耕犁入睿詞筆灑龍鸞騰墨海韻鏘金玉煥文思寸陰還惜船窻暇風度牙籖桂棹移其八辛丑元日紀事二首有序陳元龍康熙辛丑恭遇皇上六十年寳祚初周早朝慶賀禮畢偕相國馬齊松柱蕭永藻太倉王掞華亭王頊齡及遂寜張鵬翮大司農陽城田從典大宗伯貝和諾德淸蔡升元大司馬孫柱大司宼頼都韓城張廷樞總憲黨阿頼十四人詣乾淸門獻壽時華亭年已八十松蕭太倉三相國遂寜陽城皆年七十以上馬相國貝宗伯孫司馬頼司宼黨總憲及元龍年皆七十蔡宗伯年六十九張司寇年六十八真一時之盛退朝漫賦以紀其事軒紀初周六十春華簪白髪對丹宸太平天子真仁壽矍鑠臣工仗聖神竊祿幸逄全盛日趨朝相慶古稀人耆英不向林泉老大位高年笑致身未許懸車又退朝雍雍金紫髪蕭蕭鴛班首列皆黄耉虎拜歡聲在絳霄近沐陽和天上坐不知歲月暗中銷沍寒未解遲春信徙倚閒庭望斗杓南書房侍直䝉恩引至西煖閣俯垂淸問命題賦詩作字恭紀二首徐元正十載含香傍鳳池承恩常得上彤墀班聨左史頻簪筆召對深宮命賦詩衣露未消聞晝漏玉琴在御引凉颸是日詩題衣小臣露淨琴張何幸陪前席願竭葵衷報主知鬱蔥佳氣滿皇宫寶篆凝香裊碧空委佩時看瑶草綠抒丹還映石榴紅揮毫悚切雲霄近授簡慚非鄒馬工却羡流鶯飛禁樹數聲睍睆向薰風咏院中古槐劉坤扶疎修幹拂雲長振葉揺風得午涼樹綠最宜深院好花黄猶似昔年忙新開兎目當寒食久結龍鱗照上陽不用子山新賦作良材端是際時昌皇帝聖德神功親征蕩平詩四首查嗣韓赤羽遙翻豹尾紅至尊親出總元戎琱戈電閃蒼龍近玉勒風飈華蓋雄盡闢山川開輦道共依雲日就行宫誰知天子麾黄鉞甘苦先偕士卒同邊城百道走軍符上將紛來聽廟謨三覆掩時藏玉弩八門啓處伏金弧地中雷鼓師無敵天上旌旗戰有俘縱悔厥心何太晚噬臍今已累妻孥輜重漫山委道旁六軍傳箭射天狼宣威瀚海鯨鯢觀耀德中天日月光塞北風雲開正朔幕南版籍盡要荒休從事後驚神武幾度招擕自陸梁簫箛爭共凱歌陳况值班師飲至辰斗昔囘南今更北朔原無燠近逄春烽烟不動沙如鏡候火空懸月似銀已注東瀛消一爝普天何處不來臣院中讀書二首湯右曾槐㕔鈴索靜無喧金鑰傳來啓掖門五粒曉松寒夾路三眠晴栁綠當軒披華振秀繙官庫漬墨硏丹盡主恩囘憶十年吟誦處靑氊何似紫花墩文窻窈窕見觚稜閣在西淸第幾層金鳯印成題詔紙玉蟲綴滿讀書燈坐深香篆縈衣過賦罷雕闌任意凭敢道近䝉稽古力文章報國苦無能來靑軒伏覩御書恭紀三首湯右曽丹梯翠磴引躋攀忽到天開地闢間别有樓臺連碧落盡消烟霧出靑山光涵象外千重影氣結空中五色斑奕舄華軒懸御扁墨㾗鮮潤似初頒千峰入檻勢全卑裂帛流成洗硯池法自古傳才獨縱筆經天授格尤竒赤文科斗開羲畫綠樹猿猱識禹碑萬丈光芒三尺字扶桑逈出最高枝嵐浮樹豁鬱蒼蒼佳氣凭欄滿帝鄉紅日曉生天一角銀河秋掛殿中央詞臣憶載隨游筆老衲曾披御賜香豈獨名山留睿藻乾坤萬古賁奎章䝉御賜書澹逺堂三大字恭紀二首查昇春殿融和淑晷長欣瞻玉管灑天章九霄翰藻輝三曜八法精嚴邁百王拜領中宵騰寶氣歸傳奕世沐恩光錦函珍重茆堂上盥手先焚百和香躍龍卧虎仰神明造化從心體勢成澹泊益期堅素節服勤永遠切丹誠庭幃曾取當時義澹遠二字係先臣所命且訓臣曰能澹泊則能久遠臣謹識之不敢忘黼座容伸此日情未得捧歸蓬徑裏願鏤心版勵瓊瑩聖駕南廵詩六首姚士藟天仗勾陳出玉墀廵方春日正遲遲陽和遍野冰先解淑氣迎舟栁自垂西北欃槍親掃後東南膏澤普存時追踪古帝浮河洛刻玉披圖受瑞宜聖母彤闈蘐草榮承顔遊豫見昇平龍舟愛日相依發鳯舸春風自在行視膳江鱗調玉饌嘗新岸筍進香羮仁慈錫類民歸厚芹菜壺漿夾道迎天上黃河九曲淸千年早為聖人淸負薪難禦桃花漲投璧空聞瓠子成世際帝堯憂洚水功高神禹拯蒼生循堤相度商疏鑿早慶安瀾宅土平土膏初動事耕耘布榖催春處處聞新灑綠簑原上雨遍驅黄犢隴頭雲扈鑾軍不驚黎庶饁餉人爭覩聖君無逸豳風時講誦更勞親省念農勤半壁東南注聖心為詢民隱駕遙臨無煩供億絲毫力轉與蠲除百萬金吏不到村鷄犬靜人多在野黍苗深長教婦子盈寜樂擊壤康衢鼓腹吟東封南幸幾經年父老歡迎御舸前江樹重沾新雨露墨花長鎮舊山川閭閻揖讓風逾厚比戸詩書澤久傳四海九州瞻望切廵行呉越荷恩偏皇清文頴巻七十八
