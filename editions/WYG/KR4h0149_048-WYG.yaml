body:
  text: 賦甘霖賦有序陶正中葢聞至治之世雨暘時若王者徳協兩大功施九有上天降康以彰厥應理數自然致不爽也維兹季春方當薦鮪祈麥粒我農人大澤涵濡一雨三日率土臣庶咸歡欣鼓舞受天之祜皇心載欣授簡小臣綴賦以獻臣辭曰惟景運之累洽秉至徳以升聞溥化育於蒼黎殫子惠之恩勤仁風翕習協氣絪緼懐保知依軫切幹年之婦子治平有象非闗景慶之星雲爾乃嚴宥密通穆清玉燭調泰階平兩曜㑹合五緯交并軼史牒之紀載超三五而莫京臣工拜手而陳詞惟曰一人之慶我后流謙而答貺遹求兆姓之寧兹霖雨之及時更錫福於天行有渰凄其下濟彌愜適乎皇情時則姑洗紀律脉發膏土咏春日之遲遲望周原之膴膴將懋力於耘耔庶屢豐之再睹咸食徳而飲和爰五風而十雨先夏三日農功甫聚上天豫以順動式沾灑以周普氣泱泱以雲垂泉涓涓而溜吐必流潤乎海壖先優渥乎畿輔將令杏花菖葉敷霡霂以滋培行見清甽泠風被汪濊而鼓舞於斯時也天子穆然深念曠然遐思俯八荒之在闥繄昊天其子之余左右乎有民乃昭受而撫綏際斯和㑹並沛徳施伊吳㑹之財賦甲天下而弗支揆物力以休息減嵗貢之朱提損上益下因時制宜合天地以周流溥美利而弗居大業丕承克艱載凛嗣歴服以無疆用諴和兮庶品乃慶倉箱乃占庾廩告上瑞兮在兹措安全於席袵卉木知榮既桑沃而桐茂禽魚有喜亦林飛而川淰慶流方甸榮集朱紱布惠愷兮上蟠下際載恩膏兮東暨西訖登春臺以發育難名聖徳之渾涵逄化國以優游莫肖神功之茀蔚符乾始於不言彰行生於時物仰繼照頌作求溯邦本之攸寧惟率育於來牟矧丕基之紹述以民事而詒謀此際烟霏霧斂風舉雲流勾出萌逹緑野青疇女執籧筐佃翳罝罘善萬彚之各得挹芳潤於齊州豈不足以徵景命之有僕昭百禄之是遒尚求端於㝠漠信克纘夫大猷小臣固陋授簡大廷沐膏澤兮無際濡湛露兮載零掞藻天垣文謝天章之瑋麗揮毫春殿筆非春水之清泠樂洪鈞之陶鑄歸模範以流形願得頌仁聲之洋溢竊染翰以屏營惟天聰明賦夏之芳惟聖王之御宇實受命於維皇攬撫綏之𢎞化先昭徳於彼蒼乾元協極泰運方昌本一清以握紀御六氣以周方大化超無言之表洪鈞挈亘古之綱清寧奠乎八極文明炳於三光凡此覆幬之功罔外皆其聰明之徳所彰爾其遡厥洪濛翳惟太始統馭隂陽繫維躔紀廻輪軌而不傾布斗綱而不倚真精鬱積以運旋元氣渾淪以周被語聲臭則冺於空蒼凛旦明則通於最邇聿天鍳之時懸乃普照其未已夫惟真宰常存清陽上薦察帝命之有原識乾行之至徤圓靈含不貳之精橐籥立大中之撰易簡而理得正大而情見神通復於一元誠絪緼以萬變位穹窿而𢎞莫外之仁垂亭毒而普無心之眷縁陰隲之皆公乃形聲之盡遍惟天至聰實闢羣䝉無聲可聽有響斯融不呼籲而物情盡逹匪聽聞而帝謂常通惟天至明實察羣生有形皆徹無鍳不瑩洞八荒而隠顯畢見照六合而族類咸寧由是渾渾沌沌離離炳炳萬象以該兩儀斯定以四氣為號令之符以七政為鍳觀之凖煥日月於珠璧燦星辰於奎井萃箕畢以類情昭風雷以示警神符翕赩而宣化景祉聯綿而耀影皆所以顯法象之昭垂為人事之修省若夫功專資始徳溥流形𢎞敷化育洩發精英或煦嫗而長養或清肅而嚴凝或施徳而栽培或垂象而玉成四時代嬗百物叢生蠕動喙息甲坼勾萌同遊靈造共仰穆清莫不昭蘇洞逹澄澈晶明紛鴻濛於品彚妙鼓鑄於形聲爾乃天心永著帝載無偏仰宸衷之至契欽睿鑒之高懸既通靈於閶闔亦贊化於陶甄稽庶徵之協應考衆曜之同躔思光華之復旦感嘉祉之來駢幾康益敕對越尤䖍明及乎萬里之外聰徹乎萬籟之先清問則衆情悉㑹燭照則羣幽畢宣徳敎光於象緯政令齊於璣璇擴四序之和於四表逹八風之氣於八埏靈承兮與天合徳奉若兮與天周旋庶景運歴萬年而不息乃休嘉永契乎蒼天四時勤政賦吳應枚聖人御極寰宇昇平三辰朗曜四海永清政每成於宵旰功每順乎璣衡合兩儀而參贊嫓四氣之生成廣運與健運同符彌綸太極五事與五行相凖涵育羣生原夫至誠者無息至公者無私日月得天而乆照陰陽順序而兼施仰鴻鈞之有物恒布澤以乘時秋肅春温王政尤詳於月令農功蠶務勤民載詠於豳詩騐庶徵之協應知善政之咸宜絳幘司晨慰天心而曙聲常早羲和測景體君意而晝漏恒遲惟聖憲天鴻猶廣被既肅官方尤殷民事萬幾時勅安益圖安庶績咸熙治彌求治寧民察吏慎乃攸司大法小㢘儆於有位為寒為暑兢業無間於宸衷宜雨宜暘舉念常周於萬類於以見上徳之懋昭而四時之氣皆備也若夫綏猷錫福夕惕朝乾方春而始和布令入夏而觧阜風傳秋則慶西成於平秩冬則頌月吉而迎年本一敬為敷施節宣有序本一誠為昭事夙夜惟䖍當彩旭之初明早覲龍顏而就日迨銀蟾之既朗猶瞻斗極於中天於以見淵衷之順動而四時之用俱全也是以民歌樂土吏守官箴道明軒鏡治洽虞琴眺祥光於芳籞凝瑞靄於華林不獨遊目騁懐藉以共鳴夫悦豫惟願時和嵗稔因之遍溢夫謳吟日新又新躋成湯之聖敬克勤克儉惜大禹之分陰時有四時統以行健之徳道不貳道歸於主一之心粤稽二典紀羙平成君咨臣警益贊臯賡惟日孜孜彰泰交之志合乃言采采昭喜起於謨明葢敬授人時駿業每成於無逸斯欽承天紀景運聿肇夫隆平維我皇之勤政實逺邁夫虞廷於是在朝之臣從而頌曰我皇勤政典章肅兮禮樂明備光炳郁兮與時偕行溥茂育兮天子萬年膺百福兮於是在野之民從而頌曰我皇勤政制度詳兮臨軒敷治輯萬方兮日升月恒永就將兮億萬斯年慶明良兮謙受益賦王丕烈粤稽聖哲惟謙是執心秉其虛徳臻於實退然而衣若不勝訥矣而口如不出禮讓統為國之全徳柄叶六爻之吉有容乃大悟集益之良謨以下為基信律身之要術觀乎天道曰謙是崇陰陽以和而迭運寒暑交讓而有功日雖秉陽而有中有昃月不恒滿而示闕示冲觀乎地道惟謙斯泰承天而行以順爲宰河漢以茹納而深喬嶽以蘊藏而大然則謙之為義本諸天地而不違統諸人道而無外者也仰惟聖天子道隆作覩天亶聰明彌綸六宇普被寰瀛乃猶懋欽若重凝承厪求寧觀成之志深虛已聼物之誠詢芻蕘而惠疇若采執恭儉而慎憲省成雖復上瑞頻臻嘉祥疊應極府事之修和益旦明之篤敬重熙累洽膺泰運則有而不居徳盛禮恭仰冲懐則謙而彌聖斯所以邁千古而獨隆綿萬年而集慶也乃知允恭克讓者自然之道戒盈守約者下學之修抑抑徳隅則不僭而不忒温温道範則無咎而無尤心惟期於不亢福亦存乎自求宜其凛若臨淵卑惟法地覺虛受之有功懼驕盈之為累景考父之鼎銘監周家之欹噐樽節退讓則得乎禮之大全優柔平中則備乎樂之至粹高不危而滿不溢心逸日休有若無而實若虛功成勿替敬而無失卑以自牧不惟善處身世之宜居位必讓受寵若驚斯為克守恪恭之義不矜不伐而功能愈崇若拙若愚而徳輝彌著爾乃玉以比徳心亦有田始則約而鮮失馴致恭而能安挹虛衷其若谷徵多福其如川惟一心之内歛臻百行之渾全敬人而人恒敬後身而身自先斯理不易兮祗此秉志秉身之學千古常昭兮無過福謙福善之天求賢賦鍾衡聖人御宇賢路宏開旁招俊乂廣進英才十六族之哲人皆至千百國之傑士畢來蓬蓽偕升盡馮翼孝徳之彦禁闈初啓胥鹽梅舟楫之材觀夫師師濟濟羣賢爭赴感風雲之㑹合共奮天衢欣茅茹之彚征咸登皇路比上瑞於鳯麟簉清班於鵷鷺合楩楠杞梓以齊收等圭璧琮璜之並聚騁驊騮之逸足不聞伏櫪長鳴發瑾瑜之竒光豈致懐珍不遇是皆由聖世之旁求斯以覩人才之樂附我皇上取人若虞舜得士法陶唐分職命官朝無不登之碩彦惠疇亮采野無不選之秀良奉賢書而獻者遍及於茒簷蔀屋彯組綬而來者畢致乎清廟明堂固已人思登進士快明揚矣乃猶志切臨軒情殷側席宏其延攬之條廣其升庸之格千里百里集萬國之梯航一徳一心降九重之綸綍謂多士之挺生俾在位之咸列爰開珊網廣羅滄海之珠用徹冰壺長照荆山之璧協夢卜而求士物色遍逹於巖阿勤吐握以見賢菁英悉鍾於川澤春華秋實括六合以無遺行舉言揚統四門而咸闢豈不以堂㢘非逺惟徳是崇克知三宅三俊端頼四目四聰占一善者無不録名一藝者無不庸東箭南金萃羙於蒼龍闕下西琛北賮獻珍於金馬門中培九萬以齊征羊角遂天池之運擊三千而並上羽儀慶瑞世之逄此人才所由胥奮而髦士於焉景從也乃知治國先在求賢而得人所以致理故或開選舉之科或招鴻博之士或束帛賁於邱園或弓旌逮於閭里無不廣集羣英旁搜衆羙彼軒皇六相徵治業之恢宏舜帝五臣揚休風於喜起殆前後同符古今齊軌者歟敬拜手稽首而獻頌曰我皇御極治休明夔龍稷契盈廟廷股肱元首歌載賡崧生嶽降萃竒英咏杕杜兮賦鹿鳴登良選俊勞睿情野無遺賢盛業成於萬斯年垂太平無逸圖賦有序宋楠臣聞惟精惟一者列聖之鴻圖無怠無荒者百王之大法考明良於帝世君咨臣儆聿有傳書遡授受於周邦大烈耿光丕繩祖武粤若成王嗣服敬聞家相陳謨載在周官篇名無逸逺溯三宗之享國著得名得夀之徵上陳三后之開基昭卜世卜年之本以寅恭而匡主徳以稼穡而念民依一篇之中三致意焉我皇上勤求治理念切痌瘝厪八荒我闥之心廣天下一家之量遂授彤廷之秘簡賡颺唐室之新圖藉寳繪以抒忱情依北闕被薰風而式化治軼西京小臣不揣固陋謹拜手稽首而作賦曰惟王建國惟聖法天敬以敕幾凛小心之翼翼勤以立政勵終日而乾乾學於古訓者有獲監於成憲者無愆載以青箱知箴銘之足式垂之翰墨儼圖繪以堪傳原夫政在周官書名無逸勅天命則戒夫荒寧凛民碞而周知稼穡遐觀殷鑒遡三后於在天紹我先王見一人之廸哲於觀於逸深嚴恭寅畏之思康功田功盡懐保惠鮮之實豈不以功崇惟志業廣惟勤鼓明作有為之氣綿至誠無息之神考成䂓於徃哲緬遺烈於前聞為制治保邦之本見責難陳善之慇亦越後王良臣光贊師政績於成周篤匪躬於姬旦霜紈靜拂凝毫素以輝煌綈几閒披耀丹書之璀璨著勤勞於邦本千秋之金鑑為昭繪作息於農人一巻之豳風可按由是珍諸緑笥列在芸編玉軸初開彩動紫宸之殿緹囊乍啓輝流興慶之泉葢欲知小民之隱願必先紹哲后之心傳也逖稽往牒治道攸同或欽明而光被或濬哲而温恭或丹書昭其敬徳或玉簡紀其豐功盤盂鏤其寳訓几杖惕乎皇躬惟鑒觀之不逺匪藻繢以為容亦有圖美慶雲畫垂嘉穀流觀山海周遮六曲屏風詔寫乘黄蹀躞千金駿足雖摛革掞藻趣偶渉乎淵衷而東作西成計未周乎蔀屋豈若道光聖化念切民依識三農之疾苦流奕世之音徽援古以證今恍聞二代咸和之盛因圖以立義如聆一廷誥誡之詞洵足以纘承夫往昔而昭示乎來茲我皇上欽承無逸繼序不忘建極以敷錫庶民澤被於東西南朔觀文而化成天下風行乎侯甸要荒然且望道未見視民如傷雲陛宵深亶聰明於巻軸松窻夜啓究治忽於縹緗前席而問蒼生斯謀斯猷則惟我后之徳求衣而親藻衞是訓是行以近天子之光洵業隆乎姚姒而化協乎平章何俟圖懸無逸廼足以跨越成康也哉奉三無私賦董邦逹維聖皇之御宇規兩儀以立程擴知臨於無外與懸象而著明八埏資其怙冐庶類仰其作成理何隱之不燭鑑何時之不瑩等涵濡於亭毒符昭曠於穆清容保為懐道契直專之藴偏私悉化徳敷離照之精葢實以一心之昭事而溥至徳於無名職覆維天是曰大圓於穆之命不已行健之徳為乾保合靡窮妙萬方之鼓鑄流形有象神一氣之運旋職載者地隤然以示既含物以化光乃順承於不貳物本之而親下從類皆宜道大生於不窮統形盡利積氣之光日月為章照臨下土正轡中黄金波扇影水鏡凝霜以邁以征共識流輝之自逺相摩相盪並昭旁燭於無疆凡此三者天道運以隂陽地道布其柔剛彼二紀之靈曜亦亘古而煌煌黙轉一元大亨以正潛搘八柱直大以方曰貞明而貞觀覺生民而立常繄大造之無私順應皆一人之奉若不遑爾乃仁能育物厚以畜民繼離出震化被無垠範圍而不過鼓舞以盡神大施生於闔闢體隂隲於洪鈞高兮明兮效帡幪之大徳博也厚也協持載之深仁握欽明以立極普乆照於羣倫奠六㝢於袵席開萬古之䝉屯惟奉三無以馭世斯昭治化於長新我皇上聖徳並天地文敎燦雲霞涵八荒於在宥合四海以為家浩乎覆載之寛無以擬其廣運昭乎日月之麗未足喻其光華乃猶法乾行而自强不息宵旰常殷應地道而日進無疆安敦益裕逹四聰明四目冀民隱之畢宣康庶事勵庶明期物情之畢露裁成有事民悦不勞緯理無為因物各付是誠運乾坤之橐籥變化從心發日月之晶光昭明有朗自蕩蕩而平平亦無偏而無黨乾以易而坤以簡尤彰輔相之功日重光而月重輪永睹升怛之象惟無私之至始人遂其私必奉三以臨斯徳參乎兩小民遊則天之盛世歌化日以知長微臣忻就日之私忱戴光天而共仰律呂相生賦張映斗聖天子智周六合道洽八紘理涵太始數契神明運會開乎元造制作得其大亨禮敎昭宣執玉帛者萬國樂章純備舞簫韶之九成式如玉而式如金丕顯文明之化聲為律而身為度洪敷易簡之精四海承流既見清和之咸理九重授簡載賡律呂之相生原夫兩間有自然之音二氣鼓百昌之族顯之為萬籟之鳴微之在一陽之復惟軒后之神靈得伶倫之允肅求中聲於太虛啓元音於沕穆逹隂陽之氣肇自律筩定清濁之音截茲嶰竹調和四序通萬彚之光昌周流六虛參三才之化育爾其精含橐籥律轉鴻鈞和聲協管稽數周輪三十六宮端其始八十四聲藴其神振大響於鏗鯨節奏啟鈞天之秘聴和鳴於翽鳯雝喈驗協氣之純用三分以為凖隔八位之維均參而伍之陽變陰合而律呂自成條理統而㑹之陽倡陰和而律呂互為引伸理究圖書神氣先徵其應合數兼疇範苞符亦得而指陳葢乾坤以生物為心宇宙以太和為幹凡二儀之絪緼皆一元之統貫陽極於已而陰生午中陰盛於亥而陽生子半金水歛物而成言乎艮故應候而畢宣木火生物而相見乎離斯成文而愈燦五音以此而昭六律從茲而按相生原於相配錯綜自得其歸變聲召乎半聲踈密亦通於算在氣數之敷宣悉真精之泮渙是故陽以下濟為徳陰以上應為功黄鍾之數至多損二十七而合林鐘之管南呂之數至寡益一十六而合姑洗之宫數有乘除布之自成其協應聲有高下比之皆得其和同一陰一陽自推遷而成嵗一呼一吸即清明之在躬均調六氣宣暢八風熙庶績而惟歌惟叙統萬物而成始成終此皆相生之妙用有以宣景運於天中要之律呂之克諧悉本宸衷以㑹極惟仁義中正之是安斯樂易均平而各得我皇上誠敬圖幾欽明作式本和節以理萬民用和寧以導百職無聲之樂獨契於淵微大順之情長操乎恭黙治世之音安以樂彰億兆之歡愉敬心所感直以㢘逹臣隣之悃愊神人以和而格於百獸胥氣盛而化神光天之下而至於海隅悉飲和而食徳振三雍之鐘鼓更陳干羽於廷階調六藝之笙簧還聼和鸞於鑣軾所以嫓咸英韶濩之休風用以垂億萬斯年之盛則藏珠於淵賦以藏珠於淵南華妙藴為韻陳大受繄晶瑩之瑰質托澒洞以深藏委淤泥而毓秀泳滋水而儲光孕異彩於蛟宮月魄逐圓靈之景扇清輝於貝闕海人遊虛白之鄉映牛斗以宵騰去天尺五搆蜃樓而晝涌在水中央體自空明本無心於媚澤神惟澂澈非有意於垂璫蛉頭詎假魚目寧方日浴清而加粹疇伺睡以能攘原夫徳至淵泉海出明珠素李既産館陶酸棗亦出夫餘象不燥而不濕芒若有而若無靜以常流儼若八環之轉動而得正何有九曲之紆匪捋羊之可得知彈雀之為虛増重價於五城漫誇結綠炫空花於一掬難恃離朱有化神之足尚豈投闇以相於然而寸陰自競百斛非須聼沙漠之自至却漢陽之來輸懸向明堂雖云制火之􅉯還諸赤野依然入水不濡浦悠然其來復岸渥若以不枯㑹漆園之微妙見心性之最初若夫聖人有作大道斯全開金鏡而外朗懐珠囊而内鮮玉海方澄閟之無聲無臭之内璿源獨濬精之有形有色之先萃靈明於紫府深保合於重淵象罔索自軒轅揚華百國鳯儀啣於少昊旁燭中天累累一貫者足乎聰明睿知離離四照者偏乎東西朔南家拜百琲之錫人披七曜之函但羣瞻帝光之格被而孰測聖衷之淵涵若乃不貪返樸無欲去奢全渾沌於剖鑿養天地之萌芽三丈靡銜於雙闕一枝莫餙於九華澤及枯魚豈望報池邊之索恩周赤蜯肯問津海上之槎仰惟至徳之一節益徵全量之無涯是知身如珠樹心即淵嶠潛伏孔昭含章有耀其機活活随九品以賦形其息深深貯百靈而待召真元自攬於天君圓折奚求之海徼臣等微爝徒然寸丹黙運際珠斗之高標矚瑶光而得近忝拂拭於席珍佩精純之寳訓源同廢井質慙敝緼曾何足探溟渤之淺深而窺璇璣之奥藴藏珠於淵賦以藏珠於淵南華妙藴為韻趙大鯨明珠朗耀赤水潛藏惟淵流之深靜能涵蓄乎光芒象以含章斯靈瑩之妙諦方之有羙乃比擬以昭彰懿夫世之所寳莫貴於珠天精獨秉地産攸殊徑寸晶瑩表夜光而有耀盈盤的皪似月彩之旁敷其託體也圓而不滯其為質也淨而不汚斯宜含蓄於清泠之府而韜光於邃穆之區爾乃物從其類溯厥生初惟儲精之獨異每寄迹於元虛碧浪奫淪漾明輝而不定澄波𣺌瀰涵瑞彩以相於斯靈光之不昧就昭質之能如故夫珠光皎潔藏彼深淵随川流而毓秀依水徳以呈妍寳氣中涵隱幽潛而如貫清光上徹映空水以相鮮其得於天者獨粹而稟於性者獨全無精不藴無羙不含比方流於羙玉顯圓折於澄潭位次析津似聯輝於斗北還從合浦獨振采於日南雖保真之素裕孰索照而幽探是知物其有矣生也無涯湛露如凝乍浮光於瑶草明星有爛恍倒影於玉沙秋水至而蚌胎漸長春浪暖而龍氣舒華異彩玢㻞映三宵之瑞靄寳光煜爚奪五色之明霞故得秀應三辰光垂四照藏之者深似淵微而莫測蓄之者裕乃靜存而有要既源源而不窮亦物物而相肖非深識者孰能喻其微非朗鑑者孰能領其妙聖天子睿哲性成文思廣運御物昭光被之勲居心本欽明之藴金鏡旁燭於無疆珠囊永挈而朗潤孰不叅南華之妙義而遵皇極之彜訓也哉藏珠於淵賦以藏珠於淵南華妙藴為韻張映辰聖天子御六合撫萬邦心思周浹乎庶類聲敎暨訖乎遐方其為萬化之主宰者藻鑑有如神之用而涵方寸之虛靈者淵衷有不盡之藏原夫理定若止水心清如玉壺非潛遁而不曜不逆億而自孚觀萬物之自得識大道之非迂彼元㝠之司天得一以生水而精華所結川含媚而成珠爾其天池之濆大河之湑澤曰藪澤區曰具區為異物之所宅疑神人之所居葢地靈與天産交聚而珠光與水氣相於則見夫馮夷剖之於蚌鮫人泣之於淵或神鼉之窟所孕或驪龍之穴所穿月朗星輝胚胎夫精氣銀濤翠浪蕩漾乎珠蠙宛似燭龍之耀恍如璿璣之圓想其波光上下珠貝渾含任有心之擕取聼斯世之搜探與泗磬淮魚而並貢者地不限於澤國極朱崖儋耳而來琛者郡不盡於海南即淵藪之靜藏無盡而南華之寓意可叅豈不以心之所宅宜靜理之所寄靡涯惟理在心而備涵乎精意如珠在淵而靜歛其英華息之深深貴洗心而藏於密光之煜煜實普照而無以加我皇上太虛之體中涵神明之徳坐照寂然不動若無思而無為感而遂通必先知而先覺淵泉有本時出而不窮智珠在胸光逺而有耀葢躬握夫化原而心契乎理妙夫是以體乾符秉泰運聰明不遺於遐聞見不蔽於近至誠立天下之本至精發聖人之藴喁喁向風者羣欽聖治之光昭而亹亹不已者益懋宸衷之學問皇清文頴巻四十八
