body:
  text: 雜文粤西平露布湯斌臣聞版泉振旅於皇家煇煌玉簡苖野奮戈於帝世照耀金封蓋文德丕播不因秉旄誓鉞而増崇而聖武布昭正兼執玉舞干而益大滄海全歸禹貢淪紋豈増萬里之波祝融久戴堯封寸地亦尊昊天之命非臣猷之克壯咸與維新實聖德之如天無逺弗届㳟惟皇帝陛下宣昭義問敉寧武功垂裳秉珪而天下嚮風動顔變色而海内鎭定黄旄右指劔閣雲新玉仗南臨衡湘波靜白環西獻流沙積石之鄉楛矢東來洧盤日出之郡卿雲爛漫山林無紫芝之歌日月光華太史著河清之賦獨此粤西星分宿末地近日南白象陵山孔禽蔽野西京之王㑹不通周禮之職方罔載今河山奠矣謂宜梯山航海而來王豈日月出矣猶然鑚燧鑿榆而自照蒼梧惨澹鮫人泣明月之珠平樂蕭條估客棄桃枝之簟臣等恭承璽命逺播天威組練發而星斗明旌旗張而雲日曉樓船輕度細栁營開大將某指麾明月禆將某劔㦸秋霜皆右義左仁佩忠戴信乃布德宣令而纁組來迎韜戈束􅓚而壺漿恐後桂林象郡悉成鼚鼓軒舞之民瘴雨炎風盡為祝華呼嵩之地日無私照南邦永以無虞海不揚波北户宴而不閉幽荒絶壤始知天子之為尊六慰三宣共識聖人之在位蓋王師無戰龍城勒銅柱之勲大武維揚薄海靖兵戈之氣此皆受成廟計慿藉天聲不然何以熊斾未開犀甲未振而鵝山之險盡作藩籬煙瘴之墟永為狐兔也君之德也果如叔向之言臣何力哉豈曰郤縠之讓臣等無任慶忭激切屏營之至謹奉露布以聞擬為司賔答問辭有序毛竒齡康熙二十三年六宇蕩滌中外無事皇帝奮桓撥之烈廓清南徼迤及東澨畫地溟海之外版漲籍渤凡九垓八裔雕身畫頟諸國咸奉辰朔皇帝軫念民隠謂君有斯土撫育幾三十年而不一周知其地觀覽其山川風物則綏要萬里何自通浹惟古昔王者當天下初定有廵行縣㝢省方問俗之制自三代迄今未之有改顧事頗煩重度支水衡坐費檢㑹且千乗萬騎慮無或鋪張盛大為司行奔命按王制廵幸諸禮自職方戒途太馭掌較以後凡車騎鈴欒宫城梐枑以及壇壝堂房珪璧玉帛黄駒赤犢皆有儲偫然且勾陳五校所在警蹕扈壘衛仗周環百里嘗考文中子言虞舜一嵗而廵五岳國不費民不勞者何也以兵衛少而徵求寡也然而語不古合民無徵焉我皇上以非常之元創非常之舉因天事天因地事地因人順人然而三王不竝軌五帝不襲治考建因革而禮制行乎其間蓋一人順動萬人幸之之謂幸一人慶行萬人豫之之謂豫如必造明堂而後可以覲后則輯瑞何期必設輶軒而後可以採風則觀方何待皇上納羣臣所言特練時日倡舉廵幸減從官省行軍採大禹四載之需折虞廷五年之典隨不逾萬人時不滿百日登岱觀河浮江渉淮經閶闔詣闕里所至問民疾苦父老扶杖兒僮婦女率負戴來觀鹵簿不譙有高年者則抵錢慰勞之先為肆赦令薄海内外咸霑豐㤙及所過州縣民㕓市廬又皆有捐復寵賚芸鉏不變鎌穫如故市估行販及道路師旅馬臝楫筏儼返家衖何其盛也昔東漢光武廵游南陽置酒高㑹召吏人飲食復其租賦以為羙事而章帝南廵詔所經地無得設儲胥命司空自架橋道其詔有云方春所過無有伐殺車可以引避引避之騑馬可輟觧輟觧之至今史載猶歎誦其言勿衰今車駕經行屏却供億州縣起居悉絶所餽獻即行在茇止亦竝無宫懸籞仗鐘鼓鈴􅈀之設而民之引領望幸者相屬於道然猶親視河溢立灑宸翰殷憂悼歎不數瓠子即當釋奠宣聖儀物備至臨行惓惓尚復貽曲柄御繖以申向慕此雖金繩再出必絀帝俈為封禪起周成為廵狩亦豈有過誠恐諸儒不諳動循掌故將引虞書王制覲典祭義以及元嘉之儀開元之禮重相諮詢因設主客往復倣東方客難揚雄解嘲班固答賔戱夏侯湛抵疑之文擬為司賔答問辭以曉譬之庻後之君子可考觀焉其辭曰司賔大夫與四方客使集王㑹之堂理職貢之事主當壹是國信方物披圖眴節悉具紀㑹方斯之時華蟲各辨等卉越皆就位四方客使有詗於其列者曰古者聖王御世四海晏然則因而廵狩廵者循也民可循則因而廵之狩者守也為我守土者吾從而循順之然而動習矩錯著有法則曩時五載十二載天道大備升中告至先為造類於是修職有其戒犯軷有其義土訓夾車而問形掌道審言以詔辟定方明於司盟布綿蕝而表位夫苐以壇壝觀之三垓八通太乙環五穿蒲褁草上無風雨然且明堂巋然以天齊主就其文而紀其事則公男升降中階阼階有其等后王遜讓天揖時揖有其數桓躬穀蒲以五擯四擯為節罇罍篚羃以一進再進為度其煩我奉常而需我掌故有前事矣矧宫城所舍晝樹筍簴藩籬外䕶夜振錞于或習禮以射牛或布幣以代駒設燔而炙玉檢瘞駟而陳木禺臨學校則執羽鷺祀邱壑則用乾魚然猶車駕之次考及同琯槱燎之末享逮先厨故以登封而廵河則負薪擔石者有之以祠畤而幸學則說經講易者有之以師行而及游畋則耕定陶蒐涇潭者有之以祀社而及祠賢則封樂毅祭桓譚者有之是故銘石頌功德古王未免陳風紀羙盛聖主不嫌今皇上撫有四海治極三古聲教振開闢規制軼區宇百禮斯洽萬類咸叙承天搢斗紀節布度當八風悦豫之時乃順應而為四廵之舉則是西鳥東魚里禾鄗黍符瑞之應報饗之數無有若今日之富者此管仲所謂物有不召而自至者十有五焉然而出不盛車甲行不飾金鼓羃鼎不夕張帷宫不鼂御躬省方俗清問疾苦升禋岱宗灑澹河滸登習禮之堂探藏書之府塞決水以石菑撤通天之權火然且百日之間而南浮江淮東至齊魯是豈古皇不足法與抑何掌故多未預也且吾聞鑾輅之南翔也行不除道耕不輟疆女不下機織市不易蓋藏兒童讙於衢巷估販偃於舟航然且皬􅄠黄口如葵傾陽或牽以犧或捧之觴輪蹄踵趾馳驟康莊則嚮使肆覲而輯圭玉報燎而坐明堂既審權於三市亦奏律於四廂治邸奉高之側捐租崇邑之傍將不止紹神靈於軒頊比功德於虞唐而又何事物之罕備考建或未遑焉司賔大夫廼斗然却立瞿然而改容肅然而正告之曰子徒知三古之當遵而不知一王之制之自有章也且子亦聞廵幸之何意乎皇上以為六闔一統萬國來㑹則民后之情不可以不接中外之勢不可以不通乃或禮過繁而力匱制過賾而用窮費時日則機務不給多導從則供億不充此前古之所以易行而夏商以後遂間世而不一逢也夫創制顯庸務在獨斷因監損益貴乎折中故湯武用干戚不需揖讓姚姒有子弟未嘗分封彼夫劉氏之興二月而西廵十月而反東廵者限於時也後魏繼世北廵及中山東廵而止及橋山者絀於地也貞觀幸底柱以治河為封嵩而書之旂勒之石者介於事也建隆平潞叛以行師兼詢俗而先勞軍後捐租者阻於勢也是故游觀無定形廵幸無定儀省察補助無定經方行典禮無定辭必畫井田於郡縣之日則畸矣講車戰於騎射之年則躓矣倣垂裳結繩於刻書削契之世則欺矣施儷皮尺布於九圜六品之時則骩矣議守社捍牧於車書大同軌轍齊至之際則誖矣往嵗鬼方弄兵天討其辜鋪敦萃旅底於昆彌挺鈹四伐而未嘗傚征苗之師間嘗取士詔下徵車臨軒親覽特簡仲舒是本制舉而不必循選造之遺乃者甫馴龍馭先樹雞竿大號乍渙洪㤙驟殫以巽風行作解雨觀何必崇朝遍彼泰山即其陟喬勿修壇壝金匱石䃭却之若遺黄􅉬不屬白璧是瘞賜車勞酒羣呼天齊此豈禪禮所得庶幾當夫觀河有事玉馬羣臣從者宰執以下咨嗟抑鴻賦此皓皓不搴葦茭但借禾稼升鹽斗酒彼安用者周之翕河遜兹盛事漢武築宫於斯為下爾乃九旗南指方江厲淮板䑽黄蔑非龍艘材造舟震澤纜石吳臺民之望之有如嵗來丹陽可駐黄金誰埋六代殘構視若刼灰惟彼故寢加以封栽䘏殷優恪自古所希漢高過湖祭周王祠方之於今豈得嫓之矧瞻闕里言觀罇匏登堂習禮為斯文昭俎豆未湮宫墻豈遥祗因重道景行孔勞臨行留仗羽葆翠幬奚止過魯祀一太牢且吾聞蒐狩之典不能常舉以旗致民載旜誓鼓苖田茇舍總類振旅雖曰從禽實比卒伍以是大閱嵗無一有乃當鳴鑾偶爾建鐸暫啓和門自有坐作車不詭遇獸無私獲笑彼司馬枉事表貉且夫儒生博士之言亦安足責哉在昔列王將廵有謂編蒲褁車勿傷山石掃地而祭席用葅藉則帝主聞之已充耳而勿懌即高世比德欲效九皇頗采儒術上告登封然且拘牽詩書扳引畦畤羲軒所垂夷吾所記大夫文學爭辨不已絀偃斥霸遂罷封議此眞泥曲傅㑹無所考適之已事也故以廵行之禮而茍襲舊聞則無一而是彼夫職方行令修涂辟境而後之效之者非大治馳道則長開蕩渠掌舍治宿設藩置籬而後之祖之者非圜垣四面即離宫百區故板城幄殿丹青輪軸此土方所擬似也昆侖神樓槍車鈴柱不可謂非明堂之遺制也故五玉三帛極之為貢金獻幣籠香篚藥之端勞酺賜布類推之即為裝錢路餼以及軍工羽釋紫茸赤罽之所由以捐是以結綵樓演百戱實由行殿之陳懸始之布香臺排畫甕牽青繩閑赤楯悉從壝門之大次小次啓之故王人一帥屬而後且盡統其諸王百官與夫蕃人貢使之族羣后一表綏而近且増之以羽林車騎金吾鎧仗而猶以為不足然則禮當極弊亦何非率由之始所濫觴者而動言掌故斯已瞀矣乃以法駕之出控神虬跨龍騵雨師灑道風伯清塵靊窿為之啓馭羲氏於焉捧輪材官不刷鬛騎士不解帉八鸞秩秩九組駪駪不百日間而東漸南暨所至若神浸假吉行五十必拘禮文則大旂金輅將有一年四廵即遄鑣急節而不能造其闍與闉者此眞聖人行事法則兼至即偶然舉動有非臣民庸衆所得窺伺而戴天忘高履地忘厚挾莛而撞嵩高把蠡而測海澨此神聖之所以難名而帝德王功遂當有其萬世也演連珠十首彭㑹淇臣聞穹窿職覆合萬彚以資生博厚能容萃百川而歸海蓋道大則畛域不分量𢎞則洪纎畢載是以化隆無外雕題鑿齒以胥來治統一尊岳貢川輸而㒺怠臣聞日月流輝光窮蔀屋之下雷霆振響聲沈蟄伏之辰何則智以不徧物為照威以不數見而神是以黈纊懸旒益養聰明之用垂衣結縵彌留沕穆之眞臣聞黼黻為章則綦絲匿采韶韺迭奏則下里輟音必聖神克建文明之極惟廟堂乃稱著作之林是以馬負龜陳啓苞符於天地星糺雲爛流雅韻於古今臣聞太阿在匣神妖懾而藏形明鏡在懸物醜望而却面是以義取於止戈而慮深於忘戰故玉瑶㻫琫在原匪曰馳驅車馬斾旌于敖豈為游衍臣聞江湖普潤挹之也靡涯雨露流膏施之者無厭故恩以積而彌深澤以廣而斯遍是以仁風翔洽不害禹霖湯旱之年淳化蒸濡猶切舜儆堯咨之念臣聞斗杓東指則氷腹失堅火曜西流則井梧飄榦氣至斯逹四序所以不愆令出惟行萬幾所以立斷是以王言之布象其如綸大號之頒同於渙汗臣聞物違其性㒺克有濟器適於用不必相通故棄短錄長矇瞍可以辨律因小致大洴澼可以習攻是以六相宣猷各定陰陽之位九官効職分司水火之功臣聞細莛雖輕亦發洪鐘之響飛塵雖薄思増泰岱之高惟虚中者能受故集益也不勞是以葑菲不遺哲后殷勤而止輦芻蕘可獻聖王鄭重而懸鞀臣聞璿璣在列不羲和而占時規矩具存不工倕而制器何則應物以神不以迹而傳世以法不以意是以儷皮之禮未足昭圭璧之忱􅋵尾之音未足極管鼗之致臣聞養嘉禾者必剪莠稂䕶幽蘭者必芟荆棘蓋薰蕕並器則芬郁潜移涇渭合流則澄清終塞是以象恭既放五臣遂績奏虞廷偽辨始除三月已化行魯國原教朱彛尊始為三教之說者誰與其小人而無忌憚者與生民之初草衣而血食露處而野合聖人者出教之田里教之樹畜養生之本既具然後修道以明之其理身心性命其治家國天下其端禮樂刑政其文易詩書禮春秋蓋自庖犧氏作而伊耆軒轅堯舜禹湯文武周公孔子以數聖人損益之而教已大備初未嘗有所不足必待佛老之說以濟之也佛老者持過高之論行不近人情之事不耕則無食不蠶則無衣無男女則生人之道息無上下則紛爭之漸起以彼其說行之國中蓋有時而窮則相率聚於中國食人之食居人之廬陽叛聖人之言而陰収聖人之教之利愚者不察遂惑其說至等聖人之教三之嗚呼彼之所奉者一而我之所奉者三曽彼之弗若矣天下之理出乎剛則入乎柔出乎陽則入乎陰出乎君子則入乎小人未有兩是者也惟内無所主則死生禍福戰於中其初守道不篤持論兩端其究歸於無所忌憚而獲罪名教當是非可否之際倡為調停之說者未有不流為小人者也且所謂教者何哉君臣父子兄弟夫婦朋友之教而已矣舜命契曰敬敷五教孟子曰使契為司徒教以人倫故曰教以孝所以敬天下之為人父者也教以弟所以敬天下之為人兄者也教以臣所以敬天下之為人君者也彼二氏者既已棄絶其人倫事物之常將何以副教之名哉子路問為政夫子告之以正名謂名之不正至使民無所措其手足若是其甚也世之儒者誦聖人之言而安於三教之目其亦罪人矣夫原刑朱彛尊墨劓剕宫大辟非舜之五刑也舜以命臯陶者流也鞭也扑也贖也賊也象以典刑五者是已甫刑曰苖民勿用靈制以刑惟作五虐之刑曰法斯則劓刵椓黥之謂肉刑之始矣刑者一成而不變聖人之所甚不忍也故就典刑命士流者宥之鞭扑者贖之若夫怙終不悛則法在必誅賊之為言殺也春秋傳晉侯使鉏麑賊趙盾是也相古有虞之世畫象而民知禁赭衣墨幪别其冠服使觸罪者知耻悔過得以自新自五虐之刑作殘其形毁其體膚斷者不可復續終其身不敢與士民齒將無所用耻焉彼夫劓刵椓黥在苖民發聞惟腥舜方哀矜庶戮之不辜務遏絶之豈反效尤而以至仁用至不仁之法乎荀卿有云治古無肉刑而有象刑斯言是也班固漢志援俗說著論以為禹承堯舜之後自以德衰而制肉刑昔者鄭子產鑄刑書叔向非之其言曰夏有亂政而作禹刑商有亂政而作湯刑其云禹刑湯刑者初未嘗指為肉刑而班氏實之孔氏書傳稱吕侯以穆王命作書訓暢夏禹贖刑之法夏刑大辟二百臏辟三百宫辟五百劓墨各千不知何所據依殆無稽之言爾愚考肉刑夏莫之用商亦無明徵伊訓臣下不匡其刑墨出古文尚書未足深信迨周官分職乃掌之司刑墨者守門劓者守闗宫者守内刖者守囿然則肉刑其昉於周與穆王閱實其罪許罰以鍰是亦不忍人之政矣蓋至漢而文帝始除之仁人哉俾五虐之刑絶於世可謂盡心焉已顧腐儒之論尚謂肉刑當復豈不謬哉作原刑告後之君子治書者兼可明孔傳之偽焉原教李紱教之說何昉乎中庸言修道之謂教道惡在君臣父子夫婦昆弟朋友是也道在於是則教在於是矣教莫古於唐虞其使契為司徒敬敷五教也亦曰父子有親君臣有義夫婦有别長幼有序朋友有信而已孟子敘述三代之教謂設為庠序學校以教之皆所以明人倫也人倫明於上小民親於下然則舍五逹道棄人倫無所謂教也魯論稱子以四教文行忠信文者修五倫之禮節也行者踐五倫之實事也忠信者以親義序别信之實心而修其禮踐其事也周禮大司徒以鄉三物教萬民而賔興之一曰六德智仁聖義中和即中庸之知仁勇所以行此五逹道者也二曰六行孝友睦婣任恤孝即父子友即兄弟睦者兄弟之推婣者夫婦之黨任恤者朋友之交其教之而興之者君而承其教而升焉者皆臣也三曰六藝禮樂射御書數皆五倫之所有事所以相治相養而遂其親義序别信之心者也聖人繼作其教遞詳教之以佃以漁焉教之以耒耨焉教之以懋遷交易焉教之以衣冠焉教之以舟楫焉服牛乗馬焉斷木為杵掘地為臼焉教之以重門擊柝以待暴客弧矢之利以威天下焉教之以上棟下宇焉教之以葬以封以樹䘮期有數焉教之以書契百官治萬民察焉其為教甚繁而總其藝之概則曰禮樂射御書數皆五倫之所有事而已其人之等雖有君卿大夫士庶人之分其人之業雖有士農工商賈之别而總其人之類則曰君臣父子夫婦昆弟朋友皆五倫之所綴屬而已是故天下無倫外之道即無道外之人天下無道外之人即無人外之教自二帝三王以來莫之或易也沿及後世乃獨目聖人之教為儒而又有異端邪說與儒者之道分行畸立而多為教之名者何也曰二帝三王之時教主於上作之師者即作之君者也至周文武而下道在周公則移而之臣矣然猶行其道於朝廷之上也至孔子而移於士矣儒者士之别稱不必皆能為聖人者也故孔子謂子夏曰女為君子儒無為小人儒儒行出於漢不必實為孔子之言然哀公問儒服而孔子猶不以儒自居至戰國時有楊墨之言然後以學周公孔子之道者為儒墨者夷之所稱儒者之道是也而孟子亦曰逃墨必歸於楊逃楊必歸於儒而儒之名於是乎乃立楊氏為我墨氏兼愛未嘗遺棄五倫也而推其流弊之所極至於無父無君孟子以其有害於人倫也故辭而闢之至後世乃有所謂道與釋者出焉而後天下乃有倫外之道乃有道外之人乃有人外之教夫所謂倫外之道者何也人之一身有理有神有氣有形仁義禮智信者理也知覺運動者神也屈伸呼吸者氣也耳目口鼻四肢者形也以理宰神以神運氣以氣運形施之身措之世而人倫出焉所謂道也若釋之道則靜守其神而已知有神不知有理惟恐一物之擾吾神故空諸所有雖遺棄五倫之人而不顧也極其靜之明可以彰往察來而動則昏道之道專致其氣而已知有氣不知有理惟恐一事之損吾氣故清淨無為雖遺棄五倫之事而不顧也極其專之用可以却病延年而勞則敗是所謂倫外之道也倫外之道無與於家國天下故曰道外之人道外之人無與於修齊治平故曰人外之教昌黎韓子欲塞而止之則孟子放距之說也歐陽子欲修其夲以勝之則孟子反經之說也然吾謂不必塞而止之也彼不塞而吾之教無不流也彼不止而吾之教無不行也亦不必修其本以勝之也不修而吾本自在也吾本在而無不可以勝之也何也吾儒之教聖人之教也聖人之教修五逹道之教也聖人之教而有一日不流不行不修焉則不足以為聖何也無君臣焉則強凌弱衆暴寡而天下亂矣無父子夫婦焉則生人之道滅而乾坤或幾乎息矣有父子夫婦自不能無兄弟而朋友則亦彼之所不能無也是吾儒之道固萬古流行於天地何必取彼二氏者塞而止之而後流且行哉或謂聖人之教後世未必能如二帝三王之修之也本之不足則從彼者衆烏在其能必勝也曰本固未嘗不修也後世之修之雖實心實政亦與時為盛衰然未有舍五倫之說而可以治天下者也是吾之本無日而不修也本無日而不修則儒者之教無人而不遵而勝不勝不足道矣子疑二氏之衆而守儒教者之少耶儒不必冠章甫而衣逢掖也凡南面而臨天下者君也即儒者也承流宣化於下者公卿大夫士也即儒者也趨走而在官者府史胥徒也即儒者也耕且歛者農也即儒者也懋遷有無執藝事以食其力者商也工也即儒者也何也彼皆有君臣父子夫婦昆弟朋友之道者即皆聖人之教也彼遺棄五逹道而為道與釋者特養神養氣之一術蓋千萬人而一二人者也千萬人而一二亦焉能為有無而又何勝不勝之足言乎吾故曰天下無倫外之道即無道外之人天下無道外之人即無人外之教也皇清文頴巻三十二
