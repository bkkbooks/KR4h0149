body:
  text: 表恭進易經㕘解表張英伏以至道開於河洛發羲文周孔之微言奥㫖貫乎隂陽備彖象卦爻之精義㕘稽訓詁託藜火而重編側近光華食野芹而思獻俯慙謭劣彌切冰兢兹蓋伏遇皇帝陛下道法天行不息學同日進無疆尚書巳講於經幃大易繼陳於黼座神凝簡冊聖心探一書一之先博極圖疇睿照啓千齡之秘臣叨恩於禁籞祇奉欽明竊有志於韋編欲窺象數自田何京房而後漢初各有師傳逮濂洛康節以來宋儒始為定論考亭本義之學洵可奉為宗風伊川易傳之文尤有資於治理竊惟廣且大者易之體豈容驟測其精微竒而法者易之辭未許遽窺其典要必在發明章句譬如探源者先索其流務期剖晰文詞難言得意者遂忘其象爰考先賢諸説輯為叅解一書時逾兩期巻分六帙如渉滄海而尋畔岸祇堪自砭其愚頑竊仰泰岱而竭塵埃詎謂有禆於高厚但念閱寒歴暑分細旃廣厦之餘閒浥露研朱居秘閣芸香之勝地雖極知其蕪陋敢不冐為敷陳聊佐乙夜之覽觀庶備九重之清燕伏願德符岐聖治軼羲皇履帝位而豊豫時登養萬民而訟師不作觀損益之義化自洽於中孚察消長之幾世自升於大有對時育物端居見天地之心知崇禮卑撫巻盡乾坤之藴矣為此具本謹稱進以聞恩賜宫紗謝表張英康熙二十一年五月十四日䝉恩賜紗二端命編修臣杜訥賫付臣廷瓚送回江南臣恭設香案領訖望闕九叩首謹奉表稱謝者伏以故里初歸驚沐殊恩於天上聖慈垂顧逺分渥澤於田間展霧縠之輕華凉生蓽戸披香羅之璀璨風滿衡門叨異數而增慙撫愚衷而倍惕恭惟皇帝陛下徳配神堯勤嫓大禹文敎彰而六經啓蘊武功偃而九服來同簡儒臣於禁中置講僚於座右臣猥以百生之竒遇際千載之昌期握筠管而侍彤闈抱芸編而趨紫闥備沾優渥曲賜矜容廼以銜土私情冒干宸聽復荷如天聖度俯鑒微悰頒文綺於尚方錫精鏐於内府龍顔宣室捧忠孝之綸音馬首東郊拜平安之天語感深欲涕寵至彌驚自謝直廬遂遵河渚雲深日近瞻冀北而懷思水涸沙淤望江南而莫達朝沿栁岸心依黼席之前夜泊漁磯夢繞金鋪之側逾四閱月始抵鄉園適蓬蒿初返之時正綺縠遙頒之日榮生里巷爭識聖朝禮下之隆喜溢親知共指微臣稽古之賜冰蠶麗質當暑彌清雪繭輕綃臨風欲舉爰選金鍼玉尺花鳥新裁還同紫綺珍裘龍香什襲伏念自膳服叨於禁近如臣之被寵者獨深迨頒賚及於家居似臣之䝉恩者益少欽承匪懈悚惕靡寧臣又伏思恩命由於内廷未敢繕疏稱謝遂使瞻依片念徒然自結於衡茅感激微衷無由上徹於君父輾轉宵旦難以即安敬藉同官肅陳謝悃望層霄而虎拜猶如身侍紅雲處下里而蛩吟敢冀詞聞丹陛伏願聖躬純嘏帝治龎鴻俗厚年豐民安物阜臣雖暫棲藪澤光華近戴堯天逺在江湖熙皥常依舜日臣愚不勝悚惶戰慄之至謹奉表稱謝以聞恩賜羊酒食物謝表張英康熙二十二年十二月二十三日䝉恩賜臣英羊二牽酒二罇鹿一雉八鮮魚鹿尾各六給付臣男翰林院編修臣廷瓚臣望闕九叩首謹奉表稱謝者伏以恩從天上蓬茅沾玉露而增榮春到江南枯蠧沐瓊膏而起色憶昔囊書深殿每分輝於伏臘之時詎意臥疾空山復拜賜於嘉平之節澤愈徵其優渥感自倍於恒常恭惟皇帝陛下文治光華武功赫濯運睿慮於穆清之上措邦家於磐石之安仁浹生民薄征徭而誦聲在野義孚藩服韜戈甲而譯使來庭近者紀聖略於球圖昭回千禩煥天章於雲漢炳耀六經宏猷允駕乎昔王芳軌逈超夫前代臣英葑菲薄植荷簡拔於昌時樗櫟微材隨歩趨於經幄恩深十載寵溢多生仰瞻聖學高深獲覩宸衷勤毖玉階待曙早看三殿鐙輝金鑰傳聲夜聼九門漏徹層霄清切異數駢蕃翠釡銀罌常飽調蘭之饌珍裘紫綺還裁疊雪之衣錦雉分自御圍良驥頒從内廐春風簾幙宫櫻堆赤玉之盤秋水蒹葭河鯉出珊瑚之網每當除歲宫使早叩衡門羅列尚方珍味懽騰穉子庖登仙獸瓮發天香歴數殊榮皆成盛事臣英未有涓埃愚悃報聖澤之帡幪猥以草土私情違天顔於咫尺枌榆暫返寒暑再更聽紫陌之雞聲近移茅舍盻觚稜之日影逺到田間雖負土之情少酧顧復而采薪之疾益覺纒綿蓋桐以心虗未霜而落栁因質弱望秋而衰身雖雜於漁樵念舊恩而倍悚夢常依於君父欲奮飛而未能乃上厪睿懷垂注無殊曩昔近當令序流膏特畀幽遐爰開白獸之樽用勵羔羊之素嘉魚貢於遼海瑞鹿致自闗山昔忝詞曹故有文禽之鍚近棲山澤并分野雉之珍計頒賚於内廷正當雪候迨郵傳於寒谷恰值春溫宸眷彌殷臣衷益愧乍聞而心惕永念而涕零思臣舊侍彤闈惟切曠瘝之懼自離紫闥久無夙夜之勞臣父得奉龍章典禮貺嘉於泉壤臣英屢承天語徳音遙下於江湖臣雖糜頂踵之微茫而無能醻生成之萬一者也伏願景祐日升聖功時懋俗登三古治冠百王臣雖結伴山農同為擊壤堯衢之侣倘得捐除宿疾再侍賡歌舜日之班臣不勝惶悚之至謹奉表稱謝以聞恭進聖徳萬壽詩表陳廷敬伏以徳並乾行純嘏允符函蓋光齊日照遐齡永配曦輪欣逄景運之昌慶洽承平之盛陽春發育喜萬彚之䝉庥化育和恒咏九如而獻祝臣陳廷敬誠懽誠忭稽首頓首上言洪惟我皇上貞符誕握寳籙𢎞膺居正體元備聖人之全徳履仁蹈義躋天下於咸寧有生民未有之竒道隆三古兼前代未兼之業功蓋百王文命敷而風教式於九圍武烈昭而聲靈振乎八極既高蕩蕩巍巍之績復溥穹穹厚厚之恩偕闓澤於神人徧謳歌於中外蓋以肇天極而修人紀用是闡皇綱而恢帝紘昔當初臨寳祚之時正是孝事慈寧之日重闈問以為君何欲我皇答曰圖治愛民曾傳聖語於當年言為經而辭為緯果見太平於今日治巳定而功巳成猶思由後以視今每念謹終其如始廓明徳新民之量廣錫類不匱之原存心養性以達天主敬立誠而體道容儀清穆肅雍殫昭事之䖍齋祓潔嚴享祀盡明禋之實危微精一接統緒於勲華濓洛關閩㑹淵源於鄒魯籖分甲乙探冊府之蔵巻歴丹黄發圖疇之秘西清東壁古今絶企夫天章二典三謨前後允推夫御製並虞廷之什義兼風雅之長超唐人之篇理取宋儒之正冠六文而首出邁八體以遐標玩程頤即此是學之言契神化於形聲之内愛公權心正筆正之語運經綸於文字之中宫漏未移巳布千言於紙上封章纔罷早廻萬象於毫端貫乎百家而我學不厭遊於六藝而惟聖多能玉尺儀天溥博如天之大土圭候日昭明如日之新春蒐夏苗適修軍國之禮投戈講藝不忘弧矢之威凡此躬行心得之精微具見帝徳宸修之廣大奉東朝之鼎養允矣孝慈操北斗之璣衡皇哉作述龍樓鳳閣光華朗映前星玉葉瑤枝芳馥長凝叢桂克勤克儉建昭代之儀型是訓是行彰皇家之法守體節用之指約省百倍於前朝𢎞益下之規徳澤頻施於萬姓惜金錢於太府無非寛閭左征徭減玉食於尚方正以裕民間積貯時頒渙汗蠲逋歳至再三屢沛絲綸賜免動逾千萬當爰書之覆奏必惻怛於宸衷祥風轉草色於圜扉協氣應星光於貫索夫自端居燕寢無時不以黎庶為心至於問俗觀民隨在必以補助為事鑾車駕而需雲布慶翠旗指而解澤旁敷河淮為國計攸闗疏瀹悉聖謨所示山川永奠春回禹貢之區漕輓咸宜人樂我朝之制良由無逺弗矚視萬里如目前以故靡舉不神運天下於掌上在昔逆藩蠢動致勞天討遐施一怒而安四海之民一舉而靖三方之亂彼有元之餘裔曾負固於窮邉奮我武之維揚七旬弗俟殄累朝之不逞彌月而平海不揚波郡縣盡臺灣之地野無斥堠享王來域外之人迨喀爾喀歸依幬冒之中廼噶爾丹自棄生成之外神謀獨斷廟算無遺朔漠三臨銘勒天山之表羽林大捷塵清瀚海而遙慕義嚮風日出悉冠裳之㑹同文合軌月支皆職貢之邦惟聖主過化而存神故王師有征而無戰所以行焉斯效動罔不臧總明目達聰之休𢎞集思廣益之美自執河魁之柄睿照遐周高披天鏡之光物情畢鑒規模𢎞逺令甲宣昭轉輸通遼海之舟航水利興西北之農畝積倉平糶以逮窮簷發粟截漕以蘇澤國郵𫝊用恤而恩渥輿徒鹺税是輕而惠流啇賈頖宫璧水奉箴勸以欣榮魚服豹韜感投醪而鼓勵仕循資格而立賢無方才許薦揚而用人惟巳時施仁於後世每致憫其嗣人念臣子末路之艱見覆載兼容之大凡沾雨露思竭涓埃共荷帡幪罔酬高厚今者懽呼遍於率土忭舞極夫含生雲燦星輝轉洪鈞於一氣麟遊鳳集開壽域於遐荒八千歳為春秋籌增太乙億萬年齊甲子世躋華胥昔天保頌岡陵推誠受祿及豳風陳忠愛歸嚮稱觥臣廷敬黍列侍從之班幸際雍熙之代伏覩聖徳廣運同歡萬壽無疆謹獻詩十二首管窺蠡測而莫罄歌衢擊壤以難名臣不任瞻天仰聖踴躍懽忭之至謹隨表㳟進以聞㳟進聖武雅表陳廷敬臣伏見我皇上撫御萬方盡有四海内外恩徳鴻龎聲教遐暨比年以來天下晏安而推溯武功所由戡定則誅三逆以平滇黔粤閩楚蜀外闢察哈爾臺灣倭羅斯喀爾喀之地幅􅊷之廣超越前古治化之隆巍煥莫竝今神謀獨斷聖武布昭伐罪救民躬行天討大憝授首餘黨歸誠厄魯特全國蕩平捷書至日雷動嵩呼中外臣工閭巷小民罔不歡欣忭慶蓋是時車駕親征馳驅戎壘凡三出朔塞矣當天衷决䇿初御六師中朝悚慄僚庶攀留臣以年力就衰䝉恩矜念弗允扈從之請自是以來祇遵成命不敢再凟天慈而違離聖顏日夕䖍惕伏念皇上為天下掃除殘賊為邊疆永致廓清跋歴窮荒經渉寒暑勤勞軍務旰食宵興而臣子安居略無寸効今巳無事言念國恩無所報稱猶欲俯竭愚誠撰儗文句敬颺聖烈之無窮而臣媕鄙無學尋繹累日莫知所擇竊惟自古帝王有功於天下其名聲彰著於後世者方䇿之所記載金石之所刋錄聲詩之所流傳後之人覽其事而遐想其盛焉是以昭昭然若昨日事也然而稱極盛者亦不數數覯矣阪泉涿鹿以還古今號善用兵者漢之高帝唐之太宗皆自興事之始乘時遘㑹底於成功若我皇上聖徳而踐天位躬居大寳志切生民仁育羣倫義正不譓尊臨九重制勝萬里天威所至攻戰多方撲滅兇殘蕩掃巢窟宿宼遺孽一朝頓除伏廿載之逋誅樹九邉之壯觀殱其渠魁降其支黨爟烽永息亭堠不施曠古難平之部落盡為臣僕普天所有之土宇咸入版圖自此寰海清平兆民樂業集萬年之鴻慶成千古之大功臣仰窺聖烈俯稽往古漢祖唐宗起於側陋角一時之雄乘末流之敝雖精於兵事而我皇上聖徳神功文謨武烈實逺邁前徽矣若夫書冊所載既有天下優游宫禁之中不過遣將興師身居其逸坐收其效即問有親征如宋藝祖之北伐明成祖之行邊宋則失利明則鮮功是以方䇿金石聲詩之文彷彿儗比可導揚盛羙之萬一者蓋徬徨震掉而莫知所擇焉求之於詩惟周宣王身為天子南征北伐有定天下之功雖淮夷諸小敵未為甚難平之宼而玁狁之伐止於太原皆命臣士以行事蹟殊不類然其臣咏歌之詞孔子有取焉唐臣栁宗元本其義作唐雅臣於嚮者滇逆之平不度固陋竊取其義進平滇雅曾上塵聖覽今臣伏思後世鐃歌鼔吹之曲未足以盡聖武之形容仍依古體謹譔大駕三臨沙漠親平僭逆聖武雅三篇繕錄以進臣之愚意固以敷宣人事之盛美而其義則歸本於天我皇上即天也覆載照臨雷霆風雨天之所以為道栽培傾覆治亂侮亡皇上之所以為功彼噶爾丹自外於覆載照臨之内干雷霆之誅絶風雨之澤蓋所謂逆天者亡也我皇上天威所臨賊始則沙場糜敗陣戮其孥衆叛親離孤雛就縛其卒也我皇上親揮將士廹抵賊巢賊知逆天必誅仰藥自殞遡始訖終我皇上馳驅萬里勞苦艱難若非親征大舉必不克迅致膚功此人事也即天也至若晴暘以時靈泉表異水草應候百靈効祥旋師之先甘雨灑郊飲至之日雲隂開霽臣僚擁道恭迎都人父老孺子瓣香欣躍凱樂慶成臣推本於天之義由兹益自信焉臣不任榮幸歡忭之至獻平滇雅表陳廷敬臣廷敬嘗誦詩見大小雅六月采芑江漢常武諸篇什皆言周宣王南征北伐興治撥亂以定四方平天下之功臣嘗竊嘆以為如詩所載可謂盛哉後讀栁宗元平淮雅表言宣王之形容與其輔佐由今望之若神人然此直以雅之故也臣按宗元意以謂宣王定四方平天下茍非其臣尹吉甫召穆公輩作為雅詩傳之於今今雖欲望宣平之形容及其輔佐之盛其道無從而宣王定四方平天下之功亦不能赫赫必傳於後世嗚虖宣王之功世既罕匹而有及焉與過之又無有尹吉甫召穆公其人者播為聲詩彰大其道如宗元所言鏗鍧炳耀盪人耳目者其何以昭宣治蹟丕揚武功傳之無極然則雅之作厥義綦重矣歟臣伏見皇上文武神聖天錫智勇光宅天下奠安八荒仁威所加率土内外罔不讋服乃有孽臣潛伏伺釁煽搆逆亂震搖我疆圉俶擾我人民皇上赫然一怒命將授鉞頃年以來定秦隴降閩海平兩粤收巴蜀天兵所嚮次第告捷而滇逆竊據南楚實為亂首皇上神機中斷指授規模掃清湖湘進克黔南破堅摧險直薄滇城之下師久不解於是睿㫖督進金鼓一動震蕩妖氛皆由廟堂動罔遺䇿是以疆場舉必有功海外怖駭臣黎懽踴太平之㑹適當今日臣嘗計滇逆之作亂干誅也耗糜賦帑私籍甲兵招納亡命擅行威福尾大不掉反勢已成正如漢削七國唐縱藩鎭早發則易圖優容則難㧞故三藩之事聖慮先覺不辭大創之勞永奠萬年之治即推較宣王之盛績殆謂過之矧漢唐之遺事哉而大雅不作臣竊恧焉顧念朝臣至多豈無尹吉甫召穆公其人者譔為雅詩薦之㑹朝燕饗施之於後用以颺大清之盛美於無窮臣獨何人敢專斯事臣又念寵光下逮最為優異而其官職尤在文章不得以能薄材譾不足以自効為解謹譔平滇雅三篇再拜以獻臣廷敬誠惶誠恐稽首頓首謹言皇清文頴巻一
