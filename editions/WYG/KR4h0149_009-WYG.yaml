body:
  text: 論黄鐘為萬事根本論劉綸古聖人擅顯庸創制之才彰物曲人官之用其所以經緯萬端者雖事極乎至纎且悉莫不與以宰攝之大原豈事事而為之所哉亦以理必彚其元數必宗其朔即天壤之大古今之遥皆将範圍不過而曲成不遺也請得詳黄鐘萬事根本之論今夫黄鐘者在氣為中氣在聲為中聲其得乎理者全也均其長得九寸徑其圍得九分積其實得八百一十分其賅乎數者備也故史記曰王者制事立法物度軌則壹禀於六律而六律之中物不得過事民不得過臣自有黄鐘以為之君而按序遞生即十二曲六十調不過錯綜以寫其藴太和所以鼓盪於兩間也氣化所以節宣於萬類也天時人事所以綱維樞紐於終古也由是以之通歴而緹灰有消長焉以之嘉量而絫黍有虧盈焉以之凖度而圭撮有嬴縮焉以之平衡而銖兩有空積焉鬼神至遼𣺌也一吹息以格之矣鳥獸至蠢愚也一聼觸以召之矣豈非其旁皇周浃厥用四逹而不悖者歟然竊意前之聖人聲律身度正黄鐘以推萬事則一本散為萬殊後之君子憑器考聲執萬事以求黄鐘則大用乖乎全體彼嶰谷之竹亦天籟自發耳鳯凰之鳴亦物性自通耳而元音即有以紀之何者其神融故其迹洽也至於漢京房之用凖晉荀朂之用笛梁武帝之用通北齊信都芳之用輪扇皆不惜殫思沉慮庶㡬脗合夫黄鐘而沿襲既差施用殊絶不亦舛乎善夫元定律吕新書之言曰欲求聲氣之中莫若就黄鐘而多設之管每分遞减更迭以吹律元可得兹固根本之論也若夫聖作明述宿悟神解潛運在希聲之始而理無不精數無不貫休明鼓吹樂緯而禮經之俾天下皆受治焉所謂萬事萬化宰乎心其又當求諸根本之先也已黄鐘為萬事根本論于振天地之化必待於物為之區事為之制則不勝其勞而化育之理将有時而窮聖人之制必待於事為之處物為之給則不勝其賾而制作之妙将有時而絀然而天下之事固非聖人不能區畫盡善也則聖人之處萬事必有其本矣今夫律吾知其髙者髙而下者下也清者清而濁者濁也今夫度吾知其尺有所長寸有所短也今夫量吾知其斗之大於龠也庾之異於釜鐘也今夫衡吾知其千鈞之重不以銖兩而移也是數者萬事之所待理而百姓之所日用而不知者也然使聖人必斤斤焉今日治律明日治度又明日而為之量與衡在聖人前民利用固有所不辭然而聖人有所不必者何也聖人固知本者也昔者黄帝使伶倫截嶰谷之竹㫁兩節而吹之制十二筩以象鳯凰之鳴雄聲六雌聲六律吕之生盖始於此顧六律六吕播為五音而益一以上生焉損一以下生焉四時和八風平功徳以是而昭符貺由是而集熙乎盛哉何由而致此葢有本焉則黄鐘者是黄鐘者子月之律也候律之法為室三重閉戸塗釁密布緹幔以河内之葭灰抑律兩端冬至日一陽初復其灰自然飛動而黄鐘應焉此固天地之氣剥而必復聖人制器以迎之造物無心也聖人亦無心也由是而律吕正焉宫商協焉而百獸舞鳯凰儀無怪矣由是而九十分黄鐘之長一為一分各自其十以登於引則度之長短視此矣由是取黄鐘之管容子穀秬黍中者一千二百為一龠焉又十其龠而為合焉而斗斛以上類然矣由是而一龠之重則十有二銖焉又倍其銖而為兩焉而鈞石以徃莫能外矣推而至於謀衣食興學校禮以節性樂以防滛凡所謂用天之時因地之利以導民之和者胥不外是故曰本也夫巨木之初生萌荄焉已耳土膏之所滋息雨露之所浸潤以達其枝以茂其葉髙或百尺廣䕃千畝者無他其根之所蟠者大而因之者有其本也黄鐘之為萬事根本也亦若是則已矣葢嘗論之後世之人物物而為之所事事而為之制宜其施之無不當矣而上下之間弊弊焉察察焉日不暇給者古之聖人執其簡以御其繁握其中而圗其要萬事無能遁焉此黄帝堯舜所以垂衣裳而治成周之世所由致宇宙太和之盛也歟黄鐘為萬事根本論周長發天下之事萬有不齊而莫不根本於黄鐘以為起數之原大數協於十長於百大於千衍於萬此其事幾疑為繁賾之藪而不可紀極以窮其藴者矣不知肇始黄鐘紀於一而三之三三積之厯十二辰之數十有七萬七千一百四十七而五數備矣此其説有可得而申者焉昔者黄帝命伶倫自大夏之西昆侖之隂取嶰谷之竹其竅厚均者斷兩節間而吹之以為黄鐘之宫制十二筩以聽鳳鳴而雌雄各六是謂律本自黄鐘以至蕤賔六律為陽自林鐘以至應鐘六吕為隂參分損益隔八相生皆還相為宫以起數此所謂律娶妻而吕生子也夫律以起厯此又三統三正所由兆焉黄鐘當半子初開之候一陽来復之時施種黄泉孳萌萬物天統天正定於此也由是林鐘在丑則為地統地正太簇在寅則為人統人正玉衡杓建天之綱也日月初躔星之紀也推之而小周大周小成大成月㑹嵗㑹閏法元法備基於黄鐘之黍絫而天下之能事畢矣書曰同律度量衡葢以齊逺近立民信也因律而考之度本起於黄鐘之長一黍之廣度為九十分十分為寸十寸為尺十尺為丈十丈為引而五度審矣廷尉掌之量本起於黄鐘之龠合龠為合十合為升十升為斗十斗為斛而五量嘉矣職在太倉大司農掌之衡本起於黄鐘之重一龠容千二百黍重十二銖兩之為兩十六兩為斤三十斤為鈞四鈞為石而五權謹矣權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生凖是謂五則職在大行鴻臚掌之若此者其以黄鐘為根本焉明甚然黄鐘起數又不特度長短者不失毫釐量多少者不失圭撮權重輕者不失銖黍而已也在人心亦自具黄鐘焉秉陽剛之氣騐来復之機喜怒協乎温肅哀樂符乎慘舒而由否而泰由屯而亨由剥而復天人理欲判於幾微其亦天開於子之精義乎所以按之五行而土屬中央騐之五事而思以作睿體之五常而信以統終察之五音而君以作始即以萬事之本為萬理之根無不合也是可探河洛之數而起悟矣黄鐘為萬事根本論汪士鍠天下之事不可勝舉而必有其原天下之理不可勝窮而必有其要推其所從生而遞以相嬗於無盡此繼天立極之聖人創為法制垂諸後世而事以理起舉無有能外焉者也昔者黄帝使伶倫取嶰谷之竹吹之以為黄鐘之宮制十二筩以聽鳳鳴雌雄並六比黄鐘之宮而皆可以生之是為律本劉歆著其說曰一備數二和聲三審度四嘉量五權衡稽之於古今効之於氣物和之於心耳考之於經傳咸得其實靡不協同數始於一至於十百千萬所以算數事物本起於黄鐘也一而三之三三積之歴十二辰之數十有七萬七千一百四十七而五數以備聲者宮商角徵羽也五聲之本生於黄鐘之律九寸為宮或損或益以定商角徵羽九六相生隂陽之應也律有十二陽六為律隂六為呂合樂用焉歌奏用焉而五聲以和度者分寸尺丈引也本起黄鐘之長以子穀秬黍中者一黍之廣度之九十分黄鐘之長一為一分積十為寸自寸至引遞以十升而五度以審量者龠合升斗斛也起於黄鐘之龠用度數審其容以子穀秬黍中者千有二百實其龠以井水凖其㮣合龠為合自合而至於斛皆以十遞加焉而五量以嘉衡權者衡所以任權而均物平輕重也其道如底以見凖之正繩之直左旋見規右旋見矩也權有銖兩斤鈞石之差焉起於黄鐘之重一龠容千二百黍重十二銖兩之為兩十六兩為斤三十斤為鈞四鈞為石而五權以制權與物均而生衡衡運生規規圜生矩矩方生繩繩直生凖凖正則平衡而均權是之謂五則也故書曰同律度量衡所以同天下齊風俗也陶唐命官授時以閏月定四時成歲允釐百工葢自伏羲畫八卦由數起至黄帝堯舜而大備以天地之風氣正十二律定黄鐘起於子而終於亥終而復始天地之大紀該焉歴代以來講求愈密而溯其始皆起於律史記曰王者制事立法物度軌則壹稟於六律六律為萬事根本而黄鐘者又六律之根本也夫作者之謂聖述者之謂明行而不著習焉不察斯莫識所由來耳如其因端竟委窮流溯源則起化有自時措咸宜引而伸之觸類而長之天下之能事畢矣然則聖人之所以為法於天下可傳於後世者其故可思也若夫縱黍横黍之辨漢斛魏尺之殊羣論紛紜莫所折衷非荀阮之神解李通之心契詎易測其淵微也哉黄鐘為萬事根夲論齊召南言道者必溯太極言數者必溯黄鐘此非有精粗神迹之判也太極者黄鐘之至理黄鐘者太極之元氣始生萬物位居中央於聲為宫於行為土於辰為子於卦為復於統為天於時為曰南至氣之母而聲之君也是以舉天下千變萬化之噐與數莫不由之以生即謂萬事之太極也可㫖哉黄鐘為萬事根本之説也試論之黄帝制律以象鳳鳴首曰黄鐘其長九寸其數九九從而遞相損益以極於應鐘而十二律備黄鐘正則十二律皆正而天下之聲無不正大樂所以同和天地感格幽明類致百物移易天下之風俗而鼓舞至神者黄鐘之為也然則謂十二律為樂之根本而黄鐘為十一律之根本此亦善於言黄鐘者矣雖然烏足以盡黄鐘哉今夫天下事之大端有五備數審度嘉量權衡與和聲並重者也而是四者則無一不本於黄鐘數之紀於一協於十長於百大於千衍於萬也夲起於黄鐘積三之數度之别於分忖於寸蒦於尺張於丈信於引也夲起於黄鐘積黍之長量之躍於龠合於合登於升聚於斗角於斛也本起於黄鐘積黍之龠權之始於銖兩於兩明於斤均於鈞終於石也夲起於黄鐘積黍之重書曰同律度量衡冠律於度量衡之上凡以是也至於布蓍而掛扐卦爻應焉尚象而規矩凖繩應焉演為歴算而春夏秋冬之節氣章蔀紀元之積分應焉推而族姓始於吹律軍聲辨於執籥星土凖於旋宫天下無有一事不夲於黄鐘也者又奚啻括羲和廷尉鴻臚司農之所掌已哉以其為施種之初也故曰鐘以其為五色之尊也故曰黄隂陽合徳氣鐘於子以化生萬物故由孳萌而紐牙而引逹而冒茆而振美而己盛者生氣之通自乾初九以至上九也其由咢布而昧薆而申堅而留孰而畢入而該閡者生氣之復自坤初六以至上六也變化不窮以黄鐘為樞紐如木之始於根而布於葉以暢於枝如水之始於夲而流為川以放於海班固所謂䆒極中和為萬物元又謂太極元氣函三為一洵善於言黄鐘者歟抑又有説有天地之黄鐘有人心之黄鐘天地之黄鐘月令是也故孔子贊易曰天地之大徳曰生而於復則曰見天地之心也人心之黄鐘喜怒哀樂之未發是也故中庸以中為天下之大本也處兩大之中者為人宰四海之中者為君君之所以理萬幾而康萬國者豈有他哉心而已君所以宅心者豈有他哉中而已致中以致和而天地協應兆民阜成百昌茂遂将所謂黄鐘者不在區區之噐數而在道法矣書曰皇建其有極此即萬事根夲之説也歟史論劉綸讀諸史而不以正史爲考信則見必岐讀正史而不以諸史爲參稽則識必固司馬遷續父談爲史記禇少孫補以景武紀等書裴駰觧之而蘇子由作古史以糾之班固續父彪爲前漢章帝又命曹大家補八表天文等書顔師古註之而劉知幾作史通以糾之蔚宗􅆓晉人輕俊之風似遜孟堅一格而思精體大與班並驅或曰前漢失之同後漢失之誕則荀袁二紀可並採已陳夀三國志帝魏而退蜀雖文中子司馬公諸人俱韙之而大統實紊習鑿齒所以有漢晉春秋之作而蕭常亦正以續後漢書也夫古人史出一手至晉書乃共參著述其始創於何法盛等十八家其後修於房元齡等十三人房喬者即元齡也文多駢麗無亦兼採世說諸書之過歟李延夀之爲南北史也綜八代於二書以成父志而沈約魏收子顯思廉百藥德棻之史瞠乎後焉然其複也可芟其遺也可檢彚而脩之是固有待且南北史不作本志則如魏徵隋書所編顔孔諸人之志尤屬賅貫可佳而論史者專及五代何哉舊唐書權輿於韋述斟酌於劉昫仁宗時加刪改新唐書則梅堯臣爲方鎭百官表劉羲叟爲律歴五行志宋子京爲列傳而歐公綜紀志之成進表有云其事則増於前其文則省於舊當矣乃劉元城正以此爲新書之病又豈無說耶至於歐公新五代史葢重修薛氏舊本者自朝廷取付史監而居正之史不行良由煩猥失實耳宋金遼之史不及前代如掲傒斯歐陽元所脩尤屬不知正閏其庶幾者陳桱之通鑑續編他若李燾長編陳仲微二王本紀亦不足多矣元史作於胡粹中洪武間命宋濂纂修尤多舛謬欲其追嫓前史之流風餘韻葢亦難之豈古今人本不相及歟抑雖有史才而未盡協其用歟夫以司馬班范陳夀諸人其才與學與識固超出於諸史萬萬也以子由知幾鑿齒蕭常諸人其才與學與識未必不大遜於正史也然而正史之缺失亦有時不能不藉諸史以捄之何者正史釐爲國憲有其醇必有其疵諸史列於各家有偏見亦有特見今誠以正史爲一成之案而以諸史爲互證之佐亦讀史者之又一見也矧二十一史皆法尚書爲紀傳體至編年之例諸家不同而莫善於司馬涑水之通鑑胡文定作舉要補遺所以正其失也劉恕復作通鑑外紀所以備其闕也紫陽綱目規仿春秋至嚴且明不在永叔五代史下金履祥通鑑前編得其意焉珥筆者宜於何取法已方今聖天子盛德休烈光於青簡遴記言記動之司分繫日繫年之典而又纂修實錄以揚扢我祖宗累世之丕緒一時冊府芸香鸞坡鳳掖葢皆有左黼右黻蔚爲國華用能垂萬年之憲勒千古之書者矣臣其敢不拜手稽首以爲當宁獻史論于振昔我聖祖仁皇帝以朱子綱目一書有禆於治道有益於人心特於敕幾清暇丹黄甲乙著為成書刋刻頒賜俾天下溯流窮源以知春秋筆削之精義又以明史未竟特命開館簡選儒臣蒐羅舊聞以彰美備世宗憲皇帝監於先典復加考定伏遇我皇上乾德龍飛生知天縱懋學日新羣臣之擬述一衷於聖明之裁定於是乎有明之史炳乎足以奄有二十一代之簡編矣顧臣竊惟史之難有三非具淵通之學則無本也非有著作之才則非體也非嫻於掌故則古今不具悉前後不相䝉古人云文章如面史才最難職此故也廿一史之名亦以其代言之耳正史之外如漢之袁宏荀恱晉之孫盛習鑿齒及王隱臧榮緒逮後劉知幾輩皆有述作蔚然可觀亦曷可少焉雖然千古之史才司馬子長其首也其文宕逸善叙事有牢籠萬有之㮣始於談成於遷補於褚少孫尚矣而班固乃逌然􅀏之謂其崇黄老進奸雄耳夷考固之為書自髙至武盡竊遷之舊六世之後資於賈逵劉歆其卒也曹大家為之竟其業則固之所自為盖無幾耳然其文筆醇古樸茂又非後之所及范􅋫倜儻小才人無足取獨其書體大思精所以與班馬並稱三史也三國之統自當以蜀為正陳壽無足責而涑水亦復仍之至紫陽作綱目而正統始定其為功於名教大矣晉書始於何法盛等十八家貞觀中以法盛等所撰未允詔房喬與褚遂良許敬宗等再加撰次房喬者元齡也喬以宣武諸傳論上所自為故曰制㫖而稱御撰焉古者修書多出一家之言其成於衆手而歸之御撰盖始於此前此則有沈約之宋書蕭子顯之齊書姚思㢘之梁陳書魏收之魏書李百藥之齊書令狐德棻之周書之數子者非不各竭其心思才力欲與班馬爭席顧有紀傳而無志書識者憾焉非有隋書為之補其缺畧何以信今而傳後耶隋書者亦修於貞觀與晉書並稱良史者也盖由太宗因才器使以顔師古孔頴逹博通古今故授以紀傳于志寧李淳風明於天文地理圗籍之學故授以志書総覈詳明自沈約以来所未有也其時李延壽預修晉隋二書究悉舊事因效馬遷體総序八代為南北史學者稱之而沈約魏收諸家益微矣唐書始於吳兢劉昫因之繁畧不均是非失實宋祁歐陽修被命為新書事増於前文省於舊劉元城以為事増文省正新書之失云舊例修書止著官髙一人歐以宋為前輩並著姓名宋感其退遜或謂子亰用字竒澁歐公殆不滿之故為此以表異耳今觀五代史之作條例嚴而體裁正史遷之後此為嗣響視新唐書如出兩手固非子亰所及也何况薛居正盧多遜李昉李穆等之繁猥無稽者乎宋有三朝兩朝四朝等國史元初立國史院命史臣通修遼金宋三史為都總裁者托克托也為總裁者特穆爾達實及掲徯斯諸人也明洪武中命宋濂等修元史未期而成自遼以下史筆蕪穢無足觀者古今人才力之不相及信不誣也要之作史之體雖有編年紀事之分後代以来亦有起居時政之錄然編年者當以春秋為法紀傳者當以司馬為宗至涑水創通鑑於前不過春秋紀事之成法朱子成綱目於後乃得聖人筆削之微權而遂昌尹氏永新劉氏或為之發明或表其書法皆所以尊史於經煌煌焉甚鉅典也臣槖筆無能簪毫有愧惟有勵劉向燃藜之志懐子雲給札之思引領彤庭庶幾藉文章以報國云爾史論張漢大凡人臣之進說於君也衷之以經術而已六籍之微言無論則三代而下碩儒名臣之嘉猷讜論無有逾於程朱以程朱躬承聖人之統者其先則漢董仲舒漢唐諸儒無有過是亦守先待後之人程朱之所許也請因明咨而敶之考管子以德當位功當祿能當官為三本以節用賢佐法度誅賞天時地宜為六務荀卿以仁義威為三具其四齊則其治法其佐賢其民愿其俗美之說也漢孝文時鼂錯對賢良三䇿一以明國家大體一以通人事終始以能直言極諌孝武帝時仲舒三䇿則多援春秋經義天人治道之要明析言之盖正誼明道不謀利以計功其聞道者以是推之致君亦以是當是時賈董並稱而治安之䇿不免於矯激之論與公孫氏同舉而曲學阿世吏治縁餙以儒術其本原大有醇疵區區智囊之鼂錯審機度務正不免計功謀利之習也夫豈可同日語耶至言世務書嚴安以禮度防風俗之奢儉徐樂言安危之要賢上獨觀萬化之原各有所見不能大為優絀仲長統稱崔實政論與荀恱申鑒五篇其詳政體篇有五大抵興農桑審好惡宣文教立武偹明賞罰其言可採施於時政不無有禆而亦未盡簡核嗣是而十思之疏且詳敶十漸者當以魏徵為凖太宗致治雖不即幾成康而納諫如流有主聖臣直之美徵不盡繩以古人之禮法而抗言切諍則有古大臣骨鯁之風可以上比於汲黯若夫司馬光五規所謂保業惜時逺謀謹微務實其說皆守邦之要道唐姚崇元稹宋呂公著范仲淹程顥皆有十事之奏可法可傳不能妄議其得失直與張九齡之金鑑録韓愈之奏表陸贄之奏議蘓軾上神宗書及以通鑑大學衍義進講敶無逸圗以托諷者並傳千古唐宋以来其可嘉與者尤不能一一詳舉也至程朱為御史裏行及崇政殿說書煥章閣待制皆以古大臣自期故言先務以立志責仕求賢為急言大本則君心為要是以程頤方長不折說者以為特小失孟子引君當道之意而不知預養仁心則杜漸防微亦其見端朱子入告或以為正心誠意上所厭聞而必曰生平所學惟此四字以故在朝疏凡七十餘上不慮其數且辱者得其本也執是可以入諫矣管荀諸人覇功也雜學也因時取濟可耳豈王道之所貴而與純儒比論耶臣愚以為諫君之道格其心而已積誠以動之明理以啟之心平氣和從容而詳悉之仿都俞吁咈之風必期於信焉而後諫諫斯無迕然而古之諫臣亦有不必盡拘者信而諫有如魏徵不必信而諫有如陸䞇而同歸於諫行而言聼則又視乎其人以致之六籍所載微言孔多得其道而用之已盡於此天下安於磐石而歴萬年有道之長以是故也臣不揣愚陋用敶區區之忱乞聖天子垂鑒而采納焉皇清文頴巻九
