body:
  text: 賦耤田賦有序和親王𢎞晝臣聞禮經考索云國以民為本民以食為天故虞舜命后稷曰播時百榖周公陳無逸曰先知稼穡之艱難誠所以厚民生固國本也昔漢文帝詔賜天下田租之半議賑議貸黎民乂安治最近古唐太宗親祭先農躬御耒耜當時天下無事五榖豐登百姓和樂幾至刑措欽惟我皇上重農貴粟子恵元元深仁同天至徳匝地御極之二年甲辰春仲躬親耤田率三公九卿秉耒而耕至誠蕆事嗣是耕耤之禮每嵗舉行至勤且恪用以迓天貺享祖考阜人民典鉅慶隆豐年屢兆六府著修和之媺萬方興盈億之歌唐虞三代之盛未有加於此也謹拜手稽首繕賦以獻其詞曰繄稼穡之匪懈兮食乃萬民之天惟我皇之重農兮稽鉅典於前編敬粢盛而飭御耦兮用作式於八埏乃祇事於九宫之位兮遂躬耕於千畆之田祥光燦於膏壤兮瑞氣發乎郊􅆵萬姓歡傳兮如百川之朝海千官布列兮等衆星之麗天懿哉我皇勤思田功諏吉期兮幸東陸齋三日兮告神農内外兮清謐上下兮肅雍是日也水漏聲殘東方欲曉南面凝旒御爐香裊鸞仗兮具陳景鐘兮徐考俄而閶闔啟寳扇揚六轡齊舉八鸞鳴鏘披緑野兮條風和矚青郊兮嘉卉芳帷宮啟兮春日麗黛耜具兮稼器詳執洪縻兮在手御紺轅兮㳺場四顧兮溝塍砥平三推兮土脈蘇昌若夫公卿大夫進耕以次或五或九祗肅㒺肆庶人終畆勞酒以賜胥上下以致恭遵禮經而蕆事於是金鞭方輟玉輅遂旋雨㢘纎以清路風縹緲而散烟侍従偕来睹天顔之有喜馨香上逹卜瑞兆於豐年統神人而胥悦慶福祉之交駢緬夫后稷播種夏禹躬耕取諸豫而順動應乎乾而時行書傳乃粒之羙詩有生民之賡仰惟我皇敬誠充盎耒耜躬親降福孔穣萃九有之歡心展一人之孝享洵咸五以登三與天參而地兩數耕耤田兮綏萬屢豐匪且有且兮樂利咸仰又従而獻頌曰我皇重農弗自暇逸御精躬耕身先為率東作西成穫之挃挃晉獻宗廟享於克一上元觀燈賦以時和年豊萬方同樂為韻和親王𢎞晝繄陽律之乍轉瞻斗柄之初移勃佳氣之鬰葱正陽春之届期解祁寒於百室扇條風而和熙快媚景之始陳惟桃李之先知矧上元之佳節列燈樹於九逵布風光之妍麗咸流翫而忘疲爾乃明昭上帝受福則那雙莖九穂珍祉駢羅慶民安而物阜悉巷舞而途歌時清兮太平有象春融兮樂事孔多羅勝新裁人人綵絢鬧蛾争耍處處肩摩忘箭移於玉漏愛蠟艶於銅荷維時明月上夜景妍士女集車馬聨撙撙繹繹轟轟闐闐鐵市銅街鬬銀花之璀璨紅樓翠館映火樹以㛹娟簫鼓溢昇平之響黔黎遊豐樂之年此固合九州而一軌統四海而皆然者也至若皇都佳景更為隆豐春先得於萬國恩早沛於九重比户受盈寧之錫連閭揚和樂之風故應莭而春燈盛祈年而勝賞同九枝延追古之佳號百葉翻炫今之巧工或團圞兮似月或蜿蜒兮猶龍撤魚鑰於五夜兮天街蕩蕩渡星橋於九陌兮人影匆匆若夫居尊臨卑執一御萬玉燭調兮泰階平東風至兮韶景換人無徃兮不和民有樂兮争獻張綵架於六宫炯炬輝於三殿鰲山對峙龍蠟烜其葳蕤鳳閣層開星毬布其燦爛攄愉悦於宸襟又萬方之所同願夫其夜明似晝月照如霜萬户千門羃祥烟之晻藹五光十色閃鶴燄之熒煌畫檻兮金蟲墜影紗籠兮蠟穂吹香錦繡紛敷儼勝萬花綺谷笙璈錯奏宛齊瀛海仙鄉夫豈猶人世之可擬而塵坱之足方也哉然而致斯盛也一人垂拱九有大同萬物並育百榖屢豐致黎庶於康阜萃民氣於和雍宜乎登春臺而胥恱同民樂於無窮爰頌我皇受天百禄嘉符迭臻金甌永卜慶天地之長春敷陽和於百族年復年兮化日舒嵗復嵗兮兆姓樂睹良宵與勝事快風熙而景淑歡呼抃舞燃長明不盡之燈就日瞻雲申萬夀無疆之祝學問至芻蕘賦和親王𢎞晝為學在乎下問審問貴乎虛心不下問而終成自棄非虛心而集益不深逺覧遐搜惜寸隂於暇日廣咨博採彚碩論於冲襟然後獻可替否作礪為霖彼詢於芻蕘之訓可謂昭徃古而耀来今矣原夫日新謂徳多識是貴自用則小矜滿宜汰不臨深以為髙敢居約而為泰迹其過乎自卑正其所以成大是以有而不居謙而不忲盖未有自以為是而不受害者粤稽先哲博觀徃訓堯稱克讓舜推好問大禹傳昌言之拜發於至誠孔子當聞過之時引以自幸夫豈徒髙已卑人守一身之獨學眇聞寡見致四方之令聞也哉爾乃並觀兼聴推誠布公乃明四目聿逹四聰謨猷日陳乎殿陛咨度下逮於蒿蓬於是朝廷之上藪澤之中靡不進讜論竭愚忠小夫獻一得之善太史陳四方之風詎止邁乞言於憲老而納明諫於瞽矇於是學既得宗問惟務廣内不懈兮道積而修来外多聞兮用中而酌兩纎毫不棄如大海之納細流片善必收等泰山之容土壤敢言之路日開虛受之𠂻内朗此一人所以集慶而為臣民之所共仰者乎荔枝賦和親王𢎞晝原夫大宛蒲萄上林楒栗平陸甘𤓰江陵紫橘玉井之雪藕欺霜洛陽之朱櫻耀日鍾山之李大如瓶信都之棗甜於蜜徵嘉果於羣芳咸應時而垂實乃有林檎為兄石榴為弟禀乎炎精依乎火帝殻染丹砂衣裁錦帨角昴見而綻靈葩雲日鏡而流火齊枝懸萬顆等瓔珞之紛垂霞麗千房儼珊瑚之交綴繁生閩粤之鄉著羙渝涪之際肇嘉名曰荔枝非凡果之可嫓爾其為色也或稱陳紫或命藍紅始雕青玉旋鏤丹銅瓊膏兮内孕絳羅兮外蒙赤罽初收脱晶丸於掌上朱嚢乍觧卸氷繭於盤中宜乎領状元之號而膺一品之封若其為香也貫膚膜徹表裏氤氲可尋掩冉難擬紀江緑之馝芬傳宋香之旖旎剖殘赬顆溢芳靄而襲人劈破氷肌散清芬而染指此薫艾納者不足方而含鷄舌者庶可比至其為味也談香心醉數種涎滋津寒兮似雪膚膩兮如脂沾唇而甘流僊醴入齒而冷沁華池小核中含快嚼丁香之實瑩瓤外朗潤同瓊島之芝若夫厥種攸分品題獨絶龍牙鳳爪之殊雙蒂側生之别楓亭兮自昔稱竒閩嶠兮於今為烈蔡中郎之譜譽以無雙白香山之圗誇為第一固宜人人同嗜處處争傳方之絳雪擬以神僊詩誦髯蘇狂情饕餮賦成王逸麗句芊綿此紀芳名於千古而擅嘉實於八埏者也方今聖澤無方神功及逺極無外之要荒亦盡歸於圗版藉方物以輸将詎辭勞於徃返聖心祗惕兮異物弗珍臣子敬恭兮嵗供恐晚頒玉府兮殊錫九天褁黄帕兮承恩上苑咽天漿而飫徳孔深謹獻賦而丹誠藉展爰為之歌曰嘉實之生依此芳樹嘉實之来致自王路欣沐賜於九重得分甘於瑶圃看嵗獻於炎方慶蒸黎之永附皇太后萬夀無疆賦有序以萬夀無疆賦為韻誠隱郡王允祉皇上御極之三十九載恭遇皇太后萬夀花甲一周臣祉偹位屏藩得颺言頌祝伏惟聖母凝庥錫嘏永萬年之厯睿思𢎞孝尊親垂百代之光奉玉食以含飴承露掌開列繽紛之環珮被山龍而戱綵鈞天樂奏来絡繹之車書添籌算於未央薦兕觥於長樂治道式彰乎孝徳慈顔並永於坤維率土咸歡普天胥慶臣祉學慚沛獻欲将介福之詞才謝陳思敢進母儀之頌惟願流霞絳雪佐玉膳之瓊漿朱草醴泉効椒宫之靈瑞斑龍捧馭萃松喬期羡而偕稱五福之觴青鳥啣書合方壺蓬瀛而共貢九如之什臣不勝夫歡忭愧無能於贊揚謹抒葵忱聊伸嵩祝謹作賦以獻賦曰維聖世之清寧萃禎祥而叠獻既治化之旁敷徴皇極之克建合大順以致尊親集振古之洪禧躬盛徳以崇聖母立興朝之彛憲我國家車書同軌大一統以為家聖祖母六甲甫週協二儀之永健天人咸應以休徴子孫得伸其至願貢獻踰山海以梯航頌揚極臣民之億萬伏覩我皇上純孝性成聖徳天授定省晨昏恭勤左右怡慈顔於椒闈承歡心於靈囿奉鸞輿莅湯沐之里旃裘毳帳貢琛而獻賮者駢闐導鳳舸臨吳越之邦白叟黄童巷祝而衢歌者輻輳命駕則豐隆灑途御舟則天吳肅候神祗因孝徳以効靈山川願嵩呼而獻夀恭惟皇太后鴻仁溥被渥澤涵濡周藉姜興開天而佐聖祖任惟姒繼配地以大皇圗兹執徐之紀嵗值花甲之方逾玉殿風和仰卿雲之似盖金莖日麗浥甘露以如珠皇情幸母后之安康而喜慰聖懐極家人之禮數以歡娛人親其親人子其子已合四海以成一人之孝人知奉親人知克子又即一人以示百代之模實前古之稀覯允近今之所無於是南極耀景星光神鳥集瑞鳳翔萐蒲自扇蓂莢呈祥盖六合含齒戴髪之倫盡荷推恩之濊渥八極翾動蠕生之屬同涵錫類之汪洋遡煦育之洪慈已共黄輿之㒺外合羣情為大慶自同坤徳之無疆乃若孟冬届節乾風初度萬物凝成嵗華貞固方初月之生明喜昌期之適遇大典合萬國之歡聖孝誠五十而慕龍文煥彩唱天長地永之詞螭陛歡騰上日升月恒之句儒林何幸得珥筆以颺言藩列雖㣲亦趨庭而學步欣遇聖明之世欲紀盛而無能敢従簪紱之倫抒㣲誠而獻賦萬夀賦以一人有慶萬福来同為韻誠隐郡王允祉惟昊蒼之無私佑元后之建極六合待其範圍五福由之敷錫故瑶光華渚受命凝祥日角電樞開天叶吉然稱祝莫尚陶唐祈年獨侈周厯自今以較前徽聖皇實為首出盖久道爰觀乎化成純嘏畢集於盛徳今将賡天保定爾之篇請厯數夀考維祺之實我國家自太祖丕基締造至太宗輿圗式闢世祖凝鼎命以維新皇上則大顯承而正域質既擅其神靈學復傳乎精一聖功乾健聖徳日新隆兩宫之孝養肅九廟之明禋光輝被乎四表懐柔遍於百神治本乎黄唐虞夏道貫乎濂洛闗閩乃進石渠之彦天禄之臣闡圗書之閫奥析謨典之真醇廣敎思於宇内布講義於成均且宣諭而立訓俾化俗以興仁寰中順則海外来賔覆冒丕周僉頌右文天子聲敎四訖咸尊有道聖人至若神武震乎八區皇威赫乎九有弧矢用而市不易肆欃槍銷而農不更畆南服廓清北藩稽首遂使龍庭毳幕隸留守之版圗鼉窟鮫人増海邦之户口擴中外以為家合垓埏而在宥念殊域之傾誠并帡幪於髙厚龍旗指瀚海之區虎旅環隂山之阜鐃歌朱鷺七萃同聲旅振白狼百僚拜手遐邇同歡梯航恐後邁漢唐而莫京越三五而誰偶猶以保泰在乎持盈勵精逾乎初政憫淮泗之其咨頻省方以申命躬授平成之䂓永著河渠之令桑田無恙而允翕可期璧馬不捐而安瀾告慶且勤昧爽以圗幾闢明聰而廣聴延訪下逮於芻蕘垂箴用勵夫諫諍岳牧閫帥俾述職以近光守宰偏禆得伏蒲而仰聖憐才則宏開使過之仁奨亷則立寄封疆之柄計典不煩而吏自整肅軍政預飭而士皆果勁百工有允釐之休庶績有咸熙之盛至若耕織早繪於深宫恵澤必周於海甸雨暘未爽桑林之禱黙修豐歉未形常平之儲早辦闗隴頒少府之朱提淮揚仰神倉之白粲課額減而商竈均霑𣙜税寛而懋遷共勸宿逋盡免累豁者數十州賜復頻聞嵗蠲者數百萬且念深於欽恤法詳於奏讞巽風掃地幽枉皆春解澤行天生全無算刑不濫而幾措網雖寛而無玩爽鳩芝秀於圜扉貫索星澄於碧漢此皆徳意浃乎肌膚豈史臣所能紀贊更有盛事足冠古今鉅典永輝簡牘廵狩則定省無違逰豫而花萼必䔍闕里之輪奐聿崇先儒之遺裔畢録勝國親修禮敬之儀賢祠特錫馨香之粟他如東藩請糴轉輸之般舶聨翩北漠望哺賑貸之車牛相續浿江平壤欣鼓腹者千村木葉臨潢慶更生者萬族又若巴渝外徼溪洞殊俗皆百代之所不臣千祀之所未服詔書下而永戴尊親驛使臨而願依覆育即今四十二載巍煥之規已裕百千萬年清寧之福時則協洽紀嵗姑洗律廻花明瓊島栁拂金臺鶯歌玉樹燕舞瑶堦慶雲屯於六甲佳氣繞於三台瑞啟當年占為五龍七鳳歡同此日洽於八埏九垓内則六宮瞻黼座而上無疆之祝列藩随主器而貢萬夀之杯外則勲臣世胄九棘三槐折衝干城之選鹽梅舟楫之材八表之車書共集萬方之玉帛偕來海澨山陬歡呼動地衢歌巷祝頌禱如雷則見夫南極輝於丙位太乙耀於璿宮仙仗齊而龍墀濟濟鈞天奏而鼉鼓逢逢合宇宙愛戴之情結葱葱之瑞靄聚天地太和之氣布習習之條風従此醴泉洋溢甘露沖瀜騶虞馴囿朱鳥棲桐物皆上瑞嵗咏屢豐玉燭調而星躔式序金甌固而風俗皆同含哺者忘帝力珥筆者紀時雍臣敢附九如於雅什繼三祝於華封謹稽首頓首奉觴以進曰盛徳鴻功覆載同符而莫並大年寳厯乾坤共永於無窮解愠阜財賦平郡王福彭君代天以理物聖出治而憲天至治行乎無事大化著其誕宣傾者扶滯者出和氣薫蒸乎六宇求有獲欲有遂休嘉翔洽乎九埏恵薫兮和暢氤氳兮聨緜萬民兮雍動四野兮殷闐鑿井耕田帝力忘於何有崇墉比櫛史官誌其有年緬勲華之上理符大造而無偏爾其時届中天聖人在位輯瑞来同共球畢至卿雲兆其糺縵四表蒸其光被煦煦乎大塊之噫氣既鼓物而無淒油油乎空穴之娱人亦飲醇而如醉歌於塗舞於巷民十室而九康積於野登於場禾一莖而六穂家無暑雨之咨户有珠玉之賜府修事治溥樂利於四民雲爛日華慶平成乎天地皆斯風之煦嫗代君王而撫字若夫其出自谷其来自南汎蘭如臭捲霧為嵐若浮若沈乗烟雲為嘘吸如升如降随光景以沈涵木當之而擢秀草拂之而成毿凍遇之而融融露值之而湛湛鬰者舒而憂者喜何慍之難堪至於箕主簸揚物為解渙欣然枯蘇淵然冰泮吹棘薪兮為凱宣槖籥兮非散従星好兮沛霖導協氣兮去暵與與翼翼任滿載乎篝車穟穟芃芃溥盈寧於里閈玉粒兮香浮珠圎兮白粲家安温飽胥士女而噢咻户樂倉箱極千萬而無算珥筆而紀昇平皆斯風所畢貫信乎列於六子導乎四時著人眇眇鼓物垂垂理隂爕陽佐聖人之經緯迎休導嘏助氣化而敷施綿綿兮金粟獵獵兮玉枝動物兮不暴宣氣兮咸宜合四方為薫蒸成兩大之致用因八至以鼓盪識造物之無私我皇上至徳動天休祥福物風聲逺播風敎四訖宣仁布義統庶類而甄陶禮備樂和胥群氛而除祓東極滄海西抵流沙徧六合以攸同上及太清下及太寧盈兩間而遐迄顧大化無外聖心不居謂予一人順隂陽以調劑合二五為煦嘘鞏金甌而式固調玉燭以恬如民熙熙而道蕩蕩還醇風於太初奠丕基以凝帝命垂奕禩而有餘頌曰穆皇風兮化均調四氣兮以淳和而能至兮物靡不親聖時若兮福物與民周八極兮浩無垠皇清文頴巻三十九
