front:
  text: 欽定四庫全書皇清文頴卷八十五
  hash: sha256:d8de51f4a3d0497593363b369a497da61bc61f4a2e5c2316caf8b6e29d86007a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_085-1a, image: WYG1450/WYG1450-0320c.png}
body:
  text: 詩七言律詩乾隆四年聖駕南苑大閲恭紀四首徐元夢盛世休和景命隆皇風淪浹遍寰中遐哉山海梯航至乆矣尊親覆載同聖主檢身勤夙夜帝心無逸詰兵戎恭逢干羽虞廷化江漢何須贊武功先期瑞雪報初晴仙仗遙臨淑氣迎南苑烟開屯虎旅崇䑓日朗耀龍旌已知師律符臧吉試聽輿人頌聖明見説秉旄廵壁壘六軍挾纊動歡聲弧矢神威自昔留弛張兼用睿謨周因承累洽重煕業益謹容民畜衆謀陟迹書稱揚武烈綏邦詩頌屢豐休皇心端為幾康凛共仰垂衣肅冕旒下武周詩溯哲王欽惟列聖在穹蒼皇躬作配昭孚式帝命靈承豈泄忘起沛遺昆皆虎拜大蒸世胄盡鷹揚老臣筋力慚陪從心切鸞旂豹尾傍聖駕南苑大閲恭紀四首福敏休祥奕葉慶重輝景命祗承式九圍澤潤衢樽聞擊壤歌傳軒陛仰垂衣明堂脱劍銷兵氣象譯輸琛慕德威吉日蒐苖遵舊典吾皇神武嗣前徽鳴笳清蹕白旄揚曙色遥分組練光絡繹征徒趨甫草嵯峨石鼓勒岐陽雍容但順三驅禮節制寜誇七校長簡練元戎昭聖武威靈旁暢入遐方風雲南苑䕶高䑓御駕親臨八陣開金勒傳符徵頗牧彩毫分簡命鄒枚林披餘雪寒光薄律轉初陽暖氣來大典新成歌大武朱干玉戚共昭回翠葆雲旓夾路迎天門回輦日初晴鐃歌朱鷺軍容壯瑞應騶虞德化成本為師田昭禮讓遂因旗物辨聲名歡情旁洽皇風暢經緯鴻猷屬聖明聖駕南苑大閲恭紀四首徐本瑞雪凝輝協仲冬乗時行狩整軍容屯雲虎旅排千帳閃日龍旂下九重赫濯聲靈皆典則覲揚光烈倍嚴恭良辰扈從趨南苑萬姓讙闐喜氣濃文治休明冠百王詰戎禮舉道彌光折衝樽俎由淵黙揮霍風雲合昊蒼就位金貂都鶴立分行羽騎各鷹揚恭承大閲隨清蹕森肅威儀網在綱萬壑龍吟畫角催臨觀親上晾鷹䑓五兵器習光於電八陣形開奮若雷預備㡬曾忘偉畧承平自昔飬雄材請㸔白羽頻穿札首應騶虞樂節來聖武初隨節候宣宸章早共日星懸要知祝網開三面未異垂裳拂五絃比戸恬熙胥有象羣方清晏鎮無邊禁中頗牧臣何敢羽舞忻歌億萬年聖駕南苑大閲恭紀四首有序陳世倌洪惟我皇上天錫勇智表正萬邦文德宣昭武功丕著爰於乾隆四年冬至月舉行大閲禮六師歡騰萬民忭舞臣世倌謹稽首拜手而颺言曰禮有六而軍禮其一軍有五而大閲為要周官大司馬中春教振旅中夏教茇舍中秋教治兵惟中冬農事已隙則通三時之教而並舉焉是謂大閲葢承平之時行大閲之禮以簡擇之則以别材力之強弱技藝之能否心志之離合由是兵知將意歩伐疾徐有節攻戰進取有方此聖帝哲王所以義取師貞而威武震叠於天下也皇上膺上天之眷佑承列祖之鴻庥内寜外順遠至邇安然猶不忘武備命所司具儀集諸軍於南苑之原是日也瑞雪初晴風和日曜皇上親擐甲胄指授方畧諸王大臣環侍左右都統將領督帥歩伍威儀悉備少長咸列訓以鸛鵞魚麗之形導以折衝擊刺之法龍翔鳥飛行陣肅也霆激電騖卒徒奮也萬鏃齊發角射藝也六軍羅拜効嵩呼也師整而堅士閑而鋭赫赫厥聲濯濯厥靈周禮所謂寓軍政於四時之田而戒衆旅修戰法獨詳於中冬之大閲者惟今日聖天子之舉行大典為然夫豈上林之射昆明之習驪山之講所可同日而語哉臣竊惟文德大備於成周而陳兵講武自永清大定以後未嘗廢而不舉其在成王蒐岐陽而㑹諸侯亦越宣王因田獵而選車徒一時臣工若史佚史克吉甫仍叔莫不作為詩歌以羙其上鋪張揚厲俾薄海億兆人庶共覩太平鴻烈臣幸際誕敷載纘之時敢忘貍首騶虞之義謹賦四章以抒忱悃召穆公曰天子萬年周文公曰綏厥兆民是乃臣矢音遂歌之㣲忱云爾六合塵清紀帝功更從吉戊講車攻鑾輿曉引曈曨日彩仗晴飄廣莫風陣列千軍鐃吹震營開萬騎角聲雄臣民共仰天威肅却在陽和大化中曉移行幄向閑田駕近遥聞警蹕傳禾稼秋登開禹甸郊原氣肅朗堯天驊騮競騁三花鬛霹靂爭飛七寳鞭越棘大弓親命中星輝五曜協珠聯雲麗層霄舜日光六師遙認赭袍黃龍驤肅肅魚成隊虎衛森森雁列行頒賚盡叨三日酺呼嵩羣祝萬年觴不忘武備勤宵旰獵碣岐陽未足方戎政修明典禮成聖人講武協師貞要令寰海安耕鑿淨挽天河洗甲兵列祖垂謨隆繼述萬方樂業享昇平拜颺願托臯賡後文教遐宣慶永清聖駕南苑大閲恭紀四首尹繼善六琯葭飛萬物春詔傳閲狩肅清塵金輿赤羽雲中出銀甲朱斿仗外陳文德覃敷光正遠武功丕振烈尤新紹庭不盡憂勤意睿藻先教示近臣晾鷹䑓逈接層霄虎帳開時直斗杓玉座高臨虬纛整軍營徧歴馬蹄遙千山瑞雪連天淨四野和風應候調建旐設旄循舊典非徒摶獸咏於苖南苑晴暉向曉開旌旗簇簇陣雲堆驅馳變化龍驤奮歩伐從容羽騎廻有喜天顔敷雨露無譁軍令肅風雷熙朝不廢修戎事赫濯聲靈萬國來夏諺於今意自親吾休吾助賴遊巡歡聲挾纊回陽律喜氣投戈洽兆民文囿騶虞仁最􅄎禹階干羽化彌淳颺言更進無荒戒憂樂關心仰一人聖駕南苑大閲恭紀四首留保貔貅百萬衛神州法駕風清十二斿輦路遙連黃道正御爐徐引瑞烟浮握機一卷承皇古顯比三驅卜大猷武備修明全盛日黎元額手慶宸游轟雷掣電火連營疊礮叢鎗共一聲響徹八門開紫極雲排兩翼現金城神弓自教諸軍射御馬常先衆騎鳴甲胄詩書䨇濟羙吾皇智勇是天成賜酺有詔出離宫甲士歡騰列拜中幸際太平瞻典禮不徒大武象神功先春暖挹三陽麗積雪光涵萬斾紅如虎六師齊挾纊鐃歌聲裏仰鴻濛元靈邃閣倚南潯駐蹕時懐作述心詩繼仁皇同典訓業遵列祖並高深武功文德垂金鑑緯地經天作寶箴慚愧小臣踈筆陣敬從颺拜頌咸臨聖駕南苑大閲恭紀六首田懋聖人恭已邁垂裳鸞輅時廵闢九閶文德覃敷歌鳳翽武功聿奮重鷹揚爰徴月令諏良日更考天心應一陽華葢平臨行漏轉惟聞複道㪚奇香日麗金門淑氣通旋移仙仗向帷宫三時務畢知民樂六出祥呈識歲豐霽色千郊平輦路晴烟九陌轉和風始知帝力難名處只在衢歌夏諺中璚宇琳宫締構宏聖心欽若轉屏營紹庭永矢羮墻慕景行彌深繼述情丕顯丕承崇往烈一逰一豫厪民生宸章題處星辰麗糺縵卿雲得載賡行營肅穆廣塲開清蹕傳宣萬乗來虹曵旌旄輝五色雲屯壁壘應三才干矛森處明於電鉦鼓喧時隠若雷歩伐止齊嚴紀律日華深捧晾鷹䑓角力呈材士氣揚桓桓虎旅盡騰驤紛紜騎擁風雲轉燦爛鋒生斗宿芒弓挽六鈞驚霹靂矢穿七札靖欃槍太平休養軍多暇武節遐宣國運昌天厨頒賜飫芳鮮抃舞雍容奏凱旋地逈正宜呼俊鶻風微不用載鳴鳶折衝樽爼非忘戰賞獲論功在得賢何幸小臣觀盛禮還期夙夜懋乾乾聖駕南苑大閲恭紀二首塞爾赫雪晴南苑淨氛埃大閲欽瞻萬乗來颯㳫羽林皆虎旅騰驤寳騎盡龍媒禮崇舊典三驅洽旂展鮮雲八陣開文化更忻兼武畧親臨指授迅風雷一聲清蹕肅連營赫赫河魁太乙兵七校按行分雁翼五雲作隊引龍旌霜原日霽吳戈耀坰野風飛夏箭鳴神武作君欽廟算丕揚謨烈慶昇平聖駕南苑大閲恭紀二首呂耀曾乘時閲狩重三驅法駕龍驤徧九衢析羽旌門昭聖武擁麾幄殿肅皇圖千官鵠立霜戈耀萬乘雲屯玉甲趍繼述同符遵典禮覲光揚烈顯訏謨風和雪霽動輕寒聖主臨軒七校團德耀兩階光舜日典昭九伐凛周官琳瑯珠玉揮毫見龍虎風雲列陣看共仰天威顔咫尺呼嵩舞忭奉宸懽聖駕南苑大閲恭紀四首張廷璐昇平職貢九垓同武備時修厪聖衷雲集千官趨帳殿星羅萬象䕶行宫旌旄色漾和風裏鎧甲光生麗日中畫鵠初陳飛赤羽君王親引六鈞弓畿南冬狩敞軍營輦路新開玉勒行羽衛森嚴環列宿花驄蹀躞導前旌龍驤自昔稱中壘虎旅由來重禁兵咫尺天威叨指顧期門甲士倍光榮野曠沙平㪚馬蹄雕戈畫㦸擁東西烟光匝地千聲合鼙鼓臨風萬隊齊氣壯六軍騰虎豹旂分八校耀虹霓武功文德兼昭代久已車書達象鞮羽林夙昔荷恩殊簡閲尤沾雨露濡賜帑更頒天庾粟傳餐同飽大官厨長楊漢苑誇逰獵甫草周原記選徒何似聖朝隆典禮歡聲雷動遍堯衢聖駕南苑大閲恭紀四首吳應棻畿南雲氣接宸居東望扶桑掛日車天意放晴迎玉輅山容展黛拱金輿城鴉有隊隨陽舞苑桞無言待臘舒今夜滹沱應解凍百靈環衛翼周廬元靈宫闕倚崔嵬賡和奎章頃刻裁龍虎氣從千帳出鳳鸞聲自九天來簫韶已奏平成業鼙鼓還思將帥才百里萊田標似錦列營齊對晾鷹䑓貔貅十萬耀戎裝共仰龍鱗照日光馬控流星紅赭汗弓開滿月綠穿楊旂稍風颭花千簇鹿角雲排卦八方兩翼中間羅萬象盛朝軍制邁軒黃恩綸大賚羽林軍踴躍歡聲動地聞將士渥沾三日宴山河底定萬年勲陋他漢武金鐃曲拓得周宣石鼓文大狩禮惟司馬職葵心一㸃捧紅雲皇清文頴巻八十五
