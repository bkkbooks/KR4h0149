body:
  text: 跋書朱子五朝名臣言行錄後果毅親王允禮朱子所編五朝名臣言行錄其事與辭皆取之並世人所撰次汎覧之若無以異人及究其所以勸懲之義然後知非有道有徳者莫能裁也趙中令之謀國功莫並焉而其忮害貪冒之私弗諱也王荆公之誤國毒民甚矣而内行之修弗遺也至議差役則非司馬温公而是章惇盖過以功覆則啟才士以恣睢之心瑜以瑕掩則名虧者将怠扵善大賢也而一眚之不隐大奸也而一言之當必錄然後君子益自嚴而小人不甘扵暴棄其他平列嘉言善行者雖多而指要類如此夫據事直書而善惡細大表裏畢見惟春秋為然故韓子稱為謹嚴下此記事記言莫良扵左史而左氏是非多蔽扵俗論故病其浮誇而文中子推史記為實錄然觀其儕衛霍扵佞倖而進朱家郭觧為賢豪則亦不能無激扵意氣之偏而失其實矣朱子法春秋作通鑑綱目義例其徒承而修之雖未能盡合經意而所發諸史之蔽實多是編乃手訂也其有得扵謹嚴之義宜矣用此知記事與言亦非有道有徳者莫能任也御製葡萄詩跋誠隱郡王允祉葡萄出自西域傳扵漢史咏扵唐詩至今傳為盛事然張騫間關萬里僅得種以歸我國家威徳遠播四海歸仁哈密國者版圖之最近者耳入貢葡萄至有十種至尊既賜儒臣賦詩紀事親灑宸翰賜及臣祉捧讀之下豈徒奎章璀璨雲漢為昭抑以見我國家懐柔之廣喜起之休遠超於前古矣謹為之頌曰西域佳種漢世初傳皇仁廣被萬國堯天飛潜動植獻瑞呈鮮不寳遠物所寳惟賢恩頒碩彦璧耀珠聯天章揮灑鳳翥鸞騫永言瞻仰夙夜敬虔眀良交泰輝煌簡編御製文集恭跋張英臣英竊聞文者載道之器也堯舜禹湯文武之心法道法其最著者莫如欽眀濬哲勤儉智勇肅雍敬勝後之人得因其所傳以遡其所存而知其徳之盛者則惟賴乎典謨誓誥風雅之文炳日星而爛雲漢也欽惟皇帝陛下宗二帝之心傳躋三王之治理海㝢光天之下罔不率俾景運隆祚覃固龎鴻萬幾聽覧之暇輙著為古今諸體文章詩什積時既乆編為若干卷臣伏而讀之有言性道之文焉危微精一經綸參賛皆探其源而抉其祕直以聖心之所藴蓄者發而為文遠而洙泗近而濂洛關閩無不同體而共貫也有言政事之文焉眀作惇大百度維熈休戚痌瘝萬物一體直以聖政之所敷錫者發而爲文其中正宏偹則周官立政之遺軌也有兩宫祝頌家庭牋奏之文焉立敬立愛純誠篤厚合萬國之歡以天下爲飬無非聖孝之所流而不能自已者也有誡勉臣下之文焉勞來匡直扶奨誘掖使咸入扵君子之域則放勲之所以教也有流覧景物抒寫性情之文焉則對時育物涵濡萬類昭蘓羣品如造化之亭毒凡飛潜動植之微無不暢遂扵其際也惟如是故不事雕鏤纂組而自然麐炳矞皇若斯之盛譬諸天地之景星慶雲滄溟岱華光華屹峙亘古及今極天下之至文豈有能逾之者哉臣侍從左右伏覩聖人之學博而無所不該而必以六經為根柢故聖製諸篇窮極高深得易之奥典重鴻碩得書之大渟泓藴藉得詩之厚褒貶謹嚴得春秋之法條理暢達得禮之序又從而博綜諸史穿貫百家而指歸不外乎是以經學為文章固宜乎文之麐炳矞皇而不可尚也猗歟盛哉臣英不揣固陋敢拜手稽首而敬識扵簡末御製夏日登景山詩跋後張英康熙十七年五月十一日皇上以幾務之暇偶幸景山命臣英臣士竒侍從上攬轡登景山之巔周覧四郊俯視宫闕東望薊門西眺桑乾烟樹蒼深河流浩漭近在指頋之間天顔怡暢二臣咸得寓目焉時則禾稼被野方待優渥之澤俄而雲起西麓雨過龍樓聖心頋而悦之御製詩一章有時雨将来之句詩中之所謂君臣同樂者蓋有樂乎此也臣自䝉恩入侍禁庭天章雲漢時得而捧讀之大約篇什之中必以四海八荒為念蒼生赤子為心上述祖徳躬展孝思憫農事之艱難勞征人之况瘁揆諸古昔虞帝喜起之歌武王户牖之銘其曷加焉故雖一豫一逰一篇一詠而心不忘乎百姓如此則凡觸乎聖衷而發爲睿􅇨者皆扵此可類觀矣豈獨光麗日星聲諧金石足以超往牒而軼前軌哉七月十八日上御迎凉之殿揮灑宸翰書此詩以賜二臣楷法精嚴龍翔鳳峙此希世之鴻寳二臣何敢私焉敬勒之貞石以眀聖心之所在獨重民時亦以幸二臣之榮遇千古不多見而愧汗惶悚之不能自已也御書千字文跋陳廷敬臣惟書稱堯文思舜文明禹文命昔者史臣将紀一代之至徳至道大經大法必先首稱曰文文綦重矣而伏羲龍書神農穂書黄帝雲書爰自三皇已崇書道書綦重矣我皇上宏帝王之治統闡神聖之心傳天文覃敷御書昭賁紹隆皇古濟美唐虞盛哉弗可及已臣嘗見萬幾餘閒手不釋書煒煌聖製煜曜斯文良由天縱生知加以時敏典學故盛徳日新大業丕顕如斯其至也若夫親御翰墨旬月所書數踰萬幅祕府之蔵充函属棟時䝉賜賚臣工鴻寳流傳光被天壌矣至御書千文真行草書已有數種各極其妙頃示臨米芾千文仙毫結字奎藻聯篇如日月星辰之麗扵天而高莫能窮焉如嶽鎮海瀆之奠扵地而厚莫可極焉臣等前所謂體勢則經天緯地風采則出聖入神也璧合珠連龍翔鳳舉八文六義應手從心運闔闢之樞機用文章之矩矱髙掩東晉直轥㐮陽臣等前所謂無美不臻靡法不偹者也神完氣足㡬動天随儼然太乙下觀自有百靈潜衛臣等前所謂千言長幅立刻揮成自始至終無一懈筆也遂以是卜聖祚之遐昌慶嵩齡扵億萬凡此賡颺之實洵為遭遇之隆臣等前請橅勒貞珉恭綴跋語荷䝉俯允敢布愚忱臣廷敬不勝瞻仰榮幸之至御書後跋陳廷敬臣伏覩我皇上聖神御極勤政典學文治光昭聲教遐訖粤稽往古載籍所稱若斯之盛者其在唐虞之際乎尚書稱堯欽眀文思安安允恭克讓稱舜濬哲文眀温恭允塞曰眀曰文紀其盛徳之彰著者也曰欽曰恭紀其盛徳之積扵内而立其夲者也故凡推而行之大經大法舉而措之一事一物罔不由是我皇上紹執中之統闡精一之傳見於政治而發為文章者洵已恢二帝之鴻綱冠百王而首出矣至若燕閒之頃親書冊灑翰墨凝神穆清天行日晶下飾萬物規橅往昔獨運宸衷則依然聖學之心傳也昔人謂書者心畫栁公權告唐宗曰心正則筆正而程子有言作字須敬即此是學自昔賢臣大儒莫不以書道為心法所關故其大要亦惟以敬為本是則敬者聖學之本原萬事之根柢也臣在内直一日見手敕示諸臣曰人非敬則百事無成雖百工技藝之末非敬亦無以自立况立身行已之大乎大哉聖言此堯之欽眀允恭舜之温恭允塞也自堯之命舜曰允執厥中執中者敬也舜之命禹益以三言而申堯之説曰人心惟危道心惟微惟精惟一允執厥中精一者敬也厥後成湯懋昭大徳建中于民以義制事以禮制心皆敬也而仲虺之告湯曰慎厥終惟其始欽崇天道永保天命慎也欽也皆敬也周公之稱文王曰於緝熙敬止武王之告康叔曰惟文王之敬忌又曰敬勝怠者吉則是二帝三王無不以敬為相傳之心法者彰彰其如是也今日者光天之下至於海隅聖文聖書靡弗照被萬邦黎獻悚息仰觀僉曰聖人在上煥乎文章抑知有所原夲而然與臣謹奉恩賜聖書恭摹勒石因推言主敬之義紀於簡末盖臣所曾見於黼扆之前用以傳示子孫垂之永乆臣不任榮幸之至起居注冊後跋陳廷敬伏覩皇上仁爱生民勤勞庻政彌歷年嵗罔有閒怠至誠感孚天人協應以故頃年以来驅除禍亂奠乂烝黎所向奏功今年十月逆渠授首滇南大定封疆萬里灌燧銷烽措天下於袵席之安數職貢於車書之㑹盡天所覆悉享悉臣武功燀赫超踰往古此雖决䇿廟堂信威域外将士恪秉成命集此大勲而揆其所以制勝之由實皆夲於皇上憂勤惕厲仁民愛物之一心故受捷之日有戚容而無喜色羣工請上尊􅃅至於冄四而謙譲彌堅至徳益廣珥筆之臣執簡偹書與有光曜至若涖阼迄今嚴郊祀事兩宫謹天戒急賑恤慎刑獄以惜民命重文學以興士風優禮儒賢好問好察嵗所冊記無虚日曠時皆班班可考匪有文飾而臣獨謂征伐之功由於仁民勤政之所致者盖惟仁者無敵於天下書曰皇天無親惟徳是輔民心無常惟恵之懐其在唐虞君臣相戒曰兢兢業業一日二日萬幾夫保治戡亂其道同也孰謂武功耆定非仁民勤政所由致哉繼自今皇上益思上天所以輔徳之意答下民所以懐恵之心念一日二日萬幾之不可以不慎而加之以兢業使美實光輝日新嵗益書之典冊垂休無窮至於萬世永為法則其不亦偉與御賜詩恭跋陳廷敬康熈戊午秋七月臣廷敬奉詔扵大内修書臣英臣士竒以其夏日侍從登景山御賜詩示臣廷敬臣拜手言曰嗚乎盛哉此有虞氏喜起之歌也二臣何以致此臣歷觀自古帝王功徳著扵當時聲名稱於後世者必其君臣之間有魚水之歡無濶絶之迹至於文學論思之臣尤引而近之相與賡歌褒以篇什所以示寵異通孚感而禮賢重道也三代以降惟唐之文皇宗之太宗為最著我皇上誕縱聖能虛懐善下優遇儒臣超軼唐宗以来之英君誼辟而宸章睿翰天光昭回絢采神霄下被萬物洵卓絶前古矣今伏覩聖製穆穆焉洋洋焉既曰君臣同樂而又曰時雨将来蓋其相得益章誠即眀良喜起之義而所謂綢繆未雨丁寧誡儆之㫖未嘗不寓其中二臣宜何如為報哉是宜鑱諸金石與典謨訓誥之文傳之無極英士竒俾臣識於後謹盥沐書焉是嵗九月甲子臣廷敬恭跋起居注書後徐乾學伏惟皇上御極之二十一年逆孽削平王師奏凱偃息兵革修眀禮樂天人合應書軌齊同宇内樂康天下寧一四民遵業萬類蕃滋二氣和而風雨時五穀昌而倉廩實威已無不加徳已無不被皇哉唐哉此至治極盛之象也乃皇上親詣奉天陵寝昭告成功思祖宗創業之由溯王氣發祥之始車駕所至赦罪蠲租萬姓顒顒欣欣無不銜戴聖澤至扵聽政御講寒暑無間懼開臣僚燕安之漸申戒再三期扵天工無曠百職修舉賞功與能簡賢出滯小善不廢片言是褒諸如治河理漕恤兵愛民尤倦惓致意當此永清耆定益為乆安長治之圖誠有書之即可傳垂之皆可法者雖堯咨舜儆亦莫能過而豈區區漢之文景唐之貞觀所可仿彿萬一者歟臣等偹員珥筆日從侍直之餘仰瞻天表飫聞聖謨竊謂扵皇上法祖勤民之至意似與中外臣工僅從用人行政諸大端窺見如天之度者稍為加詳焉而媿不能一一記之扵冊也夫致治之道曰誠曰一誠則乆而不息一則貞而不雜皇上好生之徳浃扵幽遐可謂誠矣兢業萬幾始終無間可謂一矣君心之所係即政治所以乆而無弊書曰一人有慶兆民賴之國家億萬年無疆之休端在於此謹執簡屏營而書於後恭跋御製避暑山荘三十六景詩後張廷玉康熙五十一年六月臣等恭注御製避暑山荘三十六景詩仰見皇上聖學崇深含經味道純粹以精發爲詩歌上繼雅頌嚢括百家臣等學識弇陋管窺蠡測未能宣揚盛美兹䝉恩諭俾得附名簡末且喜且愧不容於心欽惟我皇上聲教覃敷極天所覆盡入版籍要荒之外率同畿甸自京師東北行羣峰迴合清流縈繞至熱河而形勢融結蔚然深秀古稱面北山川多雄竒東南多幽曲兹地實兼美焉盖造化靈淑特鍾於此前代威徳不能遠孚人跡罕至皇上時廵過此見而異之念此地舊無居人闢為離宫無侵民田廬之害又去京師至近章奏朝發夕至綜理萬幾與宮中無異乃相其岡原發其榛莽凡所營搆皆因巖壑天然之妙開林滌澗不采不斵工費省約而綺綰繡錯烟景萬状標其尤者凡三十有六清凉爽塏扵夏為宜每至盛暑則奉皇太后駐蹕焉泉甘土沃居此逾時聖容豐裕精神益健盖皇上憂勞萬民徳合扵天故天特開靈境以待皇上之遊息也臣等忝列侍從時賜讌逰諸景皆嘗目撃而莫能摹寫及伏讀御製詩則林泉蒼靄一一湧現於胸中蓋此地之景乃天地山川自然之氣所發著非皇上化工之筆莫能傳也而臣等尤有厚幸者伏讀御製避暑山荘記及諸詩奉慈闈則徵寝門問膳之誠憑臺榭則見茅茨不剪之意觀溉種則念稼穡之艱難覧花蒔則騐隂陽之氣候玩禽魚則思萬物之咸若凡讀者因詩以求諸景之勝豈獨未見者如親厯哉即皇上敬天勤民與覆載同流之氣象可以昭示天下萬世永永無極矣恭跋日知薈説張廷玉在昔三代聖王之治皆由學而成凡散見於詩書者其根源可尋繹而見也漢唐以後眀哲仁厚之君非無性資之髙求治之切者而終無以躋於三代之隆蓋由學焉而未探其根源故所以濬其知者不能深而致於行者不能篤耳我皇上徇齊敦敏夙承世宗憲皇帝之教自問寝視膳而外耳目心志一用之扵學而他無間焉故扵五經四子之書早洞見其根源而叅考漢唐宗元諸儒之義䟽以折衷扵至當循是以觀諸史其治亂安危之幾無㣲不察也循是以慎取百家之言其出入離合淺深之數無隐不燭也循是以懸衡人物推極事理皆灼知燭見而無匿情用是發為文章言髙而旨遠理達而氣昌得心應手俄頃立就而逈出扵前賢思議之表臣廷玉奉先帝恩命簡侍講讀十有餘年實親見焉曩者彚集衆體為樂善堂文鈔既承命而為之序近􅂧别擇論辯之文二百六十條為日知薈説仍命臣跋之伏見皇上繼序以来凡見諸政教者一凖乎天理而應乎人心之不言而同然是以數月之中近自邦畿逹扵海隅山陬莫不欣欣然若時雨之沃其心陽春之被其體盖我皇上好古敏求日有孜孜以致其知者既深且固故今之宵衣旰食以行所知者篤實充周時措咸宜由是以往法天行健恒乆不已則徳化所成直比隆於三代豈惟遠過漢唐而已哉臣廷玉讀是編而為天下臣民慶者彌厚且遠焉微特依日月之光挂名簡末而與有榮施也日知薈説跋鄂爾㤗孔子大學一書用傳古聖王眀徳新民之道其所從入以致知為始事而誠意次之蓋未有意不誠而能修齊治平一以貫之者也未有知之不極其至而意能誠者也見於經傳者至湯武君臣始相與言學高宗成王尤勉勉焉湯武上聖而孟子以為反之盖聖學之難純如此然非謂性之者遂無所為學也觀堯舜禹相傳所以審辨扵危微之介者非致知之學乎所以致精致一以守其中者非誠意之學乎臣鄂爾㤗獲侍皇上講誦於今五年矣曩者嘗承命序樂善堂文鈔其義藴之深閎風格之高古有目者共識而臣竊觀我皇上鎔經液史所以究興衰治亂之根源察邪正是非之幽渺者皆不襲前賢之緒論而必求自得於心又時就所言反求諸身私慶聖心實能以致知誠意之學體騐於當躬而重為四海生民幸也御極以来動應民志實政實心愾乎天下用能以數月之中俾老幼賢愚皆忻忻然自得於遐荒萬里之外近者幾務餘暇復自擇論辨之文前集所未載者為日知薈説命臣等各綴跋語而御製序文謂錄此以騐諸行事伏念我皇上今兹治教之日興乃曩者典學致知之眀效也而猶不忘素學時以自體察又設誠於内而致行之之大騐也夫湯武以堯舜為必可學故能為湯武高宗成王以湯武為必可學故能為高宗成王以聖性之高眀聖學之淵粹而加以聖心之誠一三代聖王之治将復見扵今矣臣少偹宿衛未暇殫心載籍謹就所夙聞扵絃書者達其愚悃言之不文而以承寵命為愧而已樂善堂全集跋張廷玉臣聞文以載道而道夲于身故必實能眀道而文始可貴必實能身體而道始能眀我皇上躬濬哲之姿夙承庭訓緝熙光明聖學淵茂臣自雍正元年蒙世宗憲皇帝㤙命得侍左右于今十有餘年伏睹我皇上稽古遜修研精經術于六經四子之書儒先之緒論諸史之成蹟博觀約取剖晰精㣲舉天人性命之理政治之所從出皆得其大本大源之所在寒暑晨夕矻矻孜孜融洽貫穿與道大適故發之於文日新富有麟炳矞皇充溢緗帙曩者親定樂善堂文鈔十有四巻臣既承命而敬序之矣御極以来勑幾清宴乃合前後所著選定編次為樂善堂全集臣受而讀之其義藴之宏深則經緯天地無乎不包其辭藻之贍博則鎔鑄古今無乎不備仰泰岱而知衆山之卑觀河海而知行潦之細誦聖言而知百家衆説之凡淺巍巍乎煌煌乎洵宇宙之鉅觀也臣仰惟皇上聖學髙深固非擬議所及而竊謂其所以發而為至文者由道之藴積者深也夫道豈獨為文而已聖賢夲是道而垂彜訓帝王體是道而成治功皇上本皇極之敷言既已見諸行事中外欣欣文徳誕被矣而猶夙夜孜孜因言考行所謂聖天子建中和之極金聲而玉振之者誠在今日而是編也天徳王道合為一焉乾坤之容日月之光與詩書相表裏而世為天下則又何疑哉臣校錄之次伏讀御製序文竊有以知聖心之所存兹奉命綴言簡末仰至文之炳蔚而拭目以觀至治之日升海内臣民涵泳聖澤偕登大道區區蠡測所及盖不能自已云樂善堂全集跋福敏臣福敏叨陪侍從謬厠細旃廣厦之間十有八年於此矣親見我皇上以天縦之聰眀殫日勤之學問自六經四子以及諸史百家無不登其堂入其室嚌其胾味其腴於道則宗二帝扵法則統三王扵學則承孔孟凡作為文章以及偶爾吟咏皆藹然以萬物為一體而與天地同流御極以来以仁心布為仁政四方萬姓莫不喁喁向風從欲丕變向也見之文章今也行之政事洵典謨之繼響雅頌之嗣音匪徒有其文確有其實也夫聖神之徳作式萬邦今天下臣民皆以躬逢聖世為至幸而臣不惟逢其盛且近其光不惟仰瞻殿陛之間而且侍從左右積嵗積時至扵如此之乆盖視天下臣民為尤幸也臣聞傅説之告髙宗曰知之非艱行之惟艱魏徵之告文皇曰始之非艱終之惟艱皇上舉平日所常言無不見之扵實政則其知生知其行安行行既與知一則終必與始一如天不已應地無疆斷可知矣臣又聞古人言禮樂之興俟以百年王者之仁要諸必世我國家定鼎以来列聖相承於今百年正禮樂大興之會而我皇上好生之徳洽扵民心立之斯立動之斯和漸仁摩義捷於影響臣雖衰朽無能未克仰賛髙深猶得優游禁籞曲沐慈仁與海㝢群黎共逰昇平盛世作為歌詩以詠王化之成豈非至幸中之尤幸也歟臣區區至愚不勝厚望焉日知薈説跋楊名時臣謹稽在昔中天之世聿垂典謨之文其間執中一語舉心法治法一以貫之誠聖學之樞極王道之綱維也凡典謨中所紀欽天授時知人安民亮工熙績諸務何一不從執中流出者乎臣恭誦我皇上御製日知薈説一編尋繹反復始獲稍窺端緒首言政事則自體元長人探治夲以及治具於任賢儲材教養兵刑之屬一一提其領要而歸扵謹徳禮導和敬以化成天下為之在優游而循其序持之在兢業而要諸乆至哉言乎蔑有加矣繼論心性遡自於穆流行絪緼化醇之始暨人生而靜感物而動之餘五行禀爲五事五性達於五倫善復其初者在眀善而固執主敬以存誠天人一理體用一原洵文簡而義該言近而指逺也至扵闡發經學尤為剖晰精㣲開示眀切獨得聖賢之心而不泥其辭善會古人之意而不襲其迹期扵體之身心純粹而不雜措之治理溥徧而宜民披撥浮華以見夲根陶鑄百家以歸大雅從兹一道徳而同風俗悉扵經術之昌眀决之矣若夫上下千餘年間美任賢從諫懲用佞剝民褒正直忠厚斥僉邪險僻崇敦夲務實之圖破迂庸膚末之見悼仁賢之不究厥用惜眀良之難以適逢望古慨然及身思見殆情激而懐長何識高而度逺布之邦國天下有不奉為千秋之寳鑑振古之鴻篇者乎抑臣由皇言而仰窺皇心盖扵執中之指不啻神相授面相稽矣外而發之政事内而藴之性情精而剖經義之異同大而鑑人倫之得失莫非本一中為體騐而灼見源流􅋵一中為權衡而不爽毫髪者良由我皇上天亶聰眀遜志懋學以至徳而凝至道正值我國家重熙累洽之期行見海隅日出盡躋於風動時雍有不覺太和元氣洋溢於宸章睿􅇨間矣臣不勝忻悚輙忘其弇鄙矢口而颺言焉日知薈説跋邵基臣聞帝王之學必求端於天天以剛健中正運行不息而成嵗功帝王法之精一執中懋昭厥徳如禹之思日孜孜湯之聖敬日躋周成之日就月将悉皆遥接心源恢張治道而先天後天與時偕行以馴致乆道化成之盛我皇上纉承大統建極綏猷於用人行政阜民敦俗之方犁然各當盖由夙遵世宗憲皇帝庭訓遜敏敬修熟復六經四子之書旁及儒先之緒言諸史之義法靡不深探力索洞其根源故舉平日所藴蓄見諸治教體立用行與在昔聖帝眀王若合符契臣自辛亥嵗侍直内廷敬讀樂善堂文鈔廣大精㣲櫽括道統嗣後詩賦古文日加裒積臣基親見皇上引筆洋洋千言立就而論説尤多自身心性命國政民生以暨衡論古人一經研剖精義卓立星辰麗而江河行兹以萬幾餘暇親揀擇若干條定爲日知薈説夫日君象也易曰日進無疆詩曰如日之升皇上徇齊典學緝熙光明精神貫注於億萬斯年而朝乾夕惕法天行健迪知而允蹈焉心源治道一以貫之凡是書所載包含萬有囊括古今洵典謨之矩矱官禮之菁華也臣就日近光早得霑沐聖訓景星慶雲先覩爲快今復賜讀成書承㫖附名巻末益欽盛德大業富有日新而臣材質謭陋仰荷陶成於敷言錫極之中誠屬遭逢之厚幸云御製圓眀園四十景詩恭跋汪由敦臣等恭注御製圓眀園詩仰見皇上聖性淵涵鈞陶萬有闔闢元化斡造物機星漢昭回日月糺縵臣等注輯之次如陟泰華而見雲霞峯㟧之竒秀泛溟渤而睹洪瀾瑰寳之瑋麗目眩心震莫能名言臣等竊惟周書無逸言文王自朝至於日中昃不遑暇食用咸和萬民而大雅靈臺之篇盛稱其臺沼苑囿禽魚馴獸之樂盖惟有文王之勤乃以有文王之逸而文王之樂其樂固文王之緝熙光眀穆穆不已扵敬正如天道健行不息而四時行百物主鳶飛魚躍一化機之洋溢鼓盪而不自知也我世宗憲皇帝葺聖祖仁皇帝賜園以為豫逰臨御之所嘗御製為記偹述縁始皇上因其舊而居之親灑天章敬為後記繼志述事後樂先憂聖心所存昭示天下後世者既詳哉其言之矣慈闈視膳之餘萬幾聽覽之暇仰觀俯察暢洽宸襟觸緒興懐形諸篇什爰仿避暑山荘詩例標舉勝景分題繪圖序而咏之凡四十篇臣等伏讀御製後記有曰宫室服御得其宜適以飬性而陶情失其宜適以玩物而䘮志大哉王言夫豈惟宫室服御為然研聲律務博覽先儒亦以為譏唯寓意扵物而不為物役斯無入而不自得焉皇上敬天法祖勤政爱民自御極以至於今旰食宵衣念兹在兹未嘗稍釋偶有寄託發為聲詩熏風晨露之歌天機盎溢非作意雕刻而為之者然即是詩敬讀之臨殿宇則思鴻業之克纉憑亭榭則思儉徳之貽謀閲農圃則思教稼之遺規覧動植則思栽培豢飬之厚澤登眺攄寫掞􅇨揚葩何往非紹庭衣徳之孝思對時育物之聖意哉臣等弇陋膚末挂漏實多幸得挂名簡末敢推聖天子緝熙敬止穆穆不已之徳自然流露扵詩者究極言之以志管窺蠡測之萬一云御製盛京賦恭跋汪由敦臣等伏䝉皇上宣示御製盛京賦三千三百餘言臣等依文輯注統若千萬言仰見睿藻矞皇暉麗雲漢函宇宙綜古今炳典謨鎔圖籍自書契以來著作之府鴻章鉅篇未有盛於斯者也洪惟我皇清凝受寳命奠億萬載丕丕基肇迹神皋撫臨中夏發祥流慶實始盛京臣等竊嘗誦詩周文公召康公推述先王先公之始基靖民自有邰漆沮皇澗過澗陟降原隰以至作豐遷鎬築城度室之事皋門應門靈臺辟雍之宏規于耜築場索綯祭韭執豕酌匏之故俗㣲而松柏厲鍜周原堇荼囿鹿潜魚備形於雅頌凡以明著祖德遐暢皇風薦扶輿之嘉祉鞏繼序之永圖豈徒侈都邑之隐軫夸陸海之膏腴鋪張眩矅藻賁觚翰云爾哉欽惟我皇上纘列聖之鴻緒際三登之景運修懿典邁舊京備法駕奉金輿罄歷載之積誠謁橋山而展孝禮成肆覲會同有繹以燕以賚中外禔福望幸之黎庶聞和鸞而歡呼扶杖之耆老瞻翠華而相慶祖宗之靈斯格臣民之和允洽於是本覲光揚烈之忱溯基命造邦之統攬形勢之渾雄仰宫闕之素樸緬英賢之勲績懷風化之忠厚華實之毛充牣澍濡之澤鴻厖穆然遠念知夫天作帝省之勤所以孕虞育夏甄殷陶周者厥有所自爰攄寳墨掞奎章思若湧泉筆不停綴勒爲斯賦垂示無極乾坤之容日月之光雲霞之采山海之藏覩化工而雕繢纂組不足以爲色聞韶濩而鏗鏘考撃不足以爲聲彼研京十年鍊都一紀者曾何足仰企萬一哉臣等徵金匱之祕稽延閣之儲旁羅四庫綴緝二酉疏舉徵引多慙漏畧附名簡末榮以爲愧皇清文頴巻二十一
