body:
  text: 賦喜雨賦陸葇爾其清和首夏祝融司令暑氣未溽朱明斯盛招揺南指龍雩東應羽振博糓頸延戴勝爰告農祥惟兹晨正土膏既疏耒耜維竟爰需天澤粢腯思敬百職靖共協和神聽惟時綘霄下濟盧墳上騰絪緼相合靄氣流行渡狶有影審蟻多情金烏斂翮銀蟾息精膚寸乍起輪囷旋盈五里非霧羣岩若蒸茫茫原隰晦晦㕓甍纎塵不起歊烟以清俄而光去蘭叢文生蘋末少女神童相應而發隂鳥翔鳴枝間啁唽棟撒紫霙松梳黄鬛節按箕師轡馳飛伯啟彼土囊洩其洞穴烏竿欲撼朱旛空列觧愠揮琴歌薫肇悦于焉作觧奮豫號令以宣列缺睒閃豐隆喧闐不霆而怒非火而傳虎鳴旦驚蛇掣宵然除害興利應鐸秉鞭施布陽徳滌蕩隠愆非出金門髙下有年盖自仲春宜發至于是而始振其權也乃召𤣥㝠乃驅屏翳始而􅀢霺佐以霏􅀢綴葉垂璣飄簷曵縷靈液惟飴神漿且㫖濯彼繁條碧鮮如洗潤及浮埃康荘若砥屋霤欲滴庭洼有瀰父老神怡郊圻志喜既而風激雷奔秋凉晝昬注若建瓴傾若翻盆飛鏃集野跳珠蔽淵隴畝霑渥畎澮潺湲泛堰瀑沛决渠雪噴稚苖哺乳饑禾飫飱芃芃嘉穎斾斾芳蓀誰云甘醴而乏根源于是二十六城之田畯式歌且舞以為我后之徳加恵于三輔元元也維雨初零月之既望族雲􅀢䨴繩津滉漾冰鏡含眉玉毫濡項終夕空濛詰朝溢浪市價均平輿情舒暢泊乎三日晴隂交讓泉流變聲林烟殊状蝃蝀東指霞曛西上天子猶然肅穆于齋宫敬天庥而受神貺也方兹甘澍應禱滂沱形影不速音響靡他綸言斯出穹聽則俄是以商羊失舞石燕依阿鳩未逐室蜧尚濳波龍角乍奏駝童驟過盖天人交感未有若斯之神速者也桐鏗華簴桴撃靈鼉雷火洩石星丸注坡維麥有秋載卜嘉禾雨金雨粟史臣作歌大西洋國貢獅子賦徐嘉炎聖皇踐祚一十有七載聲教訖於重譯西光曜乎月窟東震虩乎日域仁風衍而外騖誼方聳而遐赫披王㑹之昌繁接梯航而絡繹極絶徼之飇舉誇幽荒之轍跡昔者龍馬負圗出自風皇飛黄伏皁隆於軒帝熊羆當大禹之辰麟趾振成周之際自漢以降帝籙罕昌間得珍禽遂號嘉祥般般騶虞白質黒章龍鬐宛宛麟彩煌煌大宛之馬黄支之犀圜題赤首修項朱蹄形殊譎詭俶儻瓌奇變幻恍惚不可端倪雖逸倫而絶覩猶彷彿乎恒姿乃有猛毅髬髵師子是名既奮迅以躍武亦逰戱而通神非見聞之能及渺衆慮而靡羣㦯疑其幻㦯詫其靈第稱名於譜牒亦飾象於圗經馴於文康之室擾於妙光之乘爾其異號狻猊殊名白澤鉤牙鋸爪鐵首銅額金精之光毛羣之特帝徳逺而來賔賢人見而始出聖朝重熈累洽洋溢亥歩南交輸其珍賮西旅貢其賧布白狼槃木之鄉黒齒金鄰之部若摧厥角伏弩先路建格澤之長竿設金猊之廣座於是身熱鼻飲緩耳頭痛之域四載之所未經二亥之所莫識窮髮之國建徳之都是有國土西洋之區絶域殊方三萬有餘界絶罔鄰天末是居長老驚相告三年海不波中國有聖人我土則那爰自疆理及於他境岑崟蔽虧紆餘嶮峻彎﨑之坂臨硎之嶺既谷伏而雲迷亦巖棲而風勁乃命馬人龍戸精夫姎徒之倫布弋設罘䝉盾負竿袒裼觸蹶䠑踽盤桓伏鏌鎁而張罝誇雲羅而壮觀扼猛噬於雄窟圍枳落而突棘藩徒觀其天骨雄詭星眸騰上拉虎吞貔裂犀分象茸毛斗鉅飛輪電閃剛鏃不磷霜殳不染喜則尾掉怒則齒齴混蘇合於僧伽疑都梁之近逺至其體凝露肅威感風稜朝發越裳暮踰玉門哮吼月氐翔躍崑崙拔地軸凌天根駭浪急騰虹奔方趫迅而㨗疾将懾息而驚魂孰徒搏而䧟脰凌重巘而翩翻雖中黄與育獲且縮朒而難言非皇威之震叠寕弭帖而遵轅於是轔輑圏鼻纓絡籠筐彩鷁浮江雲軺蔽岡軼八蠻而入貢超百獸而來王儀馴觀魏靈囿康荘牝慴牡伏彩奮神揚虎予僵於北山龍伯遯乎西荒供玩乎甲乙之帳奠安乎申未之方靈威熛怒猋旋坰牧狡兎忘其撲朔巨象遺其橭木矧全力之可攖即餘勇其曷觸迸百斛之湩乳失千里之逸足寕止筋絶桐絲吼翻林木卧而蝇不敢集其尾踣而豹不敢食其肉将使天吳遏其神窮竒息其毒銷兩間之兵氣錫四靈之遐福然而明王慎徳義正仁育不貴異物不寳殊族神靈所至懐柔讋服譎種怪類騤瞿悚恧梏貳負於疏屬之山縶支祁於胎簮之瀆矧兹僄醜盪胸蠱目廟不可以奉犠牲御不可以供驂服爾乃置藁街之邸委上林之囿資其膏以療疾圗其形以禦寇無供役於耳目任優㳺於林藪與隴山之雪衣亦息機而濡咮詔舌人與象胥慰逺人之勞疚使者再拜稽首永誓來享與來王樂天皇之萬夀大駕南廵賦徐嘉炎粤我皇清之總三才而襲氣母兮歴三聖而冠百王惟聖主之首出乎庶物兮鼓槖籥而播隂陽當甲子青龍之元㑹兮赫景命而召禎祥誕五徳之純精兮開萬禩而輝煌耕獵道徳而為苑囿兮馳騁仁義以為津梁光無幽而不燭兮澤無徃而不彰紹盤羲而代嬗兮孕苞符而統混茫既四海之寕壹兮乃兆人之如傷作雷雨之觧而在宥兮象風地之觀而省方爾乃建蜆旌張鳯斾雲䍐日斿虹幢羽盖萬騎紛紜千乗繁㑹廼先沛膏雨於垓埏集羣生於覆載倣天乙之弛羅儀鎬京之大賚蠲萬國之倉箱望東州而賑貸推恩數於羣臣賔化育於無外於是背秋渉冬寒氣始升焦溪漸涸湯谷将凝水澤之腹既堅不周之風斯興木脱葉而童童草觧節而稜稜吾皇於是駕雲龍之飛輅張秋隼之華旟飾軍容於七萃申武衛於三驅隆隆記里之鼓轔轔相風之車散轡於漁陽之野校戎於龍􅔀之墟則有屏翳清塵望舒懸象飭馳道之離宫闢修途之榛莾有䡾䡾之攀躋非昈昈之𢎞敞眷北顧而逶迤憑南雲而下上值三農之休暇惟六龍之是望極九有之神功爰告成於岱宗嗤齊桓之望瑞陋漢武之乾封為民儲祉秩叙惇庸望天孫而至止仰日觀而雍容爰祗誠而徒歩乃獨致夫䖍恭乗輿屏而勿御騕褭却而罔從縣崖垂二分之足絶壁俯萬尋之松似捫參以歴井若凌虛而御風羾天門而馳閶闔經千樹而瞰三宫胼胝均勤乎大禹焦勞重見乎神農時則衛士嚴装從臣啟路釐室儆晨齋宫戒暮慶成乎荅天之禮敷告乎勤民之故神人允協其休和臣氓式遵乎矩度鵾車東振闒㦸南翔渡沂光而行邁渉汶泗而飛揚廵河濵而周徧思潄水之溝防玩璿珠於漆澤屯楗石於宣房招河伯以效靈顧海若而望洋南際䢴溝北始汜光嗟泛濫之愁人致汙萊之卒荒經營乎潰决之陂疆理乎横流之塲必鑿海而歸墟斯我田之既臧何水衡之足惜為當效此一方駕艅艎之乗舟杭一葦而南游任長風之破浪亦㳂波而泝流蕩日青龍之艦排雲飛燕之樓組練耀昆明之浦帆檣聫彭蠡之洲牙旗桂檝赤軸銀鉤泳遊則羣山遥指溯洄則百川倒浮盡乾坤於一瞬坼吴椘而為漚緬六代之繁華經千年之建業瞻虎踞於名都指牛頭為天闕隘紫盖之偏安狭金車於季葉瞻故國之山陵乃追揚其謨烈稽運㑹之始終崇唐虞之盛節致隆儀於軼代戢軍氓之翦伐斯無前之至徳實靡有之軌轍惟經綸天下之大經廼曠世同符而莫越南眺吳㑹清嘉之宇俗號秀民地非沃土念轉運之京坻恤煩疲之廩庾襟茂苑於具區帯海濵於江浦仰泰伯於千秋起言游於三古稽山在望胥濤驚眼勤望幸於黟江佇光榮而宛轉睠兩宫之暫離遂六飛之旋返植梧鳯於岡陵斮修虵於墳衍馳延屬之紆道陟峛崺之峻坂灑宸章於妙髙登浮玉而遐覧黄童襁負以待澤黎庶謳吟而送逺觀乎人文久道化成感終古之教澤廵闕里而式憑大猷是經先民是程崇帝師而下拜志尊道以𢎞文晰欃檀雒離之木辨雞彛龍勺之銘翠古檜之菁葱撫楷模之輪囷湯湯乎洙泗之流屹屹乎防阜之城結山河之兩戒鍾地脉於百靈於是世胄謁禮諸生肅興倣累朝之賔監崇元聖之雲仍制既隆於紹嘉恩更亶乎褒成盛三雍之上儀崇百代之休稱是日也天子考五經之統紀思六藝之折衷爰披圗而誌績論報徳而酧庸籩豆舞佾之繁銀鏤琰琬之隆是未足以光天徳贊聖功乃留曲盖之凝嚴軼葩瑵之巃嵸詔祇寅乎禋祀紛肹蠁而豐融廣錫類之孝思𢎞論説之儒風歴漢元以迄今兹誰尊聖之克同爰乃廻駕旋軫飛軨整斾鳯盖玲瓏麟毫棽麗張廣樂於洞庭舞咸池於北冀千鈞之簴力洪萬石之鐘音偹賦忠厚於行葦歌太平於既醉千疆靁赴萬里星奔東熿滄海西耀玉門奠斗辰於中極布星宿於崑崙日南則威加窮髪漠北則武震烏孫重舌緩耳之國雕題黒齒之氓莫不來王而慕義稽首而稱臣皇帝猶祝時雍之速屆俾風動之遄臻廼下明詔勵羣臣崇學校飭儒紳道徳文章濟濟振振遐陬密壤過化存神是以敷天之下率土之濵含文抱質履素懐真歌風舞雅蹈義詠仁沐浴乎詩書之澤翺翔乎禮樂之英郊畿父老迓望屬車千官紛㑹雁列鳬趨懐銀黄及璽紱佩玉虎與金魚頌省耕省斂之舉上豐年大有之書猗歟甚哉皇帝王三嬗之運唐虞夏遞降之餘惟我皇之至徳歴萬古而難踰頌曰煌煌聖祖創維艱兮洎我章皇開八埏兮皇帝聖徳𢎞先業兮既覲文先揚武烈兮三蘖既殄毒痛除兮海不揚波同車書兮殊方貢琛入質子兮震疊懐柔百神慰兮思我蒸民際太平兮或虞幽隱壅上聞兮省方陳風觀我生兮登岱祈天志憂勤兮經綸叅贊遵先聖兮道一風同克永命兮有虞五載廵狩徧兮亦越姬周十二年兮我皇法古純不已兮時邁其邦昊天子兮小臣獻頌介景福兮聖子神孫永天祿兮懋勤殿賦湯斌黄扉日麗寳笈雲開帝座之光華正燦東壁之淑氣迎來道衍圖書法象觀乎天地學深墳典奮迅擬乎風雷我皇上岐嶷敏睿麗正凝神本精一以立皇極建中和而定羣倫納諫不遺葑菲招賢旁及隠淪武庫森嚴撻伐悉遵廟算九功歌敘民隱日逹楓宸固已樹儀型於百辟貞仁夀於千春若夫煥太乙之矞皇曜句陳之暉麗黄雲紫盖輪囷鬱其上浮蘭戺金莖灝𣺌翔於天際珠宫貝闕複道斜通銀牓璇題交衢迢遞飛重簷以切霞烱丹壁而流霼龍舸泛萬頃澄瀾長楊帶千章蓊鬱斯又足奠六鰲而鞏四極應三垣而馭五緯爾乃廣闢别殿宏貯縹緗鴻濛矗而竦峙觚稜啟而景彰揭組幔於棼楣垂綺錦於虹梁甲帳之月光如雪秘幄之芸火生香瑶函左列竹素盈牀五庫標目於西清四類充帙於東廂犀籖重積玉軸焜煌未足矜宛委之寶册何湏論天祿之蘊藏當夫金門朝罷宣政宴餘鸞珮聲逺鳳扇影徐名儒招從白虎大雅延自石渠䆒道系於洙泗證心法於唐虞無黨無偏闡維皇之敷錫天秩天敘繹臯陶之訏謨既朝乾而夕惕復無倦而有恒顧民碞之可畏識當位之利貞尊所聞而行所知髙明廣大有治人斯有治法深切著明斯乃懋勤之實政匪僅肇錫以嘉名矧夫歌叶雅頌文儷誥盤懸針倒薤戲鴻騰鸞雲氣芝英之簡淵渟岳峙之觀漢武望而廢牘章帝顧而輟翰以此乗㤗運而御六龍映晨光而翔五鳳采太史之陳詩第羣臣之嘉頌而時幾勅命祁暑思艱心㳺農野道契先天夜如何其夜未䦨瑶編萬巻寶炬殘流月曈曈兮素華滿北斗低昂兮殿閣寒豈比夫甘泉暉章長樂未央凌霄飛雨茝若披香九華仁壽百福靈光列棼橑以布翼荷棟桴而髙驤雕玉瑱以居楹裁金璧以飾璫祗矜制度之煒煜何敢希道德之輝光况乎文教敷宣天威遐被都護方開劍閣雲將軍己定三湘地碧雞金馬之修祀無勞蒟醬橦華之輸將遂易百禮具興萬舞咸備皇情悦愉羣臣既醉降絪縕調元氣阜財解愠薄賦寛徭踰於穆之緝熙耳擊壤之歌謡天下棄偽而返本敦朴而去澆追太始之元化偕華胥而逍遥謹摛辭而頌聖主微臣敢自托於王褒西山賦邱象隨伊坤元之廣厚兮氣含陽而凝山既磅礴以四塞兮窅嶙峋而上干矗名山兮三百紛支山兮三千雄九州而稱鎮兮峻五嶽以崇班仙靈托其窟宅兮封禪縱以逰觀乃西山之綿亘兮拱皇都而髙盤落太行之迤邐兮貫遼海以瀰漫諒靈秀之所㑹兮亦安窮其際蟠岡載起而載伏峰若散而若連萃土脉以鬱蒸滙西湖而飛瀾既㶑灔而澄徹亦泱漭以潺湲蕩甕山於涯涘穿䝉密而盤桓翳清塵而磴削倚圓靜於崇巒左田右湖人烟相摶菱芡皆糧灌溉多歡誠山農之野樂宕予興以彌寛緬賜金之遺蹟躡功德之巍然洪波衍其東幽林出其前紛古木之茂幹圍四十而始圓盡樷薄而空豁到聲光於玉泉𣺌若素練鳴絶壑宛若晴虹飲碧川迸若明珠㵼合浦皎若星漢垂蒼天通華巖以深窈探三洞而稽延黝一竅之隂黑傳勝跡於名仙終曲折而却歩疑神蛟之幽潛徐平林其我邁兮迴晻藹而寂歴騰樹樹以明輝兮染山山而黛色顧香臺之在望兮破白雲而髙入叠峻嶺以數匝叢修木而萬積開九軌之徑凃兮聳觀閣於三霱飛丹青於太虛兮越鐘磬於林石盻風樹之從容兮興流泉而共得俯横橋而徙倚兮魚鱗鱗以迎客殿五重而穹窿兮盤烟嵐於磴級幻樓臺之髙下兮隨山勢以踈密收全勝於四覽兮憑來青而咸集允翠色之獨佳兮徹西矚而莫極迴無量於遐瞻兮亦夢泉之猶識松䕶駕以謖謖兮幹虬舞而如鐵臺祭星而巍巍兮遹軒豁以朗潔爐裊裊其餘香兮永氤氲而不歇撫丁丁於棋盤兮想偓佺以對奕生蟾蜍而偃仰兮方怡神於靈蹟乃沿山極望而紛紅兮則杏花之霞赤轉峭削攀蘿藤上嶻嶭入窅㝠列槐蔽翳危徑崚嶒碧雲在上金銀結成丹璀碧璨盪揺光精虹蜺駕棟蛟螭蟠楹四闔八牖廡接廊迎羅雲宿霧玉闕化城琢壁鏤橋營窟精靈泉流香積聲散林坰賜碑蘚剝卓錫泠泠爰洪光以載探兮極松盤之隂凝枝横偃而交拱兮葉屏障而中行逼香光與聲觸兮悉古栢而遮盈乃玉華之彌髙兮折十八盤而仰登瞻石塔以岧嶤兮卧法王於無聲來寳樹於西域兮揚娑羅以飄零卓三圍而九花兮妙七葉而三棱復溪盤而石倚兮茂琅玕之菁菁笋盈文而猶籜兮逼孫枝於太清樷蒼筤而緜邈兮接隆教之淵泓恍野燒以凝睇兮垂丹柿如繁星尋水源之盡頭兮遥觱沸其來聽下清響於蒼嵐兮激細泉於亂砰踰廣泉而曠絶兮摩五華以雲平送悠邈於翠巖兮陟中峯之崢嶸一階砌以白石兮恣坐卧乎晶熒巳選勝於晏祠兮創獨見以經營崇上聖而尊大儒兮鑿石龕以藏經豈魯壁之遺矩兮亦木鐸乎二氏之縱横翳名山而獨占兮崖秘魔以髙憑解旱魃之倒懸兮沛靈雨於䨇青何龍湫之莫測兮神道力於盧僧蹈石屑而西歩兮壓烟巒以萬層豁平坡於山㘭兮留䨇屐而暫停耀夜光於寶洞兮復照岩而珠明住濟勝以徜徉兮更窮探乎瀴溟爾乃戒壇邃肅極樂縹緲近翠逺黛八洞繚繞龜伏魚㳺龍馴猊擾固頑石之幻趣亦靈境之獨表曽海眼之不潭尤枯柘而長矯矚石景之天然粲金閣而搆巧綴蒼黄以南帯聿渾河之灝淼波雷殷而雲涌岸危迅而如掃横蜿蜒於板梁俯中流以𣺌𣺌斯誠塵世之勝賞而都城之雅抱也曠不海濶近亦市絶異禽紛翔怪獸錯列草氣皆香樹名莫别霧雨晴零霜風夏冽逕斷雲封寺迷烟截鳥一時而百鳴花經歲而不輟任車馬之喧闐幾因人而肯熱得天地之金精故飛爽而髙徹乃京華之勝景首兹山之霽雪夫豈蘊春夏之氣而宜收藏之節者乎我尤愛其駐夕陽之在山而以迎皎皎之初月南苑大閲賦施閏章天祚聖德地盡皇輿爰膺玉歴坐撫神區維赫濯於新命踵幽燕之舊都岱宗位其東藩大行峙其西隅枕居庸而帶滄海象天闕之辰樞亶建極於垂拱豈躭逸於康娛然而逰豫徵於夏諺畋漁肇於羲易姬文有靈臺之詩漢武侈甘泉之制蓋將以觀雲物節勞逸振師旅講武事藉田禽之多獲簡軍實以有備乃有西苑瀛䑓近取禁内樹列千章山稱萬歲俯玉泉之清泠挹西山之紫翠眷别苑於南海伊密邇於王畿壤連天以曠莾水浴日以漣漪插崇墉於雲漢清輦道於郊圻睇紅門之嶻嶪想帳殿之參差其陸則塗通九逵軫連三輔金䑓扶轂督亢接武碣石逺而來朝翠微近而獻嫵眺平楚之蒼然樂原田之膴膴其水則潏沸沆瀁澹沲淵泓桑乾輸𣲖溟渤效靈島湮渚溢風靜波鳴囊括太液缾揭昆明閃旌旗於河伯動鱗甲於石鯨邈乎若乘槎之浮銀漢彼哉哂求仙之汎蓬瀛於是菰蒲沉綠菡蓞敷紅鵁鶄翡翠仙鵠賔鴻呼羣鼓翼唼雨鳴風屬玉翔而上下赤鯉戲而西東雉兎麏麚逰集乎其外虎犀熊兕騰躍於檻中玉樹蓊鬱佳果連巻張公梨茂朱仲李蕃葡萄盧橘珠綴火然上林間居之賦爾雅方物之編窮侈極異不可殫言時登髙而騁目樂四野之芊眠是時百穀告成八荒賔服西旅貢以厥熬于闐獻其浮玉龍馬來於大宛象師致於西域天子治不忘亂安不忘危乃詔虞人營虎落乗戎輅戴白旗千騎電發萬乗風馳用三驅以祝網命八校以前驅竟陵谷以張罼界河海以為阹佽飛賁育騁其拳勇韓盧雕鶚恣其指揮俄推山而抨石捲四野而合圍氣吞麋鹿手搤熊羆皆應弦而命中若俯身而拾遺風毛雨血括雄併雌由是割鮮殷輪委禽蔽地程校多寡殿最次第勇怯分明惕威銜惠鳴鐃振旅歸而飲至天子乃推絳灌之宿將詢旦奭之訏謀尚想頗牧之賢旁覽孫吳之書敷文德於荒服定勝算於當樞姬有荆舒之懲商有鬼方之誅畫䇿則燭照而數計殱寇則拉朽而摧枯令嚴則過王師於衽席功成則告列祖以獻俘然後班張枚馬驚聽駴睹或奏賦於長楊或歌㤙於湛露頌擬白狼歌傳朱鷺鏤德銘功垂諸竹素天子乃所無逸戒禽荒佩虞書九德之盛詠豳風七月之章眎異姓若赤子以八荒為蕭墻猗允文而允武亦知柔而知剛將麟遊而鳳至永萬夀其無疆牡丹賦施閠章瀛臺之西太液之涘天作一邱鸞停龍起玉泉遶流燕山側峙宸遊禁苑實據其趾山呼萬歲園稱百菓珍禽翼接異卉花妥潘岳閒居不能列其名相如上林未遑載其顆羅羣芳於四時推國花之獨冠既叢植於芝房復駢延於蘭館信竒葩之可懐萃根株之無算若夫梅英纔落栁絮將飛東風洊暖疊蕋初開盈盈灼灼鬱鬱皚皚千枝萬朶拂檻翻堦雲殷别苑霞絢髙臺白擬玉版赤類丹砂既真珠之九蕋亦千葉之蓮華夀安潛溪以地異添色倒暈以種誇品盡洛陽之美數過廬陵之譜勝玉樹之菁葱豈人間之所睹天子乃佩蒼玉幸離宫移歩輦就芳叢翠華旖旎周覧肅雍或紺蕊扶踈獨號朝天之紫或露苞灼爍名擅御袍之紅或臨風昂首晨露未晞若向榮而吐氣聳翔歩於金閨或回飈側景朝雨方滋若承恩而既醉還霑灑於朝衣列樹爭妍若六宮之奉顔色異彩繽紛又若冠裳之來萬國爾其修廊回幔日暖烟含青陽斜映綠暗紅酣於斯時也天顔一笑萬卉咸歡香吹合殿色射青山杜鶻屈膝桃李無言錦雞失艶南威喪妍時則授簡侍從淵雲之彦賞花賦詩飛英濡翰亦有重臣出使逺人朝見引入禁林恩霑芳宴剪插玉壺則婆娑几硯折賜宮僚則寵光繾綣雖松有大夫之號蘭為王者之香拒霜有美人之面秋菊為隠者之糧芙蕖澤處而綽約將離質弱而徬徨莫不低眉却歩遜謝頡頏臣拜手稽首為之歌曰處艶兮不冶含芳兮不誇不與時競兮大肆其華豈遺世兮獨立欲並美兮不可得舒大文於東皇兮攬春暉兮何極平蜀賦有序潘耒皇帝御宇十有八年冬命奮威將軍臣進寳勇畧將軍臣良棟同建威將軍臣吳丹率師討蜀寇密授方畧分道進攻十九年正月癸丑進寶同吳丹克保寜偽將軍王屏藩窮蹙自盡擒吳之茂以下二十餘人前三日庚子良棟自龍安進克成都偽廵撫張文德降蜀地大定丁已露布至京宣捷午門外在廷之臣咸以皇上廟算恢閎坐見萬里激勵將士建兹竒勲相與踴躍唱歎形之聲詩臣遭遇殊恩載筆史館頌揚成功職不敢闕謹獻賦曰溯前王之烈偉撻伐之謨奸無鉅而弗剪兇無逺而弗鋤霆發聲於豐隆星耀芒於威弧鯨吞舟而就斮蛇摶象而見屠法春生與秋殺有霜落而露濡必武功之遐暢乃文教之誕敷惟我皇之聖仁廓天地以為量王道履以平平天門開其蕩蕩彼么䯢之小醜敢作逆而衡抗類射天以彎弓似逐日而投杖蛙處井以陸梁螳當車而倔强依嵐箐以為巢憑崖谷以作障巖巖梁益實號金城地闢蠶叢山開五丁劔閣梯空以懸度棧道循絙而上征天井盤廻而窈黑地網綿絡以縱横水以虎牙赤甲為咽喉陸以龍門鹿頭為門戸挺一戈以當闗非萬騎之能取當天光之分耀有草竊以偷處曽六合之一家敢守險以拒旅雄虺九首苞蘖三牙傳烽巴閬築壘褒斜驚百城於風鶴變一軍為蟲沙初屯蜂而聚蟻旋鬭䑕而戰蝸思明殪於河陽少誠殱於淮表彼逆孽之逰魂若枯莖之待掃何醜類之睢盱尚横距而張爪倚嶂嶺之千重謂天險其可保皇赫斯怒整我六師招揺為戈參伐為旗審制勝之在將料奪險之用竒㧞虎臣於行間建髙牙而授之曰汝進寳貔貅如雲東趨閬中毁其重門曰汝良棟突騎風雨西走隂平抉其後戸分道交攻竒正相權或犄或角動於九天惟東軍之驍騰凌七盤而徑度奪朝天之巖險葭萌空而不戍分勁旅為三行令異道而同赴摧堅陣於背城殱突豨而餘怒積甲齊乎錦屏投鞭斷乎江路迨禁旅之薄城斬門闗而齊騖兇渠斃於窮猿逆黨擒於脱兔盖纍纍籍籍衿甲面縳者不知其數西師巻斾以横邁据密樹之重闗出間道以𢷬虚儼氊裹而林攀爭白水之阸塞破鐵門之孱顔忽浮馬而渡江張赤幟於菁山朝耀兵乎江油夕嚴陣乎綿竹訝天兵之飛來俄攻心而潰腹開錦地之峩峩竪降幡之一幅收竒功乎浹辰若風雷之迅速捷書並奏飛檄交馳鋒不再淬矢不再披剗勁寇如振槁舉名都若拾遺天子乃升紫宸之殿讀露布於彤墀千官萃乎闕下望天顔之怡怡莫不鼓舞讚頌曰盛哉乎武功振古未覩兹也惟此劔南代有反側塹山燒棧便同絶域若漢室之取公孫晋氏之斬李特宋主之擒譙縱唐宗之誅劉闢皆用堅攻瑕以順討逆風行電掃罪人斯得然皆水陸夾攻首尾並擊傷損將士窮竭兵力踰歲淹時僅而後克未有不頓一兵不折一㦸駭若發機震若霹靂旬月之間廓清西極如今日者也天子將將大將將兵既得龍驤復有營平師以和而後克功惟㫁而乃成規萬里若指掌故無戰而有征夫蜀國者滇黔之項領也蜀平則破竹無前建瓴直走蒙詔亡魂貴筑不守將遂定卭僰略犍為兼冉駹收沈黎簡巴渝之勁卒與彭濮之鋭師浮舟牂牁飲馬瀘溪峨嵋為鐔㸃蒼作鍔􅆯罘葉榆圍掩蒙樂伐銅鼓之砰訇驅金馬之騰趠血鑿齒以釁鋒膏猰㺄以染鑊然後前歌後舞班師而還受成廟社薦功皇天包干戈以虎皮却走馬以糞田沛曠蕩之恩下復除之詔與萬姓相勞苦哀疲氓之無告拊摩瘢瘡長飬凋耗勸耕課桑興亷舉孝蒸斯人於太和咸詠仁而蹈道基隆平於萬年襲三五之休號豈不盛哉遂作頌曰天錫智勇為君王兮神武不殺誅猖狂兮運籌决䇿自廟堂兮任屬賢將齊鷹揚兮天戈一麾銷欃槍兮遂清大憝克鬼方兮長御逺駕包八荒兮刋山表柱垂無疆兮東廵賦有序勵杜訥臣粤考載籍省方之文著於易廵狩之典備於書時邁裒對之頌疊見於萹什則是古之帝王未有不廵行方國以察逺邇之風俗恤億兆之痌瘝俾得各遂其生成以登一世於郅隆者也自漢唐而後歴代之人主莫不髙拱黄屋以養尊處優時廵之義久廢而不講即或玉輿遠駕亦必清蹕戒塗其時之黎庶雖欲就日瞻雲希至尊之清問豈可得哉所以望九閽如萬里而閭閻之疾苦壅於上聞朝廷之德意不能下究其來舊矣我皇上聖仁如天智勇如神深黜近世之積習逺法隆古之宏規廵幸郊畿省耕省歛既已湛恩汪濊周洽靡遺猶以四方之幽遐山陬海澨或有一夫不獲之慮廼命駕東廵由瀛州過歴下濟河渡江詣建業而駐蹕焉凡六飛所至無論通都鄙壤必諮詢民生之利弊俗尚之淳澆吏治之臧否草野愚賤皆得仰覲龍顔親承天語以各攄其所欲言額手嵩呼歡聲徹數千里即華封之祝聖人曷可以方此至於擢亷能拯水患蠲租税格神祗祀曲阜之林廟禮鍾山之陵寢善政纍纍恩施稠渥奎章宸藻寵錫名區皆唐虞三代以来所僅見之盛事洵足焜燿天壤而昭垂典冊臣濫竽史職不敢以荒陋自匿謹竭駑鈍拜手稽首以獻賦曰維聖皇之御㝢握乾符而闡坤珍侔羲軒之化理冠道德而履純仁聲教誕敷於薄海品物共樂乎鴻鈞尚厪如傷於蔀屋不自暇逸於楓宸郊圻時幸補助維頻念疆域之浩浩户口之溱溱或有懐而欲訴忳鬱而難申爰筮吉日渙明綸先恩覃乎九有以徃省東土之民於是星旄聿建霓旌前指鳳蓋霞張鸞旗雲起天子乗渥洼之蒼螭天閑之素虬而弗御乎金根之軛玉輅之軌將攬轡以周諮接編氓於尺咫除警蹕之禁嚴播瑶音於遐邇過唐叔之故封經舜泉之遺址時徘徊乎道周采風謡於都鄙時維十月候逾肅霜既萬寳之告成咸築圃而滌場婦子熙恬於百室亞旅釋耒以徜徉聞翠華之臨幸莫不踴躍於康莊若夫詩書弦誦四民之良久沐浴乎膏澤而喜近日月之光爾乃子衿縫掖依帳殿以譚經白叟黄童傍龍驂而論俗得聆天問之肫肫仰見聖容之穆穆或拜神鼎之瓊珍或沾蓬池之玉䔩抑且供億之不聞戴恩波於信宿蠲豊稔之田租倍家給而人足泱泱乎大國之風當盛世之漸摩而益歸於淳樸載華旍而發駕由渤海以漸東歴岡陵之蜿蜒瞻千仭之芙蓉巖巖㤗岳靈氣所鍾東方為萬物之始故名之曰岱兹山為五岳之伯乃稱之以宗逼層霄而嵂崒紆盤磴以巃嵸必藉籃輿而仰陟或竟一日以扶笻我皇為蒼生而祈福齋心肅肅而雍雍步輦既郤晷景三移而已躋乎四十里之危峰登天門而臨日觀躡神府以訪竒蹤白雲在下碧落儼通衛士竭蹷玉趾從容斯神靈所呵䕶而曠古之所未逢乃摛天藻揮宸翰鎮石表燭蒼穹既鄙探䇿求仙之故事更陋金泥玉簡之登封逈出乎七十二代之上獨標萬古之髙風遂延覽於青沂時咨諏而噢咻憫樸遫之山農期人登乎四鬴惟洪流之在望乃徃觀乎河滸原夫亘地而經天用遡神功於大禹雖九折而洋洋每湧溢於中土酸棗瓠子多勞費以修防賈讓延年究空談於徃古敇戒金隄歲煩藏府猶慮夫濵居赤子或未免乎畚鍤之勞運輓之苦停雲䍐以流恩俾窮簷之有補若夫狐貉之祭璧馬之沈皆無闗於實政而非聖人之所取遂渉淮浦溯䢴溝弗忍田廬之昏墊爰發䟽瀹之逺猶維吳下之勞於貢賦縈宸𠂻而恤其隠幽一如東山之黔首競忭躍於花洲建康名郡民物雜稠六朝都㑹之地有明創業之陬稔習乗輿之難近法駕之尊優獲睹天顔以抒情愫巳誇異遘而動歌謳况乎深仁之洽被愷恵之翔流至於幸鍾山之林麓軫勝國之陵邱飭明禋而頒嘉制戒典守以䕶松楸尤髙深之至德卓越乎千秋洎旋軫於秣陵望魯郊而至止宅心道秘久釋奠於西雍悦志儒修更致䖍於闕里肅太常以偹樂集聖裔而習禮升觴折爼列奉璋之峩峩鬯灌登歌識睟容之亹亹設車服以詳觀出琅函而盡啟日臨洙泗以垂輪雲繞杏壇而皆紫凡列廡之名賢胥潔蠲以分祀御墨煇煌於廟廷錫賚繽紛於筐篚章縫在列以増榮野老環橋而色喜斯行也仁恩洪暢綱紀畢張勤同虞帝德嫓陶唐仰聖暉者侈斯生之厚幸徯我后者咸延頸以相望固合寰海而風動豈惟被澤之一方當兹珠斗北臨實沍寒之節序乃玉鸞載路敷暄景若春陽是誠天休滋至瑞應丕彰將錫聖子神孫以無疆之福開億萬斯年有道之長宜乎賡卿雲爛縵之頌光華復旦之章瀚海石子賦以石韞玉以山輝為韻勵杜訥寳待時而用彰聖遇物而必格兼收徧及於山林愽採勿遺於川澤聿維瀚海爰生珍石托體龍荒呈姿沙磧吸日月之光華映星辰之精魄茍鑒㧞其莫由幾沉淪之足惜懿彼美質天成晶英内蘊雲霞璀錯象萬物以賦形錦繡陸離配五行而合脗其為色也既滋綠以焜黄復塗硃而施粉其為體也掬之盈把璧連城而可方其為光也玩之奪目珠徑寸而相近用無不遺或飾佩以鳴璫功有足多能蠲疴而解愠爾其際遇聖明有長必錄僻壤遺村毎邀天矚網珊瑚於東海遴杞梓於南服然而所寶惟賢不尚珠玉郤輦賮與航琛祗課畊而貴粟胡斯石之䝉恩邁竒珍於結綠維時天子總六師操弧矢靖朔漠勤玉趾小醜立殄天顔有喜奏鐃歌以凱旋顧斯石而嘉美於是屬車爭攫似編貝以盈裾錦橐交盛復流霞而散綺逺觀之則繽紛錯落而難名把玩焉則盡態極妍而莫擬星斗風雲花木山水鳥獸蟲魚蜃樓海市無不畢肖其微茫豈徒略得夫疑似非意想之可到斯繪畫之絶技用是依文藻恊芳芷侔芸窗供棐几充雅玩於文房非斯石其何以若乃光騰筆彩氣吐硯山吸朝露之清潤含秘閣之幽閒竒文鬱鬱秀色斑斑勢如髙峯之壁立影涵曲澗之潺湲是皆聖武在御逺播天威智勇赫濯雷電馳飛瑞應畢至萬寳齊輝想蘊靈於大鈞故爾中堅外潤迨見用於盛世不殊方璧圓璣企皇化之及逺仰淵𠂻之察微獻蕪詞於文石之陛彌覺大哉堯德之巍巍皇清文頴巻四十四
