front:
  text: 欽定四庫全書皇清文頴卷九十九
  hash: sha256:f07fe4affd5a64ad7fb651504f297a90a72afd362207bbf28c5610e5ba1dabb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_099-1a, image: WYG1450/WYG1450-0518a.png}
body:
  text: 詩七言絶句無暑清凉湯右曽碧樹周阿夏景清三才萬物厪皇情每尋解愠歌薰句已覺凉颸殿角生萬樹園湯右曽遙青不斷緑雲鋪萬木蒼然總畫圖對面千林有瑶島蓬萊髙處望方壺趵突泉湯右曽洑流噴薄雪成堆潤物資生一竇開直送恩波到東海俱從天上發源來石磯觀魚湯右曽穿蒲戲藻自遊行集網垂鈎了不驚自是至仁周萬物一鱗一鬛總生成瀑布湯右曽曽從廬阜尋岩瀑憶到黃華問水簾今日銀河天半落恍疑兩地一時兼石壁湯右曽回崖沓嶂翠浮空峭壁巉巉插水中直是五丁開不得天然疊出錦屏風曲水流觴湯右曽波回芝岸接菱汀曲水流杯眼乍經總為帝書真第一恍從蘭渚到蘭亭雙湖夾鏡湯右曽夾鏡澄明倒碧虛四山晴翠繞周廬分明圖畫西湖景此景西湖較不如稻田麥隴湯右曽稻垂麥仰足隂陽土厚泉甘草木香㑹吐雙岐銜九穗一星天上應農祥西嶺晨霞湯右曽軒窗面面納虹霓左是丹臺右玉梯每惜寸隂勤乙覽晨霞紅映數峯西芝徑雲隄湯右曽殊形特似産芝房行盡雲根别有莊橫截一堤銀漢繞大羅天在水中央金蓮花湯右曾移根幸植玉階旁寶地蓮臺萬品香天與十分端正色承恩先借御袍黃恭讀御製麥秋詩湯右曾墨海雲煙五色鮮宸毫灑向麥秋天自今金匱瑶函裏併入豳風豳雅篇南巡聖德詩五首汪倓蘋汀藜渚雨還風四載勤勞神禹同今日河圗親指授竚看宛委告成功時巡御宿應星躔章奏恭呈玉座前五夜手批常逹旦輝輝宫燭動朝烟一曲南風舜操傳香薰寶几展瑶編濬川巡狩徵前事恰是虞書第二篇巡行舊典及春畋禮射從容玉帳前一曲鐃歌才奏罷君恩先賜酒如泉萬叠文漪湧翠螺三千香界壓銀河江心遙識天臨處㸃㸃華燈照玉荷懋勤殿恭紀三首法海天階玉燭有光輝五夜披星到紫微自謂侍臣趨直早不知深殿已宵衣晝漏稀聞出玉墀春風暖閣日遲遲乾清宫裏圖書滿盡是君王御筆批每有微風到玉墀九重廣逹四聰時閭閻莫謂君門隔民隱深宮盡得知恩賜鮮魚恭紀三首張廷玉弱嵗相依鳯闕居邀恩常得食嘉魚何期今日親承賜手捧銀鱗下玉除叨隨鵷鷺侍甘泉初割蓬池第一鮮昨夜多魚曽入夢定知寰海兆豐年日日裁書付錦鱗湛恩傳語白頭親喜聞眠食都如舊好作春江把釣人時䝉起恩問臣父居雍正甲辰夏日奉命隨皇子讀書避暑於瀛臺即景紀事得詩十六章同事者協理大學士事臣元夢吏部尚書臣軾學士臣敏侍講臣世逺張廷玉泛舟疑入水雲卿天錫氷壺六月凉久向鳯池霑渥澤恩波新喜傍銀潢帝子天成麟鳯姿分隂珍重日長時經旬不復窺園囿占畢儒生總未知縹囊綈帙燦如林奧義微言日探尋更向龍樓聞寶訓孔庭詩禮聖人心恩綸特錫五雲端多恐衰慵步屧難每到苑門才繫馬扁舟先待藕花灘特㫖皇子師傅皆年老艱於步履苑中往來令舟人艤艇以待叨沐天家雨露私抱書兩世傍瑶池白頭老監相逢話猶記先臣進講時康熙己未庚申間監先帝避暑瀛臺臣父侍從每日進講老猶親見之碧樹隂中紺宇開應時甘雨潤蒿萊鑾輿祗為蒼生駕不是看花避暑來苑中有時應宫祀龍神上兩次親詣祈晴雨皆立應千重金碧參差影一片玻瓈㶑灔光曾憶白家詩句好蓬萊宫在水中央畫屏山色層層見寶鼎香烟細細添几案何須勤拂拭纎塵不到水晶簾擁書坐愛北窗風珍果恩頒自法宫露在金盤香在室珠囊先擘荔支紅䝉頒恩賜新荔枝氷瓮風生玉雪濤浮瓜沉李興偏豪置身已到神仙境更啖綏山五色桃天孫昨夜試龍梭織就紅綃萬㸃荷曉露未晞烟未散彩雲多處一船過溪邉日日泛舟行溪鳥親人若送迎廊廟江湖兼占取青鸞隊裏白鷗盟丹巖百疊繡芙蓉竒石裝成宛轉峯石畔蒼松幾千尺臨流欲化葛陂龍帝念民依重力田别開幽徑苑西偏稻畦百畝桑千樹一幅豳風畫宛然晚風習習下藤蘿白石橋邉振玉珂行過朱闌回首望凉蟬髙處夕陽多彎環月挂古槐枝歸去休嫌短櫂遲擕得芰荷香滿䄂緑楊磯畔下船時駕幸釣臺釣魚賜饌恭紀六首蔣廷錫曉山迎日燦銅青夾道香蒿湛露零豹尾光中朝氣緑半峰髙築釣魚亭緑崖一徑俯長川趨步何殊上九天百尺翠屏開水殿灤河環繞畫闌前嫩雉鮮魚賜上方金盤飽啖大官羊日來異味多嘗遍碧海紅蓮第一香天然平石坐清淪才下長竿出錦鱗仁義為鈎恩作餌遊魚鼓躍入絲綸山光倒射緑萍開作隊駢頭上餌來滿缶柳根驚潑剌還將楊栁貫魚腮一縷烟雲起翠微凉風披拂釣魚磯詞臣奉詔先歸去不教催詩雨濕衣二十七日上命登興安髙處逺眺恭紀四首蔣廷錫馬蹄得得踏寒莎日色雲光兩蕩摩穩立興安最髙處青天左界看山河花飛短荻雲千叠葉落黃松玉萬株無數春蠶沙上卧絶勝平逺范寬圖掠掠風從腳下生始知身已接空冥直將目力窮千里著地天垂一線青蕩胸雲氣開秋色奔馬沙痕捲怒濤此處重陽無幾日山頭先已賜登髙恭謝聖恩詩四首有序汪灝康熙四十一年十二月二十八日臣灝同臣何焯荷䝉聖恩欽賜為壬午科舉人一體會試臣等遭逢盛世異數殊榮制科以來實所未有臣感激切至俯伏思惟我皇上學尊洙泗治駕唐虞重道崇儒大文德於武功之後愛才隆士廣賡歌於揚拜之時聖藻炳若日星猶博搜夫葑菲天章燦如河嶽尚𢎞採乎芻蕘宵旰萬幾不忘翰墨精勤五夜尤重文章聖嗣趨庭日課以詩書禮樂親藩受教時探乎邱索典墳加解額於棘闈多士羣叨樂育取異能於鎖院五經别録才華明目達聰既毫釐之必晰因心作則更小大之兼收灑湛露於九天真寰區所共祝布春風於三殿尤史冊所希聞臣技愧雕蟲文慚窺豹生升平之代徒慕簡編長逺僻之鄉未嫺鉛槧賢書無分負七度之風簷大比長勞守三更之雪案親年漸老夢隔雲山壯志未抒情殷君國乃幸邀聖朝特眷遂得沾盛代深仁縫掖書生槖筆許登宫禁草茅賤士摛詞獲傍彤庭聖製煌煌容瞻天而敬和睿詞奕奕時就日以賡歌御筆俯賜於丹霄宸章仰窺於碧漢蘼蕪上逹竟荷天褒葵藿漫陳幸叨聖鑑復念臣困頓鄉闈蹉跎場屋皇仁深厚仁超資格之中帝澤涵濡澤及尋常之外遍搜乎二十一史無此竒逢歷覽乎百千萬年罕兹異遇拜綸音而激勸難喻蛇銜對天使而歡欣莫禁雀舞蟾宫桂發皇恩生輪外之枝鼇禁梅開仙榜粲臺前之蕚九州海外爭傳此日新榮萬載史中長頌今時特典情踰矢口感極鏤心敬擬恭謝聖恩詩四章隱微莫逹唯長祝聖夀之萬千愚陋堪慙未足表洪鈞之一二臣不勝銜恩感激拜手稽首恭呈太平聖治邁陶唐重士崇文沐寵光一樣桂花香萬國獨頒金粟兩枝黃臘月寒枝剩幾叢破除氷凍是東風瑶階一夕生春草都在皇仁雨露中特將定鏡辨媸妍何幸髙天碧月懸一自聖人親䇿士人間玉尺總無權塞上烟雲捲地平已拚百里宰邉城誰知飄泊秋風後雪裏槐花一夜生南書房敬觀宸翰紀恩詩六首有序查愼行康熙四十一年十一月初八日皇上御乾清宫發御書一千四百二十七幅命大學士臣張玉書吏部尚書臣陳廷敬工部尚書臣王鴻緒副都御史臣勵杜訥右諭德臣查升展閲分類以備頒賜微臣慎行適奉命召試在南書房候㫖因得隨諸臣後仰瞻天日之光洵有生之竒遇而人世所希覯者也欽惟我皇上天亶聖姿日新大業體乾行之健殫帝德之勤學懋功純光華炳耀深宫無逸遊藝入神自真書以及行草由小楷以至擘窠或臨倣各家或親書御製有美畢萃無體不兼此雖極古今來專工八法終身矻矻自名一家從未有如是之多而且精者是皇上之御書固已超羣聖而駕百王矣而愚臣於拜觀宸翰之下仰見我皇上神功聖德冠絶千古者更有蠡測焉伏讀御製北征凱旋諸詩廟謨獨斷勝算萬全殱厥渠魁餘寬祝網闢版圖未闢之地臣史䇿未臣之邦我皇上宏猷偉略冠絶千古者其一也伏讀御製巡視河工省方問俗諸詩奠九有以敉寧恐一夫之不獲萬姓已共安於耕鑿一人恆自處於先勞遂致河海安瀾淮黃底定我皇上仁民愛物冠絶千古者又其一也伏覩御書大學聖經一章以至往哲先賢格言銘序抉其精微揭其奧義采諸儒之懿訓成昭代之典謨獨於程朱二子則不書其名我皇上崇儒重道冠絶千古者又其一也伏覩御書自晋魏六朝以逮唐宋元明諸臣名蹟無不手撫心賞至再至三類皆棄所短而取所長集書學之大成為帝書之第一而紙尾必署云臨某某書我皇上聖不自聖冠絶千古者又其一也臣一介微賤遭逢盛事千載一時舞蹈謳吟自不能已譬取秋蟲春鳥生覆載之內亦知鳴天地之恩恭賦短章以紀榮遇玉檢初開五色烟淋漓元氣滿中天宵衣旰食無多暇更灑雲藍十萬箋咫尺丹霄映玉清觚稜日上入窗明忽聞風雨來天半知是君王落筆聲一畫真成萬世師捧來千幅更神竒銀河直與宸居接無數蛟龍起墨池霞蔚雲蒸露未乾盡驅造化入毫端萬鈞腕力皆天授擬學虞戈一筆難良工巧匠日礱磨淵鑒新鐫勝永和不似當年淳化閣帝王法帖笑無多書訣端從主敬來數行御札日星開可知筆正由心正入直多承聖訓回賜扇恭紀鄂爾泰一握蒲葵雅自珍五明題賜墨痕新南熏不是風風力到手深慚把柄人辛酉暮春薄遊盤山三首德齡隂隂桑柘鳥聲幽渺渺平灘帶緑疇誰傍名山成小築枳花門巷嶺西頭諸天樓閣畫圖中亂石幽泉一徑通知是僧厨燒槲葉紅簷輕揚落花風參天松柏影縱橫占岫嬌雲放午晴小坐僧窗證聞見萬株寒翠木魚聲湟中暮春詞德齡破裘農父趂春晴白髮垂肩驅犢行山頂雪融田似玉一犂直上亂雲耕夏日海防閲工書所見四首髙斌熏風炎日歷長隄茂草蘢䕺路欲迷似喚勞人聲最好緑楊深處鷓鴣啼行趂微凉曉月妍清光一縷徹長川偶然自解詩中意月在河心影在天遍地蒲蘆葦蕩營村村籬落見花明海隅風物扶桑近咸有葵心向日生海日初生萬井烟相迎童叟盡歡然使君騎馬經過處笑指髯翁是地仙義州曲二章錦州北一百里塞爾赫大凌河水繞城流到海應知是盡頭白日荒荒照南郭行人為唱古凉州醫閭山前淑景微醫閭山後黃雲飛白沙北去望無極塞草春來馬又肥聖武逺揚平定青海詩八首鄂爾竒捷書三月奏甘泉上將專征破虜還萬里玉關明月好漢家勳業紀燕然雨雪曽傳賦采薇年年征伐憶金微何如楊栁春風裏早報元戎獻捷歸羌女羝奴次第擒更看葉護繫征輪戎王投甲齊歸日青海從今無叛人烟斂牙旗晝正晴天風吹送凱歌聲須知盛世酬功重緑綬新頒大將營幾日恩綸下建章萬年天子正埀裳鸞書會見來中省玉劍無煩請上方降虜中宵感再生共傳天語羡承平宸心覆載原同量京觀應除紀武名宵旰經年切治安聖朝家法接殷盤丹宸日日陳無逸創守身兼自古難麗日卿雲覆玉階萬方送喜進蓬萊侍臣早擬編皇雅慚愧元和司馬才青海平定凱歌六首吳襄聖主當陽六幕清西陲萬里震天聲竒功一戰收全部露布星馳奏玉京廟堂獨斷整王師大帥遙遵節制竒搗穴傾巢多算勝神謀惟有聖人知霜花十月照刀鐶三捷軍聲七日間白草黃沙誰牧馬天兵不放隻蹄還鐡騎乘機復踐蹂煢婺就縳黨全收降旗獵獵春風捲百萬羌番拜馬頭貢獒獻雉競相從脫劍投戈永息烽壯士錦衣方奏凱聖人黃幄正臨雍講學談經干羽陳格苖不用到三旬洗兵自有天河水更灑甘霖到八垠皇清文頴卷九十九
