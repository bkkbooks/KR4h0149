front:
  text: 欽定四庫全書皇淸文頴卷六十七
  hash: sha256:557232f913c60493183cf18dce03cba7bee3fa2bba3f49ebcea15a3757b4583d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_067-1a, image: WYG1450/WYG1450-0145c.png}
body:
  text: 詩五言律詩扈從聖駕南苑閲武應制馮溥訓武乘農隙春搜典制同甲開光吐日弓徑響隨風九陛都俞切三門禮讓崇微臣叨侍從珥筆愧難工秋日瀛臺即事應制二首馮溥芳湖當玉殿奏對芰荷香山色開朝爽花陰帶露凉微風迎翠輦初日隱紅廊曵履蓬萊路賡歌興味長待漏百花芳君王問未央星辰催曙色鴛鷺接班行學士收封事詞臣進講章遊魚時出聽雅製協宫商廷試武進士閲卷即事馮溥拊髀旁求切遴尤簡命申晴雲開殿陛英氣動星辰技是穿楊舊花知夢筆新熊羆羅鳯闕不待屬車塵閶闔雲霄逈英雄奏對來丹書原佐命武庫舊竒才貍首雕弧徑螭頭彤管開天顔應有喜絶足羡龍媒武闈對雨梁淸標秋堂涵淡色危坐雨窗孤丹闕風雲集靑天鸛鶴呼行間思衛霍紙上校孫吳俎豆儒臣事何能佐廟謨海內論兵日中朝拊髀年魚龍喧午夜雕鶚起秋天閣照靑藜火書翻黃石編球琳與竹箭願貢鳳樓前賜宴西苑恭紀張英離宫烟浦外幽賞禁垣西瑶島孤峰秀華林萬樹齊水生楊柳岸春滿杏花蹊不覺怡情久仙源到易迷水亭浮畫棟高敞若凌虗雲影搖珠箔天光動綺疏藥欄棲皓鶴石瀨戲文魚聖主揮絃處薰風化日舒講筵紀事陳廷敬崇政經帷祕延英玉陛高聲容肅中禁寵渥厚詞曹天語開黃卷乾文上彩毫萬言親講誦或恐聖躬勞燕寢羅緗帙高居御氣淸泰階懸朗照乾象法時行燎火千門望詩書五夜情未央常待旦求理為蒼生早朝即事陳廷敬遠坊雞未唱疲馬夜行遲漏㸃催金鑰珂聲動玉墀朝班存近侍官職在文辭正喜勤封事君王召對時天壇齊宿候駕恭述王士正穹宇中宵啓齊心上日䖍星河明泰畤燎火動甘泉紫禁傳淸漏靑松覆御烟行宫空拜望不數漢皇年康熙十年二月二十八日䝉召入𢎞德殿出西伯求賢圖命題賦五言近體應制沈荃白髮垂綸叟丹書佐命臣風雲寧預料魚水自相親駐馬高林晚揚旗碧甸春殷勤後車意曠代有同倫瀛臺侍宴泛舟賞荷應制四首葉方藹夏后璿臺上周王瑤水前何如逄聖主開宴集羣賢雲壑真丹地冠簮儼列仙千秋傳盛事光耀史臣編御座霞為幄花林玉作臺更無凡迹到只許近臣來睟穆依天表光榮浹上台太平欣正永長日得追陪詔許仙舟泛人行一鏡中象從河漢接氣與斗牛通荇藻翻輕影鳬鷖接遠空朝宗皆到海心共百川通光風動水際異采發華滋翠蓋亭亭立紅衣冉冉時淸波輕泛鷺密葉暗藏龜微物生多幸終年荷聖慈南巡聖德詩六首韓菼聖德時巡運嬋嫣龍起年諸侯虞玉帛四載禹山川日御方從震雲行總象乾東南何厚幸次第澤敷天築舍臣三策憂民豫一人歷巡堯甲子廷少夏庚辰立馬黿鼉窟停餐風雨晨湍波泥滑滑寧識聖躬親書聖推今聖多能聖又該戈從神武運畫自帝羲來麗藻中天逈榮光萬象開沾恩揮落處字字篤羣材農事省春深村村桑柘隂鳥催秋後玉花發馬頭金早麥迎風浪初秧待雨針幾章豳雅頌四語見天心花幡迎十字寶炬列千門敢越官家禁聊酬天地恩旌旗聞北指信宿戀南轅幸賜如湯沐年年奉至尊江心天插寺高矚俯神州海湧三千界雲重十二樓百靈趨黼帳御氣滿珠邱莫大文章在龍書最上頭冬日駕幸南苑恭紀二首王鴻緒禁籞期門發戈鋋散曙暉三驅橫獵陳七校合行圍碧漢星鵰健香巖月兔肥君王巡幸地巖谷滿光輝馳道黃金埒離宫白玉扉兕裘千隊列毳帳五雲依田犬銜鈴去銀麞帶箭飛始知氷雪候靈囿自芳菲上步禱天壇甘霖立霈恭紀二首王鴻緒甘雨皇心切圜丘禮太淸省刑寬赤縣䖍禱答蒼生曉日沈芳甸濃陰繞翠旌自天膏澤渥真傍六龍行至德穹蒼應油然萬嶺雲升壇才靄靄潤葉已紛紛絲散天衣濕烟含野穗分豐登瞻帝力擊壤九衢聞五月初九日賜遊暢春園觀荷花復命中官同泛舟遊覽畢賜宴兼賜千葉荷花一瓶恭紀八首王鴻緒內直依天苑薰和殿閣風日陪丹禁裏身在碧霄中嶺樹遙分翠池荷映曉紅忽聞傳召入聨珮接芳叢西嶺千重水流成裂帛湖分支歸御苑隨景結蓬壺玉蝀凌波逈瑶臺入漢孤上林曾有賦於此見真圖祕閣臨流峻花磯就澗低荷呈千瓣艷葉覆一池齊舞蝶知香戀遊魚唼翠迷曠觀天上景自有若邪溪湖映千林緑山圍一苑靑花間開鳳閣樹杪出龍亭香氣無邊散鶯聲不斷聽更看幽絶處漁網掛烟汀既歷芳巖勝中璫引畫船烟波靑鏡濶楊柳碧絲懸朱鷺晴遵渚金鱗晝躍川蘭橈經百轉何境不棲仙翠巘依雕檻銀塘敞玳筵接茵同晝卜式燕自天傳酒借波光緑肴含花色妍今朝風景好喜荷渥恩偏上苑芙蕖種塵寰眼未經艷姿何灼灼密瓣自亭亭折取從靈沼分頒貯寶瓶拜恩瑤磩下光采耀仙扄堯舜雍熙世生為侍從臣言聽熏瑟奏來賞芰荷辰重緑全迎夏殷紅半奪春看花能到此蓬島復何論聖駕南巡恭紀四首徐潮聖代時巡重欣逄熙皥年寒輕猶北闕春逈已南天仗入江雲遠旌連海日懸萬民齊引領羅拜翠華前飛挽供京國長河捲素濤地官難作計天步不辭勞刋滌踪非遠平成績並高江鄉好安枕睿鑒悉秋毫初日照江城城邊鼓吹迎何知九重遠真見六龍行結隊疑山勢羣呼作海聲翻勞聖天子愛惜到欹傾問俗崇淳古遙聞誥誡嚴君王先尚儉長吏敢忘亷舊習風斯變豐年瑞屢占從兹比戶慶藏富在茅檐賦得淡日非雲影徐元夢秋空移白日淡漠不關雲寂寂當軒照霏霏隔樹曛何須驚彩暈早已絶塵氛自愧瞻堯久拘墟滯見聞春風限韵徐元夢拂地初融凍㳂溪乍解澌徘徊千樹底藴藉百花時慣逐陰晴變頻兼雨露垂自然生意好披對滌煩思春雨次前韵徐元夢春雲生沼上細雨㸃流澌隱隱紅滋處鱗鱗緑起時璚膏隨地布珠顆滿林垂播種農夫慶因知慰聖思賦得雪夜書千卷徐元夢窗白生寒久燈明散帙初幽情參六出清味在三餘鹽絮知誰詠丹黃祗自如夜深渾不寐水月浸吾廬塞外曉行徐元夢野宿何曾穩中宵趁伴行馬蹄隨月影人語亂溪聲草露沾衣濕山雲繞徑生地幽饒景象容易逗詩情扈從駕幸五臺恭紀成德杳杳丹梯上迢迢翠輦回慈雲籠戶牖佛日現樓臺珠樹參天合金蓮布地開金蓮花惟山中有此種共傳天子孝親侍兩宫來西苑入直成德望裏蓬瀛近行來閬苑齊晴霞開碧沼落月隱金隄葉密鶯先覺花繁徑不迷笙歌回輦處長在鳳城西景山成德雪裏瑤華島雲端白玉京削成千仞勢高出九重城繡陌回環繞紅樓宛轉迎近天多雨露草木每先榮蕉園成德見說齊壇閟前朝太乙祠鶯邊花樹樹燕外栁絲絲宫籞人稀到辭臣例許窺今朝陪豹尾新長萬年枝賜宴西苑恭紀二首高士竒亭榭水雲隈軒楹面面開地疑圓嶠近人自玉墀來駕鳳雕甍出疏龍磴道回賦成慚庾信忝竊侍臣才遠勝東堂㑹晉太和六年命羣臣東堂臨流小㑹何殊曲水遊顔延之有三日賜宴曲水賦詩序早鶯啼太液芳樹繞瀛洲北接層霄峻南臨萬堞浮此中涵帝澤端愧濟川舟渡渾河高士竒浩渺看無盡滄波滚滚來浮橋齊渡馬大地不生埃勢接黃圖壯流從碧漢回尋源雖有志終忝漢臣才登戒壇高士竒絶巘橫初地鳴鑾曲徑通旌旄分遠近樓閣倚虛空壇靜山松冷巖深野卉紅遊巡重農事偶陟梵王宫恭和聖製賦金蓮花韵勵杜訥在昔隨仙蹕金英燦碧溪名雖同菡蓞根不染汙泥移植來淸殿深恩荷御題園林凡卉滿難與此花齊恩賜禁中騎馬朱彛尊魚鑰千門啓龍樓一道通趨翔人不易行步馬偏工鞭拂宫鴉影衣香苑柳風薄遊思賤日足繭萬山中壬戌除日保和殿侍宴朱彛尊珮結緋魚後樽開白獸先呈能勾樂隊密坐潤爐烟紫路頻除夕靑燈異往年誰當頌椒㑹猶侍聖人前癸亥元日賜宴太和門朱彛尊垂衣逄盛際輯玉盡來庭白醖三光酒靑歸一葉蓂新年恩較渥昨日醉初醒九奏鈞天曲風飄次第聽皇仁綏遠詩四首朱彛尊雁路緣沙磧魚雲接幔城鳴鑾七校從吹笛六軍行俗本通鞮譯人今息戰爭紛紛攜老稚遙望屬車塵納欵陳千帳班朝式九圍不圖瞻日角轉自懾天威重馬駝金槖茸裘換錦衣早知恩賚渥慕義久先歸錫宴原殊禮官庖出上方自來鹽榖少初得㫖甘嘗位近周靑馬詩題漢白狼遠人何所報齊奉萬年觴羽衛三千士龍媒十二間揚旗平似水布陳屹如山膽已寒蕃部歡仍啓聖顔始知師以律悔恃七旗孱皇清文頴卷六十七
