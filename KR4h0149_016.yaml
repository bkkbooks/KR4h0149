body:
  text: 序焦山古鼎圗詩序汪琬古之祀典有彜器彜之為言常也頫者為鐘卬者為鼎鐘鼎固彜器之大者也左氏傳曰諸侯有勲而不廢有績而載則撫之以彜器此天子所以錫有功也然則焦山之所蓄與二王子之所咏殆即其類與予嘗論之古器之與法書名畫並重也自宋代始蓋當累世承平之後朝廷無事士大夫讀書好古如歐陽永叔劉原父者争以博雅相高沿及政和宣和之間天子更剏禮樂亦寖慕三代之法物摉竒索幽取而貯諸殿閣者不可以數計於是李伯時黄長睿薛尚功趙徳甫之屬復相次而起莫不規摹其欵識研窮其字畫而諷味其文章繪之有圗述之有譜夫然後鐘鼎之器益見尚於世今二王子從登眺之暇摩挲鑑賞作為詩歌以傳道之不啻數百言迹其風流好事其何减於前宋諸君子哉抑予有感也昔春秋桓公二年書取郜大鼎于宋說者曰取者不當取也又曰得非其有之稱也夫魯桓宋莊其人皆孔子之所深惡然則一賂一取其辱此鼎也多矣此可謂鼎之不幸也至於焦山所蓄者雖嘗見汚嚴氏父子然猶幸而得反其故深自蔵匿於窮巖絶壑浮屠氏之精舎固不可以郜鼎者相提而語辟諸山林隱遯之士遭罹患難而卒能潔身以自全豈不尤為可尚也哉予故並論之若二王子之詩雄偉竒麗儼然子美退之復出則有程通判雷山人之評隲在瀛臺賜宴序潘耒臣聞地天垂象泰交之道以成木火繫爻鼎養之義斯著樂有徵招角招之奏禮存三爵二爵之文彤弓湛露播在風詩鄷水鈞臺標于傳記自昔哲王有饗有宴將以訓㳟儉而示慈恵昭文章而辨等威非直黼黻升猷潤色鴻業而已也至如漢宫長樂依綿蕞以為儀晉代華林緣祓除而成俗柏梁興枚馬之辭曲水盛顔謝之制昆明池上筆墨横飛華蕚亭中觥籌交錯流湎之塗寖開莊敬之風邈矣然猶形諸聲詩被之金石鏗鏘炳煥千載可觀我皇上亶聰濬哲允武允文法夏后之卑宫師姬文之昃食歳下蠲租之令朝頒省罰之科轉圜從諫鞀鐸遍于宫廷側席求賢弓旌周于巖壑兢兢業業無怠無荒用能綏奠寰區削平僭逆一苞三蘖之寇駢首檻車射天逐日之渠傳膏齊斧跨滄溟而斮鰐掩碧落以弋狼治定功成仁漸義洽于是推恩臣下加賚具僚及萬幾之餘閒施三接之隆禮歳在作噩月惟孟秋有詔廷臣特垂曲宴惟瀛臺者天府之奥區宫城之陸海疏玉泉而作沼象蓬島以為臺洪波浩瀚浸其隈茂樹䓤蘢䕃其曲紅蕖緑菼吐納烟霄繡栱璇題蔽虧日月天子恒以炎蒸之節清暑于兹羽衛森嚴周廬交屬攀躋所莫逮簮裾所莫經幸沐㤙榮來逰來矚于是泛蘭橈浮桂檝彷徉乎靈渚瀏覽乎芳林溯灝氣之空明凌神颷而輕度升降脩阪徙倚平臯臨清漣以振纓藉細旃而凝睇俄而珥貂宣詔寵錫自天出内府之織文爛天孫之雲錦題名署氏望之有輝叠雪披霞服之無斁爾乃間花張幕倚樹開筵授几以班設俎有序甕人執饌膳夫進羞鱠鮮鯉于蓬池菹芳蓮于玉井胹熊臛豹之味充衍方圓調蘭醖露之珍厭沃薌澤然後流金尊騰羽爵雲漿百斛瓊液千鍾降天語之溫淳臨重臣以敦勸在公載燕不醉無歸然而肅雝在庭儼恪在序舍爵有油油之色遷坐無躚躚之容迨乎日晷西靡樹隂東徙相與整冠約帶鵠立鳬趨瞻拜闕廷雍容成禮以退斯可謂和樂而不濫恭敬而溫文者歟㣲臣幸生昇平之代為侍從之臣屬在末班預逢曠典豈可使湛㤙沛澤鬱而不宣雖戴髙履厚帝力難名而叩缶擊轅微忱少展云爾甲子科湖廣鄉試録序毛竒齡皇上御極之二十三年值元會初開干支初闢之始禮臣以賔興大典恪遵成例開列諸臣應任選者仰荷睿鑑命臣偕臣某典試三楚伏念天下當蕩平之際東漸西被海波不揚而三楚介在南服自荆門以南逺至五嶺中間數千餘里前代雈苻跆藉不遺尺寸賴世祖皇帝方行克詰耆定武功江漢之間幸有寧宇而潢池盗兵又適當黔巫之衝浸滛衡嶽凡鋪敦師旅悉集之襄樊穀鄧以下與湖湘為控馭卒之六師張皇皆藉我皇上聖文神武裒荆罙入持玉斧而劈之瀾滄之外洞庭上下重見天日迄于今文徳振興賢書進獻者又三年矣古者生聚敎訓必湏時日而皇上以存神過他與斯民更始如風之刁嘹而萬竅齊發不數年間巖居谷處悉受披拂臣雖駑劣亦何敢以文命覃敷不加宣布獨是三物六行互相比較惟恐以浮文虛夸致妨徳藝是必于程硃較墨之間使言行相副始不負我皇上求賢至意用是惴惴惟謹乃暑雨宵晨既底其地即與二三臣工載厲厥事惟時監臨廵撫中外劼毖綱紀肅然而提調則布政叅政經理精詳監試則叅議僉事防衛周悉爰集同考試官决題發䇿進提學僉事所取士而三試之垂簾于堂合衆視而通以一心一若心入重淵而目營四海積若干日得若干人以覃㤙廣額増若干人并取乙巻貢成均者附若干人而錄文若干首以獻臣謹拜手稽首颺言簡端臣惟國家致治莫先用人用人之要在乎言行故三代立賢必以言揚行舉為旁求之則而成周三載選士必大比其徳行考詢其話言而後升諸宅俊以貯為世用此無他言者行之表徳者言之本也自西京取士有舉有試而分徳與言為二然且試士之目猶尚躬行如所稱賢良方正孝弟力田者簡拔之中仍不失砥礪之㫖故兩漢得人較後為盛暨隋唐以還廣立科目但以天子親試者謂之制科而别立秀才進士明經諸科為有司所試舍此以外别無他途為進身之地而于是以行求言而言見以言求行而行不可必見夫立言者既欲借言以表其所得而求言者亦即欲因言以定其生平則疏其辭矣必其情也其情矣必覈其義也覈其義矣必覘其情之何以通與義之何以立也夫如是而衡文之難也甚矣曩者漢庭制䇿首重儒術然晁錯内習申韓外應文學雖孝文之眀猶不辨其醇雜宋代啓髙文闢詭習顧劉暉私製新體而應試則謬為方正之語以嘗有司則雖歐陽之聰亦且為其所䝉昧而絶不之覺况今人之文不逮晁錯有司之職逺遜歐陽而欲以尺幅之間燭照數計坐見其敗也乃者兢兢業業殫精敝思自謂可以告鬼神而終不能少釋于寤寐者以為因言以求人仍不若因言以求言蓋言有偉肆而非夸者終不若醇謹而不流于固言有綺麗而非靡者終不若清真而不隣于薄言有勃窣而非僻者終不若簡易而不淪于一望而易盡則文字雖微亦即為維持氣運變易風俗之大道而况高文華國正聖世廸文敎所有事哉夫文體不同要歸一致前代取士多途總皆以登選之一意行之雖明經明法不一其科三年二年不一其候兩省禮部不一其地帖括經義不一其業然其為求賢之㫖則一也况今者家共一書人共一藝上以是求而下以是應閉門造車出戸而合登明選公夫豈有二姑無論其他即楚材晉用起自春秋而其後三楚人物漢唐軰出諸如黄香孟宗以孝行著易雄李芾以忠義見黄瓊郭翻之方正胥偃鄭獬之氣節龎徳公劉凝之之髙尚孟浩然皮日休之曠達以致幹辦如龎統向寵品量如孟嘉羅友力學如車𦙍潘京該博如黄琬李善詞翰如李邕歐陽詢文章如羅含習鑿齒王延夀杜審言輩何一非生其後者所當法式而其合不一以歸于至一有如是也然則言行雖殊求之惟一而至于文體之變猶次焉者矣臣之所自勉以勉多士者如此若夫有事茲役有吏臣若若例得並書歴代名儒傳序朱軾盡天下之人别其業而命之士農工賈四者而己而士獨以儒稱重之也亦責之也戰國異端蜂起其最甚者為楊墨挾其為我兼愛之說以誣民而與儒抗顧其為術淺陋入人不深孟子辭而闢之二家之患亡矣漢初學者惑于黄老之術儒道大衰迨後佛敎興其所論著較老氏之恍惚杳㝠為尤甚而信從者益衆韓子曰古之民四今之民六古之教一今之教三吾謂天下之人不歸老即歸釋二氏之學徧天下而儒敎幾乎息是敎二而民五農也工商也緇流衲子也無所謂士然非佛老之過儒者之過也今聖天子崇儒重道超軼漢唐嘗謂朕所重者大儒真儒所惡者小儒偽儒也覺世牖民之盛心至矣盡矣孔子訓子夏曰女為君子儒無為小人儒即此意也彼佛老方張大其說以為彌天蓋地而莫能外又竭力殫心以工其術而儒者以其小且偽者當之有不退然沮喪者乎吾思大儒真儒一也而小與偽有别焉聖人與天地相佀惟其公而已彼小忠小信小㢘小謹煦煦之仁孑孑之義皆挾私用智之為害也然小也非偽也一渉于偽則無所不至矣是故有儒而阿諛取容者公孫𢎞張禹是也有儒而依權附勢者馬融王肅也有儒而毁禮滅義者王弼何晏也若夫不逞之徒以邀名市利之心假托仁義道徳之説以惑人聽聞久之而一倡百和别户分門同者黨之異者伐之甚而恣其横議變亂黑白犬吠梟鳴無所不至猶自號于人曰吾儒也何恠乎學者以儒為汙而相率入于二氏乎漳浦蔡聞之先生嘗與余言儒之雜揉謬亂痛心切齒余曰堯舜在上黜邪崇正千載一時顧欲盡去雜揉謬亂之穢習莫若表彰先賢使學者知儒術之有真而浮偽者不得而託庶少贊一道同風之聖化于萬一於是倣大全編次諸儒之例錄漢至元儒者凡若干各訂其本傳彚為一編曰名儒傳書成有難者曰何休之黜周王魯王文中子之僭經惡乎取之曰過不掩功也小戴以貪去官劉向以獻書進不錄可也曰聖之去官忤何武也或曰九江太守徳也非聖也向父得鴻寳祕書於淮南向欲不獻而不敢非以干進也始于漢而終于元者何漢儒拾殘經于灰燼之餘有功于道術不小晉唐如范寗孔頴達之徒類能發明經義以輔翼聖教至宋而濂洛關閩諸儒直接鄒魯之傳前乎此者開其先後乎此者皆紹其緒者也明儒未有史傳故弗錄也傳以名儒稱何也猶言純儒真儒君子儒也學術邪正之分途名與實而已無所為而為者為君子有所為而為者小人也學者誠能體察于身心之間存理遏欲進進不已則聖人可學而至何有于名儒乎所貴乎儒者為其學而至于聖人也明乎此而章甫縫掖之士能不顧名思義乎歴代名臣傳序朱軾名臣傳始漢留侯迄元董摶霄凡二百有竒或曰人才莫盛於虞周五臣十亂盡之矣夏禹啓間類皆先代之臣殷伊尹仲虺伊陟臣扈巫咸甘盤傅說外他無聞焉今編名臣若干毋乃濫乎曰必如臯夔伊傅周召而後謂之名臣則得與斯選者幾何且取法乎上僅得乎中集中所載皆上法古人而卓自樹立者也孟子曰有安社稷臣者有大人者有天民者如汲長孺魏文貞者非所謂社稷臣乎漢之武侯唐之宣公宋之韓范司馬第其品在天民大人之間歟或謂武侯宣公韓范司馬之有功聖道者不少何以不列於名儒曰天生聖賢以為天下未有功名不本於道徳亦未有道徳而不發為功名者不幸而著書育才以守先待後非得已也程朱之不為名臣有以夫是故有堯舜而後有五臣有文王武王而後有十亂漢唐以下遭際不同聲績亦異總其要歸多由元首我皇上嘗訓廷臣謂非臯夔稷契成堯舜堯舜實成臯夔稷契吾君臣其交勉之㳟繹聖言夙夜警惕自念遭遇聖明不能感發刻勵附日月之末光垂榮施於無窮可謂上負吾君下負所學矣爰錄名臣都為一編審其所值之時所行之事所守之節所建之業或俊偉光明直行已志或委婉曲折務達其心之所誠然而後已雖不能與臯夔伊傅周召等量而齊觀要從此日以尚友千載高山景行其長人神識志氣者豈少哉夫求珠者必于淵求玉者必于山適伯樂之廐者纎離緑駬惟駕所適願覽斯集者各取法于上而設身處地叅觀效法以自奮于堯舜之世書曰汝翼汝為汝明汝聽詩曰有馮有翼有孝有徳行將旦暮遇之矣歴代循吏傳序朱軾傳曰循吏仍史目也吏者涖也為天子涖此民也自牧伯監尹下逮一州一邑之長統謂之吏吏得其人則民安民安而天下治矣顧必如何而後為得人曰亷曰才曰慈恵曰强幹四者盡之矣而史傳不以四者名吏而標其目曰循循之為言良也舎四者無所謂良而卒不得謂之亷吏才吏慈恵強幹吏者然則所云循良者可會而知矣論語記仲弓子夏諸賢之為宰嘗問政於孔子而其為政無可考子賤子游以鳴琴弦歌傳其他亦未有聞焉漢史稱龔黄卓魯之治郡多異績吾不知其為政於聖門諸賢何如也宋張觀自謂守官以來惟持勤謹和緩四字又云世間何事不從忙後錯過蓋為其事而輒計其效則進鋭者退必速即幸而有成而急遽茍且終遺後日之悔彼悃愊無華之吏循守繩墨而程能效功日計不足月計有餘况煦育涵濡以養以教事不煩而民享和平之福此王道之所以悠而久也循良之目其謂是歟顧吾猶有慮焉庸庸者自託於簡易鎮静以文其迂拙固卑卑不足道其或慕古人之雅化而優遊無為即使子賤鳴琴而理而怨咨愁苦之聲不息雖日奏南風之曲能使阜財觧愠乎有恒産而後有恒心假而終歳不飽而欲使家弦户誦吾知子游有所不能也我皇上念切民依勤求吏治嘗謂司民牧者存一沽名市譽之念將有廉而矯激寛而姑息者矣朕非敎人以不亷亷且不可而况於不廉乎非教人以不寛寛且不可而况於嚴乎惟中道而行實政實心上為國而下為民莫善於是大哉聖謨無以復加矣蓋中者堯舜禹湯文武之所以傳心施之於政事即洪範無黨無偏王道平平蕩蕩商頌不競不絿不剛不柔敷政優優之謂也由乎此則處為顔孟周程出為臯夔稷契悖乎此雖一郡一邑可得而治乎今傳循吏若干其所為治雖未必盡有合於聖訓而優游無為與矯激姑息以立異者槩不錄焉讀者循覽體察庶於吏治或有少補歟樂善堂全集序朱軾雍正元年我皇上紹登大寶特命朱軾侍皇子讀書時皇四子皇五子年甫十三歳已熟讀詩書四子背誦不遺一字已乃精研易春秋戴氏禮宋儒性理諸書旁及通鑑綱目史漢八家之文莫不窮其㫖趣探其精藴由是發為文章實大聲宏彬彬乎登作者之堂矣雍正八年皇四子自訂其所作詩文為一集名曰樂善堂文鈔命軾為之序固陋如軾何足以知皇子之文伏念皇子以樂善顔其堂又以名其集讀者徒以文視文雖揚扢諷詠咨嗟嘆賞烏足測斯編之涯涘乎凡人為一事而或作或輟者所樂不存焉耳皇子之於文窮年累月抽思探賾俛焉日有孜孜誠有味乎其言之矣然皇子之所樂者善也非文也如以文而已矣雖如宜僚之弄丸庖丁之觧牛得心應手亦徒虚車之飾耳於善乎何與哉樂善之說見於孟子所謂善者仁義忠信而已専言仁則為心之全徳而義在其中兼體用而言則仁為體而義為用對忠信而言則仁義又為用而以忠信為之體茍存諸中者有一毫不忠不信求幾於仁義可得乎易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽剛柔之流行不息迭運不窮者誠也聖人之於仁義亦如是而已矣自聖人言之則為誠誠者天之道也自學者言之則為忠信忠信者思誠也人之道也思誠之功維何格致以啓其端克復以踐其實戒懼以立其本慎獨以謹其幾循循於下學以漸幾於上達久之而私欲潛消理與心融而樂生矣生則烏可已也烏可已則不知手之舞之足之蹈之天下娯心快志之事孰有過於此者乎欽惟聖祖仁皇帝徳合乾坤功參化育我皇上欽明緝熙聖以繼聖本精一執中之心法發而為蕩平正直之皇猷萬方臣庶是訓是行矧皇子天禀純粹志氣清明晨夕侍奉之下其薰陶涵育於聖徳聖訓者固已日新月盛莫知其然而然矣從此敬承無斁優游厭飫戒於思慮之未萌恭於事物之既接進徳修業之功孰得而窺其所至哉軾嘗聞皇子之自言其文也曰詩歌賦古三百篇之流吾將以為山水以為樂音以養吾心焉耳㫖哉斯言凡知者之樂水仁者之樂山以及先儒樂觀天地生物氣象無往非善即無往非樂無往非樂即無往非養也書曰非知之艱行之惟艱夫無所得於中而强而行之則不勝其勞茍從事於窮理盡性而渙然有得亹亹不倦夫何難之有皇子勉之哉謹序樂善堂全集序張廷玉雍正元年皇上紹登大寳命廷玉隨侍皇四子皇五子講讀經書蚤夜趨承仰見我聖祖仁皇帝垂光錫祚舄奕綿洪我皇上敬承庭訓以裕後昆聖學相傳緝熙光大皇四子粹質天禀明敏博逹而功力縝密朝有課夕有程寒暑靡間有非専攻文學之儒所能希其萬一者自經史百家以及性理之閫奥詩賦之源流靡不博覽精擇講明而切䆒之每發一問立一義輒超出於思議之表而皆前人所未發覃心實學者之所宜辨析也含咀釀郁蘊蓄富有時發抒其胸中所見著為論說詩賦諸體之作常不假思索一揮數千言立就清詞邃㫖首尾爛然數年來俱不下千餘篇皇子自加選擇得如干首彚為一集以示廷玉廷玉受而循繹焉大抵意義淵深文采博贍而筆力之雄俊健捷邁越等倫所闡明者聖賢之精蘊宇宙之名理而所吐露者經籍之膏腴藝林之芳潤自昔以文章名家者莫能逮焉皇子之於文可謂才超而學邃矣抑尤願皇子之不以此自多也聞之文所以載道古聖賢修已治人明體達用之大要胥於是乎在匪直工其文詞以為美觀也故曰非言之艱行之惟艱皇子以天授之才博通古今之學循循乎祗遹聖訓敬勤無斁誠於載籍之指要平日口誦心惟者既能言之又允蹈之自此進徳修業日新歳益廷玉所樂得而揚其美盛者詎有涯哉御製樂善堂全集序張廷玉臣聞文以載道而道本于身故必實能明道而文始可貴必實能身體而道始能明我皇上躬濬哲之姿夙承庭訓緝熙光明聖學淵茂臣自雍正元年䝉世宗憲皇帝㤙命得侍左右于今十有餘年伏睹我皇上稽古遜修研精經術于六經四子之書儒先之緒論諸史之成蹟博觀約取剖晰精微舉天人性命之理政治之所從出皆得其大本大源之所在寒暑晨夕矻矻孜孜融洽貫穿與道大適故發之于文日新富有麟炳矞皇充溢緗帙曩者親定樂善堂文鈔十有四巻臣既承命而敬序之矣御極以來勑幾清宴乃合前後所著選定編次為樂善堂全集臣受而讀之其義藴之宏深則經緯天地無乎不包其辭藻之贍博則鎔鑄古今無乎不備仰泰岱而知衆山之卑觀河海而知行潦之細誦聖言而知百家衆說之凡淺巍巍乎煌煌乎洵宇宙之鉅觀也臣仰惟皇上聖學高深固非擬議所及而竊謂其所以發而為至文者由道之蘊積者深也夫道豈獨為文而已聖賢本是道而垂彜訓帝王體是道而成治功皇上本皇極之敷言既已見諸行事中外欣欣文徳誕被矣而猶夙夜孜孜因言考行所謂聖天子建中和之極金聲而玉振之者誠在今日而是編也天徳王道合為一焉乾坤之容日月之光與詩書相表裏而世為天下則又何疑哉臣校錄之次伏讀御製序文竊有以知聖心之所存兹奉命綴言簡末仰至文之炳蔚而拭目以觀至治之日升海内臣民涵泳聖澤偕登大道區區蠡測所及蓋不能自己云皇清文頴巻十六
