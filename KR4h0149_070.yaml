front:
  text: 欽定四庫全書皇淸文頴卷七十
  hash: sha256:c79a31c7427f3505917205563c4cf0e3d0b7cf18e8ab89a3996729e4568fb22f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_070-1a, image: WYG1450/WYG1450-0168a.png}
body:
  text: 詩五言律詩甲辰仲春上祀朝日壇恭紀錢以塏大采春光麗寅賓曙色鮮槐壇迎御仗桂燎起祥烟帝典昭欽若王宫舉吉蠲曦輪新獻瑞重珥紀堯年恭謁福陵吕履恆太祖龍升處巍巍近斗杓南天千岫拱中夜百靈朝廊廡丹如昨松杉翠不雕仰瞻佳氣聚常在五雲標石匣劉巖千巗磐石匣一線宛蛇行出塞無多路防秋有舊城馬依殘壘卧人入亂山耕猶聽斜陽外嗚嗚畫角鳴古北口劉巖古戍勒兵屯千峯擁一門犬牙交塞口鳥道插城根寒燠天分劃山川氣吐吞夕陽驅馬過烟滿磧沙㾗鞍子嶺劉巖天畔插山稜盤盤幾百層石危循磴歇峰峭撥雲登朔吹旋崕瀑寒聲裂竇氷未曾鎸姓字孤負碧崚嶒黃土梁劉巖後嶺連前嶺天根倚石根峭崚熊耳崿穹洞虎牢門鳥路穿雲過驂蹄踏霧昏中原回睇處寧獨華嵩尊台拱即事吕耀曾禹甸山河外遐陬𨽻版圖有苗皆向化無處不歡呼絶域風雷動皇仁雨露濡莫言台拱逺已見好規模賦得帳殿鬱崔嵬應制阿克敦野淨秋光裡雲開帳殿中雙旌搖晚照萬馬動西風烟重山逾紫霜輕葉未紅時巡當嵗稔聖藻仰天工哈密阿克敦蕞爾伊吾地西通路正賒衣冠别䝉古城市類中華引水能知稼分畦善種瓜聖朝深護惜村落有人家使回伊里阿克敦絶域皇華使雙旌嶺外看草年兵事息一詔逺人安虎穴探非易巖關閉亦難聖謀天意合歸路少春寒東科爾寺德齡一統華夷盛三秋旌斾遙市城通古塞綏撫到天驕西極烽烟息東科海霧消雍容持節客羞說霍嫖姚大通河德齡山斷得平路搖鞭渡大通千峰晴入畫一水淡涵空狐兔營深窟鷹鸇識順風慚無綏遠略觀獵賦徒工渾水德齡塞水含泥濁源泉出石淸波搖博望節岸撤亞夫營已見洗兵甲還期潤偶耕降胡過萬帳烟火樂西成渾源州磁硤渾源神溪等八水合而渾流注桑乾高斌八水源泉渾河流日向東千峯雲嶺路一徑雁門通山蓄元靈氣人涵太古風冀方沾德化帝力頌無窮讀書高斌山水林泉興春江花月吟細尋天下樂䆒竟讀書深朗誦須危坐研精自惜隂還應手加額多謝古人心乾隆三年聖主躬耕藉田恭紀六首熊暉吉運啓三階泰時和萬國豐升馨親穡事無逸重田功天廥陽辰合農祥土脉融勤民稱盛典忭舞盡呼嵩祈年春首舉農祀更相仍報本崇司嗇陳辭命祝丞神光紛炯炯閶闔矗層層秬鬯惟馨逺精禋意已升穜稑儲先歲犁鉏出尚方作甘爰稼穡敦俗在耕桑柳拂霓旌轉花迎羽蓋翔天田邀駐輦野老亦承光紺幄霏微裡瑤臺杳靄間桑麻通井邑雨露遍河山終畝齊簔笠從耕列珮環真看入藻繪有喜動宸顔龍衮瞻雲近鵷班就日髙豐亨由帝力宵旰為民勞嘉植駢珠穗良疇浸玊膏拜揚羣賀瑞九奏叶仙璈楓陛勤如此茅檐意若何犁雲趣引犢耕雨急鳴簔銅雀徴祥早鰩魚紀瑞多普天皆力穡大地暢年和乾隆三年聖主臨雍禮成恭紀八首梁詩正雲漢昭回日光華糾縵年一人承大統景運邁中天典學君心切臨雍聖道宣儒林紛有喜忭舞荷陶甄道德符宣聖文章接素王崇儒風愈古視學典重光鳳輦橋門駐鸞旗璧水揚莘莘看彥士迎拜辟雍旁黃屋隆華構笙鏞入奏頻觀光增裔胄釋奠及王春舞列威儀備尊罍濯溉新載稽三獻禮天子特躬親聖聖心相契尊崇禮日躋宫墻伊古仰藻翰自天題德表尼山峻光懸列宿齊祗今瞻謁次炳耀序東西禮備生徒集升堂講幄開昕徴循舊典雨化被羣材性道探微㫖欽明仰睿才一人崇聖學奎斗朗中台鐘鼓三雍盛趨蹌庶尹多圜橋俱俊秀敷化叶菁莪錫賚周襟佩恩華被玉珂聖朝文德洽倫叙奏熙和共慶儒風暢從知士氣興典隆羣辟奉教立萬方承盛與鴻都埒榮逾虎觀升育才誠本計天府重賢登自分循墻陋榮叨侍從行右文遭聖代習禮紀虞庠統識源淵合恩流芹藻香遂歌欣有願才乏愧長楊乾隆四年聖駕南苑大閲恭紀八首汪由敦干羽堯天洽車書禹迹同順時稽令典撰日整元戎七德揚神武三驅振古風不須刋石鼓盛烈邁車攻淸蹕向長楊鳴鑣出建章九旗懸日月萬騎蹴氷霜帳殿氍毺暖旗門組練光驍騰健貔虎肅肅羽林郎地是周靈囿城連漢上林華旃馳日馭紺宇佇天臨沙路飛塵淨松臯積翠深離宫時暫駐端不為從禽甲帳拱中樞辰旗辨正隅玉鞭馳騕裊寶纛擁蝥弧令舉吟龍角營開合虎符氣酣金鼓外雷動萬人呼日角瞻天表親巡驃騎營秉旄森豹尾按轡儼龍行韎韐威容壯戈鋋節制明六軍同抃躍挾纊此時情周官司馬法風后握奇經迭進嫻師律環生變陳形千行飛電紫萬道漲烟靑却望高臺上森嚴衛百靈六鈞神力徑一發耀天威旋斾仍餘勇呼鷹更合圍采翎迎日麗錦翼傍雲飛恩賚叨蕃錫歡同奏凱歸詰戎非耀武偃革誕敷文喜氣融成雪和風卷陳雲陽回軒律正歌阜舜絃薰謨烈承三后垂衣仰聖君聖駕南苑大閲恭紀二首程盛修南苑搜苗地三朝翠輦臨保邦原在德御衆不忘欽櫛沐開基逺綢繆屬望深雅歌傳睿藻猶是紹庭心帳殿中權肅天威震叠時百年豐鎬澤萬隊虎貔師鉦鼓團精鋭風雲聽指揮太平櫜戢久仍見鄂褒竒聖駕南苑大閲恭紀四首宋楠禁籞丹霄逈帷宫翠嶂開虹梁飛放泊仙島水雲隈豹尾千官集龍旗萬乘來至尊親講武初幸晾鷹臺七校羽林郎鳴鑣出建章風霆馳號令日月煥旗常陳合軍容整師貞廟算長泰符星象正弧矢注天狼甲帳臨芳甸霓旌翊桂宫車徒司馬法千羽有虞風睿藻光文德戎衣念武功丕承揚大烈忭舞萬方同閶闔和鑾入鈎陳肅隊還淸霜乘北陸霽雪在南山太液恩波渥重門羽衛閒昆吾連御苑回望五雲間聖駕南苑大閲恭紀四首鶴年軒管迎陽日虞琴解愠年九圍聲教洽七德武功宣綵仗龍遊轉華林虎旅騫聖朝修古制萬騎赴平川雲物開新霽鑾輿指幔城蓂敷三葉翠雪麗六花晴金鼓轟雷動旌旗耀日明師中嚴號令氣象壯升平天子親教射騶虞應節詳期門咸踴躍羽衛各騰驤龍虎千軍列風雲八陳張指揮雄略逺盛事邁岐陽國典搜苗大皇猷繼述隆選徒揚政令振旅被仁風雅韻天葩發歡聲聖澤融鑾回齊虎拜震叠萬方同聖駕南苑大閲恭紀六首觀保有嚴共武服無逸太平心元化兼溫肅神功冠古今禮頒修戰法樂奏凱歌音南苑旌麾滿軍門翠輦臨宇內直寧謐多年頗牧閒王師常不用兵法愈能嫺虎豹三千士驊騮十二間巡營親玉趾行陳屹如山咫尺近天威紅雲映紫微星連君子鵠箭出九重闈端冕臨牙纛垂裳易甲衣嵩呼諸將列一一授兵機冬日如春日君恩挾纊溫龍光千仗合虎拜萬雲屯風徑笳聲壯星明斾影翻歡騰營幕徹牧馬散平原復詔從田狩旌為左右和網開三面濶禽落九霄多駐驆麒麟苑前驅苜蓿坡遙瞻宸翰灑朱雁被絃歌洗兵呈瑞雪不獨報豐登允矣文謨顯欽哉武烈承明明珠斗見奕奕劍光騰舉動天人合千秋運景興皇清文頴卷七十
