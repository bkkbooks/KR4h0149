body:
  text: 賦豐澤園賦胡會恩猗聖皇之受命浹至化於寰區履潤澤而大豐美兮皆帝德之覃敷登羣生於熙皥兮躋盛治於黃虞惟茂對之時勤兮匪苑囿之足娛歌薰風之解愠兮仰淑景之常舒奉宸遊於清暇兮扈臣工而樂胥值千秋之榮遇兮幸叨附於簪裾感隆恩之莫殫兮詎翰墨之能攄繄西苑之為勝也浴太液之晴波峙瀛臺之盛槩鮫宫日麗以淳泓龍壑雲蒸而澎湃儼蓬閬之仙都兮遊泰清而餐沆瀣瞻佳氣於層霄敢褰裳而夙戒夫何承嘉命攬晨暉歡迎翠輦肅候彤闈槖載詞臣之筆香凝侍史之衣洽深仁於蠕動霑和氣于翾飛爾乃蘭舟乍引錦纜徐牽似涵光於軒鏡總拜舞於堯天玉饌傳頒飽飫大官之膳珍肴羅列寧惟蓬鱠之鮮郢水仙醪光凝碧盞上林嘉果芳郁瓊筵渥典頻施榮光載錫喜桂苑之初披值龍樓之曉闢則有文窗窅窕畫檻玲瓏參差碧瓦燦爛珠宫垂清霄之竹露扇碧沼之荷風循玉砌而逶迤仙葩的皪度金溝而延竚嘉樹蘢葱若夫揚鬐唼藻盡文囿之遊魚拂羽含花疑瑶池之神鳥漾錦浪兮浴烟汀立玉砂兮棲碧草凡兹麗景皆競秀於宸居每值芳辰盡爭竒於仙島既供四時之賞尤宜長夏之天槐隂成幄榴火初然荷皇情之悅豫愧臣職之多愆懷盛事於卷阿遊歌足志紀良遊於在鎬頌美堪傳況夫聖慮勤農天心貴穀植禾稼於平疇恍田功之在目詠離畢而神怡瞻雲漢而遐矚知九重時切於民依而舉念不遺於蔀屋者也臣等才慙班馬學謝鄒枚授簡濡毫莫殫頌揚之悃瞻雲就日難言侍從之才徒知感聖德之幪帡沐恩波於溟渤雖復竭微忱殫筆墨安能名穹壤之高深而述榮施於萬一耶豐澤園賦沈涵猗聖主之勤民兮維稼穡以作寶當禁苑之奧區兮闢華園於靈沼滙太液之瀠回兮注玊泉之灝溔愛土物以臧心兮匪耳目之競好既桑柘之成隂兮復蒔藝夫香稻爾其溝塍四逹阡陌中分土膏應暖農祥戒晨提壺曉喚布穀宵聞紺壇既祀東作方殷施溉則荷鋤如雨播種則奮鍤成雲既而楊栁拖黃芙蕖清暑耘耔攸勤嘉禾膴膴蒸榴火而彌馨扇蒲風其如舞耕歌同蠶繅以相聞穗葉映桑枝而並吐更靈雨之瀼瀼貫百川而布濩湧丹壑之滮流潤碧霄之瀣露皆睿心之默禱遂感通而大澍若乃涼風降白露霏木葉脫百卉飛黃茂實丹顆肥萬寶告成原隰有輝覩公田之嘉穀先衆壤而陸離於是雲黃滿目刈穫是始或歌連穎之竒或詫兩岐之美撫環畝之幾何忽萬億其維秭田畯入聞天顔有喜匪幸此地之有秋實卜豐年之同軌然則是園也以供粢盛以薦明禋瞻終歲之幹止識民力之普存故義取乎天澤之下逮而象徵夫豫大而豐亨豈若甘泉華林僅耀遊觀之美玊津九成徒誇壯麗之榮而已哉於是天子憑黼扆排闔閶當萬幾之暇日撫百彚之繁昌集垂紳之鷺序招珥筆之鵷行相與陪遊於縣圃之側而授簡於水殿之旁重為詩曰巍巍禁苑兮渺渺蓬瀛匪敖匪紓兮黍稷維馨農夫之慶兮我后之誠於萬斯年兮大有書呈豐澤園賦陸葇豐由德兆澤以心敷時雖清燕念切民瘼當恢台之長夏處高明以非娛聆時鳥之好音觀百卉之向膴鳴流泉于澗曲緣石磴于周塗爰滌修壟藝嘉禾勤桔橰課耘鋤緑苖芊芊油油以舒潤之以膏雨舞之以陽烏天子乃駕丹轂駐靈囿光風扇和慶雲濩晝天淵一色瞻彼南畝進儒臣而賦之將以歌豐年而占大有也聞在昔之典禮紘藉田以孔阜祈穀止于元日事三推而釋手即省耕于郊圻亦交錯乎林藪何若覩胼胝于晨夕驗長養於在宥閲田畯以志喜勝躬稼而維耦緬惟斯園之創始在瀛臺之坎隅象天一以生水為植物之所需栁織絲以覆羃竹凝碧以環渠却遐陬之珍異禁網取乎珊瑚允栽培之咸若昭儉德以旁孚固不啻書無逸于廡壁繪豳風之古圖然而廣厦在前左經右史曲房周通疏廊徙倚驚銀漢之遙溯儼蓬壺之覯止既飽瓊糈載斟香醴飫苾芬以孔時歌令德之夀豈比在渚之鳬鷖樂依蒲而莘尾於是授素繭發隃糜欲抽毫而鬱塞將殫思以縈紆竒木之對未析連理之詞罕腴惟有望良疇以軒舞披渠藻而怡愈敢不詠徐黍以祝和豐沛聖澤於寰區將與諸臣溯田功於姬籙而頌府修於禹謨豐澤園賦張廷瓚惟紫禁之鼎建抗燕山而啓都羅周廬之千列設寮垣之百區隔瀟湘之縹眇拱環衛於宸居開薇垣之勝地聊廣覽而逺舒乃有禁籞西偏華林右掖路盤曲而紆回樹叢密而蓊鬱日月吐納雲烟羃䍥平楚流青修柯聳碧徑以幽而若逺地以靜而如僻顔豐澤之嘉名實園林之安宅爾其前瞻太液遙望廣淵貫注蘭沼發源玊泉滙羣流之浩蕩疊萬頃之蒼烟眺波光之澄徹儼氷鏡之初圓是蓋天子重無逸而念民依憫艱難而崇儉德觀稼有懷農莊斯設秋雲亭畔則華黍飄香嘉穎軒南則翠痕如滴雞聲隱叢竹之籬犢路入柔桑之宅羅襏襫於上林雜腰鎌於華闕隱白屋於朱扉粲青禾於紫陌一犂春水連朝添時雨之波十畝秧針遍地散晴嵐之碧此所以蔀屋之辛勤經四時而遍歷惟睿覽之咸周非九重之能隔者也至於佳卉分叢芳草成簇同心之花連理之木或倚石而紛披或拂檻而堪掬瓊枝與碧樹相依紫蕚與朱苞並屬芝場蕙圃之青葱葵徑蘭階之馨馥長風度而五色俱飛微雨過而百花都沐移來鳯竹當長夏以生寒發茁龍孫吹筠香而凝緑篔簹千畝何殊渭水之濵琳琅萬竿不數淇泉之曲此又麗景之怡情而芳菲之觸目者也至於逶迤百柱宛轉層楹琢文石以延路架素椽以成亭櫺檻留大朴之致棟宇無金碧之形聖德惟儉天道同清豈非百代之矩矱萬世之法程哉我皇上萬幾在御宵旰深宫當蕤賔之協律值炎景之方中御迎涼之殿閣臨清沚之簾櫳沛湛恩之汪濊訓珥筆之臣工念長橋而路曲許乘舟而御風頒天厨之尚膳賜㫖酒於花叢感自天而沛澤慚無地以措躬瞻紫霄之佳景愧薄藝之雕蟲願藜燃以奮志亦葵向而抒忠豐澤園賦彭寧求美上林之巨麗啓禁苑之芳菲惟皇心之勤恤念稼穡為民依因陂池之瀦蓄倣隴畝之町畦每省耕於東作亦觀穫於秋期儼江鄉兮在望施普惠兮及時軼樂成之舊宇為豐澤之新規爾其祕殿𢎞開曲廊回互玊磶朱甍疏窗洞户既啓鑰於重門或移形於跬步借尺水而興瀾疊小山而起霧循除㶁㶁泉鳴階下之流繞砌娟娟竹䕃墻隅之路花含笑而迎人草成茵而浥露移琅菜於仙家植綺葱於瑶圃魚遊沫於清池鳥弄簧於芳樹洵景物之恬熙娛澄暉於朝暮平疇環列荷鍤成羣春和始布淑氣方勻紺轅將駕黛耜畢陳建青旗以涖止如出舍以觀民洎乎田塍秧茁陌上風薰人皆力作苖亦懷新睹烟簔於清曉聽牧笛於斜曛有淹萋萋雨灑亭臯之潤出日杲杲晴看隴畔之耘若夫時届西成奄觀刈穫被野兮雲黃迎寒兮霜落輸歲入於倉箱樂遺􅕗於烏雀即苑內之多收占民間之豐樂蓋自玊泉之水太液之池滙為廣澤散作文漪泓碧千頃􅐯沆四垂可以資灌溉可以備耕犂因山川自有之利相神臯物土之冝故草木紛敷百卉盡觀其榮茂土膏脈發九穀尤快其華滋我皇儉德圖維永賴居逸思勞席豐戒泰木不雕鎪室無藻繪雖身處乎法宫常神周乎郊外以此知昔人之弄田鈎盾者猶未勤而我皇之親藉朱紘者意未艾也彼夫華林勝矣而非實政之修玊津麗矣而非民事之謀豈若兹園惠澤滂流狹制度於文囿傳休聲於夏謳丹水紫淵無勞乎厲禁蘭塘蕙圃不假乎收罘願荷彤墀之槖長承清蹕之遊豐澤園賦史夔我皇上御極之三十有三年闓澤覃敷恩波汪濊瑞露如珠卿雲似蓋風和解愠之琴光湛常盈之㑹固已雨暘咸若百室慶其盈寧寒暑調均萬國欣其履泰而猶無逸時陳豳風屢繪周知稼穡之艱難歷覽閭閻之穟斾修堤防而四海無波除螟螣而三時不害蓋其所旰食而宵衣無非念蒼赤而籌畎澮也若夫城連上苑路入平坡月泛瀛洲之島雲回太液之波參差水蓼掩映風荷喜嘉生之得地紛芳卉其何多維時節届朱炎時逢夏閏日躔當至後之辰星次屬中官之正榴花已綻復吐丹葩蓂葉全稀還舒翠鬢人歡夏景之長天錫太平之慶聖天子於是嘉茂對鼓南薰樂年和而歲稔時稽古而右文爰命儒臣各懷鉛槧仰窺天宇之崇飽食大官之饌俄聽傳呼賜之遊覽載瞻豐澤之泉林極目和風之荏苒爾其平沙似毯細草成茵攀柔桑之鬱鬱䕃田畝之畇畇望黃雲之藹藹俯緑水之鱗鱗散漫盈疇倣佛春江之景蘢葱蔽野依稀蓬島之濵瑞稼搖風若吐黃金之色纎藝擢露冝因黑壤之淳豈獨十畝千鍾上林早得陽和之氣已知兩岐一穗萬載長霑雨露之仁臣學愧雕蟲才非夢鳥叨陪侍從常賡復旦之光華清切黼扆時睹紅雲之縹眇而乃恍疑仙境忽到天邊嵩呼以拜魚貫而前猥措躬之無地荷授簡之自天銀管分題未得罄揄揚於萬一嘉禾獻賦願常歌多稼于大田謹拜手稽首而為之頌曰玊燭調兮萬彚昌黍稌多兮呈嘉祥惠風扇兮甘露瀼苕穎紛披兮實倉箱薦之祖廟兮郁馨香聖夀無疆兮瑞穰穰豐澤園賦有序沈廷文園在大內之右西苑之中巨構𢎞開規橅太素程材庇宇就下因高木不雕鎪飾無藻繢雖茅茨儉朴不資人力之勞而山水縈環未减天工之勝我皇上萬幾清暇翠輦時臨聽政勤民於是乎在泛舟仙沼弭節靈臺拂雲罕之棽離皆成湛露振芳蕤之的皪盡是天葩爰咨翰墨之臣用紀林臯之美夫探竒策府非無羣玊之峯選勝名區亦有三神之境虛傳美麗無禆髙深豈若今兹有逾曩烈用竭管蠡之見敬陳頌述之情自愧蕪詞無當勝槩皇清之握象闡珍錫圖凝歷包六合以為家總八紘而作極貞符曜明泰階寧謐既天室之攸芋亦名園之是即位臨西兌而義取屢豐地接東瀛而聲𢎞大澤蓋自玊泉之水太液之池滙為巨浸散作文漪泓碧千頃蒼莾四垂日月吐納巖崖蔽虧雕梁界道錦甃交門鳯標翥羽鯨石翔鱗控玊蝀以噴雨跨金鰲而嘯雲霞波如綺蘋吹無塵景山之巖岫巃嵸瓊華之洞壑玲瓏磴道窈折澗户幽通屛障羅列環玦琤琮峰迎仙仗谷應曉鐘欲霽而林暉千狀其雨則嵐霏萬重乃有丹梯盤互曲廊懸度隰衍原平隄回川注激水鳴舂藏舟紆浦葆翠桑濃麥黃雲聚層臺之暉近日萃琳碧以為粧紺宇之馥迎風散氤氲而成霧于是林巒迤邐川陸縱橫纓岡帶阜繚白縈青樓觀􅍶崒殿閣崢嶸璇題璧磶繡栱雕甍苕苕逈出翼翼孤擎跂飛鳥以斯厲佩長虹而若縈軼雲雨以下度排星河而上征可以仰餐皓氣俯揖羣靈重以新荑璀璨芳卉紛蕤芝房三秀蘭畹九滋梧則菶萋生岡竹則檀欒映池桃李則不言成䕃松柏則後凋挺姿般般之足翽翽之儀棷馭白澤囿擾黃支鳬雁翺翔于修渚孔翠翻飛于茂枝既乃品彚恬熙景物明淑睇萬里於纎毫攬九州而盈掬紫塞斜縈紅螺森矗聚燕風恬掠鶯霜肅隱現桑乾之河縹渺香山之麓金臺有駿骨之羣泰畤見神光之燭升高望遠四維一矚柏梁無以潔其觀靈囿於焉方其躅若乃麗旭始升惠風初扇時鳥嚶鳴繁英葱蒨黛耜正陳紺轅將勸辨雲物於嘉辰播雨膏於芳甸暮春合射之儀元已流觴之宴殿中揚白獸之樽水面捧金人之劔又若南訛應律祝融司天清暉擁榭翠漲平川龍鬐齊奮鳯咮爭鶱凌雕文之畫舸曳湘縠於輕烟荷碧筒以猗靡榴綘實以鮮妍葵叢生而就日蒲九節而延年逮夫清商乍奏爽宇乃澄栁寒月皎桐疏露清挹仙莖之沆瀣聽天籟之竽笙省斂則玊田粳熟招飲則小山桂馨暨乎重隂應候役車既休天同雲而一色水凝氷而不流瑶玊盈枝比剪綵而較逸瓊華堆砌笑埓地其奚求豈止歌黃竹而恤祁寒之困咏來思而軫遠戍之愁是以端居九五游神八荒靡遠弗届何施不臧覽動植之機以廣仁慈之泛濩悟流峙之理以侔道德之精剛既書同而軌一乃化美而治光罷烽堠于寰海受共球之駿龎攄卿雲而復旦呈含譽以垂芒遂乃彌性游翺從容詠陶學山探奧藝海回濤緝熙懋建俊乂勤招履高思下居逸念勞岐陽鼓鐘之盛卷阿車馬之饒陟斯園以同樂抗往哲而為昭小臣作頌用補風謡頌曰天垂辰象地敞皇州撫兹勝境敻乎建游餐華日近吸英霞浮匪風則御亦雲與遊同規方丈比美瀛洲六龍蒞止視遠聽周聖心孔懌庶政載修惟德峻極上與天侔百常允陟景福來酬瑞繁山委嘏集川流潤澤豐美萬祀千秋豐澤園賦劉灝維金墉之西隅納清流之四㑹激湍縈乎其中喬木䕃乎其外鬱積翠之沉沉覆輕雲之藹藹地遠應夫方壺象高侔夫圓蓋相彼名壤豫我王心映山為圃削木成林庭移嘉卉苑育珍禽揮七華之扇撫五絃之琴感南薰以奏曲迎北户而披襟乃其華不為奢儉不至陋桂柱芝栭瓊臺玊甃飛梁天蟜而相扶拱楶聳翼而匪鏤開芙蓉於别殿骨罘罳於中霤峙亭榭于上下環池沼于左右夸秋水之橫汾眇岐陽之靈囿我皇上居深穆思稼穡念茅屋之艱難重田功之生殖擇隙地之縱橫培嘉種以黍稷爰分隴畦旋疏溝洫度南東而成畝依保介以為式望阡陌之渺瀰睇稻粱之岐薿於是或藝或耔時雨時風風搖麥浪雨洗禾叢與花宫而掩映迎旭日而曈曨秉錢鎛而是利擬襏襫而能工則有鳩呼碧樹雉翳蒼烟來從遠澤棲近平川繞栁邊之畫鷁匝塘外之新蓮載飛載鳴看鵁鶄與鸂鶒以游以泳雜魴鯉與鮪鱣莫不依青叢之藝藝樂碧葉之田田我皇上攬兹休嘉遊當餘暇茂順歲時潛調元化察燥濕於高卑驗寒燠於春夏覩决渠之潺湲快垂實之䆉稏親嘗玊粒之香如履茅綯之舍既農事之周知復恩綸之屢下於是精誠上格大有頻書奏五色之雲物通九州之河渠秀一莖之九穗錯舊畝與新畬見崇墉之倉庾成比櫛之田廬皆曰天心之愛悉由帝力之餘是知九重匪遠七月時歌暢宸遊于别館惕治道於卷阿懷閭閻于寤寐想情狀於笠簔沛豐澤于下土偕雨露而滂沱於是人人歡於草野嵗嵗沃於恩波相與仰君心之無逸頌皇居之有那嘉穀賦有序彭寧求皇上運當清晏治奏歌功勤恤民依疇咨政理大沛蠲施之惠兼籌積貯之方厚澤深仁淪肌浹髓至誠孚格嘉穀兆祥濯玊露以芄芄含金風而栗栗地當燕北是陽回吹律之區節届秋成方令肅涼飈之候潔齊用薦即供御廩之藏燔燎升馨何啻玊山之種洵瓌竒之非寶惟土物之冝珍羣臣諦觀並深雀躍夫蓮開合柎往冊猶紀禎符瓜實駢根昔人尚垂歌頌况兹休瑞著兆豐年樂民事之順成卜天心之純佑臣雖愚昧私竊歡欣敢竭疏庸敬陳斯賦賦曰昭昭璇極眷我聖皇誕降嘉種寰宇悅康觀靈苖之滋阜知卒歲之豐穰瓊粒方苞叶瑞應於黃􅓿黑秬篝車是載樂歲輸於高廪神倉由帝心之求莫能昭格於穹蒼繄昔盛王高蹈遐軌不以金車銀甕為珍惟以時和歲豐為美所以書述歸禾詩編華黍同穎表於周年六穗書於漢史或以兩岐連秀興謠或以一稻再實著紀降休於荏菽禾麻辨種於秬秠穈芑凡以明年穀之豐登遂羣生之幹止豈比粒自瓊山禾來北里鄗上之黍稱竒不周之粟示侈惟天鑒聖布德施仁蠲租發帑給廩賑貧動盈千而纍億務家賜而户均厪艱難於宵旰籌預備於倉囷湛恩汪濊闓澤奫淪綈几九重圖繪尚陳乙夜朱紘一墢祈年首重三春積誠感召爰鑒精禋屬三農兮望澤流協氣兮氤氲沛雨膏兮滲漉發土脈兮植墳猶復勤思九扈周爰咨詢建翠華以出狩度榆關而北巡擁六飛而騰躍環七萃之鈎陳雖弊禽而表貉兼省斂以觀民方夫紅旗駐輦黃茂如雲睹瑞穀兮滋植喜禾黍兮鋪棻皇情顧而悅豫宣嘉慶於臣鄰爾其翹穎揚芬纎芒吐秀含實蕃滋擢莖豐茂浥露搖風交綺錯繡其拔地而出也森矗兼尋其並壟而生也分岐煩富葳蕤棽離兮如結綬與流蘇璀璨錯落兮若連珠與列宿覺一稃二實之非竒驚一莖九穗之重遘彼夫厨生舜箑階秀堯蓂花開紫脫木號華平朱章豐於中唐神芝産夫九莖競呈祥而獻瑞稱盛世之休徵然而無禆日用罕濟民生豈如兹穀預兆豐亨千倉萬箱兮普作農夫之慶墉崇櫛比兮詎惟天庾之盈垂休光於史冊昭明德之惟馨百爾羣工聚觀樂豫卓矣貞符淵乎睿慮惟稼穡之為寶惟田功之是預德産之致精微明昭之賜顯著爰歌大有樂康年吹豳雅賽秋田共含哺於聖世同擊壤於光天末臣欣逢乎上瑞願載賡夫多稌多黍之篇玊河春栁賦彭寧求伊鳯城之繁麗何草樹之紛披挺靈芝於玊殿敷瑞莢於瑶池苑內則星榆掩映宫中則月桂參差嶰竹植上林之囿嶽蓮開太液之池維兹玊河瀠洄城畔派衍珠淵光搖銀漢波紋蹙兮如羅水面平兮若案爰有垂栁千株扶踈兩岸本大角之靈根實真陵之嘉幹爾其灰飛鳯琯氣轉鴻鈞覩光風之啓序知遲日之臨春寒氷折玊芳草舒茵喜靈和之遺種獨倚候而精神依依猶舊濯濯如新乍抽芽而鮮碧旋布葉而繽紛羃輕烟兮漠漠疊淺浪兮鱗鱗遂乃揚晴絲凝翠靄秀色堪餐清隂可愛細裁金剪之雲濃染香奩之黛碧看螺子無殊黃與鵝雛相配一顰一笑疑拈覽鏡之毫三起三眠頓減舊圍之帶穿燕縷而無踪調鶯黃而斯在玊虹隄外金水橋邊傍紫城而婀娜俯碧澗而蹁躚籠輕條於沙岸垂密䕃於平川影亂春莎之髮光飛紫荇之錢浴鳥乘隂而顧慕游魚避日而盤旋態悠揚兮月下姿綽約兮風前襯明霞而增媚沐細雨而加妍低拂維舟之纜斜縈走馬之鞭對王恭於此日想張緒於當年於時翠輦髙臨天街遐矚駐鳯蓋於蘭塘引霓旌於綺谷賞斯栁之乘時抱清芬於水曲瞻日月之光華攬山川之秀淑身久沐夫恩膏材豈同於朴遫枝枝盡繞於紫宸葉葉還飛於丹屋依曈曨之北闕萬縷黃金對暗靄之西山千條碧玉豈若章臺落絮灞岸飛花朝朝繫馬夜夜藏鴉移在營前僅號將軍之府種於宅畔或傳處士之家所能同其勝概比此風華也哉乃為歌曰旖旎玉河側垂楊踠地新清光映荷芰亮節比松筠共知雨露天邉近密葉踈條總是春天行健賦史䕫雨儀奠極高卑以陳乾元資始得一以清立崑崙之華表合太乙之陽精羅萬象以成化涵九野而無形蒼蒼者色之正湛湛者鑑之明中秉樞而莫測外轉象而常盈此則於穆者天之命而默運者天之行也若夫連珠合璧二丸相配絡黃赤之九道紛總總其交㑹列宿碁布而成章三垣因之以定位自鴻蒙之始判轉機緘於圜蓋閲銅史之洊更物混成而無外應節宣威隨時解沛莫不統綱維於泰元鼓鴻鈞於一氣此則天行之旋轉於胚渾而包括乎元㑹運世者也粵稽上古欽若昊天堯曰廣運舜惟至諴在璣衡而齊七政鼓南薰而阜八埏君子體之以自強不息聖人則之以辨義行權欽惟皇上秉粹精之德符易簡之能道春生而夏長運日升而月恆居紫微之宫則翼翼穆穆藹藹融融鈎陳肅整以環衛經緯參差而翼從燭方隅之幽隱總萬幾于清𠂻故能朗杓魁而消氛祲舒乾斷而協化工渙皇居發大號祇神人極丕冒赫濯兮聲靈霆馳兮電掃德容睟然旁搜典誥揮宸翰則翔鳯隨戈攄睿章則流珠入奧露雷風雨施膏澤以無偏雲漢星辰燦昭回而有曜爾乃時勤巡省咨訪郊墟幕黃雲之屋乘雕玊之輿應龍受轡招搖翼輈朱鳥執節而前導雲罕從風而揚斿羽林河鼓象台垣而拱立二十八宿趨執事而周流信帝德之法天納含靈於在宥垓埏奠麗無煩八柱之承寒暑調均悉協四時之候寸隂不廢晷按度以常貞函蓋靡涯澤應期而下䆒聚五星於奎曜文明之化丕昭占六符於泰階至治之祥悉奏是故推厯象測躔垣以三百六十五度者為天運之常而以與天同運萬福攸同者為吾皇之夀允猶翕河賦有序周金然皇上御極二十有八載四海乂安兆姓樂業東漸西被聲教訖乎九圍武緯文經典章邁夫百辟青雲浮洛祥徵翠媯之川榮光塞河瑞應黃圖之籙來朝宗於萬國銘如帶於千秋大澤覃敷湛恩汪濊乃者洪流既已奠定善後猶厪疇咨挽運千艘動關軍國大計委輸一線端資疏瀹良籌集廷議之紛紜仰煩宸斷重土功之荒度俯允躬親爰用諏吉南巡遂以首春夙駕所過無供億之擾引領望翠華之臨瞻近日之方中歸市弗止欣時雨之來降扶杖往觀進主伯亞旅以言情舉士農工商而胥慶填衢溢巷喧傳帝德無私忭舞歡迎快覩天顔有喜由三輔而經千乘厯兩浙而返三吳健若天行迅如電發周知閭閻之疾苦昭宣吏治之激揚誰為請貸祈蠲特施𢎞赦豈由繪圖寫狀立沛殊恩是冝地效其靈因兹人呈厥瑞重農屢勸溫綸藹春雨之郊大賚頻頒戍卒挾陽和之纊猶慮民風之奓㑀每殷天語之丁寧爾乃駐蹕中河觀瀾高堰潤澤逾乎九里臨淵朂彼羣工凡冝先事而堤防務法前規而修治授之方略春流穩泛桃花俾乃專司繡甸平添麥浪三呼填道千峰餘嵩祝之聲五老呈圖半夜溢銀潢之彩此實時巡之盛典曠代之隆規也微臣幸際昌時備員史職欲紀河清之頌敬陳裒對之章寡陋為虞賡揚莫罄謹再拜稽首而作賦曰屠維荒落獻歲發春撫條風之應律值青帝之司辰回斗杓於端月調玊燭於元正左個則三陽協氣東郊則萬彚藝生天子乃進三公咨九卿䆒吏治稽民情考閭閻之休戚權政務之重輕念東南之財賦輸寶粒於神京緬淮黃之峻流實轉漕之攸經灑沉之績既逺開塞之智奚憑辨疏障之當否冝按地而審形俞僉同之上請用荒度以躬親諏首春之吉期御雕玊而南巡爰布恩綸下明詔史臣載筆而紀事虎旅槖糧而偫藁扉屨咸屛井邑無擾斥供億於侯牧慮繹騷夫父老鈎陳夾衛以肅穆飌伯先驅而迅掃萬騎殷轔百靈扶導前朱雀而上招搖侍羽林而翼嫖姚天晶霧輕日暖霞蒸草霏霏而承翠蓋雲淡淡而拂霓旌緹帷綪茷三屬重英出鳯城而言邁遵芳甸以遄征整車徒以次舍張貂帟以如城厯三輔之黃圖踐二東之青社過平原而釃酒面厯山而駐馬挹璿原之波潏倚泉亭而心寫署擘窠之偉觀運銀鈎於腕下寄深㫖於作霖即瀏覽而通造化憑嵯峨之雉堞閲海邦之廣野溟島則萬家蜃蛤沂兗則千里桑柘沛德音於俄頃供正賦其蠲罷天語布羣心娛黃童白叟接畛充衢提筐擁轊夾馬扶藜魯人進頌齊人獻謳騰社氣於日出播和風於海隅岱嶽具敖徂徠龜鳬蜿蜒聨屬千嶺嵩呼我皇乃御六飛揚鳯旗耳沿堤之頌聲踰汶泗而抵淮淝曠澤國之溔渺瀉河流而灌輸帖稽天之巨浸拯萬族于為魚既成效之足恃有勞績之可圖築金堤而捍淫潦疏水門而導黃淤聨巨版以嶻業洵鐡城之不如順時令以蓄泄又奚患於沮洳輟瓠子而弗歌簸桃浪其無虞快澄瀾之東注庶旰食其永紓遂下廣陵度邦水顧蕪城之壯傑覿蜀岡之迤邐聼竹西之歌吹戒肆鄽之綺靡出瓜步以騁望馭風檣於揚子渺長江之天塹界南紀之山川吞漢流之九𣲖遡嶓冢之遙源捲浪而鮫宫震蕩鼓濤而地軸回旋繄雙龍之夾楫淩皎鏡而洄沿昔浙西之疆理畫南徐而界焉總標名為吳㑹惟繡壤之參連延陵季札之區惠井閭閻之地泛龍舸而經過矚姑蘇之秀麗虹橋虎邱雞陂鶴市十里五里笙歌鼎沸遵往歲之寶訓既敦素之可嗣軫宸慮之綢繆更殷勤而飭誨循滬瀆而左顧溯錢江而汔濟鎮吳山而帶浙河鬯南國之都㑹偃六橋於湖漘展嫩荷於水裔非省方之所關固瑣屑而不足計維禹蹟之所紀輯侯瑞于㑹稽開祕圖於石室呈如月之碧圭受正符於帝命得隨刋之寶書用謁陵而展拜奠三禮而薦犧美平成之偉績揭嘉號於崇祠升秦望而觀海遂回舟乎剡溪計巡幸之為期曾未淹乎匝月何美政之咸備書事言其盈冊誦煌煌之恩綍盡執香而感泣江左粳稻之鄉東吳財賦之窟荷皇仁之浩蕩並捐除而己責家餘三釜之資門無一吏之跡清畎泠風杏花菖葉穀我士女介我黍稷恐餘􅀈之導奢敕謹惜夫物力春社雞豚高年肉帛食以時而用以禮慎蓋藏而勉節嗇期革薄而還醇勿波靡於積雪乃簡亷能之長吏畀拊循之重責又守令之小眚俾久任以勤職凡盡力以首公咸軫勞而加秩彼愚氓之無知或自罹於罪辟令湯網之𢎞開罄棘林而蕩滌僉樂育於春風似庶草之甲坼啓文明之景運首儲需夫人材懼士林之雋彥或沉汨於蒿萊况吳越之菁英騰文光於壁奎繫四方之趨向為風㑹之所開擴上庠之取數冀無失乎龍媒家詠菁莪人歌芹藻圜橋門而觀聽求嚴師而問道儒冠昭耀於吳㑹子襟舄奕於江表雲霄之路可梯淪棄之士絶少他若叩關之估舶持楫之役夫執殳之禁旅荷㦸之公徒或被鴻慈而錫賚或俾迅發于中途罔令一夫之不獲奚啻五日之賜酺用是謳吟滿郭忭舞載途迎馬首以就日結絢綵以充閭雖屢禁而弗絶光霅煜于通衢覩雲旓而喜溢望黼帳而爭趨握鉛者獻頌負耒者挈壺忘草野之卑賤希攀留夫玊輿天子慮百姓之煩費但慰之而未俞至如熊軾諸侯龍驤上將分茅剖符勞來休養能輯兵以安民洵治世之攸尚賜駝羔與挏酒羣拜舞於仙仗省方禮畢整轡遄回覽勝浮玊之岑倚檻妙高之臺集水犀於中流肅鈎拒之規模赤羽若日練甲如荼樓船焜耀旄幟紛敷役海童為水手命淵客而首塗晃金支與翠旗接媯渚之正圖轉帆石頭觀風建業虎踞龍蟠形勢天設陋典午之清談想明祖之餘烈禮寢園而親奠獻謹守視而禁樵伐澤及故國之邱墟尤頌聖仁之超越放船於燕子磯頭懷古於雞籠山側捐間架之舊征免蘆洲之稅額信恬波而捩舵矗高橦於直北載經淮浦重憩楚州喜髙堰之完固欣洪澤之伏流亮懷襄之永奠攄善後之皇猷絡堤塘與港䃮森碁置而星稠彼鹽潮之焦稼亦滋潤於下游化渚田為沃壤行漿乞而酒酬正河宗之獻斗溢榮光而上浮貢東海之蒼烏漾星槎於遠洲然後道魚臺涉通濟揚錦浪而送雲帆望神京而返旌斾彼中途之頌禱暨阡陌之簞食自江國而逹都門沿接蓋數千餘里於是乎照臨之下莩甲之微沐恩波之汪濊咸欣欣而自私幸曠典之時舉毋五載以遷期相與志慶曰樂哉乎斯世信遊栗陸而遇軒羲幸被雲日之輝光安畎畝之恆業含哺鼓腹而歌呼耕田鑿井而飲食抑浮侈而還太素謹嗜好而遵訓飭舍僞趍誠敦本崇實亷耻之道興貪競之源塞闢外户而不閉封比屋而無擇上華封之祝詞樂舒長之化日惟曰至于萬年宜子孫兮千億小臣簪筆而載揚鏤盛美其何極皇清文頴卷四十五
