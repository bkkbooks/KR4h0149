  text: 欽定四庫全書皇清文頴巻三
  hash: sha256:d5d166f049eecf688765116bcd54c560c2aa016eb5ee53f9078cb97ec91face0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_003-1a, image: WYG1449/WYG1449-0065a.png}
body:
  text: 論屯田論果毅親王允禮寓兵於農者井田是也寓農於兵者屯田是也井田為萬世不易之法屯田為一時權宜之計遂可相提並論乎曰兵莫難於糧食師出於井則人自致其糧故三代以上見諸經傳者止有用兵之法而無籌餉之䇿非無䇿也其規畫已定於畫井分疆之始車甲馬牛一切皆取之裕如師行而糧自從之井田廢而兵與農分召募之衆居則仰食於縣官出則懸命於飛輓師可一呼而集糧難一宿而至此千里餽糧孫武子之所以為難又况用之萬里窮邊無人之境不毛之地哉嗚呼雖有壯士不能自齎十日之糧三代以上幸而無玉門龍沙之役假使有之即井田猶存不貲之費難刻之期兵亦不能自辦而自運也自有屯田化兵為農之法而後師可無饑糧可無餽國無匱乏之憂民無騷擾之患實與井田相為表裏而且可以濟井田之窮屯田之法試於鄭吉之渠犂成於趙充國之湟中而實始於桑𢎞羊屯輪臺以威西國之一言𢎞羊雖心計小人其法雖聖人復起不能易也自漢以來屯田之說未之或廢有募民以屯者有弛刑徒以屯者而莫妙於即兵以為屯免罪人而屯之罪人不必皆農民其盡力與否又不可得而知募民以屯亦非游惰無籍之人不肯應募逃亡侵蝕為弊不一而又設官以統之設卒以䕶之竊恐所入不償所出而或謂懸爵以鼔舞富民可不招自來而又恐富民轉近邊之粟以冐官爵主之者因緣為市而不實督其耕小有水旱近邊之地米榖騰貴無益於兵而先有損於民也惟即兵以為屯則將校即統官比伍即䕶卒也一饑一飽生死係之欲不盡力於農不可得也而且勞其筋骨賢於投石超距也朝耕暮鋤外不暇於私鬭内不暇於思家念逺也趙充國所謂留屯十二便者豈欺我哉若夫人出田馬就草馬軍可以為游兵亦可以為斥堠此皆可以推充國之意而行之無弊者也抑井田之所以不可復者謂民之占業已久不可奪民田而更張之且丘墓室廬難於遷改耳塞外空閒之地彌望數千里畫井分疆可為我所欲為而畎澮溝洫既備畜洩又限戎馬尤一舉兩得者也宋臣柴成務嘗言之矣其言以地方四里置一屯一屯之田開十六井方四十里置屯一百區南北四十里之間東西展二百里可以置屯五百列井八千其言可採而用也嗚呼善屯田者其又可合井田而為一哉如得其情則哀矜而勿喜論果毅親王允禮周官司寇斷獄弊訟以辭聽以色聽以氣聽以耳聽以目聽其有疑獄則又訊之羣臣訊之羣吏訊之萬民葢大懼情之難得也惟懼其難得故得之者或有喜心焉是君子之所宜内恕而自反也蓋所由麗於法者情也而所以至於此者則更有其情焉先王之以善養民也使農夫寛然於井牧之中省耕薄斂春秋補助無仰事俯育之憂士聚於學商賈懷其資而又有士田賈田以殖其本工食於官而與民易事其廹於不得巳而為奸為盜者鮮矣教士以學農工商賈教之於州長黨正族師閭胥所掌社禜酺蜡飲射讀法政役喪紀之中而又有鄉八刑之法以清其源有簡不帥教者聚教罷民之法以遏其流使稍有惡萌即無所容其身管子所稱閉其塗使無由接於滛非之地者此也尚安有不知而誤陷者乎夫三代盛時所以養人於善而閉其邪者若此其備其麗於法則亦怙終不悛之渫惡民耳而獄辭之成猶命三公六卿公聽之其致刑王猶不舉葢體天地好生之心而無所不用其哀矜者至於此極也而况曾子之時政衰而民散久矣生不聞禮教而重困於飢寒大率多蔽於不知廹於不得己耳其情不重可憫哉而尚忍以得情自為功哉雖然此特為孟氏之士師言之耳設君大夫而有問焉則必以先王之道所以養民於善而閉其邪以馴致於無刑者告矣子産論果毅親王允禮春秋之世成周之政教猶未盡泯二百四十年之人材皆周公所陶鑄也故當是時賢人君子處心制事執禮陳辭皆有官禮之遺意焉管仲與子産又其傑出者矣管仲治兵用周官之重固而變為簡易子産治國用周官之詳密而加以辨察其道皆主於嚴明然子産之所為極難而規模尤近正其於管仲葢有過之無不及焉管仲用齊廣土衆民晉楚雖漸盛而各守偏隅魯衛宋鄭陳蔡曹滕皆非齊匹也故節制之師方行天下而莫之能遏鄭則傾側於晉楚之間凡數世矣以自保其民社且惴惴焉若不能終日敢有四方之志哉齊桓公志大而識明委國於仲一聽其所為舊如鮑叔重如髙國皆俯首而聽命焉而鄭簡公非桓匹也子皮而外駟良帶楚皆有爭心其民辛苦墊隘而習於慆滛誣上行私不可曲止使他人處此廻翔無主搶攘衡決而國非其國矣自子産出事大國則守信而折之以禮制强家則審幾而斷之以果靖國人則執法而濟之以威視管仲之嚴明則又過焉然丘賦之作非此不足以禦晉楚也刑書之鑄非此不足以輯雈苻之盜也故其自稱曰僑不材無以及子孫吾以救世而巳觀其入陳有禮不極逞其夙怨則滅譚戌遂降鄣遷陽之事或不忍為也以晉之强而不能屈則召陵之役必將伸大義以折屈完必不甘陰受其侮而隱忍以就盟也故曰子産所為極難而規模則較正焉若與管仲計功而論效則蔽於迹而未得其情矣抑於此見聖賢之論人也必探其精神之運心術之動而獨見於衆人之表子産之用心雖叔向不知而孔子以為惠人葢火烈難犯即周公刑亂國用重典之義也諸葛亮治蜀其規模於子産為近而氣象則深逺焉然終其身矻矻於兵師刑政之間而先儒以為禮樂可興其諸有得於孔子之論子産歟善為士者不武善戰者不怒論果毅親王允禮漢太史贊老氏著書辭稱微妙難識今讀其書因應變化莫得其端倪而藴義廣深覽者可各自得焉其曰善為士者不武善戰者不怒葢其知䧺守雌之學見於兵法者然也雖然亦視其用之者何如耳淺之乎言不武則韓信之屈於屠中少年是也若項羽氣葢萬夫威懾天下而髙祖避其鋒分其勢𢷬其虛乘其怠卒斃之如孤豚武莫大焉然能以衆小不勝為大勝者惟善藏其用於不武也淺之乎言不怒則曹操臨陣意思安閒如不欲戰是也以視魏相之所謂忿兵者固有間矣然等而上之如光武之開誠於隴蜀文帝之禮先於尉佗則其規模又巍乎其閎逺矣然若是者不武不怒耳未見其所謂善戰也而以為善戰何哉葢兵凶器戰危事雖以義舉亦不能不戕賊無罪以干天地之和若能不戰而屈人之師和衆安民以制其敝雖遲之數年遲之數十年以有成功其誰曰非善戰者哉抑觀孫呉論兵隱情以俟時匿形以觀變與老氏之指為近然其處心積慮則加險戾焉故雖取效一時終不足以定人國而其身且不免於刑禍以是言之則老氏之術較諸家為深逺然以聖人之道觀之則皆小智自私一曲之說也成湯之武如火烈烈而莫敢遏文王之怒是伐是肆是絶是忽而天下歸仁焉是皆與時偕行以協天地之性而與民同患又惡用是區區者哉一實萬分論果毅親王允禮孔子曰天下之達道所以行之者一也朱子以一為誠子思曰天地之道可一言而盡也其為物不貳朱子亦以為誠所以謂一為誠者一則以天道人道皆以誠言而知之也一則以誠者物之終始不誠無物知之也周子曰一實萬分乃以證明太極圖說所謂一實者萬物統體一太極也所謂萬分者萬物各具一太極也其說正與孔子子思相發明葢號物之數有萬皆天地之所生也其所由以生者皆一理之實所分具也其所以生者皆一氣之實所分行也自萬物中之一類而言其數亦累萬以放於無窮所由以生者皆此理也所以生者皆此氣也就一物而言其附麗萌生者亦累萬以放於無窮如動物之毛髮植物之華葉是也毛髮之附麗皆血脈所周流華葉之附麗皆滋液所津潤其萌生蕃衍於無窮者亦然其在於人則以一心而具萬理應萬事也不待言矣然必一實而後萬可分茍不得夫天理之實則無由㑹於一其發於心者必或出或入於彼於此而不可常施於事者必或順或悖或偏或過而無所凖人之於言也亦然古之聖賢異人異世而更相表裏互為發明如出一人之說以一本乎天理之實耳異學之支離百家之紛放則通乎此而窒於彼明於一而蔽於十一人之書自相牴牾一時之語猶如矛盾此亦如血氣不充而毛髮為之變滋液不注而華葉為之枯也是故孔子子思之言道皆主於誠誠者太極之無妄主於一而行於萬者也學者真知天理之實則自能一以貫之事雖萬變而不失其常言雖萬端而不違其則矣孫呉論果毅親王允禮雖聖人不能廢兵而口不言兵者誠有所不忍也自周室東遷王化不行諸侯力爭而善戰之士始各著為書以亂天下故凡兵家者流皆天下之忍人也春秋以來談兵者凡數百家而孫武子十三篇呉起兵法為最然其言愈精而其心愈忍矣孫子小試勒兵斬闔廬之二姬呉起母死不歸殺妻求將嗚呼是可忍孰不可忍哉以天下至忍之人言天下至忍之事宜其書必不可以傳世行逺而經秦火而不燬後世且尊之以為經此何說也葢君子不以人廢言兵猶刑也言兵之書猶律也君子而不用刑則巳君子而用刑舍蕭何之律奚從乎故就兵言兵則孫呉其善者也而孫子尤善之善者也然君子雖有時而用律而終不滿於蕭何葢與伯夷降典臯陶刑期於無刑則不可同年而語矣孔子曰我祭則受福戰則克孔子豈嘗用孫呉之法哉而可以操必勝之權其必有道矣孟子謂孝弟忠信之民可使制梃以撻秦楚之堅甲利兵則孫呉之書雖毁棄之可也故吾於呉子之書唯取其對武侯在徳不在險之一言孫子十三篇唯節取其卒章非聖知不能用間非仁義不能使間二語春秋論果毅親王允禮五經之最難治者莫如春秋易道深微然程朱二子巳闢其門徑學者可循塗而入焉詩書或朱子所手訂或口受其傳指戴記辭意顯然惟春秋則二子嘗深探力索自謂難通而廢然返是以後之學者雖知舊說之未安而終惘惘然無所入也自周以後明於春秋者莫如漢之董子唐之韓子時有微言直探原本微二子則筆削之義不可通者殆半焉惜乎其未有成書故明者或能由是而開通焉而昧者終茫然不知其所謂也自趙氏啖氏陸氏孫氏劉氏二胡氏之書出條分縷析辨三傳之糾拏依義理為標凖南宋及元學者皆師承而紬繹焉其於王綱廢絶之始終五伯心迹之同異亂賊公行之積漸是非褒貶顯然可見者大體亦庶幾不失矣而微辭隠義時措從宜者則鮮能開其窔穾犂然有當於人心所以然者春秋之教比事屬詞諸儒之說各就一事而觀之非不可通而以同類之事㕘觀則其義皆义牙而相抵故自明以來學者多宗韓子及歐陽氏之說以謂經不待傳而通者十七八因傳而晦者十五六欲盡置三傳獨抱遺經以叩其義意而升堂入奥者亦終無聞焉余少好左氏傳及長常怪程朱二子何以有志於是經而業不終乃徧陳傳說窮思畢精數易暑寒而心困於所欲知力屈於所未達然後嘆二子之望道切而自知明焉用是復取二子之說而究切之始恍然若有所入也程子曰春秋不可每事必求異義但一字異則義必異焉朱子曰此經簡奥立說雖易而貫通則難嗟乎是乃記所稱屬辭比事之本指也乃取經所書之事各為一類而按其詞之同異循是以求三傳及諸儒之說而牴牾者悉見矣循是以求董子之說然後知不書成宋亂則稷之㑹疑於欲討宋亂而不能不書宋災故則澶淵之㑹疑於欲討蔡亂而不能乃所謂視人所惑為說以大明之而他可推也然後知齊桓之城三國魯夫人之至魯女之歸其文各異乃所謂無通詞隨變而移而他可推也循是以求韓子之說然後知國君出奔而不言其奔之故大夫見逐而不言其逐之之人乃所謂存王法不誅其人身而他可推也循是以觀衆說之牴牾然後知病其義之窒則必有其可通者在焉苦其說之紛則必有其可一者在焉而韓子歐陽氏所以欲盡棄諸傳者乃於諸傳之事義無不研詳然後可一折以經義也所以辨衆說之紛綸者視此矣余多病少暇懼此生未得以與於斯也姑就所見開通其端緒庶㡬後之君子將有旁推交通而一以貫之者焉是則余之所望於能者夫蘇公式敬由獄論和親王𢎞晝人君治天下之大權有二賞罰而己賞所以勸善罰所以懲惡善勸惡懲而天下治矣若夫賞罰不中則善惡倒置因喜而賞不過開徼倖之端所失者猶小若因怒而罰則死者不可復生而政亂民殘所失者大矣每讀立政篇見命太史之詞曰蘇公式敬由獄未嘗不美其知為政之本也夫人君統御萬方必期於刑措此為上者之用心然獄正不可以不設也雖堯舜之治尚以臯陶為典刑之官况後世乎但常凛敬獄之心必使之得中而不濫自然朝無寃獄民有畏心刑措之端不必刑外求之也蘇公其有見於斯乎蘇公當武王革命之秋繼商紂濫刑之後正立法伊始所尤當敬慎者使少不敬畏而或至過當與商紂何異哉蘇公有鑒於斯是以以敬為主而用罰得中長我王國垂休百世不亦宜乎立政以典獄為重也周公恐用罰不中故呼太史而告以蘇公之事欲其傚蘇公之式敬也後世典刑之官茍以立政斯言為戒常舉周公之告太史者如呼巳名而告之則蘇公不獨美於當代而周公之訓亦不獨一時為太史告也他山之石可以攻玉論和親王𢎞晝天之生人也有君子焉又有小人焉非賦性不同而有所偏薄於其間也亦私欲蔽之習俗害之使然也乃世之小人多以害君子為心而君子又以去小人為念至於互相殘滅視若寇讐并君子不能以獨存豈知無君子固無以治小人而無小人亦無以成君子哉詩曰他山之石可以攻玉當熟玩而詳思焉夫玉者天下之至美也温潤清朗為世所貴猶君子之操存涵養為衆所尊也石者天下之至惡也粗厲昏暗為世所卑如小人之奸險蒙昧為衆所賤也然君子與君子如兩玉相磨不可以成器必有石焉以磨之而後器以成故君子之與小人處也横逆侵加而君子修省焉畏避焉動心忍性焉如此而義理愈生道德日就彼小人者將欲害君子而反為君子之攻錯不為美疢而為藥石則是小人固有造於君子也總而論之民勞則思思則善心生逸則淫淫則忘善忘善則惡心生君子器宇素髙風度自别然非有小人於其間使其志不得舒心不得放安必其心之果動性之果忍哉是則君子固日進於善而驅君子使入於善者小人不為無助也君子又何必捨己之所當務而日以去小人為事反激怒小人使逞其毒而並已之志亦有所不得遂哉故大易於泰之九二曰包荒葢大人之事不獨在屏小人也皇清文頴巻三
