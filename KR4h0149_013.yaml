body:
  text: 解經解劉藻經者常也萬世不易之常道也聖人以覺世牖民之心闡日用彜倫之理皆不得已而有言故六經並聖人之所作而當聖人之世不名經戴記經解及行在孝經之言乃後人之附會則經之名實承學者見其理之不易也而崇奉之詞考其時蓋在孔子之後緯書之前也易詩書禮樂春秋為六經周秦之際已有此稱後樂經失傳而漢武帝置五經博士宣帝講五經同異遂有五經之目五經之內分周禮儀禮為七經漢初文翁遣相如東受七經還教吏民其時尚無周禮儀禮之名也七經之外益以孝經論語為九經唐所校以刻於太學者是也九經之內去春秋入三傳中成三經合之為十一經又益以爾雅孟子為十三經蓋始於唐衍於宋而終於明之世云易在秦以卜筮得存詩以諷誦不獨在竹帛故亦不廢孟子之猶留者以在諸子中也春秋以口説尚存學士往往能道之至尚書禮經論語孝經皆得之孔壁實孔鮒所藏其孝經之出自顔貞者則顔芝所藏也禮古經出淹中周禮上自河間獻王左氏出張蒼家蓋自武帝除挾書之律開獻書之路而經籍前後繼出終漢之世簡編盡復其舊矣易之傳自孔門商瞿始五傳至田何漢施讐孟喜梁邱賀之徒皆宗何此古易也焦贛易第述隂陽災異之言京房傳之其術尤精費直易以彖象文言分入諸卦鄭康成傳其學王弼為之注而田氏焦氏易遂廢大卜掌三易連山首艮象山之出雲連連不絶也歸藏首坤即坤以藏之之謂也周易首乾所謂易者取交易變易之義而鄭氏又有易簡不易之説是三易歷夏殷周而異其名乃古三墳天皇有連山易人皇有歸藏易地皇有乾坤易雖出偽造然亦可徴連山不始於夏歸藏不始於殷周易不始於周矣書有歐陽氏學乃歐陽生得之伏生以授兒寬者又有夏侯都尉徔濟南張生受尚書以傳族子始昌始昌傳勝為大夏侯氏學夏侯建師事勝又事歐陽髙間徔五經諸儒問與尚書相出入者牽引以次章句為小夏侯氏學漢始立歐陽尚書宣帝復立大小夏侯博士永嘉之後諸學並亡而孔傳始興置博士鄭氏亦立博士一人今文先出伏生口授鼂錯之二十九篇是也武帝末得諸孔壁者為古文孔安國以校伏生所誦為隸古寫之增多二十五篇又伏生誤合五篇凡五十九篇文者字也漢所謂古文者科斗書今文者隸書也唐所謂古文者隸書今文者世所通用之俗字也詩傳於子夏衛宏宗之本以作序馬融鄭衆各有發明鄭康成為之箋其學大行漢初説詩者四家齊詩始於轅固而盛於匡氏魯詩始於申公而盛於韋賢韓嬰之詩曰韓詩王吉傳之毛公之詩曰毛詩則馬鄭所祖述者也魏晉之代齊魯並亡至隋而韓詩內傳亦亡毛遂專行至今矣漢初立春秋公羊博士宣帝乃立榖梁學賈誼作左氏訓故傳至尹更始而左氏始盛劉歆校祕書得而大好之欲立學官不果行和帝元興中鄭興鄭衆奏上始立左氏學賈逵作左氏條例二十一篇杜預為之注而左氏益明公羊之傳自其元孫夀授胡母生生與董仲舒並以公羊顯何休作解詁覃思十七年而引讖為多榖梁之傳自荀卿歷申公江公以至翟方進其學漸微晉范寧為作集解徐邈因之為注多可觀采者然三家之學紛然聚訟治公羊者謂髙親受之子夏治榖梁者謂赤魯學髙齊學宜興魯學光武時公羊之徒詆左氏益力此鄒氏夾氏所以與鐸椒虞卿各不相下也周禮在孝成時劉歆始表章之冬官失傳歆補以考工記王莽時置周官博士董仲舒謂冬官未嘗闕隂居大冬積於空虛不用之地故曰司空俞氏亦謂冬官錯列五官之內無待於補其言似皆未允通周禮者有河南杜子春鄭衆賈逵往受業焉鄭康成作周禮注多引杜子春鄭大夫司農之義後賈公彥又撰周禮疏五十卷更為詳備禮傳自髙堂生文武周公之典則粗具於是此禮之本經也至后蒼而其學益顯戴德戴聖慶普等轉相傳述所謂士禮即今儀禮也儀禮古經五十六萹與今十七萹文相似及明堂王史氏記多天子諸侯卿大夫之制倉傳十七萹失去三十九萹夫所稱士禮者特略舉萹首以明之若燕射朝聘則非士之所得行也禮記則七十子各撰所聞二戴得后倉之傳並以博士論石渠大戴取先賢禮書二百四萹刪為八十五萹曰大戴禮今存者始三十九終八十一僅四十三萹耳聖又刪德之書存四十六萹曰小戴禮士禮戴禮孝宣世已立學官馬氏又取小戴禮補以月令樂記明堂位為四十九萹列於學官而大戴不行儀禮周禮並鄭注賈公彥疏朱子嘗謂鄭康成注三禮考究典章大為有功然則有志於考古者不可不究心也漢初有齊魯論之説以齊人魯人所肄萹章不同而異其名張禹本治魯論晚諳齊論遂合而考之刪齊論問王知道二萹以二十萹為定號張侯論包氏何氏為之章句馬融為之訓詁鄭康成注之陳羣王肅皆為義説何晏又為集解陳梁之間鄭何並立國學至隋因之而鄭氏大盛於人間孝經為孔門弟子所録在漢長孫氏江翁后蒼翼奉張禹皆名其學孔安國為之傳馬融鄭康成輩各有注解唐明皇采緝六家自為之注頒於天下元行沖因而疏之古文凡二十二章今文十八章則劉向所校定及唐人所標題者也爾雅或以為出於周公然就其中如切如磋道學之類觀之則非周公作無疑或子夏之門人為之耳漢叔孫通訂之文帝為立博士自終軍豹鼠之辨其學始行為之注者有劉樊孫李數家猶未詳盡郭璞注解學者宗為善本逮邢昺疏之而草木蟲魚山川名物益昭然矣孟子自後漢趙岐始發明之因而為注析作十四萹唐陸善經合為七萹為之疏者孫奭為之釋者張鎰也然而後之學者議論煩興馮休刪之司馬氏疑之獨劉軻翼於前陸筠翼於後而虞允文又作尊孟五卷信乎讀書者貴有知人窮理之識也學庸二萹皆載於戴記大學古本通為一萹又與今文先後之次不合一經十傳乃今本也宋以前戴顒有中庸傳二卷梁武帝亦作中庸講疏一卷宋之世司馬光亦有中庸大學廣義之書又張無垢有中庸説六卷大學説二卷但力為表章以與論語孟子列為四書則自程朱始以上十三經授受源流注疏同異之大略雖見解岐出醇疵參半要不可不參互考訂以究其所以然之故至宋儒出而諸經之學粹然一出於正矣我皇上聖學天縱其於經傳之旨趣固無不兼綜條貫而範圍進退之臣鄉曲末學何敢仰測髙深於萬一但敬承清問用循次敷陳以備芻蕘之一得焉經解周長發聖賢覺世牖民之道備載於經燦乎如日月之麗天沛乎如江河之行地千百世奉為典訓其源流同異蓋可考而知也我皇上天亶聰明遜志時敏紹千聖之心傳遵百王之法守此真經學昌明之會也臣仰承清問用敢敬獻其説焉經之名於何昉乎自家語有孝經之目曲臺列經解之萹而後儒遂尊為蓍蔡漢武帝初設五經博士自時厥後益以周禮則名六經樂經散佚益以儀禮禮記則名七經益以孝經論語則名九經分春秋為三傳則名十一經加以孟子爾雅則名十三經古有三易謂之三墳鄭夾漈曰伏羲本山墳曰連山神農本氣墳曰歸藏黃帝本形墳曰坤乾其書漢魏不傳至宋元豐中始出于唐州北陽民家或以為張商英偽撰也夏有連山其卦首艮商有歸藏其卦首坤周易首乾文王為彖辭周公為爻辭孔子為十翼漢初言易者一則始於田何以授丁寬再傳而得沛人施讐東海孟喜琅琊梁邱賀二則始於焦延夀而東郡京房受之二則始於費直而鄭元王弼等皆傳之至唐孔頴達作正義獨取王弼之學李鼎祚之集解則取鄭而舍王陸德明之釋文則宗京而尚數及程朱出而後理與象兩明焉尚書遭秦火後百萹亡缺幸得濟南伏生口授二十九萹謂之今文而傳之者歐陽大小夏侯也其後孔安國得孔壁所傳蝌蚪文字定為五十八萹謂之古文而奏立學官者梅賾姚方興也當時為之傳注者在漢則有兒寬劉向之輩在隋則有費甝劉焯之徒至朱子所取宋注約有四家然王安石傷於鑿蘇軾傷於略吕祖謙傷於巧林之竒傷於煩乃以屬九峰蔡氏而書傳得所歸矣詩之傳也分為四家魯詩始于申培而盛于韋賢齊詩始于轅固而盛于匡衡韓詩始于韓嬰而盛于王吉毛詩始于毛公而顯于鄭元嗣後疏之者何胤全緩輩而惟劉焯兄弟為殊絶宋歐陽氏蘇氏諸家皆有訓釋至朱傳出而其説始定焉春秋三傳而外有鄒夾鐸虞諸氏鄒氏無師夾氏未有成書鐸虞兩家亦未傳于世三傳之作黨同伐異初齊人胡母子都傳公羊春秋後授嬴公再傳而有孟卿眭孟嚴彭祖顔安樂諸家厥後何休又作解説傳榖梁者自孫卿申公至於江翁凡五傳漢宣好之遂盛行於世自漢魏以來注解有尹更始唐固孔寅江熙等十數家至晉范寧集解出而諸説寖衰左氏出于張蒼家本無傳者梁太傅賈誼為訓詁授趙人貫公賈逵服虔並為訓解晉杜預又為經傳集解後人目為左氏忠臣而預亦自謂有傳癖也自後論之左艷而富其失也誣公羊辨而裁其失也俗榖梁清而婉其失也短宜何休有墨守膏盲痼疾之作也而鄭元則以針與起發三書以排之至後啖助趙匡之解疑每援經以擊傳希聲長微之通例每合異以為同逮程氏之傳作而聖人作經之旨於斯可見矣禮之為經有三周禮一書固為禮之綱領至其儀文度數則儀禮乃其本經而禮記其義疏也周官經六萹亡其冬官以考工記足之鄭元以為周公致太平之迹故其學遂行於世元之傳出於扶風馬融而參取杜子春鄭大夫鄭司農之説此文中子唐太宗皆歎為聖人所作也彼何休以為六國隂謀之書林孝存以為瀆亂不經之説歐陽氏疑其設官太多陳氏疑其與周官不合蘇頴濵有三不可信之評胡五峯有無一官完善之論則皆未窺聖人之精意也儀禮出于孔壁其先僅十七萹漢興髙堂生得之以授瑕邱蕭奮奮授孟卿卿授后倉倉授戴德戴聖是謂今文後魯恭王壞孔子宅得古經五十六萹藏在祕府是謂古文為之注者鄭元為之疏者賈逵也韓子苦其難讀朱子喜其緒甚善後儒徒以推士禮而達之天子以為殘缺不可考之書過矣禮記為七十子共撰古經得于淹中河間獻王收集餘燼始獲全書髙堂生后倉最明其業乃為曲臺記而梁人戴氏沛人慶普于是大戴小戴氏三家並立其河間所獻者一百三十一萹至劉向考校經籍檢而敘之又得明堂位隂陽記三十三萹孔子三朝記七萹王氏史氏記二十一萹樂記二十三萹大戴刪其繁重為八十五萹小戴又刪為四十六萹馬融傳小戴之學又足月令明堂位樂記合四十九萹今所用者陳澔之集説也朱子為通解集説勉齋成喪祭二禮則其義備矣然三禮之學其所以訛異者約有四端有出于前人所行而後人更之者墨始於晉髽於魯廟有二主始于齊桓朝服以縞始於季康以至古麻冕而今用純古縮縫而今衡縫之類是也有出於聖門而傳之各異者曽子􅊞裘而弔子遊裼裘而弔小斂而奠曽子曰西方子遊曰東方異父之服子遊曰為之大功曽子曰為之齊衰之類是也有後世諸儒損益前代自為一朝之典者吕不韋為月令祭祀官名不純于周漢博士欲為漢制封爵不純于古之類是也有專門之學各自名家而以臆見為先代之制者如以霍山為南嶽以太尉為堯官以商之諸侯為千八百國以周之封域為千里者四十九之類是也此不可不辨也大學孝經出於孔壁者為古文孝經今文倡於河間顔芝注之者凡百家孔安國尚古文而劉炫宗之鄭元主今文而陸澄譏之朱子刋誤一出而始有所凖矣論語有齊魯之分齊論多問王知道二萹張禹兼通魯論而包氏周氏章句出焉鄭元益以齊古而王肅何晏之徒宗焉至朱子集注行而諸家盡廢孟子之注趙岐分為四十四萹陸善經合為七萹其音釋張氏丁公著兩家而已若馮休刪孟荀卿非孟王充刺孟司馬光疑孟蘇軾辨孟均未窺其指歸而虞允文尊孟則得所宗而不惑矣爾雅一書或以為周公所作或以為子夏所傳自得終軍豹鼠之辨其説始行郭璞究心十八載而草木蟲魚訓詁名物昭然具析考古之學其彬彬焉十三經之源流同異班班可考也國家典學右文崇尚經術聖祖仁皇帝繼天明道薈萃心源纂修周易書詩春秋四經世宗憲皇帝特命頒發學校砥礪羣倫皇上丕顯丕承善繼善述天德王道一以貫之探河洛以啓苞符考文章以頒制度特命儒臣纂修三禮彚為一書頒示天下經學休明實千載一時之盛也學者志在窮經惟盡採漢儒之注疏以辨其典章精研宋儒之訓解以析其義理而且判其醇駁定其從違則內外胥融體用一致而聖人覺世牖民之意庶幾歷萬世而常昭也哉經解沈廷芳臣聞古之載籍極博六經崇焉如日月之經於天江河之行於地炳炳烺烺光昭宇宙敻乎尚哉蓋經也者徑也典常也如徑道無所不通可常用也故劉協曰三極彛訓其書曰經此恆久之至道不刋之鴻教也上古雖有墳典邱索無經之名戴記始有經解之萹孔子嘗謂老聃曰丘治詩書禮樂易春秋六經以為文是可證也經之名數各殊五經始漢武帝七經始漢文翁九經始唐鄭覃十一經始唐劉孝孫十三經始蜀母昭裔孫逢吉諸人至宋淳化而始定自秦燔後漢興始除挾書之禁文帝武帝表章於前宣帝肅宗􅊰論於後其為功甚巨唐命孔頴達等纂義疏至宋而有濓洛關閩之學其於經義多所發明可謂集傳注之大成矣若其頒立學宮或先或後各有源流今請臚其大略焉自宓犧畫卦文王作彖辭周公作爻辭孔子作十翼而易道大備周禮太卜掌三易之法一曰連山二曰歸藏三曰周易鄭元易贊及易論曰夏曰連山殷曰歸藏周曰周易釋云周者言易道周普無所不備今按世譜等書曰神農一曰連山氏黃帝一曰歸藏氏既並是代號則周易之稱乃文王當殷時作易名周以别殷也秦時易以卜筮得存漢有田何傳易施讐孟喜梁邱賀實傳之又有京房受易於焦贛施孟梁邱京氏四家並立號為最盛費直之易獨為一家名古文易馬融鄭元為之傳注又荀爽别作傳魏王弼注之古易分上下經暨十翼為兩本王弼始以彖象文言歸各爻之下實非古也上世帝王之書凡三千餘篇孔子刪為百萹孔騰當秦時藏於屋壁漢文求能治書者濟南伏生勝曾為秦博士後以二十九篇教授齊東帝使鼂錯往受文是為今文尚書厥後魯恭王得孔子舊宅蝌蚪書是為古文尚書孔安國作傳欲上之祕府遭巫蠱事未立於學官東晉梅賾始奏於朝而舜典稽古帝舜二十八字則齊姚方興得於大航頭者隋劉炫列諸萹第而書始全然考髙堂隆所稱有曰若稽古帝舜曰重華建皇授政改朔則魏時已傳有其文矣司馬遷稱古詩三千餘首孔子刪存三百十一萹漢有齊魯韓毛四家齊詩起於轅固魯詩起於申培韓詩毛詩則燕人韓嬰趙人毛萇為傳四家並故訓之學毛詩因河間獻王而盛行齊詩亡於魏魯詩亡於晉韓詩唯存外傳然其義頗與詩旨殊如關雎美后妃之德而韓以為刺他可知矣春秋傳凡七家在邱明造膝親受撰所聞為傳故事實該洽公羊髙榖梁赤皆受經于子夏者也公穀行最早左氏晚出而傳注獨盛三傳之外鐸氏微虞氏春秋則左氏之支流也漢初鄒夾與公榖並行逮西漢末二氏失傳惟三傳列為三經禮始於髙堂生后倉明其業作曲臺記百八十萹戴德刪之及德從子聖存四十六萹為小戴記馬融又足月令明堂位樂記三萹鄭元傳其學河間獻王得周禮闕冬官一萹購之不得乃以考工記補之先儒謂冬官有百工而本無官職有謂記雖非六典之舊然亦秦以前文字有謂冬官雜在五官之中俞廷椿作考古編邱葵因之作周禮定本以五官中之類於冬官者薈成一篇六典適各得六十屬究無定論儀禮存十七萹士禮居多朱子嘗以周禮儀禮為經戴記為傳作通解集説惜其書尚未完備論語至漢而有齊魯之分傳齊論者王陽名家傳魯論者張禹最顯禹又刪齊論問王知道二篇以訂魯論名張侯論更有古論語與魯論同第分子張為二萹爾學庸俱出戴記朱子謂大學曽子所傳為補正其闕略中庸最為純粹諸儒皆無異説孝經為顔芝所藏其子貞出之又有古文孝經多閨門一章劉向定為十八章司馬光重古本為指解朱子作刋誤以今文六章古文七章前為經後為傳遂成定本爾雅漢志不著撰人名氏陸氏以釋詁為周公作今所傳二篇云自孔子所增或云子夏所益其書雖箋釋蟲魚而博綜浩汗必聖賢所制或疑叔孫通作則妄矣孟子七萹漢志入儒家類諸家之論不同疑之者司馬光刪之者馮休翼之者則有陸筠尊之者又有虞允文自元豐中程子尊為四書後朱子著集注而始無遺議焉總之羣經林列箋注紛羅昔人云經猶四瀆四書猶四海也由瀆而入於海始得其指歸惟聖賢之是尊乃折中於至當我國家治化休明太和翔洽聖天子紹聞衣德稽古典學八紘六合悉成漸仁摩義之區出日無雷盡為誦讀絃歌之國彬彬乎與唐虞三代同風奚翅超漢唐而軼兩宋之盛哉經解汪士鍠臣聞經者常也萬世不易之常道也古聖人繼天立極作君作師事編於簡言書於册詔示來世永為法則歷代承之罔敢失墜尊之為經羣儒修明􅊰習久逺傳守而不廢周時詩書禮樂稱曰四術東遷以後王道不著孔子刪詩書定禮樂贊周易修春秋遭秦燔書惟仔易卜漢惠始除挾書之律文帝時始有尚書武帝時鄒魯梁趙間頗有詩禮春秋於是五經略具宣帝時石渠閣􅊰五經同異章帝時考詳於白虎觀熹平間正定五經刋於石碑樹之學門七略稱六藝者六經也兼樂記而言也七經之名則尚書毛詩三禮春秋左氏論語也九經則兼周易孝經十一經則增公榖十三經則益以爾雅孟子也昔者伏羲始畫八卦重之為六十四及乎三代夏曰連山以首艮而言殷曰歸藏以首坤而言周曰周易以别夏殷而言杜子春云連山伏羲歸藏黃帝康成釋連山曰象山之出雲連連不絶釋歸藏曰萬物莫不歸藏其中釋周易曰周普無所不備然其説實無眀據也周易文王作卦辭周公作爻辭孔子作十翼秦火後失説卦三萹河內女子得之自魯商瞿子木五傳而授田何何授丁寬寬授田王孫王孫授施讐孟喜梁邱賀由是有施孟梁邱之學又有京房費直髙相三家至後漢髙氏已微晉永嘉時梁邱之易亡孟京費氏人無傳者惟鄭康成王弼二注行世暨宋而邵程繼起朱子集成理數兼該其義逺矣尚書自漢文帝時伏生傳二十九萹其後為大小夏侯之學古文者武帝時出於孔壁凡五十九篇孔安國作傳王肅嘗為注解至晉元帝時孔傳始出而亡舜典一萹齊建武中吳姚方興得其書奏上舜典始全注疏而後推蔡傳為最詩自子夏傳後漢興分而為四魯申公曰魯詩齊轅固生曰齊詩燕韓嬰曰韓詩皆列博士毛詩者出於河間人大毛公為之故訓以授小毛公為獻王博士鄭康成作箋三家之詩遂廢春秋公羊興於景帝時榖梁盛於宣帝時又有鄒氏夾氏為四家而左氏終西漢不顯迄于東漢鄒氏無師夾氏無書而鐸氏微虞卿微二書皆失傳至章帝時左氏大興公榖寖微然俱立於國學焉髙堂生傳士禮十七萹今之儀禮是也古禮經五十六篇出於淹中后倉傳十七萹曰曲臺記所餘三十九萹名為逸禮倉授戴德及德從兄子聖沛人慶普於是有大小戴慶氏三家戴德始刪古禮二百四篇為八十四篇戴聖又刪為四十六篇馬融益以月令眀堂位樂記為四十九篇鄭康成受業於融為之注李氏得周官上於河間獻王闕冬官一篇購以千金不得遂取考工記補之至新莽時始置博士以行於世自劉歆及安石行之一再階亂後儒疑之然治法俱存朱子歎其廣大精密誠篤論也論語三家魯論者魯人所傳凡二十篇齊論者齊人所傳凡二十二篇古論語者出自孔壁分子張為二篇故有二十一篇張禹初授魯論晚􅊰齊論合而考之去問王知道二篇從魯論為定孝經古文二十二章出屋壁中河間人顔芝得孝經藏之以獻河間王今所傳十八章是也唐眀皇取王肅等六家之説參仿孔鄭舊義行於太學至宋司馬君實宗古文為指解朱子又為刋誤傳於世大學中庸本載戴記程子特表之以配論孟朱子取之故古本大學改為今本特補格致一傳孟子七篇又有外書四篇後漢趙岐注而刪之惟存七篇宋馮休著書十七篇論孟子書中有門人附益者冝刪去之司馬光著疑孟一卷蓋論性不盡以孟子之言為然也陸筠著翼孟音解九十一條周平園稱其篤志虞允文以司馬疑孟及李覯等非孟故辨之為五卷又二卷則攻刺孟者及議論與孟子異者可謂孟氏之功臣也爾雅陸氏釋文謂釋詁為周公作今世所傳或言孔子所增或言子夏所益或言叔孫通所補或言梁文所考皆解家所説先師口傳疑莫能眀也要之經以垂訓於後漢儒收拾於灰燼之餘功為最巨至唐而詁解益密歷宋而更參夫性命之微窮經者可無遺憾焉夫以經籍大備之餘遭逢盛治正學昌明惟博觀以廣其識研究以擇其要闡發以眀其藴則窮經之道得而經世亦豈外乎是哉經解齊召南臣聞兩間不易之常道曰經在天為日月星辰在地為江河海嶽在人為仁義禮智信之德為君臣父子夫婦兄弟朋友之倫而其在典籍則為聖人之言所以載兩間常道更萬世而不可易者也稱易詩書禮樂春秋為經自經解始而稱五經自漢武立五經博士始然秦宓言文翁遣相如東受七經是武帝以前稱經不止于五而宋李至之言七經則五經外請校二傳二禮孝經論語爾雅也劉敞七經小傳又舉詩書春秋三禮論語焉唐陸德眀釋文序録合孝經論語為九經開成中刋定九經于太學始及爾雅宋設國子助教十人掌十一經其易書詩三禮三傳皆分而孝經與論語合稱為十經又與孟子爾雅稱十三經此其大略也遭秦滅學周易孟子不在焚中而尚書古禮論語孝經賴孔氏後人藏於屋壁其老師宿儒田何伏勝浮邱伯申培髙堂生顔芝輩漢初猶在若楚王之受詩張蒼之傳左氏髙帝時經學漸已萌芽文帝詔鼂錯受尚書立孝經孟子于博士賈誼之傳訓故徐生之善為容韓生之內外傳經學寖廣洎孝武聼仲舒對䇿表章六經建藏書之䇿置寫書之官孔壁淹中科斗竹簡或上祕府或進河間自開獻書之路凡數十年而後萹什稍備上有雄才之英主下有好學之賢王故宜儒術蔚然復興也經文讐正始于河平刻石始于熹平鏤板始于長興至開寶端拱相繼校刋頒布遍山陬海澨矣漢儒授受確有源流博士之試以家法弟子之學以經師專門者氏而不名著録者編而為牒是以前後儒林之傳授受同異一展卷而瞭然即其解經章句如易有施孟梁邱書有歐陽大小夏侯韓詩有薛漢春秋有公榖論語有張禹包咸注如書大傳周官儀禮禮記有康成孟子有趙岐傳如易有周氏書有孔安國詩有后孫申韓毛公周官有馬融解如書有大小夏侯詩有伏湛景鸞左傳有服虔箋如毛詩有康成詁如周官有賈逵三禮有盧植左傳有陳元諸家不同之大致亦皆班班可考自唐作正義每經專用一家之説孔頴達于易用王弼韓康伯注于書用孔安國傳于詩用毛傳鄭箋于禮記用鄭注于春秋左傳用杜預集解賈公彥于儀禮周官用鄭注而徐彥疏公羊用何休學楊士勛疏榖梁用范寧集解宋邢昺疏孝經用唐眀皇注疏論語用何晏集解疏爾雅用郭璞注孫奭疏孟子用趙岐注而百家之學廢矣漢取人必曰經中博士蓋各守其師承唐則以正義為眀經之式為途已隘然以注疏字數多寡分别為大小中三禮三傳分而習之未嘗廢一自宋熙寧變法而春秋且廢矣自元延祐用八比取士有明因之于是詩書五經之外禮與春秋俱存一而廢二矣然則崇重經學固莫如漢世乎哉三易掌于太卜周禮明有可徴夏建寅而連山首艮殷建丑而歸藏首坤説者謂神農黃帝已先名之而周之名易則程朱之言當矣漢傳易者施讐孟喜梁邱賀並出田何京房本于焦贛四家皆立學官費直與髙氏易苐行民間後漢費易盛行四家漸廢尚書今文伏生所傳漢博士三家是也古文出于孔壁未列學官至東晉梅賾始奏行之詩則齊始轅固魯始申公韓始韓嬰皆立博士毛氏後出而後世獨行春秋則公羊先著榖梁次之左氏至東京始立博士漢初有鄒夾二家並三傳為五然鄒氏無師夾氏無書至建武中皆絶若鐸椒之鐸氏微虞卿之虞氏春秋其皆左傳之羽翼歟禮自髙堂生傳蕭奮孟卿后倉以至二戴所傳者儀禮也后倉之曲臺記儀禮之注解也二戴所刪亦儀禮之注解也若夫以禮記為小戴之書其誤始于隋志然漢志本自判然蓋即所謂記百三十萹七十子後學所記者劉向嘗校㝎之至東漢盛行馬融又補以月令明堂位樂記今禮記四十九萹是也李氏獻周官于獻王冬官獨缺獻王遍購不得因以考工記補之後人謂補自劉歆亦非也士禮十七萹髙堂生所傳者耳淹中古經五十六卷及隂陽明堂王史氏記多天子諸侯卿大夫之制是儀禮之逸者多矣今所傳如覲聘大射燕禮不為士設則十七篇疑亦非髙堂之舊不然漢志何以有古經及記猶愈倉等推士禮而致于天子之説乎論語齊二十二篇魯二十篇齊論名家則有王陽魯論名家最推張禹今所傳魯論也大學古本據禮記孝經古文出孔壁朱子則分為經傳焉爾雅十九篇疏謂釋詁周公所作釋言以下或謂孔子所增子夏所足叔孫通所益梁文所補訖無定論孟子于孝文時即立博士東京趙邠卿後注解見唐志有六家昌黎論孟子功不在禹下至論也馮休刪孟原無足道以司馬光之賢而作疑孟識見顧出陸筠虞允文下何哉大學中庸原在禮記而中庸别行自漢世即有中庸説矣至程朱以配論孟四書之名始立五經者羣籍之淵海四書者又五經之輪轅也兩間不易之常道于斯焉載是猶象緯之昭回山川之奠定矣我皇上治法唐虞道遡洙泗緯地經天觀人文以化成天下經學昌明炳炳烺烺振古未有倫比又何漢唐宋之足云皇清文頴卷十三
