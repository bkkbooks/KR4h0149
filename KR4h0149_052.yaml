  text: 欽定四庫全書皇清文頴卷五十二
  hash: sha256:0237a1b8ab1d058d136190e1439bd8482955d536626696f8a11f41d539e78ca8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_052-1a, image: WYG1449/WYG1449-0910c.png}
body:
  text: 詩樂府平滇鐃歌十章有序袁佑皇清丕膺天祚祖宗邁厥德肇造區夏我世祖章皇帝蕩蕩則天烈踰三后奄有滇疆至于三危罔不臣服皇帝聖冲踐位乃吏治之伏惟皇帝陛下執中廣運睿聖文武綏和庶邦臻於至理滇逆三桂作藩於斯罔承聖化部伍繁有徒匱竭天庾民罷財賦皇帝恤民依詔俾班師輯其徒旅民勞用息肩逆故昏凶輒干大刑賊我民人叛我疆域誘其類狂毒肆劫皇帝命出師錫鉞彰天討彤弓金節虎旅祁祁往必克我人如望雨皇帝曰咨天祖之威不敢弛火炎於崑焚厥玉子一人弗忍緩乃師許其自悔禍既弗悛帝赫斯怒祕略神斷秦閩粵東西湖湘湯湯蜀黔絶險悉以平逆桂隂伏誅其黨提其遺孽世璠走閉昆明我師合圍貝子臣章泰實總軍皇帝曰爾泰統我六師惟我文武卿士在軍張厥撻伐以袵席我赤子除凶務盡克有賞稽我師者罰弗宥朕承天祖子民夙夜祗懼爾徂征是力泰拜稽首受命進師破其城南關據高俯城中困獸弗敢突逆黨以矢射我軍乞降反戈攻世璠斃之僞將相並授首捷聞臣庶歡舞誕被萬國昆蟲草木靡弗向勞用昭對於郊廟天祖來歆雨雪惟時太皇太后皇太后樂豫壽愷家國天下時雍光被振古未有廷臣揚盛美僉上言議加尊號皇帝讓弗遑曰惟兹薄海方寧民困待蘇豫一人厪如傷發令施仁尚其懋勤弗怠皇敢自矜於惟聖德神武化協高厚雖堯舜蔑加焉史臣執簡宜效尚書大雅宣昭休問示於來茲臣愚弗勝乃為平滇之歌十章恭獻黼扆夫黑水三崇之山陶唐氏之荒域其水倒流曰滇故其地臣叛不恆自漢唐來代有僭據足徴已皇帝一麾平之六詔九隆革心悅服黑雉白雉來賔聖子哲孫永隸圖貢敻乎上哉臣謹稽首頓首以詠我皇帝昭清之駿烈聖同天第一章聖同天德誕修河洛瑞錫之疇統系承精一求垂藻火子方區臣民洽敷政優嘉禾出肉角遊及河嶽懷且柔狡逆命天所讐殱厥渠猶穿窬喜起賡擊壤謳永天眷萬億秋出師初第二章聖𠂻亦云勞儉玉食宵衣而朝憂吾民之憂民樂陶陶萬幾率作股肱有䕫臯不震動聲以色典學羅俊髦敷文舞兩階格有苗不忍遽誅緩師撫以招八年惡不悛天威用昭皇矣第三章皇矣文德赫武功削平巴蜀黔粵通桓桓大略運掌中賊衆潰北級如墉圍城退閉智力窮飛勑宵出甘泉宫霆發電掃徂三崇六師旄旍捲朔風賊臣倒戈誅元凶髳人濮人何喁喁椎結耕田樂年豐自西自南車書同於爍第四章於爍王師我皇匪黷武蒟醬邛竹那足求弄棟楪榆皇祖手闢之疆土賊臣竊據之焚溺我人寧不綏我士女赫赫禁旅我皇發縱得所一當十百況如雲雨我皇受祐于天廓清六合乃穆穆揮絃而御六合無一頑丕承我皇祖民畝第五章民畝稅不增軍實亦不寡我皇如神邁虞夏定紀經章風雅德彌盛威靡假勤逺制勝靖原野嗟爾孽險何為者恃險空設師如虎縹碧之雞金精之神馬我師相羊於其上我師鼓歌於其下昔夜郎第六章逆昔戍夜郎耗國糜糗糧羣黎膏與血飽飼豺與狼溪壑不可厭輸將亦孔傷我皇軫民物措施各有方師還民休息詎不均恩光賊夙懷異謀脅衆滋鴟張短狐何依附連雞何飛揚賴我聖人平遐荒萬方平第七章萬方平瀾滄濁水清冉駹白馬內附敢閉嶲昆明我師仗廟略立墉㸃蒼下瞰城炙鼠拔草食暴殄金銀寶玉昔何驕盈亂賊誅無赦舉宗就天刑身毒之國咸謂中朝有聖人朝有聖人蕩蕩葱嶺間貫胸交跡稽首胥來賔胥來賔我皇慈仁綿綿無期民質風俗醇內咸一德佐外皆慕義臣逆命禠其魄服威神普天之下莫敢不尊親於都第八章於都我皇之功虎臣﨣﨣戮力於疆場帝曰俞臣拜稽首我皇之廟謨臣其供奔走上之我皇皇不有維我兩宫大德至仁太皇之聖母我皇孝思悅聖母之心長生永壽告於天地嶽瀆皇祖式臨之神其默相左右我皇偃厥武福祿是受審天心第九章凡兹臣庶上當審天心彼冥不知畏僭於衡天大震雷以風雨淫淫雷震擊其梁棟折其楠天鑒有赫我皇德具備函載高深聲教訖朔南彼逆之徒空如林卒艾除之如獵短獸如弋禽青蛉㽛町之域我皇永照臨山石第十章山石何磐磐河有流波安瀾光被四極百爾彈其冠喤喤辟雍鼓鐘士翺翔於頖罔不歡我師樂室家韜弓脫馬鞍農夫橫經而耒蠲額除煩和風習習雨􅟎􅟎圜扉草青青徹其垣澤及蟲魚鳥獸般般濯濯來奔禮樂興靈畤嘉壇功德盛未有乃聖神武文攙槍落紛紛前星輝紫微端聖人有子重矞雲振振睿且哲我皇貽燕後昆億世海㝢乂安東巡雅十三章徐元文上帝臨鑒貺我皇清我皇秉聖三后遹成克諴九區交暢六英美哉皇度翼翼明明一章維歲甲子冬日載融皇時省方届於大東鸞輅震野芝旍翳空清濟漸車靈嶽望風二章峩峩靈嶽表鎮曰岱馳走百神苞并萬態陋彼升封虞柴是配登覽雲物欎何靄靄三章洪河泱漭長江蕩潏龍艦星移及吳之域惠彼小民湛我皇德還御六虬衮服是即四章陪尾之陽四源交瀉水哉水哉不舍晝夜皇過川上神契元化瞻望闕里僕臣趨駕五章麟蹤既邈鳯德何長教澤𢎞衍翊我聖皇萬乘至止夫子之鄉章縫迎路簮黻升堂六章於赫夫子濯濯厥靈肅將苾芬祀事孔明鬱鬯龍勺象彛犧尊八音克諧羣后駿奔七章寢宫䡾䡾夫子所憩皇陟於庭探索琴佩芳揚猗蘭青浮鐵檜見於羮墻其容有睟八章防阜之林百頃交隂異國珍産蔚為同岑文楷輪囷以杖以樽攬其叢蓍穆哉皇心九章穆哉皇心更御雕几爰命育圻秩爾孫子肆列俎筵進講以次遺經再展皇心燕喜十章皇錫育圻錦衣貂裘庭列曲蓋以饗春秋育圻稽首天子萬壽皇詔育圻保艾爾後十一章東野支封禽父是宗錫之冠帶以康周公兩聖作師文其在茲敦儒闡道千載一時十二章惟星則煌惟雲則爛聖藻光輝輝於天漢懋建有極登道之岸昭示萬邦如日斯旦十三章聖武雅三篇有序并上表陳廷敬伏見我皇上撫御萬方盡有四海內外恩德鴻龎聲教遐暨比年以來天下宴安而推溯武功所由戡定則誅三逆以平滇黔粵閩楚蜀外闢察哈爾臺灣倭囉斯喀爾喀之地幅員之廣超越前古治化之隆巍巍莫並今神謨獨斷聖武布昭伐罪救民躬行天討大憝授首餘黨歸誠厄魯特全國蕩平捷書至日雷動嵩呼中外臣士閭巷小民罔不歡欣忭慶蓋是時車駕親征馳驅戎壘凡三出朔塞矣當天𠂻决䇿初御六師中朝悚栗僚庶攀留臣以年力就衰䝉恩矜憐弗允扈從之請自是以來祗遵成命不敢再瀆天慈而違離聖顔日益䖍惕伏念皇上為天下掃除殘賊為邉疆永致廓清跋歷窮荒經涉寒暑勤勞軍務旰食宵興而臣子安居略無寸效今已無事言念國恩無所稱報猶欲俯竭愚誠撰擬文句敬揚聖烈傳之無窮而臣媕鄙無學尋繹纍日莫知所擇竊惟自古帝王有功於天下其名聲彰著於後世者方䇿之所紀載金石之所刋録聲詩之所流傳後之人攬其事而遐想其盛焉是以昭昭然若昨日事也然而其盛者亦不數數覯矣阪泉涿鹿以還古今稱善用兵者漢之高帝唐之太宗皆自興事之始乘時搆㑹底於成功若我皇上聖德而踐天位躬居大寶志切生民仁育羣倫義征不譓尊臨九重制勝萬里天威所至攻戰多方撲滅凶殘蕩掃巢窟宿寇遺孽一朝頓除伏卅載之逋誅樹九邉之壯觀殱其渠魁降其支黨燧烽永息亭堠不施曠古難平之部落盡為臣僕普天所有之土宇咸入版圖自此寰海清平兆民樂業集萬年之鴻慶成千古之大功臣仰窺聖烈俯稽往古漢祖唐宗起於側陋角一時之雄乘末流之敝雖精於兵事而我皇上文謨武烈聖德神功實逺邁前徽矣若夫書冊所載既有天下優游宫禁之中不過遣將興師身居其逸坐收其效即間有親征如宋藝祖之北伐明成祖之行邉宋則失利明則鮮功是以方䇿金石聲詩之文倣佛擬比可導揚盛美之萬一者蓋倣徨震掉而莫知所擇焉求之於詩惟周宣王身為天子南征北伐有定天下之功雖淮夷諸小敵未為甚難平之寇而玁狁之伐止於太原皆命臣士以行事蹟殊不類然其臣詠歌之詞孔子有取焉唐臣柳宗元本其義作唐雅臣於嚮者滇逆之平不度固陋竊取其義進平滇雅曾上塵聖覽今臣伏思後世鐃歌鼓吹之曲未足以盡聖武之形容仍依古體謹撰大駕三臨沙漠親平僭逆聖武雅三篇繕録以進臣之愚意固以敷宣人事之盛美而其義則歸本於天我皇上即天也覆載照臨雷霆風雨天之所以為道栽培傾覆治亂侮亡皇上之所以為功彼噶爾丹自外於覆載照臨之內干雷霆之誅絶風雨之澤蓋所謂逆天者亡也我皇上天威所臨賊始則沙場糜敗妻孥磔屠繼則衆叛親離孤雛就縛其卒也我皇上親揮將士迫抵賊巢賊知逆天必誅飲藥自殺遡始訖終我皇上馳驅萬里勞苦艱難若非親征大舉必不克迅致膚功此人事也即天也至若晴暘以時靈泉表異水草應候百神致祥旋師之先甘雨灑郊飲至之日雲隂開霽臣僚擁道恭迎都人父老孺子瓣香欣躍愷樂慶成臣推本於天之義由兹益自信焉臣不任榮幸歡忭之至惟天初臨沙漠安邉靖寇破敵大捷行慶於民振旅還京武功盛也惟天惟帝惟帝乃天盡天所覆我徼我邉何彼逆驁為我人患帝自伐之往取其殘一章衆曰至尊母勞萬乘我師武臣孰不恭命帝曰吁哉自昔弔民如水斯溺如火斯焚二章帝謂卿士朕必親往彼惡貫盈煽虐滋廣搗其腹心離其支黨安我荒服除彼狙獷三章諏春吉日是類是宜聖謨先定叶於神祗既攻我車既秣我馬峙我糇糧於塞之下四章六龍遄飛關雲四開師行如山如霆如雷蠲租已賦民有慶哉屬國歡呀天子自來五章茫茫荒磧伐薪孔遐濕烟不㸑萬竈以譁我軍之行晴空洋洋雨師避道宜暘而暘六章帝減尚食哺我士飢飲我士渴朝斯暮斯野曠無水何以為糜玉鞭所指靈泉瀰瀰七章無人之鄉絶轡之野五日窮追賊衆解瓦彼狂何知游魂暫假不謂帝來初猶笑啞八章寇昏以驚聞帝自將獸窮突奔心膽墮喪軍扼於途大殱巨創瀚海塵揚天山簸蕩九章築顱於邱波血於河九州百蠻為鑒孔多燕然之山蒼崖嵯峩伐石紀功萬載不磨十章都人黃耉扶携來迎鐃吹所歌告武之成桑麻在郊民熙以耕戎衣一著四海永清十一章惟天十有一章章八句皇矣再臨沙漠相機宜撫降人安兵民武功再盛也皇矣聖功邊氓孔安惟帝念兹冀即於完自我來歸由暑迄寒旅師在野雨雪其漫一章天初生民豈擇莠良帝德好生并包八荒從化者存不龔者亡汝尚能來無或汝戕二章汝家糜矣汝徒婺矣羈孤單棲云何嬉矣汝尚能來食之衣之天無不幬地無不持三章怙終者誅國有明紀彼頑不悛盜我儲峙師進逐之原野萬里皆我職方何奔何止四章皇命於廷是礪是攻拔本塞亂惟義之中朕不親往邊人㷀㷀我怙我恃豈憚征行五章朔風蕭蕭捲我斾旓翠華載臨儼涉我郊藩落老稚簞壺以勞帝來撫我於險於遙六章或擁道周或控馬首帝顔霽溫下拊以手如燠如春恩語勤厚坐使來前薄饗其有七章言幸師營言迫賊壘烜赫天聲賊黨破徙其降如歸其趨如市來者既多惟恐後至八章帝待降人曰彼大辜汝則何罪罹彼毒荼致汝於鋒致汝于屠其來汝拔爰止爰居九章帝謂降人我黎我赤草枯于原氷堅于磧藹藹陽和于疆于陌盡降其人大醜斯獲十章我士我旅歲其云遷帝念我人言歸言旋凱聲載路士女闐闐帝威帝德振古無前十一章皇矣十有一章章八句武成三臨沙漠禽其孽子殱其渠凶餘黨歸命武功大成也武成自初三援天戈惟皇之命神人以和長彼蟊螟奈此嘉禾既化其類胥顛其窠一章載祓載嚴式張我武雲旗飄翩日繞熊虎風飈烈烈揚於金鼓旅矢朱弓不殊干羽二章皇眷西土我理我疆於關於塞於邊之墻於隴於畝於河之陽下民何幸近天子光三章皇撫吾民以覆以載是幸是臨恩逾汪濊帝來人歡帝行人思六師所過言錫我釐四章帝行天中如日正車咨遣兩師以翼漠沙尅日並進毋謂逺遐角之犄之天威所加五章爰陟爰止狼居胥山四顧藩部於川於原皆我在宥矜兹彈丸如毒斯螫如爪斯搴六章彼梟日蹙孤雛棲棲我禽獮之檻致於畿人之無良不保妻子惟汝之為求禍自爾七章我師日進言迫其巢卵傾翼折梟困以嘷臘斯焚斯不復逺跳乃如之賊為戒兹昭八章戮尸於軍傳首于邊變容栗股孰敢不䖍皇赫斯怒逺人所觀如礪如帶如石之磐九章載馳載旋言歸凱樂於以慶成於郊於廟載沛德音四方是告帝開明堂萬邦畢照十章惟天同符以清以寧自此無事泰階永平惟帝之功與天無極斯歲斯年於萬於億十一章武成十有一章章八句皇清文頴卷五十二
