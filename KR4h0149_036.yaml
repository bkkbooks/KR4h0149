body:
  text: 頌南廵治河布徳施恩頌有序王鴻緒臣聞聖王之勤民也徳隆而敎備仁周而恩洽動必規成乎百世澤必普氾乎羣黎故常循行以牧人損上以益下雖治臻隆盛而不敢自逸豫其身蓋懼逺近不同化民患未盡除則無以慰下土而答蒼穹也此其道備具於皇古載籍之傳矣易曰先王省方觀民詩曰允猶翕河敷天之下裒時之對又曰時邁其邦懐柔百神及河喬嶽禮曰王者必廵狩尊天重民也他若虞書羙肆覲之典春秋著展義之文疇違斯㫖而克治疇循其實而弗昌矧詣崇於神聖功冠於三五者其勞厥躬而恵元元又何能一日巳哉欽惟我皇上符秉乾坤光昭日月羣生並育不譓胥平協氣旁流威靈震疊諸夏同軌百蠻奉琛醇膏所濡上暢九垓下彌八極固己合宇宙於太和㒺一夫之弗獲矣而聖心咨警治益圗治念山海雖咸歸命遐邇雖盡蒙庥顧此洪河頻年衝決淮揚州縣昏墊為虞非峻加疏塞底績曷奏況東南乃財賦要區運道為國儲攸繋平治不早厥患滋深特是排瀹之方隄防之術緩急疾徐宣蓄髙下孰宜棄險而就易孰宜斟今而酌古所司顧茫乎其未有得也用是南國臣庶無不延頸舉踵企望翠華之一出而聖天子早皇然計曰予其敢憚勞弗恵濟此一方民又以宮庭孝養晨昏靡間今時際昇平奉迓慈幃觀覽謡俗省方設敎之中即寓錫類𢎞慈之道因敦請皇太后鑾輿偕幸中外臣工益踴躍懽忭而睿慮周詳惟恐供億孔繁驚動閭左肆頒帑金備飭儲偫至扈従之贈遺則有禁軍士之繹騷則有禁是以六飛屆臨工不改市農不輟耰黄童白叟夾道歡迎以仰瞻乎聖顔既駕涖河干詳審黄淮之強弱江海之蓄洩水維之出入隄岸之髙低疏以導其源塞以節其流數千百里湍悍情形一一指示河臣無不契叶神機識參天表仿之大禹随山刋木距海決川千古並茂彼沉馬束楗築宫宣房曽何足云行見川后効靈安瀾永慶億萬烝黎共享平成之福聖天子廵省所賜徳至渥矣乃猶軫念窮簷疾苦大沛仁恩留漕粟以賑饑蠲正供以恤澇除逋責以寛催科豁羨餘以紓行旅減鹺課以裕經商詔㫖一下動以數百萬計更若赦罪囚止訐告免詿誤賫軍役徳音肆被靡不受獲洋溢汪濊莫可涯涘當斯之時三吳兩浙聞風景従垂紱韋布之士戴笠秉耒之夫焚香頂祝絡繹者千萬衆翕然雲集日環請於行宮曰大聖人奚為後我於是俯順輿情博求幽隐循淮甸而下䢴水邁鐵甕而止金閶施恵錫祉殆無虚晷及遵武林復大頒渙汗蠲租肆眚鴻慈渥膏一與江南等洎廻玉輅言臨建業施恩無稍異同而躬祀明代寝園褒揚徃烈昭示萬禩尤彰至聖偉度若夫恤鰥寡存孤獨禮髙年蒸髦俊廣泮林士額奨岳牧吏治厚文武賚予優搢紳體貌雲漢奎章炳耀天地自大僚一命士農工賈以及爪牙介胄巖棲谷飲之徒莫不霑仁而蒙澤含和而飫醇然曽無寸絲粒粟下擾夫閭里為也是以鑾音既止凡兹兆姓又惟恐遄發必叩頭籲留至數十次不可己每於名山勝水相率羅列野芹致其愛戴而皇上則親奉慈聖從容流覽㒺辭玉趾䖍侍琱輿承愉婉悦豫之情備視膳問安之莭億兆同聲頌揚純孝稽諸古帝盖何能絜盛哉夫愛敬廣敎至徳也灑沈澹災聖績也發倉己責渥恵也赦過宥罪隆仁也圖書煥爛天哲也一時廵而萬善備焉雖六經所紀何以侈兹臣生長南邦濫塵禁地感激湛恩遍敷桑梓不獲偕吳中父老獻曝輸誠謹稽首頓首撰南廵治河布徳施恩頌聊攄下悃但學淺才蕪不足鋪揚盛治萬分之一濡毫伸紙曷任悚惶其辭曰皇矣聖清恵綏萬國侯甸要荒偕臻禔福惟兹洪河自古為害南徙挟淮金隄輙敗嗟嗟淮民魚鼈其隣誰能奠乂企我聖神天子曰嘻禹乗四載朕豈憚勞而諉不逮時其邁哉慈闈曷省親奉岳廵朝野胥幸預勅儲偫勿煩民力簞食壺漿懽迎清蹕皇涖淮浦荒度土功滔滔二瀆障之使東舉鍤如雲束薪如阜璧馬不沈永塞決口敷治聿竣恩普徳洋我農我士我工我商逋則弛責饑則泛粟𣙜既減徴鹺復寛督一時賦稅蠲貸孔多追呼弗事膏雨滂沱帝尤好生載矜罪人𢎞開湯網俾得自新更念羣吏或勞撫字過誤悉貰車服是畀青青子衿峩峩搢紳户㧞其良家錫之珍耆齡大耋繄惟人瑞扶杖来觀咸答厥意亘古至寳莫如天章龍圗丕賚日月同光言瞻鍾山明陵斯在躬祀加葺徳崇三代計駕之南自齊而吳自吳而越和風順艫每逢佳勝肆展御筵恪侍聖母觴舉萬年小民有言惟天子孝愛敬備至示我以敎小民又言惟天子智導河乂淮貽我以利小民又言惟天子仁寛租減徭恤我之貧小民又言惟天子聖寧失不經宥我之命猗歟斯廵疇不被徳仰祝聖夀時萬時億皇帝省方聖政頌有序王九齡皇上御極之三十八載三靈協八風平瑞英生階扶桑獻賮鳴琴響徹於松雲擊壤歌騰於衢路沕穆追上古膏澤流遐裔矞雲映日榮光燭天時則勾芒佐令之辰太簇驗灰之候我皇乃啟青陽之左个臨紫極之中垣設獸樽以進嘉謨懸象魏而頒新歴羣公卿士百寮庶尹暨甸侯綏要牧伯連帥執圭瑞而朝正叙彤墀而肅拜登五方風俗之書上比閭歌咏之章我皇乃顧而咨曰斯民樂乎勞來匡直輯寧咻噢匪特爾諸臣之責顧予一人其烏容自逸惟是舉行虞廵之典以錫嘉祉於億兆人兹當首春布和農夫紅女望澤滋甚禮官其諏吉辰建南轅車騎鹵簿毋絡繹焜燿使百姓咸知天子勤民事而出之意乗輿将發復申諭誥誡所厯郡邑毋以供億為民累餱糧嚢槖咸自飭庀從官郎吏毋取民間寸絲粒粟以干罪戾於是青徐齊魯江淮吳越之民跂首舉踵承休下風知大恵之必及己也翠盖啟塗鉤陳翼衛星行雷動陟於濟岱之間緬賜履之雄風覽海邦之沃野恩先雨浃澤與春融蠲来嵗之正供惬樂郊之上願車輪電騖馬首駢闐提筐扶杖之倫載筆執殳之士趾相錯肩相摩也六飛所經汶泗澄波七萃前驅黄淮抑浪河宗獻斗淵客捧珠沈璧無虞浮桑息患我皇乃釃酒渡江省方陟館姑蘇臺畔載啟帷宫靈鷲峰前爰開帳殿因臻鏡水遂憩稽山謁拜禹陵聿酬明徳駐蹕不踰信宿還轅廣沛恩膏東南都㑹之區江浙綺靡之地財賦甲於天下雨露先於八埏田租鉅萬悉賜蠲除此聖徳之恵黎庶也菁莪棫樸廣闢網羅此聖徳之渥於庠序也飭闗市之禁而近悦逺来此聖徳之施於商旅也𢎞肆赦之仁而泣囚解網此聖徳之遍於囹圄也細過勿䋲長官捐一眚之愆寸長必録亷吏被異等之擢賤役蒙恩卒徒挟纊蹟逺邁乎漢唐事逈超夫三五至如同律度而定權衡觀民風而察好惡合符前典式示来兹史不勝書羙難殫述所以綯簷忭舞蔀屋懽呼萬户焚香千村結綺吳歈越吟齊謳魯頌貫珠纍纍相繼不絶而我皇乃御龍艑登鳯䑵沿隄飫聴而従容歸格矣夫生極盛之時際難逢之㑹小臣何幸備員簪筆而不克揄揚盛烈鼓吹休明㣲忱之所不能抑大義之所不敢安也遂拜手稽首而獻頌曰青律初頒皇情逺暢日麗彤墀霞蒸彩仗九重暇豫茂舉時廵和鸞應節芳甸生春雲轉堯階風馳禹域吳㑹承流東南仰澤首春諏吉前驅啟行臣工蹌濟父老歡迎道濟踰汶望洋挹岱駐蹕恩光賜租徳沛青齊蒼赤鄒魯文儒桑麻徧野謳謡載塗浩蕩皇仁深逾溟渤沃土流膏如川之溢淮淝春漲合𣲖洪河地當楚尾聲接齊歌竹下淇園隄連瓠子昔障中州今通南紀我皇涖止河伯懐柔搴茭不患沉璧奚憂月皎廣陵風和京口龍舸分花霓旌拂栁山青鍾阜草緑姑蘇雲帆江國綺陌吳都綾選異文香搜百和設案標閭拜迎鑾輅吳山在望鏡水遥通書名越絶碑傳禹功江左浙西繡圻接逓詩禮風同閭閻俗異㑹稽竹箭句踐山川傾都老稚望幸争先五玉諸侯紛紛輯瑞儀度章程權衡甬盖較量畫一俾民永遵遂頒異典特布恩綸南界甌閩北通淮泗日沐洪波星馳詔諭法網悉解逋賦咸蠲闗無停旅庠無遏賢宥過以寛官方自飭録功示厚軍心胥恱輿臺賤𨽻恵必均霑工師小民恩必盡漸甘露之濡浃於肌骨於萬斯年爾畋爾宅我皇樂只整斾言旋歡呼頌禱聲溢江天旄纛輝煌樓船燦爛手叶舜琴耳聴夏諺小臣拜手敬頌皇仁揄揚鴻烈敢後崔駰聖徳十頌有序徐潮恭惟我皇上秉至仁御宇宙上勅天命下求民莫徳嫓唐虞功髙三代外王内聖之傳䋲武貽謀之事㒺弗統㑹一身兼羙盡善用是樹無前莫外之績創重熙累洽之基逺邇乂安民物康阜功業之盛記注具存行且著為典謨垂為訓誥炳炳麟麟羙不勝載臣竊臚其大者撰為十頌一曰敬天二曰法祖三曰孝養四曰道統五曰典學六曰勤政七曰知人八曰安民九曰武功十曰謙徳雖管窺蠡測無當髙深然皇上單心寔政布在見聞歴觀前代之主得一二端己稱令辟况兼斯衆羙者乎謹對揚休命敷陳盛羙用以光昭海㝢宣示来兹廼作頌曰天維顯思聖志與通曰明曰旦夙夜禔躬郊雩祈榖有典必恭珪璜琮璧肸蠁豐融聿懐多福昭事攸崇天人合徳格彼蒼穹其一創業維艱守成匪易以守兼創實殷睿慮垂精遊神儲思積意絣揚懿鑠善述善繼述之維何偕時匡濟繼之維何貽謀永世其二長樂慈夀漢宋令式詎如我皇祗承靡忒尊飬兩宮孝思維則萬國歡心以報㒺極如岡如陵如松如栢配地無疆萬年愉懌其三大成至聖覺蒙啟愚自漢迄明祀亦有儀我皇重道振古良希作君作師功儷徳齊敦崇殊禮世敎是維心傳永接相悦以怡其四執中肇啟精一以傳緝熙安止就将仔肩卓哉聖學啟後承先泝源涉流深極幾研無微不闡有奥必宣斯道重光如日中天其五易首自強書稱無逸一日萬幾兢兢翼翼奏對以時羣工翕集問答從容纎微洞悉惟幾惟康有因有革自昔憂勤其何能匹其六九徳載采陳自虞廷立賢無方道在知人帝聰昭朗燭靡遁情惟鑑斯明惟衡斯平䋲材制器因物賦形曷以擬之大造鴻鈞其七民有痌瘝謂天盖髙我皇省方不憚躬勞懲苛滌煩蠲賦輕徭風俗以正積貯以饒延頸跂踵竚軨望旄侯不邁止孕育甄陶其八三逆釀禍各峙一方尾大蘖芽飬癰慮長嗟此赤子胡獨罹殃爰赫斯怒命我戎行雷烈電熛燼滅影蔵維揚我武永奠無疆其九聖神文武史頌放勲漢唐之季尊號以興惟彼中主亦受羙稱我皇巍巍功徳莫京辭讓再三乾惕靡寜卓犖萬古視此儀型其十南廵頌有序李振裕欽惟我皇上仁育萬邦恵周庶類好生之徳同符大造明刑弼敎詳慎協中每嵗廷訊奏請上必親覧讞詞務宏欽恤寛重僇以五流議輕典於八辟簡孚敬忌刑期無刑膏澤被圜扉休嘉協區宇姦猾感恩而悔過善良畏法以檢身俗易風移四方従欲慈祥惻怛淪肌浹髄視天下有一夫之不獲不啻痌瘝之在身也廼者黄河泛溢下民其咨皇上念事體重大非河臣所能勝任自甲子親閲己已再臨指授濬築機宜兩河漸次就乂兹因霖潦沮洳重軫聖懐爰命車駕三廵南邦荒度土功拯此昏墊念切慈闈定省躬奉皇太后鑾輅以行侍膳扶輿㒺間晨夕所在恤民隐覈吏治比由齊魯抵淮揚循察河形相度水勢睿慮周悉興利弭災式垂永久又因吳越父老望幸諄切遂下金閶逹武林經歴之區善政畢舉賙艱賑乏蠲租減稅奨吏育士寛商賚兵恩波被於里閭謳吟徧於衢路而臣振裕以庸愚無似承乏秋官康熙三十八年三月恭接十三日上諭山東江南兩省罪犯除厯赦不宥外概予寛釋續捧接上諭浙省罪犯寛釋如之臣伏讀徳音遵行惟謹仰頌皇上如天之仁煦嫗含覆至於如此踴躍懽忭莫可名言甘露霖雨有時而竭陽春恵風有時而止惟太和之元氣鼓籥於層霄薫蒸於庶彚流行於終古亭育於兩間感之即通觸之即應昆蚑由此蠕動草木由此萌芽幽蟄由此發舒槁枯由此滋潤易曰天地之大徳曰生惟天大生惟地廣生惟聖人好生天不能無雷霆而常以長養為事地不能無險阻而常以持載為功帝王不能無威刑而常以哀矜寛恕加恵民生所謂贊化育而參天地者此也我皇上心天地之心事天地之事至誠以育物尚徳而緩刑六飛所臨渙汗立沛以觀之省方觀民為解之赦過宥罪知明意羙恩溥徳洋騶虞麟趾之風藹然溢於天綍臣奉宣詔諭不特為三省黎民慶幸更生得遊浩蕩實以見九圍八表逖聴風聲易面革心風流篤厚熙熙皥皥沐浴聖慈行且賞懸而不用罰設而不試三五以来未有臻斯盛治者也爰拜手稽首恭撰南廵頌一篇仰塵睿覽我皇上行慶施恵羙不勝書僅舉恩赦一事鋪張揚厲以誌臣職分所繫少竭悃忱云爾頌曰皇帝御宇鴻仁普施矜此下民法網易罹平反寛恤矜釋罪疑豈弟慈恵漸被海涯武定邊塞文恬區夏萬物熙熙無天閼者士歡於朝民忭於野睿慮淵冲在宥天下吳楚之交黄淮合流洪波撼堤昏墊是憂帝眷南顧載咨載籌玉輿三廵俾民有鳩龍旂賁臨恩澤布濩發粟賜金蠲租減賦自天降福澍雨膏露雨露之濡如咻如噢羣黎百姓環擁屬車争獻壺簞載其耘鋤我田我井我室我閭惟帝仁覆有蓄有儲帝曰念哉嘉我善良葵藿之傾煦以太陽人惟雜糅嗟彼愚狂草芽未萌其忍折傷爰自齊魯洎於吳越三省黎元有麗明罰罪宜懲創情足矜恤畫地為獄宥之而出寛大之詔發自行宫五刑有赦孰敢怙終帝徳好生上格昊穹翾飛末族游浩蕩中臣忝理官職惟虞士拜捧詔書雀躍鳬喜大號其渙日四百里祥風披拂枯槁立起皇帝大聖平刑惟寛沛我仁恩易彼貪殘囘心嚮道禁網弗干室家以寜耕鑿以安碧草芊芊長自圜土黄雲翳翳䕃於幽圄刑措不用治叶三古含哺康衢夜勿閉户重華之代喜起盈朝颺言賡歌獨在臯陶臣愧菲才謬長秋曹敬獻蕪詞用佐風謡南廵頌有序查昇我皇上御㝢之三十有八年嵗在屠維支逢單閼三辰朗曜河呈刻玉之祥四瀆安瀾谷獻膺圗之瑞芒芒禹甸盡沐仁風蕩蕩堯天俱遊化日昨者琱戈靖亂滇南之妖眚全消邇時龍馬廵邉漠北之祲氛盡掃莫不成之宸算斷自廟謨乃猶念切痌瘝思深宵旰十千偶匱即行賜賑之條大有頻書猶下蠲租之詔固巳陽和遍地有物皆春膏雨瀰空無方不潤者矣乃者治益求治安愈圗安民胥樂矣帝視如傷巷且歌兮皇心更切謂夫窮桑南去水以激而彌雄酸棗東来河就庳而益駛内府之金錢百萬不惜經營子來之力役三年嗟其况瘁皇上神功廣運解澤𢎞敷相地勢而合宜順天時以乗利隆兹委寄簡厥賢能不憚一日之勞用成萬年之逸然而或原或隰必經睿慮以加詳若決若排須俟聖裁而乃定爰是九重側席未暇安居萬乗首途還思求莫春氷始泮便勅登舟曉漲纔添遂令駕艇而且長聆懿訓敬奉慈宫己知六合為家宜以萬方為養金根既駕入輦道以扶輪玉食方調進行宫而視膳爰是金鐃殷地風和青雀之艭繡䍐摩空日麗黄龍之舳揚舲濟瀨轉柁淄川洑流出地盡是恩波岳色興雲無非仁澤蟻行而拜爵躍而迎總總林林熙熙攘攘皇帝乃舍艛艓駕龍驪歴覽河干周咨水道斯時也靈鼉應瑞妖鰐潛形雲物清明湍流淡沲於是親加相度躬自廵行按輿志以周詳進河臣而告誡共知禹鑿式睹成功陋彼漢祠徒循故事猶以地當水潦民困凶荒撤己貢之天儲足未周之民食當年齊地寧藉發棠此日長孺無須矯詔千家歡笑咸為我后所遺萬户飽騰皆拜君王之賜若夫地隣甓社路出秦郵舟楫則排如雁齒闠闤則比若魚鱗然而鳳舸經行橋上依然成市龍旗所駐津頭不禁維舟謂此邦之商販恒多計所入之羨餘不少減其半額俾得均霑推彼地方視兹成例由是揚帆而下毘陵當川澤之喉擊汰而南茂苑實梯航之㑹摩肩而望似百水之朝宗翹足而瞻若嘉苖之兾雨帝乃慰兹輿願擴此殊恩擁畫楫以遄飛撥蘭橈而徑渡攔街父老刻玉為鳩塞巷兒童裁筠作騎齊上萬年之頌争傳三祝之詞由是吳雲入越地即錢塘魯柝聞邾山名葛嶺謂聖人豈甞後我幸百姓復得見天纔㸔鷁彩歡欲成雷乍聴鸞聲觀仍如堵帝心悦豫許為遲留經信宿而方還沛絲綸而未己恩無不逮徳豈勝書若夫山澤設税闗市有司自昔而然於今不廢特命計臣概行議減由是津梁估舶譏察無苛水市茶舲緡錢不費長年共樂商旅咸歌至乃紫泥沛澤丹筆矜辜一開湯網盡屬良民初定虞刑即宣司刺以至體恤民依激揚吏治雙鈎森灑黄帕擎來八法精嚴金函捧下封疆大吏歌湛露以増榮林壑舊臣浥卿雲而起舞而且求賢詔下籲俊門開廣收竹箭之良聿起菁莪之化聖恩洋溢盛典光昭臣謹稽之徃牒攷厥曩編見夫廵河浮洛首行時邁之文泰畤汾隂僅紀遊觀之羙皇上道光前聖徳冠百王渙澤流於八紘巽風布於四極為生民以来所未有實千載一時之創聞臣賦質庸樗備員翰苑揄揚聖治才媿馬班鼓吹鴻庥時逢堯舜望帝車之南指未随扈蹕之塵瞻日馭之北旋敬獻迎鑾之頌頌曰皇馭九有奕世丕光祥徴玉紐瑞映珠嚢慶雲誕敷恵風遐暢南通朱垠北届幽壌三江既道四宅攸寧坤維奠位河伯效靈湯湯洪河其流東瀉電激井墟雷轟斗野膴膴淮甸地形則窪或決其防害及桑麻皇心惻然下土是恤命官徃釐乃董厥職乃瀹乃疏乃塞其衝乃濬其淤乃計其功乃寛其期乃考其績勿惜一勞期於永逸皇曰念哉是誠在余孰忍赤子而勿寧居乃駕龍船乃乗鳳舸一水津門開帆轉柁皇念慈聖有瘁其容爰請於宮萬福攸同至仁愛物大孝尊親一人錫類四海儀型乃敕羽林勿驚巷陌男不輟耕女不輟織載廵載歴於濟於淮爰諮爰度克明克諧皇謂河臣其體余志勿疾勿徐用畢乃事嵗有漕粟截其萬庾藏之民間為畢嵗儲昔時淮民水患是急孰拯其溺惟皇之徳昔時淮民杼軸其空孰賑其窮惟皇之功屹屹吳㑹百雉䯱髵壺漿道迎望共雲霓皇誡左右勿辟勿除歡聲動天聖顔藹如既莅吳郊復臨越地吳民于于越民跂跂皇曰徃哉余勿爾遺於陌於阡老扶幼携穆穆我皇胞與一切如日斯温如雨斯澤賦有常額天家是輸疇實貧窶積此宿逋皇恤兆民恩言屢下徳音既孚謳歌遍野逐末者商惡其専利今昔相仍什一其稅皇曰寛之物力孔艱量減其徴通其貿遷孰為守臣善率厥屬皇心用嘉便蕃優渥宸章載錫鳯翥鸞停臣拜稽手罔不敬承皇之賚恩實勵百司各敬爾位育我嘉師蕩蕩祥刑明允是鞠孰為敗類以干罪戮皇曰欽哉上帝好生釋彼前愆俾得自新皇亦有言咨爾髦士天之生材為國任使爰廣其途爰闢其門菁莪棫樸江漢懐恩穆穆我皇靡澤不逮保合太和瀰淪無外百靈咸貺八風載宣我皇作則億萬斯年豐澤園御試紀恩頌有序湯右曽臣聞郅隆之世爰啟賡歌明穆之朝時形雅頌是以絲綸宻勿之寄出自中宸文章翰墨之司傳於前古黼黻鴻業歌詠太平列侍従之清班與樞機之華選親承顧問班固之讀書禁中引論古今世南之更直殿裏曲江亭上甲乙第夫羣僚積翠池邊賦詠専乎一事以至詞傾蘭葉凉入薫風不乏清芬原多麗藻近臣後苑之應制傳於興國之年奉詔賞花而賦詩紀自雍熙之代殿開澄碧裁逸韻於直廬園啟玉津叶清文於湑露出則抽毫豹尾入則簮筆螭頭此皆西清東壁之羙譚用為鳳沼鸞坡之勝事欽惟我皇上乾健乗符離明御厯研絶學於衍圗訪範率土光華燦高文於日麗星陳敷天照耀慕詩書而鼓篋逺及占風候月之鄉被聲敎以歸琛遐覃烏弋黄支之國盖聖神之化遍萬邦而禮樂之風同六合矣又復琅函緗帙象架牙籖瑶席啟夫經筵細旃開於講幄毎隆異數先被儒臣比者復命分班入承内直晴開碧落獲聮佩以同趨地迥丹霄許含毫而遂上近依黼座惟虬漏之時聞親奉御床覺龍香之欲染天顔惟穆睿語加温地接鋪金宴分饌玉真屬遭逢之殊遇己為臣子之至榮乃九重復頒屢下之恩俾一時頻沐非常之典火雲徂暑節還長養於南訛歩輦迎凉詔許遊從於西苑於時晨曦初映瀼露未晞環流而萬派瀠洄繞樹而千章蓊鬰乍移鳳舸如秋汎於綘河遥漾龍池恍天連夫瑶島鳬雛鶴子唼喋於波光雲影之間荇葉菱絲浮沉於荻浦蓮塘之上遂攀桂廡遥陟芝房蘭窓啟而影入重巒蘿幌開而晴浮細靄踈兮苑栁拂繡栱以揺風宻䕃宮槐傍雕櫳而翳日傳玉音於霞表澤自中宣頒珍膳於雲邊恩流下漙於是逶迤複榭周厯重軒以至乎豐澤之園則皇上重農勤民之所而刈禾觀稼之地也低連曲閣逺架孤亭匪琢匪雕識茅茨之儉徳載芟載柞詢錢鎛之土風滋春雨以移秧翠苕擢頴及秋風而結實金鏤垂芒瞻覆隴之青青儼連阡之薿薿既播嘉榖還樹柔桑宻葉蠶宮濃隂繭館田家場圃相錯於蓬山瀛海之中鄉遂溝塍忽移於紫禁黄扉之内良以寒耕暑織常軫恤於皇情所由黛耜青裳並駢羅於帝苑至矣哉豳風之序時物無逸之陳艱難莫得而名矣遂乃縈紆遶檻迢逓周廊雲棟棲光璿流颺影丹蓂翠萐悉是靈株紫脫黄麰無非仙頴冐霜停雪挺琅玕之數尋待月含風舞篔簹之萬个潤金莖之露更益清隂溉玉泉之波彌添翠色於焉或倚嘉樹或傍清池捧香案之篇題給尚方之筆札辨理學而分真偽得修身蒞事之大原被潤澤而普豐亨識政本民天之至意又復象樽載錫法酒頻傾味飫㫖嘉筵陳羞錯蒙湛恩之汪濊被厚澤以霑濡臣未悉詞條空慚藝圃幸際文明之世思繙羣籍以報國恩濫充紀載之班尚媿諸生之試家法欣逢曠典敢獻蕪章謹拜手稽首而獻頌曰聖人御宇久道化成府修事和禮備樂明文恬九服光被八紘瓊章寳字戛拊咸英倬彼雲漢萬物永貞維兹侍従首被輝榮瀛臺之西波涵丹極闢地省農殷是稼穡惟民所重在衣與食惟帝所勤務耕與織史書大有萬世法式仁溥堯年儉崇禹徳欒櫨楶梲匪曰雕鐫清池滉瀁修竹㛹娟爰給隃糜爰授雲牋肴分神鼎膳撤瓊筵三爵油油君恩聿宣報稱無地寵渥自天膺兹殊典永戴高厚棫樸作人或薪或槱朱草生階靈芝産牖醴泉出源嘉禾被畝神功聖徳伊古未有於萬斯年以頌我后嘉禾頌有序宋敏求嵗次涒灘時當清灝凉風被野碧飄金井之梧玉露横空丹挹銀蟾之桂佐蓐收而執矩萬寳薦釐擊土鼓以歌豳百華升瑞乃當宁繪屏於無逸宵旰彤廷且乗輿命駕以忘勞廵行紫塞義歸柔逺豈比長楊五柞之遊典重省方寧羡在鎬横汾之燕翠華過處箕伯清塵緹幕移来屏翳灑道睠彼繡壤特産嘉禾擢穎菁葱上䕃五雲之麗抽芽灼爍旁霑三露之滋碧透玲瓏斡大鈞之巧運紅翻䆉稏鍾造化之神功珠實敷榮異穂彷合歡之樹玉芒煥彩同莖如連理之枝盖八極為家一稃表應而兩儀在握雙米呈符猗歟聖世之休徵允矣清明之上瑞懽呼比户翕萬姓之聚觀踴躍周行望六龍而拜獻爰傳天語馳示廷僚捧出鳳樓髙綴連珠之色徧觀鵷侶争披三秀之英紫頴紛敷發霞光於瑶砌黄雲滿握映藻彩於璇題謂仁卉升華事不妨於徴信即彤編誌瑞道無取乎侈揚迓滋至之天休仍巍巍而不與瞻撝謙之帝徳益蕩蕩以無名臣才愧雕蟲識同窺管垂紳瑣闥欣分玉粒之膏委佩花磚喜睹金精之采粤惟方策代有傳聞稽疏仡之遺編靈開炎帝溯放勲之軼事瑞錫神堯異秀同條長發流徽於姒籙三苖一穂思文誌慶於姬圗此皆世逺年湮未免疑多信寡洎於漢生廣殿晉得華林固始濟陽合頴常書於史牒醴湖新蔡九莖數見於方輿徴祥雖厯代同稱紀瑞實熙朝獨盛陸離斗綴光分天漢之星錯落珠瑩秀奪閬風之樹胚胎元化孕結靈根肖六合之同心驗三才之一氣是固離治渙方升之照萬彚咸豐泰階臨既濟之期百昌益萃仁耕義耨涵化育於心田坤轉乾旋發休嘉於徳産者也臣謹拜手稽首而獻頌曰於皇我皇登三軼五立我烝民受天之祜闓澤覃敷湛恩汪布懐柔神人緝熙純嘏金商淅淅瑞露瀼瀼乃駕六龍乃廵朔方塵清玉塞日麗周行謡衢擊壤忭舞趨蹌無髙不播無平不殖眷彼良禾厥種非一青甲敷兮紫芒耀色有芑浮白有􅚂薦赤中産嘉榖異穂同莖二氣之華五行之精百昌之最九土之靈承榮輦路熠燿其英父老擷之獻於天子天子視之為民色喜謂是尋常弗居盛羙仰惟至徳益光國史粤若稽古代重嘉祥景星慶雲騶虞鳳凰旅獒越雉寳鼎芝房物華人瑞方䇿鋪張孰若斯禾治理根本可薦馨香可登倉廩驗氣呈和占年表稔屈軼徒竒蓂莢莫並金莖合秀瓊蕊分披以彰聖治無偏無陂以徵聖化海航山梯天子萬年福禄永綏臨雍禮成頌有序張廷玉欽惟我皇上以天亶之姿懋日新之學興道致治文敎覃敷東西朔南㒺不暨訖乾隆三年春三月甲寅躬行視學之典釋奠於先師先日致齋百禮咸秩大昕鼓衆環集於橋門皇帝整法駕従百官言詣辟廱自大成門降輦而入升階就位儼恪有加奠獻既行乃御彜倫堂命儒臣進講經書王言昭示廣大精㣲自王公卿尹以及六館生徒四氏十哲子孫環列拱聴莫不愉懌鼓舞思自振勵以近天子之光而沐聖人之澤煌煌盛典千載一時臣謹按記云古者建國君民敎學為先言人君致治之本之必由於學也書云學古入官議事以制言人臣輔治之術之必由於學也故説命之辭曰念終始典於學又曰學於古訓乃有獲孔子生知之聖不廢敏求用能兼綜百王師表萬世我皇上聰明睿智文武聖神薄海内外無不知聖天子道徳髙深超越隆古而臣叨被殊遇日侍禁廷當深宮毓徳之年即己備員講讀親覩我皇上懋勉功深基命宥宻敬體世宗憲皇帝明理立誠之寳訓敦行不怠日就月将以徇齊敦敏之質而加功之宻進學之勤有非承學之士所能及其萬一者是以御極以来敷政寧民無非夲天徳而行王道作君作師一以貫之實有以接洙泗之心傳而臻二帝三王之治兹當臨雍釋菜大典丕昭臣幸得親随灌獻之末恭承聖誨用敢質言所見作為歌詩紀述羙盛非徒襲揚扢之具文實将以昭式多士流示無窮臣不勝踴躍懽忭之至謹拜手稽首而獻頌曰惟皇敬學表正自躬文思光被化理聿隆風敎之本厥由性功緬企先師心源則同其一至矣素王規天矩地受命端門斯文是寄列聖相承欽崇弗替帝徳重光禮明樂偹其二峩峩廟貌翬革奕新宸翰髙懸輝映星辰肅将祀事維暮之春鸞旂戾止言詣成均其三鸞旂央央㦸門斯啟拜獻登階牲牢備體有睟其容有秩其禮百爾趋蹌師師濟濟其四祀事既備乃開講筵聖謨洋洋如日麗天詔爾儒臣是究是研俾爾庶士是陶是甄其五皇帝曰都後先一揆入聖之階如塗有軌講學敦行遹觀厥羙凡此秀民咸喻朕㫖其六亹亹吾皇繼天立極位育其功欽明其徳成性存存小心翼翼發為訓辭為萬古式其七太和翔洽賢俊彚升薪之槱之髦士用蒸文治亶敷隆隆其興億萬斯年百禄是承其八皇清文頴巻三十六
