body:
  text: 詩七言古詩塞垣對月理密親王允礽赤烏纔下黄金丸碧霄飛上白玉盤邊城盛夏無暑氣凉夜清露何溥溥長空萬里浮雲淨圓光素影如懸鏡行宫此夜滿瓊瑶人間天上相輝映詞客漫言邊月苦白草蕭蕭塞上土只今四海總為家雁塞龍沙駐翠華但見居民安本業曾無戍卒憶天涯寒輝頓覺炎威失彷彿珠光射銀闕今宵心跡喜雙清試咏新詩對月明恭和御製見龍行理密親王允礽長川大澤龍所都飛空上下風雲俱我皇乾健協龍徳坐清海若馴天呉是時江流淨如練蜿蜒百尺垂縈紆伏朝御座鱗甲動指揮似有神靈驅昔聞黄龍出江滸負舟猶復儆神禹豈如聖徳造化參郊藪來遊翔且舞㸃翰惟嚴顧諟心中正粹精居九五禎符叶應非偶然萬國臣民欣作睹雙峰歌恒温親王允祺劍臺北望得䨇峰巍然聳出青芙蓉彼此相依偏逈絶參差並峙何玲瓏枯藤屈曲蟠其上仰㸔體勢如虬龍逕仄豈容樵牧至石高時見雲霞封就中瀑布倚空瀉淙淙聲應千林松遊人到此竒絶處頓令洞目開心胷倚樹徘徊不能去冷然暮色無行蹤青溝此去知不遠禪關未見先聞鐘定州果毅親王允禮太行西峙海東絡驛路雲開博陵郭名勝志州城本漢舊基隋開皇於此置博陵郭寒風獵獵靡橈旃唐河飛渡千緹幕清水河一名唐河典午璇圖江左移鮮卑曽此一成託水經注後燕慕容垂建都中山即此州地五木誇祥束藁燃詳見晉書後燕載記定武千載空廬落只應明月與清風雞臺高送烟霄鶴明月清風皆此州舖站名十道志州東南有雞鳴臺圖經云漢光武所築正定果毅親王允禮中原左界標大郡被山帶河井閈盛峩峩北岳天作鎮恒山舊為北岳正定縣志正定以恒山名志望也蜿蜒率然首尾應滹沱折旋晉冀來楊慎外集滹沱源出代郡大戲山下循太行掠晉冀而東注於海飛騰沃蕩勢奔迅河北巨浸此稱首唐六典河北大川曰滹沱瀰漫浩淼平如鏡星昴殷冬水勢落亂流潎冽輪蹄競杜甫詩渡河不用船千騎常潎冽參差金碧倒影垂隆興寶相人天敬銑鋈金容七丈强正定府志隆興寺即大佛寺在東門金身高七十三尺大千沙界雄無並仁皇御製勒貞珉隆興寺碑文九皆聖祖御製寺中榜額凡十有御筆親書屭贔穹趺神力勁赤文緑字日月輝鼎書雲篆龍鸞映永鎭高山與大川千秋咸仰生民聖岐山果毅親王允禮泰華以西名山七崚嶒地乳當其一說文泰華以西名山七一曰岐山河圖岐山在崑崙東南為地乳太王荒作文王述王業巳定元公出規天條地前無匹神靈永永此廟食岐山縣志周公廟在縣西北鳯鳴山下娑羅白楊扶殿極縣志廟門娑羅樹二松栢三皆大逾十圍入門有白楊亦千年物清泉一泓治則湜蘇軾詩注周公廟後百步有泉依山湧出清冽異常國史所謂潤徳泉時平則流也輕軒于役廹冬日遙睇宫墻緬至徳二南風化期無斁蘇軾和周公廟詩二南猶自有遺風碑洞果毅親王允禮飛龍氏後史繼作古三墳伏羲始畫八卦命臣飛龍氏造六書胚胎妍􅀈窮元漠伐石摩丹示萬世岐陽岣嶁神工錯夏禹立碑岣嶁山周宣王蒐於岐陽刻詩石鼓嬴劉而下何班班有唐初載尤超寰鳯翥鸞鶱競翀舉至今落翮成邱山黌宮前後臚蒼碣或露或覆森林立窅窱儼如洞壑幽府學文廟後有碑院石刻林立俗名碑洞磊砢半與土花碧聖經中列崇堂皇其餘篆籀環堵墻名勝志石經唐文宗時國子監鄭覃以經籍刓謬與張次宗孔温業等共力讐刋凖漢舊事鐫石太學九經并孝經論語爾雅共一百五十九巻字様四十巻開成二年告成又碑院中為元宗𨽻書孝經四壁皆石經其餘碑刻凡二百二十餘座眞行𨽻草各殊勢招揭日月連星芒奏置憶自宋元祐石經本在務本坊宋元祐中漕司呂某移置學宮鴻都太學同爭購雪叠溪藤墨鑿池誥朝烟散風馳驟經石呵䕶有神靈諸刻未免隨升沈或時驪珠抵烏鵲間用琬琰充甃瓴廣輿記向拱鎮長安摹搨三千餘本民以為苦往往鑱削其字韓縝修灞橋督工急民摩碑石供之故全者遂少眞跡巳遙初搨少留遺可聽隨荒草我朝加飭守土臣䕶視歴久仍完好即今宸翰品入神一波一折前無鄰唐規晉矩何足數幾暇不廢臨摹勤賜書常得窺筆法奄有百代流風洽自非博覽徧諸家誰從巖竇穿雲峽朅來奉使劍外行還轅載歴周西京講閲事竣啓文廟肅謁先聖觀諸生因得周視碑版處古氣磅礴蛟龍劇剜剔苔蘚出節角别白同異識題署强半雖從搨本看雕鐫對玩神光完雅俗妍媸不一例杰作自詣乾坤端報命有期遑細剖往復摩挲難釋手規橅鴻筆劖一拳槐廡庻託長不朽前過西安有作今亦刻石其中觀鹽池并謁池神廟有作果毅親王允禮參井分野郇瑕封左傳晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬杜預曰盬鹽池即今池是也唐都南畔虞畿東嶽瀆宣精鍾巨浸府海不讓明神功縱邇横遙幅百里水經注池水東西七十里南北十七里週圍百有二十里明劉敏寛鹽池賦畧縱邇横遥幅員百里澄淳黝窅靈源通疏列畦塍錯繡壤釃渠瀹注波浺瀜甘鹵密􅙝液潛漉一宿霜練氷長空柳宗元晉問溝塍畦畹之交錯輪囷若稼若圃不知其垠俄然决源釃流交灌互澍莫知其以及神液隂灑甘露密起廻眸一瞬積雪百里炫轉晶熒耀天日鍜椎圭璧堆玲瓏軺裝駞載均民食遠近給足公私豐引水首夏迄秋仲成實自有靈旂風鹽風洞在中條山麓毎仲夏月應候風出池水得此一宿鹽成詎假熬波漉沙力惟勤斥堠堅垣墉鹽池圖考環池舊築攔馬墻成化間又於墻外築禁墻二千五百餘堵知者剏物巧者和總藉天貺回昭融聖朝百神並崇報一方秩祀尤優隆雲榜高揭誌信嚮庥光永願涵璇穹留額廟中湯山春景果毅親王允禮苔色青青遍山谷澄波無滓春水緑東風飄蕩小池平惟愛淪漪清可沐地靈有意瀉温湯豈因冬夏變寒燠四時佳景屬陽春鳥啼花放滿林麓澹烟靄靄數峰青登眺湏窮千里目瑞雪謠愼郡王允禧北風料峭雲紛糾一夜雪深三尺厚紫宸朝罷晝歸來道傍偶遇擔柴叟凍梨皴錯苦禁寒挽衣及脛帛勒首此時家家盡閉門問叟何為此奔走叟言生遇太平時春種秋收樂畎畝及此三冬農務閒賣得枯柴足餬口今歲雨暘更時若小麥百錢換一斗東家西家多蓋藏兒婦圑圞酌春酒糶粟輸租百事完閉門那有三更叩冬來雨雪稍愆期未雨綢繆安可後人生百歲貴辛勤胼胝餘三必經九今朝偶爾出門來鵝毛雪片盈林藪漫空珠玉眼中投入地蝗蝻泉底朽明春畢竟是豐年好培嘉禾除稂莠含哺永作太平民華封願祝吾君壽老叟言畢倐然去我聞此言立良久九重無逸坐明堂挾纊恩覃愜黄耉文囿先知稼穡艱作民父母惟元后補入豳風七月篇永樂昇平歌大有題翁照春篷聽雨圖小像慎郡王允禧一夜春濤打船尾雨聲破夢催人起推篷曉失四山青柔櫓搖搖水雲裏借問扁舟何處歸去來長在釣魚磯幽人事業渾如此卧看江天白鷺飛曉起登畫笥樓望西山晴雪慎郡王允禧三更滕六翻雪車香篝宿火重簾遮街鼓鼕鼕破初日廵簷起視庭前花弄寒作暖兩無賴東風潦倒紛騰拏振衣高樓試騁目柳絲不見黄金芽城頭好山如揖客界天一道霞光斜何處三百六十寺老松壓折空查了我欲䇿杖訪流水屐齒破凍穿谽谺雪消忽聞作簷溜嗒然坐對春無涯薜茘愼郡王允禧薜茘條長散烟翠纏松絡石紛如織離披轇葛復騰拏影月翻風足幽致寂寥盡日掩柴關恍似千巖萬壑間更待夜凉殘醉醒虚窓高臥弄清寒頒賜諸王大臣瓷器恭紀平郡王福彭大哉君恩及㣲細簠簋形呈物采備羣工拜賜捧多珍出櫝陳庭分種類爛銀為質瑩玻璃研青入骨塡翡翠鵝黄鴨綠鶴頂丹貢土燒烟五色翠畫師縮筆染雲螺參差几案明星羅千峰萬壑靡不具虬松怪石縈藤蘿尺寸之地瀠江海手中往往生烟波傾壺逐一恣玩賞竒絶功參造化多古今蒸窯差甲乙定有芒兮汝釘密鳯凰山下官與私柴董精粗頗不一由來埏埴歸鴻圖陰陽為炭天地爐一器之成判良楛瑚璉汝器端型模不欹不覆聖所訓前民利用恩澤殊持盈執玉臣㣲軀長年歌咏堯樽衢雪後平郡王福彭君不見圓者為圭方者璧漫漫無際粘天白旌旗巻凍龍蛇飛列騎嘶寒蝟毛磔又不見銕衣戞戞褁層氷氷絲萬縷鬚眉凝荷殳永夜不敢寐雪山有急三軍登吁嗟紫塞走封豕聖人用兵不得巳憂勞不倦宵旰心十萬貔貅皆赤子勉㫋將士殲犬戎投戈早晚奏膚功歸而飲至朝陽宮九州衣被春融融瀚海石歌平郡王福彭瀚海石晶華侵几席雕琢天工無痕跡明星之髓月之魄大珠小珠蚌胎闢精白梨花浮淺淡春流碧硬黄擘彩箋深青染嘉麥有時紅豆丹砂赤斑斕異色雜琥珀表裏明通照絺綌剖之定走瓊漿液我聞石者氣之垓漾水團沙元氣積又聞瀚海在荒磧羣鳥解羽伏大澤羣鳥解羽伏乳於此因名瀚海北鄰陰山寒苦劇純陰胚結匪一夕熙代筐篚走重譯萬里貢輸累千百瀚海石雲蒸霞蔚光奕奕他時化作圭與璧薊門輔國將軍博爾都燕關一夜秋風生黄雲吹墮漁陽城剪燭無言起愁坐萬户千門唯月明忽聽天邊笛聲作隐隐隨風度羅幕鴻雁遥從塞上來月明倒影樓頭落闌干倚徧夜婆娑楊柳曽傷攀折多玊笛能傳千載怨就中愁聽武陵歌月夜聞箏輔國將軍博爾都十二樓頭宵漏永霜月斜穿碧窓冷烏鵲南飛夜有光星河西下秋無影此時主客心徘徊秦箏侑酒傾金罍朱絲繡柱初掩抑忽然殷起南山雷俄頃沈雄變陸續颯颯凄風動梧竹鐵笛驚殘隴上梅銀砧敲碎階前玉撥拉一轉仍激揚恍如鐵騎奔沙場急雨琤琤濺碧瓦輕塵嫋嫋飛雕梁入曼餘音尤蕩漾四座無言久相向銀甲頻挑轉鬱陶鵾絃欲斷還惆悵更深筵散月倍明翻教哀怨難為聽何人製此關山曲冩出伊凉離别情寶刀行輔國將軍博爾都我有太乙鳴鴻刀一函秋水青綾韜流傳突厥幾千載至今銛利堪吹毛靜夜擎來光照室似有啾啾鬼神泣洪鑪淬就錦江波良工磨用陰山石當時跌蕩少年場寶裝玉珥何輝煌銅街横拂秋霜色金埒斜飛曉月光豈意我今鬚髪暮蟲網緣窓鳥巢樹抱病不聞車馬聲結廬却在蓬蒿處君不見干將鏌邪本巨觀龍光直射斗牛端張華既往雷生老飛去延津風雨寒松花石歌輔國將軍博爾都吾家有竒石乃是松所化空谷幾千春移來傍亭榭園林從此多清氛蒼蘚玉節依然存日斜窓外滿寒翠月明簾下溜層雲我至盤桓長手撫似帶幽巖舊風雨虬枝無復波濤驚霜皮半染莓苔古錦紋素質含菁葱堦前仿彿山靈通只知今日成黄石那解當年是赤松皇清文頴巻六十一
