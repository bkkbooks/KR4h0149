front:
  text: 欽定四庫全書皇清文頴卷五十七
  hash: sha256:d42147cb2dfdcd6b54ff59faa9003cf859987b114a99b91cd7349c3da32ded90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_057-1a, image: WYG1450/WYG1450-0041c.png}
body:
  text: 詩四言古詩賜遊湯泉應制有序徐元文山阜既結爰有神泉陽氣攸鍾是成溫谷類能消疴滌煩澄懷澡德蓋寒燠之所以交宣二儀之所以妙物也遵化州西北四十里有山曰福泉溫泉出焉按水經注漁陽郡北有溫泉即其地也林巒茂挺洞壑回環雄扼關城密護陵寢榮光於以繚屬王氣由之結蟠地脉敦龎川原秀潤是以白雲上合丹砂下閟融為炎液流為暄瀾比龍池之迅騰譬神鼎之長沸太皇太后翟輅式臨睿情加泰皇上欽承慈指啓宇庀工去雕甍綺疏之壯麗追堯階舜牖之淳朴因仍舊址攸躋攸寧惟二十年春二月以皇后山陵大禮臣等扈從至馬蘭峪皇上始至䖍謁孝陵望松路以遙酸對幽巖而隕涕具臣陪列悽愴不勝方待事石門遂閲旬日三月己未命大學士臣明珠召臣霨等二十有二人賜遊兹泉并宣諭所以修繕之意濯清潄芳逍遙永晝味同甘醴色若玻瓈周以貞珉承以蓮蕊涵碧虛而方折吸溟渤之飛流靈液徐清曲溜旁駛玉龍驤首吐納分滙神臯勝地斯云至矣夫甘泉賦於永始曲水序於元嘉以及華清豫逰九成避暑類皆登陟之勝視聽之娛尚思揚厲篇章褒成休美况我皇上展孺慕於陵園奉色養於睂壽而事不煩民動無侈費詎非邁軼往古式訓將來者乎臣竊不揆弇鄙謹賦詩十二章章八句其音節未諧乎六義於以美盛德之形容或庶幾於萬一云爾皇清受命覃制萬方威傾月窟德浸扶桑紫濛入貢窮髮來王際天罄地歸我昄章龍門蘭峪是稱左輔昔惟邊陲今也庭户陵宮言言考卜其所比洛瀍邙方雍霸杜我皇純孝通明洞幽展謁園寢神愴涕流仰瞻弓劍祗奉松楸靡高不即靡深不求嵸巃崇山逶迤濬谷環回岡原如拱如伏碧樹芊眠彤雲陸縟毖彼溫泉實湧巗麓靈砂內沸陰火潛然蒸為暖液奮迅盤旋輪衝轂轉雪瑩珠圓色澄空碧氣馥蘭荃陰陽陶甄剛柔摩蕩幽贊神功疇能測量湯谷溫源暄波灼浪曩聞其名兹燭厥狀祥以類感符以兆形地不愛寶神泉效靈蠲疴保性駐老扶齡瓊膏甘露孰與比馨翠華來巡爰滌爰盥浴德澡躬踟蹰永玩王母介福褘衣有煥思挹靈漿上綿慈算乃濬洪源清池泱泱乃甃文石疏溫納涼引之不竭沃之彌盈千春永御壽愷樂康自昔湯泉恆聞臨幸水殿岐陽烟宮驪嶺浴日騰波蒸雲結影雅詠餘鏗奎章垂炳景從千官星馳六飛何如我皇致孝宫闈雕欄繡柱璧砌瑶墀何如我皇崇儉立規惟孝格天惟儉作則小臣來觀式誦嘉德神運無方聖功不息迓祉凝休於萬斯億聖德神功詩有序汪霦皇帝既躬率禁旅再犂北庭大敗厄魯特之衆於拖諾山天威所臨電擊風掃遺孽逋亡假息窮壤復念除惡務盡不大創則不永寧於是具糗糧簡卒伍開道置頓百務具飭需春乃發歲二月北巡駐蹕狼居胥山臨邊授律諸將帥禀受進止蓋至是六龍凡三駕矣噶爾丹潰北之餘鳥獝獸駴其脅從諸部相繼乞降勢窮技盡計無復之子既就俘身亦隨斃自兹窮海以西大漠以北荒遠不經職方未載之地永無有私立名號以外於聲教者而數十年之逋寇以平五月振旅還京師自王公以逮士庶匍匐歡迎於道者交臂接踵不可以數計皇帝乃饗廟飲至與民休息遐邇禔福神人以和太平之業靡有紀極猗與盛哉臣竊窺前史自古帝王戡定僭亂著有武功往往載在簡冊然或詢老成之謀或假武臣之力非必獨決成謨躬歷險遠即有功烈皆淺薄不足道猶且鋪張揚厲侈為僅事獨厄魯特之役羣臣狃於故常咸以為窮荒小醜不足勞萬乘發言盈廷如出一口皇帝睿慮先覺果斷不疑必欲親蒞行陳一舉而廓清之洎乎聲罪伐謀摧堅搗虛制勝機宜如燭之照如數之計合節應期不爽銖寸謀定於數年以前功成於萬里之外然後知大聖人之所作為謀臣宿將有不能窺測其萬一者且大功克集不以永清耆定鳴一時之盛而勵精求治彌懷永圖辭鴻號而不居歸成功於眷命惟奬亷懲貪右文重道務使四海之廣千萬年之久咸沐浴於詩書仁義之域隆矣至矣功德之盛自循蜚疏仡以還所未嘗有也臣生際昌期覩赫赫之偉烈遭逄之幸千載一時而自被知遇以來得簪筆懷鉛厠侍從之列及充乏成均又以經籍教導為職雍容揄揚記載休美以傳示萬世者史臣之責也其敢以不文默而自己敬撰聖德神功詩一篇凡千有二十四字極知詞義蕪陋不足塵睿覽亦庶以盡文章報國之分云爾其詩曰皇帝受命統一區宇惟位乘乾惟日當午聲教暨訖悉臣悉主大德函覆溫肅順序跂行喙息物各得所孰於其間狡逞角距是惟北荒有矇者瞽德威明明暗曶無睹介恃險遠豕突蟻聚創衄餘孽未伏質斧帝車三驅盡犂其部二庭遂空屬國安堵搜株剔根俯若拾取不有頑梗曷彰神武繄噶爾丹實惟凶豎隨牧轉徙旃裘湩乳舊通職貢十百其旅假竊寵靈雄長磧鹵貪若叨餮暴若䝟貐磨牙噴毒擇肉而咀弱為强食積骸成莽肆力并兼城以千數爰震其鄰及我藩輔𠢐面來奔告敗惻楚桓桓天朝萬物父母一夫不獲曷慰冒怙乃頒詔㫖開示心膂來享來庭一視公溥爾無憤盈縮甲則可彼昏卒狂阻兵樂禍帝用赫然震電馮怒詢謀於廷積習是狃咸請擇帥往任勦撫帝曰咈哉豫其致果諏日親征郊祀用牡是造是宜是類是禡遣告河嶽百靈效助六飛晨動匉訇天鼓龍旗鳥章日月其羽獸盾犀札珠弓玉弣期門佽飛導騎駊騀元戎啓行張翼二拒中權自將決勝樽俎白旄在右黃鉞在左列缺奔驅屏翳環扈豐草爭茁靈泉乍吐師行洸洸冞入其阻止如山嶽動如風雨或顛其巢或燔其貯或殱其酋或殪其侶或扼其角或折其股有觸必摧有衝莫禦遂蹴祈連回望杓斗瀚海蕭條天幕四野諜來告言賊竄近藪天兵躡之􅌓眙束手廟算先覺寇必西走設覆犄角潛扼隘口猝遇我軍魄禠膽墮式遏歸奔如獵狐鼠馘彼閼氏餘衆繫虜遺畜盈川棄甲成阜渠魁僅免假息穴土帝曰還師六月徂暑豫其少息休此士伍滅跡掃影以俟後舉朔塞風高順時冬狩大閲車徒益峙糧糗秣馬厲兵置頓建堡誓告師期堅冰逮剖韎韐躬親屢習勞苦遂出雲中遂踰寧夏雪塞飛狐風寒石虎谷暗沙鳴懸車束馬帝實先之曰豫率汝鑿空開道遮險伏弩駐狼居胥屯營嶪峩天羅四周逃死無處維彼逆子既繫以組既檻以車俘致闕下維彼脅從棄逆來附丁壯面縳婦稚背負賊失其黨若蛩離駏若蛙在井若魚在釡天絶其命身首潰腐蕩滌氛祲鞏固牧圉六師凱旋永紓北顧上自王公下逮黎庶夾道而跪迎帝鹵簿踴躍歡喜式歌且舞飲至告成典禮鴻巨蕩蕩巍巍功無與耦崇上尊號屢表勿許中外喁喁延頸以佇皇帝至聖紹堯纘禹覆燾無私羣生和煦興亷任能惠及鰥寡天錫皇帝誕受純嘏太平之符登陟三五皇帝至神亶聰作后邃慮前知神識內守大化疾馳覃被九有天錫皇帝百福單厚民物恬愈並躋仁壽皇帝允文萬象在宥天章粲然星雲融冶登山勒銘鑱削礧砢功成作歌以南以雅天錫皇帝於樂燕胥丹鳯赤鱗起應搏拊皇帝允武太阿手拄剪除三孽截彼海浦奄有漠北八荒庭户鞭笞萬里無敢齟齬天錫皇帝候尉齊軌越裳獻雉肅慎貢楛帝德之廣覆載𢎞普帝德之運升恆永久福謙報祉神所相豫師克屢豐庶徴時叙登封云亭考古垂矩明堂辟雍文德藻黼臣率國子舊職訓詁洋洋廟謨具在冊府帝載恆赫臣辭爝火紀績歌功震耀萬古平蜀詩十三章有序朱彝尊臣伏見皇上即阼以來仁風溥洽凡在海外重譯來格邇者巴蜀負固蕞爾叛寇神人交憤六師所向何堅不摧我皇上先之以德化未即咸劉乃凶渠既殞餘孽罔悛天威赫怒爰命虎臣分軍而前冞入其阻日未浹旬保寧成都千里底定正月丁巳捷書上聞誕集文武臣工宣於闕下僉曰蜀寇之不靖於今六稔皇上休養民力湛靜不絿金鏡在握朗照萬里之遠山川險易瞭若掌中廟算恢宏指授方略以師則武以時則利以將相則和調用能不日成功聖武布昭遠邁隆古臣以布衣被䝉恩澤拔置史館粵稽曩昔劉闢既擒韓愈進元和聖德詩明之平蜀劉基亦作頌以獻臣雖䝉滯躬逄盛際於以頌揚丕烈其何敢後乃拜手稽首而獻詩曰皇帝聖哲靡遠弗瞻南諧北燮西被東漸蠢爾不庭憑阻滇黔爰踞巴蜀以逞戈銛皇帝曰咨元戎是敕欲宣武功誕敷文德冦衆來挑我堅壘壁匪久其師恤民之力民力既恤士氣孔揚我車我牛我倉我箱芻茭菽粟在巘在岡萬夫豫附萬馬騰驤魁渠肆殄梟謀日沮帝曰可哉命整雲旅分鑣以馳揚旌負羽或扼其吭或擊其膂赫赫奮威師度七盤既下葭萌入閬中關桓桓勇略鳥道鈎援綿井既收遂復錦官如彼東瀛用注螢爝如彼衝風用卷秋籜昧雉斯經窮獸乃縛徹其幟竿清我堠柝蜀之黃髮植杖以遨蜀之黃口連臂而謠壺則有漿簞則有醪或徯於野或迓於郊乃疆乃理榿林棘路爾宅爾田輕爾徭賦巴貢其箋賨輸其布棧谷梯山千里褰泝捷書遠奏逹於宸聰午門斯啓宣示羣工小大稽首蹈舞攸同庭燎晰晰光如日中我出我師正月初吉至於益部曽不旬日矯矯虎臣殆罕其匹帝心是嘉首用遷秩人亦有言師克在和惟此成功廟算實多二者勿族降者勿苛皇仁之溥四海是吪井絡既平坤垠式奠䝉詔牂牁載歸赤縣皇帝神武俾修組練亦有昆池於焉習戰聖有恆訓警戒無虞凡百有位職思其居勿謂外寧官守或渝小臣作詩以贊訏謨皇清文頴卷五十七
