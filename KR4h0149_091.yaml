body:
  text: 詩七言律詩恭賀御製翰林院宴畢駕幸貢院七律四首元韻裘曰修棘闈光采動星辰鴛瓦鱗鱗接紫闉運際龍飛天甲子風髙鶚薦日庚辛論文自詡千秋事挟筞争来萬里人漫說此中桃李盛吹噓都属上林春祥凝五緯聚三台應運誰為特逹才經術一時推學者股肱他日待良哉天章遍許儒林誦仙牓新從藝圃開曽是諸生攻苦地不圗親見至尊来閬苑翩躚鶴影摶瑤臺十二碧䦨干試㸔雷雨經綸起未覺風雲際㑹難首闢四門符舜典載申三物重周官聖朝玉尺高懸䖏不使良材㸑下殘搦管曽驚晝影沉春蠶食葉憶孤吟有懐漫比漣漪浄被澤真同渤澥深謬謂文章抵鐘鼎不将廊廟負山林風簷舊夢驚回首猶是青燈十載心恭和御製翰林院宴畢駕幸貢院七律四首元韻陳邦彦奎騰東井應昌辰帝輦遙臨下紫闉纔向鳯池歌宴衎又從棘院閱艱辛千行試舍邀宸睠萬類洪罏荷聖人一自翠華逰幸後鵬霄鶯谷盡生春賢書自昔寄中台選駿頻收馭逺才五色文章非易也九重㢲命曰欽哉青燈夜雨連宵課紅杏春風傍日開攻苦寒窻䝉睿咏恩隨墨瀋自天來漫説長風萬里摶從來詔祿豈容干生逢聖世飛騰易身入賢闗報稱難俊乂闢門符舜典明經多士擬周官鑾輿己度龍門影棫樸登歌尚未殘天意憐才詩思沉簷風寸晷動高吟至公堂上秋雲淡明逺樓中碧月深甲乙品題歸水鏡珪璋磨礪得瑶林還鑣追憶紅綾夢更凛氷淵精白心恭和御製翰林院宴畢駕幸貢院七律四首元韻鄂容安玉堂高㑹近星辰試院鳴鸞紫禁闉巨典鴻文超令甲景雲旭日正先辛是日庚午從容天步登龍路辛苦風簷立鵠人瑞氣珠宫渾不散賢闗草木盡囘春地憑北斗映三台桂籍槐㕔引彦才君子游歌眞樂只文章場圃亦雄哉風簷月燭千廊寂意蕋心花一院開貢樹分香天語接他年公輔此中來長風羽翼試高摶氣象虛傳彩筆干誠正由來與巳切才華到底報恩難鎬豐雅頌尊周士賈董風規貢漢官省識寸心關得失秋江應不怨凋殘霓旌鳯咮晝沉沉雲路鵬程入聖吟千載持衡天鑑在百年養士國恩深芙蓉敢有先傳鏡桃李誰言自得林科第湏從忠孝副雲霄儀羽九重心恭和御製翰林院宴畢駕幸貢院七律四首元韻觀保至徳垂裳拱北辰恭惟仙仗越城闉頒來丹詔逢先甲算到良時屆下辛二十八日辛未零露巳霑儀鳳侣和風兼拂聼鶯人棘闈咫尺金坡路十月春如二月春遥望丹梯接曙台網羅欲盡碧雲才遭逢如此人知否辛苦猶䝉帝念哉萬歲三呼千載㑹重瞳一顧四門開桞邊蹀躞金臺駿知為庥明作瑞來敢道憑空一鶚摶培風訝許九霄干花因向日開常早草喜逢春緑不難屈指四年膺寵命衡文三度典寒官追陪此地恩尤切報稱常思五夢殘星臺崒嵂玉璣沉北斗城邊萬籟吟天運左旋清漏逈日華東出慶雲深畢箕風雨從民好奎壁文章徹藝林一豫一遊闗繫重帝王心是化工心恭和御製翰林院宴畢駕幸貢院七律四首元韻于敏中斗牛光氣應星辰尺五天南接帝闉文運百年周甲子秋期八月過庚辛為臨丹禁蓬山地還念青衫席㡌人鎻院盛傳車駕幸一時寒畯總生春聚奎堂逈接中台此地三年一選才漫説功名偶然耳亦知科第豈徒哉金臺本為求賢築珊網原因籲俊開寄語槐花忙裏客好從洗髓伐毛來璇榜天題一氣摶兩行珠琲耀闌干若論觀國才非易語到知人哲最難萬選伊誰如學士三升自昔重周官小臣却憶當年事㡬度風簷聽漏殘日麗龍門曉霧沉文昌風景入高吟花開桂落憐甘苦雲路鵬程閲淺深持鑑敢忘清似水儲才還冀盛如林萬間廣厦千秋遇總是君師敎育心恭和御製翰林院宴畢駕幸貢院七律四首元韻董邦逹文敎昌明際此辰五雲佳氣䕶層闉奎垣正耀重開甲㢲命時申自納辛巳集蓬池傳鎬宴更臨棘院作周人多將萬㸃恩波雨灑遍千山桃李春清時灼灼啟英台帝念殷殷育俊才儒術眞堪經世也制科豈是為名哉三秋蟾影香初馥二月仙姿紅又開多少風簷辛苦淚翻從感激聖恩來積厚方將九萬摶可容輕易向時干傳薪有學斯無忝翻水成文未足難自古闢門開盛典熙朝敷政屬儒官程才大小周時用莫便迂疎但守殘賢闗咫尺判升沉囘首當年鏁院吟忝與持衡慚識淺肯敎張網畏淵深昭囘雲漢欽天藻樂育菁莪滿士林屢被恩膏難報稱願將氷雪勵臣心恭和御製翰林院宴畢駕幸貢院七律四首元韻宋楠纔看水署集星辰又見鑾輿轉鳯闉校士此間分甲乙撤闈前月紀庚辛洵知上苑鳴珂侣原是風簷剪燭人兩地儒紳俱望幸珠斿隨處佈陽春蕊榜人多位鼎台經綸端藉出羣才文期有用為佳耳士聽無譁尚慎哉壁府占祥星再耀史臣紀事帙重開乾隆九載初冬吉大駕親臨貢院來鵬背長風九萬摶摩霄有路豈湏干氷甌雪椀盟心易月斧雲斤措手難題目禁中由御定主司簾内異麤官千金得士期登用莫注蟲魚但守殘等閒雲路判升沉甘苦何期入睿吟一代制科風尚貴百年文敎濯磨深龍章並仰書垂露鶯谷行看羽出林共慶生民來未有帝王如此愛才心恭和御製翰林院宴畢駕幸貢院七律四首元韻鶴年譽髦斯士慶逢辰仙仗爭看溢巷闉棘院親臨逢再甲風簷遍覽念多辛飛鳴益奮摶霄翼􅂒􅂒應無失路人鸞輅所過如挟纊不闗候値小陽春寶翰輝煌照斗台旁求至意屬眞才無私鑑物湏淵若有志觀光尚勉哉詞館清華門益闢蓼蕭譽處宴新開相期握瑾懷瑜軰盡入瀛洲座裏來文陣湏將大力摶䄂中行巻漫輕干弊清簾外蒐羅易題岀宸衷擬議難自此諸生歸就學更無捷徑去求官三年養得凌雲氣不怕天香桂子殘龍門咫尺判升沉特軫皇情寄雅吟辛苦三塲天不負漸摩百載澤尤深愧非經笥叨師席漫向鱣堂課士林弦誦各教敦實學菁莪仰副育才心恭和御製翰林院宴畢駕幸貢院七律四首元韻吳應枚駕蒞瀛洲燕喜辰載廵棘院繞闤闉詞曹榮並卿和相甘味囘思苦共辛放眼選塲誰是佛殫心舉業始成人小春旭日迎仙仗賜與青陽左个春奎光萬道接三台百載陶成間世才雲漢為章歌倬彼海隅時舉詠康哉桂培蟾窟先期種雷動龍門特地開多少青袍齊額手今朝親見翠華來三干水擊羡扶摶綵筆曾聞氣象干市駿有臺還鄭重梯雲得路本艱難直從根柢端儒術常以公明朂試官要副九重臨幸意敢希弋獲守叢殘鑾輅廻翔晝漏沉鹿苹魚藻矢清吟紅雲一朶瞻天近樺燭三條想夜深如璧如圭珍待聘樹人樹徳蔚成林玉堂遥望恩同戴汲引惟期表素心恭和御製翰林院宴畢駕幸貢院七律四首元韻徳保鑾輿初降棘圍辰士氣文光滿帝闉倩補衮龍修黼黻擬調鼎味試酸辛焜煌翰墨昭千古赫奕謨猷仰一人致嘱朱衣詳㸃額培成桃李待先春昭明奎壁接三台天步廵行重勸才際遇明君將仕矣韞藏美玉待沽哉崔巍虎觀千尋上閶闔龍門四逹開定有英賢孚帝望賁然㑹見白駒来仙仗来臨五鳳摶縁求鴻鳥漸於干共知入仕如今易始信為君自古難聖意周詳憐士子公車感激奮王官洪鈞鼓鑄斯文運不比尋常補缺殘昭融和霽晝沉沉景物歡承睿藻吟士習敎成敦古樸天才神縱仰高深鶯聲㡬處鳴幽谷春色新年發杏林從此恩波籠鎻院觀光應勉致君心恭和御製翰林院宴畢駕幸貢院七律四首元韻秦勇均鸞旂飄拂燦星辰文士歡迎傍鳯闉欣覩棘闈輝氣象更煩瑶翰詠艱辛十年寒暑横經客萬里闗山獻䇿人自入宸衷加愛惜螢窻雪案總陽春文昌光氣近三台玉尺平量盛世才軍夢火山祥兆矣城飛聊矢意雄哉龍門轉盼桃花麗蟾窟遥瞻桂子開從此揮毫添得意並誇曾接聖人来展翮羣思九萬摶最憐及第似方干莫言千仞登梯易曾悵三年入彀難伯樂未逢空入市卞和㡬次獻當官兩廊燈火今囘憶七札穿来月影殘淵底珠光豈乆沉五雲多處聽龍吟層霄奎壁流輝逺四國菁莪被澤深法駕經臨歡士氣宸章傳誦寶儒林草茅聼説叨光寵倍矢傾葵報國心恭和御製翰林院宴畢駕幸貢院七律四首元韻栢謙三載從傳貢士辰試闈常傍禁城闉玉堂幸沐新恩渥棘院寜忘舊日辛通籍正宜思故我濡毫原是此中人欣瞻鳯輦親臨幸纎草齊涵大造春科名自古應奎台衡鑑還湏别茂才雲漢作人非偶爾菁莪養士豈徒哉十年面壁蓬扉扄一日登雲蘃榜開甘苦休言人莫喻曾看此地翠華来垂天羽翼任鵬摶鎻院森嚴未敢干螢火聚光窺慘淡蜂房釀蜜識艱難青雲得路趨雙闕白首窮經効一官多少幽情歸睿鑑底因遲遇惜衰殘科名得失判升沉下里休淆白雪吟景慶喜符昌運瑞文章思報國恩深賜觀睿藻趨瑶陛逺播綸音遍藝林㑹向金門看釋褐輸忠誰不罄丹心恭和御製翰林院宴畢駕幸貢院七律四首元韻張映斗蓬池魚藻樂嘉辰載幸文闈近綺闉臺笠四周瞻氣象鑾輿一顧念艱辛青雲納履非無路白首懷鉛大有人簾月燈風湫隘地宸光煦照即陽春席㡌隨身志鼎台㡬經磨礪盛年才心追作者良難耳論少卑之曷尚哉織錦毎誇新様改栽花休問故園開龍門莫悵秋濤冷瀛海恩波汨汨來鵰鶚俱從雲路摶禮羅豈屑雉媒干明珠十斛平量易寶劍雙精鑒識難三䇿天人光漢詔九年選造重周官法宫正鼓雲和瑟肯使焦桐㸑下殘海天魚鳥各飛沉叨與看花馬上吟昔夢尚驚三榜發新篇載紀五雲深昇平潤色歸經術大雅扶輪廣學林玉尺金衡天賜予儒臣長合矢氷心恭和御製翰林院宴畢駕幸貢院七律四首元韻徐景熹養士掄才撫五辰翠華曉日岀重闉風簷晷度雙丸速樺燭光添五夜辛南省探花曾有使秋林攀桂更多人紛綸經術邀知遇試問誰如井大春文昌列宿耀三台雲漢為章肯育才匣有寒芒歸識者匵多美玉尚沽哉驊騮自見馳驅穩桃李還欣爛熳開珍重書升成曠典棘闈喜迓六龍来展翼皆期九萬摶原知天禄不湏干名經千佛題非易健翮三秋奮未難抱璞乆應邀巨眼席珍果識重儒官風雲多士霑恩渥感激天心滴淚殘鎖院森嚴夜柝沉撚髭抱膝費清吟璠璵可有良工琢杞梓眞邀大澤深桂蕊芬時環寳樹杏花開處上春林作人棫樸逢熈運簡在均宜報聖心恭和御製翰林院宴畢駕幸貢院七律四首元韻楊述曾紀元甲子際昌辰雲漢昭回麗九闉鰲禁濡恩歌宴樂龍門紆念涉艱辛華筵此日簪毫侣短䇿當年席㡌人特賁紫泥移鳯輦一時藝苑總廻春㢲地三條映斗台聖朝羅網重英才振興士氣俱升矣稠疊王言實大哉棘舍萬間雲色燦風簷四面日華開那知燭淚燒殘處也入重瞳盼睞來培風鵬翮任飛摶勿以求心逐野干便腹五經眞不易摘鬚一第未爭難文成黼黻方華國笥有衣裳省服官三尺短檠看尚在書囊無底讀更殘春蠶食葉晝沉沉鳳咮堂前㡬度吟名次臚雲邀簡擢家仍禁籞荷高深一條氷繫膺華選二丈光分照上林更咏詩篇薪棫樸金相玉琢答皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻鍾衡蓬瀛宴罷値良辰鳳蹕欣過帝里闉官舍深嚴無請謁棘闈料峭倍艱辛應知他日登龍客不負當年題柱人萬里鵬程從此始彈冠共慶玉堂春榮光熠熠耀三台為國湏求俊乂才氷鑑玉壺長在否龍雕虎繡實雄㢤三條燭盡文星燦五夜風清鎖院開最是月中攀桂客聨翩俱赴鹿鳴来風簷咫尺欲鵬摶十丈文星射鏌干曽是槐黄情最切由来棘緑景猶難清華有路堪酬志明主憐才不惜官身際聖朝文物盛莫敎歲月易摧殘明時籲俊念升沉得失雲泥入帝吟三載賔興宏典禮百年培養沐高深一行鳳詔頒中禁五色龍旂出上林黄闥小臣同拜獻賡歌敬體聖皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻程鍾彦龍光燕喜慶芳辰帝引奎雯駐綺闉杏苑南宫儲甲乙桂輪西顥應庚辛長開科目登良士廣貯圗書待學人鑾輅親臨宏沛澤成蹊桃李巳含春銀漢光芒接斗台作人雅化起英才致身雲路誠榮矣稽古行間尚朂哉道域已隨天步闢賢闗特荷聖恩開蓬山儤直揮毫彦都是鴻鈞陶鑄來扶揺九萬效鵬摶白雉青雲直上干閬苑迢遥瞻亦近天門詄蕩到非難神凝如坐清華舘心靜誰移耳目官摹得廟堂鐘吕韻砰鍧未覺漏聲殘聨翩席舍晝隂沉下筆聞聲戒朗吟自古文章崇正始從来淺陋即艱深天池芹藻涵宏澤上苑鶯花異衆林承乏掖垣宣徳意竹梧長表向陽心恭和御製翰林院宴畢駕幸貢院七律四首元韻鄒一桂棘闈臨幸及兹辰翠葆風和接九闉入彀英才爭踴躍思文聖主識艱辛廵遊寵被龍門客拜舞恩霑雁塔人錫下彤章雲五色難敎白雪和陽春文章天禄曜三台珊網宏收報國才共體乗乾常惕若尚思稽古凛欽哉紅綾宴自篝燈集丹桂香因種徳開今日持衡舊懷璧莫忘甘苦此中來萬里扶揺豈易摶青雲有路不湏干攤書五夜窮經苦破浪三門歴級難理發程朱如月印文卑屈宋是衙官更知為國求賢意仕學兼資讀未殘功名得失豈浮沉把巻還湏仔細吟鹿苑看花承燕喜鳳池歸燭受恩深逺栽桃李敷卭筑舊采參苓入桂林此際從遊来藝圃敢忘冰玉勵臣心恭和御製翰林院宴畢駕幸貢院七律四首元韻孫灝鳯沼銜恩宴吉辰龍津駐輦瞰重闉頻瞻日表天巍煥頓改風簷地苦辛玉筍競誇門下士紗籠曾䕶榜中人爭如雨露培根渥桃李金城萬樹春文昌座逈冠三台帝為蒼生佇上才第一官求誰可者無雙士貴豈虛哉宫蟾乍喜凌雲接林杏先思向日開盛比橋門觀聽萬鎖闈驚見翠華来滄溟六翮此鵬摶立鵠孤寒又若干顧盻自天儒不賤典文從古見猶難風前畫燭然深夕筆底春蠶動試官氷鑑丁寜勞聖訓夜珠投恐目光殘桐井朱門列棘沉宸襟清暇入高吟鄉三物後書升重國百年来養士深仙仗雲排光席舍天章日麗照儒林小臣窺管知誠陋籲俊惟期永徳心恭和御製翰林院宴畢駕幸貢院七律四首元韻楊開鼎日旌月羽拂三辰警蹕来遊雉堞闉欣展舜顔臨太乙競瞻堯顙類髙辛沙堤方宴登瀛客棘院来觀負笈人夾道歡聲騰御氣小春今正勝陽春文昌六宿接三台珊網宏羅四宇才共矢氷心惟謹爾敢忘寳訓往欽哉半簷低處祥光擁一鑑懸時景運開説與横經諸髦士龍門信有六龍来六月培風萬里摶青雲綵筆也能干懷中瑜瑾酧金鑑字裏珠璣勝木難自昔天人推漢䇿由来俊乂屬周官離蔬湏副旁求意莫向空山啖芋殘銀河一抹夜初沉畫角聲中費苦吟玉尺平衡多士奮龍文軒翥五雲深收羅經術歸藜閣珍重科名比桂林自佩烏囊何所報皇猷願贊育賢心恭和御製翰林院宴畢駕幸貢院七律四首元韻周孔從奎文璀璨應昌辰鎻院重重拱帝闉幸倚玉堂叨寵眷敢忘雲路共艱辛鹿鳴芩野歌君子鳳翽梧桐詠吉人總為崇儒增曠典翠華行處藹陽春雲凝華葢映三台璇曜靈鍾命世才文治薫蒸風尚矣重闈葱鬱氣佳哉黄槐結䕃含秋爽紅杏催春報曉開海底珊瑚澄鐵網一時爭道獻琛来坐看雲鵬九萬摶鏡湖那復滯方干情知老鶴冲霄易肯信新鶯岀谷難籲俊四門光舜典賓興三載重周官皇情更軫風簷苦不負春蠶食葉殘香焚紫案晚煙沉校閲曾分剪燭吟今秋京兆試士臣奉命分校細領文情秋月朗難描風景夜堂深光含寶氣侵珠匣露浥清芬滿桂林重捧天章雲漢表羣才樂育聖人心恭和御製翰林院宴畢駕幸貢院七律四首元韻邵齊燾棘闈榮幸値昌辰鳳蓋鸞鈴歴翠闉儒雅銜欣資化育宸居徹邃念甘辛衡梁攸寄皇多士雲漢為章聖作人甲子恰逢新日至帝車指處即陽春早為他年慎鉉台鎻闈行幸重掄才前旒俯察誠明矣元首賡歌曰喜哉桐梓維楨知地敏山川欲雨睹雲開英賢從此相望出何待箕星入夢来九萬風區大翼摶清時爵禄不湏干惟賢自以身為取則哲誰云帝所難利見飛龍瞻首物書升司馬慎論官丁寜寄語觀光士磨礪寒窻共抱殘春秋代序此飛沉虎嘯龍興蟋蟀吟樂育多方食徳舊旁求在念荷恩深彈冠好勸賢能駕炤藝敎遊道徳林慚愧微臣預斤斵永持清慎答皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻竇光鼐盛典初開選吉辰詰明鳳駕岀重闉聨珠共睹奎光燦饌玉偏知蓼味辛濶到海波能育物明如天火受同人直敎未脫藍袍者也沐陽和大地春熙朝元化接元台崇雅無庸輕艶才樂備禮明觀止矣蘭馨桂馥氣佳哉周三物要諸生備虞四門看此日開山岳由来資土壤儘容一得罄懷來摩空健翮倚雲摶愷悌憑將百禄干合有魁儒推學富免敎聖主嘆才難文章自要爭千古科第寜惟博一官萬事心花能結撰墨花開處燭花殘三條燭盡漏聲沉嚼徵含宫費苦吟誰似賈生能䇿治漫希揚子好思深圭璋有價諮都市梁棟湏才訪鄧林自古人文闗國運虛公端合體皇心恭和御製翰林院宴畢駕幸貢院七律四首元韻張泰開鎻院奎躔恊五辰日華門外鳳城闉欲培士氣歸長養尤愛儒生耐苦辛禮樂百年隆籲俊明良千載在知人蓬山宴後龍旂岀寵賁風簷萬國春延英講席接元台為闢賢闗擢俊才傳世文章特末耳匡時事業豈徒哉丹心自有氷壺潔寶氣先由鐵網開糺縵天書丕煥後共將衡鑑記從來鵬程自昔趁風摶未許蜩鳩妄意干得失總由人事判推敲應覺匠心難含經便欲窮三箧對䇿非徒効一官多少儒臣隨鳳輦濡毫猶憶燭花殘十番棘院愧浮沉長對青燈擁袖吟幸拔泥塗驤首後方知雨露沐恩深驊騮合與開先路燕雀何期托上林此際傾葵圖報答承明莫負聖人心六言律詩鏡水雲岑應制趙熊詔近水遥岑交映鏡光雲影相涵平開一片皎潔亂㸃長空蔚藍鑑洗獨澄秋月霞披常對晴嵐天然别苑圖畵佳處全憑静探皇清文頴巻九十一
