body:
  text: 頌聖德神功頌有序毛竒齡惟是皇清嗣世撫育方夏東越溟澥西薄栁谷南底於窏汗而北極之莾䍚無垠之地其在水居者雕額畫臂率為良民版畫其波濤而租其魚蛤其在甌脫居者大幕以南皆保塞稱藩環嚮為屬國自是而外雖車舟未到人力鮮達亦且仰天地之恩昭日月之信風聲逺播同量一器獨是瀰迤以西汙裸么小如彼厄魯特噶爾丹者倚恃荒昧託迹榛曠與噶爾札薩唇交齒互不思睦鄰恤族內奉約束而乃自舍厄狹頓加夷陸侵陵我㰚衛暴殄我藩服東西爪揃罔顧禮義皇帝不忍加誅屢飭以法俟其湔滌勿追夙染乃復鼠穴自大終致負固伏念皇上曾駐蹕喜峰登臨慷慨賦黃土崖大石磯二詩以宸翰書之巖間兼諭侍臣謂是地皆前朝戍屯烽堠相望我太祖太宗創業宏逺夷夏一統致蒙古四十八部皆為臣僕朕每過此未嘗不念丕烈焉是埏紘萬里無非締造遊豫所到猶厪先烈其可令螽蝝肆喙蚉虻鼓翅漸至於此夫無疆歷服匪易嗣也前人之光不可以遏且佚也况古聖賢經文緯武雖揆奮有人猶身挺鈹鐸手秉白旄以故黃帝親戰於阪泉而文王北伐畎落躬承盧矢以彼神聖何難命將出師髙居深拱以操制勝而乃安不忘危勤思戡亂忘萬乘之尊習三單之效哉誠以君不親將皆叔世浮文而非古王毖戎之本意也是以廟謨盈庭貴乎獨斷征伐之權出自天子乃遂張皇六師大申克詰羣䇿不足撓衆諫不為沮集虎賁而懸豹尾肆類於上帝昭告宗廟遍望諸山川百神禡牙畿纛練時日鑿門以恭行天罰先遣撫邉大將軍由沙河抵塞剋期並進越歸化歷烏闌河朔遏其歸路以會大軍於幕北而羽林佽飛從獨石同時出關師行三十里屣克勒隃髙齊涉敖漢越烏朱目秦凡蠻夷君長外藩諸部王可汗貝勒貝子公台吉等先後會朝以壺漿簞食迎於馬前其他北庭薦居去胡來王者悉環列跪道左觀軍容不輟乃絶大幕進拖林調兵榖車餫使武剛氷􅖲不絶於路雖鹵舄之地每乏泉水而靈源疏鑿所在湓涌會飲馬川西忽得故明成祖勒銘紀功之石於水崖灌而視之有永清沙漠之句上曰真永清矣遂於中夏三日直搗其境犁其庭掃其閭鳥逃鼠􅋟四竄之巴顔烏喇而西路之遏其奔者迣擊於昭木多鄂爾渾河之間以比干環盾大破其勃盧之陳擒其子炮焚其妻孥追殺三十里斬首虜二千餘級生得數千人乞降者以日至虜獲馬牛羊驢騾釜鍑械仗無算乃大展皇仁任其零騎數十人負創而奔而我士卒無離傷者皇帝乃駐蹕黑魯侖河封拖諾之山禪之土喇遂班師焉先是禁旅初行時兩浙官民念七萃勞苦旗門逺闢不無宵旰跋涉之艱乃宿衛綦嚴眺聽祕謐行間消息不泄於外因晨夕引領北向以冀布凱驟傳管侍衛內大臣暨大學士祗奉諭旨而和碩康親王亦遂有啓請班捷之奏流抄到浙浙撫臣榜之通國官民大小皆歡忭踴躍男女聚族轉相慶告遂於康熙三十五年六月十五日撫臣率司道臣以下會將軍都統暨鄉官士民數萬人焚香稽首賀捷於軍門旋請史館詳敘膚功頒示兩浙立石於東海之濵而以臣故職史官屬抽筆作頌以俟載事臣伏思太輿誕大廣運靡極三古至今亦惟視君國大小以為修狹是故功德大者地亦大功德小則地亦小乃自五帝三王以後漢魏迄今其歷國已一十七姓而大一統者亦復有幾即漢唐元明四代嵬然式廓而唐以藩服僭處中致歉損曾未有德髙日域功蓋月􅒸如本朝者既已提封萬國奄有八極而皇上復恢擴而張大之不憚躬親安攘以葆此逺塞一時之勞萬世之利聖德神功莫可紀計宜立石四裔以為我子孫億萬斯年之法因不揣鄙陋謹擬為東海立石頌文以垂於勿壞其文曰粵自三古長此六服徑輪廣袤視功與德漢唐元明盡有厄塞晉宋偏安比之列國惟我皇清闢土浩濶西隃崦嵫東近日出雖復繼世兼創始謨再奪昆詔三開葉榆甫復東越旋收番禺聲暨南服教訖海隅遂擴疆宇至於彭湖物皆安居民樂終産恩肥土域澤溢朐衍綱紀百飭聰目四逺桐生本豫禾偃能反浮苴以南並我保塞豈惟籬落原屬經界肯容小醜暗為蟲壞造謀藉兵作邉鄙害皇仁有容諭至於再是雖渺末漸不可長無庸受脤徒命將往帝德神勇聖世廣朗藉此晏安習以鞅掌武丁南征王季西攘師中丈人百國所仰豈如叔世髙居稱朕不計大鴆而縱小蠢文法是崇兵革不袵諫即牽裾甚者割紖以至叢脞或就削弱珠崖徒捐金墉巳却蕭關烽火幾至宮闥所以古王最重撻伐河魁二百太乙三千星門大闢靁車陡牽銅斗獸警鐵騎蟬聨白澤逺導朱雀在前是以初發雲興百萬繼且飈起如日斯旦箕張翼舒虎攫龍戰小醜伏聽早鳥獸散因之番長逺近來謁飾彼玉具賜以匹帛覩兹天威相顧翕舌道旁觀者莫不太息乃轉車粟亦載釜鐎一鼓傳餐千軍共醪縱過磽舄兼履不毛畫地成井沿山生蒿壘若棋峙旗似電合九伐既濟三校咸發投石於林抽刃出柙觸車鱗碎近輻瓦裂巖谷顯漏木柴僵落譬諸泰山下壓卵石嵼土迸陷瀚海坼竭何必聲罪歸曲直責以是摘莾任彼升陵帳絶烏鳥士摧豕熊右衛聨校前軍折衝廟堂之算乃在軍中爰度梓嶺轉破苻離陳以槖駝駕之豺貔虜其人畜俘厥子妻􅀢􅀈尺寸堪此鋤夷遽收因杅翻遇軍曲男悸􅋟影女孕墮殰潛山匿水相向而哭受降之城何啻三築伊昔明祖親巡緣邉三犁王庭至飲馬川勒石天山比之燕然一沈水崖一升山巔文詞昭晳符讖不愆永清而已他何有焉獨是虞廷七旬苖格髙宗鬼方三年始克何如神武指顧頃刻歷候三月恍騁八極祗我朔暨已及祝栗蜣肱蟣胏奚足介棘惟茲方域九有以宏內偹簫勺外毖戎兵金盞弗闕玉燭以明自兹以後泰階升平皇皇八柱勒功德銘萬方齊瞻四海永清甲子紀功德頌有序翁叔元臣聞自古帝王言為尚書行為世法堯兢舜業紀盛德於勳華禹儉湯仁録鴻功於謨誥逮周官有左右史之設漢世有起居注之司日歷時政之編摩流傳彌廣石室蘭臺之撰述紀載宏多職或領於他官書必藏於柱下歷考前人之信史非無著作班班欣逄今日之成編乃出尋常萬萬欽惟我皇上天縱聖德神授英謀崇武功以靖八荒闡文德以臣六合等乾施之幬覆答坤載之靈長並日月之垂明應風雷之渙號時惟甲子歷啓上元四海無波九垓同軌俗漸登於仁夀治已進於唐虞乃猶未明求衣坐而待旦或臨民以求莫或望古而興懷或撤膳以省躬或在輿而訪道縹囊玉軸時翻甲乙之書掞藻摛華洪啓天人之祕鑾輿所至民物於焉樂康禮樂具興天地為之炳煥臣才慚珥筆欣傳宵旰之憂勤職忝載言幸紀都俞之盛美爰自春孟迄今嵗除勒為成書凡十二卷附以渺説載在篇終而又念古者臯陶歌虞奚斯頌魯皆以遊揚盛德褒讚成功臣幸列侍從之班事堯舜之主而功德不紀雅頌無聞誰之咎歟臣竊見皇上早朝晏罷夙寤晨興矢萬幾無曠之誠拒五日御門之請故天下咸知皇上之勤作頌一統禁衛而治兵射以觀德命搜田而講武安不忘危故天下咸知皇上之武作頌二省方觀俗清問遍於閭閻解網蠲租仁恩及於庶類故天下咸知皇上之惠作頌三拯黎民於昏墊精衛填流障河瀆之狂瀾哀鴻宅土故天下咸知皇上之仁作頌四崇本抑末返淳俗於區中利用厚生移澆風於南土故天下咸知皇上之儉作頌五過魯而祀孔子儒術彌光講學以訓生徒天章載錫故天下咸知皇上之敬作頌六勵氷霜之操自結主知錫繁庶之榮用嘉臣節故天下咸知皇上之明作頌七謁前代之寢園奚止歷橋山之祀命有司而維護豈徒置守冢之家故天下咸知皇上之厚作頌八睿藻天開多寄情於民隱奎章日麗或託興於山川故天下咸知皇上之文作頌九動霜露之感時詣山陵冒風雪之嚴不辭險逺故天下咸知皇上之孝作頌十頌曰惟天行健四時不忒惟皇法天自強不息勿懈於位寸隂是惜自朝不遑至於日昃德乃日新以熙庶績無怠無荒萬國來極右勤政皇矣至德聰明神武用戒不虞治兵振旅乃率三公下逮卒伍橫雲置陳考鐘伐鼓四侯如樹序賔不侮九功既成七德咸舞右聖武粵稽舜典五載時巡不惟逸豫惟以勤民我皇時邁大澤流殷納民袵席煦以陽春衢歌巷舞就日瞻雲車書同軌天下歸仁右省方在昔夏后濬畎距川六府孔修乃奏艱鮮我皇臨幸相度後先增卑培薄指示井然下逮海口治之用專民宅其居物安其天右治河人亦有言儉德之共錦繡纂組是傷女紅戒爾守土驅民於農無崇侈靡以即康功敦本息華比屋可封阜財解愠被此薰風右正俗雍雍泮宫翼翼孔廟親師釋奠崇儒論道曲蓋用章光逺有耀昌明六經張皇幽渺多士景從尚克用教萬世之師人倫之表右崇儒惟吏牧民立之師保敬爾在公不貪為寶清風灑然白日皓皓建官惟賢封廉録孝眷言存殁寵錫勸勞以風有位是則是效右奬亷緬惟明祖肇造區夏三百餘年流風代謝鼎湖龍逺樵牧其下我皇惻念愾焉命駕肅拜几筵進酒三斚敬哉抔土庶無躪藉右追祀堯稱文思舜敷文德發揮宸章淋漓潑墨馳思入神橫視八極音傳鈞奏聲被金石焜耀名山星離雲翼振古無前為萬世式右文章春秋匪懈恪恭祀事顧瞻陵寢享嘗勿替霜寒馬早風叨雪厲倍道馳行曾不知瘁永言維則是曰孝治通於神明置塞天地右上陵神功慶成頌有序顧祖榮臣聞春溫秋肅均為造化之仁武偹兵威即裕安民之略故天地之大德不外好生而帝王之逺謨尤先戡亂躋黎庶春臺之上奠宇圖磐石之安欽惟我皇上乃聖乃神允文允武日臨月照統萬國之車書雲行雨施訖八荒之聲教曩嵗威申斧鉞平三逆於遐方邇年風掃欃槍收七旗於逺磧端拱運垂裳之治世頌永清熙皥歌鼓腹之天時當大有歷考詩書所載國家稱治從無今日之承平即有天地以來方域雖遙莫非天朝之廣大乃有厄魯特噶爾丹者自恃遐荒弗恭明命初鴟張於榛莽遂鼠竊於藩籬罪合四征法難三宥我皇上仁同覆載義切包容念大軍之奮武必殪雕題鑿齒之倫倘小醜之投戈豈靳革面滌心之宥特申巽命明懸肆赦之文誰謂冥頑不悔盜兵之罪於是皇上赫然震怒躬統六師斷自乾綱親行九伐銅符虎節寧煩借箸之機宜紅粟青芻不藉開屯之方略白旄黃鉞日月生光青羽赤莖雲霞燦彩參旗河鼓開魚麗鶴陳之圖月斧星弧駕虎奮龍驤之士師行以律天效其靈甘泉湛白雪之流芳草接青天之色和風麗日行紫色之陽春青靄紅雲瞻翠華於瀚海於時狐綏膽落狼顧宵奔猶逞飄忽之蹤欲逃廣漠之野豈知聖天子料敵若神藏機於密早示龍韜之略預張兔脫之羅遇我西師斷其歸路朱旗乍指回赫日以裂春氷白刃初排駕霜飇而掃秋籜笑頑梗之陸梁幾崇朝而撲滅我皇上猶以逆賊未靖邉民弗安既當奏凱之時仍分犄角之勢旌旗相望羽檄交馳遏狡寇之奔逃扼窮荒之要害釡魚待泣豈有潛蹤幕燕就焚竟無生路逮至三冬再勤萬乘夙興旰食宸躬先軍士之勞沐雨櫛風聖體後征人而逸其時青蛇别部請效從王赤馬遐陬咸求入貢即茲醜類亦上降書而皇上察其非誠破其狡計遂以獻春之吉逺臨寧夏之區大閲師徒密分機略賀蘭山下倚天之劍氣摩空興武城邊匝地之戈鋒耀日兵威進逼已成山壓之形賊變內生豈有瓦全之計家餘孽子既束縛以成擒罪負違天遂驚惶而仰藥邉戶燃臍而雪憤荒陬拜手以歡呼從此大漠銷兵不照玉關之狼燧異方重譯豈勞鐵甲於龍沙六合澄清三靈綏奠此皆由我皇上天地不違之德智勇兼偹之神三度臨邉為生民而躬歷寒燠一年底績蕩徑寇而獨運神機立千古未建之竒開萬世無疆之業是豈殱有苖於丹水遂能並此鴻猷殪蚩尤於青邱可得符其盛業者哉臣偹員史館叨列班行雖才慚露布未隨虎旅於龍城而日近天顔得聼鐃歌於鳳闕遭逄泰運載揚喜起之風揚厲神功敬上升平之頌謹拜手稽首而獻頌曰聖皇御極德邁唐虞文明敷治神武垂謨普天之下莫不來享薰風解愠堯天擊壤蠢兹小醜弄兵潢池負恩逞逆爰整王師聖人濯征干城是輔為熊為羆鷹揚奮武風和日麗水碧莎青帝德廣運天奏神靈如霆如雷天威所指望影而奔不煩一矢大哉睿略動出萬全授機西路露布馳宣赫赫聲靈星羅雲布願效從王黑山諸部雲中經畫興武親征櫛風沐雨為爾邉氓孽子繫纓渠魁仰藥風驅電掃澄清大漠妖氛既靖神功告成垂裳而治永頌升平海宇歡呼簫韶奏美典謨載書昭垂萬祀皇清睿略神功定萬世太平頌有序楊大鶴康熙三十有六年皇帝自將討平厄魯特噶爾丹凱旋告廟武功底定左春坊左諭德臣楊大鶴謹拜手稽首揚言曰天命有德君臨天下膺籙纘圖創業垂統莫不英謀沈斷長駕逺撫戡㝎禍亂誅鋤梗頑以阜成兆民乂安九有懋建勳績顯爍炳麟聲名垂當時風美扇來葉然歷選列辟罔克純偹雖古先聖皇時事各值運會未臻不能無所遺憾自開闢迄今垂千億年穆清鑒觀篤生至聖該百王鴻業集千聖大成定萬世太平而坐理之殊尤絶迹赫聲濯靈包乾括坤至隆極盛生民以來未有如我皇上者也蓋天下甚大羣生甚衆東至若木西抵崑崙南過朱垠北越戴斗必無一隅不承流無一夫不被澤無一物不得所浸淫衍溢恩普德洋然後稱極治於古殆未嘗覩也洪荒之初紛綸草昧萬國瓜剖幅員未廣羲軒以暨夏商明聖之主雖多而職方輿圖出賦稅通貢獻者數千里地而已諸侯世封即已各自為政况要荒曠絶所云來享來王僅以虛名相結安得奉法遵軌風流令行然則治化雖隆未能溥洽也漢唐而降英主間出而因循茍安有同架漏生民狹隘熙皥無期夫上遡狉獉下迄近代不獲一日稱極治昊蒼之藴含蓄積釀和儲祉以昌期泰運待我開天立極之大聖人為自古帝王補缺略為寰海黎元圖治安為後世聖子神孫啓無疆大歷服豈不甚重矣哉是故以日月之照以雨露之恩以雷霆之威以九垓八埏之髙深以四時五行之變化悉畀我皇上兼該而并包乂用而時出而我皇上以聖德之純法天行之健以聖德之勇法天道之剛以聖量之光大含洪法天心之仁愛以聖學之推行通變法天體之周流凡所以運量於心意之間措施於政事之際天德王道合同而化綏猷斂福履中蹈和漸民以仁摩民以義惠鮮懷保樂育養恬偕斯世於蕩平納蒼生於富夀固已無地不滲漉無人不霑濡無物不滋潤矣往者三逆跳梁煽動南服廟謨指授以次削平臺灣負固嘯聚海隅王師濯征遂𨽻版宇察哈兒乘隙倡亂西陲天戈迅指即時剿絶於是琉球諸國海外曠隔之區也且遣子入侍俄羅斯諸國磧北荒邈之域也時欵塞修貢良由聖天子體天安民至誠感格故能定算廟堂而鞭笞桀驁獮剃凶頑跨滄溟以為沼苞絶漠而為苑境廓於章亥之所步力通於禹契之所書納賮效琛府無虛月輻輳並進鱗集仰流而恐後也卓哉咸五登三超纍代帝王而首出已噶爾丹者僻處遐裔獷悍矯虔與喀爾喀交相讐殺乃敢闌入近地皇上命將出師大敗之於烏瀾布通懲艾而去諭以內附昏迷不悛牽率醜徒竊踞巴顔烏喇屬藩邉塞騷動不安皇上仰揆天心俯軫民瘼深惟國家社稷之計兹乃禍魁亂階剪撲不可姑緩赫然震怒自將六師以征之閲嵗再春三臨塞外渠魁隕斃荒徼永寧方鑾輿之初出也羣臣未測睿謨交章諫沮大抵謂漠北苦寒氷霜侵爍不宜親煩至尊且荒野窮邉蹤迹無定緩則蜂屯急則鳥舉形勢寥廓未易剪除而不知皇上發謀出慮之初逆計厥終早在掌握必推鋒陷堅斬馘其徒衆然後能使之弱必扼吭據險斷絶其聲援離散其黨與召致其腹心然後能使之孤武不可以不耀謀不可以不沉計畫不可以遊移機宜不可以坐失惟威乃克惟斷乃成一人勞而億姓逸一方奠而萬邦輯豫見成效而為之無不晷候應而符節同者夫使六龍不行惟遣將帥即壯武如衛霍豈能一旦奏功皇上所以躬率羽林櫛風沐雨左屬平亂之鞬右握滅逆之矢鸛鵝熊羆千乘萬隊鐵馬金甲噴山欱野直抵窟穴揚兵拖諾山賊渠見軍容焜煌自天而下相擕潰竄不敢抗我顔行而我以正兵攻以竒兵伏右翼之帥邀而擊之斬首無算僵尸若陵賊僅隻身幸脫始知天子威靈之不可犯也自春徂夏八十餘日而戰功成非天下之至勇其孰能與於此逮戰勝之餘倘姑務休息致彼裒凶鞠頑終貽後慮皇上所以凌冬辦寒西巡朔方至鄂爾多斯相度形勢布置方略近邉厄塞分兵戍屯斷其乞援之路西北區落遍示恩信絶其唇齒之望賊飢無所得食謀劫餉車又為我軍摧敗其黨方內携且聞皇朝寬大招撫降人給之祿秩靡不稽顙厥角爭先輸欵噶爾丹亦惶懼請降而中懷猶豫我皇察知情偽遣使以覘之麾軍以逼之賊已在羈絡檻穽中而未能覺悟也非天下之至哲其孰能與于此賊勢已蹙或謂創殘餘衆無足措意不知一日縱敵數世之患安邉靖民豈恤况瘁皇上所以飈馳電發復巡河湟自雲代以抵銀夏駐驛狼居胥山乘春和草生命將分道深入天聲丕振武節逺耀塞外遐國請受纓縻哈密擒獻其孽子賊已巢傾卵破延命刻漏而其族屬親信並皆歸附天朝方將推刃狼頭剚鋒豕腹噶爾丹貫盈數盡服毒自裁而厄魯特部落殄絶無遺類一年之內殱此巨寇域滅區殫勢同破竹非天下之至神其孰能與於此臣嘗質之詩書考之傳記軒轅逐葷粥伊耆蕩丹浦虞帝征有苖夏后戮防風殷髙宗克鬼方周宣王伐玁狁漢斬郅支唐擒頡利雖皆威績顯著擅美前録而我皇上親征絶域指顧廓清刻銘於瀚海天山置吏於龍沙鹿塞功與古齊而神武過之臣所謂該百王之鴻業者此也稱堯者曰欽明允恭聖神文武稱舜者曰濬哲文明溫恭允塞稱禹者曰克勤克儉不自滿假稱湯者曰智勇天錫寬仁彰信稱文王者曰亹亹翼翼日昃不遑稱武王者曰不泄不忘執競無競我皇上法宮宵衣丹扆聼政道隆德偹罔有缺遺而當此仗旄秉鉞除殘遏暴之時休有烈光兼具諸美臣所謂集千聖之大成者此也古來治日常少三苖荆楚叛服無常三代而前每多警戒周家甫定洛邑而多方即迪屢不靖漢氏數百年與胸奴相終始唐突厥吐蕃回紇更盛迭衰卒為邉患息兵之難蓋如此至我皇上今日而後敷天敉寧可永永不見兵革櫜弓釁甲歸馬放牛四方萬國莫不率俾寸地尺天盡皆入貢東漸西被北變南諧航浮索引之區火山水寓之域沐浴膏澤同仁一視發號出令而海裔承德意諭色授而寰表趨風協氣橫流休徵踵至白環銀甕山輿澤馬獨角三脊華平朱草方將紛紜絡繹以告金繩玳檢之符顯號榮名閎休偉績詎止並轍齊軌於七十二君而已哉臣所謂定萬世之太平而坐理之者此也夫頌者美盛德之形容以其成功告於神明者也茲當豐功耆定振旅班師開邸獻俘告祀郊廟下寬大之詔宣浩蕩之恩賞禁旅之勤勞恤邊民之供億扇仁風以諧九宇矢文德以洽四國銷金罷刃雲潤星暉暇豫優遊作樂崇德正宜咏神聖功鋪張揚厲播諸管絃鐘鼓以薦馨香臣珥筆禁林職司紀載不揣庸虗謹撰聖清睿略神功定萬世太平頌一篇以獻文義蕪淺不任悚惶其辭曰天生聖人為萬民主首出庶物如日當午天生至聖為羣聖宗首冠帝王與天比崇溯邃古初以迄近代厯服遞承垂千萬載昌期難叶上理誰臻山區海澨喁企鴻鈞篤生我皇德兼列聖立天地心立生人命版圖式廓軼漠踰沙八荒我闥六合為家仁育羣生義征不譓為國興利為民除害剪是三蘖奠此鯨波年豐人樂府修事和祝栗濮鉛西王日下懸度繩行山梯海架獻琛內府貢玉天朝驗風受吏九譯迢遙日照月臨雲行雨施動植飛濳熙熙盛世蠢兹小醜獨背太陽性惟慓狡質本跳踉黃磧引弓黑山候月豺牙自磨鴟翼竊發根株隱伏卵育滋蕃禍心叵測規煽我邊我邉如何屬國萬里櫛比魚鱗軍若臂指諸藩部落等內地民載撫載育痌瘝一身孰容汝姦逞凶肆毒爰軫皇慈整軍大僇白旄黃鉞自將親征告廟宜社雷動天行金甲雕戈龍旗日羽百萬王師熊羆貙虎直壓賊巢逼使竄奔潛軍截擊揮刀紛紜雨血風毛膏赤原野網一面開以待降者渠魁瑟縮罪重如山屢賜恩言彼昏卒頑戮梟斫鯢勢不留種匪違好生慮復騷動遂勤六飛載臨朔陲竒謀萬端深祕莫窺招徠叛徒推誠布信咸輸欵誠內首順命屯兵要害左遮右邀賊飢且窮尚希幸逃西北遐荒諸部星列昔與汝通今歸盛德外援路絶同惡情携魚遊沸鼎鳥寄危枝韎韐三臨河湟之表因利乘便天戈亟剿狼胥􅏭嶫御帳攸營分麾兩道深入北庭封狐將擒乳麛早捕膽落魂悸自罹顛仆泰山壓卵炎火燎毛詎有寸垤以存汝曹戈於汝喉斧於汝頸汝先仰藥職汝之幸凶渠既斃厥黨咸歸屈膝稽顙降附纍纍西荒之西北荒之北土設田官亭開戍卒自初禡纛暨今凱旋役僅三舉期惟一年殄滅妖氛按時剋日寰宇升平溥天寧謐我皇大智如鏡斯懸鑒遐燭暗洞在目前我皇大勇如霆斯擊積鐵俱摧重巖盡裂我皇大仁如日斯春既溫且煦窮塞欣欣厚澤釀膏周匝天壤殛凶靖良生息休飬伊古堯舜暨周漢唐孰綏絶幕如中土疆萬世太平自今伊始纍洽重熙久安長治御門受賀奏凱陳俘謳吟塞路簫鐃載塗渙汗聿頒絲綸廣被湛露蓼蕭羣芳浸漬靈臺偃革天河洗兵車書禮樂文物聲名道藪彌恢儒林益廣五緯光聨六符階朗般般之獸濯濯之麟遊郊集圃樂我皇仁端拱明堂升中岱嶽休烈豐功輝煌顯爍帝王極盛萬古一人皇哉唐哉文武聖神聖德神功告成大慶頌有序韓菼皇帝誕保萬民迭用五材徂征逆命俾殄絶無遺育以寧中外甫二載三臨絶漠而大告武成先是師之初出也大破厄魯特於昭木多之地噶爾丹遁走既班師命大將留喀倫宿徑旅肅州猶頒旨以好生之德不遐遺於叛人許其自新開示以丹青之信慮賊畏罪蓄縮或奔逸求援他部乃戒諸將列據要害遮防由是賊黨益散勢益蹙皇帝曰時不可失莠之不薅而蘖是牙其不足復留種乃於九月復發京師渡河至鄂爾多斯申布天威來者赦後者誅餘賊震怖來降不絶其間道乞憐於同惡者所在亭障要遮無一線通悉就擒始賊飢困甚瞷我餘糧在道遣其親信將丹濟喇等蒙死徼幸一犯顔行復大敗走至是其台吉寨桑人等皆來歸噶爾丹亦遣格罍沽英齎奏乞降皇帝曰吁是非欵誠特冀緩須臾死不可以縱乃留禁旅駐牧大同期明年春進兵三十六年二月車駕復發京師次大同命諸將取道塞外皇帝巡行緣邉城堡哈密生擒噶爾丹子獻行在三月至寧夏諸將皆會皇帝大閲士馬指授方略進次狼居胥山喇麻諦巴遣使來謝罪瑚瑚腦爾台吉濟農等奏請朝貢丹濟喇及其黨俱輸誠納欵噶爾丹脫逃無所欲面縛恨晚自知旦夕誅乃於閏三月癸已仰藥死厄魯特亡始賊橫行諸部無與抗者我師致討滅不旋踵西北絶塞數千里自上世所不臣之國無不讋以服蓋自初出師以至於今皆稟廟謨受成算兵出於不得已而後動機乘於不可失而即行遂乃從天降而若神趣師期而不老涉地角河源之逺如履戶庭逐鳥獸飄忽之蹤如就羈馽納七旗數十萬流移之口歡若忘亡收千二百有餘徼外之城完如歸璧䇿狡詐之情而運諸掌握奏剋期之功而捷於聲響皇哉唐哉於鑠駿厖古未之有也六師順動義切同仇超距投石踴躍用命而詔書屢諭大帥以下軍士良苦餉惟額惟時毋私囊槖於其衣服飲食蓋不待勞之於還役之後與出車之時要為千萬世飬兵不用而厚其力以作其氣者胥不可以怠至於膏澤在民滲液瀝漉何歲不育及乘輿出幸尤加惠無已所過蠲田租一年以優其勞供億儲偫一無所與復為之咨穴居沙磧之苦樂陂池水泉之饒且時進父老子弟與謀農桑衣食之原勗以詩書經術之誼而又深慮吏治淆濁或德意壅於下逮殷勤惻怛惄然於懷在易有之地中有水師君子以容民畜衆皇帝在師中有容畜之道焉師也通於井矣井飬而不窮也井收而勿幕也繼自今薄海罔有內外元元萬民若一家子乃至跂行喙息蠕動之類莫不咸若長治久安豈有窮極唐哉皇哉湛恩愷澤又未之有也大功赫濯大德光昭鴻號顯名匪賔伊實羣臣拜揚萬邦燕喜皇帝謙讓却而弗居神禹之不矜不伐帝堯之無怠無荒結自聖心映流竹素渾功名於無迹如天之何言履泰豫而自強如天之不已斯尤已治長治已安愈安之大原大本足為億萬斯年無疆之大慶臣菼至陋誠不足比於管窺蠡測顧忭躍不勝同於率舞謹綴述自鑾輿再駕以來非常可紀之大者不自揣其挂一漏萬復貢頌十章章十六句以足成前歌妄托於古賡載之義頌曰層氷萬里峨峨雪白玁狁之故皇帝北伐流沙不毛若蟻若蜂玁狁之故皇帝自東寒暑載離匪棘匪紓祗為民勞不遑啓居鋤彼頑梗一我車書功成於今握勝在初一章稽古師行尚矣軒轅大風青邱厥績爛然綘囊玉帳其書不傳皇帝將兵天授非人一心運用如環無端無敵為經不測為權事後皆服借箸誰前一張一弛九地九天二章我車我馬載驅載馳次於興州會師月支呼衍須卜骨都谷蠡乞活稽首棄其撑犁瓜沙是來獻其屠耆三十六國往來羈縻今我玉帛逖矣譯鞮蔥嶺以北王關之西三章登狼居胥慨然思古不封不禪如我梁父空洞雞頭訪道何所白雲間之精神告語惟整惟暇晏然樽俎彼昏乍覺敢汚齊斧獸斃於檻魚爛於釡欃槍氛掃廓我天宇四章降不勝城山不勝銘大荒西北不吠不鳴弭節而旋大禮慶成告於皇天河嶽百靈對於三后福嘏用增寧夀東朝尊飬倍榮瑶函寶册敬上徽稱陛下萬年大莫能名五章大而能化皇帝乃聖睿智通明珠囊玉鏡是用大介罔干豫正大謀大猷畫然定命皇帝曰吁豫惟執競莫之或斁莫或不敬萬國以寧一夫猶病好風好雨豫其勤政六章聖不可知皇帝乃神有作物覩如日而雲祗今肅殺以布我春昊天四府一氣洪鈞皇帝曰吁事當盡人性與天道未之敢聞不識不知莫匪我身日用飲食子其乂民七章赫斯一怒皇帝乃武往平諸叛功難悉數今遏亂略渠魁是取餘不一問黨者歌舞皇帝曰吁受天之祜軍士大夫亦克具舉方語爪牙戒以祈父方念征人傷以杕杜八章明明令聞皇帝乃文往敷德教大化絪緼今偃武功鼓鐘於論脫劍明堂蔚我虎賁皇帝曰吁勿兹啍啍民猶未厚吏猶未勤豫欲勸歌待謨於鄰豫欲敷言佇範之陳九章窮髙測深竭羣臣愚聖心萬有不加贏餘肫然至誠穆然太虛中外斷章抑而未舒放勳重華史筆如圖請開玉局請論石渠兩年始末萬祀典謨斯詎能辭光我寶書十章幸闕里頌冇序陳廷敬皇帝康熙之二十有三年是嵗甲子東巡狩謁孔子林廟先事皇帝曰事先師禮重且嚴汝廷敬實惟豫舊講臣其與議所宜行臣從諸臣後議具上詔曰俞及恭覩禮成臣不勝歡忭震躍仰惟皇上聖神首出化洽萬邦君師之統千祀一時乃猶屈已求賢詢輿訪道廣厦細旃之上册書精研勤逾儒素遐瞻東魯慨想宣尼希代曠古前未有也其時三事大夫揚言曰昔者刻玉遊河披圖巡雒襄壄之駕塗山之會皆能焜耀簡籍垂於方來今兹萬國既同誠宜宣省風教展義魯邦下塞衆望皇上凝睿思延廷問久之乃曰朕慕聖道歷久於兹敬因省方詣先師宅里其毋重煩吾民供億於是肆赦軫農蠲租已責𢎞敷愷澤於天下乃歷吉日協靈辰壄廬警路宫正設蹕玉輿曉升帷殿夕御前驅朱旗屬車日羽以臨乎岱宗是時未轃夫闕里也飛斾江淮觀民設教月屆黃鐘旋軫南陸聿來聖居覽觀山川雲物廟寢圖書之盛嚴恭將事禮行樂奏聖歆如答臣廷敬雖不得偹從官之列緬懷宫墻逖稽掌故太牢特祀肇自西京褒成裸將爰及東漢貞觀定朝會之儀開元錫文宣之號器物之賜渥於廣順陪位之班詔始祥符至和加衍聖之稱承安始曲阜之令凡為崇儒重道是以異代同符若我皇上崇聖重道萬世師表之稱則與乾坤同其悠久也六經表章之澤則與日月並其光華也留鳳蓋於戟門車服禮器所未偹也頒龍章於鄉校普天率土所共瞻也矞矞皇皇莫與京矣頌曰惟聖體道生民拔萃德踰位兮惟帝則聖統一萬類位斯配兮龍飛於天周覽八極嘉鳳德兮聖作物覩垂祀萬億視魯國兮帝開明堂于羮于牆坐則見兮帝會方嶽東西南朔來殷薦兮鑾車戾止鏘鏘穆穆金絲肅兮駐蹕古亭雲霞委屬清泉澓兮上公稽首籩豆奔走昭世守兮暨四姓後博士童耉恩滂厚兮賜所過租歌騰于塗惠我人兮惟帝福我我神其妥戴大君兮莘莘髦士百爾濟濟頌聲美兮於赫帝功與天比崇無終窮兮幸魯頌有序陳元龍嵗當甲子會合貞元六宇升平八埏底定皇上睿周四海念切羣生乃於是嵗之冬肇舉時巡之典燔柴肆覲名山增日觀之輝省斂採風蔀屋散春臺之澤恩膏斯溥典禮用成法駕南還星旄北指歷奎婁之野近聖人之居皇上雅尚崇儒虛懷重道髙山儼在仰止惟殷駕言徂東爰至於魯鸞旗風動煙嵐繚繞於綢杠羽蓋香浮草木葳蕤於繡紱負洙面泗素王闡道之區鳳翥麟遊先聖發祥之地越舍郊而齊宿始有事於質明入歸德之門閟宮伊邇瞻大成之廟靈殿巋然一人肅穆以天行百辟森環而星從禮隆釋菜兩楹供芹藻之馨樂奏迎神六合偹宮懸之曲因師而屈修降拜於壇墀為道而恭攝衣裳於階陛覩山河之異彩恍覿音容接堯禹之天姿若親揖讓於是過燕申之室登詩禮之堂劍佩鳬趨章縫麟次臯比獨設具講席之隆儀緗帙初陳發韋編之大義遂傳觀舊迹歷覽遺蹤硯几班稠車琴制古雷尊犧象縱橫禮樂之藏漆簡竹書隱約金絲之奏杏壇無樹曲欄空文甃之華檜植餘根左紐作青銅之色觀川波逝尚立空亭習射圃荒猶留故井天語咨詢者屢矣皇情眷戀者久之巳而泝沂水之陽問昌平之墓鳥禽知敬望彩斾而髙飛荆棘避訶近雕輪而欲却樹封四尺見堂斧之崇髙昭穆三壇表神靈之奠麗尋設裀而展謁更駐輦以徘徊尋先賢築室之場惟捫古楷問昔后停車之地更讀殘碑遂乃旋轡郊原回鑾上序天顔霽懌睿藻紛披四韻鏗鏘琢玉追金之句數行璀璨銀鈎鐡畫之書方誇宸翰之頒更荷殊恩之賜曲莖羽葆分仙仗於中階文綺金貂賁溫綸於甲第土田加錫租賦頻蠲辟雍施帳而傳經譽髦彈冠而結綬異數均沾乎四氏隆恩旁及於諸姬且也銀榜髙懸御墨煥虬螭之彩貞珉載勒天章鐫贔屭之文頡字龍盤羲圖馬負永作中天之旦彌增秋日之輝信其偉而敻乎盛矣粵稽史籍代有褒崇不乏美談迄多遺議漢髙親祀安事詩書光武駕臨時崇讖緯開元有詣宅之祭道舉貽譏祥符留駐蹕之亭天書獲誚儀文偹矣實效闕焉惟我皇上徇齊天縱不恃生知遜志敏求惟勤好古研索闡圖疇之祕表章傳述作之心聖學精矣雕戈初偃木鐸彌宣返華靡於淳朴却登封而謙讓操觚童子知斥異端挾册小儒能嗤雜霸聖治洽矣寤寐性天依晰仁義陶鑄百王之禮樂紹接千聖之心源聞見相承後先同揆聖功懋矣而且日昃不遑望道未見欽聖枉七騶之駕隆師屈萬乘之尊仰倣惟殷覲宫墻而如遇步趨罔間接薪火以相傳固已親炙其精微豈特暫窺夫堂奧况乎復發天葩之藻河洛遜其苞符揚奎壁之華星雲資其糾縵尤足甄謨陶典駕古鑠今洵開闢之鴻庥皇王之極軌也臣菰蘆下走弇陋鄙儒欣盛典之遭逄光榮莫並壯斯文之炳蔚統緒常新蠡測管窺竊自愧於濡毫之列衢歌戶頌不敢後於含氣之儔頌曰於皇我后建極用中文謨武烈景鑠有融至治蒸洽九域既同匪功是伐惟道斯崇其道維何生民之始列聖相承幾希而已王風寢熄微言中圯天拯頽綱篤生夫子奎婁之精海岱之靈乃傳一貫乃定六經身雖潛晦吾道則明皇王萬世是憲是程帝念尼山精微之府企懷聖風表厥疆土洙泗一區靈光終古駕方東巡爰稅於魯防山匪髙誕聖則尊沂水匪深育粹則神鸞旗淠淠玉車轔轔百辟咸從瞻望清塵閟宫巍峩天地同壽我皇至止言獻其茒登降益虔循牆而走豈曰為恭隆師惟厚隆禮維何言登其堂諸生濟濟説經琅琅咨訪遺迹故府所藏有服有器有圖有章爰有靈柯先聖所植摩挲文理緬懷手澤鬱鬱松楸陟彼林域神風肅然駐輦憩息典禮既崇恩膏斯被帝錫上公土田每每繡衣赤舄貂冠文綺洽我宗支遂及四氏倬彼雲日敷藻自天煌煌謨訓有光熊然既追既琢琬琰是鐫屹立階墄炳煥萬年聖道明明長夜方旦我皇體之秋陽彌燦百家騰躍風雨散渙大義昭揭如濯江漢惟皇偹道參二兩儀駕姚軼姒追軒躡羲刪述而後統在聞知此心此理默契者微若火與薪相遇斯接若水與乳注投斯合入室僾然肸蠁如答端拜一堂後先合轍雖有象魏不如鼓鐘雖有郵傳不如德風依仁蹈義四方景從教思用溥文治彌隆濟水洋洋泰宇嶽嶽俎豆常馨宫墻儼若化協珠囊道隆木鐸漸被奕祀頌聲是作聖德同天頌有序勵杜訥欽惟我皇上好生至德篤於天懷髙拱九重則慮周薄海時巡六服則清問下民惟恐一夫不被其澤一物不得其所勤拳懇摯求所以安全而利濟之者固無微不至是以湛恩淪洽於寰中聲教暨訖於域外舉凡梯山航海來王來享之邦靡不仰沐仁風同遊化日矣惟喀爾喀部僻處蒙古遐陬七旗族屬實繁有徒不能和協日尋干戈皇上惻然軫念曰是雖荒逺顓蒙亦在胞與之內安忍膜外置之爰遣重臣諭令親睦猶不知悛至於挫衄乃感鏤帝德肅戴天威於時嚮化歸誠者凡數十餘萬請附四十九旗同列藩服詔畀土田畜粟俾得寧處樂生雖顧復恩勤何以加焉洎慮其素無紀綱不由法度為之設官制刑以及賞罰事宜胥待聖衷裁定用是法駕親臨歡聲動地羽林星列禁旅雲從喀爾喀等自王以下咸於行殿匍匐稽顙朝見如儀爰賜大宴大賚受恩感激至於涕零復論功以次錫封一二姑存舊秩餘則寵以王爵遞至台吉下逮族屬悉付所司區别舉行甚曠典也仍頒敕諭訓迪肫誠務期謹度蒙庥勿罹罪戾仰維天澤既已稠渥規畫更極周詳是皆我皇上愛育生全之盛心韞於中而不容自已爾夫以數十年未附之國悉𨽻藩臣數十萬來歸之衆遽歌樂土偉烈𢎞仁炳麟霄壤洵足篤福祚於無疆為敷天所同慶也臣叨際昌期欣逄盛事謹稽首頓首而獻頌曰惟天廣運覆冒無垠惟聖承天懷保斯民八紘九有沐浴深仁獻琛貢賮服教畏神繄彼西鄙僅云革面族屬自殘誓言屢變離析來歸乃膺渥眷安之集之爰處爰居飲之食之以贏以餘聿登袵席其樂只且數十萬衆誠悃競輸帝念逺人曷忍遐棄總總林林亟煩調劑用設專官為之統繫用列科條為之節制騰歡額手願覲吾君延頸跂足楓陛攸聞軫懷向化爰飭六軍翠華葆羽逺臨紫塞甘雨滂沱霱雲靉靆載路嵩呼趨迎行在幔城𢎞敞帳殿巍峩周廬環布仙仗交羅龍驤虎旅焜耀山阿名王部長蒲伏戟門張筵式宴錫以上樽耄年扶杖雪涕銜恩便蕃德意大賚寵頒章服赫奕錦綺斒斕分圭賜爵封拜崇班巽命重申俾同藩服訓諭載宣永保爾祿字裏行間靄然肫篤仁至義盡於惟我皇興滅繼絶豫之土疆圖維善始終焉允臧歷稽載籍至德莫京登三咸五福極寰瀛同符蒼昊蕩蕩難名皇清文頴卷三十四
