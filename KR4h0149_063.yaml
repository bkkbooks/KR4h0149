body:
  text: 詩七言古詩澄海樓孫在豐長城壓山山倒海海樓直倚天山外飛梁浮柱俯十洲憑虛凌空小兩大􅛡佹壁立結構牢天風萬里嘯海濤吹落人間萬古月簸清天上一秋毫十二玉闌足恐失茫茫愁思海天溢須臾千頃琉璃堆蕩􅠞無垠蛟龍窟伊古未鑿混沌初此水原從無時無一勺歘焉浸六合天輪地軸轉相扶蓬萊清淺方朝暮碧桃花開春幾度只見扶桑析木東年年不向東流住三山宛然我舊逰秦皇昔日常相求對面蒼蒼烟霧裡滄波滅沒空回舟銀臺金闕亦何有衛叔卿今無恙否回頭一别三千年雙挾青龍猶在手碧城高與海天齊飛蜃為樓雲作梯虛窗玊女天吳接浴日吐月生虹霓誰云九州大但覺五嶽低我來澄海樓頭望一㸃浮萍東海西一片石王師殄流寇從一片石驅入山海關盡殱之城下孫在豐一片石燕關左海茫茫土膴膴請從石上紀神功神功開闢無前古眀季政不綱中原坐愁苦已灰漢室東西京猶守甘陵南北部黃巾羣盜竪如毛銅盤仙人泣如雨蒼黃天地暗烟塵天下嗸嗸呼父母呼父母得我所四海一聲后來蘇待起瘡痍手摩撫此時妖氛正滿山此日指麾安率土虎旅迅於風鴻毛燎於火二十萬級血成流三百年中氣為吐片石落欃槍八方行案堵聖人出萬物睹時雨耕耘在野深重熙干羽當階舞鳯吹律兮響雲門麟遊郊兮茁芝圃海之澨山之藪河之源江之浦詠歌沐浴兮億萬年銘功此石兮天為補登封白玉之牒不勝鐫七十二家安足數壬午三月二十九日禁中侍觀宸翰賜御題清芬堂匾額紀恩歌胡㑹恩祥風甘雨青郊遍天子端居紫宸殿晝漏舒長淑景融麥秋佳氣迎芳甸都城東南岱嶽宫長養萬物惟神功落成清廟隆秩祀璇題繡榜宜加崇瓊箋疊雪宸章耀結構如椽風格妙千鈞筆力透中鋒萬㸃墨花霏四照賜觀中禁集儒臣仰矚奎躔頌日新金薤銀鈎超亘古晉唐以下空紛綸承命濡豪汗流背敢乞天文豁蒙昧蓬茅儻得被春暉㸃畫常如親帝誨宫門俄頃拜恩殊七臣各獲三驪珠蚪龍蟠結滄海潤雲日煥爛光天敷體法森嚴神肅穆彤墀捧展開心目元氣融和精理充吾皇萬夀於斯卜鸞綾砑玊映琳琅芝泥穗篆增輝煌此時邸舍天香滿他日田廬聖澤長曩參扈從曽霑賜回首門閭題寶字清班還得誦清芬直為微臣表家世矢竭涓埃報稱難撫躬尸素愧當官焚香晨夕瞻天近咫尺榮光奕葉看敬擬七德九功舞歌效白居易體有序翁叔元康熙二十年十月官軍收滇南海內底定十一月宣捷午門十二月頒詔中外與天下更始隨允羣臣請恭上太皇太后皇太后徽號復布告天下澤逮臣庶歡動區宇大哉休烈巍巍煌煌充滿天地近古以來所未有也臣伏惟我皇上義征不譓仁育羣生獨運神謀式遏亂略殱渠魁如霓掃破凶黨若冰離八載憂勞一戎耆定武功偉矣布行慶施惠之文下尚德緩刑之令展孝思而錫類觀人文以化成綱紀宣昭聲教暨訖文德敷矣粵稽古者治定功成必播之聲詩形之律吕以發揚鴻休總章簫韶之奏遐哉尚矣近考唐宗亦有文德武功之舞武曰七德文曰九功而唐臣白居易作為詩歌傳示後世臣不文敬擬其詞為七德九功舞歌一篇凡八十句五百五十八字以獻未敢附風雅之遺聊以備瞽曚之誦云爾七德舞九功舞武緯文經耀千古朝廷干羽在兩階天下車書盡九土我皇御極垂衣裳四方萬國來享王自朝乃至日中昃堯兢舜業不敢康為念斯民亦勞止丹詔夕封馳萬里咨爾強藩且載戈釋甲歸來見天子苞有三蘖方憑陵一朝敢弄潢池兵蕩搖滇黔連楚蜀䖍劉閩粵驅鯢鯨驛聞天子赫斯怒皇言一宣天日午誓將滅此後朝食取彼凶殘畀豺虎臨軒命將親推轂中有天潢建牙纛日射春旗萬馬鳴雲開曉帳千軍肅一從荆鄂向三湘一自江州下豫章西指秦川臨劍閣南經吳越渡錢塘王師所至如風電合圍掩羣開一面狼奔鼠竄皆倒戈市肆不驚藝不變王師所至多謠頌行者願齎居者送天語殷勤再四宣毋令南畝妨春種一年轉戰雍梁間二年克敵威荆蠻三年掃清甌與越一鼓遂進仙霞關四年官軍收閩地逆臣稽首歸藩位五年賊渠死嶽陽六年百粵胥置吏七年一舉入成都夾擊東西疾渡瀘八年蕩掃昆明穴普天率土歸皇圖羽騎宵馳傳露布從此江山復如故侍臣拜手賀升平武士鳴鐃歌大濩我皇恭已開眀堂木鳯銜書下八方嘉與吾民共休息欲偕斯世為陶唐思齊太任及太姒翼子貽孫既受祉恭上徽音萬國歡再沛恩綸與更始昔時民間苦被兵鳥烏聲樂多荒城今日言旋復邦族閭里不聞愁嘆聲昔時民間苦征役男子輟耕婦休織今日公家免踐更鼓腹行歌仍作息欃槍滅迹三階平我皇宵旰猶未寧手披目覽釐庶績早朝晏罷勤蒼生天縱聰眀兼聖學研精書史窮邱索著述開天冠百王四海文眀生禮樂舞七德舞九功虞廷之琴歌南風願令世世陳王業王業艱難萬古同敬瞻御書河南四大匾額恭紀沈涵聖人御厯寰宇寧岱宗河海皆告成闕里尊崇志巨典禹陵秩祀騰休聲矧兹豫域去天咫百靈望幸能無情嵩山巍巍峙中極三臺二室凌蒼冥淮流溯源自桐柏禹績千載猶輝宏孟氏功不在禹下遊梁遺蹟存丹楹中州撫臣從衆欲一一修飭同崢嶸稽首奉章進紫殿乞賜懸額標髙閎詔簡璇題十六字揮灑仍命諸在廷字形濶大越尋丈衆臣操筆皆悚儜金丹換骨苦無術閉户纍日窮心旌書成進御數十幅瘦者犖確肥彭亨縱有姿態失程度豈堪照耀八州氓僉伏楯陛不肯起願覩聖藻豁聾盲至尊謙抑顧未許謂豫翰墨非専營萬幾總攬常日昃奚暇肆力加研精反覆申奏始得請凝神端拱在穆清薰風畫永握珊管墨海吸盡蛟螭騰轟雷駭電悉奔赴一筆橫掃萬象呈須臾硬黃天上落光彩翕赩舉眼驚縮首咋舌敢仰視久之髣佛見精英屹如喬嶽鎮厚土壯如巨靈劈重坪縈如瀾回復淵瀦端如佩玉垂簪纓元氣流行四時偹詎有一美能専名禹皇岣嶁久茫昧漢帝草聖同勾萌唐宗御書最超絶世南戈法猶仰承我皇筆力跨萬古後者無偶前無爭不獨法程垂奕代共占福祉綿蒼生神完力厚天所賦聖壽聖祚皆永貞遙知金榜髙懸處嶽擁河趨鞏玉京喜雨詩曹鑑倫孟夏之月日在畢赤騮朱輅臨天衢帝念農功急甘雨麥秋將至思沾濡紫宸一德契真宰精心密禱感應符興雲泄霧遍嶽瀆萬靈受職爭馳驅造車砰雷出奮迅投壺笑電紛歡娛千山得勢動鱗甲百泉發響酣笙竽飛甘灑潤散膏澤石燕翔舞羣龍趨來牟接畛沐優渥溟濛一氣連朝晡黃雲翠浪浩無際郊原眀秀儼畫圖緑蓑青笠治田具野人擊壤傳歌呼漁陽兩岐安足喜姑臧九穗徒區區胞與在宥澤萬物頻年有詔勤蠲租為民請命抱至意勸農祈榖嚴春雩肅然有請得嘉澍普天如賜玊與珠含桃未薦蠶事偹以彘嘗麥樂且需芝房寶鼎不為瑞矞雲湛露方昭蘇小臣珥筆殿陛側伏聞民事勞訏謨休徴肅乂備洪範仰見皇極天人孚三十六雨周嵗足屢豐大有多黍稌薰風長被垂裳治阜財解愠曕唐虞石鼓歌吳苑辟雍鐘鼓羅俊竒忝臨六館重臯比廟楹灑掃釋菜畢顧視石鼓環廡墀彭亨菌蠢數盈十刻畫文字符鼎彜文百二行字五百從甲至癸完無遺始終紀述漁狩事中載䇿命諸臣詞細文淺刻堅且好閲三千載光娥羲曽經缺齧受風雨豈用蟠負承鼇螭韋韓二蘇染大筆助流寶氣長赫曦周宣王時史籀作車攻吉日堪肩隨篇章排比類吉甫體源質古超相斯誰何小儒恣評駁不究根本多然疑先秦西魏駕空說嗤㸃欲使成瘢疷自來神物多隱見晚出往往千秋垂周官左氏佑六籍卯金専門叢詆諆至今首冠甲乙庫儒生穮蓘如畬菑撫兹鼓質最龎厚雕琢山骨窮㕒厜雍城城南久托迹蛟鼉鸞鳯藏瓌姿辭嚴義密難諷讀句竒語重誰思維鴻生巨學茫不識任春烟鎖秋風吹縱敲牧火礪牛角却免摹搨傷皮肌譬如深山石犖確嵗月久逺無成虧文王紐在禹追蝕其故豈屬聲音為自唐迄今始的皪日星雲漢光天逵髙駝巨艦凡四徙終然碁置文宣祠百靈呵護神作合傳萬萬世遐無期方今天子闡絶學玉函金版皆翻披詎惟瑰辭追雅頌直使鐵畫侔繇芝黼帷丹扆多制作慶雲五色紛葳蕤黃皮烏弋逺受吏海外來學航于兹峩峩髦士拂芹茆軌度肅整趨委蛇聖謨文治四洋溢浩蕩匼匝無津涯講搜前制載編牒或按周典揚戈麾威靈宣暢讋函夏秀弓彤矢斑陸離從臣才藝敢誇詡稽首拜獻成功詩天球琳琅刻金石潤色鴻業攀姚媯炳麟煌煒照六合焯然此事有職司研搜故實更參考名為石鼓良乖宜建康天發石三截暨禹岣嶁堪旁推石形似鼓制非鼓狥迹忘本差毫釐摩挲倣佛古人意定作閲武岐陽碑古柏行元祭酒許衡手植吳苑夫子廟柏數十株託根自與尋常殊霜實時時垂玉琲風枝往往鳴笙竽含貞挺節亭亭竦儼如冠劍森相拱小者猶留十數圍交柯屈鐵烟濤湧一株參天勢更竒鬱蟠元氣何淋漓摩挲嵗月猶可識許公手植非傳疑蛟龍攫拏雷雨作黛色翻從半空落斑鱗㸃盡秋後霜百片青銅光灼爍新甫山頭樵徑封武侯祠堂碧草叢西川東魯逺莫致何由突兀撐晴空當年元儒推第一遺經辛苦窮編葺嘉樹栽培用意深周模孔楷千秋則至今偃蓋拂雲端雍容子弟趨盤桓豈徒材大資梁棟直欲香清集鳯鸞君不見上林崇臺千尺髙青棠赤椑皆凌霄若論嵗寒卓堅骨坐使萬木慚丰標雍池管領真遭際南榮嵗嵗涵蔥翠蒼幹櫺門映日寒素華璧水縈波細攀枝摘葉有所思六館三舍應爾師豫章七年人始知不然丹漆將安施江西試事畢過廬山白鹿洞謁禮聖殿敬瞻御筆學達性天匾額復登御書閣觀頒貯經史恭紀長歌陸肻堂大江東流波渺茫忽插廬阜橫髙蒼層巒復嶂四圍合靈境每向煙蘿藏後屏山南洞門闢百間廣厦森開張斷樵旁鎖白鶴觀飛瀑直下犀牛塘使車弭節少游憩未暇石竇窺雲房摳衣端拜禮聖殿擘窠樿榜懸宸章霞蒸霧蔚四大字星垣奎壁天煌煌蛟龍岌纒有餘勢中峰琢出璆琳琅韋王局縮暗無色豈與宋代論蘇黃瓊霄綈几時揮翰遍頒州邑顔宫墻山扉僻左荷球璧風勵學子誠難量有如太陽照六合奧區纎隙皆東暘地靈呵護百神守聖蹟萬祀傳無疆小臣瞻仰正親切此都人士來升堂聚觀玉皇香案吏思以典記提相商御書閣上甲乙庫緘縢扄鐍蒙縑緗委宛金函羽陵䇿天家石室儒生倉探源星海歸渤澥要搜派别分條綱當年諫議此韜迹學成望重如鸞凰江州領羣憶舊隱築臺看鹿花環廊宋淳熙末考亭至訪求遺趾山之陽臥龍岡頭石齒齒小三峽口流湯湯風泉雲壑絶佳處弟子十四同徜徉哦詩作賦日不輟雅歌餘韻猶繞梁葩流文采逺輝映皴霞釀露填奚囊從來大儒有實學鼓吹六藝逾笙簧至今鑱石錯真𨽻銀鈎鐵畫霏寶光橋亭碑碣帶烟雨苔皮嵌緑垂千霜山行考古恣游目滿前草樹飛巖香虬鱗萬甲濤勢壯珠沫百斛溪痕長老人峰頭五紺髻一㸃螺旋天中央寒嵐截住不得上列仙夜醉淋瓊漿白鹿一雙峭崖走紅鶴百隻遙天翔翰林書齊司馬竈皆貪山翠老不忘況兹洞學有規制官書塢田侔上庠聖人琬刻右文㫖急探義苑窮經箱采風過此意何盡一重一掩疇能詳秋晴嶺葉間蒼赤佩壺稍坐松隂凉郵程汲汲敢稽緩明日南浦排風檣仰瞻天筆慶霄裏榮光五色輝虞唐御書匾額歌劉坤文思天子開天章金泥玉檢播八荒劈窠大字徑丈強昭回碧落銀漢旁驚鸞舞鳯紛飛翔龍蟠筆底蛟騰驤皎如日月懸晶光列宿敢與分寒芒繄古哲后垂琳琅岣嶁山尖薤葉長丹文緑字鐫髙岡雨淋日炙苔蒼茫龍章一出增輝煌排空筆陳凌書航懸針垂露皆粃糠不數倉籀寧鍾王我皇宵旰憂羣方萬幾清暇羅縹緗揮毫拂素搨硬黃珊瑚筆格玳瑁裝緑沉漆管隃糜香烟雲落紙驚飛揚登床乞得侔圭璋宵來光氣衝天閶繁臺少室環文昌維嶽元精居中央胎簪之源神告祥隨山刋木功不忘孟子繼禹非誇張題以宸翰萬古彰銘書石鼓陋岐陽彤廷捧出金玉相鵷行鷺序看堵墻森嚴矩矱矜且莊驪珠十六遙相望褁以雲錦織七襄俯慚蚓結窺龍堂心摹指畫勞倣徨遙知我皇聖夀昌寶書雲笈傳無疆聖駕南巡恭紀許汝霖聖朝政理恢乾綱巍巍上參虞與唐禋宗輯瑞典巨麗五嵗再舉勤省方孟陬吉日日維子法駕南嚮乘青陽不聞輿徒傳警蹕却指馳路開康莊清塵戒道慮滋擾天語嚴飭先煌煌尚方玉食行自備所過不待儲餱糧此來本意咨疾苦為民而出忍使妨春旗飄飄指畿甸官栁未拂宫袍黃隔年嘉種獻雙穗地不愛寶呈禎祥北陸仁風被稌黍東疇麗澤收豐穰齊邦魯邦重望幸有詔預免來年糧名泉厯下七十二併作霖雨膏遐荒諸川脉絡厯可數濟泗沂汶河淮江先時黃流績未奏異同衆議紛巖廊聖眀俯狥羣下請親厯勿憚循隄防告成果與睿算合上下疏濬漸周詳懷柔胥效百神職東注大海波不揚爰臨碧渚移畫鷁左右整娖羅縹緗雲烟千頃浮震澤山水一道趨錢塘幾家映花起樓閣隨處截竹調笙簧閭閻已享太平樂帝念軫恤猶如傷數百萬租同日賜積逋更貸三吳償白頭年髙加粟帛赤子罪薄弛桁楊恩殊詎數漢文景刑措直踰周成康別寬小眚存政體新播大賚旌官常金花綬香綵縈袖玉斚醴設瓊分漿文臣武臣腹心視竝侍曲宴聯班行風霆雨露亦間作甄別實用褒循良餘恩又看文治廣髦士濟列東西庠巳敷聲教洽漸被遂溯眀德追懷襄會稽名郡留禹蹟崇山古廟邱陵蒼欲憑千載通肸蠁親屈萬乘䖍升香成天平地灑宸翰藻采絢爛雲為章斯須回鑾復西渡老幼扶道爭徊徨攀留肻為一日住匍匐少慰羣黎望日中交易自㕓肆陌上饁餉還耕桑瓜蓏果蔬雜菽麥忠愛似可微芹將向來顆粒本率育野味特許田間嘗霽顔咫尺靄然接有目盡識重瞳光去奢崇讓凛面命土俗立望還敦龎金陵再傳修祀典鐵甕大閲雄巖疆時平形勝歸一覽愈覺萬里江天長黃龍導舟允由翕虹氣上駕黿鼉梁六飛遄返光掣電仰視霄漢鸞鳯翔時巡三月禮告畢仙仗行復排天閶具僚濟濟各獻賦天子穆穆仍垂裳韓碑栁雅不勝頌夏諺周什誰能揚小臣未叨扈從列珥筆紀述職所當有生幸托覆載內蠡管窺測誠難量瑤階拜稽祝萬夀惟願嵗嵗開眀堂皇帝聖神威武三出邊塞永清大定歌胡任輿太平天子提天綱慈仁威武奠八荒西臨海西弱水洋東觀浴日窮扶桑竒肱儋耳𨽻職方不問肅慎與越裳南金大貝供篚筐厥貢砮磬璆琳琅重譯萬國咸賔王誰其桀黠敢陸梁魑魅魍魎白日藏有一不率必大創滇黔巴蜀楚衡湘以次剗刮踰海邦彭湖厦門一葦杭設官制郡增樊牆桃林放牛不服箱休歸萬里華山陽煦嫗百姓遊樂康約束醜類如驅羊蠢爾狡寇橫披猖如彼稻田長莠稂有鄰其居本頡頏怒而欲取如探囊以衆敵寡勢莫當訴與上邦殱厥強彼何人斯等夜郎諭之不率真病狂天子奮武戒戎行羽林矛㦸森開張龍旗鳯葆垂文章浮光上照太白芒猛士短衣服上襄金鼓一振百鳥翔前飛鶚鴟後鶖鶬參逐駭獸紛奔忙一箭正中麋豬麞遊魚釡底驚沸湯踉蹌鼠竄羣拖腸月氏授首日逐僵獻俘繫組騰龍驤躡以後隊無逃亡連兵或恐民卒癢許爾悔罪肉袒降彼昏不知病膏肓潛師夜襲我􅟿糧天子震怒斧爾吭一掃西鄙無渴羌寒冬再整期門裝氊廬積雪飛嚴霜設麾建旐風飄揚駕以駉馬馬斯臧長城萬里百夫防草竊那敢為寇攘厥角稽首行宫傍跪獻挏酒迎壺漿獸窮無所歸何鄉匿迹糞壤同蜣螂降幡欲竪猶倣徨終當一炬炎崑岡時維仲春百草芳于軷于祭星在房三勞萬乘臨河湟金城迤西達五凉登狼居胥殪天狼趨陟險阻如康莊俯視九有如秕糠臨流渡以萬斛航十行之詔辭煒煌如何負嵎不自量豈知戚好還相戕恨不臠肉共飽嘗巢傾卵覆命不長顯有誅戮幽禍殃玉關之西蔥嶺旁永絶烽燧消戈鋩遐思往古追軒唐青邱丹浦何堂堂後王籌運資廟廊誰能果斷如我皇隂符玉帳在御床安用借箸韓張良帝車回來萬象彰奔走士庶趨工商鐃歌萬叠聲鏗鏘如聼天樂開天閶蘋花朱實來告祥仰看阿閣巢鸞凰普天率土沐濊汪賜以大酺行千觴從官麻列佩珩璜槖筆直欲凌長楊小臣不學空含香無才敢擬古戰場方今天子聖道昌淨掃兵氣回天光櫜弓槖矢臥緑槍箕疇錫福正溥將遂開眀堂肅官常金甌玉燭長無疆大駕東巡幸闕里恭紀姜宸英軒皇垂裳得天紀七曜聚合如璧珠經嵗四千五百六貞元之會今同符康熙紀元天子聖二十三年文教敷臨雍雷振靈鼉鼓拜洛天浮龍馬圖舜干乍揮荒服靜神鞭再投海水枯爰議時巡降清問禮官具儀帝曰俞德音始渙萬物泰所過盡賜眀年租禮崇望告首東岱制度一一準有虞簡省輿衛止除道奔走父老寧需扶既陋五土事封禪亦笑八駿徒馳驅闕里臨幸有故事跨漢軼唐禮數殊泉林游泳證道妙魯門未到心先輸有司宿戒壺濯陳羹鉶飯簠籩脯朐筍簴鱗裸編磬備和以琴瑟笙簫竽樂工肄成太常部三十六舞紛縈紆是月仲冬日乙卯軫中朗穊眀前櫨風和氣暄翼雲罕冕旒肅穆中殿須雲靁之尊犧象二祭器羅列商周模祝辭親製皇帝獻告䖍幣嘉酌清酤贊稱九拜獻三跪此事今有古所無烟燎既舉神洋洋千官並起鏘瑤瑜皇帝更衣御行幄臚傳進講駢生徒如聆金石壁中奏復見詩禮庭前趨諦觀象設展圖繪始知妙手神眀俱帝乃載歌歌五言音成雅頌文典謨摩挲手植生意盡化工回斡欣重蘇鸞旗北指廟扉闔羲和停轡儼未晡墓門髙揭大庭庫石梁徑渡城隂洙千年隧道絶荆棘四方移種饒檀榆黃玉一閟不復見惟見羣鶴鳴相呼舉酒三酹復再拜草間翁仲聞都吁靈蓍目擊心自契隂陽變化誰能摹六師久嚴先輅動皇情欲去增踟蹰青雲留拂翠華葆垂露交輝金榜烏四氏承恩拜稽首填觀萬姓皆睢盱踰年廟碑復載往睿藻揮灑翰墨濡碑用西山奪玉石白鏹齎運出中帑蓋用琉璃瓦兼兩樹之金聲門右隅排抉幽扄煥長夜晶懸杲日當天衢百家騰恣仁義塞可憐聖路荒榛蕪元和大中祗文具漢鐫唐榻空糢糊我皇好道不旁騖但言魯國惟一儒岐陽嶧陽先後聖嵬峩并列穹龜趺從此膠庠盛經術絃歌詎獨鄒與邾人文化成休氣應陽和鼓動天地爐羣臣不知所報答陛下萬嵗長歡愈皇清文頴卷六十三
