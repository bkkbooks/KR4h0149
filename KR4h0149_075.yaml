  text: 欽定四庫全書皇清文頴巻七十五
  hash: sha256:079b9d4cc01e081cdc5a6dd58a326e5186000b9f061401e6117ae04e05b4bbc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_075-1a, image: WYG1450/WYG1450-0213c.png}
body:
  text: 詩七言律詩康熙辛酉季春上駐蹕馬蘭峪召扈從諸臣賜觀湯泉應制四首李霨烟樹蒼蒼古薊門山川競秀發泉源靈沙暗潄雲根暖玉液潛通地軸温孝奉慈宫時進御澤流寰海盡承恩共瞻别殿祥風轉樸素還欽儉徳尊馬首嵐光翠染衣温湯勝境望中微久霑聖澤松杉秀頻沃靈泉芝菌肥環衛令嚴千騎肅寢園地近五雲飛侍臣趨召承天語拜手欣傳盛事稀俯鑒纖毫百尺明銀塘石甃自天成翩翻舞蝶金錢下觱沸跳珠玉椀盈暖律何煩吹黍谷醴源尤羡傍佳城翠華頻至非廵幸霜露應知感聖情福泉雲岫冠黄圖何幸叨陪法從趨香霧已㸔蒸沆瀣天池殊勝濯蓬壺陽和徧滿春臺樂遊豫謳吟化日敷寵渥同霑凡骨換長令翹首憶仙都湯泉應制三首梁清標碧殿新從勝地開塞垣霽色入春臺侍臣並挹金莖露黍谷何煩玉琯灰翠嶺籠烟迎鳳輦黄鸝過雨囀宫槐六龍豈為宸遊到早晚慈幃問寢来巖栢森森翠影蟠桃花春泛響流湍繚垣製古無雕繪水殿泉香勝畹蘭清鑑曉開雲霧濕綺忩夜宿斗牛寒叨陪法從同瞻眺十九臣如挟纊㸔舊遊風物尚依稀何幸承恩傍翠微廿載泉聲重入耳千峰嵐氣欲生衣瀾廻玉砌鮫人吐手散青蚨蛱蝶飛矯首丹厓頻駐馬璇宫樹色綰斜暉湯泉應制三首魏象樞氤氲佳氣藹陽春一鑑中涵應聖人浴日全歸千尺水分流合潤九州民晴烟暁覆行宫樹夜雨先清輦路塵自是君恩時下濟餘波渥處及衰臣大壑層巒抱碧隈湯泉勝蹟擬蓬莱山龍隠躍徴文物地徳温和助夀杯雲擁翠華廵幸出星髙水殿問安廻慈宫頤養多嘉悅孝治端從聖主開陽和滿地豁重隂詔錫臣工次第尋甃石四圍池貯水傍巖千樹栢成林橋山弓劒瞻依近蔀屋桑麻擁䕶深不比華清傳勝事吾皇舉動萬年箴湯泉應制二首項景襄銅龍門外翠旗開鳳輦聲從長信来只愛沸潭能益夀不煩承露起髙臺祓除水面宜春日警蹕山頭隠晝雷常慶萱花榮北闕愧無蘭草補南陔别殿重軒近接溪羞將丹刻侈銅鞮半牆碧瓦朱䦨外一帶青松翠巘迷止有玉繩低鐡鳳更無金璧飾璇題温泉宫室曾稱盛難與堯階聖徳齊湯泉應制三首蔣𢎞道山開蘭峪建旌門瑞藹蘢葱擁至尊徳澡湯盤經嵗月澤通舜海倍潺湲一池影自連雲碧萬斛波因浴日温流到人間餘潤逺㡬多草樹沐榮恩别苑承歡仰聖衷巖邊水殿逈凌空九天遥發重闈駕萬夀期延文母躬澹蕩風薰湯谷外澄鮮月映福泉中規模依約茅茨意不比華清更築宫天語傳呼賞碧潯得瞻勝地主恩深暖同黍谷曾吹律潔比湯盤共洗心魚藻池中紛隠躍鯨波海外漸消沈願將神水分河潤灑作人間旱嵗霖湯泉應制四首吳正治鬱盤佳氣拱神京勝地時經御輦行夹道烟嵐開帳殿凝空蒼翠閃霓旌谷吹暖律春常在水泛陽和澤自盈天語欽承忻賜矚臨流應識豫遊情金根移駐六龍從松檜隂森結盖重湯沐分来赤縣近暄波通處綵霞封璇宫愛日還調膳繡甸祈年好勞農帝徳性成隆孝養瑶池長映月明峰祥風澹蕩拂潺湲細草穠花媚聖顔修禊恰當榖雨後濯纓疑在斗牛間階仍舊址茅茨樸碑記遺文石蘚斑彷彿榮光呈瑞色浴龍池畔繡旗閒崆峒曾說降軒皇叠嶂凌霄接大荒勢扼關河占脈厚形蟠園寢發泉香遥聞鐘磬諧韶夏悵望弓裘感露霜縹緲丹梯誰可到幸陪仙仗五雲傍湯泉應制四首李天馥一路垂楊畵裏津祗園喜奉玉音頻逶迤繡巘来仙梵宛轉青谿䕶谷神勝地効靈資逺澤名山毓瑞慶長春共驚造物真竒作大陸茫茫彚廣輪蒼松紫柏望重重燠透雲根傍火龍迸溜倒傾銀菡萏澄波深浸玉芙蓉烟嵐瓦碧魚鱗合露蘚階青雁齒封淑氣蘢葱涵夕照渾疑身在祝融峰共染氤氲禮福泉層巒環拱翠微天流霞澡徳資純孝靈液痊疴永大年細顆浮花珠媚日回欄排鏡玉生烟重修都本茅茨意不費官家少府錢天然位置自巍峩猶是香巖舊補陀似藉烟霞成錦繡不將金碧易藤蘿祥光欝作橋陵瑞暖氣蒸為宇宙和深幸小臣逢盛事追随還欲賦巻阿南郊陪祀王澤𢎞九霄仙樂向空浮縹緲香烟動翠裘淑氣一陽廻縵室神光五夜燭圜丘星辰近接瑶臺上閶闔遥從絳節遊最是休徴趨盛徳百靈奔走盡懐柔先農壇陪祀王澤𢎞明禋自古重先農路轉千旗從六龍青栁已霑郊甸雨暁雲常䕶石壇松精䖍特展皇家祀肅穆遥瞻聖主容從此史臣書大有萬方歌頌樂時雍南廵詩八首田雯駘蕩春光二月同霓旌畵檝帝城東潞河新栁參差緑上苑晴霞罨靄紅七校平分芳草㟁千帆斜挂杏花風十年未及廵南國每為蒼黎動聖衷金隄竹楗碧痕侵靈府還勞璧馬沉乙夜長繙溝洫志宣房先賜水衡金犇騰漸息河公勢底定皆知聖主心玉檢赤文傳廟略澄清重見屬車臨黄不分流淮不東肯教中澤有飛鴻喜聞布榖鳴鹽瀆深鎖支祁閉水中江左苔生圜室碧淮南粟發太倉紅宅田三載寛租調無待豳詩播國風山市春隂水市霞緑疇襟帶受風斜地官早上職方志天語長詢農父家甪里林泉留奥曠石湖烟水賞清華道傍聽唱迎鑾曲牽纜芳洲放楝花越角吳根一水分隔江風動迓南薰橋邊花亞飛龍轡亭腹波涵控鶴軍帳盖平連湖嶼色布金遥散講堂雲諸天鷲嶺皆歡喜法雨香来滿徑聞平林西望秣陵關鍾阜春花滿地斑仙仗全依石城樹春旗半巻六朝山長干市下歌湯網舊墅衢前識舜顔渺渺秦淮如帶水戀恩猶自日潺湲乗来畫舸勝金輿水檻香濃翰墨舒風雨忽生青鏤管烟雲欲潤玉蟾蜍篇章清廟生民什文藻王謨帝典書扈從諸臣皆有賜天章琬琰紀恩餘法駕初歸槐序宜芊眠麥信午風吹回颿次第喧金鼓繞殿斑斕簇羽旗玉案紅雲傳刻漏銀臺碧樹引朝儀儒臣遞進河清頌不數巻阿召伯詩東廵扈從三首孫在豐薊州道中望盤山天門縹緲樹㝠㝠巖作雲根翠作屏終古幽泉泠磵壑何年春雨劚芝苓東廻滄海連三島北擁橋山䕶萬靈聞道禪關七十二望中遥指一峯青渝關唐時所建一名臨渝關以臨渝水故名渡臨渝水問渝關舊是唐宗甲馬還兎走蕪田飛羽落人耕沙磧戍樓閒燕然千里寒無樹盧谷三邊鎮有山輦道春風廻灑處氊裘細着雨痕斑遼河一名句驪河河之西曰遼西東曰遼東出靺鞨北諸山中經塗山至洪州崖頭牛家莊出梁房口入於海句驪一𣲖此朝宗源繞塗山百谷中地向岐豐成帶礪水分瀍澗作西東金鼇浪拍連滄海鐵鳳雲髙舞大風自有神鯤歸帝網渭川應是載非㷱綏逺功徳詩四首王掞慶集共球萬國同綏邊籌䇿廟謨雄一人獨展懐柔略絶域随收底定功武烈風行沙漠外恩膏春徧幅􅊷中遐荒億載無㩦貳早見天山挂柘弓翠華飛處望来蘇夾道喧闐萬嵗呼襁負歡迎無小大壺漿拜伏共妻孥周廬日麗旌旗合帳殿雲開劒珮趨重譯来朝争貢篚儼然王㑹一披圖雨露雷霆控馭宜赤心推置為分旗直教身臂相聨屬祇有恩威與縶縻舊號析圭資帶礪新銜班秩比星碁從兹永作天家翰保塞輸誠聽指麾闐闐振旅度龍沙匼匝風雲輦路賖已見羣方銷舉燧更㸔絶塞息鳴笳名王跪擁狼頭纛天馬牽随豹尾車飲至䇿勲湏布告相期共草玉堂麻五月十日上命侍直南書房恩賜御書臨蘇軾書陶潛詩一幅恭紀二首徐嘉炎詔許儒臣待執經薰風長日拂雲屏圖書玉架晴繙碧殿閣緗簾晝擁青羣捧龍章尊訓誥欣承鳳簡作儀型深慚獨荷瑶牋賜奎壁芒寒貫紫庭陶公髙潔賦歸来蘇子當年冠蜀材應識宸衷褒逸操懸知天藻賞竒才烟浮繭楮霞添繞墨灑麟毫翠欲開何幸傳家珍緑笥近光長得倚雲裁滇南蕩平恭紀六首勵杜訥十萬貔貅擁斾旌先鋒早已㨿金城戈揮斗極妖星落劒叱風雲瘴癘清湯火㡬年思救㧞簞壺遍野競趨迎殘黎喜得瞻天日踴躍軍前頌聖明欣傳紫甸兵銷日正值黄鐘律轉時仰慰重闈紆睿慮𢎞恢九有際昌期敷天胥慶崇尊養率土同歡展孝思自是功成多燕喜千官拜舞集彤墀久憫炎荒陷溺深金戈鐵騎拯蒼黔求寜元是皇天命靖亂尤為列祖心精意凝承應貺答潔蠲禋祀自居歆萬方来賀昭神佑航海梯山日獻琛軍聲逺震螺山外甲士長驅洱海邉電擊鯨鯢衝霧雨飈馳貔虎破蠻烟鳳城計日班師入麟閣開時奏凱旋載戢干戈興禮樂長調玉燭萬斯年浮雲五色煥絲綸象魏遥頒帝澤新喜見八紘咸履泰頓教六合盡回春桁楊共被恩施厚草野同沾徳意均仰荷生成遊大造昇平奕禩戴堯仁九重宵旰圖神畧萬世苞桑賴聖謨旁午軍書時進講如雲餽餉屢蠲租已㸔耆定清函夏猶切其咨念匹夫坐致休隆登上理生民何幸際唐虞四月十三日賜遊碧雲香山諸刹恭紀二首勵杜訥名山咫尺繞皇州十載蹉跎寄夢遊扈蹕幸来依玉渚賜閒又得到丹邱芙蓉天半千峰出蘭若星羅一望收為愛碧雲階下水尋源徙倚向龍湫香臺勝地說来青盤磴紆廻歩㡬停祗對榮光瞻御藻漫從上界問遺經忩開巖際流雲濕花滿谿邉帶露馨不是君恩催蠟屐塵踪端的負山靈恩賜内府綵絲藥物恭紀勵杜訥風薫日麗屆端陽令節恩波自上方藥製九霄成鳳彩繒纒五縷帶龍香擎来圭璧充瑶笥捧出雲霞煥佩囊珍重還家榮主賜蓽門懸處有輝光皇清文頴巻七十五
