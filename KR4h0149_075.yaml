front:
  text: 欽定四庫全書皇清文頴卷七十五
  hash: sha256:9ef2b3063e5b3a52a529b2c8f8028f792176ddbac679f0690c6f6022766b457b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_075-1a, image: WYG1450/WYG1450-0213c.png}
body:
  text: 詩七言律詩康熙辛酉季春上駐蹕馬蘭峪召扈從諸臣賜觀湯泉應制四首李霨煙樹蒼蒼古薊門山川競秀發泉源靈沙暗潄雲根暖玉液潛通地軸溫孝奉慈宫時進御澤流寰海盡承恩共瞻别殿祥風轉朴素還欽儉德尊馬首嵐光翠染衣溫湯勝境望中微久霑聖澤松杉秀頻沃靈泉芝菌肥環衛令嚴千騎肅寢園地近五雲飛侍臣趨召承天語拜手欣傳盛事稀俯鑒纖毫百尺明銀塘石甃自天成翩翻舞蝶金錢下觱沸跳珠玉碗盈暖律何煩吹黍谷醴源尤羡傍佳城翠華頻至非巡幸霜露應知感聖情福泉雲岫冠黃圖何幸叨陪法從趨香霧已看蒸沆瀣天池殊勝濯蓬壺陽和遍滿春臺樂遊豫謳吟化日敷寵渥同霑凡骨換長令翹首憶仙都湯泉應制三首梁清標碧殿新從勝地開塞垣霽色入春臺侍臣並挹金莖露黍谷何煩玉琯灰翠嶺籠煙迎鳳輦黃鸝過雨囀宫槐六龍豈為宸遊到早晚慈幃問寢來巖柏森森翠影蟠桃花春泛響流湍繚垣製古無雕繪水殿泉香勝畹蘭清鑑曉開雲霧濕綺忩夜宿斗牛寒叨陪法從同瞻眺十九臣如挾纊看舊遊風物尚依稀何幸承恩傍翠微草載泉聲重入耳千峰嵐氣欲生衣瀾回玉砌鮫人吐手散青蚨蛺蝶飛矯首丹崖頻駐馬璇宫樹色綰斜暉湯泉應制三首魏象樞氤氲佳氣藹陽春一鑑中涵應聖人浴日全歸千尺水分流合潤九州民晴煙曉覆行宫樹夜雨先清輦路塵自是君恩時下濟餘波渥處及衰臣大壑層巒抱碧隈湯泉勝迹擬蓬萊山龍隱躍徴文物地德溫和助夀杯雲擁翠華巡幸出星髙水殿問安回慈宫頤養多嘉悅孝治端從聖主開陽和滿地豁重隂詔錫臣工次第尋甃石四圍池貯水傍巖千樹柏成林橋山弓劒瞻依近蔀屋桑麻擁護深不比華清傳勝事吾皇舉動萬年針湯泉應制二首項景襄銅龍門外翠旗開鳳輦聲從長信來只愛沸潭能益夀不煩承露起髙臺祓除水面宜春日警蹕山頭隱晝雷常慶萱花榮北闕愧無蘭草補南陔别殿重軒近接溪羞將丹刻侈銅鞮半牆碧瓦朱闌外一帶青松翠巘迷止有玉繩低鐡鳳更無金璧飾璇題溫泉宫室曾稱盛難與堯階聖德齊湯泉應制三首蔣𢎞道山開蘭峪建旌門瑞藹蘢蔥擁至尊德澡湯盤經嵗月澤通舜海倍潺湲一池影自連雲碧萬斛波因浴日溫流到人間餘潤逺幾多草樹沐榮恩别苑承歡仰聖衷巖邊水殿逈凌空九天遙發重闈駕萬夀期延文母躬淡蕩風薰湯谷外澄鮮月映福泉中規模依約茅茨意不比華清更築宫天語傳呼賞碧潯得瞻勝地主恩深暖同黍谷曾吹律潔比湯盤共洗心魚藻池中紛隱躍鯨波海外漸消沈願將神水分河潤灑作人間旱嵗霖湯泉應制四首吳正治鬱盤佳氣拱神京勝地時經御輦行夾道煙嵐開帳殿凝空蒼翠閃霓旌谷吹暖律春常在水泛陽和澤自盈天語欽承欣賜矚臨流應識豫遊情金根移駐六龍從松檜隂森結蓋重湯沐分來赤縣近暄波通處綵霞封璇宫愛日還調膳繡甸祈年好勞農帝德性成隆孝養瑶池長映月明峰祥風淡蕩拂潺湲細草穠花媚聖顔修禊恰當榖雨後濯纓疑在斗牛間階仍舊址茅茨朴碑記遺文石蘚斑倣佛榮光呈瑞色浴龍池畔繡旗間崆洞曾説降軒皇疊嶂凌霄接大荒勢扼關河占脈厚形蟠園寢發泉香遙聞鐘磬諧韶夏悵望弓裘感露霜縹眇丹梯誰可到幸陪仙仗五雲傍湯泉應制四首李天馥一路垂楊畫裏津祗園喜奉玉音頻逶迤繡巘來仙梵宛轉青溪護谷神勝地效靈資逺澤名山育瑞慶長春共驚造物真竒作大陸茫茫彚廣輪蒼松紫柏望重重燠透雲根傍火龍迸溜倒傾銀菡萏澄波深浸玉芙蓉煙嵐瓦碧魚鱗合露蘚階青雁齒封淑氣蘢蔥涵夕照渾疑身在祝融峰共染氤氲禮福泉層巒環拱翠微天流霞澡德資純孝靈液痊疴永大年細顆浮花珠媚日回欄排鏡玉生煙重修都本茅茨意不費官家少府錢天然位置自巍峩猶是香巖舊補陀似藉煙霞成錦繡不將金碧易藤蘿祥光鬱作橋陵瑞暖氣蒸為宇宙和深幸小臣逢盛事追隨還欲賦卷阿南郊陪祀王澤𢎞九霄仙樂向空浮縹眇香煙動翠裘淑氣一陽回縵室神光五夜燭圜丘星辰近接瑶臺上閶闔遙從絳節遊最是休徴趨盛德百靈奔走盡懷柔先農壇陪祀王澤𢎞明禋自古重先農路轉千旗從六龍青栁已霑郊甸雨曉雲常護石壇松精虔特展皇家祀肅穆遙瞻聖主容從此史臣書大有萬方歌頌樂時雍南巡詩八首田雯駘蕩春光二月同霓旌畫楫帝城東潞河新栁參差緑上苑晴霞罨靄紅七校平分芳草岸千帆斜挂杏花風十年未及巡南國每為蒼黎動聖衷金隄竹楗碧痕侵靈府還勞璧馬沉乙夜長翻溝洫志宣房先賜水衡金奔騰漸息河公勢底定皆知聖主心玉檢赤文傳廟略澄清重見屬車臨黃不分流淮不東肯教中澤有飛鴻喜聞布榖鳴鹽瀆深鎖支祁閉水中江左苔生圜室碧淮南粟發太倉紅宅田三載寬租調無待豳詩播國風山市春隂水市霞緑疇襟帶受風斜地官早上職方志天語長詢農父家甪里林泉留奧曠石湖煙水賞清華道傍聽唱迎鑾曲牽纜芳洲放楝花越角吳根一水分隔江風動迓南薰橋邊花亞飛龍轡亭腹波涵控鶴軍帳蓋平連湖嶼色布金遙散講堂雲諸天鷲嶺皆歡喜法雨香來滿徑聞平林西望秣陵關鍾阜春花滿地斑仙仗全依石城樹春旗半卷六朝山長干市下歌湯網舊墅衢前識舜顔渺渺秦淮如帶水戀恩猶自日潺湲乘來畫舸勝金輿水檻香濃翰墨舒風雨忽生青鏤管煙雲欲潤玉蟾蜍篇章清廟生民什文藻王謨帝典書扈從諸臣皆有賜天章琬琰紀恩餘法駕初歸槐序宜芊眠麥信午風吹回帆次第喧金鼓繞殿斑斕簇羽旗玉案紅雲傳刻漏銀臺碧樹引朝儀儒臣遞進河清頌不數卷阿召伯詩東巡扈從三首孫在豐薊州道中望盤山天門縹眇樹冥冥巖作雲根翠作屏終古幽泉泠澗壑何年春雨劚芝苓東回滄海連三島北擁橋山護萬靈聞道禪關七十二望中遙指一峯青渝關唐時所建一名臨渝關以臨渝水故名渡臨渝水問渝關舊是唐宗甲馬還兔走蕪田飛羽落人耕沙磧戍樓間燕然千里寒無樹盧谷三邊鎮有山輦道春風回灑處氊裘細著雨痕斑遼河一名句驪河河之西曰遼西東曰遼東出靺鞨北諸山中經塗山至洪州崖頭牛家莊出梁房口入於海句驪一𣲖此朝宗源繞塗山百谷中地向岐豐成帶礪水分瀍澗作西東金鼇浪拍連滄海鐵鳳雲髙舞大風自有神鯤歸帝網渭川應是載非㷱綏逺功德詩四首王掞慶集共球萬國同綏邊籌䇿廟謨雄一人獨展懷柔略絶域隨收底定功武烈風行沙漠外恩膏春遍幅􅊷中遐荒億載無㩦二早見天山挂柘弓翠華飛處望來蘇夾道喧闐萬嵗呼襁負歡迎無小大壺漿拜伏共妻孥周廬日麗旌旗合帳殿雲開劒珮趨重譯來朝爭貢篚儼然王會一披圖雨露雷霆控馭宜赤心推置為分旗直教身臂相聨屬祇有恩威與縶縻舊號析圭資帶礪新銜班秩比星碁從兹永作天家翰保塞輸誠聽指麾闐闐振旅度龍沙匼匝風雲輦路賖已見羣方銷舉燧更看絶塞息鳴笳名王跪擁狼頭纛天馬牽隨豹尾車飲至䇿勳須布告相期共草玉堂麻五月十日上命侍直南書房恩賜御書臨蘇軾書陶潛詩一幅恭紀二首徐嘉炎詔許儒臣待執經薰風長日拂雲屏圖書玉架晴翻碧殿閣緗簾晝擁青羣捧龍章尊訓誥欣承鳳簡作儀型深慚獨荷瑶箋賜奎壁芒寒貫紫庭陶公髙潔賦歸來蘇子當年冠蜀材應識宸衷褒逸操懸知天藻賞竒才煙浮繭楮霞添繞墨灑麟毫翠欲開何幸傳家珍緑笥近光長得倚雲裁滇南蕩平恭紀六首勵杜訥十萬貔貅擁斾旌先鋒早已據金城戈揮斗極妖星落劒叱風雲瘴癘清湯火幾年思救拔簞壺遍野競趨迎殘黎喜得瞻天日踴躍軍前頌聖明欣傳紫甸兵銷日正值黃鐘律轉時仰慰重闈紆睿慮𢎞恢九有際昌期敷天胥慶崇尊養率土同歡展孝思自是功成多燕喜千官拜舞集彤墀久憫炎荒陷溺深金戈鐵騎拯蒼黔求寧元是皇天命靖亂尤為列祖心精意凝承應貺答潔蠲禋祀自居歆萬方來賀昭神佑航海梯山日獻琛軍聲逺震螺山外甲士長驅洱海邉電擊鯨鯢衝霧雨飈馳貔虎破蠻煙鳳城計日班師入麟閣開時奏凱旋載戢干戈興禮樂長調玉燭萬斯年浮雲五色煥絲綸象魏遙頒帝澤新喜見八紘咸履泰頓教六合盡回春桁楊共被恩施厚草野同沾德意均仰荷生成遊大造升平奕祀戴堯仁九重宵旰圖神略萬世苞桑賴聖謨旁午軍書時進講如雲餽餉屢蠲租已看耆定清函夏猶切其咨念匹夫坐致休隆登上理生民何幸際唐虞四月十三日賜遊碧雲香山諸剎恭紀二首勵杜訥名山咫尺繞皇州十載蹉跎寄夢遊扈蹕幸來依玉渚賜間又得到丹邱芙蓉天半千峰出蘭若星羅一望收為愛碧雲階下水尋源徙倚向龍湫香臺勝地説來青盤磴紆回步幾停祗對榮光瞻御藻漫從上界問遺經忩開巖際流雲濕花滿溪邉帶露馨不是君恩催蠟屐塵蹤端的負山靈恩賜內府綵絲藥物恭紀勵杜訥風薰日麗屆端陽令節恩波自上方藥製九霄成鳳彩繒纒五縷帶龍香擎來圭璧充瑶笥捧出雲霞煥佩囊珍重還家榮主賜蓽門懸處有輝光皇清文頴卷七十五
