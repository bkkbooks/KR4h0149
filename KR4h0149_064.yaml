body:
  text: 詩七言古詩扈從出古北口張廷玉曉日未出山烟昏冷風直透重綿溫長鞭鞭馬過峻嶺綵幡近指南天門線路不足容兩軌猙獰怪石狼虎蹲攬轡高吟潁濵句前途山色非中原長城直與鳥巢似昔人長城詩云此城冠山如鳥巢雲邊隱見頽垣存前朝防戍疲士卒枕戈荷㦸忘寒暄瘴霧漫漫霜月苦一聲羌笛如呼寃青燐散野白骨聚至今想像猶銷魂聖朝聲教逺莫外黃皮烏弋皆稱藩候臺不設瞭館廢窮邊來往如庭軒羊年避暑厯兹土笑迎鑾輅山花繁書生珥筆良厚幸六隨清蹕邀殊恩朝嵐夕靄供覽矚巉巖危磴從攀援盛事真足傲千古昔人出塞安足論駐蹕密雲賜觀御書大學全部敬成七言古體詩一首蔣廷錫晴雲五色連長麾凉風霏霏吹墨池白檀山下駐黃幄天心行健無息時手書大學二千字寸幅初展光陸離精微逺契羲帝畫古朴直邁岣嶁碑懸岸邃谷起鸞鳯折波奔浪騰蛟螭古傳鍾王僅驅使下至唐宋真糠麋循環百遍究深妙淺識未得窺毫釐從臣相顧驚讚歎小臣稽首拜獻詞大學遺書出戴禮經文孔子傳子思化成天下始家國功由誠正先致知帝王統要悉包舉古今大道相扶持教兼內外通上下聖賢之本仁義基吾皇衆理㑹一貫智周萬物權綱維緝熙聖學已富有日新盛德無纎疵宅心天淵主誠敬深宫夙夜常思維上承歡顔下教育周文止孝復止慈政修事舉備制度化行俗美歌關雎發揚理道闡經義異學祛掃淫詖辭萬幾有暇博典籍坐忘日影移龍墀新民眀德著功效烟雲落處心手追古來人君偶染翰紅袍筆寫屏風詩雲藍側理詠風月豈與政治相培禆何如聖人動合道令德顯與人民宜願勒金石賜學校億萬萬載為君師雙塔峰歌蔣廷錫逺山月落天雞唱長風吹雲度層嶂霧花作雨十里香扶桑鞭促金烏上斷雲忽露兩峰尖半隱半眀失顧瞻太陽髙照隂靄散塔影雙插驚排籖紅雲一握遞迎送糝金石色光浮動誰將玉斧中劈開比肩而立相伯仲左峰倣佛生紫烟鏤開三穴皆天然山根疑與鑿圭竇上穴大小珠窩圓日光直射圓鏡赤玲瓏透漏仇池天右峰稍低如拱揖浮圖相對神功全須臾馬首齊向東兩峰體合如一峰石屏方正卓然起峰巔緑樹隂濛濛行行二里山腳走右峰轉左左轉右嵌空突兀亦非常面面皆驚峰勢陡憶從先臣宦粵省梅花村上羅浮頂百二十里老人峰沒膝黃雲盤石磴復記前年登華山蓮花朵朵雲霓間仙人掌送露寒石玉女頭盆堆翠鬟今朝所見真大觀半空落下青琅玕山回溪轉雙塔隱行人馬上回頭看生平足跡探竒祕飽眼山川皆帝賜愧無米芾畫石筆寫出雙峰掛帆勢上幸額勒蘇台大獵恩賜觀圍恭紀蔣廷錫秋高弓徑萬馬肥千山紅葉連霞飛外蕃部長率帳落來奉君王大合圍平川幾㸃人如豆漸見烏欄畫逺岫青旗引路時飄揚四無人聲約步驟峰腰變出常山蛇羣馬斑駁雜五花陳腳欲轉勢未合草間出沒驚麏麚東偏飛騎下林麓山頂人排城堵矗圍場圓放十里寬四面回還衣帶束儦儦俟俟何處來長角大耳跳蒿萊倉皇急欲突圍走揚鞭噪逐喧春雷羽林掠圍靜無擾馬密人齊圍轉小雲麾五色八門開盤屈遊龍頭尾繞十尋黃纛吹長風晴天皎日光曈曈山祗地靈共鞭䇿悉率羣友居圍中繡鞍玉勒疾馳騁乾草霜蹄逐風影天威手挽八石弓十四把長餘箭鋌前鹿已中金僕姑雕翎灑血紅糢糊後鹿一發中其項髙坡仰仆鳴嗚嗚須臾連射二十鹿箭服曽無遺一鏃天網還開三面恩下馬撤圍教止戮秋冬獮狩古所傳我皇聖武縱自天仁風已捲鶴麗陳勇氣尚掛魚鬚旃外蕃健兒千二百忽掃雲屯散無迹疾徐進退心力齊知是吾君恩所格始信天下一家語絶域遐邊總畿輔小臣袖手得賜鮮敬繼岐陽歌石鼓康熙四十二年正月初二日荷蒙皇恩賜觀朝會樂器恭紀七言古體詩四十韵查慎行雲門咸池及大章制作肇自炎與黃後來韶夏繼濩武聲容綴兆猶相望或以象功或象德宫懸一一傳太常自從秦漢寖失古器雖尚設音微茫儒生好事強傅會蒼龍朱鷺徒揣量流傳往往入樂府遂薦郊祀陳明堂豈知元音關運㑹出與盛世鳴光昌國家功崇德深厚上有堯舜垂衣裳八風從律星告瑞亭毒四序昭三光一人穆穆慶交泰多士濟濟賡元良朝乾夕惕日不暇庭燎復勤夜未央肅雍臨保本家法儼奉列聖同羮牆化成久道治纍洽民俗康阜仁風翔懷柔河嶽盟帶礪撫馭畿甸巡遐荒北清狼望息斥堠南拓鼇背開封疆圓顱方趾悉受吏丹砮白雉爭來王麒麟在郊鳯巢閣不貴異物誇禎祥太和元氣彌宇宙正賴雅樂為宣揚吾君神智况天縱聖學孰測淵源長精通緯數窮亥步博極墳典追羲黃黃鍾纍黍辨清濁太簇按節分隂陽文成雲璈發金石詩出月窟諧宫商伶倫却立衆工伏御製親授協律郎豈惟神人共悅豫兼采法曲收遺亡每逢朝賀必並作左右羅列東西廂臣昨蒙恩預元㑹摳衣肅拜丹墀旁柘黃帕拂黼座近咫尺俯首心倣徨廣庭雪光吐蓂葉雙闕日氣暾扶桑乍聞鈞天動九奏縹眇散入爐烟香始終條理詎能析但覺盈耳聲洋洋歸來恍惚疑夢寐魯壁一夜聆鏗鏘明朝詔許觀樂器始信大樂非笙簧編鐘編磬別簨簴楹鼓田鼓齊輝煌旌麾竒綵繪龍虎簫管逸韻含鸞凰塤篪柷敔狀各異据圖考證安得詳有生耳目不虛畀帝錫聞見開聾盲虞廷當時傳搏拊鳥獸應節猶低昻幸逢昌期邀異數及與百爾偕趨蹌歡情不覺同率舞拜手敢謂希賡揚矢音作歌紀盛事萬年願奉南山觴瀚海石歌查慎行瀚海去國門亭堠千有餘君王神武勤逺馭伐叛特欲安邊隅歸來玉斧畫大渡屬國東西一都護羈縻不設元和郡國志太平寰宇記唐宋時邊方多設羈縻州甌脫閒何者能邀至尊顧異哉有神物産自此海濵溯從開闢混礓礫直到水底今揚塵女媧補天煉五色散落人間人不識年深道逺莫致之瓌寶仍為天上得禁林過雨山蒼然緑窗窈窕生紫烟越羅蜀錦開什襲詔許重陳玉案前須臾捧下通眀殿耀眼平生驚未見碧砮竒氣蓄風雲銅楔飛芒繞雷電七星掛斗何煌煌六十四象隨圓方綺霞縠霧錯采章白璧自白黃琮黃或如荔垂枝又如榴拆囊或如鏡留影又如芝植房或如犧牛角繭栗或如蝦蟇入月頷頤張或如青螺或文蛤或如馬肝止血瘳膏肓或如珊瑚出網丹出鼎松脂出地琥珀凝堅光賦形畀色靡不肖化工之巧盡泄無留藏臣聞積水類生石瑟瑟波搖紅靺鞨潮淘汐戰亷角平蜃吸鰲呿光怪發黔南白鷺洲文登彈子渦偶披千萬遇什一育秀孕靈能幾何孰如此石來自遐荒外磊砢英多殊可愛携來共慶前席珍采處曽蒙後車載石兮石兮爾豈無知空抱質顧盻恩深同剪拂回思萬古委泥沙方信聖朝無棄物賜硯紀恩詩宫鴻厯扶桑晃朗通九區日浴先照天東隅襟山帶海厄塞地鬱葱佳氣開雄都豐京鎬邑萃靈秀往往孕結瓊瑤瑜鑾車時巡省方嶽百神受職羣山呼砥石巉巖若砥柱夭喬飛走俱魁殊藴玉山輝傳自古美璞豈得同碔砆世無卞和識神物地不愛寶誰能刳為礎作礪等閒事何異石鼓疲舂揄帝咨工倕登此石即墨封比躬桓蒲劖雲劚玉有製作中規合矩隨形模玉堂新樣琢磨出肌理滑笏堅而腴金聲玉德洵兼備呵冰蓊蓊雲衣鋪蒸栗黃間鴨頭緑白虹紫電縈星樞鵒眼村俗馬肝劣鳯咮龍尾真其徒方箱大槖後車載山靈夜徙秋雲孤寶跗光芒玉几淨丙夜拂拭研鉛朱聖文典誥詩雅頌逺跨周漢殷唐虞龍章迅掃千兔禿昭回銀漢懸天衢髙碑大碣遍撫勒人人競寶隋侯珠微臣未登朝士籍撏扯章句慚通儒斷磚破瓦每自惜硯蟾注水行將枯朅來金門初待詔果腹珍饌傳天厨寵新地近但悚栗重以朽鈍煩洪爐何期渙汗沛膏澤得與詞館同霑濡受賜百拜納懷袖一方軟玉如凝酥三重緹襲慎包裹硯北却立心踟蹰守靜尚默乃可久不緇不磷無玷汚品方質厚硯之德豈以瓦合矜時趨敬披御集讀硯說寒蟄一一回昭蘇作人造士軼三古寧有才俊留菰蘆我朝太平矢文德共球八表來將輸摩挲寶器不輕用用作眀堂王會圖賡歌喜起贊聖德青藜照席看操觚傳之千秋奕葉後上嫓稷益臯陶謨恭頌萬夀無疆詩一百韵效柏梁體吳士玉皇帝端拱垂衣裳德合堯舜邁禹湯經乾緯坤燭三光渾元廣運霑毫芒油油雲覆甘露瀼宏開夀域被八荒咸和萬民食不遑軫念飢溺咨河防瓠子自昔勞宣房千年一清今告祥聖謨指授何洋洋清口不灌河流黃翠華頻幸彌周詳平成萬古無懷襄龍圖五采呈天章金繩玉檢紛煒煌帝迓天庥日初暘祥飈瑞靄開帆檣顧瞻東國祈豐穰布德施惠巡南方駕六蒼蚪翳鳯凰華芝羽蓋乘雲翔光連少海屬天潢豹尾掩映黃頭郎蒸徒鼓楫歡聲揚詎有供御煩劻勷浮玉海湧一徜徉御筆淋漓天藻香天心最眷惟吳閶省方五度沛澤滂黃童白叟熙春陽聖主俯視猶如傷郊原遍厯親農桑春旗楊柳飛黃鴦麗日光天聖夀昌大宇同慶福漙將詄蕩天門翠幕張重離輝輝紫極傍臯䕫嶽牧趨鵷行山呼雷動濟以蹌咸池六英奏浩倡鼓鐘瑟琴笙竽簧仙音法曲聲鏘鏘萬姓齊歡獻玉觴遙聞天笑從風揚帝澤如春恩濊汪嵗租屢賜千倉箱勸善宥過除鋃鐺寬仁疊沛通工商絃歌户户登虞庠賦政懋嘉召伯棠羣生游泳化日長惟帝休烈冠百王仁育義正交柔剛中外寧謐安且攘三蘖既翦邦本彊朔漠三駕靖彼狂瀚海無波天蒼蒼聖圖廣大極梯航銷鋒灌燧樂時康勒石太學謹寶藏懷我好音示不忘武功既宣文德彰干羽籥翟陳兩廂經籍萬軸披縑緗天文訓飭士習良行思為表言為坊封植嘉穀化莠稂蘭蕙滿畹敷芬芳髦士峩峩宜奉璋慎簡哲匠鍳否臧還念考試歌慨慷帝心愛士增倣徨王言丕煥翰墨場闢門籲俊恢宏綱楩楠杞梓羅千章驊騮緑耳爭騰驤祥鵬翽羽鳴梧岡搜剔幽隱升巖廊後車連載馬與揚曠典盛節皆殊常壽考作人不可量微臣懵學愧面牆一編兀兀居窮鄉沐浴詠歌志激昻竊附擊壤賡陶唐禎符瑞應垂琳琅三靈蕃祉運所當願封泰山祀明堂英聲茂實高頡頏器車澤馬來康莊玉環銀甕入篚筐三秀煌煌生殿旁一莖六穗薦黃梁白麟朱鴈遊林塘榮河溫洛流泱泱卿雲爛縵遙相望産祥降嘏方未央億載萬年戴聖皇天長地久永無疆甲辰閠四月十五夜喜雨鄂爾泰三吳長夏風披猖經月無雨愁驕陽身為方嶽寄民命潛引湯火煎中腸籲天祈神典禮舊晨朝寮宷羣趨蹌卜月之吉匍匐始微誠敢必通穹蒼是日曉色變凄緊侵尋午景成摧藏山雲油油覆城郭江雨颯颯吹軒堂初驚高簷懸數丈漸喜中庭積一方我時公退未暇食恍援北斗吞天漿隔牖已覺目開朗巡階自訝神飛揚病身却坐默歎息詎有感召來倉皇憶從去秋銜命至正當久旱罹凶荒補救有心起溝壑拮据無術盈倉箱冬春荏苒饘粥給竊幸比屋無流亡眼看薄俗欲移易其奈沈痼迷膏盲粉黛流連遍初地歌管雜㳫交歡場六慱潛蹤學鬼蜮四郊攘臂多豺狼從容我但用文告狡悍爾自求桁楊雷霆既震勢小定事與霖雨寧相妨深閨咒咀市兒詬怨氣共說騰天閶人情向背本難一帝心降鑒安可量今朝畢禱得大霈一洗萬口諸昏狂暮燈既眀聲轉急勢欲穿屋侵匡牀呼兒出酒勞賔佐酒氣與雨爭淋浪興酣不寐向丙夜蛟龍漸與收鋒鋩沈憂頓豁生逺思馳夢已到丹墀傍擬追賀雨才力薄況今官守非詞章聖主精誠與天合垂意南國崇農桑旬宣報稱首何事所期年嵗恆豐穰化民成俗可次第頌聲謗口俱荒唐待呼大舶具鐃吹出觀四野青茫茫恭讀御製題王諤豐年農慶圖詩敬和元韻鄂爾泰覆車黃雲交碧落萬井歡騰動寥廓手鐮腰索齊登場孰辨環山與帶郭童犢喫喫老牸閒溪棱塍墊寫潺湲廣糧門下一無事墉崇櫛比相間間賽神報社互稱夀割肉在手歌在口由來膏澤多豐年大布新衣矜富有挑菜兒歸女下機渾家飽飯喧通閨此圖此慶頗難覩宵旰側窺披咏時杏山行塞爾赫杏山山上石屼􅀈杏山山下水㵳泬山前山後沙土紅疑是當年覆軍血憶昔將軍未上馬羽檄交馳遍天下衆號十萬出關來遮日旌旗滿原野畫鼓三通不交戰觱篥聲中軌先亂二千鐵騎儼天人大箭長弓一當萬霜摧敗葉草偃風血流染海波濤紅馬前不誅長平卒祗今竹帛褒元功吁嗟推轂竟何補俘將解縛拜聖主有人東望尚招魂衣冠哭葬燕山土松山歌塞爾赫錦州城南多㟪􅕲路入坡隴低復起行行曠望見廣原一掌平開渾如砥東南突屼聳髙阜行人指說松山是松山之上一松無風過濤聲清入耳此山得名不記年半土半石形迤邐漢魏北燕遼金元有眀至今一彈指人民城郭凡幾更此山依舊蒼然峙我來山下訪舊事當年戰壘無遺址緬邈崇德五六年神兵禦敵渡遼水彎弧洞鐵氣如虹俯視將軍埓羊豕千騎轉戰杏山前路隔松山十八里戰鼓驚天海浪翻百萬覆軍強半死凱旋牧馬瀋水陽天助龍飛良有以今日田園古戰場萬縷炊烟墟落裏沉吟懷古向秋風殘照松山凝暮紫山海關塞爾赫颶風吹海雲濤翻排峰削玉森戈錟一關雄據山海間險阻不亞秦崤函東控鴨緑襟三韓清流百道紆回環一夫當關誰敢前那用封之請泥丸詎知天意勝地利直教假手移神器義旗西指闢草昧含靈歸仁息鼎沸列聖相繼覩重華而今四海方為家出入惟憑一片紙關吏呵令行暫止乾隆三年聖主臨雍禮成恭紀張湄斑麟赤雀天降祥水精之子為素王九州木鐸聲喤喤日月代燭修夜暘三千七十會冠裳羣川宗泗嶽拱防筆嚴袞鉞吾道昌要使萬世皆虞唐自有生民誰頡頏綿綿統緒屬今皇韋編漆簡勤表章心法治法源流長覃敷文教暨八荒鶉居鵠飲與偕臧矧兹辟雍宅中黃東西南北遵路康兩楹數仞屹宫墻彩虹夭矯丹翬翔參霄松檜鬱葱蒼蟠銅屈鐵森千霜駢羅石鼓來岐陽奎文睿藻交焜煌重以金碧琉璃光猗與美富埒朝廊大昕警衆擊鼓鏜虡業既設崇牙張鸞旗翠蓋雲飄揚簫韶鳴入金絲堂莘莘俎豆潔祼將溪毛躬薦流芳香一人低徊禮器旁天容肅穆神齊莊咨爾左右同奉璋追趨舞字軒乎鼚春弦夏羽登畯良緇幃講肄發笥藏咀含六藝如宫商橋門風暖槐露瀼子襟環聽青成行原天稽古晰微茫中和條貫典訓彰禮超聃郯樂摯襄受裁奚止東魯狂日躋上理聖敬強化移疏俗延殊方乾坤軒豁振雷硠獻琛納賮賔蠻羌小臣際盛沐恩滂咏歌拜手繼臯揚祝君壽考祚無疆聖駕東巡盛京恭謁祖陵大禮慶成詩金甡維清緝熙宣重光帝握金鏡開珠囊文謨武烈崇覲揚紹庭繼序無時忘七朝觀德嚴蒸嘗鼎湖龍氣隨軒黃厥初生民徴發祥坤輿靈脉蟠東方髙山天作橫大荒氣攝遼海恢全疆作豐遷鎬王業昌留都近接珠邱旁千秋弓劍橋山藏遹追來孝維皇王感物增思懷秋霜眷言舊里沛與豐乘輿親奉慈寧宫厯吉日兮以東行薦新承糦豐年穰嘉禾委積連坻京郊原初築圃為場如弦馳道遙相望千乘萬騎龍騰驤鸞旗翠蓋風低昻疏林掩映丹青裝登臨引興摛奎章行圍縱獠嵗有常三田秋獮禮固當雲羅天畢紛舒張白羽捷發攢飛虻霜蹄撇烈殷雷硠百禽㥄遽走且僵他他藉藉坑谷量三驅弭節母胥戕擇取上殺除面傷用儲乾豆烹羶薌威弧照野狼收芒絶幕萬里皆康莊淵旋雲被臨神鄉佳哉王氣鬱葱葱都廣之野務隅陽神靈陟降憑元堂肇稱殷禮行升香延帷接枑羅斗匡季秋之月日在房晨瞻鳥注垂中央朱霞蕩海眀榑桑金蜩列侍齊冠裳駿奔祗奉湯孫將青酟既載調和羮九州珍錯陳縱橫歆馨顧德神來饗澄心凝思亶徊徨几筵如在餘悽愴洪爐蕩滌提天綱河山風雨勞斧斨靈旗石馬爭飛揚松楸萬古瞻龍興緬仰祖德何靈長念兹繩武敢不蘉禮儀告備旋天墉髙臨崇政啓南端羣工蹈舞前稱慶玉巵初進萬年觴雲天德施蕭露瀼錫宴親舊隆異粻鯢齒鮐背駢趨蹌醉酒飽德詠太平皇歡既浹陳縹緗闡揚光烈窮形容盛京一賦垂琳琅世德舞奏音鏘洋三侯裁足羣兒倡慶成大禮絲綸降恩覃中外熙春暘文德既昭武節彰選徒大閲傳牙璋飈駴雲迅俄方攘天行星陳高頡䀪敦營七萃環武剛黃龍大牙常處中申嚴號令昭戎經虎拜曰召鷹揚姜武夫併是干城良教達禁成節制嚴如飛如翰如漢江洗兵蚤已挽銀潢藏險於順威靡亢元莬真番暨樂浪東震日域咸稽顙保塞屬國兹益恭事畢功宏澤沛滂逶迤仙仗方回翔山川望秩酬靈貺歸格祖禰循寶城關輔絡繹馳騎迎翠華至喜鈴鉠鉠景雲麗色開天閶先問起居朝壽康遂升前殿臨濟將雕輦止蹕還東廂聲眀文物增輝煌昔始往矣菊未英今來照水收虹梁征途回逺時節更師無疲露情徜徉先期規畫罔不臧日月垂照無逺障睿謀神運非贊襄曠典具舉殊安詳瑶圖萬葉流芬芳聖德廣大彌穹蒼敬宗尊祖凝羮牆展親錫類榮宗祊發揚孝治光昭眀春溫秋肅恩威雙聲靈赫濯踰溟滄坐見九譯來梯航堯仁舜孝孚萬邦小臣何幸親虞唐皇清文頴卷六十四
