body:
  text: 詩七言律詩奉命供奉南書房恭紀張廷玉箕裘弓冶不勝任又許鷦鷯託上林兩世直廬明主澤草年書局老臣心山樗敢望依神莢土鼓偏教傍帝琴慚聽六宫人盡說蘇瓌有子荷恩深扈從喀喇河屯䝉恩召入行宫賜宴遍覽苑中諸勝恭紀四首張廷玉槖筆羣叨錫宴榮簪裾聯步到蓬瀛雙溪水繞平橋遠萬壑雲依御座生臺榭參差隨地築山川環列自天成閬風換盡塵凡骨俯仰都教耳目淸盡收好景在庭除一幅豳風總不如湛露無邊滋稼穡萬幾餘暇玩圖書天淵體道鳶魚趣山水怡情仁智居五色宸毫光萬丈仰瞻銀榜勝瓊琚層臺高陟若凌空人在苔痕樹影中夾岸林巒含宿霧隔溪歌吹逐微風芊芊草拂漁磯緑㸃㸃花飛釣艇紅到此始知文囿樂時當秋爽若春融承恩更泛木蘭船特設芳茵御陛前法醖自天傾石髓宫庖隔岸送瓊筵幾人得聽金璈曲兩袖都擕玉篆烟自是太平多盛事塞垣同賦蓼蕭篇召遊行宮後苑恭紀張廷玉澗草巖花映碧蘿五雲長護萬年柯迎凉樓閣依山逈避暑軒窗傍水多卧石幾重橫玉几飛流千尺瀉銀河誰言天漢無人到已許乘槎六度過是年奉六恩命遊覽凡次扈從塞外䝉恩特賜御書澄懷二大字恭紀二首張廷玉琳琅寶氣出華林羲畫堯文重古今久沐恩波依帝座更將止水勵臣心宸毫直並雲霞麗聖澤真如江海深簪筆幾人叨異數同時拜舞禁庭陰傳經天語昔欽承曾䝉堂恩賜傳經額又對澄懷永服膺蓬蓽高騰千丈熖姓名難稱一條冰家聲清白期無忝雅量汪洋愧未能竊願洗心遵聖訓何時道岸許先登萬年寶祚詩四首張廷玉無疆寶祚慶延綿花甲初周六十年厚德永貞功配地至誠不息道同天人遊禹甸堯衢裏世躋三王二帝前草木長春當令節卿雲糾縵照瓊筵物阜民安託聖朝帝功巍煥治光昭守成創業經綸裕垂拱時巡雨露饒重譯梯航來萬國兩階干羽格三苖自從府事修和後歌叙親聞奏九韶宥密精神貫八荒猶勤宵旰敕幾康先憂後樂身彌健保泰鳴謙德愈光但欲農桑安作息不教芝鶴獻禎祥九重斂錫繁多祉日月升恆海嶽長雍熙奕祀慶昌辰環轉干支第一巡久道致成三古俗太和分作萬家春欣逄仁壽休徴溥重會貞元景福新拜手稱觥同野老載歌百祿自天申恩賜御書宮扇一柄恭紀張廷玉五明宮扇製玲瓏拜賜欣瞻御墨融珠玉有光真世寶烟雲無跡本天工三庚似植迎凉草四座如披解愠風自愧飲和先萬物纎毫無力答蒼穹雍正二年聖主躬耕藉田詩六首有序張廷玉欽惟我皇上躬膺寶籙手握璇樞合二曜以齊光參兩儀而立極厚生正德殫至誠不息之功重道尊師創自古未行之典雨潤日暄之風教動罔不臧宵衣旰食之精神所其無逸凡以致黎民之於變總期奠寰海於久安邦有本以必先食為天而最重特勤穡事肇舉藉田堯年正值夫甲辰舜日敬諏乎癸亥春官視典京兆淸畿協風應律於東躔淑氣蒸膏於南陌芝輿華蓋當壇宇以星陳豹尾龍旗匝街衢而電轉千官扈從金根耀晴旭之光兆姓觀瞻蒼馬蕩祥烟之彩壝宮駐輦幄殿凝鑾奏天樂之屢豐孚誠后稷展皇䖍於三獻合漠神農香靄金爐爰更衣於大次雲移寶扇遂命駕於甫田葱犗紺轅綴橫車之黛耜嘉禾瑞麥開貯種之青箱於時四野晴和纎埃不動百神翼衛麗景無邊一墢初移發大地廣生之德三推漸訖動陽春長養之風仰帝力之維勤軫宸𠂻而未己啓沉腴之土脈用勸三農運强健之天行欲周千畝比前徽而倍越遵古禮以有加弭節從容俟臣工之協力升臺臨眺欣氓庶之赴功原隰溝塍繡壤紛披於禹甸茅蒲襏襫畫圖儼繪於豳詩乃警蹕以言旋仍望耕而未遠掎裳連袂爭躡踵以瞻雲擊壤歌衢盡觀光而就日從此五風十雨天田登御廪之儲佇看兩穗雙岐帝藉滿神倉之蓄臣職居司稼心切課農跪捧稑穜方愧未分於五穀恭持耒耜更叨承乏於九推敬撰蕪辭肅將鄙悃年豐人樂長編大有之史書地厚天高永享升平之歲月詩曰朱靄天垂萬井春勾芒應律慶芳辰九重稼穡開民事四海耕桑仰聖人寶輅光迎霞彩麗華旗翠拂栁條新六龍行處乘時令甘露祥風遍八垠深宫宵旦念民天丹陛頻聞鳯詔宣輿頌歡騰雙闕下聖心勞在萬方先德符古訓崇無逸祀重農壇祝有年廣樂雍容金石播太和元氣溢垓埏畇畇原隰候停鑾黛耜靑犁擁百官一墢恩流千畝外三推春散五雲端愛看田器君王喜得近宸顔父老歡比歲賜租過十萬升平膏澤海天寬繡陌風光儼畫圖烏犍黃犢散平蕪杏花舒蕚天時暢芳草抽萌地脈腴睿慮悉同民隱合神功潛與化工符倉箱有慶粢盛潔仁孝兼成萬世模九奏簫韶見鳯儀更聞三十六禾詞烟簔雨笠終千耦航海梯山貢兩岐率土正逄行慶日普天同是謝恩時儒臣拜手書惇史倣佛豳風七月詩薄植遍承帝眷隆從耕欣得次羣公養民竊愧司農職勸稼曾無保介功親見南郊勞玉趾久知東作厪皇𠂻願隨鼓腹康衢叟載筆年年詠屢豐恩賜紗葛袍服二襲恭紀勵廷儀樗櫟深慚扈蹕行宮袍重錫拜殊榮文騰異彩看來麗袖帶天香著處輕當暑淸涼分寵渥長途彼服感生成微臣莫效涓埃報謹凜持身答聖情恭紀南巡聖德詩五首勵廷儀平成聿奏歲華新善後機宜待聖人澤國蒸黎齊望幸東山花木盡熙春慶雲瑞靄迎天仗甘雨和風淨路塵俯鑒輿情勤法駕九霄巽命喜重申言從問俗歷齊東到處民情徹帝聰四境總教遊化日一隅猶自賴仁風饑穰本屬天行數補救旋施大造功特賜金錢留運漕閭閻歡舞兆年豐霓旌仙仗壓春山輦路花明水一灣擊壤呼嵩歌樂土瞻雲就日覲天顔市㕓不擾村廬靜雞犬無驚草木閒滿載後車供玉食那教絲粒擾民間牙籖翠軸擁行宫午夜常彼寶炬紅名理日探登道岸寶書時灑絢天工親裁詔旨關民隱面飭官針厪帝𠂻自是至誠原不息乾行萬載慶神功宿遷南下水盈盈容與中流御艦行四載憂勤昭禹績萬年熙皥樂堯氓不辭風雨親臨閲為喜淮黃漸奠平千里飛鴻咸樂業岸花隄栁暢皇情楓林效香山體勵廷儀吳江風冷越江寒梧葉蕭疏楓葉丹春色何如秋色好無花却勝有花看高依禁苑低依岸遠拂征車近拂闌玉露曉零渾欲醉霞蒸雲簇影珊珊熱河直廬與賜毫筆志感勵廷儀攤書終日對鉛黃鏤管分頒出尚方簪處不勝羞短髮歸途猶喜壯奚囊元和腳好多新樣下里歌殘只舊章老學分應無好夢盡將才筆屬江郎次韻蔣酉君恭咏御製木紙扇勵廷儀人間匠作一時空便面新裝奪化工剪羽已輸千縷碎裁紈寧許半銖同拔從木屑羣材外得近龍香掌握中舒卷漫隨團扇伍揮毫猶待寫薰風賜蓮房志感勵廷儀玉井花開百尺枝緑房初結早秋時圓分海蚌探珠寶香擘蜂窠沁蜜脾消渴不煩仙掌挹清寒恰比蔗漿宜三年又拜承明賜甘苦中心祗自知伏前一日賜普洱茶勵廷儀曾賜雲龍一品鮮玉堂人困記當年月團再拜薰風後雀舌休誇穀雨前旋拾松花添活火試烹瓦鼎泛新泉煩襟未信清如許習習凉生六月天御試詠千葉桃蔣廷錫千葉桃開簇簇紅剪裁重疊費天工輕脂欲暈非關雨薄粉初消最怯風曉露滴時添綽約暮霞飛處鬭玲瓏續吟韓愈桃花句不是西淸即禁中賜數珠恭紀蔣廷錫委佩拖紳愧未宜九天今又錫牟尼驪龍頷下明珠顆赤水山頭玉樹枝四品一時驚異數八人同日受恩私從茲退食休忘事記念章身愼所思分賜入直諸臣御書詩扇臣廷錫分得聖製西湖夜月詩恭紀蔣廷錫重拜殊恩出殿前珠璣錯落灑鴻篇仁風扇處春生谷寶篋藏時光燭天東國月明歌有道西湖波靜澤無邊六龍巡幸多題詠從此吳山一倍妍駕發腰亭跕至栁林蔣廷錫一輪晴日四圍山細草乾沙路幾彎地湧潮河穿兩界天開北口鎮雄關黍苖日長同青薺石骨年深綴緑斑曾是勝朝經略地太平有象戍旗間夜光木蔣廷錫乍見星芒映室中喜看藜火照窗櫳夜明簾薄來西域徑寸珠圓出海宫淸似晶融還貫月碎如螢散遠隨風此身恍入琉璃界寧羡金蓮蠟炬紅恭誦御製立秋日喜晴詩恭紀蔣廷錫重叠山嵐霧靄深凉風一旦豁濃陰喜看霖雨成甘雨仰見天心合帝心四野晴光舒化日遙空爽氣入高林聖人憂樂先民隱綈几微吟對碧岑恩賜佛手柑恭紀蔣廷錫遠自東閩稱上貢賜來塞外獲奇珍黃雲靉靆金光現香霧霏微佛指伸不向空拳論背觸還從合掌悟陶輪直廬此日誇殊典六月先分海嶠春恩賜蜜漬荔支蔣廷錫嶺南三度荔支芳蕉核叉頭塞北嘗入眼乍驚紅玉顆剖開猶記絳羅囊十分崖蜜霜添味萬里銀盤露帶香滿口甘腴同拜食九天今日飽瓊漿初夏西苑觀麥應制王式丹上苑鸞旗淑景移曉披麥浪影離離靑林碧沼環千畝甘雨和風秀兩岐勝日宸遊同省稼豐年嘉瑞恰乘時即今譜入南薰曲新采來牟率育詩奉韶增修皇輿表院中即事次韵二首王式丹瀛洲亭畔靜階除匼匝槐枝亞碧虛池面輕風迎散帙檐牙初日照翻書共知定本推前輩未敢傳鈔付小胥東觀從容參典校騊駼載筆愧庸疏棲塵簾閣喜新除祕冊駢羅几席虛周室職方傳舊志漢家年表效橫書要從鞮鞻增圖籍豈為華離問史胥理罷縹籖方永晝埀鞭歸拂晚風疏文廟釋褐查愼行數仞宮墻霄漢連兩楹爼豆故依然曾陪鼓篋三千士重到橋門二十年臣自甲子五月入國學肄業末學豈增科目重菲才特荷聖人憐較他儕輩䝉恩早獨在靑衫未換前暢春苑謝恩查愼行初著宮袍拜禁林碧梧翠栁望成陰可知聖主栽培意即是天工長養心千頃池邊看鼓鬛萬年枝畔聽鳴禽從來日月無私照一物含光感自深恩賜玻瓈眼鏡恭紀二首查愼行玉比晶瑩鏡比圓忽教披豁睹靑天明珠吐暈泥沙外爝火分光日月邊名紙尚堪題細字祕書仍許對新編此生視息真何幸雙眼摩挲敵少年霽月光風傍紫垣重欣天賜出璵璠潭空秋水淸無底壺貯春冰薄有㾗絶勝金鎞回晚景不煩藜火照黃昏曾經隔霧看花後老戀餘光盡主恩分賜南書房入直諸臣瓶中牡丹臣愼行得鞓紅一朵恭紀查愼行扶桑初旭映曈曨聯步晨趨入直同紫闥恩光連上苑玉階芳氣襲東風人來漢殿鶯花候春在堯天雨露中五色雲端親捧出仙葩爭看一枝紅西苑觀麥應制錢名世農務時勞宵旰心淸和令節偶登臨流滋太液膏逾茂色映長楊緑轉深穟重最宜沾曉露苖新更喜沐甘霖來牟率育羣方遍共奏成周雅頌音賦得三十六宮都是春趙熊詔庖犧奧義費研摹六六相乘卦畫殊卦本象儀因有數以乾一至坤八位數合計之得三十六畫分竒偶亦同符八卦竒偶之畫合計之亦得三十六地中雷起陽初動天下風行陰漸敷識得循環生意在乾坤隨處是洪罏恭和御製上元前二日立春趙熊詔韶光先映九華燈臘盡輕寒氣尚凝蓂砌未全舒曉葉玉河應漸泮春冰堆盤生菜嘗新味剪綵為花讓巧能喜值芳辰瞻睿藻靑郊火樹卜豐登雪中入直陳鵬年六花飛作帝城春紫殿金鋪一色勻萬頃鏡中難著影九重天上本無塵亞枝密想探梅路饑雀寒如寓直人獸炭龍團皆拜賜同將雪水試茶新曉殿陳鵬年淸旭籠煙曉殿開鬱葱佳氣滿蓬萊波光鴨緑晴初動栁色鵝黃暖漸催賜茗香分仙掌露陳詩喜上萬年杯紅橋風月迎鑾輅無數春從輦路回聖駕南巡視河恭逄萬壽聖節敬頌長句八首吳廷楨端拱宸居念兆人翠華二月視東巡日臨黃道時方泰帝御靑陽物盡春望岱燔柴祠嶽后游河刻玉奠波臣懷柔専為祈民祉先路仁風拂軟塵待旦埀衣敞御筵十行溫詔殿頭宣雲雷春奮求言鐸藻火宵明解愠絃檢玉賜書旁問俗摐金征斾遠搜田勤民兼事行時令遙望恩光下日邊前驅列缺後豐隆步玉遙臨擁衛同韎韐早聞收漠北冕旒重見幸江東威弧弦上天山月法駕輪扶海甸風拓地歸來勤省土方行萬里盡離宮平蕪彌望漲㾗邊歲潦殷憂下澤偏降趾九重親隴畝勞身四載奠山川沉圭潤比黃流瓉楗竹森如碧玉椽早使河渠承聖算宣房萬福應今年長淮渺渺接河津睿慮勤求故道循為問披圖巡甲子何如探簡命庚辰歌徵黃鵠陂當復宿應蒼龍水亦馴待涸春泥催布穀雕輪碾處旋生塵十載江湖望闕情今朝重得拜霓旌吏民安堵三章法父老呼嵩萬歲聲珠樹轉燈明夜市綵棚圍錦暗春城靜街自有金吾導羅繖前頭緩轡行康衢端冕采氓謠比户騰聲徹慶霄分野一星占得歲鈞天九奏感聞韶式閭粟帛高年賜賁路弓旌大隱招共應乘春施德惠東風入律聽長調靑郊夙駕省農祥壠雉朝迎扇影翔栁底轉旗過水市花間駐輦到山莊懸池的的金莖露蔭畝童童羽葆桑還似祈年躬帝藉春深澤國又移秧南巡閲河恭進聖德神功詩四首王圖炳五色雲端萬歲聲太平天子慶巡行梅風暖傍牙檣動芝草香依玉輦生禹甸河山開黼藻堯封雨露洽輿情欲知宵旰勤勞意布德乘春又省耕西來葱嶺勢縈紆千里清瀾鏡面如竹箭聲中飛畫舫麥苖風裏聚田廬訏謨遠勝河渠志成績還超禹貢書自是隨刋皆帝力川珍長效萬年餘淮水迢迢彩鷁通總因懷保慰三農源分桐柏浮晴翠浪息蠙城聽夕舂東會秩然如析縷南條從此盡朝宗民依經久煩宸算指顧千村桑柘濃雨過茸城春草滋從天鹵簿見隆儀峯靑九朵開蓮蕚泖碧三條綰帶絲勝地恰如逄鎬燕醇風還似繪豳詩特蠲逋賦恩膏渥萬姓歡聲夾道隨皇清文頴卷八十
