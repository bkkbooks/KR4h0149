body:
  text: 詩七言律詩淵鑑齋觀魚理密親王允礽瀲灔波光傍玉除修鱗遊泳自舒徐依蒲藉藻羣相得舞濶搖深縱所如百道飛泉當檻合一泓清鏡入窗虛臨流到處歌於牣總被汪洋聖澤餘太液新柳理密親王允礽御苑垂楊二月時銀塘曲曲正流澌回環水映靑羅帶浩蕩春融碧玉枝一片輕隂依鳳沼千條嫩葉拂龍池靈和昔日風流甚不及當今雨露滋慶雨理密親王允礽三時農事重時和聖主精誠感召多梅雨平添三尺水麥秋還聽兩岐歌神臯積潤融靑壤繡隴清風荷緑蓑芳草垂楊村畔路可知沾灑盡恩波陪駕幸五臺山理密親王允礽鳳剎虹幡碧落懸盤空磴道白雲穿上方恍在諸天外積雪疑從太始前山號淸涼澄法界地開功德引飛泉曼陀花雨紛紛落總為君王種福田菩薩頂雪月理密親王允礽山川皎潔一時勻始信空王道力真蓬海三千皆種玉絳樓十二不飛塵侵衣夜色渾疑晝繞座寒光未覺春總為聖神徴瑞應萬年有道福駢臻金蓮花理密親王允礽塞外奇葩帶瑞煙却從陸海吐金蓮名同西華原無别色借中央倍覺妍映日似分黃繖影臨風欲傍御袍鮮承恩入夜還蒙召寶炬先排法駕前恭侍聖駕閲視河隄理密親王允礽河干芳草正萋萋輦路逶迤接大隄新緑漸添楊柳岸春煙多在杏花蹊行宫日近千官集平野雲連萬幕齊淮浦昔聞憂水國祗今瑞麥滿平畦湖心亭理密親王允礽鳳艒龍艑任溯洄波心突兀起樓臺盤旋水向中間繞淡遠山從四面來照眼雲霞隨日麗忘機鷗鷺拂波廽笙歌迭奏宸襟合願挹梅花獻壽杯玉蘭理密親王允礽蘢蔥芳樹倚雲端仙掌亭亭映玉欄開處每知春欲半飛來却訝雪初殘瑶臺日麗生香暖湘浦風高入珮寒一自天隨題句後木蘭舟上好同看榴花理密親王允礽上林開過淺深叢榴火初明禁院中翡翠簾垂新葉緑珊瑚筆映好花紅畫屏帶雨枝枝重丹竈蒸砂片片融獨與化工迎暖律年年芳候是薰風檣燈理密親王允礽微茫暝色起前川萬盞紅燈颭浪圓高拂林梢明碧漢倒回水底麗珠躔光澄煙霧遙如覿影射蛟龍夜不眠知是御舟經宿處衆星盡拱北辰懸過天津衛理密親王允礽津門形勝帝京東襟帶滄瀛左輔雄際海雲霄瞻日近滿城煙火慶年豐千村鹽莢熬波白萬里帆檣浴浪紅最是升平王會盛梯航絡繹此來同賦得青歸柳色新理密親王允礽春光淡沱午風和一色垂楊碧縷搓淺黛乍沾新雨足輕隂偏傍野橋多坐當密處鶯先覺染到深時水欲波造物無私如有意片帆未遣拂煙過吳中農家多藝菜春深黃花遍野偶賦理密親王允礽細篩金粟綴瑶簪短陌長阡一色深斜帶柳隄黃不辨界開麥隴緑微侵香來四面栴檀海綺散千郊錦繡林未識東皇陶鑄巧風光總入荷鋤吟飛來峰理密親王允礽靈鷲高峰儼畫屏飛來竺國記圖經危梯下瞰呼猿洞逺靄遙連放鶴亭樹不辨名濃淡緑樵人言山樹約四百種多不能辨石如染黛淺深靑意行更喜泉聲徹琴築泠然盡日聽竹花理密親王允礽為愛臨流鳳尾斜不將丹粉鬬春華貞姿已放千梢翠修幹深垂萬籜花月影忽篩紋錯落風莖未改骨槎丫多應預兆江郎夢班管紛披五色霞冬至陪祀南郊恆溫親王允祺金闕鐘鳴夜未闌南郊濟濟會千官乘輿已命蒼龍駕鹵簿遙趨太乙壇自幸隨班瞻盛典正逢吹管送嚴寒河清海晏年年慶每向圜丘侍玉鞍皇太后萬壽無疆詩恆溫親王允祺西池廣樂奏鈞天凝望璇宫起瑞煙梅吐一枝香正永蓂舒三葉歷方綿須知寶殿承歡日總是慈闈強飯年自愧稱觴無以佐惟歌小雅九如篇乾清宫侍宴恆溫親王允祺仙禁初舒一葉蓂瑞雲時向玉階停堯樽香滿春前舉天語溫多醉後聽無限恩光分几席始知樂事聚家庭年年此際陪歡宴四海雍和萬類寧奉詔舉家得遊御園詩以志喜恆溫親王允祺無限恩光下九天欣看盡室賦遊仙漫從瑶草琪花裏直到銀河閬苑邊樓閣開時霞氣湧山巒起處日光懸君王定有那居慶稽首還歌在藻篇恭和御製餞大學士李光地暫回閩省詩淳度親王允祐理學淵源誦大儒位隆鼎鼐贊皇謨虞廷昔日都俞美聖世今朝德澤敷暫向南閩歌泰運還瞻北斗憶乾符恩榮此際賡歌盛睿藻秋風餞遠途玉蘭花應制淳度親王允祐艷陽春靄正芳時鳳閣花開碧玉姿倣佛淡雲凝寶樹依稀白露綴瓊枝氤氳香氣浮煙篆皎潔清光泛水池得侍膝前同勝賞咸歌膏澤沛恩滋熱河夏日即景淳度親王允祐四面垂隂覆緑楊深深庭院晝方長半牀古帖從容賞一縷清煙自在香卷幔不知炎日苦披襟正值午風涼間來一望無窮趣簾外山光接水光賦得殿閣生微涼淳度親王允祐好風應候自南方習習吹來殿閣涼苑外每搖楊柳緑水邊時送芰荷香消將暑氣都應盡解却煩心頓已忘長日飄飄人自得遠天不覺又斜陽暢春園夏日應制淳度親王允祐佳辰又喜逢深夏是處園林帶早涼岸外緑楊垂似帶枝間好鳥囀如簧人家共被薰風遠物類齊欣化日長歲歲年年依膝下晨昏咫尺接恩光扈駕祀方澤淳度親王允祐炎炎九夏景方中喜見方丘大禮崇長日更勞天子駕順時特報地祗功羣瞻肅肅馨香薦共睹雍雍俎豆豐自是至誠能感格和風甘雨樂融融南郊禮成恭紀淳度親王允祐龍樓向曉鑾輿發肅肅郊壇舉舊章仰看九霄星尚燦喜逢萬國日初長樂和並奏簫韶響禮獻同瞻俎豆光有道太平開景運相觀雲氣盡凝祥望陵淳度親王允祐祥煙佳氣擁層巒鬱鬱蔥蔥作大觀四野廽環如鳳翥諸山高聳似龍蟠規模直向天中起形勢疑從掌上看整轡遙思前代烈興朝基業萬年安扈駕謁陵淳度親王允祐迢遙一望鬱蒼蒼煙靄雲嵐帶瑞光萬代共瞻先澤遠一人親展孝思長山前細聽簫韶奏松下時陳俎豆香盡仰發祥從此地自今永世卜遐昌桃花寺行宫淳度親王允祐桃花古寺接崔嵬鬱鬱煙雲帶曉開塞外新瞻行殿聳天邊常喜翠華來人過池影氷初合僧誦經聲日幾回處處太平風景好宸遊獨幸得追陪早朝淳度親王允祐曉入天街漏未闌遙瞻瑞色滿朝端輝煌銀燭連星燦縹眇紅雲帶露看仗下龍旗紛五色殿前鷺序集千官太平聖主垂裳日拜舞呼嵩萬國歡送駕淳度親王允祐欣逢聖世舉時巡况復良辰正小春肅肅旌旗懸日月悠悠道路淨埃塵沾恩拜舞連千里戴澤歡呼遍萬民共喜陽和生帝輦太平處處沐深仁迎駕淳度親王允祐聖朝雨露遍遐方天上鑾回日月光自是人間心共慰况當膝下喜彌長千官敬迓雲旗下萬姓歡呼玉輦傍遙識瑞煙兼紫氣相隨一路報嘉祥恭祝兄雍親王壽怡賢親王允祥朱邸筵開介壽時九重恩眷集繁禧純誠自是承歡本仁厚端為受福基三島露濃培玉樹小春風暖護璚芝年年願傍青鸞隊拜獻南山祝嘏詞奉和兄雍親王早起寄都中諸弟元韻怡賢親王允祥涼風習習捲紗帷花影剛隨日影移紈扇罷揮知暑退夾衣初試覺秋遲喜聞魚雁傳芳訊更捧珠璣慰逺思屈指郵亭迓歸騎洗塵先奉酒盈巵奉和兄雍親王山居偶成元韻怡賢親王允祥蓮漏無聲鳥不譁山中習靜味偏賒間尋别院新栽竹坐數前溪未放花小嶺日高松影直方塘風過水紋斜太平盛世身多暇著屐擕笻踏淺沙奉和兄雍親王春園讀書元韻怡賢親王允祥紫燕穿簾西復東一庭柳絮揚春風書開緗帙迎新緑硯試端溪點落紅雨霽霞光明戶牖日斜香篆出房櫳分隂珍重攻文史益信前賢蘊不窮題樂志圖莊親王允祿安榮全荷聖恩周樂志園成不外謀勺水拳山藏曲折小亭疏檻足優遊野花隨意憑開謝嘉客忘懷任去留大隱須知城市穩個中容與更何求子𢎞普荷聖恩頒賜名茶綵扇等珍物詩以勉之莊親王允祿擎來珍品自瑶宫盡室欣傳聖澤隆咫尺天顔聆寶訓片時溫語沐仁風伏知帝德真無際仰報皇恩在此中感頌衷情難悉展惟宜黽勉讀書工嘉陵江舟行果毅親王允禮千里江聲一艇收唐元微之有千里嘉陵江水聲句水窗煙景接山郵桃花新漲驚雷轉石黛蒼波到海流韋應物聽嘉陵江水聲詩雷轉空山驚杜甫詩嘉陵江色何所似石黛碧玉相因依又元微之詩蒼溪縣下嘉陵水入峽穿江到海流秀疊錦屏長不捲錦屏山在嘉陵江南峽天清月峽曲相投朱欄靑壁重重數絶勝凝眸望喜樓熱河行宫應制果毅親王允禮灤河北拱萬山層别殿輕飈掃鬱蒸清蹕朝從黃道出天階遙見紫雲凝披襟風拂瑤林樹入座涼生玊碗氷觀稼省耕真樂事舜絃聲裏頌升恆嘉榖二首果毅親王允禮六御巡秋出上方中田省斂重農祥零瀼玉露連莖秀掩冉金風五穗香龍尾賜觀誇頴栗豚蹄稱祝滿倉箱嘉禾篇帙今遺逸願續豳風譜樂章國寶民天重歲時嘉生同頴自離披江茅無用誇三眷隴麥還看秀兩岐榖熟名鄉稱上瑞禾興改邑叶昌期聖朝原不徴符緯寒暑惟求免怨咨新燕果毅親王允禮草香微透緑萋萋掠地紅襟一剪齊簾影乍晴春社雨梁䀶仍帶去年泥客心戀主非無定絮語依人不厭低試逐流鶯尋好處上林近在鳳城西帝京十景詩果毅親王允禮瓊島春雲靑帝回鑾入太微瑤峰面面覆雲衣為霖有意晴還濕出岫無心暖未歸乍見金枝蟠翠嶺旋看紫蓋護彤扉從龍霄漢非難事五色時時傍六飛太液晴波榮光五色帝時多魚藻詩成發棹歌織女機絲通漢水影娥臺榭瞰汾河翠華高揭空中月彩枻遙添雨後波浪説瀛洲繞禆海蓬萊一水碧嵯峨居庸疊翠太行東下勢如奔三疊高臺虎豹蹲到海仍鞭蒼石去際天惟度白雲䀶車書萬里通南服鎖鑰千秋壯北門回首狼煙都不聳桑麻影裏罷邊屯薊門煙樹薊邱雨過碧雲橫遠樹迷離逗早晴日射柔條含靄重風吹眠柳著煙輕透春嬌鳥花間哢碾碧香車鏡裏行最是陽和多景物浮埃不動酒旗平西山霽雪羣玉山頭望欲空帝城雲母列屏風花開瓊樹輕煙散玉滿藍田曉日烘芝草谷深迷四皓御爐香暖醉三公仙郎白雪今猶和盡與終南景色同盧溝曉月太白離離北斗橫修途輿馬戒裝行淒迷寒月征人影斷續荒雞旅店聲南服長征通魯衛東流分𣲖入幽并石欄橋下周京路十里晴沙似掌平金臺夕照蕭條落葉隔溪聞寂寞荒臺一徑分暮靄橫空遮遠樹歸鴉將子入重雲雄師已壓齊東郡駿馬應空冀北羣惆悵千年一回首高城白草自斜曛玊泉垂虹石磴盤紆走白虹泠泠環珮和松風乍看瀲灔空中瀉應有江河絶頂通練影平分高碧翠落花低逐御溝紅鎬京自昔神靈宅瀍澗東西輯瑞同南囿秋風十二離宫木葉稀宸遊玉輅繞朱旗秋分銀漢傳清露天上金莖傍紫微御栁眠時新雁過渚蓮稀處野鷗飛鄒枚侍從多情豫别苑時時望衮衣東郊時雨春日橫塘翠瀫添菖蒲如戟緑芊芊燕棲茅舍泥猶濕鳩拂桑林羽未便南陌遊人雙屐雨東畬田叟一簔煙隂陽無復憂愆伏珥筆應書大有年春草果毅親王允禮不辨江蘺與杜蘅東風吹處一時生西湖冉冉尋芳路南浦萋萋送客情細雨迷離添杳靄夕陽掩映更分明垂鞭最憶花時節河畔靑靑縱馬行題唐六如畫漁翁即用六如自題原韻果毅親王允禮一棹煙波是勝遊投竿舉網日悠悠歌殘桃柳三更月醉遍蒹葭萬頃秋雨滴孤篷應破夢風飄長笛總無愁全家盡識滄洲趣嘯傲同登舴艋舟賦得風來花自舞諴親王允祕衆卉鮮妍不染塵和風披拂到階頻千枝駘蕩全無力萬朵輕盈别有神曲徑飄來香婉轉方塘映去體停勻春園到處皆堪賞何事歌臺羡舞人冬至早朝諴親王允祕律轉升新佳氣催玉繩遙報早春回日臨錦戶初添線雪霽香階欲放梅曉景氤氲凝殿闕雲光燦爛護蓬萊千官拜舞瑤墀下華祝嵩呼獻壽杯賦得斜日半江明諴親王允祕一片澄波晚霽鮮斜陽掩映半川前暉殘逺岫橫江度影入歸帆傍岸牽水色溟濛連暮靄山村羃䍥帶炊煙樓頭極目長天外轉訝隂晴著景偏賦得草色入簾靑諴親王允祕禁院風和曙景微一簾晴影帶朝暉階前細草承金佩砌下芳茵映錦幃緑雜苔䀶長入戶曉含露顆欲沾衣小齋自覺延幽賞倣佛平郊麥浪肥松風諴親王允祕幾度風吹庭院淸松枝瀟灑泛濤聲濃排山面千重嶂翠掃林間萬壑鳴野鶴驚飛凌碧落仙人乘馭下蓬瀛最憐入夜供淸聽還勝新篁奏管笙春波泛艇諴親王允祕淑景銜波滑笏流晴光靄靄泛輕舟逺橫略彴如虹影緑漲平塘似鴨頭煙柳舒條垂短岸新萍牽蔓漾芳洲數聲欵乃臨溪度驚起前灘兩兩鷗霜柳諴親王允祕瑟瑟微颸度柳寒霜摧落葉滿溪灘煙浮逺岸秋容淡風過疏林碧縷殘幾處靑山空暮靄一灣碧澗自淸瀾回思旖旎三春日倐忽經今不忍看皇清文頴卷七十一
