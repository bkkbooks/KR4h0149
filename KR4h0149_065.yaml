front:
  text: 欽定四庫全書皇清文頴巻六十五
  hash: sha256:f2978de0f375bee82192ad8476e7b118b9b31d5255d431f59e4981ea1ff55b8d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_065-1a, image: WYG1450/WYG1450-0135a.png}
body:
  text: 詩九言詩萬壽恭紀九言詩百句沈樹本聖皇御宇四十有二載初逄大衍五十躋長年萬國咸寜歡聲徧厚地一人有慶景福齊高天況値河流底績垂永久更喜春和被物増暄妍蠲租宥罪四海澤均溥省方問俗兩浙恩尤專欽惟吾皇德越萬萬古聰明睿智齊聖更廣淵軼商跨周陵漢陋唐宋步堯趨舜駕禹追黄顓上則問安視膳修尊禮下而春育秋養無私偏九重穆處垂裳戒逸豫六符拱極端冕罔遊畋允恭克讓堪作百世法謹身節用以為天下先重道崇儒宫墻隆爼豆育才章教庠序羅英賢聖不自聖小心殊翼翼新益求新終日惟乾乾甲觀陳書寅𠂻勤往古酉山啟鑰乙夜窮韋編惟其篤學敏修極精粹遂有鴻章鉅製紛流傳箴銘赫赫羣工承誡勅訓誥煌煌多士䝉陶甄尤工染翰縱横飛玉管每愛臨池揮灑堆銀牋鳯翥鸞翺直超倉史上龍跳虎卧遠過鍾王前台垣卿月天章均寵錫名山勝蹟御墨都高懸經天曰文文德既巍煥止戈曰武武業還騰騫曾聞六師親統靖鯨孽旋見八荒効順銷狼烟北極流沙享王獻琛矢南窮溟海賓服韜矛鋋化被雕題鑿齒盡臣妾威震扶桑若木皆幅􅊷豐功偉烈刻碑紀銅柱赫聲濯靈勒石銘燕然僉謂已治已安可長樂猶且曰咨曰儆多憂悁旰食宵衣黎元同疾苦撤懸減膳惸獨懷矜憐屢解桁楊三又嗣三赦頻除租賦賜半復賜全狴犴恩流仁風開網罟窮簷澤沛化雨廻迍邅同登壽域含哺亦鼔腹共上春臺鑿井兼耕田相親相睦民生胥厚矣不識不知帝力俱忘焉頃者黄河奔流稍泛溢深煩睿慮規畫頻敷宣特簡良臣外廷授方略不惜厚帑内府頒金錢排淤決口疏通歸大海築堤捍塘蓄洩成平川上資國計千里逹漕運下禆黎元兩岸安廬廛錫圭告成六飛親閲視輯玉時巡萬乘來駢闐時方陽春氣序正煦茂仰覩榮光照耀連奎躔麗日和風迎人倍歡暢崇桃積李夾道爭芳鮮佇看華祝三多聲接踵遥聽嵩呼一路人摩肩俯慰羣情朱旂臨浙水載隆時邁翠葢停湖邊臣僚上壽趨蹌擎玉醴億兆稱觴煥爛張瓊筵競指丹麟白鳳集靈畜行見八公十叟朝羣仙東海擕來七尺進香棗西池捧出十丈開金蓮驂鸞奏曲飄颻蓬島畔控鶴吹笙縹緲緱山巔共祝無疆皇圖彌鞏固咸知有喜聖祚方永綿年年介祉脩齡並河嶽歲歲添籌積算超彭籛有如天皇壽考過一萬豈獨大椿歲月紀八千常調玉燭淳風惟皥皥永奠金甌王道真平平良由聖德高深無可量克迓天庥凝謐滋長延草莽微臣菲材愧愚陋瞻天仰聖夙夜心殊䖍世受隆恩生成念彌切身䝉厚澤感激思常牽忻依仙蹕咏歌隨舞蹈幸際昌期踴躍頻廻旋行偕白叟黄童祝萬壽九言獻頌用代九如篇乾隆三年聖主躬耕耤田九言詩有序呉應枚皇上愛育黎庶誠求民隱乾隆三年特行耕耤大典以供粢盛至孝也以倡農功至勤也惟時春雨霏微川原含潤神人徯志兆年榖之順成宜有篇章導揚盛美臣惟大禹颺言九功惟敘九敘惟歌又曰勸之以九歌而天保詩人所以頌其君者旁稱遠引兼及如數以紀之皆取諸九昭陽德也臣不揣蕪陋敬效斯義作為九言以獻詩曰聖皇膺圖御宇萬象昌澤被茅簷蔀屋胥樂康勤民之心推暨海内外順序所布咨儆時雨暘惟兹六府孔修榖為重亦越八政具列農尤詳爰命秩宗稽古定典禮勅京尹備物陳彛章器合耰耡錢鎛靡不舉種分秬秠穈芑咸相將乃擇元辰履畝參保介將行慶賞蠲吉承馨香時當二月仲春日辛亥斗指震方卯位神勾芒淑氣旁流甘霖方應候金根待駕庭燎猶未央一人宵旰不遑思穆穆百爾夙夜匪懈趨蹌蹌郊外蔚葱翠華濃引翠雨中燦爛黄幄潤添黄霏烟與羽葆龍旂掩映積靄共鑾儀芝葢廻翔命駕靑壇抒誠為黎赤齋心紫殿合漠感穹蒼有司奉牲薦幣敬必飭大樂摐金戞玉鏗以鏘先農來格降福及時夏后稷肇祀率育宜陳常於焉弭節鸞和臨繡壤即看捧鞭鵠立來巖廊天子親馭洪縻蔥犗健帝耤首開東作黛耜良宸𠂻愉暢地脈愈滋沃百神翼衞庶彚齊芬芳貽我來牟廣場敷玉粒播厥穜稑嘉種盈靑箱先之勞之豈獨遍千畝恩斯勤斯固已周八方層臺觀稼班聯欣接武平疇額手袞繡瞻垂裳三推五推九推辨軌物甸服侯服綏服祈農穰自王公卿尹下逮耆庶咸恪恭整肅願効劻勷羣工絡繹扶犁儀不忒衆耦踴躍終畝紛成行二十四花信風宜長養三十六禾詞調合宫商從此載芟載柞畯至喜會見實發實秀田皆臧非惟昭報秋成儲御廪是用䖍供禋祀登神倉大君明農教稼仁孝備兆姓瞻蒲望杏享阜彰千村傳報土膏及泉動三春溉足雨澤兼露瀼樂歲或耘或耔遊暇日豐年多黍多稌饒餘糧大禮告成歡呼徹遠邇衢歌巷舞沐德先畿疆臣聞教民樹藝育萬世姬年八百肇迹開農祥易垂勸相書陳所無逸豳風雅頌穡事言彌長大有必書麟經志務本秉耒作則月令宣靑陽至漢以後曠典不數舉縱或遵循舊制徒鋪張懿昔世宗釐成禾獻瑞迄今㝢縣墠壝遙相望猗與繼志揚烈在元后允矣躬行實踐維我皇年來蠲租減賦逾億萬時復貸金賑粟施汪洋膴膴周原為民溥美利畇畇禹甸率土承休光每從螭㘭珥筆紀盛事夙慕虞廷亮采思贊襄所期幾康時勅永無斁載咏屢豐多稼同賡颺皇清文頴巻六十五
