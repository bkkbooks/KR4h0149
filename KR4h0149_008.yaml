body:
  text: 論三禮論韓菼禮之亡亡於周衰諸侯踰法度惡害已皆滅去其籍至秦益大壞漢興六經之文皆未出最先議禮則叔孫通取合當世參酌秦法沿襲施行遂為故事終西京之世賈誼董仲舒王吉劉向之徒所以發憤太息而不能已也章和時曹褒被詔條正禮樂撰次天子至於庶人冠婚吉凶始終制度百五十篇仍雜以五經讖記之文尋寢不行唐初魏徵等為貞觀禮李義府許敬宗增之為顯慶禮蕭嵩等復折衷之為開元禮宋初開寶通禮亦本開元禮增損之信齋楊氏所謂士大夫好古者止知有開元以後之禮者也夫自叔孫通壞棄古禮而高堂生十七篇者雖尋出第列於學宫而不足以助宏國家之制作歐陽氏云三代以後治出於二而禮樂為虛名豈惟治出於二哉禮與禮亦為二而朝廷所施博士所藏訖不能相明也惟周禮一書劉歆發明之王莽行之而遂以大亂重以王安石之紛更制度託於周官而世儒遂疑此非周公之書出歆莽之偽為抑又過也夫古禮十七篇高堂生所傳與淹中所出不殊其為古書無疑朱子謂儀禮是經禮記是解如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義燕射禮皆然其説為至明確朱子晚年所以亟欲論定而又以屬黃幹終之也周禮雖若繁碎而廣大精密非周公不能作獨戴記之傳試去大學中庸二書則其粹然者無幾而今列於學宫者顧獨小戴所刪學者以非功令所習周禮儀禮浸庋高閣是古禮之僅存者幸經宋諸大儒之發明而又將復久蝕於後誠可痛也往者有請以儀禮周禮並列學宫試弟子員者議格不行愚竊謂誠宜如朱子之意令習禮家一以儀禮為宗而輔以周禮禮記使學者勿忽於其所難讀而深求古禮之意以佐國家制作度越前代之盛而自叔孫以來議禮因循茍簡之失庶乎可以漸革矣儀禮論韓菼先王之治天下以至易簡者立其體以至周詳者逹其用夫天秩天敘人綱人紀其間曲為之防事為之制而三千三百教大備矣秦火之後高堂生傳儀禮十七篇冠昏喪祭鄉相見與夫聘覲燕射之儀文固不甚害於當時之諸侯而春秋以來猶有行之者學士大夫習其傳者至漢初而猶在其書又蚤出則諸儒之附益蓋寡於諸侯所去之籍及秦煨燼之餘或千百之什一也昔者朱子有劄子乞修三禮斷以儀禮為本經而以禮記為其義説更欲雜取諸經史諸儒之説附本經之下而惜乎其未果也論者曰昔子太叔譏晉趙簡子見儀而謂之禮杜預以為韓宣子聘魯見易象與春秋而嘆曰周禮在魯是禮之舊經已亡今之周官非古書也其儀文之曲折有隨世損益者聖人復起將必就今禮而去其太甚而十七篇者雖在蓋無所用之嗚呼斯誠不足與言禮者矣唐之開元宋之開寶非不盛行於一時者其治亂得失視古為何如蓋嘗讀曾鞏禮閣新儀序而愛其言曰禮者其本在於養人之性而其用在於言動視聼之間善乎得先王制禮之精意者矣又嘗愛張載之言曰經禮三百曲禮三千無一事之非仁也可謂深於學禮者矣夫此儀禮之十七篇者以五禮言之嘉禮七賓禮三凶禮四吉禮三而無軍禮以目録次第考之士冠禮士二十而冠之禮也士昏禮士娶妻之禮也士相見禮士以職位相親始承贄相見之禮也鄉飲酒禮諸侯之卿大夫賓賢之禮也大射諸侯將祭與羣臣大射之禮也聘禮諸侯使卿相問之禮也公食大夫主國以禮食小聘大夫之禮覲禮諸侯秋見天子之禮也喪服子夏傳自天子以下喪服年月親疏隆殺之禮也士喪禮自始至既殯之禮也既夕士喪禮之下篇也特豕饋食士虞禮也特牲饋食諸侯之士祭祖禰之禮也少牢饋食卿大夫祭其祖禰於廟之禮也有司徹上大夫既祭儐尸於堂之禮也統而論之人道始於昏冠父子著代莫先乎此矣始以職相見有君臣朋友之義矣鄉射鄉飲正齒位賓賢能貴貴長長賢賢之義矣燕射聘覲諸侯上尊天子旁屬與國下逮羣臣之義矣喪服士喪禮士虞禮人道之終大夫士之祭禮三所以報本反始者加詳矣嗚呼先王所以教民親愛恭敬辭讓而無淫佚慢惰之心焉此物此志也誠使行之今日不過其服物器用如玄酒醴酒鸞刀割刀貴本親用之不同耳豈無所用之哉且即子太叔告簡子之言思之其所謂天經地義乃夫子孝經之文則必以則天因地者為制禮之本明矣三百以為綱三千以為目綱舉目張皆在一書之中也而顧以是為儀也非禮也哉夫禮之行也小大由之而或未知夫形而上者之在其中也故其後知禮意者少而習其儀者亦不敢侈然自外於規矩繩墨之外所得為已多也惜乎其存者止十七篇也故明沅州劉有年洪武時御史永樂中上儀禮逸經十有八篇若果淹中之舊也則儀禮之亡者全矣夫孝經古文乃在新羅日本謝承後漢書明末猶有見之者豈得謂古書之必盡亡故漢唐求逸書賞之以官購之以金而有年之書出非其時遂復失之嗚呼此十七篇者世久以為迂闊無所用之矣雖存亦逸也而况乎其逸者也樂章論韓菼舜典曰詩言志歌永言此初命后夔之言也其後大韶既作薦於祖考既已致鳯皇來儀之應而夔言此音樂之和由於庶尹之允諧帝於是為之作歌而臯陶為之賡歌此其詩近於正大雅者也夏詩有五子之歌怨歌也孝子悌弟之言也其義近於變小雅而其音節則近於大雅者也虞夏之詩惟此二篇見於書而已其歌以為大韶大夏之節者不傳也正考父校商之名頌十二篇於周太師以那為首至孔子之時又亡其七矣成康沒而頌聲寢變風變雅作及宣王再興則有宣王之大小雅而無宣王之頌豈非其德薄而有所不敢為哉詩云吉甫作頌穆如清風雖其自以為頌而其體製聲調則不離乎雅也史克之頌閟宫夸誕而無實者也稱薑嫄媚成風也稱三壽媚三卿也稱令妻壽母媚成風兼媚聲薑也其曰莊公之子承莊公不承閔公他日夏父弗忌所以躋僖於閔之上以子而先父食者也周頌之所稱揚者皆其祖父之功德已然之事若祭祀之主人與顯相則稱其孝而已不聞以未然之事極其揚厲也故魯頌作而樂歌之體壞為後世矯誣之濫觴矣其後則雅頌失其所矣其後則雅鄭無别矣孔子告顔淵以放鄭聲反魯正樂然後雅頌各得其所知雅之不可混於頌而鄭之不可使亂雅樂也其詩然其聲然矣自古樂失傳而亡國靡靡之音不絶於世則雖後之作者未嘗不寫效雅頌之語以為郊廟之樂章而譜以世俗之樂此又其事之相反者也沛宫原廟三侯之章漢祖自作其詞安不忘危又未經李協律等協以新律斯為近古者矣逮武帝立樂府而蒲梢天馬之歌薦之宗廟此則以鄭衛之音歌鄭衛之詩而欲祖考來格也故汲黯曰先帝百姓豈能知其音耶蓋深譏之自餘歌詞出於司馬相如等文雖爾雅未有祖宗之事而八音均調又不協鐘律後之作者雖如王粲傅玄成公綏張華褚淵沈約之徒亦不過如此所以然者其祖功宗德固未之前聞而其致王之由揖讓征伐之事亦未有如虞周者太平刑措之風又不足以幾成康之盛此非可以虛文飾説為也則夫樂章之欲擬於古難矣若乃習其數者不能明其義為其詞者不能度其曲此又後世之通患也杜夔所傳鹿鳴騶虞伐檀文王四曲施之郊廟罔知所應抑又名實乖異音節已非鄭樵稱梁武自曉音律又詔百司各陳所聞帝自紏摘前違裁制十二雅樂自此始定雖制作非古而聲有倫凖十二律以法天成之數故世世因之而不能易也以愚論之梁武帝製佛法十曲名為正樂如襄陽踏銅蹄之類又更造新聲則其所製定者其果如漢兒寬所云天子建中和之極兼綜條貫金聲而玉振之者耶蓋亦以當代所沿樵故不得而議之也唐宋以後其辭既平而近俚復夸而不實其清濁高下疾徐之節奏未必果足以髣佛於穆然大古之音而致神祗鬼物也豈知夫古人之作其篇章字句多少長短非有一定及詩之既成而後被之於樂異於後世之填詞度曲多少長短必出於一者也君子言思可道而况長言之咏嘆之播之琴瑟管絃以對越於先王之靈者乎夫周頌之作亦有在康王而後者殷武之稱奮伐荆楚乃在高宗之廟則後之樂章數傳而無所增益者非古也夫本原事實以獻於祖考形容愛敬以惕其子孫此作頌之旨綴文之事審音之官皆宜留意者也諸儒語録論韓菼嘗讀論語一書不特可以識聖人之言又可以見門弟子之記聖言者簡重而有體也先儒以為出於曾子有子子夏之徒所記蓋皆得於聖人之深者其序次聖言謹嚴爾雅絶有體要今其書煌煌乎與六經相為表裏發明矣孟氏之書亦非其自著其徒萬章公孫丑相與記其所言耳今七篇者是也愚竊異夫後之學者之僅知記其師之説而不知所以傳世而行逺也夫言以足志文以足言言之無文行而不逺文固言語自然之節必不可以已也所謂辭逹而已者亦謂其辭則然而非方言俚語亦可以為辭也自夫子沒千有餘年得程子朱子而道益大顯其言無不可以羽翼聖經發皇幽渺而獨其弟子無有能整齊比屬使有文章倫理便於誦讀而尋繹者也此固尊信其師之深親承其謦咳不敢有一毫增損恐不得其真而獨不知其不可以傳世而行逺也夫程子朱子之書其所自著雖其小小題敘亦皆有法度不獨書疏劄子而已傳世行逺亦足與六經表裏發明而獨其平日之言記自弟子者方言俚語隨得輒録此誠未成之書而不無有待於後者也昔有問尹和靖者曰伊川答人問鳶飛魚躍曰會得時活潑潑地會不得時只是弄精魂不知曾有此語否和靖曰是學者不善紀録伊川教人多以俗語引之人便記此兩句蓋活潑潑當時有此俗語僧家屢用之伊川豈用禪語者故和靖直咎記者之失也抑尤有不可者宋時僧徒陋劣乃有語録儒者亦效僧家作語録夫左氏有國語夫子論語有齊魯兩家亦有家語語録之稱雖於義無害然而釋氏之書始亦諱其不文而嘗竊莊老之書以文之矣鳩摩羅什譯梵書乃用説文爾雅可謂有志其後枝分𣲖别其説益繁而不能文焉又其問答所參即事指喝本屬不經故直録其語不加剪截獨怪儒者服聖教言聖言而其書一如釋氏之書無為也自朱子而後諸儒之語録盛行與佛書交雜其言之無文同其書之義例同要為以儒而入於釋之漸不可不愼也若揚雄作太玄擬經作法言擬論語學者非之今程朱之説非雄比也學者誠不能及曽子有子子夏而豈必出萬章公孫丑下哉整齊比屬以次於六經語孟之後而凡諸儒之言之足以羽翼發明者率倣此義例以成書而姑置其語録之名若此者所以傳世而行逺也愚是以備論之春秋論朱彜尊春秋之義莫大乎正名何以正之正之以天子之命而已列爵有五公侯伯子男天子所命也其進也惟天子得進之其黜也惟天子得黜之孔子特據之以大書於䇿以明天子之命故邾附庸也而進為子滕薛來朝侯也其後滕降為子薛降為伯州虞郭小國也而稱公杞本公也而或降為侯或降為伯或降為子或復為伯他若于葵邱宋以公而稱子于溫于召陵陳以侯而稱子傳者見稱名之有異因之據例發義於宋於陳則云在喪未葬也于州于虞于郭則云非爵也于杞則云用夷禮也夫曰未葬稱子則桓公十有三年衛之宣公未葬而書衛侯成公三年宋之文公衛之穆公皆未葬而書宋公衛侯僖公二十五年衛文公既葬矣而盟于洮書衛子是稱子不係乎葬不葬也夫謂舍國滅國被執雖生齊之于死故稱公則紀侯大去其國不當復書侯談子弦子溫子夔子沈子胡子不當復書子小邾子執于宋徐子執于楚衛侯鄭伯曹伯莒子邾子執于晉皆不得復書爵也其曰杞成公之卒賤之終其身也文公之來盟既已賤之矣其卒復書伯其義何也成公文公之書子也以其用夷禮雖大曰子也其先公降而侯侯降而伯其義何也之衆説者皆由尊聖人之過謂聖人可以意豫奪之進以示褒黜以示貶測之愈深而離之益逺矣方周未衰諸侯不享覲者一貶其爵再削其地至於不朝者三則六師移之逮後戰於繻葛敗績於貿戎而成周之禾溫之麥可芟而踐六師既不能移土地又不能削惟爵號之存猶可操其柄則因其罪貶之當日之諸侯未肯降心以從天子之命其盟會慶弔來告於宗國必仍其舊而莫之改孔子則因其時而考其事書其爵以正其名凡王之未嘗黜者雖州虞之細猶得稱公其既黜者杞雖二王之後迭降為子俾知王命之不可犯僭稱之不足恃以取信後世而當時之亂臣強國知所懼焉故曰春秋天子之事也曰然則宋陳稱子不以在喪未葬歟曰諸侯即位必命之天子既葬而稱子未受命於王也受命矣則雖未葬可以書爵宋公衛侯是也子言之矣惟器與名不可以假人君之所司也夫以君之所司而在下之權得以進退豫奪之則孔子先自處於無王何以使亂臣強國知懼而示信於後世乎顧羣儒之説猶紛紛附會之不一此乃孔子所云罪我者也詩論朱彜尊孔子刪詩之説倡自司馬子長歷代儒生莫敢異議惟朱子謂經孔子重新整理未見得刪與不刪又謂孔子不曽刪去只是刋定而已水心葉氏亦謂詩不因孔子而刪誠千古卓見也竊以詩者掌之王朝班之侯服小學大學之所諷誦冬夏之所教莫之有異故盟會聘問燕享列國之大夫賦詩見志不盡操其土風使孔子以一人之見取而刪之王朝列國之臣其孰信而從之者且如行以肆夏趨以采齊樂師所教之樂儀也何不可施於禮義而孔子必刪之俾堂上有儀而門外無儀何也凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節今大小戴記載有貍首之辭未嘗與禮義悖而孔子於騶虞采蘋采蘩則存之於貍首獨去之俾王與大夫士有節而諸侯無節又何也燕禮升歌鹿鳴下管新宫大射儀乃歌鹿鳴三終乃管新宫三終而孔子於鹿鳴則存之於新宫則去之俾歌有詩而管無詩又何也肆夏繁遏渠天子所以享元侯者故九夏掌於鐘師而大司樂王出入奏王夏尸出入奏肆夏牲出入奏昭夏鄉飲酒之禮賔出奏陔鄉射之禮賔興奏陔大射之儀公升即席奏陔賔醉奏陔公入驁此又何不可施於禮義而孔子必刪之俾禮廢而樂缺又何也正考父校商之名頌十二篇於周太師歸以祀其先王孔子殷人乃反以先世之所校歸祀其祖者刪其七篇而止存其五又何也穆王欲肆其心周行天下祭公謀父作祁招之詩以止王心詩之合乎禮義者莫此若矣孔子既善其義而又刪之又何也且詩至於三千篇則輶軒之所采定不止於十三國矣而季札觀樂於魯所歌風詩無出十三國之外者又子所雅言一則曰詩三百再則曰誦詩三百未必定屬刪後之言况多至三千樂師蒙叟安能遍為諷誦竊疑當日掌之王朝班之侯服者亦止於三百餘篇而已至歐陽子謂刪詩云者非止全篇刪去或篇刪其章或章刪其句或句刪其字此又不然詩云唐棣之華偏其反而豈不爾思室是逺而惟其詩孔子未嘗刪故為弟子雅言之也詩云衣錦尚絅文之著也惟其詩孔子亦未嘗刪故子思子舉而述之也詩云誰能秉國成今本無能字猶夫殷鑒不逺在于夏后之世今本無于字非孔子去之也流傳既久偶脫去爾昔者子夏親受詩於孔子矣其稱詩曰巧笑倩兮美目盻兮素以為絢兮惟其句孔子亦未嘗刪故子夏所受之詩存其辭以相質而孔子亟許其可與言詩初未以素絢之語有害於義而斥之也由是觀之詩之逸也非孔子刪之可信已然則詩何以逸也曰一則秦火之後竹帛無存而日誦者偶遺忘也一則作者章句長短不齊而後之為章句之學者必比而齊之於句之從出者去之故也一則樂師蒙叟止記其音節而亡其辭竇公之於樂惟記周官大司樂一篇而其餘不知制氏則僅記其鏗鏘鼓舞而不能言其義此樂章之所闕獨多也且夫六詩之序自周官魯之次周商之次魯不自孔子始也而後之論者若似乎私其宗國存其先祖而然尤剌繆之甚矣王制變禮易樂者為不從不從者君流今以太師之所陳大司樂之所教瞽矇之所諷誦輒取篇章句字而刪去之是變禮易樂也若移秦於魏唐之後檜後於陳豳後於檜其亦何所取義而孔子必更之噫衰周之際禮不期於壞而壞樂不期於崩而崩孔子方憂其放失考求之不暇而豈其刪之以自取不從之罪哉理學真偽論張廷瓚且夫道之所以大明於天下萬世者賴有聖賢真儒以維繫之也三代以前道之統肇於帝王明於師相堯舜禹湯文武周公之治法其及天下也𢎞孔子孟子之立教其及天下也逺是以微危精一之旨緝熙敬止之學道德仁義之理體諸躬修措諸事業播於一時則有禮樂政刑之化垂於後世則成纂修刪定之書煌煌乎如日月之經天江河之緯地靡不仰焉靡不歸焉豈非斯道斯民之大幸歟然當其時已有楊墨之言告子辨性之説潛伏於道統昌明之日而理學真偽此其肇端也自漢以後董子韓子闡發微文屏斥異端注疏繁興亦道統修明之一助嗣是而濓洛關閩諸儒出而堯舜禹湯文武周公孔孟之道著於倫紀明於六經昭然於天下後世迄今觀周張之學歸本於靜誠二程之學切求乎仁敬邵子先天之學啓聖人未言之旨朱子傳注之學發聖人已言之藴類皆躬踐實行內外一致而不徒托諸語言議論之間其時寧有真偽之殊哉夫理學之所以分真偽者皆由浮誇之士徒有慕乎道德之名而欲襲取其貌以欺天下後世其發議於廊廟之上何嘗不侃侃言忠至問其靖共匪懈之忱則不知其安在也周旋於家庭之內何嘗不切切言孝至問其服勞養志之事則不知其何屬也以及處已接物之間危疑艱難之際或慷慨自言其介節或勉強責人以難行非不足以竦一時之聽觀一旦身歷其境而其畏葸趨避之狀更有勝於常人數倍者蓋由其人務名而不務實以欺而不以誠此真偽之所由分亦如孔孟時之有楊墨異端也夫朱子為有宋一代大儒今觀其遺集所存味道之言發見於詩歌者不少而翰墨之留傳人間者亦往往有之後世學者或有謂詩歌翰墨非理學所當務是蓋無兼長遊藝黼黻潤色之才故為此語以文其固陋適足為天下後世笑而已理學真偽論沈涵世道所以常存人心所以不敝者何恃乎恃有理學之真而已矣三代以前君師之統出於一堯舜之精一危微禹湯之祇台建中文武之緝熙執競數聖相傳實為萬世理學之祖下至羣黎百姓家無異訓人無異習無論理講學之名而理學自昭於天壤當其時并無所謂真也亦安有所謂偽者雜出於其間哉逮後世人心不古風俗日漓天生孔子以木鐸斯民而易詩書春秋禮樂炳若日星子思孟軻從而光大之言心言性言仁言義其理益詳其學益顯豈聖賢之得已哉蓋深懼天下之偽為理學而實非理學者貽害於世道人心至大故以憂世覺民之心著為扶衰救敝之論故曰六經之作皆聖人憂患之思也彼夫楊墨之徒以兼愛言仁以為我言義荀卿以性為惡偽學之弊至河決魚爛而不可復止若非孔孟預知其弊而昭示之力拒之天下後世安知理學中自有真者在耶漢唐以來儒者固多而真偽亦異如河汾昌黎於進退出處之間君子猶有遺議况揚雄之劇秦美新王何之髙談莊老又不足言已逮及有宋真儒輩出濓溪之立誠也二程之主敬也橫渠之致虛守靜也紫陽之格物致知也孔孟之傳得諸儒而愈顯厥功懋矣然使當時徒襲夫講學論道之名而究無立身行已之實天下後世亦孰從而信之惟其言行相符名實相副是以理學至今而彌彰即如九淵之尊德性守仁之致良知説者謂其近於禪然鵝湖鹿洞當時原未嘗抵牾而文成功業炳耀廟廊豈偽學之徒所可並稱雖皆謂之真儒可也總之理學出於真則不言而躬行事君者不必以忠名事親者不必以孝名持躬接物者不必以仁義名隱微天性間固自有至真者在也否則裒衣博帶重席擁臯高談忠孝而實悖於君父矜言仁義而實近於矯誣真聖道之蟊螣耳何足以言理學哉昔人云秦人焚經而經存漢儒窮經而經絶經學且然况理學乎所願世之儒者日從事於其真而毋即於偽則幾矣理學真偽論胡會恩自古帝王崇儒道為聖賢繼絶業為萬世開太平未嘗不以表章理學為亟亟也然必嚴其辨而後矯飾者不得託正其趨而後似是者不得參所分在心術之微而所關及於天下國家之大誠恐名實一淆而流品莫定則風俗人才有受其弊而不知者此理學真偽之間所當取而論定之也嘗試思之執中之傳肇於唐虞垂教之統開於洙泗厥後諸儒授受代有師承初未嘗立理學之名也逮有宋之濓洛關閩出闡先聖之微言振千秋之墜緒著書立説以昌明世教啓迪羣蒙皆諸儒躬行心得之所及而學者翕然宗之則理學之名由斯立焉然尚其真則不惟無愧於諸儒而直可上希乎先聖涉於偽則不惟有悖於先聖而早已獲罪於諸儒今夫真儒之為學也本之日用彛倫措之經綸事業忠孝非以立名亷節非以沽譽以至一言一動之間不緣飾以驚愚不矯情以鎮物無往而非真則無往而非理學也如其不然而襲端人之貌以為聲援之階修長者之容以便營私之術雖高談性命矢口詩書而隱微食影之間不可問者實多則亦適成其為自欺之學而聖人所斥為色取行違之徒而已矣是以學者之立心也必先於立誠而謹於為已以和平中正之操而為光明磊落之槩不參以作偽之念不雜於為人之私可以質幽獨即可以質聖賢可以對屋漏即可以對君父則有理學之名可也無理學之名亦可也蓋崇其實則可謝其名而尚其真則必絶其偽斷斷如也雖然物情之不能有真而無偽久矣惟亶聰立極之聖人懸鑑衡以辨羣品考古鏡今旁燭無疆必不使偽者得以亂真而真者或反絀於偽也斯其為理學昌明之會乎無極而太極論張廷璐易曰形而上者謂之道形而下者謂之器夫形而上則不可以形求也不可以形求而實為衆形之所由生而即為衆形之所莫能外夫天地之大萬物之賾必拘拘焉執一形以求道不可以盡道也亦並不可以明道也道無形也道無形而必執形以求之則其視道也淺矣然則道終不可以形求乎道無形而天下之有形者皆道之所以形其形至虛也而涵天下之實至約也而貫天下之紛至無也而妙天下之有此周子無極而太極之説闡前聖未發之旨而實為千古不易之定論也今夫天地吾不知其所由始也而道生之有天地然後有萬物萬物吾不知其所紀極也而道生之渾然一理運行於沖虛冥漠之中無聲臭之可尋無方體之可執然而乾坤之所以覆載日月之所以照臨風雨霜露之所以動散而凝結山川之所以流峙君臣父子夫婦昆弟朋友之所以耦處而類聚以至於飛潛動植跂行喙息之屬所以若其性而遂其生莫不各有自然之道以主宰乎其間則其所謂無聲臭之可尋無方體之可執者又豈非造化之樞紐而品彚之根柢也哉故析而觀之物物各具一太極也統而言之萬物同此一太極也萬殊之所以分一本之所以合無體而無乎不體無在而無乎不在故曰無極而太極也或疑周子於太極之外復增無極與易有太極之言有未合也不知原太極於無極所以明其無形而有理而太極即在無極之中即無極而指其為太極所以明至理不可以形求而無極原不在太極之外故朱子以為默識於意言之表張子以為淵源粹精秦漢以來所未有則周子斯言正與大易形而上之旨相發明而何疑其有未合也哉黃鐘為萬事根本論張廷璐天下之事不得其中則施之而有所不通得其中則推之而無乎不凖蓋中也者得乎天地最初之理而調劑於隂陽動靜之平是以天下之大事物之紛賾雖千變萬化皆莫不由乎此而無有踰於其外者此黃鐘為萬事根本之説誠古今不易之定論也昔者黃帝使伶倫取嶰谷之竹生其竅厚均者斷兩節間而吹之以為黃鐘之宫制十二篇以聼鳯之鳴雌雄各六比黃鐘之宫而皆可以生之均其長得九寸審其圍得九分積其實為八十一分凡五音十二律六十調八十四聲皆由黃鐘而損益之此黃鐘之所以為律本也由是以之審度而度長短積黃鐘之十分以為寸各自其十以至於尺丈引本起於黃鐘之長而五度審矣以之嘉量而量多寡黃鐘之管容黍千二百為籥合籥為合各自其十以至於升斗斛本起於黃鐘之籥而五量嘉矣以之謹權衡而平輕重籥所容之黍重十二銖二十四銖為兩十六兩為斤三十斤為鈞四鈞為石本起於黃鐘之重而五權謹矣推之權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生凖而規矩方圓繩直之屬莫不由之以定矣夫天下之事未有外於長短多寡輕重者而長短多寡輕重即未有能外於黃鐘者則黃鐘之為萬事根本不信然哉蓋天地之間所以彌綸而無間者理也數也黃鐘以自然之數察自然之理所謂純粹中之純粹者惟其中而已矣故其聲則中聲也其氣則中氣也法制由之以立禮樂由之以興風恪由之以同道德由之以一中庸曰喜怒哀樂未發之謂中中也者天下之大本也知此蓋可以曉然於黃鐘為萬事根本之義矣日月五星行道論張廷璐自古聖人為治皆取法於天堯典始命羲和欽若昊天首舉日月星辰舜典在璿璣玉衡以齊七政張衡靈憲云文曜麗乎天其動者有七日月五星是也蓋經星之附於天者終古不易其運行之參差而立儀製器以窺測之者惟在日月五星耳七政齊而經星不必言矣顧七政之運行有遲速之分而其所行之道亦不一漢書曰日有中道月有九行中道者黃道也天之體圎如彈丸北高南下北極出地上三十六度南極入地下三十六度南北直徑一百八十二度強赤道當天之中央去南北極各九十一度黃道半在赤道內半在赤道外北至東井去極近南至斗去極逺東至角西至奎去極中日行至於斗在赤道南二十四度則為冬至至於東井在赤道北二十四度則為夏至東至角西至奎行黃赤二道之交中則為春秋分此日行道之大略也月春從青道夏從赤道秋從白道冬從黑道道各有二皆斜出於黃道之內外其出入黃道不過六度故合黃道而謂之九此月行道之大略也五星皆隨日由黃道行而盈縮遲速各異木為歲星故歲歷一辰火為熒惑行列宿司天道出入無常金水附日而動金為太白水為辰星常繞日旋轉或前或却土為填星歲行一宿蓋五星之位有高下則度有廣狹位近地者其度狹而易周位逺地者其度廣而難周五星大小不同各依其行順時應節但日月則運行而前五星則有留退留順之異候天官家所謂見伏留行者是也此五星行道之大略也諸説具載於歷代史書宋儒亦備論之詩書傳注皆可考然歷年既久而不能無差即以冬至言之堯時日躔虛三代則躔女春秋時在牛自漢以後在斗今且在箕矣蓋由歲差之故舉一冬至而其餘不可類推乎要而論之朱子云天無體二十八宿便是天體故日月五星運行於天之下雖所行之道不一而同以二十八宿為次舍劉向所謂宿者日月五星所宿舍也古今之言天者詳矣周髀宣夜之説已不可考惟渾天獨存漢晉以來代有儀器唐李淳風更為圓儀三重有六合三辰四遊之名皆所以測日月五星之行度大約皆渾天之法即璿璣玉衡之遺制也蓋蒼蒼者天雖逺而無所紀極而儀器可以推測而知惟儀器逾密則推測逾精而日月之運行五緯之躔次皆昭然可覩不失纍黍於以佐聖人奉若祇承之道為敬授人時之本何可言天道逺而無裨人事也哉皇清文頴卷八
