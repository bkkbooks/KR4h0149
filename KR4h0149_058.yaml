body:
  text: 詩四言古詩神功聖德詩高士竒皇帝聖德與天為一日照月臨禀朔奉職博恩普施歛福建極魁柄獨握宏綱自挈風流令行心搏志戢有奬者順有誅者逆昔奮大討鋤剪三蘖以次銷鑠如湯沃雪海島逋寇波濤濶絶戈舡濯征版宇式闢四方敉寧德敎洋溢馳義沙外震威漠北罔不欽承孰敢僣越附塞欵闗範我䋲尺曰惟皇仁是生是植乃兹蠢頑荒獷弗率性資豺狼情狀鬼蜮咆勃氣勢負恃膂力雄長外區并吞諸國與彼同壤咸被侵軼駕言尋讐用恣饕餮鉤爪鋸牙擇肉而食鹿斯之奔無地伏匿扶服來歸仰我存恤我皇如天矜此饑踣煦之陽春俾遂生息兇渠呌呶假釁開隙怒其臂螳以犯天殛翾飛近邊窺伺疆索命帥爰逐將殄而逸我皇曰咨是當撲滅匪彎天弧妖星誰射大興六軍自將擊賊丙歲之春卜日諏吉禡牙誓師有䖍秉鉞虎賁期門禁衞積卒石鎧金甲琱戈畵㦸二矛重弓龍盾鶴膝寶劍長鎩犀剸蛟截千乘萬騎焜燿赫奕朱旗鳥章彗雲拂霓月驥天駟玉瓖珠勒逸熊飛鳬趫迅滅没星陳天行輿輦雜㳫俞騎先路王良執策爰陟邊庭聿渡沙磧壁壘精嚴亭障修飭魚麗鸛鵝張箕舒翼陳圖兵機皇猷允塞風雲龍虎變化出入兵揚九霄逈瞰巢窟蚩蚩醜徒虺蟠蟻結忽臨天兵落膽奪魄相携竄奔欲避鋒鏑我皇曰嘻汝竄奚適既張之羅復掩之畢果逄右拒奮勇電擊大呼以鏖䧟堅破敵氷刃俱絳鐵衣盡赤棄骸谷量獲械山積妻孥戮俘厥魁倖脫築封長鯨京觀嵽嵲王師聿班候屆炎熱我皇曰嘻滅寇可尅惡木遺根有肄必茁鋤深剔幽務絶株橜於兹歲冬法駕再出廵邊渉河朔方駐蹕灼獸之窮計慮惶惑乞援他邦覬助單孑廼命諸將分兵控搤凡要害區戈鋋林立鞮譯所通萬里傳檄汝皆我臣毋右嚚慝聞風仰流畢會赤帟請効職貢乘黄兹白嗟汝賊黨脅從伊慼譬如昆蟲仰望膏澤淪棄荒昧不見白日曷不我歸恩豈汝惜詔書煌煌沁腑浹骨羣相歡告有感以泣扶老提幼叩轅匍匐我皇曰咨兹可軫惻賜之食飲授以禄秩熙陽太和德漬幽蟄欵附纍纍鶚音並革賊勢離散尚逞剛愎遷延不降罪大心怵鼎之沸魚日就煎逼肯容遊魂寛誅漏刻復於今春三整師律榆中右轉靈武西接川原曠蕩嶺嶂崷崒大河坤隅蘭錡四列宣威定謀盡殄回遹兩甄並進霆轟飈疾自彼氐𦍑胥我爰即古之伊州今曰哈密乳麛是經迺捕而縶獻諸天家檻致京闕巨憝震驚破卵傾穴汝子已擒誰汝親暱區落潰叛左右離逖鞠頑不振乞活無術坐膺斧膏行就車裂徬徨窘縮惴恐股栗服毒自殺悔禍靡及部黨内附大造埏埴自西旋師早洞情實河湟上源遠泛舟楫沿波順流以示恬謐首惡果殱奠此反側中途凱歌烝庶悅懌龍荒廓淸日朗天碧成神聖功昭文武烈斷自宸衷匪藉叅決商軺不征民賦不益師不久淹役不再籍憂勤一身自朝至夕氷霜歴踐風雨沐櫛山險水淖宵躋曉渉與衆均勞焦思倍切日親萬幾從容不廹窮幽絶遐燭以濬哲計程按期若合符節邀遮縱禽百無一失獮此封狐鞭箠絶域安民荅天視古勲百八表同風六宇合轍皇哉唐哉惟天與埒飲至告廟刻銘勒石空前軌躅為後法式微臣扈行職司珥筆頌颺天聲傳千萬億聖武遠揚靑海平定詩八章有序楊椿臣聞聖哲之君建非常之績垂光載籍者若詩皇矣叙伐密伐崇殷武常武紀荆楚徐方來享來庭之盛其事咸炳耀赫濯昭爍今古伏惟皇帝陛下即位以來覲光揚烈丕冐四表近又不十五日蕩平靑海用兵之神成功之速推校徃昔莫可倫比誠宜播諸聲歌丕顯無前之偉業臣椿職司載筆竊不自揆恭撰平靑海詩八章謹拜手稽首以獻赫赫我皇惠兹西土命將徂征桓桓其旅爰類爰造爰宜爰禡左之右之無不恭者一章皇謂帥臣汝師于邊式和爾軍以撫遠人甘松高高洮水滔滔我撫我招我弓是櫜二章彼惛不悛輕蹈我疆如豕斯突如鴟斯張勝之兩川師武之力師武之力惟皇之德三章皇德彰止我武孔揚靑海茫茫我天子是疆乃震乃攝乃伐乃克我敵則劉我降伊釋四章其降既多或咏或歌携厥髫耉襁負娑婆煦之育之天子輯之百萬之衆一朝納之五章烏蘭之西噶斯之北是巢是窟是傾是踣將士一心咸奮仡仡賊遠遯逃潜踪域滅六章皇師奏凱三月之朔自我出師月哉生魄我行未久我功聿多我功既多天子攸嘉七章天子嘉止惟西陲有成西陲有成皇心載寧乃爵乃賞乃播德音薦之郊廟慶我太平八章乾隆四年聖駕南苑大閱恭紀有序張照臣謹按詩三百篇采薇出車杕杜文王時詩也後遂為周天子命帥凱旋飲至之樂章江漢常武宣王時詩也美宣王同淮夷平徐戎若夫太平無事安不忘危寓習武于田獵因以大閱甲兵于傳有春蒐夏苖秋獮冬狩之文有艾草為防纒旃為門戰不出頃田不出防之典此皆成康之遺規文武之方策也而文武成康時並無詩惟傳成有岐陽之蒐而已至宣王時乃有車攻吉日之什豈當周盛時每歲行之故為常事不書歟抑舊有篇什而逸之也或曰彼茁者葭壹發五豝于嗟乎騶虞是即文王春田閱武之詩而後世遂以為燕射樂章記曰天子以騶虞為節是也其殆然歟我國家聖聖相承重熙累洽皇帝敬天法祖勤政親民庻績咸熙萬方咸寧乾隆四年十一月大閱於南苑率由舊章布昭聖武神靈歡喜耋艾歌咏夫周宣太平之業未足比成康也今日軼成康而上之奚問周宣乃車攻吉日之篇美宣王復古之績流耀古今列于學宮其在三百篇外者又有石鼓之文為今昔詞人心艶口語嗟非後世所幾及夫君上有盛德大美十百周宣而臣子學不逮古不足以發揚騰踔垂示萬世與車攻吉日等詩比士大夫之恥也雖然老人擊壤童子歌衢寂寥短章寧得與後世詞人賦頌絜其文采而唐哉皇哉若日月之俯視衆星則繫乎堯德之大而不繫乎老人童子之文辭也明矣依此以譚則雖以臣之不文其亦可以有述歟爰拜手稽首而獻詩曰於鑠皇淸萬國玉帛亘地罄天咸登袵席七德既宣櫜戈衅甲春風春雨大化翔洽三后在天若堯舜禹我皇嗣服乃文乃武法仁皇仁遵憲皇憲揚烈祖烈受上天眷雝雝在宮肅肅在廟秉耒耤田横經學校緝熙單心終始典學力是聞知忘其先覺敷政優優不剛不柔萬類咸若以育以休田疇耕耨車牛服賈士一行義工用規矩八風孔時雨暘寒燠夏葛冬裘左飦右粥惟帝曰咨四海宴清繫于苞桑先民有經天生五材利用厚生廢一不可誰能去兵百歲不用一日莫忘嬴縮變化與神同方招搖之下天下良藥其勝以慈其生以弱利適器至用敵敎盡處女脫兔由練由訓乃詔司馬作我六師南有甫草駕言涖之如荼如火如雷如電如箕如翼如江如漢白羽咽原霜鋒照野千旓霞飜萬馬波瀉馬止陣合斑其相紛五色陸離百花發春帝乃大徇迺拊迺勉聖日華耀金支宛轉嘽嘽禁旅仡仡元戎悉率左右天子是從鼓動而進鉦動而礟一線熻赩玉女巧笑萬霆怒擊大海濤奔烟埃漲天若雲非雲九進九伐礟乃連環好整以暇儀靜體閑九天之上動于無眹九地之下守于無畛烟開日明鳥虎蛇龍其餘握竒偏伍彌縫設右為牝益左為牡九方七圓周旋無䆒演陳既畢整旅舒舒若雲歸山震憺依烏帝乃釋甲還宮大賚投醪挾纊一時虎拜皇帝神武在于不殺守在四夷未嘗用鉞若子歸母若肢䕶首若川并海若無運有我以我仁彼識彼義四海萬年異人同氣旗纛旄麾干戈戚揚惟以習勞無伐可張學士臣照三朝禁直載撝金管詠歌盛德乾隆三年聖主躬耕耤田詩有序聞棠乾隆三年中春之吉皇上廵行東郊率羣后躬耤千畝重民事也列辟卿士咸仰勤政務本之至意作為詩歌吟詠德化臣辭語淺薄不足以美盛德之形容顧侍從之臣職以文辭自效詎敢闕如敬拜手稽首頌詩十章以附歌衢擊壤之末詩曰皇帝在宥播物咸植如春斯融如雨斯澤歲功其初農事孔亟居高履卑用示民則其一太史順時于古有訓春陽沮洳地氣含醖睠焉郊畿德乃廣運趨民于勤風本自近其二民之服疇耕鑿比比帝力不知顧我疆理春無遺勤秋有厚偫詎忘先勞羣動斯起其三東方少陽星殷朱鳥祠官滌除田令潔兆飛亷屏翳夙爽清道蕃廡庶生職是泰媪其四天田一星象帝之耤元風恢恢靈澤奕奕箕揚其精牛奮其軛惟農丈人亞若主伯其五帝御六駕賁于郊廛澹澹流水翳翳遠烟蟄户初啟春人尚閑周覧物化穆然德淵其六春疇載融膏脉營腠三推有儀禮義耕耨庶氓終之雨决雲驟施生化工天付我后其七躬稼既畢帝盱曰咨九鳸農正竝毋後時爾食爾力爾田爾治爾瞻南畝甘雨來思其八神臯葱曨風日多暇麥秀黍華膏露如瀉粢新醴甘以薦廟社於屢豐年龡豳飲蜡其九猗歟我皇敬德作所田功越周溝洫循禹沐膏詠勤聖作物覩於萬斯年承是福祜其十聖駕東廵盛京恭謁祖陵大禮慶成詩有序汪由敦臣聞奉先思孝必隆報本之祀懷永圖艱必宏述祖之典是以景員松栢藻歌商楹高山漆沮騰軌姬籙闡祚由其卜昌釐風以之歸厚於皇聖清俔天錫羡拓迹開統重光緝熙若水降祥之地繞樞電而湛星虹橋山閟兆之都擁熊羆而蔭雲物瑤臺􅑬嵼外大國之幅􅊷皇澗瀠洄篤公劉之締構珍符欲集宇宙搆其氤氲運會將開山川鬱其磅礴神臯奥區福地昌衢創古迄今靡得侔焉巍巍天陵天設地成左遼右瀋盛京建焉九鼎既奠是為陪都狹沛里而陋譙鄉掩媯墟而轥邰室三垣晳晳天街分箕尾之躔九野芒芒地險跨幽營之阯削成長白抗終南太華之峯沆漭渾同滙溫洛榮河之氣俗泰華胥風厚豳野形勝天府華實上腴赫矣壯乎斯太紫之殊庭坤靈之寶域也若其重軒雙闕之麗參塗九市之殷千廬八屯之周百㕓萬雉之密粲乎隱隱與京師同制展足以奉陵邑而固皇基隆上都而觀萬國者乎我皇上燕天嗣構敬日凝圖􅊞恩累愛之化成稽古憲章之烈盛協氣之所翔遊淳化之所甄冶文明之所震耀聲敎之所布濩淪深格高暢垓泝埏景鑠鴻祐殊徽茂祉穰穰簡簡磑磑即即百年膺慶鍾明備之期七世恢基考祖宗之德固已道藹配京勲炤紹庭矣猶以象耕靈隧展軨之路方遙龍鼎幽宮升香之禮未舉蒼蒼畢隴鬱鬱舂郊永言弓劔之遺有積露霜之愴昔我皇祖躬勤三廵有恪執事上以崇本報功答列聖在天陟降左右之眷下以覲岳省方知民風土俗王業艱難之自斯乃國家舊章神聖遠圖不可闕也歲在昭陽月旅夷則登穀告期載嘗佇典皇上乃奉皇太后發軔紫宮淸埃遼左黄麾紫蓋出霄甸而馭風雷赤芾金貂扈烟途而序鵷鷺靜帷宮於緑野仍勤問膳之儀肅帳殿於黄圖尚展含飴之樂桑麻彧彧夾輦路而鋪芬黍稷與與委珍阡而縟錦若乃取材講事順時令而耀威神舉柴收禽贊梁鄒而登俎器諒軌物之所經豈遊娯之為壯于是風馳霧集長驅虎踞之鄉天旋雲游直指龍飛之宅桑梓依然枌榆在望晬容有穆孝享用蠲洞屬幽喻肅雝顯詔官職有序駿奔秉德黄彛玉豆告嘉栗於靈阿金支秀華接神斿於詄蕩蒼雲布地豐融享右之符蕭光燭天晻藹淵祥之貺於斯時也穆穆焉皇皇焉愛慤咸致僾愾若接騰漢典於視奩跨唐規於獻服者矣既而存問高年採訪謠俗酹褒鄂之陪塋徧方望之羣祀御總章布綸綍中陽白水仍沾賜復之歡羽琌鈞臺共飫愷樂之燕所以承靈億而擁休嘉隆孝熙而示慈恵也爾乃七騶厲飾肅禁旅而習威儀三表鳴鐃稽政典而明坐作軍容以禮成大閱以義舉因斯以讋泰武于遐外憺威稜於藩維震疊之用斯宏柔懷之經彌遠然後振旅神都迴麾雲嶠千旌鳯轉翊大輅而前驅萬騎龍趋遵康衢而復路邦基有維岱之安鼎業有如岡之福懿鑠之蹟猗歟煒哉且夫追遠格祖配天綏嘏鴻慶也時邁車攻觀風會同茂典也大禮大樂神人允若治本也乃文乃武威福率土化權也用能經綸萬樞雍動八表道凝克紹垂衣馳玉檢之功義極如存指掌謐珠曩之運比廵遊於徃事則汾射韜芬第嘉頌於從臣則巻阿避德臣沐浴元化叨塵近侍雖未獲參扈淸蹕而竊幸遭逄盛典遠希生民皇矣思文淸廟之作雍容揄揚降慕長卿孟堅退之子厚之篇鏗鍧炳燿輒採古意勉課末音謹為雅詩十五章上獻詩曰昊天有成命集我皇淸爰降帝女錫朱果以茹篤生藝祖肇是愛新𤓰瓞衍緒長白導源運啟高山鬱鬱永陵峻極於天一章赫赫太祖勃興東土甲士十三我仇是殱既殄我仇我戎孔修羣凶沸騰王師濯征殪厥戎首方域以寧九姓摧止五部歸止覆育列國帝號徽止二章天祚大邦遼水之陽既溥既長考卜惟皇曰時曰止於瀋之涘宅是盛京萬年攸始三章明綱既隳四路集師皇奮其武天戈一麾五日三捷大皇清之業誕受四國巍巍福陵垂裕萬葉四章太宗嗣服仁濡義肅平壤漠漠朝鮮臣伏杏山矗矗明師載覆如飈斯馳至于靑兖匪利天下弗劉弗翦五章武功既煇文明矞皇乃創國書乃秩典章八纛央央百僚蹌蹌使鹿使犬重譯來王於昭昭陵長發其祥保人斯無疆六章皇矣世祖統一九區式睠舊京肇啟帝圖景亳生商豐鎬造周元戎禁旅卿尹府僚以衞山陵以固皇都七章越我聖祖六飛三臨用展孝誠翼翼以興大朝鄷宮思滂景從亦越我世宗來覲於東三后在天肸蠁昭明不顯不靈佑啟我後人八章皇帝御宇於兹八年於郊於廟對越有䖍惟列祖丕緒時予仔肩聿追厥先敢曰遠而皇祖有明憲予敢緩而肅奉慈御龍婉婉而至德要道崇化本而九章鸞旗晨發旭日杲杲山祇岳靈徯望翠葆載飭我旅戢我徒圉分部徐驅母躪我稷黍十章爰歴古塞爰駐山莊追維祖德攄慕天章鑾輅東指藩服之履來迓來衞來庀儲㣥帝顧曰嘻毋汝勞只匐伏固請奔走趨俟十一章狩於平郊選徒不囂麀鹿儦儦有熊斯趫有虎斯嗥天弧一發猛獸在庖諸蕃震愕相顧告語聞諸我先曰聖祖神武永世追慕今皇天威宛聖祖重覩儀式刑祖宗之德莫敢不服揚祖宗之功莫不率從十二章言循三江言陟重岡自東徂西三陵相望旖旎雲旂煜爚神光綏予孝孫歆是孝享言逮功宗言徧羣神我皇烝哉十三章言次盛京路寢奕奕羣后肆朝會同有繹式宴式賚湛露滋液施及陪貳游泳皇澤十四章禮告備矣德施穊矣遄言還蹕敬我事矣于廟告至拜列祖明賜經途屢千經時累月如遊庭除靡戒靡蹶若艾若稚扶擕走謁亶列祖之詒繹時孝思於萬斯年介我純熙於萬斯年鞏我丕基十五章聖孝光昭詩有序德齡大哉我皇上之以孝治天下也孝德之著於政敎者無一事不下愜於民隱孝思之展於祭享者無一念不上格乎天心是以郊社宗廟之祀既已竭誠盡敬昭應特著近甸陵寢歲必躬奉皇太后恭詣展視以申思慕之情至於列祖山陵在東土者道里悠遠戒飭既備乃於乾隆八年秋七月卜吉上陵特命道由塞上以避禾黍在畝兼振旅大狩以講武事是時秋霖正盛比大駕將發廟告之日天朗雲開羽衞啟塗常逄澄霽扈從之官下至輿臺圉牧莫不踴躍歡欣外藩䝉古仰見聖主神武上天靈佑咸鼓舞震讋輸誠效順惟謹時邁所屆皇上怡怡愉愉祇奉皇太后起居慈懷豫悅彌慶康寧暨至園寢肅恭將事具禮有素列祖格饗惟懌大典既成中外忭慶以為典禮之行天心民志協應若此皆皇上大孝至誠之所感召曠古以來實為僅見珥筆之士無不詠歌盛事傳之無極臣職忝卿貳兼同大學士臣陳世倌敎習庶吉士分宜率先歌頌上德謹獻四言詩一篇計一百韻言雖不文然事皆紀實用述聖孝之隆昭示四海焉恭惟我皇大孝備矣提虞挈周超邁曩軌孝以纘承篤懷靡己孝以愼修敬用五事孝以率由庶績咸底惟時惟康夙夜顧諟有截政敷無垠化被萬邦協和一本推暨陶匏繭栗式用泰畤對越惟虔報本返始於穆淸廟禮官既庀鬷假無言苾芬秬秠赫赫列祖雲蒸龍起肇業開基不堦尺咫率育疆界無有彼此大統既集鎬由豐徙武功載揚文德永矢有奕山陵環畿凝靄歲奉慈寧敬恭展視景彼留都高山天峙橋山穀林鬱葱佳只聖祖繹思遠薦簠簋福祉既膺慶覃海涘巨典煌煌光于國史我皇繼述以綱以紀孝思維則心源一揆永言不忘大禮惟履慈旨尤殷思齋任姒道遠維勤既經既理乾隆八年維歲在癸爰筮吉日肇修禋祀其時孟秋日次鶉尾霖雨時行以汎以灑皇帝乾乾有䖍勿怠屆日告廟雲開雨止乘輿起行周道如砥淸暘溥照林木曜綺天心之格至誠之恃志氣交應協于宮徵扈從讙謳蒸黎忭頍帝念中疆被畝穈芑屬車紆路邊塞迤邐白草猶靑暄霽千里爰廵爰狩以閱武士七萃千旗星流電駛手格游騏足蹵生兕雨血風毛谿谷塡委皇帝神武箭不虛指上殺中心乾豆是以旃裘萬帳爭隨鞭弭或貢其獒或獻其雉摶心戢志奉觴拜跪罔不震叠媚于天子燕賞有渥以莫不敉帝奉慈輿周覽遐睇翕河喬嶽有康志體行宮帳殿定省甘旨慈顔載忻聖情彌喜長白醫閭嵯峨㟴􅕲環以鴨緑混同江水諸陵宅焉萬神攸棐九月吉日以次襄禮祠官備物瑤爵玉几于豆于登用潔滫􅔱凝承世德馨香澄醍文母純純敬薦脯醢孝思允展以介藩祉皇帝齋戒主兹鬯匕僾然愾然仰榱俯戺石馬欲驤玉衣常玭覲光揚烈洋洋如在緬昔先臣艱難共濟嘉彼三勲躬賜奠醴次者遣祭報厥功偉篤舊之恩古未有比巍巍盛京日晶霞蔚御崇政殿以覲休采詄蕩門開小大拜稽宴錫需雲仁敦行葦廼閱師徒鐲鐃表壘廼犒廼賚歡騰鉾鎧九天作解書銜鳯嘴闓澤周流勤施表裏海宇霜澄闗門氣紫廼旋鑾輅告至祖禰皇帝之德惟孝永依大禮之成畢具諸美曰雨曰暘上符帝載被于四裔懷畏惟倍不匱之徵天人合啟聖躬凝之翼翼亹亹兢惕有加德業彌暐浸潤羣生淪浹肌髓載稽瑞牒朱草薿薿德至山陵斯拱而俟皇天永眷寵錫層累天子萬年元元壽齒大有屢書萬億及秭臣齡作歌不辭巴俚敬宣聖孝以播遐邇聖駕東廵盛京恭謁祖陵大禮慶成詩有序劉綸皇上御極之八載敬天尊祖諴民格神治具畢張大化翔洽仰惟列聖東土肇基陟降在庭之近俯念陪京父老延頸舉踵喁喁望幸之誠廼以七月上旬勑禮臣備法駕恭謁永陵福陵昭陵甚盛典也臣謹按詩誦發祥書陳觀德自昔豐功駿烈莫不推本前徽如軒轅橋山顓頊附禺伊耆穀林重華珠邱並足集慶垂光用存景慕至考上陵之禮詳於炎漢之年蓋以原廟衣冠寢園弓劔先王所為創業垂統嗣世所由僾見愾聞皆於是乎在我朝受符上帝聖人首出卜年卜世奕葉重光逮我太祖太宗篤祜凝庥鴻圖式擴梯航所屆悉主悉臣緬維遼海神臯實鍾王氣建邦啟宇墨食於兹固已嫓豳岐而軼豐沛世祖定鼎自燕留都並峙高山天作流澤孔長瞻望龍興隩區松栢丸丸寶城奕奕億萬禩昭假明禋之感是繼是承聖祖在御時廵躬親展謁隆儀疊舉所為志敬節具者備載史書皇上世德作求肇稱殷禮諏辰夙事有翼有䖍供奉皇太后行則侍輦居則問安敬愛兼摰翠華所過秋宇澄霽川原彌望百昌成遂自從官以及候吏遠近歡趨廼至諸藩後先輻輳周廬星拱蹌蹌濟濟咸帣韝鞠􅎽而進萬壽之觴也古稱枌榆樂土詎足倫比惟時聖衷淵穆按冊披圖於礪山帶河昄章胥集見規模之閎遠焉於櫛風沐雨勝蹟依然見締造之艱難焉於民物淳龎軍實整繕見古風之可愛而本根之益固焉惟天惟祖宗眷念子孫臣庶畀以生成皇上一體天祖之心治之是以升香瘞璧而肸蠁通舞德歌功而精誠洽祀事既蕆垂裳當宁受羣臣朝渙汗特頒小大稽首所以行一人之慶所以合萬國之懽循古制也崇家法也昭錫類也示懷柔也皇皇哉大孝至仁備矣臣濫竽詞館夙効編摩伏覩史宬金匱之藏先猷炳煥有踰徃牒兹復以職司輿僕恭遇和鑾淸蹕道左跪迎屬在工寮並得陳詩紀盛竊未敢以弇陋自解謹獻詩曰我皇踐阼纘列祖之德有典有則是崇是式見于郊廟祗祗翼翼永言孝思維丹陵是即一章天降大寶命眷時瀋陽篤生高后肇造厥邦闥門潭潭導我三江奄有九有耆定下土方二章天戈麾矣禆王撫矣閑閑禁旅陳樽俎矣嶪嶪寢成縣簨虡矣繼繼繩繩百神是主矣三章皇綱帝紘歸我聖神四十有八部面内咸賔暨使犬使鹿冠帶侁侁帝曰欽哉維創守道均四章祼室兮露重齋房兮芝茁於昭兮仁皇茂典兮是秩馳道兮弦開鎭山兮笏列笏列兮崔嵬凝景命兮延洪哉五章嵗建亥兮星在栁皇繩武兮澤單厚揚德旌兮啟文囿詣璇宮兮奉聖母迎鳩杖兮拜馬首稱上瑞兮皇則有原田每每兮長禾被畝六章皇帝至止封樹來雲煌煌象設愾乎如有聞載羅鞸琫載具典墳先是實録上命史館恭繕列祖尊藏盛京丕顯我下武繼序我思文七章九功歌七德舞蠲剛日薦淸醑閟殿峩峩三光牖户俄朶之城漠惠之野叶酹從龍兮訖分虎蕭薌絪縕兮皇受祜及我嘉師兮亦其福汝八章祠官告備廼慰廼宣曰敦本茂實維聖所先訓練以時既精既研攷牧以時既蕃既便以廸我四民服高曾之傳九章沐日浴月環滄瀛兮乾經坤絡開上京兮井廬櫛比周原砥平兮弋山漁澤厥壤可畊兮德産精兮萬寶成兮十章赫赫兮王居洋洋兮聖謨上賅兮雅頌下括兮京都繪天賦海兮睿藻抒維洛宅有誥兮維邠原有圖十一章遂開明堂聖人當陽賜酺一日賜爵一級爾禄爾糈皇則予之爾絲爾粟皇則復之及爾耆耉曰饋之酭之及爾圜嘉曰省之宥之列祖之光維我皇之慶叶時萬時億承天之况叶十二章皇清文頴巻五十八
