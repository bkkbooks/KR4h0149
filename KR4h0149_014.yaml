body:
  text: 序工部事宜冊序果毅親王允禮粤稽成周六官之職惟司空之篇逸論者以謂事典乃五官之根柢也以之體國則郊廟壇壝宫庭環衞朝市官府學校城郭衢巷倉廩廐庫之列乃政教所由施行人心所由維繫也以之經野則山林川澤邱陵墳衍原隰井牧疆潦之辨溝塗闗津橋梁防堰之設乃百物所由蕃滋萬貨所由通阜也以制數度則宫室車旗服器髙下廣輪多少文質之别乃民志所由定禮讓所由興也以考度程則六府之盈虛出入八材之質偽苦良製作之得失精粗工性之勤惰巧拙乃物用所由利堅泉布所由撙節也孟子曰諸侯惡其害己也而皆去其籍司空之籍尤汰侈貪冐者所不便故去之尤力而後世無傳焉我皇上嗣登宸極振飭邦經釐清百度内自郊廟神壝宫庭學校官府次舍倉廩廐庫城郭門闗橋梁溝衢柵枑或稽古以創建或修舊而更新外則相天地之宜以通山澤之氣近自畿輔逺而吳越秦隴凡在四海九州之内所宜疏川峻防以除民害瀦水營田以為民利者不惜帑金鉅萬應時興作又以其間整軍經武修儲戎器凡車甲旌旗五兵火具無不功致軫念邊戍衣裘鞍韅皆嵗頒於内府慕古之士咸謂成周典法復見於今而司空之職尤備於斯時也臣乃以菲材荷兹重任受命之日忻悚合倂寢食不遑數月而後具識其大綱期年而後徧詳其細目凡城堤河隍之深廣堂室之崇修可以丈尺賦物材量功程計夫役定為經常而永永不變者皆奏請廷議勅下所司其興築之各以其時物價之各因其地訖工之久近奏銷之淹速有司胥吏不得巧法以侵漁者亦如之至於嵗事之常赤必與二三僚屬董其懈惰察其飾詐核其質良簡其差忒酌定規條俾有式可守事無細大要期便民而吏不能欺循法而財無可冐恭承聖訓朝夕孜孜數年中幸無大缺失又恐令久則易弛吏更則難諳乃奏請刋刻以示諸司庶幾賢者得盡心於法之中而不肖者亦不敢妄意於法之外此余所以彚定是編之意也雖然立法以禁私乃所以馭史胥與不才之小吏耳官之師旅朝有著位當常懷體國恤民之心竭誠殫慮議事以制得法外之意然後能盡在物之理而不過焉聖天子登賢進良十數年以來起諸司旬嵗而服大僚者踵相接也生逢盛世不能祗承德意以致忠勤顯勲績而乃詭法以行其私此心尚可自問乎願諸司爭自濯磨而毋墮乃力也孝經易知序湯斌孝經註釋箋註凡數百家近惟新安吕忠節公所著本義大全最稱詳備吾友登封耿逸菴先生家居講學復著易知一巻其言簡而盡明顯而精切與忠節所著互相發明誠後學入德之津梁也余鎮撫吳中見其士風文藻盛而實行衰思有以挽之乃聘耆儒於明倫堂聚生徒講孝經小學適張君牖如舊為登封令與逸菴講學嵩陽擕有易知抄本乃鋟板屬余頒示諸生俾朝夕肄業焉余乃為之言曰古昔盛時人重倫常家敦仁讓故風俗樸茂治道還淳太和之氣洋溢宇宙輓近之世教化不明本實不敦殫精竭思皆枝葉浮華雖名譽動人而本心已失象山有言親師取友為學力行皆從好事中來故虛而不實此言切中學者病根而吳中為甚經曰天地之性人為貴人之行莫大於孝朱子少年讀孝經題其上曰不如此便不成人孟子曰人之所以異於禽獸者幾希吾人奉父母之遺體當思父母生我之身無一體之不具生我之心無一理之不全何以保守成其為人不至放失淪於禽獸此不可不深長思也自學路久迷䧟溺日深重以侈靡之習淫佚之説功利之謀所知所行皆人欲而非天理夜氣之良偶一醒悟真堪痛哭流涕而不能自已者奚暇雕繪浮藻馳求聲譽乎天下萬善同出一源人能孝則事君必忠事長必順交友必信居官必亷臨民必寛故事君不忠非孝也事長不順非孝也交友不信非孝也居官不亷非孝也臨民不寛非孝也進而言之暗室屋漏一念自欺非孝也應事接物一念怠斁一念刻薄非孝也事親能養矣而未能養志知從令之非孝矣而未能諭親於道養生送死盡禮矣而未能事死如生事亡如存其孝猶為未盡也故事親事天一道也盡倫盡性一理也孝之道大矣哉誠能盡孝之道則精義入神參贊化育不外是矣一人盡孝則一家化之一家盡孝則一國化之推之天下皆孝子四海皆仁人則民氣和平災害不生禍亂不作尚何憂治道不唐虞風俗不三代歟余因牖如之請為書簡端讀者畧加省察以無負逸菴註觧之意與牖如鏤版之心其於立身為人之道未必無小補云順天鄉試録後序熊賜履嵗在庚子京畿復例應賔興禮臣遵新令通列諸臣名以上維時羣工濟濟咸鵠立於朝門肅心静聽罔知所屬前此未有也朔八日辛卯上命臣賜履貳同官臣朝生徃典厥事伏念臣三楚鄙儒學識淺黯丁酉薦於鄉戊戌舉於春官器窳才劣文質無所底謬䝉皇上親簡俾讀書中秘己亥孟冬南原御試計未二朞而臣又荷特簡授今官早夜圖維方懼報稱無地兹復膺命掄才蚊負維艱臣心益惕且京師首善之地四方之所觀瞻又天下士之集輦轂下者皆鄉之雋也豈臣謭陋所能勝任而愉快乎臣心用是益惕顧臣猶貳也謂可因人以塞責然臣自惟去蔬屩甫三載耳倐承乏相天下士即殫思盡瘁尚慮亡以仰答髙厚敢曰貳也而任讓居半以自諉乎拜命之日先試期僅半晌遂戒道入闈嚴鎖重扄焚香矢誓􅍐經公閲一如新定典則靡弗恪恭肅慎以共襄闢門大典既録成臣例得颺言末簡臣竊惟從古帝王慎簡賢良廓清雅化未有如今日之盛者也我皇上勵精圖治加意作人丁酉之嵗赫然大創頓袪夙弊以澄清文治登進真才科指法制廓然一新在朝在野靡敢不浣衷滌志兢業祗承且今秋初減額之半減則其數簡而其法益嚴嚴其法所以慎其選約其制所以謹其防限其額益所以重其考覈之權而端其始進之路皇上之釐定新規慎重簡㧞者意何如其至而諸臣之洗滌乃心與諸士之洗滌乃心以應盛典者尚有不砥礪濯磨以副我皇上側席旁求之至意者哉故臣之不克勝者任也而臣之克自矢者心也臣自矢其心以冀諸臣之共矢其心即以共矢其心者相諸士之文而因以相諸士之心文醇正者厥心貞文典茂者厥心厚文嚴峻者厥心亷文顯白者厥心和易文閎肆者厥心洞達而光明觀其文而其人可知其人之心亦可知矣當夫同堂較閲壹志虛公辨色濡毫竭精覃力時凛凛於寵靈之在前而簡書之在後筆光燭影之餘恍若與多士相遇於精誠徃復之際是臣與諸臣之相士者以文而臣與諸臣之所以相士者以心諸士之與臣與諸臣遇者於其文遇之而諸士之所以與臣與諸臣遇者亦即此治文之心而遇之也雖然臣既以文相諸士心矣寧遂以文信諸士心乎在易之漸曰進以正可以正邦也今日者可謂進以正矣然惕於法寕若惕於衷慎厥初曷若慎厥卒諸士曷亦念今兹之先資拜獻與上之鄭重簡遴者如是其難且慎而即此一日之遇合終身守之弗變險易不以易其操崇卑不以踰其守持躬亷毅砥志敬公將篤棐之忱飭悃幅之行澡衷浴德永矢弗諼以不負吾心者不負吾君是文與心符諸士治文之心與臣與諸臣相士之心皆可大著於天下矣茍或璠璵其表碔砆其裏鞶組其外敗絮其中質窳貎澤背公營私俶載循軌中道改轍以至顯晦易節措注乖方是心與文違而治行之心又與治文之心違矣諸士何以對臣臣與諸臣何以對我皇上哉臣故不能不深祝諸士以今日治文之心為異日治行之心慎厥初終以上報一人籲俊之至意也若臣與諸臣惟是殫竭愚忱以對颺我后耳他何計焉臣三載以前視諸士無以異幸側侍從之班立交㦸之下遽承簡命夙夜氷兢深恐隕越以貽盛典羞敢不以區區至願敬告爾多士哉㑹試録後序熊賜履嵗癸丑復當大比天下士上命臣賜履偕侍郎臣文然貳閣臣立德禮臣鼎孳典厥事伏念臣荆楚豎儒媕謭無似年來濫竽禁近罔效涓埃兹復膺命掄才蚊負維艱益滋汗仄既拜命弗獲辭遂從諸臣後勉矢公慎用竣厥役録成臣例得颺言末簡臣更復何言惟進多士申醮之而己竊惟國家登造賢良與士子策名委贄舍科目無由以進顧不重且鉅哉苐上之人汲汲焉欲得斯人而用之下之人挾所懷來以期見用於斯世此其為務豈漫易焉者而顧皆取決於風簷尺幅之一旦以為執劵之罔弗驗也則豈其然故試士以言洵末也而勢固不得不以言言者心之聲也六經四子何莫非是也茍其淑於仁義澤於典墳精粹積於中聲光溢於外揮毫伸楮皆有以發揮聖賢微奥之所在而無或謬於上下古今不易之矩斯其言為有德之符載道之器也而奚得以區區詞章帖括之技目之獨是世教衰凌士習頽靡大道不著實學鮮聞父生師教初未嘗懸一的以就其歸舉先王之澤聖人之㫖不啻蔓草視之而曾不知一為之注意平居椎牖伏案殫力敝精祗求工於八股之空言以僥倖一第之獲雋而後已而其所謂八股之空言則又其榛蕪舛盭絶不切於理道之説及其一登仕籍不復進求或投之以任試之以務而課其實則茫焉舉莫知其所以而平日之所殫力敝精以求工者葢無一之可適於用而亦遂畧不計念於上之舉而庸之者之何為唯取夙昔所為僥倖希售之一念而擴充之以迄於慆淫邪僻之無不至而亦未嘗不傲然自命為科名甲第之人此人材之所以日衰風俗之所以寖替而治效之卒莫古若也乃議者遂致咎於制義之寡用扄闈三校之未為善而思以變之也亦豈得為通論哉宋元迄明真儒軰出巍科顯蹟麟炳汗青謂科目不足以得士乎誣矣今多士之言固居然有德之符而載道之器也誠能因其言以踐其行上之明體達用務幾於中和位育之域次亦執德衞道不失為飭躬寡過之倫舉而措之約而操之皆不至悖戾於今兹拜獻之言庶幾克副朝廷汲汲焉欲得斯人而用之之意與多士挾所懷來以期見用於斯世之心則多士之幸而臣亦得少附於以人事君之義矣不然者如前之所云將制科幾成贅疣經事等之瓦礫曽不如中正九品諸法之猶可得十一於千百也則多士何以自觧即臣何以觧免於多士耶然則臣與多士惟交勉焉期無負科名以無負國家而己矣更復何言恭進易經叅觧序張英臣竊聞易之為書貫徹二儀囊括萬類微以窮隂陽之變化顯以繫人事之吉凶幽以明鬼神之情狀探賾索隱彰徃察來讀者得其中微言大義之一二可以服之終身而無盡况取四聖人之所發揮而朝夕涵泳其閒者乎又嘗竊觀先儒論易其大者極於扶陽而抑隂夫天地之有隂陽猶四時之有寒暑日月之有晝夜也以氣化言之萬物不能有長而無消人事不能有得而無失運㑹不能有治而無亂舉世不能盡君子而無小人是以卦之爻三百八十有四陽爻居其半隂爻即居其半雖聖人安能損益於其間哉然聖人兢兢業業於陽剛也則扶之進之於隂柔也則抑之退之此固六十四卦中無在不存斯義而於否泰剥復夬姤諸卦之辭尤其深切著明者也聖人不能使四時有春夏而無秋冬而製為室廬衣裘以禦之不能使日月有晝而無夜而製為燈燭以繼之不能使萬物有長而無消而製為度數以節宣之不能使人事有得而無失而示以修省戒懼以補救之不能使運㑹有治而無亂而立為紀綱法度以維持之不能使舉世盡君子而無小人而立為教化刑罰以勸懲之易之中數者備矣此則聖人扶陽抑隂之至意隱見於六十四卦之中所謂叅贊化育裁成天地者豈有他哉故曰天地之性人為貴必讀易而後知聖人之尊且大也臣草澤微材至愚極陋遭逢聖天子崇儒典學之時叨隨講幄入侍禁中恭覩我皇上孜孜圖治未明求衣躬理庶政退朝即御便殿講誦經史至漏下數刻不輟祁寒盛暑率以為常臣自顧學植淺薄惟切惶悚侍從之暇伏讀周易望洋測海茫無津涯欲纂輯訓詁一書期先通曉章句然後徐求其精義爰奉朱子本義為標準而詮觧訓釋則惟取於大全直觧諸書芟其繁冗務存簡切至於釋卦名義則程傳最精故節取以載於本卦之首大全諸儒之説發明經義有裨講席者並采録之閲兩期而成名之曰易經叅講條分縷析一以先正之言為矩矱絶不敢叅臆説於其間因臣質性愚魯著此一編藉以自備遺忘荒陋粗疎深知不免又念在禁中修輯之書不敢不上塵我皇上睿覽亦以見文明化成在上小臣亦有不敢自棄之私非云於經㫖有所闡明羽翼足以獻之當宁也謹序恭進書經𠂻論序張英臣竊惟人君之以道治天下至堯舜禹湯文武之盛而極矣人臣之以道事其君至臯䕫伊傅旦奭之盛而極矣迄今相去數千載當日之言論謀畫綱紀設施與夫忠懇誠愛之心諧弼綢繆之計雖散見於六經旁流於諸史而𢎞綱鉅節之所統㑹則莫備於尚書使後之人猶得於方策之中想像唐虞三代之君臣如見其形容若聆其謦欬不覺有時代曠逺之隔者則由其文至古其意至厚其㫖趣至𢎞逺流連徃復而可以不窮也臣自供奉内廷之初正值我皇上討論二典三謨窮究精研無微不徹由是而下逮商周誓誥之篇靡不再四尋繹凡昔人之所謂苦其奥博而難通者皇上必深求義理之歸而亦不辭夫章句誦讀之勞二帝三王之言與夫古聖賢之所以告其君者朝夕淪浹於聖心至深且渥也故以言乎典學則髙宗遜志之勤以言乎服逺則虞廷干羽之格以言乎六府三事則九功之時叙以言乎官人亮采則九德之日嚴皇上以聖學之淵涵發為治功之醇茂豈僅稽古不倦而已哉臣質愚學陋寡識𣺌聞竊從講筵餘暇退入直廬伏讀尚書偶有一知半見録以紀之積久遂至成帙非敢自持臆説皆取𠂻於昔人之言謹依篇章次第分為𠂻論四巻又因在内廷編輯之書不敢自藏其短冐陳九重乙夜之覽伏念我皇上於尚書全編心源脗合精義黙符毎發一議逺超漢宋諸儒之説臣忝侍左右聞之熟矣如臣謭陋膚言類培塿伏於泰岱之前爝火耀於日月之下彌自増其悚惕云爾臣謹序講筵應制集序張英臣英謬以疎賤謭薄際昌時遘景㑹以康熙六年丁未成繆彤榜進士授翰林院庶吉士是年冬以先大夫憂去九年庚戌服闋補原官十一年壬子秋授編修次年春充禮闈同考官三月上幸南苑命臣英偕同官臣史鶴齡扈從於行宮進講詔獻南苑賦嗣後每廵行必侍從或獨徃或與侍讀臣孫在豐偕是時扈蹕多在南苑新宫緑槐髙柳掩映丹甍千幕周羅六師環列衞霍金張以及期門羽林之士翼豹尾而處者雲蒸雷殷深嚴𢎞麗不可殫述臣以書生抱簡牘其閒晨則委蛇丹陛夕則退處直廬承顔邀睞恩遇無比時從幸晾鷹臺觀試馬紫騮赤駱躡雲追電天子第其駑駿以賞勸諸王公大臣則獻試馬歌一日漏下十餘刻上御行殿秉絳蠟作大書使人問二臣知在直廬觀書命作良馬詩以獻或風日和美上率左右虎賁講武平郊歴上蘭踐甫草出則朱旗舒徐入則鐃吹震發凌晨侵夜必召二臣講論經史殫究義理日有程課罔以寒暑間臣自顧雖陋劣無似然每得以聖賢載籍陳説於君父之前視古人奉屬車清塵詔獻甘泉上林賦者竊以為榮此則聖天子典學之勤俾臣子有稽古之益也是年秋授日講起居注官其後學士臣熊賜履入典閣事内殿進講專命臣及在豐從事雞未鳴時從長安門步至左翼門祗候少頃東方漸白樓鴿羣起星稀殿角露浥階墄偕奏事諸臣方曵組而入至乾清門候諸臣奏事畢内侍傳入𢎞德殿殿中左右列圖書南向設御坐北向設講官席皆用黄絁幕中設罏焚香講官既入則侍從咸退講官再拜北向立敷陳經義時有所諮詢既退命賜茶於乾清宫門如是者三年由左春坊諭德優擢侍講學士先後同在講筵者則澤州學士臣陳廷敬崑山學士臣徐元文臣葉方靄接天顔於内殿䝉顧問於黼席圖書翰墨貂綺之賜嵗數至焉是時也海内寇賊未平天子方宵旰殷憂四方將帥咸稟承廟畧措兵籌餉無虚晷且日御講筵與臣等討論古昔於此窺聖度之髙深睿學之懋敏太平之所以立致也因輯歴年所進詩若干首為講筵應制集而并叙其所遇如此内廷應制集序張英康熙十二年癸丑春天子御講筵從容與學士言朕欲得文學之臣朝夕置左右惟經史講誦是職給内廬以居之不令與外事其慎擇醇謹通達者以聞時舉臣名入對上心識之自是再四諮詢對者無異詞迄十六年丁巳冬有内庭供奉之命賜邸舍於瀛臺之西辰而入終戌而退乾清宫之西南隅曰南書房上舊所御讀書處也命處其中飲饍給於大官執事使中涓筆墨側理器具之屬皆取於御府珍果饍饈之撤自御饌者日數至焉御乾清門聽政後則召至懋勤殿辰巳前講經書午後讀史諮詢對揚辨論之語詳於南書房記注自丁巳冬迄壬戌春未嘗一日少閒伏念自古人臣閒從殿陛一見天子數語達於宸聽終身以為榮幸如臣者侍從燕閒趨承經席陪奉宻勿前後近十載細旃廣厦之間陳典謨談易象博綜前史上自洪荒下暨輓近握丹鉛於香案聽鐘漏於華清霽顔温語恒如家人父子謂非遭逢之極則恩遇之殊軌哉時或著為詩篇以紀述盛事甫脱稿則陳於御座之側吮毫授簡成於俄頃者多有之唐鄭亞序李文饒制集有曰牙管既輕芝泥將熟嘗於席前親授筆札公亦分隂可就落簡如飛臣固不敢追踪贊皇而殿陛之閒一時情事則亦古今之所同也二十一年壬戌春請假歸葬先大夫屢降温綸渥被恩賜俾得暫休沐於鄉里因輯四年以來詩為内庭應制集二巻其中詞句粗疎淺劣當時多不暇㸃竄今皆悉仍舊稿存其實也昔歐陽公既老歸淮潁之閒輯内外制而序之因念平生仕宦出處且謂瞻玉堂如在天上臣今得奉恩築室於龍眠山中與田夫野老稱説聖天子盛德儒臣寵遇撫今思昔感激詠歎更復何能自己哉御製文集擬後序陳廷敬葢聞天行垂象則雲漢昭囘地德含章則山川經紀此河洛呈其精藴苞苻闡其秘奥也聖人參兩儀而則二曜該物序而察民彜演為圖疇以教萬世則人文化成之道懋焉是知覺世牖民開物成務必賴亶聰首出躬文德以表建於上而昭宣於修辭立訓英華發於和順篤實著為光輝然後三物以惇四術以備户佩詩書之澤人游儒雅之林而一時之生其際者即山陬海澨靡不涵濡盛化以近天子之光則豈非上聖之宏規太平之駿烈也哉欽惟皇上遜志典學勵精勤政德業之隆治功之盛赫赫巍巍不可殫悉自蒞祚迄今齋莊祗肅對越天祖孝敬兩宫勤勞天下興起教化修明制度文經武緯禮序樂和寛冲以體羣下之情惠懷以普黎庶之德銷金革而四海永清垂衣裳而八荒在宥至若天時之盈虛地利之險易邦用之豐約兵師之因革民風之情偽吏治之貪亷莫不悉歸睿照潛納皇𠂻故凡施為建立見於詔號命令之中出話吐辭之際所謂二帝三皇之言語行事而典謨訓誥之文也若聖藻天葩形諸篇翰時而咨儆有位元首股肱之歌也時而諷諭民俗蕩平正直之訓也時而切指物類户牖杖履之銘也時而流覽景光阜財觧愠之奏也葢惟皇上狥齊性成緝熙時敏質本生知而猶好學聖由天縱而又多能以故蓄諸中而彰諸外者抒寫化工渾涵元氣鎔裁古今陶鑄萬彚炳煌焜燿至於此極臣叨塵法從久侍經帷每聆玉音推觧經傳奥㫖發前聖未發之微言傳古人不傳之深意下及諸史百家罔不旁通曲暢而深宫清燕未嘗一時輟書冊不觀臣固知聖謨洋洋並六藝而昭諸天壤者洵有所原本而然也雖義藴髙深同體冲漠神明於意言之表非臣庶所能仰窺萬一而即而求之引伸而紬繹之則仰觀俯察之機時行物生之妙可以想見端倪沐浴鼓舞於不自己矣然而至德謙光富有若虛久藏緗􅐆近因廷臣敦請再三始命彚次編為四十巻將見流布寰區昭垂典則咸得瞻日月之末光挹河海之餘潤彬彬乎有所感發興起以永成夫道一風同之治猗與盛哉皇清文穎巻十四
