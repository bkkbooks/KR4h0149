body:
  text: 賦五六天地之中合賦以敬授民時聖人所先為韻有序劉綸皇帝御極之元年闓澤澍濡庥徵洊洽珠囊既啓玉燭方調披東序之圖不數元包洞極布南臺之策何知宣夜周髀猗歟其所謂上參天下二地登五位御六乘皓氣所涵及物物解太和所鼓被人人怡者已臣逖稽漢志兼採唐書知陰陽之數定自二中歷象之原通於一合是以術同窺管還隨豹尾以抽毫技遜挈壺猥進螭頭而受簡賦曰繄一元之推嬗維三才之有正超鴻濛以開天首狉榛而立命巡河拜洛剖萬象以成苞迎日占星攬四時而為柄粵僂句之視範元王敘之以惟欽伊旋毛之負文宓帝受之而式敬於是胚胎既分經緯斯究地天叶配乎朔南火水欣合乎左右衍母衍子列其方大餘小餘揆其候彼一三二四之在前與七九八十之在後固竒耦之轇轕亦生成之輻輳惟兹五六之元樞是為中合之妙搆或蓍之揲也屬太卜之攸司即觚之握焉繫保章之所授爾乃履端於子得統於寅北陸成嵗東嵎紀春離謝兌乘見朱鳥之夕指坎交艮代覘元枵之夜陳以及長至短至之糾乎四遊躡天根而探月窟與夫日中宵中之轄乎二表占兔腹而驗烏踆蓋五挈陽樞陽之純者因而資物六維陰紐陰之老也乃以成民若夫次五奠型方之軌次六衷馭世之宜勢則或內以或外形則有正而有欹雖五並居中亦中央之沖氣六皆在北亦北極之綱維乃羅之五行而異宅即𨽻諸四仲以殊司昔在九峯知洛數之不傳於禹越惟邵子識圖象之獨闢於羲嬴乏乘除遂爾綜兩間之䇿元會運世於焉釐萬祀之時以故亶聖惟天憲天惟聖制作契乎銅儀燮理符乎金鏡仰觀俯察單厥心旋乾轉坤根乎性倍其五而天干成重其六而地支竟孳萌肇賅閡之首五子按部以分功􅞽揆統出甲之藏六甲循環而布令夫固懸正坐正不足輸其竒抑且天球天環無以擅其盛猶復區理數别天人酌三統而書夏斟四序以繪豳謂雒下以律呂為衡不少塵毫之忒即守敬以晷影為度難言分刌之均獨一行之所定惟大衍之是遵二始開而剛柔旋判二終紀而閠位可循日會於大氣盈以五日而絀月會於日朔虛以六日而伸是其手即化工非假乎隸首臾區之揣測心維太極奚煩夫歸竒挂扐之紛綸用能使八政修九功敘周乾規折坤矩轉一氣之洪鈞釐百工而時序我皇於是闢天府以羅觀象之儒登靈臺而集稽天之侶致土景於秉圭齊鍾管於纍黍茲蓋法天五之得位實五極其建之時規地六之成方洵六位時乘之所也斯時也神鼇扶柱羲馭鳴鞭蓂以迎􅛱抽莢葭因送田耎吹煙以凖律元則鳯儀獸舞以通歷本則璧合珠連五六分而天地之中見十一合而天地之道全夫豈非聖天子之明時以革行健惟乾陶甄百族鎔鑄億年乃以發機緘於無始之始而宗法象於先天之先者哉五六天地之中合賦以敬授民時聖人所先為韻于振道原於天性本於命理足而數不能違道存而器莫能竟是以羲呈龍馬榮光起而上浮姒畀龜書休氣輝而四映一為竒而二為耦蓋由於理勢之自然五為生而六為成總歸於性情之各正此皆造化之苞符有待於聖人之主敬原夫數之所始也太極之先自無而有俄動靜之攸分倐陰陽之漸剖圖行而左書轉而右數極於十章終於九一生二二生三三生萬物非巧厯之所稽儀生象象生卦卦統羣爻豈恆情之可究惟聖人道洽於清寧故妙悟無煩於指授於是理窮其祕藴析其精捫天心而探月窟闡乾符而握坤珍五為天之中而地來比之惟其兩也故能化六為地之中而天亦應之惟其一也故能神陽之發微而不可見者所以藏諸用陰之充周而不可窮者所以顯諸仁蓋不徒以緑字朱文演疇而觀象殆將以龍官扈正利用而前民爾其往來相錯經緯互施一與二三與四五與六七與八九與十若琴瑟焉而無虞專一一與六二與七三與八四與九五與十猶臭味也而何敢差池蓋分而言之則天以參地以兩天地之撰固昭然其不紊而合而言之則竒之積偶之積天地之中乃居然其可知以數而言則參伍錯綜適符乎道之則以理而言則剛柔健順更協乎聖之時是以玉燭常調金繩永正鳥火虛昴四序吻合於尚書醎苦辛酸五味不愆於月令用之蓍䇿則道濟三才窺以璿璣則功存七政自羣言之日淆執師説而互競或以讖緯而乖先哲之經或以清談而釀浮華之病猗理學之昌明必折衷於至聖聖人在上撫於五辰太和保合萬物皆春天生之地成之聖人與之相參皆一中之運用天至易地至簡聖人與之相似顯大化之彌綸所以鼓腹之民就日希光奏松雲於簷棟垂裳之世編珠育貺迓景福於神人若乃螢室豎儒粗知章句虞喜安天之論未涉其藩邵雍經世之書鮮窮其緒幸長夜之懸黎比衆星之向所究之性率乎命命本乎天植鼇維而永奠法亭毒而不愆合羲文周孔為一人道何分於上下滙河洛龜龍為一理圖何别於後先允矣哉兀圭錫麟符啓炳吾道於億萬斯年五六天地之中合賦以敬授民時聖人所先為韻杭世駿原夫子建天元丑為地柄試推䇿於二篇實肇基於三正帝出震而成艮一元之運皆本中德以流形星伏戍而見辰四序之行必於合神而布令析之是名九星統之乃云七政數得主而有常道無為而不競撫辰惟勤授時在敬竒全耦半積五位以相乘兼兩函三合六爻而互應爾其積寸該分課虛責有生成備而變化行神鬼交而剛柔剖五則一三七九相後先六則二四八十居左右探天根者必以為圓蓋之心溯地極者必以為方輿之紐馬拳毛而圖浮龜坼文而書授大衍置閏以歸竒皇極居尊而用九求天産則音以出清聲唱而濁聲酬求地産則管以成陽律終而隂律奏驗空積於忽微窮嵗差於章蔀是故自閼逄以至上章隨乾道而錯行由星紀以訖元枵叶坤維而比夀三才鼓蕩一氣陶鈞天樞之行五五二十五數而俱合地軸之奠六六三十六宮而皆春元功不宰大化轉淳天之五合於地而六氣為之磅礴地之六合於天而五味為之氤氲穹蒼於焉發散沆碭於焉列陳海結為錯山融為珍彼夫陰陽風雨晦明之殊狀者順施逆受無非穆清之元化酸醎辛苦甘之效精者遞生互尅一皆富媪之元神丕成大運綏茲蒸民氣結為味六情所以無拂味稟於氣五性所以克馴用以歎會通之妙極交錯之文特是財成有道輔相有宜五德之當王者尊則利道而節宣者有序六物之成功者退則和齊而斟酌者有機功先截竹令戒愆期繩方應矩徑員象規卦剖分以應候圭測景以成儀音有君而有臣律一雄以一雌六管各有同而參以二變則七始兼夫八十四調五子厥惟倍而虛其中央則四維周夫二十四時和聲繆聲之不忒大餘小餘之畢齊於以見聲音之道直與天徹而厯象之志罔與律違暨夫玉燭調璇璣定懋對之功以成愆伏之虞畢罄惟交泰者大同亦有感者必應天運則春生夏長秋斂冬藏罔乖夫九紀之宜民生則水潤火炎木滋金克備兼夫羣産之勝百神是以有明德而瀆擾不聞兆民是以有孚誠而慆淫俱靖夫律居陰而治陽原凖乎五部之盈虛歷居陽而治陰實關夫六府之歉盛天五下降則生數即以開成數之端地六上行則成數即以為生數之竟羲和占日常儀占月臾區占星善言天者所以驗於人伶倫作律大撓作甲𨽻首作算窮其理者所以至於命則夫苞符之運固日著於天壤而參兩之功能不歸之睿聖洪惟國家之錫福實承三后之作君鴻業超於古昔學統徹夫天人辨律而發徑一圍三之誤則房范之爭盡息調歷而通圓田勾股之郵則中西之惑俱泯羲仲春而和仲秋作訛成易之咸敘南正木而北正火神祗物類之惟寅正方順布六宇同欣物有菀枯以元氣而消其夭札時分消息即方寸而施以陶甄是以百福之祥在宥三王之世如春皇上秉祗肅之純心偉神明之接武以中正者調鈞以合同者握矩六官修而五行之氣無愆五福兼而六峜之宜以序泰階之星流符北辰之杓居所饔飱牢醴養賢及民厯象璣衡敬天篤祜於是上探五辰之祕遐綜六術之傳理參乎大易之大數演乎先天之先或前疾或後留大中者默運夫隂消陽息或東盈或西縮有合者潛協於右轉左旋愧管窺之末學探三統之遺編洵高深之莫贊敢玩索以窮年五六天地之中合賦以敬授民時聖人所先為韻有序劉藻臣聞兩儀浩博待哲后以財成三統乘除歸元功之調燮太昊圖呈龍馬聿先象數之苞符夏王書啓神龜再發乾坤之槖籥一竒一耦厥位惟均五生五成其機迭嬗起消息以正閏法始容成立章蔀而得天䇿歸黃帝五家怫異宜溯太初之元四序循環共信一行之確顧太初起冬至於牽牛未精考驗一行附節氣於蓍䇿亦屬紏紛謹按漢志曰天之中數五地之中數六二者為合又曰天六地五數之常也五六天地之中合民所受以生則知函三為一統六虛而周流法九實三行十日而運用我皇上參天兩地靜陰動陽得虞書欽若之原履端舉正合周易明時之義凝績撫辰左右方圓大衍釐於指顧錯綜參伍疇範就其經綸斯固羲和之所不能窺班范之所無從識者也臣心同牖見難讀精藴之書技止管窺謬誦商高之對自天授簡伏地悚惶懼無當於敷陳殊有慚夫麗則緬鴻濛之初開奠高卑而各正偉不宰之神功秩形象而定命主極者理鼓元氣以流行效動者才分全數而縱橫健也順也竒耦以管攝夫陰陽經之緯之易簡實神明於聖敬懿夫天數有五本一以陳地數有五惟二之因由一至九三三所積自二而十二五斯均顧一為陽之始生其氣初復二為陰之甫判其機未申三四者方圓之徑圍求全而未得其半七八者陰陽之少位漸老而日趨於新逮九而陽已極至十而數終旬調鐘律而或失詎能被於生民蓋天地之數止得其一偏而未底於中正故天地之情雖不無所合而未彰其化醇也乃若全圖之位五實內守六奠其下象卦之姤一仰而承一俯而就一與十為之營二與七冠其首三八翼於東四九輔其右惟淵居以沖然羅四表而在宥天起一而終草五皆本五而積分地起二而終三十實由六而推究或乘為八百一十律叶黃鐘或乘為六百四十聲符太簇至如終則有始往而必復天以六妙其顯藏地以五通其營腠辨六氣之降生滋五味而殷富妙無過不及之用孰察其所由然大專直翕闢之能難名其所自授爾乃動靜相感變合乘時天降其氣地受其施六為虛而五為聲周遍兮歷十二辰而無或遺也六為甲而五為子參錯兮符六十日而不可移也二始以位剛柔二終以紀閏餘總會於中而律呂夫婦純固兮琴瑟之兩相宜也五以降為五行生數六以往為五行成規置數於中而表裏朏朒和同兮元氣之放而彌也嵗功以起元紀以推羃䍥兮珠聯璧合之無或差池也作訛不爽分至以釐氤氲兮緹室葭灰之以息相吹也然而覺世為師時憲惟聖必握符以察璣乃序辰而齊政聖主乘乾正位凝命協理氣之自然驗存存於成性保章守典證宿離之弗違太史陳書調風雨而從令惟中是凖寧用挂扐歸竒之文有餘以歸直溯斟元陳樞之盛其存之也惟誠其行之也惟敬不偏不倚帝則潛孚於無言無思無為王心常守其至正於是考三正勵羣臣肅百度惠兆民統萬物而咸若與四時以皆春中則常貞敷錫彌於兩大合則不二斂福備於一人其引伸也最微其成功也至巨定晷影於毫芒較中星於纍黍上律者不爽其候來備者各以其敘美歸德而不留任一寒而一暑淑風轉處感大造之無私斗柄回時凛深宮之作所固知德無弗至有開必先不知天地之本始莫得授時之大全偉矣五六之數燦於卦爻之篇惟大聖人為能用易直探夫一神兩化之前故舉一事而順五行之序純一念而紹萬古之傳歟敬為頌曰在天成象在地成形惟形惟象有數以通惟五惟六天地之中是曰合之以肇嵗功我皇御極上下合同宥密緝熙會元統宗四正四隅以生以成幽贊羲䇿氣動堯蓂理數同得萬世之型又歌曰皇德無私天地配兮四氣不愆澤汪濊兮建中表正七政乂兮惟數精微事不悖兮三角八線息衆喙兮弦矢割切待進退兮萬物熙熙共茂對兮反於上元億萬代兮五六天地之中合賦以敬授民時聖人所先為韻汪士鍠伊睿哲之撫臨端開天以敷政符元化於大鈞契兩儀之中正觀萬彚所由生聿欽若而祇敬探奧窔於隂陽測端倪於動靜槖籥旋樞權衡運柄竒耦攸分生成交併綜章蔀紀元之無方會物象滋數之靡竟固致逺以鉤深由厚生以定命時乘以御鴻濛示兆而體元懸象為章鳳職編年而守令原夫律歷相通風氣應候三正遞傳五紀協懋孕育冥昭包羅宇宙創自容成命於軒后彼參伍而錯綜羌成數之可究自一而至九者天以埀施由二而終十者地以承覆五與六其居中乃妙合而相遘象雖判乎剛柔理不隔乎先後位既得而益彰氣以交而彌厚五合六而干支之運周六合五而氣味之生茂推溫肅於木金稽永短於宵晝驗沖盈於三旬之中審次舍於草八之宿必羲步之不差庶底日以相授爾乃孟陬貞位攝提司辰南正北正有秩有倫青陽始而朱明續西皓行而元冥因參天之數判生長收藏以迭用兩地之數交子復午姤而更新五五相承布為七十二候六六遞嬗浹乎三百六旬乘除而分至啓閉之按節加減而晦朔弦望之適均履端乃不違其序舉正斯無惑乎民歸竒零於盈縮置閏餘以引伸繄周流而變動爰往來以彌綸挈乾坤之綱維感翕闢之潛移孳萌以逮賅閡大明終始出甲而迄陳揆不爽毫釐溯權輿於嶰谷斷兩節以吹之度既均夫厚薄鳴遂協夫雄雌長九寸而筒十二同心一統律娶妻而呂生子損益成規五聲莫尚於宮函陽氣而施種六律以黃為色象君服之昭埀十一而道已畢五六而物咸資紛負隂而抱陽受中各得其宜中無偏而無陂合不雜而不漓五行以協而羣生遂六府以修而百昌滋成乎變化貫乎云為術不違天政不失時乘乾出治而百官軌儀釐工亮采而庶績用熙乃知河獻圖以錫瑞洛出書而啓聖圖則五正位而六之奠於坤者以寧書則五處中而六之貞於乾者自靖陳疇建極雨暘寒燠以徵休推䇿知來璧合珠聯而互映合三統於一元調八風而諧詠宿離不忒恆炳耀於璿樞始和以布彌朗徹於金鏡以明六禮之修以復五常之性天神格而地示享兆民賴而一人慶仰蒼蒼之正色睇堪輿以無垠越流行而各正類金冶與泥鈞區秀頑於五體洽離渙於六親戴高未解夫蟻旋之次履厚誰測乎鼇極之輪匪中樞之執要孰保合夫貞純矧文明之炳蔚沛渥澤於斯人正亨衢兮綏泰運握乾符兮闡坤珍六合為家攝紛馳於同軌一中允執肅環共於鉤陳懿夫盛治洊升聖明當寧百度貞九功敘五緯叶六符舉占星辰調寒暑和風應甘露湑迹接梯航疇盈禾黍協氣旁流藝生得所剛健以運天行照臨而開遐阻五教敷於膠庠六樂諧於律呂立均出度大撓𨽻首之儔齊政明時臾區常儀之侶璣環籥仰合萬宇以同風輪映階平照三光於秉炬夫然則盈虛合軌正朔靡愆隆規邁古成憲鑒先務周詳以縝密亦廣運乎自然出震見離文章標於雲漢巽申兌説恩膏浹乎淵泉貞七曜以有常從畢雨箕風而適願撫五辰以熙載赫帝車御宿而高懸故合夫四海九州之衆無不共戴乎崇效卑法之全五六天地之中合賦以敬授民時聖人所先為韻齊召南尋圖書之祕奧知律厯之相因有生成之中數為隂陽之適均陽為竒兮自一而遞於九隂為耦兮自二以浹乎旬竒則三與七俱同列以進耦則四與八亦聨翩以陳惟中數之得位見作合之相親天以五兮分一隂一陽於十日地以六兮布一剛一柔於十二辰支干合而成嵗紀氣味合而普化神溯降衷於上帝遍受中於兆民圖則五連六於坤而奠於北書則五友六於乾而趨乎寅揭中宫之土德開子半之陽春雖自然之法象待推衍於聖人步始大撓算由𨽻首驗攝提於丑未紀困敦於甲戊測弦望於羲娥察縮盈於星宿有中法之可稽參五六以考究六以當期嵗之寒暄五以辨月行之宵晝爻以六紀周流三十六宫日以五遷順布七十二候積八百一分即得章數之元歷二十四位仍起牽牛之舊渾儀則赤交黃會東角西婁土圭則夏短冬長子復午姤五加六則十一握終始之根六除五則太一包行生之富五其六可符共轂之旋六其五亦合一舍之守現端倪於穹壤推開闢於宇宙雖三統之循環總一元之相授得中而舉正靡差有合而對時始茂若夫量盈虛於辟卦别清濁於神絃聲維五兮象夫五行之生尅律維六兮助以六間而具全即有變徴變宫二少原無殊號雖列編鐘編磬堵肆第曰在懸五生六則十二之筒以製六正五則六十之律以傳鳳鳥嗈喈而雌雄叶應華鯨鞺鞳而宫羽昭宣然而五聲上宫惟宫居天五之中位六律尚黃惟黃為地六之中權拱至尊於含少肇滋育於幽泉在木角金商之上開未林寅太之先中處之數積陽為九九八十一合德之數至亥實十七萬七千任方田與粟米極勾股以測弦乘除於河圖而有凖加減於洛書而靡愆於黃鐘之宫也見天地之合焉原夫唱始施生無細無巨五參天以為規六兩地以執矩曰負隂而抱陽聿成男而成女俱太極之孳萌共旡妄之物與臧府具而湯液宣性情凝而彛倫敘信為本而仁義禮智不虛思作睿而視聼貌言咸舉悟妙合之有原識致中之居所天地交矣大君則之黃實冠乎五色土兼旺於四時臣民事物同心以為役前後左右普照以無私蓋天數至五而生之功已就地數至六而成之量方滋合生成於裁成輔相參易簡於覆載高卑維聖憲天維天啓聖握珠囊朗金鏡樂如天以同和禮法地以合敬執厥中而六府修建皇極而五福併敷五典而帝載熙馭六轡而官方正握六符於泰階撫五辰於斗柄調玉燭於辰居考葭灰於月令啓苞符以煥八荒在璣衡以齊七政赫文眀於離照溥恩膏於巽命信合撰於清寧與勳華而比盛方億萬以斯年賡一人之有慶五六天地之中合賦以敬授民時聖人所先為韻周長發皇上握乾符基鼎命撫三辰齊七政日月並其升恆星雲昭其景慶河洛溯太極之原象緯運四時之柄天自一以至九而五執其樞地自二以至十而六順其性惟槖籥之昭宣知氣機之協應理推其朔本隂陽竒耦之相乘數積於微纍百千萬億而皆定占驗有待乎明通而分命必原於主敬懿夫健順攸分絪緼初姤體動靜之互根察聲音之迭奏始牙物於黃鐘旋紐陽於太簇或積氣於鳳琯克諧或宣幽而鯨鐘可扣天以五施種五聲適上夫宫地以六孳萌六氣皆循其候由居中而悉協清寧斯會合而轉旋左右既叶律於音官亦占時於刻漏此伶倫有嶰竹之吹而唐帝重璣衡之授蓋以龍師紀令鳳鳥司晨大撓始定洛下初陳六甲運日五子分辰知十一之胥會悟參兩之相因五五則二十有五衍其數六六則三百有六紀其旬推章中統中之悉備識元法通法之皆真總轉環而起子當賔餞而惟寅窺端倪於兩大勤率作於兆民爾乃仰觀天象俯察地維驗諸盈縮考厥疾遲按木火金水之節定東西南朔之司立一閏再閏之法凖三年五年之期會甲子於一元非宣夜周髀所能測建斗柄於三正詎霍融姚信所能知居明堂而頒朔統薄海以明時於是我皇參贊兩儀臨御萬姓手挈珠囊胸羅金鏡河海宴清星躔輝映五為竒而五德之運不窮六為耦而六合之周無竟原對待以相衡亦流行而不競苞符之藴畢宣主宰之精皆孕惟一中之吻合無分斯萬物之權輿自正理通邃穆以顯微睿徹神明而作聖原夫一元真宰萬彚化醇三才之並立無間一氣之摩蕩皆春列五緯於五方而宿離不忒運六虛於六幕而化馳若神始窮理以窺朕兆繼倚數以測彌綸以五啓六生成罔替以六承五流衍日新此所以開窔奧於千祀而仰作睹於一人也是以藴自胚胎積自纍黍五六適得其中天地遂順其序溫肅協乎春秋雨暘調夫寒暑履端則五事契於五行審音則六律生乎六吕數計而燦若列眉燭照而洞如觀炬五位時行六階敦敘泰運聿新宏綱具舉為能效不息於健行而凛無逸以作所乃知示簡惟地示易惟天宅中立體環合無偏仰蒼昊而覆幬自廣披黃輿而持載克堅揲神蓍於犧易占靈莢於堯年驗初陽於黍谷探精義於瑶編與銀甕金車而並出偕赤文緑字以俱傳當執中以斂福見翕合以乘乾無不頌萬年有道之祜而直溯乎一畫演卦之先指佞草賦以生於堯階有佞必指為韻萬松齡繄聖人之首出見瑞草之舒英質蔥蘢而秉直性荏苒而含貞懷觸邪以挺幹用樹德而抽莖鬱鬱承陽以煥采亭亭對仗以輸誠蠲忿難齊矯若薰猶器異迎涼莫屈居然臺閣風生爾其育秀赤墀騰輝丹牖經霜霰而不驚培雨露之獨厚願葵藿之同傾鄙菉葹之非偶萐蒲搖而不止兮兹無浮動之心蓂芙落而復生兮兹有神明之守羌既抱此內美自許無私乃肇錫以嘉名從來希有原夫真靈獨尚精氣相於得乎天者獨也正遷其地而弗能居不受溝澮之潤澤無取塵土之吹噓玉砌初萌已思攀檻金鋪乍拂早切引裾特立本無儔未假蓬麻之助密孤根還可用不妨槐棘之交疏於時庭燎初昕更籌未罄臨軒之藻黼熒煌詣闕之簪纓綿亘官師嶽牧分猷以告成功水火工虞竭志以邀清聽惟兹羣后一德相孚詎有孔壬偏長克勝此草當門煜如照乘無微不燭如響斯應若車之南向視其針而方隅以分類斗之北居凖其杓而次舍有定不聞當路而妨賢乃見無言而指佞蓋道莫高於古帝勳莫盛於唐堯感中天之正氣長拔地之靈苖斷不從風而靡逈殊厥草維天夾陛濃鋪儼青蒲之自伏凌空直上同白筆之高標宜其發華滋而獨茂敷正色而不凋顧惟人本難知草為弱質誠則能明名宜附實一莖雖切於效忠百卉無從而致詰為賢為佞安知所指之是非若曵若搖孰辨斯人之得失是知秉心則哲乃昭瑞應於伊耆屬物有神兼識靈根於屈軼謂小草之足觀惟真鑒之可必我皇上德隆九有業朗三階任賢惟當熙績允諧葑菲不遺而羣情自獻茹茅盡拔而大道與偕瑞木華平川嶽之珍畢至九莖三脊海山之貢無涯所以擢秀滿巖廊掄材皆杞梓棟梁競搆其宏材柱石特隆於金戺滋蘭樹蕙悉吹藝苑之芳椒佩蓉裳共志文林之美宸衷以睿知有臨百爾以忠誠受祉是以羣材悉勵咸知匪懈於當官即使瑞草重榮不將無佞之可指也哉指佞草賦以生於堯階有佞必指為韻朱荃遡中天之盛治肇瑞草之嘉名傍赤墀而競茁依阿閣而叢生抽直幹之亭亭居然白筆布芳蕤之纚纚不數華纓既通靈而獻瑞亦稟性以懷貞方竹箭之凌雲彌彰徑節比葵心之向日轉益丹誠爾其敷英列陛布葉重階初萌碧頴漸挺丹荄茅三脊兮難與共花四照兮非其儕獨有廉泉堪資灌濯但逢介石合與差排不藉吹噓自仰涵濡於帝澤長徵弼直爰昭瑞應於天街當夫獸闥初開龍樓乍啓九棘連行三槐對峙瞻肅肅之衣冠集煌煌之劔履被紫懷金之輩並詣雲閶垂紳搢笏之倫同趨璐戺乃斯草之效靈覩僉壬而必指瓊苖偃處紛矣如林碧簳翻時直哉如矢靈根有覺初不謬於毫釐小草無心亦何私於彼此故宜名登瑞牒兆叶球圖與萐蒲而並出偕蓂葉以相於不事蔓延羞同葛藟依然特立絶少葭莩經疾風而逾徑零嚴霜而不枯如將盆盎盛來便疑丹匭倘遇封章伏處即是青蒲既正直而不撓亦縱橫而罔失茍回邪之稍萌將指斥其可必賢士遇之而賞心佞臣遇之而增栗澄仕路以肅清代天家而品隲惟兹上瑞實昭格於放勳乃播嘉聲永流傳夫屈軼是知祥為德感氣以神調草昧既開獨尊古帝欽明作照首頌唐堯哲以知人本在天心之曲鑒靜能觀物用孚靈草之清標冠百卉以當階逺辭葹菉承千官之委佩如緝蘭椒用能敘班聨之濟濟隨器使以昭昭今天子懋德升賢並觀兼聼仰藻鑑之精瑩運神明之淡定當幾之哲既徹微而洞幽先事之防惟去讒而逺佞故臣工悉化其偏私而物類亦昭其瑞應爰有朱草生庭嘉禾被畝連跗之木擢秀於華池百莖之蓍揚蕤於郊藪惟大化之覃敷致羣情於醇厚賢良之彥咸效命而爭先便佞之夫亦格心而恐後縱屈軼之羅生指清班而何有皇清文頴卷四十九
