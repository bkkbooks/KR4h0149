body:
  text: 詩樂府田家太平樂詞史䕫勿剪松樹枝勿伐桃花林桃花好顔色松栢多貞心惟彼樗與櫟可以礪斧尋束薪送山店濁酒獨自斟醉枕澗邊石醒披風際襟滿身帶巖翠晚唱餘清音右樵夫詞前頭兩黄犢後頭一烏犍隴上戲相逐筞策揮長鞭口吹蘆葉管手簸榆莢錢扳角上牛領解衣臥蒲韀牛饑有細草牛渴有清泉牛肥吾已足不去蹊人田右牧童詞蓮房如蜂窠蓮實如蜂子月下唱歌來蓮舟輕如紙半篙清淺間一鏡空明裏紅衣落已稀翠葢欹還倚暗香如静女素質無泥滓長懐不染心歸來讀秋水右採蓮詞小麥穗雙歧狀如燕尾張大麥叢芒白狀如馬鬛長黄雲徧四野飛蛾不敢傷䥥刀響霍霍刈割齊登場打曬當及晴霏霏白於霜飽食太平飯家家餅餌香右打麥詞雨前雀舌短雨後鷹爪拳茶人相和歌隔塢聞清閒時平蛇虎遁春深風景妍茶租以時歛茶山即良田上芽為帶銙中芽為壓甎驚雷掀百草比屋焙蒼烟右採茶詞聖駕幸闕里樂府十二章金居敬聖皇若稽古金輅時東廵望秩禮璋瓚肆覲享桓信采風察幽隐徧徳逮黎民行行指吳㑹設敎天語諄父老扶杖觀過化俗已淳揚舲渡大江羽衛轉鉤陳顧問誦訓氏師表志龍蹲還蹕經鄒嶧原泉契道眞稷門駐六飛芹藻先知春帝心祗夙夜祠官戒惟寅一章經籍有典祀釋奠先聖師尼山集大成麟紱端門期宗祊屢改築睟穆存當時法駕在齋宫宿設駿司儀奉引導鹵簿庭燎儼威熹我皇既下輦從官行如馳有嚴升獻斚拜典三肅祗雅樂傳登歌禮器列象犧太常讀祝版自天親製辭望瘞神歆歆皇帝受蕃釐二章典祀已告備還幸詩禮堂欲觀聖人後論說宜精詳魯儒悚天威鵠立黄案傍虎賁盡聽講階序翼冠裳展書命敷陳聖聰達洋洋三綱具八目十翼披首章體用惟一原内聖而外王典學亶緝熙虚受來賡颺天語如春温嘉奬教澤長申命諸子弟守先㒺不臧三章禮成誠己格聖心重低徊八音聞魯壁六籍出秦灰二千有餘年泉冽井幕開奇表四十九肖者其誰哉古檜發故根旋紐如手裁摩挲垂睿想作賦耀昭回祥符諸贊在屹石立崔巍漢魏及隋唐碑刻數枚枚惟聖事師古垂問及尊罍從茲一顧恩舊物拂塵埃四章天仗出北門雲旂映洙水直視若斧封列栢二三里榛蕪本自除輦路平如砥至尊拜稽首酹酒爵再洗文鳥雝喈鳴奇木縱横理生蓍自幽贊植楷從弟子山祗欣望幸燦然呈衆美瞻言駐蹕亭苔蘚上階戺自從祥符來寂寥向千祀皇徳乾比崇髙標越前軌五章大典登矞皇湛恩施汪濊先後其揆一喜起際交泰時邁臨魯邦鸞聲載噦噦道古嫓軒羲萬年頌嘉㑹琳瑯天葩芬葳蕤曲柄葢篇章昔曾有孰似聖謨大麾仗昔曾留孰似今皇賚丹書炳常新函覆極無外榮光燭蓬蓬白雲紛靄靄還令望氣者瞻仰莫能繪六章上天降豐澤人待於下流賜書出中秘寳翰煥層樓九章錫上公蒙茸貂鼠裘四姓與執膰金綺沾渥優申以好爵縻組綬若若裒爰進諸父老嘉乃服先疇無出今年租負載休車牛自今勸力穡謹節供㫖羞阡陌齊歡呼常願奉宸遊與天並巍巍雨施徧遐陬七章天子有後命寵光比進律灑掃給百户卒史實統率自從建寧來舉廢待今日禮樂與兵農一命咸朝秩兎溝虚幽宫馬鬛安且吉繁衍袝域兆纍纍華表密至仁及骼胔顧此宸𠂻恤制曰增式廓先聖所貽翼傳之億萬載特書史臣筆帝紀二十三孔世六十七八章承祀間平賢繼絶大號渙姬爻繫乾惕聖功勤宵旰太極置御座西銘表宸翰契合今古同殊數自聖斷元公啓魯宇末胄負薪嘆二儒修烝嘗青衿奉薦盥皇情為軫惻次第天書爛新廟載奕奕睿藻垂琰琬世官奉俎豆胥樂式燕衎連及濓與闗頌聲溢璧泮九章惟聖始知聖諡號無庸加開元及祥符制詞罄褒嘉天言發要奥綸綍同宣麻奎章效懸象龍虎勢攫拏拜手揚天休琢玊籠絳紗恭請詔天下不敢私一家帝乃可其奏置郵環海涯殿版燦金薤重簷標丹霞師儒得縱觀軒車塞闉闍中郎太學碑瑣細不足誇十章粤自唐武徳篆刻傳贔屭迄乎明三宗製辭屬睿思繕寫付中書曾未親書字皇帝崇聖師齋沐撰碑記神腕運八法游藝兼龍穗採山斵貞珉方舟随水致陸載還兼兩使華實董治彫鐫出供奉摩畫稱天意御亭聳霄漢碧瓦上方賜穹嶐暎紫薇鎮魯俾昌熾十一章千齡表聖瑞九域頌皇猷重道紆帝車紫宸臨奎婁中和建有極備至靡前儔草茅充載筆鑚仰喟末由邃古紀典謨執簡非常流下逮元和中韓栁揚歌謳兩儀施莫謝二曜譽難侔含毫幾欲腐掩巻徧諮諏揄揚萬分一昭揭垂鴻休顧慚多掛漏撫已心怮怮十二章大駕親平沙漠還京凱歌七篇有序姜宸英臣聞王者之師有征無戰其不得已而用兵非為生民除患害為萬世詒治安則弗舉也我皇上文武聖神之徳度越前古自御厯以來削平三孽内消藩鎮尾大之患開郡海疆外控浮航萬里之國神樞闔闢出天潛地廟算所指雷動飈馳固已遐至邇安中外禔福遺萬世無疆之祉矣厄魯特噶爾丹者向䝉國家覆庇厚恩不知感戴反肆其爪距屢懲不悛罪大釁極自取滅亡皇上惻然思為民除之以為不一勞則不永逸於是上稽於天内斷於心遂下親征之詔命所司儲峙既周分師三路帝車中運禡牙之日祥風來應軍行出境屬國羣瞻自初發迄於廽鑾首尾纔八十日已絶大漠渡克勒河朔徧躪賊境至於拖諾山逼巴顔烏喇賊方驚我師從天而降喙奔不暇而皇上所遣兩路大兵已分師逆擊大破賊於昭木多之地矣夫親屈萬乗之尊逺臨絶轡之野勞身損膳以為民擾患至仁也軍興之際不撓衆說不避險艱平行大漠若從枕席上過師黄鉞一麾所向披靡三月之間頓成掃盪至勇也至於選將授律决勝帷幄因機制變鬼神莫知此非天下之至明至聖不足以與於此臣謹按周禮大司馬王師有功以愷樂獻於社大司樂王師大獻則奏愷樂愷樂者即後世鐃歌皷吹之所夲也漢世謂之愷歌臣愚不敢妄擬前人唐雅之作輙製成愷歌雖辭義淺陋懼不足以發皇聖功萬一特其區區歡愛之誠懐不能已或亦使天下之仰慕景爍者謂臣身依輦轂耳目所親聞見以視他日金石之奏史冊之傳亦有足考信將來者也謹稽首頓首撰列如左皇矣頌宸斷也師出之際羣臣懇留不允鑾輿一駕逐以成功皇矣受命㒺不臣僕孰為狙獷擾我邊域爰整我旅爰飭我車赫赫皇猶與天同符經緯密勿筮龜叶謨羣臣合辭以遣將請皇帝曰吁朕志先定既類既軷六師爰發汔鋤元凶維天子功右皇矣十八句有山崔巍述貞符也明成祖永樂八年北征樹碑塞外山頂云四月十六日壬子大討過此上亦以是月二十七日壬子駐蹕此山有山兮崔巍緬䧺圖兮此裵徊翰海鐔兮天山鍔告我㡬先兮誰所作四月壬子皇亦臨止匪神曷徴唯徳是俟莫莫廣野疇牧其馬於萬永清兹山之下右有山崔巍十二句從軍樂恤將士也上軍行每至險道加意拊循與士卒同甘苦御膳日止一進時徹膳令將士㑹食以是士益感奮從軍樂莫問寒與饑上下山阪側臨洄溪十歩九詰曲雨雪沾人衣伐薪不得然何用斧冰持作糜忽聞天語降拊循多苦辭尚食一御當食思徹我盤中餐與爾共哺之三軍同挾纊頓令萬竈生炎輝拔劍猛氣縱横馳身不盡敵今何為右從軍樂十七句絶大漠頌神武也上以五月初九日親臨大漠十二日追賊拖諾山知已先遁時車駕親追己五日矣乃留平北將軍馬思哈率兵窮勦躬帥大軍迎糧而還絶大漠鏖窴顔昔聞衛與霍豈如六龍駕來九天飛㢘作御列缺鞭五日蹴倒祁連山流鋋􅚹㩧飛刃倐爍禽驚獸喘魂悸魄落晨皷中嚴傳號令我師西來寇方病矯矯平北於汝命俘厥巨魁視軍正皇曰旋歸萬邦慶右絶大漠十五句二儀樂好生也上以抗命者惟噶爾丹一人其餘脅從皆吾赤子開示誠信諭其歸降二儀剖判爰初生民混然一氣孰遐匪親爾㓜爾螫爾長爾磧驅之鋒鏑令我心惻順來勿遲衣之食之觀望回惑後罹其災厥類惟夥傳語福禍曰惟天子活我無不覆兮天之大茫哉幽谷鴻恩沛右二儀十七句雄狐美諸將能禀神算成大功也初上遣費揚古等從西路逼賊至是噶爾丹計窮西走大軍扼之于昭木多合戰大破之斬戮俘馘無算雄狐掉九首自矜窟穴多途窮廹奔竄觸處遭網羅將軍振天聲舉手阹江河當其跳踉時懸命在斧戈熊羆從西來鼠突從東過相逄叱咤間積尸髙嵯峩四野樹降旌逃命惟六驘游魂豈終朝狂孽貽天訶弓盧為我池狼居為我阿明明廟堂算螳臂其奈何右雄狐二十句歌愷旋樂寇平大駕早還也是月九日積雨新霽駕由得勝門入臣僚士庶拜覲天顔讙呼塞道歌愷旋樂成功我出我師攝提指東我師聿歸鶉火正中致天之伐於彼有罪皇弗寧居敢告勞勩日下棽麗鳳葢翔弓矢載櫜三辰光填城懽舞迎道傍短簫横吹笛清商鐃歌奏溢萬方溢萬方祖考格第有功章有徳用虎臣於外封豕行自殪九譯來同羣生咸遂於胥樂兮自今嵗右歌愷還二十五句聖武遠揚青海平定鐃歌三章有序錢陳羣皇帝御極以來文徳誕敷武功赫濯凡有血氣之倫莫不向化恐後乃羅卜藏丹津者梟獍之性飽則辜恩虺蠆之心生而肆毒神人共憤九伐宜申命將督師討之甫旬日而膚功克奏葢由皇上運獨斷之明炳先㡬之哲收聚米之形於掌上定破竹之勢於禁中不頓一兵已俘小蠢語云仁者無敵亶其然乎捷聞之日布喜天下臣陳羣恭效唐時鐃歌體敬賦三章以紀功徳庶㡬歌詠昇平志萬方同慶云爾我師深入直搗賊巢羅卜藏丹津窘廹逃竄為麋之窮第一麋之窮竄荒谷一歩一跌離爾族棄爾羃䍦服婦服皇威震賊勢蹙長繩萬丈行就縳自罹咎匪予戮上天豈爾遺覆育飲我馬整我師釜中魚徒爾為土茫茫欲援誰奪魄者凖噶兒右麋之窮十八句賊黨渠魁既被擒又獲賊母阿爾泰喀吞為賊母俘第二首飛蓬面凍黎賊母俘青海西䑛鎗誓風淒凄今被獲冰未澌將軍寳刀膏鸊鵜不數漢家金日磾子奔竄母含悽未孥戮待金雞聖武耀封鯨鯢右賊母俘十六句捷音奏聞適皇上詣學大禮慶成臣讀魯頌泮水之三章云順彼長道屈此羣醜魯侯服也何足以嫓美至徳而國與天下義有同焉為屈羣醜第三維剪與鏄刈稂莠兮維鈇與鉞屈羣醜兮帝臨辟雍薦嘉卣兮翩翩飛鴞集我林藪兮來獻其驄亦恐後兮百辟卿士拜稽首兮桓桓虎臣萬里是守天子之徳逹於九有右屈羣醜十六句皇清文頴巻五十五
