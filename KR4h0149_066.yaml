front:
  text: 欽定四庫全書皇淸文頴卷六十六
  hash: sha256:49ed70ccc4228e6ff9da621ddf4538a1eb78e5c81ef06107370f340d60c7329e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_066-1a, image: WYG1450/WYG1450-0139a.png}
body:
  text: 詩五言律詩上苑觀燈理密親王允礽刻漏遲銀箭燃燈燦玉京凌空珠作樹不夜火為城盤鴨輕秦制蟠螭陋漢名堯天星斗麗長照萬方明塔山理密親王允礽朔吹盈川谷蕭蕭動羽旄草枯迷兔窟風急脫鷹縧箭落寒雲重山鳴畫角高承恩出關塞躍馬氣逾豪過開山廟理密親王允礽東去指徂徠巡行亦壯哉人從千嶂度路想五丁開雲氣連秦觀煙光接漢臺春陰嵐翠潤溪轉徑迂回黃河理密親王允礽黃河天下險萬古亘乾坤不覩靈濤壯安知禹力尊風雷無定響江海欲全吞此際乘槎穩安瀾荷聖恩賦得潤物細無聲理密親王允礽亷纎初應候風定灑千絲但覺寒陰重旋看樹影垂一犁霑足處萬彚發生時不到春郊望恩膏那得知夏日園中恆溫親王允祺溽暑人俱憚清涼我自諳四山晴獻翠一水晚拖藍爽氣先秋集禪機盡日參蓮花如解意開到板橋南侍宴觀燈恆溫親王允祺昨宵方入直今夕又承恩陪宴來中禁觀燈過上元星橋林外直蓮炬水邊繁併作升平象怡然奉至尊晚發湯山途中口占恆溫親王允祺晚發湯山道彌深定省情春煙含遠樹銀漢轉初更新水長橋急宵鐘野寺鳴前途知不遠燈火望中明二十七日歸恆溫親王允祺征途值臘盡氣候轉蕭森野渡氷封草孤村火透林邊鴻無息羽老馬有歸心縱到家園裏悽悽歲暮侵禁中直宿晚晴見月淳度親王允祐獨坐黃昏後遙聞玉漏聲正當雲影散忽見月華明鳳闕光逾淨龍樓色更淸為因新雨好亦愛晚來晴奉和兄雍親王暮春元韻怡賢親王允祥好景當三月紅雲點緑苔鶯啼垂栁外鶴舞曲池隈麗藻毫端發熏風指上回堯階多雨露棠棣四時開恭讀御製耕織圖詩敬成二律怡賢親王允祥歷歷三時況如陳七月篇秋雲靑甸裏春雨緑疇邊聖政先無逸皇心重有年孜孜宵旰意總向畫圖傳玉帛梯航遠山龍繪繡工豈知寒女事猶入睿吟中勤儉昭淳俗勞思愛古風垂裳開至治衣被萬方同春晝怡賢親王允祥物候深春好遲遲晝漏長栁塘新水緑花雨小簾香波暖看魚躍泥融喜燕忙熙然俱自得遊泳賴軒皇鑾回恭迎敬賦怡賢親王允祥紫塞回鑾近瞻依隔半年記從初夏候又及小春前村落豐收好郊原霽景妍聖躬多悅豫喜共萬方傳西山怡賢親王允祥霽色來西爽雲端見遠峰翠含新雨重靑愛晚煙濃逸興登山屐淸音隔寺鐘何時探勝迹泉石紀遊蹤試馬怡賢親王允祥名驥來天廄翩翩過苑門風輕朱鬛動沙淺碧蹄翻縱有馳驅力寧酬豢養恩長嘶頻顧影矢志效騰騫夏日山莊應制莊親王允祿山莊宜夏日五月似秋涼瑞草隨風動名花裛露芳鳥啼靑嶂下燕掠碧溪傍佳景陪宸賞惟思獻壽觴泉源石壁應制莊親王允祿十二層城裏仙雲日日過泉源長噴薄石壁更嵯峨碧影函明鏡晴光湛緑波乘槎何足羡身已到銀河恭賦梅候宫中樹應制莊親王允祿葭管初迎律宫梅候已還不隨羣卉放自占一陽先冷豔凌霜潔凝寒傍雪鮮御園春更早雨露近天邊春和堂果毅親王允禮春光簷際滿景物共暄和日午花香遞風輕燕影過沖融怡靜體浩蕩洽恩波坐覺琴心遠怡然發嘯歌賦得秋山極天淨果毅親王允禮山色秋來淨嵐光欲接天纎塵吹不到一碧望無邊宿雨初收後殘陽未落前憑軒縱吟眺爽氣入詩篇蒲州果毅親王允禮龍門一曲處風氣萃蒲津元史蒲州北負關陜南阻大河王思誠詩關設蒲津扼兩壖關險全臨晉山形半入秦州志蒲津關在黃河西岸山陜要隘也一名臨晉關樓窺飛鳥上州志鸛鵲樓在西南城上暢當有逈臨飛鳥上之句柏鬱大河濱水經注首陽山臨大河名勝志夷齊祠下有古柏二相距數尺厥幹上交若兄弟之相倚傳為二賢手植祗有重華日環回萬古新明統志蒲州古蒲坂虞舜都有雷澤歷山舜宅舜井二妃陵諸古迹熱河三十六景詩選三果毅親王允禮四面雲山高亭依翠巘石磴恣攀躋但覺層霄近回看衆嶺低瑶芝雲每護玉洞鶴常棲縱目宜空曠平臨萬樹齊北枕雙峰亭占峰巒勝憑高俯衆山路穿深樹裏人在翠微間紅葉巖前錦蒼苔石上斑白雲時出岫常共此心間梨花伴月乍入梨花峪依巖架屋成一天明月淡萬樹豔雲晴樓閣凌空出峰巒映戶生垂垂秋實美大谷止虛名七月八日遊瀛臺登西南樓成咏果毅親王允禮泛舟來太液還上西南樓四面生涼意孤懷入爽秋遠山凝黛色湖水接澄流景物依然好頻年此獨遊桃和親王𢎞晝我愛夭桃好偏盈露井傍臨風開笑臉趁曉炫紅妝春接仙源近秋經阿母嘗年年期結實藉得奉君王積書巖河北層山有石室室中若有積卷故名見水經注和親王𢎞晝河北鍾靈氣巖深積卷虛名山真作藏石室恍遺書軸祕雲嵐合文殘苔蘚餘茂先推博學對此定何如賦得千章夏木淸怡親王𢎞曉一片淸陰合紅塵靜不生槐陰偏漏月栁蔭自藏鶯雲淡疑無影風微漸有聲憑欄無箇事間眺足餘情曉行即事怡親王𢎞曉秋雨初晴後風來動早涼疏林猶挂月細草已凝霜曙色含高嶺朝煙籠曲塘長鞭時拂馬指點説山莊扈從暢春園途中作誠隱郡王允祉微雨應秋晨鑾輿出紫闉晚田霑更翠廣陌潤無塵霧色迷前嶺溪流響近津西成看已告共慶太平人咏竹四首慎郡王允禧愛此千竿碧能消盛夏威濃陰深護榻淸影半籠扉粉節含香雨煙梢淡暮暉日長高卧穩紈扇未勞揮擢秀自成鄰風竿間舊新交加難論箇散布欲無垠穿徑枝妨帽行吟翠繞身會裁靑玉簡持贈白雲人靜碧連書幌輕涼蔭食單撲空香翡翠繞地紫琅玕遮莫侵蘭沼偏宜近藥欄山童能解事日日報平安舊根來水國移種近香茆雨洗穿籬幹風梳拂牖梢色添杯酒緑聲逐局棋敲落落凌寒意松梅足舊交早秋慎郡王允禧玉律報新秋園林爽氣浮窗風桐葉落山雨火雲收蛩接蟬吟露螢和月上樓人家嵐樹外砧杵自相酬秋日漫興慎郡王允禧禁苑秋光媚樓臺爽氣多風簷松偃蹇月宇桂婆娑荷老餘香在雲間片影過登瀛有佳客觀物動高歌初夏憩淸芬庵後禪院慎郡王允禧童子迎人到僧收貝葉文境幽雲不散鐘定鳥成羣樹影西峯接花光上苑分禪窗四月好小坐午風薰雁慎郡王允禧相傳是陽鳥秋至即南征天地風霜日江湖旦暮情雲飛殊自得水宿漫多驚菰米蒼苔岸三湘處處淸夜坐課詩慎郡王允禧寂寞雙扉掩夜寒霜氣淸人間詩味遠境靜道心生瓦銚茶初熟松窗火更明微吟數更漏點點下嚴城夏日間居用杜甫過何將軍山林韻十首選一慎郡王允禧臨池時學字倚杖飽看雲自注蟲魚譜常持氷雪文果從村叟送茶愛嶽僧分心迹淸如水知無俗纍紛春日新霽鎮國公德普連朝雨雪兼淰淰復􅀢􅀢日腳黃初見苔痕緑倍添晚晴收宿靄積水映垂簾坐愛陽和景題詩信手拈秋夜鎮國公德普病葉蕭蕭下間門掃更封虛窗銜落月殘夢帶踈鐘咽露蛩吟砌巢雲鶴在松隔江秋色晚相憶有芙蓉北林秋咏次姚少監縣居韻鎮國公德普階下蒼槐樹婆娑十丈齊淡煙隨雨散踈翠壓簷低睡覺攤書坐詩成掃壁題白雲看不厭間倚一枝藜春日遊西山鎮國公德普尋幽過曲徑林密日微通崕草周遭緑山桃寂寞紅苔痕侵古壁春色滿花宫隨意添吟興淸尊孰與同西山道中鎮國公德普日斜靑嶂外寺遠翠微間山色自千古人心不暫間風霜消歲月藥餌駐容顔準擬移家住無勞數往還村夜鎮國公德普晚投村路急茆舍覺幽深冷卧驚寒夢長宵耐苦吟疾風鳴敗葉斜月照空林平日遨遊地重過意不禁曉行鎮國公德普十里經過處長宵四五更近村聞犬吠出郭未雞鳴夜氣侵衣冷星光照水明不須愁跋涉道路自多平盤山輔國將軍博爾都策杖攀危磴蕭蕭萬木聲雲過衣漸濕泉沸馬頻驚怪石當軒立枯松隔路橫渾疑塵世外真覺道心生探春花輔國將軍博爾都深閣藏竒樹瑶華冒冷開半垂知臘盡叢發待陽回素色明殘雪幽香間落梅暖風飄碎玉一灑望春臺戒壇古松輔國將軍博爾都戒壇松最古蒼翠日氤氲偃蓋承朝露喬枝惹暮雲蛟龍半空起風雨四山聞把酒成竒賞盤桓到夕曛楓莊新咏輔國將軍博爾都引泉刳竹引泉遠清泠日夜催每從深樹出時帶落花來響作空山雨涼生古石苔明朝欣釀黍香冽藴新醅結亭築室苦卑陋還營木末亭座㴠雲氣白簷接樹光靑對酒聞沙鳥攤書度水螢相嘲何用解不署草元銘種樹我欲植嘉樹分移自遠林土埋紅莢軟水潤緑根深微細含生意婆娑展寸陰他時逄雨露峭拔自森森藝花百卉多區别栽培事不同因之徵月令足以見天工種向町畦播根須雨露蒙芳菲自有候好待棟花風次淸爽齋韻宗室福靜玉律調朱火芳園結翠陰徑幽無暑到竹靜有風吟清朗數間屋虛明一片心高情與地稱琴鶴作知音皇清文頴卷六十六
