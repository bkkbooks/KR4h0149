  text: 欽定四庫全書皇清文頴卷七十四
  hash: sha256:b4df7cc498320ce9575d3d378d0a5c676d0b92d8c652595629c246cd164630ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_074-1a, image: WYG1450/WYG1450-0205a.png}
body:
  text: 詩七言律詩賜假南歸恭賦紀恩詩四首張英臣心寸草由來久未敢封章逹至尊每見青郊陳麥飯思乘春水到柴門上書幸恕愚情迫當寧偏承詔語溫回憶此身依日月藝編香案十年恩典學筵開久侍觀龍綃棐几碧雲端風亭展卷都忘暑溫室披圖豈避寒日旰坐當樓影直宵分聼徹漏聲殘法天行健誠稀覯蠡見惟愁測海難自離疏屩入觚稜碧落丹霄十二層别苑每隨臨水殿御筵常近讀書燈靜從祕閣聼鈴索晚向天街望玉繩檢點平生恩遇地涓埃酬答愧無能雞舌乍辭文石陛羊腸重踏碧山岑陳情敢有懷鄉意拜命彌增戀闕心繾綣難違藝閣侶低徊還惜禁庭隂年來供奉銜恩句暫向東臯澤畔吟丙寅七月初九日賜食於西苑并賜法琅爐瓶匙箸香盒各一具同被恩賚者五人左都御史臣廷敬禮部侍郎臣乾學侍讀學士臣士竒編修臣杜訥臣英時為翰林掌院學士張英西巘秋光滿上林傳來賜食禁庭隂芙蕖照水紅欄逺粳稻吹香御苑深湛露同沾明主澤豳風作頌侍臣心幾人曾到甘泉館栁岸花蹊取次吟內製薰爐出禁闌鏤金錯采碧琅玕御筵移得香猶在溫室分來火未寒沉水煙常凝玉篆博山雲自起龍團賜書百卷家藏久棐几湘簾與對看昌瑞山晚眺張英地接東溟海氣黃橋山弓劍枕崇岡千林春色還秋色萬嶺朝陽與夕陽雲近園陵多靉靆月臨關塞逈蒼茫幾回步屧鸞旗後涕泗西風輦道傍乙亥六月二十日奉召至暢春園賜食於韻松軒賜宴於淵鑑齋宴畢敬觀御書於佩文齋賜御筆書扇並紅白千葉蓮各一瓶恭賦四章同召者户部尚書臣廷敬原任左都御史臣鴻緒學士臣藻少詹事臣士竒太常少卿臣杜訥督捕理事官臣會恩侍講學士臣夔庶子臣嶽頒及長男侍講學士臣廷瓚張英時和鳴鳥聼雍喈避暑亭臯愜聖懷苑栁涼生宣政殿渠蓮香繞讀書齋林幽地靜煙霞古徑轉溪回水石佳惟有侍臣恩眷渥木蘭舟泛到蓂階萬幾臨御久精勤暇日皇情涉典墳窗度竹風彌靜逺簾垂花氣更氤氲藝香披卷侵晨色蓮漏觀書逹夜分水變墨池何足訝琳琅千軸盡奎文遏雲亭畔列芳叢景物人間逈不同玉蕊乍驚天上樹荔枝初見嶺南紅雕欄鳥語曈曨日水殿蘭香淡蕩風總是生成饒雨露擢英競秀碧霄中自昔詩稱玉井蓮錦堂今見露華鮮重臺異種蓬壺客碧藕竒姿太液仙瓶貯荷香分渥澤舟移花影度晴川一從拜賜芙蓉闕日日清芬几席前侍宴外藩郡王賜石榴子恭紀陳廷敬仙禁雲深簇仗低午朝簾下報班齊侍臣蚤列名王右使者曽過大夏西安石種栽紅豆蔻火珠光迸赤玻璃風霜歷後含苞實只有丹心老不迷講筵賜紫貂文綺白金恭紀三首陳廷敬去歲含毫侍玉墀錦裘天上拜恩時衣冠曙色交龍衮鵷鷺春溫集鳯池禁苑久依簪筆地直廬重詠賜貂詩微勞一髮何曽效輕暖頻年愧聖慈賜貂紫襭青綾出尚方恩深奏謝閣門旁機絲巧度金梭月刀尺頻霑錦綺香袖拂螭頭爐氣暖步隨龍尾珮聲長許身衮職無能補空睹宮衣滿篋箱賜文綺榮光賜豫報重重內裏分金敕禦冬赤縣尚鐫初進字瑶函才啓御前封記恩未忍輸泉布索米重教罄釡鍾不羡長門工賣賦腐儒執簡慶遭逢賜白金奉命祭告北鎮陳廷敬使星十道出王城獨奉函書到上京大漠北來砂磧盡神山東望海雲生鶯花舊日朝陵路楊栁春光出塞情曾是翠華遊歷處臨軒故遣侍臣行世祖章皇帝御書正大光明四字上御製題跋勒石賜觀於內殿恭紀陳廷敬曾侍先皇近玉除龍鸞重捧九霄書兩朝寶翰輝天府奕葉奎文映禁廬典册星雲光絢爛勛華日月氣扶輿還思開國規模逺金匱藏編在石渠聖德萬壽詩十二首有序陳廷敬伏惟德並乾行純嘏允符函蓋光齊日照遐齡永配曦輪欣逢景運之隆慶洽承平之盛陽春發育喜萬彚之蒙庥化域和恆咏九如而獻祝臣廷敬恭覩我皇上禎符誕握寶籙𢎞膺居正體元備聖人之全德履仁蹈義躋天下於咸寧有生民未有之竒道隆三古兼前代未兼之業功蓋百王文命敷而風教式於九圍武烈昭而聲靈振乎八極既高蕩蕩巍巍之績復溥穹穹厚厚之恩偕闓澤於神人遍謳歌於中外蓋以肇天極而修人紀用是闡皇綱而恢帝紘昔當初臨寶祚之時正是孝事慈寧之日重闈問以為君何欲我皇答曰圖治愛民曾傳聖語於當年言為經而辭為緯果見太平於今日治已定而功已成猶思由後以視今每念謹終其如始廓明德新民之量廣錫類不匱之原存心飬性以逹天主敬立誠而體道容儀清穆肅雍殫昭事之虔齋祓潔嚴享祀盡明禋之實危微精一接統緒於勳華濂洛關閩會淵源於鄒魯籖分甲乙探册府之藏卷歷丹黃發圖疇之祕西清東壁古今絶企夫天章二典三謨前後允推夫御製並虞廷之什義兼周雅之長超唐人之篇理取宋儒之正冠六文而首出邁八體以遐標玩程頤即此是學之言契神化於形聲之內愛公權心正筆正之語運經綸於文字之中宮漏未移已布千言於紙上封章才罷早回萬象於毫端貫乎百家而我學不厭遊於六藝而惟聖多能玉尺儀天溥博如天之大土圭候日昭明如日之新春搜夏苗適修軍國之禮投戈講藝不忘弧矢之威凡此躬行心得之精微具見帝德宸修之廣大奉東朝之鼎飬允矣孝慈操北斗之璣衡皇哉作述龍樓鳯閣光華朗映前星玉葉瑶枝芳馥長凝叢桂克勤克儉建昭代之儀型是訓是行彰清時之法守體節用之指約省百倍於前朝𢎞益下之規德澤頻施於萬姓惜金錢於太府無非寬閭左征徭減玉食於尚方正以裕民間積貯時頒渙汗蠲逋歲至再三屢沛絲綸賜免動逾千萬當爰書之覆奏必惻怛於宸衷祥風轉草色於圜扉協氣應星光於貫索夫自端居燕寢無時不以黎庶為心至於問俗觀民隨在必以補助為事鑾車駕而需雲布慶翠旗指而解澤滂敷河淮為國計攸關疏瀹悉聖謨所示山川永奠春回禹貢之區漕挽咸宜人樂我朝之制良由無逺弗矚視萬里如目前以故靡舉不神運天下於掌上在昔逆藩蠢動致勞天討遐施一怒而安四海之民一舉而靖三方之亂彼有元之餘裔曽負固於窮邊奮我武之惟揚七旬弗俟殄纍朝之不逞彌月而平海不揚波郡縣盡臺灣之地野無斥堠享王來域外之人逮喀爾喀歸依幬冒之中乃噶爾丹自棄生成之外神謀獨斷廟算無遺朔漠三臨銘勒天山之表羽林大捷塵清瀚海而遙慕義嚮風日出悉冠裳之會同文合軌月支皆職貢之邦惟聖主過化而存神故王師有征而無戰所以行焉斯效動罔不臧總明目逹聰之休𢎞集思廣益之美自執河魁之柄睿照遐周髙披天鏡之光物情畢鑒規模𢎞逺令甲宣昭轉輸通遼海之舟航水利興西北之農畝積倉平糶以逮窮簷發粟截漕以蘇澤國郵傳用恤而恩渥輿徒鹺稅是輕而惠流商賈頖宮璧水奉針勸以欣榮魚服豹韜感投醪而鼓勵仕循資格而立賢無方才許薦揚而用人惟巳時施仁於後世每致憫其嗣人念臣子末路之艱見覆載兼容之大凡沾雨露思竭涓埃共荷帡幪罔酬髙厚今者歡呼遍於率土忭舞極夫含生雲燦星輝轉洪鈞於一氣麟遊鳯集開壽域於遐荒八千歲為春秋籌增太乙億萬年齊甲子世躋華胥昔天保頌岡陵推誠受祿及豳風陳忠愛歸嚮稱觥臣廷敬忝列侍從之班幸際雍熙之代伏覩聖德廣運同歡萬壽無疆謹獻聖德萬壽詩十二首管窺蠡測而莫罄歌衢擊壤以難名臣不任踴躍歡忭之至泰符運啓帝圖昌還識流虹繞電祥鳯歷紀元天並永龍飛當午日初長仙桃結子春三月御栁垂條歲萬行正是艷陽逢聖節紅雲髙捧玉爐香日暖花明紫禁林風回青鎖漏沉沉萬幾宵旰三天事四海升平五夜心雨露恩流金闕外桑麻春長玉階隂億年齊上無疆祝總為憂勤􅕊載深聖質天齊凝寶命神霄地逈照人寰山河環拱罘罳上日月髙臨藻火間八表歡聲歌帝則萬年春色駐龍顏皇圖開拓要荒外柔逺何曽閉玉關講席經函列御筵淵源盡闡魯庭傳文成偉論髙謨典詩就新篇逹性天載詠光華同舜旦深明歷象定堯年仰觀俯察鳶魚妙道契羲皇一畫前丹地金鋪淑景新綺疏明淨對花茵九霄清晏心無事萬卷詩書筆有神璀璨宸章懸斗極龍鸞聖藻麗星辰六文八法流傳盛光被誰能比一人龍文五色護瑶箋拜賜恩華自日邊開處春風彌宇宙捧來瑞氣出山川香含月樹枝枝秀朗照驪珠顆顆圓琬琰恭橅埀寶拓維南同壽永留傳神威征伐久旋師灌燧銷烽正此時一自三回臨朔漠遂令萬祀靖邊陲玉鞭晝舉靈泉出金甲宵明御寢遲北斗天南回望處於今中外盡雍熙節儉皇家邁昔王聖心原為恤農桑止須制用供天府直使流膏遍下方疊見金錢蠲百萬還思玉粒自倉箱陽和到處人歡樂春日春隨日正長耕織新詩出上闌情殷稼穡詠艱難恩添瀛海波瀾濶人到中天歲月寬繡壤風輕飛玉燕瑶池水暖浴青鸞吳綃並寫來王會若木流沙總奠安黼座慈雲下碧空普天人在太和中祥刑德與唐虞並育物心將造化同丹鳯九重銜赦草金雞一夕報春風遐荒盡是康衢地處處謳歌逹帝聰荷鋤倚杖野農情每聼音車為省耕瑞日早迎仙蹕上彩雲時傍翠旗生華封人進三多祝嵩嶺神傳萬歲聲江北江南長望幸五年今得見巡行虞廷威鳯喜來儀麟趾文祥福履綏曠代光榮逾鎬飲萬年祝頌叶邠詩春雲瑞雪迎三正甘雨和風順四時仰荷栽培同寸草蓂階還與露華滋召見乾清門承旨充日講起居注官恭紀史鶴齡幾年儤直禁庭隂夙夜常懷捧日心宣室忽隨仙仗入承明初拜主恩深毫分五色簪成筆書上千秋鑑是金治比虞廷方鼓瑟賡歌何幸入韶音扈蹕南苑應制史鶴齡曉隨仙仗出神京爽氣欣看翠岫橫豹尾聨鑣依日麗龍輿馳道御風清栁垂金殿千絲裊水落銀橋萬玉鳴聖主巡遊來上苑天衢雲淨馬蹄輕南苑進講恭紀史鶴齡獵馬平原正夏初鑾坡朝罷更陳書儒生敢謂三冬足聖主彌勤五夜餘御鼎濃香浮殿陛宮槐清蔭滿彤除文章早誦相如賦報國寧容上子虛賜白櫻桃恭紀史鶴齡櫻桃原出上林紅忽訝氷姿萬顆同宿雨漫教瓊玉瑩曉霞常映水晶融宮鶯欲啄疑珠露綵燕驚翻避雪風今日承恩天澤渥翠籠擎賜自瑶宮皇清文頴卷七十四
