  text: 欽定四庫全書皇清文頴卷八十七
  hash: sha256:7374f20ff20289287d7094f68988fe8e63361cf9c145ff30cafea45a8f62bc62
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_087-1a, image: WYG1450/WYG1450-0343a.png}
body:
  text: 詩七言律詩乾隆八年聖駕東巡盛京恭謁祖陵大禮慶成詩十首有序陳世倌洪惟我皇上御極之八年庶績咸熙禮明樂備當纍洽重熙之會溯經營締造之初念禮隆報本合萬國以抒忱孝首尊親虔一心以昭格况豳岐開基業之始典倍切於追崇而園陵藏弓劍之區禮尤嚴乎禋祀於是以虞舜之大孝符周武之配京序值清秋時惟七月虔諏吉日恭謁祖陵奉侍慈幃夙駕鑾輅於時百靈擁衛庶官景從縣宇騰聲四野歌呼齊起川原生色萬郊禾黍俱豐出古北之雄關詣瀋遼之重地千重嶺岫遙瞻王氣之絪緼萬樹松楸羣仰神區之蔥鬱閟宫祗祓典禮燦陳帳殿齋居質明將事孝推一本孚愛慤於僾聞愾見之餘誠徹九原通神明於陟降上下之際皇上肅然止敬穆乎無言緬祖宗創造維艱地闢天開允垂卜世卜年之久念子孫繼承不易膺符受籙敢忘克勤克儉之模禮徐遍於三陵忱每將夫一敬告成大祀乃燕明廷助祭百工均頒酒脯輸誠六服咸與几筵大官之水陸畢陳飲御之公卿既醉爾乃衮垂藻火面南離以當陽廷肅鵷鸞共北辰之居所黑齒趨蹌於王會雕題拜舞於天朝德教遐宣奮揚斯舉火荼日月黃麾動而七校齊開龍虎鳥蛇畫角鳴而八陳咸合左射右射並宣天子之威大綏小綏仍戴聖人之德而且推恩無外錫類多方自王公以逮軍民槩沾膏雨由京邑以連荒徼普煦陽和既時邁而伸殷薦之誠乃回鑾而理垂裳之治此皆皇上德孚蒼昊孝通神明乃與圜丘祀天方澤祀地之禮並隆千古也臣沗掌絲綸徒塵政府謬司教習無禆吉人弗獲隨從乘輿式觀典禮時逾三月未聆訓行于天言身領百寮莫效肅雍於相祀敬成七律聊抒戀主之愚忱恭賦十章用志饗親之逹孝云爾熙朝區夏肇東瀛天作高山啓大清三后神靈時陟降一人統御際承平祖宗文武垂先烈原廟衣冠想舊京報本不忘親享祀旋看奏假賚思成鵷班拜手送鑾輿帝侍慈闈問省餘神列勾陳隨輦後時當零露屆秋初閭閻共慶寧居樂稼穡羣覘大有書更喜太平真氣象出關民物似華胥王氣蒼茫屬瀋遼陪都東去路迢遙渾河曲折環邉極鐵嶺峥嶸接斗杓龍虎萬年長拱抱精靈五夜每趨朝橋山弓劍歸藏地時有紅雲上九霄祠官典禮疊相承列聖居歆儼式憑僾見愾聞通一氣水源木本溯三陵粢盛潔處齋心逹膋膟焚餘香靄升聖祖昔年殷薦後又看繩武肅嘗蒸履武薑嫄推聖母篤生始祖事神竒燕天高帝初光宅纘緒文皇實肇基王業艱難垂世德皇心乾惕協靈祗閟宫盥薦抒誠恪有道曽孫對越時燕喜一堂羣受祉天厨稠疊湛恩宣漢高沛邑歌風日建武南陽置酒年長白嵐光遙對席松花江色靄浮筵君臣宛似家人會既醉歡欣黼座前殿名崇政肅朝紳稽拜信桓及逺人鶚立鵷翔齊舞蹈黃支烏弋並尊親八荒在闥聨中外六合為家篤主臣應遣畫師閻立本圖成王會獻丹宸雍容典禮敷文德震爚川原耀武功陳合鸛鵝緣大閲軍分荼火為臨戎網留一面湯仁在禽失三驅易象同却笑揚雄誇羽獵何如吉甫詠車攻恩詔頒來速置郵德音汪濊遍神州聼將匝地歡呼動知是經天惠澤流錫類定能孚血氣宣威不獨鼓貔貅聖朝至治歸仁孝庸行從來即大猷告成大禮返皇畿路過灤河望六飛發駕金風方颯爽回鑾玉雪正氛霏舞成七德揚翬羽庭列千官拜衮衣赤鳳白麟休獻瑞太平端拱自巍巍聖駕東巡盛京恭謁祖陵大禮慶成詩八首有序于振我皇上御極之八年泰階既平百揆時敘禮樂明備朝野熙恬於是述祖德頌宗功有事於三陵禮也臣竊惟謁陵展孝為典最巨載籍雖逺然漢唐以來可得而稽也漢嘗以正月上陵百官四姓公主諸大夫外國朝者侍子郡國計吏咸會至期晝漏初上大鴻臚設九賔於寢殿鐘鳴謁者引客就位如儀乘輿自東廂下升階展拜大官尚食太常奏文始五行之舞郡國上計吏以次前當神軒告其郡榖賈人所疾苦欲神知其動靜焉唐禮朝陵之先日設黃麾仗周衛陵寢至日質明七廟子孫及諸侯百僚蕃服君長皆陪於司馬門內上至小次降輿入門再拜躬親執饌閲視先帝后服御之物引諸功臣並入執爵進俎奠訖乃復蓋孝子事親曲盡愛敬之心有如此者漢唐諸君去古已逺然未嘗不緣情制禮以為法於後世故垂諸史册以昭令式良有以也臣伏見我皇上御宇以來盡孝盡誠善繼善述體祖宗之心以為心法祖宗之政以為政僾乎如見愾乎如聞蓋未嘗一日釋也洪惟我朝發祥長白奄有中外肇萬世無疆之休實由我列祖列宗積德纍仁承天景命豐功駿業昭垂奕祀肆我聖祖六十一年之中三謁園陵恪修祀事孝之至仁之極也我皇上敬繩祖武諏吉日飛六龍奉慈寧備法駕百官咸會六師景從遂屆興京舉行盛典於時天澄其氣日朗其精松楸蔚然閟宫肅穆皇上萃精神嚴對越孝敬之至通於神明洞洞然屬屬然視於無形聽於無聲念經營締造之維艱思夙夜敬承之不易籩豆既飭肸蠁如聞皇哉唐哉亦孝之至仁之極也昔周之王也定鼎郟鄏卜世卜年承承繼繼然姬公陳王業之艱難述農夫紅女衣食之事以推本風化之所由興必以始基靖民歸之后稷十五王而文始平之十八王而康克安之蓋創業垂統若斯之難也故曰周家世篤忠厚以成其福祿而啓佑後人我祖宗亦世啓鴻圖以昭兹來許而垂諸萬祀皇上席重熙纍洽之盛而不忘小心昭事之誠以視思文之頌后稷于邠之咏公劉惟此王季貊其德音至於文王維新厥命光懿顯爍何以加焉彼漢之衣冠出遊唐之薦衣獻服直瑣瑣耳曽何足以嫓此鴻庥光斯盛烈也哉臣沗列詞垣濫竽律館雖未獲躬隨法駕預於駿奔之末而朝夕論思日月獻納抒下情以通諷諭宣上德而盡忠孝雖學殖荒落然雍容揄揚比於雅頌亦其職也夫盛德所孚櫪馬猶知仰秣太和感召遊魚尚解揚鬐况臣庸愚敢忘舞蹈因不揣蕪陋拜手稽首而獻詩曰萬乘東巡展孝思鳴鳶前載漾微颸濕雲頓掃開芳甸晴日平臨滿畫旗漢代歌風追鎬洛周家卜世溯豳岐起居晨夕依行殿仍似深宫定省時高山天作發祥初長白榮回結隩區鴨濬仙源瞻王氣鵲銜靈果啓鴻圗黃麾宿設周廬仗赤伏還陳受命符載撫杯棬欽祖德宸襟彌自斂盤盂萬峰岝崿藹松楸鬱鬱蔥蔥佳氣浮寶祚無疆知地脈曽孫有道荷天庥衣冠拜處朝儀肅綸綍宣時惠澤流春露秋霜方怵惕歡聲早已動皇州雉堞峥嶸杳靄間睿謨握勝控雄關南臨渤海兼遼海東接松山與杏山應運功成遺壘在太平日久戌樓間即今雞犬桑麻地饗蠟吹豳自往還悠悠旌斾靜無譁來享來王總一家到處如安記里鼓遣歸不假指南車鵝黃褶麗隨天仗狐白裘溫扈翠華欲倩龍眠高畫手摹成王會示荒遐朔風凌競馬驂驔鸛鶴魚龍士所諳伏札能穿何論七前驅不誡總開三千屯月上霜威冽萬幕雲深雪意酣日暮放罝鉦鼓卧又聞帳殿啓經函萬幾清暇富文章頃刻龍鸞天際翔賦就盛京思劒舄舞成世德念羮墻宫懸肄業皇猷壯瓊笈鐫摹御墨香蠡管詎能窺聖學願偕儀鳳記鏗鏘冬序初回是小春一陽來復屆芳辰鸞輿過處衢歌溢鳳輦歸時巷舞頻共識盛朝隆典禮咸知純孝格天人小臣愧乏卷阿頌鼓腹聊同擊壤民聖駕東巡盛京恭謁祖陵大禮慶成詩八首有序王會汾臣伏見皇上御極以來至治覃被浹于中外鴻文盛儀靡不遍舉孝思蒸蒸格乎天祖今年秋七月車駕幸瀋陽奉皇太后謁陵廟祗祗翼翼大禮紀成傍推典章所宜柴燎望秩羣祀山川咸享明薦爰暨開國勛勞之臣亦酹尊爵仁義嘉孚上下協應時則有屬國逺藩名王侍子翖侯貴人咸馴我聲教憺我威靈亘塗萬里鼓舞修職皇歡載洽大號用孚湛恩滂洋幽逺胥洎乃孟冬吉日旋蹕闕庭備福受祉百官兆人歡喜歌呼共慶無疆萬年之庥謹稽古者天子有大功德大典禮則在位者作為歌詩揚舉懿美流連勿忘所以備朝廷之彜憲逹羣下之至情不可已也况聖天子陳常立極巍巍孝治邁古有光舞之蹈之宜在今日臣以愚陋荷特逹殊恩得列近侍拜揚庥烈臣實職之雖辭謭理薄不足仰頌聖明于萬一尚願隨轅童壤翁之後抒其詠謠以美上德之至盛光千載於禮儀云爾東巡秋燦九重霞黃道天開引翠華父老望深豐沛地禮儀光盛帝王家龍旗紫塞懸弓月虎旅青霜拂劍花見説歡顔動文母我皇親侍彩鸞車晴色千林宿雨收望中禾黍翠盈疇香迎豹尾塍雲合影轉霓旌穗露浮已報豐年書太史便行秋稼指神州從臣共識皇情豫駐輦時時賦滿篝漠雲如海散朝煙皎皎青霄赤日懸遙望氣雄元菟郡更欣春照紫濛天呼嵩動地名王拜震電驚霆大號宣萬里星躔拱宸極盛朝威德被無邊祖宗神武奠鴻功靈命長祥帝所鍾萬嵗山光榖林樹千年雲氣鼎湖龍堆明金粟曕冠劒路駐仙斿繞柏松此日精虔奉嘉薦樂歌清廟叶黃鐘寢殿崔嵬閟九關遺弓瞻省動龍顔青邱丹水經營地禹甸堯封氣象還星宿久澄霄漢上熊罷長守翠微間寺思孚感無窮意相照金碑玉蘚班南陽白水睹真人舊里今朝景物新天漢流精延析木醫閭修職貢玗珣大風表海明樓殿絶島浮洲帶鳳麟一自重瞳臨眺後山川全覺露精神六龍時邁煥宗周巨典環文次第修為想丹青開駿烈已知川嶽遍懷柔露蕭車馬東都會香案煙雲北闕浮天上詔書銜鳳觜飛來春色滿神州太平天子上陵回晴日千門萬户開星緯珠囊增潤處鳳儀璚管應風來金甌永固占神䇿玉燭平調仰睿才共慶孝思繩世德蒼生流福詠康哉聖駕東巡盛京恭謁祖陵大禮慶成詩八首夏廷芝熙朝孝治久昭融緒纘前徽帝德隆垂創艱難追駿烈聲靈赫濯溯鴻功橋山松棟千春鞏原廟椒馨一氣通翠輦親臨崇報本淵源默契總相同清時典禮重明禋駕擁龍旗正及辰沙磧千山森壁壘羽林萬騎肅鈎陳已看琛賮來重譯並使懷柔及百神絶徼歡闐宣德化黃旄朱節紀東巡插天長白聳丹霄鴨緑瀠洄江水遙州接青營雄地軸野分箕尾煥星杓素題朴桷風猶古白馬彤車績尚昭列祖神宗貽蔭逺千年儉德溯陶堯寶城蔥鬱護雲煙肹蠁初升對越虔玉匣衮龍垂奕代寢園弓劒感當年宸衷肅穆抒三獻典禮精誠奉百籩至德中孚能合漠仁恩從此洽垓埏祝嘏頻聞告孝慈中和雅奏啓純禧百年禮樂涵濡日九廟神靈悅豫時往事何須追灞杜永年直欲邁周姬推恩更自酬房魏寄酹長深佐命思黃花丹葉正清秋仰奉慈顔頌作求視膳終朝陪鳳輦承歡曉日近龍樓九天作賦光霄漢萬國呼嵩拜冕旒大孝由來天下養億年色笑進觥觩景物陪京衍慶長五雲開處坐明堂風清帝里黃圗會秋滿真人白水鄉寵渥需雲頒虎旅恩深湛露遍鵷行先時况有蠲租詔蔀屋茅簷共樂康蕃釐已降禮初成斾轉千貔野不驚十月陽春回海宇九重孝亨洽幽明黃榆紫塞敷天澤東鰈西鶼遍頌聲光烈覲揚昭萬古小臣珥筆矢歌賡聖駕東巡盛京恭謁祖陵大禮慶成詩六首胡中藻太平開國本岐豐四海車書此會同天列星辰朝斗比地趨龍虎抱關東貽孫册府存堯字似祖輿圗尚禹功最是橋山冠劒在每逢霜露厪宸衷馨香園寢戒明粢典禮時巡護六師祝史剛辰蠲九月犧人牲帖報先期蕭關北擁風雲騎沛上東開虎豹旗令節雒陽徒故事薦新朔望陋常儀艱難王業咏生民瀋水川南析木津五夜齋心符後甲六龍御輦戒初辛庖霜可補周三禮灌玉還陪漢九賔父老嵩呼齊拜舞太平天子肅明禋奏罷咸池思邈然朱華朝拂引回鞭要知侯國酎金日猶是塗山執玉年黃目光流侵月露祥雲風裊篆爐煙曽孫别有馨香處世德尋求答在天殷土芒芒控九州昔年麾指定諸侯高山已作天東顧瀚海無波水北流龍斾卷舒隨輦輅地靈今古護松楸散齋行殿重回首雲氣蒼蒼五朵浮列祖精靈想像間留都周覽悅天顔歌風御筆東京賦燕鎬從官六膳頒遂有需雲同九野先瞻解雨下三關回鑾奏頌多文藻染翰慙隨供奉班皇清文頴卷八十七
