front:
  text: 欽定四庫全書皇清文頴卷六十八
  hash: sha256:e4c5a0fe17a6615fbe1046f1c59be71f8b8ad77c6c21bc19c01278a646356042
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0149_WYG_068-1a, image: WYG1450/WYG1450-0153a.png}
body:
  text: 詩五言律詩平滇詩嚴繩孫昭代當熙洽天王本聖神車書山海共玉帛歲時新城角軍麾偃宫花輦路春兩階干羽日端拱見皇仁聖治方韜甲天心未厭兵賊臣真負主大將且專征鷹隼乘風疾鯨鯢失浪輕家家春酒熟從此賀升平六詔南交地昆明控百蠻天連花馬國山擁碧雞關雨露知新澤瘡痍動聖顔詔書憐父老扶杖淚䀶斑萬里瞿塘峽天清戰鼓聞久知蹂躪苦應待撫綏勤波靜珠江水風開玉壘雲今朝諭蜀檄不用長卿文海國驚妖霧南閩結蜃樓豺狼方濟惡猿鶴自同仇飛檄榕陰暗歸鞍荔子秋水晶宫外路依舊月如鈎隴坂高無際函關百二雄陳開秦嶺北烽舉杜陵東方略尊皇極安危倚上公九重初飲至一為奏彤弓老弱愁供億丁男問轉輸帝憂民力瘁人樂主恩殊湯火羣黎急雲霓我后蘇功成知廟勝千古奉黃圖俯仰乾坤大平成覆載寬紫宸朝萬國青瑣拜千官賜酒霞觴重陳詩露掌寒天顔時有喜數近御屏看恭讀御製咏金蓮花詩限八齊韻沈涵靈種關山北瑤華禁苑西翻階雲葉吐拂檻露枝低濯秀疑臨水含香不染泥一經宸翰賞凡卉邈難齊恭讀御製懋勤殿讀尚書無逸篇有作限五微韻沈涵金殿昭皇極琅函啓禁闈書陳元聖訓念切小民依睿藻傳心逺天章闡道微姬年綿八百今日倍光輝恭讀御製咏觀天儀器詩限九佳韻沈涵寶算開昌運璇圖愜睿懷八風調舜瑟五緯燦堯階蓮漏雞人報葭吹鳳律諧宸章垂象處奎壁朗天街端午日應制沈三曾令節開重午薰風拂九門研朱羣瑞集結艾百靈尊向日榴花艷飛香蒲酒溫芳蘭何必貯沐浴有深恩丹扆正當陽天中節序昌虎符懸藻綵龍鏡照輝光宫扇和風動仙葵上苑芳不勞施色線化日自舒長望西山吳晟山瀉瓊池勝披圖按水經洞名疑小有泉品類中泠縹眇朝煙白微茫晚岫青涓涓通太液終古赴滄溟農蠶雜詩二首陳元龍禹貢聞收秸豳風重築場人逄豐歲健田比去年穰白粲連倉積紅鮮出甑香日斜桑柘影簫鼓賽神忙右收穫柔軟生香細纒綿引緒長齊紈輸沁雪吳紵愧含霜盆手盤銀縷繅車曵練光時清崇潔白為詠素絲章右繅絲賦得清如玉壺氷陳元龍洞徹疑無質晶瑩自有真虛明能鑒物貞潔不生塵寒色交相映清姿可共珍當筵能避暑表裏見璘珣賦得靜有圖史樂陳元龍長夏欣無事開筵見性原觀圖窮彖繫讀史慕羲軒嘉樹陰常滿幽禽語不喧悠然千載上得意已忘言賦得窗戶貯清陰陳元龍夏木窗前繞重重蓋逺張展書浮翠影拂硯借清光有日簾常捲無風座已涼寸陰須寶惜聖誡豈容忘賦得間看玉表驗分差陳元龍銅律曾先辨葭灰莫暗吹占時分晷刻測景計毫釐消息間中見虛盈靜裏知分明堯典在敬授有成規萬壽詩徐元正堯年多化日禹甸告成功肆赦民無訟蠲租歲屢豐物遊春澤內人在太和中解愠還興念琴揮五月風治同天有象德與壽無垠五色芝為飯三山甕是銀神仙呈祕笈佛日鞏金輪帝謂無須爾豫懷在萬民臣獻無疆頌民歌極樂天行田觀刈麥過市聽摩肩樵牧隨鑾後茶瓜供御前龎眉齊賜豫人比地行仙九重陳瑞玉南極見星辰紫殿千門曉黃圖萬里春揚言皆舜牧酌斗是豳民滿泛長春酒嵩呼祝聖人洗桐謝陳常竦幹凌霄逈銀瓶汲井深洗時翻瘦影高處得清陰露葉香雲濕霜根碧玉沉風來傳逺韻永晝和微吟聖德省方詩劉涵玉燭泰階平同文海甸清九重天蓋覆萬里日昭明紫禁求民瘼蒼生軫睿情省方虞典重時令及春行輸挽由河運千夫版築工頻年勞物力何日覩成功堤堰高低處淮黃逺近中要須親閲視未暇息豫躬濵水淮揚地飛鴻集野田天心深豈弟帝澤為矜全普散千倉米平添萬竈煙茅簷蓬戶外稽首望星旃虎衛乘春發龍舟進纜徐兒童瞻翠蓋父老近鑾輿笛鼓喧村社桑麻翳草廬採風聞擊壤應得聖情舒豐澤園御試紀恩詩劉坤路入蓬壺逈波連太液深許乘青雀舫逺眺碧雲岑翠黛含朝旭煙嵐帶夕陰風來曲院裏時聽有虞琴亦有條桑地霜栽擁岸沙枝長萬戶映葉密一村遮雲緑鋪蠶薄風清響緯車宸遊頻涖止杼柚念田家紫陌判西東飛泉百道通浮青萍貼水搖翠稻翻風靜念三時順遙期四海同休徴知有應太史卜年豐況復含哺衆郊原于耜勞皇情時繾綣農務悉纎毫祗覺耕煙近那知桂館高端居時極目風雨軫蓬蒿聖駕南巡恭紀四首查嗣韓青韶開鳳歷紫極駕龍驂天指星辰北春隨鹵簿南鳴鑾風乍暖灑道雨初甘佳氣旌旍外羣山擁翠嵐地勢東南下河身西北高不須沉璧馬已見奠金鰲屹底中流柱狂回大海濤平成經睿慮親歷不辭勞燈火船船月笙歌岸岸樓鶯聲連紫陌花氣護芳洲戶有升平樂車因父老留山呼齊拜舞長願奉宸遊安瀾思禹德底績頌皇功今古神謨合乾坤奠麗同崇山輝鳳藻遺殿鎮蛟宫無事勤疏鑿朝宗萬𣲖東村居雜詩二首劉灝歷歷皆茆屋相依谷口傍人稀村路細野逈水田長巖落千尋瀑墻圍百本桑風來春社後處處稻花香野岸長堤曲高林一徑通魚翻荷蓋露蟬噪柳塘風山色牛羊外人家秫豆中更堪圖畫處向晚雨濛濛皇帝北征大捷凱旋恭紀有序汪倓臣聞王者五兵之制乃用四征聖人一怒之威遂安六服是以青邱丹浦亦載陳師觀扈姺邳嘗聞誓衆頌歌殷武著載斾於三年雅誦周宣美出車於六月師非得已皆出有名罰必恭行自然無敵我皇上之御宇也躬有為之略運無心之化四方無拂戴至德以如天萬國攸同效歡聲而動地堯封赤壤版載職方禹貢白狼圖陳王會柳室氊裘之長知北面以來王雕題鑿齒之區驗東風而受吏然而物衆地大雖在蓋函殘蘖餘萌猶留伏莽蠢兹厄魯特噶爾丹者肆其蜂躉之毒逞彼螳螂之智稱雄馬上天作穹廬竄迹草間人惟鬼蜮讐其唇齒之國莫挫凶鋒辜我卵翼之恩尚延餘息阻兵三載蔑視諸蕃是用九重赫然奮武選蒸徒而禡祭諏吉日以視師天斷不疑借箸無煩於力牧神符多算揮戈必抵於先零遂乃健卒長驅鋭師深入臨邊天子新開細柳之營出塞將軍並過連錢之騎馬頭新月勢學彎弓帳外飛霜光浮淬劍渡北鞮而飲馬登稽落以祠神於是川澤效靈天人助順泉飛若醴湧滴瀝之神漿草茁如薺鬬芊綿之翠色連營虎旅悉感投醪屬國烏孫俱供挏酒前鋒既突指天山以合圍後隊仍馳斬樓蘭而報命神鎗子母電擊雷轟獸盾縱橫雲移月合遂使小醜倉皇望天戈而膽落羣凶錯愕遇突騎以魂驚方一戰而穴蟻皆逃不再鼓而城狐悉竄焚巢鳥雀望斷長林日暮牛羊曾無歸路猶欲孑身北徙妄冀偷生不知遌我西師果然走死天外之烽煙突起塵中之罽幕皆空裂月氐於馬前繫名王於帳下降俘塞路骨載專車獻馘盈邱臍然原野置顔山下已令不返隻輪趙信城邊正見齊呼萬嵗神輸祕計豈敵聖謀天授英姿方成廟略真同一月之捷書直邁七旬之文德春城楊柳去日迎鑾邊笛梅花來時入唱從此陰山諾水俱瞻天子之光華馬邑龍城咸沐皇朝之雨露朱干載戢並賀軒臺金甲俱銷還成農器此八荒之所拜舞而九有之所歡欣者也臣倓謬叨詞館未奉戎行提枹於翰墨之場猶慚橫草執戟於詩書之府敢謂搴旗欣聞勒石於燕然喜見銘功於瀚海白魚朱鷺思賡振旅之歌石鼓金笳願繼平戎之曲祗申雀躍竊效蟲吟覩五色之卿雲常瞻神瑞祝萬年之寶祚共慶升平恭賦五言拜手以獻玉陛來陳事彤庭為請留有征知獨斷無敵本神謀春暖開行殿晴陽拂綵斿逺追軒后烈涿鹿斬蚩尤內廄龍媒躍連營虎士趨帝真勞一怒王自用三驅儼列雲臺仗無煩竹使符禡牙還禱馬禁旅出天衢萬象依宸極三靈護壁門風雷天子令雨露聖人恩塞外龍蛇起軍中虎豹屯賜衣新挾纊寒谷見春溫燀赫軍容整趫騰士氣揚白旄麾上將朱組繫降王堠障寒收柝欃槍夜落芒外蕃齊拜舞天䇿靖龍荒露布傳三捷班師計七旬芙蓉迎小隊楊柳憶歸人天際朱旗色雲中紫塞春丹青慿好手圖取獻楓宸迢遞榆關路飛揚翠蓋飄雅歌賡杕杜鐃吹雜笳簫刁斗窮荒靜烽煙絶域銷君王自神武休問漢嫖姚往者軍符急端資廟略神指揮收嶺粵滌蕩撫巴秦金甲為農器巢車息戰塵漠南重一舉剪逆為安民皇清文頴卷六十八
