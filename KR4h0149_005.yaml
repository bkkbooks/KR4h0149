body:
  text: 論太極圖論葉方藹自易言太極至宋濂溪周氏作為圖說始以無極太極發明聖藴紫陽朱氏復為之解於是斯理大顯臣謹論曰天地之闔闢人物之變蕃上古下今之轉運不窮際無極有之推行不礙總一陰陽為之然陽不能自生陰不能自成有主宰是氣妙合而凝之者當其無聲無臭無形無色朕兆未剖之中萬象森然靡一不具變化生息悉從此出而不知其所以然之妙此所謂無極而太極也臣則謂未有天地以前太極在氣化既有天地以後太極在聖人在氣化者不可見請就在聖人者明之太極非他即吾生生之心仁而已仁之未發寂然不動機緘苞固一渾淪之體仁之既發隨感隨應隨應隨足父子親君臣義夫婦别長幼序朋友信齊家治國平天下出之無有窮措之無不當是故能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育夫至於贊天地之化育而生生之仁始無遺憾太極之妙全乎一心矣堯舜之如天好生性而有此仁者也湯武之朕躬有罪母以爾萬方萬方有罪在台一人反而有此仁者也其他以後之君莫不好生而得之不好生而失之於仁或離或合具其一端而乖其全體終不能仁覆天下而追唐虞三代之治蓋生生之理在我則天下共恃以為生生生之理不在我則我先不能自生而何以能生天下世之論太極者囿於形器之中但知晝夜遞更寒暑迭運四時行百物生以為氣化使然與己不甚關屬而不知反求諸身卷之不盈一握放之彌乎六合欲立立人欲達達人如是親切而有味故臣之論太極舉一生生之仁而豁然也或問臣曰仁於易為元配亨利貞於圖說為木配水火金土太極者含四德苞五行而顧欲以一仁蔽之乎臣曰否易與圖說之於仁偏言之也臣之於仁專言之也易之元而亨亨而利利而貞貞而又元其循環不已者何物乎圖說之木生火火生土土生金金生水水又生木其孳息不停者又何物乎故曰生生之謂易圖說亦言二氣交感化生萬物生生不窮夫生生之理其在聖人非仁孰足以當之分而名之則仁義禮智信合而名之則一仁仁則仁之愛義則仁之宜禮則仁之敬智則仁之别信則仁之誠實孔子曰天下歸仁焉天下歸仁而尚有不義不禮不智不信者乎孟子曰以不忍人之心行不忍人之政不忍人之政而可以不義不禮不智不信行之乎故聖人有時以喜為仁亦有時以怒為仁有時以生為仁亦有時以殺為仁無非此生生之機發於不容巳時而出之使無滅息己矣程氏以為仁如榖種其喻最切夫穀之為物能養人則似仁之愛種類各别則似義之宜交生不雜亂則似禮之敬不與衆草伍則似智之别春生秋穫不爽其時則似信之誠實然是五者若不得種則無以為託程氏獨以種喻仁其即臣所謂生生之仁乎其即易圖說所言含四德苞五行之太極有二乎無二乎或又問臣曰仁為太極是則然矣然朱氏圖解謂物物各具一太極則太極盡人而具今獨歸諸聖人豈聖人有仁而衆庶無仁乎臣曰吁何說之陋也周氏言之矣圖說曰聖人定之以仁義中正主靜而立人極焉君子修之吉小人悖之凶太極有極人亦有極聖人人倫之至仁本盡人同具而立極則非聖人不能臣又以為聖人在下位則其仁可以立極而盛德大業不能頃刻遍諸天下故又在乘時行道之聖人然而立極之事難言矣雖有聖人不敢廢求仁之功請陳其槩厥次惟五一曰凛幽獨人主端居法宮念慮未起外不與臣工接內不與婦豎接此圖所謂無極太極之時乃生生之根柢而己與物所共託命者也理欲之名未立則渾乎仁而無不仁可喜者此時可懼者亦此時存養之功無如一敬書之安汝止惟幾惟康詩之不顯亦臨無射亦保如是則清明常自湛然而非幾不貢吾仁之本庶乎立矣二曰察幾微人心至靈豈能常寂而無感方寸之頃忽然而觸人雖不知而已則獨知此圖所謂陽動根陰之時也生生之仁實於是乎萌蘖為理為欲出此入彼間不容髮過此不察遂有不及察者司馬光有言水之微捧土可塞及其盛也漂木石沒邱陵火之微勺水可滅及其盛也焦都邑燔山林維欲亦然故聖帝明王制未亂保未危慮必極其蚤而辨必極其精夫如是庶幾弗迷所往而吾仁其不可淆矣三曰審言動人心既動乎中即不能不形乎外威儀詞命實傳吾之精微以告人此圖所謂陰靜根陽之時也生生之仁實於是乎發露吾雖能審其理欲矣而一時耽於便安習於茍且恐其猝發而不及制持守之功可不立乎非禮勿視非禮勿聽非禮勿言非禮勿動聖門教人用力之方也然在人主聲色玩好誘之於前左右嬖幸伺之於後莫不欲乘其一言一動之釁而入焉間邪存誠之難又有百倍於恆人者持之以勇而決之以剛夫如是庶幾弗撓所守而吾仁其不可奪矣四曰考實德人主凛獨以來根心生色暢於四支則其理在我自有躬行心得之妙此圖所謂陽變陰合五行順布之時也生生之仁實於是乎堅實吾仁中固有是仁義禮智信之五德矣然不知是五者之德果能全備於我乎試一思之必無不愛而後仁必無不宜而後義必無不敬而後禮必無不别而後智必無不誠不實而後信五者何以缺一而不可何以相成而不悖何以衆人皆全而卒不能全何以聖人克盡而我不克盡反而求之使自得之務令根原融洽而條理脈絡周流貫通夫如是吾仁之體無不具而用亦無不足矣五曰驗功化人主備仁之五德則有聖人之德即有聖人之功此圖所謂乾道成男坤道成女萬物化生之時也生生之仁於是乎推行盡利吾既斂仁義禮智信之德於身即用是次第敷錫之而親親仁民愛物皆在是矣雖然豈易言哉四海甚大萬類甚繁由戚以及疏由近以及逺由有知以及無知莫不待治於我人人養其欲物物給其求則必誠無不長僞無不消公無不伸私無不詘善無不舉惡無不懲利無不興害無不革凡所施為一一合天下同然之心理夫而後以饗天祖則天祖歆以惇九族則九族敘以釐百官則百官欽若以綏萬民則萬民從乂以長養百昌庶彚則鳥獸魚鱉草夭木喬熙熙時若同在太和元氣之內吾仁之全體大用兼該畢具生生之化在天地而生生之妙在一心矣凛之幽獨以端其原察之幾微以防其萌審之言動以謹其著考之實德以立其體驗之功化以究其用五者之功周而復始始而復周日新又新千變萬化不出一本故曰聖人以此洗心退藏於密而求仁之功盡此矣人人可能而不能聖人能之而無其位則功化亦不能然則立極之事非乘權行道之聖人孰可當之哉太極之極先天之極也不求仁而仁也聖人之極後天之極也求仁而得仁也天地無心而成化聖人有心而無為有心者求仁之功無為者立極之妙臣故謂仁即太極而繼之求仁立極之功以為惟我皇上其盡之臣謹按周氏太極圖與今易之橫圖及方圓二圖所為先天之學實相表裏無極而太極云者即先天圖之太極也動而生陽動極復靜靜而生陰靜極復動云者即先天圖之兩儀也陽變陰合而生水火木金土云者即先天圖之四象也無極之真二五之精妙合而凝乾道成男坤道成女云者即先天圖之八卦乾與坤交而生震坎艮坤與乾交而生巽離兌也二氣交感化生萬物而變化無窮云者即先天圖之由八卦而十六十六而三十二三十二而六十四也聖人定之以仁義中正而主靜立人極云者即先天圖之皆從中起而萬事萬化皆生於心也蓋自宓犧畫卦文王周公彖之象之孔子傳之翼之越數千年而周氏復為此圖闡明斯義其云無極正見無形有理有理而實無形所以發揮太極之妙而豈有加於四聖之㫖哉朱氏不憚重復條分縷析而周氏之書始昭然於天下後之學者無所用其疑議矣然朱氏以為周氏以此圖授二程氏而二程氏未嘗示門人恐其馳心空妙而不能默識於意言之表又以為此圖詳於性命之原而略於進為之目有不可驟而語者臣繹思之先天以往天命之性人不能與其事者也後天以來率性之道修道之教人所當盡其功者也故在今日論先天不如論後天較為親切伏見論語曰仁大學曰明德中庸曰誠孟子曰性善而反求諸身生生之妙天地萬物聯為一體不越一仁疑此即太極生天生地生人生物之根本妄擬後天仁體一圖以配太極列其功夫節次曰凛幽獨曰察幾微曰審言動曰考實德曰驗功化由戒懼慎獨以臻位天地育萬物自然之極致使知吾身之一動一靜即太極之一陰一陽其理未嘗有一息之停其功不可有一息之間竊謂人能𢎞道非道𢎞人𢎞道之責斷在皇上體後天之功以合先天之撰敢因清問所及一竭顓愚所恨臣學問弇鄙識見卑陋聖賢儒先之書未能熟讀深思徒以影響浮泛之詞挂一漏萬於義理毫無發明此則泚筆之下既恧且懼者也臣方藹謹記宋璟論葉方藹易否之六二包承小人吉大人否亨象曰大人否亨不亂羣也夫以小人能包容承順乎君子而君子斷斷然拒之不受豈好為巳甚哉權利害是非之介慮之精而見之甚確有不如是而不可者也昔唐至中葉女主擅國張易之昌宗之徒專權亂政天下從風而靡獨宋璟挺然羣衆之中特立不撓然其時武后雖悍而於公則改容晉接有加禮矣易之昌宗肆無顧忌而於公則推位讓坐事之惟恐不至矣小人之承順如此而公絶之愈嚴天下之人皆為之懼不知其於是非利害之介慮精而見確合於大人之亨也夫小人之於君子如方員之不侔而枘鑿之難入一旦卑躬戢體以相傾奉豈真有尊慕道德之心哉彼以君子者當世所重欲借之以飾其詐而濟其私陽博折節之名陰圖自便之實為君子者一不知而入其圜中彼直以私人畜我而頤指氣使惟其所欲於此之際而思稍示同異不至於戮辱不止史冊所載非一事矣李固之於梁氏荀彧之於曹公是也彧不足道固之剛明純正豈依梁氏以求名者哉不能絶之於始而輕身就之馴至殺身而不悟良可悲也公固早鑒之矣且夫小人者雖其自處貪冒無恥其於邪正之數亦未嘗不明也淮南王歷數漢臣丞相𢎞輩皆如發蒙振落而獨憚一汲黯李師道輦金帛至長安而不敢登杜黃裳之門何則其嚴毅之氣足以陰折其謀雖逆知必不為巳用而終不替敬畏之心也易之昌宗之憚公者豈異是乎假令見其一日之恭敬驟與交歡彼將玩弄我於股掌之間而以楊再思宗楚客之流待之又安肻卑躬戢體以相傾奉也哉故夫君子不幸而近小人茍不至固彧之蒙禍未有不如再思楚客之詘辱而己者也或曰易之書成於孔子佛肸之召孔子且欲往焉何哉曰必孔子而後可非孔子斷不可也孔子不云乎世之善學栁下惠者無如魯男子孟子為齊使王歡朝暮見未嘗與言行事孟子學孔子者也孟子且不能而况不如孟子者哉十三經注疏論湯斌自伏羲畫八卦而象數著唐虞垂典謨而道統開姬公作禮樂而制度備孔子贊易刪詩書作春秋而天人性命之理修身齊家治國平天下之道昭於萬世矣秦火之後六籍殘缺漢儒收拾補綴參互考訂歷晉唐而十三經之注疏始定及宋元學道者益衆經旨益明其間得失詳略可得而論焉言易始於田何傳於梁丘賀又有京房費直之學陳元鄭衆傳之其以彖象文言雜入卦中者自費氏始費氏興而田何遂息陳梁以來鄭康成王弼二注並列學宫鄭則多參天象王乃全釋人事天象難尋人事易習故鄭學浸微而王注獨盛其析義精深漢魏而降罕出其右而微雜老莊為兩晉虛無之祖後儒譏焉然欲一槩廢置則過也韓康伯邢璹之徒因而疏之唐孔頴達與顔師古撰正義亦以弼為本程子曰有理而後有象有象而後有數至微者理也至著者象也體用一源顯微無間觀㑹通以行其典禮則辭無所不備善學者求言必自近易於近者非知言者也朱子曰秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適於仁義中正之歸求其因時立教以承三聖不同於法而同於道者惟伊川氏之書而己然伊川專於言理而本義則又兼言象占易有聖人之道四焉合程朱之書庶乎備矣其他若李鼎祚之纂集訓解熊過來知德之殫力象數其亦輔程朱之不及者乎尚書則伏生口傳二十八篇作傳授同郡張生其後分為歐陽大小夏侯三家而歐陽最盛是謂今文魯恭王得壁中藏書孔安國校之得二十五篇是謂古文自漢迄西晉言書者惟祖歐陽氏安國訓解晚出皇甫謐家雖當時大儒揚雄杜預之徒皆未及見故左傳所引者預輒注為逸書獨其訓解頗多疏淺往往與經旨不合朱子疑是晉宋間人僞撰有以也孔頴達正義旨趣多乖惟宋儒蔡沈集注頗得其要金履祥表注王柏書疑魏了翁要義亦多可採焉詩三百五篇遭秦獨全者以其諷誦不獨在竹帛故也漢初魯有申公齊有轅固燕有韓嬰又趙人毛萇自云子夏所傳作詁訓是為毛詩鄭康成為之作箋齊魯詩亡韓詩雖存無傳之者惟毛詩鄭箋至今獨立其宣釐正風不可貶也疏之者惟劉焯兄弟為善朱子博考諸家斷以已見取裁廣而立義卓信超出百家矣獨詆斥大小序最嚴門人多有疑者竊以為書序可廢而詩序不可廢即詩而論之雅頌之序猶可廢而十五國風之序必不可廢何也書直陳其事而己藉令深得經意序不作可也雅頌之文辭易知而意易明也獨風之為體比興之辭多於敘述風諭之意浮於指斥蓋有反覆詠歎聯章纍句而無一言敘作之之意者而序乃一言以蔽之曰為某事也且其說往往與左傳合子夏左氏皆親見聖人而聞其筆削之意豈盡無據乎朱子以二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷狹邪之所作也夫子於鄭衛深絶其聲於樂以為法而嚴立其詞於詩以為戒其說誠正矣然左傳記季札來聘請觀古樂而弼鄘鄭衛皆在所歌使其為里巷狹邪之作則魯之樂工安能歌異國淫泆之辭而季札又從而聽之乎故大小序毛注鄭箋與朱子集注並行可也夫子春秋本文世所不見所編古經則皆自三傳中擇出耳然三傳經文多有異同如公及邾儀父盟於蔑也左氏以為蔑而公榖則以為昧如築郿也左氏以為郿而公榖則以為微㑹於厥憖也左氏以為厥憖而公穀則以為屈銀至於君氏尹氏一以為男子一以為婦人將以何為是乎此三傳經文之不能盡同也漢初胡母子都傳公羊春秋董仲舒以公羊顯於朝至何休作解說覃思十七年可謂專矣而多引䜟緯何可訓也穀梁自孫卿申公五傳至宣帝特好之范寧父子世守其業創名例百餘條以規諸儒同異之說可謂善矣而論者猶以其學不經師毋乃刻與况乎徐彥楊士勛之疏為邢昺所是正者又何足道也永平中能為左氏者擢高第為講郎賈逵服䖍並為訓解而杜預注盛行於時預之言曰左氏受經於仲尼故傳或先經以始事或後經以終義或依經以辨理或錯經以合異將令學者原始要終久乃得之其論至精且星歷地理必考其詳方言謡辭皆窮其義後人不能易其說焉間有棄經信傳者凡於傳例不合不曰傳之謬而曰經文闕漏則其蔽也其後沈文阿蘇寬劉炫皆據杜說孔穎達正義則又依劉學而損益之此三傳注疏之大略也至胡安國始以其意探聖人之心於千載之上其書固所以明綱常正人心定國是垂法戒非經生之作也若其書字書名稱人削爵之例多有自相抵牾者謂盡得聖人筆削之旨不敢信也古今治天下之理盡於尚書古今御天下之變備於左傳今取士專主胡傳士子傭耳剽目刺取左氏之字句以充帖括蓋有傳業為大師射䇿為大官而目不覩三傳之全文者矣其陋不巳甚乎六經之道同歸而禮樂之用為急漢髙堂生傳士禮十七篇又有古經出魯淹中然皆止於士大夫禮其朝覲㑹同郊祀大享逸而莫考河間獻王奏之朝合五十六篇宣帝時后倉深明其業為曲臺記以授戴德戴聖慶普三家並立學宮鄭康成宗小戴作儀禮注而慶氏之學至曹褒失傳夫克巳復禮之功不出視聽言動之間而動容周旋之際即性命精微所寓則儀禮一書豈非學者最宜盡心者乎獨其文辭質奧韓愈猶病難讀况下此者乎周禮之得入祕府也亦自河間獻王始獨闕冬官取考工記補之夫司空掌邦事居四民時地利考工何足盡之其得立學宮也自劉歆始杜子春因以授鄭衆賈逵厥後馬融作傳授康成其有注也自康成始而其有釋有疏也又自陸德明賈公彥始聖人致太平之迹獨賴此編之存漢武以為黷亂不經何休以為六國陰謀既不足知之而劉歆用之以輔莽王安石用之以變法後人遂以為周禮不足致治亦巳過矣河間又得仲尼弟子及後學所記一百三十篇上於朝劉向檢所得合為二百十四篇戴德刪其繁重為八十五篇謂之大戴記載聖又刪為四十六篇謂之小戴記馬融增月令明堂位樂記合四十九篇康成又為之注康成於三禮功最深考究名物象數曲盡其詳朱子深許之晉宋以來皇侃熊安生禮業最著孔頴達據以作正義宋儒篤信遺經淳熙有俞廷椿復古之編嘉熙有王次㸃補遺之録陳澔採衆家以為集說吳澄合三禮以為考注其羽翼之功固皆有可言者朱子欲考定三禮請於朝不果行止修復王朝等禮喪祭二禮付門人黃幹紹成其書曰通解汪克寬又因其成法為補遺今之學者倘以朱子之意折衷全禮彚為一經俾海內獲誦習古禮之全則諸儒衛翼之功得收實用矣論語則何晏集孔安國七家注成之皇侃本衛瓘十三家說疏之孟子則趙岐注之張鎰丁公著釋之孫奭據以作正義當時並稱精確由今觀之於孔孟一貫忠恕性善盡心之旨視程朱猶霄壤也孝經為河間顔芝所藏獻王得而上諸朝凡十八章所謂今文也與尚書同出孔壁者凡二十二章所謂古文也孔安國尚古文劉炫宗之劉向典校經籍以十八章為定鄭衆馬融鄭康成皆為之注唐明皇取王肅六家之說參倣孔鄭舊義為注邢昺作正義疏之司馬溫公范蜀公皆尊信古文指解朱子為刋誤亦復多從古文明呂維祺作大全本義集諸家之大成夫子曰吾志在春秋行在孝經當立之學官與論孟並爾雅始於周公而成於子夏誠九流之奧㫖也自終軍豹鼠之辨其書始行郭璞究心十八載草木魚蟲名物訓詁昭然備晰蓋古人之言所以難明者非但古人之義理難明也實古今之事物不同名號各異為難明也明爾雅則可以識箋注之旨歸也可以尋古人之精義也外此論體製則有說文諸書辨音韻則有四聲譜諸書皆所以輔爾雅而備同文之治者也可以其為小學而忽之哉總而論之漢儒去古未逺師友轉相傳授淵源有自後儒多因之若文質三統馬融之說也九六老變孔頴達之說也河洛表裏之符宗廟昭穆之數劉歆之說也五音六律十二管還相為宫鄭康成之說也是知漢儒之學長於數得聖人之博宋自周程張邵逮於朱蔡天地陰陽之奧道德性命之微深究其妙不泥前人之說其學也得聖人之約合二者而一之然後得聖人之全經若偏主一家是漢儒宋儒之經而非聖人之經也豈深於經者哉二十一史論湯斌蘇洵曰經以道法勝史以事辭勝經非一代之實録史非萬世之常法是不明尚書之義春秋之旨也夫經史之法同條共貫尚書備帝王之業經也而通史春秋定萬世之憲史也而為經修史者蓋未有不祖此者也故道法明而事辭備此史之上也事辭章而道義猶不悖焉次也二者皆失斯為下矣嘗讀古今之史約略論之司馬遷史記創為義例上下三千餘年為五十餘萬言辨而不華質而不俚其意深逺則其言愈緩其事繁碎則其文愈簡隱而彰直而寬非豪傑特起之士其孰能為之班固西漢書自武帝以前守其說而不敢變其所自為贍而不穢詳而有體經緯錯綜瞭如指掌亦古今之良史司馬之流亞也然自謂漢運紹堯以古今人物强立差等居攝不附於漢平孺子下列於新莽安能逭劉知幾之所短哉王通曰遷固而下帝王之道其暗而不明乎天人之意其否而不交乎制理者參而不一乎陳事者亂而無緒乎嗚呼難言之矣范蔚宗東漢書成自謂體大而思精由今觀之論竇武誅中官為違天理論班勇使西域為遺佛書抑節義之董宣於酷吏升忍恥之蔡琰於列女志王喬之鳬履記左慈之羊鳴詭譎不經文辭繁縟春秋之義於斯盡矣然論序詳明不可誣也陳夀述事簡嚴張華尤善之乃以父髠之故謂武侯不逮管蕭以索米之故而丁儀遂不得立傳且帝曹魏而寇劉漢所謂正大義以黜僭竊之義謂何使非習彥威辨之綱目正之大統不幾終紊乎貞觀時以何法盛等晉書未善乃據臧榮緒書增損之至宣武本紀陸王二傳煌煌御撰何其盛也然而史官之事至以天子臨之且志傳分手叢冗駢麗語林世說盡入青編幽明搜神咸被採録何可不辨也宋書本承天之舊事雜魏晉失於限斷沈約創志符瑞不經甚矣子顯齊書實因江淹天文但紀災祥州郡不著戶口思亷梁陳二書實卒父志祖父揚名言多不典然而倉皇變亂之際鑒戒頗多不可得而泯沒也收之後魏借公報私毁譽失實百藥北齊避諱略號遷就弗端後周牛宏惟務清言德棻繼之率多抵牾後之君子何以覽觀焉李延夀南北二史刪略繁蕪編摩簡徑比之正史實為過之魏徵隋書本末備舉倫貫有敘陳夀以來罕有其儔劉昫舊唐書府兵無志藩鎮無表是昧制度之原忘喪亂之本長孫與敬宗並書昌黎與禹錫同傳則賢否無别功罪等觀目劉蕡以文苑而直節泯然例吳淑以外戚而卓行蔑著則大節掩於細謹髙德蔽於閥閲此曾公亮之所以致譏而歐宋之所以釐正也新唐書雖事增於前文省於舊而削去詔令王言無徵多用竒字讀者易厭姓氏多訛年月屢異君子歎之矣蓋歐宋平分學術稍殊固不若五代史之獨出一人也其文簡逺淡宕當雲擾瓜分之日而君臣上下之交治亂興亡之故一唱三歎回環不己蓋與司馬相表裏矣史之有本紀史之綱維也古之史本紀立而全史具宋史舉駁雜細碎志傳不勝書之事羅而入之本紀發凡起例舉無要領載事立傳不辨主客互紀則復纍而無章迭舉則錯忤而寡要且卷帙最繁而缺略不少如韓琦傳不載儀鸞司撤簾之事狄青傳不記與曽公亮論方略之詳又如史彌逺傳但序官閥兼載奏章褒刺失據衮鉞無慿何其疏也金史簡潔逺勝宋遼蓋元好問之原本佳耳元史雖才集衆長而削藁迫促夫龍門扶風父子相繼梁書陳書十載告成而今限以條例要以時日欲成一代良史胡可得也史才實難自古歎之揭傒斯曰有學問文章而不知史事者不可與有學問文章知史事而心術不正者不可與然則必才備三長而克巳無我幽明不愧乃能誅姦諛而發潛德安得司馬君實朱元晦其人而與之議史事哉經世大法在方䇿論魏裔介古之帝王承天子民未嘗任其智術詐力以馭天下也唐虞授受之際言精言一然後命嶽命官平章協和禹湯文武之王皆以一中心法口授耳傳或以疇範或以懋昭或以緝熙敬勝故能犂舉百度陶範萬物以成忠質文三統之化然則先王經世之大法其即先王經世之心法乎先王慮後世怠棄天常流禍生民故殫精研思多為之所以布之於方䇿總之不離古文者近是乃數傳之後浸以陵彝昔孔子歎周道衰於幽厲而漢儒董仲舒亦曰周道之衰非道亡幽厲不由也繇是觀之不行先王之道雖金縢祕籙寶冊鴻文亦且滅沒於曠日玩時之下茍行先王之道雖片語隻字斷簡殘編亦可㑹通於精神往來之間而况聖君明相所手授而心訂者未嘗不燦然昭垂如二曜之麗天四瀆之行地乎三代既降秦孝公用商鞅之法奮其私智而不師古始皇承之聽李斯之姦謀烹滅諸侯破壞井田焚燒六經自以為功超三王德過五帝然沙邱告終咸陽遂火七廟邱墟為天下姍笑何者仁義禮樂先王本天以治人乃斯須不可去者秦盡棄之而權使其士詐使其民是以搢紳之士積怨而發憤謫戍之卒奮臂而雲合也漢之武帝表章六經一時學宮喁然向風可謂宣聖之功臣然內多欲而外施仁義汲黯已窺其隱唐之太宗勵精圖治貞觀之政幾致刑措然喋血禁廷終懷慚德皆有志於先王經世之法而未窺先王經世之本者也夫先王之法後世人主所由適於治之路九逵四術五都之市有目者所共覩舍而之乎灌莽坑塹之區則窮矣之燕者不南其轅之越者不北其舟况治天下而可瞀瞀以從事乎說者往往以一事之失以一人之謬乃遂訾議先王之法以為宜於古者不可施於今是何其不講於變通之術也蓋為治有本末養民有先後封建雖不可行若夫强幹弱枝犬牙相錯間以郡縣藩衛王室則今猶古也井田雖難卒復若夫比閭族黨寓兵於農限民名田以贍不足則今猶古也三公論道六卿分職亷善計吏以贊天子烏有不法先王之闢門籲俊而可為治者乎執爵而酳執醬而饋父事三老兄事五更烏有不法先王之尊年尚齒而可為治者乎推之明刑弼教期於無刑五典克敦九功惟敘凡先王之法垂憲萬世者固不可更僕數矣即有黃老之虛無申韓之刻薄楊墨之邪慝浮屠之空幻紛紜迭起以亂吾先王之法而先王之法自昭著於金匱石室之間與天地同其夀嗚呼美矣人主誠能招延英俊朝夕講求大小兼舉巨細靡遺措天下於久安長治之盛易易耳雖然法在方䇿矣所以法法者不在方䇿也人主得其所以法法者而通之於法不為膠柱之鼓也則幾矣皇清文頴卷五
